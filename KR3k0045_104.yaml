body:
  text: 喻林卷一百四明徐元太撰政治門九理財國君有財貨而不能用如山隰不能自用其財毛詩山有樞嬪貢絲枲也器貢銀鐵石磬丹漆也幣貢玉馬皮帛也材貢櫄幹栝柏篠簜也貨貢金玉龜貝也服貢絺紵也斿貢燕好珠璣琅玕也物貢雜物魚鹽橘柚也鄭氏注周禮天官太宰且絶民用以實王府猶塞川原而為潢汚也其竭也無日矣國語周登良山而採符玉泛瀛海而罩珠璣晉書食貨志壤可以為粟木可以為貨粟盡則有生貨散則有聚君人者名之為貴財安可有管子中匡王主積于民霸主積于將士衰主積于貴人亡主積于婦女珠玉故先王愼其所積管子樞言宫室械器非山無所仰然後君立三等之租於山曰握以下者為柴楂把以上者為室奉三圍以上為棺槨之奉管子山國軌善為國者如金石之相舉重鈞則金傾故治權則勢重治道則勢羸今穀重於吾國輕於天下則諸侯之自泄如原水之就下管子揆度此所謂用若挹於河海若輸之給馬此陰王之業管子輕重甲五穀粟米者民之司命也黃金刀布者民之通貨也先王善制其通貨以御其司命故民力可盡也管子輕重乙源泉有竭鬼神有歇守物之終始身不竭此謂源究管子輕重下玉起於禺音虞氏金起於汝漢珠起於赤野東南西北距周七千八百里水絶壤斷舟車不能通先王為其途之逺其至之難故託用於其重以珠玉為上幣以黃金為中幣以刀布為下幣三幣握之則非有補於暖也食之則非有補於飽也先王以守財物以御民事而平天下也管子國蓄北海則有走馬吠犬焉然而中國得而畜使之南海則有羽翮齒革曾青丹干焉然而中國得而財之東海則有紫紶魚鹽焉然而中國得而衣食之西海則有皮革文旄焉然而中國得而用之故澤人足乎木山人足乎魚農夫不斫削不陶冶而足械用工賈不耕田而足菽粟故虎豹為猛矣然君子剝而用之故天之所覆地之所載莫不盡其美致其用荀子王制上得天時下得地利中得人和則財貨渾渾如泉源汸汸如河海暴暴如丘山荀子富國田野縣鄙者財之本也垣窖倉廪者財之末也百姓時和事業得叙者貨之源也等賦府庫者貨之流也故明王必謹養其和節其流開其源而時斟酌焉荀子富國篇利出一空者其國無敵利出二空者其兵半用利出十空者民不守韓非子飾令今夫越之具區楚之雲夢宋之巨野齊之孟諸有國之富而伯王之資也人主統而一之則强不禁則亡齊以其腸胃豫人家强而不制枝大而折幹以專巨海之富而擅魚鹽之利也鹽鐵論刺權賢聖治家非一室富國非一道鹽鐵論本議夏后以𤣥貝周人以紫石後世或金錢刀布物極而衰終始之運也鹽鐵論錯幣今山澤之財均輸之藏所以御輕重而役諸侯也汝漢之金纎微之貢所以誘外國而釣羌胡之寶也鹽鐵論力耕聖人因天時知者因地財上士取諸人中士勞其形長沮桀溺無百金之積跖蹻之徒無猗頓之富鹽鐵論力耕使治家養生必於農則舜不為甄陶而伊尹不為庖鹽鐵論力耕是開利孔為民罪梯者也鹽鐵論本議家人有寶器尚函匣而藏之况人主之山海乎鹽鐵論禁耕民人藏於家諸侯藏於國天子藏於海內故民人以垣墻為藏閉天子以四海為匣匱鹽鐵論禁耕若各居其處食其食則是橘柚不鬻朐鹵之鹽不出旃罽不市而吳唐之材不用也鹽鐵論通有家人語陶朱為生本末異徑一家數事而治生之道乃備鹽鐵論水旱王國富民霸國富士僅存之國富大夫亡道之國富倉府是謂上溢而下漏說苑政理譬無異夫路人反裘而負芻也將愛其毛不知其裏盡毛無所恃也今吾田地不加廣士民不加衆而錢十倍必取之士大夫也新序雜事二或曰𢎞羊𣙜利而國用足盍𣙜諸曰譬諸父子為人父而𣙜其子縱利如子何揚子寡見篇王者藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於篋匱初學記居處部庫藏通變被髮文身錯臂左袵甌越之民也黑齒雕題鯷冠秫縫大吳之國也禮服不同其便一也是以鄉異而用變事異而禮易是故聖人茍可以利其民不一其用果可以便其事不同其禮戰國䇿趙武靈王聖與俗流賢與變俱諺曰以書為御者不盡馬之情以古制今者不達事之變故循法之功不足以高世法古之學不足以制今戰國䇿趙武靈王三王之道若循環終而復始史記髙祖紀俗已薄於三代而行堯舜之刑是猶以鞿而御駻突違救時之宜矣前漢書刑法志一色成體謂之純白黑雜合謂之駮欲以成平之法治暴秦之緒猶以鄉飲酒之禮理軍市也前漢書海福傳聖人能與世推移而俗士苦不知變以為結繩之約可復理亂秦之緒干戚之舞足以解平城之圍後漢書崔駰列傳不能通其變而一度以揆之斯契船而求劒守株而伺兔也後漢書張衡列傳夫奕者之思盡於一局者也聖人之明周於天下者也茍一局之勢未嘗盡同則天下之事豈必相襲哉後漢紀孝章下天以盈虛為運政以損益為道晉書劉毅傳惟天地之道一隂一陽禮俗之變一文一質周書蘇綽傳乾道變化陰陽所以消息沿創不同生靈所以順序若使天意不變施化何以成四時人事不易為政何以利萬姓北史隋本紀下民變而不能變是稅之傳革管子侈靡孔子西游於衛顏淵問師金曰以夫子之行為奚如師金曰惜乎而夫子其窮哉夫芻狗之未陳也盛以篋衍巾以文繡尸祝齊戒以將之及其已陳也行者踐其首脊蘇者取而爨之而已將復取而盛以篋衍巾以文繡游居寢臥其下彼不得夢必且數眯焉今而夫子亦取先王已陳芻狗取弟子遊居寢臥其下故伐樹於宋削迹於衛窮於商周是非其夢邪圍於陳蔡之間七日不火食死生相與鄰是非其眯邪夫水行莫如用舟而陸行莫如用車以舟之可行於水也而求推之於陸則沒世不行尋常古今非水陸與周魯非舟車與今蘄行周於魯是猶推舟於陸也勞而無功身必有殃彼未知夫無方之傳應物而不窮者也且子獨不見夫桔橰者乎引之則俯舍之則仰彼人之所引非引人也故俯仰而不得罪於人故譬三皇五帝之禮義法度其猶柤黎橘柚邪其味相反而皆可於口故禮義法度者應時而變者也今取猿狙而衣以周公之服彼必齕齧挽裂盡去而後慊觀古今之異猶猿狙之異乎周公也故西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走彼知美矉而不知矉之所以美惜乎而夫子其窮哉莊子天運彼後王者天下之君也舍後王而道上古譬之是猶舍已之君而事人之君也故曰欲觀千歲則審今日欲知億萬則審一二故曰以近知逺以一知萬以微知明荀子非相今有構木鑽燧於夏后氏之世者必為鯀禹笑矣有決瀆於殷周之世者必為湯武笑矣然則今有美堯舜湯武禹之道於當今之世者必為新聖笑矣韓非子五蠧宋人有耕田者田中有株兔走觸株折頸而死因釋其耒而守株冀復得兔兔不可復得而身為宋國笑今欲以先王之政治當世之民皆守株之類也韓非子五蠧為政猶沐也雖有棄髮必為之愛愛棄髮之費而忘長髮之利不知權者也韓非子六反古者寡事而備簡朴陋而不盡故有珧銚而推車者古者人寡而相親物多而輕利易讓故有揖讓而傳天下者然則行揖讓髙慈惠而道仁厚皆推政也處多事之時用寡事之器非智者之備也當大爭之世而循揖讓之軌非聖人之治也故智者不乘推車聖人不行推政也韓非子八說世易時移變法宜矣譬之若良醫病萬變藥亦萬變病變而藥不變嚮之壽民今為殤子矣夫不敢議法者衆庶也以死守者有司也因時變法者賢主也是故有天下七十一聖其法皆不同非務相反也時勢異也故曰良劒期乎斷不期乎鏌鎁良馬期乎千里不期乎驥驁呂氏春秋察今五帝異道而德覆天下三王殊事而名施後世此皆因時變而制禮樂者譬猶師矌之施瑟柱也所推移上下者無尺寸之度而靡不中音故通於禮樂之情者能作音有本主於中而以知矩彠之所周者也淮南子汜論訓夏后氏殯於阼階之上殷人殯於兩楹之間周人殯於西階之上此禮之不同者也有虞氏用瓦棺夏后氏堲周殷人用槨周人牆置翣此葬之不同者也夏后氏祭於暗殷人祭於陽周人祭於日出以朝此祭之不同者也堯大章舜九韶禹大夏湯大濩周武象此樂之不同者也淮南子汜論訓禮義者五帝三王之法籍風俗一世之迹也譬若芻狗土龍之始成文以青黃絹以綺繡纒以朱絲尸祝礿袨大夫端冕以送迎之及其已用之後則壤土草剟而已夫有孰貴之淮南子齊俗訓夫夏商之衰也不變法而亡三代之起也不相襲而王故聖人法與時變禮與俗化衣服器械各便其用法度制令各因其宜故變古未可非而循俗未足多也百川異源而皆歸於海百家殊業而皆務於治故聖人所由曰道所為曰事道猶金石一調不更事猶琴瑟每絃改調今世德益衰民俗益薄欲以朴重之法治既弊之民是猶無鏑銜橛策錣而御馯馬也學者循先襲業據籍守舊教以為非此不治是猶持方枘而周員鑿也欲得宜適致固焉則難矣淮南子汜論訓夫以一世之變欲以耦化應時譬猶冬被葛而夏被裘夫一儀不可以百發一衣不可以出歲儀必應乎髙下衣必適乎寒暑是故世異即事變時移則俗易故聖人論世而立法隨時而舉事淮南子齊俗訓聖人以文交於世而以實從事於宜不結於一迹之塗淮南子汜論訓伯余之初作衣也緂麻索縷手經指挂其成猶網羅後世為之機杼勝復以便其用而民得以掩形御寒古者剡耜而耕摩蜃而耨木鉤而樵抱甀而汲民勞而利薄後世為之耒耜耰鋤斧柯而樵桔橰而汲民逸而利多焉淮南子汜論訓古之所為不可更則車至今無蟬匷淮南子說林訓五色雖朗有時而渝茂木豐草有時而落物有降殺不得自若故聖人事窮而更為法弊而改制非樂變古易常也將以救敗持衰黜淫濟非以調天地之氣順萬物之宜也淮南子泰族訓善聲而不知轉未可謂能歌也善言而不知變未可謂能說也持規而非矩執凖而非繩通一孔曉一理而不知權衡以所不覩不信人若蟬之不知雪堅據古人以應當世猶辰參之錯膠柱而調瑟固而難合矣鹽鐵論相刺俗非唐虞之時而世非許由之民而欲廢法以治是猶不用櫽栝斧斤欲撓曲直枉也鹽鐵論大論今欲以敦朴之時治抗弊之民是猶遷延而拯溺揖讓而救火也鹽鐵論大論聖人之與聖也如矩之三雜規之三雜周則又始窮則反本也說苑修文或問新敝曰新則襲之敝則損益之揚子問道篇聖人之法未嘗不關盛衰焉昔者堯有天下舉大綱命舜禹夏殷周屬其子不膠者卓矣唐虞象刑惟明夏后肉辟三千不膠者卓矣堯親九族協和萬國湯武桓桓征伐四克由是言之不膠者卓矣禮樂征伐自天子所出春秋之時齊晉實豫不膠者卓矣揚子先知篇一行之禮非隨時禮也一定之法非隨時法也淮南子汜論訓解夫骨填肉補之藥長於養體益壽而不可以救暍溺之急也務寬含垢之政可以蒞敦御朴而不可以拯衰弊之變也虎狼見逼不揮戈奮劒而彈琴詠詩吾未見其身可保也燎火及室不奔走灌注而揖讓盤旋吾未見其焚之自息也抱朴子外篇審舉夫德教者黼黻之祭服也刑罰者捍刃之甲胄也若德教治狡暴猶以黼黻御剡鋒也以刑罰施平世是以甲胄升廟堂也抱朴子外篇用刑至醇既澆於三代大朴又散於秦漢道衰於疇昔俗薄乎當今而欲結繩以整姦欺不言以化狡猾委轡䇿而乘奔馬於險塗舍柁櫓而泛舟以淩波盤旋以逐走盜揖讓以救災火斬朝錯以却七國舞干戈以平赤眉未見其可也抱朴子外篇用刑欲以太昊之道治偷薄之俗以畫一之歌救鼎湧之亂非識因革之隨時明損益之變通也所謂刻舟以模遺劒參天而射五步摜犀兕之甲以涉不測之淵襟却寒之裘以禦鬱隆之暑踵之解結頥之搔背其為憤憤莫此之劇矣抱朴子外篇用刑夫三王不相沿樂五帝不相襲禮而其移風易俗安上治民一也或革或因損益懷善何必當乘船以登山策馬以涉川被甲以升廟堂重裘以當隆暑乎若謂古事終不可變則棺槨不當代薪埋衣裳不宜改祼袒矣抱朴子外篇省煩常制不可以待變化一塗不可以應無方刻船不可以索遺劒膠柱不可以諧清音故翠蓋不設於晴朗朱輪不施於涉川味淡則加之以鹽沸溢則增水而減火抱朴子外篇廣譬丹書鐵劵刺牲㰱血不能救違約之弊則難以結繩檢矣五刑九伐赤族之盛不足以止覬覦之姦則不可以舞干化矣抱朴子外篇廣譬若舟車之代步涉文墨之改結繩諸後作而善於前事其功業相次千萬者不可復縷舉也抱朴子外篇鈞世三皇五帝之禮義法度期於合時宜應治體而已彼以為美者此或以為惡故當應時而變然後皆適也然則禮義當其時而用則西施矣遇時而不棄則醜人矣郭子注莊天運若握一世之法以傳百世之人由以一衣擬寒暑一藥治痤瘕也若載一時之禮以訓無窮之俗是刻舟而求劒守株而待兔劉子法術療饑不期於鼎食振溺無待於規行是以三王異道而共昌五霸殊風而並烈文選王融䇿秀才文聖人之變如水隨形形平則平形險則險太平御覽人事部敘聖撥亂雲雷屯君子以經綸易屯初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也易蠱九五無妄之疾勿藥有喜易無妄天地革而四時成湯武革命順乎天而應乎人革之時大矣哉易革利涉大川乘木有功也易渙初六用拯馬壯吉易渙若火之燎于原不可嚮邇其猶可撲滅書盤庚上商罪貫盈天命誅之書泰誓上若涉淵水豫惟往求朕攸濟書大誥無若火始焰焰厥攸灼叙弗其絶書洛誥若游大川豫往暨汝奭其濟小子書君奭若莠生苗若秕在粟恐被鋤治簸揚孔氏傳書仲虺之誥禍毒在汝身徒奉持所痛而悔之則於身無所及孔氏傳書盤庚上稼穡之夫除草養苗我長念天亡殷惡主亦猶是矣我何敢不順天終竟我壟畞乎孔氏傳書大誥燎之方揚寧或滅之詩小雅正月苞有三蘖莫遂莫達叶他悅反詩頌長發雨雪之盛瀌瀌然至日將出其氣始見人則皆稱曰雪今消釋矣喻小人雖多王若欲興善政則天下聞之莫不曰小人今誅滅矣鄭氏箋詩角弓夏田為苗擇取不孕任者若治苗去不秀實者鄭氏注周禮夏官大司馬今之欲王者猶七年之病求三年之艾也茍為不畜終身不得茍不志於仁終身憂辱以陷於死亡孟子離婁上麋鹿在牧蜚鴻滿野天下享殷乃今有成史記周本紀秦失其鹿羣雄競逐狐鳴楚祠龍興沛谷史記秦楚表贊馭委其轡馬駘其銜四牡橫奔皇路險傾方將拑勒鞬􅀈以救之豈暇鳴和鑾清節奏哉後漢書崔駰列傳掃六合之穢慝清宇宙之埃塵連光芒於白日屬炎氣於景雲後漢書蔡雍列傳用能蕩氛霧於昊蒼耀晨輝於宇宙晉書簡文帝紀茨草穢堂階掃截不得生晉書樂志下臨河救溺不卜命之短長脉病三年不豫絶其餐饋晉書郭㻦傳雖洪水滔天猶欲濟彼俱溺晉書秃髮烏孤紀固以興滅繼絶舟航淪溺矣宋書武帝中本紀陛下張天造歷駕日登皇聲雷宇宙勢壓河嶽而封豕殘魂未屠劒首長蛇餘喘偷窺外甸南齊書孔稚圭傳拯橫流於碣石撲燎火於崑岑陳書高祖上紀聖上之養庶物若慈母之養赤子今赤子幾臨危壑將赴水火以煩勞而不救豈赤子所望於慈母魏書張普惠傳回嘗聞之夫子曰治國去之亂國就之醫門多疾願以所聞思其則庶幾其國有瘳乎莊子人間世聖人以治天下為事者也必知亂之所自起焉能治之不知亂之所自起則不能治譬之如醫之攻人之疾者然必知疾之所自起焉能攻之不知疾之所自起則弗能攻墨子兼愛上夫兩堯不能相王兩桀不能相亡亡王之機必其治亂其强弱相踦者也木之折也必通蠧墻之壞也必通隙然木雖蠧無疾風不折墻雖隙無大雨不壞萬乘之主有能服術行法以為亡徵之君風雨者其兼天下不難矣韓非子亡徵易曰困于石據于蒺藜入于其宫不見其妻凶此言困而不見據賢人者也昔者秦繆公困于殽疾據五羖大夫蹇叔公孫支而小霸晉文困于驪氏疾據咎犯趙衰介子推而遂為君越王勾踐困于㑹稽疾據范蠡大夫種而霸南國齊桓公困于長勺疾據管仲寧戚隰朋而匡天下此皆困而知疾據賢人者也夫困而不知疾據賢人而不亡者未嘗有之也韓詩外傳夫衣小缺襟裂可以補而必待全匹而易之政小缺法令可以坊而必待雅頌乃治之是猶舍鄰之醫而求俞跗而後治病廢汙池之水待江海而後救火也鹽鐵論申韓聖人仁士之於天地之間民之父母也今為濡足之故不救溺人可乎新序節七針頭刺手百病瘳愈抑按捫炙死人復起焦氏易林萃之節震風凌雨然後知夏屋之為帡幪也虐政虐世然後知聖人之為郛郭也揚子吾子次六大虛既邪或直之或翼之得矣夫測曰虛邪矣夫得賢臣也太𤣥經第一羡次五拔車山淵宜於大人測曰拔車山淵大位力也太𤣥經第一礥上九崇崇髙山下有川波其人有輯航可與過其測曰髙山大川不輯航不克也太𤣥經第一礥次八割其蠧得心疾測曰割其蠧國所便也太𤣥經第六割次八小子在淵文人播船測曰文人播船濟溺世也太𤣥經第六將凡療病者必知脉之虛實氣之所結然後為之方故疾可愈而壽可長也為國者必先知民之所苦禍之所起然後為之禁故姦可塞而國可安也濳夫論述赦夫聖賢之治世也有術得其術則功成失其術則事廢譬猶醫之治病也有方篤劇猶治無方毚微不愈夫方猶術病猶亂醫猶吏藥猶教也方施而藥行術設而教從教從而亂止藥行而病愈治病之醫未必惠於不為醫者然而治國之吏未必賢於不能治國者偶得其方遭曉其術也王充論衡宋賢篇穀登歲平庸主因緣以建德政顚沛危殆聖哲優者乃立功化是故微病恆醫皆巧篤劇扁鵲乃良王充論衡恢國篇令濮上巴人反安樂之正音腠理之疾無退走之滯患者豈有方乎抱朴子外篇審舉見不善則若鷹鸇之摶鳥雀覩亂萌則若剃他計切田之芟蕪薉抱朴子外篇用刑波川之險須輯航而濟之礥下研切難之世須聖人而拔之也太𤣥經第一礥解大壯􅀢音厥仡仡許訖切躍他歷切欻欻許勿切頁音頡趾􅠆音顚足首首同出傳曰􅀢仡仡健也躍欻欻動也頁趾􅠆倒也足首出反也昔王由是行正于內作威于外􅀈剛以守之決以斷之眤爾賢良警爾戒懼元包太陰困􅀈朏同晦泓鳥宏切竭聰蒙咽噎於結切疒音疾罹于憂諑加于譎傳曰􅀈晦泓竭月之沒澤之枯也聰蒙咽噎耳之患喉之病也疒罹于憂􅘨愁苦也諑加于譎遭讒毁也昔王由是省法于內布澤于外進決諌逐諛佞廣乃聰􅖏音杜乃讟元包少陰言治國及修身者如車奔舟覆故欲救之揚子法言注寡見篇去風雲則天清而水平誅暴亂則君聖而時泰文選陸士衡演連珠注治定功成邇安逺肅忘兹鹿駭息此狼顧文選陸陲石闕銘思樹芳蘭翦除荆棘文選袁宏名臣序贊三秦席卷項籍灰分逋虜霧散遺寇雲徹泛時雨以清天灑狂塵以肅地廣文選陸士龍盛德頌瞻星昧環拱之方託水迷朝宗之義積蠅為衆長蛇稱長文苑英華魏收移文大必包小天地之常規明能通暗日月之常理文苑英華檄一隋檄陳尚書文蜂目已奔狼心遂革文苑英華庾信職官二十七刺史一神道碑元帥逞梟鳶之心鋭卒畜蜂蠆之毒蠅飛藩棘蟻附池隍文苑英華移文移虜淮陽太守文扇之以仁風驅之以大威霜雪被而洪棘枯綱維振而逆鱗掃太平御覽皇王部後漢世祖光武皇帝拯壓傾構引溺危波初學記居處部宫一者善知病二者善知病源三者善知病對治四者善知治病已當來更不動發雜阿含經卷十五云何良醫善知病對治謂良醫善知種種病應塗藥應吐應下應灌鼻應熏應取汗如是此種種對治是名良醫善知對治雜阿含經卷十五喻林卷一百四
