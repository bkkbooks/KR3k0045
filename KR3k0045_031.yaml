body:
  text: 喻林卷三十一明徐元太撰人事門二十九見大孫卿子曰不登髙山不知天之髙不臨深溪不知地之厚也晉書地理志上俾夫玩培塿者識嵩岱之崇崫守蹟礫者悟渤澥之泓澄周書武帝上紀秋水時至百川灌河涇流之大兩涘渚崖之間不辨牛馬於是焉河伯欣然自喜以天下之美為盡在已順流而東行至於北海東面而視不見水端於是焉河伯始旋其面目望洋向若而歎曰野語有之曰聞道百以為莫已若者我之謂也且夫我嘗聞少仲尼之聞而輕伯夷之義者始吾弗信今我暏子之難窮也吾非至於子之門則殆矣吾長見笑於大方之家莊子秋水天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛春秋不變水旱不知此其過江河之流不可為量數而吾未嘗以此自多者自以比形於天地而受氣於隂陽吾在於天地之間猶小石小木之在大山也方存乎見少又奚以自多計四海之在天地之間也不似礨空之在大澤乎計中國之在海內不似稊米之在太倉乎號物之數謂之萬人處一焉人卒九州榖食之所生舟車之所通人處一焉此其比萬物也不似毫末之在於馬體乎莊子秋水赤螭青虬之遊冀州也天清地定毒獸不作飛鳥不駭入榡薄食薦梅噆味含甘步不出頃畝之區而蛇鱓輕之以為不能與之爭於江海之中若乃至於𤣥雲之素朝隂陽交爭降扶風雜凍雨扶搖而登之威動天地聲震海內蛇鱓著泥百仭之中熊羆匍匐丘山嶄巖虎豹襲穴而不敢咆猿狖顛蹶而失木枝又況直蛇鱓之類乎鳳凰之翔至德也雷震不作風雨不興川谷不淡草木不搖而燕雀佼之以為不能與之爭於宇宙之間逮至其曽逝萬仭之上翺翔四海之外過崑崙之疏圃飲砥柱之湍瀨邅回濛汜之渚徜徉冀州之際徑躡都廣入日抑節羽翼弱水暮宿風穴當此之時鴻鵠鶬鸖莫不憚驚伏竄注啄江裔又況直燕雀之類乎此明於小動之迹而不知大節之所由者也淮南子覽冥訓今夫繇者揭钁臿負籠土鹽汗交流喘息薄喉當此時得休越下則脫然而喜矣巖穴之間非直越下之休也病疵瘕者捧心抑腹膝上叩頭踡局而諦通夕不寐當此之時噲然得卧則親戚兄弟歡然而喜夫修夜之寧非直一噲之樂也故知宇宙之大則不可劫以死生知養生之利則不可縣以天下知未生之樂則不可畏以死牆之立不若其偃也又況不為牆乎冰之凝不若其釋也又況不為冰乎淮南子精神訓窮鄙之社也叩盆拊瓴相和而歌自以為樂矣嘗試為之擊建鼓撞巨鐘乃性仍仍然知其盆瓴之足羞也藏詩書修文學而不知至論之㫖則拊盆叩瓴之徒也淮南子精神訓通許由之意金縢豹韜廢矣延陵季子不受吳國而訟閒田者慚矣子罕不利寶玉而爭劵契者愧矣務光不汚於世而貪利偷生者悶矣故不觀大義者不知生之不足貪也不聞大言者不知天下之不足利也淮南子精神訓大都之居無物不具焦氏易林解之乾觀書者譬諸觀山及水升東嶽而知衆山之峛崺也況介丘乎浮滄海而知江河之惡沱也況枯澤乎揚子吾子駕言登五嶽然後小陵丘曹子建蝦䱉篇必自知出潢汙而浮滄海背螢燭而向日月聞雷霆而覺布鼓之陋見巨鯨而知寸介之細也抱朴子內篇金丹夫飲玉􅏁則知漿荇之薄味覩崑山則覺丘垤之至卑既覽金丹之道則使人不欲復視小小方書抱朴子內篇金丹蓋登旋璣之眇邈則知井谷之至卑覩大明之麗天乃知鷦金之可陋抱朴子內篇明本若遊目於天表似無依而洋洋文選西都賦雖復臨河而釣鯉無異射鮒於井谷文選吳都賦浮海難為水逰林難為觀文選陸雲為顧彥光作詩夫聽白雪之音觀緑水之節然後東野巴人蚩鄙益著文選陳琳答東阿王箋夫登東嶽者然後知衆山之邐迤也奉至尊者然後知百里之卑微也文選吳質答東阿王書將以娛耳目樂心意乎譬命駕而逰五都之市則天下之貨畢陳矣褰裳而涉汶陽之丘則天下之稼如雲矣椎髻而守敖庾海陵之倉則山坻之積在前矣扳袵而登鍾山藍田之土則夜光璵璠之珍可觀矣文選李康運命論詠雲門者難為音觀徐和者難為珍文選班固典引故不登閬風安以瞻殊目之形不步景宿何以觀恢廓之表補文選曹毗對儒夫欣黎黃之音者不顰蟪蛄之吟豁雲臺之觀者必閟帶索之歡補文選郭璞客傲夫夜光結緑非胠篋之恆珍逸羽翔鱗豈園池之近玩藝文類聚人部隱逸下碑不升崇霍豈識乾行之峻不臨溟渤安知地載之厚藝文類聚禮部學校表所謂窺七澤而狹潢汙登太山而小天下藝文類聚內典部寺碑啓何異一毛之落牛體雙鳧之飛海曲文苑英華杜弼􅊾一以有數之物託於無窮若草木離土衆星離天不足以喻焉道德經指歸卷九如清秋觀海苐見澶漫寧測其深華陽陶隱居傳上譬如有人逰於大海中流四望涯際莫知大寶積經二十如人已見轉輪聖王則不求見諸餘小王大方等大集經卷九是知登崑閬者必培塿於衆山遊溟渤者亦坳堂於羣澍諒其然矣逹磨法藴足論後序十二佛言海中有大魚一者長四千里二者長八千里三者長萬二千里四者長萬六千里五者長二萬里六者長二萬四千里七者長二萬八千里學問不值明師安知天下有大道乎乘船逰於汙池泉流安知天下有江海佛說四諦經積八夫百梁之構興則鄙茅茨之仄陋覩斯論之宏曠則知偏悟之鄙倍中論序卷一觀無為之行還視世事猶臨天井而窺溪谷登嵩岱而見丘垤矣𢎞明集牟子理惑論小見初六童觀小人道也易觀六二窺觀利女貞象曰窺觀女貞亦可醜也易觀童觀者處於觀時而最逺朝廷之美體是柔弱不能自進無所鍳見唯如童稚之子而觀望也周易正義觀尹子曰松柏之鼠不知堂密之有美樅七容切爾雅注觀者未覩指聼者未聞音猶鷦明已翔乎寥廓而羅者猶視乎藪澤悲夫史記司馬相如傳夫子之為方也若以管窺天以郤視文史記扁鵲傳太傅在前說相鼠之詩尊曰無持布鼓過雷門前漢書王尊傳夫荷旃被毳者難與道純綿之麗密羮藜唅糗者不足與論太牢之滋味前漢書王褒傳今子乃以鴟梟而笑鳳凰執蝘蜓而嘲龜龍不亦病乎子徒笑我𤣥之尚白吾亦笑子之病甚不遭㬰跗扁鵲悲夫前漢書揚雄傳下今子處皇世而論戰國耀所聞而疑所覿欲從旄敦而度髙呼泰山懷氿濫而測深呼重淵亦未至也前漢書叙傳上所謂見勢利之華暗道德之實守突奧之熒燭未卬天庭而覩白日也前漢書叙傳上自以為能行兵於井底遊步於牛蹄魏志明帝紀注卓曰鴻鵠固有逺志但燕雀自不知耳嵩曰昔與明公俱為鴻鵠不意今日變為鳳凰耳魏志董卓傳注子雖光麗既美且豔管窺筐舉守厥所見未可以言八紘之形埒信萬事之精練也蜀志卻正傳若賓可謂習外觀之暉暉未覩幽人之髣佛也見俗人之不容未喻聖皇之兼愛也循方圎於規矩未知大形之無外也晉書皇甫謐傳近雖預觀尺錦而不覩金玉梁書劉孝綽傳小人管窺懸象何能見𤣥穹之廣大魏書崔浩傳子獨不聞夫坎井之蛙乎謂東海之鱉曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接掖持頥蹶泥則沒足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨跱蹈井之樂此亦至矣夫子奚不時來入觀乎東海之鱉左足未入而右膝已縶矣於是逡巡而却告之海曰夫千里之逺不足以舉其大千仭之髙不足以極其深禹之時十年九潦而水弗為加益湯之時八年七旱而崖不為加損夫不為頃久推移不以多少進退者此亦東海之大樂也於是坎井之蛙聞之適適然驚規規然自失也且夫知不知是非之竟而猶欲觀於莊子之言是猶使蚊負山商蚷馳河也必不勝任矣是直用管窺天用錐指地也不亦小乎且子獨不聞夫夀陵餘子之學行於邯鄲與未得國能又失其故行矣直匍匐而歸耳莊子秋水賢聖不明道德不一天下多得一察焉以自好譬如耳目鼻口皆有所明不能相通猶百家衆技也皆有所長時有所用雖然不該不遍一曲之士也莊子天下百家異說各有所出若夫墨楊申韓之於治道猶蓋之無一撩而輪之無一輻有之可以備數無之未有害於用也已自以為獨擅之不通之於天地之情也今夫冶工之鑄器金踊躍於爐中必有波溢而播棄者其中地而凝滯亦有以象於物者矣其形雖有所小周哉然未可以保於周室之九鼎也有況比於規形者乎其與道相去亦逺矣淮南子俶真訓鵲巢知風之所起獺穴知水髙下暉日知晏隂諧知雨為是謂人智不如鳥獸則不然故通於一伎察於一辭可與曲說未可與廣應也淮南子繆稱訓夫隨一隅之迹而不知因天地以遊惑莫大焉雖時有所合然而不足貴也譬若旱嵗之土龍疾疫之芻靈是為帝者也淮南子說林訓所以貴聖人者以其能龍變也今捲捲然守一節推一行雖以毁碎滅沈猶且弗易也此察於小好而塞於大道也淮南子人間訓諸生議不干天則入淵乃欲以閭里之治而況國家之大事亦不幾矣發於畎畝出於窮巷不知冰水之寒若醉而新寐殊不足與言也鹽鐵論憂邊鄒子疾晚世之儒墨不知天地之𢎞昭曠之道將一曲而欲道九折守一隅而欲知萬方猶無準平而欲知髙下無規矩而欲知方圎也鹽鐵論論鄒譬若以管窺天以錐刺地所窺者甚大所見者甚少說苑辨物初一沈耳于閨不聞貞測曰沈耳于閨失德體也太𤣥經第五沈子徒見無懷子漁傲于楚磯而烏知有心氏擊磬于衛國是猶覩山雞之垂翰于樊籠而烏覩鳳凰之翺翔于霄漢乎何所規之不廣也天祿閣外史漁論蝦䱉遊潢潦不知江海流燕雀戲藩柴安識鴻鵠遊曹子建蝦䱉篇夫蘙薈之翔叵以論垂天之凌蹄涔之逰無以知絳虬之騰鈞天之庭豈伶人之所躡無航之津豈蒼兕之所涉非天下之至通難與言山海之義矣山海經序目察百步不能了了而欲以所見為有所不見為無則天下之所無者亦必多矣所謂以指測海指極而云水盡者也蜉蝣校巨鼇白及料大椿豈所能及哉抱朴子內篇論仙夫寸鮹泛迹濫水之中則謂天下無四海之廣也芒蝎宛轉果核之內則謂人極之界盡於兹也雖告之以無涯之浩汗語之以宇宙之恢闊以為空言必不肯信也抱朴子內篇微㫖人生星宿各有所值既詳之於别篇矣子可謂戴盆以仰望不睹七曜之炳粲暫引領於大川不知重淵之竒怪也抱朴子內篇釋滯夫以管窺之狹見而孤塞其聰明之所不及是何異以一尋之綆汲百仭之深不覺所用之短而云井之無水也抱朴子內篇塞難子可謂守培塿玩狐丘未登閬風而臨雲霓玩瀅汀遊潢汙未浮南溟而涉天漢抱朴子外篇逸民夫鋭志於雛鼠者不識騶虞之用心盛務於庭粒者安知鴛鸞之逺指猶焦螟之笑雲鵬朝菌之怪大椿坎蛙之疑海鱉井蛇之嗤應龍也子誠喜懼於勸沮焉識𤣥曠之髙韻哉抱朴子外篇逸民夫論管冗者不可問以九陔之無外習拘閡者不可督以拔萃之獨見抱朴子外篇鈞世學者専守一業遊井忽海遂䟾躓於泥濘之中而沈滯乎不移之困抱朴子外篇百家偏嗜酸甜者莫能嘗其味也用思有限者不得辨其神也抱朴子外篇百家吾子所謂竄巢穴之沈昧不知八紘之無外守燈燭之宵曜不識三光之晃朗逰潢汙之淺狹未覺南溟之浩汗滯丘垤之位埤不寤嵩岱之峻極也抱朴子外篇喻蔽若獨亢然立乎髙山之頂守一家之偏尚此故俗中之一物郭子注莊逍遙逰鯢鰌専制於小溝莊子音義庚桑楚玩其磧礫而不窺玉淵者未知驪龍之所蟠也習其敝邑而不覿上邦者未知英雄之所躔也文選吳都賦習蓼蟲之忘辛玩進退之惟谷非常寐而無覺不覩皇輿之軌躅文選魏都賦若客所謂末學膚受貴耳而賤目者也文選東京賦借問蜉蝣輩寧知龜鶴年文選郭璞逰仙詩今子執分寸而罔億度處把握而却寥廓文選王褒四子講德論野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦已疏矣文選嵇康絶交書區區管窺豈能照一隅哉補文選漢章帝糾非法詔不登閬風安以瞻殊目之形不步景宿何以觀恢廓之表是以迷粗者循一往之智狷介者守一方之矯豈知火林之蔚炎柯冰津之擢陽草廣文選曹輔佐對儒此郎亦管中窺豹時見一斑世說新語方正坳塘泛水豈議大瀆之流覆簣為峰終乖小魯之說藝文類聚封爵部遜讓封表生處深宫未覿焦原之險不出戶庭豈觀砥柱之峻藝文類聚封爵部遜讓封表蓋聞井魚之不識巨海夏蟲之不見冬氷故知局於泥甃者未測滄溟之浩汗篤於一時者寧信寒暑之推移藝文類聚內典部內典墓志由天之道觀惠施之能其一蚊一虻之勞者耶藝文類聚蟲豸部蚊蠻觸之戰爭似鰌魽之跳躍文苑英華盧思道􅊾一山中人不信有大魚大如木海上人不信有大木大如魚太平御覽鱗介部魚不通乎有無相包虛實相含猶瓜瓠之瓣不覩區蔓之有鄰也蟣蝨藏於裘褐不知都邑之多人也道德經指歸卷九夫鴻鵠髙飛終日馳騖而不知宇宙之外制法之人拘教之士纍年學問終身談論而不知道德之大也道德經指歸卷十二殉蠡管之察是病髙深執蟪菌之辰終欺嵗祀波羅蜜多經卷四百一譬若男子欲見遮迦越羅者未見遮迦越羅反見小王想其形容被服諦熟觀之便呼言是為遮迦越羅道行波羅蜜經卷四閻浮地利有王名曰鏡靣時敕使者令行我國界無眼人悉將來至殿下使者受敕即行將諸無眼人到殿下以白王王敕大臣悉將是人去示其象臣即將到象廏一一示之令持象有持足者尾者尾本者腹者脅者背者耳者頭者牙鼻者悉示已便將詣王所王悉問汝曹審見象不對言我悉見王言何類中有得足者言明王象如柱得尾者曰如掃帚得尾本者言如枝得腹者言如埵得脅者言如壁得背者言如髙岸得耳者言如大箕得頭者言如臼得牙者言如角得鼻者言如索便復於持前共諍訟象佛說義足經卷上昔有國王徵國中諸盲人令於象廏中觀象中有持象足者中有持象鼻者中有持象耳者中有持象尾者去後共相問象何等類持象足者言象大如柱持象鼻者言象如繩索持象耳者言象如簸箕持象尾者言象如大帚皆共諍之盲人各自信其意譬如人各見少所經不逹其法自謂大解亦如是三慧經籍八若子可謂見禮制之華而暗道德之實窺炬燭之明未覩天庭之日也𢎞明集牟子理惑論子出自井坂之淵未見江湖之望矣𢎞明集戎華論有方之識各期所見鱗介之物不達臯壤之事毛羽之族不識流浪之勢自得於窞井者則怪逰溟之量翻翥於數仭者則疑沖天之力𢎞明集孫綽喻道論或有三盲摸象得象耳者爭云象如簸箕得象鼻者爭云象如舂杵雖獲象一方終不得全象之實子說泥洹是死真摸象之一盲矣𢎞明集滅惑論夫食木之蟲尚不知皮外之味豈知宇宙之廣哉辨正論卷五亦由江南吳不信有千人帳河北漢不信有萬石船無得以蓬艾之小心測扶搖之逺運也辨正論卷七遇殊夫事苦則矜全之情薄生厚故安存之慮深登髙不懼者胥靡之人也坐不垂堂者千金之子也原其大略歸於所安而已矣後漢書馬融列傳餓夫庸𨽻抱關屠釣之倫一旦而都卿相之位建金石之號者或有懷顔孟之術抱伊管之略沒世而不齒者此言有事之世易為功無為之時難為名也晉書張載傳人之生譬如一樹花同發一枝俱開一蒂隨風而墮自有拂簾幌墜於茵席之上自有關籬牆落於溷糞之側梁書范縝傳道固既登龍門而孫蔚猶沈涓澮魏書孫惠蔚儒林傳若人之於色也無不知說美者而美者未必遇也故嫫母執乎黃帝黃帝曰屬女德而弗忘與女正而弗衰雖惡奚傷若人之於滋味無不說甘脆而甘脆未必受也文王嗜菖蒲俎孔子聞而服之縮頞而食之三年然後勝之吕氏春秋遇合且富人則車輿衣纂錦馬飾傅旄象帷幕茵席綺繡條組青黃相錯不可為象貧人則夏被褐帶索含菽飲水以充腸以支暑熱冬則羊裘解札短褐不掩形而煬竈口故其為編戶齊民無以異然貧富之相去也猶人君與僕虜不足以論之淮南子齊俗訓鈞之縞也一端以為冠一端以為􅙋冠則戴致之􅙋則蹍履之淮南子說林訓狂譎不受祿而誅段干木辭相而顯所行同也而利害異者時使然也淮南子人間訓俱行道德禍福不均竝為仁義利害不同晉文修文德徐偃行仁義文公以賞賜偃王以破滅魯人為父報仇安行不走追者捨之牛缺為盜所奪和意不恐盜還殺之文德與仁義同不走與不恐等然文公魯人得福偃王牛缺得禍者文公魯人幸而偃王牛缺不幸也王充論衡幸偶篇百金之家境外無絶交千乘之國同盟無廢贈財多故也使榖食如水火雖貪吝之人越境而布施矣故財少則正禮不能舉一有餘則妄施能於千家貧無斗筲之儲者難責以交施矣王充論衡定賢篇且逆旅之妾惡者以自惡為貴美者以自美得賤美惡之形在目而貴賤不同是非之情先著故美惡不能移也嵇中散集答難養生論昔韓昭侯醉卧而寒典官加之以衣覺而問之知典官有愛於己者以越職之故而加誅焉衛之驂乘見御者之非從後呼車有救危之意不䝉其罪加之以衣恐主之寒呼車憂君之危忠愛之情是同越職之愆亦等典官獲罪呼車見德遇不遇也劉子通塞春日麗天而隱者不照秋霜被地而蔽者不傷遇不遇也劉子遇不遇齊之華士棲志丘壑而太公誅之魏之干木遁世幽居而文侯敬之太公之賢非有減於文侯干木之德非有逾於華士而或榮或戮者遇不遇也劉子遇不遇崑山之下以玉抵鳥彭蠡之濱以魚食犬而人不愛者非性輕財所豐故也挈瓶􅀈水執􅍉求火而人不吝非性好施有餘故也劉子辨施懷璧之子未必能惠而人兢親者有惠人之資也被褐之士性能輕財而皆踈之者無惠人之資也劉子辨施結綬生纒牽彈冠去埃塵文選左太沖招隱詩鬱鬱澗底松離離山上苗以彼徑寸莖䕃此百尺條文選左思詠史詩我若西流水子為東峙嶽文選陸機贈弟士龍詩絲俱生於蠺銅都出於石作繒則賤作錦則貴鑄鈴則小鑄鐘則大意林士緯光武鳳翔於南陽燕雀化作鵷雛二漢之臣煥爛如三辰之附長天長平之卒磊落如秋草之中繁霜勢使然也意林物理論以舜禹之登庸孔氏之窮屈不似跛鱉之與晨驥乎太平御覽皇王部帝舜有虞氏市處者僕妾膾炙而食市饒也壅泉沃韭織履之氓從兄弟室父往而不得粗糒焉非愛其僕妾惡其室父也此其饒羡之與不足也太平御覽菜部韭家富棘族聚居貧兄弟離太平御覽人事部貧下如人渴乏巡逰曠野一得清涼美水一無所得受渴之苦得冷水者無人持與受渴乏者亦無遮障不許與水各以業因受苦樂報大乘顯識經推四不遇井被泄治則清潔可食九三處下卦之上異初六井泥之時得位而有應於上非射鮒之象但井以上出為用猶在下體未有成功功既未成井雖泄治未食也井泄而不見食猶人修己全潔而不見用使我心中惻愴周易正義井山有榛音秦隰有苓音零云誰之思西方美人詩國風簡兮柏舟言仁而不遇也毛詩柏舟山之有榛木隰之有苓草各得其所以興衛之有碩人而在賤職可謂處非其位乃榛苓之不如毛詩正義簡兮初纍棄彼虙妃兮更思瑶臺之逸女抨雄鴆以作媒兮何百離而曽不一耦前漢書揚雄傳上懿神龍之淵潛兮俟慶雲而將舉亡春風之被離兮孰焉知龍之所處前漢書揚雄傳上屈原以髙行仕楚亦猶資美女之髢賣於九戎而求其利必不得也前漢書揚雄傳注使駿馬馳騖於屈曲艱阻之中則與驢騾齊足前漢書揚雄傳注怪此寶鼎未受犧牛大羮之和久在煎熬臠割之間後漢書文苑􅍌傳抱玉乘龍驥不逢樂與和後漢書文苑􅍌傳良璞不剖必有泣血以相明者矣後漢書文苑列傳靈芝生河洲動搖因洪波蘭榮一何晚嚴霜瘁其柯哀哉二芳草不植太山阿後漢書文苑列傳騏驥馬不試婆娑槽櫪間壯士志未伸坎軻多辛酸魏志劉邵傳注當此之時若失水之魚喪家之狗行不勝衣言不出口晉書夏侯湛傳雖有惠音莫過韶濩雖有騰鱗終仆一壑晉書庾闡傳鳳棲五朞龍蟠六年英耀秃落羽儀摧殘晉書夏侯湛傳握隋珠與蕙若兮時莫悅而未遑晉書摯虞傳鉛陵策良駟造父為之悲不怨吳坂峻但恨伯樂稀宋書樂四志握瑜懷玉之士瞻鄭邦而知退章甫翠履之人望閩鄉而歎息梁書庾於陵弟肩吾傳既有惜於苽懸且自悲於井泄魏書李順希仁弟騫傳嗣宗窮途楊朱岐路征蓬長逰流水不歸周書王褒傳欲飛無假翼思鳴不值晨隋書孫萬夀文學傳凡遇合也時不合必待合而後行故比翼之鳥死乎木比目之魚死乎海吕氏春秋遇合一方病矣醫能治之而上弗肯使也賈子新書解縣應侯與賈午子坐聞其鼓琴之聲應侯曰今日之琴一何悲也賈午子曰夫張急調下故使之悲耳急張者良材也調下者官卑也取夫良材而卑官之安能無悲乎說苑尊賢由是觀之君子道狹耳誠不逢其明主狹道之中又將險危閉塞無可從出者說苑雜言皇陛九重絶不可登謂天蓋髙未見王公焦氏易林坤之師華薄實藁衣弊如絡女巧不成絲布為玉焦氏易林否之咸碩鼠四足不能上屋顔氏淑德未有爵祿焦氏易林困之需或曰隱道多端曰固也聖言聖行不逢其時聖人隱也賢言賢行不逢其時賢者隱也談言談行不逢其時談者隱也揚子淵騫篇天以薄蝕為疾地以崩溢為疾天子以幽厲為疾王侯以驕泰為疾士以貧蹇為疾大夫以酷佞為疾庶人以饑寒為疾今徵君之疾蹇也國不舉賢使士有蹇疾羇於道路軒冕者多豺狼之羣膏粱者多犬豕之輩由此觀之士安得而無疾也夫疾以薄蝕崩溢故天地以聖人為醫疾以幽厲驕泰故天子王侯以賢士為醫疾以貧蹇故士以夢北為醫疾以酷佞故大夫以明主為醫疾以饑寒故庶人以循吏為醫然則徴君之疾藥石有所不制鬼神有所不虐寒暑有所不侵徵于色而不見其槁動于聲而不見其戚歌于鼓琴而不見其樂歎于臨川而不見其憂此徵君之所以為疾也天祿閣外史問疾言我外有芬芳之德內有玉澤之質二美雜㑹兼在於已而不得施用故獨保明其身無有虧歇而已王逸注楚辭離騷經屈原以為神無形聲難事易失然人渴心盡禮則歆其祀而惠以福自傷履行忠誠以事於君不見信用而身放逐以危殆也王逸注楚辭九歌言已懷持美玉之德遭世暗惑不别美惡抱寶窮困而無所語也王逸注楚辭九章言騏驥不遇伯樂則無所程量其才力也以言賢臣不遇明君則無所施其智能也王逸注楚辭九章言孟夏四月純陽用事煦成萬物草木之類莫不莽莽盛茂自傷不䝉君惠而獨放棄不若草木也王逸注楚辭九章人夢登天無以渡猶欲事君而無其路也但有勞極心志終無輔佐王逸注楚辭九章言澤中香草茂盛覆被徑路人無采取者水卒增益斷沒其道將至棄捐也以言賢人久處山野君不事用亦將隕顛也王逸注楚辭招魂言已欲待明君之政清潔之化以感激風俗而君愈貪濁如氛霧之氣來之塺人也王逸注楚辭九歎言已竭忠信以事君而不見用猶抱此昭華寶璋衒賣之王逸注楚辭九思或伐薪於山輕小之木合能束之至於大木十圍以上引之不能動推之不能移則委之於山林收所束之小木而歸由斯以論知能之大者其猶十圍以上木也人力不能舉薦其猶薪者不能推引大木也王充論衡效力篇希鵬舉以摶天蹶青雲而奮羽企駟躍而改駕任中才之展御望前軏而致策顧後乘而安驅曹子建𤣥暢賦慶雲未時興雲龍潛作魚神鸞失其儔還從燕雀居曹子建言志思薦寶以繼佩怨和璞之始鐫思黃鍾以協律怨伶之不存嗟所圖之莫合帳藴結而延佇曹子建𤣥暢賦㫖酒盈尊莫與交歡瑟琴在御誰與鼓彈嵇中散集兄秀才公穆入軍贈詩雖有好音誰與清歌雖有姝顔誰與發華嵇中散集兄秀才公穆入軍贈詩夫圭璋居肆而不售矧乃翳於槃璞乎竒士扣角而見遏況乃潛於臯藪乎抱朴子外篇擢才操築而不值武丁抱竿而不遇西伯抱朴子外篇窮逹兵興之世武貴文寢俗人視儒士如僕虜見經誥如芥壤者何哉由於聲名背乎此也夫不用譬猶售章甫於夷越狥髯蛇於華夷矣抱朴子外篇審舉商風宵肅則絺扇廢登危陟峻則輕舟棄干戈雲擾則文儒退喪亂既平則武夫黜抱朴子外篇博喻世之烈士願為賞者授命猶瞽者之思視躄者之想行而目終不得開足不得伸徒自悲夫劉子知人士之居窮巷若鳥之在籠中也李善注文選左太沖詠史詩何邵詩曰亮無風雲㑹安能襲塵軌李善注文選王僧逹答顔延年詩言為瑕穢動增泥滓文選西征賦注衆滿堂而飲酒獨向隅而掩淚文選笙賦衆鳥皆有所登棲兮鳳獨遑遑而無所集文選宋玉九辨謂騏驥兮安歸謂鳳凰兮安棲變古易俗兮世衰今之相者兮舉肥文選宋玉九辨昔我資章甫聊以適諸越行行入幽荒甌駱從祝髮窮年非所用此貨將安設瓴甋夸璵璠魚目笑明月文選張協詩習習籠中鳥舉翮觸四隅落落窮巷士抱影守空廬文選左思詠史詩萬族各有託孤雲獨無依曖曖虛中滅何時見餘輝文選陶淵明詠貧士詩皎皎白素絲織為寒女衣寒女雖妙巧不得秉杼機文選郭泰機答傅咸詩簡珠墮沙石何能中自諧文選建章臺詩騏驥長鳴伯樂昭其能盧狗悲號韓國知其才是以效之齊楚之路以逞千里之任試之狡之捷以驗摶噬之用今臣志狗馬之微功竊自惟度終無伯樂韓國之舉是以於邑而竊自痛者也文選曹植求自試表昔之玉質金相英髦秀逹皆賓斥於當年韞竒才而莫用候草木以共雕與麋鹿而同死膏塗平原骨填川谷堙滅而無聞者豈可勝道哉文選劉孝標辨命論君山鴻漸鎩羽儀於髙雲敬通鳳起摧迅翮於風穴此豈才不足而行有遺哉文選劉孝標辨命論雄心摧於弱情壯圖終於哀志長算屈於短日逺跡頓於促路文選陸機弔魏武帝文雖懷瓊而握蘭徒芳潔而誰亮補文選陶潛盛士不遇賦伯牙之絶絃兮無鍾子期而聽之和抱璞而泣血兮安得良工而剖之廣文選東方曼倩哀命悲楚人之和氏兮獻寶玉以為石遇厲武之不察兮羌兩足以畢斫廣文選東方曼倩沈江直順常道關津難渡欲騁韓盧時無狡兔衆塗圯塞投足何錯廣文選王彥伯釋時論斥鷃擅蒿林仰笑神鳳飛坎井蝤蛭宅神龜安所歸廣文選嵇叔夜述志詩竭忠誠而事君兮反離羣而贅疣楚辭九章惜誦南國有佳人容華若桃李朝逰江北岸夕宿瀟湘沚時俗薄朱顔誰為發皓齒藝文類聚人部言志詩播芬煙而不燻張明鏡而不照藝文類聚人部哀傷賦如知庸聽局方悟大音賒藝文類聚人部懷舊詩擲五木子十擲輒鞬豈復是擲子之拙吾好擲政極此耳何氏語林言志不曝骨於龍門終低頭於馬坂文苑英華庾信志一賦日月雖臨照仄陋難明敡早榮羞日及晚知慚豫章文苑英華梁劉孝威天部三詩日出地上其明乃光至其入也明則傷矣故謂之明夷日之明傷猶聖人君子有明德而遭亂世抑在下位玉海周易鄭康成注喻林卷三十一
