body:
  text: 喻林卷五十八明徐元太撰人事門五十六無用眇能視不足以有明也跛能履不足以與行也易履折其右肱終不可用也易豐跂然三隅之形者彼織女也終一日歷七辰至夜而回反徒見其如是何曽有織乎言王之官司徒見列於朝耳何曽有用乎毛詩正義大東體無纖微疾安用問良醫魏志劉邵傳注身無錙銖之行能無鷹犬之用吳志賀邵傳蓋老牛不犧禮有常制晉書虞預傳豈可欲以殞海之鬐望鼓鰓於豎鱗之肆墜風之羽凱振翮於軒毳之間其不能俱陪淥水並負青天可無待於明見宋書周朗傳魏武帝陵下銅匜石犬各二古詩云石犬不可吠銅匜徒爾為述異記上洛中童謠曰雖有千黃金無如我斗粟斗粟自可飽千金何所直述異記下漢世古諺曰雖有神藥不如少年雖有珠玉不如金錢述異記下骨肉不任充鼎爼皮毛不足入貨財陳書徐陵傳惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠者不顧今子之言大而無用衆所同去也莊子逍遙遊朱泙漫學屠龍於支離益單千金之家三年技成而無所用其巧莊子􅍌禦寇輕重不合於斤兩長短不充於度數便為廢物何所施哉鬼谷子捭闔注夫馬似鹿者而題之千金然而有百金之馬而無一金之鹿者馬為人用而鹿不為人用也韓非子外儲説左郢人有買屋棟者求大三圍之木而人豫車轂跪而度之巨雖可而長不足淮南子説山訓舟能沉能浮愚者不加足騏驥驅之不進引之不止人君不以取道里淮南子説林訓毋貽肓者鏡毋豫躄者履毋賞越人章甫非其用也淮南子説林訓吾貧而子問以富術縱有其術是不可用之術也昔人有言能得長生者道士聞而欲學之比往言者死矣道士髙蹈而恨夫所欲學學不死也其人已死而猶恨之是不知所以為學也今子欲求殖貨而問術於我我且自貧安能教子以富乎子之此問有似道士之學不死者也孔叢子陳士義若疫嵗之巫徒能鼓口耳鹽鐵論救匱魯人身善織屨妻善織縞而徙於越或謂之曰子必窮魯人曰何也曰屨為履縞為冠也而越人徒跣翦髮遊不用之國欲無窮可得乎説苑反質敗軍之將不可言勇亡國之臣不可言智説苑談叢一臂六手不使堵口莫肯為用利棄我走焦氏易林同人之乾缺囊破筐空無黍粱焦氏易林頥之暌曰蹇六盲足痛難行終日至暮不離其鄰焦氏易林大過之艮老馬垂耳不見百里焦氏易林遁之賁脛足跛倚不可以行頓於丘傍焦氏易林暌之復蹇牛折角不能載粟焦氏易林艮之屯脛急股攣不可出門焦氏易林艮之同人天女踞床不成文章南箕無舌飯多砂粳焦氏易林小過之比朽條腐索不堪施用焦氏易林節之豫次八弓善反弓惡反善馬恨惡馬恨絶弸薄耕切破車終不偃測曰弓反馬恨終不可以也太玄經第六止作無益之能納無補之説以夏進爐以冬奏扇王充論衡逢遇篇折其右肱雖左肱在豈足用乎周易略例西南巨牛出自江岷體若垂雲肉盈千鈞雖有逸力難以揮輪山海經中山經圖讃道家之言髙則髙矣用之則弊遼落迂濶譬猶干將不可以縫線巨象不中使捕鼠金舟不能凌陽侯之波玉馬不任騁千里之迹也抱朴子外篇用形故不欲復舉熠耀以厠日月之間拊甂瓴於洪鍾之側貢輕扇於堅氷之節衒裘爐乎隆暑之月必見捐於無用速非時之巨嗤抱朴子外篇嘉遁麞有身而不能噬鹿有角而不能觸古今注明鏡所以照形而盲者以之蓋巵玉笄所以飾首而秃嫗以之挂杙非鏡笄之不美無用於彼也劉子隨時獨攄意乎宇宙之外鋭思於毫芒之內然而氣不賈於當已用不效於一世文選班固答賓戲齊有居士田仲者宋人屈轂往見之謂曰轂有瓠堅如石厚而無竅而效之先生田仲曰堅如石不可剖而斫厚而無竅不可以受水漿吾無用此瓠以為也屈轂曰然其棄物乎曰然今先生雖不恃人之食亦無益人之國矣猶可棄之瓠也文選張景陽陽命注顧此腹背羽愧彼排虛翮文選盧諶答魏子悌詩孫綽齋前種一株松髙世遠語孫曰松樹子非不楚楚可憐但永無棟梁用耳孫曰楓樹雖合抱亦何所施世説新語言語材曲兮枉撓朽木兮難抽藝文類聚刑法部刑法賦何用勝雕斫譬木良如朽藝文類聚禮部燕會詩玄黃之馬事絶於銜鑣蟠朽之林飾乖於丹漆何則千里之志已窮萬乘之器無取藝文類聚職官部司徒表文籍雖滿腹不如一囊錢事文類聚錢懼駑蹇無奔走之實朽薄非折衝之才文苑英華史祥太子書今先生收天下之術博觀四方之日久矣未能裨世上之治明君臣之義是則未有異於府庫之藏金玉筐篋之囊簡書也太平御覽珍寶部金下戈刀雖備於執事而無所揚其鋒太平御覽兵部戈尸子曰野鴨為鳬家鴨為鶩不能飛翔如庶人守耕稼而已埤雅品物門鶩譬如折軸無所復用海空智藏經持誡品譬如漿滓無所復用元陽妙經卷十譬然濕草煙氣上騰漸以消散至于滅盡大寶積經二十人之無聞老若特牛但長肌肥無有智慧法句經老耋品如車軸折輻輞破壞不任運載本緣經毗羅摩品又如養馬不乘則無所任大智度論卷下譬如最弊惡馬名為敗壞但有馬名無有馬用十住毗婆沙論卷四似若葶藶艾蒿枝葉皆苦訶梨果樹遍體無甘法苑珠林卷八十二干進初九壯于前趾往不勝為咎易夬在下而壯故曰壯于趾也居下而用剛壯以斯而進窮凶可苦也王弼注易大壯飛鳥遺其音聲哀以求處上愈無所適下則得安愈上則愈窮莫若飛鳥也王弼注易小過角者西南隅也上九處晉之極過明之中其猶日過於中已在於角而獨進之故曰進其角也周易正義晉丈夫生而願為之有室女子生而願為之有家父母之心人皆有之不待父母之命媒妁之言鑽穴隙相窺踰牆相從則父母國人皆賤之古之人未嘗不欲仕也又惡不由其道不由其道而往者與鑽穴隙之類也孟子滕文公下蘇代謂燕昭王曰孝如曽參孝己則不過養其親耳信如尾生髙則不過不欺人耳亷如鮑焦史鰌則不過不竊人之財耳今臣為進取者也臣以為亷不與身俱達義不與生俱立仁義者自完之道也非進取之術也戰國䇿燕昭王毛遂曰臣乃今日請處囊中耳使遂蚤得處囊中乃脫頴而出非特其末見而已史記平原君傳商鞅挾三術以鑽孝公李斯奮時務而要始皇彼皆躡風雲之會履顛沛之執據檄乘邪以來一日之冨貴朝為榮華夕而焦瘁福不盈眥禍溢於世前漢書敘傳上夫君子非不欲仕也耻夸毗以求舉非不欲室也惡登牆而摟處呌呼衒鬻縣旌自表非隋和之寶也暴智耀世因以干祿非仲尼之道也後漢書崔駰列傳叄輪可使自轉木雕猶能獨飛已垂翅而還故棲盍亦調其機而銛諸後漢書張衡列傳務進者趨前而不顧後榮貴者矜已而不待人後漢書朱暉孫穆傳上亂聖朝貫魚之序下違羣士凖平之倫晉書蔡謨傳忘狐鼠之顧步愧燕雀之徊翔梁書徐勉傳次二上無根思登于天谷在于淵測曰上無根不能自活也太玄經第一上次四即上不貞無根繁榮孚虛名測曰即上不貞妄升也太玄經第一上次五鋭其東忘其西見其背不見其心太玄經第二鋭次三髙其步之堂有露測曰髙步有露妄升也太玄經第五去以子之才上不臣于天子下不交于諸侯而猶偃仰當世是洗巢由之耳而負伊尹之鼎也天祿閣外史待樵于時懸爵而賣之猶􅍌肆也爭津者買之猶市人也有直者無分而徑進空拳者望途而收迹抱朴子外篇審舉夫佞者鼓珍賂為徑羽則無髙而不到矣乘朋黨為舟楫則無遠而不濟矣抱朴子外篇名實若乃徇萬金之貨以索百十之售抱朴子外篇任命汲汲於進趨悒悶於否滯者豈能舍至易速達之通塗而守甚難必窮之塞路乎抱朴子外篇朂學奚不泛輕舟以託迅御飛帆以逺之交瑰貨於朔南收金碧於九疑抱朴子外篇安貧固時俗之工巧兮偭規矩而改錯背繩墨以追曲兮競周容以為度文選屈原離騷經夫自衒自媒者士女之醜行也干時求進者道家之明忌也文選曹植求自試表萎葉愛榮條涸流好河廣文選謝瞻答靈運詩則有窮巷之賔繩樞之士冀宵燭之末光邀潤屋之微澤魚貫鳬躍颯沓鱗萃分鴈鶩之稻梁霑玉斚之餘瀝文選劉峻廣絶交論無足而至者物之藉也隨踵而立者人之薄也文選顔延之陶徴士誄隋珠彈雀堂溪刈葵鴛雛啄鼠何異乎䲻廣文選張子並誚青衣賦今足下琬琰之朴未剖而求光時之價騏驥之足未攄而希絶景之功心鋭而動淺望速而應遲藝文類聚人部别下書里語云仕官不止車生耳太平御覽人事部諺下改節初九舍爾靈龜觀我朵頥凶易頥是為馮婦也晉人有馮婦者善搏虎卒為善士則之野有衆逐虎虎負嵎莫之敢攖望見馮婦趨而迎之馮婦攘臂下車衆皆悅之其為士者笑之孟子盡心下子獨不見家人寡婦邪始自約敕之時意乃慕宋伯姬及陳孝婦不幸一為盜賊所汙遂行淫失知其非禮然不能自還吾猶此矣前漢書遊俠傳陵霜不雕者松柏也臨難不移者君子也何圗松柏雕於微霜而雞鳴己於風雨晉書呂先傳喢血斷金披心相付謂卿食椹懷音保之偕老豈意畜水覆舟養獸反害悔之噬臍將何所及晉書慕容垂傳豹姿未變鳯德已衰晉書愍懷太子傳以潔白為汚辱譬猶沐浴而抒溷薰燧而負彘淮南子説山訓次三唐素不貞亡彼瓏玲太玄經第四唐蘭芷變而不芳兮荃蕙化而為茅何昔日之芳草兮今直為此蕭艾也文選屈原離騷經言往昔芬芳之草今皆直為蕭艾而已以言往日明智之士今皆佯愚狂惑不顧也王逸注楚辭離騷經言蘭芷之草變易其體而不復香荃蕙化而為菅茅失其本性也以言君子更為小人忠信更為佞偽也王逸注楚辭離騷經以此獨立不達亦何苦何恨乎而便當伐本瓦合餔糟握泥􅰙足適履毁方入圓不亦劇乎抱朴子外篇刺驕遲重者蓬轉而波擾整肅者鹿踊而魚躍抱朴子外篇酒誡言甘以移植而易名恐人徙居而變節李善注文選潘安仁贈陸機詩何意百錬剛化為繞指柔文選劉琨重贈盧諶詩始素終玄墨翟垂涕文選顔延年和謝靈運詩注在南稱柑度北則橙文選潘嶽為賈謐作詩雖今之作者人自為量而首路同塵輟塗殊軌者多矣豈所以昭末景泛餘波文選顔延之陶徴士誄固時俗之流從兮又孰能無變化覽椒蘭其若兹兮又况揭車與江離楚辭離騷經余以蘭為可恃兮羌無實而容長委厥美以從俗兮茍得列乎衆芳楚辭離騷經譬如有人未離欲染遇見女寶在空林中形貌端嚴甚可愛樂雖具觀見種種身支而能制心不行放逸後於餘處遇見女人形貌麁醜鄙穢下賤返生貪愛遂行放逸波羅蜜多經五百九十一譬如梵志子淨潔自喜詣於舍後卒汚其指行詣金師指汚不淨以火燒之金師諌曰勿發是心有餘方便除此不淨灰土拭之以水洗之設吾火燒卿不能忍火之毒痛自觸其身更甚于前梵志子聞即懷瞋恚便罵金師莫以己心量度他人自不能忍謂人不堪金師聞知燒鉗正赤以鑷彼指年少得熱痛不能忍掣指著口金師大笑謂年少言何持不淨指含著口中年少報曰不遭痛時見指不淨適遇火毒即忘指穢修行道地經學地品竊位以瑞玉為佩佩之鞙鞙然居其官職非其才之所長也徒美其佩而無其德鄭氏箋詩大東四牡者人君所乘駕今但養大其領不肯為用喻大臣自恣王不能使也鄭氏箋詩節南山王政既偏其所用之人皆鞙鞙然佩其璲玉居其官職不以其才之所長徒美其佩而無其德也毛詩正義大東維天之有漢仰監視之亦有精氣之光是徒有光而無明今佩璲之人亦徒有名而無實也毛詩正義大東此夫為盜不操矛弧者也攻而不用弦刀者也欺父母未有罪而弒君未伐者也何以為髙賢才乎史記日者傳與懸黎而並肆將駿驥而同皂終朝擊缶匪黃鍾之所諧日暮却行何前人之能及隋書王貞文學傳若乃心利錐刀居台鼎之任智昏菽麥當機衡之重北史恩幸傳狇猴冠帶盜載非位衆犬共吠倉狂蹶足焦氏易林剝之隨次七格其珍類龜緺厲測曰格其珍類無以自匡也太玄經第二格次三龍襲非其穴光亡于室太玄經第六闕毛芥在鐵石間也一口之氣能吹毛芥非必焱風俗吏之易遷猶毛芥之易吹也王充論衡狀留篇竊人之物其得非不速疾也然而非其有得之非己之力也世人早得髙官非不有光榮也而尸祿素餐之謗喧譁甚矣王充論衡狀留篇官達者才未必當其位譽美者實未必副其名故鋸齒不能咀嚼箕舌不能别味壺耳不能理音屩鼻不能識氣釡目不能攄望舒之景牀足不能有尋常之逝抱朴子外篇博喻衝飊焚輪原火所以增熾也螢燭值之而反滅甘雨膏澤嘉生所以繁榮也而枯木得之以速朽朱輪華轂俊民之大寶也而負乘竊之而召禍鼎食萬鍾宣力之𢎞報也而近才受之以覆餗抱朴子外篇博喻拔茅之義圯而負乘之羣興亢龍髙墜泣血漣如抱朴子外篇名實鶉鷃棲翔鳯之條黿鼉遊升龍之川識真者所為憤結也李善注文選陸士衡吳王郎中詩皇聖昭天德豐澤振沈泥惜無雀雉化何用充海涯文選顔延之和謝靈運詩梟集瓊林鯨躍神淵廣文選郭景純晉元帝哀䇿文譽失語曰當君而歎堯舜之美譬猶人子對厥親而生譽他人之父晉書禮志下殺一人謂之不義必有一死罪矣若以此説往殺十人十重不義必有十死罪矣殺百人百重不義必有百死罪矣當此天下之君子皆知而非之謂之不義今至大為不義攻國則弗非從而譽之謂之義墨子非攻上今有一人入人園圃竊其桃李衆聞則非之上為政者得則罰之此何也以虧人自利也至攘人犬豕雞豚者其不義又甚入人園圃竊桃李是何故也以虧人愈多其不仁兹甚罪益厚至入人欄廄取人馬牛者其不仁義又甚攘人犬豕雞豚此何故也以其虧人愈多茍虧人愈多其不仁兹甚罪益厚至殺不辜人也杝其衣裘取戈劒者其不義又甚入人欄廄取人馬牛此何故也以其虧人愈多茍虧人愈多其不仁兹甚矣罪益厚當此天下之君皆知而非之謂之不義今至大為攻國則弗知非從而譽之謂之義此何謂知義與不義之别乎墨子非攻上巫馬子謂子墨子曰舍今之人而譽先王是譽稿骨也譬若匠人然智稿木也而不智生木墨子耕柱有譽人之力儉者舂至旦不中員呈猶謫之察之乃其母也故小人之譽人反為損淮南子説山訓九州多山而華岱為嶽四方多川而江河為瀆者華岱髙而江河大也長生人名姓周州郡髙大者同姓之伯賢舍而譽他族之孟未為得也王充論衡超竒篇俗好髙古而稱所聞前人之業菜果甘甜後人新造蜜酪辛苦王充論衡超竒篇舍其家而觀他人之室忽其父而稱異人之翁未為德也王充論衡佚文篇褒功失丘山之積頌德遺膏腴之美王充論衡佚文篇是得牛之服重不譽馬速也譽手毁足孰謂之慧矣王充論衡别通篇雖相引以名聲是相結以病患莊子音義外物魯有醜者其父出見美者商咄反而告其鄰曰商咄不如吾子也是至美不如至惡愛子不知其醜也意林吕氏春秋稱譽其德髙者凌青雲廣者踰地圻得無踰其本過其實乎𢎞明集牟子理惑論材害肥豕必烹甘泉必竭直木必伐汲冡周書周祝解木摧於秀蘭燒以薰晉書宣五王列傳象由齒斃膏用明煎北齊書文苑祖鴻勳傳凡國之亡也以其長者也人之自失也以其所長者也故善遊者死於梁池善射者死於中野管子樞言夫豐狐文豹棲於山林伏於巖穴靜也夜行晝居戒也雖飢渴隱約猶且胥疏於江湖之上而求食焉定也然且不免於罔羅機辟之患是何罪之有哉其皮為之災也今魯國獨非君之皮耶吾願君刳形去皮灑心去欲而遊於無人之野莊子山木東海有鳥焉名曰意怠其為鳥也翂翂翐翐而似無能引援而飛迫脅而棲進不敢為前退不敢為後食不敢先嘗必取其緒是故其行列不斥而外人卒不得害是以免於患直木先伐甘井先竭子其意者飾知以驚愚修身以明汚昭昭乎如揭日月而行故不免也莊子山木虎豹之文來田猿狙之便執斄之狗來藉莊子應帝王執貍之狗成思猿狙之便自山林來莊子天地山木自寇也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用也莊子人間世宋有荆氏者宜楸柏桑其拱把而上者求狙猴之􅍻者斬之三圍四圍求髙名之麗者斬之七圍八圍貴人富商之家求禪傍者斬之故未終其天年而中道之夭於斧斤此材之患也莊子人間世今有五錐此其銛銛者必先挫有五刀此其錯錯者必先靡是以甘井近竭招木近伐靈龜近灼神蛇近暴是故比干之殪其抗也孟賁之殺其勇也西施之沈其美也吳起之裂其事也故彼人者寡不使其所長故曰太盛難守也墨子親士不仁而有氣力果敢則狂而操利劒不智而辨慧懷給則棄驥而不式雖有材能其施之不當處之不宜適足以輔偽飾非伎藝之衆不如其寡也故有野心者不可借便勢有愚質者不可與利器淮南子主術訓虎豹之文來射猿狖之捷來乍淮南子説林訓蘭芝以芳未嘗見霜鼓造辟兵壽盡五月之望淮南子説林訓桓公九合諸矦一匡天下管仲之力管仲有力桓公能舉之可謂壯強矣吳不能用子胥楚不能用屈原二子力重兩主不能舉也舉物不勝委地而去可也時或恚怒斧斫破敗此則子胥屈原所取害也王充論衡效力篇小石附於山山力能得持之在沙丘之間小石輕微亦能自安至於大石沙土不履山不能持處危峭之際則必崩墜於坑谷之間矣大智之重遭小才之將無左右沙土之助雖在顯位將不能持則有大石崩墜之難也王充論衡效力篇灃水之鮮形如浮肺體兼三才以貨賈害厥用既多何以自衛山海經東山經圖讃蚌則舍珠獸胡不可狪狪如豚被褐懷禍患難無由招之自我山海經東山經圖讃兕推壯獸似牛青黑力無不傾自焚以革皮充武備角助文德山海經南山經圖讃利豐者害後質美者召災是以南禽殲於藻羽穴豹死於文皮鱣鯉積而玄淵涸麋鹿聚而繁林焚金玉崇而寇盜至名位髙而憂責集抱朴子外篇博喻林繁則匠入矣珠美則蚌裂矣石含金者焚鑠草任藥者剪掘刃利則先缺絃哀則速絶用以適已真人之寶也才合世求有伎之災也抱朴子外篇廣譬不在可用之數曰散木可用之木為文木物莫不若是者物皆以用自傷也郭子注莊人間世患害生於役知以奔競木伐井竭才之害也郭子注莊山木山抱玉則鑿之江懷珠則竭之豹佩文則剝之人含智則嫉之智能知人不能自知神能衛物不能自衛故神龜以智見灼靈蛇以神見曝孰知不智為智不神為神乎劉子言苑執留之狗謂有能故被留係成愁思也莊子音義天地珍寶之美羅􅍌布見煥焉如昆崘之所生者李善注文選西京賦井上四交之幹常為汲者所契傷也李善注文選枚叔上書諌吳王蒼鷹鷙而受緤鸚鵡惠而入籠文選鷦鷯賦雕鶡介其觜距鵠鷺軼於雲際鵾雞竄於幽險孔翠生乎遐裔彼晨鳧與歸鴈又矯翼而矰逝咸美羽而豐肌故無罪而皆斃徒銜蘆以避繳終為戮於此世文選鷦鷯賦夫形瑰者徴咎體壯者為犧雖明文而龍藻兮終俯首而受羇廣文選陸士龍逸民賦薰以芳而致燒兮膏含肥而見焫翠羽微而殃身兮蚌含珠而擘裂廣文選揚子雲太玄賦金雖重而見鑄桂徒芳而被折廣文選江文通傷友人賦薰以芬香而自燒兔亦取斃於毫翰藝文類聚人部言志賦狡兔得而獵犬死髙鳥得而強弩藏藝文類聚軍器部弩犀之為狀形兼牛豕力無不傾吻無不靡以賄嬰災因乎角椅藝文類聚獸部犀夫翠飾羽而體分象美牙而自喪蚌懷珠而致剖蘭含香而遭焚膏以明而遂煎桂以蠧而成疾太平御覽木部桂麝懷香以賈害狙伐巧而招射埤雅品物門麝墨子曰靈龜近灼神蛇近暴埤雅品物門螣蛇猶如蠶蟲出絲纒繞即自滅身大寶積經一百九亦如蠶作繭吐絲還自纒佛説身觀經當九喻林卷五十八
