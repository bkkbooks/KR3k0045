body:
  text: 喻林卷二十明徐元太撰人事門十八通塞凡物之不親由有間也物之不齊由有過也有間與過齧而合之所以通也王弼注易噬嗑夫以六合之大萬物之衆一體之所棲宅猶秋毫之在馬背也其所資因小許處耳而賢者順之以通不肖者逆之以塞彼之所乘其異塗轍哉後漢紀孝桓上三人比肩不能外出户一人相隨可以通天下淮南子説山訓數存則雖愚有所不失數亡則雖聖有所不得揚子法言註問神篇水之性清動壅以堤則波縚而氣腐決之使通循勢而行從澗而轉雖有朽骸爛胔不能汚也非水之性異通之與壅也人之通猶水之通也德如寒泉假有沙塵弗能汚也劉子通塞處穴大呼聲鬱數仞順風長叫響通百里入井望天不過圓蓋登峯眺目極於煙際向在井穴之時聲非卒嗄目非暴昧而聞見局者其勢壅也及其乘風蹈峯聲非孟賁目非離婁而響徹眺逺者其勢通也劉子通塞金為火所流海為寒所凝此是理開而常達也然則能流金而不能焚景能凝海而不能結風此理閉而所窮也李善注文選陸士衡演連珠夫華植之有零茂故隂陽之度也聖哲之有窮達亦命之故也藝文類聚雜文部賦賦其見也則如遊龍其濳也則如隱鳳藝文類聚人部隱逸上窟譬若人行路或平或荆棘修行道地經五隂成敗品順逆左隄彊則右隄傷左右俱彊則下方傷宜任水勢所之使人隨髙而處後漢書明帝紀古人稱榮華於順㫖枯槁於逆違晉書石苞傳君不見夫羊乎百羊而羣使五尺童子荷杖而隨之欲東而東欲西而西君且使堯牽一羊舜荷杖而隨之則亂之始也説苑政理至順則金石無堅迕逆則水氣無耎順全逆毁斯正理也郭子註莊天下七緯逆則天象變五性逆則人道敗變而不生菑敗而不傷行者未之有也劉子思順今使孟説引牛之尾尾斷臏裂不行十歩若環桑之條以貫其鼻縻以尋綯被髪童子騎而䇿之風於廣澤恣情所趣何者十步之行非逺於廣澤被髪之童非勇於孟説然而近不及逺强不如弱者逆之與順也劉子思順司馬蒯瞶天下之攻擊劍者也令提劒鋒而掉劒觚必刎其指而不能以䧟腐木而况金甲乎若提其觚而掉其鋒雖則凡夫可以陸斬犀象水截蛟龍矣順理而行若執劒觚逆情而動如執劒鋒欲無傷手其可得乎劉子思順今導泉向澗則為易下之流激波陵山必成難昇之勢水之無情猶知違逆趣順矧人心乎劉子思順舟循川則游速人順路則不迷意林唐子将猶立坂而走丸不可復反也玉皇本行集經順易同惡相求如市賈焉何難左傳昭公十三年所謂子應乎母以膠投漆雖欲勿合其可離乎春秋正義序樹恩布德易以周洽其猶順驚風而飛鴻毛也後漢書馮衍􅍌傳夫有桀紂之亂乃見湯武之功人久饑渴易為充飽後漢書馮異傳指麾則五嶽可傾呼噏則江湖可竭况履順討逆執正伐邪是烏獲摧氷賁育拉朽猛獸吞狐泰山壓卵因風燎原未足方也晉書孫惠傳傷弓之鳥落於虛發晉書苻洪傳豈不若因風振落頓坂走輪哉晉書慕容廆傳一舉乘風掃清氣穢晉書桓彞傳大風一振枯幹必摧凝霜暫落秋蔕自殞北齊書文襄帝紀因其所好以悦導之若下坂以走丸譬順流而決壅陳書後主紀以聽天下若背風而馳淮南子原道訓順風而呼者易為氣因時而行者易為力鹽鐡論論功循流而下易以至倍風而馳易以逺説苑譚叢長股喜走趨走千里焦氏易林比之蹇從風吹火牽麒驥尾易為之功因摧受福焦氏易林泰之履覆手齊犢易為功力焦氏易林解之大有始皇方斧将相方刀六國方木将相方肉激也揚子重黎篇居髙屋之上而幡瓴水言其向下之勢易也前漢書註髙帝紀仲長子昌言云乘此風順此流而下走誰復能為此限者哉李善註文選琴賦落葉俟微風以隕而風之力蓋寡孟嘗遭雍門而泣而琴之感以末何者欲隕之葉無所假烈風将墜之泣不足繁哀響也文選陸機豪士賦序若久塗炭則易政如渴不擇飲也意林孟子如人右手能作衆事波羅密多經卷三百五十一如癰已熟若遇醫師及以不遇悉得除愈菩薩善戒經卷三猶如平地駕四馬車善調御者執鞭持控使不失轍長阿含經卷十三譬如熟癰若無治者得小因縁而便自潰亦如熟果若無人取微風因縁便自墮落譬如新淨白㲲易為受色大智度論三十四譬如服苦藥以蜜下之則易大智度論卷八十七逆難諸侯既敗周室将亡今牂羊而責其大首終無是道也以興周衰而求其大興亦無此理也毛詩正義苕之鄒人與楚人戰則王以為孰勝曰楚人勝曰然則小固不可以敵大寡固不可以敵衆弱固不可以敵强海内之地方千里者九齊集有其一以一服八何以異於鄒敵楚哉孟子梁惠王上夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也前漢書溝洫志遣将不與兵符必先請而後動是猶絀韓盧而責之獲也前漢書王莽傳欲揺泰山而蕩北海事敗身危後漢書馮衍列傳所謂倒持干戈授人以柄功必不成秪為亂階後漢書何進列傳夫既朽不雕衰世難佐若欲輔難佐之朝雕朽敗之木是猶逆坂走丸迎風縱棹豈云易哉後漢書皇甫嵩列傳但墜崖之木事絶升躋覆盎之水理乖收汲宋書范曄傳夫彎弓射天未見能至揮戈擊地多力安施何則逆順之勢定殊禍福之驗易原也宋書沈攸之傳同舟渡海中流遇風救患若一所憂同也張羅而畋唱和不差者其利等也故體痛者口不能不呼心悦者顔不能不笑責疲者以舉千鈞責兀者以及走兎驅逸足於庭求猨㨗於檻斯逆理而求之猶倒裳而索領鄧析子無厚譬之出不由門行不從徑也以是求利不亦難乎列子説符使匠石以千歲之夀操鉤視規矩舉繩墨而正太山使賁育帶干将而齊萬民雖盡力於巧極盛於夀太山不正民不能齊韓非子大體利所禁禁所利雖神不行譽所罪毁所賞雖堯不治夫為門而不使入委利而不使進亂之所以産也韓非子外儲説左人莫能左畫方而右畫圓也以肉去蟻蟻愈多以魚驅蠅蠅愈至韓非子外儲説左使烏獲疾引牛尾尾絶力勯而牛不可行逆也使五尺豎子引其捲而牛恣所以之順也世之人主貴人無賢不肖莫不欲長生久視而日逆其生欲之何益吕氏春秋重已夫巢覆毁卵則鳳凰不至刳獸食胎則麒麟不來乾澤涸魚則龜龍不往故君雖尊以白為黑臣不能聽父雖親以黑為白子不能從吕氏春秋名類今夫地黄主屬骨而甘草主生肉之藥也以其屬骨責其生肉以其生肉論其屬骨是猶王孫綽之欲倍偏枯之藥而欲以生殊死之人亦可謂失論矣若夫以火能焦木也因使銷金則道行矣若以磁石之能連鐡也而求其引瓦則難矣淮南子覽冥訓禹決江疏河以為天下興利而不能使水西流稷辟土墾草以為百姓力農然不能使禾冬生豈其人事不至哉其勢不可也淮南子主術訓巧冶不能鑄木工匠不能斵金者形性然也淮南子説林訓入水而憎濡懐臭而求芳雖善者弗能為工淮南子説林訓畜利變幣欲以反本是猶以煎止燔以火止沸也鹽鐡論錯幣上山求魚入水捕兎市非其歸自令久畱焦氏易林履之賁探巢捕魚耕田捕鰌費日無功右手虛空焦氏易林坎之鼎灼火泉源釣魴山巔魚不可得火不肯燃焦氏易林革之艮築闕石顛立本泉源焦氏易林艮之復久鰥無偶思配織女求其非望自令寡處焦氏易林中孚之益次七勞牽不其鼻于尾弊測曰勞牽之弊其道逆也太𤣥經第六勤言龜所以能負山若舟船者以其在水中也使龜釋水而陵行則何能遷徙山乎王逸註楚辭天問夫班秋不能削瓦石為芒鍼歐冶不能鑄鉛錫為干将故不可為者雖鬼神不能為也不可成者雖天地不能成也抱朴子内篇論仙乃欲延蟪蛄之命令有歴紀之夀養朝菌使累晦朔之積吾子不亦謬乎抱朴子内篇論仙后稷雖善播植不能使禾稼冬生逆天時也禹善治水鑿山穴川不能廻水西流逆地勢也人雖才藝卓絶不能悖理成行逆人道也劉子思順何異處穴而望聲徹入井而欲睇博哉劉子通塞百川東到海何時復西歸文選顔延之長歌行此由禽鹿少見馴育則服從教制長而見羈則狂顧頓纓赴蹈湯火雖飾以金鑣饗以嘉肴逾思長林而志在豐草也文選嵇康絶交書何異執朽轡以御逸駟承勁風以握秋蓬廣文選曹輔佐對儒此則起髙於川汙為深於邱山也藝文類聚帝王部漢髙帝反鑒取照匹此何難倒裳求領方之為易藝文類聚職官部尚書令表秋蠶不成冬種不生太平御覽資産部蠶魯連子曰古善漁者宿沙瞿子使漁于山則雖十宿沙子不得一魚焉又曰宿沙瞿子善煑鹽使煑漬沙雖十宿沙不能得也困學紀聞卷十諸子沒水捕雉兎登山索魚龍植麥欲穫黍運規以求方竭力勞精神終年無見功叅同契箋註下篇所謂逆四時者春得肺脉夏得腎脉秋得心脉冬得脾脉其至皆懸絶沈濇者命曰逆四時黄帝素問内經玉機真蔵論譬如畫空作莊嚴具是難思議金灮明㝡勝王經卷二有人墮海中有人教食水盡可得步出人言我已飲後水復來世俗如是前後相趣不可極三慧經藉八如以網盛風是事為甚難本緣經毗羅摩品譬如鑽水求酥是實難得本緣經月灮王品夫至神不過天地不能使蟄蟲夏逝震雷冬發辯正論卷二易成婉兮孌叶龍眷反兮總角丱音慣叶古縣反兮未幾上聲見兮突而弁兮詩國風甫田雨雪之盛瀌瀌然至日将出其氣始見人則皆稱曰雪今消釋矣喻小人雖多王若欲興善政則天下聞之莫不曰小人今誅滅矣鄭氏箋詩角弓有童子婉然而少孌然而好兮總聚其髪以為兩角丱然兮幼稚如此與别未經幾時而更見之突然已加冠弁為成人兮言童子少自修飾未幾時而即得成人以喻人君能善身修德未幾時而可以立功毛詩正義甫田挾泰山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也故王之不王非挾泰山以超北海之類也王之不王是折枝之類也孟子梁惠王上以齊王猶反手也孟子公孫丑上擢假海内若覆手背吳越春秋句踐入臣外傳夫差失道越亦賢矣濕易雨饑易助越集外傳本事夫蜀西僻之國也而戎狄之長也而有桀紂之亂以秦攻之譬如使豺狼逐羣羊也戰國䇿秦惠文君以秦卒之勇車騎之多以當諸侯譬若施韓盧而逐駑兔也戰國䇿秦昭襄王夫齊罷國也以天下擊之譬猶以千鈞之弩潰癰也戰國䇿秦昭襄王夫秦卒之與山東之卒也猶孟賁之與怯夫也以重力相壓猶烏獲之與嬰兒也夫戰孟賁烏獲之士以攻不服之弱國無以異於墮千鈞之重集於鳥卵之上必無幸矣戰國䇿韓襄王地勢便利其以下兵於諸侯譬猶居髙屋之上建瓴水也史記髙祖紀秦師至鄢郢舉若振槁史記禮書以秦之彊大王之賢由竈上騷除史記李斯傳夫以鴻毛燎於罏炭之上必無事矣史記荆軻傳寒之於衣不待輕煖饑之於食不待甘㫖前漢書食貨志夫舉吳兵以訾於漢譬猶蠅蚋之附羣牛腐肉之齒利劍鋒接必無事矣前漢書枚乘傳今以中國之盛萬倍之資遣百分之一以攻匈奴譬猶以彊弩射且潰之癰也必不畱行矣前漢書韓安國傳執大斧伐枯木流大水滅發火前漢書王莽傳以新室之威而吞胡虜無異口中蚤蝨前漢書王莽傳以膠固之衆當解合之埶猶以烈風掃彼枯葉後漢書鄭太列傳發突騎以轔烏合之衆如催枯折腐耳後漢書耿弇列傳范滂清裁猶以利刃齒腐朽後漢黨錮􅍌傳今将軍總皇威握兵要龍驤虎步髙下在心此猶鼓洪罏燎毛髪耳後漢書何進􅍌傳功易於泰山破雞子輕於駟馬載鴻毛後漢書廣陵思王荆傳雷震虎步竝集虜廷若舉炎火以焚飛蓬覆滄海而注熛炭有何不消滅者哉後漢書袁紹列傳攻堅易於折枯摧敵甚於湯雪後漢紀孝靈中夫以秦楚之彊而報弱薛猶磨蕭斧而伐朝菌也蜀志郤正傳註以明公之威應困窮之敵擊疲弊之㓂無異迅風之振秋葉矣魏志辛毗傳擾天下如驅羣羊舉二都如拾遺芥晉書孝愍帝紀以大将軍英秀諸将勇鋭以攻小城何異洪罏燎羽毛晉書苻堅上傳今有勁卒百萬文武如林鼓行而摧遺晉若商風之隕秋葉晉書苻堅下傳以司馬模之彊吾取之如拉朽索綝小竪豈能汚吾馬蹄刀刃邪晉書劉聰傳以萬乘之師掃一隅之㓂傾山碎卵方之非易晉書慕容德記譬如聲發響應形動影隨未足比其易也晉書慕容德記傾海注螢頹山壓卵宋書二凶元凶劭傳譬猶崩泰山而壓蟻壤決懸河而注熛燼豈有不殄滅者哉梁書武帝上紀懸河注火奚有不滅梁書武帝上紀雖復朽株将㧞非待尋斧落葉就殞無勞烈風陳書周廸傳豈異厲蕭斧而伐朝菌鼔洪罏而燎毛髪雖愚者知其不旋踵矣魏書路恃慶弟思令傳窮鄉下里其為叢祠也不過於巵酒而臠肉蕪國之社不難於請福子華子晏子問黨得其情則鴻遇長風魚縱大壑沛然莫之能禦故能制行其術也鬼谷子内揵註夫寒者利䄈褐而饑者甘糟糠天下囂囂新主之資也此言勞民之易為仁也賈子新書過秦上於是秦人拱手而取西河之外賈子過秦上戰於鴻門曾無藩籬之難賈子過秦下然劉氏奪之若轉閉錘淮南子道應訓傾者易覆也倚者易軵也幾易助也濕易雨也淮南子説林訓以漢之彊攻於匈奴之衆若以强弩潰癰疽鹽鐡論伐功萬物得其本者生百事得其道者成説苑談叢然後洗甲于二川流凱于三峽倒戈于棧道功孰踰焉漢室之安可倚牖而待也天禄閣外史招賢順傾轉圜不足以喻其便逡廵放屣不足以况其易蔡中郎集釋誨衛君之賢為王術若烏獲之力以舉一斤吕氏春秋務大觧夫其蕩滌凶穢剿除醜類若順迅風而縱烈火曬白日而掃朝雲也曹子建漢二祖優劣論以王之雄武吞倂巴蜀如鴟銜腐鼠耳王子年拾遺記魏任成王夫危葉畏風驚禽易落無待干戈聊用辭辯文選王融䇿秀才文若駭鯨之決細網奔兕之觸魯縞未足以喻其易文選陳琳為曹洪作書一匱初登東嶽之功可監埏埴在器瑚璉之姿先表廣文選任彦升齊司空曲江公行状芟夷斬伐如草木焉藝文類聚人部哀傷賦以此衆戰其猶烈火之燔秋蓬衝飊之掃落葉也藝文類聚雜文部檄譬猶廻太陽以消湛露運滄海以灌燎火其功易成其事易立藝文類聚封爵部外戚封表威風所振烈火之遇鴻毛旗鼔所臨衝風之卷秋葉文苑英華庾信賀㨗一表彫殘殺翮無所假於風飊零落春枯不足煩於霜露文苑英華庾信雜銘銘余欲令要道必行桴鼓相應由拔刺雪汙黄帝素問内經至真要大論篇十二瘧者其發各不同時察其病形以知其何脈之病也先其發時如食頃而刺之一刺則衰二刺則知三刺則已黄帝素問内經刺㿖論如捉長毛之羊隨意東西而無疑難増壹阿含經卷二十猶若素質易為受染長阿含經卷一亦如被鍊剛巧匠解木理鴦崫髻經緣六譬如大象拔于小草無明羅刹經覩日月之明何假離朱之察聞雷霆之音奚事子野之聽𢎞明集折夷夏論譬如日月懸天無假離朱之目鳴鐘在耳不勞子期之聽𢎞明集十難成顔率謂齊王曰夫鼎者非效壺醯醤瓿耳可懷挾提挈以至齊者非效鳥集烏飛兔興馬逝灕然止於齊者昔周之代殷得九鼎凡一鼎而九萬人輓之九九八十一萬人士卒師徒械器被具所以備者稱此今大王縱有其人何涂之從而出戰國䇿周惠公夫以區區之濟北而與諸侯爭彊是以羔犢之弱而扞虎狼之敵也前漢書鄒陽傳諺言作舍道邊三年不成㑹禮之家名為聚訟後漢書曹褒傳以若所為求若所致猶縁木求魚煎水作氷其不可得明矣魏志髙堂隆傳矜功者不立虚願者不至子華子北宫子仕其於治天下也猶涉海鑿河而使蚉負山也莊子應帝王稻生於水而不能生於湍瀨之流紫芝生於山而不能生於盤石之上磁石能引鐵及其於銅則不行也淮南子説山訓憑河豋山道路阻難焦氏易林坤之升冬採薇蘭地凍堅難焦氏易林屯之大壮負牛上山力少行難烈風雨雪遮遏我前焦氏易林訟之剥欲上南阪軸方不轉還車復反焦氏易林咸之大畜縮緒亂絲手與為災焦氏易林遮之泰烹魚失刀駕車馬亡焦氏易林无妄之艮足􅡮地而為迹暴行而為影此易而難解云履地跡自成行日中影自生是其易使跡正影直是其難也淮南子解説山進趨猶有不達者焉稼穡猶有不收者焉商販或有不利者焉用兵或有無功者焉况乎求仙事之難者為之者何必皆成哉抱朴子内篇論仙冀西伯之方畋俟黄河之将清抱朴子外篇安貧雖搜琬琰於培塿之上索鸞鳳于鷦鷯之巢未為難也吾亦豈敢謂藍田之陽丹穴之中為無此物哉亦直言其稀已矣抱朴子外篇交際蕩蕩乎若昇天路而不知夫所登也李善註文選謝靈運入華子岡詩雖由禦者之無方将非其才亦豈不以宼發心腹害起肘腋疢篤難療瘡大遲愈之故哉廣文選江應元徙戎論舟未濟而河廣途方遥而馬疲藝文類聚人部行旅詩物無隂陽違天背元牝雞自卵其雛不全叅同契譬如有人無有手足及呪術力擔須彌山或欲履水或持浮木度於大海此為難不念佛三昧經卷三恒河駛流水可生白蓮華黄鳥作白形黑烏變為赤假使瞻部樹可生多羅果朅樹羅枝中能出菴羅葉斯等希有物或容可轉變世尊之舍利畢竟不可得假使用龜毛織成上妙服寒時可披著方求佛舍利假使蚊蚋足可使成樓觀堅固不揺動方求佛舍利假使水蛭蟲口中生白齒長大利如鋒方求佛舍利假使持兎角用成於梯隥可昇上天宫方求佛舍利鼠縁此梯上除去阿蘇羅能障空中月方求佛舍利若蠅飲酒醉周行村邑中廣造於舍宅方求佛舍利若使驢脣色赤如頻婆果善作於歌舞方求佛舍利烏與鵂鶹鳥同共一處遊彼此相順從方求佛舍利假使波羅葉可成於傘蓋能遮於大雨方求佛舍利假使大船舶盛滿諸財寳能令陸地行方求佛舍利假使鷦鷯鳥以觜銜香山隨處任遊行方求佛舍利金充明冣勝王經卷一是故當知菩薩心者第一難得如優曇華時時一現是珍寳心以無價故華手經卷二破一毛百分射一分之毛箭箭悉中此則為難雜阿舍經卷十五如海難渡如地難平大乘經上此媱怒癡不可輕滅譬如以糠火欲消銅鐡終不能也脩行道地經慈品譬如有人而取一髪破為百分還續如故令不荖錯是事甚難不乎脩行道地經勸意品猶如羸人步渉髙山本緣經毗羅摩品譬如大海水欲盡其涯底大智度論卷一道塞小畜亨密雲不雨自我西郊易小畜初六井泥不食舊井旡禽易井六二艮其腓不拯其隨其心不快易艮坎坎伐檀兮寘之河之干兮河水清且漣音連猗音醫坎坎伐輻兮寘之河之側兮河水清且直漪坎坎伐輪兮寘之河之漘音唇兮河水清且淪漪詩國風伐檀鼔鐘于宫聲聞音問于外念子懆懆音慥視我邁邁詩小雅白華川水當盈而以竭盡且又被夭塞不得整流似法當嚴整而以破壊被人違逆不得施行春秋正義宣公十二年歎鳳遽衰泣麟何促史記孔子世家贊塗回道塞求事不得焦氏易林坤之艮桑葉螟蠧衣敝如絡女工不成絲布為玉焦氏易林需之蠱簞瓶空虛饑無所食焦氏易林剥之睽江隂水側舟楫破乏狐不得南豹無以北焦氏易林恒之蠱西賈巴蜀寒雪至轂欲前不得反復其室焦氏易林家人之解草適為主道路塞壅焦氏易林井之姤衣空履穿无以禦寒細小貧屢不能自好焦氏易林萃之家人次八臼無杵其碓舉天隂不雨白日毁暑測曰臼無杵其守貧也太𤣥經第五字上九唫欽不雨孚乾脯測曰唫不雨何可望也太𤣥經第五唫唫閉塞之意夫山崩壅河猶人之有癰腫血脉不通也王充論衡感虛篇氣結閼積聚為癰潰為疽創流血出膿豈癰疽所發身之善穴哉營衛之行遇不通也王充論衡幸偶篇屈原放至逺方之外博求衆賢人索宓妃則不肯見求簡狄又後髙辛幸若少康留止有虞而得二妃以成顯功王逸注楚辭離騷經言已懐德不用若工握剞劂而無所刻鏤持方圜而無所錯也王逸註楚辭哀時命為鳳凰作棲以鶉鴳之籠雖翕其翅翼猶不能容其形體以言賢者遭世亂雖屈其身亦不能自容入王逸註楚辭哀時命執握金玉委之汚瀆遭世溷濁莫之能識王逸註楚辭九懐言已登髙大之陵周而四望觀香芷之圃歴歴而有行列傷人不采而佩帶言已亦修德行義動有節度而不見進用也王逸註楚辭九歎言𤣥蝯㨗敏失於髙深之林則獨偏逐放棄忘其能也以言賢人棄在山澤亦失其志也王逸註楚辭九歎然不能凌扶揺以髙竦揚清耀於九𤣥器不陳於瑚簋之末體不免於負薪之勞抱朴子外篇任命蒙季陵于仲石瘞于泉兟音萃進也靡適音衣退也靡旋傳曰季陵于仲弟在兄上也石瘞于泉山在水下也兟靡適進而礙山也靡旋退而阻險也元包仲隂蹐地無歸瞻烏靡託文選陸陲石闕銘騁驊騮於狹路兮顧蹇驢而弗及資章甫以遊越兮見犀灮而先入被文繡而賈戎兮識旃裘之必襲廣文選阮嗣宗東平賦是以籠樊之鶴寜有六翮之期骯髒一作航上之馬無復千金之價文苑英華庾信連珠悲夫章甫之委祼俗韶夏之棄鄙俚至真絶於漫習大道廢於曲士也𢎞明集孫綽喻道論喻林卷二十
