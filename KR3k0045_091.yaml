body:
  text: 喻林卷九十一明徐元太撰學業門從師凡不識者求問識者識者不求所告暗者求明明者不咨於暗周易略例卦略墓道之門幽閒由希覩人行之跡故有此棘此棘既生必得斧乃可以開析而去之以興陳他之身不明由希覩良師之教故有此惡此惡既成必得明師乃可以訓道而善之毛詩正義墓門泰山其頽則吾將安仰梁木其壞哲人其萎則吾將安放禮記檀弓上善歌者使人繼其聲善教者使人繼其志禮記學記善問者如攻堅木先其易者後其節目及其久也相說以解禮記學記善待問者如撞鐘叩之以小者則小鳴叩之以大者則大鳴待其從容然後盡其聲禮記學記鼓無當於五聲五聲弗得不和水無當於五色五色弗得不章學無當於五官五官弗得不治師無當於五服五服弗得不親禮記學記吾聞出於幽谷遷於喬木者未聞下喬木而入於幽谷者孟子滕文公上青采出於藍而質青於藍者教使然也史記三王世家蓋聞經師易遇人師難遭故欲以素絲之質附近朱藍耳後漢紀孝靈上日月不宇宙四指必迷所鄉矣仲尼人之凖繩也子華子虎㑹問善弓者師弓不師羿善舟者師舟不師奡善心者師心不師聖關尹子五鑑良醫之門多病人櫽栝之側多枉木是以雜也荀子法行水深則回樹落糞本弟子通利則思師荀子致仕一閧之市不勝異意一卷之書不勝異說一鬨之市必立之平一卷之書必立之師揚子學行螟􅘾之子殪而逢蜾羸祝之曰類我類我久則肖之矣速哉七十子之肖仲尼也揚子學行師者人之模範也模不模範不範為不少矣揚子學行呱呱之子各識其親譊譊之學各習其師精而精之是在其中矣揚子寡見學者不逺千里嬴糧而至如細流之赴巨海京師謂康成為經神何休為學海王子年拾遺記後漢天地生我而不能鞠我父母鞠我而不能成我成我者夫子也道不啻天地父母通於夫子受罔極之恩文中子王道諸先生者當如醒學者譬如醉言生俱醉獨有醒者意林風俗通學不倦所以治已也教不倦所以治人也夫繭舍而不治則腐蠧使工女繅之為美錦大君朝而服之身者繭也舍而不治則知行腐蠧使賢者教子以為世士則天下諸侯莫敢不敬太平御覽學部教學本師者發蒙之基也后師者稱成也譬如嚴莊服飾衆事已辦未惟加冠不可以行人事也太平御覽道部道學之有師亦如樹之有根也大智既成復能成就小智猶樹根生子子復能生根展轉相生種類不絶太平御覽道部道本師者學之根也譬如為山一簣之土漸得髙大太平御覽道部道冰實因水金亦在鎔初學記禮部釋奠注譬如採寶無有導師子無識者無上內祕藏經惠譯品不拔諸邪箭不滅三毒火不除無明暗墮在大愛海無有智慧眼離大導師故大方廣佛華嚴經卷二十五應發如給侍心所有教令皆隨順故應發如弟子心所有訓誨無違逆故應發如僮僕心不厭一切諸作務故應發如養母心受諸勤苦不告勞故應發如傭作心隨所受教無違逆故應發如除糞人心離憍慢故應發如已熟稼心能低下故應發如良犬心不害主故大方廣佛華嚴經卷七十七又如依日大光明故得見髙下及諸色像種種作業不以依彼油燈小光大集月藏經卷三猶如暗室若遇明燈暗即滅矣金剛三昧經卷下如彼翳眼是可治病未遇良醫其目常瞑既遇良醫疾得見色大法鼓經卷下譬如乳牛不粗狂騷又多乳汁彼犢飲時久而不厭雜阿含經卷三十五佛如明月弟子如明星與月相隨佛般泥洹經卷上譬如踞牀有木無繩不能得坐子無明師亦不得道佛說梵志阿颰經譬如師子衆獸中王人中師所語當用法行步坐起當有威儀為人法則舊雜譬喻經於暗常照明尊為慧燈炷一百五十讚佛頌藉九人身難得善師難遇禪要呵欲經如導師在前餘伴隨逐進止取捨皆隨導師不得自在大智度論卷八十二師之為功在於發悟譬猶荆璞而瑩拂之耳若質非美玉琢磨何益𢎞明集十二取友六三三人行則損一人一人行則得其友象曰一人行三則疑也易損麗澤兑君子以朋友講習易兑伐木丁丁音爭鳥鳴嚶嚶音鶯出自幽谷遷于喬木嚶其鳴矣求其友聲詩小雅伐木谷風刺幽王也天下俗薄朋友道絶焉毛詩谷風伐木燕朋友故舊也自天子至於庶人未有不須友以成者毛詩伐木嚶嚶兩鳥聲也其鳴之志似於有友道然鄭氏箋詩伐木鳥尚知居髙木呼其友況是人乎鄭氏箋詩伐木習習然和調者生長之谷風也谷風由善能生長之故維山崔嵬之上草木皆能生長之以興良朋由善能切磋之故其友身之道德亦能成就之毛詩正義谷風與君子游苾乎如入蘭芷之室久而不聞則與之化矣與小人游貸乎如入鮑魚之次久而不聞則與之化矣是故君子慎其所去就與君子游如長日加益而不自知也與小人游如履薄冰每履而下幾何而不陷乎哉吾不見好學盛而不衰者矣吾不見好教如食疾子矣吾不見日省而月考之其友者矣大戴禮記曾子疾病工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者論語衛靈公工以利器為用人以賢友為助何晏解論衛靈公孔子曰吾死之後則商也日益賜也日損曾子曰何謂也子曰商也好與賢已者處賜也好悅不若已者處不知其子視其父不知其人視其友不知其君視其所使不知其地視其草木丹之所藏者赤漆之所藏者黑是以君子必慎其所與處者焉孔子家語六本然子之志則廣取而泛與者也吾恐女之後夫擇者也其將有剽女之外郛而自築其宫庭者矣登女之車而乘之以馳騁於四郊者矣取女之所以為璧者毁裂而五分之者矣子華子神氣鑑明則塵垢不止止則不明也久與賢人處則無過莊子德充符南方有鳥焉名曰蒙鳩以羽為巢而編之以髮繫之葦苕風至苕折卵破子死巢非不完也所繫者然也西方有木焉名曰射干莖長四寸生於髙山之上而臨百仞之淵木莖非能長也所立者然也蓬生麻中不扶而直蘭槐之根是為芷其漸之滫君子不近庶人不服其質非不美也所漸者然也故君子居必擇鄉遊必就士所以防邪僻而近中正也荀子勸學假輿馬者非利足也而致千里假舟楫者非能水也而絶江河君子生非異也善假於物也荀子勸學君人者不可以不慎取臣匹夫者不可以不慎取友友者所以相有也荀子大略篇取友求善人不可不慎是德之基也詩曰無將大車維塵冥冥言無與小人處也荀子大略篇夫人君無諫臣則失政士無教友則失德狂馬不釋其策操弓不返於檠木受繩則直人受諫則聖受學重問孰不順成毁仁惡士且近於刑君子不可以不學說苑建本君子擇人與交農人擇田而田君子樹人農夫樹田田者擇種而種之豐年必得粟士擇人而樹之豐時必得祿矣說苑雜言頻頻之黨甚於􅢟斯亦賊夫糧食而已矣掦子學行故君子不友不如已者非羞彼而大我也不如已者須已而植者也然則扶人不暇將誰相我哉吾之僨也亦無日矣徐幹中論貴驗明鏡舉則傾冠見矣羲和照則曲影覺矣櫽括修則枉刺之疾消矣良友結則輔仁之道𢎞矣抱朴子外篇交際是以與善人居如入芝蘭之室久而自芳也與惡人居如入鮑魚之肆久而自臭也墨翟悲於染絲是之謂矣顔氏家訓慕賢夫交之道猶素之白也染之以朱則赤染之以藍則青藝文類聚人部交友與善人遊如行霧中雖不濡濕潛自有潤太平御覽天部霧譬之於物猶素之白也染之以藍則青遊居交友亦人之所染也太平御覽人事部敘交友欲除身心之病者莫若善友良醫妙藥能除重病元陽妙經卷七譬如鳥麻占蔔華熏其油香美名占蔔油與凡麻油好惡殊隔油先無香以華熏種油遂成香香不破麻而入亦不破麻而出復無形質留止油內但以因緣力故香遷油內油成香澤大乘顯識經推三有一坐禪比丘獨住林中常患蟣蝨即便芙蝨而作約言我若坐禪汝宜默然隱身寂住其蝨如法於後一時有一土蚤來至蝨邊問言汝云何身體肌肉肥盛蝨言我所依主人常修禪定教我飲食時節我如法飲食故所以身體鮮肥蚤言我亦欲修習其法蝨言能爾隨意爾時比丘尋便坐禪土蚤聞血肉香即便食噉比邱心生苦惱即便脫衣以火燒之大方便佛報恩經卷四如盲欲御盲不能致所趣修行道地經慈品良田生勝果善友能饒益一百五十讚佛頌籍九冰開春日蘭敗秋年慧人成哲愚友增纒法苑珠林卷五十一無知無善識惡友損正行蜘蛛落乳中是乳轉成毒法苑珠林卷五十一端習山下出泉蒙君子以果行育德易蒙墓道之門有此梅樹此梅善惡自有本未必惡徒有梟鳥來集於其上而鳴此梟聲惡梅亦從而惡矣以興陳他之身有此體性此性善惡自然本未必惡正由有惡師來教之此師既惡陳他亦從而惡也毛詩正義墓門良冶之子必學為裘良弓之子必學為箕始駕馬者反之車在馬前禮記學記士依於德游於藝工依於法游於說禮記少儀子服堯之服誦堯之言行堯之行是堯而已矣子服桀之服誦桀之言行桀之行是桀而已矣孟子告子下蓬生麻中不扶自直白沙在泥中與之皆黑者土地教化使之然也史記三王世家傳曰蘭根與白芷漸之滫中君子不近庶人不服者所以漸然也史記三王世家夫習與正人居之不能毋正猶生長於齊不能不齊言也習與不正人居之不能毋不正猶生長於楚之地不能不楚言也故擇其所耆必先受業乃得嘗之擇其所樂必先有習乃得為之前漢書賈誼傳傳曰譬如堯舜禹稷卨與之為善則行鮌歡兜欲與為惡則誅可與為善不可與為惡是謂上智桀紂龍逢比干欲與之為善則誅干莘崇矦與之為惡則行可與為惡不可與為善是謂下愚齊桓公管仲相之則霸豎貂輔之則亂可與為善可與為惡是謂中人前漢書古今人表傳曰素絲無常唯所染之信矣哉蜀志後主傳詩曰皎皎練絲在所染之後漢書揚終列傳曾子將行晏子送之曰贈人以軒不若以言吾請以言之以軒乎曾子曰請以言晏子曰今夫車輪山之直木也良工揉之其圓中規雖有槁暴不復嬴矣故君子慎隱揉和氏之璧井里之困也良工修之則為存國之寶故君子慎所修今夫蘭本三年而成湛之苦酒則君子不近庶人不佩湛之縻醢而賈匹馬矣非蘭本美也所蕩然也願子之必求所湛嬰聞之君子居必擇居游必就士擇居所以求士求士所以辟患也嬰聞汨常移質習俗移性不可不慎也晏子春秋雜上學者相與薰沐其中扃而亦唯此之事子華子北宫子仕耕夫習牛則獷獵夫習虎則勇漁夫習水則沈戰夫習馬則健關尹子六七嬰兒生無石師而能言與能言者處也莊子外物蘭茝槀本漸於蜜醴一佩易之正君漸於香酒可讒而得也君子之所漸不可不慎也荀子大略譬之越人安越楚人安楚君子安雅是非知能材性然也是注錯習俗之節異也荀子榮辱野物不為犧牲雜學不為通儒尉繚子治本夫胡越之人生而同聲嗜欲不異及其長而成俗也纍數譯而不能相通行有雖死而不相為者則教習然也賈子新書保傅故諸君子得賢而舉之得賢而與之譬其若登山乎得不肖而舉之得不肖而與之譬其若下淵乎故登山而望其何不臨而何不見凌遲而入淵其孰不陷溺賈子修政語上揚子見逵路而哭之為其可以南可以北墨子見練絲而泣之為其可以黃可以黑趨舍之相合猶金石之一調相去千嵗合一音也淮南子說林訓申菽杜茝美人之所懷服也及漸之於滫則不能保其芳矣淮南子人間訓學必由聖所以致其材也厲必由砥所以致其辦也故夫子之教必始於詩書而終於禮樂雜說不與焉孔叢子雜訓夫狂者自齕忘其非揭豢也飯土而忘其非梁飯也然則楚之狂者楚言齊之狂者齊言習使然也夫習之於人微而著深而固是暢於筋骨貞於膠漆是以君子務為學也韓詩外傳是以孔子家兒不知罵曾子家兒不知鬬所以然者生而善教也說苑雜言蘭本三年湛之以鹿醢既成則易以匹馬非蘭本美也願子詳其所湛既得所湛亦求所湛說苑雜言鄒孟軻之母也號孟母其舍近墓孟子之少也嬉逰為墓間之事踴躍築埋孟母曰此非吾所以居處子也乃去舍市傍其嬉遊為賈人衒賣之事孟母又曰此非吾所以居處子也復徙舍學宫之傍其嬉遊設俎豆揖讓進退孟母曰真可以居吾子矣列女傳周列國鄒孟軻母山􅠌之蹊不可勝由矣向墻之户不可勝入矣揚子吾子孔子習周公者也顔淵習孔子者也羿逢蒙分其弓良捨其策般投其斧而習諸孰曰非也揚子學行以習非之勝是也况習是之勝非乎於戲學者審其是而已矣揚子學行篇次四密於腥臊三日不覺殽測曰密於腥臊小惡通也太𤣥經第三密故擬水於川水得其馴擬行於德行得其中擬言於法言得其正太𤣥經𤣥棿野藪之人多鄙市井之人多媚非理也其習使然也性固無間於野藪市井之人也故循其習之謂情宰其情之謂性因性而導之謂學天祿閣外史燕居蓬生麻間不扶自直白紗入緇不練自黑彼蓬之性不直紗之質不黑麻扶緇染使之直黑夫人之性猶蓬紗也在所漸染而善惡變矣王充論衡率性篇人間之水汚濁在野外者清潔俱為一水源從天涯或濁或清所在之勢使之然也王充論衡率性篇聲平和則鄭衛不能入也學業正則雜說不能傾也事得本則邪佞不能謬也揚子法言注吾子篇貴此聖人坦蕩之夷路賤彼百家雜穢之邪徑揚子法言注吾子篇衣上也裳下也聖典本也諸子末也轉上為下捨本逐末者是可惜揚子法言注吾子篇御氣為人若御馬涉道由通衢則迅利適惡路則駑蹇揚子法言注吾子篇君子多聞見而心愈真也小人多聞見而情愈僞也揚子法言注寡見篇才絓中庸在於所習是以素絲無恆𤣥黃代起鮑魚芳蘭入而自變文選劉峻辨命論曾子將行晏子送曰嬰聞贈人以財不若以言請以言乎夫蘭本三年成而湛之以酒則君子不近湛之鹿醢貨以匹馬願子剋求所湛文選王仲宣贈蔡子篤詩注違彼夷塗而遵此險徑補文選李充學針瞻彼緝狐既次良冶相諸筍玉猶待它山故沮渙之水可居鄒魯之鄉為貴藝文類聚禮部上學校表匪曰蘭芷疇變入室之情不自朱藍何遷素絲之質藝文類聚職官部祭酒表荃蕙雖秀才非貞質異端雖美道無𤣥術藝文類聚服飾部杖銘出不自户將何由行不以法欲焉修藝文類聚內典部內典頌盜跖為濁夷栁為清鮑肆為臭蘭圃為馨藝文類聚人部言語銘絲白不難染蓬生本易扶藝文類聚人部髮詩漸於蘭則芳漸於鮑則臭太平御覽香部蘭香軻少貧向在墓間識葬埋事又徙在市則軻知市井之利又徙在習學所遂盡識禮義太平御覽資産部市在磨則磷玉生雖堅唯居必徙豈曰能賢冰開春日蘭敗秋年天教斯類及習情遷初學記道釋部佛注金木無常方圓應形亦有櫽括習與性成正人在側德義盈堂玉海官制儲官譬如良地而種稊稗終不變成粳粱五榖玉清經慈悲方便品如穢螺蝸汙澄清水不堪飲用波羅蜜多經五百八十三譬如以乳和水以火煎煮以得熱氣乳水各别而彼水所有脂膩味大寶積經一百九譬如風大出深山邃谷入於占蔔衆香之林其風便香經於糞穢臭惡之所其風便臭若香臭俱至風則香臭竝兼盛者先顯大乘顯識經推三譬如伊蘭俱與旃檀生未利山牛頭旃檀生伊蘭藂中未及長大在地下時芽莖枝葉如閻浮提竹筍衆人不知言此山中純是伊蘭無有旃檀而伊蘭臭熏四十由旬其華紅色甚可愛樂若有食者發狂而死牛頭旃檀雖生此林未成就故不能發香仲秋月滿卒從地出成旃檀樹衆人皆聞牛頭旃檀上妙之香永無伊蘭臭惡之氣觀佛三暗海經卷一覆一谷涌大水展轉而流到於大海若復有水而不循谷漫墮滷土為滷所滲而失其身大方等陀羅尼經卷四猶如有諸甜果若甘蔗若蒲桃果及諸一切甘美之果有人修治良地而取種之然後生子皆悉甘美人所貪樂所以然者以其果子本甘美故增一阿含經卷八復有衆生修鵄鵂因受鵄鵂戒發鵄鵂心行鵄鵂業分别鵄鵂意以是熏修鵄鵂之業起世因本經卷五學當有善知識昔有驢一匹其主恆令與馬相隨飲食行來常與馬俱馬行百里亦行百里馬行千里亦行千里衣毛鳴呼與馬相似後時與驢相隨飲食行來與驢共侣驢行百里亦行百里驢行千里亦行千里毛衣頭軀悉為似驢鳴呼唉痾純為是驢遂至老死不復作馬學者亦如是隨善知識則日精進精進者得道駛隨惡知識則日懈怠懈怠者是為長沒也佛說生經卷五欲入法海取其珍寶當須善行以為導師毁破善行生死曠路永無出期經歷三塗受苦長逺如彼商賈將入大海殺其導者迷失津濟終致困死百喻經卷上如鼠藏穴潛隱習教法句經利養品地有故紙佛告比邱取之受教即取佛問比邱以為何紙諸比邱白佛此裹香之紙今雖捐棄處香如故佛復前行地有斷索佛告比邱取之受教即取佛復問曰此何等索諸比邱白佛其索腥臭此繫魚之索佛語比邱夫物本淨皆由因緣以興罪福近賢明則道義隆友愚暗則殃罪集譬彼紙索近香則香繫魚則腥漸染玩習各不自覺法句譬喻經一雙要品譬如入恆河必得至大海諸餘外道法非一切智人所說邪見雜故將至惡處大智度論卷三十二福田因緣功德故所願得滿如種良田則所收益多大智度論卷五十四如練鐵不能成金大智度論卷五十四譬如人瞋日習不已則成惡性大智度論卷六十七如水在辛則辛在苦則苦甜醋鹹淡亦如是雜阿毗曇心論卷九顔閔遇於孔門標德行之首蘇張逢於鬼谷居浮詐之先非獨人性之優劣亦所習之真僞也辨正論卷六大乘為甘露亦名為毒藥能消即為甘不消即成毒法苑珠林卷二十三竊聞聲調響順形直影端未見鑽火得冰種豆得麥法苑珠林卷五十五欲行大道莫示小徑無以大海內於牛跡無以日光等彼螢火維摩詰所說經弟子品津河可度處名正濟險難誑處名邪濟佛道名正濟外道名邪濟也僧肇注維摩注經佛道品彼大乘之體自無瘡疣無以小乘之刺損傷之也僧肇注維摩詰經弟子品必為譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也論語子罕烏獲古之有力人也能移舉千鈞人能舉其所任是為烏獲才也趙氏注孟告子下人有術不能行者有矣能行而無其術者亦有矣衛人有善數者臨死以訣喻其子其子志其言而不能行也他人問之以其父所言告之問者用其言而行其術與其父無差焉列子說苻夫力學而誦詩書凡人所能為也若欲移江河動太山故人力所不能也陸子慎微若造父之御馬羿之用弩則所謂難也君子不以其難為之也陸子慎微槁竹有火弗鑽不㸐土中有水弗掘無泉淮南子說林訓道雖近不行不至事雖小不為不成韓詩外傳好大而不為大不大矣好髙而不為髙不髙矣仰天庭而知天下之居卑也哉揚子修身篇脂我名車䇿我名驥千里雖遙孰敢不至陶靖節集詩四言良匠能與人規矩不能使人必巧明師能授人妙術不能使人必為漢武帝內傳人生於世如在寶山種種善緣皆為寶也子不造善當來離世是猶登彼寶山空手而歸不持一物後無悔乎虛皇四十九年運此神力如風扇火海空智藏經序品譬如寶山在於惡林有一猛虎常依其中以是之故一切衆生飛鳥走獸絶跡此山無敢近者有一貧士存念思惟云何得往彼山採寶令我今日早得富有於是即便習諸毒藥往於山所爾時惡蟲聞其毒藥即便去離是諸貧士隨意採寶海空智藏經哀歎品譬如大地其性安固於諸衆生無所分别有人欲得求其果實若能耕種隨時隨時耘除草穢彼人至時收獲果實若不耕種耘除草穢是人終不得其果實法集經欲勿懷疑退心如羊被牽拽喘懼而前却大乘密嚴經卷上如人患渴欲飲河水豈以飲不能盡而不飲耶大乘造像功德經卷上悲九佛言人為道譬如一人與萬人戰被鉀操兵出門欲戰意怯膽弱乃自退走或半道選或格鬭而死或得大勝還國髙遷夫人能牢持其心精鋭進行不惑於流俗狂愚之言者欲滅惡盡必得道矣佛說四十二章經尺積纍一畝之間廣尺深尺曰畎方百里之間廣二尋深二仞曰澮澮畎深之至川亦入海孔氏傳書益稷蚍蜉之子微蟲耳時術蚍蜉之所為其功乃復成大垤鄭氏注禮記學記蚍蜉之子時時術學銜土之事而成大垤猶如學者時時問學而成大道矣禮記正義學記邱一成為敦邱再成為陶邱再成鋭上為融邱三成為昆崙邱爾雅積一勺以成江河纍微塵以崇峻極匪志匪勤理無由濟也晉書虞溥傳跬步無已至於千里覆一簣進及於萬仞北齊書魏收傳財物貨寶以大為重政教功名反是能積微者速成荀子疆國篇人之進道惟問其志取必以漸勤則得多山霤至柔石為之穿蝎蟲至弱木為之弊夫霤非石之鑿蝎非木之鑽然而能以微脆之形陷堅剛之體豈非積漸之致乎孔叢子與子琳書大川滔漾則虬螭羣游日就月將則德立道備抱朴子外篇朂學懸巖滴溜終能穴石規車牽索卒至斷軸水非石之鑽繩非木之鋸然而斷穴者積漸之所成也劉子崇學靈珠如豆不見其長疊嵗而大鐃舌如指不覺其損纍時而折劉子崇學為山者基於一簣之土以成千丈之峭鑿井者起於三寸之坎以就萬仞之深劉子崇學還鄉者心務見家不可以一步至也慕學者情纒典素不可以一讀能也劉子崇學尸子曰土積成嶽則楩柟豫章出焉水積成川則吞舟之魚生焉夫學之積也亦有所出也李善注文選張茂光勵志詩積一喙而不已終纍泥而成屋廣文選夏矦孝若𤣥鳥賦渾渾長源蔚蔚洪柯羣川載導衆條載羅廣文選陶淵明命子詩水積則生吞舟之魚土積則生豫章之木學積亦有生焉意林尸子大木百尋根積深也滄海萬仞衆流成也淵智達洞纍學之功也意林唐子為山資於一簣學海漸其微流藝文類聚禮部學校啓凡先合單紡為一絲四絲為一扶五扶為一首五首成一文文采淳為一圭初學記服食部綬積智成明積因成業初學記道釋部佛譬如世間處胎藏者雖漸增長而不自見波羅蜜多經卷五百七十二如天雨時置甕迥處承水漸滿如是滿時由諸雨滴長時連注波羅蜜多經卷五百八十如貯蘇瓶如如經久如是如是蘇氣薰遍不受餘氣之所熏著波羅蜜多經五百八十四如新瓦瓶盛滿蘇油如如經久如是如是津胒漸潤由斯堅密有所堪能波羅蜜多經五百八十四譬如有人持小火㷮燒乾草大若時若時火依草木爾時爾時火漸增長若時若時火漸增長爾時爾時火熖轉大展轉能照多踰繕那多百多千乃至無量波羅蜜多經五百八十四如新瓦器盛滿清水置於日中如如多時水所滋潤如是如是器轉堅牢波羅蜜多經五百八十四惟夫淺溜穿石小滴盈器鑽燧之勤斷幹之漸皆積微不已故在著可觀波羅蜜多經五百九十卷序如水不厭雲如海不厭水智人亦如是不厭善增長大寶積經卷九十五亦如蒲萄甘蔗未壓之時汁不可見彼於一節二節之中求汁積聚了無見者然於彼汁不從外得大寶積經卷一百二十譬如由一金錢營覔得千金錢非一日得千由别時得千攝大乘論釋卷六如火之炎炎相即而成爓耳𢎞明集明佛論行之次漸微著相因是以始于直心終于淨土譬猶植栽絲髮其茂百圍也僧肇注維摩詰經佛國品喻林卷九十一
