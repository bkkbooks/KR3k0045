body:
  text: 喻林卷四十七明徐元太撰人事門四十五瑕疵凡過之所始必始於微而後至於著罰之所始必始於薄而後至於誅過輕戮薄故屨校滅趾桎其行也足懲而已故不重也王弼註易噬嗑華或有黄者或有白者興明王之德時有駁而不純鄭氏箋詩裳裳瑕者玉之病玉之有瑕猶人之有過故以瑕為過毛詩正義狼跋華一時而黄白雜色以興明王亦一時而善惡不純毛詩正義裳裳者華余狐裘而羔䄂左傳襄公十四年日月動物雖行度有大量不能不小有盈縮范寗解榖梁隠公三年瑕不揜瑜瑜不揜瑕忠也禮記䀻義論大功者不錄小過舉大美者不疵細瑕前漢書陳湯傳青蠅㸃素同兹在藩後漢書楊震傳夫夏后氏之璜不能無考明月之珠不能無纇然而天下寶之者何也其小惡不足妨大美也今志人之所短而忘人之所修而求得其賢於天下則難矣淮南子汎論訓下若珠之有纇玉之有瑕置之而全去之而虧淮南子説林訓豹裘而雜不若狐裘之粹白璧有考不得為寶言至純之難也淮南子説林訓水雖平必有波衡雖正必有差尺寸雖齊必有詭淮南子説林訓瘤癭秃疥為身瘡害焦氏易林坤之大過杲杲白日為月所食焦氏易林家人之小畜言堯有不慈之過以其不傳丹朱也舜有卑父之謗以其不立瞽瞍也王逸註楚辭九辯小疵不足以損大器短疾不足以纍長才日月挾蟲鳥之瑕不妨麗天之景黄河合泥滓之濁不害凌山之流奢僭不可以棄夷吾奪田不可以薄蕭何竊妻不可以廢相如受金不可以斥陳平抱朴子外篇博喻牛躅之䨟不生魴鱮巢幕之窠不容鵠卵崇山廊澤不辭汙穢佐世良材不拘細行何者量小不足以包大形器大無分小瑕也劉子妄瑕荆岫之玉必舍纖瑕驪龍之珠亦有微纇然馳光於千載飛價於侯王者以小惡不足傷其大美者也劉子妄瑕雖天地之大三光之明聖賢之智猶未免乎訾也故天有拆之象地有裂之形日月有薄蝕之變五星有孛彗之妖堯有不慈之誹舜有囚父之謗湯有放君之稱武有殺主之譏劉子妄瑕有悔可悛滯瑕難拂文選顔延年讌曲水詩君子之過引曲推直如彼日月有時則食文選潘岳楊荆州誄彼日月之照明兮尚黯黮而有瑕廣文選宋玉九辯遘貞心以推忒毁玉質而蒙瑕廣文選陸士龍九愍人有厚德無問小節人有大舉無訾小故隋侯之珠不能無纇意林體論玉有瑕穢必見於外故君子不隠所短藝文類聚寶玉部玉玉懷瑕而可指桂含蠧其取傷文苑英華王僧孺誄㸃霧固何傷於日月小疵庸曷損於瓊瑶玉皇本行集經如形殘跛陋者自見形象面貌不生歡悦元陽妙經卷六猶酒酥麻油必有濁滓出曜經一無常品夫良玉時玷賤夫指其瑕望舒抱魄野人睨其缺𢎞明集釋何衡陽逹性論過當求深窮底令物无餘蘊漸以至此物猶不堪而况始求深者乎王弼註易恒彼汾音焚沮去聲洳音孺言采其莫音慕彼其之子美無度美無度殊異乎公路彼汾一方言采其桑彼其之子美如英叶於良反美如英殊異乎公行彼汾一曲言采其藚音續彼其之子美如玉美如玉殊異乎公族詩國風汾沮洳葛履魏之内子儉不中禮媵者怨之詩説魏弁人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也夫禮為可𫝊也為可繼也故哭踊有節禮記檀弓上古人有言曰畏首畏尾身其餘幾左傳文公十七年多則多矣抑君似鼠夫䑕晝伏夜動不穴于寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠如何左傳襄公二十四年諺所謂室於怒市於色者楚之謂矣左傳昭公十九年今之與楊墨辨争道者譬如追放逸之豕豚追而還之入欄則可又復從而罥之太甚趙氏註孟盡心下鄙語有之牽牛徑人田田主奪之牛徑則有罪矣奪之牛不亦甚乎史記陳世家蹈陸土而有沈淪之憂遠巖墻而有鎮壓之患後漢書冦恂列傳不意滯怒不為春夏息淹恚不為順時怠後漢書冦恂傳論蒼梧澆娶妻而美讓於其兄尾生篤信水至不去而死直躬好直證父攘羊申鳴奉法盡忠於君而執其父忠信直讓此四行者聖賢之所貴也然不貴蒼梧之讓非讓道也不取尾生之信非信所也不許直躬之直非直體也不嘉申鳴之忠非忠意也吳志鍾離牧傳註譬棄物江海以為㢘耳宋書謝𢎞微傳枉繩矯墨害著西荆宋書沈攸之傳然而矯枉過直懲羮吹韲晉書諸王總傳毛嬙西施天下之美人也盛怨氣於面不能以為好管子小稱今夫惰農信地實生百榖不力於其道也竊其果稼而荒翳之齊后信人之性酬讓不明於其道舉全境以付人人實鴟義而有其國倉子用道東方有人焉曰爰旌目將有適也而餓於道狐父之盗曰丘見而下壺餐以餔之爰旌目三餔而後能視曰子何為者也曰我狐父之人丘也爰旌目曰譆汝非盗邪胡為而食我吾義不食子之食也兩手據地而歐之不出􅵥􅵥然遂伏而死狐父之人則盗矣而食非盗也以人之盗因謂食為盗而不敢食是失名實者也列子説符子墨子曰鄭人三世殺其父而天加誅焉使三年不全天誅足矣今又舉兵將以攻鄭曰吾攻鄭也順於天之志譬有人於此其子强梁不材故其父笞之其鄰家之父舉木而擊之曰吾擊之也順於其父之志則豈不悖哉墨子魯問今世俗之為説者以桀紂為有天下而臣湯武豈不過甚矣哉譬之是猶傴坐跂音尫大自以為有知也荀子正論以君子與小人相賊害也憂以忘其身内以忘其親上以忘其君豈不過甚矣哉是人也所謂以狐父之戈钃牛矢也荀子榮辱篇鄭人有且置履者先自度其足而置之其坐至之市而忘操之已得履乃曰吾忘持度反歸取之及反市罷遂不得履人曰何不試之以足曰寧信度無自信也韓非子外儲説左且御非使王良也則必使臧獲敗之治非使堯舜也則必使桀紂亂之此味非飴蜜也必苦菜亭厯也韓非子難勢畏馬之辟也不敢騎懼車之覆也不敢乗是以虚禍距公利也不孝弟者或詈父母生子者所不能任其必孝也然猶養而長之淮南子説山訓為孔子之窮於陳蔡而廢六藝則惑為醫之不能自治其病病而不就藥則悖矣淮南子説山訓今有良馬不待䇿錣而行駑馬雖䇿錣之不能進為此不用䇿錣而御則愚矣夫怯夫操利劍擊則不能斷刺則不能入及至勇武攘捲一𢷬則摺脇傷幹為此棄干將鏌邪而以手戰則悖矣淮南子修務訓禄過其功者損名過其實者削説苑政理一噎之故絶榖不食一蹶之故却足不行説苑談叢夫山鋭則不髙水狹則不深行特者其德不厚志與天地疑者其為人不祥鮑子可謂不祥矣其節度淺深適至而止矣新序節士七楊王孫倮葬以矯世曰矯世以禮倮乎如矯世則葛溝尚矣揚子重黎篇言人有歠羮而中熱心中懲念見􅕖則恐而吹之王逸註楚辭九章申生雉經晉不絶䋲子胥自沈吳不斷水淮南子説林訓解世人見當今之文薄也狎侮非之則謂上世朴質下世文薄猶家人子弟不謹則謂他家子弟謹良矣王充論衡齊世篇今五色雖陳目不敢視五味雖存口不得嘗以言争而獲勝則可焉有勺藥為荼蓼西施為嫫母忽而不欲哉嵇中㪚集向子期難養生論或覩富貴之過因懼而背之是猶見食之有噎因終身不飱耳嵇中㪚集向子期難養生論豈可以百慮之一失而謂經典之不可用以日月曽蝕之故而謂𤣥象非大明哉抱朴子内篇論仙昔王莽引典墳以飾其邪不可謂儒者皆為篡盗也相如因鼔琴以竊文君不可謂雅樂主於淫佚也抱朴子内篇論仙然不可以黔婁原憲之貧而謂古者無陶朱猗頓之富不可以無鹽宿瘤之醜而謂在昔無南威西施之美抱朴子内篇論仙噎死者不可譏神農之播榖燒死者不可怒燧人之鑽火覆溺者不可怒帝軒之造舟酗醟者不可非杜儀之為酒豈可以欒大之邪偽謂仙道之果無乎是猶見趙髙董卓便謂古無伊周霍光見商臣冒頓而云古無伯竒孝己也抱朴子内篇論仙夫畏水者何必廢舟楫忌傷者何必弃斧斤抱朴子外篇交際何必裸袒以詭彼已斷粒以刺玉食哉抱朴子外篇交際先生慕嘉遁之偏枯不覺捐華之患害也務乎單豹之養内未覩暴虎之犯外也是聞涉水之或溺則謂乗舟者皆敗以商臣之凶逆則謂繼體無類也抱朴子外篇嘉遯何必慮火災而壊屋室畏風波而填大川乎抱朴子外篇詰鮑譬於防火水中避溺山隅補文選司馬相如美人賦莊周婦死而歌夫通姓命者以卑及尊死生不悼不可論也夫象見死皮無遠近必泣周何忍哉太平御覧獸部象文帝黄初二年築陵雲臺七年三月築九華臺樓觀精巧先稱平衆木輕重然後造無錙銖相結臺雖高峻常隨風揺動而終無傾倒之理明帝登臺懼其勢危别以大木扶持之樓即頺壊論者謂輕重力偏也玉海宫室庭昔有一人往至他舍見他屋舍墻壁塗治其地平正清浄甚好便問之言用何和泥得如是好主人荅言用稻榖䴬水浸令熟和塗泥壁故得如是愚人即便而作念言若純以稻䴬不如合稻而用作之壁可白浄泥治平好便用稻榖和泥用塗其壁望得平正反更髙下壁都坼裂虚棄稻榖都無利益百喻經卷上昔有一長者遣人持錢至他園中買菴婆羅果而欲食之而勅之言好甜美者汝當買來即便持錢往買其果果主言我此樹果悉皆美好無一惡者汝嘗一果足以知之買果者言我今當一一嘗之然後當取若但嘗一何以可知尋即取果一一皆嘗持來歸家長者見已惡而不食便一切都棄百喻經卷下譬如田舍人初不識鹽見人以鹽著種種肉菜中而食問言何以故爾語言此鹽能令諸物味美故此人便念此鹽能令諸物美自味必多便空抄鹽滿口食之鹹苦傷口而問言汝何以言鹽能作美人言癡人此當籌量多少和之令美云何純食鹽大智度論卷十八如風能使船風過則壊船大智度論卷二十三譬如愚人不識飲食種具聞醬是衆味主便純飲醬失味致患大智度論卷五十九譬如食雖香美過噉則病大智度論卷六十四汝説一切皆空甚可畏也安捨有法而愛空乎如昔狂人令績師績綿極令細好績師加意細若微塵狂人猶恨其麤績師大怒乃指空示曰此是細縷狂人曰何以不見師曰此縷極細我工之良匠猶且不見况他人耶狂人大喜以付織師師亦効焉皆蒙上賞而實無物汝之空法亦由此也髙僧傳二鳩摩羅什昬暗噎噎其陰虺虺其靁詩國風終風叔兮伯兮褎音又如充耳詩國風旄丘折柳樊圃叶博故反狂夫瞿瞿音句不能晨夜叶羊茹反不夙則莫音慕詩國風東方未明具曰予聖誰知烏之雌雄詩小雅正月瞻彼中林侯薪侯蒸民今方殆視天夢夢音蒙詩小雅正月人莫知其子之惡莫知其苗之碩大學人莫不飲食也鮮能知味也中庸縱毛爐炭之上幸不焦投卵千金之下望必全豈不殆哉臣聞桀登髙自知危然不知所以自安也前據白刃自知死而不知所以自存也惑者知返迷道不遠願大王察之吳越春秋勾踐入臣外傳盲者不可示以文繡聾者不可語以調聲越絶篇叙外傳記古與今如一丘之貉前漢書楊惲傳闇昧不覩日月之光聾昬不聞雷霆之震後漢書馬融列傳朱紫同色清濁不分後漢書左雄列傳慌若迷塗失偶黶如深夜撤燭宋書顏延之傳水激則波起炁亂則智昏昏智不可以為正波水不可以為平文子下德瞽者無以與乎文章之觀聾者無以與乎鐘鼓之聲豈唯形骸有聾盲哉夫知亦有之莊子逍遥遊盲者無以與乎眉目顔色之好瞽者無以與乎青黄黼黻之觀莊子大宗師今君人者急逐樂而緩治國豈不過甚矣哉譬之是猶好聲色而恬無耳目也荀子王覇今使人生而未嘗睹芻豢稻粱也惟菽藿糟糠之為睹則以至足為在此也俄而粲然有秉芻豢稻粱而至者則瞲然視之曰此何怪也彼臭之而無嗛於鼻嘗之而甘於口食之而安於體則莫不棄此而取彼矣今以夫先生之道仁義之統以相羣居以相持養以相藩飾以相安固邪以夫桀跖之道是其為相縣也幾直夫芻豢之縣糟糠爾哉然而人力為此而寡為彼何也曰陋也荀子榮辱目不能決黒白之色則謂之盲耳不能别清濁之聲則謂之聾心不能審得失之地則謂之狂盲則不能避晝日之險聾則不能知雷霆之害狂則不能免人間法令之禍韓非子觧老詩曰墨以為明狐狸其蒼此言上幽而下險也荀子解蔽篇張儀欲以秦韓與魏之勢伐齊荆而惠施欲以齊荆偃兵二人争之羣臣左右皆為張子言而以攻齊荆為利而莫為惠子言惠子因説不可不察也夫齊荆之事也誠利一國盡以為利是何智者之衆也攻齊荆之事誠不利一國盡以為利何愚者之衆也凡謀者疑也疑也者誠疑以為可者半以為不可者半今一國盡以為可是王亡半也刧主者固亡其半者也韓非子内儲説上客有教燕王為不死之道者王使人學之所使學者未及學而客死王大怒誅之王不知客之欺已而誅學者之晚也夫信不然之物而誅無罪之臣不察之患也且人所急無如其身不能自使其無死安能使王長生哉韓非子外儲説左上紂為長夜之飲懽以失日問其左右盡不知也乃使問箕子箕子謂其徒曰為天下主而一國皆失日天下其危矣一國皆不知而我獨知之吾其危矣辭以醉而不知韓非子説林闇主則不然所愛習親近者雖邪枉不正不能見也疏遠卑賤者雖竭力盡忠不能知也有言者窮之以辭有諌者誅之以死如此而欲照海内存萬方是猶塞耳而聽清濁掩目而視青黄也其離聰明則亦遠矣淮南子主術訓不聞道術之人則寡於得失不知亂之所由芼芼乎其猶醉也韓詩外傳昔桀罪諫者紂焚聖人剖王子比干之心袁氏之婦絡而失其紀其妾告之怒棄之夫亡者豈斯人知其過哉説苑權謀耆蒙睡眠不知東西嵗君失理命直為曲焦氏易林同人之大壯左眇右盲視闇不明焦氏易林大有之益右目無瞳偏視寡明十步之外不知何公焦氏易林謙之蹇戴缾望天不見星辰焦氏易林隨之蹇昧視無光夜不見明焦氏易林蠱之豫朝不見光夜不見明焦氏易林坎之泰蔽鏡無光不見文章焦氏易林恒之未濟日有光月有明三年不目日視必盲三年不目月精必矇揚子修身次七修侏朱侏比于朱儒測曰侏侏之修無可為也太𤣥經第一童次二盲征否測曰盲征否明不見道也太𤣥經第五晦初一瞢復晱失冉切天不覩其軫測曰瞢復晱天無能見也太𤣥經第六瞢次三師或導射豚遁也其埻凖射的也測曰師或導射無以辨也太𤣥經第六瞢次五倍明仮光觸蒙昬太𤣥經第六瞢言不識味者並甘臭惡不知人者信任讒佞王逸註楚辭九章言川水夏濁而秋清傷君無有清明之時王逸註楚辭九辨言今世之君迷惑讒佞反表以為裏倒裳以為衣而不能知也王逸註楚辭九嘆亡國之君不知去貪暴施仁惠若無骨之蟲春生秋死不知冬寒之有氷雪吕氏春秋任數解夫五音不聞無以别宮商五色不見無以别𤣥黄武侯十六䇿視聽儒生不覽猶為閉闇况庸人無篇章之業不知是非其為閉闇甚矣此則土木之人耳目俱足無聞見也王充論衡别通篇然而淺見之徒區區所守甘於荼蓼而不識􅏁蜜酣於醨酪而不賞醇醪知好生而不知有養生之道知畏死而不信有不死之法知飲食過度之速疾病而不能節肥甘於其口也知極情恣欲之致枯損而不知割懷於所欲也抱朴子内篇微㫖小人之知未知所向猶泉初發蒙蒙然也太𤣥經第二務解問其造屋不必知楣横而棁竪也問其為田不必知稷早而黍穉也顏氏家訓勉學户服艾以盈要兮謂幽蘭其不可佩覽察草木其猶未得兮豈珵美之能當文選屈原離騷經君所察者三年不可以不知不知時與不時譬猶春不耕也不知行與不行譬以方為輪也不知宜與不宜譬以錦緣薦也藝文類聚服飾部薦蓆鼻不知臭為齆人不知是非為閉太平御覧人事部鼻宋陽里華子中年病忘朝取而夕忘夕與而朝忘在途則忘行在室則忘坐太平御覧人事部迷忘猶如闇夜所見不真三十六部尊經如或見昧粗精識迷徼妙不啻隔紗而視日奚殊認鹿以為牛玉皇本行集經猶如盲人雖在人間日月之下而竟不知日月光明何以故日光皎然盲者不見無上内秘藏經辯四真品如人有眼無外光明不能覩見所有色像波羅蜜多經卷五百七十二住於幽闇間猶如蝙蝠類大寶積經卷三譬如闕壊眼不能見衆色大集地藏十輪經卷六譬如盲人至大寶洲行住坐卧不見衆寶大方廣佛華嚴經四十五所謂膚翳覆眼重雲隠月如人穿井瓶中燈燄大法鼓經卷下猶如無燈明而入於闇室本緣經毘羅摩品覩彼衆生展轉五道始終周旋如磨不定修行道地經菩薩品遠道暗昧如夜發箭法句經廣衍品譬如人眼翳見妙珍寶謂為不浄大智度論卷六十七僕謂餌辛者不知辛之為辛而無羡於甜香悦臰者不覺臰之為臰而弗躭椒蘭𢎞明集駮夷夏論皆由放散情慮擾亂心神似風裏之燈譬波中之月揺漾輕動浮游汎濫影既不現照豈得明法苑珠林卷八十四日月豈不浄耶而盲者不見對曰是盲者過非日月咎舍利弗衆生罪故不見如來佛國嚴浄非如來咎維摩詰所説經佛國品日月豈不明不見自由聲目佛土豈不浄罪穢故不覩僧肇註維摩詰經佛國品乖異九三輿説輻夫妻反目易小畜睽火動而上澤動而下二女同居其志不同行易睽上火下澤睽君子以同而異易睽水火相息二女同居其志不相得曰革易革九三艮其限列其夤厲薫心易艮天道西轉水流東注是天與水相違而行周易正義訟水火二物共成烹飪理應相濟今火在上而炎上澤居下而潤下无相成之道所以為乖周易正義睽夤當中脊之肉也既止加其身之中則上下不通之義也夤既分列身將喪亡故憂危之切薫灼其心矣然則君臣共治大體若身大體不通則君臣不接君臣不接則上下離心列夤則身亡離心則國喪周易正義艮習習谷風以陰以雨黽勉同心不宜有怒叶暖五反詩國風谷風既阻我德賈用不售與夀同叶市周反詩國風谷風羔裘豹祛音區自我人居居羔裘豹褎音䄂自我人究究詩國風羔裘白華菅音姦兮白茅束兮之子之遠俾我獨兮詩小雅白華習習谷風維山崔嵬無草不死無木不萎叶於回反忘我大德思我小怨詩小雅谷風騂騂音觪角弓翩其反矣兄弟昬姻無胥遠矣詩小雅角弓瞻彼中林甡甡音莘其鹿朋友已譖不胥以榖人亦有言進退維谷詩大雅桑柔角弓殳兄刺幽王也不親九族而好讒佞骨肉相怨毛詩角弓盛夏養萬物之時草木枝葉猶有萎槁者朋友雖以恩相養亦安能不時有小訟乎鄭氏箋詩谷風視彼林中其鹿相輩耦行甡甡然衆多今朝廷羣臣皆相欺背不相與以善道言其鹿之不如鄭氏箋詩桑柔魯事晉猶女之事夫不敢過差而晉有罔極之心反二三其德杜氏解左傳成公八年鼻之與强猶晉人之與楚人也晉人見楚人之急帶劔而緩之楚人惡其緩而急之戰國䇿魏昭王一尺布尚可縫一斗粟尚可舂兄弟二人不相容前漢書淮南王傳張陳之交猶如父子擕手􅋟秦拊翼俱起據國爭權還為豺虎前漢書叙傳下使股肱分成二體匈膂絶為異身後漢書袁紹列傳乖琴瑟之至和違鹽梅之相濟魏書辛雄傳王爵不相加婦姑位不定各恃衆怙力將人人棊跱以觀成敗不肯同心共膽率徒旅進魏志鄭渾傳註一尺繒好童童一升粟飽蓬蓬兄弟二人不能相容淮南子序天氣上騰地氣下降二象分離萬物不交也京氏易傳否上居者不知負戴之勞從旁議者與當局者異憂鹽鐵論刺復背北相憎心意不同如火與金焦氏易林乾之歸妹播木折枝與母别離焦氏易林訟之謙夫婦相背和氣弗處陰陽俱否莊姜無子焦氏易林豫之家人兩心不同或欲西東焦氏易林隨之兊躓馬破車惡婦破家青蝇汙白恭子離居焦氏易林觀之隨五星六意岐道多怪焦氏易林復之隨口不從心欲東反西與意乖戾動舉失便焦氏易林離之既濟寒暑不當軌度失常焦氏易林大壯之坎賈辛醜惡妻不安夫焦氏易林晉之大畜兩人俱醉相與悖戾焦氏易林益之未濟氷炭異室仁道閉塞焦氏易林井之旅踈類異路心不相慕牝牛牡猳鰥無室家焦氏易林革之蒙日走月步趨不同舍焦氏易林豐之同人三虎上山更相距哮心志不親如仇與怨焦氏易林渙之未濟次五膠漆釋弓不射角木離測曰膠漆失信不結也太𤣥經第二格次八兩兕鬭一角亡不勝喪測曰兩兕鬭亡角喪也太𤣥經第四遇初一圜方杌五勿切棿五結切其内窽換測曰圜方杌棿内相失也太𤣥經第六闕闕音缺一源十流天水違行而訟者紛如也申鑒時事人生有所貴尚出門各異情朱紫更相奪色雅鄭異音聲曹子建當事君行指人之所短遂已之所長以盖其失猶晉楚帶劔逓相詭反也劉邵人物志體别茍失其心同衾為遠徐榦中論一尺帛可縫而共衣一斗粟可舂而共食况以天下之廣而不相容也前漢書註淮南傳兄弟相依當如衡軌而今殊跡牽牛有名不堪服車亦猶有兄弟之名而不得同聚李善註文選陸士龍荅兄機詩如彼翰林鳥䨇栖一朝隻如彼游川魚比目中路析文選潘岳悼亡詩君如秋日雲妾似突中煙髙下理自殊一乖兩絶天初學記人部離别註山立峙各於其所无相順之時猶君在上臣在下恩敬不與相通玉海周易鄭康成注詾詾謷謷至相烹煑道德經指歸卷九譬如有蛇尾語頭言我應在前頭語尾言我恒在前何以卒爾頭果在前其尾纒樹不能得去放尾在前即墮火坑燒爛而死百喻經卷下昔捕鳥師張羅網於澤上以鳥所食物著其中衆鳥命侶競來食之鳥師引網衆鳥盡墮網中時有一鳥大而多力身舉此網與衆俱飛而去鳥師見影隨而逐之有人謂鳥師曰鳥飛虚空而汝步逐何其愚哉鳥師荅曰不如來告彼鳥日暮要求栖宿進趣不同如是當墮其人故逐不止日已轉暮仰觀衆鳥飜飛争競或欲趣東或欲趣西或望長林或欲赴澗争競不止須臾便墮鳥師還得次而殺之衆經撰襍譬喻經石立土踊天地之痤贅也山崩地䧟天地之癰疽也衝風暴雨天地之奔氣也雨澤不降川瀆涸竭天地之燋枯也法苑珠林卷六十三喻林卷四十七
