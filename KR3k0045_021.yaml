body:
  text: 喻林卷二十一明徐元太撰人事門待成如人之田獵欲從就於鹿當有虞官助已商度形勢可否乃始得鹿若无虞官即虛入于林木之中必不得鹿周易正義屯獵人先遣虞官商度鹿之所在猶若三欲適五先遣人測度五之情意周易正義屯有饛音蒙簋音軌飱音孫有捄音求棘匕音比大詩小雅東大田過度而無人功終不能獲毛詩甫田註白露凝戾為霜然後成事興國家待禮然後興毛詩蒹葭註淠淠然涇水中之舟順流而行者乃衆徒船人以楫櫂之故也鄭氏箋詩棫樸設九罭之罟乃後得鱒魴之魚言取物各有器也鄭氏箋詩九罭廻風從上而下力薄不能更升谷風與相遇二風幷力乃相扶而上以喻朋友二人同心乃相率而成也毛氏正義谷風芃芃然盛者黍之苗也此苗所以得盛者由上天以隂雨膏澤之故也毛詩正義下泉柯者為家之器用禮者治國之所用言欲伐柯以為家用當如何乎非斧則不能以興欲取禮以治國者當如之何乎非周公則不能言斧能伐柯得柯以為家用喻周公能行禮得禮以治國毛詩正義伐柯君之須臣為輔猶華之須葉以盛毛詩正義裳裳者華譬如釀酒須因麴蘖則成酒無麴蘖則酒不成人無禮則敗壊也禮記正義禮運行孝悌之事須禮樂如車行之須人御也禮記正義禮運月與星辰隂者也有形無灮日照之乃有灮禮記正義月令鼓之為聲不宫不商故言無當於五聲而宫商等之五聲不得鼔則無諧和之節清水無色不在五色之限無主青黄而五色畫繢者不得水則不分明禮記正義學記所以鼔柷謂之止所以鼔敔謂之籈音真爾雅骨象須切磋而為器人須學問以成德爾雅注且攻玉以石洗金以鹽濯錦以魚浣布以灰夫物固有以賤理貴以醜化好者矣後漢書王符􅍌傳荆山之璞曜元后之寳隋侯之珠燭衆士之好南垠之金登窈窕之首鼲貂之尾綴侍臣之幘此四寳者伏朽石之下濳汙泥之中而揚灮千載之上發彩疇昔之外亦皆未能初自接於至尊也夫尊者所服卑者所修也貴者所御賤者所先也故厦屋初成而大匠先立其下嘉禾始熟而農夫先嘗其粒魏志王粲傳注譬如屋宇舟車待人而成彼不自成關尹子二柱聖賢合則理自彰猶灮生而影見鬼谷子反應注乘輿之輪大山之木也示諸櫽栝三月五月為懤菜蔽而不反其常君子之櫽栝不可不謹也荀子大略羿之法非亡也而羿不世中禹之法猶存而夏不世王故法不能獨立類不能自行得其人則存失其人則亡荀子君道篇百人抗浮不若一人挈而趨物固有衆而不若少者引車者二六而後之事固有相待而成者兩人俱溺不能相拯一人處陸則可矣故同不可相治必待異而後成淮南子説山訓走不以手縛手走不能疾飛不以尾屈尾飛不能逺物之用者必待不用者故使止見者乃不見者也使鼔鳴者乃不鳴者也淮南子説山訓引弓而射非弦不能發矢弦之為射百分之一也淮南子説林訓璧瑗成器礛諸之功鏌邪斷割砥礪之力淮南子説林訓夫地勢水東流人必事焉然後水潦得谷行禾稼春生人必加功焉故五穀得遂長聽其自流待其自生則鯀禹之功不立而后稷之智不用淮南子修務訓孤牝不駒雞不成雛焦氏易林臨之兑次八缾纍于繘貞顇太𤣥經第六劇豉嗜也五味調和須之而成乃可甘嗜也釋名礛諸攻玉之石言物有待賤而貴者也淮南子説山訓解鼓無當於五音五音非鼔不和師無當於五服五服非師不親水無當於五采五采非水不章王充論衡定賢篇諸為人用之物須人用之功力乃立鑿所以入木者槌叩之也鍤所以能撅地者跖蹈之也諸有鋒刃之器所以能斷斬割削者手能把持之力能推引之也王充論衡効力篇干将之刃人不推頓苽瓠不能傷篠簵之箭機不能動發魯縞不能穿非無干将篠簵之才也無推頓發動之主苽瓠魯縞不穿傷焉望斬旗穿革之功乎王充論衡效力篇金不賊木木不成用火不鑠金金不成器故諸物相賊相利王充論衡物勢篇火投竈中釡湧氣蒸精怒胷中力盛身熱王充論衡論死論火熾而釡沸沸止而氣歇以火為主也王充論衡論死論地有邱洿故有髙平或以钁鍤平而夷之為平地矣王充論衡須頌篇龍欲升天須浮雲人之仕進待中人曹子建當墻欲高行離卦中虛始于乾象純則健不能柔明故以北方隂氣貫中柔剛而文明也京氏易傳註離中離取中虛氣炎方能照物日與火本陽象也純以隂又不能乾於物純以陽又暴於物故取隂柔於中始能成於物也京氏易傳註離中雖逺而可以動者得其應也雖險而可以處者得其時也弱而不懼於敵者得所據也憂而不懼於亂者得所附也柔而不憂於斷者得所御也周易略例明卦蓋藉衆術之共成長生也大而諭之猶世主治國焉文武禮律無一不可也小而諭之猶工匠之為車焉轅輞軸轄莫或應虧也抱朴子内篇微㫖濳靈俟慶雲以騰竦棲鴻階勁風以凌虛素鱗須姬發而躍白雉待公旦而來抱朴子外篇廣譬網無綱紀目不正君無股肱國不治楊子法言註先知篇良弓非勍檠不張李善注文選魏都賦豈忘泛舟以相從乎愧無㮄人所以不解也李善注文選曹子建朔風詩層臺雲構所缺過乎榱桷為山霞髙不終踰乎一㙺廣文選劉宣卿後漢書註補志序桀紂是湯武之梯秦項是大漢之階四逆不興則四順不昇意林周生烈子夫求物於闇室夜鑒者得之無夜鑒之朗乂以火得之得之功同也致功之迹異也不可見目因火鑒便謂火為目神憑蓍通又謂蓍為神也由此言之神明之道則大賢之闇室蓍龜之用豈非顔子之龍燭耶藝文類聚方術部卜筮論弦銲相第而矰矢得髙焉專諸刺僚王闔廬乃成名焉太平御覽兵部射捍一人曰吾弓良無所用矢一人曰吾矢善無所用弓羿聞之曰非弓何以往矢非矢何以中的令合弓矢而教之射太平御覽兵部弓孟喜序卦曰隂陽養萬物必訟而成之君臣養萬民亦訟而成之困學紀聞卷一易雖復零雨自天終待雲興四岳何氏語林言語珠不自珠者要假智珠而辨世珠寳不自寳者要假智寳以明法寳五燈㑹元西天祖師二十七祖地水火風假合四大埏土為器託炬火中而得堅固子身猶器法猶炬火能捍子身成不壞質虛皇四十九章譬如因酪因水因鑽因缾因繩因人而得出酥酪不念言我能出酥乃至人手亦不念言我能出酥酥亦不言我能自生因縁混合故得出酥元陽妙經卷二病為本工為標標本不得邪氣不服黄帝素問内經湯液醪醴論如金在冶如帛在機華陽陶隱居集羽空鱗水亦須運用而得昇降空行水去大乘妙林經猶其无乳酪則不生若無彼乳而有此酪是則酪有不從乳生大乘妙林經又如日出方見坑坎髙下之處波羅蜜多經卷五百六十七譬如世間一切草木華果藥等皆依大地波羅蜜多經卷五百七十三譬如箜篌不以一事成有木有柱有絃有人揺手鼔之其音調好自在欲作何等曲道行波羅蜜經卷十譬如鼓不用一事不用二事成有師有革有桴有人擊之其聲乃出道行波羅蜜經卷十譬如畫師有璧有采有工師有筆合㑹是事乃成畫道行波羅蜜經卷十譬如箜篌音聲無所從來去無所至屬衆因縁有絃有槽有棍有人以手鼔之衆縁合則有聲是聲不從絃出槽出棍出手出衆縁合則有聲而無所從來衆縁散則滅而無所至小品波羅蜜經卷十若唯地界無水界者譬如有人握乾麨灰終不和合若唯水界無地界者譬如油水其性潤濕無有堅實即便流散若唯地水無火界者譬如夏月隂處肉團無日灮照則便爛壞唯地水火無風界者則不増長譬如有人及其弟子能善吹糖諸有所作而令其内悉使空虛若無風力終不成就如是四大牙相依持而得建立大寳積經卷五十五如新種子不被風日之所損壞堅實無穴蔵舉合宜下於良田幷有潤澤因縁和合方有芽莖枝葉華果次第増長大寳積經卷五十六又如一切種子草木叢林皆依大地而得生長大寳積經卷一百一十九譬如風界能移香氣故知此花香從風吹來而其風界實不持花香而來亦非無風而花香能來大寳積經一百九譬如糞穢散置野田下諸種子以水溉灌人功助成因縁具足於諸種子花葉果實具足成熟大集月藏經卷七譬如羣牛食種種草若生若枯亦飲種種清濁等水及穀乳時出醇淨乳從彼淨乳出香味酪從香味酪出生熟蘇從生熟蘇出上醍醐大集月蔵經卷七譬如犁無有軛則不堪用大方廣佛華嚴經卷五十九譬如吹笙師其音調好與歌相入笙者以竹為本有人攻吹合㑹是事其聲乃悲大明度無極經濳十一誓如無量無邊水鏡依於灮故空影得現種種異相金灮明最勝王經卷二譬如二物相觸出聲菩薩善戒經卷一譬如依風生火離彼不生火既生已力能成熱灮色明照而彼火性不從風來法集經卷二如衣與華和合而有香氣未和合時無香可得大乘密嚴經卷下譬如樹木雖有火性以無因縁而不現用法集經欲一譬如種子因地及時幷雨溉灌潤澤調順得好風雨然後芽生乃至成熟然其種子若在倉中芽尚不生况復枝葉及華果實蘇婆呼童子經卷中昔有一國不聞貝聲時有一人善能吹貝往到彼國入一村中執貝三吹然後置地時村人男女聞聲驚動皆就往問此是何聲哀和清徹乃如是耶彼人指貝曰此物聲也時彼村人以手觸貝曰汝可作聲貝都不鳴其主即取貝三吹置地時村人言向者美聲非是貝力有手有口有氣吹之然後乃鳴長阿含經卷七如車有輪車行無休息佛般泥洹經卷上那先語王言譬如箜篌無絃無柱無人鼓者寜能作聲不王言不能自作聲那先言如使箜篌有絃有柱有人工鼓者其聲寜出不王言有聲那先言如是天下無自然生物皆當有所因那先比丘經卷中譬如窑家作器取土水和以為泥燒作雜器物其泥不能自成為器會當須人工有薪火乃成為器耳世間無有自然生者也那先比丘經卷中今王所坐殿有人功夫作之耶自然生乎王言人功作之材椽出於樹木垣牆泥土出於地那先比丘經卷中那先問王如鑽火燧無兩木無人鑽者寜能得火不王言不能得火那先言設有兩木有人鑽之寜能生火不王言然即生火那先言天下無有自然生物皆當有所因那先比丘經卷中然以三事因縁觸乃得生猶如鑽火人功燧鑽三事和合得出於火我亦如是有眼識縁三事和合而得生觸無明羅刹經譬如虛空不能生樹有地水因縁而能生樹若無愛水何由而得生於有樹無明羅刹經亦如因樹有䕃因日有光因燈有焰皆從縁起達摩多羅禪經下榮八譬如車轅輻軸􅡞等和合故有無别車也人亦如是五衆和合故有無别人也大智度論卷一譬如人雖有目日不出時不能有所見要須日明得有所見不得言我有眼何用日為大智度論卷四譬如善御駕駟不失平道馬雖有致車之力若無御者則不能有所至大智度論卷八譬如美食少鹽則無味得鹽則味足如意大智度論卷十九譬如大軍無健将不能成辦其事又如人身餘根雖具若無眼者不能有所至大智度論卷二十九如車以輻輞轅轂衆合為車若離散各在一處則失車名大智度論三十一譬如穀種在地無雨則不生不可以地能生穀故言雨無恩大智度論卷四十九又如地先雖有穀子無雨則不生大智度論卷五十五譬如小兒服藥須蜜乃下大智度論卷十七譬如雖有好藥亦須良醫大智度論卷九十六復有箜篌譬喻有槽有頸有皮有絃有棍有人以手鼔之衆縁和合而有聲如聲亦不在衆縁中離衆縁亦無聲以因縁和合故有聲可聞大智度論卷九十九如水寒風未至未成為氷則無堅用若成凍氷能有所蹈大智度論卷一百如泥團輪繩陶師等和合故有瓶生又如縷綖機杼織師等和合故有㲲生又如治地築基梁椽泥草人功等和合故有舍生又如酪酪鑽器鑽揺人功等和合故有酥生又如種子地水火風虛空時節人功等和合故有芽生十二門論守六如陶師雖能作瓶離泥不能作百論卷上守八又松柏等多樹合故名為林非獨松為林亦不離松為林百論卷上守八如地水等能生榖芽若無人功以榖子安置地中芽終不得生隨相論卷上譬如外種三事和合生有種堅實溉之以水覆以草土自性衆具力故芽葉得生有種雖堅實不以水溉不草土覆衆縁不具故芽葉不生有種不實雖溉以水覆以草土自性不實故芽葉不生雜阿毗曇心論卷一夫衆心禀聖以成識其猶衆目會日以為見𢎞明集明佛論譬如有人至於寳山若無信手空無所獲法苑珠林卷七十九空中得為宫室不可用空為宫室要用材木然後得成如是菩薩雖解於空不可但以空而得要以三因成其國也羅什譯維摩詰經佛國品藉勢夫權藉者萬物之率也而時勢者百事之長也故無權藉倍時勢而能事成者寡矣今雖干将莫邪非得人力則不能割劌矣堅箭利金不得弦機之利則不能逺殺矣矢非不銛而劍非不利也何則權藉不在焉戰國䇿齊閔王君不聞大魚乎網不能止鉤不能牽蕩而失水則螻蟻得意焉戰國䇿齊閔王雞惡為人所用故自斷其尾人之美則宜君人事宗廟也人自作犧則能治人國語解周下賔孟適郊要之魚不可脱於淵神龍失埶即還與蚯蚓同後漢書隗囂傳函車之獸離山必斃絶波之鱗宕流則枯宋書袁淑傳今夫幽夜山陵之大而離婁不見清朝日䵎則上别飛鳥下察秋毫故目之見也託日之勢也商子禁使造父者天下之善御者也無輿馬則無所見其能羿者天下之善射者也無弓矢則無所見其巧大儒者善調一天下者也無百里之地則無所見其功輿固馬選矣而不能以至逺一日而千里則非造父也弓調矢直矣而不能以射逺中微則非羿也用百里之地而不能以調一天下制强暴則非大儒也荀子儒效立尺材於髙山之上而下臨千仞之谿材非長也位髙也桀為天子能制天下非賢也勢重也堯為匹夫不能正三家非不肖也位卑也千鈞得船則浮錙銖失船則沈非千鈞輕錙銖重也有勢之與無勢也故短之臨髙也以位不肖之制賢也以勢韓非子功名夫弩弱而矢髙者激於風也身不肖而令行者得助於衆也堯教於𨽻屬而民不聽至於南面而王天下令則行禁則止由此觀之賢智未足以服衆而勢位足以任賢者也韓非子難勢今使臧獲奉君令詔卿相莫敢不聽非卿相卑而臧獲尊也主令所加莫敢不從也今使管仲之治不縁桓公是無君也國無君不可以為治若負桓公之威下桓公之令是臧獲之所以信也奚待髙國仲父之尊而後行哉韓非子難一飛龍乘雲騰蛇遊霧雲罷霧齊而龍蛇與螾螘同矣則失其所乘也故賢人而詘於不肖者則權輕位卑也不肖而能服於賢者則權重位尊也堯為匹夫不能治二人而桀為天子能亂天下吾以此知勢位之足恃而賢智之不足慕也韓非子難勢夫馬之所以能任重引車致逺道者以筋力也萬乘之主千乘之君所以制天下而征諸侯者以其威勢也威勢者人主之筋力也韓非子人主虎豹之所以能勝人執百獸者以其爪牙也向使虎豹失其爪牙則人必制之矣今勢重者人主之爪牙也韓非子人主順風而呼聲不加疾也際髙而望目不加明也所因便也吕氏春秋訓説以萬乘令乎千乘易以千乘令乎一家易以一家令乎一人易嘗試反此雖堯舜不能吕氏春秋慎勢王者之封建也彌近彌大彌逺彌小海上有十里之諸侯以大使小以重使輕以衆使寡此王者之所以家以完也故曰以滕費則勞以鄒魯則逸以宋鄭則猶倍日而馳也以齊楚則舉而加綱旃而已矣所用彌大所欲彌易湯其無郼武其無岐賢雖十全不能成功吕氏春秋慎勢不在其位者則無以齊其政不操其柄者則無以制其剛陸子辨惑烏號之弓谿子之弩不能無弦而射越舲蜀艇不能無水而浮淮南子俶真訓假輿馬者足不勞而致千里乘舟檝者不能遊而絶江海淮南子主術訓夫民之好善樂正不得禁誅而自中法度者萬無一也下必行之令從之者利逆之者凶日隂未移而海内莫不被繩矣故握劍鋒以離北宫子司馬蒯蕢不使應敵操其觚招其末則庸人能以制勝今使烏獲藉蕃從後牽牛尾尾絶而不從者逆也若指之桑條以貫其鼻則五尺之童牽而周四海者順也夫七尺之橈而制船之左右者以水為資天子發號令行禁止以衆為勢也夫防民之所害開民之所利威行也若發堿決塘故循流而下易以至背風而馳易以逺淮南子主術訓楚文王好服獬冠楚國效之趙武靈王貝帶鵕􅀈而朝趙國化之使在匹夫布衣雖冠獬冠帶貝帶鵕􅀈而朝則不免為人笑也淮南子主術訓人不見龍之飛舉而能髙者風雨奉之淮南子説林訓雖有國士之力不能自舉其身非無力也勢不便也韓詩外傳物豐者民衍宅近市者家富富在術數不在勞身利在勢不在力耕也鹽鐡論通有無鞭策雖造父不能調駟馬無勢位雖舜禹不能治萬民孔子曰鳳鳥不至河不出圖吾已矣夫故軺車良馬無以馳之聖德仁義無所施之鹽鐡論刺復夫乘爵禄以謙讓者名不可勝舉也因權勢以求利者入不可勝數也鹽鐡論貧富順風而呼聲不加疾而聞者衆登丘而招臂不加長而見者逺故魚乘於水鳥乘於風草乘於時説苑建本蛟龍雖神不能以白日去其倫飄風雖疾不能以隂雨揚其塵説苑談叢乘輿馬不勞致千里乘船楫不游絶江海説苑談叢龍生于淵因風昇天焦氏易林恒之比或問仲尼大聖則天曷不胙曰無土然則舜禹有土乎曰舜以堯作土禹以舜作土揚子重黎篇次三卉炎于􅕳宜于丘陵測曰卉炎丘陵短臨長也太𤣥經第一􅕳君子乘位為車為馬車軨馬􅧊音介可以周天下太𤣥經太𤣥文今以韓國之勢乘而舉之若飄雲之遇風奔流之赴壑孰能禦之哉天禄閣外史妖孽駕乘龍雲必假疾風之力使奔屬於後也王逸註楚辭離騷經言倕不以斤斵則曲木不治誰知其工巧者乎以言君子不居爵位衆亦莫知其賢能也王逸注楚辭九章鵲食蝟皮博勞食虵蝟虵不便也蚊虻之力不如牛馬牛馬困於蚊虻蚊虻乃有勢也鹿之角足以觸犬獼猴之手足以搏鼠然而鹿制於犬獼猴服於鼠角爪不利也故十年之牛為牧豎所驅長仞之象為越僮所鉤無便故也故夫得其便也則以小能勝大無其便也則以彊服於羸也王充論衡物勢篇丘山易以起髙淵洿易以為深起於微賤無所因階者難襲爵乘位尊祖統業者易王充論衡恢國篇辯言必有所屈通文猶有所黜言金由貴家起文糞自賤室出王充論衡自紀篇譬由無田而欲樹藝也雖有良農安所措其彊力乎徐幹中論民數位也者立德之機也勢也者行義之杼也聖人蹈機握杼織成天地之化使萬物順焉人倫正焉六合之内各竟其願其為大寶不亦宜乎故聖人以無勢位為窮百工以無器用為困困則其資亡窮則其道廢徐幹中論爵禄甄陶以盛酒雖美不見酣身卑而言髙雖是不見信抱朴子外篇重言嶧陽孤桐不能無絃而激哀響大夏孤竹不能莫吹而吐清聲是以官卑者稷卨不能康庶績權薄者伊周不能臻升平抱朴子外篇博喻所適彌逺則聚糧彌多故其翼彌大則積氣彌厚也郭子注荘逍遥遊因土以行化湯文也因聖以登禪舜禹也上無舜禹之時下無湯文之土故不胙耳若秦楚之胙非所以為胙也揚子法言注重黎篇星雖皓皓有華藻然非能自顯耀也要須著天而後天下見之揚子法言注淵騫篇夫特達而相知者千載之一遇也招賢而處友者衆士之常路也是以空柯無刃公輸不能以斵但懸曼矰蒲苴不能以射文選王褏四子講德論憑飊薦響唱微效長埀波鑒景功少致深補文選鮑昭凌煙樓銘日在井中不能燭十歩目在足下不可以視逺雖明何益意林尸子鴻毛一羽在水而没者無勢也黄金萬鈞在舟而浮者託舟之勢也意林物理論龍無尺木無以升天聖人無尺土無以王天下意林新論一日千里因騏驥之馳髙隂百尺藉雲霞之逺藝文類聚封爵部遜讓封表立而託乘乃成致逺之功坐以運舟遂有利涉之用藝文類聚職官部尚書令表搏風扇翮不覺髙升擊水揚䰇遂迷逺大藝文類聚職官部侍中表搏飛九萬實假扶揺之力中天百尺無俟剞劂之勞藝文類聚職官部大司馬章今夫飛蓬飄風而行千里乘風之勢也藝文類聚草部蓬舜之方陶不能利其巷也及南面而君天下蠻夷皆被其福太平御覽居處部巷猴猿失木禽於狐貉者非其處也爾雅翼貉依天宅照藉海憑瀾初學記帝戚部王孫榮獲大夫兹乃出教曰龍欲騰翥先階尺水且今署兹為門下督須軍還當更議初學記鱗介部龍金鐡蒙以大緤載六驥之上則致千里困學紀聞十卷諸子願乘長風破萬里浪何氏語林言志貴非自貴由乎賤者所崇髙非自髙縁於下者所載道德經註疏卷四譬如王使逺適他國執持符印經途來徃關防主司莫能為礙何以故以王印力人無遮止大寳積經二十譬如乘船欲入大海未至於海多用功力若至海已但隨風去不假人力大方廣佛華嚴經三十八如行者不失符檄則在所欲至無有障礙十住毘婆沙論卷十一猶如飛鳥羽翮隨身長阿含經卷十三如刀斫竹得風即偃三昧法門經卷下譬口氣出聲聲則不逺聲入角中聲則能逺大智度論卷十九譬如火得風助其然乃熾大智度論卷三十如鳥無兩翼不能髙翔如健人無諸器仗而入敵陣大智度論卷三十七譬如軍将得幢表其大相大智度論卷四十七如欲除乾薪草木以火投中則火力能燒令盡人便無事大智度論卷七十一喻林卷二十一
