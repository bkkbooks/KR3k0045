body:
  text: 喻林卷三十二明徐元太撰人事門三十修治山上有水蹇君子以反身修德易蹇山下有澤損君子以懲忿室欲易損六四損其疾使遄有喜無咎易損六四井甃無咎象曰井甃無咎修井也易井鼎之倒趾失其所利鼎覆而不失其利在於寫出否穢之物也周易正義鼎他山之石可以為錯入聲他山之石可以攻玉詩小雅鶴鳴玉之缺尚可磨鑢而平人君政教一失誰能反覆之鄭氏箋詩抑武公能學問聽諌以禮自修而成其德美如骨之見切如象之見磋如玉之見琢如石之見磨以成其寶器毛詩正義淇澳珠曰切象曰磋玉曰琢石曰磨木曰刻金曰鏤革曰剝羽曰析鄭氏注周禮天官太宰醫師掌醫之政令聚毒藥以共醫事凡邦之有疾病者瘡瘍者造焉則使醫分而治之嵗終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下周禮天官醫師凡療瘍以五毒攻之以五氣養之以五藥療之以五味節之凡藥以酸養骨以辛養筋以鹹養脈以苦養氣以甘養肉以滑養竅周禮天官瘍醫物有不圎者規之使圎行有不周者正之使備猶規正物然春秋正義襄公十四年西子蒙不潔則人皆掩鼻而過之雖有惡人齊戒沐浴則可以祀上帝孟子離婁下如切如磋者道學也如琢如磨者自修也大學剟其瑕礫搴其蕭稂爾雅序玉石之被雕磨猶人自修飾爾雅注人之有冠猶宫室之有牆屋也糞除而已又何加焉國語晉當以疾病為諭安得不用湯藥針艾救之哉顔氏家訓教子王逸曰工明於所畫念其繩墨則曲木直而惡木好史記屈原列傳注孫卿子曰拘木必待隱括蒸揉然後直也後漢書鄧禹子訓傳注被此篤病久榮衛動不安聞有韓衆藥信來給一丸魏志劉劭傳注獨孤公猶鏡也每被磨瑩皎然益明隋書髙熲傳隙大則崩毁將至故宜有以抵之也鬼谷子抵巇意不可恣也夫木之性以櫽括自直可以人而不如木乎子不見夫雞耶聚榖如陵跪而啄之若縱子之意則與雞豈有異乎孔叢子儒服砥礪琢磨非金也而可以利金詩書辟立非我也而可以厲心説苑建本揚水潛鑿使石潔白焦氏易林豫之大過謣言敗俗謣好敗則姑息敗德君子謹於言慎於好亟於時吾不見震風之能動聾瞶也謣音于明揚子問次七增其髙刃其峭丘貞測曰增髙刃峭與損皆行也太玄經第一增次八或擊之或刺之修其玄鑒渝測曰擊之刺之過以衰也太玄經第一童次七拂其惡從其淑雄黃食肉測曰拂惡從淑救凶也太玄經第二從次七逹于砭割前亡後賴測曰逹于砭割終以不廢也太玄經第二逹次六息金消石往小來奕測曰息金消石美日大也太玄經第二格初一斷心滅斧冥其繩矩測曰斷心滅斧內自治也太玄經第三斷次三決其聾􅷿都計切利以治穢測曰決其聾􅷿利有謀也太玄經第三斷上九疾其疾巫醫不失測曰疾其疾能自醫也太玄經第四常次八豐牆峭址三嵗不築崩測曰豐牆之峭崩不遲也太玄經第四大次七視其瑕無穢測曰視其瑕能自矯也太玄經第五視次五黃兒以中蕃君子以之洗于愆測曰黃兒以中過以洗也太玄經第六失次八輔其折廅於各切其缺其人暉且偈音傑測曰輔折廅缺猶可善也太玄經第六䦯次二割其疣尤贅利以無穢測曰割其疣贅惡不得大也太玄經第六割刀不利於瓦石上刏之許氏説文卷三衣破者補帶短者續武侯十六策隂察貧劣宅屋不具牆壁宇達人指訾之如財貨富愈起屋築牆以自蔽鄣為之具宅人弗復非王充論衡率性篇山野草茂鉤鐮斬刈乃成道路也士未入道門邪惡未除猶山野草木未斬刈不成路也王充論衡量智篇夫惡猶疾也攻之則益悛不攻則曰甚故君子相求也非特興善也將以攻惡也惡不廢則善不興自然之道也徐幹中論虛道疼痾結於府藏疾病散於肌體者必假脈診以察其盈虛投藥石以攻其所苦若心非嗜欲所亂病非寒暑所傷則醫師之用宜其廢也張湛注列周穆王世咸知積小可以髙大而不悟損多可以至少夫九層起于纍土髙岸遂為幽谷茍功無廢舍不期朝夕則無微而不積無大而不虧矣今砥礪之與刀劔相磨不已則知其將盡張湛注列湯問古人六十笑五十九不逺迷復乃覺有以也抱朴子外篇重言火所以成熟牲體今有脂肪之肉必當澡濯釜鼎以煮泄之太玄經第四竈解黶有疵也有疵者欲披除之莊子音義庚桑楚雲翳於日則不能照垢汚於玉則不能光文選陸士衡演連珠注人咸知飾其容而莫知飾其性性之不飾或愆禮正斧之藻之克念作聖文選張華女史針療暑莫如親水救寒莫如重裘止謗莫如修身意林物理論浴者振衣沐者彈冠人知正服莫知行端藝文類聚后妃部后妃針金雖能照塵積翳朗藝文類聚人部交友針人咸知鏡其貌而莫能照其身藝文類聚職官部丞相針雕良玉於亷劌錬貞金於鍌鋈藝文類聚職官部太傅碑瞻彼緝狐既資良冶相諸筍玉猶待他山藝文類聚禮部學校表飛塵穢清流朝雲蔽日光秋蘭豈不芬鮑肆亂其芳河決潰金堤一手不能障藝文類聚地部塵詩木以繩直金以淬剛必須砥礪就其鋒鋩太平御覽雜物部礪夫絲捨而弗治則腐而棄使女繅之以為美錦人君朝而服之太平御覽布帛部錦與其澡於水寧澡於德水之清猶可穢也德之服不可塵也太平御覽服用部澡盤其田雖良薅鋤乃芳其宅雖善修移乃昌黃帝宅經上田穢不修節莠並生田苖不起囷倉虛空道德經指歸卷九形樂志苦病生於脈治之以炙刺形樂志樂病生於肉治之以針石形苦志樂病生於筋治之以尉引形苦志苦病生於咽嗌治之以百藥形數驚恐經絡不通病生於不仁治之以按摩醪藥黃帝素問內經血氣形志篇譬如金礦精加鑄錬除去砂礫唯有真金造諸飾好嚴身之具大寶積經二十亦如人中毒迷悶心狂亂以火而炙療因此得除愈大寶積經三十一世間雖有諸醫充滿世界不能了知三種大患何以故彼皆不善又無智故而不能識貪瞋癡等三種大患彼無智醫非惟不識三種大患又不了知三大良藥對治三患何等為三所謂不能了知貪欲大患不淨良藥而為對治瞋恚大患慈心良藥而為對治愚癡大患緣起良藥而為對治如是諸醫惟能療治一二别病不能普治一切衆病惟能暫治少時降損非為盡病畢竟除瘥大寶積經四十八譬如垢衣以灰汁浣濯垢滅衣在何以故垢已去故以垢去故衣得清淨文殊師利問經卷下重病離良醫療治方更劇菩薩處胎經卷四猶如上色金生垢不淨因火槖鉆椎赤土人力磨拭瑩治便得明淨中阿含經卷五十五譬如故車方便修治得有所至長阿含經卷二貪為極熱病佛是大良醫天請問經當三不誦為言垢不勤為家垢不嚴為色垢放逸為事垢法句經塵垢品第二十二羸馬比良棄惡為賢法句經象喻品譬如藥師三種病冷熱風病除滅故應病與藥佛如是淫怒癡病隨藥滅三昧法門經卷下猶如彼巧匠者觀彼朽車嚴治修飾逺致重載無所缺損出曜經三欲品身譬如地善意如禾惡意如草不去草穢禾實不成人不去惡意亦不得道三慧經藉八學者有苦不學者無有苦學者有苦譬如人田種當先犂去草穢便多得收是為先苦不學者無有苦譬如地不犂續自生蒺䔧惡物是為不學無有苦三慧經藉八何名為知病所起隨起用藥謂知其病或從風起或從癀起或從痰起或從癊起或從骨節起或積實所起知如是等病所起處隨用藥治令得安樂醫喻經譬如多食不消若不療治於身為患大智度論卷四十一箭鏑在體雖沈深難拔良方妙術猶可令出大智度論卷五十四譬如垢膩之衣則以灰泥淹之經宿以水浣之一時都去大智度論卷九十三又如金銀等諸寶不以輕賤故燒煆磨打大智度論卷九十八譬如善浣衣師能除穢垢大乘莊嚴經論卷六若於寒時為治寒苦追求覆障以為對治若於熱時為治熱苦追求沐浴以為對治涉路作業有劬勞者為治勞苦求按摩等以為對治瑜伽師地論卷六十七今當以慚愧水洗浴識塵執發露刀割覆藏網法苑珠林卷二十三如百年垢衣可於一日浣令鮮淨法苑珠林卷八十六持正天下有山遁君子以逺小人不惡而嚴易遁厭入聲浥音邑行露豈不夙夜謂行多露詩國風行露出其東門有女如雲雖則如雲匪我思存縞衣綦音其巾聊樂我員音云出其闉音因闍音都有女如荼音徒雖則如荼匪我思且音疽縞衣茹藘聊可與娛詩國風出其東門非禮相陵則狗吠毛詩野有死麕注人皆涉我友未至我獨待之而不涉以言室家之道非得所適貞女不行毛詩匏有苦葉注漢也江也其欲渡之者必有潛行乘泭之道今以廣長之故故不可也喻女之貞潔犯禮而往將不至也鄭氏箋詩漢廣木以髙其枝葉之故故人不得就而止息也賢女雖出遊流水之上人無欲求犯禮者亦由貞潔使之然鄭氏箋詩漢廣貞靜之女其美色姝然又能服從君子待禮而後動自防如城隅然髙而不可喻毛詩正義靜女諸侯之不可起行妄伐猶飛隼之不可飛揚妄作也毛詩正義沔水樂易之君子其求福修德以俟之不為回邪之行要之如葛藟之延蔓於條枚是其性也鄭氏注禮表記子茍欲勉我以世路不知其跌而失吾之度也後漢書崔駰列傳且一禮不備貞女恥之況命士乎晉書皇甫謐傳稟仲尼之道不在奔車之上資伯夷之運不處覆舟之下宋書顧覬之傳卑而正者可增髙而倚者且崩説苑談叢古者楊墨塞路孟子辭而闢之廓如也後之塞路者有矣竊自比於孟子揚子吾子篇或問交五聲十二律也或雅或鄭何也曰中正則雅多哇則鄭請問本曰黃鍾以生之中正以平之確乎鄭衛不能入也揚子吾子篇鳳鳥蹌蹌匪堯之庭亨龍潛升其貞利乎揚子問明或問處秦之世抱周之書益乎曰舉世寒貂狐不亦燠乎揚子寡見針錐所穿無不暢逹使針錐末方穿物無一分之深矣賢儒方節而行無針錐之鋭固安能自穿取暢逹之功乎王充論衡狀留篇言欲使已變節而從俗猶嚮者欲釋階登天之態也王逸注楚辭九章言橘受命於江南不可移徙種於北地則化為枳也屈原自比志節如橘亦不可移徙也王逸注楚辭九章言人刓削方木欲以為圜其常法度尚未廢以言讒人譛逐放已欲使改行亦終守正而不易也王逸注楚辭九章安肯蹙太山之峻以適鑿枘之中斂垂天之羽為戒旦之役編於仕類而抑鬱庸兒之下捨鸞鳳之材適枳棘之藪競腐鼠於踞鴟而枉尺以直尋哉抱朴子外篇名寶安肯衒沽以進趨揭其不資之寶以競燕石之售哉抱朴子外篇吳失若能闊禮門以懸規標義路以植矩然後踰垣者折肱捷徑者滅迹文心雕龍奏啓驥不驟進而求服兮鳳亦不貪餧而妄食文選宋玉九辨不仰操而茍容兮譬臨河而無航欲巧笑以干媚兮非余心之所嘗文選思玄賦既秉丹石心寧流素絲涕文選謝朓出尚書省詩圭璋雖特逹明月難暗投文選郭璞逰仙詩志怦怦而內直兮履繩墨而不頗執權衡而無私兮稱輕重而不差補文選莊忌哀時命刓方以為圜兮常度未替補文選屈原懷沙令薜荔而為理兮憚舉趾而緣木因芙蓉而為媒兮憚蹇裳而濡足登髙吾不説兮入下吾不能廣文選屈平思美人雖松梧之貞脆豈榮雕其異心古文苑班媫妤搗素賦毛伯成既負其才氣常稱寧為蘭摧玉折不作蕭敷艾榮世説新語言語丈夫恥於受辱貞女羞於節虧意林燕丹子貞松隆冬以擢秀金菊吐翹以凌霜藝文類聚嵗時部秋賦緑衣雖多無貴於色邪徑雖利無尚於直藝文類聚后妃部后妃針吾將以清談為筐篚以機神為幣帛藝文類聚産業部錢論孔子病子貢出卜孔子曰子待也吾坐席不敢先居處若齊食飲若祭吾卜之久矣困學紀聞卷七論語羣犬吠新客佞暗排迹賓直途既已塞曲路非所遵何氏語林言志翎有六翮飛則沖天麋有四足走便入海下官膚體疏懶手足遲鈍不能逐飛追走逺事佞人何氏語林方正雖處穢惡無所染汚猶如明珠在沙磧中猶如蓮花在濁水內元陽妙經卷五能壞一切外道異論摧伏敵陳建立勝幡無盡意菩薩經八夫正道難毁邪理易退譬若輕羽在髙遇風則飛細石在谷逢流則轉唯泰山不為飄風所動磐石不為疾流所回是以梅李見霜而落葉松柏嵗寒之不凋信矣𢎞明集駮夷夏論立事不失道德猶調絃不失宫商𢎞明集牟子理惑篇慎始天與水違行訟君子以作事謀始易訟凡教在初而法在始家瀆而後嚴之志變而後治之則悔矣王弼注易家人隂陽之氣無為故積馴履霜必至於堅冰以明人事有為不可不制其節度故於履霜而遂以堅冰為戒所以防漸慮微慎終于始也周易正義坤若生子罔不在厥初生自貽哲命書召誥王新即政始服行教化當如子之初生習為善則善矣自遺智命無不在其初生為政之道亦猶是也孔氏傳書召誥將大雨雪始必微溫雪自上下遇溫氣而摶謂之霰久而寒勝則大雪矣喻幽王之不親九族亦有漸自微至甚如先霰後大雪鄭氏箋詩頍辨隰中有萇楚之草性生正直及其長大其猗儺然枝條柔弱不妄尋蔓草木以興人於少小之時能正直端慤雖長大亦不妄淫恣情欲毛詩正義隰有萇楚鳳凰生而有仁義之意虎狼生而有貪戾之心兩者不等各以其母嗚呼戒之哉無養乳虎將傷天下故曰素成胎教之道大戴禮記保傳源泉所來也委流所聚也始出一勺卒成不測鄭氏注禮學記趙文子冠見韓獻子獻子曰戒之此謂成人成人在始與善始與善善進善不善蔑由至矣始與不善不善進不善善亦蔑由至矣如草木之産也各以其物國語晉夫堅樹在始始不固本終必稿落國語晉且知子者賢父知臣者明君子不肖則家亡臣不忠則國亂國亂不可以安也家亡不可以全也是以君子防其始聖人間其端晉書武帝紀正其末者端其本善其後者慎其先晉書潘嶽傳舊非本舊因新以成舊者也狎非先狎因疏以成狎者也宋書恩幸傳史臣桓公觀於廏問廏吏曰廏何事最難廏吏未對管仲對曰夷吾嘗為圉人矣傅馬棧最難先傅曲木曲木又求曲木曲木已傅直木無所施矣先傅直木直木又求直木直木已傅曲木亦無所施矣管子小問聖人之與人約結也上觀其事君也內觀其事親也必有可知之理然後約結約結而不襲於理後必相倍故曰不重之結雖固必解道之用也貴其重也管子心術得魚在於投餌得語在於發端發端則語應投餌則魚來鬼谷子反應注楊朱哭衢塗曰此夫過舉蹞步而覺跌千里者夫哀哭之此亦榮辱安危存亡之衢已此其為可哀甚於衢塗荀子王霸南方有鳥名曰乾吉食其子不擇肉子常不遂今肹與鮒童子也隨大夫而化者不可養以不義之肉列女傳周列國晉羊叔姬次三赤子扶扶元貞有終測曰赤子扶扶父母瞻也太玄經第一賢初一羡於初其次迂塗測曰羡於初後難正也太玄經第一羡雞伏卵而未孚始化之時謂之涅方言第三少小之人其志易徙有異於橘也王逸注楚辭九章譬猶練絲染之藍則青染之丹則赤十五之子其猶絲也其有所漸化為善惡猶藍丹之染練絲使之為青赤也青赤一成真色無異是故楊子哭岐道墨子哭練絲也蓋傷離本不可復變也王充論衡率性篇匠流末者未若挺冶元兆之中整已然者不逮原本乎玄朴之外抱朴子外篇任命俗諺曰教婦初來教兒嬰孩誠哉斯語顔氏家訓教子髙以下基洪由纖起川廣自源成人在始文選張華勵志詩夫大事之將興也由水之出於山也始於潤濕見於漣漣綿綿涓涓流為溪谷汨汨湯湯濟舟漂石以成江海深大不測道德經指歸卷十一天地之道始必有終終必有始陽氣安於潛龍故能鑠金隂氣寧於履霜故能凝冰木善秋毫故能百尋水樂涓涓故能成海飛禽逸於卵鷇故能髙翔羣獸預於胎䍮故能逺走道德經指歸卷十二夫陟百仭之髙岑發自初步履八門之苦難起自染心道德經注疏卷六初正則終循幹立未可持參同契一氣無偏阿所種還自生植此荆棘根何由望蹇林虛皇四十九章譬如有人學善射術先自安立大方廣佛華嚴經卷五十九譬如甕器先貯毒藥投少石蜜不任食用大集地藏十輪經卷六猶如牛渡水導者而不正一切皆不正斯由本導故增一阿含經卷八猶如有諸苦果之子所謂苦果苦參子葶藶子畢地槃特子及餘苦子便於良地種此諸子然後生苖猶復故苦所以然者以其子本苦故增一阿含經卷八要終汔至亦未繘井羸其瓶凶易井小狐雖能渡而無餘力將濟而濡其尾力竭於斯不能續終險難猶未足以濟也濟未濟者必有餘力也王弼注易未濟雖汲水以至井上然綆出猶未離井口而鉤羸其瓶而覆之也棄其方成之功雖有出井之勞而與未汲不異喻人行常德須善始令終若有初無終則必致凶咎周易正義井不矜細行終纍大德為山九仭功虧一簣書旅獒未成一簣猶不為山是以聖人乾乾日昃慎終如始孔氏傳書旅獒譬如為山已髙九仭其功虧損在於一簣惟少一簣而止猶尚不成山以喻樹德行政小有不終德政則不成矣尚書正義旅獒有為者辟若掘井掘井九軔而不及泉猶為棄井也孟子盡心上詩云行百里者半于九十此言末路之難戰國策秦武王始雖垂翅回溪終能奮翼黽池可謂失之東隅收之桑榆後漢書馮異傳譬由行舟雖不橫截迅流然俄向所趣漸靡而往終得其濟晉書劉頌傳經始獲其多福慮終取其少禍晉書陸機傳夫唯無損則至堅矣夫唯無益則至厚矣堅故終不損厚故終不薄晉書皇甫謐傳築社之役蹇蹶而築之端冕而事之神與之福魏書古弼傳能長保國者能終善者也諸侯並立能終善者為長列士並學能終善者為師晏子春秋諫上且以巧鬬力者始乎陽常卒乎隂泰至則多竒巧以禮飲酒者始乎治常卒乎亂泰至則多竒樂凡事亦然始乎諒常卒乎鄙其作始也簡其將畢也必巨莊子人間世天地以日月不過陵谷不遷為成人事以長保元亨考終厥命為成鬼谷子本經隂符注昔者江出於岷山其始出也其源可以濫觴及其至江之津也不放舟不避風則不可涉也非維下流水多耶荀子子道諺曰築社者㩷撅而置之端冕而祀之今子與我取之而不與我置之與我置之而不與我祀之焉可韓非子外儲説左至人不容若眯而撫若跌而據聖人之為治漠然不見賢焉終而後知其可大也若日之行驥騏不能與之爭逺淮南子繆稱訓雨之集無能霑待其止而能有濡矢之發無能貫待其止而能有穿唯止能止衆止淮南子説山訓昔者宋人好善者三世不解家無故而黑牛生白犢以問先生先生曰此吉祥以饗鬼神居一年其父無故而盲牛又復生白犢其父又復使其子以問先生其子曰前聽先生言而失明今有復問之奈何其父曰聖人之言先忤而後合其事未究固試往復問之其子又復問先生先生曰此吉祥也復以饗鬼神歸致命其父其父曰行先生之言也居一年其子又無故而盲其後楚攻宋圍其城當此之時易子而食析骸而炊丁壯者死老病童兒皆上城牢守而不下楚王大怒城已破諸城守者皆屠之此獨以父子盲之故得無乘城軍罷圍解則父子俱視夫禍福之轉而相生其變難見也淮南子人間訓故觀逐者於其反也而觀行者於其終也故舜放弟周公殺兄猶之為仁也文公樹米曽子架羊猶之為知也淮南子泰族訓先暌後合其道通也文明上照幽暗分矣京氏易傳暌上為善不直必終其曲為醜不釋必終其惡説苑談叢官怠於宦成病加於少愈禍生於懈惰孝衰於妻子察此四者慎終如始詩曰靡不有初鮮克有終説苑敬慎或問德有始而無終與有終而無始也孰寧曰寧先病而後瘳乎寧先瘳而後病乎揚子孝至篇上九從徽徽後乃登于階終測曰從徽徽後得功也太玄經第二從上九日沒其光賁于東方用視厥始測曰日沒賁東終顧始也太玄經第五視器非瑚簋必進鋭而退速量擬伊吕雖發晚而到早是以鷦鷯倦翮猶不越乎蓬杪鳶雛徐起顧眄而戾蒼昊抱朴子外篇博喻進簣雖微終焉為山陶靖節集詩四言吾見世人清名登而金貝入信譽顯而然諾虧不知後之戈戟毁前之干櫓也顔氏家訓名實本同末異楊朱興哀始素終玄墨翟垂涕文選盧諶贈劉琨詩引易曰狐涉水濡其尾此言始之易終之難也困學紀聞卷一易成王秀而獲實其美在終昭帝苖而未秀其得在始困學紀聞卷十二考史王家門中優者龍鳳劣猶虎豹失蔭之後豈龍虎之議何氏語林德行南史僧虔戒子書譬如牛乳乳變為酪酪為生蘇生蘇為熟蘇熟蘇為醍醐醍醐為第一當有乳時唯名為乳不名為酪蘇醍醐如是展轉至醍醐時唯名醍醐不名為乳不名酪蘇長阿含經卷十七譬如有二人俱發行入海或有到彼岸或而中斷絶修行道地經五隂成敗品昔有衆人與十賈客相隨采寶歸家時有一人乘車載寶無價明月雜寶無數車重頓躓失伴在後進不見伴退畏盜賊便隨邪徑御車涉路行未經里數車墜深澗軸折轂敗又在曠野無人之處椎胸喚呼怨訴無處對車啼哭出曜經四無放逸品妖孽見福其惡未熟至其惡熟自受罪酷貞祥見禍其善未熟至其善熟必受其福法句經惡行品西方有一國王素無馬減損國藏四出推求買得五百匹馬以防外敵足以安國養馬既久國中無事王便思惟五百匹馬食用不少飼養煩勞無益國事便敕所典掩眼令磨可得自食不損國藏馬磨既久習於旋回忽然鄰國興兵入境王便約敕被馬具莊勇將乘騎如戰鬬法鞭馬向陳欲直前入諸馬得鞭盡旋回走無向敵意鄰賊見之知無所能即便直前大破王軍以是故知欲求善果報臨命終時心馬不亂則得隨意往不可不先調直心馬若不先調直心馬者死賊卒至心馬盤回終不如意猶如王馬不能破賊保全其國是以行人善心不可不常在於胸心衆經撰雜譬喻經譬如毒食初雖香美久則殺人大智度論卷十五譬如美食惡食俱有雜毒食惡食即時不悅食美即時甘悅久後俱奪命故二不應食大智度論卷十八譬如乘車西行南有止宿處故回車趣向車與回向處異故可有回向不得但有車而言回向大智度論卷五十四譬如二人欲墮山頂一人有力善巧方便以巧便故雖墮還起得升山頂一人力少復無方便即往還墮不能復起入大乘論卷上勇為我聞吉人為善惟日不足凶人為不善亦惟日不足書泰誓中吉人竭日以為善凶人亦竭日以行惡孔氏傳書泰誓中雖淺陋衡門之下猶可以棲遲逰息以興雖地狹小國之中猶可以興治致政毛詩正義衡門舉其前必舉其後舉其左必舉其右大戴禮記少間仁之勝不仁也猶水勝火今之為仁者猶以一杯水救一車薪之火也不熄則謂之水不勝火此又與於不仁之甚者也孟子告子上有人於此力不能勝一匹雛則為無力人矣今曰舉百鈞則為有力人矣然則舉烏獲之任是亦為烏獲而已矣夫人豈以不勝為患哉弗為耳孟子告子下猛虎之猶豫不若蜂蠆之致螫騏驥之局躅不若駑馬之安步孟賁之狐疑不若庸夫之必致也雖有舜禹之智吟而不言不如瘖聾之指麾也此言貴能行之史記淮隂侯傳臨焚之鳥不可去薪授首之冦何容緩斧魏書南安王楨子英傳行其道道可致也從其門門可入也立其禮禮可成也爭其強強可勝也太公六韜武韜其視太行之險猶之步仭之丘子華子虎會問王獨不聞俞跗之為醫乎已成必治鬼神避之鶡冠子世賢夫沐者有棄髮除者傷血肉為人見其難因釋其業是無術之事也韓非子八説鑽木取火掘井索泉焦氏易林師之未濟武王伐紂過隧則斬岸遇水則折舟示人無反志也初學記天部雨子勉於前既登絶頂其苦亦息俯視一切皆微眇也虛皇四十九章譬如大冶錬金一切無不銷者玉清經通濟幽冥品喻林卷三十二
