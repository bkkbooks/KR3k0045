body:
  text: 喻林卷一百七明徐元太撰政治門十二征伐地中有水師君子以容民畜衆易師六五田有禽利執言易師人之修田非禽之所犯王者守國非叛者所亂禽之犯苗則可獵取叛人亂國則可誅之周易正義師尚桓桓如虎如貔如熊如羆于商郊書牧誓稼穡之夫除草養苗我長念天亡殷惡主亦猶是矣孔氏傳書大誥澤有獸而焚其草木大威將至不可為巧焚其草木則無種大威將至不可以為勇汲冡周書周祝解既破我斧又缺我斨音搶周公東征四國是皇既破我斧又缺我錡音奇既破我斧又缺我銶音求詩國風破斧淠音譬彼涇舟蒸徒楫音接叶藉此反之周王于邁六師及之詩大雅棫朴王奮厥武如震如怒叶暖五反進厥虎臣闞音喊如虓音哮虎詩大雅常武王旅嘽嘽音灘如飛如翰如江如漢如山之苞叶鋪鉤反如川之流詩大雅常武武王載斾有䖍秉鉞音越如火烈烈則莫我敢曷音遏詩頌長發采芑宣王南征也毛詩采芑文王之時西有昆夷之患北有玁狁之難以天子之命命將率遣戍役以守衛中國故歌采薇以遣之出車以勞還杕杜以勤歸也毛詩采薇東山周公東征也周公東征三年而歸勞歸士大夫美之毛詩東山夫兵猶火也弗戢將自焚也左傳隱公四年君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也何故左傳僖公四年古者明王伐不敬取其鯨鯤而封之以為大戮於是乎有京觀以懲淫慝左傳宣公十二年三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也城非不髙也池非不深也兵甲非不堅利也米粟非不多也委而去之是地利不如人和也孟子公孫丑下沒平公軍無秕政國語晉三軍之良五家之兵進如鋒矢戰如雷霆解如風雨史記蘇秦傳地廣者粟多國大者人衆兵强則士勇史記李斯傳教笞不可廢於家刑罰不可損於國誅伐不可偃於天下用之有巧拙行之有逆順耳史記律書請為天下鴈行頓刃史記魏世家僮兒可使奮拳以致力女子可使褰裳以用命况厲熊羆之卒因迅風之藝哉後漢書皇甫嵩列傳不入虎冗不得虎子後漢書班超列傳虓怒之旅如虎如螭師之攸向無不靡披蓋夫燔魚剸蛇莫之方斯後漢書杜篤傳數十萬衆並垂餌於豺狼晉書東海王越傳暫擾以制敵愈於放敵而常擾也夫四體者人之所甚愛茍宜伐病則削肌刮骨矣晉書王鑒傳兵威已振譬如破竹數節之後皆迎刃而解無復著手處也晉書杜預傳雖鴻羅遐被涼州猶在天網之外晉書秃髮烏孤記窮髮遺虜未拔根株徼垂殘狡尚餘栽蘖而北踰翰漠折其肩髀南極江湖抽其腸胃雖骸骨僅存脂膏咸盡視息才舉魂魄久逰魏書胸奴劉聰傳天地大德降繁霜於秋令聖哲至仁著甲兵於刑典故知造化之有肅殺義在無私帝王之用干戈蓋非獲已隋書煬帝下帝紀驅率貔貅抑揚霆電南史梁本紀上大明發而萬物皆照大義發而萬物皆利大兵發而萬物皆服太公六韜發啓夫輕重强弱之形諸侯合則強孤則弱驥之材而百馬伐之驥必罷矣強最一伐而天下共之國必弱矣管子霸言故盟不如不盟然而有所謂善盟戰不如不戰然而有所謂善戰春秋繁露竹林夫有以咽藥而死者欲禁天下之醫非也有以乘舟而死者欲禁天下之船非也有以用兵而喪其國者欲禁天下之兵非也亢倉子兵道大國之攻小國譬猶童子之為馬也童子之為馬足用而勞今大國之攻小國也攻者農夫不得耕婦人不得織以守為事攻人者亦農夫不得耕婦人不得織以攻為事墨子耕柱午其軍取其將若撥䵄荀子富國兵有勝於朝廷有勝於原野有勝於市井尉繚子攻權家無怒笞則豎子嬰兒之有過也立見國無刑罰則百姓之互相侵也立見天子無誅伐則諸侯之相㬥也立見故怒笞不可偃於家刑罰不可偃於國誅伐不可偃於天下夫兵之不可偃也譬之若水火然善用之則為福不能用之則為禍若用藥者然得良藥則活人得惡藥則殺人義兵之為天下良藥也亦大矣呂氏春秋蕩兵軍大卒多而不能鬬衆不若其寡也夫衆之為福也大其為禍也亦大譬之若漁深淵其得魚也大其為害也亦大呂氏春秋决勝動之為物不損則益不成則毁不利則病皆險也道之者危故秦勝乎戎而敗乎殽楚勝乎諸夏而敗乎柏莒淮南子詮言訓已未能治也而攻人之亂是猶以火救火以水應水也何所能制淮南子兵略訓凡有血氣之蟲含牙帶角前爪後距有角者觸有齒者噬有毒者螫有蹄者跌喜而相戲怒而相害天之性也人有衣食之情而物弗能足也故羣居雜處分不均求不瞻則爭爭則強脅弱而勇侵怯人無筋骨之強爪牙之利故割革而為甲爍鐵而為刃淮南子兵略訓晉陽處父伐楚以救江故解捽者不在於捌格在於批伔淮南子說林訓商師若荼周師若烏鹽鐵論未通蒙公為秦擊走胸奴若鷙鳥之追羣雀鹽鐵論代功屠者解分中理可橫以手而離也至其抽筋鑿骨非行金斧不能决聖主循性而化有不從者亦將舉兵而征之鹽鐵論繇役大之伐小強之伐弱猶大魚之吞小魚也若虎之食豚也惡有其不得理說苑指武鵰鷹制兔伐楚有功焦氏易林大壯之遁不戰而屈人兵堯舜也霑頃漸襟堯舜乎衒玉而賈石者其徂詐乎揚子問道麟之儀儀鳳之師師其至矣乎螭虎桓桓鷹隼䎒䎒未至也揚子孝至次六大兵雷霆震其耳維用詘腹測曰大兵雷霆威震無疆也太𤣥經第三衆虎虓呼交切振廞欣金切如鷹之揚也太𤣥經第三衆上九斧刃蛾蛾利匠人之貞測曰蛾蛾之斧利征亂也太𤣥經第三衆比札為甲冠矜為㦸被甲何㦸以威不恪太𤣥經太𤣥棿水以療湯火以熟食兵以除亂夫何偃也呂氏春秋蕩兵解兵猶火也強則盛盛則衰淮南子原道訓解含血之蟲必有爪牙之用喜則共戲怒則相害人無爪牙故設兵革之器以自輔衛故國以軍為輔君以臣為佐輔彊則國安輔弱則國危武侯十六策治軍鞭朴廢於家則童僕怠惰征伐息於國羣下不䖍抱朴子外篇用刑禁令不明而嚴刑以靜亂廟算不精而窮兵以侵鄰猶釤禾以討蝗蟲伐木以殺蠧蝎食毒以中蚤虱徹舍以逐雀鼠抱朴子外篇博喻攻斷之盛莫絶乎火太𤣥經第二達解豐昦音杲之斡睛之奯音豁雷磤磤音隱電炟炟當葛反傳曰昦之斡日之轉也睛之奯目之動也雷磤磤其聲震也電炟炟其光睒也昔王由是動干戈耀兵威元包仲陽破城邑而取之言若拔樹木并得其根本也前漢書注高帝紀威亮火烈勢踰風掃拾代如遺偃齊猶草文選陸機功臣頌夫鷙鳥之擊先高攫鷙之勢也牧野之威孟津之退也文選陳琳檄吳將校文守似藩籬戰同枯朽文選陸陲石闕銘奮臂雲興騰跡虎噬陵險必夷摧剛則脆文選陸士衡功臣頌夫行天莫如龍行地莫如馬馬者甲兵之本國之大用安寧則以别尊卑之序有變則以濟逺近之難補文選馬援上銅馬式表戰如鬬雞勝者先鳴太平御覽羽族部雞武王曰五帝之時無守戰之具國存者何太公曰守戰之具皆在民間耒耜者是其弓弩也鋤爬者是其矛㦸也簦笠者是其兜鍪也鐮斧者是其攻戰之具也雞狗者是鉦鼓也太平御覽兵部營壘元戎屢征如風之騰初學記州郡部河北道人主者國之腹心也兵者國之威神也道德經指歸卷十二選將長子帥師以中行也弟子輿尸使不當也易師服不可加非其人兵不可任非其才孔氏傳書說命中維師尚父時維鷹揚詩大雅大明天下合從趙使魏加見楚春申君曰君有將乎曰有矣僕欲將臨武君魏加曰臣少之時好射臣願以射譬之可乎春申君曰可加曰異日者更羸與魏王處京臺之下仰見飛鳥更羸謂魏王曰臣為王引弓虛發而下鳥魏王曰然則射可至此乎更羸曰可有間鴈從東方來更羸以虛發而下之魏王曰然則射可至此乎更羸曰此孽也王曰先生何以知之對曰其飛徐而鳴悲飛徐者故瘡痛也鳴悲者久失羣也故瘡未息而驚心未去也聞弦者音烈而高飛故瘡隕也今臨武君嘗為秦孽不可為拒秦之將也戰國䇿楚考烈王夫將者國之輔也輔周則國必強輔隙則國必弱孫子謀攻今君四時使斬離皮革掩以朱漆畫以丹青爍以犀象冬日衣之則不溫夏日衣之則不涼為長㦸二丈四尺短㦸一丈二尺革車掩戶縵輪籠轂觀之於目則不麗乘之以田則不輕不識主君安用此也若以僃進戰退守而不求能用者譬猶伏雞之摶狸乳犬之犯虎雖有鬬心隨之死矣吳子圗國將帥者心也羣下者支節也其心動以誠則支節必力其心動以疑則支節必背夫將不心制卒不節動雖勝幸勝也尉繚子攻權昔者良將之用兵有饋簞醪者使投諸河與士卒同流而飲夫一簞之醪不能味一河之水而三軍之士思為致死者以滋味之及己也黃石公三略上勇則能决斷能决斷則能若雷電飄風㬥雨能若崩山破潰别辨霣墜若鷙鳥之擊也摶攫則殪中木則碎呂氏春秋决勝鼓不與於五音而為五音主水不與於五味而為五味調將軍不與於五官之事而為五官督故能調五音者不與五音者也能調五味者不與五味者也能治五官之事者不可揆度者也是故將軍之心滔滔如春􅀢􅀢如夏湫漻如秋典凝如冬因形而與之化隨時而與之移淮南子兵略訓良將之卒若虎之牙若兕之角若鳥之羽若蚈之足可以行可以舉可以噬可以觸強而不相敗衆而不相害一心以使之也淮南子兵略訓將以民為體而民以將為心心誠則支體親刃心疑則支體撓北心不專一則體不節動將不誠心則卒不勇敢淮南子兵略訓將者士之心也士者將之肢體也心猶與則肢體不用說苑指武子不聞越王勾踐之伐吳客有獻醇酒一器王使人注江之上流使士卒飲其下流味不及加美而士卒戰自五也異日有獻一囊糗糒者王又以賜軍士分食之甘不踰嗌而戰自十也今子為將士卒并分菽粒而食之子獨朝夕芻豢黍粱何也列女傳周列國楚子發母夫將者人命之所懸也成敗之所在也禍福之所繫也而上不假之以賞罰亦猶束猿猱之手而責之以騰捷膠離婁之目而使之辨青黃不可得也武侯心書假權為將者必有腹心耳目爪牙無腹心者如人夜行無所措手足無耳目者如冥然而居不知運動無爪牙者如饑人食毒物無不死矣故善將者必有博聞多智為腹心沈審謹密為耳目勇捍善敵者為爪牙武侯心書腹心將能執兵之權操兵之勢而臨羣下譬如猛虎加之羽翼而翶翔四海隨所遇而施之若將失權不操其勢亦如魚龍離於江湖中欲求游洋之勢奔濤戲浪何可得也武侯心書兵機有猛如熊虎捷若騰猿剛如鐵石利若龍泉此一時之雄也武侯心書三賔古之善將者養人如養己子有難則以身先之有功則以身後之武侯心書哀死夫將者人之司命國之利器先定其計然後乃行其令若漂水㬥至其獲若鷹隼之擊物靜若彊弩之張動如機關之發所向者破而勍敵自滅武侯十六䇿治軍工非魯般之目無以見其功巧戰非孫武之謀無以出其奇運武侯十六䇿治軍良將如山如淵人不知其戚亦不知其歡意林唐子不愛尺璧而愛寸陰者將難遭而易失也故良將之趍時也衣不解帶足不躡地太平御覽兵部將帥下良將剛則法天可望而不可干柔則象淵可觀而不可入去如收電可見而不可得留如山嶽可瞻而不可量太平御覽兵部良將上義兵上九王用出征有嘉折首獲匪其醜無咎易離王赫奮烈八方咸發髙城若地商庶若化汲冡周書武寤解左手杖鉞示無事於誅右手把旄示有事於教孔氏傳書牧誓草蟲鳴阜螽躍而從之天性也近西戎之諸侯聞南仲既征儼狁將伐西戎之命則跳躍而鄉望之如阜螽之聞草蟲鳴焉鄭氏箋詩出車明主之守也必折衝乎千里之外其征也袵席之上還師大戴禮記主言明主之征也猶時雨也至則民說矣大戴禮記主言誅其君而弔其民若時雨降民大悅孟子梁惠王下則鄰國之民仰之若父母矣率其子弟攻其父母自生民以來未有能濟者也孟子公孫丑上寧爾也非敵百姓也若崩厥角稽首孟子盡心下攻戰之道非師者雖有百萬之軍北之堂上雖有闔閭吳起之將禽之戶內千丈之城拔之尊爼之間百尺之衝折之袵席之上故鍾鼓竽瑟之音不絶地可廣而欲可成和樂倡優侏儒之笑不乏諸侯可同日而致也故名配天地不為尊利制海內不為厚戰國䇿齊閔王以桀詐桀猶巧拙有幸焉以桀詐堯譬之若以卵投石以指撓沸若赴水火入焉焦沒耳荀子議兵弓矢不調則羿不能以中微六馬不和則造父不能以致逺士民不親附則湯武不能以必勝也故善附民者是乃善用兵者也荀子議兵其民之親我歡若父母其好我芬若椒蘭彼反顧其上則若灼黥若仇讐人之情雖桀跖豈又肯為其所惡賊其所好者哉是猶使人之子孫自賊其父母也彼必將來告之夫又何可詐也荀子議兵齊之技擊不可以遇魏氏之武卒魏氏之武卒不可以遇秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義有遇之者若以焦熬投石焉荀子議兵治民者禁姦於未萌而用兵者服戰於民心禁先其本者治兵戰其心者勝韓非子心度夫以義誅不義若决江河而溉爝火臨不測而擠欲墮其克必矣黃石公三略下古之聖王有義兵而無有偃兵兵誠義以誅㬥君而振苦民民之說也若孝子之見慈親也若飢者之見美食也民之號呼而走之若強弩之射於深溪也若積大水而失其壅隄也吕氏春秋蕩兵今有人於此能生死一人則天下必爭事之矣義兵之生一人亦多矣人孰不說故義兵生則鄰國之民歸之若流水誅國之民望之若父母行地滋逺得民滋衆兵不接刃而民服若化呂氏春秋懷寵夫射儀度不得則格的不中驥一節不用而千里不至夫戰而不勝者非鼓之日也素行無刑人矣故得道之兵車不發轉騎不被鞍鼓不振塵旗不解卷甲不離矢刃不嘗血淮南子兵略訓獵者逐禽車馳人趨各盡其力無刑罰之威而相為斤闉要遮者同所利也同舟而濟於江卒遇風波百族之子捷捽招杼船若左右手不以相德其憂同也故明王之用兵也為天下除害而與萬民共享其利民之為用猶子之為父弟之為兄威之所加若崩山决塘敵孰敢當淮南子兵略訓所為立君者以禁㬥討亂也今乘萬民之力而反為殘賊是為虎傅翼曷為弗除夫畜池魚者必去猵獺養禽獸者必去豺狼又况治人乎故聖人之用兵也若櫛髮耨苗所去者少而所利者多民之思兵也若旱而望雨渴而求飲夫有誰與交兵接刃者乎淮南子兵略訓且仁人之兵聚則成卒散則成列延居則若莫邪之長刃嬰之者斷兊居則若莫邪之利鋒當之者潰圓居則若丘山之不可移也方居則若磐石之不可拔也觸之角摧折節而退爾韓詩外篇夫以知謀愚以義伐不義若因秋霜而振落葉鹽鐵論論功仁人之兵鋌則若莫邪之利刃嬰之者斷鋭則若莫邪之利鋒當之者潰圓居而方止若盤石然觸之者隴種而退耳夫又何可詐也新序雜事三次二兵無刃師無陳麟或賔之溫測曰兵無刃德服無方也太𤣥經第三衆義兵除天下之凶殘解百姓之倒懸而生育之故方之於良藥呂氏春秋蕩解刑之與兵猶足與翼也走用足飛用翼形體雖異其行身同刑之與兵全衆禁邪其實一也王充論衡儒增篇要地華之衛幹如諸夏之衛京師故知幹如京師其華猶諸夏也毛詩正義苕之華有蛇於此擊其尾其首救擊其首其尾救擊其中身首尾皆救今梁者天下之脊也夫秦攻梁者是示天下要斷山東之脊也是山東首尾皆救中身之時也戰國䇿魏哀王韓天下之咽喉魏天下之胸腹戰國䇿秦始皇帝夫與人鬬不扼其骯拊其背未能全其勝也今陛下入關而都案秦之故地此亦扼天下之骯而拊其背也史記劉敬傳淮陽之北大諸侯厪如黑子之著靣適足以餌大國耳前漢書賈誼傳彼坎井之潢汙固不容夫吞舟且洛邑之渟瀯曷足以居乎萬乘哉後漢書文苑傳疆界雖逺而其險要必爭之地不過數四猶人雖有八尺之軀靡不受患其護風寒亦數處耳吳志孫晧傳注譬如金城萬雉所急防者四門而已吳志孫晧傳注韓之形勢足以扞四靣之敵通諸侯之盟而中臨天下呼則諸侯應招則諸侯來若長江盤紆于中而九𣲖之流為之爭赴而下注也天祿閣外史形勢天子所都曰京師京水也地下之衆者莫過於水地上之衆者莫過於人獨斷見三苗之傾殄則知川源之未可恃也覩翳幽之不守則覺嚴嶮之不足賴也抱朴子外篇君道且夫僻界西戎險阻四塞修其防禦孰與處乎土中平夷洞達萬方輻凑秦嶺九嵕涇渭之川曷若四瀆五嶽帶河泝洛圗書之淵建章甘泉館御列仙孰與靈臺明堂統和天人太液昆明鳥獸之囿曷若辟雍海流道德之富游俠踰侈犯義侵禮孰與同履法度翼翼濟濟文選東都賦中牟三國之股肱邯鄲之肩髀事文類聚縣尹韓子天以日月為綱地以四海為紀九土星分萬國錯跱崤函有帝皇之宅河洛為王者之里玉海地里異域圗書㬥兵火炎昆岡玉石俱焚天吏逸德烈于猛火書𦙍征吳日敝于兵㬥骨如莾左傳哀公元年征伐之道不過用兵服則可以退不服則可以進火之盛炎水之盛衝雖欲服罪不可復禁故疾其㬥而不仁也何休解公羊桓公七年古者天子之始封諸侯也萬有餘今以并國之故萬國有餘皆滅而四國獨立此譬猶醫之藥萬有餘人而四人愈也則不可謂良醫矣墨子非攻下君子之用兵莫見其形其功已成野人之用兵也鼓聲則似雷號呼則動地塵氣充天流失如雨扶傷輿死履腸涉血無罪之民其死者量于澤矣而國之存亡主之死生猶不可知也其離仁義仁亦逺矣吕氏春秋期賢凡春秋之記災異也雖畝有數莖猶謂之無麥苖也今天下之大三百年之久戰攻侵伐不可勝數而復讐者有二焉是何以異于無麥苖之有數莖哉不足以難之故謂之無義戰也春秋繁露竹林火之所務焚燒山林不别嘉榖太𤣥經二務解破取城邑誅殺其人如屠六畜然前漢書注髙帝紀百萬之虜俄成魚鱉千仭之阜倐似滄瀛藝文類聚靈異部魂魄賦喻林卷一百七
