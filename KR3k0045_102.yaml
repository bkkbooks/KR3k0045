body:
  text: 喻林卷一百二明徐元太撰政治門七尚威險峭之極不可升也嚴法峻整難可犯也王弼注易習坎韓子曰慈母有敗子而嚴家無格虜者何也則能罰之加焉必也史記李斯傳布帛尋常庸人不釋鑠金百鎰盜跖不摶者非庸人之心重尋常之利深而盜跖之欲淺也又不以盜跖之行為輕百鎰之重也摶必隨手刑則盜跖不摶百鎰而罰不必行也則庸人不釋尋常是故城高五丈而樓季不輕犯也泰山之高百仞而跛牂牧其上夫樓季也而難五丈之限豈跛牂也而易百仞之高哉峭塹之勢異也史記李斯傳屠牛坦一朝解十二牛而芒刃不頓者所排擊剝割皆衆理解也至於髖髀之所非斤則斧夫仁義恩厚人主之芒刃也權藝法制人主之斤斧也今諸矦王皆衆髖髀也釋斤斧之用而欲嬰以芒刃臣以為不缺則折前漢書賈誼傳馭黠馬者利其銜策梁國大都吏民凋敝且當以柱後惠文彈治之耳前漢書張敞傳又不應弦垂翅人誰復憚晉書傅玄傳惠者民之仇讎法者民之父母周書樂運傳水平而不流無源則遫竭雨平而雲不甚無委雲雲則遫已政平而無威則不行管子侈靡以良民治必亂至削以姦民治必治至強商子説民威以一取十以聲取實故能為威者王商子去強能生不能殺曰自攻之國必削能生能殺曰攻敵之國必強商子去強其刑罰重而信其誅殺猛而必黭然而雷擊之如牆厭之荀子強國夫惜草茅者耗禾穗惠盜賊者傷良民今緩刑罰行寬惠是利姦邪而害善人也韓非子難二古今異俗新故異備如欲以寬緩之政治急世之民猶無轡策而御駻馬此不知之患也韓非子五蠧布帛尋常庸人不釋鑠金百鎰盜跖不掇不必害則不釋尋常必害則手不掇百鎰故明主必其誅也韓非子五蠧十仞之城樓季弗能踰者峭也千仞之山跛牂易牧者夷也故明王峭其法而嚴其刑也韓非子五蠧人之情性莫先於父母父母皆見愛而未必治也君雖厚愛奚遽不亂今先王之愛民不過父母之愛子子未必不亂也則民奚遽治哉韓非子五蠧今有不才之子父母怒之弗為改鄉人譙之弗為動師長教之弗為變夫以父母之愛鄉人之行師長之智三美加焉而終不動其脛毛不改州部之吏操官兵推公法而求索姦人然後恐懼變其節易其行矣故父母之愛不足以教子必待州部之嚴刑者民固矯於愛聽於威矣韓非子五蠧治賊非治所揆也治所揆也者是治死人也刑盜非治所刑也治所刑也者是治胥靡也故曰重一姦之罪而止境內之邪此所以為治也重罰者盜賊也而悼懼者良民也欲治者奚疑於重刑韓非子六反先聖有諺曰不躓於山而躓於垤山者大故人慎之垤微小故人易之也今輕刑罰民必易之犯而不誅是驅國而棄之也犯而誅之是為民設陷也是故輕罪者民之垤也以輕罪之為民道也非亂國也則設民陷也韓非子六反故母厚愛處子多敗推愛也父薄愛教笞子多善用嚴也韓非子六反凡人之生也財用足則隳於用力上治懦則肆於為非財用足而力作者神農也上治懦而行修者曾史也夫民之不及神農曾史亦已明矣韓非子六反母之愛子也倍父父令之行於子也十母吏之於民無愛令之行於民也萬父母積愛而令窮吏用威嚴而民聽從嚴愛之策亦可決矣韓非子六反今家人之治産也相忍以飢寒相強以苦勞雖犯軍旅之難飢饉之患溫衣美食者必是家也相憐以衣食相惠以佚樂天飢歲荒嫁妻賣子者必是家也故法之為道前苦而長利仁之為道偷樂而後窮聖人權其輕重出其大利故用法之相忍而棄仁人之相憐也韓非子六反慈母之於弱子也愛不可為前然而弱子有僻行使之隨師有惡病使之事醫不隨師則陷於刑不事醫則疑於死慈母雖愛無益於振刑救死則存子者非愛也子母之性愛也臣主權策也母不能以愛存家君安能以愛持國韓非子八説荆南之地麗水之中生金人多竊采金采金之禁得而輒辜磔於市甚衆壅離其水也而人竊金不止夫罪莫重辜磔於市猶不止者不必得也故今有於此曰豫汝天下而殺汝身庸人不為也夫有天下大利也猶不為者知必死故不必得也則雖辜磔竊金不止知必死雖豫之天下不為也韓非子內儲説上夫火形嚴故人鮮灼水形懦故人多溺子必嚴子之刑無令溺子之懦韓非子內儲説上董閼于為趙上地守行石邑山中間深峭如牆深百仞因問其旁鄉左右曰人嘗有入此者乎對曰無有曰嬰兒癡聾狂悖之人嘗有入此者乎對曰無有牛馬犬彘嘗有入此者乎對曰無有董閼于喟然大息曰吾能治矣使吾法之無赦猶入澗之必死也則人莫之敢犯也何為不治之韓非子內儲説上夫嚴家無悍虜而慈母有敗子吾以此知威勢之可以禁暴而德厚之不足以止亂也韓非子顯學宋人有取道者其馬不進倒而投之鸂水又復取道其馬不進又倒而投之鸂水如此者三雖造父之所以威馬不過此矣不得造父之道而徒得其威無益於御人主之不肖者有似於此不得其道而徒多其威威愈多民愈不用譬之若鹽之於味凡鹽之用有所託也不適則敗託而不可食威亦然必有所託然後可行吕氏春秋用民夫人之好色非脂粉所能飾大怒之威非氣力所能行也陸子本行夫負千鈞之重以登無極之髙垂峻崖之峭谷下臨不測之淵雖有慶忌之健賁育之勇莫不震懾悚栗者知墜則身首肝腦塗山石也故未嘗灼而不敢握火者見其有灼也未嘗傷而不敢握刃者見其有傷也故立法制辟若臨百仞之壑握火陷刃則民畏忌而無敢犯禁矣鹽鐵論周秦慈母有敗子小不忍也嚴家無悍虜督責急也今不立嚴家之所以制下而修慈母之所以敗子則惑矣鹽鐵論周秦千仞之髙人不輕凌千鈞之重人不輕舉鹽鐵論刑德嚴牆三仞樓季難之山髙干雲牧豎登之故峻則樓季難三仞陵夷則牧豎易山巔夫鑠金在罏莊蹻不顧錢刀在路匹婦掇之非匹婦貪而莊蹻亷也輕重之制異而利害之分明也鹽鐵論詔聖當此之時不任斤斧折之以武而乃始設禮修文有似窮醫欲以短針而攻疽孔丘以禮説跖也鹽鐵論大論荆木冬生司寇緩刑焦氏易林歸妹之乾次四援我罘罟絓羅于野至測曰援我罘罟不能以仁也太玄經第三應譬存玄胎息呼吸吐納含景內視熊經島伸者長生之術也然艱而且遲為者鮮成能得之者萬一焉病篤痛甚身困命危則不得不攻之以針石治之以毒烈若廢和鵲之方而慕松喬之道則死者衆矣仁之為政非為不美也然黎庶巧偽趨利忘義若不齊之以威糾之以刑逺羡羲農之風則亂不可振其禍深大以殺止殺豈樂之哉抱朴子外篇用刑明病之術者杜未生之疾達治亂之要者遏將來之患若乃以輕刑禁重罪以薄法衛厚利陳之滋章而犯者彌多有似穿穽以當路非仁人之用懷也抱朴子外篇用刑六軍如林未必皆勇排鋒陷火人情所憚然恬顏以勸之則投命者鮮斷斬以威之則莫不奮擊故役歡笑者不及叱吒之速用誘悅者未若刑戮之齊抱朴子外篇用刑刀鈍礪之以砥筆秃銛之以刀申韓行法以救亂如刀砥亦所以利之也揚子法言注問道篇撞洪鐘伐靈鼓旁震八鄙軯礚隱訇若疾霆轉雷而激迅風也文選東京賦政如冰霜姦宄消亡威如雷霆寇賊不生意林正部夫火之焚人也甚於怠農慎火之力也輕於秬耘通邑大都有嚴令則火稀無嚴令則燒者數非賞罰不能濟也藝文類聚産業部田論函牛之鼎沸蟻不得措一足困學紀聞卷十諸子當怒不怒子為豺狼弟為兕虎當鬭不鬭妻為敵國妾為大寇道德經指歸卷十二猶如兩牛共一軛有人隨後捶豈得不挽重出曜經三愛品簡易亨魚煩則碎治民煩則散知亨魚則知治民矣毛詩匪風孔子過泰山側有婦人哭於墓者而哀夫子式而聽之使子路問之曰子之哭也一似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛於虎也禮記檀弓下布指知寸布手知尺舒肘知尋十尋而索百步而堵三百步而里千步而井大戴禮記王言善為政者綱舉而網疏綱舉則所羅者廣網疏則小必漏所羅者廣則為政不苛晉書劉頌傳去弊拯民必存簡恕捨網修綱雖煩易理宋書武帝中本紀推則往召則來如墜重於髙如瀆水於地故法不煩而吏不勞管子七臣七主夫水濁則無掉尾之魚政苛則無逸樂之士故令煩則民詐政擾則民不定不治其本而務其末譬如拯溺錘之以石救火投之以薪鄧析子無厚明主之表易見故約立其教易知故言用其法易為故令行三者立而上無私心則下得循法而治望表而動隨繩而斫因攢而縫韓非子用人事大衆而數搖之則少成功藏大器而數徙之則多敗傷烹小鮮而數撓之則賊其澤治大國而數變法則民苦之是以有道之君貴靜不重變法故曰治大國者若烹小鮮韓非子解老治身者神不勞治國者民不擾故可長久河上公注老子立戒烹小魚不去腸不去鱗不敢撓恐其麋也治國煩則下亂治身煩則精散河上公注老子居位削薄其德曾纍其刑而欲以為治無以異於執彈而來鳥捭梲而狎犬也亂乃逾甚夫水濁則魚噞政苛則民亂故夫養虎豹犀象者為之圈檻供其嗜欲適其飢飽違其怒恚然而不能終其天年者刑有所劫也是以上多故則下多詐上多事則下多態上多求則下交爭不直之於本而事之於末譬猶揚堁而彌塵抱薪以救火也故聖人事省而易治求寡而易贍淮南子主術訓夫責少者易償職寡者易守任輕者易權上操約省之分下效易為之功是以君臣彌久而不相厭淮南子主術訓水濁者魚噞令苛者民亂城峭者必崩岸峭者必陀故商鞅立法而支解吳起刻削而車裂治國辟若張瑟大弦䋎則小絃絶矣故急轡數策者非千里之御也淮南子繆稱訓員之中規方之中矩行成獸止成文可以將少而不可以將衆􅖋菜成行瓶甌有堤量粟而舂數米而炊可以治家而不可以治國滌杯而食洗爵而飲浣而後饋可可以養家老而不可以饗三軍非易不可以治大非簡不可以合衆淮南子詮言訓軍多令則亂酒多約則辨亂則降北辨則相賊故始於都者常大於鄙始於樂者常大於悲其作始簡者其終本必調今有美酒嘉肴以相饗卑體婉辭以接之欲以合歡爭盈爵之間反生鬭鬭而相傷三族結怨反其所憎此酒之敗也淮南子詮言訓水濁則魚困令苛則民亂城峭則必崩岸竦則必阤説苑政理寸而度之至丈必差銖而稱之至石必過石稱丈量徑而寡失簡絲數米煩而不察故大較易為智曲辨難為慧説苑談叢河出小魚不宜勢煩苛政害民君受其患焦氏易林無妄之豐次七蜜網離于淵不利于鱗測曰蜜網離淵苛法張也太玄經第三法網離于淵鱗物所害猶苛法於世百姓之疾也太玄經第三法解水濁無掉尾之魚土埆無葳𬎼之木政煩無逸樂之民劉子愛民密網裁而魚駭宏羅制而鳥驚補文選陶潛感士不遇賦太古質簡制事朴略故耒耜未用於牛而弧矢不加筋鐵智非暗也藝文類聚刑法部刑法議魚驚網密鳥亂弓多文苑英華薛道衡碑威行法明漏吞舟之魚法不明則類於細櫛細櫛則苛慝生也太平御覽服用部梳箆吳起教楚悼王損不急之枝官注謂非要急若樹之枝也養樹者必披落其枝為政者亦損其間冗困學紀聞卷十諸子農人之治田務去其殊類歸於齊一也不急其荒病除其所以荒病上承天命下綏百姓莫過於此道德經注節力天地節而四時成節以制度不傷財不害民易節有冽氿音軌泉無浸􅀈薪契契寤歎哀我憚丁佐反人薪是􅀈薪尚可載也哀我憚人亦可息也詩小雅大東何草不黃桓王之世伐滕薛唐把諸國連歲不息周人苦之而作是詩詩説王嶄嶄之石桓王伐鄭將帥不堪勞苦而作是詩詩説王園有桃其實之殽國有民得其力毛詩桃有園􅀈落木名也既伐而析之以為薪不欲使氿泉浸之浸之則將濕腐不中用也民人之勞苦者亦不欲使周之賦斂小東大東極盡之極盡之則將困病亦猶是也鄭氏箋詩大東若弓久張而不落弦則絶其弓力喻民久勞而不息則亦損民之力也禮記正義雜記下且譬之如天其有五材而將用之力盡而敝之是以無拯不可沒振左傳昭公十一年國之用民當隨其力任如金冶之器隨器而制形故言形民之力去其醉飽過盈之心杜氏解左傳昭公十二年國之用民當隨其力任量其力之所堪而任用之不使勞役過其所堪也如金冶之器隨器而制形者春秋正義昭公十二年鑄冶之家將作器而制其模謂之為形用民之力依模用之故言形民之力也春秋正義昭公十二年若用民力當隨其所能而制其形模依比形模用民之力而無有醉飽盈溢之心也春秋正義昭公十二年古之君人者必時視民之所勤民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢矣穀梁莊公二十九年財盡則怨力盡則懟君子危之穀梁莊公三十一年魯定公問於顏回曰子亦聞東野畢之善御乎對曰善則善矣然其馬將必佚公曰何以知之對曰以政知之昔者帝舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無佚民造父無佚馬今東野畢之御也升馬執轡御體正矣步驟馳騁朝禮畢矣厯險致逺馬力盡矣然而猶乃求馬不已臣以此知之公曰吾子之言其義大矣願少進乎回曰臣聞之鳥窮則啄獸窮則攫人窮則詐馬窮則佚自古及今未有窮其下而能無危者也孔子家語顔回夫山林不能給野火江海不能實漏巵皆所宜禁也後漢書王符列傳其為艱難譬䇿羸馬以取道里豈可不加意愛惜其力哉魏志杜畿傳鼓繁氣易衰呌數力易竭宋書桞元景傳大暑而疾馳甚者馬死薄者馬傷晏子諫上布帛不可窮窮不可飾牛馬不可窮窮不可服士不可窮窮不可任國不可窮窮不可竊也晏子春秋雜下夫婦節而天地利風雨節而五穀熟衣服節而肌膚和墨子辭過古之牧天下者不使匠石極巧以敗太山之體不使賁育盡威以傷萬民之性韓非子大體冬日之閉凍也不固則春夏之長草木也不茂天地不能常侈常費而况於人乎故萬物必有盛衰萬事必有弛張國家必有文武官治必有賞罰是以智士儉用其財則家富聖人愛寶其神則精盛人君重戰其卒則民衆韓非子解老視強則目不明聽甚則耳不聰思慮過度則智識亂目不明則不能決黑白之分耳不聰則不能别清濁之聲知識亂則不能審得失之地韓非子解老今説者曰百里之海不能飲一夫三尺之泉足止三軍渴臣謂欲生於無度邪生於無禁尉繚子治本東野稷以御見莊公進退中繩左右旋中規莊公曰善以為造父不過也使之鉤百而少及馬顔闔入見莊公曰子遇東野稷乎對曰然臣遇之其馬必敗公曰將何敗少頃東野之馬敗而至莊公召顔闔而問之曰子何以知其敗也顏闔對曰夫進退中繩左右旋中規造父之御無以過焉嚮臣遇之猶求其馬臣是以知其敗也故亂國之使其民不論人之性不反人之情煩為教而過不識數為令而非不從巨為危而罪不敢重為任而罰不勝民進則欲其賞退則畏其罪知其能力之不足也則以為繼矣以為繼知則上又從而罪之是以罪召罪上下之相讐也由是起矣故禮煩則不莊業煩則無功令苛則不聽禁多則不行吕氏春秋適威矢之於十步貫兕甲於三百步不能入魯縞騏驥一日千里其出致釋駕而僵淮南子説山訓昔者舜工於使人造父工於使馬舜不窮其民造父不極其馬者以故舜無佚人造父無佚馬韓詩外傳馬不調造父不能超千里之迹民不附唐虞不能致同天之美馬極則變態生而傾憤惟憂矣民困則多離叛其禍必振矣抱朴子外篇君道民財匱矣而求不已下力竭矣而役不休欲怨難而不生親其寧之惟永猶斷根以續枝割背以禆腹刻目以廣明剜耳以開聰也抱朴子外篇博喻夫善御者將以盡其能也盡能在於自任而乃走作驟步求其過能之用故有不堪而多死馬若任駑驥之力適遲疾之分雖足迹接乎八荒之表而衆馬之性全矣郭子注莊馬蹄足寒傷心民勞傷國足溫而心平人佚而國寧劉子愛民人君苑囿禽獸故穀人竭力於晝也土木衣綈錦故絲人竭力於夜也晝夜竭力而猶不足是故為惡政揚子法言注先知篇古有弟子病師數往看之師至弟子輒起因勞而致死師非不仁弟子非無禮傷於數也意林魏子弓折由射者之數劒缺因用之者多太平御覽兵部弓御者箠策示有威怒東野之敗督責過度太平御覽兵部障泥武王曰吾欲造起居之誡隨之以身箠書曰馬不可極民不可劇馬極則躓民劇則敗玉海聖文御製賦書井曰原泉滑滑連旱則絶取事有常賦斂有節玉海踐阼篇集解譬如智者籌量牛力所堪多小不令過分以竭其力佛遺教經羊五喻林卷一百二
