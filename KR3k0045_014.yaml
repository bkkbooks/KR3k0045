body:
  text: 喻林卷十四明徐元太撰人事門十二重生身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本傷其本枝從而亡禮記哀公問譬如斬手全軀所存者大故爾北史羊祉烈傳所貴乎嗜粱肉者非腐鼠之謂也所貴乎飲醪醴者非敗酒之謂也所貴乎尊生者非迫生之謂也子華子陽城胥渠問禽子問於楊朱曰去子體之一毛以濟一世汝為之乎楊子曰世固非一毛之所濟禽子曰假濟為之乎楊子弗應禽子去語孟孫揚孟孫揚曰子不達夫子之心吾請言之有侵若肌膚獲萬金者若為之乎曰為之孟孫揚曰有斷若一節得一國子為之乎禽子默然有間孟孫揚曰一毛微於肌膚肌膚微於一節省矣然則積一毛以成肌膚積肌膚以成一節一毛固一體萬分中之一物奈何輕之乎禽子曰吾不能所以答子然則以子之言問老𥅆關尹則子言當矣以吾言問大禹墨翟則吾言當矣列子楊朱無趾曰吾唯不知務而輕用吾身吾是以亡足今吾來也猶有尊足者存吾是以務全之也莊子德充符自三代以下者天下莫不以物易其性矣小人則以身殉利士則以身殉名大夫則以身殉家聖人則以身殉天下故此數子者事業不同名聲異號其於傷性以身為殉一也臧與榖二人相與牧羊而俱亡其羊問臧奚事則挾策讀書問榖奚事則博塞以遊二人者事業不同其於亡羊均也伯夷死名於首陽之下盜跖死利於東陵之上二人者所死不同其於殘生傷性均也奚必伯夷之是而盜跖之非乎天下盡殉也彼其所殉仁義也則俗謂之君子其所殉貨財也則俗謂之小人其殉一也則有君子焉有小人焉若其殘生損性則盜跖亦伯夷已又惡取君子小人於其間哉莊子駢拇道之真以治身其緒餘以為國家其土苴以治天下今世俗之君子多危身棄生以殉物豈不悲哉今且有人於此以隨侯之珠彈千仞之雀世必笑之是何也則其所用者重而所要者輕也夫生者豈特隨侯之重哉莊子讓王今謂人曰豫子冠履而斷子之手足子為之乎必不為何故則冠履不若手足之貴也又曰豫子天下而殺子之身子為之乎必不為何故則天下不若身之貴也墨子貴義出則以車入則以輦務以自佚命之曰招蹶之機肥肉厚酒務以相強命之曰爛腸之食靡曼皓齒鄭衛之音務以自樂命之曰伐性之斧三患者貴富之所致也故古之人有不肯貴富者矣由重生故也非夸以名也為其實也吕氏春秋本生倕至巧也人不愛倕之指而愛已之指有之利故也人不愛崑山之玉江漢之珠而愛已之一蒼璧小璣有之利故也今吾生之為我有而利我亦大矣論其貴賤爵為天子不足以比焉論其輕重富有天下不可以易之論其安危一曙失之終身不復得此三者有道者之所慎也有慎之而反害之者不達乎性命之情也是師者之愛子也不免乎枕之以粳是聾者之養嬰兒也方雷而窺之於堂有殊弗知慎者吕氏春秋重已魏王將入秦魏敬謂王曰以河內孰與梁重王曰梁重又曰梁孰與身重王曰身重又曰若使秦求河內則王將與之乎王曰弗與也魏敬曰河內三論之下也身三論之上也秦索其下而王弗聽索其上而王聽之臣竊不取也王曰甚然乃輒輟行吕氏春秋應言身者所為也天下者所以為也審所以為而輕重得矣今有人於此斷首以易冠殺身以易衣世必惑之是何也冠所以飾首也衣所以飾身也殺所飾要所以飾則不知所為矣世之走利有似於此危身傷生刈頸斷頭以徇利則亦不知所為也韓魏相與爭侵地昭釐侯有憂色子華子曰今使天下書銘於君之前書之曰左手攫之則右手廢右手攫之則左手廢然而攫之必有天下君將攫之乎亡其不與昭釐侯曰寡人不攫也子華子曰甚善自是觀之兩臂重於天下也身又重於兩臂韓之輕於天下逺今之所爭者其輕於韓又逺君固愁身傷生以憂之臧不得也昭釐侯曰善子華子可謂知輕重矣吕氏春秋審為尊勢厚利人之所貪也使之左據天下圖而右手刎其喉愚夫不為由此觀之生尊於天下也淮南子精神訓人之所以樂為人主者以其窮耳目之欲而適躬體之便也今髙臺層榭人之所麗也而堯朴桶不斷素題不枅珍怪竒異人之所美也而堯糲粢之飯藜藿之羮文繡白狐人之所好也而堯布衣掩形鹿裘御寒養性之具不加厚而增之以任重之憂舉天下而傳之於舜若解重負然非直辭讓誠無以為也此輕天下之具也淮南子精神訓生所假也死所歸也故𢎞演直仁而立死王子閭張掖而受刃不以所託害所歸也故世治則以義衛身世亂則以身衛義死之日行之終也故君子慎一用之淮南子繆稱訓剝牛皮鞟以為鼓正三軍之衆然為牛計者不若服於軛也狐白之裘天子被之而坐廟堂然為狐計者不若走於澤淮南子説山訓夫以君子而與小人相賊害是人之所謂以狐白補犬羊身塗其炭豈不過甚矣哉説苑貴德屠犀為甲給乎専征之服裂翠為華集乎后妃之首雖出幽谷遷於喬木然為二物之計未若棲竄於林薄攝生乎榛藪也故靈龜寧曳尾於塗中而不願巾笥之寶澤雉樂十步之啄以違雞鶩之禍抱朴子外篇博喻夫全生者天下之所謂祥也巫祝以不材為不祥而弗用彼乃以不祥全生乃大祥也郭子注莊人間世年長心勞無愛樂之志是猶羊肉不慕蟻也莊子音義徐無鬼龜祝骨於宗祧兮思反身於緑衣文選秋興賦今人用其身也若㸑之然故曰不足若用之於善則與天地相弊藝文類聚木部桂桐生叢谷裏根孤地寒隂未霜葉已肅不風條自吟不願見雕斫為君堂上琴藝文類聚木部桐詩且劇圖刎首愚者不為運斧全身庸流所鑒何則生輕一髮自重千鈞不以賈盜明矣文苑英華徐陵遷譴上書死王樂生鼠雖為帝王死不及生鼠太平御覽獸部鼠君不見夫效祀之牛衣之以朱綵食之以禾粟非不樂也及其用時鼎鑊在前刀爼列後當此之時雖欲還就孤犢寧可得乎太平御覽樂部歌二夫德之在人猶父母於身也其於萬物猶珠玉之與瓦鉛也是以含德之士重身而輕天下猶慈父孝子不以其有易其鄰大身而細物者猶良賈察商不以珠玉易瓦鉛也道德經指歸卷十譬如重病之人不擇良日時節吉凶唯求良醫元陽妙經卷七悼菌蟪之危促羡靈椿兮未央雖鵬鷃之異類託逍遙乎一方華陽陶隱居集如壘仰之髙峰觸之則散再擊則破金庭無為妙經猶如護一目愛惜不令傷大乘妙林經偈臂如金師有持百金來授其手語言此物王遣付汝令造種種妙莊嚴具宜急用意一月使成如期不成或復粗惡當斬汝首定不相赦金師聞已身心戰怖晝夜精勤竭思營造未曽暫起諸餘作意唯作是念我當云何如王所期嚴具成辦其人乃至嚴具未成中間雖有飲食等事而都不作飲食等想但於金所心心相續思搆變易作莊嚴具何以故彼極愛重自身命故波羅蜜多經卷五百八十身之內與外夫城骨與墻肉血為塗嚴為怨所破壞內身觀章句經令十腳骨上脛骨接之脛骨上䏶骨接之䏶骨上脊骨接之脊骨上髑髏接之骨骨相柱危如纍卵思惟要略法臂如賈客入海採寶垂出大海其船卒壞珍寶失盡而自喜慶舉手而言幾失大寶衆人怪言汝失財物裸形得脫云何喜言幾失大寶答言一切寶中人命第一大智度論卷十三故前有隋珠後有虓虎見之走而不敢取何也先其命而後其利也𢎞明集牟子理惑論如有一人在須彌山上以纖縷下之一人在下持針迎之中有旋嵐猛風吹縷難入針孔人身難得甚過於是法苑珠林卷二十三兀兀雜類莫不貪生蠢蠢迷徒咸知畏死所以失林窮虎乃委命於廬中鎩翮驚禽遂投身於案側法苑珠林卷六十五養生山下有雷頥君子以慎言語節飲食易頥山止於上雷動於下頥之為用下動上止故曰山下有雷頥人之開發言語咀嚼飲食皆動頥之事故君子觀此頥象以謹慎言語裁節飲食先儒云禍從口出患從口入故於頥養而慎節也周易正義頥舒慘殊方炎涼異節木皮春厚桂樹冬榮周書王褒傳夫耳之所欲聞者音聲而不得聽謂之閼聰目之所欲見者美色而不得視謂之閼明鼻之所欲向者椒蘭而不得嗅謂之閼顫口之所欲道者是非而不得言謂之閼智體之所欲安者美厚而不得從謂之閼適意之所欲為者放逸而不得行謂之閼性列子楊朱室大則多隂臺髙則多陽多隂則蹶多陽則痿此隂陽不適之患也是故先王不處大室不為髙臺味不衆珍衣不燀熱吕氏春秋重已嗜肉者非腐鼠之謂也嗜酒者非敗酒之謂也尊生者非迫生之謂也吕氏春秋貴生今夫樹木者灌以瀿水疇以肥壤一人養之十人拔之則必無餘􅀈有况與一國同伐之哉雖欲久生豈可得乎淮南子淑真訓鶴之所以壽者無宛氣於中是故食氷猿之所以壽者好引其末是故氣四越天氣常不施於地是故道者亦引氣於足天之氣常動而不滯是故道者亦不死氣春秋繁露解天之道人能以氣為根以精為蒂如樹根不深則拔蒂不堅則落河上公注老子守道語曰圖王不成其弊可以霸霸者王之弊也霸本當至於王猶壽當至於百也不能成王退而為霸不能至百消而為夭王充論衡氣壽篇且人之生也以食為氣猶草木生以土為氣矣拔草木之根使之離土則枯而蚤死閉人之口使之不食則餓而不壽矣王充論衡道虛篇火蠶十八日寒蠶三十日餘以不得踰時之命而將養有過倍之隆溫肥者早終涼瘦者遲竭斷可識矣圉馬養而不乘用皆六十嵗體疲者速雕形全者難斃又可知矣嵇中散集答難養生論嘗有不知蠶者出口動手皆為忌祟不得蠶絲滋甚為忌祟滋多猶自以犯之也有教之知蠶者其顓於桑火寒暑燥濕也於是百忌自息而利十倍何者先不知所以然故忌祟之情繁後知所以然故求之之術正故忌祟生於不知使知性猶如蠶則忌祟無所立矣嵇中散集宅無吉凶攝生論防堅則水無漉棄之費脂多則火無寢曜之患龍泉以靡割常利斤斧以日用速弊隱雪以違暖經夏藏氷以居深過暑單帛以褁鏡不灼凡卉以偏覆越冬泥壤易消者也而陶之為瓦則與二儀齊其久焉柞栁速朽者也燔之為炭則可億載而不敗焉轅豚以優稸晚卒良馬以陟峻早斃寒蟲以適已倍壽南林以處溫長茂接煞氣則雕瘁於凝霜值陽和則鬱藹而條秀物類一也而榮枯異功豈有秋收之常限冬藏之定例哉而人之受命死生之期未若草木之於寒天也而延養之理補救之方非徒溫暖之為淺益也久視之效何為不然而世人守近習隘以仙道為虛誕謂黃老為妄言不亦惜哉抱朴子內篇至理一人之身一國之象也胸腹之位猶宫室也四肢之列猶郊境也骨節之分猶百官也神猶君也血猶臣也氣猶民也故知治身則能治國也夫愛其民所以安其國養其氣所以全其身民散則國亡氣竭則身死死者不可生也亡者不可存也是以至人消未起之患治未病之疾醫之於無事之前不追之於既逝之後民難養而易危也氣難清而易濁也故審威德所以保社稷割嗜欲所以固血氣抱朴子內篇地真假求於外物以自堅固有如脂之養火而火不滅銅青塗腳入水不腐此是借銅之徑以扞其肉也抱朴子內篇金丹夫五榖猶能活人人得之則生人絶之則死又况於上品之神藥其益人豈不萬倍於五榖耶抱朴子內篇金丹夫木槿楊栁斷殖之更生倒之亦生橫之亦生生之易者莫過斯木也然埋之既淺又未得久乍刻乍剝或搖或拔雖壅以膏壤浸以春澤猶不脫於枯瘁者以其根荄不固不暇吐其萌芽浸液不得遂結其生氣也人生之為體易傷難養方之二木不及逺矣而所以攻毁之者過於刻剝劇乎搖拔也濟之者鮮壞之者衆死其宜也抱朴子內篇極言俱食一物或獨以結病非此物之有偏毒也鈞器齊飲而或醒或醉者非酒勢之有彼此也同冒炎暑而或獨以暍死者非天熱之有公私也齊服一藥而或昏瞑煩悶者非毒烈之有愛憎也抱朴子內篇極言衝風赴林而枯柯先摧洪濤凌崖而拆隙首頽烈火燎原而燥卉前焚龍碗墜地而脆者獨破由兹以觀則人之無道體已素病因風寒暑濕者以發之耳抱朴子內篇極言夫水土不與百卉同體而百卉仰之以植焉五榖非生人之類而生人須之以為命焉抱朴子內篇對俗衆木不能法松柏諸蟲不能學龜鶴是以短折耳人有明哲能修彭老之道則可與之同功矣抱朴子內篇對俗且夫松柏枝葉與衆木則别龜鶴體貌與衆蟲則殊至於彭老猶是人耳非異類而壽獨長者由於得道非自然也抱朴子內篇對俗金水在九竅則死人為之不朽鹽鹵沾於肌髓則脯臘為之不爛况於以宜身益命之物納之於已何怪其令人長生乎抱朴子內篇對俗蚊唶膚則坐不得安蝨羣攻則卧不得安四海之事何祇若是抱朴子內篇論仙譬猶疫癘之時醫巫為貴異口同辭唯論藥石豈可便謂針艾之伎過於長生久視之道乎抱朴子外篇仁明萬人彎弧以向一鵠鵠能無中乎萬物昡曜以惑一生生能無傷乎劉子清神人之生也一息一得耳向息非今息故納養而命續前火非後火故為薪而火傳火傳命續由夫養得其極矣郭子注莊養生主道家之言鶴曲頸而息龜潛匿而噎此其所以為壽也服氣養性者法焉李善注文選郭景純遊仙詩種榖於湯之世值七年之旱終歸是死而彼一溉之苗則在後枯亦猶人處於俗同皆有死能攝生者則後終也李善注文選嵇叔夜養生論且豆令人重榆令人暝合歡蠲忿萱草忘憂愚智所共知也薰辛害目豚魚不養常世所識也蝨處頭而黑麝食柏而香頸處險而癭齒居晉而黃推此而言凡所食之氣蒸性染食莫不相應豈惟蒸之使重而無使輕害之使暗而無使明薰之使黃而無使堅芬之使香而無使延哉故神農曰上藥養命中藥養性者誠知性命之理因輔養以通也文選嵇叔夜養生論人有三百六十節當天之數形體有骨肉如地之厚有孔竅血脈如川谷也多食甘者有益於肉而骨不利多食苦者有益於骨而斤不利多食辛者有益於斤而氣不利意林公孫文子凡藥上者養命中者養性下者養病藝文類聚草部藥魚勞則尾赤人勞則髮白埤雅品物門魴採藥遊名山將以救年頽初學記道釋部仙榖氣勝元氣其人肥而不夀養性之術常使穀氣少則病不生矣初學記草部五穀逆春氣則少陽不生肝氣內變逆夏氣則太陽不長心氣內洞逆秋氣則太隂不收肺氣焦滿逆冬氣則少隂不藏腎氣獨沈夫四時隂陽者萬物之根本也所以聖人春夏養陽秋冬養隂以從其根故與萬物沈浮於生長之門逆其根伐其本壞其真矣黃帝素問內經四氣調神大論榮氣虛則不仁衛氣虛則不用榮衛俱虛則不仁且不用肉如故也人身與志不相有曰死黃帝素問內經逆調論匠人磨斧斤礪刀削斫材木木之隂陽尚有堅脆堅者不入脆者皮弛至其交節而缺斤斧焉夫一木之中堅脆不同堅者則剛脆者易傷况其材本之不同皮之厚薄汁之多少而各異耶夫木之蚤花先生葉者遇春霜烈風則花落而葉萎久曝大旱則脆木薄皮者枝條汁少而葉萎久隂淫雨則薄皮多汁者皮潰而漉卒風暴起則剛脆之木枝折杌傷秋霜疾風則剛脆之木根搖而葉落凡此五者各有所傷况於人乎黃帝素問靈樞經五變五穀為刳命之鑿五牙為長生之根也黃帝本行記泥丸絳宫丹田三一之宅也子勤守之萬毒不傷黃帝本行記且經冬之草覆之而不死露之即見傷草木植性尚猶如此况人萬物之靈隂符經集注鬼谷子即口中津液也潄而咽之則能攻邪破惡徹於骨髓若麴蘖之消米方藥無復能先也道德經注疏卷八養命養其五臟五臟為根根固葉自茂矣養形養其五氣五氣為源源深流自長矣三十六部尊經黃庭經草木地生去地而死魚鱉水生離水而死人以氣生氣去而死旡上內祕藏經顯功德品八珍促壽五石延生列仙傳如蠶在繭中混混沌沌故一旦變形易數靈寶自然妙經動用以太和為馬通宣以玄寂為車攝生養性論身者得道之器也氣者致命之根也根拔則命終器敗則道去聖母資傳仙道五穀充肌體而不能益壽百藥療疾延年而不甘口甘口充肌者俗人所珍苦口延年者道士之所寶養性延命録教誡篇食穀者智慧聰明食石者肥澤不老食芝者延年不死食元氣者地不能埋天不能殺養性延命録教誡篇人生大期百年為限節護之者可至千嵗如膏之用小炷與大耳養性延命録教誡篇大計奢懶者壽慳勤者夭放散劬吝之異也田夫壽膏粱夭嗜欲少多之驗也處士少疾遊子多患事務繁簡之殊也故俗人競利道士罕營養性延命録教誡篇僉自安於蝣晷緬無羡於鵠年華陽陶隱居集上元泥丸者乃精之泉源泥丸不開則精不散而神不離中元絳宫者乃神之舍宇絳宫不動則精不馳而神不疲下元丹田者乃真水之根蒂丹田不振則精不漏而神不死金庭無為妙經生養之道莫非務本種植之利莫若得地金庭無為妙經夫有形之所貴者身也情識之所貴者命也是故餐脂飲血乘肥衣輕欲其怡懌也餌术含丹防生養性欲其夀考也髙僧傳十二論譬猶衣履器物愛之則完全乃久𢎞明集鄭道子神不滅論譬如木杵常用不止日夜消減法苑珠林卷四十六夫人有四肢五藏一覺一寐呼吸吐納精氣往來流而為榮衛彰而為氣色發而為音聲此人之常數也陽用其精隂用其形天人所同也及其失也蒸則生熱否則生寒結而為瘤贅陷而為癰疽奔而為惴竭而為焦故良醫導之以針石救之以藥劑聖人和之以至德輔之以人事故體有可愈之疾天地有可消之災也法苑珠林卷九十五殊貨夫好貨甚者不見他物之可好好馬甚者不見他物之可好好書甚者不見他物之可好吾又安知天下之果可好者果可惡者哉亢倉子全道篇好質白之物者以黑為汙好質黑之物者以白為汙吾又安知天下之正潔汙哉亢倉子全道篇人於此嗜酒嗜肉肉勝則食酒勝則飲焉此二者相與爭勝者行矣非情欲得酒性欲得肉也有人於此好利好義義勝則義取焉利勝則利取焉此二者相與爭勝者行矣非情欲得利性欲得義也其可兼者則兼取之其不可兼者則隻取重焉申鑒雜言下赬顔玉理眄視巧笑衆目之所悅也軒皇愛嫫母之􅀈貌不易落英之麗容陳侯悅敦洽之醜狀弗貿陽文之婉姿炮羔煎鴻臛􅏲臑熊衆口之所嗛文王嗜菖蒲之葅不易熊肝之味陽春白雪激楚採菱衆耳之所樂也而漢順聽山鳥之音云勝絲竹之響魏文侯好槌鑿之聲不貴金石之和鬱金玄憺春蘭秋蕙衆鼻之所芳也海人悅至臭之夫不愛芳馨之氣若斯人者皆性有所偏也劉子殊好纍榭洞房珠簾玉扆人之所悅也鳥入而憂聳石巉巖輪菌糾結猿狖之所便也人上而栗五韺六䪫咸池簫韶人之所樂也獸聞而振懸瀨碧潭瀾波洶湧魚龍之所安也人入而畏飛鼯甘煙走貊美鐵䲰雞嗜蛇人好芻豢鳥獸與人受性既殊形質亦異所居隔絶嗜好不同未足怪也劉子殊好執其所好而與衆相反則倒白為黑變苦成甘移角成羽佩蕕當薰美醜無定形愛憎無正分也劉子殊好聲色芳味各有正性善惡之分皎然自露不可以皂為白以羽為角以苦為甘以臭為香然而嗜好有殊絶者劉子殊好雖星有風雨之好人有異同之性庶覿蔀家與剝廬非蘇世而居政文選蜀都賦人各有好尚蘭􅉅蓀蕙之芳衆人所好而海畔有逐臭之夫咸池六莖之發衆人所共樂而墨翟有非之之論豈可同哉文選曹植與楊德祖書譬如嬰兒自取屎拤年稍長大捨前所穢更樂餘事年適向老悉捨諸樂以法自樂修行道地經地品昔公明儀為牛彈清角之操伏食如故非牛不聞不合其耳也轉為蚊虻孤犢之聲於是奮耳掉尾蹀躞而聽之今吾子所聞者蓋蚉虻之音也𢎞明集駮夷夏論偶合終日之言必有聖之事百發之中必有羿逢蒙之巧然而世不與也其守節非也淮南子説林訓子囊北而全楚北不可以為庸弦髙誕而存鄭誕不可以為常淮南子泰族訓物故有昧揥而中蚊頭掩目而别白黑者説苑辨物鴈鵠集於會稽去避碣石之寒來遭民田之畢蹈履民田啄食草糧糧盡食索春雨適作避熱北去復之碣石王充論衡偶會篇百發之中必有羿逢蒙之功衆知之中必有與聖人同吕氏春秋用衆解適偶有所偏解猶鶴知夜半燕知戊己而未必達於他事也抱朴子內篇至理不期而誤中非善射也若以謬中為善射則天下皆謂之羿可乎郭子注莊徐無鬼邊陲之人不聞知禮樂之正縱有言語偶會墳典皆是竊盜所得其道何足語哉莊子音義天道婁敬一言漢以遷都醜女暫説齊以為后亦猶鼓缶而會時搖頭而韻曲也李善注文選陸士衡演連珠掩目别白黑雖時時一中猶不知天道論隂陽有時誤中耳意林范子魯人有善相馬者與余俱遊夜方寐聞馬有行者魯人驚曰七百里也吾恐此暗中耳太平御覽獸部馬五子所能治知亦衆多與此病失矣譬以鴻飛亦沖於天黃帝素問內經示從容論如蟲食木有成字者此蟲不知是字非字智人見之終不唱言是蟲解字元陽妙經卷十譬如春時風揩樹木自然火出蘇婆呼童子經卷下猶春鳥囀弄或似於歌鳥無能歌之實秋蟲蠧木或近於字蟲闕解字之真名實斯濫蓋此之謂也辨正論卷六喻林卷十四
