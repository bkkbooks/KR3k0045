body:
  text: 喻林巻七十三明徐元太撰君道門十三法天效天之氣以下教令天有運移之期隂陽之節也若賞以春夏刑以秋冬皆效天也毛詩正義周頌譜敢問君何貴乎天道也孔子對曰貴其不已如日月西東相從而不已也是天道也大戴禮記哀公問於孔子用天地為根本又用隂陽為端首猶如劍㦸以近柄處為根本以鋒抄為端首禮記正義禮運人君法效天氣以降下政教之命效星辰運轉於北極為昏媾姻亞效天之隂陽寒暑為刑獄賞罰禮記正義禮運立風樹信立雷作威乾坤鑿度坤鑿度下春者天之所以生也仁者君之所以愛也夏者天之所以長也徳者君之所以養也霜者天之所以殺也刑者君之所以罰也前漢書董仲舒傳道教治世之梁肉刑憲亂世之藥石故以教化比雨露名法方風霜南齊書崔祖思傳乾元以利貞為大非義則不動皇王以博施為功非類則不從故能始萬物而化天下者也魏書張普惠傳如日方中天下說其盛明萬物懐其光景魏書趙黒閹官傳恩比春天威同夏日北齊書文宣帝紀天地稱其髙厚者萬物得其容養焉四時著其寒暑者庻類資其忠信焉是以帝王者寛大象天地忠信則四時周書黎景熙藝術傳天之行廣而無私其施厚而不徳其明久而不衰故聖王法之既以天為法動作有為必度於天墨子法儀條風至則出輕繋去稽留明庻風至則正封疆修田疇清明風至則出幣帛使諸侯景風至則爵有位賞有功凉風至則報地徳祀四郊閶闔風至則收縣垂琴瑟不張不周風至則修宫室繕邊城廣莫風至則閉闗梁决刑罰淮南子天文訓太隂治春則欲行柔惠温涼太隂治夏則欲布施宣明太隂治秋則欲修備繕兵太隂治冬則欲猛毅剛彊淮南子天文訓明堂之制静而法凖動而法繩春治以規秋治以矩冬治以權夏治以衡是故燥濕寒暑以節至甘雨膏露以時降淮南子時則訓古得道者静而法天地動而順日月喜怒而合四時呌呼而比雷霆音氣不戾八風詘伸不獲五度淮南子兵畧訓春分而生秋分而成生之與成必得和之精故聖人之道寛而栗嚴而温柔而直猛而仁淮南子汜論訓天子處於郊亭則九卿趨大夫走坐者伏倚者齊當此之時明堂太廟懸冠解劍緩帶而寢非郊亭大而廟堂狹小也至尊居之也天道之貴也非特天子之為尊也所在而衆仰之夫蟄蟲鵲巢皆向大一者至和在焉爾帝者誠能包禀道合至和則草木禽獸莫不被其澤矣而况兆民乎淮南子汜論訓天之道任陽不任隂王者之道任徳不任刑順天也春秋繁露執䞇事父者承意事君者儀志事天亦然春秋繁露楚莊王隂之行不得干春夏而月之常厭於日光乍全乍傷天之禁隂如此安得不損其欲而輟其情以應天春秋繁露深察名號為人主者予奪生殺各當其義若四時列官置吏必以其能若五行好仁惡戾任徳逺刑若隂陽此之謂能配天春秋繁露如天之為春修仁而求善秋修義而求惡冬修刑而致清夏修徳而致寛此所以順天地體隂陽然而方求善之時見惡而不釋方求惡之時見善亦立行方致清之時見大善亦立舉之方致寛之時見大惡亦立去之以效天之方生時有殺也方殺之時有生也春秋繁露如天之為天者其道長萬物而王者長人人主之大天地之參也奸惡之分隂陽之理也喜怒之發寒暑之比也官職之事五行之義也春秋繁露如天之為天髙其位而下其施藏其形而見其光髙其位所以為尊也下其施所以為仁也藏其形所以為神見其光所以為明故位尊而施仁藏神而見光者天之行也故為人主者法天之行春秋繁露離合根天出陽為煖以生之地出隂為清以成之不煖不生不清不成然而計其多少之分則煖暑居百而清寒居一徳教其與刑罰猶此也故聖人多其愛而少其嚴厚其徳而簡其刑以此配天春秋繁露基義章天有和有徳有平有威有相受之意有為政之理不可不審也春者天之和也夏者天之徳也秋者天之平也冬者天之威也天之序必先和然後發徳必先平然後發威此可以見不和不可以發慶賞之徳不平不可以發刑罰之威又可以見徳生於和威生於平也不和無徳不平無威天之道也春秋繁露威徳所生天數右陽而不右隂務徳而不務刑刑之不可任以成世也猶隂不可任以成歳也春秋繁露陽尊隂卑清漂之於歳也若酸醎之於味也僅有而已矣聖人之治亦從而然春秋繁露隂陽義何謂天之大經三起而成日三日而成規三旬而成月三月而成時三時而成功寒暑與和三而成物日月與星三而成光天地與人三而成徳由此觀之三而一成天之大經也以此為天制是故禮三讓而成一節官三人而成一選春秋繁露官制象天人主以好惡喜怒變俗習而天以煖清寒暑化草木喜樂時而當則歳美不時而妄則歳惡天地人主一也然則人主之好惡喜怒乃天之煖清寒暑也不可不審其處而出也當暑而寒當寒而暑必為惡歳也人主當喜而怒當怒而喜必為亂世矣春秋繁露王道通三人主以義申也喜如春陽怒如秋霜威如雷霆之震惠若雨露之降沛然孰能禦也申鑒雜言上人君舉措應天若北辰為之主台輔為之臣佐列宿為之官屬衆星為之人民是以北辰不可變改台輔不可失度列宿不可錯繆此天之象也武侯十六䇿治國天子父事天母事地兄事日姊事月蔡中郎集獨斷夫白日登天六合俱照非愛人而照之也故聖人之在天下煖若陽春蒙澤者不謝凄若秋霜凋落者不怨郭子註莊大宗師似秋殺物非為威也似春生物非為仁也郭子註莊大宗師天之養物以隂陽為大君之化民以政教為務故寒暑不時則疾疫風雨不節則歳饑刑罰者民之寒暑也教令者民之風雨也刑罰不時則民傷教令不節則俗弊劉子愛民人主以術化世猶天以氣變萬物氣變萬物而不見其象以術化人而不見其形故天以氣為靈主以術為神劉子法術天地之歳也先春而後秋人君之治也先禮而後刑意林物理論怒如烈冬喜如温春意林太元經矜賞若春重罰若秋行禮若火流教若水意林周生烈子仁義之道日月循緯藝文類聚天部月吾不能以春風風人不能以夏雨雨人吾窮必矣藝文類聚歳時部春古帝王封諸侯不過百里故利以建侯取法於雷藝文類聚封爵部摠載封爵覆之燾之順天之矩澤如凱風惠如時雨藝文類聚人部鑒試詩仁如春風惠如冬日太平御覽時序部春下天為有形之主君為有國之主天以春生猶君之有仁令也天以秋殺猶君之有威令也故仁令之發天下樂之威令之發天下畏之樂之故樂從其令畏之故不敢違其令太平御覽刑法部律令科附日者衆陽之精内明𤣥黄五色無主以象人君精精似青翼翼似黒𤣥𤣥似赤縞縞似白煌煌似黄光照無主不可以一色名也太平御覽天部三上人君喜則温怒則寒太平御覽時序部寒天有日月照臨晝夜猶王官之伯率領諸侯也北斗環繞北極猶卿士之周衛天子也五星行於列宿猶州牧之省察諸侯也二十八宿布於四方猶諸侯為天子守土也玉海天文天文圖機出乎心如天之生如天之殺則生者自謂得其生死者自謂得其死隂符經集註張良法自然者在方而法方在圓而法圓於自然無所違也道德經註盡道王當用善人為官維以為藩鄣又用大師之大臣維以為垣墻又用大邦諸侯維以為屏蔽王又身為大宗維當施政為之禎幹又和安汝徳以施於民無行酷虐之政維安汝之國矣不但安汝之國亦與汝之宗子維以為城言其可以蔽身又得蔽子王必常行此徳無使宗子之城壊又無得疏逺藩屏之人令王獨居毛詩正義板人君徳美如玉而明若燭爾雅䆁天疏敷春風而鼓俗旌至徳以調民魏書辛雄傳蛟龍得水而神可立也虎豹得幽而威可載也風雨無鄉而怨怒不及也管子形勢夫凶歳雷旱非無雨露也其燥濕非其時也亂世煩政非無法令也其所誅賞者非其人也暴王迷君非無心腹也其所取舎非其術也管子七臣七主無翼而飛者聲也無根而固者情也無方而富者生也公亦固情謹聲以嚴尊生此謂道之榮管子戒春秋冬夏天之時也山陵川谷地之枝也喜怒取予人之謀也管子内業羿古之善射者也調和其弓矢而堅守之其操弓也審其髙下有必中之道故能多發而多中明主猶羿也平和其法審其廢置而堅守之有必治之道故能多舉而多當道者羿之所以必中也主之所以必治也管子形勢解奚仲之為車噐也方圜曲直皆中規矩鈎繩故機旋相得用之牢利成噐堅固明主猶奚仲也言辭動作皆中術數故衆理相當上下相親巧者奚仲之所以為噐也主之所以治也管子形勢解如地如天何私何親如日如月唯君之節管子牧民昔者五帝之治天下也其道昭昭若日月之明然若以晝代夜然故其道首首然萬世為福萬世為教者唯從黄帝以下舜禹以上而已矣鬻子貴道天生四時地生萬物天下有民聖人牧之故春道生萬物榮夏道長萬物成秋道歛萬物盈冬道藏萬物静盈則藏藏則復起莫知所終莫知所始聖人配之以為天地經紀太公六韜守國夫雞晨而作負日任勞流汗灑地夜分僅息農夫之道也俯拾仰取鋭意錐撮力思摶精希求利潤賈竪之道也嚥氣谷神宰思損慮超遥輕舉日精錬仙髙士之道也剸情端想畢志所事倫揆忘寢謀效位司人臣之道也清心省念察驗近習務求賢良以安萬姓人主之道也亢倉子用道神靈威明與天合勾萌動作與地俱隂陽寒暑與時至三者聖人鶡冠子近迭公平者職之衡也中和者聽之繩也荀子王制修百王之法若辨白黒應當時之變若數一二行禮要節而安之若生四枝要時立功之巧若詔四時平正和民之善億萬之衆而博若一人如是則可謂聖人矣荀子儒效垂事養民拊循之唲嘔之冬日則為之饘粥夏日則與之𤓰麮以偷取少頃之譽焉是偷道也可以少頃得姦民之譽然而非長久之道也荀子富國篇夫為國之道恃賢與民信賢如腹心使民如四肢則䇿無遺所適如肢體相随骨節相救黄石公三畧上英雄者國之幹庻民者國之本得其幹收其本則政行而無怨黄石公三畧上舉賢任能不時日而事利明法審令不卜筮而獲吉貴功養勞不禱祠而得福尉繚子戰威日夜一周圜道也月躔二十八宿軫與角屬圜道也精行四時一上一下各與遇圜道也物動則萌萌而生生而長長而大大而成成乃衰衰乃殺殺乃藏圜道也雲氣西行云云然冬夏不輟水泉東流日夜不休上不竭下不滿小為大重為輕圜道也吕氏春秋圜道夫居髙者自處不可以不安履危者任杖不可以不固自處不安則墜任杖不固則仆是以聖人居髙處上則以仁義為巢乗危履傾則以賢聖為杖故髙而不墜危而不仆陸子輔政夫射而不中者不求之鵠而反修之於己君國子民者反求之已而君道備矣賈子君道天覆無外地載兼愛風行令而一其威雨布施而均其徳王術之謂也春秋繁露深察名號一國之君其猶一體之心也隠居深宫若心之藏於胸至貴無與適若心之神無與雙也其官人上士髙清明而下重濁若身之貴目而賤足也任羣臣無所親若四肢之各有職也内有四輔若心之有肝肺脾腎也外有百官若心之有形體孔竅也親聖近賢若神明皆聚於心也上下相承順若肢體相為使也布恩施惠若元氣之流皮毛腠理也百姓皆得其所若流血氣和平形體無所苦也無為致太平若神氣無自通於淵也致黄龍鳳凰若神明之致玉女芝英也君明臣蒙其功若心之神體得以全臣賢君蒙其恩若形體之静而心得以安上亂下被其患若耳目不聰明而手足為傷也臣不忠而君滅亡若形體妄動而心之喪春秋繁露天地之行章天設其髙而日月成明地設其厚而山陵成名上設其道而百事得序韓非子外傳次四日飛懸隂萬物融融測曰日飛懸隂君道隆也太𤣥經第二進不吝改絃於宜易之調不耻反迷於朝過之塗虎眄以警密麟跱以接疏抱朴子外篇君道發號吐令則輷若震霆之激響而不為邪辯改其正畫法創制則炳若七曜麗天而不以愛惡曲其情宏畧逺罩則藹若密雲之髙結居貞成務則確若嵩岱之根地抱朴子外篇君道儀决水以進善鈞絶絃以黜惡招徳塞違庸親昵賢使規盡其圓矩竭其方繩肆其直斤效其斵抱朴子外篇君道剔腹背無益之毛攬六翮凌虚之用烹如簧以謐司原之箴折菀渃以廸梁伯之美放丹姬以弭婉孌之迷退子瑕以杜餘桃之惑藏淵中之魚操利噐之柄勿憚徙薪之煩以省焦爛之費鼓亷恥之陶冶明考試之凖的抱朴子外篇君道君薆然若日之將出不可熒然若月之將毁也太𤣥經第六瞢解禮斗威儀曰帝者得其英華王者得其根荄李善註文選長楊賦善釣者其竿非竹其綸非絲其鈎非鍼其餌非螾也昔堯舜禹湯之釣也以賢聖為竿道徳為綸仁義為鈎禄利為餌四海為池萬民為魚釣道微矣非聖人其孰能察之補文選宋王釣賦仁若春陽信若影響藝文類聚人部聖舜出則有鸞和動則有珮環歩趨中莖韶之節玉海噐用佩帶笏心如規矩志如尺衡平静如水正直如繩道徳經指歸巻七我王三徳聖化流行如金輪世調善馬王有三功徳何等為三一心性和柔力能逺致二不畏寒暑渉險能安三調怨易事常無不足我王亦爾一言必柔實以法利人教化衆生畢竟成就二克勤庻政心無險易能捨珍財調給一切三大智勇健調諸怨敵賦税量宜恒知止足大方廣佛華嚴經巻十二我王四徳聖化流行如摩伽國妙音雞王有四功徳何等為四一立信司晨二守義均食三對敵賈勇四不随牝雞我王亦爾一賞罰應時二萬方均濟三義伏強禦四内言不聽大方廣佛華嚴經巻十二我王五徳聖化流行如欲天上善時鵞王有五功徳何等為五一染合有時二呼鳴無畏三量宜求食四心無放逸五不受諸鳥謟佞言辭我王亦爾一清心寡欲不縱内宫二發言審諦外無違命三取與不差務充衣食四調心道撿離過精勤五成就正心不親謟佞大方廣佛華嚴經巻十二夫為王者率土歸仰王當如橋濟渡萬民王當如秤親縁皆平王當如道不違聖蹤王者如日普照世間王者如月與物清涼王如父母恩育慈矜王者如天覆盖一切王者如地載養萬物王者如火為諸萬民燒除惡患王者如水潤澤四方雜寶藏經巻六神運輝光於外而形體不見若日月星辰之神鄭氏註禮禮運強弱相連欲生吞害中有神人提挺而治三墳山墳星回日薄撃雷鞭電者之謂天岳立川流吐霧蒸雲者之謂地苞天地之混成洞隂陽之不測而以裁成萬物者其在聖人乎梁書元帝紀愛人甚而不能利也憎人甚而不能害也故先王貴當貴周周者不出於口不見於色一龍一蛇一日五化之謂周故先王不以一過二管子樞言虎豹獸之猛者也居深林廣澤之中則人畏其威而載之人主天下之有勢者也深居則人畏其勢故虎豹去其幽而近於人則人得之而易其威人主去其門而廹於民則民輕之而傲其勢管子形勢解夫王者之道如龍首髙居而逺望深視而審聽示其形隠其情若天之髙不可極也若淵之深不可測也太公六韜上賢君者天也天不開門户使下相害也鶡冠子道端天子不視而見不聽而聰不慮而知不動而功塊然獨坐而天下從之如一體如四胑之從心夫是之謂大形荀子君道篇君人之道其猶零星之尸也儼然𤣥黙而吉祥受福是故得道者不為醜飾不為偽善一人被之而不褎萬人蒙之而不褊是故重為惠若重為暴則治道通矣淮南子主術訓皋陶瘖而為大理天下無虐刑有貴於言者也師曠瞽而為太宗晉無亂政有貴於見者也故不言之令不視之見此伏羲神農之所以為師也淮南子主術訓有聲之聲不過百里無聲之聲施於四海淮南子繆稱訓為人君者其要貴神神者不可得而視也不可得而聽也是故視而不見其形聽而不聞其聲聲之不聞故莫得其響不見其形故莫得其影莫得其影則無以曲直也莫得其響則無以清濁也無以曲直則其功不可得而敗無以清濁則其名不可得而度也春秋繁露立元神善釣者不易淵而殉魚君子不降席而追道治乎八尺之中而徳化光矣徐幹中論貴驗商子曰人主處匡牀之上而天下大理初學記噐用部牀上徳之人其齊萬物也猶天之有春秋時至自生非徳之力太平御覽人事部道徳上古之士道至大者無規矩後世以仁義禮樂為規矩而知規矩之所用者能治人上用規矩者下亦有規矩之心巧之具也而非所以治矣道徳經四子集解世主無為渙如儼容天地為爐太和為槖神明為風萬物為鐵徳為大匠道為工作天下青青靡不潤澤故能陶冶民心變化時俗道徳經指歸巻九鬼以其神養物於隂聖人以其道養物於陽道徳經指歸巻十夫萬物之有君猶形體之有心也心之於身何後何先流行血脈無所不存上下表裏無所不然道徳經指歸巻十一夫恃威網以使物者治之衰也使不知神聖之為神聖道之極也道徳經註為天地者有為於衆手無為於拱手配五行者有為於四象無為於無象拱手者聖人垂衣裳而天下治無象者真人全神而形自安金庭無為妙經譬如日輪住閻浮空其影悉現一切浄寶及以河海池沼噐物諸浄水中一切衆生莫不目見而彼日輪不來至此大方廣佛華嚴經巻二十五吾聞天不言而四時行王不言而萬國治集沙門不應拜俗等事巻二冠二無為為政以徳譬如北辰居其所而衆星共之論語為政禹當朝廷閒也可以羅爵鬻子上禹政心之在體君之位也九竅之有職官之分也心處其道九竅循理嗜欲充益目不見色耳不聞聲故曰上離其道下失其事母代馬走使盡其力母代鳥飛使弊其羽翼管子心術上天不動四時云下萬物化君不動政令陳下而萬功成心不動使四肢耳目而萬物情管子戒瑟不鳴而二十五絃各以其聲應軸不運於己而三十輻各以其力旋絃有緩急然後能成曲車有勞佚然後能致逺使有聲者乃無聲者也使有轉者乃無轉也文子微明有虞氏之藥痬也秃而施髢病而求醫孝子操藥以修慈父其色燋然聖人羞之莊子天地天有明不憂人之暗地有財不憂人之貧聖人有徳不憂人之危也天雖不憂人暗闢户牖必取已明焉則天無事也地雖不憂人貧伐木刈草必取已富焉則地無事也聖人雖不憂人之危百姓凖上而比於下其必取已安焉則聖人無事也慎子威徳農分田而耕賈分貨而販百工分事而勸士大夫分職而聽建國諸侯之君分土而守三公總方而議則天子共己而已矣荀子王霸明君之所以立功成名者四一曰天時二曰人心三曰技能四曰勢位非天時雖十堯不能冬生一穗逆人心雖賁育不能盡人力故得天時則不務而自生得人心則不趣而自勸因技能則不急而自疾得勢位則不推進而名成若水之流若船之浮守自然之道行毋窮之令故曰明主韓非子功名宋人有為其君以象為楮葉者三年而成豐殺莖柯毫甚繁澤亂之楮葉之中而不可别也此人遂以功食禄於宋邦列子聞之曰使天地三年而成一葉則物之有葉者寡矣故不乗天地之資而載一人之身不隨道理之數而學一人之智此皆一葉之行也故冬耕之稼后稷不能羨也豐年大禾藏獲不能惡也以一人力則后稷不足隨自然則藏獲有餘故曰恃萬物之自然而不敢為也韓非子喻老有准不以平有繩不以正天之大静既静而又寧可以為天下正吕氏春秋君守天下之賢主豈必苦形愁慮哉執其要而已矣雪霜雨露時則萬物育矣人民修矣疾病妖厲去矣故曰堯之容若委衣裘以言少事也吕氏春秋察賢五帝垂象蒼頡作書不如三皇結繩無文河上公註老子還淳今夫橋直植立而不動俛仰取制焉人主静漠而不躁百官得修焉譬如軍之持麾者妄指則亂矣慧不足以大寧智不足以安危與其譽堯而毁桀也不如掩聰明而反修其道也淮南子主術訓權衡規矩一定而不易不為秦楚變節不為胡越改容常一而不邪方行而不流一日形之萬世傳之而以無為為之故國有亡主而世無廢道人有困窮而理無不通由此觀之無為者道之宗淮南子主術訓霜雪雨露生殺萬物天無為焉猶之貴天也厭文搔法治官理民者有司也君無事焉猶尊居也辟地墾草者后稷也決河濬江者禹也明獄制中者皋陶也有聖名者堯也故得道以御者身雖無能必使能者為己用不得其道技藝雖多未有益也淮南子詮言訓絃有緩急大小然後成曲車有勞佚動静而後能致逺使有聲者乃無聲者也能致千里者乃不動者也故上下異道則治同道則亂淮南子泰族訓今夫祭者屠割烹殺剥狗燒豕調平五味者庖也陳簠簋列樽爼設籩豆者祝也齋明盛服淵黙而不言神之所依者尸也宰祝雖不能尸不越樽俎而代之淮南子泰族訓夫一官之任以一味協五味一國之政以無味和五味劉邵人物志材能天王不材於百官故百官御其事而明者為之視聰者為之聽知者為之謀勇者為之捍夫何為哉𤣥黙而已而羣材不失其當則不材乃材之所至賴也故天下樂推而不厭郭子註莊人間世夫工人無為於刻木而有為於用斧主上無為於親事而有為於用臣臣能親事主能用臣斧能刻木工能用斧各當其能則天理自然非有為也郭子註莊大道夫在上者患於不能無為而代人臣之所司使咎繇不得行其明斷后稷不得施其播殖則羣才失其任而主上困於役矣故冕旒垂目而付之天下天下皆得其自為斯乃無為而無不為者也郭子註莊天道與天合徳則雖出而静日月雲雨四時晝夜皆不為而自然也膠膠擾擾乎則自嫌有事故曰古之王天下奚為哉天地而已矣郭子註莊天道不為萬物而萬物自生者天地也不為百行而百行自成者聖人也郭子註莊刻意天動星廽而辰極猶居其所璣璇輪轉而衡軸猶執其中文選李康運命論夫萬物之託君也猶神明之居身而井水之在庭也水不可以有為清也神不可以思慮寧也道徳經指歸巻七使天有為動不順一為髙得卑為清得裂使地有為動不順一為直得枉為寧得發使神有為動不順一為逹得困為靈得歇使谷有為動不順一為有得亡為盈得竭侯王有為動不順一為貴得賤為政得蹷道徳經指歸巻七夫工之造輿也為圓為方為短為長為曲為直為縱為横終身揳揳卒不為輿故能成輿而令可行也道徳經指歸巻七無為者有為之君而成功之主也政教之元而變化之母也其除禍亂猶躁之勝寒而静之勝暑也道徳經指歸巻八不知之知知之祖也不教之教教之宗也道徳經指歸巻九世主之化虚無寂寞容如枯槁心如槖籥志如江海施如谿谷不别東西不異南北不辯甘苦不嫌白黒不正方圓不定曲直道徳經指歸巻九動於隂者鬼神周之動於陽者聖人制之唯無所為者莫能敗之道徳經指歸巻十明於俞附之術岐鵲之數以治之不若使世無病之徳豐也挾黄帝大公之慮秉孫吳氏之要以勝之不若使天下不事智力之不營也道徳經指歸巻十聖人無為為之以生萬物無執執之以制所欲猶工匠之造髙臺而天地之生巨木自然而已道徳經指歸巻十一動静與衆反出入異門户不以勇勇故不怒而天下恐不以廣廣故不施而天下往不以先先故不言而天下長道徳經指歸巻十一夫太山之木本據於隂末託於陽䨇枝布葉華實青青大而合抱髙連百㝷者生於無大成於不為九重之臺廣大擬於丘陵百仭之髙昭昭㝠㝠干於青霄者以為卑小不為髙大也道徳經指歸巻十一言煑小魚撓之則糜爛任置即自全喻理國無為即太平躁動則荒亂道徳經註䟽巻六小能攻堅百王不易之事無為破有萬代不刋之術道徳經註疏巻八當知諸水鳥王皆具二徳一審諦其心如取魚時入水翹立一心覘視嶷然不動二静觀水族所欲皆從我王亦爾髙居俯視聽政萬方寂然不動感通無礙言不虚發一切自成大方廣佛華嚴經巻十二喻林巻七十三
