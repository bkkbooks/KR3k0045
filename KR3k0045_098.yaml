body:
  text: 喻林卷九十八明徐元太撰政治門三敎化水之流也固走下不善故有桴汲冡周書周祝解下之順上當如網在綱各有條理而不亂也孔氏傳書盤庚上為政之術如梓人治材為器已勞力樸治斵削惟其當塗以漆丹以朱而後成以言敎化亦須禮義然後治孔氏傳書梓材中原有菽音叔庶民采之螟蛉有子蜾蠃負之敎誨爾子式穀似之詩小雅小宛天之牖民如壎音塤如箎音池如璋如圭如取如攜詩大雅板思樂音洛泮音判水薄采其芹魯矦戾止言觀其旂思樂泮水薄采其藻魯侯戾止其馬蹻蹻思樂泮水薄采其茆魯侯戾止在泮飲酒詩魯頌泮水風風也敎也風以動之敎以化之毛詩關雎麟之趾關雎之應也關雎之化行則天下無犯非禮雖衰世之公子皆信厚如麟趾之時也毛詩麟趾漢廣德廣所及也文王之道被於南國美化行乎江漢之域毛詩廣漢汝墳道化行也文王之化行乎汝墳之國毛詩汝墳行露召伯聽訟也衰亂之俗微貞信之教興强暴之男不能侵陵貞女也毛詩行露飄風迴風也惡人被德化而消猶飄風之入曲阿也毛詩卷阿註猱之性善登木若教使其為之必也塗之性善著若以塗附其著亦必也以喻人之心皆有仁義敎之則進鄭氏箋詩角弓教令之出如賣物物善則其售賈貴物惡則其售賈賤德加於民民則以義報之鄭氏箋詩抑鴞恒惡鳴今來止於泮水之木上食其桑黮為此之故故改其鳴歸就我以善音喻人感於恩則化也鄭氏箋詩泮水激揚之水波流湍疾行於石上洗去石之垢穢使白石鑿鑿然而鮮明以興桓叔之德政教寛明行於民上除去民之疾惡使沃國之民皆得有禮義也毛詩正義揚之水蒹葭在衆草之中蒼蒼然彊盛雖似不可彫傷至白露凝戾為霜則成而為黄矣以興衆民之彊者不從襄公教令雖似不可屈服若得周禮以教則衆民自然服矣毛詩正義蒹葭菁菁然茂盛者蘿蒿也此蘿蒿所以得茂盛者由生在阿中得阿之長養故茂盛以興德盛者是學士也此學士所以致德盛者由升在彼學中得君之長育故使德盛毛詩正義菁菁者莪桑蟲自有子而蒲盧負而養之以成己子若有聖德者能教誨爾之萬民用善道則似之矣毛詩正義小宛王之不教小人如人之禁彼云無得教猱之升木若教之升木則如以塗泥塗物必附著也何者猱之性善登木今教之使登必能登木矣又喻塗之性善附著以之塗物必著矣以興王自不教小人以仁義者若教小人以仁義則必從矣何者以人性皆有仁義因其性而道之故教之必從也毛詩正義角弓天王之導民也如壎然如箎然言民必應君命如壎箎之相和也如璋如圭然言民必同君心如圭璋之相合也又如往取物如手攜物言其必從君化如攜取之隨人君也毛詩正義板翩然而飛者彼飛鴞惡聲之鳥今來集止於我泮水之林食我泮宫之桑黮歸我好善之美音惡聲之鳥食桑黮而變音喻不善之人感恩惠而從化毛詩正義泮水天地之道寒暑不時則疾風雨不節則饑教者民之寒暑也教不時則傷世事者民之風雨也事不節則無功禮記樂記政之教大夫官之教士技之教庶人揚則抑抑則揚綴以德行不任以言庶人以言猶以夏后氏之祔懷袍褐也行不越境大戴禮記虞戴德為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射已之鵠禮記射義蒲盧取桑蟲之子去而變化之以成為己子政之於百姓若蒲盧之於桑蟲然鄭氏註禮記中庸觴酒豆肉讓而受惡民猶犯齒衽席之上讓而坐下民猶犯貴朝廷之位讓而就賤民猶犯君禮記坊記治國雖用善道所宜而不更為講學使民知其道理如農夫雖種嘉穀而不耘壅則苗不出茂厚實也禮記正義禮運農夫耕田既畢以美善種子而種之聖王以禮正人情既畢用此善道而敎之禮記正義禮運十二月限分猶人才各有所長聖人隨人才而教之則人竭其才之所長而為功禮記正義禮運父義母慈父能教而不能愛母則能愛而不能教言子産若衆人之母但能恩慈食之不能嚴勵教之禮記正義仲尼燕居子欲善而民善矣君子之德風小人之德草草上之風必偃論語顏淵德之流行速於置郵而傳命孟子公孫丑上家語宓子賤仕魯為單父宰孔子使巫馬期往觀政焉入界見䰻得魚輒捨之期問焉曰凡䰻者為得魚也何以得魚郤捨之曰魚之大者名鱄鱄吾大夫愛之魚之小者名鱦吾大夫欲長之是以得二者輒捨之爾雅釋魚疏夫上之化下下之從上猶泥之在鈞唯甄者之所為猶金之在鎔唯冶者之所鑄前漢書董仲舒傳夫萬民之從利也如水之走下不以教化隄防之不能止也是故教化立而姦邪皆正者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壞也前漢書董仲舒傳夫虎豹馬牛禽獸之不可制者也及其教馴服習之至可牽持駕服唯人之從臣聞揉曲木者不累日銷金石者不累月夫人之於利害好惡豈比禽獸木石之類哉期年而變臣𢎞尚竊遲之前漢書公孫𢎞傳雖見奇麗紛華非其所習辟猶戎翟之與於越不相入矣是以欲寡而事節財足而不争前漢書貨殖傳化正天下易於决流抑隊前漢書貢禹傳夫改政移風必有其本傳曰吳王好劒客百姓多創瘢楚王好細腰宫中多餓死長安語曰城中好髙髻四方髙一尺城中好廣眉四方且半額城中好大袖四方全匹帛後漢書馬援子廖傳若教化之廢推中人而墜於小人之域教化之行引中人而納於君子之塗後漢書荀淑列傳君如杅民如水杅方則水方杅圓則水圓上之化下猶風之靡草後漢書宦者列傳主簿聞陳元之過不罪而化之得無少鷹鸇之志邪覽曰以為鷹鸇不若鸞鳯後漢書循吏列傳整齊風俗而輕脫威儀猶負薪救火無乃更崇其熾乎吳志孫權傳註桑葚甜甘鴟鴞革響乳酪養性人無妬心晉書張天錫傳夫亷恥之於政猶樹蓺之有豐壤良歲之有膏澤其生物必由然茂矣若廉恥不存而惟刑是御則風俗彫弊人失其性錐刀之末皆有爭心雖峻刑嚴辟猶不勝矣晉書阮种傳招遥昏迴則天位正五教班叙則人理定晉書皇甫謐傳教者治化之本人倫之始所以誘達羣方進德興仁譬諸土石陶冶成器宋書禮一志民之從義猶若迴風之卷草也宋書文九王建平傳信食相資代為脣齒富教相假逓成輔車宋書顧覬之傳命待教全運須化立譬以良醫之室病者所存宋書顧覬之傳夫善政之於民猶良工之於埴也用功寡而成器多宋書良吏傳史臣生民之有學斆猶樹木之有枝葉果行育德咸必由兹南齊書武帝本紀嘉肴停俎定方旨於必甘良玉在攻表珪璋於既就是以陶鈞萬品務本為先經緯九區學斆為大南齊書明帝本紀夫金之質也至剛鑄之可以成器水之性也柔弱壅之可以壞山况乎肖天地之貌含五帝之德朱藍易染薫蕕可變固宜隨鄒俗而好長纓化齊俗而貴紫服周書史臣儒林傳礫石變成瑜瑾莨莠化為芝蘭隋書盧思道傳若璽印塗猶防止水豈直譬彼耕耨均斯粉澤而已哉隋書潘徽文學傳黄帝問於伯高曰吾欲陶天下而以為一家為之有道乎伯高對曰請刈其莞而樹之吾謹逃其蚤牙則天下可陶而為一家管子地數善氣逆人親於兄弟惡氣逆人害於戎兵不言之聲疾於雷鼔心氣之形明於日月察於父母管子内業若夫教者標然若秋雲之遠動人心之悲藹然若夏之靜雲乃及人之體􅀈然若謞之靜管子侈靡鐘鼔成肆干戚成舞雖禹不能禁民之觀且夫飾民之欲而嚴其聽禁其心聖人所難也晏子春秋諫下聖人之治虚其心實其腹弱其志强其骨常使民無知無欲老子安民父不疑於其子子必孝兄不疑於其弟弟必共夫不疑於其婦婦必貞君不疑於其臣臣必忠是還至而効者也子華子北宫子仕天高而難知有福不可請有禍不可避法天則戾地廣大深厚多利而鮮威法地則辱時舉錯代更無一法時則貳三者不可以立化樹俗故聖人弗法鶡冠子近迭風以動之變以化之猶泥之在鈞羣器之形自見鬼谷子本經陰符注羿蠭門者天下之善射者也不能以撥弓曲矢中王良造父者天下之善馭者也不能以辟馬毁輿致逺堯舜者天下之善教化者也不能使嵬𤨏化荀子正論夫總方略齊言行一統類而羣天下之英傑而告之以太古敎之以至順奥窔之間簟席之上斂然聖王之文章興焉佛然平世之俗起焉荀子非十二子厯山之農者侵畔舜往耕焉期年甽畆正河濱之漁者爭得舜往漁焉期年而讓長東夷之陶者器若窳舜往陶焉期年而器牢仲尼嘆曰耕漁與陶非舜官也而舜往為之者所以救敗也韓子難一堯舜之民可比屋而封桀紂之民可比屋而誅者教化使然也故近河之地溼近山之土燥以其類相及也陸子無為儒者非能使人弗欲而能止之非能使人弗樂而能禁之夫使天下畏刑而不敢盜豈若能使無有盜心哉越人得􅛂蛇以為上肴中國得而棄之無用故知其無所用貪者能辭之不知其無所用廉者不能讓也淮南子精神訓戎翟之馬皆可以馳驅或近或逺惟造父能盡其力三苗之民皆可使忠信或賢或不肖惟唐虞能齊其美必有不傳者淮南子繆稱訓昔舜耕於厯山朞年而田者爭處墝埆以封壤肥饒相讓釣於河瀆朞年而漁者爭處湍瀨以曲隈深潭相予當此之時口不設言手不指麾埶𤣥德於心而化馳若神使舜無其志雖口辯而户說之不能化一人是故不道之道莽乎大哉夫能理三苗朝羽民從裸國納肅慎未發號施令而移風易俗者其唯心行者乎法度刑罰何足以致之也淮南子原道訓法能殺不孝者而不能使人為孔曾之行法能刑竊盜者而不能使人為伯夷之亷孔子弟子七十養徒三千人皆入孝出弟言為文章行為儀表教之所成也墨子服役者百八十人皆可使赴火蹈刃死不還踵化之所致也淮南子泰族訓其於化民也若風之搖草木無之而不靡淮南子泰族訓天地之數不能獨以寒暑成歲必有春夏秋冬聖人之道不能獨以威勢成政必有敎化春秋繁露為人者天地為人主者居至德之位操殺生之勢以變化民民之從主也如草木之應四時也春秋繁露威德所至夫赤子知慕其父母由審故也况為政興其賢者而廢其不賢以化民乎孔叢子刑論君子舞象小人擊壤上化使然又何足賞孔叢子叙世孔子大聖也諸侯莫能用當小位於魯三月不令而行不禁而止沛若時雨之灌萬物莫不興起也鹽鐵論國病為治者不待自善之民為輪者不待自曲之木鹽鐵論大論違山十里蟪蛄之聲猶尚存耳政事無如膺之矣說苑政理昔禹與有扈氏戰三陣而不服禹於是修教一年而有扈氏請服故曰去民之所事奚獄之所聽兵革之不陳奚鼔之所鳴故曰教為務也說苑政理大冶之罏可使無剛踊水之機可使無降善立教者若兹則終身治矣故凡器可使與顔冉同趨投百金於前白刃加其身雖巨距弗敢掇也善立法者若兹則終身不掇矣故跖可使與伯夷同功申鑒政體榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭朴以加小人治其形也申鑒政體民有心也猶為種之有園也遭和氣則秀茂而成實遇水旱則枯槁而生蘖濳夫論德化善者之養天民也猶良工為麴䜴也起居以其時寒温得其適則一蔭之麴䜴盡美而多量其愚拙工則一蔭之麴䜴皆臭敗而棄損今六合亦由一蔭也黔首之屬猶豆麥也變化云為在將者爾遭良吏則皆懷忠信而履仁厚遇惡吏則皆懷姦邪而行淺薄濳夫論德化聖人之規曲世若火之規曲竹治其節而削其枝頲其榦而裁其根然後商販而為利工斵而為器今漢室之形若曲竹何不倚而規之以匡輔其傾乎坐而䇿之以宣裕其業乎為之禮樂以順導其民乎夫物曲則棄人曲則弊世曲則傾唯智者覩形而知影是以規其所曲而全其所直遊乎自然之原此仲尼之志度而管孟之為也天禄閣外史去就言虎悲嘯而吟則谷風至而應其類也以言君修德行正則百姓隨而化也王逸註楚辭七諫王良造父稱為善御以能使不良為良也如徒能御良其不良者不能馴服此則駔工庸師服馴技能何奇而世稱之故曰王良登車馬不罷駑堯舜為政民無枉愚王充論衡率性篇三苗之民或賢或不肖堯舜齊之恩教加也楚越之人處莊嶽之間經厯歲月變為舒緩風俗移也故曰齊舒緩秦慢易楚促急燕戅投以莊嶽言之四國之民更相出入久居單處性必變易王充論衡率性篇璆琳琅玕者此則土地所生真玉珠也然而道人消爍五石作五色之玉比之真玉光不殊别兼魚蚌之珠與禹貢璆琳皆真玉珠也然而隋侯以藥作珠精耀如真道士之教至知巧之意加也陽燧取火於天五月丙午日中之時消鍊五石鑄以為器磨礪生光仰以嚮日則火來至比真取火之道也今妄以刀劍之鉤月摩拭朗白仰以嚮日亦得火焉夫鉤月非陽燧也所以耐取火者摩拭之所致也今夫性惡之人使與性善者同類乎可率勉之令其為善使之異類乎亦可令與道人之所鑄玉隋侯之所作珠人之所摩刀劍鉤月焉教導以學漸漬以德亦將日有仁義之操王充論衡率性篇賢君之治國也猶慈父之治家慈父耐平教明令耐使子孫皆為孝善子孫孝善是家興也百姓平安是國昌也王充論衡治期篇善之勸惡如春雨澤武侯十六策陰察大禹善治水而君子善導人導人必因其性治水必因其勢是以功無敗而言無棄也徐幹中論貴言鵂梟化為鴛鸞邪偽變成忠貞芳穎秀於斥鹵夜光起乎泥濘抱朴子外篇君道化上而興善者必若靡草之逐驚風洗心而革面者必若清波之滌輕塵抱朴子外篇用刑夫承蘭風以傾柯濯清波以遣穢者若沈景之應朗鑒方圓之赴規矩抱朴子外篇嘉遯以文雅為園囿以禮樂為場圃李善註文選揚子雲劇秦美新風化所被近者逾深逺者稍淺故京師沈濳而要荒濯沐也李善注文選楊子雲劇秦美新衝波安流則龍舟不能以漂震風洞發則夏屋有時而傾何則牽乎動則静凝係乎静則動貞是以淫風大行貞女蒙冶容之誨淳化殷流盜跖挾曾史之情文選陸機演連珠萍之依水隨水去留蘿之寄松隨松髙下人俗與政化遷變亦猶是也文選潘安仁河陽縣作詩註辭者主之弓弩教者君之機關意林周生烈子人之性如水焉置之圓則圓置之方則方澄之則渟而清動之則流而濁先王知中流之易擾亂故隨而教之意林物理論洗濯民心湔浣浮俗意林正論浩浩大海百川歸之洋洋聖化九服仰之藝文類聚刑法部刑法賦慙孺雉之聲朝惡細魚之在夜藝文類聚雜文部賦賦鷙鳥感仁而革性鶗鴂乘化而變聲藝文類聚歲時部春我化若風民應如草我静如鏡物動猶煙文苑英華梁簡文帝帝德上頌不聽雜樂以變齊國之風不食鮮禽以斷荆王之獵文苑英華唐信職官九誌居蘭處鮑在其所習白羽素絲隨其所染是以金性雖質處劍即凶水德雖平經風即險文苑英華庾信連珠善治者使跖可信不能治者使伯夷可疑太平御覽治道部政治三上德之政鷹化為鳩暴虎成貍此之謂也太平御覽職官部良令長下人化而為善禽獸化而為惡人而不善者謂之禽獸太平御覽人事部欽人載馳非轄不行臨政非教不賢太平御覽車部轄麥之為蝶由於濕也爾則萬物之變皆有以也農民止麥之化者區之以灰聖人理萬物之化者濟之以道太平御覽妖異部變化下鼎烹熟以養人猶聖君興仁義之道以教天下也玉海周易鄭康成注變世化俗猶風之靡草民之從化猶魚之赴水道德經指歸卷八桀紂之吏可令順信秦楚之卒可令順善道德經指歸卷十一如鐵鉤能制狂象王治正化能伏惡人大方廣佛華嚴經卷十二故諸學者如世輪繩藝業所修如聚泥土王行正化如匠埏埴大方廣佛華嚴經卷十二樹不伐本則枝不傾人主不化則道不行提婆菩薩傳藉十譬如神通人能變瓦石皆使為金大智度論卷三十二猶如好牛以少鞭杖則得調利入大乘論卷下風俗庶民惟星星有好風星有好雨書洪範萬國同其風化若物在繩索之貫故云九州同風萬國同貫尚書正義禹貢糾糾音赳葛屨可以履霜摻摻音纎女手可以縫裳詩國風葛屨關雎麟趾之化王者之風故繫之周公鵲巢騶虞之德諸侯之風也先王之所以教故繫之召公毛詩關雎葛屨刺褊也魏地陿隘其民機巧趨利其君儉嗇褊急而無德以將之毛詩葛屨葛屨賤皮屨貴魏俗至冬猶謂葛屨可以履霜利其賤也鄭氏箋詩葛屨糾糾然夏日所服之葛履魏俗利其賤至冬日猶謂之可以履寒霜摻摻然未成婦之女手魏俗利其事新來嫁猶謂之可以縫衣裳毛詩正義葛屨豕之性能水又唐突難禁制以荆舒之人性好亂又勇悍難制服言有豕之白蹄者領其衆豕離其繒牧之處涉入於水波漣矣以興荆舒之君率其衆民去其禮義之安居於亂亾之危矣毛詩正義漸漸且服奇者志淫則是鄒魯無奇行也俗僻者民易則是吳越無秀士也史記趙世家人言楚人沐㺅而冠耳史記項羽紀世人削方為圓撓直為曲豈待顧道德之清塗踐仁義之區域乎晉書熊逺傳其升山赴險抵突叢棘若魚之走淵猿狖之騰木也吳志諸葛恪傳彯鷸冠於鄭伯之門躡珠履於春申之第晉書輿服志醨風濳煽醇源浸竭晉書徐寧傳吳婦人之脩容者急束其髪而劘角于耳葢其俗自操束大急而亷隅失中之謂也故吳之風俗相驅以急宋書五行一志末世之俗則不然煩稱文辭而實不效知譎相誕而情不應葢先霜霰以戒裘罏者矣機栝存乎中而羣有詐心者族攻之於外子華子神氣竽也者五聲之長者也故竽先則鐘瑟皆隨竽唱則諸樂皆和今大姦作則俗之民唱俗之民唱則小盜必和故服文采帶利劍厭飲食而資貨有餘者是之謂盜竽矣韓非子解老故有大路龍旂羽葢埀緌結駟連騎則必有穿窬拊揵抽箕踰備之姦有詭文繁繡弱緆羅䊵必有菅屩跐踦短褐不完者故高下之相傾也短修之相形也亦明矣淮南子齊俗訓羌氐僰翟嬰兒生皆同聲及其長也雖重象狄騠不能通其言教俗殊也今令三月嬰兒生而徙國則不能知其故俗由此觀之衣服禮俗者非人之性也所受於外也夫竹之性浮殘以為牒束而投之水則沈失其體也金之性沈託之於舟上則浮勢有所支也夫素之質白染之以湼則黒縑之性黄染之以丹則赤人之性無邪久湛於俗則易易而忘本合於若性淮南子齊俗訓丹穴太蒙反踵空同大夏北戸奇肱脩股之民是非各異習俗相反君臣上下夫婦父子有以相使也此之是非彼之是也此之非非彼之非也譬如斤斧椎鑿之各有所施也淮南子汜論訓夫文繁則質衰末盛則本虧末修則民淫本修則民慤鹽鐵論本議利則虎曳病則鳥折鹽鐵論備胡江南有橘齊王使人取之而樹之於江北生不為橘乃為枳所以然者何其土地使之然也今齊人居齊不盜來之荆而盜得無土地使之然乎說苑善說古之魯俗塗里之閭羅門之羅收門之漁獨得於禮是以孔子善之夫塗里之閭富家為貧者出羅門之羅有親者取多無親者取少収門之漁有親者取巨無親者取小說苑政理五鳥六鴟相對蹲跂禮讓不興虞芮争訟焦氏易林大壯之歸妹有山者採有水者漁博物志東南之人食水産西北之人食陸畜食水産者龜蛤螺蛤以為珍味不覺其腥臊也食陸者貍兎鼠雀以為珍物不覺其膻也博物志夫方土所資自然而能故吳越之用舟燕朔之乘馬得之於水陸之宜不假學於賢智慎到曰治水者茨防決塞雖在夷貊相似如一學之於水不學之於禹也張湛注列子湯問積習則忘鮑肆之臭裸鄉不覺呈形之醜抱朴子外篇循本慕之者猶宵蟲之赴明燭學之者猶輕毛之應飆風抱朴子外篇疾謬遭雨巾壞猶復見傚不覺其短皆是類也抱朴子外篇正部軒車不可以適越冠冕不可以之胡古之道也文中子周公音有楚夏者土風之乖也情有險易者習俗之殊也文選魏都賦注匈奴常言漢極大然不能耐饑渴失一狼走千羊補文選漢武帝輪臺詔人情玩於所習純風日去華競日彰猶火之消膏而莫之覺也補文選戴邈學校疏喻林卷九十八
