body:
  text: 喻林卷一百八明徐元太撰政治門十三兵機伏戎于莽敵剛也易同人鴥音聿彼飛隼其飛戾天亦集爰止詩小雅采芑鴥然而疾者彼飛隼之鳥也其飛乃高至天雖能高飛亦集其所止之處不妄飛以興彼勇武之衆其勇能深入於敵雖則勇徑亦稟於將帥之命不妄動也毛詩正義采芑其行動之疾也如鳥之飛其赴敵之速也如鷙之翰其軍之衆多也如江之廣如漢之大也其固守則不驚動如山之基本其往戰則不可禦止如川之流逝毛詩正義常武逐寇如追逃軍之善政也左傳文公七年衆獸羣聚其中一個被矢則百羣皆走以言吳民臨陳就戰或小有傾傷亦復然也國語解吳申胥諌一里之厚而動千里之權者地利也萬人之衆而破三軍者不意也戰國䇿韓康子鷙鳥之擊也必匿其形史記越世家兵以正合以奇勝善之者出奇無窮奇正還相生如環之無端夫始如處女適人開戶後如脫兔適不及距其田單之謂邪史記田單傳論兵動若神謀不在計摧強易於折枯消堅甚於湯雪後漢書皇甫嵩列傳兵不厭權願寬假轡䇿勿令有所拘閡而已後漢書虞詡列傳兵法弱不攻強走不逐飛自然之勢也後漢紀孝安若乃奇變從橫出入無間衝波截轍超谷越山不由舟楫而濟盟津者蜀志譙周傳凡攻敵必扼其喉而樁其心夏口東關賊之心喉晉書宣帝紀南北諸軍風馳電赴若身手之救痛癢率然之應首尾晉書孫綽傳如有決罦漏網逡窠逗冗命淮汝戈船遏其歸徑宋書袁淑傳善用兵者如常山之蛇使救首救尾困而無暇南史陳本紀上鷙鳥將擊卑飛斂翼猛獸將搏弭耳俯伏聖人將動必有愚色太公六韜發啓舉之如飛鳥動之如雷電發之如風雨莫當其前莫害其後管子七法凡用兵者攻堅則軔乘瑕則神攻堅則瑕者堅故堅其堅者瑕其瑕者屠牛坦朝九牛而刀可以莫鐵則刃遊間也管子制分有風雨之行故能不逺道里矣有飛鳥之舉故能不險山河矣有雷電之戰故能獨行而無敵矣有水旱之功故能攻國救邑有金城之守故能定宗廟育男女矣有一體之治故能出號令明憲矣風雨之行者速也飛鳥之舉者輕也雷電之戰者士不齊也水旱之功者野不收耕不穫也金城之守者用貨財設耳目也一體之治者去奇説禁雕俗也管子七法發如鏃矢動如雷霆暴疾搗虛殷若壞牆鶡冠子世兵將軍身也卒支也伍指拇也司馬法定爵視卒如嬰兒故可與之赴深溪視卒如愛子故可與之俱死愛而不能令厚而不能使亂而不能治譬如驕子不可用也孫武子地形兵以詐立以利動以分合為變者也故其疾如風其徐如林侵掠如火不動如山難知如陰動如雷震孫武子軍爭夫兵形象水水之形避高而趨下兵之形避實而擊虛水因地而制流兵因敵而制勝故兵無常勢水無常形因地變化而取勝者謂之神孫武子虛實任勢者其戰人也如轉木石木石之性安則靜危則動方則止圓則行故善戰人之勢如轉圎石於千仞之山者勢也孫武子兵勢激水之疾至於漂石者勢也鷙鳥之疾至於毁折者節也故善戰者其勢險其節短勢如彍弩節如發機孫武子兵勢善出奇者無窮如天地不竭如江海終而復始日月是也死而更生四時是也孫武子兵勢兵之所加如以碬投卵者虛實是也孫武子兵勢聲不過五五聲之變不可勝聽也色不過五五色之變不可勝觀也味不過五五味之變不可勝嘗也戰勢不過奇正奇正之變不可勝窮也奇正相生如循環之無端孰能窮之哉孫武子兵勢勝兵若以鎰稱銖敗兵若以銖稱鎰勝者之戰若決積水於千仞之溪者形也孫武子軍形善守者藏於九地之下善攻者動於九天之上故能自保而全勝也孫武子軍形善用兵者擕手若使一人不得已也孫武子九地帥與之期若登高而去其梯帥與之深入諸侯之地而發其機若驅羣羊驅而往驅而來莫知所之孫武子九地善用兵者譬如率然率然者常山之蛇也擊其首則尾至擊其尾則首至擊其中則首尾俱至敢問可使如率然乎曰可夫吳人與越人相惡也當其同舟濟而遇風其相救也如左右手孫武子九地凡兵戰之場止尸之地必死則生幸生則死其善將者如坐漏船之中伏燒屋之下使智者不及謀勇者不及怒受敵可也故曰用兵之害猶豫最大三軍之災生於狐疑吳子治兵武侯問曰三軍進止豈有道乎起對曰無當天竈無當龍頭天竈者大谷之口龍頭者大山之端吳子治兵若飛鳥然傾側反覆無日是亡國之兵也兵莫弱是矣荀子議兵闔廬攻郢戰三勝問子胥曰可以退乎子胥對曰溺人者一飲而止則無溺矣以其不休也不如乘之以沈之韓非子説林慈於子者不敢絶衣食慈於身者不敢離法度慈於方圎者不敢舍規矩故臨兵而慈於士吏則戰勝敵慈於器械則城堅固故曰慈於戰則勝以守則固韓非子解老兵之所及羊腸亦勝鋸齒亦勝緣山亦勝入谷亦勝方亦勝圓亦勝重者如山如林如江如河輕者如炮如燔如垣壓之如雲覆之令人聚不得以散散不得以聚左不得以右右不得以左尉繚子兵談兵者以武為植以文為踵武為表文為裏能審此二者知勝敗矣尉繚子兵令上戰者必本乎率身以勵衆士如心之使四支也尉繚子戰威使什伍如親戚卒伯如朋友止如堵墻動如風雨車不結轍士不旋踵此本戰之道也尉繚子戰威勝兵似水夫水至柔弱者也然而觸丘陵必為之崩無異也性專而觸誠也今以莫邪之利犀兕之堅三軍之衆有所奇正則天下莫當其戰矣尉繚子武議楚將公子心與齊人戰時有彗星出柄在齊柄所在勝不可擊公子心曰彗星何知以彗鬬者固倒而勝焉明日與齊戰大破之尉繚子天官求敵若求亡子擊敵若救溺人尉繚子攻權戰如風發攻如決河故其衆可望而不可當可下而不可勝黃石公三略上驅市人而戰之可以勝人之厚祿教卒老弱罷民可以勝人之精士練材離散係系可以勝人之行陳整齊鋤耰白梃可以勝人之長銚利兵此不通乎兵者之論今有利劒於此以刺則不中以擊則不及與惡劒無擇為是鬬因用惡劒則不可簡選精良兵械銛利發之則不時縱之則不當與惡卒無擇為是戰因用惡卒則不可呂氏春秋簡選且兵之所自來者逺矣未嘗少選不用貴賤長少賢者不肖相與同有巨有微而已矣察兵之微在心而未發兵也疾視兵也作色兵也傲言兵也援推兵也連反兵也侈鬬兵也三軍攻戰兵也此八者皆兵也微巨之爭也呂氏春秋蕩兵凡兵之勝敵之失也勝失之兵必隱必微必積必搏隱則勝闡矣微則勝顯矣積則勝散矣搏則勝離矣諸搏攫抵噬之獸其用齒角爪牙也必託於卑微隱蔽此所以成勝呂氏春秋決勝凡用兵者必先自廟戰主孰賢將孰能民孰附國孰治蓄積孰多士卒孰精甲兵孰利器僃孰便故運籌於廟堂之上決勝乎千里之外矣淮南子兵略夫論除謹動靜時吏卒辨兵甲治正行伍連什伯明鼓旗此尉之官也前後知險易見敵知難易發斥不忘遺此候之官也隧路亟行輜治賦丈均處軍輯井竈通此司空之官也收藏於後遷舍不離無淫輿無遺輜此輿之官也凡此五官之於將也猶身之有股肱手足也必擇其人技能其才使官勝其任人能其事告之以政申之以令使之若虎豹之有爪牙飛鳥之有六翮莫不為用然皆佐勝之具也非所以必勝也淮南子兵略訓夫兵之所以佐勝者衆而所以必勝者寡甲堅兵利車固馬良畜積給足士卒殷軫此軍之大資也而勝亡焉明於星辰日月之運刑德竒賌之數背鄉左右之便此戰之助也而全亡焉淮南子兵略訓三軍之衆百萬之師志厲青雲氣如飄風聲如雷霆淮南子兵略訓始如狐狸彼故輕來合如兕虎敵故奔走夫飛鳥之摯也俯其首猛獸之攫也匿其爪虎豹不外其爪而噬不見齒故用兵之道示之以柔而迎之以剛示之以弱而乘之以強為之以歙而應之以張將欲西而示之以東先忤而後合前冥而後明若鬼之無迹若水之無創故所鄉非所之也所見非所謀也舉措動靜莫能識也若雷之擊不可為僃淮南子兵略訓今使陶人化而為埴則不能成盆盎工女化而為絲則不能織文錦同莫足以相治也故以異為竒兩爵相與鬭未有死者也鸇鷹至則為之解以其異類也故靜為躁竒治為亂竒飽為飢竒佚為勞竒竒正之相應若水火金木之代為雌雄也淮南子兵略訓故善用兵者見敵之虛乘而勿假也追而勿舍也迫而勿去也擊其猶猶陵其與與疾雷不及塞耳疾霆不暇撩目善用兵若聲之與響若鏜之與鞈眛不給撫呼不給吸當此之時仰不見天俯不見地手不麾戈兵不盡拔擊之若雷薄之若風炎之若火陵之若波敵之靜不知其所守動不知其所為故鼓鳴旗麾當者莫不廢滯崩阤天下孰敢厲威抗節而當其前者故凌人者勝待人者敗為人杓者死淮南子兵略訓夫五指之更彈不若捲手之一挃萬人之更進不如百人之俱至也今夫虎豹便捷熊羆多力然而人食其肉而席其革者不能通其知而一其力也淮南子兵略訓善者之動也神出而鬼行星曜而玄逐鸞舉麟振鳳飛龍騰發如秋風疾如駭龍當以生擊死以盛乘衰以疾掩遲以飽制飢若以水滅火若以湯沃雪何往而不遂何之而不達也淮南子兵略訓欲疾以遬人不及步鋗車不及轉轂兵如植木弩如羊角淮南子兵略訓擊之如雷霆斬之若草木耀之若火電淮南子兵略訓夫景不為曲物直響不為清音濁觀彼之所以來各以其勝應之淮南子兵略訓深哉睭睭逺哉悠悠且冬且夏且春且秋上窮至高之末下測至深之底變化消息無所凝滯建心乎窈冥之野而藏志乎九旋之淵雖有明目孰能窺其情淮南子兵略訓輪轉而無窮象日月之運行若春秋有代謝若日月有晝夜終而復始明而復晦淮南子兵略訓與飄飄往與忽忽來莫知其所之與條出與間入莫知其所集卒如雷霆疾如風雨若從地出若從天下獨出獨入莫能應圉疾如鏃矢何可勝偶一晦一明孰知其端緒未見其發固已至矣淮南子兵略訓今使兩人接刃巧拙不異而勇士必勝者何也其行之誠也夫以巨斧擊桐薪不待利時良日而後破之加巨斧於桐薪之上而無人力之奉雖順招搖挾刑德而弗能破者以其無勢也故水激則悍矢激則逺夫括淇衛􅙪簵載以銀錫雖有薄縞之幨腐荷之矰然猶不能獨射也假之筋角之力弓弩之勢則貫兕甲而徑於革盾矣夫風之疾至於飛屋折木虛舉之下大遲自上髙丘人之有所推也是故善用兵者勢如決積水於千仞之隄若轉員石於萬丈之溪天下見吾兵之必用也則孰敢與我戰者故百人之必死也賢於萬人之必北也况以三軍之衆赴水火而不還踵乎淮南子兵略訓風雨可障蔽而寒暑不可開閉以其無形故也夫能滑淖精微貫金石窮至逺放乎九天之上蟠乎黃盧之下唯無形者也淮南子兵略訓為麋鹿者則可以罝罘設也為魚鱉者則可以網罟取也為鴻鵠者則可以矰繳加也惟無形者無可禁也是故聖人藏於無原故其情不可得而觀運於無形故其陳不可得而經淮南子兵略訓夫水勢勝火章華之臺燒以升勺沃而救之雖涸井而渴池無奈之何也舉壺榼盆盎而以灌之其滅可立而待也今人之與人非有水火之勝也而欲以少耦衆不能成其功亦明矣淮南子兵略訓紂之卒百萬之心武王之卒三千人皆專而一故千人同心則得千人力萬人異心則無一人之用淮南子兵略訓舜許由異行而皆聖伊尹伯夷異道而皆仁箕子比干異趨而皆賢故用兵者或輕或重或貪或廉此四者相反而不可一無也淮南子泰族訓師無輜重之費士無乏絶之勞此所謂食於厨倉而戰於門郊者也鹽鐵論西域彗星見彼操其柄我操其摽以掃則彼利以擊則我利説苑權謀一人必死十人弗能待也十人必死百人弗能待也百人必死千人弗能待也千人必死萬人弗能待也萬人必死橫行乎天下令行禁止王者之師也説苑指武魯石公劒迫則能應感則能動䀛穆無窮變無形像復柔委從如影與響如龎之守戶如輪之逐馬響之應聲影之像形也門不及鞈呼不及吸足舉不及集相離若蟬翼尚在肱比睂睫之微曾不可以大息小以小况大用兵之道其猶然乎此善當敵者也説苑指武麋鹿有兵而不能以鬬無術之軍也魚鱉之兵散而不集鴻鵠之兵髙而無被淮南子兵略訓解見機之道莫不先於不意故猛獸失險童子持戟以追之蜂蠆發毒壯士倣徨而失色以其禍出不圖變速非慮也武侯心書應機靜若魚潛動若奔獺武侯心書試將軍以竒計為謀以絶智為主能柔能剛能弱能強能存能亡疾如風雨舒如江海不動如泰山難知如陰陽無窮如地充實如天不竭如江河終始如三光生死如四時衰旺如五行竒正相生而不可窮武侯十六䇿治軍勢不虛動運如圓石從髙墜下所向者碎不可救止武侯十六䇿治軍計謀欲蜜攻敵欲疾獲若鷹擊戰如河決則兵未勞而敵自此用兵之勢也武侯十六䇿治軍前後相赴左右相趨如常山之蛇首尾俱到此救兵之道也武侯十六䇿治軍疾走者仆安行者遲乘危者殘武侯十六䇿陰察震雷始於曜電出師先乎威聲故觀電而懼雷壯聽聲而懼兵威兵先乎聲其來已久文心雕龍檄栘善攻者敵不知其所守如畏雷電擊無常處善守者敵不知其所攻如尋寰中不見其際劉子兵術兵無成勢水無定形觀形而運竒隨勢而應變反經以為巧無形以成妙故風雨有形則可以帷幕捍寒暑無形不可以關鑰遏也劉子兵術兵形象水水之行避髙而就下兵之勢避實而擊虛避強而攻弱避治而取亂避鋭而擊衰劉子兵術將以權決為本卒以齊力為先是以列宿滿天不及朧月者形不一光不同也虎尤多力而受制於人者心不一力不齊也萬人離心不如百人同力千人遞戰不如十人俱至劉子兵術逄蒙善射不能用不調之弓造父善御不能䇿不服之馬般倕善斫不能運不利之斤孫吳善將不能戰不習之卒劉子閲武略觀圍棊法於用兵怯者無功貪者先亡文選韋𢎞嗣博奕論注俗有圍棊上者張置疏逺多得道而為勝中者務相絶遮要以爭便利下者守邊趨作罫自生於小地猶薛公之言黥布反也上計取吳楚廣道者也中計塞城絶遮要爭利者也下計據長沙以臨越此守邊隅趨作罫者也更始帝將相不能防衛而令罫中死棊皆生文選韋𢎞嗣博奕論注用兵之害猶豫最大起之若驚用之若狂當之者破近之者亡使如疾雷不暇掩耳也意林太公六韜使見戰如餓狼之見肉則可用矣意林商君書我欲戰而彼不欲戰者我鼓而進之若山崩河溢當其衝者摧植其鋒者破所謂疾雷不暇掩耳則又誰禦之意林物理論其寂也象繫不能究其微其動也雷霆不能比其變文苑英華周宣帝檄一謀猷是習權變須長時增齊竈或臥燕墻是以井陘之兵如鴻毛之遇火長平之卒若秋草之中霜文苑英華庾信連珠夫虎之為獸水牛之為畜殆其兵矣夫虎爪牙既鋒膽力無伍至於即豕也卑俯而下之必有扼喉之獲夫水牛不便速角又喬踈然處郊之野朋遊屯行部隊相伍及其寢宿因陳反禦若見吼虎􅔰角牛希免害矣若用兵恃強必鑒於虎居弱必誡水牛可謂攻取屠城而守必能全者也太平御覽兵部敘兵下大人之兵如虎如狼如風如雨如雷如震振振暝暝天下盡驚太平御覽太部雨下猛將之發觀於虎而鑒於鷹故攻如擊電避如收霧閉之如在瓶開之如散星太平御覽器物部瓶傳曰窮鼠齧貍蓋鼠窮則鬬也故兵法曰歸師勿遏圍師必闕埤雅品物門鼠孫武子曰鳥起者伏也烏集者虛也言古之善料兵者觀鳥起而知伏視烏集而知遁埤雅品物門烏將戰之時審候風所從來風順致呼而從之風逆堅陳以待之玉海天文天文書上耳可鑿而塞目可穿而眩口可利而訥興師動衆萬夫莫議其奇在三者或可動或可靜之陰符經集注太公暴虐罔水行舟朋淫於家書益稷有夏昏德民墜塗炭書仲虺之誥上帝監民罔有馨香德刑發聞惟腥書呂刑交交桑扈音户率場啄粟哀我填音顛寡宜岸宜獄詩小雅小宛山有嘉卉侯栗侯梅廢為殘賊莫知其尤詩小雅四月有菀音鬱者柳不尚息焉上帝甚蹈無自昵焉俾豫靖之後豫極焉有菀者柳不尚愒音器焉上帝甚蹈無自瘵音債焉俾豫靖之後豫邁焉詩小雅菀柳有鳥高飛亦傅音附於天彼人之心於何其臻詩小雅菀柳多將熇熇叶許各反不可救藥詩大雅板蟊音牟賊蟊疾靡有夷屆音戒叶居氣反罪罟不收靡有夷瘳詩大雅瞻卬北風刺虐也衛國並為威虐百姓不親莫不相攜持而去焉毛詩北風菀柳刺幽王也暴虐無親而刑罰不中諸侯皆不欲朝毛詩菀柳王為酷虐慘毒之政如冬日之烈烈矣其亟急行於天下如飄風之疾也鄭氏箋詩四月涼風用事而衆草皆病貪殘之政行而萬民困病鄭氏箋詩四月其為殘酷痛病於民如蟊賊之害禾稼然鄭氏箋詩瞻卬天既曀曀然其常陰又虺虺然其震雷也以興州吁之暴如是毛詩正義終風言天既為北風其寒涼矣又加之雨雪其雱然而盛由涼風盛雪病害萬物以興君政酷暴病害百姓也毛詩正義北風狐色皆赤烏色皆黑以喻衛之君臣皆惡也人於赤狐之羣莫能别其赤而非狐者言皆是狐於黑烏之羣莫能别其黑而非烏者言皆是烏以喻於衛君臣莫能别其非惡者言皆為惡毛詩正義北風冽然而寒者彼下流之泉浸彼苞稂之草也稂非灌溉之草得水則病以喻共公之政教甚酷虐於民下民不堪侵刻遭之亦困病毛詩正義下泉嚴秋之日凄凄然有寒涼之風由此寒涼之風用事於時故使百草皆被凋殘以致傷病以興幽王之惡有貪殘之政由此貪殘之政行於天下故萬民皆見殘害以遭困病毛詩正義四月已為蠆尾以令於國國將若之何左傳昭公四年吳為封豕長蛇以荐食上國虐始於楚左傳定公四年國之興也視民如傷是其福也其亡也以民為土芥是其禍也左傳哀公元年狗彘食人食而不知檢塗有餓莩而不知發人死則曰非我也歲也是何異於刺人而殺之曰非我也兵也孟子梁惠王上殺人以挺與刃有以異乎曰無以異也以刃與政有以異乎曰無以異也孟子梁惠王上庖有肥肉廄有肥馬民有飢色野有餓莩此率獸而食人也獸相食且人惡之為民父母行政不免於率獸而食人惡在其為民父母也孟子梁惠王上仲尼曰始作俑者其無後乎為其象人而用之也如之何其使斯民飢而死也孟子梁惠王上夫秦虎狼國也有吞天下之心戰國䇿楚威王執倕拊以鞭笞天下史記秦始皇紀其治如狼牧羊史記酷吏傳其爪牙吏虎而冠史記酷吏傳縱以鷹擊毛摯為治史記酷吏傳見乳虎無值寧成之怒史記酷吏傳為人上操下如束濕薪史記酷吏傳猛獸産乳養護其子則搏噬過常前漢書義縱酷吏傳注宫闈之內若見鷹鸇後漢書郭皇后紀視民如寇讐稅之如豺虎監司項背相望與同疾疢後漢書左雄列傳使餓狼守庖厨飢虎牧牢豚遂至熬天下之脂膏斷生人之骨髓怨毒無聊禍亂並起後漢書仲長統列傳發屋伐樹將為嚴烈雖欲懲惡難以聞逺後漢書王龔列傳初為天子後為人螭後漢書崔琦傳足下張狼虎之口吐長蛇之毒魏志袁紹傳注此無異殘林覆巢而全其遺􅑹曲惠小仁何補大虐吳志陸遜傅注猛虎班班遊戲山間虎欲囓人不避豪賢宋書樂四志熊羆厲爪蓄攫烮之心虎豹摩牙起吞噬之憤宋書沈攸之傳心如猛火山林無以供其暴意等漏巵江河無以充其溢魏書孝莊紀寧飲三升酢不見崔𢎞度寧茹三升艾不逢屈突蓋隋書崔𢎞度酷吏傳財物屈而禍亂起王公則病不足於上庶人則凍餒羸瘠於下於是桀紂羣居而盜賊擊奪以危上矣安禽獸行虎狼貪故脯巨人而炙嬰兒矣荀子正論趙王遊於圃中左右以兔與虎而輟觀之盻然環其眼王曰可惡哉虎目也左右曰平陽君之目可惡過此見此未有害也見平陽君之目如此者則必死矣韓非子外儲説右疾人之謂鬼傷人人逐除之之謂人傷鬼也民犯法令之謂民傷上上刑戮民之謂上傷民韓非子解老世至於枕人頭食人肉葅人肝飲人血甘之芻豢淮南子覽冥訓天下敖然若焦熱傾然若苦烈淮南子兵略訓今馳道經營陵陸紆周天下是以萬里為民穽也罻羅張而縣其谷辟陷設而當其蹊繳弋飾而加其上能弗離乎鹽鐵論刑德刑人若刈菅芳用師若彈丸鹽鐵論鹽鐵取下中行氏之為政也以苛為察以欺為明以刻為忠以計多為善以聚斂為良譬之其猶鞟革者也大則大矣裂之道也新序雜事一虎狼結謀相聚為保思嚼牛羊道絶不通焦氏易林比之困羣虎入邑求索肉食焦氏易林履之豐蠆室蜂戶螫我手足焦氏易林履之泰桀跖並處人民愁苦焦氏易林謙之剝徑邪賊田政惡傷民焦氏易林噬嗑之未濟跖並桀處民困愁苦焦氏易林復之離白虎黑狼伏伺山陽遮遏牛羊病我商人焦氏易林無妄之夬熊羆豺狼在山陰陽伺鹿取麞道伏畏難焦氏易林頤之中孚唁唁諤諤虎豹相齚焦氏易林家人之坤西國疆梁為虎作狼焦氏易林蹇之節狼虎之鄉日爭凶訟受性貪叨不能容縱焦氏易林損之既濟鷹鸇獵食雉兔困極焦氏易林漸之大過羣隊虎狼齧彼牛羊道路不通妨農害商焦氏易林節之坎申韓之術不仁之至矣若何牛羊之用人也若牛羊用人則狐貍螻蚓不膢臘也歟楊子問道或曰刀不利筆不銛而獨加諸砥不亦可乎曰人砥則秦尚矣楊子問道始皇方虎挒而梟磔噬士猶臘肉也楊子重黎始皇方斧將相方刀六國方木將相方肉激也楊子重黎上九割肉取骨滅頂于血測曰割肉滅血不能自全也太玄經第六割春秋戰國之君以百姓為蠛蠓以刀鋸為金帛茍有匹夫高枕而寐者天下皆以為祥其殘也如此天祿閣外史問兵言秋氣起則西風急疾而害生物使百草不得盛長以言君令急促剗傷百姓使不得保其性命也王逸注楚辭七諌峻刑戮之術制民如牛羊臨之以刀爼故曰不仁之至也楊子法言注問道篇嚴刑裁民亦猶刀之割肉以人為砥酷之甚也楊子法言注問道篇其遇民也若剃氏之芟草既藴崇之又行火焉惵惵黔首豈徒局髙天蹐厚地而已哉乃救死於其頸文選東京賦刑酷然炭暴踰膏柱文選陸陲石闕銘秦人視山東之民猶猛虎之睨羣羊何隔憚哉意林物理論坑戮侔於屠伯芟夷過於剃氏文苑英華盧思道檄一尚書帝命期曰桀失玉鏡用其噬獸初學記器用部鏡秦始皇見周室失統自以當保有九州見萬民碌碌猶羣羊聚諸皆可以竿而驅之故遂以敗也太平御覽皇王部始皇帝如屠孟屠几為骨聚佛説身觀經當九如五龍頭心中毒盛猶如惡蛇瞋氣怫鬱熐炎俱起本緣經月光王品遇王暴虐猶如師子在鹿羣中終無一念慈善之心本緣經毗羅序品為著翅之暴貍飛沈受困而難計法苑珠林卷六十九喻林卷一百八
