body:
  text: 喻林卷八十一明徐元太撰德行門三愼獨相在爾室尚不愧於屋漏無曰不顯莫予云覯詩大雅抑下如惡惡臭如好好色此之謂自慊大學曽子曰十目所視十手所指其嚴乎大學君子獨立不慚於影獨寢不慚於魂晏子春秋外篇夫察所夜行周公慚乎景故君子愼其獨也淮南子繆稱訓若行獨梁不為無人不兢其容故使人信己者易蒙衣自信者難淮南子繆稱訓次二神戰於𤣥其陳陰陽測曰神戰於𤣥善惡并也太𤣥經第一中人之須善猶首之須冠足之待履首不加冠是越類也行不躡履是夷民也今處顯而修善在𨼆而為非是清旦冠履而昏夜倮跣也劉子愼獨荃蓀孤植不以巖𨼆而歇其芳石泉潛流不以澗幽而不清人在暗宻豈以𨼆翳而迴操劉子愼獨謂天葢高而聽甚卑謂日甚逺而照甚近謂神甚幽而察甚明劉子愼獨居室如見賓入虚如有人故蘧瑗不以昏行變節顔囘不以夜浴改容劉子愼獨修操於明行悖於幽以人不知若人不知則鬼神知之鬼神不知則已知之而云不知是盜鍾掩耳之智也劉子愼獨君子表不𨼆裏明暗同度意林魏子帶之銘曰火滅修容愼戒必恭恭則夀玉海踐阼篇集解高彦先謹獨銘曰其出户如見賓其入虚如有人其行無愧於影其寢無愧於衾困學紀聞卷五儀禮譬如樹王尼拘陀子其子微細種之在地則不可見至樹生時方乃可見毘耶娑問經推九善意如電來即明去便復冥邪念如雲覆日時不見已惡意起不見道三慧經藉八積小地中生木升君子以順德積小以高大易升地中生木始於毫末終至合抱君子象之以順行其德積其小善以成大名王弼註易萃積薄成厚積卑成高君子日汲汲以成煇小人日快快以至辱文子上德積德成王積怨成亾積石成山積水成海不積而能成者未之有也文子道德積土成山風雨興焉積水成淵蛟龍生焉積善成德而神明自得聖人循焉故不積蹞步無以至千里不積小流無以成江河荀子勸學積土而為山積水而為海旦暮積謂之歳積善而全盡謂之聖人故聖人也者人之所積也荀子儒效人積耨耕而為農夫積斵削而為工匠積販貨而為商賈積禮義而為君子居楚而楚居越而越居夏而夏是非天性也積靡使然也故人知謹注錯愼習俗大積靡則為君子矣荀子儒效仁義禮善之於人也辟之若貨財粟米之於家也多有之者富少有之者貧至無有者窮荀子大畧土積而成山阜水積而成江海行積而成君子鹽鐵論執務聲無細而不聞行無𨼆而不明說苑談叢凡山陵之高非削而成崛起也必步增而稍上焉川谷之卑非截斷而顚陷也必陂池而稍下焉是故積上不止必致嵩山之高積下不已必極黄泉之深非獨山川也人行亦然潛夫論愼微伊尹放太甲展季覆寒女商魯之民不稱淫篡焉何則積之於素也故染不積則人不觀其色行不積則人不信其事徐幹中論貴驗明出乎幽著生乎微故宋井之霜以基昇正之寒黄蘆之萌以兆大中之暑事亦如之故君子修德始乎笄丱終乎鮐背創乎夷原成乎喬嶽徐幹中論修本夫損之者如燈火之消脂莫之見也而忽盡矣益者如苗禾之播殖莫之覺也而忽茂焉故治身養性務謹其細不可以小益為不平而不修不可以小損為無傷而不防凡聚小所以就大積一所以至億也抱朴子内篇極言千倉萬箱非一耕所得干天之木非旬日所長不測之淵起於汀瀅陶朱之資必積百千抱朴子内篇極言盈乎萬鈞必起於錙銖竦秀凌霄必始於分毫是以行潦集而南溟就無涯之曠尋常積而𤣥圃致極天之高抱朴子外篇博喻鴻毳性輕積之沈舟繒縞質薄疊之折軸以毳縞之輕微能敗舟軸者積多之所致也劉子愼隟水積成川載瀾載清土積成山歊蒸鬱冥山不讓塵川不辭盈勉志含𢎞以隆德聲文選張華勵志詩累微以著乃物之理纒牽之長實累千里文選張華勵志詩勿謂其微覆簣成高勿謂其細巨由纖毫藝文類聚儲官部儲官箴譬如尼拘陀子其形雖小無妨能成就大樹枝條長廣覆葢數百千地太寶積經一百十我觀此善根極為甚微細猶如山石沙鎔銷則出金禪定與智慧猶如雙􅀈囊我以功力吹必出眞妙金大莊嚴經論卷十偈乃欲泛芥舟於巨壑策駘足於長路庻累毫成仞聚爝為明攝大乗論序卷善因雖微獲果甚大如小爝火能燒大山一善能破大惡亦如少燈能破多闇輕日能消重露小子能生大樹世事尚然何況善力也法苑珠林卷八十九勵志誰謂華高企其齊而誰謂德難厲其庶而前漢書韋𤣥成傳葢猶痿人思步盲者願明嵩霍咫尺江河匪逺宋書魯爽傳惡木之陰不可暫息盜泉之水無容悞飲周書寇儁傳夫彈痤者痛飲藥者苦為苦憊之故不彈痤飲藥則身不活病不已矣韓非子六反子有含菽縕絮而致滋美其親將以求孝也人曰偽如之何曰假儒衣書服而讀之三月不歸孰曰非儒也楊子孝至篇言已雖見放流猶種蒔衆香循行仁義勤身勉力朝暮不倦也王逸註楚辭離騷經言已雖被放逐而棄居於山澤猶重鑿蘭蕙和糅衆芳為糧食飲有節修善不倦也王逸註楚辭九章屈原見橘根深堅固終不可移則專一己志守忠信也王逸註楚辭九章言已精明雖消滅猶結玉枝申修忠誠立長庚之星以繼日光晝夜常行志意明也王逸註楚辭九歎言已志意高大上切於天譬若仙人王僑乗浮雲載赤霄上凌太清游天庭也王逸註楚辭九歎夫路不險則無以知馬之良任不重則無以知人之德君子日强其所重以取福小人日安其所輕以取禍徐幹中論修本夫珠之含礫瑾之挾瑕斯其性與良工為之以純其性若夫素然故觀二物之既純而知仁德之可粹也優者取多焉劣者取少焉在人而已孰禁我哉乗扁舟而濟者其身也安粹大道而動者其業也美徐幹中論修本忍痛苦之藥石者所以除伐命之疾嬰甲胄之重冷者所以扞鋒鏑之集潔操履之拘苦者所以全拔萃之業納拂心之至言者所以悟易方之惑也抱朴子外篇博喻修塗之累非移晷所臻凌霄之高非一蕢之積然升峻者患於垂上而力不足為道者病於方成而志不遂抱朴子内篇極言煌煌靈芝一年三秀予獨何為有志不就文選嵇康幽憤詩若金受礪若泥在鈞文選張華勵志詩渴不飲盜泉水熱不息惡木陰文選陸機猛虎行遁世之士非受匏瓜之性幽居之女非無懷春之情是以名勝欲故偶影之操矜窮愈達故凌霄之節厲文選陸機演連珠脂我名車策我名驥千里雖遥孰敢不至補文選陶潛榮本小人恥其面不如子都君子恥其行不如舜禹故小人貴明鑒君子尚至言意林物理論爵禄滿則忠衰室富足則行衰意林管子貧不攻九嶷玉倦不憩三危峯九嶷有惑號三危無安容藝文類聚樂部論樂詩比求志之士望塗而息何氏語林言志猶如渇人終無變吐甘露之味海空智藏經供獻品比擐甲之精堅固策駟之遄夙則必任善以為軛引之無窮之路委身而作肄駈之罔極之期波羅宻多經五百九十卷序譬如長者求多珍財晝夜精勤思惟方便常作是念我於何時多獲珍財遂本所願由斯無暇求諸飲食波羅蜜多經五百九十譬如壯士武畧備具見敵兵至著堅甲胄乗策驥駿所去無畏大乘顯識經推四若念力堅强雖入五欲賊中不為所害譬如著鎧入陣則無所畏是名不忘念佛遺敎經羊五寧噉燒石吞飲鎔銅法句經利養品如象拔淤泥者是時戰象内心自念吾前後來受王寵待甘美飲食吾先服食與王鬭戰無不降伏設我今日没在淤泥不自拔出與王進鬭者則我失由來之名亦使一國被其毁辱出曜經五無放逸品之餘猶如曾入海人諸知入海孔穴道路所經過處某處某水漿某處博戲家某處婬種家如此諸家當念逺離設至海中有果名摩檀那亦莫取食設食此果者便不能采致珍寶出曜經五無放逸品之餘有人持珠度海失亾其珠人便持木斗舀水棄岸上海神言汝當何時盡是水人言生死棄之不置海神知其意出珠還之三慧經藉八譬如賈客於險道中備受諸苦乃得大利大智度論卷七十二反已仁者如射射者正已而後發發而不中不怨勝已者反求諸已而已矣孟子公孫丑上子曰射有似乎君子失諸正鵠反求諸其身中庸昔荆人之梟將巢於呉鳩遇之曰何去荆而巢呉乎梟曰荆人惡予之聲鳩曰子不能革子之音則呉楚之民不異情也為子計者莫若宛頸戢翼終身勿復鳴也曹子建令禽惡鳥論夫見人而不自見者謂之矇聞人而不自聞者謂之聵慮人而不自慮者謂之瞀故明莫大乎自見聰莫大乎自聞睿莫大乎自慮此三者舉之甚輕行之甚邇而莫之知也故知者舉甚輕之事以任天下之重行甚邇之路以窮天下之逺故德彌高而基彌固勝彌衆而愛彌廣徐幹中論修本今夫立身不為人之所譽而為人之所謗者未盡為善之理也盡為善之理將若舜焉人雖與舜不同其敢謗之乎故語稱救寒莫如重裘止謗莫如修身療暑莫如親冰信矣哉徐幹中論虚道懷疾者人不使為醫行穢者人不使畫法以無驗也子思曰能勝其心於勝人乎何有不能勝其心如勝人何徐幹中論修本烈士之愛國也如家奉君也如親則不忠之事不為其罪矣仁人之視人也如已待疏也猶宻則不恕之怨不為其責矣抱朴子外篇廣譬火性無所私金性方剛故曰公正前漢書註京房傳禀天地精靈合德齊明是以首擬天腹擬地四肢合四時五藏合五行動如風雷言成文章也揚子法言註五百篇尸子曰舜之行其猶河海乎千仞之溪亦滿之螻蟻之穴亦滿之李善註文選沈休文昭王碑文性愛山泉情篤魚鳥而從鷗未狎入獸相驚藝文類聚人部𨼆逸下啟巖巖孔聖異代稱傑景合乾坤明叅日月初學記人部聖若欲占察過去往昔集業久近所作强弱大小差别者當復刻木為三輪以身口意各主一輪書字記之又於輪正中一面書一畫令麄長使徹畔次第二面書一畫令細短使不至畔次第三面作一榜刻如畫令其麄深次第四面亦作傍刻令使細淺當知善業莊嚴猶如畫飾惡業衰害猶如損刻其畫長大者顯示積善來久行業猛利所作增上其畫細短者顯示積善來近始習基鈍所作微薄其刻麄深者顯示習惡來久所作增上餘殃亦厚其刻細淺者顯示退善來近始習惡法所作之業未至增上占察善惡業報經卷上能涉逺路喻之脚足勝持一切喻之大地生長萬物喻之時雨善療衆病喻之良醫能消饑渇喻之甘露接濟沈溺喻之橋梁運渡大海喻之浮囊能除昏暗喻之燈光法苑珠林卷八十七譬如良醫觸物為藥故醫術斯行遇病斯治羅什譯維摩詰經佛道品法輪淵廣難側法海流潤無涯故德無邊矣僧肇註維摩詰經佛國品自修雷在天上大壯君子以非禮弗履易大壯山下有澤損君子以懲忿窒欲易損山上有雷小過君子以行過乎恭喪過乎哀用過乎儉易小過金錫有其質鍊之故益精圭璧有其實琢磨乃成器毛詩正義淇澳小人溺於水君子溺於口大人溺於民皆在其所褻也夫水近於人而溺人德易狎而難親也易以溺人口費而煩易出難悔易以溺人夫民閉於人而有鄙心可敬不可慢易以溺人故君子不可以不愼也禮記緇衣儒有忠信以為甲胄禮義以為干櫓戴仁而行抱義而處禮記儒行儒有不寶金玉而忠信以為寶不祈土地立義以為土地不祈多積多文以為富禮記儒行外寛而内直自設於𨼆括之中大戴禮記衞將軍文子夫義路也禮門也惟君子能由是路出入是門也孟子萬章下揵六枳而為籬兮築蕙若而為室播蘭芷於中廷兮列杜衡於外術後漢書馮衍傳襲溫恭之黻衣兮被禮義之繡裳辮貞亮以為鞶兮雜技藝以為珩昭綵藻與雕琢兮璜聲逺而彌長後漢書張衡列傳御六藝之珍駕兮遊道德之平林結典籍而為罟兮敺儒墨而為禽後漢書張衡列傳方將馳騁乎典籍之崇塗休息乎仁義之淵藪槃旋乎周孔之庭宇揖儒墨而與為友後漢書蔡邕列傳應規矩之淑質兮過班倕而裁之恊凖矱之眞度兮同斷金之𤣥策後漢書崔駰列傳武王曰吾欲造起居之誡隨之以身几之書曰安無忘危存無忘亡熟惟二者必後無凶杖之書曰輔人無茍扶人無咎後漢書崔駰列傳動若重規静若疊矩蜀志郤正傳同鏘玉振争芬蘭郁晉書鄭袤列傳夫食稻梁進芻豢衣狐貉襲冰紈觀窈眇之竒儛聽雲和之琴瑟此生人之所急非有求而爲也修道德習仁義敦孝悌立忠貞漸禮樂之腴潤蹈先王之盛則此君子之所急非有求而為也梁書劉峻傳抱玉而懷珠且滋蘭而樹蕙魏書李順希仁弟騫傳持繩視直置水觀平北齊書魏收傳春生夏長天地平分之功子孝臣誠人倫不易之道隋書于仲文傳君子之居也綏如安裘晏如覆杼韓詩外傳昨日何生今日何成必念歸厚必念治生日愼一日完如金城韓詩外傳卷八次四帶其鉤鞶錘以玉環測曰帶其鉤鞶自約束也太𤣥經第一周言已修身清潔乃取江離辟芷以為衣被紉索秋蘭以為佩飾博采衆善以自約束也王逸註楚辭離騷經言已旦飲香木之墜露吸正陽之津液暮食芳菊之落華吞陰陽之精蘂動以香浄自潤澤也王逸註楚辭離騷經言已修飾清潔以瑶玉為席美玉為瑱王逸註楚辭九歌屈原言已居家則以薜荔摶飾四壁蕙草縛束屋乗船則以蓀為楫櫂蘭為旌旗動以香潔自修飾也王逸註楚辭九歌必將修繩履墨不偏不黨抱朴子内篇道意入峻谷者當攀葛藟可以免於頁眞墜猶處時俗者當據道義然後得用自立前漢書註叙傳千里之馬繫以長索則為累矣人雖有容貌不修德如千里馬也李善註文選張茂先勵志詩設於𨼆括之中直已不直人蘧伯玉之行也李善註文選蔡伯喈郭有道碑文旌性行以製珮兮珮夜光與瓊枝纗幽蘭之秋華兮又綴之以江籬文選思𤣥賦匪仁里其焉宅兮匪義跡其焉追文選思𤣥賦白華絳趺在陵之陬蒨蒨士子涅而不渝文選補亾詩白華朱萼被於幽薄粲粲門子如磨如錯文選補亾詩如彼蘭蕙載採其芳文選潘安仁贈陸機詩直如朱絲繩清如玉壺冰文選樂府鮑明逺白頭吟漸漬德義之淵棲遲道藝之域文選韋𢎞嗣博奕論夫心猶首面一旦不修飾則塵垢穢之人心不思善則邪惡入之人盛飾其面而莫修其心惑矣文選張茂先女史箴註賤珪璧於光陰竟松筠於晚歳廣文選任彥昇求為劉瓛立館啟終始若矢去不善如絶絃古文苑失名氏楚相孫叔敖碑古人目短於自見故以鏡觀形心短於自治故以禮自防意林唐子駕青虬兮驂白螭吾與重華游兮瑤之圃登崑崙兮食玉英吾與天地兮比夀與日月兮齊光楚辭九章涉江救寒無若重裘止謗莫若自修斯言信矣太平御覽人事部諺下木去其火則不灰人去其惡性則不死陰符經註若欲求火當須人功備其鑽且運動力手然後見火衆生學道修習正行亦復如是大乗妙林經如田農夫於秋月時勤耕深地能除穢草海空智藏經供獻品譬如善識眞寶之匠於寶山中獲得一珠得已水漬從漬出已置醋漿中從醋漿出已置之豆汁意猶不已復置苦酒苦酒出已置衆藥中從藥出已以氀毼磨是名眞正青琉璃珠大方等大集經卷三厭諸諠雜如獨覺乗洗煩惱垢如清浄水能除臭穢如疾飄風斷衆結縛如利刀劒大集地藏十輪經卷一譬如眞金置礬石中如法鍊已離一切垢轉復明淨大方廣佛華嚴經三十五以諸善根瓔珞其身無盡意菩薩經八猶如新成衣塵土所汙染有目智慧人抖搜塵悉去中陰經卷上如金在鑛中無有能見金智者善陶鍊其金乃明顯大乗宻嚴經卷下譬如波斯匿王善養四兵若鬭戰時擊大戰鼓吹大戰螺對敵堅住緣斯恩養戰無遺力能勝怨敵國境安寧大法鼓經卷上如鍊金法消除滓穢離垢清淨隨所著處本垢不汙大法鼓經卷下如人巧浴器盛衆藥以水漬之中外俱潤無不周遍長阿含經卷十三如有人沐浴清潔以新白㲲被覆其身舉體清淨長阿含經卷十三猶木工師彼持墨繩用絣於木則以利斧斫治令直中阿含經卷二十猶如居士秋時颺穀穀聚之中若有成實者颺便止住若不成實及粃糠者便隨風去居士見已即持掃箒掃治令淨所以者何莫令汙雜餘淨好稻中阿含經卷二十九譬如王發四種兵雖行戰鬭初發行時意但欲攻敵耳佛所說經種種諸善但欲共攻去一切惡耳那先比丘經卷上譬如人立平地持好弓箭能射殺怨賊三法合行亦如是戒為平地禪定為快弓智慧為利箭三事備足能殺煩惱賊三昧法門經卷下立大要憺被三願鎧外破魔衆内擊結賊三昧法門經卷下稊稗害禾多欲妨學耘除衆惡成收必多法句經敎學品譬如有人修治樹園地高下之邱墟平之溉灌以時拔去荆棘穢草蘆葦邪生諸曲横出不理皆落治之棄諸垣外令其順好樹木無礙根生葉茂皆悉獲之令不折傷以是之故樹木轉大華實興盛其修行者受法師敎除婬怒癡欲想諸穢以是之故行遂長成至于得道修行道地經慈品譬如金師鍊金垢隨火去眞金獨在大智度論卷十四如病人隨良醫敎將和治法病無不差大智度論卷二十二譬如久鏁脚人卒得解脫行時雖無有鏁猶有習在如乳母衣久故垢著雖以淳灰淨浣雖無有垢垢氣猶在衣大智度論卷一十七我以慚愧䩙捉持智慧秤大莊嚴經論卷六偈陶鍊生金畧有三種一除垢陶鍊二攝受陶鍊三調柔陶鍊除垢陶鍊者謂從金性中漸漸除去麄中細垢乃至唯有淨金沙在攝受陶鍊者謂即於彼鄭重銷煮調柔陶鍊者謂銷煮已更細鍊治瑕隙等穢瑜伽師地論卷十三勒身口如馬著轡禁情欲如猴帶鏁辯正論卷一能排巨暗譬滿月之照三途巧遣衆毒似摩祗之除萬惡法苑珠林卷八十五嚴飾道場澡浴塵垢著新潔衣内外俱淨法苑珠林卷八十八心以智德為嚴形以相好為飾嚴心所以進道飾形所以靡俗僧肇註維摩詰經佛國品内修魯公扈趙齊嬰二人有疾同請扁鵲求治扁鵲治之既同愈謂公扈齊嬰曰汝曩之所疾自外而干府藏者固藥石之所已今有偕生之疾與體偕長今為汝攻之何如列子湯問被褐者薄外懷玉者厚内河上公註老子知難次二正其腹引其背酋貞測曰正其腹中心定也太𤣥經第一戾初一内其明不用其光測曰内其明自窺深也太𤣥經第五視次二沈視自見賢於𦕈之眄測曰沈視之見得正美也太𤣥經第五沈次二堅白玉形内化貞測曰堅白玉形變可為也太𤣥經第六堅内清外濁弊衣褁玉意林太元經疏濯胷臆澡雪腹心使之芬香皓潔而不可汚也意林仲長統昌言若韜山金如苞海寶藝文類聚内典部典部志道家云眞人之心若珠在淵衆人之心若瓢在水困學紀聞卷二十雜識被褐者同其塵懐玉者寶其眞也聖人之所以難知以其同塵而不殊懐玉而不渝道德經註子形不淨受諸染著積垢於身必思澡澣心垢不淨六根所染弗思其澣茲為迷惑是故身垢不淨以世水洗之心垢不淨以法語洗之虚皇四十九章人禀骨肉之質猶陶家坯也坯未冶則敗速身未鍊則命促理固然也聖母資傳仙道剪諸見之萌則翳蘂星落褰積疑之網則障縠雲披波羅蜜多經五百九十三四如意為足正念為頭項慈悲明淨眼利智慧為牙以空無我吼破諸煩惱賊大方廣佛華嚴經卷二十五四念處為弓信五根為箭四正勤為馬四如意為車五力以為鎧破諸煩惱賊大方廣佛華嚴經卷二十五譬如倉蠅在糞上住自以為浄心亦如是入愛欲中自以為淨佛遺日摩尼寶經推六譬如垢汙衣浣治以灰汁以灰汁浣治是衣得清淨如是以過患染汙於正識浣以智慧灰心即得清淨文殊師利問經卷下譬如明月而埋於雲雲除散滅麗乎光天於虚空中朗然顯現蘇婆呼童子經卷中譬如虚空於一切衆生無有障礙而彼虚空為諸煙雲塵霧等事之所翳障法集經欲一譬如磨鏡垢去明存即自見形斷欲守空即見道眞佛說四十二章經尺一婬邪汙心猶鏡處泥穢垢汙焉偃以照天覆以臨土聰睿聖達萬土臨照雖有天地之大靡一夫而能覩所以然者由其垢濁衆垢汙心有踰彼鏡矣若得良師剗刮瑩磨薄塵微曀蕩使無餘舉之以照毛髮面理無微不察垢退明存使其然矣佛說大安般守意經序十方諸醫不能除人心之垢佛則是醫所語聞者心垢則除便待安𨼆如來三昧經卷中如莽虞鳥昔日形貌妙善端嚴亦有威光今何隠没苦切修練容質若斯身毛喜豎經下洗除心垢如工鍊金法句經塵垢品心棄惡法如蛇脫皮法句經梵志品佛問居士調象之法有幾事乎答曰常以三事用調大象何謂三一者剛鉤鉤口著其䩭靽二者減食常令饑瘦三者捶杖加其楚痛以此三事乃得調良又問施此三事何所攝治也鐵鉤鉤口以制强口不與食飲以制身獷加捶杖者以伏其心正爾便調曰作此伏者為何所施用答曰如是伏已可中王乗亦可令鬭隨意前却無有罣礙又問居士止有此法復有其異答曰調象之法正如此耳佛告居士但能調象復能自調即曰不審自調其義云何佛告居士吾亦有三事用調一切人亦以自調得至無為一者至誠制御口業二以慈貞伏身剛强三以智慧滅意癡法句譬喻經四象喻品如御車馬遲則策之牛奔則抑之四阿含暮抄解藉五譬如女人入屛帳裏種種莊嚴莊嚴既竟然後乃出阿育王經卷八刀鋸截身莫起瞋恚如燒枯樹無有恨心修行道地經慈品身心而相應疾成道德果修行道地經慈品人身有疾病醫藥以除之心疾亦如是四意止消之修行道地經勸意品譬如合集草木筏山川江河漂之壞愛樂之河急如是意念于寂則向空修行道地經行空品我以正見之石磨智慧劒解汝肢節無明羅刹經人有瞋恚是為地生蒺藜三慧經藉八婆羅門常著縷褐五熱炙身時人因名號縷褐炙時比丘尼見是事已而語之言汝可炙者而不炙之不可炙者而便炙之爾時縷褐聞是語已極生瞋恚而作是言惡剃髮者何者可炙比丘尼言汝若欲知可炙處者汝但灸汝瞋忿之心若能炙心是名眞心如牛駕車車若不行乃須策牛不須打車身猶如車心如彼牛以是義故汝應炙心云何暴身又復身者如材如􅀈雖復燒炙將何所補大莊嚴經論卷二無障礙者復有四種一非覆障所礙二非𨼆障所礙三非映障所礙四非惑障所礙瑜伽師地論卷十五愚夫内縛與彼外縳而有差别謂彼外縳為色一分之所繫縳或木或鐵或索所繫愚夫乃為諸行所縳又彼外縳他縛所縳愚夫乃為自縳所縳又彼外縳易可了知縳縳因縁脫脫方便愚夫内縳一切難知瑜伽師地論卷八十七身如乾薪瞋恚如火未能燒他先自燋身法苑珠林卷七十二譬如大火焚燒屋宅有勇健者以水滅之智慧之水能滅恚火亦復如是法苑珠林卷七十八抖拺煩惱去離貪著如衣抖擻能去塵垢法苑珠林卷八十四道品心中有三相一發動二攝心三名捨若發動過則心散散則攝之攝之過則没没則精進令心發動若動静得適則任之令進容豫處中是名為捨捨即調御調御即和合也譬如善御遲則策之疾則制之舒疾得宜則放之令去縱步夷塗必之所往也羅什譯維摩詰經佛道品盡是修心之閑地𢎞道之淨場也僧肇註維摩詰經菩薩品喻林卷八十一
