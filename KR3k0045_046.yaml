body:
  text: 喻林卷四十六明徐元太撰人事門四十四全生夫昆峯積玊光澤者前毁瑶山叢桂芳茂者先折是以東都有挂冕之臣南國見捐情之士斯豈惡梁錦好蔬布哉蓋欲保其七尺終其百年耳北齊書文苑祖鴻勳傳莊子行於山中見大木枝葉盛茂伐木者止其旁而不取也問其故曰無所可用莊子曰此木以不材得終其天年夫子出於山舍於故人之家故人喜命豎子殺鴈而烹之豎子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者明日弟子問於莊子曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生將何處莊子笑曰周將處夫材與不材之間材與不材之間似之而非也故未免乎纍若夫乘道德而浮遊則不然無譽無訾一龍一蛇與時俱化而無肯専為莊子山木南伯子綦遊乎商之丘見大木焉有異結駟千乘隱將芘其所藾子綦曰此何木也哉此必有異材夫抑而視其細枝則拳曲而不可以為棟梁俯而視其大根則軸解而不可以為棺槨咶其葉則口爛而為傷嗅之則使人狂酲三日而不已子綦曰此果不材之木也以至於此其大也嗟乎神人以此不材莊子人間世匠石之齊至乎曲轅見櫟社樹其大蔽牛潔之百圍其髙臨山十仞而後有枝其可以為舟者旁十數觀者如市匠伯不顧遂行不輟弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肯視行不輟何邪曰已矣勿言之矣散木也以為舟則沈以為棺槨則速腐以為器則速毁以為門戶則液樠以為柱則蠧是不材之木也無所可用故能若是之夀匠石歸櫟社見夢曰女將惡乎比豫哉若將比豫於文木邪夫柤梨橘柚果蓏之屬實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭自掊擊於世俗者也物莫不若是且豫求無所可用久矣幾死乃今得之為豫大用使豫也而有用且得有此大也邪且也若與豫也皆物也奈何哉其相物也而幾死之散人又惡知散木匠石覺而診其夢弟子曰趣取無用則為社何耶曰密若無言彼亦直寄焉以為不知己者詬厲也不為社者且幾有翦乎莊子人間世三蝨相與訟一蝨過之曰訟者奚說三蝨曰爭肥饒之地一蝨曰若亦不患臘之至而茅之燥耳若又奚患於是乃相與聚嘬其母而食之彘􅋯人乃弗殺韓非子說林百姓愛之如父母神明佑之若赤子故身常存河上公注老子韜光的的者獲提提者射故大白若辱大德若不足淮南子說林訓夫郊祭之牛食養朞年衣之文繡以入廟堂太宰執其鸞刀以啓其毛方此之時願任重而止峻坂不可得也鹽鐵論毁學夫君子愛口孔雀愛羽虎豹愛爪此皆所以治身法也說苑雜言榕樹南海桂林多植之葉如木麻實如冬青樹幹拳曲是不可以為器也其本稜理而深是不可以為材也燒之無熖是不可以為薪也以其不材故能久而無傷其蔭十畝故人以為息焉南方草木狀孰與銜轡而伏櫪同被繡于犧牛哉抱朴子外篇嘉遁夫內熱者之飲毒藥非不害也疽痤用砭石非不痛也然而為之者以小痛來而大痛滅小害至巨害除也饑而倍食渴而大飲熱而投水寒而投火雖暫怡性必為後患劉子利害夫係蹄在足則猛虎絶其蹯蝮蛇在手則壯士斷其節何則以其所全者重所棄者輕文選陳琳檄吳將校文虬以深潛而保真鴻以髙飛而遠害文選謝靈運登池上樓詩注抱璧塗乞無為貴寶履仁遘禍無為貴道廣文選曹子建矯志詩鵷雛翔穹冥蒲且不能視鸛鷺遵臯渚數為矰所繫藝文類聚人部隱逸上詩夫以擁腫之木得免因於不才觳觫之牛自保由於無用藝文類聚人部别下書爾聞蜚廉氏之說乎昔蜚廉氏有二馬一者朱躐白毳龍骼鳯臆驟馳如舞終日不釋鞍竟以熱死一者重脛昂尾駝頸貉膝踶齧善蹶弃而散諸野終年肥遁是以鳯凰不憎山棲蛟龍不羞泥蟠君子不茍潔以罹患聖人不避穢而養生何氏語林言志王無功集無心子傳譬如獵客網中兔得脫寧復念還入網中不念得脫如兔脫網終不還歸惟日雜難經譬如昔者而有一鱉從海出遊至於岸邊有一大狐追之欲危其命鱉覺狐來藏頭四足覆於甲下狐住待之設出頭足我當摶食鱉急不動狐極捨去鱉還詣于大神龍王說某本末求為龍神乃無所畏修行道地經修行品譬如大官捕諸飛鳥皆翦其翅閉著籠中日擇肥者以給官厨時諸飛鳥日日稍减中有一鳥心自念言肥者先死若吾當肥亦死如前設不食者便當饑死今當節食令身不肥亦莫使羸令身輕便出入無礙不為宰人所見烹害羽翼可得漸漸生長若從籠出便可飛遊從意所至修行道地經曉了食品猶如多捕衆鳥藏在大器隨時瞻視養食以時毛尾既長隨時剪落選其肥者日用供厨中有一鳥內自思惟若我食多肥則致死若餓不食復致喪身宜自料量少食損膚衣毛悅澤當從籠出如其所念即便少食衣毛悅澤便從其願出曜經六戒品昔佛在世時有一道人在河邊樹下學道十二年中貪想不除不能得道佛知可度化作沙門往至其所樹下共宿須㬰月明有龜從河中出來至樹下復有水狗饑行求食與龜相逢便欲噉龜龜縮其頭尾及其四腳藏於甲中不能得噉水狗小遠復出頭足行步如故不能奈何遂便得脫於是道人問化沙門此龜有護命之鎧水狗不能得其便化沙門答曰吾念世人不如此龜不知無常放恣六情外魔得便形壞神去法句譬喻經二心意品譬如捕魚人見一魚深入大水鉤網所不及則絶望憂愁大智度論七十九免害初九需于郊利用恆無咎象曰需于郊不犯難行也易需九二需于沙小有言終吉易需說而應乎乾是以履虎尾不嘻人亨易履九四履虎尾訴訴終吉易履上九碩果不食君子得輿小人剝廬易剝九二惕號莫夜有戎勿恤易夬處卦之終獨得完全不被剝落猶如碩大之果不為人食也周易正義剝夫有隙之棄舟而得濟者有衣袽也鄰於不親而得全者終日戒也王弼注易小過馮暖曰狡兔有三窟僅得免其死耳今有一窟未得髙枕而卧也請為君復鑿二窟戰國䇿齊閔王毋為怨府毋為禍梯史記趙世家無曰不辜甑終不墮井矣文子上德故解之以牛之白顙者與豚之亢鼻者與人有痔病者不可以適河此皆巫祝以知之矣所以為不祥也此乃神人之所以為大祥也莊子人間世授甲晨征則理均於困獸斬關宵遁則義殊於前禽晋書李雄列傳盲者處平而不遇深溪愚者守靜而不陷險危韓非子用人夫兕虎有域動靜有時避其域省其時則免其兕虎之害矣民獨知兕虎之有爪角也而莫知萬物之盡有爪角也不免於萬物之害何以論之時雨降集曠野閒靜而以昏晨犯山川則兕虎之爪角害之事上不忠輕犯禁令則刑法之爪角害之處鄉不節憎愛無度則爭鬭之爪角害之嗜欲無限動靜不節則痤疽之爪角害之好用其私智而棄道理則網羅之爪角害之兕虎有域而萬害有原避其域塞其原則免於諸害矣韓非子解老夫珠玉人主之所急也和雖獻璞而未美未為主之害也然猶兩足斬而寶乃論論寶若此其難也今人主之於法術也未必和寶之急也而禁羣臣士民之私邪然則有道者之不僇也持帝王之璞未獻耳韓非子和氏小國不鬬於大國之間兩鹿不鬭於伏兕之傍淮南子說林訓臣聞之乞火不得不望其炮矣今使柳下惠於齊縱不解於齊兵終不愈益攻於魯矣說苑善說牧羊稻園聞虎呻喧懼畏惕息終免禍患焦氏易林屯之復飛鷹退去不食雉雞焦氏易林蒙之家人火雖熾在吾後冦雖多在吾右焦氏易林大有之需癭瘤瘍疹為身瘡患疾病癃疴常不危殆焦氏易林大有之大壯西過虎廬驚我前驅雖憂無危焦氏易林豫之坎弩弛弓藏良犬不烹焦氏易林蠱之損臨溪橋疚雖恐不危焦氏易林臨之離鳬游江湖甘樂其餌既不近人雖驚不駭焦氏易林噬嗑之大畜官成立政衣就缺袂恭謙為衛終無禍尤焦氏易林無妄之遁雕葉被霜獨蔽不傷焦氏易林頤之小過從猬見虎雖危無殆焦氏易林大過之革虎卧不起牛羊歡喜焦氏易林坎之謙履氷蹈凌雖困不窮焦氏易林明夷之隨敏捷亟疾如猿集木􅊮弓雖調終不能獲焦氏易林漸之蹇上九兩虎相牙知掣者測曰兩虎相牙知所制也太𤣥經第二爭次五藏不滿盜不嬴測曰藏滿盜嬴還自損也太𤣥經第五積次八揮其罦絶其羂古縣字殆測曰揮罦絶羂危得遂也太𤣥經第五翕次七正其足蹛于狴獄三嵗見録測曰正其足險得平也太𤣥經第六窮逸麟逍遙大荒之表故無機穽之禍靈鶬振翅𤣥圃之峯以違罩羅之患何必曲穴而永懷怵惕何必銜蘆而慘慘畏容故充乎宰割之用者必愛乎芻豢者也給乎煎熬之膳者必安乎庭立者也抱朴子外篇博喻懸魚惑以芳餌檻虎死於籠狐不可以釣緍致者必虬螭也不可以機穽誘者必麟虞也抱朴子外篇廣譬猶網魚之去水罟圍獸之出陸羅也抱朴子外篇譏惑鴻髙飛冥冥薄天雖有弋執矰繳何所施巧而取焉喻賢者深居亦不罹暴亂之害李善注文選范蔚宗逸民傳論焦鵬振六翮羅者安所羈廣文選嵇叔夜述志詩次七出險登丘或牽之牛太𤣥經第一礥叩頭蟲蟲之微細者然教之輒叩頭人以其叩頭傷之不祥故莫之害也太平御覽蟲豸部叩頭居牛馬之位者無牛馬之患託犬羊之列者無犬羊之咎道德經指歸卷八無之為物水火不能害金石不能殘用之於心則虎兕無所投其齒角兵戈無所容其鋒刃何危殆之有乎道德經注譬如有人閉在深獄門戶堅牢唯有厠孔便從中至無礙處元陽妙經卷九譬如野干於諸龜鱉不能得便不得便故所行自在也婆羅密多經五百八十九譬如大海中船卒破壞知中人皆當墮水沒死終不能得度是船中有板若檣有健者得之騎其上順流隨海得出知是人終不沒水中死也何以故用得板檣故道行波羅密經卷五譬如有人善入大海一切水族無能為害假使入於摩竭魚口亦不為彼之所吞噬大方廣佛華嚴經卷七十八如鹿突圍得免獵師危害之苦禪祕要法經尺四雀在瓶中覆蓋其口不能出飛今瓶已破雀飛而去佛說七女經尺六轉禍六二明夷夷于左股用拯馬壯吉易明夷初六鼎顛趾利出否得妾以其子無咎易鼎六二震來厲億喪貝躋于九陵勿逐七日得易震六二婦喪其茀勿逐七日得易既濟處鼎之初將在納新施顛以出穢得妾以為子故無咎也王弼注易鼎六四鴻漸于木或得其桷無咎易漸六五射雉一矢亡終以譽命易旅智者之舉事也轉禍而為福因敗而成功者也齊人紫敗素也而賈十倍戰國䇿燕昭王遭乾坤之靈值時來之運揚湯止沸使不燋爛起煙於寒灰之上生華於己枯之木魏志劉廙傳公之在公安也北畏曹操之强東憚孫權之逼內慮孫夫人興變於肘腋之下孝直為輔翼遂翻飛翺翔不可復制華陽國志復䇿敗駕之駟以兾萬里之功非天眷之隆將何以至此晋書庾氷傳失火而遇雨失火則不幸遇雨則幸也故禍中有福也淮南子說林訓唐子短陳駢子於齊威王威王欲殺之陳駢子與其屬出亡奔薛孟嘗君聞之使人以車迎之至而養以芻豢黍粱五味之膳日三至冬日被裘罽夏日服絺紵出則乘牢車駕良馬孟嘗君問之曰夫子生於齊長於齊夫子亦何思於齊對曰臣思夫唐子者孟嘗君曰唐子者非短子者邪曰是也孟嘗君曰子何為思之對曰臣之處於齊也糲粢之飯藜藿之羮冬日則寒凍夏日則暑傷自唐子之短臣也以身歸君食芻豢飯黍粢服輕暖乘牢良故思之此謂毁人而反利之者也淮南子人間訓抗枉令直使販更成說苑正諫褰衣涉河澗流浚多賴遇舟子濟脫無它焦氏易林坤之萃淵坑復平宇穴安寧焦氏易林隨之鼎初雖無輿後得載車焦氏易林隨之旅千人舉龍困危得海焦氏易林臨之中孚湯火之憂轉解喜來焦氏易林小過之噬嗑膏澤沐浴洗去汚辱振除災咎更與夀福焦氏易林漸之賁上九棲于菑初亡後得基測曰棲菑得基後得人也太𤣥經第一上次七纍卵業業懼貞安測曰纍卵業業自危作安也太𤣥經第一差次八赤舌燒城吐水于瓶測曰赤舌吐水君子以解祟也太𤣥經第一千次七疾則藥巫則酌測曰疾藥巫酌禍可轉也太𤣥經第六失萬物衰落故言不善積衰落之物以積明嵗故作明基太𤣥經第五積解回纍碁之危成維山之固藝文類聚職官部司徒碑得免虎口仍上龍門文苑英華庾信傳生促人生一世間如白駒過隙何至自苦如此乎史記留侯世家夫人生居世間也譬猶騁六驥决隙也史記李斯傳蘇子曰人生一世若朝露之託於桐葉耳其與幾何後漢書王符傳注夏之日忽以過冬之夜尋復來晉書段灼傳飄風不終朝驟雨不終日孰為此者天地天地尚不能久而况於人乎老子虗無川閲水以成川世閲人而為世河之下龍門也疾如箭之脫筈人夀幾何而期以有待也子華子神氣操有時之具而託於無為之間忽然無異騏驥之馳過隙也莊子盜跖夫藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也藏小大有宜猶有所遁莊子大宗師楊朱曰太古之事滅矣孰志之哉三皇之事若存若亡五帝之事若覺若夢三皇之事或隱或顯億不識一當身之事或聞或見萬不識一目前之事或存或廢千不識一太古至于今日年數固不可勝紀但伏羲已來三十餘萬嵗賢愚好醜成敗是非無不消滅但遲速之間耳矜一時之毁譽以焦苦其神形要死後數百年中餘名豈足以潤枯骨何生之樂哉列子楊朱人之生其猶氷也水凝而為氷氣積而為人氷極一冬而釋人竟百嵗而死人可令不死氷可令不釋乎王充論衡道虛篇人居一世間忽若風吹塵曹子建薤露行念人生之不永若春日之微霜曹子建節遊賦唯人生之忽過若鑿石之末耀曹子建感節賦徒聞有先霜而枯瘁當夏而凋青含穗而不秀未實而萎零未聞有享於萬年之夀久視不已之期者矣抱朴子內篇論仙里語有之人在世間日失一日如牽牛羊以詣屠所每進一步而去死轉近此譬雖醜而實理也抱朴子內篇勤求且夫𤣥黃遐邈而人生倐忽以過隙之促託罔極之間迅乎猶奔星之暫見飄乎似飛矢之電經抱朴子外篇嘉遁夫二儀彌邈而人居若隅以朝囷之耀秀不移晷而殄瘁類春華之暫榮未改旬而凋墜雖飛飊之經霄激電之乍照未必速也夫期頥猶奔星之騰炯黃髮如激箭之過隙况或未明而殞籜迎秋而零瘁者哉抱朴子外篇自敘唐肆非停馬處言求向者之有不可復得也人之生若馬之過肆耳無駐須臾郭子注莊田子方采采榮木結根于兹晨耀其華夕已喪之人生若寄憔悴有時陶靖節集詩四言夫天回日轉其謝如矢騕裊迅足弗能追也人之短生猶如石火炯然以過唯立德貽愛為不朽也劉子惜時人之性命脆促不殊譬水同波而無異瀾也李善注文選歎逝賦夫露之在草無一朝有餘以喻人之居世無一時而能故也李善注文選歎逝賦言日無停景川不旋波以喻年命流行曽無止息也李善注文選陸士衡長歌行譬日及之在條恆雖盡而弗悟文選歎逝賦愁洽百年苦溢千嵗何異促鱗之游汀濘短羽之棲翳薈文選張協七命逝矣經天日悲哉帶地川寸陰無停晷尺波豈徒旋文選陸機長歌行年往迅徑矢時來亮急弦文選陸機長歌行時無重至華不再揚蘋以春暉蘭以秋芳文選陸機短歌行頺魄不再圓傾羲無兩旦金石終銷毁丹青暫雕煥文選謝惠連秋懷詩人生瀛海內忽如鳥過目文選張協詩人生寄一世奄忽若飈塵文選古詩人生天地間百年孰能要歘如歊石火瞥若截道飈文選潘嶽河陽縣作詩尋煙染芬薰息猶芳徴音録響操終則絶何則垂於世者可繼止乎身者難結是以𤣥晏之風恆存動神之化已滅文選陸機演連珠人生無根蒂飄如陌上塵補文選陶潛雜詩處百齡之內居一世之中倐忽比之白駒寄遇謂之逆旅補文選昭明太子陶淵明集序神龜雖夀猶有竟時騰蛇乘霧終為土灰廣文選曹孟德碣石篇桃李不奢年桑榆多暮節常恐秋蓬根連翩因風雪廣文選王元長遊仙詩夫及遠者箭也而定遠非箭之功為生者我也而制生非我之情故自箭而為心不可憑者絃因生以觀我不可恃者年廣文選鮑明遠觀漏賦時不留乎激矢生乃急於走丸既河源之莫壅又吹波而助瀾廣文選鮑明遠觀漏賦蓋人生天地之間也若流電之過户牖輕塵之栖弱草藝文類聚地部塵惟人生於世上若馳驥之過櫺藝文類聚人部哀傷賦曄曄蕣華朝生夕落藝文類聚人部哀傷文寒暑更進退金石有終始光色俯仰間英艷難久恃藝文類聚人部言志詩團團明月魄滿則缺亭亭陽暉曜過則逝天地猶有盈虧况華豔之浮蘖藝文類聚禮部婚夜漏方盡馳光復斜藝文類聚職官部特進墓志至如不死之草猶稱南裔長生之樹尚挺西崑百紀遊龜皆登蓮葉千齡夀鶴或舞松枝假矣生民何其夭脆譬彼風電同諸泡沫藝文類聚靈異部仙道碑清露被臯蘭凝霜霑野草朝為美少年夕暮成醜老初學記天部露火憑薪以傳熖人資氣以享年苟薪氣之有竭何年焰之恆延初學記器物部火越王告吳王曰民生于地上寓也老萊子曰人生於天地之間寄也寄者固歸困學紀聞卷十八評詩如矢一發往而不回虛皇四十九章人生一世間譬如電光速嬰兒化老耄倐忽春夢中虛皇四十九章人之生世常知有歸生死周回曽不休息譬如日出於東亦自西沉三十六部尊經消魔經如絲經盡無可尋續海空智藏經供獻品猶如假借勢不得久海空智藏經持戒品譬如秋月池中蓮花一切衆人之所樂見而忽萎黃人所棄薄海空智藏經持誡品譬如電菌一時之夀玉清經八節品星夜編而曉落則邪見難保露陰泫而陽晞則色蘊方促波羅蜜多經卷五百七十七譬如草端霜露凝滴日光照灼必不停住大寶積經四十一如天大雨流泡亂浮速起速滅如是身為不堅如水上泡其性輕薄亦復如是大寶積經四十二譬如大海及以衆流有泡沫聚一切不堅其性虗弱不可􅀈觸大寶積經四十二譬如夏月暑息止樹下涼須臾當復去世間無有常佛說越難經尺六譬若如鐵洞然俱熾以鎚打之迸火飛空上已即滅中阿含經卷二譬如燒􅂒讒然便滅中阿含經卷二譬如路傍樹暫息非久停佛說無常經當九又如朽舍及如漏船雖假修治旋歸散壞大乘經上身如聚沫不可撮摩又如水泡旋有即壞大乘經上又如坯器難為固惜大乘經上不寐夜長疲倦道長愚生死長法句經暗愚品命如果待熟常恐㑹零落法句經生死品如河駛流往而不返人命如是逝者不還法句經無常品人在世間譬乘泥船渡河當浮渡船且壞人身如泥船不可久當疾行道三慧經藉八譬如駛河常流不停衆生夀命亦復如是本緣經鬼羅摩品譬之如屋脊骨如棟脅肋如椽骸骨如柱皮如四壁肉如泥塗虛僞假合為人安在危脆非真幻化須㬰思惟要略法譬如山頂河瀑疾不暫停大莊嚴經論卷五偈譬如燈炷唯賴膏油膏油既盡勢不久停人亦如是唯賴壯膏壯膏既盡衰老之炷何得久住法苑珠林卷四十七欲火所燒貪心難滿事等駃河乍同沃焦故以尺波寸影大力所不能駐月御日車雄才莫之能遏法苑珠林卷九十二常存不變謂之夀而外風積氣飄鼓動止無常動止無常風無夀也外風既無夀內風類可知僧肇注維摩詰經方便品喻林卷四十六
