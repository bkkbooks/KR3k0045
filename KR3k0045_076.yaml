body:
  text: 喻林卷七十六明徐元太撰臣術門三持體夫相大官也處大官者不欲小察不欲小智故曰大匠不斫大庖不豆大勇不鬭大兵不寇吕氏春秋貴公匡章謂惠子於魏王之前曰蝗螟農夫得而殺之奚故為其害稼也今公行多者數百乘步者數百人少者數十乘步者數十人此無耕而食者其害稼亦甚矣惠王曰惠子施也難以辭與公相應雖然請言其志惠子曰今之城者或者操大築乎城上或負畚而赴乎城下或操表掇以善晞望若施者其操表掇者也使工女化而為絲不能治絲使大匠化而為木不能治木使聖人化而為農夫不能治農夫施而治農夫者也公何事比施於螣乎吕氏春秋不屈宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治巫馬期問其故於宓子宓子曰我之謂任人子之謂任力任力者故勞任人者故逸宓子則君子矣逸四肢全耳目平心氣而百官以治義矣任其數而已矣巫馬期則不然弊生事精勞手足煩教詔雖治猶未至也吕氏春秋察賢大匠但視模範而已不復自斫削也大庖但調和五味使神人享之而已不復自列簠簋邊豆也大勇之人折衝千里而能服逺不復自鬭也吕氏春秋貴公解如刀筆之吏務在筐箱而不知大體賈子俗激譬如工匠但以智心指授而去執斤斧者疲苦終日計功受賞匠者三倍又如征伐鬭者冒死主將受功大智度論卷二十八恭順上不在天下不在田故乾乾因其時而惕雖危無咎矣易乾坤元亨利牝馬之貞易坤牝馬地類行地無疆柔順利貞君子攸行易坤盡於臣道不敢創首唯守其終猶若田農不敢發首而耕唯在後穫刈而已不敢菑發新田唯治其菑熟之地皆是不為其始而成其末猶若為臣之道不為事始而代君有終也周易正義無妄牛者稼穡之資六三僭為耕事行唱始之道而為不順王事之行故有司或繫其牛制之使不妄造周易正義無妄狼跋美周公也周公攝政逺則四國流言近則王不知周大夫美其不失其聖也毛詩狼跋人臣待君倡而後和毛詩蘀兮注白鳥集于西雍之澤言所集得其處也杞宋之君有潔白之德來助祭於周之廟得禮之宜也其至止亦有此容言威儀之善如鷺然鄭氏箋詩振鷺露之在物湛湛然使物柯葉低垂喻諸侯受燕爵其義有似醉之貌諸侯旅酬之則猶然唯天子賜爵則貌變肅敬承命有似露見日而晞也鄭氏箋詩湛露湛湛然在物上者露斯也此物得露而湛湛然柯葉低垂非見日之陽則不得乾而舒放也以興諸侯受王燕飲而巍峩然威儀縱弛非天子之賜爵則不承命而嚴肅也毛詩正義湛露以水無情猶義有朝宗况人而可無朝宗乎毛詩正義沔水蘇子謂秦王曰臣聞懷重寶者不以夜行任大功者不以輕敵是以賢者任重而行恭智者功大而辭順故民不惡其尊而世不妬其業戰國䇿秦昭襄王且韋弦非能言之物而聖賢引以自匡臣才智暗淺願自比於韋弦魏志劉廙傳下之事上也如響之應聲也臣之事主也如影之從形也故上令而下應主行而臣從管子任法夫激矢則逺激水則旱激主則悖悖則無君子矣吕氏春秋去宥為人臣者法地之道暴其形出其情以示人髙下險易堅耎剛柔肥臞美惡纍可就財裁同也故其形宜不宜可得而財也為人臣者比地貴信而悉見其情於主主亦得而財之春秋繁露離合根老萊子曰子不見夫齒乎齒堅剛卒盡相磨舌柔順終以不弊子思曰吾不能為舌故不能事君孔叢子抗志丘能自削故貞猶君子處於髙位而善下人亦其正也太𤣥經第一增解人臣終始盛衰向迎其君如月迎日天理然也揚子法言注五百篇夫人臣猶如土也萬物載焉而不辭其重水瀆汚焉而不辭其下草木植焉而不有其功意林體論譬如馬寶若人乘御便作是念我今不應令乘御人身支搖動疲倦勞苦或損嚴具盤回去住遲速任人將護其人不令緣我起瞋忿等種種過失波羅蜜多經卷五百九十一心鳲鳩刺不一也在位無君子用心之不一也毛詩鳲鳩一宿者一意於其所宿之木也喻賢者有専一之意鄭氏箋詩南有嘉魚翩翩而飛者是隼鳥也此鳥由一意於其所宿之木故久如欲來所以翩翩而飛來集於木也毛詩正義南有嘉魚視君不如奕棋其何以免乎奕者舉棋不定不勝其耦而况置君而弗定乎左傳襄公二十五年陳軫曰楚人有兩妻者人誂其長者長者詈之誂其少者少者許之居無幾何有兩妻者死客謂誂者曰汝取長者乎少者乎取長者客曰長者詈汝少者和汝汝何為取長者曰居彼人之所則欲其許我也今為我妻則欲其為我詈人也今楚王明主也而昭陽賢相也軫為人臣而常以國情輸楚楚王必不留臣昭陽將不與臣從事矣戰國䇿秦惠文君僕以為戴盆何以望天故絶賓客之知忘室家之業前漢書司馬遷傳苦身待士不如為國戴盆望天事不兩施後漢書第五倫傳誠知晉之宗廟鞠為茂草亦猶洪川東逝往而不還晉書石勒上記臣心如面臣面可改則臣心可改陳書傅縡傳一人兩心其中必衰太公六韜六伐二心不可以事君疑志不可以應敵太公六韜立將十至於私人之門不一至於庭百慮其家不一圖其國數雖衆非以尊君也百官雖具非以任國也管子明法為地戰者不能成其王為祿仕者不能正其君晏子春秋雜上嬰聞之順愛不懈可以使百姓暴強不忠不可以使一人一心可以事百君三心不可以事一君仲尼聞之曰小子識之晏子以一心事百君者也晏子問下欲入則入欲出則出欲親則親欲疏則疏欲就則就欲去則去欲求則求欲思則思若蚨母之從其子也鬼谷子內楗行衢道者不至事兩君者不容目不兩視而明耳不兩聽而聰螣蛇無足而飛梧鼠五技而窮荀子勸學古者蒼頡之作書也自環者謂之某背某謂之公公某之相背也乃蒼頡固以知之矣韓子五蠧兩心不可以得一人一心可以得百人淮南子繆稱訓鳲鳩以一心養七子君子以一儀養萬物一心可以事百君百心不可以事一君此之謂也列女傳周列國魏芒慈母鴶鵴鳲鳩専一無尤君子是則長受嘉福焦氏易林乾之蒙玉不隱瑕臣不隱情曹子建獻璧表廢退其君而欲後主之愛已是奚異夫為人子而舉其所生捐之山谷而取他人養之而云我能為伯瑜曾參之孝但吾親不中奉事故棄去之雖日享三牲昏定晨省豈能見憐信邪抱朴子外篇良規一得披𤣥雲望白日唯力是視敢有二心文選謝靈運鄴中詩注如轉輪王七寶具足所謂輪寶象寶馬寶主藏臣寶女寶將寶如意珠寶其轉輪王欲有所至四軍七寶前後導從爾時輪寶雖最居先而不分别前後之相波羅蜜多經卷三百五十一如轉輪聖王有四支勇軍隨彼輪王所行之處是四勇軍皆悉隨從隨彼輪王所至之處是四勇軍皆悉隨至波羅蜜多經卷三百五十一積誠有孚盈缶終來有他吉易比納約自牖終無咎易坎九二遇主于巷無咎易暌九二巽在牀下用史巫紛若吉易巽流潦水之薄者也逺酌取之投大器之中又挹之注之於此小器而可以沃酒食之餴者以有忠信之德齊潔之誠以薦之故也鄭氏箋詩泂猶乳犬攫虎伏雞摶貍精誠之至也何休解公羊莊公十二年人欲上天而釋其階知其無由登也以言我欲事君而釋忠信亦知終無以自通也王逸注楚辭九章若葵藿之傾葉太陽雖不為之回光終向之者誠也臣竊自比葵藿若降天地之施垂三光之明者實在陛下文選曹植求通表奏六代之樂不能祈天具百神之歌無以動聖初學記說官部太師太傅大保和衷二人同心其利斷金同心之言其臭如蘭易上繫大臣之乖爭本無大讐其已相和順而悅懌則如賓主飲酒相酬酢也鄭氏箋詩節南山俱為王臣其相比次如物之在繩索之貫宜應和相親毛詩正義何人斯有伯氏之兄吹塤又仲氏之弟吹篪以和之其情相親其聲相應和矣言我與汝何人其恩亦當如伯仲之為兄弟其情志亦當如塤篪之相應和不當有怨惡也毛詩正義何人斯視彼中林之處乃見甡甡然衆多者是其羣鹿鹿乃走獸猶以其類相善輩偶而行以喻朝廷羣臣亦當以善相與共處官位毛詩正義桑柔夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之後漢書朱暉列傳當此之㑹乃黿鳴而鱉應也故能同心戮力勤恤人隱後漢書張衡列傳吾三人者之于齊國也譬之猶鼎之有足也去一焉則必不立矣管子大臣投戈散地則六親不能相保同舟而濟則胡越何患乎異心周易略例明爻務在和光同塵共垢各竟其心為國蕃輔藝文類聚人部鑒誡詩衆人同心者可共築起一城同心共飲雒陽酒可盡也藝文類聚居處部城求助勿疑朋盍簪易豫六四顛頥吉虎視耽耽其欲逐逐易頥蘀音托兮蘀兮風其吹女音汝叔兮伯兮倡去聲豫和去聲叶户圭反女蘀兮蘀兮風其漂女叔兮伯兮倡豫要音腰女詩國風蘀兮蘀兮鄭莊公卒公子爭立而齊楚交伐忠臣憂之欲相率獻謀以救其國故作此詩詩說鄭節然而髙峻者彼南山也既髙峻矣而又滿之使平均者以其草木之長茂也以興赫赫然而盛者彼太師之官也太師既尊盛矣而有益之使平均者以用衆士之智能也毛詩正義節南山有楚大夫於此欲其子之齊語也則使齊人傅諸使楚人傅諸曰使齊人傅之曰一齊人傳之衆楚人咻之雖日撻而求其齊也不可得矣引而置之莊嶽之間數年雖日撻而求其楚亦不可得矣子謂薛居州善士也使之居於王所在於王所者長幼卑尊皆薛居州也王誰與為不善在王所者長幼卑尊皆非薛居州也王誰與為善一薛居州獨如宋王何孟子膝文公下夫苦匏不材於人共濟而已國語魯唐睢見春申君曰臣聞之賁諸懷錐刃而天下為勇西施衣褐而天下稱美今君相萬乘之楚禦中國之難所欲者不成所求者不得臣等少也夫梟棊之所以為能者以散棊佐之也夫一梟之不勝不如五散亦明矣今君何不為天下梟而令臣等為散乎戰國䇿楚考烈王二十八宿環北辰三十輻共一轂運行無窮輔拂股肱之臣配焉忠信行道以奉主上史記太史公自序杜摯與母丘儉鄉里相親故為詩與儉求仙人藥一丸欲以感切儉求助也魏志劉劭傳注鳥能逺飛逺飛者六翮之力也然無衆毛之助則飛不逺矣魏志崔琰傳注今捨本土而託將軍者非為妻子也欲濟世務猶同舟涉海一事不牢即俱受其敗吳志吕範傳注夫騂騮不總轡則非造父之肆日月不流光則非隋侯之掌晉書王接傳夫覆載垂化必由四氣運其功曦曜望舒亦須五星助其暉南齊書魏虜傳土相扶為墻人相扶為王北齊書尉景傳單者易折衆則難摧北史土谷渾傳夫方立之人維聖人而已如嬰者仄陋之人也若夫左嬰右嬰之人不舉四維將不正晏子春秋雜上譬若築墻然能築者築能實壤者實壤能欣者欣然後墻成也為義猶是也能談辨者談辨能說書者說書能從事者從事然後義士成也墨子耕柱管仲隰朋從於桓公而伐孤竹春往冬反迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而仞有水乃掘地遂得水以管仲之聖而隰朋之智至其所不知不難師於老馬與蟻今人不知以其愚心而師聖人之智不亦過乎韓非子說林上嬰仄陋之人也四維之然後能直說苑臣術王之國相比目之魚也外比內比然後能成其事就其功王曰何謂也逐女對曰朋其左右賢其夫妻是外比內比也列女傳周列國齊孤逐女夫道莫不成於三天有三光日月星地有三形髙下平人有三尊君父師故一公三卿佐之一卿三大夫佐之一大夫三元士佐之白虎通封公侯鹽人調鹽醯人調酢則五味成矣譬梓里治材土官治墻則厦屋成劉劭人物志材能注百足俱行相輔為強三聖翼事王室寵光焦氏易林屯之履拔劍傷手見敵不起良臣無佐困辱為苦焦氏易林咸之歸妹言我令雷師豐隆乘雲周行求隱士清潔若宓妃者欲與并心力也王逸注楚辭離騷經言我使鳳鳥明智之士飛行天下以求同志續以日夜冀相逢遇也王逸注楚辭離騷經言已使清白之臣如望舒先驅求賢使風伯奉君命於後以告百姓王逸注楚辭離騷經言飛鳥登髙木志意喜樂則和鳴求其羣而呼其耦鹿得美草口甘其味則求其友而號其侣也以言在位之臣不思賢念舊曾不若鳥獸也王逸注楚辭七諫韓子曰鳥有周周者首重而屈尾將欲飲於河則以顛乃銜羽而飲今人之所有飲不足者不可以不索其羽矣李善注文選阮嗣宗詠懷詩恐足下羞庖人之獨割引尸祝以自助手薦鸞刀漫之羶腥文選嵇康絶交書昔子奇年十八齊君使之治阿既行矣悔之使使追之使者及之而不還君問其故對曰臣見所以共載者白首也夫以老者之智以少者決之必能治阿矣是以不還藝文類聚職官部令長若能控奔驥以接駑乘則力追者萬羣循矯翅以顧短翮則歸飛者如雲太平御覽兵部鞚不居不耕而穫不菑而畬代終已成而不造也不擅其美乃盡臣道王弼注易無妄竊人之財猶謂之盜况貪天之功以為已力乎左傳僖公二十四年下邑之役董安于多趙簡子賞之辭固賞之對曰方臣之少也進秉筆贊為名命稱於前世義於諸侯而主弗志及臣之壯也耆指其股肱以從司馬苛慝不産及臣之長也端委韠帶以隨宰人民無二心今臣一旦為狂疾而曰必賞女是以狂疾賞也不如亡趨而出乃釋之國語晉唐睢謂信陵君曰臣聞之曰事有不可知者有不可不知者有不可忘者有不可不忘者信陵君曰何謂也對曰人之憎我者不可不知也吾憎人也不可得而知也人之有德於我也不可忘也吾有德於人也不可不忘也今君殺晉鄙救邯鄲破秦人存趙國此大德也今趙王自郊迎卒然見趙王臣願君之忘之也戰國䇿魏安釐王桃李不言下自成蹊此言雖小可以喻大也史記李將軍傳論雖涓流赴海誠心屢竭輕塵集嶽功力蓋微隋書楊素傳地出雲為雨起氣為風風雨者地之為為地不敢有其功名必上之於天命若從天氣者故曰天風天雨也莫曰地風地雨也勤勞在地名一歸於天非至有義其孰能行此故下事上如地事天也可謂大忠矣春秋繁露五行對為人下者其猶土乎種之則五穀生焉掘之則甘泉出焉草木植焉禽獸育焉生人立焉死人入焉多其功而不言為人下者其猶土乎說苑臣術指蹤非擬獲獸何勤文選任昉彈曹景宗戒妬衆無名之星隨心噣在天猶諸妾隨夫人以次序進御於君也鄭氏箋詩小星朝廷侈於妬上婦人侈於妬下何休解公羊成公十年女無美惡入室見妬士無賢不肖入朝見嫉美女者惡女之仇豈不然哉史記外戚世家魏王遺楚王美人楚王說之夫人鄭裒知王之說新人也甚愛新人衣服玩好擇其所喜而為之宫室卧具擇其所善而為之愛之甚於王王曰婦人所以事夫者色也而妬者其情也今鄭裒知寡人之說新人也其愛之甚於寡人此孝子之所以事親忠臣之所以事君也鄭裒知王以已為不妬也因謂新人曰王愛子美矣雖然惡子之鼻子為見王則必掩子鼻新人見王因掩其鼻王謂鄭裒曰夫新人見寡人則掩其鼻何也鄭裒曰妾知也王曰雖惡必言之鄭裒曰其似惡君王之臭也王曰悍哉今劓之無使逆命戰國䇿楚懷王蔽公者謂之昧隱良者謂之妒奉妒昧者謂之交譎交譎之人妒昧之臣國之薉孽也荀子大略篇士有妒友則賢交不親君有妒臣則賢人不至荀子大略夫國不乏於妬男也猶家不乏於妬女也近古以來自外及內其爭功名妬過已者豈希也潜夫論賢難害賢為嫉害色為妬王逸注楚辭離騷經妬之欺善抑亦貿首之讐也文選潘安仁馬汧督誄僖侯時宰人上食羮中有生肝乃問之宰人曰當是人置之欲去宰自處也後僖侯將浴湯中有礫僖侯曰有人欲代湯者意林韓子宋人有酤酒者斗槩甚平遇客甚謹醖酒甚美懸幟甚髙而酒不售遂致於酸問閭長倩倩曰汝狗惡也孺子懷錢挈壺往酤輒有狗齧之猶大臣齧有道之士也意林韓子譬如有狗前至他家見後狗來心生瞋恚􅀈􅀈吠之內心起想謂是我家法苑珠林卷九十戒隨股之為物隨足者也進不能制動退不能靜處所感在股志在隨人者也王弼注易咸腓體或屈或伸躁動之物腓動則足隨之故謂足為隨周易正義艮以事類風切剴微之言如水之流忽然而過故不悖逆鄭氏箋詩雨無正文姜初嫁於魯桓之時其從者之心意如雲然雲之行順風耳鄭氏箋詩敝笱若世之所謂能言者以巧善為言從順於俗如水之轉流理正辭順無所悖逆毛詩正義雨無正若以水濟水誰能食之若琴瑟之専一誰能聽之左傳昭公二十年籧篨口柔也戚施面柔也夸毗體柔也爾雅今日廷論局趣效轅下駒前漢書灌夫傳方今一朝羣臣如河中木耳泛泛東西耽祿畏害後漢書陳蕃列傳內外有司望風承㫖茍有所惡易於投卵晉書石苞傳夫挑妾者愛其易求妻則敬其難若承命如響將焉用之宋書武二王南郡傳爾如狗耳為人所嗾北史宋隱辨傳所謂和者君甘則臣酸君淡則臣鹹今據也甘君亦甘所謂同也安得為和晏子春秋諫上有語我以忠臣者令之俯則俯令之仰則仰處則靜呼則應可謂忠臣乎子墨子曰令之俯則俯令之仰則仰是似景也處則靜呼則應是似響也君將何得於景與響哉墨子魯問晏子聘魯哀公問曰語曰莫三人而迷今寡人與一國慮之魯不免於亂何也晏子曰古之所謂莫三人而迷者一人失之二人得之三人足以為衆矣故曰莫三人而迷今魯國之羣臣以千百數一言於季氏之私人數非不衆所言者一人也安得三哉韓非子內儲說上以水和水不可食一絃之瑟不可聽淮南子說林訓吾以賢良為少愈乃反其幽明若胡車相隨而鳴鹽鐵論散不足草木秋死松柏獨在水浮萬物玉石留止說苑談叢百工不循繩墨之直道隨從曲水屋必傾危而不可居也以言人臣不修仁義之道背棄忠直隨從枉佞茍合於世以求容媚以為常法身必傾危而被刑戮也王逸注楚辭離騷經當世之人見子胥被害則變心從俗以承上意若風靡草羣聚成行而羅列王逸注楚辭七諫毛芥因異風而飛沙石遭猛流而轉俗吏遇悖將而遷王充論衡狀留篇頡頑萬乘之階抵噓公卿之席並順風以託勢莫能逆波而泝洄矣文心雕龍論說論議委隨不能持正如樹木之無根柢也前漢書注嚴助傳欲談者卷舌不言待彼發而同其聲欲行者擬足不前待彼行而投其跡李善注文選揚子雲解嘲魯哀公問於孔子曰魯有大忘徙而忘其妻有諸孔子曰此忘之小者也昔商紂有臣曰王子須務為諂使其君樂須臾之樂而忘終身之憂太平御覽人事部迷忘譬如白楊樹隨風而動搖大智度論卷二十二喻林卷七十六
