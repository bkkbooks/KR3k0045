body:
  text: 喻林卷七十明徐元太撰君道門十馭臣其御羣臣使之有禮如御四馬騑騑然持其教令使之調均亦如六轡緩急有和也鄭氏箋詩車舝君任德則臣感義而不忍欺君任察則臣畏覺而不能欺君任刑則臣畏罪而不敢欺史記滑稽列傳注爵祿束帛者天下之底石髙祖所以厲世摩鈍也前漢書梅福傳陛下御臣等若養馬無事就間廄有事復牽來南史張裕永子環傳夫新砥礪殺矢彀弩而射雖冥而妄發其端未嘗不中秋毫也然而莫能復其處不可為善射無常儀的也設五寸之的引十步之逺非羿逢蒙不能必全者有常儀的也有度難而無度易也有常儀的則羿蒙以五寸為巧無常儀的則以妄發而中秋毫為拙故無度而應之則辨士繁説設度而持之雖知者猶畏失也不敢妄言韓非子外儲説左王子於期為宋君為千里之逐巳駕察手吻文且發矣驅而前之輪中繩引而却之馬掩迹拊而發之彘逸出於竇中馬退而却莢不能進前也馬駻而走轡不能止也韓非子外儲説右造父御四馬馳驟周旋而恣欲於馬恣欲於馬者擅轡策之制也然馬驚於出彘而造父不能禁制者非轡策之嚴不足也威分於出彘也王子於期為駙駕轡策不用而擇欲於馬擅芻水之利也然馬過於圃池而駙馬敗者非芻水之利不足也德分於圃池也韓非子外篇説右有常則羿逢蒙以五寸的為巧無常則以妄發之中秋毫為拙今聽言觀行不以功用為之的彀言雖至察行雖至堅則妄動之説也韓非子問辨即亂亡之道臣憎則起外若眩臣愛則起內若藥韓非子八經右主道昔者齊景公兩用管仲鮑叔成湯兩用伊尹仲虺夫兩用臣者國之憂則是桓公不霸成湯不王也湣王一用淖齒而手死乎東廟主父一用李兊減食而死主有術兩用不為患無術兩用則爭爭事而外市一則専制而劫殺韓非子難一王良之所以使馬者約審之以控其轡而四馬莫敢不盡力有道之主其所以使羣臣者亦有轡其轡何如正名審分是治之轡巳吕氏春秋審分聖主之治也其猶造父之御齊輯之於轡銜之際而緩急之於唇吻之和正度於胸臆之中而執節於掌握之間內得於心中外合於馬志是故能進退履繩而旋曲中規取道致逺而氣力有餘誠得其術也是故權勢者人主之車輿也大臣者人主之駟馬也體離車輿之安而手失駟馬之心而能不危者古今未有也是故輿馬不調王良不足以取道君臣不和唐虞不能以為治執術而御之則管晏之智盡矣明分以示之則跖蹻之姦止矣淮南子主術訓騏驥騄駬天下之疾馬也驅之不前引之不止雖愚者不加體焉今治亂之機轍迹可見也而世主莫之能察此治道之所以塞權勢者人主之車輿爵祿者人臣之轡銜也是故人主處權勢之要而持爵祿之柄審緩急之度而適取豫之節是以天下盡力而不倦淮南子主術訓魏兩用樓翟吳起而亡西河湣王専用淖齒而死於東廟無術以御之也文王兩用吕望召公奭而王楚莊王専任孫叔敖而霸有術以御之也淮南子泛論訓大尾小腰重不可搖棟橈榱壞臣為君憂焦氏易林大畜之遁御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵故有天下者審其御而已矣揚子問道篇次六臂膊脛如股腳䐜如維身之疾測曰臂脛如股臣大隆也太玄經第二爭厯觀前政貴人之用心也與嬰兒子何其異哉嬰兒有常病貴臣有常禍父母有常失人君有常過嬰兒常病傷於飽也貴臣常禍傷於寵也哺乳多則生癎病富貴盛而致驕疾愛子而賊之驕臣而滅之者非一也潛夫論忠貴父母常失在不能已於媚子人君常過在不能已於驕臣哺乳太多則必掣縱而生癎貴富太盛則必驕佚而生過是故媚子以賊其軀者非一門也驕臣用滅其家者非一世也潛夫論忠貴若鷹也然獵夫御之猶使終日奮擊而不敢怠豈有人臣而不可使盡力者乎潛夫論明忠夫淆不可以致士淆則賢者難為清不肖者難為濁故賢者死於憂患而不肖者死於安樂也淆其臣卒以自淆淆主在上則潔士在下孰可致也夫上林之材非無惡木清渭之流非無濁波有道之朝非無佞臣顧明主之馭耳是以舜誅四凶賢類顯焉紂戮比干佞臣用焉此皆不淆之主也戮賢而近不肖其過也暗猶可悔也以賢不肖而淆之其過也亂不可理也故秦以淆而亡慎到曰得馭者調其駁失馭者逸其驥其是之謂乎天祿閣外史去惡騏驥易乘駑駘難習武侯十六䇿隂察夫能御驥騄者必王良也能臣禹稷臯陶者必堯舜也御百里之手而以調千里之足必有摧衡折軛之患有接具臣之才而以御大臣之知必有蔽心塞意之變故至言棄捐聖賢距逆非憎聖賢不甘至言也聖賢務髙至言難行也王充論衡逢遇篇水之性勝火如裹之以釡水煎而不得勝必矣夫君猶火也臣猶水也法度釡也火不求水之姦君亦不宜求臣之罪也王充論衡非韓篇人之釋溝渠也知其必溺身不塞溝渠而繕船楫者知水之性不可閼其勢必溺人也臣子之性欲姦君父猶水之性溺人也不教所以防姦而非其不聞知是猶不備水之具而徒欲早知水之溺人也溺於水不責水而咎己者已失防備也然則人君劫於臣已失法也備溺不閼水源防劫不求臣姦王充論衡非韓篇操綱領以整毛目握道數以御衆才抱朴子外篇君道御之以術則終始可竭也整之以度則參差可齊也嶷若閬風之渡霄而諸下不得以輕重料焉窈若玄淵之萬仞則近不能以少多重焉然則君之流源不窮而百僚之才力畢陳矣我之涯畔無外而彼之斤兩可限矣抱朴子外篇君道火始微小不早撲滅則至熾盛大臣貴擅亦當早圖黜其權也前漢書注梅福傳言馬不良或奔或踶御之以道而致千里之塗李善注文選漢武帝詔王者之御人臣猶人之御牛馬故以衡軛喻焉畢志其內未得騁其駿足也李善注文選曹元首六代論明君之御人若履木而負重文選沈休文餞吕僧珍詩注轡䇿靽縶之具設雖剛怒粗戾蹄齧之馬若足拘靽縶口銜轡勒箠策必至則躡躅循軌太平御覽兵部障泥若郎不能為文書當御令史是為牽牛不可以服箱而當取辨於繭角也太平御覽職官部總敘尚書郎夫養將之法譬之養馬秣以髙櫪習以戰馭長鞭策後金勒制前析施規矩任知進退太平御覽兵部障泥敬臣呦呦音幽鹿鳴食野之蘋呦呦鹿鳴食野之蒿呦呦鹿鳴食野之芩音琴鹿詩小雅鳴采菽采菽筐音匡之筥音舉之君子來朝何錫豫之詩小雅采菽觱音必沸音弗檻胡覽反泉言采其芹君子來朝言觀其旗詩小雅采菽鹿鳴燕羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣毛詩鹿鳴鹿得䓑呦呦然鳴而相呼懇誠發乎中以興嘉樂賔客當有懇誠相招呼以成禮也毛詩鹿鳴注湛露天子燕諸侯也毛詩湛露伐柯之道唯斧乃能之此以類求其類也以喻成王欲迎周公當使賢者先往鄭氏箋詩伐柯設九罭之網得鱒魴之魚言取物各有其器以喻用尊重之大禮迎周公之大人是擬人各有其倫毛詩正義九罭鹿既有蘋草有懇篤誠實之心發於中相呼而共食以興文王既有酒食亦有懇篤誠實之心發於中召其臣下而共行饗燕之禮以致之毛詩正義鹿鳴君有酒食欲與羣臣嘉賔燕樂之如鹿得蘋草以為美食呦呦然鳴相呼以欵誠之意盡於此耳毛詩正義鹿鳴君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也禮記學記食而弗愛豕交之也愛而不敬獸畜之也孟子盡心上欲投鼠而忌器此善諭也鼠近於器尚憚不投恐傷其器况於貴臣之近主乎前漢書賈誼傳主上遇其大臣如遇犬馬彼將犬馬自為也如遇官徒彼將官徒自為也前漢書賈誼傳晉文公與楚戰至黃鳳之陵履係解因自結之左右曰不可以使人乎公曰吾聞上君所與居皆其所畏也中君之所與居皆其所愛也下君之所與居皆其所侮也寡人雖不肖先君之人皆在是以難之也晉文春秋鳳陵履解古之君子進人以禮退人以禮今之進人若加諸膝退人若墜諸川晉書向雄傳次六五味和調如美如大人之饗測曰味和之饗宰輔事也太玄經第四竈陛階增則堂髙輔位重則上尊蔡中郎集答災異言何不為投鼠忌器之法而反久行無陛級之事前漢書注賈誼傳孝經曰天子尊事三老兄事五更李善注文選東都賦皤皤國老乃父乃兄文選東都賦公輸愛其斧故能妙其巧明主貴其士故能成其治廣文選班固連珠諸侯之德能自為取師者王能自為取友者存其所擇而莫如己者亡困學紀聞卷二書體臣卷耳文王遣使求賢而勞之以詩詩説周南四牡勞使臣之來也有功而見知則説矣毛詩四牡股肱或虧何痛如之左傳昭公九年除腹心之疾而置諸股肱何益左傳哀公六年寡人之股掌之臣也戰國策魏哀王孤之有卿若身體之有手臂之用豈可暫輟於身周書李賢弟逺傳楚國之有不穀也由身之有胸脅也其有令尹司馬也由身之有股肱也胸脅有疾轉之股肱庸為去是人也説苑君道將相之於孤猶股肱也今移禍焉庸為去是身乎列女傳周列國楚昭越姬去讒牝雞無晨牝雞之晨惟家之索今商王受惟婦言是用書牧火炎不可嚮近尚可撲滅浮言不可信用尚可刑戮絶之孔氏傳書盤庚上哀今之人胡為虺蜴音易正詩小雅月巧言如流俾躬處休詩小雅雨無正君子信讒如或酬音酬叶市殺反之詩小雅小辨莫髙匪山莫浚匪泉君子無易去聲由言耳屬音燭於垣詩小雅小辨巧言如簧顔之厚矣詩小雅巧言萋音妻兮斐兮成是貝錦彼譖人者亦已大音泰甚哆昌者反兮侈兮成是南箕彼譖人者誰適音的與謀詩小雅巷伯營營青蠅止於樊豈弟君子無信讒言營營青蠅止於棘營營青蠅止於榛詩小雅青蠅母教猱升木如塗塗附君子有徽猷小人與屬詩小雅角弓哲夫成城哲婦傾城懿厥哲婦為梟為鴟婦有長舌維厲之階叶居奚反卬詩大雅瞻采苓晉人諫獻公信讒之詩詩説唐防之有鵲巢卬之有美苕處勢自然喻宣公信多言之人故致此讒人鄭氏箋詩防有鵲巢山髙矣人登其巔泉深矣人入其淵以言人無所不至鄭氏箋詩小辨欲之楊園之道當先厯畝丘讒人欲譖大臣故從近小者始鄭氏箋詩巷伯箕星哆然踵狹而舌廣今讒人因寺人之近嫌而成言其罪猶因箕星之哆而侈大之鄭氏箋詩巷伯無踰越我居之里垣無損折我所樹之把木以喻無干犯我之親戚無傷害我之兄弟毛詩正義將仲子彼營營然往來者青蠅之蟲也此蟲汙白使黑汙黑使白乃變亂白黑不可近之當去止於藩籬之上無令在宫室之內也以興彼往來者讒佞之人也讒人喻善使惡喻惡使善以變亂善惡不可親之當棄於荒野之外無令在朝廷之上也毛詩正義青蠅二五卒與驪姬譖羣公子而立奚齊晉人謂之二五耦左傳莊公二十八年惡紫之奪朱也惡鄭聲之亂雅樂也惡利口之覆邦家者論語陽貨譖人之言如水之浸潤漸以成之何晏解論顔淵鄭聲佞人亦俱能惑人心與雅樂賢人同而使人淫亂危殆故當放逺之何晏解論衛靈公且夫口三五之門也是以讒口之亂不過三五國語晉言之大甘其中必苦譖在中焉君故生心雖蝎譖焉避之國語晉今大王譬若浴嬰兒雖啼無聽宰嚭之言吳越春秋勾踐隂謀外傳積羽沈舟羣輕折軸衆口鑠金積毁銷骨史記張儀傳邪徑敗良田讒口亂善人桂樹華不實黃爵巢其顛故為人所羡今為人所憐前漢書五行志古今忠臣見疑於君而蒼蠅之人交構其間晉書王敦傳惡直醜正實繁有徒欲構南箕成此貝錦晉書王濬傳讒夫佞人之在君側者若社之有鼠也諺言有之曰社鼠不可熏去讒佞之人隱君之威以自守也是難去焉晏子春秋問上洧水甚大鄭之富人有溺者人得其死者富人請贖之其人求金甚多以告鄧析鄧析曰安之人必莫之賣矣得死者患之以告鄧析鄧析又答之曰安之此必無所更買矣傷忠臣者有似於此也夫無功不得民則以其無功不得民傷之有功得民則又以其有功得民傷之人主之無度者無以知此豈不悲哉吕氏春秋離謂水火相熷䵻在其間五味以和骨肉相愛讒賊間之而父子相危淮南子説林訓一簧兩舌佞言諂語三姦成虎曾母投杼焦氏易林訟之乾長舌亂國大斧破車焦氏易林蠱之訟多言少實命鹿為駒焦氏易林蹇之豫大斧破木讒佞敗國焦氏易林萃之復腐臭何在青蠅集聚變白為黑敗亂邦國焦氏易林豐之咸次五穀不穀失疏數衆氂毁玉太玄經第四昆言衆女嫉妬蛾眉美好之人譖而毁之謂之美而淫不可信也猶衆臣嫉妬忠正言巳淫邪不可任用也王逸注楚辭離騷經臧倉之毁未嘗絶也公伯寮之訴未嘗滅也垤成丘山汙為江河王充論衡纍害篇鴟梟鳴衡軏豺狼當路衢蒼蠅間白黑讒巧令親疏曹子建集贈白馬王彪昔人興讒言於青蠅譬利口於刃劍者以其點素成緇刀徑傷物劉子傷讒青蠅來往止於藩籬變白作黑讒搆毁間親令疏樂易之君子不當信用前漢書注武五子傳積毁銷金積讒磨骨文選江淹上書夫孝子疑於屢至市虎成於三夫若不詳察真偽忠臣將復有杜郵之戮矣補文選傳燮宦官疏都蔗雖甘殆不可杖佞人悅已亦不可相廣文選劉子政杖銘都蔗雖甘杖之必折巧言雖美用之必滅廣文選曹子建矯志詩言多令事敗器漏苦不密河潰蟻孔端山壞由猿穴涓涓江漢流天窗通冥室讒邪害公正浮雲翳白日廣文選孔文舉臨終詩人有兩三心安能合為一三人成市虎浸漬解膠漆廣文選孔文舉臨終詩俟時風之清激兮愈氛霧其如厯進雄鳩之耿耿兮讒紛紛而蔽之廣文選劉子政逺逝浮雲陳而蔽晦兮使日月乎無光忠臣貞而欲諫兮讒諛毁而在旁廣文選東方曼倩初放逺邪天下有山遁君子以逺小人不惡而嚴易遁上六公用射隼于髙墉之上獲之無不利易解九五莧陸夬夬中行無咎易夬初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅易姤九二田獲三狐得黃矢貞吉易解履於不正與三相比三從下來附之如指之附足四有應在初若三為之拇則失初之應故必解其拇然後朋至而信周易正義解樹德務滋除惡務本書泰誓下譬如匹夫之有婚妻曰豫獨服在寢以自露厥家汲冡周書皇門解薈音穢兮蔚音畏兮南山朝隮音齎婉兮孌兮季女斯飢詩國風候人彼疏斯稗音敗胡不自替詩大雅召旻無將大車周大夫有寴信小人者其臣諫之而作詩説王鵜在梁當濡其翼而不濡者非其常也以喻小人在朝亦非其常鄭氏箋詩候人林中大木之處而維有薪蒸朝廷宜有賢者而但聚小人鄭氏箋詩正月鳶鴟之類鳥之貪惡者也飛而至天喻惡人逺去不為民害也鄭氏箋詩旱麓維鵜鳥在梁可謂不濡其翼乎言必濡其翼以興小人之在朝可謂不亂其政乎言必亂其政毛詩正義候人菀然而茂者彼桑也其葉稚而柔濡故菀然茂盛於此之時人息其下維均得蔭皆無暑熱之患及其捋而采之其枝之葉劉然爆爍而稀疏不復能蔽蔭炎日則病此其下所息之民矣以興王有明德天下之民均得其恩若有羣臣放恣損王之德則困苦天下之民矣毛詩正義桑柔惡之易也如火之燎于原不可鄉邇其猶可撲滅為國家者見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖則善者信矣左傳隱公六年一薰一蕕十年尚有餘臭左傳僖公四年耳不聽五聲之和為聾目不别五色之章為昧心不則德義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣左傳僖公二十四年薰蕕不同器而藏堯桀不共國而治以其類異也孔子家語致思藏動鼠聖人以防佞幸三墳氣墳乃國家之大賊人主之大蜮也前漢書東方朔傳昌邑王見狗冠方山冠龔遂曰王之左右皆狗而冠後漢書靈帝紀國家棄憲如孤雛腐鼠耳後漢書竇憲列傳爾人之臣蠧久依城社不畏熏燒後漢書虞延列傳羣邪項領膏唇拭舌競欲咀嚼後漢書吕強傳假豹姿於羊質騁裊心於狼性晉書石季龍下列傳邪佞者宇宙之螟􅀈王化之蟊賊也晉書劉聰傳且承顔色竊光寵勢等秋風氣同夏日魏書恩幸傳小人難育朽棘不雕魏書趙修恩幸傳夫君子小人智計不同君子志於道小人謀於利志於道者安國濟人志於利者損物圖己道人者害國小人也忠良者捍國君子也臣見疾者詣道士則勸奏章僧尼則令齋講俗師則鬼禍須解醫診則湯尉散丸皆先自為也臣謂為國之本與療病相類療病當去巫鬼尋華扁為國當黜佞邪用管晏南史郭祖深循吏傳東郭有狗嘊嘊旦暮欲齧我猳而不使也今夫易牙子之不能愛將安愛君管子戒章邪氣襲內正色乃衰管子形勢且伐木不自其根則孽又生也公何不去二子者毋使耳目淫焉晏子春秋諫下商賈巧為販賣之利而屈為貞良邪臣好為詐偽自媚飾非而不能為公方陸子輔政邪臣之蔽賢猶浮雲之鄣日月也非得神靈之化擺雲霽醫令歸山海然後乃得覩其光明暴天下之濡濕照四方之晦𡨕陸子辨惑海水雖大不受胔芥日月不應非其氣君子不容非其類也淮南子説山訓昔趙髙無過人之志而居萬人之位是以傾覆秦國而禍殃其宗盡失其瑟何膠柱之調也鹽鐵論相刺犀銚利鉏五穀之利而間草之害也明理正法姦邪之所惡而良民之福也故曲木惡直繩姦邪惡直法鹽鐵論申韓船非水不可行水入船中則其沒也故曰君子不可不嚴也小人不可不閉也説苑雜言隂霧作匿不見白日邪徑迷通使君亂惑焦氏易林復之鼎次八赤臭播關大君不間克國乘家測曰赤臭播關恐入室也太玄經第一間膏肓純白二豎不生兹謂心寧省闥清淨嬖孽不生兹謂政平夫膏肓近心而處厄針之不達藥之不中攻之不可二豎藏焉是謂篤患故治身治國者唯是之畏申鑒雜言上夫詆訾之法者伐賢之斧也而驕妬者噬賢之狗也人君內秉伐賢之斧權噬賢之狗而外招賢欲其至也不亦悲乎濳夫論潛歎有獲狐者則命之曰制爾以媚有獲虎豹者則命之曰制爾以猛有獲梟者則命之曰制爾以逆天祿閣外史田獵言蓬蒿蕭艾入御房中則馬蘭之草踸踔暴長而茂盛也以言佞諂見親近則邪偽之徒踊躍而欣喜也王逸注楚辭七諫天狼星名以喻貪殘日為王者王者受命必誅貪殘故曰舉長矢射天狼言君當誅惡也王逸注楚辭九歌雨雪之盛麃麃然至於無雲日氣始出而雨雪皆消釋矣喻小人雖多王若欲興善政則賢者升用而小人誅滅矣前漢書注楚元王傳凶邪亂正亦猶浮雲蔽天疾風激水故舜流四凶而朝穆穆楚戮費鄢而王道洽也李善注文選陸士衡演連珠披雲看霄則天文清澄風觀水則川流平是以四族放而唐劭二臣誅而楚寧文選陸機演連珠與其溺於人也寧溺於淵溺於淵猶可遊也溺於人不可救也補文選武生盥盤銘一盜不誅害在穿窬修譽不誅害在詞主意林阮子蒺藜在田良苗無所措其根佞邪在朝忠直無所措其身意林鄒子吕氏春秋云桂枝之下無雜木蓋桂味辛螫故也埤雅卉物門桂火生於木禍發必剋姦生於國時動必潰隂符經上篇譬如惡馬其性剛戾能令乘者至嶮惡處海空智藏經持誡品如栴檀林栴檀圍繞不雜伊蘭如無熱池香流德水無諸醎味王逺惡人亦復如是大方廣佛華嚴經卷十二喻林卷七十
