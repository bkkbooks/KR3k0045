body:
  text: 喻林卷三十四明徐元太撰人事門三十二用長魯連謂孟嘗君曰猿獮猴錯木據水則不若魚鱉厯險乘危則騏驥不如狐狸曹沫奮三尺之劔一軍不能當使曹沫釋其三尺之劔而操銚耨與農夫居壠畝之中則不若農夫故物捨其所長之其所短堯亦有所不及矣戰國策齊閔王知士無思慮之變則不樂辨士無談說之序則不樂察士無凌誶之事則不樂皆囿於物者也莊子徐無鬼介蟲之捍也必以堅厚螫蟲之動也必以毒螫故禽獸知用其長而談者知用其用也鬼谷子權篇類不可兩也故知者擇一而一焉農精於田而不可以為田師賈精於市而不可以為賈師工精於器而不可以為器師有人也不能此三技而可使治三官曰精於道者也精於物者也精於物者以物物精於道者兼物物荀子解蔽介蟲之動以固貞蟲之動以毒螫熊羆之動以攫摶兕牛之動以抵觸物莫措其所修而用其所短也淮南子說山訓物各有短長謹願敦厚可事主不施用兵騏驥騄駬足及千里置之宫室使之捕鼠曽不如小狸干將為利名聞天下匠以治木不如斤斧今持楫而上下隨流吾不如子說千乘之君萬乘之主子亦不如我矣說苑雜言夫使孫吳荷戈一人之力耳用其計術則賢於萬夫今令大儒為吏不必切事肆之山林則能陶冶童蒙闡𢎞禮敬抱朴子外篇逸民韜光用九天德不可為首也易乾明入地中明夷君子以蒞衆用晦而明易明夷囊所以貯物以譬心藏知也閉其知而不用故曰括囊周易正義坤夫立功立事者國之厚益而身之表的也表髙的明雖婦人猶欲彎弓而況當塗之士是以君子慎之春秋正義襄公二十九年白璧不可為容容多厚福後漢書左雄列傳志凌青雲之上身晦泥汙之下後漢書髙鳳傳輅言酒不可極才不可盡吾欲持酒以禮持才以愚何患之有也魏志管輅傳注衒美非所罕有常安韜竒擇居故能全性晉書陸機列傳欲溫溫而和暢不欲察察而明切也欲混混若𤣥流不欲蕩蕩而名發也欲索索而條解不欲契契而繩結也欲芒芒而無垠不欲區區而分别也欲暗然而內章不欲示白若冰雪也欲醇醇而任德不欲瑣瑣而執法也晉書皇甫謐傳龍潛鳳戢和光同塵若使負日月而行則無繼天之業矣晉書慕容超記言髙一世處之逾默器重一時體之兹冲宋書顔延之傳夫天地不自明故能長生聖人不自明故能名彰太公六韜文啓曲則全枉則直窪則盈弊則新少則得多則惑是以聖人抱一為天下式老子益謙知其雄守其雌為天下溪為天下溪常德不離復歸於嬰兒知其白守其黑為天下式為天下式常德不忒復於無極知其榮守其辱為天下谷為天下谷常德乃足復歸於朴老子反朴夫春氣發而百草生正得秋而萬寶成夫春與秋豈無得而然哉大道已行矣吾聞至人尸居環堵之室而百姓猖狂不知所如往今以畏壘之細民而竊竊焉欲俎豆豫于賢人之間我其杓之人耶莊子廣桑楚有暖姝者有濡需者有卷婁者所謂暖姝者學一先生之言則暖暖姝姝而私自說也自以為足矣而未知未始有物也是以謂暖姝者也濡需者豕蝨是也擇疏鬛自以廣宫大囿奎蹄曲隈乳間股腳自以為安室利處不知屠者之一旦鼓臂布草操烟火而已與豕俱焦也此以域進此以域退此其所謂濡需者也卷婁者舜也羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓恱之故三徙成都至鄧之墟而十有萬家堯聞舜之賢舉之童土之地曰冀得其來之澤舜舉乎童土之地年齒長矣聰明衰矣而不得休歸所謂卷婁者也莊子徐無鬼吳王浮於江登乎狙之山衆狙見之恂然棄而走逃於深蓁有一狙焉委蛇攫􅎲見巧乎王王射之敏給摶捷矢王命相者趨射之狙執死王顧謂其友顔不疑曰之狙也伐其巧恃其便以敖豫以至此殛也戒之哉嗟乎無以汝色驕人哉顔不疑歸而師董梧以鋤其色去樂辭顯三年而國人稱之莊子徐無鬼奮於言者華奮於行者伐色知而有能者小人也荀子子道篇星列於天而明故人指之義列於德而見故人視之人之所指動則有章人之所視行則有迹動有章則詞行有迹則議故聖人掩明於不形藏迹於無為淮南子詮言訓舌之與齒孰先礲也錞之與刃孰先弊也繩之與矢孰先直也淮南子說林訓中不方名不章外不圜禍之門說苑談叢雄聖伏名人匿麟逺焦氏易林剝之臨初一昆于墨不知白太𤣥經第四昆陽不隂無與合其施經不緯無以成其誼明不晦無以别其德太𤣥經𤣥瑩何以知其聾也以其聽之聰也何以知其盲也以其視之明也何以知其狂也以其言之當也夫言當視聽聰明而道家謂之狂而盲聾王充論衡寒溫篇至人默韶夏而韜藻梲奮其六羽於五域之墟而不煩銜蘆之衛翳其鱗角乎勿用之地而不恃曲穴之備抱朴子內篇暢𤣥行龍姿於虺蜥之中卷鳳翅乎斥鷃之羣抱朴子外篇博喻熊羆不校捷於狐狸金鶚不競擊於小鷂是以張耳掩壯於抱關朱亥竄勇於鼓刀抱朴子外篇廣譬淮隂隱勇於跨下不損其龍躍而虎視也應侯韜竒於溺簀不妨其鸞翔而鳳起也或南靣稱孤或宰總台鼎故一抑一揚者輕鴻所以凌虛也乍屈乍伸者良才所以俟時也抱朴子外篇廣譬若使行如蹈冰身如居隂動無遺蹤可尋靜與無為為一豈有斯患乎又況乎揭日月以隱形骸擊建鼓以狥利器者哉抱朴子外篇知止吐聲則餘音見法移足則遺迹見擬可謂善擊建鼓而當揭日月者耳非真隱也抱朴子斗篇正郭名者影響也影響者形聲之桎梏也郭子注莊德充符物各自守其分則靜默而已無雄白也夫雄白者尚勝自顯豈非逐知過分以殆其生耶郭子注莊天下夫含竒佩美衒異露才者未有不以此傷性毁命者也是故翠以羽自殘龜以智自害丹以含色磨肌石以抱玉碎質此四者生於異俗與人非不隔也託性於山林寄情於物外非有求於人也然而自貽伊患者未能隱其形也若使翠斂翮於明丘之林則解羽之患永脫龜曳尾於𤾉谷之泥則鑽灼之悲不至丹伏光於舂山之底則磨肌之患永絶石亢體於𤣥圃之嵓則剖琢之憂不及劉子韜光窮巖曲岫之椊榤生於積石穎貫青天根鑿黃泉分條布葉輪菌磊硊騏驎戲其下鵷鸞遊其顛浮雲棲其側清風激其間終嵗無毫釐之憂免刀斧之害者非與人有德也能韜隱其質故致全性也路側之榆樵人採其條匠者伐其柯餘有尺蘖而為行人所折者非與人有讎也然而致冦者形不隱也周雞斷尾獲免於犧牲山狙見巧終必招害由此言之則出處之理亦可知矣劉子韜光堯之讓位于許由也由以告巢父焉巢父責由曰汝何不隱汝光何故見若身也李善注文選蔡伯喈郭有道碑文天台山者蓋山嶽之神秀也涉海則有方丈蓬萊登陸則有四明天台皆𤣥聖之所遊化靈仙之所窟宅夫其峻極之狀嘉祥之美窮山海之瓌富盡人神之壯麗矣所以不列於五嶽闕載於常典者豈不以所立冥奧其路幽迥舉世罕能登涉王者莫由禋祀故事絶於常篇名標於竒紀然圖像之興豈虛也哉非夫遺世玩道絶粒茹芝者烏能輕舉而宅之非夫寄逺冥搜篤信通神者何肯遙想而存之文選遊天台山賦序専用聰明則功不成専用晦昧則事必悖一明一晦衆之所載意林尹文子鬼谷先生不知何許人也隱居韜智居鬼谷中因以為稱蘇秦張儀師之遂立功名先生遺書責之曰若二君豈不見河邊之樹乎僕御折其枝波浪蕩其根上無徑尺之隂身被數千之痕此木豈與天地有仇怨所居然也子不見嵩岱之松柏華霍之檀桐乎上枝干於青雲下根通於三泉千秋萬嵗不受斧斤之患此木豈與天地有骨肉哉蓋所居然也藝文類聚人部隱逸上常問作人當如園圃之藍不異衆草染而後朗然不可如唐棣之華灼灼自顯藝文類聚草部藍太公曰知與衆同者非人師也大知似狂不癡不狂其名不彰不狂不癡不能成事太平御覽疾病部陽狂堯聘許由為九州長由聞洗耳於河巢父見謂之曰豫章之木生於髙山工雖巧而不能得子避世何不藏深太平御覽木部豫樟古語云上士閉心中士閉口下士閉門困學紀聞卷十諸子夫龍不隱鱗鳳不藏羽網羅髙懸去將安所何氏語林言語言行者治身之獄也時和先後大命之所屬也是以君子之立身也如喑如聾若朴若質道德經指歸卷十一聖人智慧光明與日月而齊照而韜光晦迹共凡智相和道德經注疏卷一海之所以稱大者由無皎潔之清道之所以稱晦迹者以無赫然之觀𢎞明集釋駮論適當乾之為德大明曉乎萬物終始之道始則潛伏終則飛躍可潛則潛可飛則飛周易正義乾體雖備但設之不當則不成人則設禮不當亦不成禮猶人體之不當也禮記正義禮器王肅曰舞雖奮疾而不失節若樹木得疾風而不拔史記樂書注臣之里婦與里之諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之里母曰女安行我今令而家追女矣即束緼請火於亡肉家曰昨暮夜犬得肉爭鬭相殺請火治之亡肉家遽追呼其婦故里母非談說之士也束緼乞火非還婦之道也然物有相感事有適可前漢書蒯通傳夫成軸之多也其處大也不究其入小也不塞猶跡求履之憲也夫焉有不適善管子宙合聖人大言金石小言桔梗芣苡用之當桔梗芣苡生之不當金玉斃之關尹子九藥田開之見周威公威公曰吾聞祝腎學生吾子與祝腎逰亦何聞焉開之曰聞之夫子曰善養生者若牧羊然視其後者而鞭之魯有單豹者岩居而水飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎餓虎殺而食之有張毅者髙門縣薄無不走也行年四十而有內熱之病以死豹養其內而虎食其外毅養其外而病攻其內此二子者皆不鞭其後者也莊子達生子墨子與程子辨稱於孔子程子曰非儒何故稱於孔子也子墨子曰是亦當而不可易者也今鳥聞熱旱之憂則髙魚聞熱旱之憂則下當此雖禹湯為之謀必不能易矣鳥魚可謂愚矣禹湯猶云因焉今翟曽無稱於孔子乎墨子公孟謂彼而彼不唯乎彼則彼謂不行謂此而此不唯乎此則此謂不行其以當不當也不當而當亂也故彼彼當乎彼則唯乎彼其謂行彼此此當乎此則唯乎此其謂行此其以當而當也以當而當正也公孫龍子名實論不問而告謂之傲問一而告二謂之囋傲非也囋非也君子如嚮矣荀子勸學篇張網而司之彼獸自得道合其事彼理自出鬼谷子反應注道譬諸若水溺者多飲之即死渴者適飲之則生譬之若劔㦸愚人以行忿則禍生聖人以誅暴則福成韓非子解老不吹毛而求小疵不洗垢而察難知不引繩之外不推繩之內不急法之外不緩法之內韓非子大體辨而不當論信而不當理勇而不當義法而不當務惑而乘驥也狂而操吳干將也大亂天下者必此四者也吕氏春秋當務聖人之行無所合無所離譬若鼓無所與調無所不比絲管金石小大修短有叙異聲而和君臣上下官職有差殊事而調淮南子繆稱訓四肢之各有處如四時寒暑不可移若肢體肢體移易其處謂之壬人寒暑移易其處謂之敗嵗喜怒移易其處謂之亂世春秋繁露陽尊隂卑黃帝問曰願聞刺要岐伯對曰病有浮沉刺有淺深各至其理無過其道過之則內傷不及則生外壅壅則邪從之淺深不得反為大賊內動五臟後生大病黃帝素問內經刺要論刺骨無傷筋者針至筋而去不及骨也刺筋無傷肉者至肉而去不及筋也刺肉無傷脉者至脉而去不及肉也刺脉無傷皮者至皮而去不及脉也黃帝素問內經刺齊論五藏有俞六府有合循脉之分各有所發各隨其過則病瘳也黃帝素問內經痺論夫御體失性則疾病生輔物失真則疵釁作道德經注如苖成實無有入處金剛三昧經卷下猶如力士捉蠅太緩蠅便飛去中阿含經卷十七猶如力士捉蠅太急蠅即便死中阿含經卷十七行法如是相應故如人冷病服熱藥三昧法門經卷下行法如是相應故如人熱病服冷藥三昧法門經卷下法行如是相應故如人病風服膩藥三昧法門經卷下譬如嚴身之具雖復富有珠璣不可重著瓔珞大智度論卷二十九譬如近火止寒則樂轉近燒身則苦百論卷上守八如渴者飲河挹洪流以盈已豈須窮源於崑山哉𢎞明集明佛論量力小才不能濟難事同小狐雖能渡水而無餘力必須水汔方可涉川周易正義未濟宛然翅小者是彼鳴鳩之鳥也而欲使之髙飛至天必不可得也興才智小者幽王身也而欲使之行化致治亦不可得也毛詩正義小宛洪體乏進趣之才偶好無為之業假令奮翅則能凌厲𤣥霄騁足則能追風躡㬌猶欲戢徑翮於鷦鷃之羣藏逸迹於跛驢之伍豈況大塊稟我以尋常之短羽造化假我以至駑之蹇足自卜者審不能者止又豈敢力蒼蠅而慕冲天之舉策跛鱉而追飛兔之軌飾嫫母之篤陋求媒陽之美談推沙礫之賤質索千金於和肆哉晉書葛洪傳言輕六毛身如橫芥宋書文九王建平傳負重致逺力窮則困竭誠事君智盡必傾南齊書虞玩之傳猶深泉之短綆若髙墉而無基梁書張緬弟纘傳三嵗犢豈勝重載魏書莫題傳引弓之力不能引彊弩弩力五石引以三石筋絶骨折不能舉也故力不任彊引則有變惡折脊之禍知不能用賢則有傷德毁名之敗王充論衡效力篇夫螳蜋之怒臂非不美也以當車轍顧非敵耳今知之所無奈何而欲彊當其任即螳蜋之怒臂也郭子注莊人問世在木闕不材之資處雁乏善鳴之分文選盧諶贈劉琨詩引疲弱謝凌遽取纍非纆牽文選顔延年應詔詩寧與燕雀翔不隨黃鵠飛黃鵠逰四海中路將安歸文選阮籍詠懷詩駿足思長阪柴車畏危轍文選陸厥答希叔詩潢汙之水願朝宗而每竭駑蹇之乘希沃若而中疲文選謝朓辭隋王箋密雲雖興知枯木難植藝文類聚人部隱逸下書木非梧桐豈敢栖鳳藝文類聚人部隱逸下書知美錦之難裁處棼絲而易結藝文類聚人部贈答賦卞賞珍於連城孫别駿於千里彼珍駿以貽愛此陋容其敢擬藝文類聚人部哀傷賦叩而必應已謝懸鍾汲而無竭復乖井養藝文類聚雜文部書竊惟𤣥素未辨必謬朱紫之察規矩或昧理喪方圎之功藝文類聚職官部吏部尚書表如以駑蹇之才不致問於千里瓦礫之質何待價於十城藝文類聚職官部尚書令表油雲湛露從降旻昊之德弱縞輕蟬不載丘嶽之重藝文類聚職官部尚書令表百舍之趙非宿舂所資千里之越豈一葦能泝何者裝輕適於路逺舟弱疲於濟深醜貌悴容不藉鑒於淄水駑足蹇步終取躓於鹽車藝文類聚職官部尚書表權衡既懸錙銖靡遁厲駑習驥終莫之近藝文類聚職官部僕射表生輕飛蘀品細疏壤藝文類聚職官部吏部郎表器均濩落材同擁腫藝文類聚職官部吏部郎啓以僞假實條不勝華藝文類聚職官部刺史表自憐袖短雖內手而猶寒藝文類聚裙襦啓井深繩短水無由得本緣經月光王品譬如小火不能熱大海三昧法門經卷下譬如螽蟴振羽不能蕩海搖山大乘莊嚴經論卷十譬如螽翅風不動須彌海大乘莊嚴經論卷十趨時九四或躍在淵易乾凡彼濟者必不怠觀彼聖人必趨時汲冢周書周祝解成王之時萬民樂治田業將耕先始芟柞其草木土氣蒸達而和耕之則澤澤然解散於是耘除其根株輩作者寸耦言趨時也鄭氏箋詩載芟嵗云秋矣我落其實而取其材左傳僖公十五年從時者猶救火追亡人也蹶而趨之唯恐弗及國語越諺有之曰觥飯不及壺餐今嵗晚矣子將奈何國語越希寫曰臣以為今世用事者不如商賈建信君勃然曰足下卑用事者而髙商賈乎曰不然夫良商不與人爭買賣之賈而謹司時時賤而買雖貴已賤矣時貴而賣雖貴已賤矣戰國策趙孝成王趨時若猛獸鷙鳥之發故曰吾治生産猶伊尹吕尚之謀孫吳用兵商鞅行法是也史記貨殖傳力耘數耘收獲如冦盜之至前漢書食貨志夫欲千里而咫尺未發蒙竊惑焉故英人乘斯時也猶逸禽之赴深林虻蚋之趨大沛後漢書崔駰列傳斯人而遇斯時不因扶搖之勢而與鷃雀飛沉豈不惜哉魏書崔𤣥伯傳夫善用本者若以身濟於大海觀風之所起天下髙則髙天下下則下天髙我下則財利稅於天下矣管子地數時之處事精矣不可藏而舍也故曰今日不為明日亡貨昔之日已往而不來矣管子乘馬時之反側間不容息先之則太過後之則不逮夫日回而月周時不與人游故聖人不貴尺之璧而重寸之隂時難得而易失也禹之趨時也履遺而弗取冠挂而弗顧非爭其先也而爭其得時也淮南子原道訓下聖人之舉事也進退不失時若夏就絺綌上車授綏之謂也淮南子繆稱訓聖人者隨時而舉事因資而立功涔則具擢對旱則修土龍淮南子說林訓終日乾乾以陽動也夕惕若厲以隂息也因日以動因夜以息唯有道者能行之淮南子人間訓周制曰先時者死無赦不及時者死無赦人習事而固人之事使如耳目鼻口之不可相錯也韓詩外傳夫神蛟濟於淵而鳳鳥乘於風聖人因於時新序善謀十不風不雨白日皎皎宜出驅馳通理大道焦氏易林乾之泰晨風文翰隨時就溫焦氏易林豫之咸四馬過隟時難再得焦氏易林蠱之遁改柯易葉飯溫不食焦氏易林睽之屯辰乎辰曷來之遲去之速也君子競諸揚子問明篇農勤於朝女勤於宵宵必顧杼朝必望雨言得時毋怠也天祿閣外史繼立諺曰荷鋤候雨不如決渚言時不可緩也天祿閣外史出處人事當在後趨時當居先淮南子原道訓解傾蓋承芳訊欲鳴當及晨文選長安有狹邪行譬彼伺晨鳥揚聲當及旦文選陸機擬古詩先謀後事者昌先事後謀者亡且天與不取反受其咎時至不行反受其殃非時而生是謂妄成故夏條可結冬氷可釋時難得而易失也意林太公金匱猶如赦鼓開門放囚鼓音漸已欲止門扉已閉一扉豈可自寬不求出獄思惟要略法順時升降無常隨時而用處則乘潛龍出則乘飛龍王弼注易乾時之行也順至無逆為天下者用大略汲冢周書周祝解日之出也物始生長人當順其生長致力耕耘日之入也物皆成熟人當順其成熟致力收斂東方之官當恭敬導引日出平秩東作之事使人耕耘西方之官當恭敬從送日入平秩西成之事使人收斂日之出入自是其常但由日出入故物有生成雖氣能生物而非人不就勤於耕稼是導引之勤於收藏是從送之尚書正義堯典摽有梅男女及時也召南之國被文王之化男女得以及時也毛詩摽有梅魚之性寒則逃於淵溫則見於渚喻賢者世亂則隱治平則出在時君也鄭氏箋詩鶴鳴獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田禮記王制天為剛德猶不干時況在人乎左傳文公五年雖鞭之長不及馬腹天方授楚未可與爭雖晉之强能違天乎左傳宣公十五年天之所支不可壞也其所壞亦不可支也國語周日中則移月滿則虧物盛則衰天地之常數也進退盈縮與時變化聖人之常道也史記蔡澤傳且君子得其時則駕不得其時則蓬蔂而行史記老莊傳善言天者必有效於人設上農夫而欲冬田肉袒深耕汗出種之然猶不生者非人心不至天時不得也前漢書李尋傳良醫不能救無命强梁不能與天爭故天之所壞人不得支後漢書蘇竟列傳當其有事也則蓑笠並載擐甲揚鋒不給於務當其無事也則舒紳緩佩鳴玉以步綽其餘裕後漢書蔡雍列傳當其有事則褰裳濡足冠挂不顧人溺不拯則非仁也當其無事則躐纓整襟規矩其步德讓不修則非忠也後漢書崔駰列傳能扶陽以出順隂而入春發其華秋收其實後漢書崔駰傳道隱則蠖屈數感則鳳覩晉書庾闡傳離光夜隱望舒晝戢羽族翔林蟩蛁赴濕晉書束晢傳夫昏明相襲晷㬌之恆度春秋遞運時嵗之常序求諸天數猶且隆替矧伊在人能無終謝南齊書髙帝本紀春采生秋采蓏夏處隂冬處陽此言聖人之動靜開闔詘信浧儒取與之必因於時也時則動不時則靜管子宙合養長時則六畜育殺生時則草木殖政命時則百姓一賢良服荀子王制篇聖人論事之局曲直與之屈伸偃仰無常儀表時屈時伸卑弱柔如蒲葦非攝奪也剛强猛毅志厲青雲非本矜也以乘時應變也淮南子泛論訓使天下荒亂禮義絶綱紀廢彊弱相乘力征相攘臣主無差貴賤無序甲胄生蟣蝨燕雀處帷幄而兵不休息而乃始服屬㬰之貌恭儉之禮則必滅抑而不能興矣天下安寧政教和平百姓肅睦上下相親而乃始立氣矜奮勇力則必不免於有司之法矣是故聖人者能隂能陽能弱能彊隨時而動靜因資而立功物動而知其反事萌而察其變化則為之象運則為之應是以終身行而無所困淮南子汜論訓天地隂陽盛長之時猛獸不攖鷙鳥不摶蝮蠆不螫鳥獸蟲蛇且知應天而況人乎哉說苑修文秋蛇向穴不失其節焦氏易林豫之兊秋南春北不失消息焦氏易林臨之井秋南春北隨時休息焦氏易林兊之大畜龍蟠於泥蚖其肆矣蚖哉蚖哉惡覩龍之志也歟或曰龍必欲飛天者乎曰時飛則飛時潛則潛既飛且潛食其不妄形其不可得而制也歟曰聖人不制則何為乎羑里曰龍以不制為龍聖人以不制為聖人揚子問神朱鳥翾翾歸其肆矣或曰奚取於朱鳥哉曰時來則來時往則往能來能往者朱鳥之謂歟揚子問明或問君子在治曰若鳳在亂曰若鳳或人不諭曰治則見亂則隱鴻飛冥冥弋人何篡焉鷦明遴集食其潔者矣揚子問明或曰龍何可以貞利而亨曰時未可而潛不亦貞乎可而升不亦利乎潛升在已用之以時不亦亨乎揚子問明自古或有能違父母之命者未有能違隂陽之變而距晝夜之節者也郭子注莊大宗師隨時之義義之大者治見亂隱鳳之德也揚子法言注問明篇龍驤蠖屈從道汙隆文選劉峻廣絶交論聖人懷明道而闡風化如龍蠖之驤屈蓋從道之汙隆也李善注文選劉孝標廣絶交論子路問於孔子曰有人於此被褐而懷玉何如子曰國無道可也國有道則衆冕而執玉也李善注文選阮嗣宗詠懷詩佇重淵以育鱗撫慶雲而遐飛文選陸士衡弔魏武帝文蠖屈固小往龍翔乃大來文選潘尼贈王元貺詩上古之時草居霜宿冬則山南夏則山北意林風俗通春以長矛在前夏以大㦸在前秋以弓弩在前冬以刀盾在前此行軍四時應天法也意林抱朴子安知非日月弦望自有時藝文類聚人部别上詩春鶊始囀必具籠筐秋蟀載吟竟鳴機杼藝文類聚治政部善政碑鵲上髙城危而巢於髙枝之巔城壞巢折凌風而起故君子之居世也得時則蟻行失時則鵲起藝文類聚鳥部鵲夏令披裘冬令披䕣雖有嚴令終不肯從者逆時也太平御覽時序部冬下風不輟則扇不用日不出則燭不息太平御覽服用部扇龍潛之水乘雲躍鱗虎嘯之聲因風奮烈達則振纓朝堂窮則身親南畝太平御覽鱗介部龍上國語曰辰角見而雨畢天根見而水涸雨畢而除道水涸而成梁埤雅天道門八月三皇垂策五帝繁手唐虞按轡禹湯馳轅埤雅品物門驖天下有道我韍子佩天下無道我負子戴困學紀聞卷十諸子人生厲心立行貴於見知當使夕脫羊裘朝佩珠玉若時不我知便須退跡江海自求其志何氏語林言志書緯考靈耀云主春者鳥星昏中可以種稷主夏者心星昏中可以種黍主秋者虛星昏中可以種麥主冬者昴星昏中則入山可以具器械王者南靣而坐視四星之中而知民之緩急玉海天文天文書上持脉有道虛靜為保春日浮如魚之逰在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密黃帝素問內經脉要精微論來春當大饑今秋不食黃鍾應寒𬎼賓重裘備預雖早不免於愚𢎞明集牟子理惑論喻林卷三十四
