body:
  text: 喻林卷一百十七明徐元太撰物宜門二美惡涇以渭濁湜湜音殖其沚音止詩國風谷風秩秩斯干叶居焉反幽幽南山叶所梅反如竹苞叶補茍反矣如松茂叶莫口反矣詩小雅斯干如跂斯翼如矢斯棘如鳥斯革叶託力反如翬音輝斯飛君子攸躋音齎詩小雅斯干樂音洛彼之園爰有樹檀叶徒沿反其下維蘀音託樂彼之園爰有樹檀其下維穀詩小雅鶴鳴周原膴膴音武堇荼如飴詩大雅綿王睢之鳥雌􅱉情意至然而有别毛詩關㫿注蜉蝣渠略也朝生夕死猶有羽翼以自修飾楚楚鮮明毛詩蜉蝣注梅之樹善惡自有徒以梟集其上而鳴人則惡之性因惡矣鄭氏箋詩墓門鷹則為鳩鷹也者其殺之時也鳩也者非其殺之時也善變而之仁也故其言之也曰則盡其辭也鳩為鷹變而之不仁也故不盡其辭也大戴禮記夏小正田鼠化為鴽鴽鵪也變而之善故盡其辭也鴽為鼠變而之不善故不盡其辭也大戴禮記夏小正燕之角荆之幹妢胡之笴吳粵之金錫此材之美者也周禮考工記天有時地有氣材有美工有巧合此四者然後可以為良材美工巧然而不良則不時不得地氣也周禮考工記凡相角秋閷者厚春閷者薄稚牛之角直而澤老牛之角紾而昔疢疾險中瘠牛之角無澤周禮考工記職金掌凡金玉錫石丹青之戒令受其入征者辨其物之媄惡與其數量揭而璽之入其金錫于為兵器之府入其玉石丹青于守藏之府周禮秋官職金葑菲之菜上善下惡食之者不以其惡而棄其善杜氏解左傳僖公三十三年澤之生物而險者蒺藜持之則傷杜氏解左傳襄公二十五年山有木藪有草毒螫之蟲在草在木春秋正義宣公十五年陸機云林木山下人語曰四足之美有麃兩足之美有鷮爾雅釋鳥疏地之磽者雖有善種不能生焉江臯河瀕雖有惡種無不猥大前漢書賈山傳物有善而不居惡而不可避甘醴有鴆毒藥酒有治病前漢紀孝哀美金以鑄戈劎矛戟試諸狗馬惡金以鑄斤斧鉏夷鋸􅠁試諸木土管子小匡靈鵲兆喜怪鵩塞耳師曠禽經班鳩辦鵴梟鴟害母師曠禽經慈烏反哺白脰烏不祥巨啄烏善警哀烏吟夜師曠禽經蝮蛇不可為足虎豹不可使緣木淮南子説林訓明月之珠蠬之病而我之利虎爪象牙禽獸之利而我之害淮南子説林訓華不時者不可食也淮南子説林訓絮之細者曰纊繒之精者曰縞縞之粗者曰素葛之精者曰絺粗者曰綌小爾雅廣服蝮蛇與魚比故生於草澤蜂蠆與鳥同故産於屋樹江北地燥故多蜂蠆江南地濕故多蝮蛇生高燥比陽陽物懸垂故蜂蠆以尾刺生下濕比陰陰物柔伸故蝮蛇以口齰毒或藏於首尾故螫齰有毒或藏於醴膚故食之輒悶或附於脣吻故舌鼓為禍王充論衡言毒篇龍有毒蛇有螫故蝮有利牙龍有逆鱗王充論衡言毒篇慈烏曰孝鳥長則反哺其母張華注禽經空桑之山有獸焉其狀如牛而虎文其音如欽其名曰軨軨其鳴自呌見則天下大水山海經東山經豺山有獸焉其狀如夸父而彘毛其音如呼見則天下大水山海經東山經姑􅊇之山有獸焉其狀如狐而有翼其音如鴻鴈其名曰獙獙見則天下大旱山海經東山經䃌山有獸焉其狀如馬而羊首四角牛尾其音如嗥狗其名曰峳峳見則國多狡客山海經東山經欽山有獸焉其狀如豚而有牙其名曰當康其鳴自呌見則天下大穰山海經東山經女蒸之山石膏水出焉而西注于鬲水其中多薄魚其狀如鱣魚而一目其音如歐見則天下大旱山海經東山經餘峨之山有獸焉其狀如兔而鳥啄鴟目蛇尾見人則眠名曰犰狳其鳴自訆見則螽蝗為敗山海經東山經剡山有獸焉其狀如彘而人面黃身而赤尾其名曰合腴其音如嬰兒是獸也食人亦食蟲見則天下大水山海經東山經大山有獸焉其狀如牛而白首一目而蛇尾其名曰蜚行水則竭行草則死見則天下疫山海經東山經子桐之山子桐之水出焉而西流注于餘如之澤其中多䱻魚其狀如魚而鳥翼出入有光其音如鴛鴦見則天下大旱山海經東山經偈徂狡獸鬿雀惡鳥或狼其體或虎其爪安用甲兵擾之以道山海經東山經圖讚蜚則災獸跂踵厲深會所經涉竭水稿林稟氣自然體此殃淫山海經東山經圖讚玉山是西王母所居也有獸焉其狀如犬而豹文其角如牛其名曰狡其音如吠犬見則其國大穰山海經西山經崇吾之山有鳥焉其狀如鳧而一翼一目相得乃飛名曰蠻蠻見則天下大水山海經西山經崑崙之丘有鳥焉其狀如蜂大如鴛鴦名曰欽原蠚鳥獸則死蠚水則枯山海經西山經鹿臺之山有鳥焉其狀如雄雞而人面名曰鳧徯其名自叫也見則有兵山海經西山經小次之山有獸焉其狀如猿而白首赤足名曰朱厭見則大兵山海經西山經太華之山有蛇焉名曰肥􅖆六足四翼見則天下大旱山海經西山經欽原類蜂大如鴛鴦觸物則斃其鋭難當山海經西山經圖讚令丘之山有鳥焉其狀如梟人面四目而有耳其名曰顒其鳴自號也見則天下大旱山海經南山經雞山黑水出焉中有鱄魚其狀如鮒而彘毛其音如豚見則天下大旱山海經南山經顒鳥栖林鱄魚處淵俱為旱徵災延普天山海經南山經圖讚涸和損平莫慘於憂詩詠萱草帶山則倏壑焉遺岱聊以盤遊山海經北山經圖讚狍梟貪婪其目在腋食人未盡還自齦割圖形妙鼎是謂不若山海經北山經圖讚長蛇百尋厥鬛如彘飛羣走類靡不吞噬極物之惡盡毒之厲山海經北山經圖讚敖岸之山有獸焉其狀如白鹿而四角名曰夫諸見則其邑大水山海經中山經歷石之山有獸焉其狀如狸而白首虎爪名曰梁渠見則其國有大兵山海經中山經蛇山有獸焉其狀如狐而白尾長耳名曰􅨓狼見則國內有兵山海經中山經能本獸名形似熊足似鹿為物堅中而強力故人之有賢材者皆為之能前漢書注高帝紀深山窮谷多毒瘧之物氣則有瘴癘人則有止蟲獸則有虎鳥則有鴆蛇則有蝮蟲則有射工沙虱草則有釣吻野葛其餘則蛟莾之屬生焉太平御覽蟲豸部沙虱礫小石也磊當罪切衆石也碭壯浪切文石也琅玕石似珠也碔砆石似玉也太平御覽地部石上凡珠有龍珠龍所吐也蛇珠蛇所吐也語曰蛇珠千枚不如一玫瑰埤雅品物門蛇短狐射氣􅀈螋遺溺中影則疾人氣數感之故也埤雅品物門蜮字説曰蛇螫人也而亦逃人也是為有它蝮觸之則復其害人也人亦復焉埤雅品物門虺烏反哺梟反噬蓋逆順之習也埤雅品物門梟陸陷蘂犀水截輕鴻埤雅品物門鴈望之大就之小筋馬也望之小就之大肉馬也前視見目旁視見腹後視見足駭馬也毛束皮皮束筋筋束肉肉束骨五者兼僃天下之馬也埤雅品物門馬伊尹為湯説至末云肉之美者猩脣燕髀豹胎象節魚之美者洞庭之鱄東海之􅀈菜之美者崑崙之蘋具區之菁和之美者陽濮之薑招搖之桂飯之美者玄山之禾不周之粟果之美者江浦之橘雲夢之柚埤雅卉物門橘德芬芳者佩蘭埤雅卉物門蘭伯樂曰馬頭為王欲得方目為丞相欲得明脊為將軍欲得強腹為城廓欲得張四下為令欲得長初學記獸部馬譬如毒蛇神呪所伏不能為害一切諸蟲見彼毒蛇亦無憂懼然此毒蛇雖無毒害由本業故受此蛇身故名毒蛇大寶積經卷二十譬如圂豬行處糞穢兼又食噉初無厭惡大寶積經卷四十二譬如構欄茶花色貌鮮好其體堅鞭猶如木石其氣臭穢猶如糞塗有智之人若見此花不近不觸逺避而去愚人若見不知過患近而嗅之大寶積經卷一百一十三或有鳥聲好而形醜或有鳥形好而聲醜或有鳥聲醜形亦醜或有鳥形好聲亦好何鳥聲好而形醜拘枳羅鳥是也何鳥形好而聲醜所謂鷙鳥是也何鳥聲醜形亦醜所謂梟是也何鳥聲好形亦好所謂孔雀鳥是也增一阿含經卷十七世有四種良馬有良馬駕以平乘顧其鞭影馳駛善能觀察御者形勢遲速左右隨御者心是良馬第一之德世間良馬不能顧影而自驚察然以鞭杖觸其毛尾則能驚速察御者心遲速左右是第二良馬若世間良馬不能顧影及觸皮毛能隨人心而以鞭杖小侵皮肉則能驚察隨御者心遲速左右是第三良馬世間良馬不能顧其鞭影及觸皮毛小侵膚肉乃以鐵錐刺身徹膚傷骨然後方驚牽車著路隨御者心遲速左右是第四良馬雜阿含經卷三十三世間良馬有八種德成就者隨人所欲取道多少何等為八生於良馬鄉是名良馬第一之德復次體性溫良不驚恐人是名良馬第二之德復次良馬不擇飲食是名良馬第三之德復次良馬猒惡不淨擇地而卧是名良馬第四之德復次良馬諸情態速為調馬者現馬師調習速捨其態是名良馬第五之德復次良馬安於駕乘不顧餘馬隨其輕重能盡其力是名良馬第六之德復次良馬常隨正路不隨非道是名良馬第七之德復次良馬若病若老勉力駕乘不猒不倦是名良馬第八之德雜阿含經卷三十三世間馬有八態何等為八謂惡馬臨駕車時後腳踏人前腳跪地奮頭齧人是名世間馬第一態復次惡馬就駕車時低頭振軛是名世間惡馬第二之態復次世間惡馬就駕車時下道而去或復偏厲車令其翻復是名第三之態復次世間惡馬就駕車時仰頭却行是名世間惡馬第四之態復次世間惡馬就駕車時小得鞭杖或斷韁折勒縱橫馳走是名第五之態復次世間惡馬就駕車時舉前兩足而作人立是名第六之態復次世間惡馬就駕之時加之鞭杖安住不動是名第七之態復次世間惡馬就駕之時叢聚四腳伏地不起是名第八之態雜阿含經卷三十三師子戲時於諸羣獸強者則殺伏者則放大智度論卷四十七且愛犬馬者貴其識恩嫉梟獍者惡其反噬辨正論卷六如龍驥麟鳯孔雀鸚鵡山雞畫雉為人所貴情希愛樂如獼猴豺狼虎蛇蚖蝮服鳥梟鴟等人所惡見不喜聞音法苑珠林卷六變化雀入於海為蛤雉入於淮為蜃黿鼉魚鱉莫不能化唯人不能哀夫國語晉昔盤古氏之死也頭為四嶽目為日月脂膏為江海毛髮為草木秦漢間俗説盤古氏頭為東嶽腹為中嶽左臂為南嶽右臂為北嶽足為西嶽先儒説盤古氏泣為江河氣為風聲為雷目瞳為電古説盤古氏喜為晴怒為陰述異記上今江淮中有􅀈名熊熊蛇之精至冬化為雉至夏復為蛇述異記上淮水中黃雀至秋化為蛤春復為黃雀述異記上二幼相好及其壯也相遇則不相識二壯相好及其老也相遇則不相識如雀鴿鷹鳩之化無昔無今關尹子七釡人自生至終大化有四嬰孩也少壯也老耄也死亡也其在嬰孩氣專志一和之至也物不傷焉德莫加焉其在少壯則血氣飄溢欲慮充起物所攻焉德故衰焉其在老耄則欲慮柔焉體將休焉物莫先焉雖未及嬰孩之全方於少壯間矣其在死亡也則之於息焉反其極矣列子天瑞馬血之為轉鄰也人血之為野火也鷂之為鸇鸇之為布穀布穀久復為鷂也燕之為蛤也田鼠之為鶉也朽瓜之為魚也老韭之為莧也老羭之為猿也列子天瑞以汝為鼠肝乎以汝為蟲臂乎莊子大宗師鯤鵬二物隻以變為二矣何得不謂一變為二乎公孫龍子通變論注昔公牛哀轉病也七日化為虎其兄掩户而入覘之則虎摶而殺之是故文章成獸爪牙移易志與心變神與形化方其為虎也不知其嘗為人也方其為人不知其且為虎也二者代謝舛馳各樂其成形淮南子俶真訓夫蝦蟇為鶉水蠆為􅩜芒皆生非其類唯聖人知其化淮南子齊俗訓蠶食桑老績而為繭繭又化而為蛾蛾有兩翼變去蠶形蠐螬化為復育復育轉而為蟬蟬生兩翼不類蠐螬凡諸命蠕蜚之類多變其形易其體至人獨不變者稟得正也王充論衡無形篇夫蟲蛇未化者不若不化者蟲蛇未化人不食也化為魚鱉人則食之王充論衡無形篇萬物變化無復還者復育化為蟬羽翼既成不能復化為復育王充論衡道虛篇仲春之節鷹化為鳩季春之節田鼠化為鴽仲秋之節鳩復化為鷹季秋之節雀入大水化為蛤孟冬之節雉入水化為蜃張華注禽經若謂受氣皆有一定則雉之為蜃雀之為蛤壤蟲假翼川蛙翻飛水􅝏為蛤荇苓為蛆田鼠為鴽腐草為螢鼉之為虎蛇之為龍皆不然乎抱朴子內篇論仙鶂以眸子相視蟲以鳴聲相應俱不待合而生子故曰風化郭子注莊天運周洛曰鮪蜀曰䱴𩶶出鞏山冗中三月遡河上能度龍門之限則得為龍矣前漢書注司馬相如傳周穆王南征一軍盡化君子為猿為鶴小人為蟲為沙藝文類聚鳥部鵠朔人獻燕昭王以大豚曰養奚若使曰豕也非大圊不居非人便不珍今年百二十矣人謂豕仙王乃命豕宰養六十五年大如沙墳足如不勝其體王異之令衡官橋而量之折十橋豕不量又命水官舟而量其重千鈞其巨無用燕相謂王曰奚不饗之王乃命水夫膳之夕見夢於燕相曰造化勞我以豕形食我以人穢吾患其生久矣仗君之靈得化吾生始得為魯津之伯燕相遊乎魯津有赤龜奉璧而獻大平御覽獸部豕千歲之雉入海為蜃百年之雀入江為蛤千歲龜黿能與人語千歲蛇斷而復續百年之鼠能相卜數之至也春分之日鷹變為鳩秋分之日鳩變為鷹時之化也故腐草之為螢也朽之為蠶也麥之為蚨蝶也羽翼生焉眼目成焉心知出焉自無知而化為有知血氣易也鴇之為麂也蛇之為鱉也蠶之為蝦也不失其血氣而形性變也太平御覽妖異部變化下龍易骨蛇易皮麋鹿易角蟹易敖埤雅品物門蟹鯀為熊杜宇為鶗鴂褒君為龍牛哀為獸君子為鵠小人為猿彭生為豕如意為犬黃母為黿宣武為鱉鄧艾為牛徐伯為魚鈴下為烏書生為蛇何氏語林文學隋書如蠶渾沌繭中穿絲出飛其神故一變形易殼四願經敬八如酥蜜膠臘等皆是地相與火合故自捨其相轉成濕相金銀銅鐵與火合故亦自捨其相變為水相大智度論三十一如乳變為酪捨味力饒益不捨色如金銀器破已更作餘器捨形不捨色雜阿毗曇心論卷十一夫雉入海為蛤燕入海為蜃當其徘徊其翼差池其羽猶自識也忽然自投神化體變乃更與黿鱉為羣豈復自識翔林薄巢垣屋之娛乎辨正論卷三良能燕之于飛必差池其羽毛詩燕燕注垤蟻塜也將陰雨則冗處先知之矣毛詩東山注凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是大鳥獸則失喪其羣匹越月踰時焉則必反巡過其故鄉翔回焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至於燕雀猶有啁噍之頃焉然後乃能去之禮記三年問虎狼護子猴猿負孫毒性薄情亦有仁愛宋書文九王晉熙傳風翔則風雨舞則雨霜蜚則霜露翥則露師曠禽經鷙鳥之善搏者曰鶚師曠禽經扶老秃鶖也強力鶺鴒友悌師曠禽經舒鷹鳴前後和羣棲獨警師曠禽經鳥飛成行獸處成羣有孰教之淮南子齊俗訓順風而飛以助氣力銜葭而翔以備矰弋説苑談叢燕雀銜茅以生孚乳焦氏易林小畜之巽晨風天翰大舉就溫焦氏易林小畜之革言鵾雞鴻鶴羣聚候時鶴知夜半鵾雞晨鳴各知其職也王逸注楚辭大招形如覆銚包玉含珠有而不積泄以尾閭暗與道會可謂竒魚山海經西山經圖讚太昊師蜘蛛而結網金天據九鴈以正時帝軒俟鳯鳴以調律唐堯觀蓂莢以知月終歸知往乾鵲知來魚伯識水旱之氣蜉蝣曉濳泉之地白狼知殷家之興鸑鷟見周家之盛龜鶴偏解導養不足怪也抱朴子內篇對俗夫以蜘蛛蛣蜣之陋而布網轉丸不求之於工匠則萬物各有能也郭子注莊胠篋鴻不學飛飛則沖天驥不學行行則千里太平御覽羽族部鴻雞有呼羣之德鹿有食蘋之美埤雅品物門雞鸇之步綱鴷之畫印鸂鶒之勑蜾嬴之祝皆物之有術智者也埤雅品物門鸂鶒分威法伏熊實意法螣蛇埤雅品物門螣蛇雞有專棲之雄雉有擅澤之驕蟻有兼弱之智蜂有攻寡之計埤雅品物門蜂鵲巢開口背太歲此非才智任自然之得也初學記鳥部鵲又如犢子生知趣乳豬羊之屬其生未幾便知有牝牡之合大智度論卷三十八各足魚濳在淵或在于渚魚在于渚或濳在淵詩小雅鶴鳴夫天亦有所分豫豫之齒者去其角傅其翼者兩其足是所受大者不得取小也前漢書董仲舒傳蚑行蠕動方聚類分鱗殊族别羽毛異羣各含精而鎔冶咸受範於陶鈞晉書成公綏傳物食長啄穀食短咮搏則利觜鳴則引吭師曠禽經籩不問豆豆不答籩瓦不問石石不答瓦道亦不失問歟答歟關尹子一宇篇牛之無齒不為不足羊之有齒而比於牛為有餘矣以羊之有餘而謂之非羊者未可然羊之有齒不為有餘則牛之無齒而比於羊固不足矣以牛之不足而謂之非牛者亦未可也是皆稟之天然各足於其分而俱適矣公孫龍子通變論注造物維均靡偏靡頗少不為短長不為多賁能三足何異黿鼉山海經中山經圖讚二蟲殊翼故所至不同或翺翔天池或畢志榆枋直各稱體而足不知所以然也郭子注莊逍遙遊鵬之所以髙飛者翼大故耳夫質小者所資不待大則質大者所用不得小矣郭子注莊逍遙遊若以性足為大則天下之足未有過於秋毫若其性足非大則雖太山亦可稱小矣太山為小則天下無大秋毫為大則天下無小也郭子注莊齊物論擅一壑之水而跨跱塪井之樂猶小鳥之自足於蓬蒿也左足未入右膝已縶明大之不遊於小非樂然也以小羡大故自失物各有分不可強相希效也郭子注莊秋水足於性者天損不能入貞於期者時纍不能淫是以迅風陵雨不謬晨禽之察徑陰殺節不凋寒木之心文選陸機演連珠鸞鳯凌雲儔以舞翼鳩鵷悅蓬林以翺翔螭浮八溟以濯鱗鱉娛行潦而羣逝斯用情各從其好以取樂焉廣文選阮嗣宗答伏義書形不待名而方圎已著色不俟稱而黑白以彰藝文類聚人部言語論鹹水之魚不遊于江淡水之魚不入於海藝文類聚鱗介部魚夔稱一足蛇則二首少不知無多不覺有藝文類聚鱗介部蛇東海有鰲焉冠蓬萊而遊於滄海騰躍而上則干雲沒而下濳於重泉有紅蟻者聞而悅與羣蟻相要乎海畔欲觀鰲之行月餘未出羣侔也數日風止海中隱淪如屺其高槩天或遊而西羣蟻曰彼之冠山何異乎我之戴粒也逍遙壤封之巔歸服乎窟冗之下此乃物我之適自己而然我何用數百里勞形而觀之乎藝文類聚蟲豸部蟻莊子曰聲氏之牛夜亡而遇夔止而問焉我有四足動而不善子一足而超踊何以然夔曰以吾一足王於子矣事類賦獸部牛注夫燕雀有匹鳩鴿有仇寒鄉之民必知旃裘自然已足益之則憂故續鳧之足何異截鶴之脛道德經注萬物各有有為相如牛角犎垂壺尾端有毛是為牛相如瓶底平腹大頸細口圓脣鹿是為瓶相如車以輪軸轅軛是為車相如人以頭目腹脊肩臂手足是為人相十二門論守六喻林卷一百十七
