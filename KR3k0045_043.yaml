body:
  text: 喻林卷四十三明徐元太撰人事門四十一精藝四牡騑騑六轡如琴詩小雅車牽御者之良得舒疾之中射者之工矢發則中如椎破物也鄭氏箋詩車攻御者節御此馬令不失其馳騁之法故令射者舍放其矢則如椎破物能中而駛也毛詩正義車攻作酒既有米麴之數又有功沽之巧月令曰乃命大酋秫稻必齊麴蘖必時湛饎必潔水泉必香陶器必良火齊必得鄭氏注周禮天官酒正進則與馬謀退則與人謀終日馳騁左不楗行數千里馬不契需終嵗御衣袵不敝此唯輈之和也周禮考工記晉景公疾病求醫於秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在盲之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之左傳成公十年扁鵲名聞天下過邯鄲聞貴婦人即為帶下醫過雒陽聞周人愛老人即為耳目痺醫來入咸陽聞秦人愛小兒即為小兒醫隨俗為變史記扁鵲傳養由基楚之善射者也去楊葉百步百發百中楊葉之大加百中焉可謂善射矣然其所止乃百步之內耳比於臣乘未知操弓持矢也前漢書枚乘傳獶古之善塗塈者也施廣領大袖以仰塗而領袖不汙有小飛泥誤著其鼻因令匠石揮斤而斫前漢書揚雄傳注醫之為言意也腠理至微隨氣用巧針石之間毫芒即乖神存於心手之際可得解而不可得言也後漢書方術列傳初勗於路逢趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者晉書荀朂傳來世子鑄丈六銅像於瓦官寺既成面恨瘦二人不能治乃迎顒看之顒曰非面瘦乃臂胛肥耳既錯減臂胛瘦患即除無不歎服焉宋書隱逸戴顒傳羿之道非射也造父之術非馭也奚仲之巧非斫削也管子形勢人之善琴者有悲心則聲悽悽然有思心則聲遲遲然有怨心則聲回回然有慕心則聲裴裴然所以悲思怨慕者非手非竹非絲非桐得之心符之手得之手符之物關尹子三極昔善計者非以求利將以明數昔善戰者非以求勝將以明勝獨不見夫隱者乎設使知之其知之者屈己知之矣若其弗知者雖師而説尚不曉也悲乎鶡冠子天權秦穆公謂伯樂曰子姓有可使求馬者乎伯樂對曰良馬可形容筋骨相也天下之馬者若滅若沒若亡若失若此者絶塵彌轍臣之子皆下才也可告以良馬不可告以天下之馬也臣有所與共擔纒薪菜者有九方臯此其於馬非臣之下也請見之穆公見之使行求馬三月而反報曰已得之矣在沙丘穆公曰何馬也對曰牝而黃使人往取之牡而驪穆公不説召伯樂而謂之曰敗矣子所使求馬者色物牝牡尚弗能知又何馬之能知也伯樂喟然太息曰一至於此乎是乃其所以千萬臣而無數者也若臯之所觀天機也得其精而忘其粗在其內而忘其外見其所見不見其所不見視其所視而遺其所不視若臯之相馬乃有貴乎馬者也馬至果天下之馬也列子説符魯公扈趙齊嬰二人有疾同請扁鵲求治之扁鵲治之既而同愈謂公扈齊嬰曰汝曩之所疾自外而干府藏者固藥石之所已今有偕生之疾與體偕長今為汝攻之何如列子湯問瓠巴鼓琴而鳥舞魚躍鄭師文聞之棄家從師襄遊柱指鈎絃三年不成章師襄曰子可以歸矣師文舍其琴嘆曰文非絃之不能鈎章之不能成文所存者不在絃所志者不在聲內不得其心外不應於器故不敢發手而動絃且小假之以觀其後無幾何復見師襄曰得之矣請嘗試之於是當春而叩商絃以召南呂涼風忽至草木成實及秋而叩角絃以激夾鍾溫風徐回草木發榮當夏而叩羽絃以召黃鍾霜雪交下川池寒沍及冬而叩徴絃以激𬎼賔陽光熾烈堅氷立散將終命宮而總四絃則景風翔慶雲浮甘露降澧泉湧師襄乃撫心髙蹈曰微矣子之彈也雖師曠之清角鄒衍之吹律亡以加之彼將挾琴執管而從子之後耳列子湯問造父之師曰泰豆氏造父學之三日盡其巧泰豆歎曰子何其敏也得之捷乎凡所御者亦如此也曩汝之行得之於足應之於心推於御也齊輯乎轡銜之際而急緩乎脣吻之和正度乎胸臆之中而執節乎掌握之間內得於中心而外合於馬志是故能進退履繩而旋曲中規矩取道致逺而氣力有餘誠得其術也得之於銜應之於轡得之於轡應之於手得之於手應之於心則不以目視不以策驅心間體正六轡不亂而二十四蹄所投無差回旋進退無不中節然後輿輪之外可使無餘轍馬蹄之外可使無餘地未嘗覺山谷之嶮原隰之夷視之一也列子湯問昔韓娥東之齊匱糧過雍門鬻歌假食既去而餘音繞梁欐三日不絶左右以其人弗去過逆旅逆旅人辱之韓娥因曼聲哀哭一里老幼悲愁垂涕相對三日不食遽而追之娥還復為曼聲長歌一里老幼喜躍抃舞弗能自禁忘向之悲也乃厚賂發之故雍門之人至今善歌哭放娥之遺聲列子湯問季梁得疾七日大漸其子環而泣之請醫一曰矯氏二曰俞氏三曰盧氏診其所疾矯氏謂季梁曰汝寒溫不節虛實失度病由飢飽色欲精慮煩散非天非鬼雖漸可攻也季梁曰衆醫也亟屏之俞氏曰汝始則胎氣不足乳湩有餘病非一朝一夕之故其所由來漸矣弗可已也季梁曰良醫也且食之盧氏曰汝疾不由天亦不由人亦不由鬼稟生受形既有制之者矣亦有知之者矣藥石其如汝何季梁曰神醫也重貺遣之俄而季梁之疾自瘳列子力命庖丁為文惠君解牛手之所解肩之所倚足之所履膝之所踦砉然嚮然奏刀騞然莫不中音合於桑林之舞乃中經首之會文惠君曰嘻善哉技蓋至此乎庖丁釋刀對曰臣之所好者道也進乎技矣始臣之解牛之時所見無非牛者三年之後未嘗見全牛也方今之時臣以神遇而不以目視官知止而神欲行依乎天理批大郤導大􅑆因其固然技經肯綮之未嘗而况大軱乎良庖嵗更刀割也族庖月更刀折也今臣之刀十九年矣所解數千牛矣而刀刃若新發於硎彼節者有間而刀刃者無厚以無厚入有間恢恢乎其於遊刃必有餘地矣是以十九年而刀刃若新發於硎雖然每至於族吾見其難為怵然為戒視為止行為遲動刀甚微謋然已解如土委地提刀而立為之四顧為之躊躇滿志善刀而藏之文惠君曰善哉吾聞庖丁之言得養生焉莊子養生主宋元君將畫圖衆史皆至受揖而立舐筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣般礴裸君曰可矣是真畫者也莊子田子方趙襄王學御於王子期俄而與子期逐三易馬而三後襄王曰子之教我御術未盡也對曰術已盡用之則遇也凡御之所貴馬體安於車人心調於馬而後可以進速致逺今君後則欲逮臣先則恐逮於臣夫誘道爭逺非先則後也而先後心皆在於臣尚何以調於馬此君之所以後也韓非子喻老夫三羣之蟲水居者腥肉玃者臊草食者羶臭惡􅂒美皆有所以凡味之本水最為始五味三材九沸九變火為之紀時疾時徐滅腥去臊除羶必以其勝無失其理調和之事必以甘酸苦辛醎先後多少其齊甚微皆有自起鼎中之變精妙微纖口弗能言志弗能喻若射御之微隂陽之化四時之數故久而不弊熟而不爛甘而不噥酸而不酷醎而不減辛而不烈淡而不薄肥而不􅵛呂氏春秋本味養由基尹儒皆六藝之人也荆廷嘗有神白猿荆之善射者莫之能中荆王請養由基射之養由基矯弓操矢而往未之射而括中之矣發之則猿應矢而下則養由基有先中中之者矣呂氏春秋博志公輸王爾無所錯其剞􅕻削鋸淮南子本經訓楚王有白猿王自射之則博矢而熙使養由基射之始調弓矯矢未發而猿擁柱號矣有先中中者也淮南子説山訓舟覆乃見善遊馬奔乃見良御淮南子説林訓羿之所以射逺中微者非弓矢也造父之所以追速至逺者非轡銜也淮南子説林訓今鼓舞者繞身若環曾撓摩地扶旋猗那動容轉曲便媚擬神身若秋藥被風髮若結旌騁馳若騖木熙者舉梧檟據句枉猿自縱好茂葉龍矢矯燕枝拘援豐條舞扶疏龍從鳥集摶援攫肆蔑蒙踊躍且夫觀者莫不為之損心酸足彼乃始徐行微笑被衣修擢夫鼓舞者非柔縱而木熙者非眇徑淹漫漬漸靡使然也淮南子修務訓齊景公使人為弓三年乃成景公得弓而射不穿三札景公怒將殺弓人弓人之妻往見景公曰蔡人之子弓人之妻也此弓者太山之南烏號之柘騂牛之角荆麋之筋河魚之膠也四物者天下之練材也不宜穿札之少如此且妾聞奚公之車不能獨走莫邪雖利不能獨斷必有以動之夫射之道在手若附枝掌若握卵四指如斷短杖右手發之左手不知此蓋射之道景公以為儀而射之穿七札蔡人之夫立出矣韓詩外傳上古之為醫者曰苗父苗父之為醫也以菅為席以芻為狗北面而祝發十言耳諸扶而來者舉而來者皆平復如故子之方能如此乎扁鵲曰不能又曰吾聞中古之為醫者曰俞柎俞柎之為醫也搦腦髓束盲莫炊灼九竅而定經絡死人復為生人故曰俞柎子之方能若是乎扁鵲曰不能説苑辨物蒲且修􅌳鳬鴈悲鳴逢蒙撫弓虎豹晨嘷説苑談叢昔帝堯茅茨不剪采椽不斫土階三等猶以為為之者勞居之者逸也今妾之夫治造此弓其為之亦勞其幹生於太山之阿一日三覩隂三覩陽傳以燕牛之角纒以荆麋之筋糊以阿魚之膠此四者皆天下之妙選也而君不能以穿一札是君之不能射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒右手如附枝右手發之左手不知此蓋射之道也平公以其言而射穿七札烈女傳周列國晉弓工妻韓人有善奕者以奕説徴君曰子知奕之道乎徴君曰不知也奕者曰吾與子奕之可乎曰夫奕以機勝以不機敗吾不能機何奕之為曰子惡機而不奕不知子之機過於奕乎曰何為其然也曰奕之機虛實是已實而張之以虛故能完其勢虛而擊之以實故能制其形是機也員而神詭而變故善奕者能出其機而不散能藏其機而不貪先機而後戰是以勢完而難制雖然此特奕之道耳若機之流於衆妙也肆而淵乎天祿閣外史機論越人救虢太子於既殞胡巫活絶氣之蘇武淳于能解顱以理腦元化能刳腹以浣胃文摯衍期以瘳危困仲景穿胸以納赤餅此醫家之薄伎猶能若是抱朴子內篇至理時人謂之針絶雖棘刺木猴雲梯飛䲻無過此麗也王子年拾遺記吳吳主夫飾芳餌挂微鈎下沉青泥上乘驚波因水勢而施舍頡頏委縱與之沉浮及其弛絶故坐而獲也張湛注列湯問雖六轡之煩馬足之衆調之有道不患其亂故輪外不恃無用之轍蹄外不賴無用之地張湛注列湯問近世有人擲五木者擲百盧者人以為有道以告王夷甫王夷甫曰此無竒直後擲如前擲耳張湛注列子仲尼形用之事理之粗者偏得其道則能盡之若庖丁之投刀匠石之運斤是偏逹於一事不待聖賢而後能為之也張湛注列子仲尼夫玄洲釣也以三尋之竿八絲之線餌若蛆蚓鈎如細針以出三尺之魚於數仞之水中豈可謂無術乎補文選宋玉釣賦吐哀也則瓊瑕失綵銜樂也則鉛堊生潤廣文選江文通橫吹賦縱輕軀以迅赴若孤鵠之失羣振華袂以逶迤若遊龍之登雲廣文選邉文禮章華賦宋景公使弓工為弓九年來見公曰為弓亦遲對曰臣不得見公矣曰臣之精盡於弓矣獻弓而歸三日而死公張弓登臺東向而射矢踰孟霜之山集彭城之東其餘力逸徑飲羽於石梁藝文類聚軍器部弓郝素善彈箏雖伯牙妙手吳姬竒聲何以加之太平御覽樂部筝魏安釐王觀翔鵠而樂之曰寡人得如鵠之飛視天下如芥也客有隱遊者聞之作木雕而獻王王曰此有形無用者也夫作無用之器世之姦民也召遊欲加刑焉遊曰大王知有用之用未寤無用之用也今臣請為大王翔之乃取而倚焉遂翻然飛去莫知所之藝文類聚鳥部鵠舊機五十綜者五十躡六十綜者六十躡馬生者天下之名巧也患其遺日喪功乃皆易以十二躡其竒文異變因感而作太平御覽資産部機杼昔有善歌者歌陽陵白露朝日魚麗含商吐角絶節赴曲初學記樂部歌注有馬師皇者善醫馬通神明忽有龍下于庭張口閉目師皇視之此龍有病乃引針以針龍口中以牛乳煎甘草灌之龍病即愈師皇乘龍而去黃帝本行記譬如良醫善療衆病先善綜習醫方諸論才見病相皆悉了知呪藥所施無不除愈大寶積經卷八十三譬如壯夫善間射術欲現已技仰射虛空為令空中箭不墮地復以後箭射前箭括如是展轉經於多時箭箭相承不令墮落若欲令墮便止後箭爾時諸箭方頓墮落波羅密多經三百三十二譬如良醫聰明博逹隨有所作皆善觀察成就觀察微妙慧故善識諸藥善逹病因善知病相能救衆苦隨所療疾無不除愈所以者何彼善通逹藥病因相和合等方是故能除一切病苦波羅密多經五百九十三又如牙師善治象牙亦如金師善練真金隨意所造多所饒益長阿含經卷十三如世良醫知病識藥有於四種若具足者得名醫王何等為四一者識知其病應用某藥二者知病所起隨起用藥三者已生諸病治令病出四者斷除病源令後不生是為四種醫喻經譬如治病苦藥針灸痛而得差如有妙藥名蘇陀扇陀病人眼見衆病皆愈除病雖同優劣法異大智度論卷六故咸池韶武無以匹其工激楚梁塵無以較其妙髙僧傳十三論樂道富而可求也雖執鞭之士吾亦為之如不可求從吾所好論語述而今有人於此屑然藏千鎰之寶雖行貸而食人謂之富矣彼寶也者衣之不可衣也食之不可食也賣之不可僂售也然而人謂之富何也豈不大富之器誠在此也是杅杅亦富人已豈不貧而富矣哉故君子無爵而貴無祿而富不言而信不怒而威窮處而榮獨居而樂豈不至尊至富至重至嚴之情舉積此哉荀子儒效千鈞之重烏獲舉之而輕多力耳簞食瓢飲顔氏處之而樂德盛也揚子法言注吾子篇或謂仲尼事彌其年蓋天勞諸病矣夫曰天非獨勞仲尼亦自勞也天病乎哉天樂天聖樂聖揚子問明篇君子潛神重玄之域世網不能制禦之揚子法言注問明篇無當之玉碗不如全用之埏埴寸裂之錦黻未若堅完之韋布故夏姬之無禮不如狐逐之皎潔富貴之多罪不如貧賤之履道抱朴子外篇廣譬貴者雖自貴視之若埃塵賤者雖自賤重之若千鈞文選左思詠史詩閔子騫肥子貢曰何肥也子騫曰吾出見其美車馬則欲之入聞先王之言則又思欲之兩心相與戰今先王之言勝故肥太平御覽人事部肥符子曰楚之交子魯之周子齊之狂子相與居乎泰山之陽處乎環堵之室萆户不扉蓋茨不翳而髙歌不輟初學記人部貧注總持強記萬善之苑也於此苑樹無漏之林敷七覺之華結解脫之果嚴八解之池積禪定之水湛然充滿布七淨之華羅列水上而後無垢之士遊此林苑浴此華池間宴嬉遊樂之至也豈等俗苑林水之歡乎羅什譯維摩詰經佛道品世人以妻色為悅菩薩以法喜為悅僧肇注維摩詰經佛道品總持廣納為衆妙之林奇玩娛心猶如園苑也羅什譯維摩詰經佛道品如人入瞻蔔林唯嗅瞻蔔不嗅餘香如是若入此室但聞佛功德之香不樂聞聲聞辟支佛功德香也維摩詰所説經觀衆生品忘世懷其寶而迷其邦可謂仁乎論語陽貨泛若不繫之舟兮湛若不用之器魏書陽尼從弟固傳若居形聲而去影響尚迷邦而忘觀國非所謂也周書儒林沈重傳大浸稽天而不溺大旱金石流土山焦而不熱是其塵垢粃粳將猶陶鑄堯舜者也孰肯以物為事宋人資章甫而適諸越越人斷髮文身無所用之莊子逍遙遊夫子若欲使天下無失其牧乎則天地固有常矣日月固有明矣星辰固有列矣禽獸固有羣矣樹木固有立矣夫子亦放德而行循道而趨已至矣又何偈偈乎揭仁義若擊鼓而求亡子焉莊子天道自身以上至於荒芒亦逺矣自死而天地無窮亦滔矣以數雜之壽憂天下之亂猶憂河水之少泣而益之也龜三千嵗浮遊不過三日以浮遊而為龜憂養生之具人必笑之矣故不憂天下之亂而樂其身之治者可與言道矣淮南子詮言訓獨不聞江海之遊者不能棲遲於芳藻雲漢之飛者不能飲啄於清流一王之遇者不能詘伸於爵網名羈之外乎天祿閣外史待樵尋仞之塗甚近而弗往者雖追風之腳不能到也楹棁之下至卑而不動者雖鴻鶤之翅未之極也况乎寢足於大荒之表斂羽於幽梧之枝安得效迅以尋景振輕乎蒼霄哉抱朴子外篇任命故觀其書超然自以為已當經昆崘涉太虛而遊惚恍之庭矣雖復貪婪之人進躁之士暫而攬其餘芳味其溢流髣佛其音影猶足曠然有忘形自得之懷郭子注莊序真人無羶故不致蟻是蟻棄知也共處相忘之大道無沾濡之德是魚得計也羊無羶行而不致蟻是羊棄意也莊子音義徐無鬼害馬已去世事都捐投刃皆虛目牛無全文選遊天台山賦譬如萎花人不惜捐棄塵勞當如是修行道地經慈品安遇何舍何執何去何就謂山岑之林為芳谷底之莽為臭晉書束晳傳張單雙災木鷹兩失有心於避禍不如無心於任運宋書王景文傳垂棘與瓦同櫝明月與礫同囊茍有二寶之質不害為世所同王充論衡自紀篇牆之壞也不若無也然逾屋之覆淮南子説林訓遇於時則揚睂若飄雲不遇於時則拂衣若振葉此許務之耿光而顔蘧之淑節也天祿閣外史卜諫覺尺蠖者甘屈以保伸識通塞者不慘悅於否泰抱朴子外篇任命被褐茹草垂綸罝兔則心歡意得如將終身服冕乘軺兼朱重紫則若固有之常如布衣此至人之用懷也抱朴子外篇任命事不任力動不稱情則雖垂天之翼不能無窮決起之飛不能無困矣郭子注莊逍遙遊菽麥實所羡孰敢慕甘肥陶靖節集詩五言飢不從猛虎食暮不從野雀棲李善注文選陸士衡猛虎行否泰殊流窮逹異轍今雖及爾春華之美終當後爾秋暉之盛也李善注文選陸士衡贈斥丘令詩陋吾人之拘攣飄萍浮而蓬轉文選西征賦湯湯川流中有行舟隨波回轉有似客遊文選魏文帝善哉行稿葉待風飄逝將與君違文選傅咸贈何邵王濟詩譬如田野蓬斡流隨風飄文選潘嶽河陽縣作詩幽谷茂纖葛峻巖敷榮條落英隕林趾飛莖秀陵喬卑髙亦何常升降在一朝文選潘安仁河陽縣作詩華衮與緼􅀈同歸山藻與蓬茨俱逸文選任彥升齊文宣王行狀守分任性惟天所授鳥不假甲於龜魚不借足於獸何必笑孤竹之貧而羡齊景之富補文選束晳擬客難窟泉之潛不思雲翬熙氷之采不羡旭晞混光耀於埃藹者亦曷願滄浪之深秋陽之映乎補文選郭璞客傲鸒鳩飛桑榆海鳥運天池豈不識宏大羽翼不相宜招搖安可翔不若棲樹枝下集蓬蒿間上遊園囿籬藝文類聚人部言志詩甘堇荼於飴茈緯蕭艾其如蘭藝文類聚人部言志賦寫水置平地各自東西南北流藝文類聚人部怨詩符子曰鄰人謂展禽曰魯聘夫子夫子三黜無憂色何禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯枯茂非四時之悲欣榮辱豈知吾心之憂喜事類賦草部草注是貧窮者吉祥之瓶入暗者日失道者月是怖畏者所歸依處煩惱燋熱甘露之水善根者杖般涅槃橋生天者梯度生死船由曠路乘虛空藏菩薩經第三如患瘡苦以藥塗治痛止為樂以大苦故謂小苦為樂非實樂也三昧法門經卷下輕外視天下悅而歸已猶草芥也惟舜為然孟子離婁上富貴之於我如秋風之過耳吳越春秋吳王壽夢傳應侯失韓之汝南秦昭王謂應侯曰君亡國其憂乎應侯曰臣不憂王曰何也曰梁人有東門吳者其子死而不憂其相室曰公之愛子天下無有今子死而不憂何也東門吳曰吾嘗無子無子之時不憂今子死乃即與無子時同也臣奚憂焉臣亦嘗為子為子時不憂今亡汝南乃即與為梁餘子同也臣何為憂戰國策秦昭襄王居之如執朽索去之若捐重負梁書武帝上紀生無一日之歡死有萬世之名名者固非實之所取也雖稱之弗知雖賞之不知與株塊無以異矣列子楊朱顔淵問仲尼曰吾嘗濟乎觴深之淵津人操舟若神吾問焉曰操舟可學邪曰可善遊者數能若乃夫沒人則未嘗見舟而便操之也吾問焉而不吾告敢問何謂也仲尼曰善遊者數能忘水也若乃夫沒人之未嘗見舟而便操之也彼視淵若陵視舟之覆猶其車却也覆却萬方陳乎前而不得入其舍惡往而不暇以瓦注者巧以鉤注者憚以黃金注者殙其巧一也而有所矜則重外也凡外重者內拙莊子逹生夫薄願厚惡願美狹願廣貧願富賤願貴茍無之中者必求於外故富而不願財貴而不願勢茍有之中者必不及於外荀子性惡篇所謂自得者全其身者也全其身則與道為一矣故雖遊於江潯海裔馳要裊建翠蓋目觀棹羽武象之樂耳聽滔朗奇麗激抮之音揚鄭衛之浩樂結激楚之遺風射沼濵之髙鳥逐苑囿之走獸此齊人之所以淫泆流湎聖人處之不足以怵其精神亂其氣志使心怵然失其情性處窮僻之鄉側溪谷之間隱於榛薄之中環堵之室茨之以生茅蓬户甕牖揉桑為樞上漏下濕潤浸北房雪霜瀼灖浸潭苽蔣逍遙於廣澤之中而徜徉於山峽之旁此齊民之所為形植黎纍憂悲而不得志也聖人處之不為愁悴怨懟而不失其所以自樂也是何也則內有以通乎天機而不以貴賤貧富勞逸失其志德者也故夫烏之啞啞鵲之唶唶豈嘗為寒暑燥濕變其聲哉淮南子原道訓古之人有居巖穴而神不遺者末世有勢為萬乘而日憂悲者由此觀之聖亡乎治人而在于得道樂亡乎富貴而在于得和知大已而小天下則幾於道矣淮南子原道訓若然者視天下之間猶飛羽浮芥也孰肯分分然以物為事也淮南子俶真訓明於死生之分逹於利害之變雖以天下之大易骭之一毛無所槩於志也夫貴賤之於身也猶條風之時麗也毁譽之於已猶蚉虻之一過也淮南子俶真訓年衰志憫舉天下而傳之舜猶却行而脫屣也淮南子主術訓善遊者不學刺舟而便用之徑筋者不學騎馬而便居之輕天下者身不纍於物故能處之淮南子詮言訓侯而求霸者必失其侯霸而求王者必喪其霸故國以全為常霸王其寄也身以生為常富貴其寄也淮南子詮言訓知己者不可誘以物明於死生者不可却以危故善遊者不可懼以涉淮南子説林訓去天下若遺屣於天下猶然况其細於天下乎説苑至公紆朱懷金之樂不如顔氏子之樂顔氏子之樂也內紆朱懷金之樂也外揚子學行耕而為食蠶而為衣衣食周身則餘天下之財猶渴者飲河快然以足不羡洪流豈待積斂然後乃富哉君子之用心若此蓋將以名位為贅瘤資財為塵垢也安用富貴乎嵇中散集答難養生論夫有道者視爵位如湯鑊見印綬如縗絰視金玉如土糞覩華堂如牢獄抱朴子內篇論仙雖并日無藜藿之糝不以易不義之太牢也雖緼褐無卒嵗之服不肯樂無道之狐白也抱朴子外篇名實徒見其戴黃屋佩玉璽便謂足以纓紼其心矣見其歷山川同民事便謂足以憔悴其神矣豈知至至者之不虧哉郭子注莊逍遙遊視淵若陵故視舟之覆於淵猶車之却退於坂覆却雖多而不以經懷以其性便故所遇皆間暇也郭子注莊逹生戴晉人曰有所謂蝸者君知之乎曰然有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反誠知所爭者若此之細也則天下無爭矣郭子注莊則陽畫所以飾貌刖者貌已虧殘不復以好醜存懷故拸而棄之郭子注莊庚桑楚懷抱既昭曠外物徒龍蠖文選謝靈運富春渚詩安貧福所與富貴為禍媒金玉雖髙堂於我賤蒿萊藝文類聚人部言志詩輕九鼎於褰裳視萬乘如脫屣藝文類聚內典部內典頌大富無仁義之行猶園中之鹿欄中之牛也事文類聚著書論衡富貴者破骨之斧鋸載罪之舟車適足誨愆要辱為伐命之兵非佳事也太平御覽道部養生譬如稱譽幻人者亦不增若不稱譽者亦不減聞善不喜聞惡不怒如是道行波羅密經卷三譬如諸河流水盈滿若人讃毁悉皆順流若逆流者無有是處法集經欲一富貴暫有猶如電光如熖速滅又如象耳動搖不停亦如蛇舌鼓動不息又如朝露見日則乾大莊嚴經論卷五喻林卷四十三
