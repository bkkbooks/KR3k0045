body:
  text: 喻林卷四十一明徐元太撰人事門三十九擇取六三係丈夫失小子易隨翹翹音喬錯薪言刈其楚翹翹錯薪言刈其蔞音閭詩國風漢廣東門之池可以漚烏豆反麻彼美淑姬可以晤歌東門之池可以漚紵音苧彼美淑姬可與晤語東門之池可以漚菅音間彼美淑姬可與晤言詩國風東門之池薄言采芑音起於彼新田於此菑音錙畞薄言采芑於彼新田於此中鄉詩小雅采芑水則采取其芹宮則采取其化毛詩泮水註楚雜薪之中尤翹翹者我欲刈取之以喻衆女皆貞潔我又欲取其尤髙潔者鄭氏箋詩漢廣翹翹然而髙者乃是雜薪此薪雖皆髙我欲刈其楚所以然者以楚在雜薪之中尤翹翹而髙故也以興貞潔者乃是衆女此衆女雖皆貞潔我欲取其尤貞潔者毛詩正義漢廣人須芑為菜我薄采此芑於何處乎當於彼新田於此菑畞之中以新田菑畞謂已和耕其田生長其芑必肥美可食故於此采之也以興人須為軍士我薄取人於何處乎當於彼蒙敎於此被育之家以蒙敎被育已和治其家養育其身士必勇武可用故於彼取之也毛詩正義采芑辟之賦詩短章余取所求焉惡識宗左傳襄公二十八年譬如賦詩者取其一章而已杜氏解左傳襄公二十八年詩曰采葑采菲無以下體君取節焉可也左傳僖公三十三年農夫勞而君子養焉愚者言而智者擇焉前漢書嚴助傳夫潜地窟者而不覩天明守冬株者而不識夏榮非通炤之術也然博覽之家不知其穢兼而善之是大田之莠與苗並興則良農之所悼也質樸之士不擇其美兼而棄之是崑山之玉與石俱捐則卞和之所痛也前漢紀孝成我之有斐譬如家有盗狗而善捕鼠盗雖有小損而完我囊貯魏志曹爽傳註虎魄不取腐芥磁石不受曲鍼吳志虞翻傳註徑寸之寶或隠沙泥以人廢言君子斯戒梁書武帝中紀莫不澄涇辯渭拾珠棄蚌隋書潘徽文學傳等黄於碧寧取於黄者黄中正之色公孫龍子通變論註智者之短不勝愚人之長故用愚人之長也智者之拙不勝愚人之工故用愚人之工也鬼谷子權篇註易者以一易一人曰無得亦無喪也以一易兩人曰無喪而有得也以兩易一人曰無得而有喪也計者取所多謀者從所可以兩易一人莫之為明其數也從道而岀猶以一易兩也奚喪離道而内自擇是猶以兩易一也奚得荀子正名今以百金與摶黍以示兒子兒子必取摶黍矣以和氏之璧與百金以示鄙人鄙人必取百金矣以和氏之璧道徳之至言以示賢者賢者必取至言矣其知彌精其所取彌精其知彌觕其所取彌觕呂氏春秋異寶得萬人之兵不若聞一言之當得隋侯之珠不若得事之所由得和氏之璧不若得事之所適淮南子説山訓桀有得事堯有遺道嫫母有所美西施有所醜故亡國之法有可隨者治國之俗有可非者淮南子説山訓寧百刺以針無一刺以刀寧一引重無久持輕寧一月饑無一旬餓萬人之蹪愈於一人之隧淮南子説山訓亡羊而得牛則莫不利失也斷指而免頭則莫不利為也故人之性於利之中則爭取大焉於害之中則爭取小焉淮南子説山訓龜紐之璽賢者以為佩土壤布在田能者以為富淮南子説林訓夫目驚而體失其容心驚而事有所忘人之情也通於驚之情者取其一美不盡其失春秋繁露竹林夫春樹桃李夏得隂其下秋得食其實春樹蒺藜夏不得探其葉秋得其刺焉由此觀之在所樹也今子所樹非其人也故君子先擇而後種也韓詩外傳今當凶年有欲予子隋侯之珠者不得賣也珍寶而以為飾又欲予子一鍾粟者得珠者不得粟得粟者不得珠子將何擇禽滑釐曰吾取粟耳可以救窮説苑反質權取重澤取長説苑談叢夫仁者好合人不仁者好離人故君子居人間則治小人居人間則亂君子欲和人譬猶水火不相能然也而鼎在其間水火不亂乃和百味是以君子不可不慎擇人在其間説苑雜言華首山頭仙道所遊利以居止長無咎憂焦氏易林謙之井東山之邑中有肥土可以饒飽焦氏易林坎之大有尸子曰聖人權福則取重權禍則取輕李善註文選李蕭逺運命論狂言雖寡善猶有如雞脇雞脇食不已齊王為肥澤廣文選應徳璉雜詩謝安目支道林如九方臯之相馬略其𤣥黄取其雋逸世説新語輕詆見長不能屈其色見貴不能盡其辭雖有風雨吾不入其門也意林子思子樹葱韭者擇之則蕃仁義亦不可不擇也意林尸子天下之物莫凶於溪毒良醫蔵之有所用也草莽猶不可棄況復人乎意林淮南子曲直者物之性也曲者中鉤直者中繩輪桷之材也賢不肖者人之性也賢者為師不肖者為資師資之材也藝文類聚人部性命論金生沙磔珠岀蚌泥藝文類聚人部婢婦十室之邑忠信在焉五歩之内芬芳可録是以日南枯蚌猶含明月之珠龍門死樹尚抱咸池之曲文苑英華庾信連珠市肉取肥酤酒取醇太平御覽資産部酤義渠之人烹灶鼈不熟臊穢腥臭中國之民雖饑餓三日不啓口至死弗食也吳章莊吉受而和之病人食之為之輕體萬乗飲之為之解怒故灶鼈至腥臊不可加然而病人為之輕體萬乗為之解怒何也吳章莊吉之調存也太平御覽飲食部食下少儀曰為君子擇葱薤則絶其本末為其本末有萎乾者也爾雅翼䪥子能登寶山周行左右萬寶縱横無不可愛當下山際能勿持乎虛皇四十九章譬如病重迎諸醫藥善療衆病價值千金縁路迎接雖到宅舍終非藥具大乗妙林經譬如無價如意寶珠莊飾瑩治皎潔可愛體極圓淨無有垢濁墮在淤泥經時已久有人拾得歡喜取之勤加守䕶不令墮落波羅蜜多經卷五百六十九如人刈草手攬其端舉而料櫢萎枯悉落取其長者雜阿含經卷十海含衆寶靡所不包死屍臭朽海不容焉神風吹漂上岸之邊斯三徳也海八徳經尺一書不必孔丘之言藥不必扁鵲之方合義者從愈病者良𢎞明集牟子理惑論人逢大水但當取珍寶去人在世間但當取善意去三慧經藉八如敝囊盛寶不得以囊惡故不取其寶又如夜行嶮道罪人執炬不得以人惡故不取其炤大智度論卷四十九譬如狗皮囊盛好寶物不應以囊故而棄其寶如罪人執燭照道不可以人罪故不受其明自墜溝壑又如行遣小人導道不可以人小故不隨其語大智度論卷九十六譬如臭泥中生蓮花但採蓮華勿取臭泥也髙僧傳二鳩摩羅什如鵝飲水中􅀈􅀈盡水在攝大乗論釋卷三如識寶人得無價寶終不復樂餘水精珠廣百論卷六若待太公為卿相則千載無太公要得羅什為師訓則萬代無羅什法苑珠林卷十九擇術若荒梗塞澀之處是可離棄以非道路之所由猶如凶惡邪僻之行是可離棄以亦非善道之行禮記正義中庸矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人巫匠亦然故術不可不慎也孟子公孫丑上李斯年少時為郡小吏見吏舍厠中鼠食不潔近人犬數驚恐之斯入倉觀倉中䑕食積粟居大廡之下不見人犬之憂於是李斯乃歎曰人之賢不肖譬如鼠矣在所自處耳史記李斯傳戰國䇿云寜為雞尸不為牛從延篤注云尸雞中主也從謂牛子也言寜為雞中之主不為牛子之從後史記蘇秦列傳註齊之國氏大富宋之向氏大貧自宋之齊請其術國氏告之曰吾善為盗也始吾為盗也一年而給二年而足三年大穰自此以徃施及州閭向氏大喜喻其為盗之言而不喻其為盗之道遂踰垣鑿室手目所及無不探也未及時以贓獲罪沒其先居之財向氏以國氏之謬已也徃而怨之國氏曰若為盗若何向氏言其狀國氏曰嘻若失為盗之道至此乎吾聞天有時地有利吾盗天地之時利雲雨之滂潤山澤之産育以生吾禾殖吾稼築吾垣建吾舍陸盗禽獸水盗魚鼈亡非盗也夫禾稼土木禽獸魚鼈皆天之所生豈吾之所有吾盗天而無殃夫金玉珍寶榖帛財貨人之所聚豈天之所與若盗之而獲罪孰怨哉列子天瑞邯鄲之民以正月之旦獻鳩於簡子簡子大悦厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君之欲放之競而捕之死者衆矣君如欲生之不若禁民勿捕捕而放之恩過不相補矣列子説符相形不如論心論心不如擇術形不勝心心不勝術術正而心順之則形相雖惡而心術善無害為君子也形相雖善而心術惡無害為小人也荀子非相篇今謂彊者勝則度地計衆富者利則量粟稱金若此則千乘之君無不霸王者而萬乗之國無有破亡者矣存亡之迹若此其易知也愚夫蠢婦皆能論之淮南子氾論訓夫弦歌鼓舞以為樂盤旋揖讓以修理厚葬久喪以送死孔子之所立也而墨子非之兼愛上賢右鬼非命墨子之所立也而楊子非之全性保真不以物累形楊子之所立也而孟子非之趨捨人異各有曉心故是非有處得其處則無非失其處則無是淮南子汜論訓爭訟之門不可與隣焦氏易林恒之遯山林麓藪非人所處鳥獸無禮使我心苦焦氏易林明夷之離被髮獸心難與比隣焦氏易林困之萃鬼魅之居凶不可舍焦氏易林未濟之否墜井引綆愈於遂沒抱朴子内篇勤求且負甲為兵咋筆為吏身死名滅者如牛毛角立傑岀者如芝草握素披黄吟道詠徳苦辛無益者如日蝕逸樂名利者如秋荼豈得同年而語矣顔氏家訓勉學為仁則不利為利則不仁故販粟者欲嵗之饑賣藥者欲人之疾劉子言苑以道為天下者猶乗安舟而由廣路安舟難成可久處也廣路難至可常行也太平御覧舟部叙舟中子髙謂齊王曰昔臣常行臨淄市見屠商焉身修八尺髯如㦸市易之男女未有敬之者無徳故也太平御覧資産部屠通𤣥經曰樹小條則居髙屋弱材則處上譬若積薪小者為上道徳經四子集解夫黙而求響響不我應託隂求影影不我從畏響而扣金響愈我應惡影而處陽影益我從由此觀之無為不能遁福有為不能逃患道徳經指歸卷九既揣末令尖又鋭之令利勢必摧衂故不可長保也道徳經註夫風經炎則暄吹林必凉清水激濁澄石必明神用得喪亦存所託𢎞明集明佛論以規為圓者易以手為圓者難將不捨其所難從其所易耶𢎞明集折夷夏論擁其流者未若杜其源揚其湯者未若撲其火何者源出於水源未杜而水不窮火沸於湯火未撲而湯詎息故有杜源之客不擁流而自乾撲火之賔不揚湯而自止類斯而談可得詳矣厭其果者未若絶其因怖其苦者豈若懲於惡因資於果因未絶而果不窮惡生於苦惡未懲而苦詎息故使絶因之士不厭果而自亡懲惡之賢不佈苦而自離法苑珠林卷七相成火出之物因風方熾火既炎盛還復生風内外相成有似家人之義周易正義家人天地定位而合徳山澤異體而通氣雷風各動而相薄水火不相入而相資周易正義説卦易以乾坤象天地艮兑象山澤震巽象雷風坎離象水火若使天地不交水火異處則庶類無生成之用品物無變化之理周易正義説卦季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多左傳襄公二十三年志相為戾猶藥石之療疾杜氏解左傳襄公二十三年以此馳説取合諸侯其言雖殊辟猶水火相滅亦相生也仁之與義敬之與和相反而皆相成也前漢書藝文志金木水火以剛柔相濟然後克得其和能為民用魏志袁紹傳註春花發萼夏繁其實秋風逐暑冬氷乃結晉書皇甫謐傳文理者相明者也色味者相度者也藻華者相成者也鶡冠子泰鴻氷得炭則解歸水復其性炭得氷則保其炭故曰相愛淮南子説山訓解夫堯舜之徳譬猶偶燭之施明於幽室也前燭即盡照之矣後燭入而益明此非前燭昧而後燭彰也乃二者相應而成大光二聖相徳而致太平之功也是故大鵰之動非一羽之輕也騏驥之速非一足之力也衆良相徳而積施乎無極也堯舜兩美蓋其則也潜夫論釋難夫臣妾但各當其分耳未為不足以相治也相治也者若手足耳目四支百體各有所司而更相御用也郭子註莊齊物論竭川非以虛谷而谷虛夷丘非以實淵而淵實絶聖非以止盗而盗止郭子註莊胠篋良友每事相成道徳資以琢磨仁義因之組織居憂共戚處樂同驩李善註文選劉孝標廣絶交論譬如父母呵敎子孫雖口剛急而心猶愛譬如瘡醫破洗人瘡當時大痛久久除愈修行道地經慈品消弭若疾自已招或寒暑飲食所致當須治療若其自然之疾非已所致疾當自損勿須藥療而有喜也周易正義无妄雲漢仍叔美宣王也宣王承厲王之烈内有撥亂之志遇烖而懼側身修行欲銷去之毛詩雲漢妖孽者天之所以警天子諸侯也惡夢者所警士大夫也妖孽不勝善政惡夢不勝善行孔子集語下天子見怪則修德諸侯見怪則修政卿大夫見怪則修職士庶人見怪則修身後漢書楊震孫賜傳日食則失徳之國惡之月食則失刑之國惡之彗星見則失和之國惡之風與日爭明則失生之國惡之是故聖王日食則修徳月食則修刑彗星見則修和風與日爭明則修生此四者聖王所以免天地之誅也管子四時身有醜夢不勝正行國有妖祥不勝善政淮南子繆稱訓天之所明禍不遇家反目相逐終得和美焦氏易林巽之歸妹過盛之朝灾沴不消以憂其過也臨亡之國灾沴亦熄以無庸於警也故灾沴之象恒集於過盛將亡之際天禄閣外史去蜀夫堯之使禹治水猶病水者之使醫也然則堯之洪水天地之水病也禹之治水洪水之良醫也王充論衡順鼔篇五行之性水土不同以水為害而攻土土勝水攻社之義毋乃如今世工匠之用椎鑿也以椎擊鑿令鑿穿木今儻攻土令厭水乎王充論衡順鼔篇天地之有水旱猶人之有疾病也疾病不可自責除水旱不可以禱謝去明矣王充論衡感虛篇禹治水以身解於陽旴之河湯苦旱以身禱於桑林之際李善註文選應休璉與岑文瑜書山神曰螭物精曰魅土精曰羵羊水精曰罔象木精曰畢方火精曰遊光金精曰清明天下有道則衆精潜蔵意林正部陛下父事天母事地子養黎民父虧明母震動子訛言今日蝕三陽始小民正月朔旦尚惡敗器物况日虧缺乎藝文類聚歳時部元正火精不退奚應善言氷垤難消徒持隂徳藝文類聚職官部諸王墓誌桑穀生於殷庭兮中宗克已以成仁雊雉登夫鼎耳兮武丁責躬而敎純初學記獸部政舉化流如日之光禍亂消滅若雲之除道徳經指歸卷八譬如有藥名摩蚳有蛇饑行索食道逢蟲豸蛇欲噉之蟲行到摩蚳藥所蛇聞藥香即走還去何以故藥力所却蛇毒即歇道行波羅蜜經卷二童孺正而鬼退丈夫邪而魅陵𢎞明集十三困逹山上有水蹇君子以反身修徳易蹇晉重耳之有霸心生於曹衞越王勾踐之有霸心生於㑹稽故居下而無憂者則思不逺處身常逸者則志不廣庸知其終始乎孔子家語在厄芳處幽而彌馨兮寳在夜而愈光晉書摯虞傳顔回以簞食瓢飲揚其仁聲原憲以蓬户繩樞邁其清徳晉書江統傳居不隠者思不逺身不佚者志不廣女庸安知吾不得之桑落之下荀子宥坐夫困之為道從寒之及煖煖之及寒也唯賢者獨知而難言之也説苑雜言人君不困不成王列士不困不成行説苑雜言語不云乎三折肱而成良醫夫陳蔡之間丘之幸也二三子從丘者皆幸人也説苑雜言槌鐘擊磬所以發其聲也煮鬯燒薰所以揚其芬也賢者之窮厄戮辱此槌擊之意也其死亡陷溺此燒煮之類也徐幹中論夭壽有伊呂之才者不久滯於窮賤懐猗頓之術者不長處於饑寒抱朴子外篇安貧九斷四屬者藴藻所以表靈摧柯碎葉者茝蕙所以增芬是以夷吾桎檻而建匡合之績應侯困辱而著入秦之勲抱朴子外篇博喻否終則成之以泰晦極則清輝晨耀是以垂耳吳阪者騁千里之逸軌縈鱗九淵者凌虹霓以髙蹈抱朴子外篇博喻物生無不屯者也事成無不由艱難者也關氏易傳雜義九折臂而成醫兮吾至今乃知其信然補文選屈原惜誦所異鍾沈徳水望岀風雲劍沒豐城氣連牛斗藝文類聚人部懐舊銘適意參差荇音杏菜左右采之窈窕淑女琴瑟友之參差荇菜左右芼之窈窕淑女鍾鼔樂之詩國風關雎誰謂荼苦其甘如薺音泚詩國風谷風阪音反有漆隰有栗既見君子並坐鼓瑟阪有桑隰有楊既見君子並坐鼔簧詩國風車鄰魚在在藻有頒音焚其首王在在鎬豈音憕樂飲酒魚在在藻有莘其尾王在在鎬飲酒樂豈魚在在藻依於其蒲王在在鎬有那其居詩小雅魚藻􅀈􅀈泌水可以樂道忘饑巍巍南面可以樂治忘亂毛詩正義衡門夫擊甕叩缻彈筝摶髀而歌呼嗚嗚快耳目者真秦之聲也鄭衞桑間昭虞武象者異國之樂也今棄撃甕叩缻而就鄭衞退彈筝而取昭虞若是者何也快意當前適觀而已矣史記李斯傳矯翼厲翮恣意所存前漢書揚雄傳下湯沐具而非弔大厦構而相驩梁書任昉傳草木之得春陽魚龍之得風雨周書庾信傳昔者宋國有田夫常衣緼黂僅以過冬暨春冬作自曝於日不知天下之有廣厦隩室綿纊狐狢顧謂其妻曰負日之暄人莫知者以獻吾君將有重賞里之富室告之曰昔人有美戎菽甘枲莖芹萍子者對鄉豪稱之鄉豪取而嘗之蜇於口慘於腹衆哂而怨之其人大慙子此類也列子楊朱易道良馬使人欲馳飲酒而樂使人欲謌淮南子説林訓佳人不同體美人不同面而皆説於目棃橘棗栗不同味而皆調於口淮南子説林訓夫病濕而強之食病暍而飲之寒此衆人之所以為養也而良醫之所以為病也快於目悦於心愚者之所利也然而有道者之所辟也故聖人先忤而後合衆人先合而後忤淮南子人間訓若轉丸掌中足以自樂也淮南子要畧君不見大澤中雉乎五歩一噣終日乃飽羽毛悦澤光照於日月奮翼爭鳴聲響於陵澤者何彼樂其志也援置之囷倉中常噣粱粟不旦時而飽然猶羽毛憔悴志氣益下低頭不鳴夫食豈不善哉彼不得其志故也今臣不逺千里而從君遊者豈食不足竊慕君之道耳韓詩外傳獐鹿逐牧飽歸其居焦氏易林屯之比鳬㕍啞啞以水為宅雌雄相和常共娛樂得其所欲焦氏易林大有之歸妹蜩螗歡喜草木嘉茂焦氏易林謙之解虎豹熊皮遊戲山谷君子仁賢亦得所欲焦氏易林謙之中孚負金懐玉南歸嘉國蜂蠆不螫利入我室焦氏易林隨之晉鳬遇稻廬甘樂􅂒鰌雖驅不去焦氏易林賁之震南有嘉魚駕黄取遊魴鱮詡詡利來無憂焦氏易林離之中孚鳥集茂木心樂願得焦氏易林解之恒旦種菽豆暮成藿羹心之所願志快意愜焦氏易林漸之乾次五鴻裝於淄飲食頥頥測曰鴻裝於淄大將得志也太𤣥經第三裝繇人之得小休息則氣得舒故喜也淮南子精神訓解水重深而魚悦林修茂而鳥喜曹子建離思賦并序在於幽室之中覩烝燭之光雖不教告亦皎然喜於所見也嵇中散集張遼叔自然好學論武侯之無人君之徳而處在防衞之間雖臨朝僑厲愈非其意及得其所思猶迯竄之聞人音安能不跫然改貌釋然而喜也莊子音義徐無鬼人聞長安樂則岀門向西而笑知肉味美對屠門而大嚼文選曹子建與吳季重書註還君本州可謂衣繡晝行矣藝文類聚職官部刺史有若披浮雲而曬白日岀幽谷而登喬木藝文類聚禮部朝㑹表杜氏幽求子謂兒年五嵗有鳩車之樂七嵗有竹馬之歡玉海車服車輿譬如有人經遇篤疾忽然一日平復如本海空智蔵經序品又如有人早離父母一旦不期遇相逢值海空智蔵經序品又如有人積日大饑一旦之間逢諸美饍海空智蔵經序品猶如弱喪失於本鄉徬徨他國父母離别恩愛久逺於後忽遇普見本鄉父母兄弟甚大歡喜海空智蔵經供獻品猶如貧人遇一金瓶海空智蔵經供獻品如端正人自見面貌心生歡喜元陽妙經卷六譬如羈客於險難處夜行失伴恐怖憂遑忽遇同侶心生歡喜踊躍無量亦如宿病未遇良醫於儵欻頃忽遇妙藥病得除愈心生歡喜踊躍無量如人沒水遇得舟航得度彼岸心生歡喜亦復如是如人渴乏忽遇醴泉恣意酣飲得無渴乏心生歡喜亦復如是如被寃家趰逐忽然得脱無諸煩惱心生歡喜亦復如是如囚詣市卒聞恩赦而得解脱心生歡喜亦復如是亦如農夫遇旱忽便得雨而苗得長五榖豐熟心生歡喜亦復如是亦如人逺行忽便還家心生歡喜亦復如是元陽妙經卷一譬如有人遊渉曠野經過險路百踰繕那或二或三或四五百見諸城邑王都前相謂放牧人園林田等見諸相已便作是念城邑王都去此非逺作是念已身意泰然不畏惡獸惡賊饑渴波羅蜜多經卷三昔與我等遊行讌樂於天池中猶如鴛鴦於善法堂猶如鵝王歡喜園中如迦蘭鳥遊漫陀河同於香象在波耶園及拘羅園猶如蜂王大寶積經卷一百二十譬如有人欲觀大海漸次徃趣經於多時不見山林便作是念今覩此相大海非逺所以者何夫近海岸地必漸下定無山林彼人爾時雖未見海而見近相歡喜踴躍波羅蜜多經卷三如夜逺渉迷失正路若見火光生大歡喜知有聚落疾徃趣之至便安隠永無怖畏波羅蜜多經卷五百六十七如人患渴得水乃止求出世法得深般若波羅蜜多思願便止波羅蜜多經卷五百六十七譬如極炎熱時於日後分有一丈夫熱所逼故奔趣殑河投於水中沐浴身體熱乏既息清涼悦性徃返遊戲度至餘岸經行徃來遙見不逺有大樹林枝葉翠盛隂影厚宻便徃林中復見施妙牀座敷勝氍毹上加綿褥覆以迦遮隣地之帔輕妙鮮支重覆其上細耎倚枕置牀兩頭彼大丈夫昇於此牀若坐若卧於牀四面清風㣲動輕扇相續大寶積經三十七如無足者得如意乗如亂心者得甘露味如羸老者遇其機杖是大福田之根本也大方廣十輪經卷一譬如有人身被五縛若得解脱如鳥出網至無礙處大乗造像功徳經卷下亦如曠野清泠之水渴人過遇自恣飲之本縁經毗羅摩品譬如賈客逺行治生得度厄路多獲財利還歸到家心悦無量又如田家耕不失時風雨復節多收五穀蔵著篅中意甚歡喜如病困得愈得畢償債修行道地經五隂成敗品譬如有人乗調象如意至湊無躓礙三昧法門經卷下譬如熱得凉池寒得温室世間之樂無以為喻也思惟要之法譬如金成器譬如華正敷譬如食美膳譬如解文字譬如開寶篋是各得歡喜大乗莊嚴經論卷一如象絶䩭靽自恣隨意去大荘嚴經論卷六偈所謂若披重霧以攀合璧出幽夜而眄燭龍短綆爰汲望瀾覘海𢎞明集十所以寒氷之内儻遇温風炭火之中若蒙凉氣便為歡樂即復欣然法苑珠林卷七喻林卷四十一
