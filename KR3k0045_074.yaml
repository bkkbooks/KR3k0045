body:
  text: 喻林巻七十四明徐元太撰臣術門一審任徳薄而位尊知小而謀大力小而任重鮮不及矣易下繫有實之鼎不可復有所取才任已極不可復有所加王弼註易既濟九四處上體之下上有所承而又應初下有所施既承且施非己所堪故曰鼎折足鼎足既折則覆公餗也周易正義鼎馬肥彊則能升髙進逺臣彊力則能安國毛詩有駜栁木之不可以為藩猶是狂夫不任挈壺氏之事鄭氏箋詩東方未明譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲左傳襄公三十一年位下而欲上政無大功而欲大禄皆怨府也國語魯或謂建信君君之所以事王者色也葺之所以事王者智也色老而衰智老而多以日多之智而逐衰惡之色君必困矣建信君曰奈何曰並驥而走者五里而罷乗驥而御之不倦而取道多君令葺乗獨斷之車御獨斷之勢以居邯鄲令之内治國事外刺諸侯則葺之事有不言者矣君因言王而重責之葺之軸令折矣戰國䇿趙孝成王人之體韻猶噐之方圓方圓不可錯用體韻豈可易處各順其方以𢎞其業則歳寒之功必有成矣晉書王坦之傳雖有賢君不愛無功之臣雖有慈父不愛無益之子是故不勝其任而處其禄此非禄之主也墨子親士世之君子使之為一彘之宰不能則辭之使為一國之相不能而為之豈不悖哉墨子貴義奉一爵酒不知於色挈一石焉則白汗交流又况贏天下之憂而海内之事者乎其重於尊亦逺也淮南子修務訓懸狟素餐食非其任焦氏易林謙之坎次四要不克或增之戴測曰要不克可敗也太𤣥經第一增次三視其徳可以幹王之國測曰視徳之幹乃能有全也太𤣥經第五視噐之盛物有斗石之量猶人爵有髙下之差也噐過其量物溢棄遺爵過其差死亡不存王充論衡骨相篇且驥一日行千里者無所服也使服任車輿駑馬同音驥曾以引鹽車矣垂頭落汗行不能進伯樂顧之王良御之空身輕馳故有千里之名王充論衡狀留篇非賁獲之壯不可以舉兼人之重非萬夫之特不可以總異官之局抱朴子外篇臣節明主官人不令出其噐忠臣居位不敢過其量非其才而妄授非所堪而虚任猶冰椀之盛沸湯葭莩之包烈火綴萬鈞於腐索加倍載於扁舟抱朴子外篇博喻若秉國之鈞出納王命者審良樂之顧盼不令跛蹇厠騏騄冐昧茍得闇於自量者慮中道之顛躓不以駑薾服鸞衡則何患庻績之不康何憂四凶之不退抱朴子外篇百里或智小敗於謀大或轅弱折於載重抱朴子外篇知止推此類也則貨輕者望利薄任重者責功多張湛註列黄帝勇略之士則受熊虎之任儒雅之徒則處龍鳳之署文選韋曜博奕論任重於力才盡則困用廣其噐應博則凶是以物勝權而衡殆形過鏡則照窮故明主程才以效業貞臣底力而辭豐文選陸機演連珠力勝其任則舉之者不重智能其事則為之者不難意林淮南子剸犀截鴈必俟昆吾之鋒逐日追風信資伯樂之駿未有驂駑蹇足而方騁遥塗採蓺鉛刀而求其斷割藝文類聚職官部吏部尚書表陟彼太行伯后之車屢怠望兹吳坂少㳺之馬難躋是知美非流水立致摧轅駿匪浮雲便期頓轡藝文類聚職官部中書侍郎表自非噐上白雲韻同明月何以延芳芝苑挿羽瓊條藝文類聚職官部太子詹事表臣聞運舟歸於積水致逺在於逸足未有涓澮之流可成奔飛之用駑蹇之乗而有滅没之功藝文類聚治政部薦舉表失晨之雞雖不忘於改旦敗駕之馬終取忸於銜鑣藝文類聚職官部刺史表夫拙士運斤工非其任豈唯所作不成抑亦反傷其手道徳經註疏巻八畏翹車而必讓誡濡翼之願辭初學記職官部秘書丞守正六三勿用取女見金夫不有躬无攸利易蒙心茍無瑕何恤乎無家左傳閔公元年王孫賈問曰與其媚於奥寧媚於竈何謂也子曰不然獲罪於天無所禱也論語八佾直哉史魚邦有道如矢邦無道如矢論語衛靈公昔者趙簡子使王良與嬖奚乗終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之彊而後可一朝而獲十禽嬖奚反命曰天下之良工也簡子曰我使掌與女乗謂王良良不可曰吾為之範我馳驅終日不獲一為之詭遇一朝而獲十詩云不失其馳舎矢如破我不貫與小人乗請辭御者且羞與射者比比而得禽獸雖若邱陵弗為也如枉道而從彼何也孟子滕文公下衒女不貞衒士不信越絶外傳記范伯子用私道者家必亂臣用私義者國必危反親以為行慈父不子逆主以自成惠主不臣也戰國䇿趙武靈王盛飾入朝者不以利汙義砥礪名號者不以欲傷行史記鄒陽傳刓方以為圜兮常度未替史記屈原傳正色立朝舉綱引墨朱紫有分鄭衛不雜晉書劉毅傳捷徑邪至我不忍以投歩千進茍容我不忍以歙肩後漢書張衡列傳君有正道臣有正路從之如升堂違之如赴壑後漢書朱暉列傳方駕逸歩不以曲路期通晉書庾闡傳交霜雪於杪歳晦風雨於將晨喈響或以變其音貞柯罕能全其性晉書徐寧傳左右近習之臣知譌詐之不可以得安也必曰我不去姦私之行盡力竭智以事主而乃以相與比周妄毁譽以求安是猶負千鈞之重䧟於不測之淵而求生也必不幾矣百官之吏亦知為姦利之不可以得安也必曰我不以清亷方正奉法乃以貪汙之心枉法以取私利是猶上髙陵之顛墮峻谿之下而求生必不幾矣韓非子和氏不任為君操竿下釣以蕩守節之士也孔叢子公儀次四月不常或失之行測曰月不常臣失行也太𤣥經第四常上九角解豸終其直其有施測曰角解豸終以直之也太𤣥經第六難士之委身于君猶女之結髪于夫也禮不具而求媾則女恥之恭不崇而求遇則士恥之天禄閣外史留賢夫天子以輿載命諸侯以輿載職士以輿載道今以載職者而載道弗可行於諸侯也天禄閣外史名噐以道遊諸侯者諸侯師之以縱横遊諸侯者諸侯役之士役于諸侯則馳辨無端束發慮無忠謀故曰一激之怒炎於火三寸之舌芒于劍是以身危而功不成天禄閣外史士論吾聞先王以禁為闗未聞以吏為闗也出入于吏之口乞人猶惡之况賢士乎夫賢士國家之巨闗也扞不軌而遏佞人驅曠民而制淫族鎮百姓而寧諸侯不倚爵而貴不恃禄而富其尊莊而顯厚也如是汝徒見諸侯之闗而不見賢士之闗乎子髙曰夫賢士之顯於時也必先由諸侯之闗而後使諸侯由其闗不然雖厲敬義之禁撃仁智之柝諸侯不聞焉不聞於諸侯何闗之為昔仲尼以仁義為闗周流列國然猶絶糧于陳削迹于宋而不能扼諸侯之闗故退而設闗于六經以防名教老子以道徳為闗猶騎青牛而過函谷以避周亂史之文曰周太史耳西出函谷闗遇闗令尹喜曰周將亡乎蘇秦張儀以縱衡為闗而顯諸侯諸侯役之如妾婦商鞅申不害以刑名為闗而制黔首諸侯待之如雞豚夫蘇張申商之徒皆干謁諸侯而後能騁其術也繄先王之道術陋蘇張而黜申商諸侯慕之若酷火之求濟于水危疾之求瘳于扁鵲也使先王不由諸侯之闗而資左右以流譽則雖欲效蘇張之揚眉而談笑于傾盖之際不可得也天禄閣外史至闗夫結緑𤣥黎非陶猗不能市也千鈞之重非賁獲不能抱也白雪之絃非靈素不能徽也邁倫之才非明主不能用也然耀靈光夜之珍不為莫求而虧其質以茍且於賤賈洪鐘周鼎不為委淪而輕其禮取見舉於侏儒嶧陽雲和不為不御而息唱以競顯於淫哇冠羣之徳不以沈抑而履徑而剸節於流俗是以和璧變為滯貨柔木廢於勿用赤刀之鑛不得經歐冶之鑪元凱之疇終不值四門之闢也抱朴子外篇擢才南金不為處幽而自輕瑾瑶不以居深而止潔志道者不以否滯而改圖守正者不以莫賞而茍合抱朴子外篇廣譬木之性處深則大而工度之以為噐物猶君夫之求貞良以為臣妾臣妾無求君夫之義太𤣥經第四遇解豺狼當路安問狐貍昏明有世直道無時藝文類聚人部忠贊守職雖有挈缾之知守不假噐左傳昭公七年虎兕出於柙龜玉毁於櫝中是誰之過與論語季氏王之臣有託其妻子於其友而之楚遊者比其反也則凍餒其妻子則如之何王曰棄之曰士師不能治士則如之何王曰已之曰四境之内不治則如之何孟子梁惠王下子之持㦸之士一日而三失伍則去之否乎曰不待三然則子之失伍也亦多矣孟子公孫丑下越職踰法以取名譽譬猶踐薄冰以待白日豈不殆哉前漢書宣帝紀不居其職不謀其事庖割有主尸不越樽宋書自序傳庖人雖不治庖尸祝不越樽俎而代之矣莊子逍遥遊古者工不兼事士不兼官工不兼事則事省省則易勝士不兼官則職寡寡則易守故士位可世工事可常慎子威徳昔者韓昭侯醉而寢典冠者見君之寒也故加衣於君之上覺寢而説問左右曰誰加衣者左右對曰典冠君因兼罪典衣與典冠其罪典衣以為失其事也其罪典冠以為越其職也非不惡寒也以為侵官之害甚於寒韓非子二柄軸之入轂各值其鑿不得相通猶人臣各守其職不得相干淮南子説林訓夫食萬人之力者蒙其憂任其勞一人失職一官不治皆公卿之累也鹽鐵論刺權駟馬不馴御者之過也百姓不治有司之罪也鹽鐵論疾貧豈肯委尸祝之塵釋大匠之位越樽俎以代無知之庖舎繩墨而助傷手之工抱朴子内篇暢𤣥譬如王駕大臣前行王居其後臨至陣敵王臣追逐不能相離海空智藏經持誡品明分六五貫魚以宫人寵无不利易剥六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也易小過婦制其夫臣制其君雖貞近危王弼註易小畜君以无為統衆无為則一也臣以有事代終有事則二也故陽爻畫奇以明君道必一隂爻畫兩以明臣體必二斯則隂陽之數君臣之辨也韓康伯註易繫辭下雌代雄鳴則家盡婦奪夫政則國亡孔氏傳書牧誓農勤穡則有秋下承上則有福孔氏傳書盤庚上歳月日時無易則百榖成君臣無易則政治明孔氏傳書洪範隂勝陽即謂之變而天弗施雌勝雄即謂之亂而人弗行故諸侯之治政在諸侯之大夫治於從汲冡周書殷祝解天有日月照臨晝夜猶王官之伯率領諸侯也北斗環繞北極猶卿士之周衛天子也五星行於列宿猶州牧之省察諸侯也二十八宿布於四方猶諸侯為天子守土也尚書正義説命中狐有牙而不敢以噬猿有蚤而不敢以撅勢居小者不能為大汲冡周書周祝解衆無名之星随心噣在天猶諸妾随夫人以次序進御於君也鄭氏箋詩小星水流而入海小就大也喻諸侯朝天子亦猶是也鄭氏箋詩沔水隼之性待鳥雀而食飛循陵阜者是其常也喻諸侯之守職順法度者亦是其常也鄭氏箋詩沔水褖兮衣兮褖衣自有禮制當以素紗為裏今褖衣反以黄為裏非其制也以喻賤兮妾兮賤妾自有定分當以謙恭為事今賤妾反以驕僣為事亦非其宜妾之不可陵尊猶衣之不可亂制毛詩正義緑衣沔然而滿者彼流水也此水之流當朝宗而入於海小就大也以喻強盛者是彼諸侯也此諸侯亦當朝宗天子臣事君也毛詩正義沔水落葉謂之蘀詩人謂此蘀兮蘀兮汝雖將墜於地必待風其吹女然後乃落以興臣兮臣兮汝雖職當行政必待君言倡發然後乃和汝鄭之諸臣何故不待君倡而後和毛詩正義蘀兮主佩倚則臣佩垂主佩垂則臣佩委禮記曲禮下凡奉者當心提者當帶執天子之噐則上衡國君則平衡大夫則綏之士則提之禮記曲禮下有以小為貴者宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角禮記禮噐盍旦夜鳴求旦之鳥也求不可得也人猶惡其欲反晝夜而亂晦明况於臣之僣君求不可得之類亂上下惑衆也鄭氏註禮記坊記妾子始蠶先妾而後子何也曰事有漸也言自卑事者始大戴禮記夏小正盈謂月光圓滿若臣之進受髙位是其伸也闕謂月光虧損若臣之退就下位是其屈也禮記正義禮運我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也伯父若裂冠毁冕㧞本塞原専棄謀主雖戎狄其何有余一人左傳昭公九年曷為徧刺天下之大夫君若贅旒然公羊襄公十六年朝服雖敝必加於上弁冕雖舊必加於首周室雖衰必先諸侯穀梁僖公八年子噲不得與人燕子之不得受燕於子噲有仕於此而子悦之不告於王而私與之吾子之禄爵夫士也亦無王命而私受之於子則可乎何以異於是孟子公孫丑下日為陽精象之君也月為隂精象之臣也三墳山墳君道倡始臣道終正是以乾位在亥坤位在未乾坤鑿度周易乾鑿度上抑人之有元君將禀命焉若禀而棄之是焚穀也其禀不材是穀不成也穀之不成孤之咎也成而焚之二三子之虐也國語晉禮防雖短不可踰也王室雖卑不可僣也國語解呉晉董褐復吳王臣疑其君無不危國妾疑其夫無不危家史記李斯傳履雖鮮不加於枕冠雖敝不以苴履何者上下之分也史記儒林傳夫物因人為貴故在賤者之手不御至尊之側魏志王粲傳註調音者小絃急大絃緩立事者賤者勞貴者佚文子上仁天下之士莫肯處其門庭臣其妻子必遊宦諸侯之朝者利引之也遊於諸侯之朝皆志為卿大夫而不擬於諸侯者名限之也尹文子大道上君先而臣從父先而子從兄先而弟從長先而少從男先而女從夫先而婦從夫尊卑先後天地之行也故聖人取象焉莊子天道左右移位以明君臣易職而變亂生焉公孫龍子通變論註主之與臣若日之與星賈子服疑孔子侍坐於季孫季孫之宰通曰君使人假馬其與之乎孔子曰吾聞君取於臣謂之取不曰假季孫寤告宰通曰今以往君有取謂之取無曰假孔子曰正假馬之言而君臣之義定矣韓詩外傳巻五官尊者禄厚本美者枝茂鹽鐵論刺權冠雖敝宜加其上履雖新宜居其下周室雖微諸侯未之能易也説苑善説其在鳥則雄為陽雌為隂其在獸則牡為陽而牝為隂其在民則夫為陽而婦為隂其在家則父為陽而子為隂其在國則君為陽而臣為隂故陽貴而隂賤陽尊而隂卑天之道也説苑辨物衣而不裳未知其可也裳而不衣未知其可也衣裳其順矣乎揚子問神次六魚鱗次之乃矢施之帝用登于天測曰魚鱗差之貴賤位也太𤣥經第四禮次八冠戚䏔履全履測曰戚䏔明不可上也太𤣥經第四禮次五其從其横天地之常測曰其從其横君臣常也太𤣥經第四常日正於天光通也月闕其博損嬴也太𤣥經太𤣥文日正於天乗乾之綱月闕其博以觀消息太𤣥經太𤣥文女隂也無専擅之義猶君動而臣随也王逸註楚辭離騷經枝大於榦臣大於君皆為疾也太𤣥經第二争解升股運於腹婦歸於姑傳曰股運於腹獲其所也婦歸於姑得其宜也元包孟陽人皆易華嶽以謂卑小故登之而摧傷難天以謂髙大故不昇而無殃意林魏子官之有級猶階之有等升階越等其歩也亂亂登朝級敗禮傷法太平御覽職官部總叙官孔子曰管仲鏤簋而朱紘山節而藻棁賢大夫也而難為上也埤雅卉物門藻日陽君象也星隂臣道也玉海天文天文書上忠君江水漢水其流遄疾又合為一共赴海也猶諸侯之同心尊天子而朝事之尚書正義禹貢微君之故胡為乎中露微君之躬胡為乎泥中詩國風式微人皆生於父母臣之道資於事父以事君故京師者諸侯之父母何為不以事父母之道事京師也毛詩正義沔水秦王謂陳軫曰吾聞子欲去秦而之楚信乎陳軫曰然王曰儀之言果信也曰非獨儀知之也行道之人皆知之曰孝已愛其親天下欲以為子子胥忠乎其君天下欲以為臣賣僕妾售乎閭巷者良僕妾也出婦嫁鄉曲者良婦也吾不忠於君楚亦何以軫為忠乎戰國䇿秦惠文君忠臣之於其君猶孝子之於其親進則有欣然之慶非貪官也退則有戚然之憂非懐禄也其意在於不忘光君榮親情所不能已己者也晉書叚灼傳實以田夫之交猶有寄託况君臣之義道貫自然晉書庾亮傳夫忠為令徳學乃國華譬衆星之有禮義人倫之有冠冕也晉書衛瓘傳瞻望城闕不勝喜説鳬藻之情宋書文帝本紀披星日月仰希葵藿之照宋書厯下志子自愛不愛父故虧父而自利弟自愛不愛兄故虧兄而自利臣自愛不愛君故虧君而自利此所謂亂也墨子兼愛上金木水火雖各職不因土方不立若酸鹹辛苦之不因甘肥不能成五味也甘者五味之本也土者五行之主也五行之主土氣也猶五味之有甘肥也不得不成是故聖人之行莫貴於忠土徳之謂也春秋繁露五行之義章地明其理為萬物母臣明其職為一國宰母不可以不信宰不可以不忠母不信則草木傷其根宰不忠則姦臣危其君根傷則亡枝葉君危則亡其國故為地者務暴其形為臣者務著其情春秋繁露天地之行章為人臣者盡臣以順職為人子者致孝以承業君有非則臣覆盖之父有非則子匿逃之故君薨臣不變君之政父没則子不改父之道也鹽鐵論憂邊賢臣之事君也受官之日以主為父以國為家以士人為兄弟故茍有可以安國家利民人者不避其難不憚其勞以成其義説苑建本汝朝出而晩來則吾倚門而望汝莫音暮出而不還則吾倚閭而望今汝事王王出走汝不知其處尚何歸乎列女傳周列國王孫氏忠臣不借人以力貞女不假人以色豈獨事生若此哉於死者亦然列女傳周列國楚白貞姬月未望則載魄於西既望則終魄於東其遡於日乎揚子五百次七争干及矛䩜用亨于王前行測曰干矛之争衛君躬也太𤣥經第二争衛驂乗者越職而呼車惻怛發心恐上之危也夫論説者閔志憂俗與衛驂乗者同一心矣王充論衡對作篇鱗介尊神龍走獸宗麒麟蟲獸豈知徳何况於士人曹子建薤露行信盡忠髙祖若門户之閉無巇隙也揚子法言註重黎篇猶犬馬之戀主竊託慕於闕庭文選西征賦棄席思君幄疲馬戀君軒願垂晉主惠不愧田子魂文選鮑昭東武吟不使戀主之心施於犬馬傾日之志偏在葵藿藝文類聚職官部令長啟昔堙海之禽不增於大地泣河之士非益於洪流盡其心之所存忘其力之所及文苑英華薛道衡帝徳上頌人之忠也猶魚之有淵魚失水則死人失忠則凶故良將守之志立而揚名太平御覽兵部將帥下有大國王喜食鴈肉使一獵師常網捕鴈時有五百羣鴈從北方來飛空南過中有鴈王墮獵網中爾時獵師欲取殺之時有一鴈悲鳴吐血裵􅏆不去獵師彎弓欲射不避弓矢目不暫捨即鼓兩翅來投鴈王五百羣鴈裵􅏆虚空亦復不去獵師見此一鴈悲鳴吐血顧戀如是尋時開網放使令去爾時一鴈悲鳴歡喜鼓翅随逐五百羣鴈前後圍遶飛空而去大方便佛報恩經巻四匡輔予弗克俾厥后惟堯舜其心愧恥若撻於市書説命下衮職有闕維仲山甫補之詩大雅烝民圓者周匝之物以比人行周備物有不圓匝者規之使成圓人行有不周者規之使周備是匡諫之名毛詩正義沔水陳力就列不能者止危而不持顛而不扶則將焉用彼相矣論語季氏三台麗天辰極以之增耀論道作弼王猷以之時邕晉書桓豁傳世將無道則天子有虚眩之疾諸侯有怠荒之疾百姓有饑餒之疾大臣有貪蔽之疾有司有夤縁侵漁之疾受黜之臣有要君附權沽舉之疾夫國家如寄也而有上下之險疾擾而攻之國焉不危子欲臨民醫是而已矣曰何以醫也曰子能以仁義為藥以政教為湯先瘳乎主疾而後瘳乎諸侯臣庻不亦善乎天禄閣外史董卓衆星共繞北辰諸輻咸歸車轂若文武之臣尊輔天子也前漢書註司馬遷傳國有維輔屋有棟梁室之傾尚可柱也心之傾不可輔也太平御覽居處部棟正父維子弼君伊臣顛而能扶屈而能伸玉海官制儲官進言其沃我心須切至若服藥不使人瞑眩憤亂則其疾不得瘳愈言藥毒乃得除病言切乃得去惑也尚書正義説命上夫截骨之劍無削剟之利臽鐵之矛無分髪之便建䇿之士無暴興之説吳越春秋句踐入臣外傳布穀鳴於孟夏蟋蟀吟於始秋物有微而志信人有賤而言忠後漢書襄楷列傳矇冐瞽説時有攸獻譬遒人之有采於市間游童之吟詠乎疆畔庻以增廣福祥輸力規諫蜀志郤正傳下無言則吾謂之瘖上無聞則吾謂之聾聾瘖非害國家而如何也晏子諫下愕愕者福也諓諓者賤也林中多疾風富貴多諛言萬里之朝日聞唯唯而後聞諸生之愕愕此乃公卿之良藥鍼石鹽鐵論國病楚人有獻魚楚王者曰今日魚穫食之不盡賣之不售棄之又惜故來獻也左右曰鄙哉辭也楚王曰子不知漁者仁人也盖聞囷倉粟有餘者國有餓民後宫多幽女者下民多曠夫餘衍之蓄聚於府庫者境内多貧困之民漁者知之其以此諭寡人也且今行之於是乃遣使恤鰥寡而存孤獨出倉粟發幣帛而振不足罷去後宫不御者出而妻鰥夫楚民欣欣大悦鄰國歸之故漁者一獻餘魚而楚國賴之可謂仁智矣劉向新序雜事二次四干言入骨時貞測曰干骨之時直其道也太𤣥經第一干謀難盡者設其喻機難逹者張其形天禄閣外史防胡淵中之魚遞相吞食度口所能容然後嚥之口不能受哽咽不能下故夫商鞅三説孝公後説者用前二難用後一易行也王充論衡効力篇言非東里誠譬北辰藝文類聚職官部刺史表喻林卷七十四
