body:
  text: 喻林卷二明徐元太撰造化門二不奪金水之明內鑒火日之光外輝剛施柔受陽勝陰伏晉書紀瞻傳水火不相入天之制也鶡冠子天則不害其方者反而對各當其所若左右不離公孫龍子通變論注青者木之色其方在東白者金之色其方在西東西相反而相對也東自極於東西自極於西故曰不相鄰也東西未始不相接而相接不相害故曰相鄰不害其方也公孫龍子通變論注規生矩殺衡長權藏繩居中央為四時根淮南子天文訓孟春始􅑿孟秋始縮仲春始出仲秋始內季春大出季秋大內孟夏始緩孟冬始急仲夏至修仲冬至短季夏德畢季冬刑畢淮南子時則訓天為繩地為凖春為規夏為衡秋為矩冬為權繩者所以繩萬物也凖者所以凖萬物也規者所以員萬物也衡者所以平萬物也矩者所以方萬物也權者所以權萬物也淮南子時則訓夫寒之與暖相反大寒地坼水凝火弗為衰其暑大熱鑠石流金火弗為益其烈寒暑之變無損益於已質有之也淮南子詮言訓陰陽不能且冬且夏月不知晝日不知夜淮南子說山訓冬有雷電夏有霜雪然而寒暑之勢不易小變不足以妨大節淮南子說林訓雷震乎天風薄乎山雲徂乎方雨流乎淵其事矣乎楊子寡見天道成規地道成矩規動周營矩靜安物太𤣥經𤣥圖是故地坎而天嚴月遄而日湛五行迭王四時不俱壯日以昱乎晝月以昱乎夜昴則登乎冬火則發乎夏太𤣥經太𤣥告至大有所不能變極細有所不能奪故氷霜肅殺不能凋菽麥之茂熾暑鬱隆不能消雲山之凍飈風蕩海不能使潜泉揚波春澤榮物不能使枯卉發花抱朴子外篇博喻去濕就燥火之勢也違高從下水之性也劉子思順四運雖鱗次理化各有凖文選殷仲文九井作詩水可乾而不可奪濕火可滅而不可奪熱金可柔而不可奪重石可破而不可奪堅意林任子男女總名為人天地所以無總名何天圓地方不相類也天左旋地右周猶君臣陰陽相對向也爇文類聚天部上天夫水决之則流壅之則腐火奮之則燥停之則明金庭無為妙經如水能漬火能燒各自有力大智度論卷二十四如火以燒為力水以潤為力大智度論三十三不變天不變其常地不易其則春秋冬夏不更其節管子形勢天不能以早為晚地不能以髙為下人不能以男為女鶡冠子兵政鵾化為鵬一物化為一物如右移於左終是何者之右公孫龍子通變論注五行之物可變改者唯土也埏以為馬變以為人是謂未入陶竈更火者也如使成器入竈更火牢堅不可復變王充論衡無形篇水性宜冷而有華陽溫泉猶曰水冷冷者多也火性宜熱而有蕭丘寒炎猶曰火熱熱者多也迅風揚波高下相臨山隆谷窪差以尋常較而望之猶曰水平舉大體也故世之論事皆取其多者以為之節劉子從化荆者非無東西也而謂之南其南者多也文選魏都賦注夫春生秋殺天道之常春一物枯即為灾秋一物華則為異補文選張敏駁報仇議盛夏之時當風而立隆冬之月嚮日而坐其夏欲得寒冬欲溫也或當風鼓翣向日燃爐然而天終不為冬夏易氣者寒暑有節不為人變改太平御覽時序部夏中不竭渤海之東不知幾億萬里有大壑焉實惟無底之谷其下無底名曰歸墟八紘九野之水天漢之流莫不注之而無增無減焉列子湯問諄芒將東之大壑適遇苑風於東海之濵苑風曰子將奚之曰將之大壑曰奚為焉曰夫大壑之為物也注焉而不滿酌焉而不竭吾將游焉莊子天地風之過河也有損焉日之過河也有損焉請只風與日相與守河而河以為未始其攖也恃源而往者也莊子徐無鬼指窮於為薪火傳也不知其盡也莊子養生主明晦相推而日月逾邁歲歲相蕩而天地彌陶太𤣥經太𤣥告夫盡於一形者皆隨代謝而遷革矣故生者必終而生生物者無變化也張湛注列子天瑞如大海水還復周流無盡時三十六部尊經黃林經又如空中種種色相現生現滅而此虛空無生無滅佛說佛地經卷五彼劫量者譬如有人造一大城廣十二由旬高三由旬於彼城中置以胡麻悉皆充滿忽有一人百年一來取一胡麻而擲於外如是一來一擲乃至胡麻擲盡城亦破壞此劫數量亦復未盡又復譬如有一大山廣二十五由旬高十二由旬有長壽天百年一來一坐其山以憍尸迦衣拂其山石如是一來一拂乃至彼山拂盡其劫數量亦復未盡正法經卷一世界無窮如車輪無初無後大智度論卷二自然秋霜降者草花落水搖動者萬物作此必然之效也史記李斯傳凡道無根無莖無葉無榮萬物以生萬物以成管子內業女聞人籟而未聞地籟女聞地籟而未聞天籟夫子游曰敢問其方子綦曰夫大塊噫氣其名為風是唯無作作則萬竅怒號而獨不聞之翏翏乎山林之畏佳大木百圍之竅冗似鼻似口似耳似枅似圈似臼似窪者似汚者激者謞者叱者吸者呌者譹者宎者咬者前者唱于而隨者唱喁冷風則小和飄風則大和厲風濟則衆竅為虛而獨不見之調調之刁刁乎子游曰地籟則衆竅是已人籟則比竹是已敢問天籟子綦曰夫吹萬不同而使其自已也咸其自取怒者其誰邪莊子齊物論春雨日時草木怒生銚耨於是乎始修草木之倒植者過半而不知其然莊子外物天德而出寧日月照而四時行若晝夜之有經雲行而雨施矣莊子天道人謂目能見物而目以因火見是目不能見由火乃得見也然火非見白之物則目與火俱不見矣然則見者誰乎精神見矣夫精神之見物也必因火以目乃得見矣火目猶且不能為見安能與神而見乎則神亦不能見矣公孫龍子堅白論注天不言而人推高焉地不言而人推厚焉四時不言而百姓期焉荀子不茍夫萍樹根於水木樹根於土鳥排虛而飛獸跖實而走蛟龍水居虎豹山處天地之性也兩木相摩而然金火相守而流貟者常轉窽者主浮自然之勢也是故春風至則甘雨降生育萬物羽者嫗伏毛者孕育草木榮華鳥獸卵胎莫見其為者而功既成矣秋風下霜羣生挫傷鷹鵬摶鷙昆蟲蟄藏草木注根魚鱉凑淵莫見其為者滅而無形淮南子原道訓或問雕刻衆形者匪天歟曰以其不雕刻也如物刻而雕之焉得力而給諸楊子問道若風之噫噓而物竅皆鳴日之臨照而物狀皆朗不行而赴不疾而馳此之謂機天祿閣外史琴論汲井决陂灌溉園田物亦生長霈然而雨物之莖葉根核莫不洽濡程量樹澤孰與汲井决陂哉故無為之為大矣本不求功故其功立本不求名故其名成沛然之雨功名大矣而天地不為也氣和而雨自集王充論衡自然篇天道無為故春不為生而夏不為長秋不為成冬不為藏陽氣自出物自生長陰氣自起物自成藏王充論衡自然篇地之有萬物猶天之有列星也王充論衡感虛篇夫鑿龜數莢可以知吉凶然不能為吉凶何者吉凶可知而不可為也嵇中散集宅無吉凶攝生論天地以自然運聖人以自然用自然者道也張湛注列子仲尼夫有形必有影有聲必有響此自然而並生俱出而俱沒豈有相資前後之差哉張湛注列子天瑞俗人見天地之大也以萬物之小也因曰天地為萬物之父母萬物為天地之子孫夫蝨生於我豈我之所作故蝨非我不生而我非蝨之父母蝨非我之子孫蠛蠓之育於醯醋芝檽之産於木石蛣􅔒之滋於汚淤翠蘿之秀於松枝非彼四物所創匠也萬物盈乎天地之間豈有異乎斯哉抱朴子內篇塞難天有日月寒暑人有瞻視呼吸以遠况近以此推彼人不能自知其體老少痛癢之何故則彼天亦不能自知其體盈縮災祥之所以人不能使耳目常聰明榮衛不輟閲則天亦不能使日月不薄蝕四時不失序抱朴子內篇塞難夫腹背雖包圍五臟而五臟非腹背之所作也肌膚雖纒裹氣血而氣血非肌膚之所造也天地雖含囊萬物而萬物非天地之所為也譬猶草木之因山陵以萌秀而山陵非有事焉魚鱉託水澤以産育而水澤非有為焉抱朴子內篇塞難乾坤方圓非規矩之功三辰摛景非瑩磨之力春華粲煥非漸染之采茞蕙芬馥非容氣所假知夫至真貴乎天然也抱朴子外篇辭義天地以萬物為體而萬物必以自然為正故大鵬之能高斥鷃之能下椿木之能長朝菌之能短凡此皆自然之所能非為之所能也郭子注莊逍遙遊天不為覆故能常覆地不為載故能常載使天地而為覆載則有時而息矣使舟能沈而為人浮則有時而沒矣故物為焉則未足以終其生也郭子注莊德充符尸子曰天地之道莫見其所以長物而物長聖人之道亦然李善注文選顏延年釋奠㑹詩鳴籟受響非有志於要風㳙流長邁寧厝心於歸海是以萬竅怒號不扣而咸應百川是納用卑而為宰廣文選沈休文連珠陰凝上結則合而成雲陽散下流則降而為雨埤雅天道門雲象齒感雷莫之為而文生天象亦感氣莫之為而文生埤雅品物門象天地非有為焉正其道而物自然陰陽四時非生萬物也雨露時降非養草木也神明接陰陽和萬物生矣道德經四子集解火動而炎上水流而潤下非有師導使其然也參同契有以無為母無以虛為母虛以道為母自然者道之根本也西升經道德天地水火萬物高山深淵各有所歸之夫道非欲於虛虛自歸之德非欲於神神自歸之天非欲於清清自歸之地非欲於濁濁自歸之濕非欲於水水自歸之燥非欲於火火自歸之萬物非欲見於形形自見之高山大澤非欲於飛鳥虎狼飛鳥虎狼自來歸之深淵河海非欲於魚鱉蛟龍魚鱉蛟龍自來歸之人能虛空無為非欲於道道自歸之西升經不雕刻而萬物成不提挈而萬物生金庭無為妙經譬如日出於閻浮提先照一切須彌山等諸大山王次照黑山次照高原然後普照一切大地日不作念我先照此後照於彼但以山地有高下故照有先後大方廣佛華嚴經卷五十如日月光照拘牟頭分陀利鬱波羅華等或有合者或有開者或墮落者非是日月有分别心何以故日月無心故以無心故自開自落非日月過文殊師利問經卷下無私天之生物必因其材而篤焉故栽者培之傾者覆之中庸風漂物者也風之所漂不避貴賤美惡雨濡物者也雨之所墮不避小大強弱風雨至公而無私所行無常鄉人雖遇漂濡而莫之怨也管子形勢解天無不覆有生有殺而天無愛惡日無不照有妍有醜而日無厚薄關尹子二柱坱軋垠孰􅀈得之至得無私泛泛乎若不繫之舟能者以濟不能者以覆鶡冠子世兵得禨無小滅宗無大則此言鬼神之所賞無小必賞之鬼神之所罰無大必罰之墨子明鬼下天無私覆也地無私載也日月無私燭也四時無私行也行其德而萬物得遂長焉呂氏春秋去私天地無豫也故無奪也日月無德也故無怨也喜德者必多怨喜豫者必善奪利則為害始福則為禍先唯不求利者為無害唯不求福者為無禍淮南子詮言訓天地福順而禍逆山川福卑而禍高人道福正而禍邪太𤣥經𤣥瑩天地為萬物之父母以其無所偏為故能子萬物郭子注莊逹生造化為人亦猶陶之造瓦耳前漢書注賈誼傳聖人之憂憂君子之道不長小人之道不消黍稷之不茂荼蓼之蕃殖至於乾坤簡易是常無偏於生養無擇於人物不能委曲與彼聖人同此憂之李善注文選魏都賦生之無亭毒之心死之豈䖍劉之志墜之淵泉非其怒升之霄漢非其恱文選劉峻辨命論夫日之朝見隨隙冗大小而納照風之夕散因形物巨細而賦音文選陸士衡演連珠日月為天下眼目人不知德山川為天下衣食人不能謝太平御覽天部三上夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之黃帝素問內經氣交變大論天道賞善罰惡治人之身若大匠作器善者則成惡者則敗也道德經注疏卷八慈雲降潤不别蕭蘭慧日流輝寧分岸谷法苑珠林卷五十五盛德井用有常德終日引汲未嘗言損終日泉注未嘗言益故曰無喪無得也周易正義井天下之物莫柔弱於水然而大不可極深不可測修極於無窮遠淪於無涯息耗減益通於不訾上天則為雨露下地則為潤澤萬物不得不生百事不得不成大包羣生而無所私澤及蚑蟯而不求報富贍天下而不既德施百姓而不費行而不可得窮極也微而不可得把握也擊之無創刺之不傷斬之不斷焚之不然淖溺流遁錯繆相紛而不可靡散利貫金石強濟天下動容無行之域而翶翔忽區之上邅回川谷之間而滔騰大荒之野有餘不足任天下取與萬物而無所前後是故無所私而無所公靡濫振蕩與天地鴻洞無所左而無所右蟠委錯紾與萬物始終是謂至德夫水所以能成其至德於天下者以其淖溺潤滑也淮南子原遁訓木主生而金主殺火主暑而水主寒使人必以其序官人必以其能天之數也土居中央為之天潤土者天之股肱也其德茂美不可名以一時之事故五行而四時者土兼之也春秋繁露五行之義陰猶沈也何名何有皆并一於陽昌力而辭功故出雲起雨必令從上之下命之曰天雨不敢有其所出上善而下惡惡者受之善者不受春秋繁露陽尊陰卑忠臣之義孝子之行取之土土者五行最貴者也其義不可以加矣五聲莫貴於宫五味莫美於甘五色莫貴於黃春秋繁露五行對夫土者掘之得甘泉焉樹之得五穀焉草木殖焉鳥獸魚鱉遂焉生則立焉死則入焉多功不言賞世不絶故曰能為下者其惟土乎韓詩外傳五嶽者何謂也泰山東嶽也霍山南嶽也華山西嶽也常山北嶽也嵩山中嶽也五嶽何以視三公也能大布雲雨焉能大斂雲雨焉觸石而出膚寸而合不崇朝而雨天下施德博大故視三公也四瀆者何謂也江河淮濟也四瀆何以視諸侯能蕩滌垢濁焉能通百川於海能出雲雨千里焉為施甚大故視諸侯也說苑辨物子貢問曰君子見大水必觀焉何也孔子曰夫水者君子比德焉遍豫而無私似德所及者生似仁其流卑下句倨皆循其理似義淺者流行深者不測似智其赴百仞之谷不疑似勇綿弱而微達似察受惡不讓似包蒙不清以入鮮潔以出似善化至量必平似正盈不求槩似度其萬折必東似意是以君子見大水觀焉爾也說苑雜言夫智者何以樂水也曰泉源潰潰不釋晝夜其似力者循理而行不遺小間其似持平者動而之下其似有禮者赴千仞之壑而不疑其似勇者障防而清其似知命者不清以入鮮潔而出其似善化者衆人取平品類以正萬物得之則生失之則死其似有德者淑淑淵淵深不可測其似聖者通潤天地之間國家以成是知之所以樂水也說苑雜言天下之平莫盛於停水無情至平故天下取正焉郭子注莊德充符孝經援神契曰五嶽之精雄聖四瀆之精仁明李善注文選蔡伯喈太丘碑文顧夷子與子華游東池子華曰水有四德沐浴羣生深流萬世是仁也揚清激濁蕩去滓穢是義也柔而難犯弱而難勝是勇也道江疏河惡盈流謙是智也太平御覽地部水上唯日之行天有常進退有率不遲不疾不外不內人君德也玉海天文天文書下百工之治殊事異方漚爛金石破堅折剛平微正妙解緩羣形和調五味蕩滌臭腥攻堅陷大非水不行夫何故哉衆物態能莫之與雙也道德經指歸卷十三譬如日月雖照一切而不分别我發光明能有所照然有情類自業勢力感得日月晝夜巡照波羅蜜多經卷五百六十九如日月光利益諸華雖有此力不求恩報何以故日月無心故文殊師利問經卷下海懷衆珍黃金白銀琉璃水精珊瑚龍蛟明月神珠千奇萬異無求不得斯四德也海八德經尺一普天之下有五大河流行注海西流者名恆南流者名邪云東流者兩河一名沙陸一名阿夷越北流名墨五河流邁俱入於海皆去舊名合為海斯五德也海八德經尺一生物天地解而雷雨作雷雨作而百果草木皆甲拆易解夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉易繫辭上傳天地絪緼萬物化醇男女構精萬物化生易繫辭下傳南山既能高峻又以草木平滿其旁倚之畎谷使之齊均也鄭氏箋詩節南山榛楛濟濟是廣山之德澤也山之德澤既廣則山之為神益尊毛詩正義天作獨陰不生獨陽不生獨天不生三合然後生穀梁莊公三年今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不泄萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉中庸夫天地者萬物之官府山川者雲氣之丘墟萬物之生遂則官府之功大雲雨施其潤則丘墟之德厚後漢紀光武八日往月來唯天所以運序山鎮川流唯地所以宣氣運序則寒暑無差宣氣則雲雨有作故能成天地之大德育萬物而為功隋書高帝紀下一雌一雄卵生一牡一牝胎生關尹子二柱篇核芽相生不知其幾萬株天地雖大不能芽空中之核雌卵相生不知其幾萬禽陰陽雖妙不能卵無雄之雌關尹子四符今以涅染緇則黑於涅以藍染青則青於藍涅非緇也青非藍也兹雖遇其母而無能復化已是何則以諭其轉而益薄也何况夫未始有涅藍造化之者乎其為化也雖鏤金石書竹帛何足以舉其數淮南子俶真訓天心呿虛吟吟者也故一動其本而百枝皆應若春雨之灌萬物也渾然而流沛然而施無地而不澍無物而不生淮南子泰族訓高山深林非為虎豹也大木茂枝非為飛鳥也流源千里淵深百仞非為蛟龍也致其高崇成其廣大山居木棲巢枝冗藏水潛陸行各得其所寧焉淮南子泰族訓天地之化春氣生而百物皆出夏氣養而百物皆長秋氣殺而百物皆死冬氣收而百物皆藏春秋繁露循天之道水土相得萬物蕃殖焦氏易林解之隨陽氣和震圜煦釋物咸稅其枯而解其甲太𤣥經第二釋雷椎日感切􅀢徙感切輿物旁震太𤣥經𤣥圖龍幹於天長類無疆太𤣥經𤣥圖夫物不因不生不革不成故知因而不知革物失其則知革而不知因物失其均革之匪時物失其基因之匪理物喪其紀太𤣥經𤣥瑩人生於天地也猶魚之於淵蟣虱之於人也因氣而生種類相産萬物生天地之間皆一實也王充論衡物勢篇山頂之溪不通江湖然而有魚水精自為之也廢庭壞殿基上草生地氣自出之也王充論衡講瑞篇山特自生萬物以足百姓不為百姓故生之也淮南子詮言訓解必若人物皆天地所作則宜皆好而無惡悉成而無敗衆生無不遂之類而項揚無春雕之悲矣抱朴子內篇塞難陶者作器於鈞上此以造化為大鈞也前漢書注賈誼傳王云其地坦而平其水淡而清其人廉而貞孫云其山㠑巍以嵯峨其水㳌泄而揚波其人磊落而英多世說新語言語雷之餘聲鈴鈴所以挺出萬物也埤雅天部門雷霜以殺木露以潤草事類賦天部露注五行東方木而丹章有金銅之山南方火而交趾有大海之川西方金而蜀隴有名材之林北方水而幽都有積沙之地此天地所以均有無通萬物也困學紀聞卷四周禮或無根而生或無足而走或無耳而聽或無口而鳴道德經指歸卷八五星聚天市而聖人生五行配地氣而萬物形金庭無為妙經天有五氣萬物化成木精則仁火精則禮金精則義水精則智土精則恩五氣盡純聖德備也木濁則弱火濁則淫金濁則暴水濁則貪土濁則頑五氣盡濁民之下也中土多聖人和氣所交也絶域多怪物異氣所産也法苑珠林卷三十三感應夫蒲盧之氣嫗煦桑蟲成為己子况乎天氣因人之精就而神之反不使子賢聖乎毛詩正義生民孟康曰先冬至三日縣土炭於衡兩端輕重適均冬至日陽氣至則炭重夏至日陰氣至則土重史記天官書注蔡雍律厯記候鐘律權土炭冬至陽氣應黃鐘通土炭輕而衡仰夏至陰氣應𬎼賔通土炭重而衡低進退先後五日之中史記天官書注疾病有治而未瘳瘳而未平平而未復教化之道有教而未行行而未成成而有敗故氣類有動而未應應而未終終而有變遲速深淺變化錯於其中矣前漢紀高后陰陽燧在掌握之中形不出手乃上引太陽之火下引太陰之水噓吸之間煙景以集魏志管輅傳注夫天地閉大祲生雲雷屯羣凶作晉書乞伏國仁列傳今室閉戶牖動天地一室也呂氏春秋制樂夫熯一炬火㸑一鑊水終日不能熱也倚一尺氷置庖㕑中終夜不能寒也何則微小之感不能動大巨也今鄒衍之歎不過如一炬尺氷而皇天巨大不徒鑊水庖㕑之醜類也一仰天歎天為隕霜何天之易感霜之易降也王充論衡感虛篇人在天地之間猶魚在水中矣其能以行動天地猶魚鼓而振水也王充論衡變虛篇壯士挺劍氣激白虹鰠魚潛淵出則邑悚山海經西山經圖讃彗星橫天鯨魚死浪鴸鳴於邑賢士見放厥理至微言之無况山海經南山經圖讃嶢崩涇竭麟鬪日薄九鍾將鳴凌霜乃落氣之相應觸感而作山海經中山經圖讃北方有地美而寒不生五穀鄒子吹律暖之而禾黍滋也張湛注列子湯問天居高而鑒卑故其網雖疏而不漏神聰明而正直故其道賞真而罰僞是以惠和暢於九區則七耀得於𤣥昊殘害著於品物則二氣謬於四八抱朴子外篇廣譬匹夫履順則天地不違一物投誠則神明可交事有微而逾著理有暗而必昭是以魯陽傾首離光為之反舍有鳥沸波河伯為之不潮廣文選顏延年範連珠誅不原情其霜附木不下地不教而誅其霜反在草下初學記天部霜人生氣中如魚在水水濁則魚瘦氣昏則人病本草一卷陽燧以取火非日不生光方諸非星月安能得水漿二氣雖懸遠化感而相通參同契類召同聲相應高下不必均也同氣相求體質不必齊也召雲者龍命呂者律故二女相違而剛柔合體隆墀永歎遠壑必盈周易略例明爻鳴鶴在幽陰之處雖在幽陰而鳴其子則在遠而和之以其同類相感召故也周易正義繫辭上日掌陽月掌陰星掌和陽為德陰為刑和為事管子四時天網恢恢疏而不失老子任為天之道其猶響之報聲也德積則福生禍積則怨生文子符言若風之過蕭忽然而感之各以清濁應文子自然隱戮也者陰隲之反也如以匙勘鑰也如以璽印塗也必以其類其應如響子華子晏子五雲之變可以卜當年之豐歉八風之朝可以卜當時之吉凶是知休咎災祥一氣之運耳關尹子二柱篇日者陽之主也是故春夏則羣獸除日至而麋鹿解月者陰之宗也是以月虛而魚腦減月死而螺蠬膲火上蕁水下流故鳥飛而高魚動而下淮南子天文訓物類相動本標相應故陽燧見日則然而為火方諸見月則津而為水虎嘯而谷風至龍舉而景雲屬麒麟鬬而日月食鯨魚死而彗星出蠶珥絲而商弦絶賁星墜而渤海決淮南子天文訓山氣多男澤氣多女障氣多喑風氣多聾林氣多癃木氣多傴岸下氣多腫石氣多力險阻氣多癭暑氣多夭寒氣多壽谷氣多痺丘氣多狂衍氣多仁陵氣多貪輕土多利重土多遲湍水音小濁水音大湍水人輕遲水人重中土多聖人皆應其類淮南子地形訓夫陽燧取火於日方諸取露於月天地之間巧厯不能舉其數手微忽恍不能覽其光然以掌握之中引類於太極之上而水火可立致者陰陽同氣相動也淮南子覽冥訓山雲草莽水雲魚鱗旱雲煙火涔雲波水各像其形類所以感之淮南子覽冥訓月盛衰於上則螺蠬應於下同氣相動不可以為遠淮南子說山訓山雲蒸柱礎潤伏苓掘兔絲死淮南子說林訓夫濕之至也莫見其形而炭已重矣風之至也莫見其象而水已動矣日之行也不見其移騏驥倍日而馳草木為之靡縣㷭未轉而日在其前故天之且風草木未動而鳥已翔矣其且雨也陰曀未集而魚已噞矣以陰陽之氣相動也故寒暑燥濕以類相從聲響疾徐以音相應也淮南子泰族訓天人之應所由來漸矣故履霜堅氷非一時也仲尼之禱非一朝也申鑒時事日南至則黃鐘應融風動而魚上氷𬎼賔統則微陰萌蒹葭蒼而白露凝寒暑相推陰陽代興蔡中郎集釋誨夏末蜻􅖹鳴寒螿啼感陰氣也雷動而雉驚發蟄而蛇出起陽氣也夜及半而鶴唳晨將旦而雞鳴此雖非變天氣動物物應天氣之驗也王充論衡變動篇陰中之陽陽中之陰各以物類自相求從夏日為陽而夕夜遠與冬日共為陰冬日為陰而朝晝遠與夏日同為陽皆異於近而同於遠也張湛注列子仲尼箕麗於月而飄風起畢動於天而驟雨散劉子類感故銅山崩蜀鐘鳴於晉淄澠共川色味異質感動必類自然之數也劉子類感龍舉一井而雲彌九天虎嘯一谷而風扇萬里陽燧在堂而太陽火方諸運握而少陰水類感之也劉子類感黃帝問師曠曰吾欲知苦樂善惡可知否對曰歲欲豐甘草先生甘草薺也歲欲苦苦草先生苦草亭􅐗也歲欲惡惡草先生惡草水藻也歲欲旱旱草先生旱草蒺藜也歲欲疫病草先生病草艾也藝文類聚草部草青為蟲白為兵赤為旱黑為水黃為豐年此五雲吉凶之祲也埤雅天道門雲天中極星崑崙之墟天門明堂太山之精中挺三台也五靈諸侯也岍岐荆山壺口雷首太嶽砥柱東方之宿也析城王屋太行常山碣石西傾朱圉北方之宿也鳥鼠太華熊耳外方桐柏嶓冢陪尾西方之宿也荆山內方大别岷山衡山九江敷淺原南方之宿也九隘之險九河之曲漾水三危汶江九折上為列星玉海天文天文圖日陽也陽用事則日進而北晝進而長陰用事則日退而南晝退而短日之南北失節晷過而長為常寒退而短為常燠凡君行急則日行疾君行緩則日行遲玉海天文圭景聲之陰陽各有合辰與建交錯貿處如表裏然其相生則以陰陽六體為之同位者象夫妻異位者象子母所謂律取妻而呂生子也玉海律厯律呂立竿見影呼谷聞響豈不靈哉天地至象參同契夫聖人之起度數必應於天地故天有宿度地有經水人有經脉天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波涌而隴起黃帝素問內經離合真邪論如礠石力令鐵轉移雖無有心似有心者大乘密嚴經卷下夫銅山崩洛鐘應葭灰缺月暈虧未見虎嘯而風不生龍騰而雲不起辨正論卷六水泉之源必有神龍居之高僧傳九竺佛圖澄所主夫少者多之所宗一者衆之所歸陽卦二陰故奇為之君陰卦二陽故耦為之主韓康伯注易繫辭下日統領月之功猶若君統領臣之功以為己功禮記正義月令物君金物臣木金主利用物之君也木為金所剋服故為臣矣三墳山墳混沌為太始太始者元胎之萌也三墳山墳火為坤母巽為離父金乃坤孫乾坤鑿度坤鑿度下五音非宮不調五味非甘不和隋書音樂志下地者萬物之本原諸生之根苑也美惡賢不肖愚俊之所生也水者地之血氣如筋脉之通流者也故曰水具材也管子水地音有五聲宮其主也色有五章黃其主也味有五變甘其主也位有五材土其主也淮南子地形訓金木水火雖各職不因土方不立若酸醎辛苦之不因甘肥不能成味也甘者五味之本也土者五行之主也五行之主土氣也猶五味之有甘肥也不得不成春秋繁露五行之義陽茍一焉五陰何得不同而歸之陰茍隻焉五陽何得不同而從之故陰爻雖賤而為一卦之主者處其至少之地也周易略例明彖夫少者多之所貴也寡者衆之所宗也一卦五陽而一陰則一陰為之主矣五陰而一陽則一陽為之主矣周易略例明彖斗在天中周制四方猶宮聲處中為四聲綱也前漢書注律厯志中國川原以百數莫著於四瀆而河為宗也李善注文選江賦日猶火也月猶水也火則施光水則含影故朏生於向日魄生於背日當日則光盈近日則明滅藝文類聚天部月月與星至陰也有形無光日照之乃光如以鏡照日而有影見藝文類聚天部月日者寸也月者尺也尺者紀度而成數也寸者制萬物陰陽之短長也太平御覽天部三上天月無度借日度為度天月無光借日光為光經星亦然故日者實也君主之象也凡天象以日為主太平御覽天部四日五夫無聲者五音之祖無形者萬物之君本其祖然後精商徵之妙理其君然後正研朴之容太平御覽樂部雅樂下包四瀆以稱王總百川而為主初學記地部河注大中之道在天為北辰在地為人君玉海天文圭景周公曰大哉言數請問用矩之道商高曰平矩以正繩偃矩以望高覆矩以測深卧矩以知遠環矩以為圓合矩以為方玉海天文天文書上黃鍾不復與他律為役者黃鍾至尊無與並也玉海律厯律吕下道德不生萬物而萬物自生焉天地不含羣類而羣類自託焉自然之物不求為王而物自王焉故天地億萬而道王之衆陽赫赫而天王之隂氣漻漻而地王之倮者穴處而聖人王之羽者翔虛而神鳳王之毛者跖實而麒麟王之鱗者水居而神龍王之介者澤處而靈龜王之百川竝流而江海王之道德經指歸卷十一乾坤者易之門户衆卦之父母坎離匡廓運轂正軸牝牡四卦以為槖籥覆冒隂陽之道猶工御者凖繩墨執銜轡正規矩隨軌轍參同契箋注上篇尊莫尊於諸天也而大彌羅天乃天中之天貴莫貴於諸帝也而玉皇上帝乃帝中之帝玉皇本行集經譬如衆流皆歸於海如粟散小王皆屬轉輪聖王如衆小明皆屬於日大智度論卷三十七夫六合同曜靈之鑒羣流歸百谷之王𢎞明集十四喻林卷二
