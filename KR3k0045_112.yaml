body:
  text: 喻林卷一百十二明徐元太撰性理門三神清夫鑒明者則塵垢不汙也神清者嗜欲不誤也文子守清天下之理輕者易化重者難化譬如風雲須㬰變滅金玉之性厯久不渝人之輕明者能與造化俱化而不留殆有未嘗化者存關尹子七釡夫無莊之失其美據梁之失其力黄帝之亡其知皆在鑪捶之間耳莊子大宗師水之性不雜則清莫動則平鬱閉而不流亦不能清天德之象也莊子刻意鑑明者塵垢弗能薶神清者嗜欲弗能亂淮南子俶真訓今盆水在庭清之終日未能見眉睫濁之不過一撓而不能察方員人神易濁而難清猶盆水之類也况一世而撓滑之曷得須㬰平乎淮南子俶真訓形質者心智之室宇耳目者視聽之戸牖神茍徹焉則視聽不因户牖照察不閡牆壁耳張湛注列仲尼人不照於昧金而照於瑩鏡者以瑩能明也不鑑於流波而鑑於静水者以静能清也鏡水以明清之性故能形物之形由此觀之神照則垢滅形静則神清垢滅則内慾永盡神清則外累不入劉子清神上善若水清而無瑕参同契譬如日光炅發明照於其中間了无闇黑海空智藏經序品譬如瑠璃照徹内外表裏中間无有穢玷海空智藏經序品譬如玉山外光顯現内暉素明無量塵沙所不障礙海空智藏經哀歎品如白蓮花生於泥中亭亭出水不受汚染虚皇四十九章如清水下有沙石青黄白黒水中所有皆現但水清故佛般泥洹經卷上譬如虚空性常清浄不著垢闇或時風雲闇翳世人便言虚空不浄更有猛風吹除風雲便言虚空清浄而虚空實無垢無浄大智度論卷九十譬鑄劒太剛則折太柔則卷欲劒無折必加其錫欲劒無卷必加其金何者金性剛而錫質柔剛柔均平則為善矣含性和平則為嘉矣法苑珠林卷四十七華之體合則不妙開過則毁開合得適乃盡其妙也調順覺意亦復如是髙則放㪚下則沈没髙下得中乗平直往開合之相其猶浄華也羅什譯維摩詰經佛道品治性构木必將待櫽栝烝矯然後直鈍金必將待礱厲然後利今人之性惡必將待師法然後正得禮義然後治荀子性惡直木不待櫽栝而直者其性直也构木必將待櫽栝烝矯然後直者以其性不直也荀子性惡櫽栝之生為构木也繩墨之起為不直也立君上明禮義為性惡也荀子性惡陶人埏埴而為器然則器生於陶人之偽非故生於人之性也故工人斵木而成器然則器生於工人之偽非故生於人之性也聖人積思慮習偽故以生禮義而起法度然則禮義法度者是生聖人之偽非故生於人之性也荀子性惡夫陶人埏埴而生瓦然則瓦直豈陶人之性也哉工人斵木而生器然則器木豈工人之性也哉夫聖人之於禮義也辟亦陶埏而生之也荀子性惡繁弱鉅黍古之良工也然而不得排擏則不能自正桓公之葱太公之闕文王之録莊君之􅘈闔閭之干將莫邪鉅闕辟閭此皆古之良劒也然而不加砥礪則不能利不得人力則不能斷驊騮騹驥纎離綠耳此皆古之良馬也然而前必有銜轡之制後有鞭䇿之威加之以造父之馭然後一日而致千里也夫人雖有性質美而心辯知必將求賢師而事之擇賢友而友之荀子性惡衆人之用神也躁躁則多費多費之謂侈聖人之用神也静静則少費少費之謂嗇韓非子解老欲棄學而循性是謂猶釋船而欲􅡮水也淮南子修務訓夫馬之為草駒之時跳躍揚蹏翅尾而走人不能制齕咋足以噆肌碎骨蹶蹏足以破虜䧟匈及至圉人擾之良御教之掩以衡扼連以轡銜則雖厯險壍弗敢辭故其形之為馬馬不可化其可駕御教之所為也馬聾蟲也而可以通氣志猶待教而成又况人乎淮南子修務訓繭之性為絲然非得工女煮以熱湯而抽其統紀則不能成絲卵之化為雛非慈雌嘔煖覆伏累日積久則不能為雛人之性有仁義之資非聖王為之法度而教導之則不可使鄉方淮南子泰族訓中民之性如繭如卵卵待復二十日而後能為雛繭待繰以涫湯而後能為絲性待漸於教訓而後能為善善教誨之所然也非質樸之所至能也春秋繁露實性章卵之性未能作雛也繭之性未能作絲也麻之性未能為縷也粟之性未能為米也春秋繁露實性章米出於粟而粟不可謂米玉出於璞而璞不可謂玉善出於性而性不可謂善春秋繁露實性章天之所為止於繭麻與禾以麻為布以繭為絲以米為飯以性為善此皆聖人所繼天而進也春秋繁露實性章性如繭如卵卵待復而為雛繭待繰而為絲性待教而後善春秋繁露深察名號或曰性有善端心有善質尚安非善應之曰非也繭有絲而繭非絲也卵有雛而卵非雛也春秋繁露深察名號性有似目目卧幽而瞑待覺而後見當其未覺可謂有見質而不可謂見春秋繁露深察名號性比於禾善比於米米出禾中而禾未可全為米也善出性中而性未可全為善也春秋繁露深察名號繭之性為絲弗得女工燔以沸湯抽其統理不成為絲卵之性為雛不得良雞覆伏孚育積日累久則不成為雛夫人性善非得明王聖主扶攜内之以道則不成君子韓詩外傳善治民者治其性者也或曰治金而流去火則剛激水而升舍之則䧏惡乎治曰不去其火則常流激而不止則常升申鍳政體夫人之性不相遠也其質婉以慤而文之以詩書閑之以禮義則性成焉故性猶璞也不琢則不成天祿閣外史燕居一嵗嬰兒無推讓之心見食號欲食之覩好啼欲玩之長大之後禁情割欲勉勵為善矣王充論衡本性篇魏之行田百畝鄴獨二百西門豹灌以漳水成為膏腴則畝收一鐘夫人之質猶鄴田道教猶漳水也患不能化不患人性之難率也雒陽城中之道無水水工激上洛中之水日夜馳流水工之功也王充論衡率性篇古貴良醫者能知篤劇之病所從生起而以針藥治而已之如徒知病之名而坐觀之何以為竒夫人有不善則乃性命之疾也無其教治而欲令變更豈不難哉王充論衡率性篇世稱利劒有千金之價棠谿魚腸之屬龍泉太阿之輩其本鋋山中之恒鐵也冶工鍜鍊成為銛利豈利劔之鍜與錬乃異質哉工良師巧錬一數至也試取東下直一金之劒更熟鍜鍊足其火齊其銛猶千金之劒也夫鐵石天然尚為鍜鍊者變易故質况人含五常之性聖賢未之熟鍜錬耳奚患性之不善哉王充論衡率性篇西門豹急佩韋以自緩董安于緩帶弦以自促急之與緩俱失中和然而韋弦附身成為完具之人能納韋弦之教補接不足則豹安于之名可得参也王充論衡率性篇且螟蛉有子果臝負之性之變也橘渡江為枳易土而變形之異也納所食之氣還質易性豈不能哉嵇中㪚集答難養生論穿井所以導泉吟咏所以通性無泉則無所穿無性則無所詠世皆忘其泉性之自然徒識穿詠之末功因欲矜而有之不亦妄乎郭子註莊列禦冦夫歐冶鑄劔太剛則折太柔則卷欲劔無折必加其錫欲劒無卷必加其金何者金性剛而錫質柔剛柔均平則為善矣良工塗漆漆緩則難晞急則弗牢均則緩急使之調和則為美也人之含性有似於兹剛者傷於嚴猛柔者失於軟懦緩者悔於後機釁也急者敗於懁促懁急故鑄劒者使金不至折錫不及卷製器者使緩而能晞急而能牢理性者使剛而不猛柔而不懦緩而不後機急而不懁促故能劒器兼善而性氣淳和也劉子和性水溫則成湯寒則成氷氷湯異氣而水性猶同蠶能投練匪湯不錦人性推移盖比比也意林士緯道德仁義天性也織之以成其物錬之以致其精瑩之以發其光意林仲長統昌言人之性如水焉置之圓則圓置之方則方澄之則淳而清動之則流而濁太平御覽人事部叙人土有器性和之以為器人有道性修之以成道道德經註疏卷一如善牧牛設牛東西噉他苗稼則便遮止不令食苗海空智藏經持誡品使八寒流煦五熱浮涼波羅蜜多經序五百八十四譬如濁水澄渟清浄無復滓穢為顯水性本清浄故金光明最勝王經卷二譬如真金鎔銷冶鍊既燒打已無復塵垢為顯金性本清浄故金光明最勝王經卷二碎末於金礦礦中不見金智者巧融鍊真金方乃顯大乗密嚴經卷上如雲覆月月不明浄諸煩惱藏覆如來性性不明浄若離一切煩惱雲覆如來之性浄如滿月如人穿井若得乾土知水尚遠得濕土泥知水漸近若得水者則為究竟如是值遇諸佛聲聞緣覺修習善行掘煩惱土得如來性水如瓶中燈燄其明不現於衆生無用若壞去瓶其光普照如是諸煩惱瓶覆如來藏燈相好莊嚴則不明浄於衆生無用若離一切諸煩惱藏彼如來性煩惱永盡相好照明施作佛事如彼瓶燈衆生受用大法鼔經卷下譬如浄水必無垢穢以塵坌故令水渾濁性本元浄以客塵煩惱渾心令濁真性不現蘇婆呼童子經卷上如蓮未開諸惡見葉共包裹故如金墮厠在於覺觀糞穢中故如滿月被蝕我慢羅㬋所執取故如池水被濁貪欲塵土所混雜故如金山被翳瞋恚泥垢所封著故如虚空被覆愚癡重雲之所蔽故如日未出在無明習氣地中故大乗法界無差别論華十譬如鍜金師持金著火中時時囊吹時時持水澆時時放休何以故若常吹金便燋融常水澆冷不熱若常放不調熟阿毘曇甘露味論卷上譬如清浄池水狂象入中令其混濁若清水珠入水即清浄大智度論卷三十六如釡熟糜滓濁下沈清者在上大智度論卷二十三比丘戽船中虗則輕除婬怒癡是為泥洹法句經沙門品凝神神者至貴也故舘不辟除則貴人不舍焉故曰不潔則神不處管子心術如捕蛇師心不怖蛇彼雖夢蛇而不怖畏關尹子五鑑列禦冦為伯昏無人射引之盈貫措杯水其肘上發之鏑矢復沓方矢復寓當是時也猶象人也伯昏無人曰是射之射非不射之射也當與汝登髙山履危石臨百仞之淵若能射乎於是無人遂登髙山履危石臨百仞之淵背逡巡足二分垂在外揖禦寇而進之禦冦伏地汗流至踵伯昏無人曰夫至人者上闚青天下潛黄泉揮斥八極神氣不變今汝怵然有恂目之志爾於中也殆矣夫列子黄帝夫醉者之墜於車也雖疾不死骨節與人同而犯害與人異其神全也乘亦弗知也墜亦弗知也死生驚懼不入乎其胸是故􅘅物而不慴彼得全於酒而猶若是而况得全於天乎聖人藏於天故物莫之能傷也列子黄帝仲尼曰丘也嘗使於楚矣適見㹠子食於其死母者少焉眴若皆棄之而走不見已焉爾不得類焉耳所愛其母者非愛其形也愛使其形者也莊子德充符平者水停之盛也其可以為法也内保之而外不蕩也德者成和之修也德不形者物不能離也莊子德充符真人之息以踵衆人之息以喉莊子大宗師梓慶削木為鐻鐻成見者驚猶鬼神魯侯見而問焉曰子何術以為焉對曰臣工人何術之有雖然有一焉臣將為鐻未嘗敢以耗氣也必齊以静心齊三日而不敢懐慶賞爵祿齊五日不敢懐非譽巧拙齊七日輙然忘吾有四肢形體也當是時也無公朝其巧専而外滑消然後入山林觀天性形軀至矣然後成見鐻然後加手焉不然則已則以天合天器之所以凝神者其是與莊子逹生衆人之用神也躁躁則多費多費之謂侈聖人之用神也静静則少費少費之謂嗇韓非子解老夫舉天下萬物跂蹺貞蟲蝡動蚑作皆知其所喜憎利害者何也以其性之在焉而不離也忽去之則骨肉無倫矣今人之所以眭然能視䁝然能聽形體能抗而百節可屈神察能分白黒視醜美而知能别同異明是非者何也氣為之充而神為之使也何以知其然也凡人之志各有所在而神有所繋者其行也足蹪趎塪頭低植木而不自知也招之而不能見也呼之而不能聞也耳目去之也然而不能應者何也神失其守也故在於小則忘於大在於中則忘於外在於上則忘於下在於左則忘於右今夫狂者之不能避水火之難而越溝瀆之險者豈無形神氣志哉然而用之異也失其所守之位而離其外内之舍是故舉錯不能當動静不能中終身運枯形于連嶁列埓之門而蹪蹈于汚壑穽䧟之中雖生俱與人鈞然而不免為人戮笑者何也形神相失也淮南子原道訓此膏燭之類也火愈然而消愈亟是故聖人將養其神和其氣恬然則縱之廹則用之其縱之也若委衣其用之也若發機淮南子原道訓夫水向冬則凝而為氷氷迎春則泮而為水氷水移易於前後若周員而趨孰暇知其苦樂乎是故形傷於寒暑燥濕之虐者形苑而神壯神傷乎喜怒思慮之患者神盡而形有餘故罷馬之死也剝之若槁狡狗之死也割之猶濡淮南子俶真訓且人之情耳目應感動心志知憂樂手足之㩌疾􅽿辟寒暑所以與物接也蜂蠆螫指而神不能憺蚉蝱噆膚而知不能平夫憂患之來攖人心也非直蜂蠆之螫毒而蚉蝱之慘怛也而欲静漠虚無奈之何哉淮南子俶真訓夫人之所受於天者耳目之於聲色也口鼻之於芳臭也肌膚之於寒燠其情一也或通於神明或不免於癡狂者何也其所為制者異也是故神者智之淵也淵清則智明矣智者心之府也智公則心平矣淮南子俶真訓若吹呴呼吸吐故納新熊經鳥伸鳬浴蝯躩鴟視虎顧是養形之人也不以滑心淮南子精神訓心者形之主也而神者心之寶也形勞而不休則蹶精用而不已則竭是故聖人貴而尊之不敢越也夫有夏后氏之璜者匣匱而藏之寶之至也夫精神之可寶也非直夏后氏之璜也淮南子精神訓天地之道至紘以大尚猶節其章光愛其神明人之耳目曷能久熏勞而不息乎精神何能久馳騁而不既乎淮南子精神訓夫癩者趨不變狂者形不虧神將有所遠徙孰暇知其所為淮南子精神訓人大怒破陰大喜墜陽大憂内崩大怖生狂除穢去累莫若未始出其宗乃為大通清目而不以視静耳而不以聽鉗口而不以言委心而不以慮淮南子精神訓醉者俛入城門以為七尺之閨也超江淮以為尋常之溝也酒濁其神也怯者夜見立表以為鬼也見寢石以為虎也懼揜其氣也又况無天地之怪物乎淮南子汜論訓萬乗之主葬其骸於曠野之中祀其鬼神於明堂之上神貴於形也故神制則形從形勝則神窮聰明雖用必反諸神謂之太冲淮南子詮言訓水濁則魚噞形勞則神亂淮南子説山訓夫血脉之藏於身也猶江河之流地江河之流濁而不清血脉之動亦擾不安王充論衡道虛篇瞽者遇室則西施與嫫母同情瞶者忘味則糟粕與精粺等甘豈識賢愚好醜以愛憎亂心哉嵇中㪚集荅難養生論夫行之所踐容足而已足外無餘而人不敢踐者此心不夷體不閑故也張湛註列湯問夫機理萌於彼蓍龜感於此故吉凶可因卦兆而推情慝可假象數而尋今忘者之心泊爾釣於死灰廓焉同乎府宅聖人將無所容其鑒豈卦兆之所占張湛註列子周穆王夫有因無而生焉形須神而立焉有者無之宮也形者神之宅也故譬之於堤堤壞則水不留矣方之於燭燭糜則火不居矣身勞則神㪚氣竭則命終根竭枝繁則青青去木矣氣疾欲腃則精靈離身矣夫逝者無反期既朽無生理逹道之士良所悲矣輕璧重陰豈不有以哉抱朴子内篇至理夫有形者自然相與為累唯外乎形者磨之而不磷猶風日過河實已損而不自覺所以不覺非不損也恃源以往也郭子註莊徐無鬼七竅者精神之户牖也志氣者五藏之使候也劉子清神今清歌奏而心樂悲聲發而心哀神居體而遇感推移以此而言則情之變動自外至也劉子清神鑒之積也無厚而照有重淵之深目之察也有畔而眂周天壤之際何則應事以精不以形造物以神不以器文選陸機演連珠夫服藥求汗或有弗獲而愧情一集渙然流離終朝未餐則囂然思食而曽子銜哀七日不饑夜分而坐則低迷思寢内懐殷憂則逹旦不瞑勁刷理鬢醇醴發顔僅乃得之壯士之怒赫然殊觀植髪衝冠由此言之精神之於形骸猶國之有君也神躁於中而形喪於外猶君昏於上國亂於下也文選嵇康養生論神之在人猶光之在燭燭盡則光窮人死則神滅何氏語林文學魏書直心於物水火恬然無負於天雷霆不懼文苑英華庾信職官十三碑眼者身之鏡耳者體之牖視多則鏡昏聽衆則牖閉磨鏡决牖則能徹洞萬虗眇察絶響太平御覧道部養生符子登乎太山下臨千仞之淵上蔭百丈之松蕭蕭然神王乎一丘矣言不出乎耒耜心不過乎俗人其猶木犬守户瓦雞司晨矣太平御覧木部松以九寸明鏡照面視之曰今日識己形當令不忘如此其神不㪚疾患不入初學記器用部鏡註僧行道如牛負深泥中疲極不敢左右顧初學記道釋部僧我身乃神之車也神之舍也神之主人也主人安静神即居之躁動神即去之西昇經陰之至也地裂而氷凝清風飂冽霜雪嚴嚴魚鼈蟄伏萬物宛拳當此之時處溫室臨鑪火重狐狢襲毳綿猶不能禦也及至定神安精動體勞形則是理泄汗流捐衣出室暖有餘身矣陽之至也煎砂爛石飛鳥絶水蟲疾萬物枯槁江河消竭當此之時入沉清泉出衣絺綌燕髙臺服寒石猶不能任也及至解心釋意託神清静形捐四海之外游志無有之内心平氣和凉有餘矣道德經指歸卷八轂中有軸器中有食室中有人身中有神道德經註疏卷一無色之色為之見無聲之聲為之聞無味之味為之甘不言之言為之教聖母實傳仙道人猶魚也氣猶水也水濁則魚痩氣昏則人疾玉清經法印品夫神之在身由舍之有生舍之有生則成無生則敗且舍之新若無生門户不閉塵穢四入豕鼠耗其基鳥雀穿其穴亦漸至隳壞舍之朽若無生門户摧塌塵穢溢滿豕鼠敗其基鳥雀翻其盖則欲不朽無由也立至崩墜金庭無為妙經如風中燈不能照明在静室閉門明乃遍照大智度論卷一百今有明鏡於斯紛穢集之微則其照藹然積則其照朏然彌厚則照而昧矣質其本明故加穢猶照雖從藹至昧要隨鏡不滅以之辨物必隨穢彌失而過謬成焉人之神理有類於此𢎞明集明佛論静定人莫鑑於流水而鑑於止水唯止能止衆止莊子德充符水静則明燭鬚眉平中准大匠取法焉水静猶明而况精神聖人之心静乎天地之鑒也萬物之鏡也莊子天道空石之中有人焉其名曰觙其為人也善射以好思耳目之欲接則敗其思蚉䖟之聲聞則挫其精是以闢耳目之欲而遠蚉䖟之聲閑居静思則通思仁若是可謂微乎荀子解蔽人心譬如槃水正錯而弗動則湛濁在下而清明在上則足以見鬚眉而察理矣微風過之湛濁動乎下清明亂於上則不可以得大形之正也心亦如是矣導之以理養之以清物莫之傾則足以定是非决嫌疑矣小物引之則其正外易其心内傾則不足以决麤理也荀子解蔽人莫鑑於流沬音誨而鑑於止水者以其静也莫窺形於生鐵而窺於明鏡者以覩其易也夫唯易且静形物之性也由此觀之用也必假之於弗用也淮南子俶真訓水静則平平則清清則見物之形弗能匿也故可以為止淮南子説林訓夫水常無心委順外物雖流之與止鯢桓之與龍躍常淵然自若未始失其静默也至人用舍雖異𤣥黙一焉郭子註莊應帝王志若流水居者空城積守無為乃能長生太平御覽道部養生如浄明珠内外無翳定若通逹必當如此五燈㑹元西天祖師二十三祖雖有出入不失定相如金在井金體常寂五燈㑹元西天祖師十六師莫不亘諸禪地蒨􅀢乎根本儲之定瀲磊砢乎邊際波羅蜜多經卷一百九十一若得定者心則不散譬如惜水之家善治堤塘遺教經論離十二譬如水定而風吹之其水波揚修行道地經勸意品日照於晝月照於夜甲兵照軍禪照道人法句經梵志品譬如宻室内外塗治堅閉户扄無有風塵於内然燈無觸嬈者其燈熖上恬然不動長阿含經卷十三如釋迦文尼佛本為螺髻仙人名尚闍梨常行第四禪出入息斷在一樹下坐兀然不動鳥見如此謂之為木即於髻中生卵是菩薩從禪覺知頂上有鳥卵即自思惟若我起動鳥母必不復來鳥母不來鳥卵必壞即還入禪至鳥子飛去尒乃起大智度論卷十七其猶淵池息浪則徹見魚石心水既澄則凝照無隠髙僧傳十一論内求初子列子好游壺丘子曰游何所好列子曰㳺之樂所玩無故人之游也觀其所見我之游也觀其所變游乎游乎未有能辨其㳺者壺丘子曰禦冦之游固與人同歟而曰固與人異歟務外游不知務内觀外游者求備於物内觀者取足於身取足於身游之至也求備於物游之不至也於是列子終身不出自以為不知游壺丘子曰游其至乎至游者不知所適至觀者不知所眂物物皆游矣物物皆觀矣列子仲尼此皆無主於内借外物以樂之外物雖豐哀亦備矣有主於中以内樂外雖無鐘鼓樂已具矣故得志者非軒冕也有至樂者非充屈也得失無以累之耳且父母有疾在困而瘳則憂喜並用矣由此言之不若無喜可知也然則樂豈非至樂耶嵇中散集荅難養生論舉其性内則雖負萬為而不覺其重也外物寄之雖重不盈錙銖有不勝任者矣郭子註莊人間世不能止乎本性而外求無已猶以圓學方以魚羡鳥耳此愈近彼愈遠學彌得而性彌失郭子註莊齊物論不修多聞具大智慧雖無水浴清浄無垢離諸香熏得無上香離諸瓔珞得真莊嚴本緣經鹿品喻林卷百十二
