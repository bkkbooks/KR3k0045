body:
  text: 喻林卷一百明徐元太撰政治門五操約度日出日入以知東西南視定北凖極以正南北毛詩定之方註楨幹者皆以築牆為喻幹是牆之主善政亦民之主也毛詩正義桑扈室中度以几堂上度以筵宫中度以尋野度以歩涂度以軌周禮考工記夫解雜亂紛糾者不控捲救鬭者不摶撠批亢擣虛形格勢禁則自為解耳史記孫吳傳銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失前漢書枚乗傳射人將發矢必先於此儀之發則中於彼矣君將出政亦先於朝廷度之出則應於民心後漢書志五行五註萬目不張舉其綱衆毛不整振其領魏志崔林傳治國之體其猶治家主田野者皆宜良信又宜得一人總其條目作為維綱衆事乃理呉志樓𤣥傳舉網提綱振裘持領綱領既理毛目自張然則道德綱也物勢目也上理其綱則萬機時序下張其目則庶官不曠南齊書顧歡傳軌守其數准平其流動於未形而守事已成管子山權數儀者萬物之程式也法度者萬民之儀表也禮義者尊卑之儀表也管子形勢解取人以已成事以筫音質竹器所以量物成事以筫者用稱量也取人以己者度恕而行也管子版法觧尺寸尋丈者所以得短長之情也故以尺寸量長短則萬舉而萬不失矣是故尺寸之度雖富貴衆强不為益長雖貧賤卑辱不為損短公平而無所偏故姦詐之人不能誤也管子明法解不出户知天下不窺牖見天道其出彌逺其知彌少是以聖人不行而知老子鑒逺夫債少易償也職寡易守也任輕易勸也上操約少之分下效易為之功是以君臣久而不相厭也文子下德為而無害成而不敗一人唱而萬人和如體之從心此政之期也葢母錦杠悉動者其要在一也鶡冠子天則黃帝將見大隗乎具茨之山方明為御昌㝢驂乗張若謵朋前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問塗適遇牧馬童子問塗焉曰若知具茨之山乎曰然若知大隗之所存乎曰然黃帝曰異哉小童非徒知具茨之山又知大隗之所存請問為天下小童辭黃帝又問小童曰夫為天下者亦奚以異乎牧馬者哉亦去其害焉者而已矣莊子徐無鬼上之所以使下者一物也下之所以事上者一術也辟之異者有髙墻深宫墻立既謹上為鑿一門有盜人入闔其自入而求之盜其無自出是其故何也則上得要也墨子尚賢上今夫飛蓬遇飄而行千里乗風之勢也深淵者知千仞之深繩之數也故託其勢者雖遠必至守其數者雖深必得商子禁使主道治近不治遠治明不治幽治一不治二主能治近則逺者理主能治明則幽者化主能當一則百事正夫兼聽天下日有餘而治不足者如此也是治之極也既能治近又務治逺既能治明又務見幽既能當一又務正百是過者也猶不及也辟之是猶立直木而求其影之枉也不能治近又務治逺不能察明又務見幽不能當一又務正百是悖者也辟之是猶立柱木而求其影之直也故明主好要而闇主好詳荀子王霸君子審後王之道而論於百王之前若端拜而議推禮義之綂分是非之分總天下之要治海内之衆若使一人故操彌約而事彌大五寸之矩盡天下之方也故君子不下室堂而海内之情舉積此者則操術然也荀子不茍將原先王本仁義則禮正其經緯蹊徑也若絜裘領詘五指而頓之順者不可勝數也不道禮憲以詩書為之譬之猶以指測河也以戈舂黍也以錐飡壺也不可以得之矣荀子勸學有夫分義則容天下而治無分義則一妻一妾而亂荀子大畧篇書約而弟子辯法省而民訟簡是以聖人之書必著論明主之法必詳事盡思慮揣得失智者之所難也無思無慮絜前言而責後功愚者之所易也明主操愚者之所易以責智者之所難故智慮力勞不用而國治也韓非子八說事在四方要在中央聖人執要四方來效韓非子楊權救火者令吏挈壺甕而走火則一人之用也操鞭箠指麾而趣使人則制萬夫是以聖人不親細民明主不躳小事韓非子外儲說右兹鄭子引輦上髙梁而不能支兹鄭踞轅而歌前者止後者趨輦乃上使兹鄭無術以致人則身雖絶力至死輦猶不上也今身不至勞苦而輦以上者有術以致人之故也韓非子外儲說右造父方耨時有子父乘車過者馬驚而不行其子下車牽馬請造父助我推車造父因收器輟而寄載之援其子之乘乃始檢轡持筴未之用也而馬轡鶩矣使造父而不能御雖盡力勞身助之推車馬猶不肯行也今身使佚且寄載有德於人者有術而御之也故國者君之車也勢者君之馬也無術以御之身雖處勞猶不免亂有術以御之身處佚樂之地又制帝王之功也韓非子外儲說右夫以身為苦而後化民者堯舜之所難也處勢而令下者庸主之所易也將治天下釋庸主之所易道堯舜之所難未可與為政也韓非子難一譬之若御者反諸已則車輕馬利致逺復食而不倦呂氏春秋論人不通此者雖目數千羊之羣耳分八風之調足蹀陽阿之舞而手㑹綠水之趨智終天地明照日月辯解連環澤潤玉石猶無益於治天下也淮南子俶眞訓枝不得大於幹末不得强於本則輕重大小有以相制也若五指之屬於臂搏援攫㨗莫不如志言以小屬於大也是故得勢之利者所持甚小其存甚大所守甚約所制甚廣是故十圍之木持千鈞之屋五寸之鍵制開闔之門豈其材之巨小足哉所居要也淮南子主術訓處静持中運於璇樞以一合萬若合符者也淮南子主術訓夫寸生於􅀈􅀈生於日日生於形形生於景此度之本也樂生於音音生於律律生於風此聲之宗也法生於義義生於衆適衆適合於人心此治之要也故通於本者不亂於末覩於要者不惑於詳淮南子主術訓成國之道工無偽事農無遺力士無隠行官無失法譬若設網者引其綱而萬目開矣淮南子繆稱訓得道則愚者有餘失道則智者不足渡水而無游數雖强必沈有游數雖羸必遂又况託於舟航之上乎淮南子詮言訓治大者道不可以小地廣者制不可以狹位髙者事不可以煩民衆者敎不可以苛夫事碎難治也法煩難行也求多難贍也寸而度之至丈必差銖而稱之至石必過石秤丈量徑而寡失簡絲數米煩而不察故大較易為智曲辯難為慧故功不厭約事不厭省求不厭寡功約易成也事省易治也求寡易贍也衆易之於以任人易矣淮南子泰族訓或問大曰小問逺曰邇未達曰天下為大治之在道不亦小乎四海為逺治之在心不亦邇乎揚子孝至篇因革國家之矩范也矩范之動成敗之效也太𤣥經𤣥瑩自上御下猶夫釣者焉隱於手應於鉤則可以得魚自近御逺猶夫御馬焉和於手而調於銜則可以使馬故至道之要不於身非道也申鑒政體登樹怪其枝不能動其株如伐株萬莖枯矣王充論衡變動篇夫組織之近成文於逺猶良御轡於手而調馬口以致萬里也吕氏春秋先已解射者望毫毛之近而中藝於逺也御者執轡於手調馬口之和而致萬里吕氏春秋本味解投一寸之鍼布一丸之艾於血脉之蹊篤病有瘳王充論衡順故篇事有緣微而成著物有治近而致逺故修歩武之池而引沈鱗於江海豐朝陽之林而延靈禽於丹穴設象於槃盂而翠虬降於𤣥霄委灰於尺水而望舒變於太極是以晉文囬輪於勇蟲而壯士雲赴句踐曲躳於怒鼃而戎卒輕死抱朴子外篇廣譬舉一網衆目張弛一機萬事隳文中子開朗尸子曰文軒無四寸之鍵則車不行李善註文選枚叔七發夫道上環中理貴持㑹希發而節樂者擊一柷之功也一契而御衆者聖人之能也李善註文選陸士衡演連環人主之行異布衣布衣者飾小行競小亷以自託於鄉黨人主唯天下安社稷固不耳補文選賈誼請封建疏秉綱而目自張執本而末自從意林物理論舉網以綱千目皆張振裘持領萬毛自整治大國者亦當如此意林新論三寸之篋運而天下定六寸之基正而天下治意林申子聖人身猶日也夫日圜尺光盈天地聖人之身小其所燭逺矣太平御覽天部三上明君治國三寸之機運而天下定方寸之謀正而天下治一言正而天下定一言倚而天下靡太平御覽人事部言語寸管俯而陰陽效其誠尺表仰而日月與之期𤣥鳥懸而八風以情應玉衡立而天地不能欺初學記器用部漏刻註治藏者治其俞治府者治其合浮腫者治其經黃帝素問内經欬篇我身者彼身之尺寸也我家者彼家之權衡也我鄉者彼鄉之規矩也我國者彼國之凖繩也人主者天下之腹心也天下者人主之身形也道德經指歸卷九趨舍廢置王道之形聲也吉凶存亾趨舍之影響也道徳經指歸卷十二衆必宗寡弱以扶强故以一轂之寡總諸輻之衆道德經註疏卷一若使折士執而用之立石為主刻木為君亦可以享天下陰符經集註序諸葛亮責公者易雖一賢少謬執難者衆雖九舜猶亂初學記帝王部總叙帝王周公曰請問用矩之道商高曰平矩以正繩偃矩以望高覆矩以測深卧矩以知逺環矩以為圓合矩以為方玉海天文天文書上防萌初六履霜堅冰至易坤六四童牛之牿元吉易大畜六五豶豕之牙吉易大畜緜緜不絶蔓蔓若何豪末不掇將成斧柯汲冡周書和寤解木之伐也而木為斧賊難而起者自近者汲冢周書周祝解如彼雨去聲雪先集維霰音線詩小雅熲弁誰生厲階至今為梗詩大雅桑柔子其懲而毖後患莫子荓音俜蜂自求辛螫音釋肇允彼桃蟲拚音翻飛維鳥未堪家多難去聲子又集于蓼音了詩頌小毖不如早為之所毋使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎左傳隠公元年若不早圗後君噬臍左傳莊公六年人之有墻以蔽惡也墻之隙壞誰之咎也左傳昭公元年熖熖不滅炎炎若何涓涓不壅終為江河綿綿不絶或成網羅毫末不扎將尋斧柯孔子家語觀周福生有基禍生有胎納其基絶其胎禍何自來前漢書枚乘傳夫十圍之木始生如蘖足可搔而絶手可㩴而㧞據其未生先其未形也前漢書枚乘傳夫壞崖破巖之水源自涓涓干雲蔽日之材起於葱青禁微則易救末則難後漢書丁鴻列傳百尋之屋突直而焚燎千里之隄蟻蛭而穿敗古人防小以全大愼微以杜萌晉書陳頵傳堅冰之遘每鍾澆水宋書二凶元凶邵傳夫人主不塞隙穴而勞力於赭堊暴雨疾風必壞不去眉睫之禍而慕賁育之死不謹蕭墻之患而固金城於遠境不用近賢之謀而外結萬乘之交於千里飄風一旦起則賁育不及救而外交不及至禍莫大於此韓非子用人賢主謹小物以論好惡巨防容蟻而漂邑殺人突洩一燥而焚宫燒積將失一令而軍破身死主過一言而國殘名辱為後世笑吕氏春秋慎小善不可謂小而無益不善不可謂小而無傷夫牛之為胎也細若鼷䑕紂損天下自象箸始故小惡大惡一類也賈子新書連語一家失熛百家皆燒䜛夫陰謀百姓暴骸淮南子說林訓兩家鬭雞季氏金距郈公作難魯昭公出走故師之所處生以棘楚禍生而不蚤滅若火之得燥水之得濕浸而益大癰疽發於指其痛遍於體故蠧啄剖梁柱蟁䖟走牛羊此之謂也淮南子人間訓衣缺不補則日以甚坊漏不塞則日以滋大河之始决於瓠子也涓涓爾及其卒汜濫為中國害菑梁楚破曹衛城郭壞沮稸積漂流百姓木棲千里無廬鹽鐵論申韓夫百尋之室焚於分寸之飆千丈之波潰於一蟻之穴何可不深防乎何可不改張乎而秉斤兩者或舍銓衡而任情掌柯斧者或曲繩墨於附已抱朴子外篇百里水久壞河山起咫尺尋木千丈始於毫末鑽燧之火勺水所滅鵠卵未孚指掌之所靡及其乘衝飆而燎巨野奮六羽以凌朝霞則雖智勇不能制也故明君治難於其易去惡於其微抱朴子外篇用刑墻之崩隤必因其隟劒之毁折皆由於璺尺矧穿堤能漂一邑寸煙泄突致灰千室怨之始也微於隟璺及其為害大於墻劒禍之所傷甚於邑室將防其萌急於水火劉子愼隟事皆從微至著不可不慎之於初所以尋木起於牙蘖洪波出於涓泉李善註文選東京賦水所以載舟亦所以覆舟堅冰作於履霜尋木起於蘖栽文選東京賦若風將至必先揺揺雖有聖人不能為謀也廣文選周武王戶銘盛不可不圗衰不可或忘隄潰蟻穴器漏箴芒廣文選揚子雲幽州收箴裂風雖震不斷蔓草之根朽壞誠微遂霣崇山之峭是以一夫不懼威於赫怒千乘必致亾於巧笑廣文選沈休文連珠交修天地交而萬物通也上下交而其志同也易泰乃歌曰股肱喜哉元首起哉百工熈哉乃𢋫載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱隋哉萬物墮哉書益稷若作酒醴爾惟麴蘖若作和羮爾惟鹽梅書說命下王省惟歲卿士惟月師尹惟日書洪範地雖柔亦有剛克能出金石天為剛德亦有柔克不干四時臣當執剛以正君君亦當執柔以納臣孔氏傳書洪範地之德沈深而柔弱矣而有剛能出金石之物也天之德高明剛強矣而有柔能順陰陽之氣也以喻臣道雖柔當執剛以正君君道雖剛當執柔以納臣也尚書正義洪範雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉毛詩雞鳴君明於上若日也臣察於下若月也毛詩東方註華堂堂於上喻君也葉湑然於下喻臣也明王賢臣以德相承而治道興則讒諂逺矣鄭氏箋詩裳裳者華言日以照晝月以照夜故得同曜齊明而照臨下土以興國君視外治夫人視内政當亦同德齊意以治理國事毛詩正義日月阪上有漆木隰中有栗木各得其宜以興秦仲之朝上有賢君下有賢臣上下各得其宜毛詩正義車鄰彼堂堂然光明者華也在於上又葉湑然而茂盛兮在於下華葉相與共成榮茂以興顯著者君也在於上羙德者臣也佐於下君臣相承共興國治毛詩正義裳裳君不尸小事臣不專大名穀梁襄公十九年殷王中宗非徒身自賢明亦有和羮之臣臣與其君可否相濟如宰夫之和齊羮也春秋正義昭公二十年日月代明聖人以君臣代政三墳形墳昔吾先王體德聖明達於上帝譬如農夫作耦以刈殺四方之蓬蒿以立名於荆此則大夫之力也國語吳今與陛下共理天下者外則公卿尚書内則常侍黃門譬猶一門之内一家之事安則共其福慶危則通其禍敗後漢書李固列傳夫陰陽和歲乃豐君臣同心化乃成也後漢書第五倫傳朝廷之士佐主成化猶人之有股肱心膂共為一體也晉書庾峻傳臣譬列星景君配朝日暉事業並通濟功烈何巍巍宋書樂四志鼓鼖懐音待楊桴以振響天地涵靈資昬明以垂位是以俊乂之臣借湯武而隆英達之君假伊周而治南齊書劉祥傳履端開物寔資元后代終成務諒惟宰棟周書武帝上紀辟惟元首庶黎惟趾股肱惟弼上下一體各勤攸司周書蘇綽傳為上唯周為下唯定周則天也定則地也或天或地大禮乃成太公六韜大禮左操五音右執五味此言君臣之分也君出令佚故立于左臣任力勞故立于右夫五音不同聲而能調此言君之所出令無妄也而無所不順順而令行政成五味不同物而能和此言臣之所任力無妄也而無所不得得而力務財多管子宙合寡人之有五子猶心之有四支心有四支故心得佚焉今寡人有五子故寡人得佚焉豈不可哉晏子對曰嬰聞之與君言異若乃心之有四支而心得佚焉可得令四支無心十有八日不亦久乎晏子春秋諫上上下之道取類股肱比之一體其來尚矣故其相成也如陰與陽其相形也猶圎與方鬼谷子反應註人主之患在莫之應故曰一手獨拍雖疾無聲人臣之憂在不得一故曰右手畫圓左手畫方不能兩成故曰至治之國君若桴臣若鼔技若車事若馬故人有餘力易於應而技有餘巧易於事韓非子功名凡為人臣者猶炮宰和五味而進之君君弗食孰敢强也臣請譬之君者壤地也臣者草木也必壤地羙然後草木碩大亦君之力也臣何力之有韓非子難二人之百事如耳目鼻口之不可以相借官也荀子君道篇四馬不調造父不能以致逺弓矢不調羿不能以必中君臣乖心則孫子不能以應敵淮南子兵畧訓君臣之禮若心之與體心不可以不堅君不可以不賢體不可以不順臣不可以不忠心所以全者體之力也君所以安者臣之功也春秋繁露天地之行章子得罪於父可因姑姊妹謝也父乃赦之臣得罪於君可使左右謝也君乃赦之昔者桀得罪於臣也至今未有為謝也韓非子外傳上下相虧也猶水火之相滅也說苑君道乘龍上天兩蛇為輔湧躍雲中遊觀滄海焦氏易林乾之隨初一日幽嬪之月冥隨之基測曰日嬪月隨臣應基也太𤣥經第二從次六𤣥黄相迎其意感感測曰𤣥黄相迎以類應也太𤣥經第四迎君南面向陽著其聲響臣北面向陰見其形影聲響者敎令也形影者功效也武侯十六策君臣矢而自升羽之力也羽金朋合而後乃飛猶君臣同心乃馳風化也太𤣥經第二務觧天地相迎則風雨時調君臣相迎則政敎以度太𤣥經第四迎解君匪從流臣進逆耳文選序揖讓之與干戈文德之與武功莫不宗匠陶鈞而羣才緝熈元首經畧而股肱肆力文選袁宏名臣序贊君為元首臣為股肱明其一體相待而成文選王子淵四子講德論臣敬治其職膺金石之别響君執契居中納鏗鏘之合韻文選陸士衡演連珠註台㝛在天實承辰極股肱雖卑同體元首藝文類聚帝王部晋元帝表君垂冬日之温臣盡秋霜之戒藝文類聚職官部冡宰碑賢愚相奉臣主以成如彼百節各役天形藝文類聚人部隱逸上箴元首不可不思股肱不可不慈堯崇屢省舜盛欽謨初學記州郡部淮南道若無國王智臣耆舊如船無主旋洄覆没大方廣佛華嚴經卷十二等則天子諸侯下至黼黻大夫粉米兼服藻火是上得兼下也士不得服粉米大夫不得服黼黻是下不得僭上也尚書正義益稷尊者食新農夫食陳毛詩甫田國君尊嚴如南山崔崔然毛詩南山註由絲以為綠則綠為末絲為本猶承嫡而使妾則妾為卑而嫡為尊公定尊卑不可亂猶女治絲本末不可易今公何為使妾上僭而令尊卑亂乎毛詩正義綠衣以里垣之内始有樹木故以里喻親戚樹喻兄弟毛詩正義將仲子夫設纓以為冠不得謂冠是纓之飾結組以懸佩不可謂佩所以飾組毛詩正義著天有十日人有十等下所以事上上所以共神也左傳昭公七年日中當王食時當公平旦為卿雞鳴為士夜半為皂人定為輿黄昏為𨽻日入為僚晡時為僕日昳為臺喆氏解左傳昭公五年位以王公卿為三日以中食旦為三春秋正義昭公五年大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主周禮地官司市弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之周禮考工記禮天子之桷斲之礱之加宻石焉諸侯之桷斲之礱之大夫斲之士斲本穀梁莊公二十四年崇山君伏山臣列山民三墳山墳君象首臣象股民象體三墳山墳象君日象臣月象民星三墳山墳崇髙其山君之象也濳伏其山臣之象也山有行列民之象也三墳山墳首綂方來君之象也臣象股肱以佐身也民為邦本如肌體也三墳山墳陛下用羣臣如積薪耳後來者居上史記汲鄭傳天下之埶方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今匈奴嫚娒侵掠至不敬也為天下患至亾已也而漢歲致金絮綵繒以奉之夷狄徵令是主上之操也天子共貢是臣下之禮也足反居上首顧居下倒縣如此莫之能解猶為國有人乎非亶倒縣而已又類辟且病痱夫辟者一面病痱者一方痛前漢書賈誼傳日者陽精守實不虧君之象也月者陰精盈毁有常臣之表也後漢書丁鴻傳若太陽下同萬物蒼生何由仰照晉書王導傳帝皇正坐於紫宫輔臣列位於文昌垣屏駱驛而珠連三台差池而鴈翔晉書成公綏傳彼鄒滕雉犇而出其地猶稱公侯晏子問上先王之法立天子不使諸侯疑焉立諸侯不使大夫疑焉立適子不使庶孽疑焉疑生爭爭生亂是故諸侯失位則天下亂大夫無等則朝廷亂妻妾不分則家室亂適孽無别則宗族亂呂氏春秋愼勢衣服疑者是謂爭先厚澤者是謂爭賞權力疑者是謂爭彊賈子新書服疑人主之尊辟無異堂陛陛九級者堂髙大幾六尺矣若堂無陛級者堂髙殆不過尺矣天子如堂羣臣如陛衆庶如地此其辟也故陛九級上㢘逺地則堂高陛無級㢘近地則堂卑髙者難攀卑者易陵理勢然也賈子新書階級所謂臣主者非有相臨之具尊卑之經也持面形而膚之耳賈子等齊此之不行沭瀆無界賈子等齊水廣者魚大父尊者子貴傳曰河海潤千里盛德及四海况之妻子乎故夫貴於朝妻貴於室富曰茍羙古之道也孟子曰王子與人同而如彼者居使然也居編戸之列而望卿相之子孫是以跛夫之欲及樓季也無錢而欲千金之寳不亦虛望哉鹽鐵論刺權冠雖敗宜加之首履雖全宜踐之足太𤣥經第四禮解王者賜先親近後䟱逺何法法天雨髙者先得之也白虎通五行天子佩白玉諸侯佩山𤣥玉大夫佩水蒼玉士佩端珉石佩即象其事若農夫佩其耒耜工匠佩其斧斤婦人佩其鍼鏤白虎通衣裳假令厮養暴登卿尹則監門之類蔑而遺之嵇中散集答難養生論趙簡子謂左右曰車席泰羙夫冠雖惡必戴之履雖善必履之今車如此其大羙也吾將何以履之藝文類聚服飾部薦蓆孔子侍坐於魯哀公設桃具黍哀公曰請用仲尼先飯黍而後噉桃左右皆掩口失笑公曰黍者非飯之也以雪桃也仲尼對曰丘知之矣夫黍者五穀之長也祭先王以為上盛果有六而桃為下祭先王不得入於廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五穀之長雪果蓏之下是侵上忽下也事文類聚穀韓子名分不定而欲天下之治也是猶欲無饑而去食欲無寒而去衣也欲至東而西行其不㡬亦明矣太平御覽刑法部律令科附今下僭其上尊卑無别如使雞鶩蛇頸龜身五色紛丽亦可貴於鳳乎太平御覽羽族部鶩高莫高於天下莫下於澤天高澤下聖人法之太平御覽地部澤珽無所屈天子見諸侯見卿大夫之笏也大圭椎其上猶諸侯荼前屈後直見天地見先王之笏也玉海器用圭璧上品君中復各有貴賤譬如列國諸侯雖並得稱制而猶歸宗周臣佐之中亦當如此本草一卷喩林卷一百
