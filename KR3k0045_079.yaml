body:
  text: 喻林卷七十九明徐元太撰德行門一孝弟凱風自南吹彼棘心棘心夭夭母氏劬勞詩國風凱風睍與演同睆與莞同黃鳥載好其音有子七人莫慰母心詩國風凱風爰有寒泉在浚之下有子七人母氏勞苦詩國風凱風常棣之華鄂五各反不韡韡音偉凡今之人莫如兄弟詩小雅常棣脊音積令音零在原兄弟急難叶泥沿反詩小雅常棣蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁詩小雅蓼莪南山烈烈飄風發發民莫不穀我獨何害叶音曷南山律律飄風弗弗民莫不穀我獨不卒詩小雅蓼莪杕杜君子教人孝友之詩詩説魏陟岵孝子行役思念父母也毛詩陟岵鴇羽刺時也昭公之後大亂五世君子下從征役不得養其父母而作是詩也毛詩鴇羽常棣燕兄弟也毛詩常棣南陔孝子相戒以養也白華孝子之潔白也毛詩南陔蓼莪刺幽王也民人勞苦孝子不得終養爾毛詩蓼莪鄂足得華之光明則韡韡然盛弟以敬事兄兄以榮覆弟恩義之顯亦韡韡然鄭氏箋詩常棣有寒泉在浚邑之下以喻七子在母之前寒泉有益於浚浸潤浚民使得逸樂以興七子無益於母不能事母使母勞苦乃寒泉之不如毛詩正義凱風言黃鳥有睍睆之容貌則又和好其音聲以興孝子當和其顔色順其辭令也毛詩正義凱風由華以覆鄂鄂以承華華鄂相承覆故得韡韡然而光明也華鄂相覆而光明猶兄弟相順而榮顯毛詩正義常棣脊令者水鳥當居於水今乃在於高原之上失其常處以喻人當居平安之世今在於急難之中亦失其常處也然脊令既失其常處飛則鳴行則搖不能自舍此則天之性以喻兄弟既在急難而相救亦不能自舍亦天之性毛詩正義常棣孝經鉤命決云孝道者萬世之桎轄君子將營宫室宗廟為先廏庫為次居室為後凡家造祭器為先犧賦為次養器為後禮記曲禮下其往也如慕其反也如疑禮記檀弓上孝子如執玉如奉盈洞洞屬屬然如弗勝如將失之嚴威儼恪非所以事親也禮記祭義創巨者其日久痛甚者其愈遲禮記三年問未有君而忠臣可知者孝子之謂也未有長而順下可知者弟弟之謂也未有治而能仕可知者先修之謂也大戴禮記曽子立孝其譏子道之不盡奈何曰樂正子春之視疾也復加一飯則脫然俞復損一飯則脫然俞復加一衣則脫然俞復損一衣則脫然俞止進藥而藥殺是以君子加弒焉耳公羊昭公十九年祭於室求之於幽祭於堂求之於明祭於祊求之於逺皆孝子博求之意也何休解公羊桓公八年天子親耕以共粢盛王后親蠶以共祭服國非無良農工女也以為人之所盡事其祖禰不若以已所自親者也穀梁桓公十四年今之孝者是謂能養至於犬馬皆能有養不敬何以别乎論語為政為不順於父母如窮人無所歸孟子萬章上人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母孟子萬章上親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也孟子告子下齊宣王欲短喪公孫丑曰為期之喪猶愈於已乎孟子曰是猶或紾其兄之臂子謂之姑徐徐云爾亦教之孝弟而已矣孟子盡心上昔者明王之以孝治天下也不敢遺小國之臣而況於公侯伯子男乎故得萬國之歡心以事其先王治國者不敢侮於鰥寡而況於士民乎故得百姓之歡心以事其先君治家者不敢失於臣妾而況於妻子乎故得人之歡心以事其親孝經父子之道天性也君臣之義也父母生之續莫大焉君親臨之厚莫重焉孝經存器而亡本樂之遁也調器以和聲樂之成也崇養以傷行孝之纍也修已以致祿養之大也後漢書劉平傳夫鐘鼓非樂云之本而器不可去三牲非致孝之主而養不可廢後漢書劉趙列傳仁以枝葉扶疏為大孝以心體本根為先後漢書延篤傳近取諸身則耳有聽受之用目有察見之明足有致逺之勞手有飾衛之力功雖顯外本之者心也逺取諸物則草木之生始於萌芽終於彌蔓枝葉扶疏榮華紛縟末雖繁蔚致之者根也夫仁人之有孝猶四體之有心腹枝葉之有根本也後漢書延篤列傳太子建議曰君父各有篤疾有藥一丸可救一人當救君邪父邪衆人紛紜或父或君時原在坐不與此論太子咨之於原原勃然對曰父也魏志邴原傳注集苞思藝黍之勤循陔有採蘭之詠事親之道也晉書孝友傳夫天倫之重共氣分形心睽則葉悴荆枝性合則華承棣萼晉書孝友傳五子不滿隅一子何滿朝晏子春秋諫下今人飢見長而不敢先食者將有所讓也勞而不敢求息者將有所代也荀子性惡篇所謂貴德為其近於聖也所謂貴貴為其近於君也所謂貴老為其近於親也所謂敬長為其近於兄也所謂慈幼為其近於弟也曽子曰父母生之子弗敢殺父母置之子弗敢廢父母全之子弗敢闕故舟而不遊道而不徑能全支體以守宗廟可謂孝矣吕氏春秋孝行養有五道修宫室安牀第節飲食養體之道也樹五色施五采列文章養目之道也正六律和五聲雜八音養耳之道也熟五穀烹六畜和煎調養口之道也和顏色説言語敬進退養志之道也此五者代進而厚用之可謂善養矣吕氏春秋孝行曽子孝於父母昏定晨省調寒溫適輕重勉之於麋粥之間行之於袵席之上而德美重於後世陸子愼微土者火之子也五行莫貴於土土之於四時無所命者不與火分功名木名春火名夏金名秋水名冬忠臣之義孝子之行取之土土者五行最貴者也其義不可以加矣五聲莫貴於宫五味莫貴於甘五色莫貴於黃此謂孝者地之義也春秋繁露五行對夫洗爵以盛水升階而進糲禮雖僃然非其貴者也鹽鐵論孝養枯魚銜索幾何不蠧二親之夀忽如過隙草木欲長霜露不使賢者欲養二親不待説苑建本負重道逺者不擇地而休家貧親老者不擇祿而仕説苑建本樹欲靜乎風不定子欲養乎親不待往而不來者年也不可得再見者親也説苑敬愼康叔封與伯禽見商子曰某某也曰吾二子者朝乎成王見周公三見而三笞其説何也商子曰二子盍相與觀乎南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦焉實而仰反以告乎商子商子曰橋者父道也商子曰二子盍相與觀乎南山之陰有木焉名曰梓二子者往觀乎南山之陰見梓勃焉實而俯反以告商子商子曰梓者子道也説苑建本或曰猗頓之富以為孝不亦至乎顏其餒矣曰彼以其粗顔以其精彼以其回顔以其貞揚子學行篇次四食于劇父母采餕若測曰食劇以若為順祿也太玄經第六劇兄弟相顧當如形之與影聲之與響顔氏家訓兄弟兄弟之際異於他人望深則易怨他親則易弭譬猶居室一冗則塞之一隙則塗之則無頽毁之慮如雀鼠之不恤風雨之不防壁陷楹淪無可救矣僕妾之為雀鼠妻子之為風雨甚哉顏氏家訓兄弟忠孝者百行之寶歟忠孝不修雖有他善其猶玉屑盈庫不可琢為圭璋銼絲滿篋不可織為綺綬雖多亦奚以為也劉子言苑毛詩曰相彼反哺尚在翔禽李善注文選補亡詩南陔有獺有獺在河之涘凌波赴汨噬魴捕鯉嗷嗷林烏受哺於子養隆敬薄惟禽之似文選補亡詩循彼南陔厥草油油彼居之子色思其柔文選補亡詩循彼南陔言採其蘭眷戀庭闈心不遑安文選補亡詩人性茍有一孝則無所不包猶樹根一植百枝生焉意林唐子曽子曰往而不可還者親也故子欲養而親不待是故椎牛而葬不如雞豚之逮親存也初吾為吏祿不及釜尚欣欣而喜者非以為多也樂其逮親也既沒之後吾嘗南遊於楚得尊官焉堂高九尺車嘗百乘然猶北嚮而泣涕者非為賤也悲不逮吾親也故家貧親老不擇官而仕藝文類聚人部孝曽子每讀喪禮泣下霑襟常以一夕五起視衣之厚薄枕之高卑藝文類聚人部孝涓塵之孝河海之慈藝文類聚人部孝贊九日養親一日餓之寧可言飽多飢少同為孝子穀馬一日餓之馬肥不損於義無傷非可同之太平御覽獸部馬五古有兄弟意欲分異出見三荆同根接葉連陰歎曰木猶欣聚況我而殊異哉還為雍和初學記人部友悌夫孝行之本替本而求末者未見得之者也如或得之君子不貴矣烏者而有返哺況人而無孝心者乎初學記鳥部烏雪山之中有一鸚鵡父母都盲常取好花果先奉父母爾時有一田主初種穀時而作願言所種之穀要與衆生而共噉食時鸚鵡子以彼田主先有施心即常於田採取稻穀以供父母是時田主案行苗稼見諸蟲鳥揃穀穗處瞋恚懊惱便設羅網捕得鸚鵡鸚鵡子言田主先有好心施物無吝由是之故故我敢來採取稻穀如何今者而見網捕且田者如母種子如父實語如子田主如王擁護由已作是語已田主歡喜問鸚鵡言汝取此穀竟復為誰鸚鵡答言有盲父母願以奉之雜寶藏經卷一廉潔六二不耕穫不災畬易無妄子云君子不盡利以遺民詩云彼有遺秉此有不斂穧伊寡婦之利故君子仕則不稼田則不漁禮記坊記立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭孟子公孫丑上畜馬乘不察於雞豚伐冰之家不畜牛羊百乘之家不畜聚斂之臣大學此朱公之金有如病不宿誡後復歸勿動史記越世家濯淖汚泥之中蟬蛻於濁穢以浮遊塵埃之外不獲世之滋垢皭然泥而不滓者也史記屈原傳瑾瑜比潔日月爭光史記屈原傳贊使馬如羊不以入廏使金如粟不以入懷後漢書張奐列傳遇九臯之介鳥兮怨素意之不逞遊塵外而瞥天兮據明翳而哀鳴雕鶚競於貪婪兮我修潔以益榮後漢書張衡列傳歷宰金山家無寶鏤之飾連組珠海室靡璫珥之珍宋書良吏陸徽傳蟬腹龜腸為日已久飢虎能嚇人遽與肉餓麟不噬誰為落毛南齊書王僧虔傳景公問晏子廉政而長久其行何也晏子對曰其行水也美哉水乎清清其濁不無雩途其清無不灑除是以長久也公曰廉政而遫亡其行何也對曰其行石也堅哉石乎落落視之則堅循之則堅內外皆堅無以為久是以遫亡也晏子春秋問下惠子相梁莊子往見之或謂惠子曰莊子來欲代子相於是惠子恐搜於國中三日三夜莊子往見之曰南方有鳥其名鵷雛子知之乎夫鵷雛發於南海而飛於北海非梧桐不止非練實不食非醴泉不飲於是鴟得腐鼠鵷雛過之仰而視之曰嚇今子欲以子之梁國而嚇我邪莊子秋水楚昭王失國屠羊説走而從於昭王昭王反國將賞從者及屠羊説屠羊説曰大王失國説失屠羊大王反國説亦反屠羊臣之爵祿已復矣又何賞之言王曰強之屠羊説曰大王失國非臣之罪故不敢伏其誅大王反國非臣之功故不敢當其賞王曰見之屠羊説曰楚國之法必有重賞大功而後得見今臣之知不足以存國而勇不足以死寇吳軍入郢説畏難而避寇非故隨大王也今大王欲廢法毁約而見説此非臣之所以聞天下也王謂司馬子綦曰屠羊説居處卑賤而陳義甚高子綦為我延之以三旌之位屠羊説曰夫三旌之位吾知其貴於屠羊之肆也萬鍾之祿吾知其富於屠羊之利也然豈可以貪爵祿而使吾君有妄施之名乎説不敢當願復反吾屠羊之肆遂不受也莊子讓王新浴者振其衣新沐者彈其冠人之情也其誰能以已之僬僬受人之掝掝者哉荀子不茍石可破也而不可奪堅丹可磨也而不可奪赤堅與赤性之有也性也者所受於天也非擇取而為之也豪士之自好者其不可漫以汙也亦猶此也吕氏春秋誠廉孔子辭廩丘終不盜刀鉤許由讓天子終不利封侯淮南子汜論訓公儀休相魯魯君死左右請閉門公儀休曰止池淵吾不稅蒙山吾不賦苛令吾不布吾已閉心矣何閉於門哉説苑政理伋聞之妄與不如遺棄物於溝壑伋雖貧也不忍以身為溝壑是以不敢當也説苑立節初沐者必拭冠新浴者必振衣説苑談叢義士不欺心廉士不妄取以財為草以身為寶説苑談叢次七脂牛正肪坊不濯釜而烹則歐烏后切歍塢之疾至測曰脂牛歐歍不潔志也太玄經第四竈次四宛雛沈視食苦貞測曰宛雛沈視擇食方也太玄經第五沈言已飲食清潔誠欲使我形貌信而美好中心簡練而合於道要雖長顑頷飢而不飽亦無所傷病也何者衆人茍欲飽於財利已獨欲飽於仁義也王逸注楚辭離騷經寧作清水之沉泥不為濁路之飛塵曹子建九愁賦焦螟之卑棲不肯為銜鼠之唳天玄蟬之潔飢不願為蜣蜋之穢飽是以禦冦不納鄭陽之惠曽參不美晉楚之寶抱朴子外篇廣譬金鉤桂餌雖珍不能制九淵之沉鱗顯寵豐祿雖貴而不能致無欲之幽人抱朴子外篇廣譬淳風足以濯百代之穢高操足以激將來之濁何必紆朱曳紫服冕乘軺被犧牛之文繡吞詹何之香餌朝為張天之炎熱夕成冰冷之委灰抱朴子外篇逸民鷦明非竹實之潔不食君子非道德之祿不居揚子法言注問明篇孝子養父母常自潔如白華之無點汙也李善注文選補亡詩白華朝飲木蘭之墜露兮夕餐秋菊之落英楚辭離騷經白華玄足在丘之曲堂堂處子無營無欲鮮侔晨葩莫之點辱文選補亡詩如彼白圭質無塵玷文選袁宏名臣序贊金如粟而弗覩馬如羊而靡入雛雉必懷豚魚不爽由是傾巢舉落望德如歸文選沈休文齊昭王碑其意常墨墨若冠章甫而坐塗炭也古文苑失名氏楚相孫叔敖碑黃金纍千不如一賢人而無廉猶衣服之無殺食味之無酸醎意林傅子唯夫金貞玉粹者乃能處而不汙其身耳藝文類聚人部鑒誡誥君子懷琬琰不使涅塵淄藝文類聚樂部論樂詩巢父聞由為堯所讓以為汙乃臨池水而洗其耳池主怒曰何以汙我水藝文類聚人部隱逸上大夫有汙瀦之宫雖有美菜有義之士不食藝文類聚草部菜蔬有餽魚於鄭相者鄭相不受或謂曰子嗜魚何故不受對曰吾以嗜魚故不受魚受魚失祿無以食魚不受得祿終身食魚事文類聚清廉利誘人猶飄風之加庶草也惟有直慎者然後不回太平御覽天部九風抱朴子曰玄蟬潔飢不羡蜣蜋穢飽故回之簞瓢有以輕猗頓之富也埤雅品物門蛣蜣管寧嘗與華子魚少相親友共園中鉏菜見地有片金揮鉏如故與瓦石無異華捉而擲去初學記人部賢孔君魚為姑臧長清儉逼下有譏之者答曰奮身處脂膏不能自潤何氏語林政事是人中蓮華世間八法所不染故瑜伽師地論卷八十二莊敬溫溫恭人如集于木惴惴音贅小心如臨于谷戰戰兢兢如履薄冰詩小雅小宛濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也左傳襄公二十八年取蘋藻之菜於阿澤之中使服蘭之女而為之主神猶享之以其敬也杜氏解左傳襄公二十八年樹木以本根為幹有幹故枝葉茂焉牆屋以下土為基有基乃牆屋成焉人身以禮敬為本必有禮敬身乃得存春秋正義成公十三年出門如見大賓使民如承大祭論語顏淵敬人者非敬人也自敬也貴人者非貴人也自貴也昔者吾嘗見天雨金石與血吾嘗見四月十日並出有與天滑吾嘗見高山之崩深谷之窒大都王宫之破大國之滅吾嘗見高山之為裂深淵之沙竭貴人之車裂吾嘗見稠林之無木平原為溪谷君子為御僕吾嘗見江河乾為坑正冬采榆葉仲夏雨雪霜千乘之君萬乘之主死而不葬是故君子敬以成其名小人敬以除其刑説苑敬慎次二目穆穆足肅肅乃貫以棘測曰穆穆肅肅敬出心也太玄經第四禮驅之於直道之上斂之乎檢括之中凛乎若跟挂於萬刃栗然有如乘奔以履冰故能多逺悔吝保其貞吉也抱朴子外篇崇教堅冰之成起於微霜隕隊之咎由於怠嫚前漢書注韋賢傳禮如體無體何得為人無禮何能立德揚子法言注問道篇晉灼曰致冰無不先由微霜致墜無不先由驕慢李善注文選韋孟諷諫詩綰髮綰髮髮亦鬢止日祗日祗敬亦愼止藝文類聚人部鑒誡詩謙退天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也易謙離利貞亨畜牝牛吉易離飛鳥遺之音不宜上宜下易小過荏音任染柔木言緡之絲叶新夷反溫溫恭人維德之基詩大雅抑且夫既登而求降階者知人也左傳襄公二十四年日之謙當鳥故曰明夷于飛明之未融故曰垂其翼左傳昭公五年離之一卦為日為鳥日為髙明鳥為微細今日之謙退不得高明下當微細是日光不足故當鳥也春秋正義昭公五年正考父佐戴武宣三命兹益共故其鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是鬻於是以糊余口其共也如是左傳昭公七年君子無所爭必也射乎揖讓而升下而飲其爭也君子論語八佾君子知天下之不可上也故下之知衆人之不可先也故後之溫恭愼德使人慕之江海雖左長於百川以其卑也孔子家語觀周良賈深藏若虛君子盛德容貌若愚史記老莊傳夫有所貴故有降焉夫有所美故有謙焉譬影響之與形聲相與而立道足者忘貴賤而一賢愚體公者乘理當而均彼我降挹之義於何而生則謙之為美固不可以語至足之道涉乎大方之家矣晉書韓佁傳正考父一命而傴再命而僂三命而俯循牆而走孰敢不軌如而夫者一命而吕巨再命而於車上儛三命而名諸父莊子列禦冦行而供翼非漬淖也行而俯項非擊戾也偶視而先俯非恐懼也荀子修身篇兔罝之容不失其恭焦氏易林坤之困次五地自沖下于川測曰地自沖人之所聖也太玄經第一少上九密雨溟沐潤于枯瀆三日射谷測曰密雨射谷謙之靜也太玄經第一少次二去彼枯園舍下靈淵測曰舍下靈淵謙道光也太玄經第五去自虛毁者水息淵木消枝山殺瘦澤增肥太玄經玄文人之為德其猶虛器歟器虛則物注滿則止焉故君子常虛其心志恭其容貌不以逸羣之才加乎衆人之上視彼猶賢自視猶不足也故人願告之而不􅌒徐幹中論虛道用壯處謙壯乃全也用壯處壯則觸藩矣周易略例卦略火炎上而受制於水水趨下而得志於火故君子不欲多上人文中子魏相通玄經曰見不足故能成其賢奢者不長道德經四子集解閻浮提人不知禮敬耆舊有德以言化之未可得度是時菩薩自變其身作迦頻闍羅鳥是鳥有二親友一者大象二者獼猴共在必鉢羅樹下住自相問言我等不知誰應為大象言我昔見此樹在我腹下今大如是以此推之我應為長猴言我曾蹲地手挽樹頭以此推之我應為長鳥言我於必鉢羅林中食此樹果子隨糞出此樹得生以是推之我應最大象復説言先生宿舊禮應供養即時大象背負獼猴鳥在猴上周遊而行一切禽獸見而問之何以如此答曰以此恭敬供養長老禽獸受化人亦效之大智度論卷十二言其謙下為物所陵賤忍受無慢猶如橋梁也羅什譯維摩詰經佛道品履信豚魚吉信及豚魚也易中孚風行澤上無所不周其猶信之被物無所不至周易正義中孚苟有明信澗溪沼沚之毛蘋蘩藴藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公而況君子結二國之信行之以禮風有采蘩采蘋雅有行葦泂酌昭忠信也左傳隱公三年舍之聞之杖莫如信完守以老楚杖信以待晉不亦可乎左傳襄公八年若合諸侯之卿以為不信必不捷矣食言者不病左傳襄公二十七年言之不用若食之消散故謂無信為食言春秋正義襄公二十七年人而無信不知其可也大車無輗小車無軏其何以行之哉論語為政至誠則動金石不誠則鳥獸不可親狎趙氏注孟子離婁上夫貞夫之一則天地可動機心內萌則鷗鳥不下況信不足焉而祈物之必附猜生於我而望彼之必懷何異挾水求溫抱炭希涼者哉魏志高柔傳曾子之妻之市其子隨之而泣其母曰女還顧反為女殺彘適市來曾子欲捕彘殺之妻止之曰特與嬰兒戲耳曽子曰嬰兒非與戲也嬰兒非有知也待父母而學者也聽父母之教令子欺之是教子欺也父欺子而不信其母非以成教也遂烹彘韓非子外儲説左魯哀公問於孔子曰吾聞古者有夔一足其果信有一足乎孔子對曰不也夔非一足也夔者忿戾惡心人多不説喜也雖然其所以得免於人害者以其信也人皆曰獨此一足矣夔非一足也一而足也哀公曰審而是固足矣韓非子外儲説左吳起示其妻以組曰子為我織組令之如是組已就而效之其組異善起曰使子為組令之如是而今也異善何也其妻曰用財若一也加務善之吳起曰非語也使之衣歸其父往請之吳起曰起家無虛言韓非子外儲説左夫弓矢和調而後求其中焉馬慤原順然後求其良材焉人必忠信重厚然後求其知能焉今人有不忠信重厚而多知能如此人者譬猶豺狼與不可以身近也説苑尊賢水倍淵則川竭人倍信則名不達説苑談叢齊攻魯求岑鼎魯君載岑鼎往齊侯不信而反之以為非也使人告魯君栁下惠以為是因請受之魯君請於栁下惠栁下惠對曰君之欲以為岑鼎也以免國也臣亦以有國於此破臣之國以免君之國此臣所難也魯君乃以真岑鼎往栁下惠可謂守信矣非獨存已之國也又存魯君之國信之於人重矣猶輿之輗軏也新序節士陽氣潛萌於黃宫信無不在乎中太玄經第一中測曰拔我輗軏貴以信也太玄經第一間言已施行常攬木引堅據持根本又貫纍香草之實執持忠信不為華飾之行也王逸注楚辭離騷經水之寒也火之熱也金石之堅剛也此數物未嘗有言而人莫不知其然者信著乎其體也使吾所行之信若此數物而誰其疑我哉今不信吾所行而怨人之不信也猶教人執鬼縳魅而怨人之不得也惑亦甚矣徐幹中論貴驗金玉小信之質大信則除矣故至信辟金郭子注莊庚桑楚信之行於人譬濟之須舟也信之於行猶舟之待楫也將涉大川非舟何以濟之欲泛方舟非楫何以行之今人雖欲為善而不知立行猶無舟而濟川也雖欲立行而不知立信猶無楫而行舟也是適郢者而首冥山背道愈逺矣劉子履信春之得風風不信則花萼不茂花萼不茂則發生之德廢夏之得炎炎不信則卉木不長卉木不長則長贏之德廢秋之得雨雨不信則百穀不實百穀不實則收成之德廢冬之得寒寒不信則水土不堅水土不堅則安靜之德廢以天地之靈氣候不信四時猶廢而況於人乎劉子履信猶如海潮終不違時蘇婆呼童子經卷中大海潮水尋以時而來不失常處法海經尺一師子在林中往與一獼猴共為親友獼猴以二子寄於師子時有鷲鳥飢行求食值師子睡故取猴子而去住於樹上師子覺已求猴子不得見鷲持在樹上而告鷲言我受獼猴寄託二子護之不謹今汝得去孤負言信請從汝索我為獸中之王汝為鳥中之主貴勢同等宜以相還鷲言汝不知時吾今飢乏何論同異師子知其叵得自以利爪爴其脅肉以貿猴子大智度論卷三十三喻林卷七十九
