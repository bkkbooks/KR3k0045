body:
  text: 喻林卷五十九明徐元太撰人事門五十七善禍黃鳥哀三良也國人刺穆公以人從死而作是詩也毛詩黃鳥賢人君子雖隱其身而德甚明著不能免禍害猶如魚捕於水亦甚著見被人採捕禮記正義中庸曽子孝於其親而沈乎水介生忠於其主而焚於火何則仁也不必可依信也不必可恃宋書文九王建平傳楊朱曰伯夷非亡欲矜清之郵以放餓死展季非亡情矜貞之郵以放寡宗清貞之誤善若此列子楊朱比干剖心子胥抉眼忠之禍也直躬證父尾生溺死信之患也鮑子立乾勝子不自理亷之害也孔子不見母匡子不見父義之失也莊子盜妬若以守法不朋黨治官而求安是猶以足搔頂也愈不幾也韓非子和氏日月欲明而浮雲蓋之蘭芝欲修而秋風敗之淮南子說林訓九鴈列陳雌獨不羣為罾所牽死於庖人焦氏易林復之豐言竭盡忠信以事君若人身疣贅之病與衆别異以得罪謫也王逸注楚辭九章以茂美之樹興於仁賢早遇霜露懷德君子忠而被害也王逸注楚辭九辨言蓼蟲處辛烈食苦惡不能知徙於葵菜食甘美終以困苦而癯瘦以喻己修潔白不能變志易行以求祿位亦將終身貧賤而困窮也王逸注楚辭七諌以玷汚言之清受塵而白取垢以毁謗言之貞良見妬髙竒見噪以遇罪言之忠言招患髙行招耻以不純言之玉有瑕而珠有毁王充論衡纍害篇亦有深逃而陸遭濤波幽遁而水被焚燒若龔勝之絶粒以殞命李業煎蹙以吞鴆由乎迹之有朕景之不滅也抱朴子外篇知止士有一定之論女有不易之行信而見疑貞而為戮是以壯夫義士伏死而不顧者此也文選江淹上書夫江湖所以濟舟亦所以覆舟仁義所以全身亦所以亡身文選袁宏名臣序贊英蘃夏落毒卉冬敷如彼龜玉韞櫝毁諸文選劉越石答盧諶詩獨正者危至方則閡文選顔延之陶徴士誄違衆速尤忤風先蹶文選顏延之陶徴士誄卷薜芷與若蕙兮臨湘淵而投之棍申椒與菌桂兮赴江湖而漚之楚辭返離騷芝在室而先枯蘭生庭而早刈藝文類聚人部哀傷賦齊王疾使人之宋迎文摯文摯至視王疾謂太子曰非怒則王疾不可治怒王則文摯死太子曰茍已王疾臣與母以死爭之願先生勿患也文摯曰諾與太子期而將往不當者三齊王固已怒矣文摯至不解履登床履王衣問疾王怒不與言摯因出固辭以重怒王王吐而起遂乃疾已王不悅果以鼎生烹摯太子與母合爭之不得夫忠於平世易忠於濁世難也太平御覽方術部醫見棄鴛鴦在梁戢其左翼之子無良二三其德詩小雅白華習習谷風維風及雨將恐將懼維豫與女將安將樂女轉棄豫習習谷風維風及頽將恐將懼置豫于懷將安將樂棄豫如遺詩小雅谷風我有㫖蓄勃六反亦以御冬宴爾新婚以我御窮詩國風谷風谷風弼之良婦見棄於夫而作詩說弼采葛賢者被讒見黜於野周人閔之而作詩說王晨風秦君遇賢始勤終怠賢人譏之詩說秦白華幽王寵褒㚶廢姜后后歸申而作詩說小正傳柏木所以宜為舟也亦泛泛其流不以濟度也毛詩柏舟注舟載渡物者今不用而與衆物泛泛然俱流水中仁人之不見用而與羣小人並列亦猶是也鄭氏箋詩柏舟言泛然而流者是彼柏木之舟此柏木之舟宜用濟渡今而不用亦泛泛然其與衆物俱流水中而已以興在列位者是彼仁德之人此仁德之人宜用輔佐今乃不用亦與衆小人並列於朝而已毛詩正義柏舟蓷草宜生髙陸之地今乃生於谷中為谷水浸之故乾燥而將死以喻婦人宜居平安之世今乃居於凶年為其夫薄之故情疏而將絶毛詩正義中谷有蓷如荼飛揚無所常定此女被棄心亦無定如荼然毛詩正義出其東門雲之從風東西無定此女被棄心亦無定如雲然毛詩正義出其東門得新菜而棄㫖蓄猶得新昏而棄已毛詩正義谷風我有美菜蓄之亦以禦冬月乏無之時猶君子安樂汝之新昏本亦但以我禦窮苦之時而已然窮苦取我至於富貴而見棄似冬月蓄菜至於春夏則見遺也毛詩正義谷風凡加冠之禮先用緇布之冠斂括垂髦三加之後去緇布之冠不復更用今王自比豈得將王室如緇布冠加髦之後不須復用因以敝之春秋正義昭公九年襟芰茄荷之緑衣兮被夫容之朱裳芳酷烈而莫聞兮不如襞而幽之離房前漢書楊雄傳匿景藏采不揚華藻實羽翮之美用非徒腹背之毛也而沈淪草莽好爵莫及廊廟之寶棄於溝渠後漢書循吏列傳韓盧抑而不縱兮騏驥絆而不試後漢書馮衍傳莫使騏驥更為凡馬荆山反成瓦石魏志管輅傳注昔召伯所憩愛流甘棠宣子所游封殖其樹夫思其人尚及其樹况生存所辟之士便當隨例放棄者乎晉書羊祜傳但雲咸斯奏自輟巴渝杞梓方雕豈盻樗櫪陳書蔡景歷傳雖失析陽如棄雞肋魏書辛雄從兄纂甚芻狗之棄路若章甫之遊越隋書禮儀一志駿馬以抑死直士以正窮賢者擯於朝美女擯於宫淮南子說林訓海不受流胔太山不上小人旁光不生爼駠駮不入性淮南子說林訓今夫毛嬙西施天下之美人若使之銜腐鼠蒙蝟皮衣豹裘帶死蛇則布衣韋帶之人過者莫不左右睥晲而掩鼻常試使之施芳澤正娥眉設笄珥衣阿錫曵齊紈粉白黛黑佩玉環揄步雜芝若籠蒙目視治由笑目流眺口曽撓竒牙出􅩷䩉搖則雖王公大人有嚴志頡頏之行者無不憚悇癢心而悅其色矣今以中人之才蒙愚惑之智被汙辱之行無本業所修方術所務焉得無有睥面掩鼻之容哉淮南子修務訓蝠螺生子深目黑醜雖飾相就衆人莫取焦氏易林需之恆酒酸魚敗衆莫貪嗜焦氏易林訟之豐破筐敝筥棄捐於道焦氏易林否之萃身多秃癩誰肯媚者焦氏易林隨之豐刺刖髠劓人所賤棄焦氏易林睽之賁言重積辛夷露而暴之使死林薄之中猶言取賢明君子棄之山野使之顛墜也王逸注楚辭九章言我馬強壯行於由臯無所驅馳我車堅牢舍旅方林無所載任也以言已才德方壯誠可任用棄於草野亦無所施也王逸注楚辭九章言浩浩廣大乎沅湘之水分汨而流將歸乎海傷已放棄獨無所歸也王逸注楚辭九章言已放棄若浮雲之氣東西無所據依王逸注楚辭九章見􅽾蜇之夜行自傷放棄與昆蟲為雙也王逸注楚辭九辨鈕樞所以校玉斗玉斗既喪將失其鈕樞言放賢者逐去之也王逸注楚辭九思此所謂以分寸之瑕棄盈尺之夜光以蟻鼻之缺損無價之淳鈞非荆和之逺識風胡之賞真也斯朱公所以鬱悒薛燭所以永歎矣抱朴子內篇論仙聞此言也雖風之過耳電之經目不足諭也抱朴子內篇極言猶奏和音於聾俗之地鬻章甫於被髮之域抱朴子外篇任命夫器非瓊瑶楚和不泣質非潜虬風雲不集抱朴子外篇應嘲郢人美下里之淫蛙而薄六莖之和音庸夫好悅耳之華譽而惡利行之良規故宋玉含其延靈之精聲智士招其獨見之遠謀抱朴子外篇博喻士有大趣不修容儀不惜小儉而謂之棄人是見朱橘一子蠧因剪樹而棄之覩縟錦一寸㸃乃全匹而燔之劉子命相言已朝餐而忘我餓猶居貴而遺我賤李善注文選郭泰機答傅咸詩心不同兮媒勞恩不甚兮輕絶文選屈原湘君歌出門無通路枳棘塞中塗計䇿棄不收塊若枯池魚文選左思詠史詩鳬鵠遠成美薪芻前見陵文選鮑昭白頭吟天寒知運速况復鴈南飛衣工秉刀尺棄我忽如遺文選郭泰機答傅咸詩苕苕椅桐樹寄生於南嶽上凌青雲霓下臨千仞谷處身孤且危於何託余足昔也植朝陽傾枝俟鸞鷟今者絶世用倥偬見迫束班匠不我顧牙曠不我録焉得成琴瑟何由揚妙曲文選司馬彪贈山濤詩黍稷委疇隴農夫安所獲文選曹植贈丁儀詩籩豆所以食也而君捐之席蓐所以卧也而君棄之手足胼胝面目犂黑有勞功者也而君後之文選鮑明逺東武吟注素門凡流輪翮無取文選任彥升讓吏部表不寤滄溟未運波臣自蕩渤澥方春旅翮先謝文選謝朓辭隋王箋田彼南山蕪穢不治種一頃豆落而為萁文選楊惲報孫㑹宗書世並舉而好朋兮一斗斛而相量衆比周以肩迫兮賢者逺而隱藏為鳯皇作鶉籠兮雖翕翅其不容補文選莊忌哀時命君無度而弗察兮使芳草為藪幽楚辭九章惜往日抱昭華兮寶璋欲銜鬻兮莫取楚辭王逸怨上猶如毒樹雖生華實無人受用本緣經月光王品譬如苦瓜雖形似甘種而不可食大智度論卷十三譬如吐食不可更噉大智度論卷十三有似嚼飯與人非徒失味乃令嘔噦也高僧傳二鳩摩羅什無益枯楊生華何可久也易大過何異無虞以從禽乎雖見其禽而無其虞徒入于林中其可獲乎王弼注易屯無田音佃甫田維莠音酉驕驕叶音髙無思逺人勞心忉忉音刀詩國風甫田發言盈庭誰敢執其咎如匪行邁謀是用不得于道詩小雅小旻折栁以為藩園無益於禁矣毛詩東方未明注甫田大夫刺襄公也無禮義而求大功不修德而求諸侯志大心勞所以求者非其道也毛詩甫田薈蔚之小雲朝升於南山不能為大雨以喻小人雖見任於君終不能成其德教鄭氏箋詩候人王失禮於外而下國聞知而化之王弗能治如鳴鼓鍾於宫中而欲外人不聞亦不可止鄭氏箋詩白華諸言尋盟者皆以前盟已寒更溫之使熱若可重溫使熱亦可歇之使寒春秋正義哀公十二年越在腹心今得志於齊猶石田無所用史記吳世家今徒取富人子上又無智略如木偶人衣之綺繡耳史記田叔傳非其地樹之不生非其意教之不成史記日者傳僕之思歸如痿人不忘起盲者不忘視藝不可耳前漢書韓王信傳譬畫者畫於無形弦者放於無聲殆不可乎前漢書揚雄傳下雖馳辨如濤波摛藻如春華猶無益於殿最前漢書叙傳上夫居前不能令人輊居後不能令人軒與人怨不能為人患臣所恥也後漢書馬援列傳夫雞肋食之則無所得棄之則如可惜公歸計决矣後漢書楊震傳亦譬以蒿箭射蒿中耳魏志明帝紀注今子以旦夕之命待不可望之救猶牛蹄中魚冀賴江漢其不可恃亦明矣吳志吕蒙傳可謂盲者欲視白黑聾者欲聽清濁苦而無功也魏志管輅傳注此猶烈火已焚待江漢之水溺於洪流望越人之助其何及哉晉書張軌傳頗聞劉景升有千斤大牛噉芻豆十倍於常牛負重致逺曽不若一羸㹀魏武入荆州以享軍士晉書桓溫傳溺者不問墜迷者不問路溺而後問墜迷而後問路譬之猶臨難而遽鑄兵噎而遽掘井雖逺亦無及也晏子春秋雜上倏䱁者浮陽之魚也㫢於沙而思水則無逮矣挂於患而欲謹則無益矣荀子榮辱齊有居士田仲者宋人屈榖見之曰榖聞先生之義不恃仰人而食今榖有樹瓠之道堅如石厚而無竅獻之仲曰夫瓠所貴者謂其可以盛也今厚而無竅則不可剖以盛物而任重如堅石則不可以剖而以斟吾無以瓠為也曰然榖將以欲棄之今田仲不恃仰人而食亦無益人之國亦堅瓠之類也韓非子外儲說左上夫待越人之善海游者以救中國之溺人越人善游矣而溺者不濟矣夫待古之王良以馭今之馬亦猶越人救溺之說也不可亦明矣韓非子難勢且今已乏矣而方須租入是猶古人欲决江河以救牛蹄之魚之類也孔叢子連叢子今以一人之身憂世之不治而泣涕不禁是憂河水之濁而以泣清之也其為無益莫大焉孔叢子抗志比干死紂而不能正其行子胥死吳而不能存其國二子者強諫而死適足明主之暴耳未始有益如秋毫之端也說苑雜言鉛刀攻玉堅不可得焦氏易林坤之豫探懷得蚤所願失道焦氏易林坤之漸一指食肉口無所得染其鼎鼐舌饞於腹焦氏易林需之解耕石山顛費種家貧無聊虛作苖髮不生焦氏易林比之解蹇驢不材駿驥失時筋勞力盡疲於沙丘焦氏易林履之巽庖火為災電火為蕃焦氏易林泰之噬嗑澤狗水鳬難畜少雛焦氏易林泰之巽疾貧望幸使伯行販開牢擇羊多得大牂焦氏易林否之坎一夫兩心技刺不深所為無功求事不成焦氏易林豫之臨羊頭兔足少肉不飽漏囊敗粟利無所得焦氏易林剝之恆枯樹不花空淵無魚焦氏易林咸之噬嗑耕石不生棄禮無名縫衣失針襦袴不成焦氏易林咸之益南山髙岡回隤難登道路遼逺行者無功焦氏易林遁之睽張伯買鹿從者失羊焦氏易林大壯之訟一口三舌相妨無益羣羊百牂不為威強焦氏易林蹇之未濟入水求玉不見和璞焦氏易林解之否刲羊不當女執空筐焦氏易林歸妹之聧穿匏挹水搆鐵燃火勞瘦力竭饑渴為禍焦氏易林未濟之漸為國不迪其法而望其效譬諸算乎揚子先知次八蚤蝨之􅕳即疏字厲測曰蚤蝨之􅕳不足賴也􅕳扶疏之義太𤣥經第一􅕳次五蜘蛛之務不如蠶之緰頭測曰蜘蛛之務無益人也太𤣥經第一務次七交于鳥鼠費其資黍測曰交于鳥鼠徒費也太𤣥經第二交次六多田不婁力住切費我膎户皆切功測曰多田不婁費力忘功也太𤣥經第四逃次六俾蛛罔罔遇螽利雖大不得從太𤣥經第四過次三積石不食費其勞力測曰積石不食無可獲也太𤣥經第五積次七枯垣生莠皬乎殼切頭內其稚婦太𤣥經第五內上九其勤其勤抱車入淵負舟上山測曰其勤其勤勞不得也太𤣥經第六勤今有採不死之藥者五遊方嶽十涉溟洲窮合靈之壑掘産秀之巖被羽服而履赤舄談真訣而煉丹砂或呼吸而潄精或偃仰而飱霞自以為安期羡門之倫松子王喬之屬天子不能爵諸侯不能祿寢跡于草野寄傲于流俗與浮圗並軌老子同谷趍而事之者若攀軒轅之逸駕徼彭聃之遐福也其名孰美焉然周穆馳而犬戎叛秦始遊而二世亡此二主者寧無利于民而憂身之不夀于羲黃寧無利于子孫而耻國之不延于陶唐卒有替羲黃之憂後陶唐之耻意者力之不逮乎或虛詞詭術無徵于世無裨于身國乎何嗜之而不疲也天祿閣外史四難言婚姻所好心意不同則媒人疲勞而無功也屈原自諭行與君異終不可合亦疲勞而已也王逸注楚辭九歌言張強弩之機以蓬蒿之箭以射犀革之盾必摧折而無所能入也言使愚巧任政必致荒亂無所能成也王逸注楚辭七諫言取澤㵼惡草盛於革囊滿而藏之無益於用以言養育小人置之髙堂亦無益於政治也王逸注楚辭九歎親在獄中罪疑未定孝子馳走以救其難如罪定法立終無門戶雖曽子子騫坐泣而已何則計動無益空為煩也王充論衡薄葬篇縱令勤求少有所獲則顧影尸居與木石為鄰所謂不病而自炙無憂而自默無喪而疏食無罪而自幽追虛徼幸功不答勞嵇中散集向子期難養生論夫指既斬而連之不可續也血既灑而吞之無所益也豈况服彼異類之松柏以延短促之年命甚不然也抱朴子內篇對俗夫苦心約已以行無益之事鏤氷雕朽終無必成之功抱朴子內篇論仙夫搜尋仞之壟求干天之木漉牛迹之中索吞舟之鱗用日雖久安能得乎抱朴子內篇勤求疾之者齊聲而側目愛之者寡弱而無益亦猶撮壤不能填决河升水不能殄原火抱朴子外篇名實所謂盜跖分財取少為讓陸處之魚相喣以沫也抱朴子外篇詰鮑迅逝者不能脫逐身之景樂成者不能免理致之敗抱朴子外篇任命若揭仁義以趨道德之鄉其猶擊鼓而求逃者無由得也郭子注莊天運譬若畫形於無象造響於無聲未之思乎何所規之不通也文選曹植七啓排簾障風探沙擁河無益於事徒自弊耳意林潜夫論畫水鏤氷與時消釋意林新論駕蹇驢而無䇿兮又何路之能極以直針而為釣兮又何魚之能得楚辭東方朔哀命費子陽謂子思曰吾念周室將滅涕泣不可禁也子思曰然今以一人之身憂世之不治而涕泣不禁是憂河水濁而以泣清之也藝文類聚人部泣事等泣河無救三川之竭有類憂天豈支四極之壞藝文類聚職官部司徒表邯鄲已危徒思馬服燕城去矣空用荆軻是以竹杖扶危不能正武擔之石蘆灰縮水不能救宣房之河文苑英華庾信連珠今一人耕而百人食之此螟􅀈蚵蠋亦大矣雖有詩書猶無益於治太平御覽産資部耕如窮人貪諸衣服雖復冀望而不能得老亦如是雖有貪心欲求富樂而不能得元陽妙經卷一針石道也精神不進志意不治故病不可愈今精壞神去榮衛不可復收何者嗜欲無窮而憂患不止精氣㢮壞榮枯衛除故神去之而病不愈也黃帝素問內經湯液醪醴論如愚人披空尋跡終不可得玉清經法印品如彼幻師得化美團雖似有益而實無益波羅蜜多經五百八十一譬如有人為欲顯示太虛空故雖有所說而太虛空不可顯示波羅蜜多經五百九十六如朽腐舍常務修治如老弱乘難可驅策大寶積經卷九十六譬如死人著金纓絡大寶積經卷一百一十二譬如有人其身臭穢雖以種種上妙香塗而竟不能令身香潔大集地藏十輪經卷六猶如有人從樹上墮雖以手足捫摸枝葉而無所得中阿含經卷十九如有人從山上墮雖以手足捫摸於空而無所得中阿含經卷十九猶如有人以渴入池而反渴還中阿含經卷三十二如有狗饑餓羸乏至屠牛處彼屠牛師淨剔除肉擲骨與狗狗得骨已處處咬嚙破脣缺齒或傷咽喉然狗不得以此除饑中阿含經卷五十五如樹無華果無所饒益如枯渠無水無所潤及大智度論卷三十七猶如朽塔難可杇色長阿含經卷十二譬如老牛不能挽車亦復不能耕犂無益於主佛說七女經尺六譬如石田雖植好種勤加營􅘥終無果實大集地藏十輪經卷六譬如愚者取於炭勤力摩治欲令白炭盡力疲白莫成無智妄貪亦如是大乘經中愚人無智便空食鹽食已口爽反為其患譬彼外道聞節飲食可以得道即便斷食或經七日或十五日徒自困餓無益於道百喻經卷上譬如二人至陶師所觀其踏輪而作瓦瓶看無厭足一人捨去往至大㑹極得美膳又獲珍寶一人觀瓶而作是言待我看訖如是漸冉乃至日沒觀瓶不已失於衣食百喻經卷下譬如老鵠守此空池永無所獲法句譬喻經三老耄品譬如枯樹雖加溉灌不生華葉及其果實三昧法門經卷上欲無所得如狗咬枯骨三昧法門經卷下如惡誣罔人清白猶不汙愚殃反自及如塵逆風坌法句經惡行品第十七譬如人欲守護虛空虛空雨不能壞風日不能乾刀仗等不能傷若有人欲守護虛空者徒自疲苦於空無益大智度論卷六十四譬如一人欲有所到一者住不行二者失道二俱不到大智度論卷八十九如人耻白髮并剃其黑者剃之未久間白髮尋還生大莊嚴經論卷六偈如被燒種子雖置地中水澆日暖終不能生菩提資糧論卷四事等破瓶義同燋種亦如多羅既斷寧可重生㭊石已離終無還合法苑珠林卷二十三昔有一人說王過罪而作是言王甚暴虐治政無理王聞是語既大瞋恚竟不究悉信傍佞人捉此賢臣仰使剝脊取百兩肉有人證明此無是語王心便悔索千兩肉用為補脊夜中呻喚甚大苦惱王聞其聲問言何以苦惱取汝百兩十陪與汝意不足耶何故苦惱傍人答言大王如截子頭雖得千頭不免子死雖十陪得肉不免苦痛法苑珠林卷四十四喻林卷五十九
