body:
  text: 喻林卷五十一明徐元太撰人事門四十九失所汎芳斂反彼栢舟亦汎其流詩國風栢舟緑兮衣兮緑衣黄裏詩國風緑衣絺兮綌兮淒音妻其以風叶為愔反詩國風緑衣終風且暴顧我則笑叶音燥詩國風終風雄雉于飛泄泄與異同其羽我之懷矣自詒伊阻雄雉于飛下上時掌反其音展矣君子實勞我心詩國風雄雉有瀰與米同濟盈有鷕雉鳴濟盈不濡軌與晷同叶居有反雉鳴求其牡詩國風匏有苦葉魚網之設鴻則離之燕婉之求得此戚施詩國風新臺燕婉之求蘧篨音渠除不鮮燕婉之求蘧除不殄詩國風新臺其雨其雨杲杲古老反出日詩國風伯兮有枤音第之杜其葉湑湑上聲獨行踽踽豈無他人不如我同父有枤之杜其葉菁菁音精獨行睘睘音瓊豈無他人不如我同姓叶桑經反詩國風枤杜葛生蒙楚蘝音㢘蔓于野叶上與反予美亡此誰與獨處葛生蒙棘蘝蔓于域予美亡此誰與獨息詩國風葛生有鶖在梁有鶴在林詩小雅白華樵彼桑薪卬烘于煁音忱詩小雅白華如賈音古三倍君子是識婦無公事休其蠶織詩大雅曕卬黄鳥民適異國見拒於人而思歸故鄉乃作是詩詩説王鴇羽民從征役而不得養其父母故作是詩詩説魏北門刺仕不得志也言衞之忠臣不得其志爾毛詩北門枤杜猶得其時蕃滋役夫勞苦不得盡其天性毛詩枤杜註魚藻刺幽王也言萬物失其性毛詩魚藻采綠刺怨曠也毛詩采緑遵彼汝墳伐其條枚箋云伐薪於汝水之側非婦人之事言已之君子賢者而處勤勞之職亦非其事鄭氏箋詩汝墳舟載渡物者令不用而與衆物汎汎然俱流水中仁人之不見用而與羣小人竝列亦猶是也鄭氏箋詩柏舟絺綌所以當暑今以待寒風其失所也鄭氏箋詩緑衣人居平安之世猶鵻之生於陸自然也遇衰亂凶年猶鵻之生谷中得水則病將死鄭氏箋詩中谷鴻大鳥也不宜與鳬鷺之屬飛而循渚以喻周公今與凡人處東都之邑失其所也鄭氏箋詩九罭太子放逐而不得生子猶内傷病之木内有疾故無枝也鄭氏箋詩小弁人之樵取彼桑薪宜以炊饔饍之㸑以養食人我反以燎於烓竈用炤事物而已鄭氏箋詩白華有狐綏綏然匹行在彼淇水之梁而得其所以興今衞之男女皆喪妃耦不得匹行乃狐之不如毛詩正義有狐王政之偏或用之為官令其醉酒者或不見任用不得其漿者毛詩正義大東山之有蕨薇之菜隰之有杞桋之木是菜生於山木生於隰所生皆得其所以興人生處於安樂以得其所今我天下之民遇此殘亂驚擾失性草木之不如也毛詩正義四月有人登彼北山之上者云我采其杞菜之葉也此杞葉非可食之物而登山以采之非宜矣以興大夫循彼長遠之路者云我從其勞苦之役也此勞役非賢者之職而循路以從之非其事矣毛詩正義北山菅茅之蒙養英英然者是鮮潤之白雲下露潤彼菅之與茅使之得長成是天地之氣無微不著無不覆養然天不遺物尚養彼菅茅天何為獨行艱難於我申后幽王不可於我而見黜退不得覆養是菅茅之不如也毛詩正義白華桑薪薪之善者宜以炊㸑而養人今不以炊㸑反燎于煁竈失其所也毛詩正義白華龍欲上天五蛇為輔龍已升雲四蛇各入其宇一蛇獨怨終不見處所史記晉世家此猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必至燋爛後漢書劉陶謝傳棄彼弊冠崇兹新履晉書王公烈傳夫龍或俯鱗潜于重泉或仰攀雲漢㳺乎蒼昊而今蟠于坎井同于蛙蝦者豈獨管庫之士或有隠伏廝役之賢没于行伍故龍見光景有所感悟晉書孫楚傳有龍矯矯頃失其所五蛇從之周徧天下龍饑無食一蛇割股龍反其淵安其壤土四蛇入穴皆有處所一蛇無穴號於中野説苑復恩有龍矯矯頃失其所一蛇從之周流天下龍反其淵安寧其處一蛇耆乾獨不得其所説苑復恩龍馬上山絶無水泉喉焦脣乾舌不能言焦氏易林乾之訟桃鵲竊脂來於小枝揺動不安為風所吹寒心悚慄常憂殆危焦氏易林謙之遯馬驚傷車步為我憂焦氏易林豫之井黄裏緑衣君服不宜焦氏易林觀之革鼻項移徙居不安坐焦氏易林頤之兌雌單獨居歸其本巢毛羽憔悴志如死灰焦氏易林咸之咸魚陸失所島鼃困苦澤無雚蒲晉國以虚焦氏易林蹇之解龜厭江海陸行不止自令枯槁失其都市焦氏易林益之震次八琢齒依齦牛斤切三嵗無君測曰琢齒依齦君自跋也太𤣥經第三宻夫鳥當集木巔而言草中罾當在水中而言木上以喻所願不得失其所也王逸註楚辭九歌言持𤣥墨之文居於幽㝠之處則矇瞍以為不明也言持賢知之士居於山谷則衆愚以為不賢也王逸註楚辭九章言黄鵠能飛翔神龍能存能亡奄然失所為鴟梟螻蟻所制其困如此何况賢者身無爵祿為俗人所困侮固其宜也王逸註楚辭惜誓山谷之中幽深險阻非君子之所處也猨狖虎豹非賢者之偶也王逸註楚辭招隠士言騏驥壹馳千里乃騁之中庭促俠之處不得展足以極遠道以言使賢者執灑掃之役亦不得展志意也王逸註楚辭哀時命言猨狖當居髙木茂林見其才力而置之櫺檻之中廹局之處責其㨗乃非其理也以言君子當在廟堂為政而棄之山林責其智能亦非其宜也王逸註楚辭哀時命言寃雛之生早失其雄其母孤居吟於髙牆墉之上將復遇害言已亦失其所居在於林澤居非其所恐顛仆也王逸註楚辭九嘆言水得風則龍卭繚戾與險阻相薄不得順其流性以言忠臣逢讒人亦匡攘惶遽而竄伏也王逸註楚辭九嘆言水逢風紛亂揚波滂沛失其本性以言屈原志行清白遭逢貪佞被過放逐亦失其本志也王逸註楚辭九嘆言積漬衆芳於汙泥臭井之中棄文犀之角置於筐簏而不帶佩蔽其美質失其性也以言棄賢智之士於山林之中亦失其性也王逸註楚辭九嘆當顯而反隠如無水而沈也莊子音義則陽求馬於市肆廣庭非其所也莊子音義田子方麋何為兮庭中蛟何為兮水裔文選屈原湘夫人歌烏何萃兮蘋中罾何為兮水上文選屈原湘夫人歌今將植橘柚於𤣥朔蔕華藕於修陵表龍章於裸壤奏韶武於聾俗固難以取貴矣文選呂安與嵇茂齊書譬若飛鴻鸞於中庭騁騏驥於閭巷也藝文類聚人部聖碑鵠竄兮荆棘鵜集兮帷幄爾雅翼鵜何為謬傷海鳥横斤山木何氏語林言語朱雀翺翔戲兮飛揚色五彩遭遇網羅施兮壓之不得舉謔謔聲甚悲兮嬰兒之慕母顛倒就湯鑊兮摧折傷毛羽参同契猶如初生赤子失大慈母絶於壯齒海空智藏經普記品譬如有人髙厚陸地種瞻波樹水常行處復作堤塘地既髙燥又不得水漸漸枯黄不能増長大方等大集經十一譬如有樹枯朽乾悴枝葉凋墜時有一人於盛夏時炎暑之月物景熾然酷熱可畏其人自逺而來加復疲困饑渴所逼但隨道徑詣枯樹下欲求憇止非清涼地轉求其苦身毛喜豎經上羅什如好綿何可使入棘林中髙僧傳二佛陀耶舍如車行道捨乎大塗從邪徑敗生折軸憂法句經世俗品昔有賊人入富家舍偷得錦繡即持用裹故弊氀毼種種財物為智人所笑百喻經卷上悖理日居月諸胡迭音垤而微詩國風柏舟人皆謂雀之穿屋似有角彊暴之男召我而獄似有室家之道於我也物有似而不同雀之穿屋不以角乃以咮今彊暴之男召我而獄不以室家之道於我乃以侵陵物與事有似而非者士師所當審也鄭氏箋詩行露伐木尚椅其木之巔矣不欲妄踣之析薪尚施其薪之理矣不欲妄折之彼人尚不欲妄損折薪木今王非理而害太子其意乃不如彼伐木析薪之人毛詩正義小弁若刳腹去疾炊灰止沸春秋正義莊公六年以若所為求若所欲猶緣木而求魚也孟子梁惠王上今惡辱而居不仁是猶惡濕而居下也孟子公孫丑上人役而恥為役由弓人而恥為弓矢人而恥為矢也孟子公孫丑上公曰下軍上軍之貳也寡人在上申生在下不亦可乎士蒍對曰下不可以貳上公曰何故對曰貳若體焉上下左右以相心目用而不倦身之利也上貳代舉下貳代履周旋變動以役心目故能治事以制百物若下攝上與上攝下周旋不變以違心目其反為物用也何事能治國語晉魏王欲攻邯鄲季梁聞之中道而反衣焦不申頭塵不去往見王曰今者臣來見人於大行方北面而持其駕告臣曰我欲之楚臣曰君之楚將奚為北面曰吾馬良臣曰馬雖良此非楚之路也曰吾用多臣曰用雖多此非楚路也曰吾御者善此數者愈善而離楚愈遠耳今王動欲成覇王舉欲信於天下恃王國之大兵之精銳而攻邯郸以廣地尊名王之動愈數而離王愈遠耳猶至楚而北行也戰國䇿魏安釐王吾日暮塗遠吾故倒行而逆施之史記伍子胥傳傳曰以賢難得故曰事不待賢以食難得故曰飽不俟食惑之甚者前漢紀孝元上愛子若此猶饑而食之以毒適所以害之也後漢書何敞列傳是猶曲表而欲直景卻行而求及前人也後漢書楊震傳是使跛牂欲闚髙岸天險可得而登也後漢書孔融列傳夫兄弟者左右手也譬人將鬭而斷其右手而曰我必勝若是者可乎夫棄兄弟而不親天下其誰親之魏志王修傳反裘負薪裏盡毛殫刖趾適屨刻肌傷骨魏志明帝紀註猶開門而揖盜未可以為仁也吳志孫權傳志欲就於升平行先迎於禍亂是猶將適越者指沙漠以遵途欲登山者渉舟航而覓路所趣逾遠所尚轉難南北倍殊髙下相反求其至也不亦難乎晉書武帝紀北行求郢西征索越方長迷於幽都永謬滯於昧谷遼遼閩楚其可見乎宋書夷蠻天竺傳不明於則而欲出號令猶立朝夕於運均之上擔竿而欲定其末不明於象而欲論材審用猶絶長以為短續短以為長不明於法而欲治民一衆猶左書而右息之不明於化而欲變俗易教猶朝揉輪而夕欲成車不明於決塞而欲毆衆移民猶使水逆流不明於心術而欲行令於人猶倍招而必拘之不明於計數而欲舉大事猶無舟檝而欲經於水險也管子七法未見不得其侯而能除其疾也侯即診鶡冠子天則未成乎心而有是非是今日適越而昔至也莊子齊物論是猶師天而無地師陰而無陽其不可行明矣莊子秋水今有人於此少見黒曰黑多見黒曰白則以此人不知黑白之辯矣少嘗苦曰苦多嘗苦曰甘則必以此人為不知甘苦之辯矣今小為非則知而非之大為非攻國則不知而非從而譽之謂之義此可謂之知義與不義之辯乎墨子非攻上以此求衆譬猶使人負劒而求其夀也衆之説無可得焉墨子節葬下以此求富此譬猶禁耕而求獲也富之説無可得焉墨子節葬下世俗之君子皆知小物而不知大物今有人於此竊一犬一彘則謂之不仁竊一國一都則以為義譬猶小視白謂之白大視白則謂之黒墨子魯問公孟子曰無鬼神又曰君子必學祭祀子墨子曰執無鬼而學祭禮是猶無客而學客禮也是猶無魚而為魚罟也墨子公孟公孟子曰貧富夀夭齰然在天不可損益又曰君子必學子墨子曰教人學而執有命是猶命人葆而去其冠也墨子公孟以黄馬為非馬而以白馬為有馬此飛者入池而棺槨異處此天下之悖言亂辭也公孫龍子白馬篇危削滅亡之情舉積此矣而求安樂是狂生者也狂生者不胥時而落荀子君道志不免乎姦心行不免乎姦道而求有君子聖人之名辟之是猶伏而咶天救經而引其足也説必不行矣愈務而愈遠荀子仲尼人知貴生樂安而棄禮義辟之是猶欲夀而歾頸愚莫大焉荀子彊國篇以人之情為欲此五綦者而不欲多譬之是猶以人之情為欲富貴而不欲貨也好美而惡西施也荀子王論篇今夫與人相善也無豐年旁入之利而獨以完給者非力則儉也與人相善也無饑饉疾疚禍罪之殃獨以貧窮者非侈則墮也侈而墮者貧而力而儉者富今上徴斂於富人以布施於貧家是奪力儉而與侈墮也而欲索民之疾作而節用不可得也韓非子顯學夫為人子而常譽他人之親曰某子之親夜寢早起强力生財以養子孫臣妾是謗誹其親者也為人臣常譽先王之德厚而願之是誹謗其君者也非其親者知謂之不孝而非其君者天下賢之此所以亂也韓非子忠孝衣不舉領者倒走不視地者顛黄石公素書安履今有人於此無禮慢易而求敬阿黨不公而求令煩號數變而求静暴戾貪得而求定雖黄帝猶若困呂氏春秋審應春行夏令泄行秋令水行冬令肅夏行春令風行秋令蕪行冬令格秋行夏令華行春令榮行冬令耗冬行春令泄行夏令旱行秋令霧淮南子時則訓為儒而踞里閭為墨而朝吹竽欲滅跡而走雪中拯溺者而欲無濡是非所行而行所非淮南子説山訓以非義為義以非禮為禮譬猶倮走而追狂人盜財而與乞者竊簡而寫法律蹲踞而誦詩書淮南子説山訓范氏之敗有竊其鐘負而走者鎗然有聲懼人聞之遽掩其耳憎人聞之可也自掩其耳悖矣淮南子説山訓有以飰死者而禁天下之食有以車為敗者而禁天下之乗則悖矣淮南子説林訓夫所以養而害所養譬猶削足而適履殺頭而便冠淮南子説林訓譬猶食榖衣絲而非耕織者也載於船車服而安之而非工匠者也食於釡甑須以生活而非陶冶者也此言違於情而行曚於心者也説苑建本非其人而欲有功譬其若夏至之日而欲夜之長也射魚指天而欲發之當也雖舜禹猶亦困而又况乎俗主哉説苑尊賢桑鵲竊脂啄粟不宜焦氏易林同人之未濟鼻移在頭枯葦復生下朽上榮家乃不寧焦氏易林大過之萃一衣三冠冠无所加焦氏易林晉之乾雄雞不晨雌雞具呻焦氏易林困之既濟次五東南射兕西北其矢測曰東南射兕不得其首也太𤣥經第一戾次五童牛角馬不今不古測曰童牛角馬變天常也太𤣥經第三更次八反其几䨇其朼几家不㫖測曰反几䨇朼家用不臧也太𤣥經第三居次四止于童木求其疏榖測曰止于童木求其窮也太𤣥經第六止次八雌鳴于晨牝角魚木測曰雌鳴于晨厥正反也太𤣥經第六失言寧有萍草生於水中無根乃漫衍于九交之道王逸註楚辭天問禮喪不飲酒食肉而日醉於酒欲整喪紀猶無目欲視青黄無耳欲聽宫商也呂氏春秋貴公解何異懸瓦礫而貴夜光絃不調而索清音哉抱朴子外篇審舉若子言不恃他物則宜𢷬肉治骨以為金瘡之藥煎皮熬髪以治秃鬢之疾耶抱朴子内篇對俗何異負豕而欲無臭馮河而欲不濡無轡筴而御奔馬棄柁櫓而乗輕舟未見其可也抱朴子外篇詰鮑失亡其子而不能遠索遺其氣類而亦未始自非人之自是有斯謬矣郭子莊註徐無鬼此聽虚而責響視空而索影悖情倒理誣罔之甚也劉子傷讒賤子貴餅自以為是莊子音義徐無鬼子不嫌僕德之不劭而疑其位之不到是猶反鏡而索照登木而下釣補文選夏侯湛抵疑觀吾子之趨欲衍傾城之金求百錢之售制造天之梯儗膚寸之檢廣文選阮嗣宗答伏義書未嘗夢乗車入䑕穴𢷬虀取鐵杵無想無因故也世説新語言語食榖而鄙田衣帛而笑蠶是惑也太平御覽百榖部榖猶如畏大地疾走欲藏身縱日馳千里非地不容身大乗妙林經偈何於空谷響而求生相於焦榖中而求牙相大乗妙林經譬如有人欲於無色無見無對無所依止空中種樹彼極為難波羅蜜多經三百六十三如説言螢火小蟲負須彌山飛空而去為可信不大寶積經卷二譬如有人於夜闇中掉弄手臂揺動面目言我弄世間彼為弄誰是人自弄何以故於中無人為可弄故大寶積經卷三何故明目人而羨盲瞽導豈有岸上人反樂沉溺者何有解脱人而復樂牢獄大實積經卷六十一譬如有人漂没大水渴乏而死大寶積經卷一百一十三如世人言我能捉電電雖可見而不能捉大方等大積經十九譬如有人自挑其目盲無所見而欲導他登上太山終無是處大集地藏十輪經卷四如言石女子威儀而進退兎角有銛利沙中能出油大乗密嚴經卷下不見以兎角觸壊於大山曽無石女兒執箭射於物未聞欲鬬戰而求兎角弓誰復須宮室令石女兒造大乗密嚴經卷下譬如善屠牛師手執利刀解剥其牛乗間而剥不傷内肉不傷外皮解其肢節筋骨然後還以皮覆其上若有人言此牛皮肉全而不離為等説不荅言不也雜阿含經卷十一那先言如人沽美酒著大器中急塞一人口倒置酒中令嘗酒其人寧知酒味不王言未入口到舌上故不知味那先比丘經卷中如鐵出金誰當信者大智度論卷二譬如人問搆牛角得幾斗乳是為非問大智度論卷二譬如百由旬大火聚有人負乾草入火中過不燒一葉是為甚難大智度論卷七譬如無足欲行無翅欲飛無船欲度是不可得大智度論卷十三譬如人種樹不依於地而欲得其根莖枝葉成其果實是難可得大智度論卷二十八又如毛孔之空欲比十方空無有是理大智度論七十九譬如清冷雲中而霹靂起火非所應也遺教經論離十二譬如有人懼諸霜雹疾風暴雨水火等災損害虚空勤加守䕶廣百論卷三猶如春農夫不下於種子至秋無果實而可得收穫大莊嚴經論卷二偈且生而可養則日及可與千松比霜朝菌可與萬椿齊雪耶𢎞明集折夷夏論斯何異斬刈根本而修枝榦而言不殞碩茂未之聞見𢎞明集孫綽喻道論猶無柯而求伐不食而獨飽焉可得乎𢎞明集釋駮論猶訪道於瘖聾麾方而莫窮遠邇問津於兎馬知濟而不測淺深辯正論卷六若夫廢宗廟之粢盛加子孫之魚肉毁蒸嘗之黻冕充僕妾之衣服茍求惠下之恩不崇安上之福恨養親之費饍思廢養之潤屋如此可謂忠孝之道乎法苑珠林卷五十五越理居履之時以陽處陽猶曰不謙而况以陰居陽以柔乗剛者乎故以此為明眇目者也以此為行跛足者也以此履危見咥者也王弼註易履先染絲後製衣皆女之所治為也而女反亂之鄭氏箋詩綠衣墠邊有陂茅蒐生焉茅蒐之為難淺矣易越而出鄭氏箋詩東門之墠鶡旦是求旦之鳥夜中而鳴以求早旦不可得也言人視彼求旦之鳥欲反夜作晝是鳥無識也求不可得之物人猶尚惡之况人上僭於君求不可得之物以下亂上人惡之可知也禮記正義孔子閒居畜老猶憚殺之而况君乎左傳宣公四年殺老牛莫之敢尸而况君乎左傳成公十八年紾兄之臂而奪之食則得食不紾則不得食則將紾之乎踰東家牆而摟其處子則得妻不摟則不得妻則將摟之乎孟子告子下君有短垣而自踰之况蠻荆則何有於周室國語吳郢人有鬻其母為請於買者曰此母老矣幸善食之而勿苦此行大不美而欲為小義者淮南子説山訓狼虎争强禮義不行焦氏易林恒之困耕石不生棄禮无名焦氏易林歸妺之賁私已不能大通則各私其黨而求利焉楚人亡弓不能亡楚愛國愈甚益為它災王弼註易同人缾小而盡罍大而盈言為罍恥者刺王不使富分貧衆恤寡鄭氏箋詩蓼莪貪於政者不能分人以事厚於貨者不能分人以祿墨子尚賢中垂其股肱之力而不相勞來也腐臭餘財而不相分資也隠匿良道而不相教訓也墨子尚賢下盜愛其室不愛其異室故竊異室以利其室賊愛其身不愛人故賊人以利其身此何也皆起于相愛雖至大夫之相亂家諸侯之相攻國者亦然墨子兼愛上次四動之丘陵失澤朋測曰動之丘陵失下危也太𤣥經第二十次七唫于體黄肉毁測曰唫于體骨肉傷也太𤣥經第五唫譬如多人共一妙寶有人獨用豈得自在本緣經月光王品譬如賈客遠到他方雖持雜物多所饒益然非憐愍衆生以自求利故百論卷上守八喻林卷五十一
