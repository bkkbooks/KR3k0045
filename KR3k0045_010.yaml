body:
  text: 喻林卷十明徐元太撰人事門八審具以中信而濟難若乘虛舟以涉川也周易正義中孚故海之大也而魚何為可得山之深也虎豹貔貅何為可服汲冡周書周祝解魴也鰥也魚之易制者然而敝敗之笱不能制鄭氏箋詩敝笱子謂仲弓曰犂牛之子騂且角雖欲勿用山川其舍諸論語雍也韓子稱長袖善舞多錢善賈信哉是言史記范睢傳論服絺綌之涼者不苦盛暑之鬱燠襲貂狐之暖者不憂至寒之悽愴何則有其具者易其僃賢人君子亦聖王之所以易海內也前漢書王褒傳皆言家口實如客至之有設也南齊書王僧虔傳豈有庖厨不修而欲延大賓者哉南齊書王僧虔傳桓公在位管仲隰朋見立有間有二鴻飛而過之桓公歎曰仲父今彼鴻鵠有時而南有時而北有時而往有時而來四方之逺所欲至而至焉非唯有羽翼之故是以能通其意於天下乎管子霸形地之不可食者山之無木者百而當一涸澤百而當一地之無草木者百而當一樊棘雜處民不得入焉百而當一藪鎌纒得入焉九而當一蔓山其木可以為材可以為軸斤斧得入焉九而當一泛山其木可以為棺可以為車斤斧得入焉十而當一流水網罟得入焉五而當一林其木可以為棺可以為車斤斧得入焉五而當一澤網罟得入焉五而當一管子乘馬黃鵠之飛日行千里有必飛之僃也虎豹熊羆而無敵有必勝之理也商子畫䇿談説之士資在於口處士資在於意勇士資在於氣技藝之士資在於手商賈之士資在於身商子算地田鮪教其子田章曰主賣官爵臣賣智力故自恃無恃人韓非子外儲説右今有羿逢蒙繁弱於此而無弦則必不能中也中非徒弦也而弦為弓中之具也夫立功名亦有具不得其具賢雖過湯武則勞而無功矣吕氏春秋具僃故魚不可以無餌釣也獸不可以虛器召也淮南子説山訓耀蟬者務在明其火釣魚者務在芳其餌明其火者所以耀而致之也芳其餌者所以誘而利之也欲致魚者先通水欲致鳥者先樹木水積而魚聚木茂而鳥集好弋者先具繳與矰好魚者先具罟與罘未有無其具而得其利淮南子説山訓修其翰翼隨風向北焦氏易林坤之謙水長無船不見欣歡焦氏易林屯之蹇鳥飛無翼兔走折足焦氏易林蒙之漸乘筏度河雖深不殆焦氏易林同人之巽手拙不便不能伐檀車無軸轅行者苦難焦氏易林臨之蹇膠車木馬不利逺賈焦氏易林觀之晉錫刀不入魴鯉腥臊焦氏易林無妄之艮天女推床不成文章南箕無舌飯多沙粳焦氏易林大畜之益水深無桴蹇難何遊焦氏易林頥之萃漏巵盛酒無以養老焦氏易林離之師千仞之牆不得入門金籠鐵疏利以避兵焦氏易林咸之大畜亡錐失斧公輸無輔焦氏易林萃之訟縫衣失針𥜗袴弗能焦氏易林歸妹之賁執斧破薪使媒求婦焦氏易林小過之益精學不求貴貴自至矣力作不求富富自到矣王充論衡命祿篇抱布貿絲交易有亡各得所願儒生抱道貿祿文吏無所抱何用貿易王充論衡量知篇農商殊業所畜之貨貨不可同計其精粗量其多少其出溢者名曰富人富人在世鄉里願之夫先王之道非徒農商之貨也其為長吏立功致化非徒富多出溢之榮也王充論衡量知篇手中無錢之市使貨主問曰錢何在對曰無錢貨主必不與也夫胸中不學猶手中無錢也欲人君任使之百姓信嚮之奈何也王充論衡量知篇螫蟲之觸負其有毒也戰士能勇倚其有僃也是以鋒鋭甲堅則人輕戰武矦心書輕戰蓋弋鳥者矯其矢釣魚者理其綸曹子建司馬仲達書設有數人年紀老壯既同服食厚薄又等俱造沙漠之地並冒嚴寒之夜素雪墜於上玄氷結於下寒風摧條而宵駭咳唾凝呀於脣吻則其中將有獨中冷者而不必盡病也非冷氣之有偏蓋人體有不耐者耳抱朴子內篇極言循塗雖坦而足無騏驎六虛雖曠而翼非大鵬抱朴子外篇目敘眇者無以與乎眉目之好夫刖者不自為假文屨莊子音義逍遙遊水滿坎而後進人學博而後仕掦子法言注學行篇如涉川兮無梁若陵虛兮失翼文選寡婦賦臨川靡芳餌何為守空坻文選傅咸贈何邵王濟詩有斧無柯何以自濟文選陳琳檄吳將校文今有鉛錫之鋌雖歐冶百鍊猶不如瓦刀有駑駘之馬雖造父駕之終不及飛兔絶景質鈍故也意林物理論隋寶産漢濱摛此夜光真不待卞和顯自為命世珍藝文類聚人部贈答詩余音非九韶何以儀鳯皇新城非芝圃曷由殖蘭芳藝文類聚人部贈答詩鐡冠之數曰一女必有一針一刀耕者必有一耒一耜一銚行服連軺輂者必有一斤一鋸一錐一鑿玉海食貨鹽鐡猶如真金三種試之乃知堪燒打磨元陽妙經卷二譬如車有雙輪則有載用鳥有兩翼堪任飛行元陽妙經卷二如車無輪不堪運載元陽妙經卷一如欲濟水善護舟航船筏之具如臨路人善護騎乘如田夫布種善念糞穢元陽妙經卷八如諸種子火所不燒鳥所不食則得增長元陽妙經卷九譬如執持壞瓶詣河取水若池若井若泉若渠當知此瓶不久爛壞何以故是瓶未熟不堪盛水終歸地故波羅蜜多經四百四十四如人欲度險惡曠野若不攝受資糧器具不能達到安樂國王於其中道遭苦失命波羅蜜多經四百四十四如大長者欲過險難必假多伴飲食資糧皆悉具足爾乃能度波羅蜜多經卷五百六十八大王頗曾見乘驢堪入陳唯見乘象馬鬭戰便得勝大寶積經卷九十九大王頗曾見小筏度大海唯乘彼大舶能度無量衆大寶積經卷九十九如人善乘船入於大海中雖行深水難而不為所害大方廣佛華嚴經卷二十六譬如健士以那羅延金剛利箭射堅密鎧直過無礙大方廣佛華嚴經卷五十九譬如金剛非劣惡器及以破器所能容持唯除全具上妙之器大方廣佛華嚴經卷七十八猶欲度水而不求船不能橫越思惟其便若得板木乘騎其上可以得度阿差末菩薩經卷四又如膏車欲使通利以用運載有所至到長阿含經卷十三猶有一人被七肘衣或八肘衣從頭至足於此身體無處不覆中阿含經卷二十譬如有人持器取水一器完堅二者穿壞若用受水完者恆滿穿者漏盡中本起經來學品猶如猛將身被重鎧手無劍者則不能剋定強敵有劍無鎧者亦復不能降彼強敵若使猛將身被重鎧手執利劍前後固險與賊共戰必有所辦則無狐疑出曜經六戒品譬如遮迦越王車馬人從濿渡水令水濁惡過渡以去王渴欲得水飲王有清水珠置水中水即為清王便得清水飲之那先比丘經卷上如人有手入寶山中自在能取若無手不能有所取大智度論卷一譬如小藥師以一種藥二種藥不具足故不能差重病大藥師輩具足衆藥能差重病大智度論卷三譬如完器盛水水不漏散大智度論卷五譬如為諸貧人欲令大富當僃種種財物一切僃具然後乃能濟諸貧者又復如人欲廣治諸病當僃種種衆藥然後能治大智度論卷七譬如好染一入便成大智度論卷二十二譬如釋提桓因手執金剛破阿修羅軍大智度論卷四十七如商人農夫隨所適國土所須之物地之所宜種子勤修求辦事無不成大智度論卷四十九如鳥子自知毛羽具足爾乃可飛大智度論卷八十三有人雖疾而智力不強如馬雖疾而力弱有人雖有強智力而不利譬如鈍斧雖有大力不能破物大智度論卷八十三如人乘七寶船牢治行具上有種種好食有好導師遇隨意好風則為好度若人乘草筏度恐怖不名好度大智度論卷八十四如完牢之器所受不漏大智度論卷九十六如麻縷不成絹粗縷無細布中論卷一如小草入火則燒盡若真金入火能堪忍無失十住毗婆沙論卷十五蒜不受熏以其臭故沈麝等亦不受熏以其香故若物不為香臭所記則能受熏攝大乘論釋卷二譬如鳥僃二翼一舉萬尋車足兩輪一馳千里高僧傳十三梁釋法悅今淺行者處不淨國恐其行淺功微未能自拔譬如少湯投之大水亦如少力之人入水救溺未能兼濟則與彼俱淪羅什譯維摩詰經香積福品審謀如彼築室於道謀是用不潰於成詩小雅小旻君臣之謀事如此與不行而坐圖逺近是於道路無進於跬步何以異乎鄭氏箋詩小旻淺近之人不可謀道猶路人不可謀室毛詩正義小旻謀慮茍當則婦人亦成國任姒是也謀慮理乖雖丈夫亦傾城宰嚭無極是也毛詩正義瞻卬卜人曰筮短龜長不如從長左傳僖公四年商書曰三人占從二人衆故也武子曰善鈞從衆左傳成公六年如是可矣何必瘠魯以肥把左傳襄公二十九年暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也論語述而種黍得黍種稷得稷惟在所樹禍福亦猶是也若不禮重耳則當除之不爾則宜厚之如此不疑是為德基國語解晉四叔詹諫鄭且與賊居不知其禍外復求怨徼幸他國猶治救瘑古禾切疥而棄心腹之疾發當死矣瘑疥皮膚之疾不足患也今齊陵遲千里之外更歷楚趙之界齊為疾其疥耳越之為病乃心腹也不發則傷動則有死願大王定越而後圖齊吳越春秋夫差內傳越在心腹之疾不前除其疾今信浮辭偽詐而貪齊破齊譬由磐石之田無立其苗也願王釋齊而前越吳越春秋夫差內傳張儀説楚王曰且夫為從者無以異於驅羣羊而攻猛虎也夫虎之與羊不格明矣今大王不與猛虎而與羣羊竊以為大王之計過矣戰國䇿楚懷王陳軫曰王不聞夫管與之説乎有兩虎爭人而鬭管莊子將刺之管與止之曰虎者戾蟲人者甘餌也今兩虎爭人而鬭小者必死大者必傷子待傷虎而刺之則是一舉而兼兩虎也無刺一虎之勞而有刺兩虎之名齊楚今戰戰必敗敗王起兵救之有救齊之利而無伐楚之害戰國策秦惠文君醫扁鵲見秦武王武王示之病扁鵲請除左右曰君之病在耳之前目之下除之未必已也將使耳不聽目不明君以告扁鵲扁鵲怒而投其石曰君與知之者謀之而與不知者敗之使此知秦國之政也則君一舉而亡國矣戰國䇿秦武王黃歇使於秦説昭王曰天下莫強於秦楚今聞大王欲伐楚此猶兩虎相鬭而駑犬受其敝不如善楚臣聞之物至而反冬夏是也致至而危纍棊是也戰國䇿秦昭襄王夫取三晉之腸胃與出兵而懼其不反也孰利戰國策秦昭襄王此所謂藉賊兵而齎盜食者也王不如逺交而近攻得寸則王之寸得尺亦王之尺也戰國策秦昭襄王趙且伐燕蘇代為燕謂衛王曰今者臣來過易水蚌方出曝而鷸啄其肉蚌合而箝其喙鷸曰今日不雨明日不雨即有死蚌蚌亦謂鷸曰今日不出明日不出即有死鷸兩者不肯相舍漁者得而并擒之今趙且伐燕燕趙久相攻以敝大衆臣恐強秦之為漁父也戰國䇿燕昭王必若所欲為危於絫卵難於上天變所欲為易於反掌安於泰山前漢書枚乘傳臣聞揚湯止沸莫若去薪潰癰雖痛勝於內食後漢書董卓傳當為秋霜無為檻羊後漢書廣陵思王荆傳夫邉垂之患手足之蚧搔中國之困胸背之瘭疽方今郡縣盜賊尚不能禁况此醜虜而可伏乎後漢書烏桓鮮卑傳揚湯止沸不如滅火去薪潰癰雖痛勝如養肉及溺呼船悔之無及魏志董卓傳注諺曰射幸數跌不如審發是故智者不為小利移目不為意似改步時可而後動數合而後舉蜀志譙周傳譬猶棊劫相持爭行先後若一行非當或成彼利誠應捨小營大先保封域周書熊安生儒林傳天道無殃不可先倡人道無災不可先謀必見天殃又見人災乃可以謀太公六韜武韜夫運謀者天地之虛滿也合離也春秋冬夏之勝也管子侈靡愛子者慈於子重生者慈於身貴功者慈於事慈母之於弱子也務致其福務致其福則事除其禍事除其禍則思慮熟思慮熟則得事理得事理則必成功必成功則其行之也不疑不疑之謂勇聖人之於萬事也盡如慈母之為弱子慮也韓非子解老當今之世為人主忠計也必無使燕王説魯人無使近世慕賢於古無思越人以救中國溺者如此則上下親內功立外名成韓非子用人虞慶將為屋匠人曰材生而塗濡夫材生則橈塗濡則重以橈任重今雖成久必壞虞慶曰材乾則直塗乾則輕今誠得乾日以輕直雖久必不壞匠人詘作之成有間屋果壞韓非子外儲説左上南宫敬子問顔涿聚曰季孫養孔子之徒所朝服與坐者以十數而遇賊何也曰昔周成王近優侏儒以逞其意而與君子斷事是能成其欲於天下今季孫養孔子之徒所朝服而與坐者以十數而與優侏儒斷事是以遇賊故曰不在所與居在所與謀也韓非子外儲説左下以手擊牛之背可以殺其上虻而不能破蝨喻今將兵方欲滅秦不可盡力與章邯即戰或未能擒徒費力也前漢書注項籍傳理國譬如理家耕當使奴織當問婢陛下欲伐國而與白面書生輩謀之何由濟藝文類聚人部奴譬如白鶴欲取魚時籌量進止不失期會知其可得即便取之終不空也大智度論卷九十四夫欲止流莫若高堰欲伐樹者當盡根源出曜經三愛品猶農夫之播殖匠者之構室將擇楨材以求堂宇之飾精簡種子以規嘉穀之實故稼穡必樹於沃壤之地卜居要選於爽塏之處𢎞明集釋駮論昔齊人好獵家貧犬瘠窮年馳騁不獲一獸於是退而歸耕令吾子有知歸耕得算𢎞明集駮夷夏論審察采苓采苓者皆言我采此苓於首陽之巔然首陽之巔信有苓矣然而今人采之者未必於首陽而人必信之以其事有似也事雖似而實非以興天下之事亦有似之而實非者君何得聞人之讒而輒信之乎毛詩正義采苓以人為鏡見成敗以水為鏡見形而已書曰人無於水鑑當於民鑑國語解吳申胥諫夫明者獨見不惑於朱紫聽者獨聞不謬於清濁故離朱不為巧眩移目師曠不為新聲易耳後漢書陳元列傳玉石同體而異名忠佞異名而同理求之於同則得其所以異尋之於異則失其所以同北史高閭傳必見其陽又見其隂乃知其心必見其外又見其內乃知其意必見其疏又見其親乃知其情太公六韜武韜今有美麗佼好之人人之所同悅也然而蒙之以倛首則見之者棄之而走更之以輕紈阿裼焉則向日之走者留行矣甚矣世之人注其目於視也目奚足信子華子大道故鄭人之取玉也載司南之車為其不惑也夫度材量能揣情者亦事之司南也故同情而俱相親者其俱成者也同欲而相疏者其偏害者也同惡而相親者其俱害者也同惡而相疏者偏害者也鬼谷子伯樂教二人相踶馬相與之簡子廏觀馬一人舉踶馬其一人從後而循之三撫其尻而馬不踶此自以為失相其一人曰子非失相也此其為馬也踒肩而腫膝夫踶馬也者舉後而任前腫膝不可任也故後不舉子巧於相踶馬而拙於任腫膝夫事有所必歸而以有所腫膝而不任智者之所獨知也韓非子説林田伯鼎好士而存其君白公好士而亂荆其好士則同其所以為則異公孫友自刖而尊百里竪刁自宫而諂桓公其自刑則同其所以自刑之為則異韓非子説林故人主之於國事也皆不達乎工匠之構屋張弓也然而士窮乎范且虞慶者為虛辭其無用而勝實事其無易而窮也韓非子外儲説左上宋人有請為燕王以棘刺之端為母猴者必三月齋然後能觀之燕王因以三乘養之右御冶公言王曰臣聞人主無十日不燕之齋今知王不能久齋以觀無用之器也故以三月為期凡刻削者以其所以削必小今臣冶人也無以為之削此不然物也王必察之王因囚而問之果妄乃殺之冶人謂王曰計無度量言談之士多棘刺之説也韓非子外儲説左上晉平公鑄為大鍾使工聽之皆以為調矣師曠曰不調請更鑄之平公曰工皆為調矣師曠曰後世有知音者將知鐘之不調也臣竊為君耻之至於師涓而果知鐘之不調也是師曠欲善調鐘以為後世之知音者也吕氏春秋長見使治亂存亡若髙山之與深溪若白堊之與黑漆則無所用智雖愚猶可矣且治亂存亡則不然如可知如可不知如可見如可不見故智士賢者相與積心愁慮以求之猶尚有管叔蔡叔之事與東夷八國不聽之謀故治亂存亡其始若秋毫察其秋毫則大物不過矣吕氏春秋察微古之善相馬者寒風是相口齒麻朝相頰子女厲相目衛忌相􅧋許鄙相􅪉投伐相褐胸脅管青相膹吻陳悲相股腳秦牙相前贊君相後凡此十人者皆天下之良工也其所以相者不同見馬之一徵也而知節之髙卑足之滑易材之堅脆能之長短非獨相馬然也人亦有徵事與國皆有徵聖人上知千歲下知千歲非意之也吕氏春秋觀表疑似之迹不可不察察之必於其人也舜為御堯為左禹為右入於澤而問牧童入於水而問漁師奚故也其知之審也夫人子之相似者其母常識之知之審也吕氏春秋疑似夫得言不可以不審數傳而白為黑黑為白故狗似玃玃似母猴母猴似人人之與狗則逺矣此愚者之所以大過也聞而審則為福矣聞而不審不若無聞矣吕氏春秋察傳善言古者合之於今能術逺者考之於近陸子術事從朝視夕者移從枉凖直者虧聖人之偶物也若以鏡視形曲得其情淮南子説林訓異音者不可聽以一律異形者不可合於一體淮南子説林訓聲有順逆必有清濁形有善惡必有曲直故聖人聞其聲則别其清濁見其形則異其曲直於濁之中必知其清於清之中必知其濁於曲之中必知其直於直之中必知其曲春秋繁露保位權夫泰山之為大弗察弗見而况微眇者乎春秋繁露竹林回曰今者有哭者其音甚悲非徒哭死又哭生離者孔子曰何以知之回曰似完山之鳥孔子曰何如曰完山之鳥生四子羽翼已成乃離四海哀鳴送之為是往而不復返也孔子使人問哭者哭者曰父死家貧賣子以葬之將與其别也説苑辨物夫小快害義小慧害道小辨害治説苑談叢或問蒼蠅紅紫曰明視問鄭衛之似曰聰聽或曰朱曠不世如之何曰亦精之而已矣楊子吳子篇次二錯於靈蓍焯於龜資出泥入脂測曰錯蓍焯龜比光道也太玄經第一童故穹窮之似藁本蛇床之類薇蕪碧盧之亂美玉非猗頓不能别也暗主之於名實亦不能知也吕氏春秋審分解察疑之政謂察朱紫之色别宫啇之音故紅紫亂朱色淫聲亂正樂武侯十六䇿察疑凡相溷者或教之薰隧或令之負豕二言之於除臰汙也孰是孰非王充論衡寒溫篇勇夫強國勇夫難近好女悅心好女難畜辨士快意辨士難信王充論衡言毒篇湖池非一廣狹同也樹竿測之深淺可度王充論衡須頌篇三年盲子卒見父母不察察相識安肯悅喜王充論衡自紀篇文王四乳然則世亦有四乳者此則駑馬一毛似驥耳曹子建相論彼有外名者未必有內行有陽譽者不能解隂罪若以薺菱之生死而疑隂陽之大氣亦不足以致逺也抱朴子內篇微旨貴逺賤近有自來矣故新劍以詐刻加價弊方以偽題見寶也是以古書雖質朴而俗儒謂之墮於天也今文雖金玉而常人同之於瓦礫也抱朴子外篇鈞世膚表或不可以論中望貌或不可以核能仲尼似喪家之狗公旦類朴斫之材咎繇面如蒙箕伊尹形如稿骸及龍陽宋朝猶土偶之冠夜光籍孺董鄧猶錦紈之裏塵埃也抱朴子外篇博喻落落之玉或亂乎石碌碌之石時似乎玉文心雕龍總術咸池不齊度於蛙咬而衆聽者或疑能不惑者其唯子野乎文選東京賦世之所遺未為非寶主之所珍不必適治文選陸機演連珠屠者割肉則知牛長少弓人𠢐筋則知牛長少雕人裁骨則知牛長少各有辨焉意林尸子遂使甘霜受電之心有同於飾請皎日大河之志匪殊於貌謁藝文類聚封爵部遜讓封表夫萍與菱之浮相似也菱植根萍隨波是以堯舜歎巧言亂德仲尼惡紫之奪朱藝文類聚草部萍論卷葹一作施不死誰必有心甘蕉自長故知無節是以螺蚌得路恐異驪淵雀鼠同歸應非丹冗文苑英華庾信連珠顔回問孔子曰小人之言有同乎君子者不可不察也子曰君子以行言小人以舌言太平御覽人事部言語舄九寫而為烏虎三寫而為帝言書之轉易如此埤雅品物門鵲赤欲如白裹朱不欲如赫青欲如蒼璧之澤不欲如藍埤雅卉物門藍管子曰無儀法程式蜚搖而無所定謂之蜚蓬之問蜚蓬之問明主不聽也埤雅卉物門蓬篤論曰日給之華似奈奈實而日給虛虛偽之與真實相似也埤雅卉物門木槿里語曰斫檀不諦得莢蒾莢蒾尚可得駮馬爾雅翼六駮容色見上下左右各在其要其色見淺者湯液主治十日已其見深者必齊主治二十一日已其見大深者醪酒主治百日已色夭靣脫不治百日盡已黃帝素問內經玉版論要篇夫年長則求之於府年少則求之於經年壯則求之於藏黃帝素問內經示從容論黃帝問曰病有標本刺有逆從奈何岐伯對曰凡刺之方必别隂陽前後相應逆從得施標本相移故曰有其在標而求之於標有其在本而求之於本有其在本而求之於標有其在標而求之於本故治有取標而得者有取本而得者有逆取而得者有從取而得者故知逆與從正行無問知標本者萬舉萬當不知標本者是謂妄行黃帝素問內經標本病傳論夫平心脈來纍纍如連珠如循琅玕曰心平夏以胃氣為本病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鈎曰心死平肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本病肺脈來不止不下如循雞羽曰肺病死肺脈來如物之浮如風吹毛曰肺死平肝脈來耎弱招招如揭長竿末稍曰肝平春以胃氣為本病肝脈來盈實而滑如循長竿曰肝病死肝脈來急益徑如新張弓弦曰肝死平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本病脾脈來實而盈數如雞舉足曰脾病死脾脈來鋭堅如鳥之啄如鳥之矩如屋之漏如水之流曰脾死平腎脈來喘喘纍纍如鈎按之而堅曰腎平冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈石曰腎死黃帝素問內經平人氣象論合而察之切而驗之見而得之若清水明鏡之不失其形也黃帝素問靈樞經外揣行水者必待天溫氷釋凍解而水可行地可穿也人脈猶是也治厥者必先尉調和其經掌與腋肘與腳項與脊以調之火氣以通血脈乃行然後視其病脈淖澤者刺而平之堅緊者破而散之氣下乃止此所謂以解結者也黃帝素問靈樞經刺節真邪夫日月之出入也同明人之生死也同形春秋之分也同利玄聖之與野人也同容通者之與閉塞也同事道士之與赤子也同功凡此數者中異而外同非有聖人莫之能明道德經指歸卷十一又如狂人雖説空花論其微妙終不可信大乘妙林經如巧幻師在四衢道化作女人忽現懷孕尋見生子其子俄爾便復命終彼女於子生時有喜死有憂耶波羅蜜多經五百八十一譬如甘蔗其味雖一出白石蜜為福德人出黑石蜜為薄德人大方等大果經十八設有重貨若復空行欲得責稅故宜難詰阿差末菩薩經卷一譬如故瓶盛淨不淨而蓋其口不見其裏發口則現也修行道地經慈品如水乳合猶尚可别修行道地經行空品譬如月十四日衆人生疑若滿若不滿大智度論卷六譬如牛乳驢乳其色雖同牛乳抨則成酥驢乳抨則成糞大智度論卷十八譬如良醫觀其病相審定知其可活則治之不可活者則捨之大智度論卷八十八夫聞清商而謂之角非彈弦之過聽者之不聰矣見和璧而名之石非璧之賤也視者之不明矣𢎞明集牟子理惑論猶靈鳯以容德希覩蚡鼠以醜懼潛形雖隱質事同媸妍異矣辨正論卷六欲使珉玉異價涇渭分流高僧傳八釋寶亮良由雪山之藥真偽頗辨庵羅之果生熟難分法苑珠林卷五十八喻林卷十
