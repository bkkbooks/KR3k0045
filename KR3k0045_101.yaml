body:
  text: 喻林卷一百一眀徐元太撰政治門六均調玉鉉在上剛柔節也易鼎有兎無所拘制爰爰然而緩有雉離於羅網之中而急此二者緩急之不均以喻王之為政有所聽縱者則緩有所躁蹙者則急此言王為政用心之不均也毛詩正義兎爰山既高峻又以草木平滿其傍倚之甽谷使之齊均以興尹氏既為尊顯亦當以政敎養育其天下民庶使之齊均毛詩正義節南山弓一時須張一時須弛喻民一時須勞一時須逸勞逸相參若調之以道化之以理張弛以時禮記正義雜記下不易之地家百畮一易之地家二百畮再易之地家三百畮周禮地官大司徒柞氏掌攻草木及林麓夏日至令刋陽木而火之冬日至令剝陰木而水之若欲其化也則春秋變其水火周禮秋官柞氏冬獻狼夏獻麋狼膏聚麋膏散聚則温散則涼以救時之苦也鄭氏註周禮天官獸人凡和春多酸夏多苦秋多辛冬多鹹調以滑甘各尚其時味而甘以成之猶水火金木之載於土鄭氏註周禮天官食醫病由氣勝負而生攻其贏養其不足者五味五穀五藥也鄭氏註周禮天官疾醫不易之地歲種之地羙故家百畞一易之地休一歲乃復種也薄故家二百畞再易之地休二歲乃復種故家三百畞鄭氏註周禮地官大司徒陽木生山南者陰木生山北者冬斬陽夏斬陰堅濡調鄭氏註周禮地官山虞神久用則竭形太勞則敝不可以久勞也神不用則鈍形不用則痿不可以久逸也固當勞逸更遞以宣散其氣春秋正義昭公元年土氣和而物生之國家和而民附之若以水益水盡乃棄之無所成也國語解鄭史伯對桓公夫為政猶張琴瑟大絃急者小絃絶後漢書陳寵列傳夫熊經鳥伸雖延歷之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏盖為國之法有似理身平則致養疾則攻焉夫刑罰者治亂之藥石也德敎者興平之粱肉也夫以德敎除殘是以粱肉理疾也以刑罰理平是以藥石供養也後漢書崔寔列傳夫綂天下之重如臣乘惡馬而持矛也急之則慮自傷緩之則懼其失是以馬馳而不制也晉書李雄傳善御者必識六轡盈縮之勢善政者必審官方控帶之宜晉書張華傳式張琴瑟且調宫羽魏書竇瑗良吏傳琴瑟在於必和更張求其適調魏書蕭寳夤傳天有陰陽風雨晦明之氣人有喜怒哀樂好惡之情節而行之則和平調理專壹其情則溺而生疢隋書經籍三志造父善馭馬者也善視其馬節其飲食度量馬力審其足走故能取逺道而馬不罷明主猶造父也善治其民度量其力審其技能故立功而民不困傷故術者造父之所以取逺道也主之所以立功名也管子形勢解其冬厚則夏熱其陽厚則陰寒故知虛滿之所在以為正令已管子侈靡譬猶師曠之調五音也所推形上下無常尺寸以度而靡不中者故通於樂之情者能作音有本主於中而知規矩鈎繩之所用者能治人文子上禮天地之間若虛而實人常漸是澹澹之中而以治亂之氣與之流通相殽饌也故人氣調和而天地之化羙殽於惡而味敗春秋繁露如天之為扁鵲撫息脉而知疾所由生陽氣盛則損乏而調陰寒氣勝則損乏而調陽是以氣脉調和而邪氣無所留矣夫拙醫不知脉理之腠血氣之分妄刺而無益於疾傷肌膚而已矣今欲損有餘補不足富者益富貧者益貧矣嚴法任刑欲以禁暴止姦而姦猶不止意者非扁鵲之用鍼石故衆人未得其職也鹽鐵論輕重甄陶天下者其在和乎剛則甈柔則坯龍之濳亢不獲其中矣是以過中則惕不及中則躍其近於中乎聖人之道譬猶日之中矣不及則未過則􅉴揚子先知竈陰雖沃而灑之陽猶埶而龢之太𤣥經第四竈且扁鵲之治病也審閉結而通用虚者補之實者瀉之故病愈自名顯伊尹之佐湯也設輕重而通有無損積餘以補不足故殷治而君尊濳夫論實邊琴瑟絃有數急柱有前却故調事亦如之也淮南子汜論訓解釀酒於罌烹肉於鼎皆欲其氣味調得也時或鹹苦酸淡不應口者猶人勺藥失其和也夫政治之有灾異也猶烹釀之有惡味也王充論衡譴告篇狄牙之調味也酸則沃之以水淡則加之以鹹水火相變易故膳無鹹淡之失也今刑罰失實不為異氣以變其過而又為寒於寒為温於温此猶憎酸而沃之以鹹惡淡而灌之以水也王充論衡譴告篇寒温之疾非藥不愈黍谷之氣非律不調王充論衡寒温篇今熯薪燃釜火猛則湯熱火㣲則湯冷夫政猶火寒温猶熱冷也王充論衡寒温篇夫德不可獨任以治國力不可直任以御敵也韓子之術不養德偃王之操不任力二者偏駮各有不足偃王有無力之禍知韓子必有無德之患王充論衡非韓篇宰和得節羙味渝時而不敗太𤣥經第四竈解政之於人猶琴瑟也大絃急則小絃絶小絃絶大絃間矣劉子愛民陰陽調天地和也剛柔均人之和也陰陽不和則水旱失節剛柔不均則强懦乖政水旱失節則歲敗强弱乖政則身亡劉子和性夫陶者失剛柔之和則不成器為政失寛猛之中則不成治揚子法言註先知篇柷敔希聲以諧金石之和鼙鼓踈擊以節繁絃之契是以經治必宣其通圗物恒審其㑹文選陸機演連珠且濟時拯世之術豈必體堯蹈舜然後乃理哉期於補䘺決壞枝柱邪傾隨形裁割要措斯世於安寧之域而已廣文選崔子真政論夫金木水火以剛柔相濟然後克得其和能為民用若使金與金相迕火與火相爛則燋然摧折俱不得其所也廣文選王仲宣爲劉表與袁尚書書聖人制民也如髙下制水如燥濕制火意林商君書春風暢物秋霜肅殺同則相濟異若胡越藝文類聚刑法部刑法賦周失之舒秦失之急故周衰無寒歲秦末無燠年事文類聚水高山之巔無樹深海之淵無氷剛太燥温太柔也太平御覽地部氷猶如和羮調食魚肉葱豉各有所宜共相宣發也本草藥有君臣佐使以相宣攝合和宜用一君二臣三佐五使又可一君三臣九佐使也本草一卷凡陰陽之要陽密乃固兩者不和若春無秋若冬無夏因而和之是謂聖度黄帝素問内經生氣通天論岐伯曰必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之必先去其血脉而後調之無問其病以平為期黄帝素問内經三部九候論邪氣反勝治之柰何岐伯曰風司于地清反勝之治以酸温佐以苦甘以辛平之熱司于地寒反勝之治以甘熱佐以苦辛以鹹平之濕司于地熱反勝之治以苦冷佐以鹹甘以苦平之火司于地寒反勝之治以甘熱佐以苦辛以鹹平之燥司于地熱反勝之治以平寒佐以苦甘以酸平之以和為利寒司于地熱反勝之治以鹹冷佐以甘辛以苦平之黄帝素問内經至真要大論篇脉急者尺之皮膚亦急脉緩者尺之皮膚亦緩脉小者尺之皮膚亦減而少氣脉大者尺之皮膚亦賁而起脉滑者尺之皮膚亦滑脉濇者尺之皮膚亦濇凡此變者有㣲有甚故善調尺者不待於寸善調脉者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六黄帝素問靈樞經邪氣藏府病形髙者抑之下者舉之有餘者折之不足者補之佐以所利和以所宜必安其主客適其寒溫同者逆之異者從之黄帝素問内經至眞要大論篇治諸勝復寒者熱之熱者寒之温者清之清者温之散者收之抑者散之燥者潤之急者緩之堅者耎之脆者堅之衰者補之强者瀉之各安其氣必清必靜則病氣衰去歸其所宗此治之大體也黄帝素問内經至眞要大論篇夫弓人之為弓也既煞既生既翕既張制以規矩督以凖繩弦髙急者寛而緩之弦弛下者攝而上之其有餘者削而損之其不足者補而益之弦質相任上下相權平正為主調和為常故弓可抨而矢可行也道德經指歸卷十三夫冬溫夏涼不失四時之和所以適身也養性延命錄教誡篇譬如車一輪强一輪弱則不安穩大智度論卷十七譬如服藥少則病不除多則增其患應病投藥令不增減則能愈病大智度論卷三十一譬如乘馬疾則制之遲則鞭之大智度論卷三十五漸舉若升高必自下若陟遐必自邇書太甲下善政有漸如登髙升逺必用下近為始然後終致髙逺孔氏傳書太甲下政月上弦而就盈日始出而就明鄭氏箋詩天保以㒺罟喻為政張之為綱理之為紀鄭氏箋詩棫樸農夫種苗既畢勤力耘鋤去草養苖則苗善矣聖王以善道教民既畢又須講說學習以勸課之存是去非則善也禮記正義禮運覆蕢創元天之基䟽涓開環海之宅彼既有漸此亦同符晉書武昭王列傳合抱之木生於毫末九層之臺起於累土千里之行始於足下老子守㣲十圍之木始於把百仞之臺始於下此天之道也聖人法之文子道德長梧封人問子牢曰君為政焉勿鹵莽治民焉勿滅裂昔予為禾耕而鹵莽之則其實亦鹵莽而報予芸而滅裂之其實亦滅裂而報予予來年變齊深其耕而熟耰之其禾繁以滋予終年厭餐莊子聞之曰今人之治其形理其心多有似封人之所謂莊子則陽財物貨寳以大為重政教功名反是能積㣲者速成荀子彊國糟糠不飽者不務粱肉短褐不完者不待文繡夫治世之事急者不得則緩者非所務也韓非子五蠧次五從水之科滿測曰從水滿科不自越也太𤣥經第二從且夫治世者若登丘矣必先躡其卑者然後乃得履其高是故先致治國然後三王之政乃可施也道齊三王然後五帝之化乃可行也道齊五帝然後三皇之道乃可從也濳夫論衰刑譬如白月初出漸明至十五日光明圓滿流照十方亦如海潮月初漸起至十五日大起潮波洄澓萬里法王政化亦復如是大方廣佛華嚴經卷十二寛大雷雨作解君子以赦過宥罪易解古者刑不上大夫盖以為摘巢毁卵則鳳凰不翔刳胎焚夭則麒麟不至刑之則恐誤刑賢者死者不可復生刑者不可復屬故有罪放之而已所以尊賢者之類也何休解公羊宣公元年鞭朴之子不從父之教刑戮之民不從君之政言疾之難行故君子不急斷不意使以為亂源孔子集語上漢興破觚而為圜斵雕而為朴網漏於吞舟之魚而吏治蒸蒸不至於姦黎民艾安史記酷吏傳昔韓盧之恥莵也上觀下獲不甚多殺願次卿少緩誅罰思行此術前漢書酷吏傳備曰今指與吾為水火者曹操也操以急吾以寛操以暴吾以仁操以譎吾以忠蜀志龎統傳註御之良者不在於煩策政之善者無取於嚴刑隋書史臣酷吏傳夫以璵璠之玭而棄其璞以一人之罪而兼其衆則天下無美寳信士也鹽鐡論晁錯霜雪晩至五穀猶成雹霧夏隕萬物皆傷由此觀之嚴刑以治國猶任秋冬以成穀也鹽鐡論論菑治民者若大匠之斵斧斤而行之中繩則止鹽鐡論大論髙牆狹基不可立矣嚴法峻刑不可久也鹽鐡論詔聖聞為國忠信以損怨不聞作威以防怨譬之若防川也大決所犯傷人必多吾不能救也不如小決之使導吾聞而藥之也新序雜事四譬之野獸蹴之窮地意急情盡則和聲不至而氣息不理茀然暴怒但生􅂒疵以對之也夫寛以容物物必歸焉郭子註莊人間世傷秋荼之密網惻夏日之嚴威永念畫冠緬追刑厝文選王融䇿秀才文貴平節彼南山有實其猗音醫赫赫師尹不平謂何詩小雅節南山戎車之安從後視之如摯從前視之如軒然後適調也鄭氏箋詩六月鳲鳩之鳥在桑其子飛去在梅以其平均飬之故得長大而飛去以興人君之德亦能均壹飬民飬民得成就而安樂毛詩正義鳲鳩鳲鳩之鳥在於桑木之上為巢而其子有七兮鳲鳩飬之能平均用心如壹以興人君之德飬其國人亦當平均如壹毛詩正義鳲鳩罍大似富衆缾小似貧寡然罍缾並列俱以酌之則當多酌罍而少酌缾以至於俱盡是均也猶上之賦役亦富貧並對俱以役之則當多役富而少役貧以至於俱堪亦為均也毛詩正義蓼莪罍器大缾器小酌酒者當多酌罍少酌缾不使小缾先竭今缾之既盡矣而罍尚盈滿是為酌罍者之恥也以興民有富而多丁貧而寡弱治民者當多役富少役貧不使貧者先困今貧者既困矣而富者尚饒裕是王之恥也毛詩正義蓼莪周之貢賦之道其均如砥石然周之賞罰之制其直如箭矢然是所行之政皆平而不曲也毛詩正義大東凡相敵歛錢飲酒必非忘懐之酌得而遽飲必令平徧不徧頗與周禮次序旅酬相似也禮記正義禮器臨官莫如平臨財莫如廉孔子集語上理有一準則民無覬覦法啓二門則吏多威福魏書出帝紀天下之所以平者政平也政之所以平者人平也人之所以平者心平也夫平猶權衡然加銖兩則移矣載其所不欲其為銖兩者倍矣子華子北宫子仕夫投鈎以分財投䇿以分馬非鈎策為均也使得美者不知所以美使得惡者不知所以惡此所以塞願望也慎子威德善為吏者樹德不能為吏者樹怨槩者平量者也吏者平法者也治國者不可失平也韓非子外儲説左聖人執一政以繩百姓持一槩以等萬民陸子懐慮夫繩之為度也可卷而伸也引而伸之可直而晞故聖人以身體之夫修而不横短而不窮直而不剛久而不忘者其惟繩乎故恩推則懦懦則不威嚴推則猛猛則不和愛推則縱縱則不令刑推則虐虐則無親淮南子汜論訓上循理守常曰道臨危制變曰權權之為稱譬猶權衡也衡者測邪正之形權者揆輕重之勢量有輕重則形之於衡今加一環於衡左則右蹶加之於右則左蹶唯莫之動則平正矣人之於事臨宜制變量有輕重平則行之亦猶此也劉子明權里中社平為之宰分肉食甚均里父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如此肉矣藝文類聚禮部社稷五雀六鷰飛集衡衡適平一雀一鷰飛而易處則雀重而鷰輕藝文類聚鳥部鷰聖人之治民也如髙下制水如燥濕制火也太平御覽人事部叙聖天下所以平者政平也政所以平者心平也心所以平者衡平也衡所以平者銖兩平也銖兩所以平者毫釐平也無所不均也無所不平也謂之太平太平御覽人事部公平吾心如秤不能為人作輕重太平御覽人事部心邑中人民俱出獵任安常為人分麋鹿雉兎部署老小當壯劇易處衆人皆喜曰無傷也任少卿分别平太平御覽獸部鹿帝曰善平氣何如岐伯曰謹察隂陽所在而調之以平為期正者正治反者反治黄帝素問内經至真要大論篇譬如長者六子幼稚並皆愛念無偏黨心長者在外其宅火起於其六子先後救不不也其父於子心平等故波羅蜜多經卷五百六十八又如坑坎之處水悉平等勝天王波羅蜜經執御斯心平等恒一如地水火風無有憎愛阿差末菩薩經卷一喻如秤物隨重頭下其物若輕少便即頭髙物若均平其秤亦平蘓婆呼童子經卷上譬如三種藥對治風冷熱藥不擇種姓貴賤皆能治大莊嚴經論卷八明刑天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服易豫動而明雷電合而章易噬嗑雷電噬嗑先王以明罰勅法易噬嗑六二噬膚滅鼻易噬嗑六三噬腊肉遇毒易噬嗑九四噬乾肉得黄金貞厲无咎易噬嗑山下有火賁君子以明庻政无敢折獄易賁雷電皆至豐君子以折獄致刑易豐山上有火旅君子以明慎用刑而不㽞獄易旅澤上有風中孚君子以議獄緩死易中孚刑人不服若齧其腊肉非但難齧亦更生怨咎猶噬腊而難入復遇其毒味然也周易正義噬嗑刑罰之所從生有源不務塞其源而務刑殺之是為民設䧟以賊之也大戴禮記盛德鷹祭鳥之後殺鳥不必盡食猶若人君行刑但戮之而已禮記正義月令牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣左傳宣公十一年人利其璧以璧為罪杜氏解左傳桓公十年及陷於罪然後從而刑之是㒺民也孟子梁惠王上是方四十里為阱於國中孟子梁惠下今有殺人者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰為士師則可以殺之孟子公孫丑下設陷阱者不過丈尺之間耳今王陷阱乃方四十里趙氏註孟子梁惠王上善哉為吏其用法一也思仁恕則樹德加嚴暴則樹怨公以行之其子羔乎孔子家語致思四馬方馳驚前者斬其數必正若是越難成矣越絶請糴内傳鬻棺者欲歳之疫非憎人欲殺之利在於人死也今治獄吏欲陷害人亦猶此矣前漢書刑法傳時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍與先主游觀見一男女行道謂先主曰彼人欲行淫何以不縛先主曰卿何以知之雍對曰彼有其具與欲釀者同先主大笑而原欲釀者蜀志簡雍傳亡者刖足無所用復亡盗者截手無所用復盗淫者割其勢理亦如之除惡塞源莫善於此晉書刑法志采其根牙之㣲致之於機格之上稱輕重於豪銖考輩類於參伍然後乃可以理直刑正晉書刑法志今所注皆網羅法意格之以名分使用之者執名例以審趣舍伸繩墨之直去析薪之理也晉書杜預傳剪韭復生寧失有罪抱木牢户未必非寃南齊書孔稚圭傳史臣乃遣聼已暴之辜替網觸羅之鳥南齊書劉休傳雖事異鑽皮文非刺骨猶復因兹舌杪成此筆端梁書王僧孺傳惟王建國刑以助禮猶寒暑之贊隂陽山川之通天地北齊書文苑李廣傳聖人仰視法星旁觀習坎彌縫五氣取則四時莫不先春風以播恩後秋霜而動憲隋書刑法志凡赦者小利而大害者也故久而不勝其禍毋赦者小害而大利者也故久而不勝其福故赦者犇馬之委轡毋赦者座睢之礦石也管子法法不以私恚害公法不為禽獸傷人民不為草木傷禽獸不為野草傷禾苗晏子春秋諫下夫代司殺者是謂代大匠斵夫代大匠斵者希有不傷手者矣老子制惑事敗而弗誅則游說之士孰不為用矰繳之説而徼倖其後韓非子五蠧且夫以法行刑而君為之流涕此以效仁非以為治也夫垂涕不欲刑者仁也然而不可不刑者法也先王勝其法不聽其泣則仁之不可以為治亦明矣韓非子五蠧天道至明司殺者常猶春生夏長秋收冬藏斗杓運移以節度行之人君欲代殺之是猶拙夫代大匠斵木勞而無功也河上公註老子制惑人君行刑罰猶拙人代大匠斵則方圓不得其理還自傷代天殺者失紀綱不得紀綱還受其殃也河上公註老子制惑所以貴扁鵲者非貴其隨病而調藥貴其擪息脉血知病之所從生也所以貴聖人者非貴隨罪而鑒刑也貴其知亂之所由起也淮南子恭族訓天之志常直隂空處稍取之以為助故刑者德之輔隂者陽之助也陽者歳之主也春秋繁露天辯在人一人有罪州里驚駭十家奔亡若癰疽之相濘色淫之相連一節動而百枝揺鹽鐡論申韓罷馬不畏鞭箠罷民不畏刑法雖曾而累之其亡益乎鹽鐡論詔聖今以子誅父以弟誅兄親戚小坐什伍相連若引根本之及華葉傷小指之累四體也鹽鐡論周秦人君不畜惡民農夫不畜無用之苗無用之苗苗之害也無用之民民之賊也鉏一害而衆苗成刑一惡而萬民悦雖周公孔子不能釋刑而用惡家之有鉏子器皿不居况鉏民乎民者教於愛而聽刑故刑所以正民鉏所以别苗也鹽鐡論後刑夫不傷民之不治而伐已之能得姦猶弋者覩鳥獸挂罻羅而喜也今天下之被誅者不必有管蔡之邪鄧析之偽恐苗盡而不别民欺而不治也鹽鐵論後刑民陷於㒺從而獵之以刑是猶開其闌牢發以毒矢也不盡不止鹽鐡論後刑刑之於治猶策之於御也良工不能無䇿而御有䇿而勿用聖人假法以成教教成而刑不施鹽鐡論後刑有司法之若救爛撲焦不能禁非鹽鐡論刑德網䟽則獸笑法䟽則罪漏罪漏則民放佚而輕犯禁故禁下必法鹽鐡論刑德執法者國之轡銜刑罰者國之維檝故轡銜不飭雖王良不能以致逺維檝不設雖良工不能以絶水鹽鐡論刑德父不能愛無益之子君不能愛不軌之民說苑談叢次七金剛内柔血流於田測曰金剛内柔法太傷也太𤣥經第三疆次五大腹決其股脱君子有斷小人以活測曰大腹決脫斷得理也太𤣥經第三斷司馬法曰小罪聅中罪刖大罪剄許氏說文卷五今有酒徒十人羣居而飲有客請曰今日之飲毋隠厥技以為劇可乎其一人進曰吾善於簫有二人曰吾善於歌又有二人曰吾善於舞二人善於奕二人善於壺客曰若之藝咸聼士酒謂簫者曰吾忽焉舉觴而簫不應者罰忽焉投觴而簫不節者罰頃之簫者醉而不能罰矣又謂歌者曰吾忽焉舉觴而歌不應者罰忽焉投觴而歌不節者罰頃之歌者又醉而不能罰矣至於舞者亦然奕者壺者亦然客笑而喜曰吾一觴而困九人其亦善罰矣乎何取於藝也九人曰何子之能忽於罰而不能忽於賞也無亦罰吾以酒而罰子以名乎夫酒可以罰可以賞是酒不為厲也人猶惡醉而辱之今有司罰人以錢穀刑人以刀鋸是猶簫既罰而斷其指歌不賞而鉗其唇不亦甚乎天禄閣外史五難且刑猶刃也巧人以自成拙者以自傷亦猶水火者所以活人亦所以殺人存乎能用之與不能用抱朴子外篇用刑夫匠石不舍繩墨故無不直之木明主不廢戮罰故無陵遲之政也抱朴子外篇用刑誅一以振萬損少以成多方之櫛髮則所利者衆比於割疽則所全者大是以灸刺㠁痛而不可止者以痊病也刑法凶醜而不可罷者以救弊也抱朴子外篇用刑律者中也黄鍾調起五音以正法律馭民八刑克平以律為名取中正也文心雕龍書記昔王良之善御也識馬之饑飽規矩徐疾之節故鞭䇿不載而千里可期然不可以無鞭䇿者以馬之有佚也聖人之為治也以爵賞勸善以仁化飬民故刑罰不用太平可致然而不可廢刑罰者以民之有縱也劉子賞罰猛虎在深山百獸震恐及在檻穽之中揺尾而求食積威約之漸也故有畫地為牢勢不可入削木為吏議不可對定計於鮮也文選司馬遷報任少卿書先王制禮以崇敬作刑以明威刑罰威獄以類天之震曜殺戮也玉海刑制號令不時命曰傷天焚林斬木不時命曰傷地斷獄立刑不當命曰傷人意林晁錯新書今有弱子當陷大辟問其慈父必乞以肉刑代之茍可以生易死也有道之君能不以此加百姓乎蛇螫在手壮夫斷其腕謂其雖斷不死也意林物理論曹義曰縶馴駒以縿絆御悍馬以腐索今制民以輕刑亦如死也意林物理論救嬰孩之疾而不忍鍼艾更加他物以致死也今除肉刑者更衆何異服他藥也意林物理論太公東封齊齊東海上有居士曰狂獝華士昆弟三人立議曰上不臣天子下不事諸侯耕作而食掘井而飲無吾求上太公至營丘使執而殺之周公聞發急傳問之太公荅曰今有馬如驥之狀天下至良也驅之不前引之不至左之不左右之不右賢士而不為王用猶驥之不可以左右是以誅之太平御覽刑法部誅車輕道近則鞭䇿不用鞭策之所用逺道重任也刑罰也者民之鞭䇿也太平御覽刑法部叙刑下若親貴犯罪大者必議小者必赦是縱封豕於境内放長蛇於左右也太平御覽刑法部赦飄風苦雨溱溱而至此天之所以罰百姓不上同於闕也太平御覽天部下喻林卷一百一
