body:
  text: 喻林卷八十六明徐元太撰文章門一文治見龍在田天下文明易乾觀乎天文以察時變觀乎人文以化成天下易賁日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下易離大人虎變其文炳也易革君子豹變其文蔚也易革泉源所漸基於出震之君黼藻斯彰郁乎如雲之后尚書正義序雲漢之在天其為文章譬猶天子為法度于天下鄭氏箋詩棫朴次三一從一橫天網䍚浪䍚測曰一從一橫經緯陳也太玄經第三應龍出于中法度文明太玄經太玄文樂師謂越王曰君王德可刻之於金石聲可託之於管絃李善注文選文賦六藝者道德之深本而仁義之叢藪也天子與羣儒故老斟酌肴核而行李善注文選班孟堅典引與之斟酌道德之淵源肴核仁義之林藪以望元符之臻焉文選班孟堅典引離為日日天文也艮為石石地文也天文在下地文在上天地之文交相飾成賁者也猶人君以剛柔仁義之道飾成其德也剛柔雜仁義合然後嘉會禮通玉海周易鄭康成注尚文文猶質也質猶文也虎豹之鞟猶犬羊之鞟論語顏淵順天文為賁設人文為夬參鳥文離象獸文革乾坤鑿度乾鑿度上質以文美實由華興器賴雕飾為好人以輿服為榮後漢書張衡列傳總金雞而齊鶩揚玉車犬而並馳晉書文苑傳機文猶玄圃之積玉無非夜光焉五河之吐流泉源如一焉其𢎞麗妍贍英鋭漂逸亦一代之絶乎晉書陸機傳高詞迥映如朗月之懸光疊意回舒若重巖之積秀千條析理則雹折霜開一緒連文則珠流璧合晉書陸機列傳文章者蓋情性之風標神明之律吕也南史文學傳論以繬緣繬吾何以知其美也以素緣素吾何以知其善也管子四稱士服黻大夫黼諸侯火天子山龍德彌盛者文彌縟中彌理者文彌章也説苑修文以郁朴之實不曉禮義立之朝廷植笮樹表之類也其何益哉王充論衡量知篇龍鱗有文於蛇為神鳯羽五色於鳥為君虎猛毛蚡蜦龜知背負文四者體不質於物為聖賢王充論衡書解篇且夫山無林則為土山地無毛則為瀉土人無文則為僕人土山無麋鹿瀉土無五穀人無文德不為聖賢王充論衡書解篇河神故出圖洛靈故出書竹帛所記怪竒之物不出潢汙物以文為表人以文為基王充論衡書解篇德彌盛者文彌縟德彌彰者文彌明大人德擴其文炳小人德熾其文班官尊而文繁德高而文積王充論衡書解篇望豐屋知名家睹喬木知舊都鴻文在國聖世之驗也王充論衡佚文篇蹂蹈文錦於泥塗之中聞見之者莫不痛心知文錦之可惜不知文人之當尊不通類也王充論衡佚文篇若夫玄黃所以娛目鏗鏘所以聳耳媛妃所以紹光芻豢所以悅口也何以甘無味之味聽無聲之樂觀無彩之色也曹子建辨道論易曰君子豹變其文斐也許氏説文卷二相省視也從目從木易曰地可觀者莫可觀於木許氏説文卷十古者事事醇素今則莫不雕飾時移世改理自然也至於罽錦麗而且堅未可謂之減於蓑衣輜軿妍而又牢未可謂之不及椎車也抱朴子外篇鈞世且夫本不必皆珍末不必悉薄譬若錦繡之因素地珠玉之居蚌石雲雨生於膚寸江河始於咫尺爾則文章雖為德行之弟未可呼為餘事也抱朴子外篇尚博夫士以三墳為金玉五典為瑟筝講肄為鐘鼓百家為笙簧使味道者以辭飽酣德者以義醒抱朴子外篇安貧六藝備妍八索必該斯則富矣振翰摛藻德音無窮斯則貴矣抱朴子外篇安貧且文章之與德行猶十尺之與一丈謂之餘事末之前聞抱朴子外篇尚博筌可以棄而魚未獲則不得無筌文可以廢而道未行則不得無文抱朴子外篇尚博八卦生鷹隼之所被六甲出靈龜之所負文之所在雖賤猶貴犬羊之鞟未得比焉抱朴子外篇尚博積萬金於篋匱雖儉乏而不用則未知其有異於貧窶懷逸藻於胸心不寄意於翰素則未知其有别於庸猥抱朴子外篇博喻林籟結響調如竿瑟泉石激韻和若球鍠故形立則章成矣聲發則文生矣夫以無識之物鬱然有彩有心之器其無文歟文心雕龍原道龍鳯以藻繪呈瑞虎豹以炳蔚凝姿雲霞雕色有踰畫工之妙草木賁華無待錦匠之竒夫豈外飾蓋自然耳文心雕龍原道夫玄黃色雜方圓體分日月疉璧以垂麗天之象山川煥綺以鋪理地之形此蓋道之文也文心雕龍原道自然會妙譬卉木之耀英華潤色取美譬繒帛之染朱緑朱緑染繒深而繁鮮英華耀樹淺而煒煜文心雕龍隱秀夫不截盤根無以驗利器不剖文奧無以辨通才文心雕龍總術顏闔以為仲尼飾羽而畫徒事華辭雖欲此言聖弗可得已文心雕龍徵天子垂珠以聽諸侯鳴玉以朝文心雕龍章表聃周當路與尼父爭塗矣文心雕龍論説類聚而求亦充箱照軫矣文心雕龍諸子樂羮皆古不能備其五聲五味故曰有餘李善注文選文賦曄曄猗猗若摛錦與布繡文選西都賦學士文章其猶絲帛之有五色之功文選文賦毛嬙西施則天下之美妓也衣之以皮倛則見者皆走易之以玄錫則行者皆止文選神女賦詞賦大者與詩同義小者辨麗可嘉譬如女工有綺縠音樂有鄭衛也文選王元長䇿秀才文注夫文彩之在人猶榮華之在草意林物理論青與赤謂之文赤與白謂之章白與黑謂之黼黑與白謂之黻五綵謂之繡意林物理論吹簫入秦方識來鳯之巧鳴瑟向趙始覩駐雲之曲藝文類聚雜文部書日月參辰火龍黼黻尚且著于玄象章乎人事而況文辭可止詩歌可輟乎藝文類聚雜文部書火龍黼黻暐曄於廊廟衮冕旗旒舄奕乎朝廷藝文類聚人部質文論和氏之明璧輕縠之袿裳必將遊玩於左右振飾於宫房藝文類聚人部質文論皇穹肇載陰陽初分日月運其光列宿曜其文百穀麗於土芳華茂於春藝文類聚人部質文論周容子夏以侈靡見桓公桓公曰侈靡可以為天下乎子夏曰可夫雕橑然後炊之雕卵然後瀹之所發積藏散萬物也藝文類聚火部薪炭灰平陽擊石山谷因之調大夏吹筠風雲為之動與夫含吐性靈抑揚詞氣曲變陽春光回白日豈得同年而語哉初學記文部文章夫不剪之屋不如阿房之宫不琢之椽不如磨礱之桷玄酒不如蒼吾之醇椌楬不如流鄭之樂初學記樂部雜樂注睢渙之水出文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉太平御覽服章部祿衣日出天而耀景露下地而騰文事類賦天部露注舜畫日月於太常備十有二章黼黻玄黃爛如也玉海車服冕服有青丘紫府三星刻石之文緑檢黃繩六甲靈飛之字法苑珠林威儀風行天上小畜君子以懿文德易小畜相鼠有皮人而無儀相鼠有齒人而無止相鼠有體人而無禮詩國風相鼠瞻彼淇澳緑竹青青音精有匪君子充耳琇瑩音營會音怪辨如星詩國風淇澳大車檻檻毳天鋭反衣如菼吐敢反大車啍啍音吞毳衣如璊音門詩國風大車終南何有有條有梅叶莫悲反君子至止錦衣狐裘叶渠之反顔如渥丹其君也哉詩國風終南鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結叶訖力反兮詩國風鳲鳩狼跋其胡載疐音致其尾公孫音遜碩膚赤舄音昔几几詩國風狼跋其桐其椅音醫其實離離豈弟君子莫不令儀詩小雅湛露交交桑扈有鶯其羽君子樂胥受天之祜交交桑扈有鶯其領君子樂胥萬邦之屛詩小雅桑扈振鷺于飛于彼西雍我客戾止亦有斯容詩頌振鷺視鼠有皮雖處高顯之處偷食茍得不知廉恥亦與人無威儀者同鄭氏箋詩相鼠竊脂飛而往來有文章人觀視而愛之君臣以禮法威儀升降於朝廷則天下亦觀視而仰樂之鄭氏箋詩桑扈古之賢者道行心平可外占而知內如宫室之制內有繩直則外有廉隅鄭氏箋詩抑白鳥集于西雍之澤言所集得其處也喻杞宋之君有潔白之德來助祭於周之廟得禮之宜也其至止亦有此容言威儀之善如鷺然鄭氏箋詩振鷺鳥有羽翼猶人有衣服故知以羽之差池喻顧視衣服既飛而有上下故以頡之頏之喻出入前却既上下而有音聲故以上下其音喻言語大小毛詩正義燕燕人有皮鼠亦有皮鼠由無儀故可恥也人無禮儀何異於鼠乎毛詩正義相鼠君子衰絰則有哀色端冕則有敬色甲胄則有不可辱之色禮記表記凡贄天子用鬯諸侯用玉卿用羔大夫用鴈士用雉雉取其耿介鴈取其在人上有先後行列羔取其執之不鳴殺之不號乳必跪而受之類死義知禮者也玉取其至清而不自蔽其惡潔白而不受汚內堅剛而外溫潤有似乎備德之君子鬯取其芬芳在上臭達於天而醇粹無擇有似乎聖人故視其所執而知其所任矣何休解公羊莊公二十四年執圭鞠躬如也如不勝上如揖下如授勃如戰色足蹜蹜如有循論語鄉黨夫服心之文也如龜焉灼其中必文於外國語魯臣觀其函齒牙樹頰胲吐脣吻擢項頥結股腳連脽尻遺蛇其迹行步偊旅臣朔雖不肖尚兼此數子者前漢書東方朔傳夫衣服表容圭璋範德聲移宫羽彩照山華布武有章立言成訓澄之箕踞不已甚矣晉書山濤傳夏侯湛美容觀與潘嶽友善每行止同輿接茵京都謂之連璧晉書夏侯湛傳與玠同遊冏若明珠之在側朗然照人晉書衛玠傳儒者冠圜冠者知天時履方履者知地形緩佩玦者事至而斷莊子田子方次四孔鴈之儀利用登于階測曰孔鴈之儀可法則也太玄經第四禮鉤無帶不立帶無鉤不著相須成體以自申束不失禮節太玄經第一周解衣裳有制珠鉤有度雖相交錯不失其正太玄經第四迎解先王法服不其深乎為冠所以莊其首也為履所以重其足也衣裳襜如劍珮鏘如皆所以防其躁也今捨之曰不便是投魚於淵置猿於木也天下庸得不馳騁而狂乎引之者非其道也文中子周公嵇叔夜之為人也巖巖若孤松之獨立其醉也傀俄若玉山之將崩世説新語容止毛曾與夏侯玄共坐時人謂之蒹葭倚玉樹世説新語容止時人目王右軍飄如遊雲矯若驚龍世説新語容止見裴叔則如玉山上行光映照人世説新語容止王大將軍稱太尉處衆人中似珠玉在瓦石間世説新語容止風儀與秋月齊明音徽與春雲等潤藝文類聚職官部冢宰碑淑貌與金燧相宜清顔與玉壺同照藝文類聚職官部諸王墓志嵇康雖土木形骸而龍章鳯姿天質自然事類賦鱗介部龍注李元禮巖巖如玉山陳仲舉軒軒如千里驥太平御覽人事部諺上杲之為蟬冕所照更生風采何氏語林賞譽如來頂上烏瑟膩沙髙顯周圓猶如天蓋波羅蜜多經卷四百六十九如來面輪其猶滿月眉相皎淨如天帝弓波羅蜜多經卷四百六十九如來行步進止儀雅其猶鵝王波羅蜜多經卷四百七十如來行步威容齊肅如師子王波羅蜜多經卷四百七十如來行步安平庠序不過不減猶如牛王波羅蜜多經卷四百七十如來行步直進庠審如龍象王波羅蜜多經卷四百七十如來面光如百千電焰出過世間所有光明百千萬倍蓮華面經卷上悲六如來身者三十二相八十種好以自莊嚴蓮華面經卷上悲六言論吉甫作誦穆如清風詩大雅蒸民食之甘者使人嗜之而不厭言之美者使人聽之而不倦故以美言為甘也毛詩正義巧言昔叔向適鄭鬷蔑惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射汝遂不言不笑夫今子少不揚子若無言吾幾失子矣言不可以已也如是遂如故知左傳昭公二十八年君子之言也不下帶而道存焉孟子盡心下樊光云俗語苦如蘻音計爾雅注籧篨之疾不能俯口柔之人視人顔色常亦不伏爾雅注騶衍之術迂大而閎辨奭也文具難施淳于髠久與處時有得善言故齊人頌曰談天衍雕龍奭炙轂過髠史記孟子傳近者陸子優繇新語以興董生下帷發藻儒林劉向司籍辨章舊聞揚雄覃思法言太玄皆及峕君之門闈究先聖之壼奧婆娑呼術藝之埸休息呼篇籍之囿以全其質而發其文前漢書敘傳上孔公緒清談高論噓枯吹生後漢書鄭太傳口滿聲溢微言風集若仰眺飛鴻漂漂兮景沒若俯臨深溪杳杳兮精絶魏志管輅傳注輅解景春微旨遂開張戰地示以不固藏匿孤虛以待來攻景春奔北軍師摧衄自言吾覩卿旌旗城池已壞也其欲戰之士於此鳴鼓角舉雲梯弓弩大起牙旗雨集然後登城曜威開門受敵上論五帝如江如漢下論三王如翮如翰其英者若春華之俱發其攻者若秋風之落葉聽者眩惑不達其義言者收聲莫不心服雖白起之坑趙卒項羽之塞濉水無以尚之于時客皆欲面縛銜璧求束手於軍鼓之下輅猶總干山立未便許之魏志管輅傳注恣飛馬之雄辭奮談天之逸辨指麾則紅紫成章俯仰則丘陵生韻晉書慕容德傳彥國吐佳言如鋸木屑霏霏不絶誠為後進領袖也晉書胡母輔之傳輕以管窺遂成穿鑿無取於遊刃有慚於運斤不足破秋毫之論何以解連環之結北齊書杜弼傳黼藻相輝宫商間起清辭潤乎金石精義薄乎雲天隋書經籍四志景公病疽在背高子進而撫瘍公曰熱乎曰熱熱何如曰如火其色何如曰如未熟李大小何如曰如豆墮者何如曰如屨辦高子者出晏子請見撫瘍公曰其熱何如曰如日其色何如曰如蒼玉大小何如曰如璧其墮者何如曰如圭晏子出公曰吾不見君子不知野人之拙也晏子春秋雜下言之如引鋸然惟善聖者不留一言關尹子三極篇吾驚怖其言猶河漢而無極也大有徑庭不近人情焉莊子逍遙遊其於辨也將妄鑿垣牆而殖蓬蒿也簡髮而櫛數米而炊竊竊乎又何足以濟世哉莊子庚桑楚以為異於鷇音亦有辨乎其無辨乎莊子齊物論凡人莫不好言其所善而君子為甚故贈人以言重於金石珠玉觀人以言美於黼黻文章聽人之言樂於鐘鼓琴瑟故君子之於言無厭荀子非相田駢以道術説齊齊王應之曰寡人所有者齊國也願聞齊國之政田駢對曰臣之言無政而可以得政譬之若林本無材而可以得材願王之自取齊國之政也駢猶淺言之也博言之豈獨齊國之政哉吕氏春秋執一夫辭者意之表也鑒其表而棄其意悖故古之人得其意則舍其言矣吕氏春秋離謂白公問於孔子曰人可以微言孔子不應白公曰若以石投水中何如曰吳越之善沒者能取之矣曰若以水投水何如孔子曰災澠之水合易牙嘗而知之白公曰然則人固不可與微言乎孔子曰何謂不可誰知言之謂者乎淮南子道應訓今萬人調鍾不能比之律誠得知者一人而足矣説者之論亦猶此也誠得其數則無所用多矣夫車之所以能轉千里者以其要在三寸之轄淮南子人間訓鉛之與丹異類殊色而可以為丹者得其數也故繁稱文辭無益於説審其所由而已矣淮南子人間訓所為言者齊於衆而同于俗今不稱九天之頂則言黃泉之底是兩末之端議何可以公論乎夫橘柚冬生而人曰冬死死者衆薺麥夏死人曰夏生生者衆江河之回曲亦時有南北者而人謂江河東流攝提鎮星日月東行而人謂星辰日月西移者以大氐為本胡人有知利者而人謂之駤越人有重遲者而人謂之訬以多者名之淮南子修務訓汜論者所以針縷縩菜繺煞之間攕先揳屑唲哇齵隅之郤隙也淮南子要略夫目不視弗見心弗論不得雖有天下之至味弗嚼弗知其旨也雖有聖人之至道弗論不知其義也春秋繁露仁義法懷六藝之術騁意極論宜若開光發蒙鹽鐵論刺復議論無所依如膝癢而搔背辨訟公門之下訩訩不可勝聽如品即口以成事鹽鐵論利議今文學不言所為治而言以治之無功猶不言耕田之方美富人之囷倉也鹽鐵論遵道辭若循環轉若陶鈞文繁於春華無效於抱風鹽鐵論遵道歌者不期於利聲而貴在中節論者不期於利辭而務在事實鹽鐵論相刺惠子曰今有人於此而不知彈者曰彈之狀何若應曰彈之狀如彈則諭乎王曰未諭也於是更應曰彈之狀如弓而以竹為弦則知乎王曰可知矣惠子曰夫説者固以其所知諭其所不知而使人知之今王曰無譬則不可矣説苑善説畫龍頭頸文章不成甘言美語説辭無名焦氏易林蒙之噬嗑仲尼駕説者也不在兹儒乎如將復駕其所説則莫若使諸儒金口而木舌揚子學行或問聖人之言炳若丹青有諸曰吁是何言歟丹青初則炳久則渝渝乎哉楊子君子聖人之辭渾渾若川順則便逆則否者其惟川乎楊子問神大哉聖人言之至也開之廓然見四海閉之閛然不覩牆之裏楊子問道聖人之言似於水火或問水火曰水測之而益深窮之而益逺火用之而彌明宿之而彌壯楊子問道聖人之言逺如天賢人之言近如地瓏􅌑其聲者其質玉乎楊子五百然而立談者人異綴文者家舛斯乃楊朱哭於岐路墨翟悲於練素者也風俗通皇霸一堂之上必有論者一鄉之中必有訟者訟必有曲直論必有是非非而曲者為負是而直者為勝以舌論訟猶以劒戟鬬也利劒長戟手足健疾者勝頓刀短矛手足緩留者負王充論衡物勢篇夫養實者不育華圖行者不飾辭豐草多華英茂林多枯枝王充論衡自紀篇夫宅舍多土地不得小戶口衆簿籍不得少今失實之事多華虛之語衆指實定宜辨爭之言安得約徑王充論衡自紀篇寶物以隱閉不見實語亦宜深沈難測王充論衡自紀篇獄當嫌辜卿決疑事渾沌難曉與彼分明可知孰為良吏王充論衡自紀篇善喻者以一言明數事不善喻者百言不明一意則不聽也劉邵人物志材理有金石絲竹之樂則不奏乎聾者之側有山龍華蟲之文則不陳乎瞽者之前知聾者之不聞也知瞽者之不見也徐幹中論貴言夫君子之與言也所致貴也雖有夏后之璜商湯之駟弗與易也徐幹中論貴言號鐘不鳴則不異於積銅浮磬息音則未别乎聚石也抱朴子外篇重言夫莊子之言不可以一塗詰或以黃帝之迹秃堯舜之脛豈獨貴堯而賤禹哉郭子注莊子天地夫騁其竒辨致其危辭者未嘗容思於檮杌之口而必競辨於楊墨之間則楊墨乃亂羣言之主也郭子注莊子駢拇巵滿則傾空則仰非持故者也況之於言因物隨變唯彼之從郭子注莊子寓言宜僚叔敖息訟以默淡泊自若而兵難自解茍所言非已則雖終身言固為未嘗言耳是以有啄三尺未足稱長郭子注莊子徐無鬼夫肖貌天地稟性五才擬耳目於日月方聲氣乎風雷其超出萬物亦已靈矣形甚草木之脆名踰金石之堅是以君子處世樹德建言豈好辨哉不得已也文心雕龍序志楚莊王輕於千乘之國而重申叔一言范獻賤萬畝之田以貴舟人片説季路抱五愼之誡趙孟佩九言之針由此觀之軒璧之與田邑豈能與善言齊價哉劉子貴言日月者天之文也山川者地之文也言語者人之文也天文失則有謫蝕之變地文失必有崩竭之災人文失必有傷身之患故口者言語之門戶舌者門戶之關鑰關鑰動則門戶開門戶開則言語出劉子愼言天地之氣相摩而鳴相擊而形人之動者鳴乎言形乎文關氏易傳雜義寓言十九寄之他人則十言而九見信重言十七世之所重則十言而七見信莊子音義寓言夫巵器滿即傾空則仰隨物而變非執一守故者也施之於言而隨人從變已無常主者也莊子音義寓言金寶其口木質其舌傳言如此則是仲尼常在矣揚子法言注學行篇街談巷議彈射臧否剖析毫釐擘肌分理所好生毛羽所惡成瘡痏文選西京賦高談一何綺蔚若朝霞爛文選陸機擬古詩騁黃馬之劇談縱碧雞之雄辨敘溫燠則寒谷成暄論嚴苦則春叢零葉飛沈出其顧指榮辱定其一言文選劉峻廣絶交論至於言窮藥石苦味滋旨文選任彥升齊竟陵王行狀郭子玄語議如懸河瀉水注而不竭世説新語賞譽譬如瀉水著地正自縱橫流漫略無正方圓者世説新語言語若郗超開此語必不至河漢世説新語言語謝胡兒語庾道季諸人暮當就卿談可堅城壘庾曰若文度來我以偏師待之康伯來濟河焚舟世説新語言語利如激風之至暴雨之集不論是非不議直曲期於不窮意林物理論赤如雞冠黃如蒸栗白如脂肪黑如淳漆此玉之符也言成雅訓辭作典謨此人之符也意林正部太尉王君見阮千里而問曰老莊與聖教異阮曰將無同太尉善其言辟之為椽世號阮瞻三語掾王君見而嘲之曰一言可辟何假於三阮曰茍是天下民望亦可無言而辟復何假於一言藝文類聚人部言語夫天不言而四時行焉聖人不言而鑒識存焉藝文類聚人部言語論銜刃懷毒吐膏示芳利動春露害重冬霜藝文類聚人部言語針一言之賜過乎璵璧藝文類聚人部言語贊等嶰谷之清音比洞庭之高曲藝文類聚人部言志書選言非綺綃何以儼金雘藝文類聚禮部燕會詩言析秋毫辭連春藻藝文類聚職官部司徒墓志所稱如龍之升所貶如墮于淵清論風行所吹草偃太平御覽職官部功曹參軍心有管籥須言而發太平御覽人事部心卵有毛是説之難持者也而惠施鄧析能精之然而長者不貴非禮義之中也太平御覽羽族部鳥卵五行二曰火五事二曰言言與火宜故云鑠金太平御覽珍寶部金下物理論曰虛無之談尚其華藻此猶春蛙秋蟬聒耳而已埤雅品物門蟾蜍安汰吐珠玉於前斌亮振金聲於後清言妙緒將絶復興何氏語林賞譽詞致清雅奕奕有餘吐章陳文如懸河㵼水注而不竭何氏語林賞譽善言始者必會於終善言近者必知其逺黃帝素問內經天元紀大論善言天者必有驗於人善言古者必有合於今善言人者必有厭於已黃帝素問內經舉痛論吾言如甘露能灑一切使其心地自得清涼虛皇四十九章如風吹海浪皆出和雅聲阿育王傳第一口所言説不了了如龍興雨而不雷修行道地經慈品二人共諍不能斷決默然無言譬如白羊乃至人殺不能作聲大智度論卷三人語如火燒乾竹林出大音聲此中無有作者大智度論卷五十四事嘗共見者可説以實一人見一人不見者難與誠言也昔人未見麟問嘗見者麟何類乎見者曰麟如麟也問者曰若吾嘗見麟則不問子矣而云麟如麟寧可解哉見者曰麟麏身牛尾鹿蹄馬背問者霍解𢎞明集牟子理惑論鳥哀鳴於將死人善言於就暮𢎞明集張融門論刀劒起咽喉之間繩索居辱齒之際語寒風足使翠柯零葉談芳節能令稿木舒華辨正論卷一夫言者非尚於華辭貴在乎中理歌者非尚於清響貴資乎合節辨正論卷六喻林卷八十六
