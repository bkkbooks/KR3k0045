body:
  text: 喻林卷六十八明徐元太撰君道門八擇任既體剛直則不食汚穢必須井潔而寒泉然後乃食以言剛正之主不納非賢必須行潔才髙而後乃用周易正義井折柳木以為蕃菜果之圃則柳木柔脆無益於圃之禁以喻用狂夫以為挈壺之官則狂夫瞿瞿然不任於官之職毛詩正義東方未明薈兮蔚兮之小雲在南山而朝升不能興為大雨以興小人在上位而見任不能成其德教毛詩正義候人隰中之柔枝條其阿然而長美其葉則離然而茂盛其下可以庇廕人往息者得其涼也以興野中君子其身有美德可以覆養人事之者蒙其利也既隰巾之柔盛如此則原上之柔不能然是不可以庇廕也猶野中君子德如是則在位小人不能然為不能覆養也毛詩正義隰桑夫為室者慎其楹君天下者難其相也大戴禮記武王踐阼注公子魏牟過趙趙王迎之顧反至坐前有尺帛且令工人以為冠魏牟曰王能重王之國若此尺帛則王之國大治矣趙王不說形於顔色曰先王不知寡人不肖使奉社稷豈敢輕國若此魏牟曰王無怒請為王說之曰王有此尺帛何不令前郎中以為冠王曰郎中不知為冠魏牟曰為冠而敗之奚虧於王之國而王必待工而後乃使之今為天下之工或非也戰國䇿趙孝成王夫工女必自擇絲麻良工必自擇齎材賢君良上必自擇左右始故佚諸取人勞於治事勞於取人佚於治事大戴禮記子張問人官衣服附在身我知而慎之大官大邑所以庇身也我逺而慢之左傳襄公三十一年子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎左傳襄公三十一年猶未能操刀而使割也其傷實多左傳襄公三十一年犧當用純德之人猶如祭犧當用純色之牲也他人之有純德寵之如犧後實招禍難矣已子之有純德寵之如犧有何害也春秋正義昭公二十二年為巨室則必使工師求大木工師得大木則王喜以為能勝其任也匠人斫而小之則王怒以為不勝其任矣孟子梁惠王下客見趙王曰臣聞王之使人買馬也有之乎王曰有之何故至今不遣王曰未得買馬之工也對曰王何不遣建信君乎王曰建信君有國事又不知相馬曰王何不遣紀姬乎王曰紀姬婦人也不知相馬對曰買馬而善何補於國王曰無補於國買馬而惡何危於國王曰無危於國對曰然則買馬善而若惡皆無危補於國然而王之買馬也必將待工今治天下舉錯非也國家為虛戾而社稷不血食然而王不待工而與建信君何也戰國䇿趙孝成王宣王曰當今之世無士寡人何好王斗曰世無麒麟騄耳王之駟已備矣世無東郭俊盧氏之狗王之走狗已具矣世無毛嬙西施王宫已充矣王亦不好士也何患無士王曰寡人重國愛民固願得士以治之王斗曰王之憂國愛民不若王愛尺縠也王曰何謂也王斗曰王使人為冠不使左右便嬖而使工者何也為能之也今王治齊非左右便嬖無使也故曰不如愛尺縠也戰國策齊宣王今人主說於諂諛之辭牽於帷裳之制使不羈之士與牛驥同皂史記鄒陽傳淳于髠曰狐裘雖弊不可補以黃狗之皮騶忌子曰謹受令請謹擇君子母雜小人其間史記田完世家夫賢者國家之器用也所任賢則趨舍省而功施普器用利則用力少而就效衆故工人之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將之朴清水淬其鋒越砥斂其鍔水斷蛟龍陸剸犀革忽若彗汜畫塗如此則使離婁督繩公輸削墨雖崇臺五增延袤百丈而不溷者工用相得也庸人之御駑馬亦傷吻敝策而不進於行胸喘膚汗人極馬倦及至駕齧䣛驂乘旦王良執靶韓哀附輿縱馳騁騖忽如景靡過都越國蹶如厯塊追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也前漢書王褒傳騁駑駘於修路慕騏驥而增驅後漢書蔡雍列傳使有能者當其官有功者受其祿譬猶烏獲之舉千鈞良樂之選驥足也魏志杜畿傳夫未能操刀而使割錦非傷錦之尤實授刀之責魏書咸陽王禧傳凡使人攻堅木者必為之擇良器今河南郡是陛下天山之堅木盤根錯節亂植其中六部里尉即攻堅之利器非貞剛精鋭無以治之魏書甄琛傳夫正長者治民之基基不傾者上必安周書蘇綽傳若門資之中而得賢良是則策騏驥而取千里也若門資之中而得愚瞽是則土牛木馬形似而用非不可以涉道也若刀筆之中而得志行是則金相玉質內外俱美實為人寶也若刀筆之中而得澆僞是則飾畫朽木悅目一時不可以充榱椽之用也周書蘇綽傳錦縠雖輕不委之以學割瑚璉任重豈寄之以弱力北史薛彪子子琡傳平原之隰奚有於髙大山之隈奚有於深訾毁賢也讆譽惡也之人勿與任大管子形勢夫裁衣而知擇其工裁國而知索其人此固世之所公哉鶡冠子天則若堯之任人也不用親戚而必使能其治病也不任所愛必使舊醫鶡冠子世賢今王公大人有一牛羊之財不能殺必索良宰有一衣裳之財不能制必索良工當王公大人之於此也雖有骨肉之親無故富貴面目美好者實知其不能也不使之也是何故恐其敗財也當王公大人之於此也則不失尚賢而使能王公大人有一罷馬不能治必索良醫有一危弓不能張必索良工當王公大人之於此也雖有骨肉之親無故富貴面目美好者實知其不能也必不使是何故恐其敗財也當王公大人之於此也則不失尚賢而使能逮至其國家則不然王公大人骨肉之親無故富貴面目美好者則舉之則王公大人之親其國家也不若其親一危弓罷馬衣裳牛羊之財與我以此知天下之士君子皆明於小而不明於大也此譬猶瘖者而使為行人聾者而使為樂師墨子馬以譬正雞以喻亂故等馬與雞寧取於馬以馬有國用之材而雞不材其為非類審矣故人君舉是不材而與有才者竝位以亂名實謂之狂舉公孫龍子通變論注人主欲得善射射逺中微者縣貴爵重賞以招致之內不可以阿子弟外不可以隱逺人能中是者取之是豈不必得之之道也哉雖聖人不能易也欲得善馭及速致逺者一日而千里縣貴爵重賞以招致之內不可以阿子弟外不可以隱逺人能致是者取之是豈不必得之之道也哉雖聖人不能易也欲治國馭民調一上下將內以固城外以拒難治則制人人不能制也亂則危辱滅亡可立而待也然而求卿相輔佐則獨不若是其公也案唯便嬖親比已者之用也豈不過甚矣哉荀子君道口能言之身能行之國寶也口不能言身能行之國器也口能言之身不能行國用也口言善身行惡國妖也治國者敬其寶愛其器任其用除其妖荀子大略齊宣王使人吹竽必三百人南郭處士請為王吹竽宣王說之廩食以數百人宣王死湣王立好一一聽之處士逃韓非子內儲說上今世之為范且虞慶者不輟而人主說之不止是貴敗折之類而以知術之人為工匠也不得施其技巧故屋壞弓折知治之人不得行其方術故國亂而主危韓非子內儲說左上夫人主之所鏡照者諸侯之士徒也今諸侯之士徒皆私門之黨也人主之所以自羽翼者巖穴之士徒也今巖穴之士徒皆私門之舍人也韓非子外儲說右夫良馬固車使臧獲御之則為人笑王良御之而日取千里車馬非異也或至乎千里或為人笑則巧拙相去逺矣今以國位為車以勢為馬以號令為轡以刑罰為鞭策使堯舜御之則天下治桀紂御之則天下亂則賢不肖相去逺矣夫欲追速致逺不知任王良欲進利除害不知任賢能此則不知類之患也夫堯舜亦治民之王良也韓非子難勢屈到嗜芰文王嗜菖蒲葅非正味也而二賢尚之所嗜不必美晉靈侯說參無恤燕噲賢子之非正士也而二君尊之所賢不必賢也韓非子難四今有法曰斬首者令為醫匠則屋不成而病不已夫匠者手巧也而醫者齊藥也而以斬首之功為之則不當其能今治官者智能也今斬首者勇力也勇力之所加而治智能之官是以斬首之功為醫匠也韓非子定法楚之有直躬其父竊羊而謁之吏令尹曰殺之以為直於君而曲於父報而罪之以是觀之夫君之直臣父之暴子也魯人從君戰三戰三北仲尼問其故對曰吾有老父身死莫之養也仲尼以為孝舉而上之以是觀之夫父之孝子君之背臣也故令尹誅而楚姦不上聞仲尼賞而魯民易降北上下之利若是其異也而人主兼舉匹夫之行而求致社稷之福必不幾矣韓非子五蠧柱弱者屋壞輔弱者國傾黃石公素書安履使獐疾走馬弗及至已而得者其時顧也驥一日千里車輕也以重載則不能數里任重也賢者之舉事也不聞無功然而名不大立利不及世者愚不肖為之任也吕氏春秋傳志杖聖者帝杖賢者王杖仁者霸杖義者强杖讒者滅杖賊者亡陸子輔政秦以刑罰為巢故有覆巢破卵之患以趙髙李斯為杖故有傾仆缺覆之禍何哉所任非也陸子輔政今夫御者馬體調於車御心和於馬則厯險致逺進退周游莫不如志雖有騏驥騄駬之良臧獲御之則馬反自恣而人弗能制矣淮南子主術訓堯之舉舜也决之於目桓公之取寧戚也斷之於耳而已矣為是釋術數而任耳目其亂必甚矣夫耳目之可以斷也反情性也聽失於誹譽而目淫於采色而欲得事正則難矣淮南子齊俗訓人之材固有四選如天之時固有四變也聖人為一選君子為一選善人為一選正人為一選由此而下者不足選也春秋繁露官制象天駑驥同轅伯樂為之咨嗟玉石相揉和氏為之嘆息故賢愚共貫則能士匿謀真僞相錯則正士結舌孔叢子對魏王晉平公游於河而樂曰安得賢士與之樂此也船人盍胥跪而對曰主君亦不好士耳夫珠出於江海玉出於崑山無足而至者猶主君之好也士有足而不至者蓋主君無好士之意耳無患乎無士也平公曰吾食客門左千人門右千人朝食不足夕收市賦暮食不足朝收市賦吾可謂不好士乎盍胥對曰夫鴻鵠一舉千里所恃者六翮爾背上之毛腹下之毳益一把飛不為加髙損一把飛不為加下今君之食客門左門右各千人亦有六翮在其中矣將皆背上之毛腹下之毳邪韓詩外傳轡銜者御之具也得良工而調法勢者治之具也得賢人而化執轡非其人則馬奔馳執軸非其人則船覆傷昔吳使宰嚭持軸而破其船秦使趙髙執轡而覆其車鹽鐵論刑德弱者猶使羊將狼也其亂必矣强者則是豫狂夫利劍也必妄殺生也鹽鐵論除狹未有咫角驂駒而能服重致逺者也由此觀之夫士亦華髮墮顛而後可用耳新序雜事五任劣力薄孱駑恐怯如蝟見鵲不敢拒格焦氏易林乾之萃使燕築室身無庇宿焦氏易林隨之損蒿蓬代柱大屋顛仆焦氏易林觀之需朽輿瘦駟不任御轡焦氏易林解之䝉牧羊逐兔使魚捕鼠任非其人卒歲無功焦氏易林損之歸妹嬰兒孩子未有知識彼童而角亂我政事焦氏易林巽之節鷦明冲天不在六翮乎拔而傅尸鳩其纍矣夫揚子寡見今觀宰司之取士也有似於司原之佃也昔有司原氏者燎獵中野鹿斯東奔司原縱譟之西方之衆有逐狶者聞司原之譟也競舉音而和之司原聞音之衆則反輟已之逐而往伏焉遇夫俗惡之狶司原喜而自以獲白瑞珍禽也盡芻豢單囷倉以養之豕俯仰嚘咿為作容聲司原愈益珍之居無何烈風興而澤雨作灌巨豕而惡塗渝逐駭懼真聲出乃知是家之艾猳爾此隨聲逐響之過也衆遇之未赴信焉今世主之於士也目見賢則不敢用耳聞賢則恨不及雖自有知也猶不能取必更待羣司之所舉則亦懼失麟鹿而獲艾猳奈何其不分者也未遇風雨之變者故也俾使一朝奇政雨集則險隘之徒闒茸之質亦將别矣潛夫論賢難君任駑頓之臣使在顯職如駕跛蹇之驢又無鞭箠終不竟道將傾覆也王逸注楚辭七諌言己願令君推逐妾御出之勿令亂政迎宓妃賢女於伊雒之水以配於君則化行也王逸注楚辭九歎柱細則屋傾本細則末撓下小則上崩武矦十六䇿隂察五穀之於人也食之皆飽稻粱之味甘而多腴豆麥雖糲亦能愈饑食豆麥者皆謂糲而不甘莫謂腹空無所食竹木之杖皆能扶病竹杖之力弱劣不及木或操竹杖皆謂不徑莫謂手空無把持夫不肖之臣豆麥竹杖之類也王充論衡藝增篇無患斗斛過所量非其穀不患無銓衡所銓非其物王充論衡答佞篇治在得賢亡由失人峳峳之來乃致狡賔山海經東山經圖讚夫用非其人譬猶被木馬以繁纓何由騁迹於追風以壤龍當雲雨安能耀景於天衢哉抱朴子外篇百里設官分職其猶構室一物不堪則崩撓之由也抱朴子外篇審舉泥龍雖藻繪炳蔚而不堪慶雲之招撩禽雖雕琢𤣥黃而不任凌風之舉芻狗雖飾以金翠而不能躡景以頓逸近才雖豐其寵祿而不能令天清而地平抱朴子外篇廣譬餘艎鷁首涉川之良器也櫂之以北狄則沈漂於波流焉蒲稍汗血迅趨之駿足也御非造父則傾僨於嶮塗焉青萍豪曹剡鋒之精絶也操者非羽越則有自傷之患焉徑兵鋭卒撥亂之神物也用者非明哲則速自焚之禍焉抱朴子外篇博喻捐茶茹蒿者必無識甘之口棄瓊拾礫者必無甄珍之明薄九成而悅北鄙者吾知其不能格靈祇而儀翔鳳矣含英秀而杖常民者吾知其不能叙彛倫而臻升平矣抱朴子外篇博喻佞媚不以虛談進良能不以孤弱退駑蹇輟望於大輅戎虬揚鑣而電騁抱朴子外篇廣譬夫魚質龍文似是而非遭水而喜見獺即悲雖臨之以斧鉞之威誘之以傾城之寶猶不能奮鉛鋒於犀兕騁駑蹇以追風非不忌重誅也非不悅美賞也體不可力無自奈何而欲與之輯熙百揆𢎞濟大務猶託萬鈞於尺舟之上求千鍾於升合之中紲芻狗而責盧鵲之效􅀈雞鶩而崇鷹揚之功其不可用亦較然矣抱朴子外篇吳失若夫不得其人則雖百醫守病適足致疑而不能一愈也郭子注莊人間世言鼎折其足則覆喪其實喻大臣非其任則虧敗國典前漢書注王商傳拔鷦明之翼以傅尸鳩不能冲天適足以纍耳諭授小人以大位而不能成大功也揚子法言注寡見篇大厦須異材廊廟非庸器文選江文通擬盧郎中詩景帝顯位刺史者皆是宦臣子弟猶如豺狼守肉鬼魅待疾意林仲長統昌言龍舟整楫王良不能執也驥騄齊行越人不敢御也各有所能搆大厦者先擇匠而後揀材治國家者先擇佐而後定民意林物理論杖必不撓無取苒弱人貴一德勿惑穿鑿藝文類聚服飾部杖銘遵其軌躅必大厦之棟梁惣其寄任亦巨川之舟楫藝文類聚職官部吏部尚書表六轡沃若不䇿𤣥黃之馬九成輪奐無求擁腫之材何則跳蹢之路已窮梁棟之用斯闕藝文類聚職官部刺史表虎能雄猛不可以託麑鷹能飄擊不可以寄雛太平御覽獸部麑吏者理也所以理萬機平百揆也武士宰民物猶使狼牧羊鷹養雛也太平御覽職官部總叙官夫欲定天下而任小人猶於捕麋鹿而張兔罝不能擊麋鹿猶小人不能任大事太平御覽資産部罝杖必取材不必用味相必取賢不必所愛都蔗雖甘猶不可杖佞人說已亦不可相太平御覽果部甘蔗釣巨魚不使嬰兒輕預非不親力不堪也太平御覽資産部釣射之為法猶人主之治天下也射者弓有强弱矢有銖兩弓不合度矢不端直主雖逢蒙不能以中才不稱官萬務荒怠雖有堯舜之君亦無以治也大平御覽工藝部射上醫有名而不良者有無名而良者人主之用醫必參知而隱括之初學記政理部醫棄晨雞俟鳳警亦猶棄當世之實才須故人之執政也事類賦禽部雞注夫醫者非仁愛不可託非聰明理達不可任非廉潔淳良不可信古之用醫必選名姓之後玉海詔令律令上諺云俗無良醫枉死者半拙醫療病不如不療喻如宰夫以鱓鱉為蓴羮食之更足成病豈充饑之可望乎本草一卷君子重襲小人無由入正人十倍邪辟無由來古之人其謹於所近乎詩曰芃芃棫朴薪之槱之濟濟辟王左右趣之此言左右日以善趣也困學紀聞卷三詩上工平氣中工亂脉下工絶氣危生故曰下工不可不慎也黃帝素問靈樞經根結専任狐裘尨茸一國三公吾誰適從左傳僖公五年大夫文種者國之梁棟君之爪牙夫驥不可與匹馳日月不可竝照君王委國於種則萬綱千紀無不舉者吳越春秋勾踐入臣外傳公孫衍為魏將與其相田需不善季子為衍謂梁王曰獨不見夫服牛驂驥乎不可以行百步今王以衍為可使將故用之也而聽相之計是服牛驂驥也牛馬俱死而不能成其功王之國必傷矣願王察之戰國䇿魏哀王衛嗣君謂薄疑曰子小寡人之國以為不足仕則寡人力能仕子請進爵以子為上卿乃進田萬頃薄子曰疑之母親疑以疑為能相萬乘所不窕也然疑家巫有蔡嫗者疑母甚愛信之屬之家事焉疑智足以信言家事疑母盡以聽疑也然已與疑言者亦必復决之於蔡嫗也故論疑之智能以疑為能相萬乘而不窕也論其親則子母之間也然猶不免議之於蔡嫗也今疑之於人主也非子母之親也而人主皆有蔡嫗人主之蔡嫗必其重人也重人者能行私者也夫行私者繩之外也而疑之所言法之內也繩之外與法之內讎也不相受也韓非子外儲說左王良造父天下之善御者也然而使王良操左革而咤叱使造父操右革而鞭笞之馬不能行十里共故也田連成竅天下善鼓琴者也然而田連鼓上成竅楫下而不能成曲亦共故也夫以王良造父之巧共轡而御不能使馬人主安能與其臣共權以為治以田連成竅之巧共琴而不能成曲人主又安能與其臣共勢以成功乎韓非子外儲說右今令王良造父共車人操一邊轡而入門閭駕必敗而道不至也令田連成竅共琴人撫一絃而揮則音必敗曲不遂矣韓非子外儲說右人主之左右不必智也人主於人有所智而聽之因與左右論其言是與愚人論智也人主之左右不必賢也人主於人有所賢而禮之因與左右論其行是與不肖論賢也智者决䇿於愚人賢士程行於不肖則賢智之士羞而人主之論悖矣韓非子孤憤周氏之嚳韓氏之盧天下疾狗也見兔而指屬則無失兔矣望見而放狗也則纍世不能得兔矣茍非不能屬之者罪也說苑善說魯君使宓子賤為單父宰子賤辭去因請借善書者二人使書憲書教品魯君豫之至單父使書子賤從旁引其肘書醜則怒之欲好書則又引之書者患之請辭而去歸以告魯君魯君曰子賤苦吾擾之使不得施其善政也乃命有司無得擅徴發單父單父之化大治新序雜事二齊有良兔曰東郭㕙蓋一旦而走五百里於是齊有良狗曰韓盧一旦而走五百里使之遙見而指屬則雖韓盧不及衆兔之塵若躡迹而縱緤則雖東郭㕙亦不能離今子之屬臣也躡迹而蹤緤與遙見而指屬與新序雜事五宋玉因其友見楚襄王襄王待之無以異乃讓其友友曰夫薑桂因地而生不因地而辛女因媒而嫁不因媒而親子之事王未耳何怨於我宋玉曰不然昔者齊有狡兔盡一日而走五百里使之瞻見指注雖良狗猶不及狡兔之塵若攝纓而縱紲之瞻見指注與韓詩外傳蘇秦相燕人惡之於燕王燕王按劍而怒食以駃騠白圭顯於中山中山人惡之於魏文矦文矦投以夜光之璧何則兩主二臣剖心析肝相信豈移於浮詞哉文選鄒陽於獄上書宓子賤仕魯為單父宰恐君聽用讒人使己不得行其政故請君近吏二人與俱至官令二吏書輒掣其肘書不善則從而怒之二吏患焉辭歸魯宓子曰書甚不善勉而歸矣二吏歸報於君曰宓子使臣書而掣搖臣肘書惡而又怒臣邑吏皆笑所以去之而來也君以問孔子孔子曰宓不齊君子也其才任霸王之佐屈節治單父將以自試意者其以此諫乎公悟太息歎曰寡人亂宓子之政而責其善者數矣藝文類聚巧藝部書鄭簡公謂子産曰飲酒之不樂鐘鼓之不鳴寡人之任也國家之不義朝廷之不治與諸矦交之不得志子之任也子無入寡人之樂寡人無入子之朝自是以來子産治鄭城門不閉國無盜賊道無餓人孔子曰若鄭簡公之好樂雖抱鐘而朝可也事文類聚鍾尸子有醫竘者秦之良醫也為宣王割座為惠王療疾皆愈張子之背腫命竘治之謂醫竘曰背非吾背也任之制焉治之遂愈竘誠善治疾也張子委制焉夫身與國亦猶此必有所委制然後治太平御覽方術部醫燭奸有屈軼之草生於庭佞人入朝則草指之竹書紀年上上惠其道下敦其業上下相希若望參表則邪者可知也管子君臣上從順獨逆從正獨辟此猶夜有求而得火也姦僞之人無所伏矣管子君臣上一曰長目二曰飛耳三曰樹明明知千里之外隱微之中曰動姦姦動則變更矣管子九守口者幾關也所以閉情意也耳目者心之佐助也所以窺間見姦邪鬼谷子權篇數至能人之門不一至主之廷百慮思家之便不一圖主之國韓非子有度今夫水之勝火亦明矣然而釜鬲間之水煎沸竭盡其上而火得熾盛焚其下水失其所以勝者矣今夫治之禁姦又明於此然守法之臣為釡鬲之行則法獨明於胸中而巳失其所以禁姦者矣韓非子備內託天下於堯之法則貞士不失分姦人不徼幸寄千金於羿之矢則伯夷不得亡而盜跖不敢取堯明於不失姦故天下無邪羿巧於不失發故千金不亡韓非子守道田子方問唐易鞫曰弋者何慎對曰鳥以數百目視子子以二目御之子謹周子廩田子方曰善子加之弋我加之國韓非子外儲說左宋人語曰一雀過羿必得之則羿誣矣以天下為之羅則雀不失矣夫知姦亦有大羅不失其一而已矣不修其理而以己之胸察為之弓矢則子産誣矣老子曰以智治國國之賊也其子産之謂也韓非子難三夫姦必知則備必誅則止不知則肆不誅則行夫陳輕貨於幽隱雖曾史可疑懸百金於市雖大盜不取也不知則曾史疑於幽隱必知則大盜不取懸金於市韓非子六反夫天下之所以惡莫惡於不可知也夫不可知盜不與期賊不與謀盜賊大姦也而猶所得匹偶又况於欲成大功乎吕氏春秋一行喻林卷六十八
