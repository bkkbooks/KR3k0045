body:
  text: 喻林卷五十明徐元太撰人事門四十八荒縱終風且暴顧我則笑終風且霾終風且曀與縊同不日有曀詩國風終風新臺刺衛宣公也納伋之妻作新臺于河上而要之毛詩新臺盧令刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉毛詩盧令隰有萇楚疾恣也國人疾其君之淫恣而思無情欲者也毛詩隰有萇楚女所行如是猶鳥飛行自恣東西南北時亦為弋射者所得言放縱久無所拘制則將遇伺女之間者得誅女也鄭氏箋詩桑柔然淇則有岸隰則有泮以自拱持今君子反薄而棄已放恣心意曽無所拘制言淇隰之不如毛詩正義氓沔然而滿者彼流水也此水之流湯湯然波流漫溢無所入既不注於海復不入大川以興强盛者彼諸侯也此諸侯奢僭放恣無所事既不朝天子又不事侯伯毛詩正義沔水鴥然而疾者彼飛隼其意欲飛則飛欲止則止自由無所畏也以喻彼諸侯欲朝則朝欲否則否自恣無所懼也毛詩正義沔水鴥然而疾飛者彼飛隼則已飛而不息則又加之遊揚妄相擊害以興彼自恣之諸侯則已不朝天子則又加以出兵妄相侵伐毛詩正義沔水鳥飛無定之物人心有定之主今鳥有所至人心反無至毛詩正義菀柳有鳥髙飛謂其終無所至亦至于天而止也今彼人幽王之心于何其所至乎言其心轉側無常人不知其所止毛詩正義菀柳無客而飲謂之從酒今若子者晝夜守尊謂之從酒也晏子春秋雜論下情所欲好耳所欲聽目所欲視口所欲嘗雖殊方偏國非齊土之所産育者無不必致之猶藩牆之物也及其游也雖山川阻險途徑修遠無不必之猶人之行咫步也列子楊朱縱而肆之其猶烈猛火於雲夢開積水乎萬仭其可撲以帚篲遏以撮壤哉抱朴子外篇疾謬清論所不能復制繩墨所不能復彈遂成鷹頭之蠅廟垣之鼠抱朴子外篇疾謬大過娣越姒媦云貴切陵姊風冞音迷于陂舟㲻音溺于水𫝊曰娣越姒長替於少也媦陵姊季僭於孟也風冞于陂過其度也舟㲻于水失其節也元包孟陽喘悸之息以喉為節言情欲奔競所致莊子音義大宗師過屠門而大嚼雖不得肉貴且快意當斯之時願舉泰山以為肉傾東海以為酒伐雲夢之竹以為笛斬泗濵之梓以為筝食若填巨壑飲若灌漏巵其樂固難量豈非大丈夫之樂哉文選曹植與吳季重書次五䝉柴求兕其德不美測曰䝉柴求兕得不慶也太𤣥經第一童次三裳格鞶鉤渝測曰裳格鞶鉤無以制也太𤣥經第二格五蓋覆心禪門已閉六塵在念亂想常馳類狂象之無鉤似戲猿之得樹法苑珠林卷八十四失道彼月而食則維其常此日而食于何不臧詩小雅十月之交誰能執熱逝不以濯其何能淑載胥及溺叶奴學反詩大雅桑柔發發飄風非有道之風偈偈疾驅非有道之車毛詩匪風注林中大木之處而維有薪蒸朝廷宜有賢者而但聚小人毛詩正月注違禮義不由其道猶雉鳴而求其牡矣毛詩匏有苦葉注賈物而有三倍之利者小人所宜知也君子反知之非其宜也今婦人休其蠶桑織紝之職而與朝廷之事其為非宜亦猶是也鄭氏箋詩瞻卬愛好美色不往見子都之美好間習者乃往見狂醜之人喻忽之好善不任用賢者反任用小人所美非美故刺之毛詩正義山有扶蘇不睹子充而睹狡童以喻昭公之好善不愛賢人而愛小人也毛詩正義山有扶蘇人既刈白華已漚為菅柔韌中用兮何為更取白茅收束之兮以白茅伐白華則脆而不堪用也以興王既聘申女已立為后禮儀充備兮何為更納褒姒嬖寵之兮以褒姒代申后則妬而將滅國也寵褒姒以黜申后似取白茅而棄韌菅毛詩正義白華交交然小者是桑扈之鳥也鳥自求生活當應肉食今既無肉循場啄粟而食之失其天性以此求活將必不能以興王者欲求治國當行善教今無善教施布亂政以治之失其常法以此求治終不可得毛詩正義小宛言老馬反為駒而用之猶王於老人反為童而遇之毛詩正義角弓聞以德和民不聞以亂以亂猶治絲而棼之也左傳隱公四年天反時為災地反物為妖民反德為亂亂則妖災生故文反正為乏左傳宣公十五年賈而欲贏而惡囂乎左傳昭公元年遷怒肆忿快意於行人譬諸豺狼求食而已春秋正義襄公十一年今有場師舍其梧檟養其樲棘則為賤場師焉孟子告子上拱把之桐梓人茍欲生之皆知所以養之者至於身而不知所以養之者豈愛身不若桐梓哉弗思甚也孟子告子上享而既具是棄禮若其不具是用粃稗用粃稗君辱棄禮名惡孔子家語相魯出令則如反汗用賢則如轉石去佞則如拔山如此望陰陽之調不亦難乎前漢書楚元王傳所冠不以仁義為冕所蹈不以賢佐為力終至顛蹶絶滅漢祚後漢書黃瓊列傳夫華離蒂而萎條去幹而枯女冶容而淫士背道而辜後漢書蔡雍列傳譬猶緣木求魚升山採珠後漢書劉𤣥傳畫真人於刻桷之室載退士於進趣之堂晉書嵇紹傳其於政也如農者之殖磽野旱年之望豐穡必不幾矣晉書阮种傳不悟清流在於澄源止輪由乎髙閎患生於本治之於末故也宋書袁湛傳誣飾蚯蚓兾招神龍宋書王微傳夫移心疾於股肱非良醫之美畏影迹而馳騖豈靜處之方南齊書王儉傳以此取士求之濟治譬猶却行以及前之燕而向楚魏書羊深傳沈於樂者洽於憂厚於味者薄於行慢於朝者緩於政害於國家者危於社稷管子中匡今君臨民若冦讐見善若避熱晏子春秋諫上以事生事又以事止事譬猶揚火而使無焚也以智生患又以智備之譬猶撓水而欲其清也文子道德汙其準粉其顙腐鼠在阼燒薰於堂文子上德福輕乎羽莫之知載禍重乎地莫之知避莊子人間世非人者必有以易之若非人而無以易之譬之猶以火救水也其說將必無可焉墨子兼愛下用事不巧則操末績顛圓鑿方枘情道兩失鬼谷子反應注天下敖然若燒若焦墨子雖為之衣褐帶索啜菽飲水惡能足之乎既以伐其本竭其原而焦天下矣荀子富國篇墨子之於道也猶瞽之於白黑也猶聾之於清濁也猶之楚而北求之也荀子樂篇衡不正則重懸於仰而人以為輕輕懸於俯而人以為重此人所以惑於輕重也權不正則禍託於欲而人以為福福託於惡而人以為禍此亦人所以惑於禍福也道者古今之正權離道而內自擇則不知禍福之所託荀子正名古之人目短於自見故以鏡觀面智短於自知故以道正已故鏡無見疵之罪道無明過之怨目失鏡則無以正鬚眉身失道則無以知迷惑韓非子觀行衛人有佐弋者鳥至因先以其裷麾之鳥驚而不射也韓非子外儲說左上鄭縣人乙子妻之市買鱉以歸過潁水以為渴也因縱而飲之遂亡其鱉韓非子外儲說左上使燕王內憎其民而外愛魯人則燕不用而魯不附民見憎不能盡力而務功魯見說而不能離死命而親他主如此則人臣為隙穴而人主獨立以隙穴之臣而事獨立之主此之謂危殆韓非子雜論法術棄玉取石者盲羊質虎皮者辱黃石公素書安履故欲以刑罰慈民辟其猶以鞭狎狗也雖久弗親矣故欲以簡泄得士辟其猶以弧怵鳥也雖久弗得矣賈子大政下今夫儒者不本其所以欲而禁其所欲不原其所以樂而閉其所樂是猶决江河之源而障之以手也夫牧民者猶畜禽獸也不塞其囿垣使有野心系絆其足以禁其動而欲修生夀終豈可得乎淮南子精神訓鑿五刑為刻削乃背道德之本而爭於錐刀之末斬艾百姓殫盡太半而欣欣然常自以為治是猶抱薪而救火鑿竇而出水淮南子覽冥訓愛熊而食之鹽愛獺而飲之酒雖欲養之非其道淮南子說林訓不能耕而欲黍粱不能織而喜采裳無事而求其功難矣淮南子說林訓游者以足蹶以手抪不得其數愈蹶愈敗及其能游者非手足者矣淮南子說林訓䝉塵而昧固其理也為其不出户而堁之也淮南子說林訓不修其身求之於人是謂失倫不治其內而修其外是謂大廢重載而危之操䇿而隨之非所以為全也說苑談叢鳴鼓逐狐不知跡處焦氏易林乾之無妄騎㹠逐羊不見所望焦氏易林乾之蹇鑿井求玉非卞氏寶名困身辱勞無所得焦氏易林蒙之臨氓伯以婚抱布自媒棄禮急情卒罹悔憂焦氏易林蒙之困空槽注猪㹠彘不到張弓視雞雄鳩飛去焦氏易林師之旅祼䄇逐狐為人所笑焦氏易林大有之咸耕石不富衡門屢空焦氏易林咸之需入水求玉失其所欲焦氏易林咸之否入市求鹿不見頓足焦氏易林遁之同人乘牛逐驥日暮不至焦氏易林損之蠱左手把水如灮與鬼不可得徙焦氏易林姤之旅氷入炭室消滅不息焦氏易林鼎之恆穿匏浥水搆鐵熒火勞疲力竭饑渴為禍焦氏易林艮之坤獨立山顛求麋耕田草木不闢秋饑無年焦氏易林未濟之無妄次六將其車入于丘虛測曰將車入虛道不得也太𤣥經第一礥次三戾其腹正其背測曰戾腹正背中外爭也太𤣥經第一戾次三羡迂塗不能直如測曰羡迂塗不能直行也太𤣥經第一羡次四男女事不代之字測曰男女事非厥務也太𤣥經第二事次二動于響景測曰動于響景不足觀聽也太𤣥經第二釋次二嚇河􅋯測曰嚇河之􅋯何可􅪇也太𤣥經第二爭次五交于鶯猩不獲其榮測曰交于鶯猩鳥獸同方也太𤣥經第二交次三化白于泥淄測曰化白于泥變不明也太𤣥經第三更次三準繩不甫亡其規矩測曰準繩不甫其用爽也太𤣥經第三法初一竈無實乞于鄰測曰竈無實有虛名也太𤣥經第四竈上九明珠彈于飛肉其得不復測曰明珠彈肉費不當也太𤣥經第四唐初一去此靈淵舍彼枯園測曰去此靈淵不以謙也太𤣥經第五去次三割鼻食口喪其息主測曰割鼻喪主損無榮也太𤣥經第六割次五大爵將飛拔其翮毛羽雖衆不得適測曰大雀拔翮不足賴也太𤣥經第六將今齊王失士而求諸侯是何異于失網而求魚乎天祿閣外史將才鏡明見人之首而人不推鏡破之而扢以𤣥錫摩以白旃是說鏡之明已也士有明已者陳已之短欲令長之以去其病而不德之反欲殺之是惡士之明已也呂氏春秋逹鬱解言桂蠧食芬香居髙顯不知留止妄欲移徙則失甘美之木亡其處也以言衆臣食君之祿不建忠信妄行佞諂亦將失其位喪其所也王逸注楚辭七諌神鳥至則衆鳥集從今反梟往處之故驚而鳴也王逸注楚辭九思名山宜神鳥處之猶朝廷宜賢者居位而今惟小人故云梟萃之也王逸注楚辭九思江離兮遺捐忠正之士棄山林也辛夷兮擠臧仁智之士抑沉沒也王逸注楚辭九懷昔倉梧丙娶妻美而以與其兄欲以為讓也則不如無讓焉尾生與婦人期於水邊水暴至不去而死欲以為信也則不如無信焉葉公之黨其父攘羊而子證之欲以為直也則不如無直焉陳仲子不食母兄之食出居於陵欲以為潔也則不如無潔焉宗魯受齊豹之謀死孟縶之難欲以為義也則不如無義焉徐幹中論貴言君子既有賢才又卜其居復順積德乃享元吉猶夫良農既懷善藝又擇沃土復加耘耔乃有盈倉之報耳今見愚民不能得福於吉居便謂宅無善惡何異覩種田之無十千而謂田無壤塉耶良田雖美而稼不獨茂卜宅雖吉而功不獨成相須之理誠然嵇中散集難宅無吉凶攝生論且鮑肆自玩而賤蘭茝猶海鳥對太牢而長愁文侯聞雅樂而塞耳嵇中散集答難養生論此何異識時雨之生物因垂拱而望嘉榖乎嵇中散集難宅無吉凶攝生論何異詣老空耕石田而望千倉之收用力雖盡不得其所也所謂適楚而道燕雖良馬而不到非行之不疾然失其道也抱朴子內篇勤求不知彼之求仙猶臨河羡魚而無網罟非河中之無魚也抱朴子內篇釋滯探燕巢而求鳯卵搜井底而捕鱔魚雖加至勤非其所有也抱朴子內篇釋滯謗讟不可以巧言弭實恨不可以虛事釋釋之非其道弭之不由理猶懷氷之遣冷重罏以却暑逐灮以逃影穿舟以止漏矣抱朴子外篇博喻彍棘矢而望髙手乎渠廣䇿疲駑而求繼軌於周穆放斧斤而欲雙巧於班墨忽良才而欲彛倫之攸敘不亦難乎抱朴子外篇名實夫冥山在乎北極而南行以觀之至仁在乎無親而仁愛以言之故郢雖見而愈遠冥山仁孝雖彰而愈非至理也郭子注莊天運莫知反一以息迹而逐迹以求一愈得迹愈失一斯大謬矣郭子注莊繕信運屈而恚天辱至而怨人是以火焚而怨燧人溺井而尤伯益劉子言苑亦何異救饑而與之珠拯溺而投之玉乎劉子隨時天由其時人由其道非時之夏望之不可見非道之正行之不可至揚子法言注寡見采庶子之春華忘家丞之秋實李善注文選陸韓卿答內兄希叔詩采薜荔兮水中搴芙蓉兮木末文選屈原湘君歌或益之以畎澮而泄之以尾閭欲坐望顯報者文選嵇康養生論夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也補文選賈讓治河奏駕蹇驢而無䇿兮又何路之能極以直針而為釣兮又何魚之能得廣文選東方曼倩哀命舟登陸其焉濟輪涉淵而無迹廣文選陸士龍紆思譬享海鳥以醇醪嘉膳栖林狖以崇楹曽拱茍非其實立有驚怖藝文類聚人部言志書火在井中不能燭遠目在足下不可以視近太平御覽天部三上為千金之裘而與狐謀之其皮不可得太平御覽服章部裘易傳曰當雷不雷陽德弱也初學記天部雷魯哀公問仲尼曰春秋之記曰冬十二月霣霜不殺菽何為記此仲尼對曰此言可以殺而不殺也夫宜殺而不殺桃李冬實天失道草木猶犯干之而况人君乎困學記聞卷六春秋陛下何愛其羽毛而踈其骨肉何氏語林針規暮世之治病也則不然治不本四時不知日月不審逆從病形已成乃欲微針治其外湯液治其內粗工凶凶以為可攻故病未已新病復起黃帝素問內經移精變氣論棄正從蹊徑欲疾閼不通盲者不柱杖聾者聽宮商恭同契亦猶和膠補釡以鋼塗瘡去冷加氷除熱用湯飛龜舞蛇終不可得恭同契今遇是道法寶城不應取此虛僞之物譬如商主遇真寶城取諸瓦礫而便還家元陽妙經卷十如彼愚人暗入空山覓天子綬靈寶通微經夫生人之所為大患莫急於疾疾而不治猶救火而不以水也華陽陶隱居集譬如有人執杖和怨負水求火勤苦積紀終不能得玉清經道化四夷品失吾生道如鳥失翼亦猶濟人忘其船筏遙想彼岸無由得度玉清經法印品譬如草木遠離地水定不虛生玉清經法印品譬如王子捨其父王更就餘人求為太子决不可得波羅蜜多經卷五百六十九譬如犢子若欲須乳必依其母若就餘牛則不可得波羅蜜多經卷五百六十九梵志欲遊人間語小兒曰我有少緣欲暫出行汝善守護此火慎勿使滅若火滅者當以鑽鑽木取火然之具械敕已出林遊行梵志去後小兒貪戲不數視火火遂便滅小兒戲還見火已滅吹灰求火不能得已便以斧劈薪求火復不能得又復斬薪置於􅍫中搗以求火又不能得爾時梵志於人間還詣彼林所問小兒曰吾先敕汝使守護火火不滅耶小兒對曰我向出戲不時護視火今以滅復問小兒汝以何方便更求火耶小兒報曰火出於木我以斧破木求火不得復斬之令碎置於臼中杵搗求火復不能得時彼梵志以鑽鑽木出火積薪而然告小兒曰夫欲求火法應如此不應破薪杵碎而求長阿含經卷七猶人求火以濕木為母以濕鑽鑽彼人如是為得火不答曰不也所以者何彼以濕鑽鑽於濕木是故不得中阿含經卷二十猶如有人欲得酥者以器盛水以抨抨之必不得酥所以者何以邪求酥謂抨水也中阿含經卷四十五猶如有人欲得油者以榨具盛沙以冷水漬而取壓之必不得油所以者何以邪求油謂壓沙也中阿含經卷四十五譬如明目士夫求堅固材執持利斧入於山林見大芭蕉樹牖直長大即伐其根斬截其鋒葉葉次剝都無堅實雜阿含經卷十譬如小火欲令其然增以樵炭非為增炭令火滅耶雜阿含經卷二十七譬如熾火欲令其滅足其乾薪豈不令火增熾然耶雜阿含經卷二十七猶若有人身中毒箭彼親屬慈愍人欲令安飲欲饒益之求索除毒箭師於是彼人作是念我不際箭要知彼人己姓是字是像是若長若短若中若黑若白若剎利族若婆羅門族若居士族若工師族若東方南方西方北方誰以箭中我我不除毒箭要當知彼弓為是薩羅木為是多羅木為翅羅鴦掘梨木我不除毒箭要當知彼筋若牛筋若羊筋若犛牛筋而用纒彼弓我不除毒箭要知彼弓弝為白骨耶為黑棘耶為赤棘耶箭喻經緣三如賣針人至針師門欲求賣針終不可售别釋雜阿含經卷十四譬如有人以炭畫日言相似者無有是處大乘造像功德經卷上悲九昔有國王有一好樹髙廣極大常有好果香而甜美時有一人來至王所王語之言此之樹上將生美果汝果能食不人答王言此樹髙廣雖欲食之何由能得即便斷樹望得其果既無所獲徒自勞苦後還欲竪樹已枯死都無生理世間之人亦復如是如來法王有持戒樹能生勝果心生願樂欲得果食應當持戒修諸功德不解方便反毁其禁如彼伐樹復欲還活都不可得百喻經卷上昔有癡人往大池所見水底影有真金像謂呼有金即入水中撓泥求覓疲極不得還出復坐須臾水清復現金色復更入裏撓泥更求覓亦復不得其父覓子得來見子而問子言汝何所作疲困如是子白父言水底有真金我時投水欲撓泥取疲極不得父看水底真金之影而如此金在於樹上所以知之影現水底其父言曰必飛鳥銜金著於樹上即隨父語上樹求得百喻經卷下昔邊國人不識於驢聞他說言驢乳甚美都無識者爾時諸人得一䭸驢欲捋其乳諍共捉之其中有捉頭者有捉耳者有捉尾者有捉腳者復有捉器者各欲先得於前飲之中捉驢根謂呼是乳即便捋之望得其乳衆人疲厭都無所得徒自勞苦空無所獲為一切世人之所嗤笑百喻經卷下二行增癡無益故如人風病服麨藥三昧法門經卷下如截耳欲著交露璫四阿含暮妙解藉五所求不以道不識事緣如􅢇角求乳無明覆故大智度論卷二十三如人能食一斛飯從有一斗者索欲以除饑是不能除大智度論卷四十一如人欲得堅實好木捨其根莖而取枝葉雖是木名而不中用大智度論卷四十一如人手垢還以垢洗云何得净大智度論卷九十五譬如癡犬有人打擲便逐瓦石不知尋本大莊嚴經論卷二偈南路求燕北轅首楚以斯適道千里而遙𢎞明集十夫飾匱貿珍曜夜不售所謂馳走滅迹跳動息影焉可免乎𢎞明集折夷夏論昔有一人欲得王意問餘人言云何得之有人語言若欲得意王形相汝當效之此人見王眼曘便效王曘王問之言汝為病耶為著風耶何以眼曘其人答王我不病眼亦不著風欲得王意見王眼曘故效王也王聞是語即大瞋恚使人加害擯令出國法苑珠林卷五十三昔有愚人煮黑石蜜有一富人來至其家時此愚人取石蜜漿為富人煮即於火上以扇扇之望得使冷傍人語言下不止火扇扇不已云何得冷爾時人衆悉皆嗤笑法苑珠林卷五十五聽神天道遠人道邇待蓍龜而襲求福之末也顛蹶望拜而謁焉其待則薄矣子華子北宫意問然則有鬼乎曰有沈有履竈有髻戶內之煩壤雷霆處之東北方之下者陪阿鮭蠪躍之西北方之下者則泆陽處之水有罔象丘有崒山有䕫野有倣徨澤有委蛇莊子逹生日月食而救之天旱而雩卜筮而後决大事非以為得求也以文之也故君子以為文而百姓以為神以為文則吉以為神則凶荀子天論篇人處疾則貴醫有禍則畏鬼聖人在上則民少欲民少欲則血氣治而舉動理舉動理則少禍害夫內無痤疽疸痔之害而外無刑罰法誅之禍者其輕恬鬼也甚故曰以道蒞天下其鬼不神治世之民不與鬼神相害也故曰非其鬼不神也其神不傷人也韓非子解老初時者魏數年東鄉攻盡陶衛數年西鄉以失其國此非豐隆五行太一王相攝提六神五括天河殷搶嵗星非數年在西也又非天缺弧逆刑星熒惑奎台非數年在東也故曰龜策鬼神不足舉勝左右背鄉不足以専戰然而恃之愚莫大焉韓非子飾邪世俗言曰饗大髙者而彘為上牲葬死人者裘不可以藏相戲以刃者太祖軵其肘枕戶橉而卧者鬼神跖其首此皆不著於法令而聖人之所不口𫝊也夫饗大髙而彘為上牲者非彘能賢於野獸麋鹿也而神明獨饗之何也以為彘者家人所常畜而易得之物也故因其便以尊之裘不可以藏者非能其綈綿曼帛溫暖於身也世以為裘者雖得貴賈之物也而不可𫝊於後世無益於死者而足以養生故因其資以讋之相戲以刃太祖軵其肘者夫以刃相戲必為過失過失相傷其患必大無涉血之讐爭忿鬭而以小事自內於刑戮愚者所不知忌也故因太祖以纍其心枕戶橉而卧鬼神履其首者使鬼神能𤣥化則不待户牖之行若循虛而出入則亦無能履也夫户牖者風氣之所往來而風氣者陰陽粗粗者也離者必病故託鬼神以伸誡之也淮南子汜論訓信鬼神者失謀信日者失時何以知其然夫賢聖周知能不時日而事利敬法令貴功勞不卜筮而身吉謹仁義順道理不禱祀而福說苑反質齊大旱之時景公召羣臣問曰天不雨久矣民且有饑色吾使人卜之祟在髙山廣水寡人欲少賦斂以祠靈山可乎羣臣莫對晏子進曰不可祠此無益也夫靈山固以石為身以草木為髮天久不雨髮將焦身將熱彼獨不欲雨乎祠之無益景公曰吾欲祠河伯可乎晏子曰不可祠此無益也夫河伯以水為國以魚鱉為民天久不雨水泉將下百川竭國將亡民將滅矣彼獨不用雨乎祠之何益景公曰今為之奈何晏子曰君誠避宫殿暴露與靈山河伯共憂其幸而雨乎劉向說苑辨物載璧秉圭請命于河焦氏易林同人之晉行如桀紂雖禱不祐焦氏易林復之姤猪肩羊膊可以得兆雚葦藁芼可以得數何必以蓍龜王充論衡卜筮篇非犧牲之不博碩非玉帛之不豐穰信之非不𣢾敬之非不重有丘山之損無毫釐之益抱朴子內篇道意信鬼神何異以踵解結終無益也意林纒子鬼神明於聖人猶聰明耳目之與聾盲也藝文類聚雜氣物部鼎插桃枝於户連灰其下童子入不畏而鬼畏之是鬼智不如童子也困學紀聞卷十諸子夫自稱山嶽神者必是蟒蛇自稱江海神者必是黿鼉魚鱉自稱天地父母神者必是貓貍野獸自稱將軍神者必是熊羆虎豹自稱仕人神者必是猿猴㹢玃自稱宅舍神者必是犬羊猪犢門户井竈破器之屬𢎞明集十四喻林卷五十
