body:
  text: 喻林卷八十八明徐元太撰文章門三重質凡物暫時榮華而即隕落者由體質虚薄也若能篤厚充實則恒保榮美周易正義大畜治寶物為器所以可雕琢其體以為文章者以金玉本有其質性故也以喻文王所以可修飾其道以為聖敎者由本心性有睿聖故也毛詩正義棫樸甘受和白受采忠信之人可以學禮禮記禮器醴酒之用𤣥酒之尚割刀之用鸞刀之貴莞簟之安而槀鞂之設是故先王之制禮也必有主也禮記禮器大羹不和貴其質也大圭不琢美其質也丹漆雕幾之美素車之乘尊其樸也貴其質而已矣禮記郊特牲夫悲哀在中故形變於外也痛疾在心故口不甘味身不安美也禮記問喪素以為絢兮何謂也子曰繪事後素曰禮後乎論語八佾賁非正色也是以嘆之吾思夫質素白當正白黑當正黑夫質文何也吾聞丹漆不文白玉不雕寶珠不飾何也質有餘者不受飾也孔子集語上祭祀之道莫盛修徳故紂之牛牲不如文王之蘋藻也前漢書郊祀志註禮與其奢也寧儉事與其煩也寧略言與其華也寧質行與其綵也寧朴前漢紀孝元中且美貌者不待華采以崇好豔姿者不待文綺以致愛呉志華覈傳若極粉黛窮盛服未必無醜婦廢華采去文繡未必無美人也呉志華覈傳實衆流之江海乃羣藝之本根北齊書杜弼傳雖有珉之彫彫不若玉之章章荀子法行弓調而後求勁焉馬服而後求良焉士信慤而後求知能焉士不信慤而有多知能譬之其豺狼也不可以身爾也荀子哀公夫恃貌而論情者其情惡也須飾而論質者其質衰也何以論之和氏之璧不飾以五采隋侯之珠不飾以銀黄其質至美物不足以飾之夫物之待飾而後行者其質不美也韓非子解老古之為金石管絃者所以宣樂也兵革斧鉞者所以飾怒也觴酌俎豆酬酢之禮所以效善也衰絰菅屨辟踊哭泣所以諭哀也此皆有充於内而成象於外淮南子主術訓古者非不知繁升降槃還之禮也蹀采齊肆夏之容也以為曠日煩民而無所用故制禮足以佐實喻意而已矣古者非不能陳鐘鼓盛筦簫揚干戚奮羽旄以為費財亂政制樂足以合歡宣意而已喜不羨於音非不能竭國靡民虚府殫財含珠鱗施綸組節束追送死也以為窮民絶業而無益於枯骨腐肉也故塟薶足以收斂葢藏而已淮南子齊俗訓送往者非所以迎來也施死者非專為生也誠出於已則所動者逺矣錦繡登廟貴文也圭璋在前尚質也文不勝質之謂君子淮南子繆稱訓春秋之序道也先質而後文右志而左物禮云禮云玉帛云乎哉推而前之亦宜曰朝云朝云辭令云乎哉樂云樂云鐘鼓云乎哉引而後之亦宜曰喪云喪云衣服云乎哉春秋繁露玉杯内無其質而外學其文雖有賢師良友若畫脂鏤氷費日損功故良師不能飾戚施香澤不能化嫫母也鹽鐵論殊路食必常飽然後求美衣必常暖然後求麗居必常安然後求樂為可長行可久先質而後文此聖人之務説苑反質實無華則野華無實則史華實副則禮山雌之肥其意得乎揚子修身或曰有人焉自姓孔而字仲尼入其門升其堂伏其几襲其裳則可謂仲尼乎曰其文是也其質非也敢問質曰羊質而虎文見草而説見豺而戰忘其皮之虎也聖人虎别其文炳也君子豹别其文蔚也辯人貍别其文萃也貍變則豹豹變則虎揚子吾子次三大文彌樸孚似不足測曰大文彌樸質有餘也太𤣥經第四文繁文之人人之傑也有根株於下有榮葉於上有實核於内有皮殻於外文墨辭説士之榮葉皮殻也實誠在胸臆文墨著竹帛外内表裏自相副稱意奮而筆縱故文見而實露也人之有文也猶禽之有毛也毛有五色皆生於體茍有文無實是則五色之禽毛妄生也王充論衡超竒篇夫玉之堅也金之剛也氷之冷也火之熱也豈須自言然後明哉抱朴子外篇重言物貴濟事而飾為其末化俗以德而言非其本故緜布可以禦寒不必貂狐淳素可以匠物不在文辯抱朴子外篇廣譬夫桃李不言而成蹊有實存也男子樹蘭而不芳無其情也夫以草木之微依情待實況乎文章述志為本言與志反文豈足徵是以聨辭結采將欲明理采濫辭詭則心理愈翳固知翠綸桂餌反所以失魚言隠榮華殆謂此也是以衣錦褧衣惡文太章賁象窮白貴乎反本文心雕龍情采心定而後結音理正而後摛藻使文不滅質愽不溺心正采耀乎朱藍間色屛於紅紫乃可謂雕琢其章彬彬君子矣文心雕龍情采質不美者雖崇飾而不華曲不和者雖響疾而不哀理動於心而見於色情發於中而形於聲故强懽者雖笑不樂强哭者雖哀不悲劉子言苑紅黛飾容欲以為豔而動目者稀揮絃繁弄欲以為悲而驚耳者寡由於質不美也劉子言苑畫以摹形故先質後文言以寫情故先實後辯無質而文則畫非形也不實而辯則言非情也劉子言苑夫工人之染先修其質後事其色質修色積而染工畢矣學亦有質孝悌忠信是也廣文選虞允文訓諸生誥吾欲錦中而紵裘不欲綉表而麻裏猶論者寧匱於辭不匱於理意林秦子將飛者翼伏將奮者足跼將噬者爪縮將言者口黙將文者且朴意林化清經日月麗天可瞻而難附羣物著地可見而易制夫逺不可識文之觀也近而得察質之用也藝文類聚人部質文論洛妃高髻不姿於芳澤𤣥妻長髮無藉於金鈿故雲名由於自美蟬稱得於天然是以梁妻獨其妖豔衞姬專其可憐藝文類聚雜文部連珠孔子卜得賁孔子曰不吉子貢曰夫賁亦好矣何謂不吉乎孔子曰夫白而白黑而黑夫賁又何好乎困學記聞卷一易譬如寶珠若有莊飾或不莊飾其珠何異勝天王波羅蜜經譬如塑師先以堅木後以繩纒造諸形狀雖未有泥如是之時名為骨相大寶積經卷五十五譬如浄潔白㲲易為受色長阿含經卷三譬如新塔易為杇色長阿含經卷十二如人有㲲布㲲布有垢人欲染作色以著染中色不明佛般泥洹經卷二譬如白繒浄好持著染中即受好色樓灰經㣼利天品譬如良田耕治調柔以時下種溉灌豐渥所獲必多大智度論卷二十二賁質七介以相見也不然則已慤三辭三讓而至不然則已蹙禮記禮器其有帝資懸解天縱多能摛黼黻於生知問珪璋於先覺譬彫雲之自成五色猶儀鳯之冥㑹八音北齊書文苑傳畫繢飾以丹青彫琢成其器用北齊書文苑傳若以絲麻加之女工為緇素青黄色名雖殊其質則一是以詩有素絲不曰絲素禮有緇布不曰布緇孔叢子公孫龍鐘鼓管簫干鏚羽旄所以餙喜也衰絰苴杖哭踊有節所以飾哀也兵革羽旄金鼓斧鉞所以飾怒也必有其質乃為之文淮南子本經訓質幹在乎自然華藻在乎人事太𤣥經𤣥瑩有骨無肉脂腴不足王充論衡量知篇丹幃接網組帳重蔭則醜姿翳矣朱漆致飾錯塗炫耀則枯木隠矣是以六藝備則卑鄙化為君子衆譽集則孤陋邈乎貴遊抱朴子外篇博喻不覩瓊琨之熠爍則不覺瓦礫之可賤不覩虎豹之或蔚則不知犬羊之質漫聆白雪之九成然後悟巴人之極鄙識儒雅之汪濊爾乃悲不學之固陋抱朴子外篇廣譬聖文之雅麗固御華而佩實者也文心雕龍徵聖忠足而言文情信而辭巧迺含章之玉牒秉文之金科矣文心雕龍徵聖剛健旣實輝光乃新其為文用譬征鳥之使翼也文心雕龍風骨周書論士方之梓材蓋貴器用而兼文采也是以樸斵成而丹雘施垣墉立而雕圬附文心雕龍程器夫水性虚而淪漪結木體實而華萼振文附質也虎豹無文則鞹同犬羊犀兕有皮而色資丹漆質待文也若乃綜述性靈敷寫器象鏤心鳥跡之中織辭魚網之上其為彪炳縟彩明矣文心雕龍情采或問聖人表裏曰威儀文辭表也德行忠信裏也揚子重黎篇作文之體必須文質相半雅豔相資今文少而質多故既雅而不豔比之大羮而闕其餘味方之古樂而同其清汜言質之甚也李善註文選文賦若夫椎輪為大輅之始大輅寧有椎輪之質增氷為積水所成積水曾微增氷之凜何哉葢踵其事而增華變其本而加厲物既有之文亦宜然文選序理扶質以立幹文垂條而結繁文選文賦如彼梓材弗勤丹漆雖勞樸斵終負素質文選張華勵志詩如彼隨和發彩流潤如彼錦繢􅍌素㸃絢文選潘岳夏侯常侍誄譬如眞金以衆妙寶間錯莊嚴轉更增勝倍益光明餘莊嚴具所不能及大方廣佛華嚴經三十七譬如多縷纈衣衣無多色若入染器後於衣上種種相貌方得顯現攝大乗論釋卷二修詞雕藻淫豔傾炫心魂亦猶五色之有紅紫八音之有鄭衞南齊書文學傳史臣論如析薪貴能破理斤利者越理而横斷辭辨者反義而取通文心雕龍論説欲吹霜噴露寒暑筆端文心雕龍史傳製同他文理宜刪革若俳人美辭以為已力寶玉大弓終非其有全寫則掲篋傍採則探囊文心雕龍指瑕異體相資如左右肩股該舊而知新亦可以屬文文心雕龍練字體物為妙功在宻附故巧言切狀如印之印泥不加雕削而曲寫毫芥故能瞻言而見貌印字而知時也文心雕龍物色章句在篇如繭之抽緒原始要終體必鱗次文心雕龍章句拙辭或孕於巧義庸事或萌於新意視布於麻雖未足貴杼軸獻功煥然乃珍文心雕龍神思神居胸臆而志氣統其關鍵物沿耳目而辭令管其樞機樞機方通則物無隠貌關鍵將塞則神有遯心文心雕龍神思陶鈞文思貴在虚静疏瀹五藏澡雪精神積學以儲寶酌理以富才研閲以窮照馴致以繹辭然後使𤣥解之宰尋聲律而定墨獨照之匠闚意象而運斤文心雕龍神思鎔冶經典之範翔集子史之術洞曉情變曲昭文體然後能莩甲新意雕畫竒辭文心雕龍風骨夫翬翟備色翾翥百步肌豐而力沈也鷹隼之采翰飛戾天骨勁而氣猛也文章才力有似於此若風骨乏采則鷙集翰林采乏風骨則雉竄文囿唯藻耀而高翔固文筆之鳴鳯也文心雕龍風骨蔚彼風力嚴此骨鯁才鋒峻立符采克炳文心雕龍風骨賛刻鏤聲律萌芽比興結慮司契垂帷制勝文心雕龍神思賛凡切韻之動勢若轉圓訛音之作甚於枘方免乎枘方則無大過矣文心雕龍聲律左礙而尋右末滯而討前則聲轉於吻玲玲如振玉辭靡於耳纍纍如貫珠文心雕龍聲律鍊才洞鑒剖字鑚響疎識濶略隨音所遇若長風之過籟東郭之吹竽耳古之佩玉左宫右徵以節其步聲不失序音以律文其可㤀哉文心雕龍聲律摽清務逺比音則近吹律胸臆調鐘脣吻聲得鹽梅響滑榆槿割棄支離宫商難隠文心雕龍聲律夫百節成體共資榮衞萬趣㑹文不離辭情若情周而不繁辭運而不濫非夫鎔裁何以行之乎文心雕龍鎔裁蹊要所司職在鎔裁櫽括情理矯揉文采也規範本體謂之鎔剪截浮詞謂之裁裁則蕪穢不生鎔則綱領昭暢譬繩墨之審分斧斤之斵削矣文心雕龍鎔裁篇章戸牖左右相瞰辭如川流溢則泛濫權衡損益斟酌濃淡芟繁剪穢㢮於負擔文心雕龍鎔裁贊夫絶筆斷章譬乘舟之振楫克終底績寄在寫逺若首唱榮華而媵句憔悴則遺勢鬱湮餘風不暢此周易所謂臋無膚其行次且也惟首尾相援則附㑹之體固亦無以加於此矣文心雕龍附㑹夫畫者謹髮而易貌射者儀毫而失牆鋭精細巧必疎體統故宜詘寸以信尺枉尺以直尋棄偏善之巧學具美之績文心雕龍附㑹何謂附㑹謂總文理統首尾定與奪合涯際彌綸一篇使雜而不越者也若築室之須基構裁衣之待縫緝矣文心雕龍附㑹理不謬揺其枝字不妄舒其藻文心雕龍議對雖復契㑹相參節文互雜譬五色之錦各以本采為地矣文心雕龍定勢舒華布實獻贊節文繩墨以外美材既斵故能首尾圓合條貫始序文心雕龍鎔裁藏若景滅行猶響起文選文賦辭程才以效伎意司契而為匠文選文賦抱景者咸叩懐響者畢彈或因枝以振葉或沿波而討源文選文賦暨意聲之迭代若五色之相宣文選文賦或藻思綺合清麗芉眠炳若縟繡悽若繁絃文選文賦言文之來若龍之見煙雲之上如鳥之在波瀾之中李善註文選文賦雖無佳偶因而留之譬若水石之藏珠玉山川為之輝媚也李善註文選文賦音聲迭代而成文章若五色相宣而為繡李善註文選文賦銓衡所裁茍有輕重雖應繩墨須必除之李善註文選文賦馬因警策而彌駿文資片言而益明李善註文選文賦播芳𬎼之馥馥發清條之森森藝文類聚雜文部賦賦風雲吐於行間珠玉生於字裏藝文類聚雜文部書五聲調應則宫徵成其文八音克諧則絃管和其韻文苑英華宇文逌文集一序雖雕琢一字猶是玉之本體太平御覽文部改易體格吾之文章體亦何異何嘗顚温涼而錯寒暑綜哀樂而横歌哭哉政以屬辭多出比事不羈不阡不陌非途非路耳南齊書張融傳麗詞雅義符采相勝如組織之品朱紫畫繪之著𤣥黄文雖新而有質色雖糅而有儀此立賦之大體也文心雕龍銓賦擬諸形容則言務纎宻象其物宜則理貴側附斯又小制之區畛竒巧之機要也文心雕龍銓賦函人欲全矢人欲傷術在糾惡勢必深峭詩刺讒人投畀豺虎禮嫉無禮方之鸚猩墨翟非儒目以豕彘孟軻譏墨比諸禽獸文心雕龍奏啟刺者達也詩人諷刺周禮三刺事敘相達若針之通結矣文心雕龍書記辭之待骨如體之樹骸情之含風猶形之包氣結言端直則文骨成焉意氣駿爽則文風清焉若豐藻克贍風骨不飛則振采失鮮負聲無力文心雕龍風骨夫隠之為體義生文外祕響傍通伏采潛發譬爻象之變𤣥體川瀆之韞珠玉也故𤣥體變文而成化四象珠玉潛水而瀾表方圓文心雕龍隠秀綜意淺切者類乏醖藉斷辭辨約者率乖繁縟譬激水不漪槁木無陰自然之勢也是以繪事圖色文辭盡情色糅而犬馬殊形情交而雅俗異勢鎔範所擬各有司匠雖無嚴郛難得踰越文心雕龍定勢勢者乗利而為制也如機發矢直澗曲文囘自然之趣也圓者規體其勢也自轉方者矩形其勢也自安文章體勢如斯而已文心雕龍定勢夫通衢夷坦而多行捷徑者趨近故也正文明白而常務反言者適俗故也文心雕龍定勢形生勢成始末相承湍迴似規矢激如繩因利騁節情采自凝狂轡學步力心襄陵文心雕龍定勢贊論文之方譬諸草木根幹麗土而同性臭味晞陽而異品矣文心雕龍通變雖軒翥出轍而終入籠内文心雕龍通變其控引情理送迎際㑹譬舞容迴環而有綴兆之位歌聲靡曼而有抗墜之節也文心雕龍章句才性異區文體繁詭辭為膚根志實骨髓雅麗黼黻淫巧朱紫習亦凝眞功沿漸靡文心雕龍體性贊凡為文章猶人乗騏驥雖有逸氣當以銜勒制之勿使流亂軌躅放意填坑􅜌也文章當以理致為心胸氣調為筋骨事義為皮膚華麗為冠冕顔氏家訓文章悲雅俱有所以成樂直雅而無悲則不成李善註文選文賦文章之體有萬變之殊衆物之形無一定之量李善註文選文賦吐藴美也不盡於味大也不盡其彚太𤣥經大𤣥告玉隠石間珠匿魚腹故為深覆及玉色剖於石心珠光出於魚腹其隠乎猶吾文未集於簡札之上藏於胸臆之中猶玉隠珠匿也及出荴露猶玉剖珠出乎爛若天文之照順若地理之曉嫌疑隠微盡可名處王充論衡自紀篇夫神思方運萬塗競萌規矩虚位刻鏤無形登山則情滿於山觀海則意溢於海我才之多少將與風雲而並驅矣文心雕龍神思心術之動逺矣文情之變深矣源奥而𣲖生根盛而穎峻文心雕龍隠秀言之秀矣萬慮一交動心驚耳逸響笙匏文心雕龍隠秀贊管仲有言無翼而飛者聲也無根而固者情也然則聲不假翼其飛甚易情不待根其固匪難以之垂文可不愼歟文心雕龍指瑕意得則舒懐以命筆理伏則投筆以卷懷逍遥以針勞談笑以藥勌常弄閑於才鋒賈餘於文勇使刃發如新凑理無滯雖非胎息之邁術斯亦衞氣之一方也文心雕龍養氣五色雜而成黼黻五音比而成韶夏五情發而為辭章神理之數也文心雕龍情采鉛黛所以飾容而盼倩生於淑姿文采所以飾言而辯麗本於情性故情者文之經辭者理之緯經正而後緯成理定而後辭暢此立文之本源也文心雕龍情采心險如山口壅若川怨怒之情不一歡謔之言無方文心雕龍諧讔夫志在山水琴表其情況形之筆端理將焉匿文心雕龍知音山沓水匝樹雜雲合目既往還心亦吐納文心雕龍物色賛兼采聲一無聽物一無文味一無果物一不講國語鄭貝錦以繁采發輝和羮以鹽梅致㫖宋書夷巒天竺傳夫重色而成文累味而備珍韓詩外傳文者㑹集衆綵以成錦繡㑹集衆字以成辭義如文繡然也釋名合錙銖可以齊重於山陵聚百十可以致數於億兆羣色㑹而衮藻麗衆音雜而韶濩和抱朴子外篇尚博清音貴於雅韻克諧著作珍乎判微析理故八音形器異而鍾律同黼黻文物殊而五色均徒閑澀有主賓妍蚩有步驟是則總章無常曲大庖無定味抱朴子外篇辭義夫梓豫山積非班匠不能成機巧衆書無限非英才不能收膏腴何必尋木千里乃搆大厦鬼神之言乃著篇章乎抱朴子外篇辭義五味舛而竝甘衆色乖而皆麗抱朴子外篇辭義夫驥足雖駿纒牽忌長以萬分一累且廢千里況文體多術共相彌綸一物携二莫不解體所以列在一篇備總情變譬三十之輻共成一轂文心雕龍總術物雖胡越合則肝膽文心雕龍比興賛以此庸音而偶彼佳句譬以下里鄙曲綴於白雪之高唱雖美惡不倫且以益夫所偉也李善註文選文賦石韜玉而山暉水懷珠而川媚彼榛楛之勿翦亦蒙榮於集翠綴下里於白雪吾亦濟夫所偉文選文賦五色相宣八音恊暢由乎𤣥黄律吕各適物宜文選沈約謝靈運傳論績事以衆色成文蜜蠭以兼采為味故能使絢素有章甘踰本質廣文選裴松之上三國志注表明達天下者非一士之術營宫廟者非一匠之矩也藝文類聚人部質文論竒特激楚揚阿至妙之容臺牧者之所貪飛兔騕䮍絶足奔放良樂之所急後漢書文苑列傳選士以射心平體正執弓矢審固然後射中論説之出猶弓矢之發也論之應理猶矢之中的夫射以矢中效巧論以文墨驗竒竒巧俱發於心其實一也王充論衡超竒篇以此易見比彼難曉猶溝澮之方江河螘垤之竝嵩岱矣故水不發崑山則不能揚洪流以東漸書不出英俊則不能備致逺之𢎞韻焉抱朴子外篇鈞世今詩與古詩俱有義理而盈於差美方之於士並有德行而一人偏長藝文不可謂一例也比之於女俱體國色而一人獨閑百伎不可混為無異也抱朴子外篇鈞世音為知者珍書為識者傳瞽曠之調鍾未必解於同世格言高文豈患莫賞而減之哉抱朴子外篇喻蔽止波之修鱗不出窮谷之隘鸞棲之峻木不秀培塿之卑九疇之格言不吐庸猥之口金板之高算不出恒民之懷覩百抱之枝則足以知其本之不細覩汪濊之文則足以覺其人之淵䆳抱朴子外篇博喻實聖文之羽翮記籍之冠冕也文心雕龍史傳樹骨於訓典之區選言於宏富之路使意古而不晦於深文今而不墜於淺義吐光芒辭成廉鍔則為偉矣文心雕龍封禪至如氣貌山海體勢宫殿嵳峩揭業熠燿焜煌之狀光采煒煒而欲燃聲貌岌岌其將動矣文心雕龍夸飾夫駕之法以策駕乘今以一言之好最於衆辭若策驅馳故云警策李善註文選文賦作文利害理難俱美或有一句同乎苕發頴豎離於衆辭絶於致思也李善註文選文賦文之綺麗若經緯相成一句既佳塊然立而特峙非常音所能緯也李善註文選文賦沈辭怫悦若遊魚銜鉤而出重淵之深浮藻聨翩若翰鳥纓繳而墜曽雲之峻文選文賦芬馥歇繭若清越奪琳珪文選顔延之和謝靈運詩雲屋天搆匠者何工文選任彦升王文憲集序甘泉宫裏玉樹一叢𤣥武闕前明珠六寸不得譬此光芒方斯照燭文苑英華庾信謝文序并和詩啟藏之山嵓可使雲霧鬱起濟之江浦必當蛟龍繞船文苑英華庾信謝文序并和詩譬猶得海水之一珠不下崑山之片玉文苑英華庾信釋一碑喻林卷八十八
