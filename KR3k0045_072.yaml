body:
  text: 喻林卷七十二明徐元太撰君道門十二養士菁菁者莪樂育材也君子能長育人材則天下喜樂之矣毛詩菁菁者莪大陵曰阿君子能長育人材如阿之長莪菁菁然毛詩菁菁者莪注視彼洛水灌溉以時其澤浸潤以成嘉榖喻古明王恩澤加於天下爵命賞賜以成賢者鄭氏箋詩瞻彼洛矣駜然肥强者彼之所乘黃馬也將欲乘之先養以芻秣故得肥强乘之則可以升髙致逺得為人用矣以興僖公有賢能之臣將任之先致其祿食故皆盡忠任之則可以安國治民得為君用矣毛詩正義有駜傳以馬之肥强喻臣之强力馬由人所養飼乃得肥强肥强乃能致逺人得祿食充足乃能盡忠盡忠乃肯用力若其不然雖有强力不肯用之毛詩正義有駜田需對管燕曰士三食不得饜而君鵝鶩有餘食下宫糅羅紈曳綺縠而士不得以為緣且財者君之所輕死者士之所重君不肯以所輕與士而責士以所重事君非士易得而難用也戰國䇿齊宣王地之美者善養禾君之仁者善養士前漢書賈山傳夫不素養士而欲求賢譬猶不琢玉而求文采也前漢書董仲舒傳馬不伏厯不可以趨道士不素養不可以重國前漢書李尋傳一年之計莫如樹穀十年之計莫如樹木終身之計莫如樹人一樹一穫者穀也一樹十穫者木也一樹百穫者人也我茍種之如神用之舉事如神唯王之門管子權修夫樹橘柚者食之則甘嗅之則香樹枳棘者成而刺人故君子慎所樹韓非子外儲說左夫馴烏斷其下頷焉斷其下頷則必恃人而食焉得不馴乎夫明主畜臣亦然令臣不得不利君之祿不得無服上之名韓非子外儲說左譬鉛刀畜之而干將用之不亦難乎韓詩外傳厨中有臭肉則門下無死士今夫三升之稷不足於士而君鴈鶩有餘粟紈素綺繡靡麗堂楯從風雨弊而士曾不得以緣衣果園梨栗後宫婦人托以相擲而士曾不得一嘗且夫財者君之所輕也死者士之所重也君不能用所輕之財而欲使士致所重之死豈不難乎哉說苑尊賢養雞生雛畜馬得駒明堂太學君子所居焦氏易林困之頥次七雉之不祿而雞盡穀測曰雉之不祿難幽養也太𤣥經第四文言已種植衆芳幸其枝葉茂長實核成熟願待天時吾將穫取收藏而饗其功也以言君亦宜畜養衆賢以時進用而待仰其治也王逸注楚辭離騷經夫庸𨽻猶不可以不拊循而卒盡其力士安可以無素養而暴得其用哉抱朴子外篇貴賢竈不用薪猶國不用祿以養賢也薪而不用金鬲虛廢太𤣥經第四竈解諺曰穀千駑不如養一驢穀駑養虎大無益也廣文選曹子建黃初五年令唐堯至仁不能容無益之子湯武至聖不能養無益之臣九折臂知為良醫吾知所以待下矣廣文選曹子建黃初五年令馬不素養難以追逺士不素簡難以趨急意林正論勤民木上有水井君子以勞民勸相易井井之為義汲養而不窮君子以勞來之恩勤恤民隱勸助百姓使有成功則此養而不窮也周易正義井恫瘝乃身書康誥助余體民無小不敬如毛在躬拔之痛無不省汲冡周書程典解師人多寒王巡三軍拊而勉之三軍之士皆如挾纊左傳宣公十二年康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而後嫁者也大學蓋君者心也民猶支體支體傷則心憯怛前漢書武帝紀治國之道當愛民如慈父訓民如嚴師周書蘇綽傳惠施於民必無愛財民如牛馬數餧食之太公六韜三疑善為國者馭民如父母之愛子如兄之愛弟見其饑寒則為之憂見其勞苦則為之悲賞罰如加於身賦斂如取於己此愛民之道也太公六韜國務今有負其子而汲者隊其子於井中其母必從而道之今歲凶民饑道餓重其子此疚於隊其可無察邪墨子七患足寒傷心民怨傷國根枯枝朽民困國殘山將崩者下先隳國將亡者民先弊黃石公素書安履髙臺層榭接屋連閣非不麗也然民有掘穴狹廬無所託身者明主弗樂也肥醲甘脆非不美也然民有糟糠菽粟不接於口者則明主弗甘也匡牀蒻席非不寧也然民有處邊城犯危難澤死暴骸者明主弗安也淮南子主術訓胎生孚乳長息成就焦氏易林乾之離下有憂民則上不盡樂下有饑民則上不備膳下有寒民則上不具服徒跣而垂旒非禮也故足寒傷心民寒傷國申鑒政體慈父之於子孝子之於親知病不祀神疾痛不和藥又知病之必不可治治之無益然終不肯安坐待絶猶卜筮求祟召醫和藥者惻痛殷勤冀有驗也既死氣絶不可如何升屋之危以衣招復悲恨思慕冀其悟也雩祭者之用心慈父孝子之用意也王充論衡變動篇若乃肆情縱欲而不與天下共其樂故有憂莫之恤也削基增峻而不覺下墮則上崩故傾頽莫之扶也抱朴子外篇君道堯瘦舜黑皆為民也意林尸子楚莊王攻宋厨有臭肉樽有敗酒將軍子重諫曰今君厨肉臭而不可食樽酒敗而不可飲而三軍之士皆有饑色欲以勝敵不亦難乎莊王曰請有酒投之士有食饋之賢藝文類聚食物部酒聖人者民之父母也母能生之能食之父能教之能誨之聖王曲備之者也能生之能食之能教之能誨之也太平御覽人事部叙聖防壅頥中有物曰噬嗑噬嗑而亨易噬嗑六二豐其蔀日中見斗易豐九三豐其沛日中見沫易豐上六豐其屋蔀其家易豐物在於口則隔其上下若齧去其物上下乃合周易正義噬嗑陟彼髙岡析其柞音昨薪叶音襄析其柞薪其葉湑上聲兮詩小雅車舝登髙岡者必析其木以為薪析其木以為薪者為其葉茂盛蔽岡之髙也鄭氏箋詩車舝為政當如彼泉之流行則清壅則濁也毛詩正義小旻聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大决所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也左傳襄公三十一年雲日蔽霠聖人以明左右三墳形墳防民之口甚於防川川壅而潰傷人必多民亦如之是故為川决之使導為民者宣之使言國語周民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以阜財用衣食者也夫民慮之於心而宣之於口成而行之胡可壅也若壅其口其與能幾何國語周且夫口三五之門也口所以紀三辰宣五行故謂之門國語解晉一伐驪戎客曰燕郭之法有所謂桑雍者王知之乎王曰未之聞也所謂桑雍者便嬖左右之人及夫人優愛孺子也此皆能乘王之醉昏而求所欲於王者也是能得之於內則大臣為王枉法於外矣故日月暉於外其賊在於內謹備其所憎而禍在於所愛戰國策趙孝成王鄒忌修八尺有餘而形䫉昳麗朝服衣冠窺鏡謂其妻曰我孰與城北徐公美其妻曰君美甚徐公何能及君也城北徐公齊國之美麗者也忌不自信而復問其妾曰吾孰與徐公美妾曰徐公何能及君也旦日客從外來與坐談問之吾與徐公孰美客曰徐公不若君之美也明日徐公來熟視之自以為不如窺鏡而自視又弗如逺甚暮寢而思之曰吾妻之美我者私我也妾之美我者畏我也客之美我者欲有求於我也於是入朝見威王曰臣誠知不如徐公美臣之妻私臣臣之妾畏臣臣之客欲有求於臣皆以美於徐公今齊地方千里百二十城宫婦左右莫不私王朝廷之臣莫不畏王四境之內莫不有求於王由此觀之王之蔽甚矣戰國策齊威王江乙惡昭奚恤謂楚王曰人有以其狗為有執而愛之其狗嘗溺井其鄰人見狗之溺井也欲入言之狗惡之當門而噬之鄰人憚之遂不得入言邯鄲之難楚進兵大梁取矣昭奚恤取魏之寶器臣居魏知之故昭奚嘗惡臣之見王戰國策楚宣王蘇秦之楚三日乃得見乎王談卒辭而行王曰寡人聞先生若聞古人今先生乃不逺千里而臨寡人曾不肯留願聞其說對曰楚國之食貴於玉薪貴於桂謁者難得見如鬼王難得見如天帝今令臣食玉炊桂因鬼見帝王曰先生就舍寡人聞命矣戰國策楚成王白日曬光幽隱皆照明月曜夜蚊虻宵見然雲蒸列布杳𡨕晝昏塵埃抪覆昧不見泰山何則物有蔽之也前漢書景十三王傳百辟無沃心之言四聰闕飛耳之聽梁書武帝下紀一犬所噬㫖酒貿其甘酸一手所搖嘉樹變其生死梁書劉孝綽傳堂上逺於百里堂下逺於千里門庭逺於萬里今步者一日百里之情通矣堂上有事十日而君不聞此所謂逺於百里也步者十日千里之情通矣堂下有事一月而君不聞此所謂逺於千里也步者百日萬里之情通矣門廷有事期年而君不聞此所謂逺於萬里也管子法法日月昭察萬物者也天多雲氣蔽蓋者衆則日月不明人主猶日月也羣臣多姦立私以壅蔽主則主不得昭察其臣下管子形勢解山物之髙者也地險穢不平易則山不得見人主猶山也左右多黨比周以壅其主則主不得見管子形勢解日往而月易築壇級於公宫而君不得知也子華子晏子問黨一蚋􅀈膚不寐至旦半糠入目四方弗治所謂蔽者豈必障於帷􅀈隱於帷薄哉鶡冠子天權夫耳之主聽目之主明一葉蔽目不見太山兩豆塞耳不聞雷霆鶡冠子天則草鬱則為腐樹鬱則為蠧人鬱則為病國鬱則百慝並起危亂不禁亢倉子君道牆之外目不見也里之前耳不聞也而人主之守司逺者天下近者境內不可不略知也荀子君道術之不行有故不殺其狗則酒酸夫國亦有狗韓非子外儲說右觀聽不參則誠不聞聽有門戶則臣壅塞韓非子內儲說上衛靈公之時彌子瑕有寵専於衛國侏儒有見公者曰臣之夢踐矣公曰何夢對曰夢見竈為見公也公怒曰吾聞見人主者夢見日奚為見寡人而夢見竈對曰夫日兼燭天下一物不能當也人君兼燭一國一人不能壅也故將見人主者夢見日夫竈一人煬焉則後人無從見矣今或者一人有煬君者乎則臣雖夢見竈不亦可乎韓非子內儲說上宋人有酤酒者升概甚平遇客甚謹為酒甚美縣幟甚髙然不售酒酸怪其故問其所知問長者楊倩倩曰汝狗猛耶狗猛則酒何故而不售曰人畏焉或令孺子懷錢挈壺甕而往酤而狗迓而齕之此酒所以酸而不售也夫國亦有狗有道之士懷其術而欲以明萬乘之主大臣為猛狗迎而齕之此人主之所以蔽脅而有道之士所以不用也故桓公問管仲曰治國奚患對曰最患社鼠矣公曰何患社鼠哉對曰君亦見夫社木者乎樹木而塗之鼠穿其間掘穴託其中燻之則恐焚木灌之則恐塗阤此社鼠之所以不得也今人君之左右出則為勢重而收利於民入則比周而蔽惡於君內間主之情以告外外內為重諸臣百吏以為富吏不誅則亂法誅之則君不安據而有之此亦國之社鼠也故人臣執柄而擅禁明為己者必利而不為己者必害此亦猛狗也夫大臣為猛狗而齕有道之士矣左右又為社鼠而間主之情人主不覺如此主焉得無壅國焉得無亡乎韓非子外儲說右形不動則精不流精不流則氣鬱鬱處頭則為腫為風處耳則為挶為聾處目則為䁾為盲處鼻則為鼽為窒處腹則為張為府處足則為痿為蹶吕氏春秋盡數不審名分是惡壅而愈塞也壅塞之任不在臣下在於人主吕氏春秋審分凡人三百六十節九竅五藏六府肌膚欲其比也血脉欲其通也筋骨欲其固也心志欲其和也精氣欲其行也若此則病無所居而惡無由生矣病之留惡之生也精氣鬱也故水鬱則為汚樹鬱則為蠧草鬱則為簣國亦有鬱主德不通民欲不達此國之鬱也國鬱處久則百惡並起而萬灾叢至矣吕氏春秋達鬱列精子髙聽行乎齊湣王善衣東布衣白縞冠顙推之履特㑹朝雨祛步堂下謂其侍者曰我何若侍者曰公姣且麗列精子髙因步而窺於井粲然惡丈夫之狀也喟然嘆曰侍者為吾聽行於齊王也夫何阿哉又况於所聽行乎萬乘之主人之阿之亦甚矣而無所鏡其殘亡無日矣孰當可而鏡其唯士乎人皆知說鏡之明己也而惡士之明己也鏡之明己也功細士之明己也功大得其細失其大不知類耳吕氏春秋達鬱鬱者不陽也周鼎著鼠令馬履之為其不陽也不陽者亡國之俗也吕氏春秋達鬱齊宣王好射說人之謂己能射彊弓也其嘗所用不過三石以示左右左右皆試引之中關而止皆曰此不下九石非王其孰能用是宣王之情所用不過三石而終身自以為用九石豈不悲哉非直士其孰能不阿主世之直士其寡不勝衆數也故亂國之主患存乎用三石為九石也吕氏春秋壅塞嚴則下喑下喑則上聾聾喑不能相通何國之治也說苑政理舉袂覆目不見日月焦氏易林坤之隨葛藟蒙棘花不得實讒佞亂政使恩壅塞焦氏易林師之中孚視暗不明雲蔽日光焦氏易林蠱之比逺視無光不知青黃黈纊塞耳使君暗聾焦氏易林噬嗑之蹇日出阜東山蔽其明章甫薦履箕子徉狂焦氏易林賁之屯墻髙蔽目崑崙翳日焦氏易林坎之豫初一割其耳目及其心腹厲測曰割其耳目中無外也太𤣥經第六割次七紫霓矞雲朋圍日其疾可割測曰紫霓矞雲不知刋也太𤣥經第六割下不鉗口上不塞耳則可有聞矣有鉗之鉗猶可解也無鉗之鉗難矣哉有塞之塞猶可除也無塞之塞其甚矣申鑒雜言上今有穀生于千仞之岡其葉如雲其幹如虹䕃于春夏不知秋冬沐之以芳雨暢之以薰風受天澤之寵而根蒙葺乎一壑其青松朱桂之樹不得雨露而槁悴者三匝下有萬章凋零在隂其孤蘭與衆英皆不得被乎陽春有牧者頓足于比陵之坡而盻之欲繫則無修繩欲伐則無斧斤使山之草木離披偃蹇垂榮而待于幽焦萌而聽于穀當是之時臣不知牧者之何所解也晉王曰是穀也必凋于歲寒奈春夏何意者其伐之乎牧者無斧柯請謀于樵蘇天祿閣外史一難夫雲興而日月暗雲藏而日月明王逸注楚辭九歌衆僞蔽君如雲霧之隱日使不可得見也王逸注楚辭九思日月無光雲霧之所蔽人君昏亂佞邪之所惑王逸注楚辭九思容隱奸邪若囊橐之盛物前漢書注刑法志豈不鬱陶而思君兮君之門以九重猛犬狺狺而迎吠兮關梁閉而不通文選宋玉九辨利眼臨雲不能垂照朗璞蒙垢不能吐輝是以明哲之君時有蔽壅之纍俊乂之臣屢抱後時之悲文選陸機演連珠妬妻不難破家亂臣不難破國一妻擅夫衆妻皆亂一臣専君羣臣皆蔽意林申子天明日明然後能照四方君明臣明然後能照萬物域中四明故能久太平御覽天部下人主獨立臣下雙身養主之意阿主之心塞主之聽蔽主之明道德經指歸卷十譬如咽塞病即能斷命大實積經卷一百一十二譬如日障蔽故其照不明大智度論卷九十九福慶雲上於天需君子以飲食宴樂易需六五或益之十朋之龜弗克違元吉易損南有樛音鳩木葛藟音壘纍音雷之樂只君子福履綏之南有樛木葛藟荒之樂只君子福履將之南有樛木葛藟縈烏營反之樂只君子福履成之詩國風樛木螽音終斯羽詵詵音莘兮宜爾子孫振振音真兮螽斯羽薨薨兮宜爾子孫繩繩兮螽斯羽揖揖音緝兮宜爾子孫蟄蟄兮詩國風螽斯終南何有有條有梅君子至止錦衣狐裘顔如渥丹其君也哉終南何有有紀有堂君子至止黻衣繡裳佩玉將將壽考不忘詩國風終南天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不增如月之恆如日之升如南山之壽不騫音牽不崩如松柏之茂無不爾或承詩小雅天保南山有臺北山有萊樂只君子邦家之基南山有桑北山有楊樂只君子邦家之光南山有把北山有李樂只君子民之父母南山有栲音考北山有杻音紐樂只君子遐不眉壽南山有枸音矩北山有楰音庾樂只君子遐不黃耉詩小雅南山有臺瞻彼洛矣維水泱泱音秧君子至止福祿如茨詩小雅瞻彼洛矣鴛鴦于飛畢之羅之君子萬年福祿宜之鴛鴦在梁戢其左翼君子萬年宜其遐福乘馬在廄摧音銼之秣音末之君子萬年福祿艾之乘馬在廄秣之摧之君子萬年福祿綏之詩小雅鴛鴦瞻彼旱麓榛楛音戶濟濟豈弟君子干祿豈弟瑟彼玉瓚才旱反黃流在中豈弟君子福祿攸降詩大雅旱麓莫莫葛藟施音異于條枚豈弟君子求福不回詩大雅旱麓瑟彼柞棫民所燎矣豈弟君子神所勞去聲矣詩大雅旱麓有卷音權者阿飄風自南豈弟君子來游來歌以矢其音詩大雅卷阿三壽作朋如岡如陵詩頌閟宫以芬香之酒醴祭於祖妣則多得其福祜鄭氏箋詩載芟瑟然衆多而茂盛者是彼柞棫之木也此柞棫所以得茂者正以為民所熂燎而除其旁草矣旁無穢草故木得茂盛以興得福者乃彼樂易君子也此君子所以得福者正以為神所勞來去其患害矣既無患害故多獲福言神之勞來君子猶民之燎柞棫也毛詩正義旱麓基同北辰久壽共南山長隋書音樂下志國安于盤石壽于旗翼旗讀為箕荀子富國坤厚地德萬物蕃息平康正直以綏大福焦氏易林賁之履至德之君禍不過鄰焦氏易林大壯之履賴生光木受福之祉焦氏易林暌之益南山之陽華葉鏘鏘嘉樂君子為國寵光焦氏易林巽之兊酒食之賜一則為薄再則為厚如儒者之言五代皆一受命唯漢獨再此則天命於漢厚也王充論衡恢國篇天錫難老如嶽之崇文選陸士龍大將軍燕詩馮衍爵銘曰富如江海壽配列真李善注文選江賦瑞應牧人乃夢衆維魚矣旐音兆維旟音餘矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱詩小雅無羊何謂四靈麟鳳龜龍謂之四靈故龍以為畜故魚鮪不淰鳳以為畜故鳥不獝麟以為畜故獸不狘龜以為畜故人情不失禮記禮運苑戲九尾之禽囿棲三足之鳥鳴鳳在林夥於黃帝之園有龍遊川盈於孔甲之沼晉書潘嶽傳周道方逺則鸑鷟鳴岐二南播德則麟騶呈瑞宋書武帝中本紀語曰影從表瑞從德此其效焉宋書宗室臨川王傳於是卿雲似蓋晨映姚鄉甘露如珠朝華景寢芝房感德咸出銅池蓂莢伺辰無勞銀箭梁書元帝紀堯為人君一日十瑞宫中芻化為禾鳳凰止於庭神龍見於宫沼厯草生階宫禽五色烏化白神木生蓮箑蒲生厨景星耀於天甘露降於地是為十瑞述異記馬圖呈寶龜籙告靈隋書音樂中志露甘泉白雲郁河清隋書音樂中志雄曰鳳雌曰凰三代來至門庭周室至於山澤吕氏春秋聞春解昔二皇鳳凰至於庭三代至乎門周室至於澤德彌粗所至彌逺德彌精所至彌近淮南子繆稱訓惟鳳為能通天祉應地靈律五音覽九德天下有道得鳳象之一則鳳過之得鳳象之二則鳳翔之得鳳象之三則鳳集之得鳳象之四則鳳春秋下之得鳳象之五則鳳沒身居之韓詩外傳溫山松柏常茂不落鸞鳳所庇得共歡樂焦氏易林需之坤蒼梧鬱林道易利通元龜象齒寶貝南金為吾歸功焦氏易林比之噬嗑麒麟鳳凰善政得祥隂陽和調國無災殃焦氏易林噬嗑之噬嗑蓼蕭露禳君子寵光鳴鸞噰噰福祿來同焦氏易林晉之大有景星照堂麟遊鳳翔仁施大行頌聲作興焦氏易林損之坤文山紫芝雍梁朱草生長和氣王以為寶焦氏易林渙之節天下太平瑞應各異猶家人富殖物不同也或積米榖或藏布帛或畜牛馬或長田宅夫樂米穀不愛布帛歡牛馬不美田宅則謂米榖愈布帛牛馬勝田宅矣王充論衡宣漢篇青丘竒獸九尾之狐有道翔見出則銜書作瑞周文以標靈符山海經海外東經圖讚女牀之山有鳥焉其狀如翟而五彩文名曰鸞鳥現則天下安寧山海經西山經甝􅂒之虎仁而有猛其質載皓其文載炳應德而擾止我交境山海經西山經圖讚丹穴之山有鳥焉其狀如雞五采而文名曰鳳凰首文曰德翼文曰義背文曰禮膺文曰仁腹文曰信是鳥也飲食自然自歌自舞見則天下安寧山海經南山經夫周室非乏玉而須王母之環以為富也非儉膳而竭越裳之雉以充庖也所以貴之者誠以斯物為太平抱朴子外篇詰鮑嶽修貢兮川效珍吐金景兮歊呼朝切浮雲文選東都賦蓋蓂莢為難蒔也故曠世而不覿惟我后能殖之以至和平方將數諸朝階文選東京賦頳莖素毳并柯共穗之瑞史不絶書棧山航海踰沙軼漠之貢府無虛月文選顔延年曲水詩序王者不隱過則玉璧見藝文類聚寶部璧鸞響鳳儀可停屬而須矣藝文類聚水部浦表聖人受命瑞應先於河瑞應之至聖人殺龍龍不可殺皆感氣君子得衆人之助瑞應先見於陸瑞應之至君子發蛇蛇不如龍陸不如河太平御覽地部陸德連木理仁挺芝草皓獸育藪丹魚生沼矞雲翔龍澤馬于阜山圖其石川形其寶莫黑匪烏三趾而來儀莫赤匪狐九尾而自擾嘉穎離合以䔿䔿醴泉涌流而浩浩玉海祥瑞總瑞前世龍見不雙芝生無二甘露一所今上嗣位以來八龍並出十一芝纍生甘露流五縣德盛故瑞繁也玉海祥瑞動物喻林卷七十二
