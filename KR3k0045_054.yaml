body:
  text: 喻林卷五十四明徐元太撰人事門五十二昧禍昭公之朝其羣臣皆小人也徒整飾其衣裳不知國之將迫脅君臣死亡無日如渠略然鄭氏箋詩蜉蝣人皆知暴虎馮河立至之害而無知當畏慎小人能危亡也鄭氏箋詩小旻蜉蝣之小蟲朝生夕死不知已之性命死亡在近有此羽翼以自修飾以興昭公之朝廷皆小人不知國將迫脅死亡無日猶整飾此衣裳以自修潔毛詩正義蜉蝣禽獸被人所驅納於罟獲陷阱之中而不知違辟似無知之人為嗜欲所驅入罪禍之中而不知辟禮記正義中庸田華之為陳軫説秦惠王曰臣恐王之如郭君夫晉獻公欲伐郭而憚舟之僑存荀息曰周書有言美女破舌乃遺之女樂以亂其政舟之僑諫而不聽遂去因而伐郭遂破之又欲伐虞而憚宫之竒存荀息曰周書有言美男破老乃遺之美男教之惡宫之竒宫之竒以諫而不聽遂亡因而伐虞遂取之戰國策秦惠文君夫抱火厝之積薪之下而寢其上火未及燃因謂之安方今之藝何以異此前漢書賈誼傳安危亡於旦夕肆嗜欲於目前奚異涉海之失柂積薪而待燃後漢書文苑列傳往車雖折而來軫方遒後漢書左周黃列傳論傳曰截趾適屨孰云其愚何與斯人追欲喪軀後漢書荀淑子爽傳馳騖覆車之轍探湯敗事之後後出益可怪晚發愈可懼耳後漢書范升傳四海為羅網天下為敵人舉足遇害動搖觸患履深淵之薄氷不為唬涉千鈞之發機不知懼何如其知也後漢書馮衍注傳國有露根之漸而莫之恤也吳志陸凱傳天子居綴旒之運人臣微覆餗之憂於是竊勢擁權黷明王之彛典窮奢縱侈假凶竪之餘威繡桶雕楹陵跨於宸極驪珍冶質充牣於帷房亦猶犬彘腴肥不知禍之將及晉書王湛列傳獨不見羣蝨之處禈中逃乎深縫匿乎壞絮自以為吉兆也行不敢離縫際動不敢出禈襠自以為得繩墨也然炎丘火流焦邑滅都羣蝨處於禈中而不能出也君子之處域內何異夫蝨之處禈中乎晉書阮籍傳髙蟬處乎輕隂不知螳螂襲其後也晉書王祥列傳自謂勢擅狐鼠理隔熏掘宋書謝晦傳茍欲徇意於前塗不覺坑穽在其側北齊書文襄帝紀商人用一布布不敢繼茍而讐焉必擇良者今士之用身則不然意之所欲則為之厚者入刑罰薄者被毁醜則士之用身不若商人之用一布之慎也墨子貴義楚莊王欲伐越杜子諫曰王之伐越何也曰政亂兵弱杜子曰臣愚患之智如目也能見百步之外而不能自見其睫王之兵自敗於秦晉喪地數百里此兵之弱也莊蹻為盜於境內而吏不能禁此政之亂也王之弱亂非越之下也而欲伐越此智之如目也王乃止故知之難不在見人在自見故曰自見之謂明韓非子喻老孔子曰燕爵爭善處於一屋之下母子相哺也區區焉相樂也自以為安矣竈突決上棟焚燕爵顔色不變是何也不知禍之將及之也不亦愚乎為人臣而免於燕雀之智者寡矣夫為人臣者進其爵祿富貴父子兄弟相與比周於一國區區焉相樂也而以危其社稷其為竈突近矣而終不知也其與燕雀之智不異故曰天下大亂無有安國一國盡亂無有安家一家盡亂無有安身此之謂也故細之安必待大大之安必待小細大賤貴交相為贊然後皆得其所樂吕氏春秋諭大避患東西反入禍門焦氏易林鼎之巽欲避凶門反與禍鄰焦氏易林艮之無妄去安就危墜陷井池破我玉螭焦氏易林旅之剝蜘蛛作網以伺行旅青蠅饞聚觸我羅域焦氏易林未濟之蠱鷗水鳥潮至則翔水嚮以為信反為鷙鳥所擊是知信而不知所以自害也張華注禽經鷸狀類燕紺色錯出有文色水際伺蚌出啄啄食之反為蚌所持死水中不知所食以為害張華注禽經根露基頽危猶巢幕而自比於天日擬固於泰山抱朴外篇君道夫鳶不絓網驎不墮穽相彼鳥獸猶知為患風塵之徒曽是未吝也抱朴子外篇嘉遁夜鬬人船人必擠已於水也莊子音義徐無鬼顧非纍卵於疊棋焉至觀形而懷怛文選魏都賦坐積薪以待然方指日而比盛文選西征賦是由桓侯抱將死之疾而怒扁鵲之先見以覺痛之日為受病之始也文選嵇叔夜養生論將軍魚遊於沸鼎之中燕巢於飛幕之上不亦惑乎文選丘希範與陳伯之書安臥積薪日待焚熾藝文類聚人部説輕羽不髙翔自用絃網羅纖鱗惑芳餌故為釣所加藝文類聚鱗介部螺不安其昧而樂其明是猶夕蛾去暗赴燈而死也藝文類聚蟲豸部蛾櫻桃為樹則多隂為果則先熟有蟬鳴焉聊命黏取退惟彼蟬之得意於斯樹不知黏之將至亦猶人之得意於富貴而不虞禍之將來也事文類聚蟬傳咸賦文王問曰人有大忘乎對曰大忘知其身之惡而不改也以賊其身乃喪其軀有行如此之謂大忘太平御覽人事部迷忘譬如猿猴跳躑恃便忽罹機辟自喪身本無上內祕藏經妙德品譬如陸鳥愛其尾終為射夫之所得靈寶自然妙經如鶡鳥愛其尾尾為射獵者所得四願經敬入此羣牛本有千頭在外瞻守掌不牢固為虎惡獸所見噉食死者過半餘不覺知方相抵觸跳踉喚吼傷其無智何乃甚哉出曜經一無常品猶如毒藥顔色成就香美且甘若人遇病而服此藥咽喉通利入腹未久即喪命根出曜經三欲品猶如有人行過山險兩邊險峻閉眼而過不知身危或致命終出曜經八行品以欲網自蔽以愛蓋自覆自恣縳於獄如魚入笱口法句經愛欲品世皆沒淵鮮克度岸法句經明哲品譬如蒼蠅在蜜器中有人拔出心猶樂著以樂著故乃至喪命本緣經月光王品昔有一人在路而行道中得一金鼠狼心生喜踊持置懷中涉道而進至水欲渡脫衣至地尋時金鼠變為毒蛇此人深思寧為毒蛇螫殺要當懷去心至冥感還化為金傍邊愚人見其毒蛇變成真寶謂為恆爾復取毒蛇內著懷裏即為毒蛇之所蜇螫喪身殞命百喻經卷下昔有屠兒有千頭牛養令肥好日殺一牛賣肉已殺五百牛餘有五百頭方共跳騰喧戲共相抵觸天尊時入國見牛如此愍而捨去語諸弟子此牛愚癡伴侣欲盡方共戲喧人亦如是阿育王譬喻經基一如犛牛愛尾不惜身夀命大智度論卷四譬如愚人見師子王飢時睡眠而欲寤之如人以指置毒蛇口如欲以手觸灰覆火法苑珠林卷五十五禍原洪範五行傳云視之不明時則有羽蟲之孽聽之不聰時則有介蟲之孽言之不從時則有毛蟲之孽貌之不恭時則有鱗蟲之孽思之不睿時則有倮蟲之孽尚書正義髙宗肜日白華周人刺幽后也幽王取申女以為后又得褒姒而黜申后毛詩白華燎火方奮揚之時炎熾熛怒寧有能滅息之者以喻宗周方隆盛之時王業深固寧有能滅亡之者言此二者皆盛不可滅亡也然此燎雖熾盛而水能滅之則水為甚矣以興周國雖盛終將褒姒滅之則褒姒惡甚矣毛詩正義正月華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗左傳宣公二年天有六氣降生五味發為五色徵為五聲淫生六疾六氣曰隂陽風雨晦明也分為四時序為五節過則為災隂淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾左傳昭公元年詩云燎之方陽寧或滅之赫赫宗周褒姒滅之前漢書谷永傳何寤青蠅飛於干旄無極遊於二壘使股肱分為二體背胸絶為異身魏志袁紹傳注荆山鵲飛而玉碎隋岸蛇生而珠死周書庾信傳墻壞於其隙木毁於其節斯蓋其分也鬼谷子謀篇辨慧亂之贊也禮樂淫泆之徴也慈仁過之母也任譽姦之鼠也亂有贊則行淫泆有徵則用過有母則生姦有鼠則不止商子説民肉腐出蟲魚枯生蠧怠慢忘身禍災乃作荀子勸學輕慮重事厚誅薄罪久怨細過長侮偷快數以德追禍是斷手而續以玉也故世有易身之患韓非子用人有人自南方來鮒入而鯢居使人之朝為草而國為墟呂氏春秋貴直福生於無為患生於多欲害生於弗僃穢生於弗耨淮南子繆稱訓昔者齊簡公釋其國家之柄而專任其大臣將相攝威擅勢私門成黨而公道不行故使陳成田常鴟夷子皮得成其難使呂氏絶祀而陳氏有國者此柔懦所生也鄭子陽剛毅而好罰其於罰也執而無赦舍人有折弓者畏罪而恐誅則因猘狗之驚以殺子陽此剛猛之所致也淮南子汜論訓使葉落者風搖之使水濁者魚撓之淮南子説林訓魯季氏與郈氏鬬雞郈氏介其雞而季氏為之金距季氏之雞不勝季平子怒侵郈氏之宫而築之故禍之所從生者始於雞距淮南子人間訓政有招冦行有招耻弗為而自至天下未有説苑談叢郤大墻壞蠧衆木折焦氏易林乾之大壯怨重被燒忿怒生禍焦氏易林恆之巽隂作大姦欲君勿言鴻鵠利口發其禍亂焦氏易林巽之中孚上九竈滅其火唯家之禍測曰竈滅其火國之賊也太玄經第四竈不仁之質勝則伎力為害器貪悖之性勝則強猛為禍梯劉邵人物志八觀車以喻君馬以喻臣言車覆者國君危也馬顛仆者所任非人王逸注楚辭九章獨知猛雨之霑衣而不知雲氣之所作唯患飛埃之糝目不覺飇風之所為也抱朴子外篇酒誡平叔以黨曹爽見誅觸死權之網也輔嗣以多笑人被疾陷好勝之阱也顔氏家訓務學婦人為政猶雌雞而代雄鳴是喪家之道也前漢書注五行志不制之臣相與比周比周者宫鄰金虎言小人在位比周相進與君為鄰貪求之德堅若金讒謗之言惡若虎也李善注文選東京賦蠧衆則木折隙大則墻壞不勝而生不敗而亡自古及今未嘗有也意林商君書季孫行父秃晉郤充眇衛孫良夫跛同時而聘于齊齊使秃者迓秃者眇者迓眇者跛者迓跛者蕭同叔子虎臺上而笑之聞於客客不説而去相與立胥閭而語移日不解齊人有知之者曰齊之患自此始也藝文類聚治政部奉使百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於府廪於腸胃邪之始入於皮也泝然起毫毛開腠理其入於絡也則絡脈盛色變其入客於經也則感虛乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍㬷破毛直而敗黃帝素問內經皮部論夫邪之客於形也必先舍於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈內連五藏散於腸胃隂陽俱感五藏乃傷此邪之從皮毛而入極於五藏之次也如此則治其經焉今邪客入於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生竒病也黃帝素問內經調經論木之所傷也皆傷其枝枝之剛脆而堅未成傷也人之有常病也亦因其骨節皮膚腠理之不堅固者邪之所舍也故常為病地黃帝素問靈樞經五變言九級之臺起於一簣之土喻九夜之禍起乎一念染心道德經注疏卷六冬極溫而春有狂疫夏極涼而秋有瘧痢攝生養性論罪莫大於淫禍莫大於貪咎莫大於讒此三者禍之車小則危身大則危家養性延命録教誡篇重衣厚褥體不勞苦以致風寒之疾厚味脯臘醉飽厭飫以致聚結之病美色妖孋嬪妾盈房以致虛損之禍淫聲哀音怡心悅耳以致荒耽之惑馳騁遊觀弋獵原野以致發狂之失謀得戰勝兼弱取亂以致驕逸之敗養性延命録教誡篇云何良醫善知病源謂良醫善知此病因風起痰癊起涎唾起衆冷起因現事起時節起是名良醫善知病源雜阿舍經卷十五粗言利刀劒貪欲磣毒藥瞋恚熾盛火無明極重暗天請問經當三是老病死常害衆生猶如果樹多人所擲本緣經持王子品譬如惡雹傷害五榖亦如猛火焚燒乾草又如暴風吹拔大樹又如師子殺害諸禽獸本緣經毗羅摩品吾久知此五盛隂身為衆箭的本緣經毗羅摩品芭蕉以實死竹蘆實亦然駏驉坐妊死士以貪自喪法句經利養品愛欲意為田媱怒癡為種法句經愛欲品以媱樂自裹譬如蠶作繭法句經愛欲品如木出火還自燒身若如芭蕉生實便枯如騾懷軀還自危身修行道地經慈品猶鹿母初乳兒小逐母東西戀其子不能遠逝時師子獸王審知鹿母不能離子時往摶撮鹿母子俱喪所以然者以鹿母戀其子故師子得便出矅經四無放逸品此六根者危如燕巢亦如水泡又如初生癰不久當潰無明羅剎經是無明者於生死曠路而作導首能燃生老病死之大火聚是諸煩惱結業之母閉涅槃門開衆惡趣能作大形彌綸三界遍一切處放逸大頭疑結廣額幻惑醜靣邪念疱鼻邪見之目膜眼童子四倒掣電伺怨報惡多毛耽耳欺誑詐偽深廣邃眉瞋恚忿戾以為利牙貪欲醜惡作上粗脣嫉妬頑弊返脣下垂邪命諂曲虛假矯稱貪嗜利養以為利齒六十二見以為其髮三受叨餮以為長咽八邪疣贅以為肩臂諸惡律儀以為長爪忍受結業以為兩乳不知猒足䏺脹洪大以為其腹睡悔深黑以為其臍多欲貪愛以為隂尻十八諸界以為兩髀非法惡欲以為兩膝我見人見以為腳足無慚大象垢穢濕皮以為衣服無愧青惡汚膩粗褐以為其被坐結使牀衆結羅剎以為侍從處彼煩惱諸惡羅剎大衆之中無明羅剎經著欲之人亦如獄囚如鹿在圍如鳥入網如魚吞鈎如豹搏狗如烏在鴟羣如蛇值野豬如鼠在貓中如羣盲臨坑如蠅著熟油如儜人在陳如躄人遭火如入沸鹹河如舐蜜塗刀如四衢臠肉如薄覆刀杖如華覆不淨如蜜塗毒􅀢如毒蛇篋大智度論卷十七養禍紂與亡人為主亡人歸之若蟲之窋聚魚歸淵府獸集藪澤言紂為大姦也尚書正義武成始者信以彼管蔡之屬雖有流言之罪如鷦鳥之小不登誅之後反叛而作亂猶鷦之翻飛為大鳥也鄭氏箋詩小毖圃者所以殖菜蔬也杞非可食之物我有圃生之杞以喻南蒯在費欲為亂也春秋正義昭公十二年夫養稂莠者傷禾稼惠姦軌者賊良民後漢書王符列傳猶種枳棘於良田養虺蛇於室內也後漢書假頻列傳羌雖外患實深內疾若攻之不根是養疾疴於心腹也後漢書西羌傳養癰長疽自生禍殃後漢書馮衍傳競令虎豹窟於麑場豺狼乳於春囿後漢書劉陶傳是川瀆並決而莫敢之塞遊豶蹂稼而莫之楚也後漢書朱暉列傳注驕縱吳楚養虺成蛇吳志孫權傳注所謂獨坐窮山放虎自衛者也華陽國志是使長蛇弗翦封豕假息晉書慕容德記一令蔓草難鉏涓流泛酌豈直疥癢輕痾容為心腹重患南齊書王融傳養傅翼之飛獸子貪心之野狼北齊書文苑顔之推傳何異於善砥鏌鎁而豫射子自禍必矣賈子新書藩傷養虎牧狼還自賊傷焦氏易林訟之明夷次八常疾不疾咎成不詰測曰常疾不疾不能自治也太玄經苐四常夫性惡之民民之豺狼雖得放宥之澤終無改悔之心潛夫論述赦纍之重乃易毁也舉之髙乃易踣也以喻湣王驕亂之甚乃易破也呂氏春秋行論解起衆患於須臾結百痾於膏盲奔駟不能追既往之悔思改而無自反之蹊抱朴子外篇酒誡積薪若山縱火其下火未及燃一杯之水尚可滅也及至火猛風起雖傾河海不能救也秦昭王是積薪而縱火其下始皇燃而方熾二世起風而怒也意林物理論若諸愚癡人無有善方便將火置於掌便為火所燒大寶積經三十一惡生於心還自壞形如鐵生垢反食其身法句經塵垢品昔有一國五榖熟成人民安寧無有疾病晝夜伎樂人無憂惱王問羣臣我聞天下有禍何類答曰臣亦不見王便使一臣至於鄰國求覔買之天神則化作一人於市中賣之狀類如豬持鐵鎖繫縛賣之臣問此名何等答曰禍母臣曰賣不答曰賣問索幾錢答曰千萬問曰此食何等答曰食針一升臣便家家發求覔針如是人民兩兩三三相逢求針使諸郡縣處處擾亂百姓所在之處患毒無憭臣白王曰雖得禍母致使民亂男女失業欲煞棄之未審許不王言大善便於城外將殺刺硬不入斫則不傷割而不死積薪燒之身赤如火便走出去過里燒里過市燒市入城燒城入國燒國擾亂人民飢餓困苦坐由猒樂買禍所致苦也此喻女色欲火所燒男女貪毒至死不知苦也法苑珠林卷四十六寡效譬如醫之藥人之有病者然今有醫於此和合其藥於天下之有病者而藥之萬人食此若醫四五人得利焉猶謂之非行藥也故孝子不以食其親忠臣不以食其君墨子非攻中嗛囁噱㘗昧冥相持多言少實語無成事焦氏易林謙之乾掘井得石勞而無功焦氏易林明夷之革譬如假榖於夷齊之門告寒於黔婁之家所得者不過橡栗緼褐必無大牢之膳錦衣狐裘矣抱朴子內篇祛惑為者如牛毛獲者如麟角也抱朴子內篇極言夫衣無蔽膚之具資無謀夕之儲而髙談陶朱之術自同猗頓之䇿取譏論者其理必也抱痼疾而言精和鵲之伎屢奔北而稱究孫吳之算人不信者以無效也抱朴子內篇微旨徒聞振翅竦身不能凌厲九霄騰跚玄極攸敘彛倫者非英偉也抱朴子外篇嘉遁居有事之世而耻為權謀譬猶鑿地抱甕難以求富嗟乎子羽何異牢檻之熊深穽之虎石間餓蟹竈中之鼠事力雖多而見功甚少廣文選張敏顯責子羽文雖榮華熠熠無結秀之效終年之勤無一日之功藝文類聚人部鑒誡誡徒誓蠡管之誠終沈熒爝之用藝文類聚職官部太守表遂日奉羈勤有事風塵徒僃鳥背之毛曽無馬箠之力藝文類聚職官部司徒表效闕淚河功慙汗海藝文類聚職官部尚書令表生亂白華於野已漚名之為菅菅柔忍中用矣而更取白茅收束之茅比於白華為脆喻王取於申申后禮儀僃任妃后之事而更納褒姒褒姒為孽將至滅國鄭氏箋詩白華白雲下露養彼可以為菅之茅使與白華之菅相亂易猶天下妖氣生褒姒使申后見黜鄭氏箋詩白華青黃黻黼文章之觀盡而五色渝宫徵還激生生之聲足而八音汨陸有􅀢罝水有網罟而飛羽伏鱗無以幸其生矣子華子陽城胥渠問夫水積則生相食之魚土積則死自穴之獸禮義飾則生偽匿之本夫吹灰而欲無昧涉水而欲無濡不可得也淮南子齊俗訓神農之初作琴也以歸神及其淫也反其天心夔之初作樂也皆合六律而調五音以通八風及其衰也以沈湎淫康不顧政治至於滅亡蒼頡之初作書以辨治百官領理萬事愚者得以不忘智者得以志逺至其衰也為姦刻偽書以解有罪以殺不辜湯之初作囿也以奉宗廟鮮犞之具簡士卒習射御以戒不虞及至其衰也馳騁獵射以奪民時罷民之力堯之舉禹契后稷臯陶政教平姦宄息獄訟止而衣食足賢者勸善而不肖者懷其德及至其末朋黨比周各推其與廢公趍私外內相推舉姦人在朝而賢者隱處淮南子泰族訓使民居處相司有罪相覺於以舉姦非不掇也然而傷和睦之心而搆仇讐之怨故事有鑿一孔而生百隙樹一物而生萬葉者所鑿不足以為便而所開足以為敗所樹不足以為利而所生足以為穢淮南子泰族訓太上空市其次不偷竊其次不掠奪上以功惠綏民下以財力奉上是以上下相與空市則民不與民不與則為巧詐而取之謂之偷竊則民僃之僃之而不得則暴迫而取之謂之掠奪民必交爭則禍亂矣申鑒政體言車載衆輕之物以折其軸而不可乘其過咎由重絫雜載衆多之故也以言國君聽用羣小之言則壞敗法度而自傾危也王逸注楚辭七諫蜜網裁而魚駭宏羅制而鳥驚陶靖節集賦喻林卷五十四
