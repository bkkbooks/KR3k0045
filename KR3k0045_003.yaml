body:
  text: 喻林卷三明徐元太撰人事門一言行言行君子之樞機樞機之發榮辱之主也易上繫戶樞之轉或明或暗弩牙之發或中或否猶言行之動從身而發以及於物或是或非也周易正義繫辭上天下有道則行有枝葉天下無道則辭有枝葉禮記表記言從而行之則言不可飾也行從而言之則行不可飾也禮記緇衣茍有車必見其軾茍有衣必見其敝人茍或言之必聞其聲茍或行之必見其成禮記緇衣行有枝葉所以益德也言有枝葉是衆虛華也枝葉依幹而生言行亦由禮出鄭氏注禮表記夫華繁而實寡者天也言多而行寡者人也大戴禮記曽子疾病知既知之行既由之言既順之若夫性命肌膚之不可易也大戴禮記哀公問五義綴以德行不任以言庶人以言猶以夏后氏之祔懷袍褐也行不越境大戴禮記虞戴德人性有畏其景而惡其迹者卻背而走迹愈多景愈疾不知就陰而止景滅迹絶欲人勿聞莫若勿言欲人勿知莫若勿為前漢書枚乘傳士有一定之論女有不易之行文子守弱知言如泉鳴知行如禽飛關尹子一宇關尹謂子列子曰言美則響美言惡則響惡身長則影長身短則影短名也者響也身也者影也故曰愼爾言將有和之愼爾行將有隨之列子説符滿苟得曰小盜者拘大盜者為諸侯諸侯之門義士存焉昔者桓公小白殺兄入嫂而管仲為臣田成子常殺君竊國而孔子受幣論則賤之行則下之則是言行之情悖戰於胸中也不亦拂乎故書曰孰惡孰美成者為首不成者為尾莊子盜跖子墨子曰君子無鬭子夏之徒曰狗狶猶有鬭惡有士而無鬭矣子墨子曰傷矣哉言則稱於湯文行則譬於狗狶墨子耕柱君子言有壇宇行有防表荀子儒效聽善言便計雖愚者知説之稱至德高行雖不肖者知慕之説之者衆而用之者鮮慕之者多而行之者寡所以然者何也不能反諸性也淮南子原道訓下言之者行之役也行之者言之主也汝能行我能言汝為主我為役説苑權謀或問羣言之長羣行之宗曰羣言之長德言也羣行之宗德行也揚子考至篇般之揮斤羿之激矢君子不言言必有中也不行行必有稱也揚子君子顧自然之理行則影從言則響隨郭子注莊德充符禮然後動則動如春風人不厭其動時然後言則言如金石人不厭其聲劉子愼言言不違理故形不慙行不邪僻故心不恥揚子法言注吾子篇知言而不能行謂之疾此疾雖有天醫莫能治也意林仲長統昌言世薄華飾以相拊言處飛龍前行在跛鱉後西升經言多諾者事衆而信不可然也心多所易者難積而變不可推也道德經指歸卷十一夫謬之於空談不如證之於事實聞之於髣像不如決之於耳目故信不如學言不如行法苑珠林卷四十六好惡君子之善善也長惡惡也短惡惡止其身善善及子孫公羊昭公二十年見善如不及見不善如探湯論語季氏獸惡其網為其害己民惡其上為其病己國語解周中卻至告慶所好則鑽皮出其毛羽所惡則洗垢求其瘢痕後漢書文苑列傳黃馬白馬同為馬也而取白棄黃棺槨異處之謂也公孫龍子白馬論注愛其人者兼屋上之烏憎其人者惡其餘胥説苑貴德其拔賢如旋流討惡如霆擊蔡中郎集橋公碑頌舜之在鄉黨也非家饋而戶贈之也人莫不稱善焉象之在鄉黨也非家奪而戶掠之也人莫不稱惡焉由此觀之人無賢愚見善則譽之見惡則謗之此人情也未必有私愛也未必有私憎也徐幹中論虛道麟止鳳儀所患在少狐鳴梟呼世忌其多是以俊乂盈朝而求賢者未倦讒佞作威而忠貞者切齒抱朴子外篇博喻靈鳳振響於朝陽未有惠物之益而莫不澄聽於下風焉鴟梟宵集於垣宇未有分釐之損而莫不掩耳而注鏑焉故善言之往無遠不悅惡辭之來靡近不忤猶日月無謝於貞明枉矢見忌於暫出抱朴子外篇博喻恬苦之性殊則美惡之情背郭子注莊德充符言堯則桀對舉蘭則艾因藝文類聚草部艾得蟢者莫不馴而放之為利人也得蚤者莫不糜之齒牙為害身也鳥獸昆蟲猶以名聲見異况夫吉士之與凶人乎事文類聚伯勞曹植論夫宿留嫫母經目而人不視者何一尺之面醜也西施毛嬙靡服而人左顧者何一尺之面好也太平御覽樂部雅樂下纖芥之惡貶秋豪之美舉道德經指歸卷七爭讓多算飲少算君子之所爭何晏解魯論八佾秦於天下之士非有怨也相聚而攻秦者以已有富貴耳往見大王之狗臥者臥起者起行者行止者止毋相與鬭者投之一骨輕起相牙者何則有爭意也戰國䇿秦昭襄王自含血戴角之獸見犯則校而况於人懷好惡喜怒之氣喜則愛心生怒則毒螫加情性之理也史記律書今人毁君君亦毁之譬如賈豎女子爭言何其無大體也前漢書灌夫傳昔許由巢父讓天子之貴市道小人爭半錢之利此之相去何啻九牛毛也晉書華談傳上善若水水善利萬物而不爭處衆人之所惡故幾於道居善地心善淵與善仁言善信正善治事善能動善時夫唯不爭故無尤老子易性昔者堯舜讓而帝之噲讓而絶湯武爭而王白公爭而滅由此觀之爭讓之禮堯桀之行貴賤有時未可以為常也莊子秋水以富為是者不能讓祿以顯為是者不能讓名親權者不能與人柄操之則栗舍之則悲莊子天運今俳優侏儒狎徒詈侮而不鬬者是豈遽知見侮之為不辱哉然而不鬬者不惡故也今人或入其央瀆竊其豬彘則援劎戟而逐之不避死傷是豈以喪豬為辱也哉然而不憚鬬者惡之故也荀子正論君子力如牛不與牛爭力走如馬不與馬爭走知如士不與士爭知荀子堯問夫好利而欲得者此人之情性也假之有弟兄資財而分者且順情性好利而欲得若是則兄弟相拂奪矣且化禮義之文理若是則讓乎國人矣故順情性則弟兄爭矣化禮義則讓乎國人矣荀子性惡篇蟲有蛔者一身兩口爭食相齕也遂相殺因自殺人臣之爭事而亡其國者皆蛔類也韓非子説林下古人易財非仁也財多也今之爭奪非鄙也財寡也輕辭天子非髙也勢薄也重爭土槖非下也權重也韓非子五蠧昔梁大夫宋就為邊縣令與楚鄰界梁亭楚亭皆種瓜梁亭劬力數灌其瓜瓜美楚人田窳而希灌其瓜瓜惡楚令以梁瓜之美怒其瓜之惡因往夜竊搔梁瓜皆有死焦者矣梁亭覺之因請其尉亦欲竊往報搔楚瓜宋就曰是搆怨召禍之道也令人竊為楚亭夜灌其瓜令勿知也楚亭旦而往瓜則以灌瓜日以美楚亭怪而察之則梁亭之為也楚令大悅因以聞楚王楚王曰此梁之隂讓也乃謝以重幣而請交於梁王賈子退讓夫敗軍之卒勇武遁逃將不能止也勝軍之陳怯者死行懼不能走也故江河決沉一鄉父子兄弟相遺而走爭升陵阪上髙丘輕足先升不能相顧也世樂志平見鄰國之人溺尚猶哀之又况親戚乎故身安則恩及鄰國志為之滅身危則忘其親戚而人不能解也遊者不能拯溺手足有所急也灼者不能救火身體有所痛也夫民有餘即讓不足則爭讓則禮義生爭則暴亂起叩門求水無弗與者所饒足也林中不賣薪湖上不鬻魚所有餘也故物豐則欲省求贍則爭止淮南子齊俗訓飢馬在廄寂然無聲投芻其傍爭心乃生淮南子説林訓卑讓謙下者茂進之遂路也矜奮侵陵者毀塞之險途也是以君子舉不敢越儀凖志不敢凌軌等劉卲人物志釋爭並轡爭先而不能相奪兩頓俱折而為後者所趨由是論之爭讓之途其别眀矣劉卲人物志釋爭險而與之訟是柙兕而攖虎其可乎怒而害人亦必矣劉卲人物志釋爭兩虎之爭勢不俱生兩君之爭勢不俱立其知命者可以得全矣太玄經第二爭解夫買物於市者或加價而奪之則鮮忍而不忿然矣况乎見奪待告之妻哉抱朴子外篇弭訟讓一得百爭十失九意林周生烈子有兄弟三人各自謂髙健無輩共更持夜二兄居前臥小弟便獨坐有一蟲名為不吉來嚙其髀弟以手指之蟲便長大復捶益大其人嗔恚取蟲蹴踏自致疲極蟲益大不止其人止休一夜已竟呼仲兄起蟲復嚙之兄復如小弟與共鬬蟲更長大如屋如是疲極復止休二夜竟便呼大兄起坐蟲復嚙之大兄持手指摩挲蟲復起兄生意以盎覆之須臾極蟲便出盎去至眀日二弟極不能復起兄知二弟與蟲共鬬便問何以不起二弟慚不敢語兄言與蟲共鬭劇耶弟言然兄語弟言後倘有不吉蟲來但以盎覆之不當指也譬喻如癡人得對便嗔恚徒得罪如弟與蟲鬬自致疲極黠人見對來便避之是得福譬如盎覆不吉蟲去三慧經籍八毀譽君子惡居下流天下之惡皆歸焉論語子張人之行有不虞度其時有名譽而得者若尾生本與婦人期於梁下不度水之卒至遂至沒溺而獲守信之譽求全之毀若陳不贍將赴君難聞金鼓之聲失氣而死可謂欲求全其節而反有怯弱之毀者也趙氏注孟離婁上衆心所好莫之能敗其固如城衆口所毀雖金石猶可銷之國語解周下景王鑄無射衆議成林無翼而飛三人成市虎一里能撓椎淮南子説山訓稱譽人力儉程作不中科員而責怒也君子視之乃自程作其母以為力儉以此譽人孰如毁之故諺曰問誰毁之小人譽之此之謂也淮南子説山訓解妄譽仁之賊也妄毁義之賊也賊仁近鄉原賊義近鄉訕揚子淵騫篇點汙也灼灸也猶身有病人點灸之言堯舜至聖道德擴被尚點炙謗毁言有不慈之過卑父之纍也王逸注楚辭七諌高譽美行抑而不揚虛搆之謗先形生影抱朴子外篇擢才譽者揚善之樞也毁者宣惡之機也劉子傷讒朝為伊周夕為桀跖善惡陷於成敗毁譽脅於勢利於是輕薄干紀之士役姦智以投之如夜蟲之赴火文選干寶晉紀總論毛嬙西施善毁者不能蔽其好嫫姆倭傀善譽者不能掩其醜苟有至道何必介紹文選王褒四子講德論毁彼者雷同而鳴噪稱此者火燎而波駭意林通語搖脣鼓舌擅生是非好面譽人者亦好背而毁之也意林王孫子憂樂若夫哀樂之起冥於自然喜怒之端非由人事故燕雀表啁噍之感鸞鳳有歌舞之容毛詩正義序湯沐興而蟣虱相吊大厦成而燕雀相賀憂樂别也淮南子説林訓今囚之冥室之中雖養之以芻豢衣之以綺繡不能樂也以目之無見耳之無聞穿隙穴見雨零則快然而嘆之况開戶發牖從冥冥見照照乎見照照猶尚肆然而喜又况出室坐堂見日月光乎見日月光曠然而樂又况登太山履石封以望八荒視天都若蓋江河若帶又况萬物在其間者乎其為樂豈不大哉淮南子泰族訓感别之情慘於舒翮之飛鵠思歸之志樂於蓮渚之征鴻李善注文選陸士衡與士龍詩並天而寒暑殊同世而憂樂異太平御覽時序部熱因食生病食則是樂病則是苦大法鼓經卷上如渴飲漿未及除渴不得有樂猶如瘙疥其患未瘥不可為樂禪法要解經卷上榮九是為拔身苦如象出于塪法句經象喻品如飲苦藥初時則苦以難服故後時則樂以病差故大乘莊嚴經論卷一如事嚴王初時則苦難得意故後時則樂與威力故大乘莊嚴經論卷一智愚人固不同惠種生聖癡種生狂桂實生桂桐實生桐先生者未必能知後生者未必不能明越絶計倪內經狂夫之樂智者哀焉愚者之笑賢者戚焉戰國策趙武靈王天下為秦相割秦曾不出力天下為秦相烹秦曾不出薪何秦之智而山東之愚耶戰國策齊閔王且盲不見咫尺而離婁燭千里之隅前漢書揚雄傳下諺云妍皮不裹癡骨妄語耳晉書慕容超傳見之明白處之如玉石見之暗晦必留其謀淮南子説林訓智者離路而得道愚者守道而失路淮南子人間訓知者之所短不若愚之所修賢者之所不足不若衆人之有餘何以知其然夫宋畫吳冶刻刑鏤法亂修曲出其為微妙堯舜之聖不能及蔡之幼女衛之雅質梱纂組雜奇彩抑黑質揚赤文禹湯之智不能逮淮南子修務訓賢者處大林遭風雷而不迷愚者雖處平敞大路猶暗惑焉鹽鐡論除狹或問呂不韋其智矣乎以人易貨曰誰謂不韋智者歟以國易宗揚子淵騫篇愚者不謀羣聚若丘智者決䇿朝不得食天祿閣外史辭爵何倚伏之難量亦慶吊之相及智者賢人居之甚履薄氷愚夫貪士競之若泄尾閭補文選昭明太子陶淵明集序聲音自當有哀樂但暗者不能識之至鍾子之徒雖遭無常之聲則頴然獨見矣今矇瞽面牆而不悟離婁照秋毫於百尋以此言之則明暗殊能矣不可守咫尺之度而疑離婁之察執庸衆之聽而猜鍾子之聰皆謂古人為妄記也廣文選嵇叔夜聲無哀樂愚者暗於未成智者見於未萌太平御覽人事部諺下故曰知其可取如發機不知其取如扣椎故曰知機道者不可挂以髮不知機者扣之不發此之謂也黃帝素問內經離合正邪論如火宅中有衆寶聚有人求寶入此宅中其人爾時容有二事一者若無方便善巧死於火宅二者若有方便善巧持寶而出波羅蜜多經卷五百八十七譬如有人以繒蔽目至大寶洲行住坐臥不能得見寶樹寶衣寶香寶果衆寶形色貴賤功能復有一人開目至彼一切皆見悉能了知大方廣佛華嚴經卷二譬如二人同學一業一則工巧多得利益一則疏拙獲利無幾大方等大集經十八國有二人一智一愚自相謂曰我是汝親共汝出城採穭求財即尋相隨詣一空聚見地有麻即語愚者共取持歸時彼二人各取一擔復過前村見有麻縷其一智者言麻縷成功輕細可取其一人言我已取麻繫縛牢固不能捨也其一智者即取麻縷重而還去復共前進見有麻布其一智者言麻布成功輕細可取彼一人言我已取麻繫縛牢固不能復捨其一智者即捨麻縷取布自重復共前行見有劫貝其一智者言劫貝價貴輕細可取彼一人言我已取麻繫縛牢固齎來道遠不能捨也時一智者即捨麻布而取劫貝如是前行見劫貝縷次見白㲲次見白銅次見白銀次見黃金其一智者言若無金者當取白銀若無白銀當取白銅乃至麻縷若無麻縷當取麻耳今者此村大有黃金衆寶之上汝宜捨麻我當捨銀共取黃金自重而歸彼一人言我取此麻繫縛牢固齎來道遠不能捨也汝欲取者自隨汝意其一智者捨銀取金重擔而歸其家親族遙見彼人大得金寶歡喜奉迎時得金者見親族迎復大歡喜其無智人負麻而歸居家親族見之不悅亦不起迎其負麻者倍增憂惱長阿含經卷七頑暗近智如瓢斟味雖久狎習猶不知法開逹近智如舌嘗味雖須臾習即解道要法句經暗愚品譬如燒鐵在地一人知為燒鐵一人不知兩人俱前取燒鐵誰爛手大者耶王言不知者爛手大那先比丘經卷下譬如石中有金愚人不知棄而不取金師見之知其中有金即以兩囊鼓而出之衆生無明石中有智慧金分汝智慧不深棄而弗度如來深見根本以禪定智慧囊鼓而出之也羅什譯維摩詰經菩薩行品婚媾家人女正位乎內男正位乎外男女正天地之大義也易家人天地睽而其事同也男女睽而其志通也萬物睽而其事類也易睽歸妹天地之大義也天地不交而萬物不興歸妹人之終始也易歸妹初九歸妹以娣跛能履征吉易歸妹上六女承筐無實士刲羊無血無攸利易歸妹天地絪緼萬物化醇男女搆精萬物化生易繫辭下天地匹配則能成品物若剛遇中正之柔男得幽貞之女則天下人倫之化乃得大行也周易正義姤天地以陰陽相合而得生物不已人倫以長少相交而得繼嗣不絶周易正義歸妹妹而繼姊為娣雖非正配不失常道譬猶跛人之足然雖不正不廢能履周易正義歸妹歸妹雖非正配不失交合之道猶如眇目之人視雖不正不廢能視耳周易正義歸妹關關雎音疽鳩在河之洲窈音杳窕徒了反淑女君子好逑音求詩國風關雎桃之夭夭灼灼其華之子于歸宜其室家桃之夭夭有蕡音文其實之子于歸宜其家室桃之夭夭其葉蓁蓁之子于歸宜其家人詩國風桃夭維鵲有巢維鳩居之之子于歸百兩御音迓之維鵲有巢維鳩方之之子于歸百兩將之維鵲有巢維鳩盈之之子于歸百兩成之詩國風鵲巢摽音殍有梅其實七兮求我庶士逮其吉兮摽有梅其實三兮求我庶士逮其今兮摽有梅頃音傾筐墍許器反之求我庶士逮其謂之詩國風摽有梅野有死麕俱倫反白茅包之有女懷春吉士誘之林有朴蒲不反􅈪音速野有死鹿白茅純音豚束有女如玉詩國風野有死麕其釣維何維絲伊緡詩國風何彼穠矣雍雍鳴鴈旭日始旦士如歸妻逮氷未泮詩國風匏有苦葉招招音韶舟子人涉卬與昂同否人涉卬否卬須我友詩國風匏有苦葉有狐綏綏在彼淇梁有狐綏綏在彼淇厲有狐綏綏在彼淇側詩國風有狐藝麻如之何衡音橫從音宗其畝取音娶妻如之何必告音谷父母詩國風南山豈其食魚必河之魴音房豈其取音娶妻必齊之薑賦也薑齊姓豈其食魚必河之鯉豈其取妻必宋之子詩國風衡門伐柯如何匪斧不克取去聲妻如何匪媒不得詩國風伐柯依彼平林有集維鷮音驕車詩小雅牽摽有梅女父擇壻之詩詩説召南野麕昏姻惡無禮之詩詩説召南行露強委禽而不受至於興訟大夫以禮斷之而國史美之詩説召南谷風刺夫婦失道也衛人化其上淫於新昏而棄其舊室毛詩谷風舟楫相配得水而行男女相配得禮而備毛詩竹竿釣以得魚如婦人待禮以成為室家毛詩竹竿男女之際近而易則如東門之墠遠而難則如茹藘在阪毛詩東門之墠男女待禮而成若薪芻待人事而後束也毛詩綢繆黃鳥于飛集于灌木其鳴喈喈箋云葛延蔓之時則摶黍飛鳴亦因以興焉飛集叢木興女有嫁於君子之道和聲之遠聞興女有才美之稱達於遠方鄭氏箋詩葛覃漢也江也其欲渡之者必有潛行乘泭之道今以廣長之故故不可也又喻女之貞潔犯禮而往將不至也鄭氏箋詩漢廣鳲鳩因鵲成巢而居有之而有均一之德猶國君夫人來嫁居君子之室德亦然鄭氏箋詩鵲巢草蟲鳴阜螽躍而從之異種同類猶男女嘉時以禮相求呼鄭氏箋詩草蟲釣者以此有求於彼何以為之乎以絲之為綸則是善釣也以言王姬與齊侯之子以善道相求鄭氏箋詩何彼穠矣朝有升氣於西方終其朝則雨氣應自然以婦人生而有適人之道亦性自然鄭氏箋詩蝃蝀平林之木茂則耿介之鳥往集焉喻王若有茂美之德則其時賢女求配之與相訓告改修德教鄭氏箋詩車牽方泳以渡江漢雖往而不可濟喻犯禮以思貞女雖求而將不至毛詩正義漢廣木所以庇廕本有可息之道今南方有喬木以上竦之故不可就而止息以興女以定情本有可求之時今漢上有遊女以貞潔之故不可犯禮而求是木以高其枝葉人無休息者女由持其潔清人無求思者毛詩正義漢廣以行人之懼露喻貞女之畏禮毛詩正義行露其釣魚之法維何以為乎維以絲為繩則是善釣以興其娶妻之法亦何以為之乎維以禮為之則是善娶釣者以此有求於彼執絲綸以求魚娶者以已有求於人用善道而相呼毛詩正義何彼穠矣言招招然號召當渡者是舟人之子人見號召皆從渡而我獨否所以人皆涉我獨否者由我待我友我友未至故不渡耳以興招招然欲會合當嫁者是為媒之人女見會合餘皆從嫁而我貞女獨否者由我待我匹我匹未得故不嫁耳毛詩正義匏有苦葉涇水以有渭水清故見涇水濁以興舊室以有新昏美故見舊室惡毛詩正義谷風言人無之我魚梁無發我魚笱以之人梁發人笱當有盜魚之罪以興新昏無之我夫家無取我婦事以之我夫家取我婦事必有盜寵之過毛詩正義谷風吁嗟鳩兮無食桑椹猶吁嗟女兮無與士耽然鳩食桑椹過時則醉而傷其性女與士耽過度則淫而傷禮義毛詩正義氓六籊籊然長而殺之竹竿以釣於淇必得魚乃成為善釣以興婦人嫁於夫必得禮乃成為室家毛詩正義竹竿言楫所以棹舟以喻女所以配男毛詩正義竹竿裳之配衣猶女之配男毛詩正義有狐憫蓷之傷於水始則濕中則修久而乾猶夫之於婦初已衰稍而薄久而甚毛詩正義中谷有蓷東門之外有栗樹生於路上無人守護其欲取之則為易有物在淺室家之內雖在淺室有主守之其欲取之則難以興為婚者得禮則易不得禮則難毛詩正義東門之墠東門之墠除地町町其踐履則易茹藘在阪則為礙阻其登陟則難言人之行者踐東門之壇則易登茹藘在陂則難越以興為婚姻者得禮則易不得禮則難毛詩正義東門之墠薪在田野之中必纒綿束之乃得成為家用以興女在父母之家必以禮娶之乃得成為室家薪芻待人事而束猶室家待禮而成也毛詩正義綢繆葛生於此延蔓而蒙於楚木蘝亦生於此延蔓而蒙於野中以興婦人生於父母當外成於夫家毛詩正義葛生依然而茂盛者彼平林之木有往集之者維為鷮雉也此鷮雉乃耿介之鳥由平林之木茂故往集焉唯有茂美之德者君子之身有來配之者維為碩女也此碩女有齋莊之德由君子之身美則來配焉是美德能致碩女也毛詩正義車牽人刈白華已漚以為菅又取白茅纒束之兮是二者以潔白相束而成用興婦人有德已納以為妻兮又用禮道申束之兮是二者以恩禮相與而成嘉毛詩正義白華天子之與后猶日之與月陰之與陽相須而后成者也禮記昏義里語曰腐木不可以為柱卑人不可以為主前漢書劉輔傅初一謹于㐜初貞後寧測曰謹于㐜始女貞也太玄經第五內椅梧停鳳鳥之來儀寒谷資吹律而成煦類乎影響豈不相思故夫婦之儀自遠相匹李善注文選顏延年秋胡詩齊人有女二人求之東家子醜而富西家子好而貧父母疑不能決問其女定所欲適難指斥言者偏袒令我知之女便兩袒怪問其故云欲東家食西家宿此為兩袒者也藝文類聚禮部婚乾坤其德恆久不已爰定天綱夫婦作始藝文類聚禮部婚余執百兩轡之子詩採蘩我被雙絲絹著以同功綿夏搖比翼扇冬臥蛩蛩氈飢餐并糧粒渴飲一流泉臨軒樹萱草中庭植合歡藝文類聚禮部婚巽為風震為雷雷風相須而養物猶長女承長男夫婦同心而成家久長之道也玉海周易鄭康成注高子問於孟子曰夫嫁娶者非已所自親也衛女何以得編於詩也孟子曰有衛女之志則可無衛女之志則怠若伊尹於太甲有伊尹之志則可無伊尹之志則篡困學紀聞卷三詩藏修初九潛龍勿用易乾潛龍勿用陽在下也易乾龍德而隱者也不易乎世不成乎名易乾九二履道坦坦幽人貞吉易履九三井泄不食為我心惻可用汲王明並受其福易井六四井甃無咎易井九三鼎耳革其行塞雉膏不食易鼎隰中之桑枝條阿阿然長美其葉又茂盛可以庇廕人喻時賢人君子不用而野處有覆養之德也鄭氏箋詩隰桑今吾子幸遊帝王之世躬帶冕之服浮英華湛道德矕龍虎之文舊矣卒不能攄首尾奮翼鱗振拔汙塗跨騰風雲使見之者景駭聞之者響震前漢書敘傳上今吾子已貫仁誼之羈絆繫名聲之韁鎖伏周孔之軌躅馳顔閔之極摯既繫攣於世教矣前漢書敘傳上鱗翼成而愈伏術業優而不試晉書束晳傳士懷珍而待價修名而待聘不亦重乎唯自重其器而後可以重人之國天祿閣外史去秦今先生操立斷之鋒掩炳蔚之文玩圖籍於絶迹之藪括藻麗乎鳥獸之羣陳龍章於晦夜沈琳琅於重淵蟄伏於盛夏藏華於當春抱朴子外篇嘉遁鳳之高飛必修其羽猶君子將事必修其學也太玄經第三疆解喻林卷三
