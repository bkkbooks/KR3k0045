body:
  text: 喻林卷二十七明徐元太撰人事門二十五勸助誰能亨魚溉之釡鬵音尋誰將西歸懷之好音詩國風匪風之子于狩言韔音暢其弓之子于釣言綸之繩詩小雅采緑衡門誘僖公也願而無立志故作是詩以誘掖其君也毛詩衡門婦子來饋餉其農人於田野乃逆而媚愛之言勸其事勞不自若鄭氏箋詩載芟人見池水之竭盡矣豈不言云由其外之濵崖無水以益之故也以喻人見王政之喪亂矣豈不言曰由其外之羣臣無賢以佐之故也人見泉水之枯竭矣豈不言云由其內之地巾無水以生之故也以喻人見王政危亂矣豈不言曰由其內之妃后無德以助之故也毛詩正義召旻人之相與也譬如舟車然相濟達也已先則援之彼先則推之是故人非人不濟馬非馬不走土非土不高水非水不流大戴禮記魯子制言上夫二子者或挽之或推之欲無入得乎左傳襄公十四年晉禦其上戎亢其下譬如捕鹿晉人角之諸戎犄之與晉踣之左傳襄公十四年人有言曰無過亂人之門又曰佐饔者嘗焉佐鬬者傷焉國語周衛非強於趙也譬之衛矢而魏弦機也藉力魏而有河東之地戰國䇿齊閔王斯何異燎之方盛又撝膏以熾之哉吳志張溫傳注小水不容大舟若縱才力足以濟事亦不假君為鱗翼晉書桓謙傳乘釁之徒因翼生羽北史周本紀上世之君子欲其義之成而助之修其身則愠是猶欲其墻之成而人助之築則愠也豈不悖哉墨子貴義今有燎者此於一人奉水將灌之一人摻火將益之功皆未至子何貴於二人巫馬子曰我是彼奉水者之意而非夫摻火者之意墨子耕柱且有二生於此善星一行為人筮者與處而不出者其精孰多公孟子曰行為人筮者其精多子墨子曰仁義鈞行説人者其功善亦多何故不行説人也墨子公孟今夫世亂求美女者衆美女雖不出人多求之今求善者寡不強説人人莫之知也墨子公孟夫子三侵魯而綽三從是鼓鞭於馬靳也墨子魯問使失路者而肯聽習問知即不成迷也今衆人之所以欲成功而反為敗者生於不知道理而不肯問知而聽能韓非子解老雖有堯之智而無衆人之助大功不立有烏獲之徑而不得人助不能自舉有賁育之強而無法術不得長生韓非子觀行佐祭者得嘗佐鬬者得傷蔭不祥之木為雷霆所撲淮南子説林訓比目之魚所以不見得於人者以偶視而俱走也今秦有兼吞天下之志日夜伺間不忘於側息也趙魏與之鄰接而強弱不敵秦所以不敢圖并趙魏者徒以二國併目周旋者也孔叢子論勢始皇方獵六國而翦牙款楊子淵騫次四翕其羽利用舉測曰翕其羽朋友助也太玄經第五翕日雖暮長庚星在前扶助常有光明也前漢書注禮樂志翼戴崇奬以成帝業若車之行助推其轂故得引重而致遠也前漢書注燕王傳曵纖經於前鳴長桹於後所以驚魚令入網也李善注文選西征賦飛塵增山霧露增海事類賦天部露注紼謳所生必於斥苦司馬彪曰斥疏緩也苦用力也引紼所以有謳歌者為人用力不齊故促急之也困學紀聞卷十諸子敬竭爝火之見仰助陽暉之明玉皇本行集經譬如熾火將大木薪擲置其中如是數數擲中其火轉增熾盛不減發覺淨心經卷上衣四譬如國王遣兵有所攻擊兵弱欲不如王復遣兵往助之兵便得勝人有諸惡如兵少弱時人持善心消滅惡心譬如王增兵得勝持五善心消五惡心譬如戰鬬得勝是為精進助善如是那先比丘經卷上昔有一聚落去王城五由旬村中有好美水王敕村人常使日日送其美水村人疲苦悉欲移避遠此村去時彼村主語諸人言汝等莫去我當為汝白王改五由旬作三由旬使汝得近往來不疲即往白王王為改之作三由旬衆人聞己便大歡喜有人語言此故是本五由旬更無有異雖聞此言信王語故終不肯捨世間之人亦復如是修行正法度於五道向涅槃城心生厭倦便欲捨離頓駕生死不能復進如來法王有大方便於一乘法分别説三小乘之人聞之歡喜以為易行修善進德求度生死後聞人説無有三乘故是一道以信佛語終不肯捨百喻經卷上助成我者三十七道品猶人有眷屬相助成者也僧肇注維摩詰經菩薩行品食報積善之家必有餘慶積不善之家必有餘殃易坤天下人行善者皆欲速得其福恬然者少也以為福祿在天求之無益舍置仁義不求為善是由農夫任天不復耘治其苖也其遲福欲急得之者由此揠苗人也非徒無益於苖乃反害之趙氏注孟公孫丑上是謂農夫盡力他食其秋魏書孫紹傳利出者實及怨往者害來發於此而應於外者唯請是故賢者慎所出列子説符其施厚者其報美其怨大者其禍深薄施而厚望畜怨而無患者古今未之有也淮南子繆稱訓聖王布德施惠非求報於百姓也郊望禘嘗非求報於鬼神也山致其高雲雨起焉水致其深蛟龍生焉君子致其道德而福祿歸焉夫有陰德者必有陽報有隱行者必有昭名説苑貴德衆正之積福無不及也衆邪之積禍無不逮也説苑談叢見言出則響入形往則影來明報應之理不異於此也張湛注列子説符塗遠者其至必遲施厚者其報常晚抱朴子外篇廣譬影響不能無形聲以著餘慶不可以無德而招抱朴子外篇廣譬得報不同猶如聲發聲發不異隨處應響大小不同海空智藏經序品小則報小大則報大如規如矩如繩如墨皆相應赴分毫不差海空智藏經序品譬如有人臨空而語聲響彼谷反應無差若作鄙言響還即鄙若作善聲響還即善若作歌聲響還即歌若作哭聲響還即哭若作大聲響還即大若作小聲響還即小若作中聲響還即中若相召喚海空智藏經序品人為陽善吉人報之人為陰善鬼神報之人為陽惡賊人治之人為陰惡鬼神治之故天不欺人依以影地不欺人依以響養性延命録教誠篇父如榖子母如好田先世因緣罪福如雨澤衆生如榖生死如收刈三昧法門經卷上擊人得擊行怨得怨罵人得罵施怒得怒法句經惡行品惡不即時如􅢇牛乳罪在陰伺如灰覆火法句經惡行品譬如勳勞即立然後受其功賞大智度論卷三十六懷善者應之以祚挾惡者報之以殃未有種稻而得麥施禍而獲福者也𢎞明集牟子理惑論僖負羈以一飱之惠全其所居之閭宣孟以一飯之故活其不資之軀陰施出於不意陽報皎如白日况傾家財發善意其功德巍巍如嵩泰悠悠如江海矣𢎞明集牟子理惑論殺生者當作蜉蝣朝生暮死劫盜者當作豬羊受人屠割媱逸者作鶴騖麞麋兩舌者作鵄梟鵂鶹捍債者為驢騾牛馬法苑珠林卷七至如揚生養雀寧有意於玉環孔氏放龜本無情於金印而冥期弗爽雅報斯臻法苑珠林卷六十五夫有形則影現有聲則響應未見形存而影亡聲續而響乖善惡相報理路然矣法苑珠林卷七十相依域中有萬國使之各相親比猶地上有水流通相潤及物周易正義比賁其須者須是上須於面六二常上附於三若似賁飾其須也周易正義賁瓶之罄矣維罍之恥詩小雅蓼莪我行其野蔽芾音弗其樗音樞我行其野言采其蓫言逐我行其野言采其葍音福行詩小雅我其野雍渠水鳥而今在原失其常處則飛則鳴求其類天性也猶兄弟之於急難鄭氏箋詩棠棣旄丘之葛兮何為闊之節兮以當蔓延相及以興方伯之國兮何為使之連屬兮亦當憂患相及毛詩正義旄丘諺所謂輔車相依唇亡齒寒者其虞虢之謂也左傳僖公五年瓶是小器常稟受於罍今瓶罄盡罍更無物以共瓶惟是罍之恥也瓶喻周罍喻晉言周之微弱相依恃於晉今王室亂矣晉無力以助之是晉之恥也春秋正義昭公二十四年東方有比目魚焉不比不行其名謂之鰈音蝶南方有比翼鳥焉不比不飛其名謂之鶼鶼音兼西方有比肩獸焉與卭卭岠音巨虛比為卭卭岠虛齧甘草即有難卭卭岠虛負而走其名謂之蟨音厥北方有比肩民焉迭食而迭望中有枳首蛇焉此四方中國之異氣也爾雅尚靳使秦謂秦王曰韓之於秦也居為隱蔽出為鴈行今韓已病矣秦師不下殽臣聞之唇揭者其齒寒願大王之熟計之戰國䇿韓襄王比目之魚不相得則不能行故古人稱之以其合兩而如一也今山東合弱而不能如一是山東之智不如魚也又譬如車士之引車也三人不能行索二人五人而車因行矣今山東三國弱而不能敵泰索二國因能勝秦矣然而山東不知相索者智故不如車士矣胡與越人言語不相知志意不相通同舟而凌波至其相救助如一也今山東之相與也如同舟而濟秦之兵至不能相救助如一智不如胡越之人矣三物者人之所能為也山東主遂不悟此臣之所為山東苦也戰國䇿燕王噲且趙之於齊楚扞蔽也猶齒之有唇也唇亡則齒寒今日亡趙明日患及齊楚且救趙之務宜若奉漏甕沃焦釡也史記田完世家夫天之與帝帝之與人猶頭之與足相須而行也後漢書劉陶傳周訪與侃親姻如左右手安有斷人左手而右手不應者乎晉書陶侃傳天之生朋以為夷吾舌也其身死舌焉得生哉管子戒凡棺槨之相待猶唇齒之相依唇亡齒寒不可異處也夫四夷守外諸夏待內內外相依天下安矣公孫龍子白馬論注出則為扞蔽入則為席薦韓非子存韓人稟五常三焦九竅風火遞相兼濟以一位虧四體羸焉京氏易傳注夬中夫虞之有虢也如車之有輔輔依車車亦依輔虞虢之勢正是也韓非子十過母子相養猶衣裳相扶也太玄經第四迎解秦晉固唇齒之國也唇亡則齒寒齒落則唇壓今秦方以晉為唇也而先有寒齒之心天祿閣外史傷時唇亡齒寒毛落皮單武侯十六策隂察寄松為女蘿依水如浮萍曹子建閨情天下莫不相為彼我而彼我皆欲自為斯東西之相反也然猶唇齒未嘗相為而唇亡則齒寒故彼之自為濟我之功𢎞矣斯相反而不可相無者也郭子注莊秋水嬰與夫其相提挈有人生平慕嬰夫後見其失職而頗慢弛如此者共排退之不復與交譬如相對挽繩而根格之也前漢書注灌夫傳廣志曰鱟魚似便面雌常負雄而行失雄則不能獨活李善注文選江賦夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之廣文選朱公肅奏記梁冀蟨與岠虛乍兔乍鼠長短相濟彼我俱舉有若自然同心共膂藝文類聚祥瑞部比肩獸贊夫城之有郭猶裏之有表骨之有皮表裏各異則保障不完皮骨分離則一體不負太平御覽居處部郭白蘭王吐谷渾阿柴臨卒呼子弟謂曰汝等各奉吾一隻箭將玩之地下俄而命母弟慕延曰取汝一隻箭折之延折之又曰汝取十九隻箭折之延不能折柴曰汝曹知單者易折衆則難摧勠力一心然後社稷可固太平御覽兵部箭君者民之源也民者君之根也根傷則華實不生源衰則流沫不盈上下相保故能長久道德經指歸卷八譬如三蘆立於空地展轉相依而得竪立若去其一二亦不立若去其二一亦不立雜阿含經卷十二轉相依倚譬如鼓音如弓弦箭而相恃怙不合不别修行道地經觀品在於世間問相依譬如盲跛相倚行修行道地經觀品頌譬如嬰兒不應離母又如行道不離糧食如大熱時不離涼風冷水如大寒時不欲離火如度深水不應離船譬如病人不離良醫大智度論卷二十九譬如肓跛相假能去百論卷上守八相資雷資風而益遠風假雷而增威周易正義恆風薄相扶而上朋友相須而成毛詩谷風注原也隰也以相與聚居之故故能定高下之名猶兄弟相求故能立榮顯之名鄭氏箋詩棠棣潤澤是雨之事但雨得風乃行則潤澤亦由風故易曰潤之以風雨是風雨共為潤澤毛詩正義谷風維生長之谷風能及於焚輪謂之頺使之旋轉而升是風薄相扶而上也以興良朋能佐於善友使之道德益進是朋友相率而成也毛詩正義谷風子不通功易事以羡補不足則農有餘粟女有餘布子如通之則梓匠輪輿皆得食於子孟子滕文公下山海經云崇丘之山有鳥狀如鳬一翼一目相得乃飛名云蠻史記封禪書注夫日譬猶火月譬猶水火則外光水則含景故月光生於日之所照魄生於日之所蔽當日則光盈就日則光盡也後漢書志天文上注故不有行者誰扞牧圉譬若唇齒表裏相資晉書明帝紀寇難至躄者告肓者盲者負而走兩人皆活得其所能也故使盲者語使躄者走失其所也淮南子説山訓夫善歌者使人續其聲善作者使人紹其功惟車之蟬攫負子之教也周道之成周公之力也雖有禆諶之草創無子産之潤色有文武之規矩而無周吕之鑿枘則功業不成鹽鐵論非鞅羊腸九縈相推併前焦氏易林履之師軍有前後猶如捕獸一人捉角一人戾足李善注文選陳孔璋為袁紹檄器之於事如影之隨形響之應聲其相須如左右手太平御覽兵部敘兵器氣之相守司也如權衡之不得相失也黃帝素問內經至真要大論譬如一人能刈一人能束三昧法門經卷下有慧無多聞是不知實相譬如大暗中有目無所見多聞無智慧亦不知實相譬如大明中有燈而無目大智度論卷五如一人種榖一人耘除衆穢令得增長果實成就大智度論卷二十九如針導綎縫衣縫非針也大智度論卷三十但有月而無日則萬物濕壞但有日而無月則萬物燋爛日月和合故萬物成熟大智度論卷七十九有待鹿之奔走其勢宜疾今乃維足伎伎然安舒而稽留以待其牝鹿而俱走也雄雉之於朝旦雊然而鳴猶為求其雌雉而並飛也鹿雉猶得偶以俱遊毛詩正義小辨毛羽不豐滿者不可以高飛文章不成者不可以誅罰道德不厚者不可以使民政教不順者不可以煩大臣戰國策秦惠文君雖有犀舟徑楫猶人涉卭否有須者也後漢書張衡列傳然荆玉含寶要俟開瑩幽蘭懷馨事資扇發宋書臧燾傳譬乘舟之待楫象提釣之假縷宋書謝靈運傳至乃趙儲之命宜永須扁鵲而後全齊后之數必延待文摯而後濟宋書顧凱之傳然霜葉將淪非徑颷無以速其蘀天之所棄非假手無以殲其人魏書田益宗傳今羽翮未備不得不就籠檻南史范雲傳管仲鮑叔相謂曰君亂甚矣必失國齊國之諸公子其可輔者非公子糾則小白也與子人事一人焉先逹者相收管仲乃從公子糾鮑叔從小白國人果弒君小白先入為君魯人拘管仲而放之鮑叔言而相之故諺曰巫咸雖善祝不能自祓也秦醫雖善除不能自彈也以管仲之聖而待鮑叔之助此鄙諺所謂虜自賣裘而不售士自譽辨而不信者也韓非子説林下且夫百日不食以待梁肉餓者不活今待堯舜之賢乃治當世之民是猶待梁肉而救餓之説也韓非子難勢鼓不滅於聲故能有聲鏡不沒於形故能有形金石有聲弗叩弗鳴管簫有音弗吹無聲淮南子詮言訓足以􅡮者淺矣然待所不􅡮而後行智所知者𥚹矣然待所不知而後明淮南子説林訓次五黃菌不誕俟干慶雲測曰黃菌不誕俟逑耦也太玄經第三耎鳥須羽而飛矢須羽而前也釋名飾拭也物穢者拭其上使明由他物而後明猶加文於質上也釋名有果蓏之物在人之前去口一尺心欲食之口氣吸之不能取也手掇送口然後得之夫以果蓏之細員圌易轉去口不遠至誠欲之不能得也王充論衡變動篇且夫懸象不麗天則不能揚大明灼無外嵩岱不託地則不能竦峻極概雲霄兔足因夷塗以騁迅龍艘泛激流以效速離光非燧人不熾楚金非歐冶不剡豐華俟發春而表艷棲鴻待衝飇而輕戾四嶽不明揚則有鰥不登庸叔牙不推賢則夷吾不式厚抱朴子外篇窮逹馬必待乘而後致逺醫必待使而後愈疾賢者待用而後興理意林物理論寶劍未砥猶乏切玉之功美箭闕羽尚無衝石之勢况才非會稽之竹質謝昆吾之金藝文類聚職官部祭酒表以為海之明珠未耀其光鳥之鳯凰羽儀未翔何氏語林言語謝承後漢書譬如雪山多諸藥草猶如種植處處出生有大良醫成就明智知諸藥性差别功能隨病所須於中採取其諸捕獵放牧之人遊止其中不見不止况能採取大方廣佛華嚴經卷八譬如山谷響皆從衆緣生無盡意菩薩經八如影映光則現不映則無大智度論卷六譬如牛力雖能挽車要須御者能有所至大智度論卷七如象沒泥非象不能出大智度論卷二十九法寶雖為佛師若佛不説法為無用如雖有好藥若無良醫藥則無用大智度論卷三十譬如深井美水若無綆者無由得水大智度論卷四十九譬如惡風塵土諸熱毒氣等得雨則消滅大智度論卷五十五譬如良藥能破衆病若不能將順則不除患非藥之失又如􅂒人雖得利器不能禦難非器之過大智度論卷六十五如賈客大將雖乘快馬能疾到所止故待衆人大智度論卷八十三鐘鼓豈有自鳴者桴加而有聲矣𢎞明集牟子理惑論勝人二人同術誰昭誰瞑二虎同穴誰死誰生汲冡周書周祝解瓌以百口一擲出手得盧矣南史張裕永子瓌傳狡勝賊能捕賊勇勝虎能捕虎能克已乃能成已能勝物乃能利物能忘道乃能有道關尹子丸藥勇士一人雄入於九軍將求名而能自要者而猶若是莊子德充符戰勝而天下曰善非善之善者也故舉秋毫不為多力見日月不為明目聞雷霆不為聰耳古之所謂善戰者勝於易勝者也孫子軍形子夏見曾子曾子曰何肥也對曰戰勝故肥也曾子曰何謂也子夏曰吾入見先王之義則榮之出見富貴之樂又榮之兩者戰於胸中未知勝負故臞今先王之義勝故肥是以志之難也不在勝人在自勝也故曰自勝之謂強韓非子喻老有提十萬之衆而天下莫當者誰曰桓公也有提七萬之衆而天下莫當者誰曰吳起也有提三萬之衆而天下莫當者誰曰武子也尉繚子制談猶良驥騄耳之駃彼駑馬䰇興角逐何能紹吾氣哉尉繚子制談大夫憮然內慚四據而不言當此之時順風承意之士如編口張而不歙舉舌而不下暗然而懷重負而見責大夫曰諾膠車修逢雨請與諸生解鹽鐵論大論君子之求勝也以推讓為利鋭以自修為棚櫓靜則閉默泯之玄門動則由恭順之通路是以戰勝而爭不形敵服而怨不搆劉邵人物志釋爭夫物之相勝或以筋力或以氣勢或以巧便小有氣勢口足有便則能以小而制大大無骨力角翼不徑則以大而服小王充論衡物勢篇夫人以刃相賊猶物以齒角爪牙相觸刺也力強角利勢烈才長則能勝氣微爪短膽小距頓則服畏也王充論衡物勢篇人有勇怯故戰有勝負勝者未必受金氣負者未必得木精也王充論衡物勢篇惟正德以至道服之佞人以才辨奪之故能泥撓之也莊子音義則陽三軍可奪氣將軍可奪心李善注文選孫子荆為石仲容書齊之辨士田巴辨於狙丘議於稷下毁五帝罪三王訾五伯離堅白合同異一日而服千人有徐劫者其弟子曰魯連謂劫曰臣願得當田子使之不敢復談可乎徐劫言之田巴曰劫弟子年十二耳然千里之駒也願得侍議於前田巴曰可魯連曰臣聞堂上之糞不除郊草不藝白刃交前不救流矢何則急者不救則緩者非務楚軍南陽趙伐高唐燕人十萬之衆在聊城而不去國亡在旦暮耳先生將奈何田巴曰無奈何魯連曰夫危不能為安亡不能為存則無為貴學士矣今臣將罷南陽之師還高唐之兵却聊城之衆為所貴談談者其若此也先生之言有似梟鳴出聲而人惡之願先生之勿復談也田巴曰謹聞教明日見徐劫曰先生之駒乃飛兔騕裊也豈特千里哉於是朴口易業終身不復談太平御覽人事部辨下莊子謂惠子曰羊溝鬬雞處之雞三歲為秣秣魁師也相者視之則非良雞也然數以勝人者以貍膏塗其頭也雞畏狸故也聚事文類鬬雞人有善於射而高於顧子顧子曰子之射雖百中猶不若我之以彈或曰何以為然顧子曰子之所射射貍之皮耳我之所彈彈狐之心太平御覽工藝部彈辛所謂金城湯池無可攻之勢何氏語林文學如善射夫住所習處不為一切怨敵所伏能伏怨敵離諸怖畏波羅蜜多經五百八十三夫大刀者謂般若刀夫大劍者謂般若劍夫大力者謂般若力是故般若波羅蜜多非諸惡魔所行境地波羅蜜多經五百九十九譬如師子有大威力獨步無畏離驚恐故金光明最勝王經卷四譬如幼童若男若女為大丈夫之所呵叱此幼男女於後異時聞是人名驚恐怖畏大寶積經卷二譬如阿夜犍多鐵此鐵少分悉能毁壞一切餘鐵諸鉤鎖縛大方廣佛華嚴經卷五十九如好礠石少分之力即能吸壞諸鐵鉤鎖大方廣佛華嚴經卷七十八譬如貓貍才見於鼠鼠即入穴不敢復出大方廣佛華嚴經卷七十八如有礠石鐵若見之即皆散去無留住者大方廣佛華嚴經卷七十八如一健兒破一切賊復更有人能破此健人大智度論三十一向者勍對並無遺力汝城隍嚴固攻者喪師高僧傳七釋僧徹外國破敵得勝則豎勝幡道場降魔亦表其勝相也羅什譯維摩詰經佛道品譬善射之人發無遺物雖輕翼迅逝不能翔其舍猶維摩詰辨慧深入言不失會故五百應真莫敢窺其門羅什譯維摩詰經弟子品獅子吼無畏音也凡所言説不畏羣邪異學諭獅子吼衆獸下之僧肇注維摩詰經佛國品無方吾聞宗廟之器不要華林之木四門之賔何必冠蓋之族前賢有解韋索而佩朱韍舍徒擔而乘丹轂由此言之何恤而無祿晉書王沈傳秀異固産於方外不出於中域也是以明珠文貝生於江鬱之濵夜光之璞出乎荆藍之下故以人求之文王生於東夷大禹生於西羌晉書華談傳命世大才經綸名教者不必華宗夏士撥煩理亂澄氣濟世者亦未必八索九丘五經之外冠冕之表復自有人晉書傉擅傳琳琅出於崑領明珠生於海濵若必以地求人則文命大夏之棄夫姬昌東夷之擯士但當問其文彩何如不可以區宇格物晉書姚興上傳十步之內必有芳草四海之內豈無竒秀隋書帝紀煬帝上􅀈屯犂牛既􅀈以㹋決鼻而羈生子而犧尸祝齋戒以沈諸河河伯豈羞其所從出辭而不享哉濯南子説山訓十步之澤必有香草十室之邑必有忠士説苑談叢龍生無常或託空桑憑乘風雲為堯立功闕人之善惡不必世族性之賢鄙不必世俗中堂生負苞山野生蘭芷夫和氏之璧出於璞石隋氏之珠産於蜃蛤詩云采葑采菲無以下體故茍有大美可尚於世則雖細行小瑕曷足以為纍乎濳夫論論榮白雉貢於越暢草獻於宛雍州出玉荆陽生金珍物産於四遠幽遼之地未可言無奇人也王充論衡超奇篇母驪犢騂無害犧牲祖濁裔清不榜奇人王充論衡自紀篇鳥無世鳯皇獸無種麒麟人無祖聖賢物無常嘉珍王充論衡自紀篇士貴故孤興物貴故獨産文孰常在有以放賢是則醴泉有故源而嘉禾有舊根也王充論衡自紀篇丹華緑草不拘於曲瘁之株紫芝芳秀不限於斥鹵之壤是以受玄圭以告成者生於四罪之門承厯數於文祖者出於頑嚚之家抱朴子外篇博喻鋭鋒産乎鈍石明火熾乎暗木貴珠出乎賤蚌美玉出乎醜璞是以不可以父母限重華不可以祖禰量衛霍也抱朴子外篇博喻夜光之珠不必出於孟津之河盈握之璧不必採於崑崙之山大禹生於東夷文王生於西羌聖賢所出何必常處世説新語言語弭仲叔高德美名命世之才也非弭氏小族所當有新豐瘠土所當出也藝文類聚人部品藻藂臺之璧少海之珠何必鄉里所在為貴文苑英華徐陵贈答中書郭泰拔申屠子陵於漆工之中嘉許偉康於屠酤之肆大平御覽資産部肆金生砂礫珠出蚌泥歎茲窈窕産于卑微初學記人部短人注丹泉之珠沈於黃泥璠璵之寶藏於裔石初學記寶器部珠注然重華無嚴父放勛無令子亦各由已耳何氏語林德行南史僧虔戒子書譬如有樹名曰無根不從根生而枝葉華果悉皆繁茂大方廣佛華嚴經卷七十八譬如遮迦越羅與青衣交通却後生子具足成遮迦越羅相雖從青衣生由為是遮迦越羅子也佛遺日摩尼寶經推六如伊蘭中牛頭栴檀如若種中生甘美果大智度論卷二譬如服藥以除病為主不擇貴賤大小大智度論卷十譬如蓮花出自淤泥色雖鮮好出處不淨大智度論卷十四如練山石中而取於真金譬如伊蘭木相瑳便火出亦如淤泥中生出青蓮華不觀所生處唯觀於德行大莊嚴經論卷七夫由余出自西戎輔秦穆以開霸業日磾生於北狄侍漢武而除危害臣既有之師亦宜爾何必取同俗而捨其異方乎法苑珠林卷五十五夫絶羣之駿非唯中邑之産曠代之珍不必諸華之物漢求西域之名馬魏收南海之明珠貢犀象之牙角採翡翠之毛羽物生遠域未可非珍佛出遐方奈何獨棄法苑珠林卷五十五喻林卷二十七
