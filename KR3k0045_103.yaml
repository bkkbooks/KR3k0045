body:
  text: 喻林卷一百三明徐元太撰政治門八順民古人有言曰人無於水監當於民監書酒誥譬若以弩射也可凖度之機已張之矢當以意往省視矢括當於所度則釋而放之如是而射則無不中矣猶若人君所修政教欲發命也當以意夙夜思之使當於民心明旦行之則無不當矣尚書正義太甲上夫射者張弓屬矢而志在所射必中然後發之為政之道亦如是也以已心度之可施於彼然後出之尚書正義盤庚上古之朋友相謂云我豈曰子無衣乎我冀欲與子同袍朋友同欲如是故朋友成其恩好以興明君能與百姓同欲故百姓樂致其死毛詩正義無衣土地是農夫之田人情者亦是聖王之田也禮記正義禮運獸惡其網民惡其上國語周湯曰豫有言人視水見形視民知治不史記殷本紀淳于髠曰弓膠昔幹所以為合也然而不能傅合疏罅騶忌子曰謹受令請謹自附於萬民史記田完世家治亂民猶治亂繩不可急也唯緩之然後可治前漢書循吏傳在溢則激處平則恬水之性也急之則擾緩之則靜民之情也後漢紀孝靈下夫國之有民猶水之有舟停則以安擾則以危愚而不可欺弱而不可勝是以聖王重焉吳志駱統傳夫以微羈而御悍馬又乃操以煩䇿其不制者固其理也晉書阮种傳此等習俗放散日久有似園中之鹿急則衝突緩之則定魏書劉潔傳天下之人如流水障之則止啓之則行靜之則清太公六韜文啓昔者堯之治天下也猶埴之在埏也惟陶之所以為猶金之在爐也恣冶之所以鑄管子任法夫法之利民也猶陶之於埴冶之於金也故審利害之所在民之去就如火之於燥濕水之於高下管子禁藏所欲者能得諸民故賢材遂所惡者能除諸民故姦偽省如冶之金陶之埴制在工也管子君臣上民之制於上猶草木之制也時也故民迂則流之民流通則迂之決之則行塞之則止管子君臣下能若夫風與波乎唯其所欲適管子白心如以豫人財者不如無奪時如以豫人食者不如無奪其事管子侈靡明惠之君不拂是以行其所欲此譬之猶自治魚鱉者也去其腥臊者而已昧墨與人比居庾肆而教人危坐晏子春秋諫下其用法為時禁暴故世不逆其志其用兵為衆屏患故民不疾其勞晏子問下善為政者積其德善用兵者畜其怒德積而民可用也怒畜而威可立也文子下德夫負重者患塗逺據貴者憂民離負重塗逺者身疲而無功在上離民者雖勞而不治故智者量塗而後負明君視民而出政鄧析子無厚君見其牧羊者乎百羊而羣使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前矣列子楊朱狙公賦芧曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆悅名實未虧而喜怒為用亦因是也是以聖人和之以是非而休乎天鈞莊子齊物論蜎飛蠕動微蟲耳亦猶懷利害之心故順之則喜悅逆之則勃怒况於人乎鬼谷子揣篇注夫下之和上譬之猶響之應聲影之像形也故為上者不可不順也荀子疆國篇安國之法若飢而食寒而衣不令而自然也韓非子安危欲知天道察其數欲知地道物其樹欲知人道從其欲淮南子繆稱訓聖人不困其衆以兼國良御不困其馬以兼道故造父之御不失和聖人之治不倍德秦攝利衡以御宇內執修箠以笞八極驂服以罷而鞭䇿愈加故有傾衡遺箠之變鹽鐵論結和樹木數徙則􅖖蟲獸徙居則壞故代馬依北風飛鳥翔故巢莫不哀其生由此觀之民非利避上公之事而樂亡也鹽鐵論未通民之仰法猶魚之仰水水清則靜濁則擾擾則不安其居靜則樂其業鹽鐵論昭聖民知十已則尚與之爭曰不如吾也百已則疵其過千已則誰而不信是故民不可稍而掌也可并而牧也不可暴而殺也可麾而致也衆不可戶説也可舉而示也説苑政理問善御者莫如馬問善治者莫如民説苑談叢衆口嘈嘈雖貴必危焦氏易林蠱之艮夫婦咒咀太山覆顚焦氏易林噬嗑之未濟睹孺子之驅雞也而見御民之有道孺子驅雞者急則驚緩則滯方其北也遽要之則折而過南方其南也遽要之則折而過北迫則飛踈則放志間則比之流緩而不安則食之不驅之驅驅之至者也志安則循路而入門申鑒政體聖人無常心以百姓為心目為心視口為心言耳為心聽身為心安故身之有心若國之有君武侯十六䇿視聽聖人所以陶運羣生使各得其性亦猶役人之能將養禽獸使不相殘害也張湛注列子黃帝百姓之心形聲也大人之教影響也大人之於天下何心哉猶影響之隨形聲耳使物之所懷各得自盡問者為主應故為配郭子注莊子在宥但知管子借耳於天下不知堯借人心而後用其耳目意林物理論小民髮如韭剪復生頭如雞割復鳴太平御覽菜部韭王若欲來天下之民先設其利而民自至譬若冬日之陽夏日之陰不召而民自來玉海地里山川食民所吐服民所醜居民所使樂民所苦務在順民不遑適已故民託之如父愛之如母願為臣妾與之俱死道德經指歸卷十三如慈母善别嬰兒聞其啼呼知其飢渴及以痛癢隨宜飲食及與方藥玉淸經通濟幽冥品安民山附於地剝上以厚下安宅易剝治民務除惡政當如痛病在汝身欲去之孔氏傳書康誥鴻鴈于飛肅肅其羽之子于征劬勞于野鴻鴈于飛集于中澤叶徒洛反之子于垣音袁百堵皆作詩小雅鴻鴈鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之至于矜寡無不得其所焉毛詩鴻鴈鴛鴦休息于梁明王之時人不驚駭斂其左翼以右翼掩之自若無恐懼鄭氏箋詩鴛鴦鴻鴈之性安居澤中今飛又集于澤中猶民去其居而離散今復還定安集鄭氏箋詩鴻鴈昆連子主我刀斧無俾野獸犧虎之類傷殘生命無俾同類大力之徒區逐微弱三墳山墳文帝時會天下新去湯火史記律書式乃拜為郎布衣屩而牧羊歲餘羊肥息上過見其羊善之式曰非獨羊也治民亦猶是也以時起居惡者輒斥去毋令敗羣史記平凖書列郡無犬吠之驚叢祠罷狐鳴之盜陳書高祖上紀善為水者引之使平善化人者撫之使靜水平則無損於隄防人靜則不犯於憲章隋書孝義史臣傳民之不移也如廢方於地管子乘馬數馬駭輿則君子不安輿庶人駭政則君子不安位馬駭輿則莫若靜之庶人駭政則莫若惠之荀子王制衛人有佐戈者鳥至因先以其裷麾之鳥驚而不射也韓非子內儲説左上身以積精為德家以資財為德鄉國天下皆以民為德韓非子解老國主之有民也猶城之有基木之有根根深則本固基美則上寧淮南子泰族訓水有猵獺而池魚勞國有強禦而齊民消故茂林之下無豐草大塊之間無美苗鹽鐵論輕重禹鑿龍門通利水源東注滄海民得安從焦氏易林乾之豫櫜置山巔銷鋒鑄刃示不復用天下大歡焦氏易林同人之同人日入道極勞者休息班馬還師復我燕室焦氏易林蹇之復次五舳艫調安利富貞測曰舳艫安和順其疆也太玄經第三居夫雲翔者不知泥居之汙處貴者鮮恕羣下之勞然根朽者尋木不能􅍖其千里之茂也民怨者堯舜不能恃其長世之慶也抱朴子外篇廣譬夫天下大器也羣生重畜也愛惡相攻利害相奪其勢常也若積水于防燎火于原未嘗暫靜也文選干寶晉紀總論乘車必護輪治國必愛民車無輪安處國無民誰與古文苑馮衍車銘方使怖鴿獲安窮魚永樂藝文類聚産業部錢啓呂望年七十釣于渭渚三日三夜魚無食者與農人言農人者古之老賢人也謂望曰子將復釣必細其綸芳其餌徐徐而投之無令魚駭望如其言初下得鮒次得鯉藝文類聚産業部約舟非水不行水入舟沒民非君不治民犯上則君危故君子不可不嚴也藝文類聚人部鑒誡飛蓬隨風集于王良之衡而駟馬為之奔乳虎為之走蓬非馬之䇿馬非蓬之敵所以或奔走者驚也太平御覽百卉部蓬欲水之清則勿涉欲草之茂則勿獵太平御覽資産部獵善耕者足以謹地待時而動善射者調弓定凖見可而發君子善養其人足用太平御覽兵部弓民難養而易散氣難􅍖而易失審威德所以固其理割嗜欲所以成其真廣黃帝本行紀夫聖人之撫百姓亦猶慈母之育嬰兒始食則餌以甘肥甘肥既厭復改以脂蜜脂蜜既厭則五體休和內外平豫𢎞明集難夷夏論足民宣王之德如澗水之源秩秩流出無極已也國以饒富民取足焉如於深山鄭氏箋詩斯干郊外野中有蔓延之草草之所以能延蔓者由天有隕落之露溥溥然霑潤之以興民所以得蕃息者由君有恩澤之化養育之毛詩正義野有蔓草幽幽然深逺財物豐積者南山也以興貨殖盈足者王國也王貨物豐殖民用饒足亦似深山之有材也毛詩正義斯干民既豐富得以生長故其民衆多如竹之叢生根本之衆矣其長大又佼好如松木之葉常冬夏暢茂無衰落矣毛詩正義斯干民非水火不生活昏暮叩人之門戶求水火無弗與者至足矣聖人治天下使有菽粟如水火菽粟如水火而民焉有不仁者乎孟子盡心上民君食民臣力民所尊崇以食為本務故為君矣民之使力如君使臣也三墳山墳高以下為基人以食為大晉書潘嶽傳囊漏貯中識者不吝反裘負薪存毛實難南史范泰傳內削其民以為攻伐譬猶漏釜豈能無竭管子四稱樹木之勝霜露者不受令於天家足其所者不從望人管子輕重乙馬者所乘以行野也故雖不行於野其食養馬也未嘗解惰也民者所以守戰也故雖不守戰其治養民也未嘗解惰也管子形勢解今夫蛆螣蚼蠋春生秋死一出而民數年不食今一人耕而百人食之此其為蛆螣蚼蠋亦大矣雖有詩書鄉一束家一員猶無益於治也商子農戰王者富民霸者富士僅存之國富大夫亡國富筐篋實府庫筐篋已富府庫已實而百姓貧夫是之謂上溢而下漏荀子王制篇老𣆀有言曰知足不辱知止不殆夫以殆辱之故而不求於足之外者老𣆀也今以為足民而可以治是以民為皆如老𣆀也韓非子六反君有好獵者曠日持久而不得獸入則愧其家室出則愧其知友州里惟其所以不得之故則狗惡也欲得良狗則家貧無以於是還疾耕疾耕則家富家富則有以求良狗狗良則數得獸矣田獵之獲常過人矣非獨獵也百事也盡然霸王有不先耕而成霸王者古今無有此賢者不肖之所以殊也呂氏春秋貴當地可使肥又可使棘人肥必以澤呂氏春秋任地且夫飢代事也猶淵之與阪誰國無有呂氏春秋長攻百姓不足而君有餘者是猶劫盜以為服飾持行夸人不知身死家破親戚并隨也河上公注老子益證築城者先厚其基而求其髙畜民者先厚其業而後求其淡古贍字鹽鐵論未通周諺曰囊漏貯中而獨不聞歟夫君者民之父母取倉之粟移之於民此非吾之粟乎新序刺奢倉盈庾億宜種黍稷年豐歲熟民人安息焦氏易林乾之師次六割之無創飽于四方測曰割之無創道可分也太玄經第六割次三糞以肥丘育厥根荄測曰糞以肥丘中光大也太玄經第六養天下國家一體也君為元首臣為股肱民為手足下有憂民則上不盡樂下有飢民則上不備膳下有寒民則上不具服從跣而垂旒非禮也故足寒傷心民寒傷國申鑒政體王者以四海為家兆人為子一夫不耕天下受其飢一婦不織天下受其寒潛夫論浮侈夫飢寒並至而能無為非者寡然則溫飽並至而能不為善者希王充論衡治期篇夫獺多則魚擾鷹衆則鳥亂有司設則百姓困奉上厚則下民貧抱朴子外篇詰鮑衣食者民之本也民者國之本也民恃衣食猶魚之須水國之恃民如人之倚足魚無水則不得而生人失足必不可以步國失民亦不可以治劉子貴農飢寒並至而欲禁人為盜是揚火而欲無炎撓水而望其靜不可得也劉子貴農民如六畜在牧養者耳李善注文選干令升晉紀總論就使當今沙礫化為南金瓦石變為和玉使百姓渴無所飲飢無所食雖皇羲之純德唐虞之文明猶不能以􅍖蕭牆之內也補文選劉陶鑄錢議泉竭中虛池竭頻乾廣文選揚子雲交州牧針使民主養民如蠶母之養蠶則其用豈徒絲蠶而已哉太平御覽資産部蠶激勸陵雪褒穎貞柯必振尊風賞流清原斯挹宋書良吏陸徽得桀之犬實可吠堯跖之客實可刺由又何况由之犬堯之客南齊書崔慧景傳軒冕立於朝爵祿不隨臣不為忠中軍行戰委豫之賞不隨士不死其列陳管子輕重甲越王句踐見怒蛙而式之御者曰何為式王曰蛙有氣如此可無為式乎士人聞之曰蛙有氣王猶為式况士人之有勇者乎是歲人有自剄死以其頭獻者韓非子內儲説上上下相得故能使用力者自極於權衡而務至於任鄙戰士出死而願為賁育守道者皆懷金石之心以死子胥之節用力者為任鄙戰如賁育守為金石則君人者高枕而守已完矣韓非子守道香餌之下必有死魚重賞之下必有勇夫故禮者士之所歸賞者士之所死招其所歸示其所死則所求者至黃石公三略上今有千里之馬於此非得良工猶若弗取良工之與馬也相得則然後成譬之若枹之與鼓夫士亦有千里髙節死義此士之千里也能使士待千里者其惟賢者也呂氏春秋知士闔盧試其民於五湖劒皆加於肩地流血幾不可上句踐試其民於寢官民爭入水火死者千餘矣遽擊金而卻之賞罰有充也莫耶不為勇者興懼者變勇者以工懼者以拙能與不能也夙沙之民自攻其君而歸神農密須之民自縛其主而與文王湯武非徒能用其民也又能用非已之民能用非已之民國雖小卒雖少功名猶可立呂氏春秋用民趙簡子有兩白騾而甚愛之陽城胥渠處廣門之官夜款門而謁曰主君之臣胥渠有疾醫教之曰得白騾之肝病則止不得則死謁者入通董安于御於側愠曰嘻胥渠也期吾君騾請即刑焉簡子曰夫殺人以活畜不亦不仁乎殺畜以活人不亦仁乎於是召庖人殺白騾取肝以與陽城胥渠處無幾何趙興兵而攻翟廣門之官左七百人右七百人皆先登而獲甲首呂氏春秋決勝田子方見老馬於道喟然有志焉以問其御曰此何馬也其御曰此故公家畜也老罷而不為用出而鬻之田子方曰少而貪其力老而棄其身仁者弗為也束帛以贖之罷武聞之知所歸心矣齊莊公出獵有一蟲舉足將摶其輪問其御曰此何蟲也對曰此螳螂也其為蟲也知進而不知却不量力而輕敵莊公曰此為人而必為天下勇武矣回車而避之勇武聞之知所盡死矣故田子方隱一老馬而魏國戴之齊莊公避一螳螂而勇武歸之故聖人行之於小則可以覆大矣審之於近則可以懷逺矣淮南子人間訓夫服重上阪出馳千里馬之禍也然節馬樂之者以王良足為盡力也先登陷陳赴死嚴敵民之禍也然節士樂之者以明君可為效死也潛夫論勸將除惡犬以遏酒酗之患市馬骨以招追風之駿軾怒蛙以勸勇避螳螂以厲武抱朴子外篇君道螳螂見歎齊士輕戰越王軾蛙國以死獻藝文類聚人部鑒誡詩越王問於大夫種曰吾欲伐吳可乎對曰可矣君賞厚而信罰嚴而必君欲知之何不試焚宫室於是遂焚宫室民莫救火乃下令曰人救火而死者比敵死之賞勝火而死者比勝敵之賞不救火者比降北之罪民之塗其體被濡衣走火者左三千人右三千人此知必勝之勢也藝文類聚刑法部刑法布澤洌音列彼下泉浸彼苞稂音郎洌彼下泉浸彼苞蕭叶疏鳩反洌彼下泉浸彼苞蓍音尸詩國風下泉芄芄音蓬黍苗陰雨膏去聲之詩國風下泉蓼音六彼蕭斯零露湑上聲兮蓼彼蕭斯零露瀼瀼音攘蓼彼蕭斯零露泥泥音你蓼彼蕭斯零露濃濃詩小雅蓼蕭湛湛上聲露斯匪陽不晞湛湛露斯在彼豐草湛湛露斯在彼把棘詩小雅湛露蓼蕭澤及四海也毛詩蓼蕭葛也藟也生於河之崖得其潤澤以長大而不絶喻王之同姓得王之恩施以生長其子孫鄭氏箋詩葛藟露者天所以潤萬物喻王者恩澤不為逺國則不及也鄭氏箋詩蓼蕭天下之民如黍苗然宣王能以恩澤育養之亦如天之有陰雨之潤鄭氏箋詩黍苖冬有積雪春而益之以小雨潤澤則饒洽鄭氏箋詩信南山旱山之足林木茂盛者得山雲雨之潤澤也喻周邦之民獨豐樂者被其君德教鄭氏箋詩旱麓草之所以能延蔓被盛露也民之所以能蕃息蒙君澤也毛詩正義野有蔓草激揚之水豈不能流移一束之薪乎言能流移之以興王者之尊豈不能施行恩澤於下民乎言其能施行之毛詩正義楊之水秩秩然出無極已者此澗水之流也以興施無有窮者此宣王之德也言王德之無窮猶澗水流之不竭毛詩正義斯干客始至主人以簋盛餐以匕載肉而待之是主人供承之惠於賔客厚也以興古者天子施豫之恩於天下厚也毛詩正義大東言芃芃長大者是黍苖也此黍苗所以得長大者天以陰雨之澤膏潤之故也以興宣王之時悅樂者是衆人也此衆人所以得悅樂者由王以恩惠之澤養育之故也以黍苗之仰膏雨猶衆人之仰恩惠是宣王能育潤天下毛詩正義黍苗祭者澤之大者也是故上有大澤則惠必及下顧上先下後耳非上積重而下有凍餒之民也是故上有大澤則民夫人待于下流知惠之必將至也由餕見之矣禮記祭統夫祭有畀輝胞翟閽者惠下之道也唯有德之君為能行此禮記祭統鬼神有祭不獨饗之使人餕之恩澤之大者國君有蓄積不獨食之亦以施惠於境內也鄭氏注禮記祭統藥攻人疾先使瞑眩憒亂乃得瘳愈喻行仁當精熟德惠乃洽也趙氏注孟滕文公上雲天成陰聖人以澤蔭庶物三墳形墳萬物燥澤可及天地怒澤能悅萬形惡澤能美乾坤鑿度乾鑿度上賢能太守去帝城不逺河潤九里冀京師并蒙福也後漢書郭伋列傳汦汦庶類含甘吮滋後漢書蔡雍傳春雨之灌萬物無地不澍無物不生後漢書明帝紀注莫不鳥騰魚躍喜蒙德澤晉書摰虞傳天波既洗雲油遽沐梁書袁昂傳幸聖主留善貸之德紆好生之施解網咒禽下車泣罪愍兹恚詬憐其觳觫加肉朽胔布葉枯株輟薪止火得不銷爛所謂還魂斗極追氣泰山梁書王僧孺傳雲構鬱起澤及百司企春望榮內外同慶魏書任城王雲子澄傳招搖東指天下識其春人君布德率土懷其惠周書黎景熙藝術傳夫渤澥之侵沾濡千里列國之政豈周之膏潤者歟隋書刑法志洪恩大澤便同海運隋書楊素傳雷之動也萬物啓雨之潤也萬物解大人施行有似於此文子上德治身者愛氣則身全治國者愛民則國安治身者呼吸精氣無令耳聞也治國者布施惠德無令卞知也河上公注老子能為聖人積德不積財有德以教愚有財以與貧既以為人施設德化已愈有德既以財賄布施與人而財益多如日月之光無有盡時也河上公注老子顯質饗飲之禮先爵於卑賤而後貴者始差殽膳下浹而樂人始奏觴不下遍君不賞差殽不下浹上不舉樂故禮者所以恤下也賈子禮積雨潤下畜地光也京氏易傳大畜上潼滃蔚薈膚寸來會津液下降流潦滂沛焦氏易林履之恆府藏之富王以賑貸焦氏易林坎之大過五嶽四瀆合潤為德行不失理民賴恩福焦氏易林恆之井嵩高岱宗峻直且神觸石膚寸千里蒙恩焦氏易林大壯之兌隱隱大雷雱霈為雨焦氏易林巽之離雲興蔽日雨集草木年茂歲熟焦氏易林未濟之升次三蒼木維流厥美可以達於瓜苞測曰蒼木維流內恕以量也太玄經第二逹上九雨降於地不得止不得過測曰雨降于地澤節也太玄經第五用次六飲汗吭吭得其膏滑測曰飲汗吭吭道足嗜也太玄經第六闕人不喜不施恩天不悅不降雨王充論衡雷虛篇細密之雨能潤於枯瀆况於谷邪太玄經第一少解雖星畢之滂沱尚未齊其膏液文選蜀都賦弛秋霜之嚴威流春澤之渥恩文選西征賦民望如草我澤如春文選曹植士啓春雨潤木自葉流根鴟梟恤功愛子及室故天稱罔極之恩聖有綢繆之惠文選張悛為謝詢作表江海所流無地不潤雲雨所加無物不茂藝文類聚封爵部親戚封表固宜觀象雷雨布寬大之恩取類澤風申肆眚之令藝文類聚治政部赦宥詔非日非月蒼生仰其照臨如雲如雨天下蒙其恩蔭文苑英華除陵贈答上書語曰雷高弗雨雷在南山之下則雨矣埤雅天道門雷井以汲人水無空竭猶人君以政教養天下惠澤旡窮也玉海周易鄭康成注譬如甘雨潤於一切若山若澤若高若下是諸草木無不蒙益海空智藏經普説品若如海龍普雨天下無所不潤修行道地經修行品天不終朝而雨六合者彌天之雲也𢎞淵源以潤八極者四大之流也彼直無為降而萬物賴其澤此本無心行而高下蒙其潤𢎞明集卷十二望治肆若農服田飢以望穫汲冡周易度邑解下泉思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也毛詩下泉野有蔓草思遇時也君之澤不下流民窮於兵革男女失時思不期而會焉毛詩野有蔓草褰裳思見正也狂童恣行國人思大國之正已也毛詩褰裳誰能亨魚者乎有能亨魚者我則溉滌而與之釜鬵以興誰能西歸輔周治民者乎有能輔周治民者我則歸之以周舊政令之好音毛詩正義匪風今燕虐其民王往而征之民以為將拯已於水火之中也孟子梁惠王下民之憔悴於虐政未有甚於此時者也飢者易為食渴者易為飲孟子公孫丑上民之思明君猶水樂卑下獸樂廣野驅之則歸其所樂趙氏注孟離婁上莫不望景聳魂瞻雲佇足宋書謝莊傳傾首東望仰希拯接咸同旱苗之待天澤赤子之望慈親宋書索虜傳夫流於海者行之旬月見似人者而喜矣及其期年也見其所嘗見物於中國者而喜矣夫去人滋久而思人滋深歟亂世之民其去聖王亦久矣其願見之日夜無間故賢主秀士之欲憂黔首者不可不務也呂氏春秋聽言雲雷困積大雨重疊久不見日使我心悒焦氏易林蠱之大畜喁喁嘉草思降甘雨景風生上沾洽時澍焦氏易林豐之未濟蒼生飢德億兆渴化文苑英華孔熙元檄一三伏之日炎暑赫曦男女行來其氣短急望見義井則喜不可言未至而憂既至而樂號為歡樂井太平御覽詩序部伏日衆生樂見如夏日雲衆生樂受如夏時雨大方等大集經卷二十五猶如篤病樂見良醫處暗之者樂覩光明如沒水者樂至彼岸如受苦者樂得歸依大方等大集經卷二十八亢陽如久必思甘雨之澤災癘若多尅待良醫之藥法苑珠林卷九十七喻林卷一百三
