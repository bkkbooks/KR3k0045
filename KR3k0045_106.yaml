body:
  text: 喻林卷一百六明徐元太撰政治門十一固國重不可動因其不可動而堅固之春秋正義閔公元年地山磐石聖人以深固基業三墳形墳山氣止聖人以安萬國三墳氣墳天下之安猶泰山而四維之也前漢書嚴助傳此猶倚南山而坐平原也誰能傾之後漢紀孝質居重固之安可謂根深華嶽而四維之也晉書劉頌傳持瓢者非止百人搖樹者不唯一手北齊書幼主帝紀無甲兵而勝無衝機而攻無溝塹而守太公六韜發啓國有四維一維絶則傾二維絶則危三維絶則覆四維絶則滅傾可正也危可安也覆可起也滅不可復錯也管子牧民錯國於不傾之地積於不涸之倉藏於不竭之府下令於流水之原使民於不爭之官明必死之路開必得之門管子牧民建立四維以輔國政鉤繩相布銜橛相制參偶其備立位乃固鶡冠子道端勢者君之輿威者君之䇿臣者君之馬民者君之輪勢固則輿安威定則䇿徑臣順則馬良民和則輪利為國失此必有覆車奔馬折輪敗載之患安得不危鄧析子無厚食者國之寶也兵者國之爪也城者所以自守也此三者國之具也墨子七患臣有兩位者國必亂臣兩位國不亂者君在也恃君不亂矣失君則亂子有兩位者家必亂子兩位而不亂者父在也恃父不亂矣失父則亂臣疑君而無不危國蘖疑宗而無不危家慎子德立國者天下之大器也重任也不可不善為擇所而後錯之錯險則危不可不善為擇道然後道之塗薉則塞薉與穢同荀子富國刑范正金鍚美工冶巧火齊得剖刑而莫耶已然而不剝脫不砥礪則不可以斷繩剝脫之砥礪之則盤盂刎牛馬忽然耳彼國者亦彊國之剖刑已然而不教誨不調一則入不可以守出不可以戰教誨之調一之則兵徑城固敵國不敢攖也彼國者亦有砥礪禮儀節奏是也故人之命在天國之命在禮荀子彊國人之情食欲有芻豢衣欲有文繡行欲有輿馬又欲夫餘財蓄積之富也然而窮年纍世不知不足是人之情也今人之生也方多蓄雞狗猪彘又蓄牛羊然而食不敢有酒肉餘刀布有囷窖然而衣不敢有絲帛約者有筐篋之藏然而行不敢有輿馬是何也非不欲也幾不長慮顧後而恐無以繼之故也於是又節用御欲收斂蓄藏以繼之也是於己長慮顧後幾不甚善矣哉今夫偷生淺知之屬曾此而不知也糧食大侈不顧其後俄則屈安窮矣是其所以不免於凍餓操瓢囊為溝壑中瘠者也况夫先王之道仁義之統詩書禮樂之分乎彼固天下之大慮也將為天下生民之屬長慮顧後而保萬世也荀子榮辱周之奪殷也拾遺於庭使殷不遺於朝則周不敢望秋毫於境而况敢易位乎韓非子安危凡有國而後亡之有身而後殃之不可謂能有其國能保其身夫能有其國必能安其社稷能保其身必能終其天年而後可謂能有其國能保其身矣韓非子解老武王問太公曰寡人伐紂天下是臣弒其主而下伐其上也吾恐後世之用兵不休鬪爭不已為之奈何太公曰甚善王之問也夫未得獸者惟恐其創之小也已得之惟恐傷肉之多也王若欲久持之則塞民於兊淮南子道應訓楚鄭之棠溪墨陽非不利也犀䩜兕甲非不堅也然而不能存者利不足恃也鹽鐵論論勇善鑿者建周而不疲善基者致高而不蹶伊尹以堯舜之道為殷國基子孫紹位百代不絶商鞅以重刑峭法為秦國基故二世而奪鹽鐵論復古夫一兔走於街萬人追之一人得之萬人不復走分未定則一兔走使萬人擾分已定則雖貪夫知止今楚多寵子而嫡位無主亂自是生矣夫世太子者國之基也而百姓之望也國既無基又使百姓失望絶其本矣本絶則撓亂猶兔走也說苑建本柏柱載梁堅固不傾焦氏易林比之泰土與山連共保歲寒焦氏易林剝之履金城鐵廓上下同力政平民歡寇不敢賊焦氏易林離之噬嗑金城鐵廓以銅為關藩屏自衛安上無患焦氏易林遁之鼎明月照夜使暗為晝國有仁賢君尊於故焦氏易林井之渙金梁鐵柱千年牢固完全不腐聖人安處焦氏易林旅之咸次四恢其門户以禦寇勇測曰恢其門户大經營也太𤣥經第四廓國以山河城廓為固家以垣籬椳閥為固天祿閣外史時勢天下大器也置之安地則安置之危地則危是以平路安車狂夫審乎難覆乘奔馭朽童子知其必危關氏易傳以善人為之藩籬謂封周公康叔於魯衛以大師為垣墻謂封太公於齊也大邦以為屏蔽謂成國諸侯也大宗以為楨幹謂王之同姓也能和其德則天下安寧分建宗子則列城堅固城不可使墮壞宗不可使單獨單獨墮壞則畏懼斯至前漢書注諸侯王表言奔沈吾猶人也必也使無奔沈楊子法言注寡見篇正位居體者以中夏為喉舌不以邊陲為襟帶也長世字氓者以道德為藩不以襲險為屏也文選魏都賦家有常業雖饑不餓國有常業雖危不亡意林韓子本枝惟茂宗周之業以𢎞磐石既建皇漢之圗斯逺初學記帝戚部王守其母其子全而民熾盛保其國也西升經國之不安猶身有病吾救之以藥臣飼之以麋粥天王太子辟羅經行六庇本葛藟王族刺平王也周室道衰棄其九族焉毛詩葛藟杕杜刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所並爾毛詩杕杜角弓王不親九族而好讒佞宗族相怨之詩詩說小正傳夫能固位者必度其本末而後立衷焉不知其本不謀知本之不枝弗强詩云本枝百世左傳莊公六年公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圗之親之以德皆股肱也左傳文公七年犬牙相制麟趾有光史記漢興表贊髙帝封王子弟地犬牙相制此所謂磐石之宗也史記孝文紀自古帝王之臨天下也皆欲廣樹藩屏崇固維城晉書諸王總傳本根無所庇廕遂乃三葉而亡有晉思改覆車復隆磐石晉書諸王總傳中國與邊境猶支體與腹心也夫肌膚寒於外腹腸疾於內內外之相勞非相為虐也唇亡則齒寒支體傷而心憯怛故無手足則皮體廢無邊境則內國害鹽鐵論誅秦四支强而躬體固華葉茂而本根據故飾四境所以安中國也鹽鐵論繇役先聖制法亦務實邊蓋以安中國也譬猶家人遇寇賊者必使老小羸軟居其中央丁彊武猛衛其外內人奉其養外人禦其難蛩蛩距虛更相恃仰乃俱安存潜夫論實邊公族者國之枝葉枝葉落則本根無所庇廕文選曹冏六代論泉竭則流涸根朽則葉枯枝繁者蔭根條落者本孤故語曰百足之蟲至死不僵扶之者衆也文選曹冏六代論內無深根不拔之固外無磐石宗盟之助非所以安社稷為萬代之業也文選曹元首六代論姦情散於胸懷逆謀消於脣吻斯豈非信重親戚任用賢能枝葉碩茂本根賴之藝文類聚帝王部惣載帝王強本揚之水白石鑿鑿音作揚之水白石皓皓叶胡暴反揚之水白石𥻘粼詩國風揚之水揚之水刺晉昭公也昭公分國以封沃沃盛强昭公微弱毛詩揚之水陵苕之幹喻如京師也其華猶諸夏也故或謂諸夏為諸華華衰則黃猶諸侯之師旅罷病將敗則京師孤弱鄭氏箋詩苕之華京師以諸夏為障蔽今陵苕之華衰而葉見青青然喻諸侯微弱而王之臣當出見也鄭氏箋詩苕之華蔦與女蘿施於松柏之上非自有根依於松柏之根故松柏存而茂松柏殞而亡是存亡在松柏以興同姓與九族附於王者之側非自有尊託王之尊故王政明而榮王政衰而微是興衰由於王政毛詩正義頍辨末大必折尾大不掉左傳昭公十一年譬之樹木本弱者其枝必披非人力所能強成杜氏解左傳莊公六年且夫制城邑若體性焉有首領股肱至於手拇毛脉大能掉小故變而不勤國語楚夫邊境者國之尾也譬之如牛馬處暑之既至虻䗽之既多而不能掉其尾臣亦懼之國語楚臨淄之塗車轂擊人肩摩連袵成帷舉袂成幕揮汗成雨史記蘇秦傳本實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主史記范睢傳髙皇帝瓜分天下以王功臣反者如蝟毛而起前漢書賈誼傳今海內之藝如身之使臂臂之使指莫不制從前漢書賈誼傳天下之藝方病大瘇一脛之大幾如要一指之大幾如股平居不可屈信一二指搐身慮亡聊失今不治必為錮疾後雖有扁鵲不能為己病非徒瘇也又苦􅏓盩前漢書賈誼傳譬之一人之身本朝者心腹也州郡者四支也心腹痛則四支不舉故臣之所憂在腹心之疾非四支之患後漢紀孝順天下猶人之體腹心充實四支雖病終無大患魏志杜畿傳夫先王經始𤣥聖宅心畫為九州制為九服貴中區而內諸夏誠以晷度自日霜露惟均冠冕萬國朝宗四海故也晉書桓溫傳幹植不彊枝葉不茂骨鯁不存皮膚不充晉書曹志傳夫無委致圍城脆致衝夫不定內不可以持天下管子事語月望日奪其光陰不可以乘陽也日出星不見不能與之爭光也故末不可以強於本指不可以大於臂下輕上重其覆必易淮南子說山訓生天地之間根本微者不可遭大風疾雨立鑠消耗春秋繁露滅國上所謂末大必折尾大難掉尾同於體猶或不從况乎非體之尾其可掉哉文選曹冏六代論附枝大者賊本心私家盛者公室危補文選蕭望之雨雹對邊垂之患手足之蚧搔中國之困胸背之瘭疽補文選蔡雍諌伐鮮卑議恐尾大於身踵粗於股倔強不掉狼戾難馴文苑英華杜弼檄一感召螟螣之屬盛陽氣嬴則生之今明君為政田祖之神不受此害持之付與炎火使自消亡鄭氏箋詩大田天既顧文王乃和其國之風雨使其山樹木茂盛言非徒養其民人而已鄭氏箋詩皇矣王者修其母則致其子水官修則龍至木官修則鳳至火官修則麟至土官修則白虎至金官修則神龜至故為其說云視明禮修而麟至思睿信立而白虎擾言從文成而神龜在沼聽聰知正而名川出龍貌共體仁則鳳凰來儀皆修其母而致其子也春秋正義昭公二十九年周德既隆草木茂盛蒿堪為宫室因名蒿室竹書紀年下致治感陰陽猶鐵炭之低卬見效可信者也前漢書李尋傳貌言視聽以心為主四者皆失則區霿無識故其咎霿也雨旱寒燠亦以風為本四氣皆亂故其罰恆風也晉書五行志下煙雲同五色日月並重輪隋書音樂中志不刳胎剖卵則鸞鳳馴鳴不漉浸焚原則螭龍盤蜿隋書許善心傳陽烏垂曜微藿傾心神龍騰舉飛雲觸石聖人在上幽顯冥符故稱比屋可封萬物斯覩隋書李德林傳自而治天下雲氣不待族而雨草木不待黃而落日月之光益以荒矣廣成子夫鳳凰鸞鳥不降而鷹隼鴟梟豐庶神不格守龜不兆握粟而筮者屢中時雨甘露不降飄風暴雨數臻五穀不蕃六畜不育而蓬蒿藜􅀢並興管子小匡鳳凰者鶉火之禽陽之精也麒麟者𤣥枵之獸陰之精也萬民者德之精也德能致之其精畢至鶡冠子度萬類同相召氣同則合聲比則應故鼓宫而宫應鼓角而角動以龍致雨以形逐影禍福之所自來衆人以為命焉不知其所由故國亂吕氏春秋召類天人相通精氣相貫人君清淨天氣自正人君多欲天氣煩濁吉凶利害皆由於己河上公注老子鍳逺人主之情上通於天故誅暴則多飄風枉法令則多蟲螟殺不辜則國赤地令不收則多淫雨淮南子天文訓昔者師曠奏白雪之音而神物為之下降風雨暴至平公癃病晉國赤地庶女呌天雷電下擊景公臺隕支體傷折海水大出夫瞽師庶女位賤尚葈權輕飛羽然而專精厲意委務積神上通九天激厲至精由此觀之上天之誅也雖在壙虛幽間遼逺隱匿重襲石室界障險阻其無所逃之亦明矣淮南子覽冥訓璚英朱草仁政得道焦氏易林噬嗑之中孚仁政不暴鳳凰來舍焦氏易林賁之賁甘露醴泉太平機關仁德感應歲樂民安焦氏易林咸之兑君賢臣忠政合大中則品庶安寧萬物豐茂上暗下僞用法殘虐則忠良被害草木枯落王逸注楚辭九辨天且風巢居之蟲動且雨穴處之物擾風雨之氣感蟲物也故人在天地之間猶蚤虱之在衣裳之內螻蟻之在穴隙之中蚤虱螻蟻為逆順從橫能令衣裳穴隙之間氣變動乎王充論衡變動篇夫寒溫天氣也天至髙大人至卑小蒿不能鳴鍾而螢火不㸑鼎者何也鍾長而篙短鼎大而螢小也以七尺之細形感皇天之大氣其無分銖之驗必也王充論衡變動篇旌旗垂旒旒綴於杆杆東則旒隨而東杆西則旒隨而西茍謂寒溫隨刑罰而至是以天氣為綴旒也王充論衡變動篇或時太平氣和麞為騏麟鵠為鳳凰因故氣性隨時變化豈必有常類哉王充論衡講瑞篇善言居室則靡逺不應枉直不中則無近不離是以宋野有退舍之熒惑殷朝有外奔之昵屬四環至自少廣之表鹿馬變於蕭墻之裏抱朴子外篇博喻王政失於此星辰變於彼猶景之象形前漢書注叙傳述天文志一變而致羽物及川澤之祇再變而致羸物及山林之祇三變而致鱗物及丘陵之祇四變而致毛物及墳衍之祇五變而致介物及地祇六變而致象物及天神前漢書注郊祀志君不假臣下之權則日月揚光藝文類聚天部日政太平則月圎而多輝政升平則月清而明藝文類聚天部月出號令合民心則祥風至藝文類聚天部風河水逆流怨氣盛也藝文類聚人部怨政太平者則日五色政公平則日黃中而赤暈政和平則日黃中而黑暈政象平則日黃中而白暈政升平則日黃中而青暈太平御覽天部三上政太平則月多耀政頌平則赤明政和平則黑明政象平則白明政升平則青明太平御覽天部月王者盛德則嘉禾生嘉禾者仁卉也其大盈箱一桴二采國政質則同本而異頴國政文則同頴而異本太平御覽休徵部嘉榖至德之萌五星若貫珠初學記天部星注太平日行上道升平行次道虐世行下道玉海天文天文書上一夫呼嗟王道為之傾覆一里違和陰陽為之改度道德經注疏卷三歸心火有其炎寒者附之故已茍安焉則不寧方來矣王弼注易比百姓如喪考妣書舜典泉深而魚鱉歸之草木茂而鳥獸歸之稱賢使能官有材而歸之關市平商賈歸之分地薄斂農民歸之水性歸下農民歸利王若欲求天下民先設其利而民自至譬之若冬日之陽夏日之陰不召而民自來此謂歸德汲冡周書大聚解逺人來歡視道如尺汲冡周書太子晉解芃芃音蓬棫音域朴音卜薪之槱音酉之濟濟辟音璧王左右趣叶此茍反之詩大雅棫朴鳥止於阿人止於仁毛詩綿蠻樛木諸侯慕文王之德而歸心焉故作此詩詩說周南草蟲南國大夫夏聘於周次於終南睹王室之多賢相率以歸心焉詩說召南鴻鴈王者柔懷逺人流民喜之而作是詩詩說小正視鳥集於富人之室民亦當求明君而歸之鄭氏箋詩正月蒲盧取桑蟲之子負持而去煦嫗養之以成其子有萬民不能治則能治者將得之鄭氏箋詩小宛魚之依水草猶人之依明王也明王之時魚何所處乎處於藻既得其性則肥充其首頒然鄭氏箋詩魚藻有菀然枝葉茂盛之柳行路之人豈有不庶幾欲就之止息乎王有盛德則天下皆庶幾願往朝焉鄭氏箋詩菀柳鴻鴈避所忌就所欲往飛之時肅肅其羽為聲也以興萬民去所惡就有道而歸往之時其心喜樂也毛詩正義鴻鴈視烏於所止當止於誰之屋乎以興視我民人所歸亦當歸於誰之君乎烏集於富人之屋以求食喻民當歸於明德之君以求天祿也毛詩正義正月上之親下也如腹心則下之親上也如保子之見慈母也大戴禮記注言民人痛疾而或噢咻之其愛之如父母而歸之如流水左傳昭公三年國人望君如望歲焉日日以幾若見君面是得艾也左傳哀公十六年民歸之猶水之就下沛然誰能禦之孟子梁惠王上民歸之若大旱之望雲霓也孟子梁惠王上民之恱之猶解倒懸也孟子公孫丑上以德服人者中心恱而誠服也如七十子之服孔子也孟子公孫丑上民之歸仁也猶水之就下獸之走壙也孟子離婁上故為淵驅魚者獺也為叢驅爵者鸇也為湯武驅民者桀與紂也孟子離婁上越四封之內親吾君也猶父母也子而思報父母之仇臣而思報君之仇其有敢不盡力者乎國語越大海蕩蕩水所歸高賢愈愈民所懷大山崔百卉殖民何貴貴有德前漢書禮樂志夫仁人在上為下所卬猶子弟之衛父母若手足之扞頭目何可當也鄰國望我歡若親戚芬若椒蘭顧視其上猶焚灼仇讎人情豈肯為其所惡而攻其所好哉故以桀攻桀猶有巧拙以桀詐堯若卵投石夫何幸之有前漢書刑法志天下之民敬而愛之若親父母則而養之若仰日月後漢書輿服志億兆向風殊俗畢至若列宿之綰北極百川之歸巨海晉書紀瞻傳同類歸之若夜蛾之赴火魏書崔浩傳猶衆星環於斗極百川之赴溟海魏書胸奴劉聰傳如鳥還山猶川赴海北齊書文宣帝紀羣星拱極衆川赴海隋書音樂中志山高而不崩則祈羊至矣淵深而不涸則沈玉極矣管子形勢人聚之壤地之美也人死之若江湖之大也求珠貝者不令也管子侈靡夫水波而上盡其搖而復下其勢固然者也故得之以懷也威之以畏也則天下歸之矣管子君臣下民之從有道也如饑之先食也如寒之先衣也如暑之先陰也故有道則民歸之無道則民去之故曰道往者其人莫來道來者其人莫往管子形勢解蛟龍水蟲之神者也乘於水則神立失於水則神廢人主天下之有威者也得民則威立失民則威廢蛟龍待得水而後立其神人主待得民而後成其威管子形勢解夫行道者使人雖勇刺之不入雖巧擊之不中夫刺之不入擊之不中而猶辱也未若使人雖勇不敢刺雖巧不敢擊夫不敢者非無其意也未若使人無其意夫無其意者未有愛利之心也不若使天下丈夫女子莫不歡然皆欲愛利之若然者無地而為君無官而為長文子道德臣之於君也下之於上也若子之事父弟之事兄若手臂之捍頭目而覆胸腹也荀子議兵大寒既至民暖是利大熱在上民清是走故民無常處見利之聚無之去呂氏春秋功名善釣者出魚乎十仞之下餌香也善弋者下鳥乎百仞之上弓良也善為君者蠻夷反舌殊俗異習皆服之德厚也水泉深則魚鱉歸之樹木盛則飛鳥歸之庶草茂則禽獸歸之人主賢則豪傑歸之故聖王不務歸之者而務其所以歸呂氏春秋功名水出於山而走於海水非惡山而欲海也高下使之然也稼生於野而藏於倉稼非有欲也人皆以之也呂氏春秋審已饑馬盈廄嗼然未見芻也饑狗盈窖嗼然未見骨也見骨與芻動不可禁亂世之民嗼然未見賢者也見賢人則往不可止呂氏春秋首時先王之使其民若御良馬輕任新節欲走不得故致千里善用其民者亦然民日夜祈用而不可得茍得為上用民之走之也若決積水於千仞之溪其誰能當之周書曰民善之則畜也不善則讎也有讎而衆不若無有古之君民者仁義以治之愛利以安之忠信以導之務除其灾思致其福故民之於上也若璽之於塗也抑之以方則方抑之以圜則圜若五種之於地也必應其類而蕃息於百倍此五帝三皇之所以無敵也呂氏春秋適威開春始雷則蟄蟲動矣時雨降則草木育矣飲食居處適則九竅百節千脉皆通利矣王者厚其德積衆善而鳳凰聖人皆來至矣共伯和修其行好賢仁而海內皆以來為稽矣呂氏春秋開春今夫爚蟬者務在乎明其火振其樹而已火不明雖振其樹何益明火不獨在乎火在於暗當今之時世暗甚矣人主有能明其德者天下之士其歸之也若蟬之走明火也呂氏春秋期賢茍胡面而戎狀者其自以為見愛於天子也猶弱子之遌慈母也賈子胸奴豐水之深千仞而不受塵垢投金鐵針焉則形見於外非不深且清也魚鱉龍蛇莫之肯歸也是故石上不生五榖秃山不遊麋鹿無所陰蔽隱也淮南子道應訓天有明不憂民之晦也百姓穿戶鑿牗自取照焉地有財不憂民之窮也百姓伐木芟草自取富焉至德道者若丘山塊然不動行者以為期也淮南子詮言訓受命而海內順之猶衆星之共北辰流水之宗滄海也春秋繁露觀德文王不能使不附之民先軫不能戰不教之卒造父王良不能以弊車不作之馬趨疾而致逺羿逄蒙不能以枉矢弱弓射逺中微故强弱成敗之要在乎附士卒教習之而已說苑指武屋漏者民去之水淺者魚逃之樹高者鳥宿之德厚者士趨之說苑談叢良君將賞善而除民患愛民如子蓋之如天容之若地民奉其君愛之如父母仰之如日月敬之如神明畏之若雷霆新序雜事海為水王聰聖且明百流歸德無有畔逆常饒優足焦氏易林蒙之乾百川朝海流行不止道雖遼逺無不到者焦氏易林謙之無妄鳥飛鼓翼喜樂堯德焦氏易林小過之屯明火香餌則蟬魚至以言治國明其德美其政天下之人如蟬魚之歸明火香餌也淮南子說山訓解夫止水之致鑑者非為止以求鑑也故王駘之聚衆衆自歸之豈引物使從已哉郭子注莊德充符山海爭水水必歸海非海求之其勢順也劉子思順海以廣大之故衆水歸之王者有和樂之德則人皆思附也前漢書注禮樂志秦天下之民若擔重物不得休息今來歸漢得息肩膊李善注文選東京賦煥若列宿紫宫是環文選西都賦若湛露之晞朝陽兮衆星之拱北辰也文選籍田賦百川赴巨海衆星環北辰照灼爛霄漢遙裔起長津文選謝靈運擬魏太子詩感而應之恱而歸之如晨風之鬱北林龍魚之趣淵澤也文選干寶晉紀總論士有常君民有定主枝葉相扶首尾為用文選曹元首六代論萬邦宅心駿民效足文選陸士衡功臣頌百川以海為尊故赴之衆星以北辰為主故繞之萬民歸君亦猶是焉文選謝靈運鄴中詩注思漢之士延頸鶴望廣文選漢先主封張飛䇿上𤣥垂象列宿拱辰極之中厚載成形百谷指滄溟之大文苑英華盧思道檄一堯居於衢室之中輯五瑞以見羣后帶幅舄而入覲者如衆星之拱北玉海器用圭璧上視下如子下視上如父上視下如弟下視上如兄視下如子必王天下視上如父必正天下視下如弟則不難為之死亡道德經四子集解休卒偃兵為天下市萬方往之如川歸海道德經指歸卷七得民而歸之若赤子之歸乳母金庭無為妙經譬如水大從髙赴下水族所歸波羅蜜多經卷五百六十七又如大地世間往來舉足下足無不依之波羅蜜多經卷五百六十七國人護我主猶王護國人如林衛獸王獸護於林藪大方廣佛華嚴經讃卷十二猶如山頂暴漲之水流注溝坑溪澗深處亦如半月海水潮出其國外來歸化之民充滿側塞亦復如是本緣經毗羅摩品如須彌山王十寶山圍繞如白香象王白香象圍繞如師子王師子衆圍繞大智度論卷三六合則咸宗如海百姓則共仰如辰集沙門不應拜俗等事卷二冠二喻林卷一百六
