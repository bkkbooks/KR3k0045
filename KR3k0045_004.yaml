body:
  text: 喻林卷四明徐元太撰人事門二仕進九二見龍在田利見大人易乾龍德而正中者也易乾六二屯如邅如乘馬斑如匪寇婚媾女子貞不字十年乃字易屯初九拔茅茹以其彚征吉易泰九三良馬逐利艱貞日間輿衛利有攸往易大畜九四貞吉悔亡藩決不羸壯于大輿之輹易大壯鼎有實愼所之也易鼎九三升虛邑易升若以人事言之象人臣離其黨而入君之朝女子離其家而入夫之室周易正義坤人出自北門者背明嚮陰而行猶已仕於亂世嚮於暗君而仕毛詩正義北門士之仕也猶農夫之耕也農夫豈為出疆舍其耒耜哉孟子滕文公下淳于髠曰男女授受不親禮與孟子曰禮也曰嫂溺則援之以手乎曰嫂溺不援是豺狼也男女授受不親禮也嫂溺援之以手者權也曰今天下溺矣夫子之不援何也曰天下溺援之以道嫂溺援之以手子欲手援天下乎孟子離婁上吾聞其以堯舜之道要湯未聞以割烹也孟子萬章上仕非為貧也而有時乎為貧娶妻非為養也而有時乎為養孟子萬章下流水滿坎乃行以喻君子之學必至成章乃仕進者也趙氏注孟盡心上暨于裭薜蘿而襲朱組去衡泌而踐丹墀晉書謝安傳沖靈翼於雲路浴天池以濯鱗排閶闔步玉岑登紫闥侍北辰晉書皇甫謐傳負重涉遠不擇地而休家貧親老不擇祿而仕孔子家語致思士病不明經術經術苟明其取青紫如俯拾地芥耳前漢書夏侯勝傳攀龍附鳳並乘天衢前漢書敘傳下龍俟風雲而後升士須明君而後進前漢書揚雄傳夫鶉火之禽不匿影於丹山昭華之寶乍耀采於藍田梁書太祖五王安成傳過龍津而一息望鳳條而曾翔梁書陸倕傳天下士大夫捐親戚棄土壤從大王於矢石之間者其計固望其攀龍鱗附鳳翼以成其所志耳後漢書光武帝紀大丈夫當雄飛安能雌伏後漢書趙典列傳士或解裋褐而襲黼黻或委臿築而據文軒者度德拜爵量績受祿也後漢書張衡列傳有莘之媵殊北門之情渭濵之叟匪西山之節湯武有以濟其功夏殷不能譏其志晉書王沈列傳鉛刀有干將之志螢燭希日月之光晉書張駿傳任重道遠者不擇地而息家貧親老者不擇官而仕故君子蹻褐趨時當務為急韓詩外傳士因士女因媒至其親顯非媒士之力孔子曰進見而不以能往者非賢士才女也鹽鐵論大論夫耳聞之不如目見之目見之不如足踐之足踐之不如手辨之始入官如入晦室久而愈明明乃治治乃行説苑政理牙蘖生齒室堂啓戶幽人利貞鼓翼起舞焦氏易林比之節鳥升鵠舉照臨東海焦氏易林謙之頥新田宜粟上農得榖君子懷德以干百祿焦氏易林恆之離黃馬緑車駕之大都焦氏易林睽之兊泰山幽谷鳳凰遊宿禮義有序可以求福焦氏易林萃之離次三出于幽谷登于茂木思其珍榖測曰出谷登木知向方也太玄經第一上次五鳴鶴升自深澤階天不怍昨測曰鳴鶴不怍有諸中也太玄經第一上次八進于淵君子用船測曰進淵且船以道行也太玄經第二進次六鋭于醜含于五軌萬鍾貞測曰鋭于醜福祿不量也太玄經第二鋭十種之地膏壤雖肥弗耕不獲千里之馬骨法雖具弗策不致夫觚而弗琢不成於器士而弗仕不成於位若此者天地所不能貴賤鬼神所不能貧富也濳夫論正列昔有抱甕者惡桔橰之機而不用然烏知抱甕之為機乎由此觀之天地萬物皆機也機其運于應物之所動于無形之源乎今子之出也將以仁義為機而運諸侯于掌上鎔兆民于軌物經之綸之弛之張之吹之噓之若噫氣之推風而解駮乎萬竅其機也如是天祿閣外史機論言龍能登虛無淩清冥棄濁穢入天帝之宫言已亦想升賢君之朝斥去貪佞之人也王逸注楚辭九歎車行於陸船行於溝其滿而重者行遲空而輕者行疾先王之道載在胸腹之內其重不徒船車之任也任重其取進疾速難矣王充論衡狀留篇人之仕也主貪祿也禮義之言為行道也猶人之娶也主為欲也禮義之言為供親也王充論衡問孔篇淵蟠起則玄雲赴道化霑則逸才奮故康衢有角歌之音鼎爼發凌風之迹沽之則收不資之賈踊之則超在天之舉耀逸景於暘谷播大明乎九垓抱朴子外篇任命願先生委龍蛇之穴升利見之塗釋戶庭之獨潔覽二鼠而遠寤越窮谷以登高襲丹藻以改素競驚飈於清晨不盤旋以詣夜收名器於嵩髙嚮鍾鼎之慶祚抱朴子外篇任命言人出仕非一途或結綬以生纒牽之憂或彈冠而去塵埃之纍李善注文選左太沖招隱詩震風過物清濁效響大人于興利在攸往文選陸機功臣頌然後令夜光之璧顯於金匱隋侯之珠彰於韞櫝者也藝文類聚儲官部儲官表化銀龜以為黃變青組以為紫太平御覽布帛部組春秋運斗樞曰椒桂連名士起爾雅翼桂交接六二係小子失丈夫象曰係小子弗兼與也易隨六四樽酒簋二用缶納約自牖終無咎易坎伐柯之法其則不逺喻治國之法其道亦不遠何者執柯以伐柯比而視之舊柯短則如其短舊柯長則如其長其法不在逺也以喻交接之法願於上交於下願於下事於上其道亦不遠也毛詩正義伐柯君子之接如水小人之接如醴君子淡以成小人甘以壞禮記表記水相得合而已酒醴相得則敗鄭氏注禮記表記水相合為江河酒醴相合而久乃敗壞也禮記正義表記君子相接不用虛言如兩水相交尋合而已小人以虛辭相飾如以酒醴相合必致敗壞禮記正義表記一則云采此葑菲之菜但采其葉無得并采其下體之根莖言根莖雖美不可并取則是不盡取其利當遺與於下二則云采其葑菲之菜無以下體之惡并棄其葉據下體有苦惡之時言交友之道無以一處之惡并棄其餘事之善作記者據其根善則無得并取其根無盡利也據其根惡則無得并棄其葉不求備也禮記正義孔子聞居鳥獸猶不失儷左傳成公十一年意合則吳越為昆弟由余越人蒙是矣不合則骨肉出逐不收朱象管蔡是矣史記鄒陽傳今將患其流而塞其源病其末而刈其本無乃未若擇其正而黜其邪與與其彼農皆黍而獨稷焉夫黍亦神農之嘉榖與稷並為粢盛也使交而可廢則黍其愆矣後漢書朱暉列傳膠漆自謂堅不如雷與陳後漢書獨行列傳昔朋舊愛各東西譬如落葉不更齊梁書豫章王綜傳且心同琴瑟言鬱郁於蘭茞道叶膠漆志婉孌於塤箎梁書任昉傳與人交多詐偽無情實偷取一切謂之烏集之交烏集之交初雖相歡後必相咄故曰烏集之交雖善不親管子形勢解子車氏之豭其色粹而黑一産而三豚焉其二則粹而黑其一則駁而白惡其弗類於已也囓而殺之決裂其腎腸糜盡而後止其同於己者字之惟謹而恐其傷也子華子曰甚矣心術之善移也夫目眩於異同而意怵於愛憎雖其所自生殺之而弗悔而況非其類矣乎今世之人其平居把握附耳呫呫相為然約而自保其固曾膠漆之不如也及勢利之一接未有毫澤之差蹴然而變乎色又從而隨之以兵甚矣心術之善移也無以異乎子車氏之豭子華子神氣清之而愈濁者口也豢之而愈瘠者交也荀子榮辱鹿鳴以仁求其羣關雎以義鳴其雄陸子道基因媒而嫁不因媒而成因人而交不因人而親淮南子説山訓行合趨同千里相從趨不合行不同對門不通淮南子説山訓人生則有四方之志豈鹿豕也哉而常聚乎孔叢子孺服白聞士無介不見女無媒不嫁孔叢子雜訓一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見一浮一沒交情乃出説苑談叢一尋百節綢繆相結焦氏易林漸之頥或曰君子自守奚其交曰天地交萬物生人道交功勳成奚其守揚子修身篇次三交于木石測曰交于木石不能嚮人也太玄經第二交次二孚其肉其志資戚測曰孚其肉人莫聞也太玄經第三親古之不交遊者不謂嚮屋漏而居也今之好交遊者非謂長沐雨乎中路者也徐幹中論譴交志合者不以山海為逺道乖者不以咫尺為近故有跋涉而遊集亦或密邇而不接抱朴子外篇博喻適心者交淺而愛深忤神者接久而彌乖是以聲同則傾蓋而居昵道異則白首而無憂抱朴子外篇博喻由兹論之則交彼而遇者雖得逹不足貴芘之而誤者譬如蔭朽樹之被笮也彼尚不能自止其顛蹶亦安能救我之碎首哉抱朴子外篇交際大丈夫之自得而外物者其於庸人也蓋逼迫不獲已而與之形接雖以千計猶蚤虱之積乎衣而贅疣之攢乎體也失之雖以萬數猶飛塵之去嵩岱鄧林之墮朽條耳豈以有之為益無之覺損乎抱朴子外篇交際若乃輕合而不重離易厚而不難薄始如形影終為參辰至歡變為篤恨接援化成讎敵抱朴子外篇交際若比智而交則白屋不降公旦之貴若鈞才而遊則尼父必無入室之客矣抱朴子外篇交際詆毁壞刎頸之契漸漬釋膠漆之堅抱朴子外篇交際言服狐白者不念無衣以喻處尊貴者多忘貧賤也李善注文選曹子建贈丁儀詩願一見顏色不異瓊樹枝文選江文通古雜别詩和通篪塤比德車輔文選王粲贈士孫詩雖慙丹雘施未謂玄素暌文選顏延年和謝靈運詩離合非有常譬彼弦與筈文選陸機為顧彥先作詩黃鵠一遠别千里顧徘徊胡馬失其羣思心常依依何況雙飛龍羽翼臨當乖文選蘇武詩昔為鴛與鴦今為參與辰昔者常相近邈若胡與秦文選蘇武詩劉琨王浚睚眥起於絲髮舋敗成於丘海文選樂府鮑明逺白頭吟注逮叔世民訛狙詐飈起溪谷不能踰其險神鬼無以究其變競毛羽之輕趨錐刀之末於是素交盡利交與天下蚩蚩鳥驚雷駭文選劉孝標廣絶交論丹瓊譬而非寶緑蘭比而無芳廣文選江文通知已賦懷愛重於素璧結分珍於黃金廣文選江文通傷友人賦我筠心而松性君金采而玉相廣文選江文通知已賦夫宮鳴徵應嚮韻相趨桂馥蘭芬期臭在斯藝文類聚禮部祭祀文如葛斯蔓如樛斯垂藝文類聚人部贈答詩有人詣謝公别謝公流涕此人了不悲既去左右曰向客殊自密雲謝公曰非徒密雲乃自旱雷爾藝文類聚人部别上採葵莫傷根傷根葵不生結友莫羞貧羞貧友不成藝文類聚草部葵勢利之交難以經遠士之相知溫不增華寒不改葉貫四時而不衰歷夷險而益固藝文類聚人部交友交之於人也猶脣齒之相濟藝文類聚人部交友交得其人千里同好固於膠漆堅於金石藝文類聚人部交友人亦有言松竹有林及爾臭味異苔同岑藝文類聚人部交友詩吾與周公瑾交若飲醇醪不覺自醉也藝文類聚人部讓利心金各斷芬言蘭共馥文苑英華楊素寄贈二詩余松待爾心爾筠留我箭文苑英華楊素寄贈二詩吾相與猶左右手也左傷則右救右傷則左勞太平御覽人事部交友四天下市道交君不知之耶君有勢我即進君無勢我即去太平御覽資産部市越絶書言勾踐諸侯從之若果中之李爾雅翼李夫陰陽交萬物成君臣交邦國治士庶交德行光初學記人部交友必鸞鳳而後集何燕雀之能臨初學記果木部桐處宅者先定鄰焉初學記居處部宅與賢相近如香著紙與惡人相近如臭著草是以經言近賢成智近愚益惑阿育王譬喻經基一報施投我以木瓜報之以瓊琚匪報也永以為好也投我以木桃報之以瓊瑶投我以木李報之以瓊玖詩國風木瓜投我以桃報之以李彼童而角實虹音紅小子詩大雅抑木瓜美齊桓公也衛國有狄人之敗出處于曹齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之而作是詩也毛詩木瓜人有投擲我以桃者我必報之以李善往則善來無物不報王若以善道施民民必以善事報王也毛詩正義抑梓人為飲器勺一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣周禮考工記回也視豫猶父也豫不得視猶子也論語先進君之視臣如手足則臣視君如腹心君之視臣如犬馬則臣視君如國人君之視臣如土芥則臣視君如冦讐孟子離婁上言悖而出者亦悖而入貨悖而入者亦悖而出大學中山君饗都士大夫司馬子期在焉羊羔不遍司馬子期怒而走於楚説楚王伐中山中山君亡有二人􅀢戈而隨其後者中山君顧謂二人子奚為者也二人對曰臣有父嘗飢且死君下壺飱臣父臣父且死曰中山有事汝必死之故來死君也中山君喟然而仰嘆曰與不期衆少其於當厄怨不期深淺其於傷心吾以一杯羊羔亡國以一壺飱得士二人戰國䇿衛中山樹於有禮艾人必豐解曰樹種也艾報也國語周襄王則桀之狗可使吠堯而跖之客可使刺由史記鄒陽傳物不答施於天地子不謝生於父母魏志劉廙傳夫飛梟天下賤鳥及其在林食椹則懷我好音況輅心非草木敢不盡忠魏志管輅傳不能負戴析薪以答萬分一晉書石苞傳魚懸由於甘餌勇夫死於重報晉書假灼傳倍恩者苦枯蹶船常苦沒宋書樂三志木石感陰陽犬馬識厚薄梁書王僧孺傳銘兹厚德戴此洪恩譬渤澥而俱深方嵩華而猶重陳書徐陵傳挾太山而超海比報德而非難堙昆崘以為池匹酬恩而反易隋書崔廓隱逸傳其施厚者其報美其怨大者其禍深薄施而厚望畜怨而無患者未之有也文子符言草木雞狗牛馬不可譙詬遇之譙詬遇之則亦譙詬報人又況乎達師與道術之意乎呂氏春秋誣徒夫疾風而波興木茂而鳥集相生之氣也是故臣不得其所欲於君者君亦不能得其所求於臣也君臣之施者相報之勢也臣盡力死節以與君君計功垂爵以與臣君不能賞無功之臣臣亦不能死無德之君君德不下流於民而欲用之如鞭􅕭馬矣是猶不待雨而求熟稼必不可之數也淮南子主術訓上秦王趙政兼吞天下而亡智伯侵地而滅商鞅支解李斯車裂三代種德而王齊桓繼絶而霸故樹黍者不獲稷樹怨者無報德淮南子人間訓枝無忘其根德無忘其報説苑談叢醜女不能冶時盛則變醜士不能忠恩盛則激若毛遂者特激于恩之所感耳故曰戰國無默默之士亂世無優優之臣其是之謂乎天祿閣外史待士訖無雞犬鳴吠之用常以墨塊負恩寵蔡中郎集讓高陽侯貧人富人並為賔客受賜於主人富人不慙而貧人常愧者富人有以效貧人無以復也儒生文吏俱以長吏為主人者也儒生受長吏之祿報長吏以道文吏空胸無仁義之學居住食祿終無以效所謂尸位素飱者也王充論衡量知篇則所謂咸池酬於北里夜光報於魚目文選盧諶贈劉琨詩引慮先犬馬厚恩不答而敝帷毁蓋未蓐螻蟻文選任昉為范始興作求立太宰碑表全殞卵而來鳳放乳麑而感麟雖陋生於萬物若沙漠之一塵茍全軀而畢命庶魂報以自申廣文選鮑明逺野鵝賦美人贈我金錯刀何以報之英瓊瑶美人贈我翠琅玕何以報之雙玉盤美人贈我貂襜褕何以報之明月珠美人贈我錦繡段何以報之青玉案藝文類聚人部愁詩佳人遺我筒中布何以贈之流黃素佳人遺我雪中翮何以贈之連城璧佳人遺我雙角端何以贈之雕玉環佳人遺我緑綺琴何以贈之雙南金藝文類聚人部愁詩慙無琬琰以酬尺璧藝文類聚人部贈答詩瓊琚尚交好桃李貴往還藝文類聚人部贈答詩蕭艾茍見納貽我以芳蘭藝文類聚人部贈答詩投瓊實有意報李更無蹊藝文類聚治政部奉使詩白龜報主終自無期黃雀謝恩竟知何日藝文類聚布帛部羅啓馬前驅而導路或似識恩雞未曉而開關容能報主文苑英華庾信謝賜賚啓在命之輕鴻毛浮於弱水知恩之重龜一作鼇背負於靈山文苑英華庾信謝賜賚啓蓬萊謝恩之雀白玉四環漢水報德之蛇明珠一寸某之觀此寧無愧心文苑英華庾信謝賜賚啓青青陵中草傾葉晞朝日陽春被惠澤枝葉可攬結草木為恩感況人含氣血太平御覽百卉部草靈虬報德彌鱗銜轡振躍天漢粲有遺蔚列仙傳事日為明故事父為恩故事君以力故法句經多聞品被秣服攊見遇日久列士忘身期必騁效𢎞明集牟子埋惑論如人熱時止息涼樹是人乃至不應侵損是樹一葉本緣經鹿品感通澤性下流能潤於下山體上承能受其潤以山感澤所以為咸周易正義咸公侯夫人執蘩菜以助祭神饗德與信不求備焉沼沚溪澗之草猶可以薦毛詩采蘩注草蟲鳴阜螽躍而從之天性也喻近西戎之諸侯聞南仲既征玁狁將伐西戎之命則跳躍而鄉望之如阜螽之聞草蟲鳴焉鄭氏箋詩出車鐘鼓之聲怒而擊之則武憂而擊之則悲喜而擊之則樂其志變其聲亦變至誠通乎金石而況人乎孔子集語上曾子從仲尼在楚心動問母母曰思之齧指孔子聞之曰參之至誠精感萬里孔子集語下神龍驤首幽雲景蒸明聖修德志士思名是以意同情合聲比相應也後漢書馮衍傳注韶樂九成虞賔以和人能有感乃至於斯也魏志管寧傳注火在斗中而柄尚熱晉書韓伯傳行者思於道而居者夢於牀慈母吟於巷適子懷於荆淮南子説林訓昔雍門子以哭見于孟嘗君已而陳辭通意撫心發聲孟嘗君為之增欷歍唈流涕狼淚不可止精神形於內而外諭哀於人心此不傳之道使俗人不得其君形者而效其容必為人笑故蒲且子之連鳥於百仞之上而詹何之鶩魚於大淵之中此皆得清淨之道大浩之和也淮南子覽冥訓六二待聘九五見召二氣交感夫婦之道體斯合也京氏易傳成中一室之中父兄之際若身體相屬一節動而知於心鹽鐵論周秦橘柚生於江南而民皆甘之於口味同也好音生於鄭衛而人皆樂之於耳聲同也越人夷吾戎人由余待譯而後通而並顯齊秦人之心於善惡同也故曾子倚山而吟山鳥下翔師曠鼓琴百獸率舞未有善而不合誠而不應者也鹽鐡論相刺妾聞寡婦哭城城為之崩亡士歎市市為之罷誠信發內感動城市妾之寃明於白日雖獨號於九層之內而衆人莫為毫釐烈女傳周列國齊威虞姬昔華舟把梁戰而死其妻悲之向城而哭隅為之崩城為之弛君子誠能刑於內則物應於外矣夫土壤且可為忠況有食榖之君子説苑善説晝人之禍少夜人之禍多晝夜散者其禍福雜太玄經玄瑩召雲者龍命呂者律周易略例明爻隆墀永歎遠壑必盈周易略例明爻故有善邇而遠至命宮而商應修下而高者降與彼而取此者服矣周易略例明爻蛟濳於水産卵高陵下復於淵氣應相感然後剖化猶君臣父子以道相感精迎誠致不言而動也太玄經第四迎解蒲且子見雙鳥過之其不被弋者亦下故言感也李善注文選張茂先勵志詩犬馬之誠不能動人譬人之誠不能動天文選曹植求通表出其言善千里應之茍違斯義則同衾以疑文選張茂先女史針觸非其類雖疾弗應感以其方雖微則順是以商飈漂山不興盈尺之雲谷氣乘條必降彌天之潤故暗於治者唱繁而和寡審乎物者力約而功峻文選陸機演連珠積實雖微必動於物崇虛雖廣不能移心是以都人冶容不悅西施之影乘馬班如不輟太山之陰文選陸機演連珠機心難湛不接異類淳德易孚可狎殊方是以高羅舉而雲鳥降海人萃而水禽翔廣文選謝惠連連珠百心不可得一人一心可得百人意林子思子文王葬枯骨無益衆庶衆庶悅之恩義動人也王翁觀人五藏無損生人生人惡之殘酷也意林新論視四方常有大雲五色具而不雨其下有聖賢人隱藝文類聚人部賢奏六代之舞不能祚天具百神之歌無以動聖藝文類聚職官部太傅表東鄰之犧牛不如西鄰之麥魚藝文類聚職官部太常針樊噲問陸賈曰自古人君受命於天云有瑞應豈有是乎賈曰目瞤得酒食燈花得錢財乾鵲噪而行人至蜘蛛集而百事喜小既有徵大亦宜然事文類聚燈西京雜記繁霜應管能響豐山之鍾玄雲觸石又動流泉之奏文苑英華李那文章上書一言所感凝暉照於魯陽一志冥通飛泉涌於疏勒文苑英華徐陵遷譴上書禹濟巨海黿鼉為梁埤雅品物門黿可以使鬼者錢也可以使神者誠也事類賦寶貨部錢注善惡之生由如影響不離形聲海空智藏經序品如轉輪王欲有所趣四軍導從輪寶居先王及四軍念欲飲食輪則為住既飲食已王念欲行輪則前去其輪去住隨王意欲至所趣方不復前去波羅蜜多經卷三百五十一本失於寶珠墮之于大海即時執取器抒海求珠寶精進不以懈執心而不移海神見如是即出珠還之修行道地經慈品如嬰兒病與乳母藥兒患得愈母雖非兒藥之力勢能及其兒大莊嚴經論卷一行雲徘徊猶感美音之和遊魚踊躍尚賞清絲之韻𢎞明集九夫栴檀移植則異物同熏摩尼吐曜則衆珍自積高僧傳六釋慧遠驚禽投案猶請命於魏君窮獸入廬乃祈生於歐氏漢王去餌遂感明珠之酬楊寶施華便致白環之報法苑珠林卷七十三谷風之隨嘯虎慶雲之逐騰龍感應相招仰惟常理法苑珠林卷八心識相傳美惡由起報應之道運環相襲其猶聲和響順形直影端此自然之理無差毫分僧肇注維摩詰經佛國品夫以羣生萬端業行不同殊化異彼致令報應不一是以淨者應之以寶玉穢者應之以沙礫美惡自彼於我無定僧肇注維摩詰經佛國品喻林卷四
