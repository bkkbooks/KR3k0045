body:
  text: 喻林卷三十三明徐元太撰人事門崇儉六五賁于丘園束帛戔戔吝終吉易賁曷之用二簋可用享易損九五東鄰殺牛不如西鄰之禴祭實受其福易既濟生十殺一者物十重生一殺十者物頓空十重者王頓空者亡汲冢周書文傳解羔羊鵲巢之功致也召南之國化文王之政在位皆節儉正直徳如羔羊也毛詩羔羊蟋蟀刺晉僖公也儉不中禮故作是詩以閔之毛詩蟋蟀古者明王所乗之馬繫於廐無事則委之以莝有事乃予之榖言愛國用也於其身亦猶然齋而後三舉設盛饌恒日則減馬此之謂有節也鄭氏箋詩鴛鴦諸侯不恒牛命士不恒豕禦而驕奢其闗乎治政晉書石苞傳汙罇土鼔誠則難追畫卵彫薪或可易革陳書世祖紀工事無刻鏤女事無文章國之富也管子立政土事不文木工不斵金器不鏤衣無隅差之削冠無觚嬴之理淮南子本經訓未甞稼穡粟滿倉未甞桑蠶絲滿囊得之不以道用之必横淮南子說林訓夫有盡之物不能給無已之耗江河之流不能盈無底之器也凡人利入少而費用多者猶不供也况無錙銖之來而有千百之往乎抱朴子内篇極言冠足以修敬不務其飾衣足以掩形不務其美土事不文木事不鏤足以示民也意林晏子明徳后曰吾前過濯龍門見外家問起居車如流水馬如龍亦不譴怒但絶其嵗用冀以嘿止讙耳藝文類聚獸部馬蒿宫茅柱實興國之清猷玉席珠衣乃危邦之弊化初學記政理部貢獻舜作食器流漆墨其上國之不服者十三禹作祭器墨染其外朱畫其内國之不服者三十三困學紀聞卷十一攷史克勤惰農自安不昏作勞不服田畝越其罔有黍稷書盤庚上若乗舟汝弗濟臭厥載書盤庚中天惟喪殷若穡夫予曷敢不終朕畝書大誥若農之服田務耕而不耨維草其宅之既秋而不獲維禽其饗之人而獲饑去誰哀之汲冢周書大開武解如怠惰之農茍自安逸不强作勞於田畝則黍稷無所有孔氏傳書盤庚上就其深矣方之舟之就其淺矣泳之游之何有何無黽勉求之詩國風谷風庭燎美宣王也因以箴之毛詩庭夫不鳥之慤謹者人皆愛之可以不勞猶則飛則下止於栩木人雖無事其可獲安乎鄭氏箋詩四牡使農人之南畝治其禾稼功至力盡則薿薿然而茂盛鄭氏箋詩甫田人之欲種田求榖必凖功治田榖乃可獲喻人君欲立功致治必勤身修徳功乃可立毛詩正義甫田必先種之乃得獲若先菑乃得畬也安有無事而取利者乎鄭氏註禮記坊記譬如農夫是穮是蓘雖有饑饉必有豐年左傳昭公元年上國有言曰不索何獲左傳昭公二十七年宴安自逸若酖毒之藥不可懐戀也言其當自勞也春秋正義閔公元年言已伐莒求利而不得惡日中不出譬如商賈求利不得惡諠囂之聲春秋正義昭公元年農夫不怠越有黍稷誰能云作考之居息後漢書文苑傳神農之法曰丈夫丁壯不耕天下有受其饑者婦人當年不織天下有受其寒者故其耕不强者無以養生其織不力者無以衣形後漢書王符傳且經史道徳如採菽中原勤之者則功多晉書涼武昭王傳若弗勤春稼秋穡何期宋書夷蠻天竺傳執耜蹔忘懸磬比室秉機或惰無褐終年南齊書鬱林王本紀女子不辨於致諸侯自吾不為汗殺之事人布織不可得而衣故雖聖人惡用之管子侈靡吾欲致諸侯而不至為之柰何中婦諸子曰自妾之身之不為人持接也未甞得人之布織也意者更容不審邪管子戒曙戒勿怠後穉逢殃朝忘其事夕失其功管子形勢巫馬子謂子墨子之為義也人不見而耶鬼不見而富而子為之有狂疾子墨子曰今使子有二臣於此此其一人者見子從事不見子則不從事其一人者見子亦從事不見子亦從事子誰貴於此二人巫馬子曰我貴其見我亦從事不見我亦從事者子墨子曰然則是子亦貴有狂疾也墨子耕柱百人農一人居者王十人農一人居者强半農半居者危商子農戰故仁人在上則農以力盡田賈以察盡財百工以巧盡械器士大夫以上至於公侯莫不以仁厚知能盡官職荀子榮辱篇人之情不能無衣食衣食之道必始於耕織萬民之所公見也物之若耕織者始初甚勞終必利也衆愚人之所見者寡淮南子主術訓滋滋焉汲汲焉如農之赴時商之趨利惡有不至者乎孔叢子居衞故耕不强者無以充虚織不强者無以掩形雖以湊㑹之要陶室之術無所施其巧自古及今不施而得報不勞而有功者未之有也鹽鐵論力耕功業有緒惡勞而不卒猶耕者勌休而困止也夫事輟者無功耕怠者無獲也鹽鐵論擊之手足之勤腹腸之養也當世之務後世之利也鹽鐵論結和日趨月歩周遍次舍焦氏易林震之大畜秦王一夜而三起茫如覔遺天禄閣外史傷時夫為天子而有牛馬之勞則天子益尊為諸侯而有牛馬之勞則諸侯益强為大夫而有牛馬之勞則大夫益顯為庶人而有牛馬之勞則庶人益義天禄閣外史桃林譬猶作家云不事用他物者盖謂有金銀珠玉在乎掌握懐抱之中足以供累世之費者耳茍其無此何可不廣播百榖多儲果疏乎抱朴子内篇㣲㫖仙之可學致如黍稷之可播種得甚炳然耳然未有不耕而獲嘉禾未有不勤而獲長生度世也抱朴子内篇勤求神農不九疾則四經之道不垂大禹不胼胝則𤣥珪之慶不集故救憂為厚樂之本暫勞為永逸之始抱朴子外篇廣譬􅢟斯羣行啄榖喻人黨比游晏賊害糧食有損無益也揚子法言註學行篇不樹者死無棺不蠶者身無帛不績者凶無縗君子暇豫則思義小人暇豫則思邪意林院子如彼登山乃勤以求髙如彼浮川乃勤以求逺意林典論學不勤則不知道耕不力則不得榖太平御覧百榖部榖人皆以無用害有用故知不博而日不足以博奕之日問道聞見深矣困學紀聞卷七論語叔文相莒三年歸其母自績謂母曰文相莒三年有馬千駟今母猶績文之所得事皆將弃之己母曰吾聞君子不學詩書射御必有博塞之心小人不好田作必有竊盜之心婦人不好紡績織絍必有淫泆之行好學為福也猶飛鳥之有羽翼也困學紀聞卷十諸子若鑿井池得水受用其不鑿者無由致之波羅蜜多經卷五百七十二故精進之於諸度也若衘捶之在羣馭焉正勤之於道品也若鹽梅之資列鼎焉波羅蜜多經五百九十卷序譬如甘蔗若蒲桃子如其不壓不得其汁壓之則得毘那娑問經推九如人少小勤苦多有所能亦多有所堪大智度論卷十譬如商人逺出深入得利必多大智度論卷十三乞食道人至一聚落從一家至一家乞食不得見一餓狗饑卧以杖打之言汝畜生無智我種種因緣家家求食尚不得何况汝卧而望得大智度論卷八十五在家懈怠失於俗利出家懶惰喪於法寳法苑珠林卷八十三適用水能灌溉火能烹飪金能斷割木能興作土能生殖榖能養育古之歌詠各述其功尚書正義大禹謨衣服之煖於身猶甘雨之潤於物毛詩正義無衣行聘之時唯執圭璋特得通達不加餘幣言人之有徳亦無事不通不須假他物而成禮記正義聘義子貢問曰賜也何如子曰女器也曰何器也曰瑚璉也論語公冶或矜執者欲以取勝為榮不念宋人待四海之客大罏不欲令酒酸也至於屈榖巨瓠堅而無竅當以無用罪之耳後漢書孔融列傳必也學非所用術有所仰故臨川将濟而舟檝不存焉後漢書張衡列傳爽與範内踈而智不及駑馬戀短豆必不能用也晉書宣帝紀誠東南之遺寳宰朝之竒璞也若得託迹康衢則能結軌驥騄曜質廊廟必能垂光璵璠矣晉書戴若思傳譬彼針與石效疾故稱良宋書樂四志夜衣錦繡誰别偽真刀鳴箾中倚牀無施宋書樂四志雲和備樂則䌓㑹克諧驊騮驂服則致逺斯效宋書武三王江夏傳懸饑在嵗式羡藜藿之飽重炎灼體不念狐白之温故才以偶時為劭道以調俗為尊南齊書劉祥傳如蓑裘之代用譬輪轅之曲直梁書張緬弟纉傳吾言足用矣舎言革思者是猶舎穫而攗粟也以其言非吾言者是猶以卵投石也盡天下之卵其石猶是也不可毁也墨子貴義譬如藥然草之本天子食之以順其疾豈曰一草之本而不食哉今農夫入其稅於大人大人為酒醴粢盛以祭上帝鬼神豈曰賤人之所為而不享哉墨子貴義譬如水火殊性各適其用既無是非安得謂之是非乎公孫龍子指物論註魯人身善織屨妻善織縞而徙於越或謂之曰子必窮矣魯人曰何也曰屨為履之也而越人跣行縞為冠之也而越人被髮以子之所長遊於不用之國欲使無窮其可得乎韓非子說林上今有馬於此如驥之狀者天下之至良也然而驅之不前却之不止左之不左右之不右則臧獲雖賤不託其足臧獲之所願託其足於驥者以驥之可以追利辟害也今不為人用臧獲雖賤不託其足焉已自謂以為世之賢士而不為主用行極賢而不用於君此非明主之所臣也亦驥之不可左右矣韓非子外儲說左故制事者因其則服藥者因其良書不必起仲尼之門藥不必出扁鵲之方陸子道基世多稱古之人而髙其行並世有與同者而弗知貴也非才下也時非宜也故六騏驥駟駚騠以濟江河不若窽木便者䖏世然也是故立功之人簡於行而謹於時淮南子齊俗訓凡萬物有所施之無小不可為無所用之碧瑜糞土也淮南子繆稱訓愚者有所修智者有所不足柱不可以摘齒筐不可以持屋馬不可以服重牛不可以追速鉛不可以為刀銅不可以為弩鐵不可以為舟木不可以為釡各用之於其所適施之於其所宜即萬物一齊而無由相過明鏡便於照形其於以函食不如簞犧牛粹毛宜於廟牲其於以致雨不若黒蜧由此觀之物無貴賤因其所貴而貴之物無不貴也固其所賤而賤之物無不賤也淮南子齊俗訓今夫圖工好畫鬼魅而憎圖狗馬者何也鬼魅不世出而狗馬可日見也夫存危治亂非智不能道而先稱古雖愚有餘故不用之法聖人弗行不驗之言聖王弗聴淮南子汜論訓上砥石不利而可以利金㯳不正而可以正弓物固有不正而可以正不利而可以利淮南子說山訓聖人用物若用朱絲約芻狗若為土龍以求雨芻狗待之而求福土龍待之而得食淮南子說山訓鼎錯日用而不足貴周鼎不㸑而不可賤物固有以不用而為有用者地平則水不流重鈞則衡不傾物之尤必有所感物固有以不用為大用者淮南子說山訓人莫欲學御龍而皆欲學御馬莫欲學治鬼而皆欲學治人急所用也淮南子說林訓陶人棄索車人掇之屠者棄銷而鍜者拾之所緩急異也淮南子說林訓三寸之管而無當天下弗能滿十石而有塞百斗而足矣淮南子說林訓予拯溺者金玉不若尋常之纒索淮南子說林訓孤子語孝躄者語杖貧者語仁賤者語治議不在已者易稱從旁議者易是當其局則亂鹽鐵論救匱瞽師不知白墨而善聞言儒者不知治世而善訾議鹽鐵論詔聖馬効千里不必胡代士貴成功不貴文辭鹽鐵論論儒玉屑滿篋不為有寳詩書負笈不為有道要在安國家利人民不茍文䌓衆辭而已鹽鐵論相刺猛獸狐疑不若蜂蠆之致毒也髙議而不可及不若卑論之有功也說苑談叢絲紵布帛人所衣服摻搔女手紡績繕織焦氏易林困之中孚匠鄉操斧豫章危殆焦氏易林小過之師言已乗八龍神智之獸其狀婉婉委委又載雲旗委蛇而長也駕八龍者言已徳如龍可制御八方也載雲旗者言已徳如雲雨能潤施於萬物也王逸註楚辭離騷經言橘實赤黄其色精明内懐潔白以言賢者亦然外有精明之貌内有潔白之志故可任以道而事用之也王逸註楚辭九章言竹被潤澤上則葳𬎼而防蔽霧露言上能有所覆也下則冷冷清涼可休庇也以言已徳上能覆盖於君下能庇廕於民王逸註楚辭七諫江漢雖有美珠不為己用故不愛也淮南子說山訓解洗不必江河要之却垢馬不必騏驥要之足疾賢不必聖人要之智通武侯十六策隂察倉頡之書世以紀事奚仲之車世以自載伯余之衣以辟寒暑桀之瓦屋以避風雨夫不論其利害而從譏其造作是則倉頡之徒有非世本十五家皆受責也王充論衡對作篇醫能治一病謂之巧能治百病謂之良是故良醫服百病之方治百人之疾大才懐百家之言故能治百族之亂扁鵲之衆方孰若巧之一技王充論衡别通篇夫衮冕非禦鋒鏑之服典誥非救饑寒之具也抱朴子外篇守塉禦暍之鳥厥名􅜥􅠍昏明是互晝隠夜覿物貴應用安事鸞鵠山海經北山經圖讃蜘蛛有絲雖甚勉務非人所用則不如蠶一緰之利也太𤣥經第二務解庖丁解牛適俗所傾朱泙屠龍無所用功茍乖世務雖有妙術歸於無用劉子随時救饑者以圓寸之珠不如與之橡菽貽溺者以方尺之玉不如與之短綆非橡綆之貴而珠玉之賤然而美不要者各在其所急也方於饑溺之時珠玉寧能救生死哉是以中流失船一壺千金貴賤無常時使然也劉子随時鹿形似馬而迅於馬豺形似犬而健於犬國有千金之馬而無千金之鹿家有千金之犬而無千金之豺以犬馬有用而豺鹿無用也劉子言苑昔野人棄子貢之辨而恱馬圉之辭越王退吹籟之音而好鄙野之聲非子貢不及馬圉吹籟不若野聲然而美不必合惡而見珍者物各有用也劉子命相驥騄不常一歩應良御而效足李善註文選赭白馬賦善吏如良鷹矣下韝即中李善註文選鮑明逺束武吟每念足下才為世生器為時出李善註文選劉越石答盧諶詩物之企競由乎不足政之不治才不合時故也心尚自足不假美女之麗用㑹其朝不勞稷契之賢矣李善註文選陸士衡演連珠赴曲之音洪細入韻蹈節之容俯仰依詠是以言苟適事精麤可施士苟適道修短可命文選陸機演連珠音以比耳為美色以恱目為歡是以衆聴所傾非假北里之操萬夫婉戀非俟西子之顔故聖人随世以擢佐明主因時而命官文選陸機演連珠寒者不貪尺玉而思短褐饑者不願千金而美一餐夫千金尺玉至貴而不若一餐短褐者物有所急也藝文類聚嵗時部寒表朗鑑不塵精金能照藝文類聚禮部祭祀文玉映藍田金鉉之望已集木秀鄧林輪轅之用先表藝文類聚職官部丞相碑凡鐘磬各有筍虡寫鳥獸之形大聲有力者以為鐘虡清聲無力者以為磬虡初學記樂部鐘輪以代歩屏以蔽容太平御覧車部軺車佇聞和鼎實行當奉介丘初學記職官部諸曹尚書至如宣可去壅即薑橘之屬是也通可去滯即通草防已之屬是也補可去弱即人参羊肉之屬是也洩可去閉即葶藶大黄之屬是也輕可去實即麻黄葛根之屬是也重可去怯即磁石鐵粉之屬是也澀可去脫即牡礪龍骨之屬是也滑可去著即冬葵榆皮之屬是也燥可去濕即桑白皮赤小豆之屬是也濕可去枯即紫石英白石英之屬是也只如此體皆有所屬凡用藥者審而詳之則靡所遺失矣本草一卷以無制有器用者空參同契譬如商人有巧便智先在海岸裝治船已方牽入水知無穿穴後持財物置上而去是船必不壊沒人物安穏達所至䖏波羅蜜多經卷三百一十二譬如燈光雖不暫住而能照了令有目者覩見衆色波羅蜜多經卷五百九十六譬如金剛爲鑚物故随所鑚處無不通達波羅蜜多經卷五百九十三譬如明燈其熖㣲妙置之於室随室大小衆闇咸除大乗顯識經推四如人乗車塗以膏油不爲自髙乃至莊嚴爲載運故又如塗瘡不貪其味爲息苦故雜阿含經卷十一譬如陶家和埴調軟中無沙礫任作何器太子瑞應本起經卷上時有賈客大人名曰波利與百五賈人入海求寳時海神出掬水問波利言海水爲多掬水爲多波利答曰掬水爲多所以者何海水雖多無益時用不能救彼饑渴之人掬水雖少值彼渇者持用與之以濟其命法句譬喻經二華香品如燈在宻室其明得用大智度論卷三十又如重物披㭊令輕大智度論卷六十五譬如以金貿草不知者言何以以貴易賤答曰我事須用故大智度論卷九十五譬如厚葉樹多所䕃覆又如熱時曠野險道清涼大池大智度論卷九十八猶市賣物不選貴賤大荘嚴經論卷八珠生合浦魏人取以照車璧在邯鄲秦王請以華國天下之寳當與天下共之髙僧傳八釋寳亮效用韓盧宋鵲呈才騁足宋書樂四志若實有螢爝増暉光景固其騰聲之日飛藻之辰也宋書孔凱傳吾生旣繫名聲之韁鏁就良工之剞劂振佩紫臺之上鼔袖丹墀之下采金匱之漏簡訪玉山之遺文敝精神於丘墳盡心力於河漢摛藻期之鞶繡發議必在芬香北齊書文苑祖鴻勲傳道爲智者說馬爲御者良賢爲聖者用辯爲智者通書爲曉者傳事爲見者明陸子道基簡子将渡用楫者少一人娟攘卷操楫而請曰妾願備父持楫簡子曰不榖將行選士大夫齊戒沐浴義不與婦人同舟而渡也娟對曰妾聞昔者湯伐夏左驂牝驪右驂牝靡而遂放桀武王伐殷左驂牝騏右驂牝䮲而遂克紂至於華山之陽主君不欲渡則已與妾同舟又何傷乎烈女傳周列國趙津女娟髙脚疾歩受肩喜趨焦氏易林晉之泰牛牧于農而役于農故效並耕之勞馬畜于人而乗于人故收並戰之績諸侯爵禄于國而不能扞于國何歟天禄閣外史自强夫君視士如腹心故能顯其徳士自視如牛馬故能盡其心此百里奚所以勞于秦而逸于虞也今之士豈無牛馬之心乎顧其君之任與不任乎天禄閣外史桃林言龍既升天奮揺翹羽馳使風雨言已亦願動竭智謀以輔事賢君流恩百姓長無窮極也王逸註楚辭九歎或曰文吏筆扎之能而治定簿書考理煩事雖無道學筋力材能盡於朝廷此亦報上之效驗也曰此有似於貧人負官重責貧無以償則身爲官作責乃畢竟夫官之作非屋廡則牆壁也屋廡則用斧斤牆壁則用築鍤荷斤斧把築鍤與彼握刀持筆何以殊王充論衡量知篇寳棄怨何人和氏有其愆曹子建贈徐幹不拯招魂之病則無以效越人之絶伎不奬多難之世則無以知非常之逺量髙拱以觀溺非勿踐之仁也懐道以迷國非作者之務也抱朴子外篇嘉遯譬若理尺璧於重壤之下封文錦於沓匱之中終無交易之富孰賞堙翳之珍哉抱朴子外篇任命冀王道之一平兮假髙衢而騁力懼匏𤓰之徒懸兮畏井渫之不食文選登樓賦夫臨博而企竦聞樂而竊抃者或有賞音而識道也文選曹植求自試表冀以塵露之㣲補益山海螢燭末光増輝日月文選曹植求自試表夫才生於世世實須才和氏之璧焉得獨曜於郢握夜光之珠何得専玩於随掌天下之寳固當與天下共之文選劉琨答盧諶詩序鈆刀貴一割夢想騁良圖文選左思詠史詩玉壺必求以盛干將必求以斷文選樂府鮑明逺白頭吟註若得驂軌鸞衡服襄駿足則機石之良選可以對揚萬里者也廣文選庾仲初薦唐㞵牋春鶊秋蟀集候相悲露木風螢臨年共恱夫惟動植且或有心况在生靈而能無感廣文選王元長求効啟老驥伏櫪志在千里烈士暮年壯心不已廣文選曹孟徳碣石篇寧能偶雞鶩寂寂隠蓬蒿藝文類聚人部逰俠詩楚聞騏驥不遺能於伯樂良寳不藏耀於卞和是以輝光夜射價連秦趙飛駉絶影終朝千里物尚有之士亦宜然藝文類聚治政部薦舉牋橘柚垂嘉實乃在深山側聞君好我甘竊獨自雕飾藝文類聚果部橘詩夫抱道不行猶無道也握寳不用猶無寳也太平御覧道部養生欲使白牛有長路之能寳舟有彼岸之力也法苑珠林卷九十六善用狼之老者則頷下垂胡狼進前則躐其胡郤退則跲其尾是進退有難然猶不失其猛能殺傷禽獸以喻周公攝政之時逺則四國流言近則王不知其志進退有難然猶不失其聖能成就周道毛詩正義狼跋騂騂然調和者角弓此角弓雖則調和當善用之若不善置紲檠而巧用之則翩然而其體反戾矣是用角弓之難也以興和順者宗族也此宗族雖則和順當善待之若不善設食燕而恩御之則亦憤然而其心怨恨矣是待宗族之難也毛詩正義角弓玉體雖有亷稜而不傷割於物人有義者亦能斷割而不傷物禮記正義聘義火生而有光而不用其光果在於用光人生而有才而不用其才而果在於用才故用光在乎得薪所以保其耀用才在乎識真所以全其年晉書孫登傳公儀伯以力聞諸侯周宣王備禮以聘之公儀伯至觀形懦夫也宣王心惑而疑曰女之力何如公儀伯曰臣之力能折春螽之股揕秋蟬之翼王作色曰吾之力者能裂犀兕之革曳九牛之尾猶憾其弱女折春螽之股揕秋蟬之翼而力聞天下何也公儀伯長息退席曰臣之師有商丘子者力無敵於天下而六親不知以未甞用其力故也臣以死事之乃告臣曰人欲見其所不見視人所不窺欲得其所不得修人所不爲故善視者先見輿薪善聴者先聞撞鐘夫有易於内者無難於外於外無難故名不出於一家今臣之名聞於諸侯是臣違師之教顯臣之能者也然則臣之名不以負其力者也以能用其力者也不猶愈於負其力者乎列子仲尼恵子謂莊子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉也剖之以爲瓢則瓠落無所容非不咢然大也吾爲其無用而掊之莊子曰夫子固拙於用大矣宋人有善爲不龜手之藥者世世以洴澼絖爲事客聞之請買其方百金聚族而謀曰我世世爲洴澼絖不過數金今一朝而鬻技百金請與之客得之以說吴王越有難吴王使之將冬與越人水戰大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也今子有五石之瓠何不慮以爲大樽而浮乎江湖而憂其瓠落無所容則夫子猶有蓬之心也夫莊子逍遥逰恵子謂莊子曰子言無用莊子曰知無用而始可與言用矣夫地非不廣且大也人之所用容足耳然則厠足而墊之致黄泉人尚有用乎恵子曰無用莊子曰然則無用之爲用也亦明矣莊子外物推而後行曳而後往若飄風之還若羽之旋若磨石之隧莊子天下一尺之棰日取其半萬世不竭莊子天下熊之摶擊必先伏而後動故分威法伏熊鬼谷子本經隂符註未見形圎以道之既形方以事之鬼谷子反應人莫不貴其所有而賤其所短然而皆溺其所貴而極其所賤所貴者有形所賤者無朕也故虎豹之强來射猨犺之㨗來措人能貴其所賤賤其所貴可與言至論矣淮南子詮言訓王良善御伯樂知馬周旋歩驟行中規矩焦氏易林遯之豫初一赤卉方銳利進以退測曰赤卉方銳退以動也太𤣥經第三耎天下事有不可知猶結有不可解也兒說善解結結無有不可解結有不可解兒說不能解也非兒說不能解也結有不可解及其解之用不能也聖人知事事無不可知事有不可知聖人不能知非聖人不能知事有不可知及其知之用不知也王充論衡實知篇抱薪赴火燥者先燃平地注水濕者先濡此類相應也智者不用其所短而用愚人之所長也不用其所拙而用愚人之所巧也意林鬼谷子善論者不恥謝善戰者不羞走藝文類聚治政部論政表雖畜銳以將取必居謙以自牧譬猛獸之將擊亦俛耳而固伏藝文類聚巧藝部圍棊乗船曲折不失其瀆是善乗舟者太平御覧舟部叙舟中善吏如良鷹下韝即中太平御覧職官部功曹叅軍裴氏新書曰虎豹無事行歩者若將不勝其軀鷹在衆鳥之間若睡寐然故積怒而後全剛生焉埤雅品物門鷹禽經曰鷺啄則絲偃鷹捕則角弭蔵殺機也埤雅品物門鷺病有在毫毛腠理者有在皮膚者有在肌肉者有在脉者有在筋者有在骨者有在髄者是故刺毫毛腠理無傷皮皮傷則内動肺肺動則秋病温瘧泝泝然寒慄刺皮無傷肉肉傷則内動脾脾動則七十二日四季之月病腹脹煩不嗜食刺肉無傷脉脉傷則内動心心動則夏病心痛刺脉無傷筋筋傷則内動肝肝動則春病熱而筋弛刺筋無傷骨骨傷則内動腎腎動則冬病脹腰痛刺骨無傷髄髄傷則銷鑠胻酸體解㑊然不去矣黄帝素問内經刺要論徐而疾則實者徐出鍼而疾按之疾而徐則虚者疾出鍼而徐按之黄帝素問内經鍼解論五藏者故得六府與爲表裏經絡支節各生虚實其病所居随而調之病在脉調之血病在血調之絡病在氣調之衛病在肉調之分肉病在筋調之筋病在骨調之骨黄帝素問内經調經論病在上者下取之病在下者髙取之病在頭者取之足病在足者取之膕病生於頭者頭重生於手者臂重生於足者足重治病者先刺其病所從生者也黄帝素問靈樞經終始病之始起也可刺而已其盛可待衰而已故因其輕而揚之因其重而減之因其衰而彰之形不足者温之以氣精不足者補之以味其髙者因而越之其下者引而竭之中滿者瀉之於内其有邪者漬形以爲汗其在皮者汗而發之其慓悍者按而收之其實者散而瀉之黄帝素問内經隂陽應象大論岐伯曰清者其氣滑濁者其氣濇此氣之常也故刺隂者深而留之刺陽者淺而疾之清濁相干者以數調之也黄帝素問靈樞經隂陽清濁譬如水火知用之者可以養生不能用之者立可死矣養性延命録御女損益篇譬如明智人善能用於火成熟種種味不爲火所燒大寳積經卷二十二譬如有人手執金刀若不善解執持自當損害蘓婆呼童子經卷下猶人求火以槁木爲母以燥鑚鑚彼人如是爲得火不答曰得也所以者何彼以燥鑚鑚於槁木是故必得中阿含經卷二十譬朽木之爲舟乃濟度之津要何虚費之有哉𢎞明集釋駮論夫刃之有利砥礪之功故能水截蛟螭陸斷兕虎若窮利盡用必摧其鋒鍔化成鈍刃𢎞明集九譬如藥師或以良藥或以毒藥治人病也佛亦如是以煩惱如佛以愛度難陀以瞋恚化惡龍比也羅什譯維摩詰經菩薩行品喻林卷三十三
