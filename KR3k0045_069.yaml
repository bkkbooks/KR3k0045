body:
  text: 喻林巻六十九明徐元太撰君道門九取善非本非標非㣲非煇壤非壤不髙水非水不流嗚呼敬之哉倍本者槁汲冢周書文儆解池水之溢由外灌焉鄭氏箋詩召旻取於鑊以實鼎取於鼎以實俎鄭氏註周禮天官内饔舜之居深山之中與木石居與鹿豕遊其所以異於深山之野人者幾希及其聞一善言見一善行若決江河沛然莫之能禦也孟子盡心上齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也前漢書梅福傳使言之而是雖在褐夫芻蕘猶不可棄也使言之而非也雖在卿相人君揄䇿于廟堂之上未必可用是非之所在不可以貴賤尊卑論也淮南子主術訓下夫采玉者破石拔玉選士者棄惡取善王充論衡累害篇棄金璧於塗路則行人止足委錦紈於泥濘則見者驚咄抱朴子外篇廣譬闗雎興於鳥而為風之首美其摯而有别也鹿鳴興於獸而為雅之端嘉其得食而自呼也以夫鳥獸之醜茍有一善詩人歌詠以為美談矣况人之有善而可棄乎劉子適才激楚陽阿至妙之容掌技者之所貪飛兎騕褭絶足奔放良樂之所急也文選孔融薦禰衡表舜耕於厯山而交益陶於河濵而交禹太平御覽人事部交友四丹涓有一言之善晉侯賜萬頃田辭而不受晉侯曰以此田易彼言也於子猶有所亡寡人猶有所得太平御覽治道部賞賜何世之無才何才之無施良匠提斤斧造山林梁棟阿衡之材櫨柱楣椽之朴森然陳於目前大厦之器具矣太平御覽器物部斤猶器之取水隨量多少唯穿底無當乃不受耳𢎞明集正誣論兼收苑音鬱彼栁斯鳴蜩音條嘒嘒有漼千罪反者淵萑音丸葦淠淠音譬小詩小雅弁楊園之道猗音倚于畝丘詩小雅巷伯汎汎然楊木之舟則載其沈物則載其浮物俱浮水上以興當時君子用其文者又用其武者俱致在朝毛詩正義菁菁者莪雖有絲麻無棄菅蒯雖有姬姜無棄蕉萃左傳成公九年如把梓皮革自楚往也雖楚有材晉實用之左傳襄公二十六年傳曰藨蒯之菲也可以為屨明肋如菅並可代絲麻之乏春秋正義成公九年段干越人謂新城君曰王良之弟子駕云取千里馬遇造父之弟子造父之弟子曰馬不千里王良弟子曰馬千里之馬也服千里之服也而不能取千里何也曰子纆牽長故纆牽於事萬分之一也而難千里之行今臣雖不肖於秦亦萬分之一也而相國見臣不釋塞者是纆牽長也戰國䇿秦昭襄王今陛下致崑山之玉有隋和之寳垂明月之珠服太阿之劍乗纎離之馬建翠鳳之旗樹靈鼉之鼔此數寳者秦不生一焉而陛下説之何也必秦國之所生然後可則是夜光之璧不飾朝廷犀象之器不為玩好鄭衛之女不充後宫而駿馬駃騠不實外廐江南金錫不為用西蜀丹青不為采所以飾後宫充下陳娛心意説耳目者必出於秦然後可則是宛珠之簪𫝊璣之珥阿縞之衣錦繡之飾不進於前而隨俗雅化佳冶窈窕趙女不立於側也史記李斯傳太山不讓土壤故能成其大河海不擇細流故能就其深王者不却衆庶故能明其德史記李斯傳夫輓大重者其用力苦不衆拔大艱者其善術苦不廣蜀志譙周傳陛下披榛採蘭幷收蒿艾是以臯陶振褐不仁者逺晉書皇甫謐傳莫用豪賢故棄捐素所愛莫用魚肉貴棄捐葱與䪥莫用麻枲賤棄捐菅與蒯宋書樂三志非取製於一狐諒求味於兼采梁書王䀳傳元天髙朗尚假列星以助明洞庭淵湛猶藉衆流以增大莫不以孤照不詣其幽獨深未盡其廣魏書張彛傳譬山祗之有嵩岱海若之有滄溟飾以涓塵不貽伊敗隋書禮儀一志川澤納汙所以成其深山岳藏疾所以就其大隋書長孫平傳海不辭水故能成其大山不辭土故能成其髙明主不厭人故能成其衆士不厭學故能成其聖管子形勢解惡者美之充也卑者尊之充也賤者貴之充也故先王貴之管子樞言海不讓水潦以成其大山林不讓枉橈以成其崇聖人不辭其負薪之言以廣其名文子自然轂虚而中立三十輻各盡其力使一軸獨入衆輻皆棄何近逺之能至文子上德且合升勺龠合以登之斛廩則成矣太山之髙非一石之積也瑯琊之東渤澥稽天非一水之鍾也所以治國家天下者非一士之言也子華子晏子問黨積往生跂工以為師積毒成藥工以為醫美惡相飾命曰復周物極則反命曰環流鶡冠子環流物有其實而各有名謂若王良善御𨽻首善計彼物各自為用譬之耳目廢一不可故不為是非也公孫龍子指物論註凡物親者少疎者多如一白之於衆色也故離白求馬黄黑皆至以白命馬衆色咸去懐柔之道亦猶此也公孫龍子白馬論註白非黄黄非白五色相非分明矣君既私以待人人亦私以叛君寧肯應君命乎故守白命馬者非能致衆馬審矣公孫龍子白馬論註昔者公孫龍在趙之時謂弟子曰人而無能者龍不能與遊有客衣褐帶索而見曰臣能呼公孫龍顧謂弟子曰門下有故能呼者乎對曰無有公孫龍曰與之弟子之籍後數日往説燕王至於河上而航在一汜使善呼之一呼而航來故曰聖人之處世不逆有技能之士淮南子道應訓君子之於善也猶采薪者見一介掇之見青葱則拔之淮南子説山訓湯沐之於河有益不多流潦注海雖不能益有愈於己淮南子説林訓考績之法考其所積也天道積聚衆精以為光聖人積聚衆善以為功故日月之明非一精之光也聖人致太平非一善之功也明所從生不可為源善所從出不可為端春秋繁露考功名山林不讓椒桂以成其崇君子不辭負薪之言以廣其名鹽鐵論刺議明王聖主之治若夫江海無不受故長為百川之主明王聖君無不容故安樂而長久説苑君道藥食先嘗於卑然後至於貴藥言先獻於貴然後聞於卑故藥食嘗乎卑然後至乎貴教也藥言獻於貴然後聞於卑道也故使人味食然後食者其得味也多使人味言然後聞言者其得言也少説苑君道齊桓公設庭燎為士之欲造見者朞年而士不至於是東野鄙人有以九九之術見者桓公曰九九何足以見乎鄙人對曰臣非以九九為足以見也臣聞主君設庭燎以待士朞年而士不至夫士之所以不至者君天下賢君也四方之士皆自以論而不及君故不至也夫九九薄能耳而君猶禮之况賢於九九乎夫太山不辭壤石江海不逆小流所以成大也詩云先民有言詢於蒭蕘言博謀也桓公曰善乃因禮之朞月四方之士相攜而並至詩曰自堂徂基自羊徂牛言以内及外以小及大也説苑尊賢積針鏤者成帷幕合升斗者實倉廩幷小流而成江海明主者有所受命而不行未嘗有所不受也説苑政理且合菽粟之㣲以滿倉廩合疏縷之緯以成幃幕太山之髙非一石也累卑然後髙也夫治天下者非一士之言也固有受而不用惡有距而不入者哉説苑正諌昔者江水出於岷山其始也大足以濫觴及至江之津也不方舟不避風不可渡也非唯下流衆川之多乎説苑雜言湧泉涓涓南流不絶卒為江海焦氏易林明夷之既濟大匠無棄材船車用不均錐刀各異能何所獨卻前曹子建當欲遊南山行采蟲聲之善音贊愚人之偶得劉邵人物志林理四聰廣闢則羲和納景萬仞虚己則行潦交赴故博采之道𢎞則異聞畢集庭燎之輝舉則竒士扣角抱朴子外篇博喻規者所以法圓裁局則乖矩者所以象方製鏡必背輪者所以輾地入水則溺舟者所以涉川施陸必躓何者方圓殊形舟車異用也劉子文武不以春日遲遲而毁羔裀秋露灑葉而剔笋席劉子文武楚之市偷天下之大盗而能却齊軍雖使孫吳用兵彼必與之拒戰未肯有望風而退也晉之叔魚一國之佞邪也而能歸季孫雖使甘蘇騁説彼必與之較辨不至恐懾而逃還也大盗讒佞民之殫害無用之人也茍有一術猶能為國興利除害劉子適才不没纎芥之善不掩螢爝之光劉子正賞目髙則無所不照耳下則無所不聞言人髙其目則覩德義之經聖人之道下其耳則聽芻蕘之言負薪之説揚子法言註問明篇夫街談巷説必有可采擊轅之歌有應風雅匹夫之思未易輕棄也文選曹植與楊德祖書不棄菅蒯愛同絲麻文選任彦升讓吏部表白駒空谷振鷺在庭猶懼隱鱗卜祝藏器屠保文選任彦升薦士表錄人一善則無棄人採材一用則無棄材意林魏子必得崑山之玉而後寳則荆璞無夜光之美必須南國之珠而後珍則隋侯無明月之稱意林物理論江河之水非一水之源千鎰之裘非一狐之白藝文類聚裘東海廣且深由卑下百川五岳雖髙大不逆垢與塵藝文類聚樂部樂府譬由畎澮匪讓所以森致江河土壤同歸故能鬱成嵩岱藝文類聚職官部丞相碑麻絲是蓄菅蒯靡遺藝文類聚職官部侍中表凡人之為圃各植其所好焉好甘者植乎薺好苦者植乎荼好香者植乎蘭好辛者植乎蓼至於寡人之圃無不植也太平御覽資産部圃大造乾坤闢深恩雨露垂鵾鵬既含養駑駘亦驅馳初學記職官部中書侍郎亦如盛香篋受香無簡擇大寳積經巻七十六天不厭於雲海不厭於水大寳積經巻九十五譬如天雨一滴之水墮大海中其滴雖㣲終無減盡無盡意菩薩經卷九如海吞流如山藴寳大方廣佛華嚴經巻十二譬如大樹叢聚是名為林一一樹不名為林除一一樹亦無林大智度論巻三如一一縷不能制象一一水滴不能滿瓶多集則能百論卷上守八責實史疾為韓使楚楚王問曰客何方所循曰治列子禦冦之言曰何貴曰貴正王曰正亦可為國乎曰可王曰楚國多盗正可以禦盗乎曰可曰以正禦盗奈何頃間有鵲止於屋上者曰請問楚人謂之何王曰謂之鵲謂之烏可乎曰不可曰今王之國有柱國令尹司馬典令其任官置吏必曰廉潔勝任今盗賊公行而弗能禁也此烏不謂烏鵲不謂鵲也戰國䇿楚考烈王猶畫工惡圖犬馬而好作鬼魅誠以實事難形而虚偽不窮也後漢書張衡列傳考試猶準繩也未有舍準繩而意正曲直廢黜陟而空論能否也魏志王昶傳一犬吠形羣犬吠聲懼於羣吠遂至叵聽也晉書傳咸傳昔齊王好聴竽聲必令三百人合吹而後聴之廩以數人之俸南郭先生不知吹竽者也以三百人合吹可以容其不知因請為王吹竽虚食數人之俸嗣王覺而改之難彰先王之過乃下令曰吾之好聞竽聲有甚於先王欲一一列而聽之先生於此逃矣推賢之風不立濫舉之法不改則南郭先生之徒盈於朝矣晉書劉寔傳自言能為司馬不能為司馬者殺其身以釁其鼓自言能治田土不能治田土者殺其身以釁其社自言能為官不能為官者劓以為門父故無敢姦能誣禄至於君者矣管子揆度語言辯聽之説不度於義謂之窕言無山林澤谷之利而入多者謂之窕貨君子不聽窕言不受窕貨韓非子難二今境内之民皆言治藏商管之法者家有之而國愈貧民耕者衆執耒者寡也境内皆言兵藏孫吳之書者家有之而兵愈弱言戰者多披甲者少也故明主用其力不聽其言韓非子五蠧夫耕之用力也勞而民為之者曰可得以富也戰之事也危而民為之者曰可得以貴也今修文學習言談則無耕之勞而有富之實無戰之危而有貴之尊則人孰不為也是以百人事智而一人用力事智者衆則法敗用力者寡則國貧此世之所以亂也韓非子五蠧人皆寐則盲者不知皆嘿則喑者不知覺而使之視問而使之對則喑盲者窮矣不聽其言也則無術者不知不任其身也則不肖者不知聽其言而求其當任其身而責其功則無術不肖者窮矣韓非子六反夫欲得力士而聽其自言雖庸人與烏獲不可别也授之以鼎俎則罷健效矣故官職者能士之鼎俎也任之以事而愚智分矣韓非子六反言不用而自文以為辯身不任而自飾以為髙世主眩其辯濫其髙而尊貴之是不須視而定明也不待對而定辯也喑盲者不得矣韓非子六反不能具美食而勸餓人飯不為能活餓者也不能辟草生粟而勸貸施賞賜不能為富民者也今學者之言也不務本作而好末事道虛惠以説民此勸飯之説韓非子八説韓宣子曰吾馬菽粟多矣甚臞何也寡人患之周市對曰使騶盡粟以食雖無肥不可得也名為多與之其實少雖無臞亦不可得也主不審其情實坐而患之馬猶不肥也韓非子外儲説左夫嬰兒相與戲也以塵為飯以塗為羮以木為胾然至日晩必歸饟者塵飯塗羮可以戲而不可食也夫稱上古之傳頌辯而不慤道先王仁義而不能正國者此亦可以戲而不可以為治也韓非子外儲説左韓昭侯曰吹竽者衆吾無以知具善者田嚴對曰一一而聽之韓非子内儲説上人主之聽言也不以功用為的則説者多棘刺白馬之説不以儀的為闗則射者皆如羿也韓非子外儲説左宋王與齊仇也築武宫謳癸倡行者止觀築者不倦王聞召而賜之對曰臣師射稽之謳又賢於癸王召射稽使之謳行者不止築者知倦王曰行者不止築者知倦其謳不勝如癸美何也對曰王試度其功癸四板射稽八板擿其堅癸五寸射稽二寸韓非子外儲説左夫視鍜錫而察青黄區冶不能以必劍水擊鵠鴈陸斷駒馬則臧獲不疑鈍利發齒吻形容伯樂不能以必馬授車就駕而觀其末塗則臧獲不疑駑良觀容服聽辭言仲尼不能以必士試之官職課其功伐則庸人不疑於愚智韓非子顯學今有人於此求牛則名馬求馬則名牛所求必不得矣而因用威怒有司必誹怨矣牛馬必擾亂矣百官衆有司也萬物羣牛馬也不正其名不分其職而數用刑罰亂莫大焉夫説以智通而實以過悦譽以髙賢而充以卑下贊以潔白而隨以汙德任以公法而處以貪枉用以勇敢而堙以罷怯此五者皆以牛為馬以馬為牛名不正也白之顧益黑求之愈不得者其此義邪吕氏春秋審分因國以為身因臣以為心以臣言為聲以臣事為形有聲必有響有形必有影聲出於内響報於外形立於上影報於下響有清濁影有曲直響所報非一聲也影所應非一形也春秋繁露保位權盲者口能言白黑而無目以别之儒者口能言治亂無能以行之坐言不行則牧童兼烏獲之力逢須苞堯舜之德故使言而近則儒者何患於治亂而盲人何患於白黑哉鹽鐵論能言語曰盗跖不能盗田尺寸寸不可盗况尺乎夫事驗必若土田之張於野也則為私家寡矣若亂之墜於澚也則可信者解矣故有事考功有言考用動則考行静則考守申鑒時事夫志道者少與逐俗者多疇是以朋黨用私背實趨華其貢士者不復依其質幹准其才行但虚造聲譽妄生羽毛潜夫論實貢大人不考功則子孫惰而家破窮官長不考功則吏怠傲而姦宄興帝王不考功則直賢抑而巧偽勝潜夫論考績曲木惡直繩重罰惡明證此羣臣所以樂惣猥而惡考功也潜夫論考績夫劍不試則利鈍闇弓不試則勁撓誣鷹不試則巧拙惑馬不試則良駑疑此四者之有相紛也由不考試故得然也今羣臣之不試也其禍非直止於誣闇疑惑而巳又必致於怠慢之節焉設如家人有五子十孫父母不察精愞則懃力者懈弛而惰慢者遂非也耗家業之道也父子兄弟一門之計猶有若此則又况乎羣臣惣猥治公事者哉潜夫論考績世主不循考功而思太平此猶欲舍規矩而為方圓無舟楫而欲濟大水雖或云縱然不知循其慮度之易且速也潜夫論考績世有雷同之譽而未必賢也俗有讙譁之毁而未必惡也是以迎而許之者未若鑒其事而試其用逆而距之者未若聽其言而課其實抱朴子外篇廣譬士之生世入則事父出則事君事父尚於榮親事君貴於興國故慈父不能愛無益之子仁君不能畜無用之臣文選曹植求自試表覽影偶質不能解獨指跡慕逺無救於遲是以循虚器者非應物之具翫空言者非致治之機文選陸機演連珠若乃背清議違是非雖堯不能一日以治審臧否詳賞罰故中主可以萬世安藝文類聚人部公平論兒説宋人善辯者也持白馬之非馬也服齊稷下之辯者乗白馬而過闗則顧白馬之賦故籍空辭則能勝於一國實按形不能謾於一人藝文類聚獸部馬末世人君之用人也貴耳聞之聰則天下之人運貨逐利而市譽矣貴目見之明則天下之人恢形異藝而爭進矣貴口可道之言則天下之人習舌調吻而飾辭矣道德經四子集解酬功彤弓天子錫有功諸侯也毛詩彤弓敝帷不棄為埋馬也敝蓋不棄為埋狗也禮記檀弓下古之君子使之必報之迎貓為其食田䑕也迎虎為其食田豕也迎而祭之也禮記郊特牲曷為祭泰山河海山川有能潤于百里者天子秩而祭之觸石而出膚寸而合不崇朝而徧雨乎天下者唯泰山爾河海潤于千里公羊僖公三十一年梓匠輪輿其志將以求食也君子之為道也其志亦將以求食與曰子何以其志為哉其有功於子可食而食之矣孟子滕文公下有人於此毁瓦畫墁其志將以求食也則子食之乎曰否曰然則子非食志也食功也孟子滕文公下使河如帶泰山若礪國以永寜爰及苗裔始未嘗不欲固其根本而枝葉稍陵夷衰㣲也史記髙祖功臣侯年表夫獵追殺獸兎者狗也而發蹤指示獸處者人也今諸君徒能得走獸耳功狗也至如蕭何發蹤指示功人也史記蕭相國世家河當何時如衣帶山當何時如厲石言如帶砥國乃絶耳史記髙祖功臣侯年表註夫犬馬有勞於人尚加帷葢之報况國之功臣者哉前漢書陳湯傳臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人嘿然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲突者人謂主人曰鄉使聽客之言不費牛酒終亡火患今論功而請賔曲突徙薪亡恩澤燋頭爛額為上客邪主人迺寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福説得行則國亡裂土出爵之費臣亡逆亂誅滅之敗往事既巳而福獨不蒙其功唯陛下察之貴徙薪曲突之策使居焦髪灼爛之右前漢書霍光傳功亡原者賞不限德亡首者襃不檢前漢書王莽傳先帝貴指蹤之功薄搏獲之賞古人尚帷幄之規下攻拔之力後漢書荀彧傳慮為功首謀為賞本野績不越廟堂戰多不踰國勲是故曲阜之錫不後營丘蕭何之土先於平陽魏志荀彧傳註愧未有瓜衍之賞宋書謝方明傳夫塗秘蘭幽貞芳載越徽猷沈逺懋禮彌昭宋書王敬𢎞傳三寸之管毋當不可滿也授官爵出利禄不以功是無當也韓非子飾令叔向賦獵功多者受多功少者受少韓非子外儲説左卯曰伯夷以將軍葬於首陽山之下而天下曰夫以伯夷之賢與其稱仁而以將軍葬是手足不掩也今臣罷四國之兵而王乃與臣五乗此其稱功猶嬴勝而履蹻韓非子外儲説左今世之祭井竈門戸箕箒臼杵者非以其神為能饗之也恃賴其德煩苦之無已也是故以時見其德所以不忘其功也觸石而出膚寸而合不崇朝而雨天下者唯太山赤地三年而不絶流澤及百里而潤草木者唯江河也是以天子秩而祭之故馬免人於難者其死也葬之牛其死也葬以大車為薦牛馬有功猶不可忘又况人乎此聖人所以重仁襲恩淮南子氾論訓食其食者不毁其器食其實者不折其枝淮南子説林訓髙祖得天下賞羣臣之功蕭何為賞首何則髙祖論功比獵者之縱狗也狗身獲禽功歸於人羣臣手戰其猶狗也蕭何持重其猶人也王充論衡定賢篇社土地之主也土地濶不可盡敬故封土為社以報功也稷五穀之長也穀衆不可徧祭故立稷神以祭之藝文類聚禮部社稷夫功在不賞故庸勲之典葢闕施侔造物則謝德之塗已冥藝文類聚帝王部梁武帝令如多百千諸有情類奉事王子晝夜精勤王子爾時隨分資給衣服飲食卧具等事後登王位隨昔勤勞量所堪任重賜爵禄或主事業或主川原或主大城或主闗防或主村邑或主軍戎波羅宻多經巻五百八十三喻林巻六十九
