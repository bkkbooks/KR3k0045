body:
  text: 喻林卷十七明徐元太撰人事門十五行權三十之男二十之女禮未僃則不待禮㑹而行之者所以蕃育民人也毛詩摽有梅註若夫一統之年持平用之者大道之計也亂離之期縱横作之者行權之勢也魏書孫紹傳歩於林者不得直道行於險者不得履繩文子上德先聖有言曰規有摩而水有波我欲更之無柰之何此通權之言也韓子八説古之制婚禮不稱主人舜不告而娶非禮也立子以長文王舍伯邑考而用武王非制也禮三十而娶文王十五而生武王非法也淮南子汜論訓夫君臣之接屈膝卑拜以相尊禮也至其迫於患也則舉足蹵其體天下莫能非也是故忠之所在禮不足以難之也孝子之事親和顔卑體奉帶運履至其溺也則捽其髪而拯非敢驕侮以救其死也故溺則捽父祝則名君勢不得不然也此權之所設也淮南子汜論訓道德可常權不可常故遁闗不可復亡犴不可再淮南子説林訓權者反於經而合於道反於義而後有善若棠棣之華反而更合也劉子明權逐魚者濡逐獸者趨非樂之也事之權也説苑談叢道之於用猶衣冠之在身也權之輕重猶介胄之衛體也介胄禦冦而不可常服權以理度而不可常用劉子明權一切者權時之事非經常也猶如以刀切物茍取整齊不顧長短縱横前漢書註平帝紀上智利民不述於禮大賢彊國罔圖惟舊豈非療饑不期於鼎食拯溺無待於規行文選王元長䇿秀才文窮猿奔林豈暇擇木世説新説言語猶蝮蛇螫足斬之以全身㿈疽附體决之以救命亡一以存十亦輕重之所權𢎞明集孫綽喻道論昔齊人乘船渡江其父墮水其子攘臂捽頭顛倒使水從口出而父命得穌夫捽頭顛倒不孝莫大然以全父之身若拱手修孝子之常父命絶於水矣𢎞明集牟子理惑論貴智一伍之長才足以長一伍者也一國之君才足以君一國者也天下之王才足以王天下者也愚役於智猶枝之附幹此理天下之常法也後漢書仲長統列傳王者網漏鹿走則智多者得之後漢紀孝靈下欲收重泉之鱗非偃息之所能獲也隕髙墉之禽非靜拱之所能㨗也審投弦餌之用非無知之所能覽也晉書裴頠傳鬻子曰使臣捕獸逐麋已老矣使臣坐䇿國事尚少也鬻子序皇曰流丸止於甌㬰流言止於智者荀子大略穴深尋則人之臂必不能及矣是何也不至故也智亦有所不至所不至説者雖辨為道雖精不能見矣故箕子窮於商范蠡流於江吕氏春秋悔過魯鄙人遺宋元王閉元王號令於國有巧者皆來解閉人莫之能解兒説之弟子請往解之乃能解其一不能解其一且曰非可解而我不能解也固不可解也問之魯鄙人鄙人曰然固不可解也我為之而知其不可解也今不為而知其不可解也是巧於我故如兒説之弟子者以不解解之也吕氏春秋君守鮑叔之智應射而令公子小白僵也其智若鏃矢也吕氏春秋貴卒不智而有勇力材能則狂而操利兵也不智而辯慧獧給則迷而乘良馬也春秋繁露必仁且智楚丘先生披蓑帶索往見孟嘗君孟嘗君曰先生老矣春秋髙矣多遺忘矣何以教文楚丘先生曰惡君謂我老惡君謂我老意者將使我投石超距乎追車赴馬乎逐麋鹿摶豹虎乎吾則死矣何暇老哉將使我深計逺謀乎定猶豫而决嫌疑乎出正辭而當諸侯乎吾乃始壯耳何老之有韓詩外傳故分土若一賢者能守之分財若一知者能籌之夫子貢之廢著陶朱公之三至千金豈必頼之民哉運之六寸轉之息耗取之貴賤之間耳鹽鐵論貧富虞君問盆成子曰今工者乆而巧色者老而衰今人不及壯之時益積心技之術以備將衰之色色者必盡乎老之前知謀無以異乎㓜之時可好之色彬彬乎且盡洋洋乎安託無能之軀哉故有技者不累身而未嘗滅而色不得以常茂説苑建本若與予同耕則比力也至於説人主不與子比智矣説苑正諫是懐晏子之智而加以八尺之長也夫躬仁義事明主其名必揚矣烈女傳周列國齊相御妻明不處暗智不履危焦氏易林賁之離或問人何尚曰尚智曰多以智殺身者何其尚曰昔皐陶以其智為帝謀殺身者逺矣箕子以其智為武王陳洪範殺身者逺矣楊子問明篇樗里子之智也使知國如知𦵏則吾以疾為蓍龜楊子淵騫篇射雖中而不知所以中則非中之道身雖存不知所以存則非存之理故夫射者能拙俱中而知所以中者異賢愚俱存而知所以存者殊也張湛註列説符蜎飛蝡動亦能有仁故其意愛𢎞於長育哀傷著於啁噍然赴阬穽而無猜入罻羅而不覺有仁無明故並趨禍而攸失抱朴子外篇仁明宋人養猿號曰狙欲與狙芧先誑之曰朝三而暮四衆狙皆怒又許朝四而暮三而衆狙皆喜聖人以智籠羣愚亦猶狙公以智籠羣狙矣意林列子不知宜與不宜猶以錦純薦不知時與不時猶冬耕也不知行與不行猶以方作輪也意林魯連子挿桃枝於戸連灰其下童子入不畏而鬼畏之是鬼智不如童子也藝文類聚菓部桃晉公子重耳奔齊與五臣游乎大澤之中蜘蛛布網曳繩執豸而食之公子重耳乃撫僕之手駐駟而觀之顧其臣咎犯曰此蟲也智之薄者矣猶役其智布其網曳其繩執豸而食之况乎人之有智而不能廓垂天之網布絡地之繩以供方丈之御是曽不如蜘蛛之智孰可謂之人乎事文類聚蜘蛛符子夫蜘蛛之羅網蜂之作窠其巧妙矣而况於人乎故工匠之方規圓矩出乎心巧成於手迹非睿敏精宻孰能著物形成器用哉太平御覽工藝部巧以智力求者喻如奕碁進退取與攻刧收放在我者也太平御覽工藝部圍碁譬如寳藏埋在地中衆人踐之遂不知覺若善别者占視則知無上内秘藏經妙德品具智慧翼遊空無礙大方等大集經卷一譬如伽陀藥消滅一切毒智慧亦如是除滅諸癡闇大方廣佛華嚴經卷十一實智慧者則是度老病死海堅牢船也亦是無明黑暗大明燈也一切病者之良藥也伐煩惱樹之利斧也佛遺教經羊五猶有人須虵食噉處處求索久乃見虵以手把尾虵反螫手毒遍身體忽便無常皆由其人不巧捉虵故以喪其命出曜經四無放逸品譬如人持利刀截木人有智慧能截斷諸惡譬如利刀那先比丘經卷上譬如山上大雨其水下流廣大兩邊人俱不知水深淺畏不敢渡如有逺方人來視水隱知水廣狹深淺自知力勢能入水便得渡過兩邊人衆便効隨後亦得渡去那先比丘經卷上馳闇逐非道蹴株而躃地有目而無慧其喻亦如是三昧法門經卷上少德無智慧不應處髙座如豺見師子竄伏不敢出大智無所畏應處師子座譬如師子吼衆獸皆怖畏大智度論卷五譬如大海潮時至其常限水則旋還魚若不還則漂在露地有諸苦患若魚有智則隨水還永得安隱大智度論二十如以斗稱量物以智慧量諸法亦如是大智度論卷五十一如見生寳未别時則不愛謂無用故識别時則深重知有用故大乘莊嚴經註卷一如百千盲人不任作導一人有眼任為導師十住毘婆沙論卷九雪山根底曲山壅中有向陽處衆鳥雲集便共議言我等今日當推舉一鳥為王令衆畏難不作非法衆鳥議言善誰應為王有一鳥言當推鶬鵠有一鳥言此事不可何以故髙脚長頸衆鳥脱犯啄我等惱衆咸言尒復有一鳥言當推鵝為王其色絶白衆鳥所敬衆鳥復言此亦不可顔貌雖白項長且曲自項不直安能正他是故不可又復衆言正有孔雀衣毛綵飾觀者悦目可應為王復言不可所以者何衣毛雖好而無慚愧每至舞時醜形出現是故不可有一鳥言土梟為王所以者何晝則安靜夜則伺守能䕶我等堪為王者衆咸可尒有一鸚鵡在一處住而多智慧作是念言衆鳥之法夜應眠息晝則求食是土梟法夜寤晝則多睡而諸衆鳥圍侍左右晝夜警宿不復眠睡甚為苦事我今設語彼當瞋恚㧞我毛羽正欲不言衆鳥之類長夜受困寧受㧞毛不越正理便到衆鳥前舉翅恭敬白衆鳥言願聽我説如前意見尒時衆鳥即説偈答黠慧廣知義不必以年耆汝年雖幼小智者宜時説尒時鸚鵡聞衆鳥説即説偈言若從我意者不用土梟王歡喜時覩面常令衆鳥怖况復瞋恚時其面不可觀時衆鳥咸言實如所説即共集議此鸚鵡鳥聰明黠慧堪應為王便拜為王法苑珠林卷五十一時有一鳥名曰羅婆為鷹所捉飛騰虛空於空鳴喚言我不自覺忽遭此難我坐捨離父母境界而遊他處故遭此難如何今日為他所困不得自在鷹語羅婆汝當何處自有境界而得自在羅婆答言我於田耕壠中自有境界足免諸難是為我家父母境界鷹於羅婆起憍慢言放汝令去還耕壠中能得脱不於是羅婆得脱鷹爪還到耕壠大塊之下安住止處然後於塊上欲與鷹鬬鷹則大怒彼是小鳥敢與我鬬瞋恚極盛峻飛直摶於是羅婆入於塊下鷹鳥飛勢臆衝堅塊碎身即死時羅婆鳥深伏塊下仰説偈言鷹鳥用力來羅婆依自塊乘瞋猛盛力致禍碎其身我具足通達依於自境界伏怨心隨喜自觀欣其力設汝有凶愚百千龍象力不如我智慧十六分之一觀我智勝殊摧滅於倉鷹法苑珠林卷六十五師子度水要截流直渡曲則不渡此大士以實智慧深入諸法直過彼岸故借以為名也羅什譯維摩詰經入不二法門品智為内照權為外用萬行之所由生諸佛之所因出故菩薩以智為母以權為父僧肇註維摩詰經佛道品性成隰有萇音長楚猗音嬰儺音娜其枝夭之沃沃樂子之無知隰有萇楚猗儺其華夭之沃沃樂子之無家隰有萇楚猗儺其實夭之沃沃樂子之無室詩國風隰有萇楚嬰兒孩子則懐嬉戲忭躍之心𤣥鶴蒼鸞亦合歌舞節奏之應豈由有詩而乃成樂樂作而必由詩毛詩正義詩譜序大風所從之來自有其道乃從彼有空大谷而來也以喻賢愚所為之行亦自有其本乃由彼有禀天性而然也毛詩正義桑柔性之與情似金與鐶印鐶印之用非金亦因金而有鐶印情之所用非性亦因性而有情禮記正義中庸夫虎生而文炳鳯生而五色豈以五采自飾畵哉天性自然也蜀志秦宓傳鴞音之醜豈有泮林而變好荼味之苦寜以周原而成飴文心雕龍刳飾薑桂同地辛在本性文章由學能在天資文心雕龍事類孝友之性豈伊喬梓夷雅之體無待韋弦文選任彦升王文憲集序虎豹之駒未成文而有食牛之氣鴻鵠之􅑹羽翼未合而有四海之心意林尸子未鏤已雕不扶而直藝文類聚職官部司凌墓誌交阯北南海中有大文貝質白而文紫天姿自然不假雕琢磨瑩而光色煥爛藝文類聚寳部貝其政太平山車垂鉤註云山車自然之車垂鉤不揉治而自圓曲玉海車服車輿烏不染而自黑鶴不浴而自白蛛不教而成網燕不招而自來隂符經註夫人之忍痛與不忍痛者非勇怯之分也夫勇士之不忍痛者見難則前見痛則止夫怯士之忍痛者聞難則恐遇痛不動夫勇士之忍痛者見難不恐遇痛不動夫怯士之不忍痛者見難與痛目轉面盻恐不能言失氣驚顔色變化乍死乍生黄帝素問靈樞經論勇若其是道何須修習猶如羽鳥何須習飛譬如鱗族何須習水雲昇雨降不闗習學大乘妙林經譬如補羅迦樹隨解之處中表皆有吉祥之文大寳積經二十如人執持炭磨鎣欲令白假使至盡時體色終無變大寳積經卷九十六譬如有人若於栴檀龍腦等香瞋謗毁罵然後塗身而彼栴檀龍腦等香終不為是而不出香法集經欲二如鳥飛空虛無所依止而逺逝不墜大智度論卷七十六譬如火熱無有作者火性自熱無有不熱之火百論卷上守八如小兒生便知行憂喜等事無有教者百論卷上守入夫魚之為性唯水是依女人之性唯樂是欲羅什譯維摩詰經菩薩品習能知日蝕地震之效昭然可明猶巢居知風穴處知雨亦不足多適所習耳前漢書翼奉傳若夫良冶之子善知為裘良弓之子善知為箕物豈有定習貫則知耳魏書李彪傳諺曰相門有相將門有將斯不唯其性蓋言習之所得也北史李彪傳今夫盲者目不能别晝夜分白黑然而摶琴撫絃參彈復徽攫援摽拂手若薎蒙不失一絃使未嘗鼓瑟者雖有離朱之明攫掇之㨗猶不能屈伸其指何則服習積貫之所致淮南子脩務訓御史之遇文書不失分銖有司之陳籩豆不誤行伍其巧習者亦先學之人不貴者也王充論衡量知篇孫武闔廬世之善用兵者也知或學其法者戰必勝不曉什伯之陣不知擊刺之術者彊使之軍軍覆師敗無其法也王充論衡量知篇蓋足未嘗行堯禹問曲折目未嘗見孔墨問形象齊部世刺繡恒女無不能襄邑俗織錦鈍婦無不巧日見之日為之手狎也使材士未嘗見巧女未嘗為異事詭手暫為卒睹顯露易為者猶憒憒焉王充論衡程材篇從農論田田夫勝從商講賈賈人賢今從朝廷謂之文吏朝廷之人也幼為幹吏以朝廷為田畆以刀筆為耒耜以文書為農業猶家人子弟生長宅中其知曲折愈於賔客也賔客暫至雖孔墨之材不能分别儒生猶賔客文吏猶子弟也王充論衡程材篇猶工匠之作器也曉之則無難不曉則無易王充論衡定賢篇人有所優固有所劣人有所工固有所拙非劣也志意不為也非拙也精誠不加也王充論衡書解篇貔貅戾獸而黄帝教之戰鷹鸇鷙鳥而羅氏教之擊夫鳥獸無知之性猶隨人指授而能戰擊者習之之功也奚况國之士民而不習武乎劉子閲武故射御慣習至於馳獵則能擒獲習教之所致也若弗先習覆逸是懼奚據望獲劉子閲武鏌鎁不為巧者鋭而為拙者鈍然而巧以生勝拙而之負者習與不習也劉子閲武吳人者以船檝為輿馬以巨海為夷庚李善註文選陸士衡辨亡論子雲曰能讀千賦則善賦君大曰能觀千劒則曉劒喭曰伏習衆神巧者不過習者之門意林新論三世長者知被服五世長者知飲食此言被服飲食難曉也藝文類聚衣裳朝鮮之馬被鬛踶齧能使其成騏驥者習之故也太平御覽獸部馬五吳之翫水若魚鼈蜀之便山若禽獸太平御覽鱗介部鼈非所事而强學猶以百萬之師積在河濟之中其用舟檝固不如江漢之良太平御覽舟部叙舟中譬如丈夫善服毒藥能使消化方為食事無有諸毒大寶積經二十如鳥子學飛小兒學行三昧法門經卷下如人學跳乆習轉工絶於餘人如鳥子學飛漸漸轉逺禪法要解經卷下榮十譬如學趠裳壊色麤重相常修輕空相是時便能飛大智度論卷二十八易知夫和氏之璧求者不爭賈騏驥之材不難阻險之路越絶外傳記范伯其事昭昭日月經天河海帶地不足以比後漢書馮衍列傳今天下之事昭昭於日月震震於雷霆後漢書范升傳齊髙妙之音正鄭衛之聲並利於事無相奪倫此乃管弦之至牙曠之調也雖非鍾期敢不擊節蜀志馬良傳君子並物而錯之兼塗而用之五味未嘗而辨於口五行在身而布於人鄧析子無厚篇治於神者衆人不知其功爭於明者衆人知之墨子公輸以賢易不肖不待卜而後知吉以治伐亂不待戰而後知克荀子大略刺我行者欲與我交訾我貨者欲與我市淮南子説林訓道畔巨樹塹邊長溝所居昭察人莫不知王充論衡自紀篇情寃見之日明兮如列宿之錯置楚辭九章惜往日譬如見西施何必識姓名然後知美何氏語林言語譬如春時花果樹等陳葉已落枝條滋潤衆人見已咸作是言新花果樹葉當出不乆波羅宻多經卷三譬如女人懐孕漸乆其身轉重動止不安飲食睡眠悉皆减少不喜多語猒常所作受苦痛故衆事頓息有異他人見是相已即知此女不乆産生波羅宻多經卷三如日欲出先現瑞相所謂明星出時當知日出不乆大寳積經六十二譬如鑚酪者嘗之以指端大乘宻嚴經卷下天下有明月珠持五綵縷貫之人視珠皆見五綵别知縷知珠相貫穿泥犂經福九猶如羅縠觀空表裏悉現出曜經八行品如火以烟為相見烟則知有火大智度論卷五十一如行路人知邪逕則知正道大智度論七十三如聞香知有華聞聲知有鳥聞笑知有人見烟知有火見鶴知有池十二門論守六如炊飯一粒熟知餘者皆熟中論卷三譬智者如見家牛形容譬類知野牛形容狀亦應如此隨相論卷下大士處世猶日月之升天有目之士誰不知識僧肇註維摩詰經佛國難知鳥吾知其能飛魚吾知其能游獸吾知其能走走者可以為網游者可以為綸飛者可以為矰至於龍吾不知其乘風雲而上天史記老莊傳夫孿子之相似者惟其母知之而已夫利害之相似者惟智者知之而已戰國䇿韓襄王孔子東游見兩小兒辯鬬問其故一兒曰我以日始出時去人近而日中時逺也一兒以日初出逺而日中時近也一兒曰日初出大如車盖及日中則如盤盂此不為逺者小而近者大乎一兒曰日初出滄滄涼涼及其日中如探湯此不為近者熱而逺者凉乎孔子不能决也列子湯問徵羽之操不入鄙人之耳抮和切適舉坐而善淮南子説林訓昔晉平公令官為鍾鍾成而示師曠曰鍾音不調平公曰寡人以示工工皆以為調而以為不調何也師曠曰使後世無知音者則已若有知音者必知鍾之不調故師曠之欲善調鍾也以為後之有知音者也淮南子脩裕訓今日何為而榮乎旦日何為而義乎此易言已今日何為而義旦日何為而榮此知難也淮南子主術訓子貢曰賜譬渴者之飲江海知足而已孔子猶江海也賜則奚足以識之説苑善説今謂天髙無少長愚智皆知髙髙幾何皆曰不知也是以知仲尼之賢而不知其奚若説苑善説言如鱉咳語不可知焦氏易林賁之旅浮於海者迷於東西大也行於溝咸識舟楫之跡小也王充論衡定賢篇人面色部七十有餘頰肌明潔五色分别隱微憂喜皆可得察占射之者十不失一使面黝而黑醜垢重襲而覆部占射之者十而失九王充論衡自紀篇玉隱石間珠匿魚腹非玉工珠師莫能採得寳物王充論衡自紀篇有美味於斯俗人不嗜狄牙甘食有寳玉於是俗人投之卞和佩服孰是孰非可信者誰王充論衡自紀篇夫貌望豐偉者不必賢而形器尫瘁者不必愚咆哮者不必勇淳淡者不必怯或外候同而用意異或氣性殊而所務合非若天地有常候山川有定止也物亦故有逺而易知近而難料譬猶眼能察天衢而不周項領之間耳能聞雷霆不能識螘蝨之音也抱朴子外篇清鑒甽澮之流不能運大白之艘升合之器不能容千鍾之物熠燿不能並表微之景常才不能别逸倫之器蓋造化所假聰明有本根也抱朴子外篇博喻夫玉石易别於賢愚愛寳情篤於好士以易别之寳合篤好之物猶獲罪截趾歴世受誣况乎難知之賢非意所急抱朴子外篇㩲才若令士之易别如鷦鷯之與鴻鵠狐兎之與龍驎者則四凶不得官於堯朝管蔡不得幾危宗周抱朴子外篇行品美玉藴於碔砆凡人視之怢焉良工砥之然後知其和寳也精錬藏於鑛朴庸人視之忽焉巧冶鑄之然後知其幹也况乎聖德巍巍蕩蕩黎氓所不能命哉文選王褒四子講德論夫至物微妙可以理知難以目識譬猶豫章生七年然後可覺耳文選嵇康養生論絶節髙唱非凡耳所悲肆義芳訊非庸聽所善是以南荆有寡和之歌東野有不釋之辯文選陸機演連珠慎子曰離朱之明察毫末於百歩之外下於水尺而不能見淺深非目不明也其勢難視也文選陸機演連珠註夫逺不可知者天也近不可知者人也廣文選曹子建黄初五年令經巨海者終年不見其涯測虞淵者終世不知其底故近者不可以度逺也意林物理論寳山峻極駘足未窺惠海遥波輕舟誰泛文苑英華梁簡文帝帝德上頌大椿凋茂非蜉蝣之所知溟渤淺深豈馮夷之能測文苑英華薛道衡碑豫章七年斃於豐草芳蘭九畹淪於幽谷是以欲求其真晉陽有自埋之蒿若賞其聲吳亭有已枯之竹文苑英華庾信連珠使聖人空坐獨思則不知百世後有馬生牛牛生驢桃生李李生梅也太平御覽果部梅鴨足何以􅡘雞足何以􅀈􅡘􅀈吾不知也何况問天地乎太平御覽羽族部鴨羈蚊絆蚤禁其非法刳蟣屠蝨求其肝膽非至精誰能知之太平御覽兵部羈逺哉天之道也如迎浮雲若視深淵視深淵尚可測迎浮雲莫知其極黄帝素問内經六微㫖大論譬如萬里坑下有淡流泉視之甚濁微徹見底沙難西昇經夫陳大言舒至論表自然窮微妙則中士眩而下士笑浮言遊説生息百變起福興利成功遂事則中士論而下士覺道德經指歸卷七譬如虚空不可計知東方里數南方西方北方四嵎上下亦不可知無逺無近無有邊際光讃波羅宻經卷十猶如寳篋未開之時不知其中是何等寳大寳積經一百九如母懐子不能自知是男是女黑白黄色根具不具手足耳目類與不類止於身中不知其狀大乘顯識經推三譬如身生毛其人亦不能自校計一一數不能自知毛多少明度五十校計經卷上如世間隣近村邑聚落池沼擾濁垢穢有明眼人住在岸上作意觀察其中所有螺蛤龜魚礫石等類行住普側極難可見所以者何水有擾濁及垢穢故本事經卷五譬如天雨降霔大海一一水滴數不可知相續流注無有窮盡未曽有經善巧方便品淵十如囊中寳物繫口則人不知大智度論卷六十五故伯牙絶絃卞和泣璧良由妙㫖之典難辯盈尺之珍罕别攝大乘論序卷一譬如江水海水同時和合不可分别如實論華二夫觀華者不能知實視影者不能審形𢎞明集牟子理惑論然謂海實廣廣孰能知謂天盖髙髙不可測𢎞明集十誤知以犬羊之質服虎豹之文無衆星之明假日月之光魏志王粲傳註但以燕求馬首薛養雞鳴謬齒鴻儀虚班驥皁隋書崔廓隱逸傳夫轉沙石者湍瀬也飛毛芥者焱風也活水洋風毛芥不動無道理之將用心暴猥察吏不詳遭以好遷妄授官爵猛水之轉沙石焱風之飛毛芥也王充論衡狀留篇承侔卞和質非荆璞眷同尤良用乏驥騄文選盧諶贈劉琨詩恨以駑蹇姿徒煩非子御文選盧諶贈崔温詩今足下既以抜文秀於叢薈䕃弱根於慶雲陵扶揺而疎翮揮清瀾以擢鱗而響不徹於一臯價不登乎千金傲岸榮悴之際頡頏龍魚之間補文選郭璞客傲何天施之𢎞普厠瓦礫於瓊瑛藝文類聚人部言志賦謬以商丘之木遂比舟栰之材燕岱之石混同瑚璉之器藝文類聚職官部尚書令表顧憐碔砆質何以儷瓊瓌文苑英華梁簡文帝應令詩黄鶴戒露非有意於輪軒爰居避風本無情於鍾鼓文苑英華庾信小園賦龔以毛羽之身戴丘山之施李善註文選劉孝標廣絶交論喻林卷十七
