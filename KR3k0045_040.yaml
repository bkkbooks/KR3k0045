body:
  text: 喻林卷四十明徐元太撰人事門三十覺人初筮告再三瀆瀆則不告易天下之無道也乆矣天將以夫子為木鐸論語八佾君子引而不發躍如也中道而立能者從之孟子盡心上今之與楊墨辯者如追放豚既入其苙又從而招之孟子盡心下今夫夜有求與瞽師併東方開斯照矣淮南子繆稱訓夫吹管也猶有嗃也吹劒首者吷而已矣堯舜人之所譽也道堯舜於戴晉人之前譬猶一吷也荘子則陽人欲知髙下而不能教之用管準則説欲知輕重而無以予之權衡則喜欲知逺近而不能教之以金目則快射又况知應無方而不窮哉淮南子泰族訓蒙惑憧憧不知西東魁罡指南告我失中焦氏易林濟之大壯夫同言而信信其所親同命而行行其所服禁童子之暴謔則師友之誡不如𫝊婢之指揮止凡人之鬬鬩則堯舜之道不如寡妻之誨諭吾望此書為汝曹之所信猶賢於𫝊婢寡妻耳顧氏家訓序致恵曉心如月鏡遇形觸物無不朗然太平御覽人事部心作法橋梁作法梯磴作大明燭作大舟航令諸世間竝得解悟海空智蔵經法相品譬如智人善解衆語為諸衆生作大譯師海空智蔵經持誡品哀愍闇苦衆生然此法燈照煩惱闇令一切尋光見道靈寳祕宻經猶如明燈破一切暗令有目者見諸寳物隨意更用靈寳祕宻經譬如人生而聾盲不見五色青黄赤白及黑等相不聞宫商五音之聲有大明醫授以妙術為開耳目一切色聲無不聞見靈寳祕宻經夫子之開余道也目未見其處耳未聞其數而目以明耳以聰矣岐伯曰此所謂聖人易語良馬易御也黄帝素問内經氣宂論譬如夜夢見諸毒蛇開張牙齒近来逼身擬欲吞噬心神惶懼東西馳走呌聲烈天迷悶躃地床邉覺人咄哉睡夢何所呌耶而其夢人忽然睡覺伸舒手足乃知夢見虚妄大乗妙林經譬如夜分因滿月輪光明照觸星宿藥等隨其勢力皆得増盛波羅宻多經卷五百四十開彼智慧眼滅此昏盲暗無量夀經卷上照行善者猶如朗日照失道者猶如明燭大集地蔵十輪經卷一猶如濁水置諸神珠以珠力故水則湛清七佛所説神咒經卷一誰於生死苦惱之海大波浪中卒教津濟令到彼岸一切凡愚處於邪徑誰為引導忽示正道誰於無明大黑闇中熾然慧炬顯照幽㝠無明羅刹經有道人夜行前未得道人隨其後後人有疑悔前人舉手五指頭出火復以鑰開户後人乃覺悟知為道人三慧經籍八導嚘聾者必俯仰而指撝啓愚滯者亦提耳而舉掌辯正論卷八使窮陸知海幽覩見日至言與秋陽同朗羣疑與春氷俱釋𢎞明集十導迷生於慾海情塵共心垢同消引窮子於慈室衣寳與髻珠䨇至化溢恒沙之境功被㣲塵之劫法苑珠林序四生沈溺必假舟航六趣昏迷本憑奨導法苑珠林卷五十惑網之夫設理蹤而證入業種之客依相迹而繩持法苑珠林卷八十八隨其利鈍故説有廣略譬如大樹非一斧所傾累根既深非一法能除羅什譯維摩詰經問疾品顯淨土於未聞猶開聾瞽於形聲也僧肇註維摩結經佛國品不欺身之所長上雖不知不以悖君身之所短上雖不知不以取賞荀子不茍篇齊攻魯求岑鼎魯君載他鼎以徃齊侯弗信而反之為非使人告魯侯曰栁下季以為是請因受之魯君請於栁下季栁下季答曰君之賂以欲岑鼎也以免國也臣亦有國於此破臣之國以免君之國此臣之所難也於是魯君乃以真岑鼎徃也吕氏春秋知士損年則嫌於弟益年則疑於兄不知循其理若其當淮南子説林訓楚莊王圍宋有七日之糧曰盡此而不剋將去而歸於是使司馬子反乗闥而窺宋城宋使華元乗闥而應之子反曰子之國何若矣華元曰憊矣易子而食之㭊骸而㸑之子反曰嘻甚矣憊雖然吾聞圍者之國箝馬而秣之使肥者應客今何吾子之情也華元曰吾聞君子見人之困則矜之小人見人之困則幸之吾望見吾子似於君子是以情也韓詩外傳卷二孟子少時東家殺豚孟子問其母曰東家殺豚何以為母曰欲啖汝其母自悔言曰吾懐姙是子席不正不坐割不正不食胎教之也今適有知而欺之是教之不信也乃買東家豚肉以食之明不欺也韓詩外傳卷九求馬問馬求驢問驢求鷹問鷹求駹問駹由此教令則賞罰必也夫髙論而相欺不若忠論而誠實潜夫論實貢譬如病者而有疾苦悉當為醫至誠説之修行道地經慈品難欺存乎人者莫良於眸子眸子不能掩其惡胷中正則眸子瞭焉胷中不正則眸子眊焉孟子離婁上人之視已如見其肺肝大學不忍欺不能欺優劣之縣在於權衡非徒低卬之差乃鈞銖之覺也史記滑稽列傳註有義者不可欺以利有勇者不可劫以懼如饑渴者不可欺以虚器也淮南子繆稱訓齊王厚送女欲妻屠牛吐屠牛吐辭以疾其友曰子孫死腥臭之肆而已乎何為辭之吐應之曰其女醜其友曰子何以知之吐曰以吾屠知之其友曰何謂也吐曰吾肉善如量而去苦少耳吾肉不善雖以他附益之尚猶賈不售今厚送子子醜故耳其友後見之果醜韓詩外傳若以桀詐桀猶有幸焉若以桀詐堯譬之若以卵投石若以指繞沸若羽蹈烈火入則焦沒耳夫又何可詐也新序維事三志得則顔怡意失則容戚本朽則末枯源淺則流促有諸中者必形乎表發乎邇者必著乎逺抱朴子外篇博喻人有識真之明者不可欺以偽也有揣深之智者不可誑以淺也不然以虺蛇為應龍狐鴟為麟鳯矣抱朴子外篇廣譬日月發輝既尋虚而捕影欲蔵形而託暗豈得施其巧宻乎以喻聖人正見既探心而明惑欲隱情而倚智豈足自匿其事乎李善註文選陸士衡演連珠水則有波釣則有磨我欲更之無如之何言物動而釁已彰形行而迹已著太平御覽資產部釣譬如幻化誑於愚夫智慧之人所不惑著元陽妙經卷六夫空有大言不行大道亦猶疾人言善治病亦猶跛人賣能行藥乍而聽之一徃如實者觀察即知其謬玉清經法印品譬如有人羸老攣躄徃他人所語彼人言竒哉丈夫我雖如此能以一毛㸃取一切無量諸水内置口中悉令枯竭此人既無神通呪術能為斯事為可信不念佛三昩經卷三譬如野干欲作狐聲發聲還作野干聲雜阿含經卷三十五譬如女人欲作丈夫聲發聲即作女聲雜阿含經卷三十五譬如有人言有水無火有濕地而無水是不可信大智度論卷九譬如狗著師子皮諸獸見之雖怖聞聲則知是狗何况變作餘身等大智度論卷七十三念本毖音祕彼泉水亦流於淇有懐於衞靡日不思詩國風泉水渭陽康公念母也毛詩渭陽有人升彼阿丘之上言欲采其蝱者欲得其蝱以療疾猶婦人適於異國亦欲得力助以安宗國毛詩正義載馳鴈北鄉鄉者何也鄉其居也鴈以北方為居何以謂之為居生且長焉爾大戴禮記夏小正𫝊曰蛇化為龍不變其文家化為國不變其姓史記外戚世家夫天者人之始也父母者人之本也人窮則反本故勞苦倦極未甞不呼天也疾痛慘怛未甞不呼父母也史記屈原傳鳥飛反鄉兎走歸窟狐死首丘寒將翔水各哀其所生淮南子説林訓乆官無休思歸故鄉焦氏易林屯之巽安居重遷不去其廛焦氏易林大有之震鸇鳩徙巢西至平州遭逢雷電碎我苕蘆室家饑寒思吾故初焦氏易林咸之随次三牝貞常慈衛其根測曰牝貞常慈不忘本也太𤣥經第六馴禾穂垂而向根君子不忘本也淮南子謬稱訓解學者思明師仕者思明君武侯十六䇿君臣願為中林草秋隨野火燔糜滅豈不痛願與株荄連曹子建吁嗟篇道者萬殊之源也儒者大淳之流也三皇以徃道治也帝王以来儒教也談者咸知髙世之敦朴而薄季俗之澆散何獨重仲尼而輕老氏乎是玩華藻於本末而不識所生之有本也何異乎貴明珠而賤淵潭愛和璧而惡荆山不知淵潭者明珠之所自出荆山者和璧之所由生也抱朴子内篇塞難禾垂穎以顧本猶人之思故居也李善註文選思𤣥賦胡馬依北風越鳥巢南枝文選古詩鳥飛返故鄉兮狐死必首丘廣文選屈平哀郢鳥獸驚而失羣兮猶髙飛而哀鳴狐死必首丘兮夫人孰能不反其真情廣文選東方曼倩怨思木大者發越小者敷揚土是人之母也故人有戀土之心意林傳子張一綵則念女工勞御一榖則恤農夫勤太平御覽百榖部榖南越志所謂鷓鴣雖東西回翔然開翅之始必先南翥亦胡馬嘶北之義也埤雅品物門鵜廣志曰狐死首丘豹死首山言不忘本也埤雅品物門豹榆莢墜落還歸本根參同契譬如新生犢子心終不逺離其母道行波羅宻經卷五如子知恩故守䕶其母大智度論卷六十九重本大木揭然将蹶枝葉未有折傷其根本實先絶乃相隨俱顛㧞鄭氏箋詩蕩萬物本於天人本於祖天之所命者牧民也祖之所命者成業也毛詩正義闗雎易乾鑿度註云古者田漁而食因衣其皮先知蔽前後知蔽後後王易之以布帛而猶存其蔽前者重古道不忘本毛詩正義采菽太公封於營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也禮記檀弓上此是木落不歸其本狐死不首其丘禮記正義序獺祭魚豺祭獸善其祭而後食之也大戴禮記夏小正國將亡本必先顛而後枝葉從之左傳閔公元年且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎左傳哀公八年豺獺知祭祀而况人乎故人知之至於念想猶豺獺之自然也後漢書志祭祀上夫虯龍神於獺獺自祭其先不祭虯龍也麒驎白虎仁於豺豺自祭其先不祭騏虎也魏志蔣濟傳註無源何以成河無根何以垂榮魏志管輅傳註語曰深山大澤有龍有蛇實斯之謂也晉書王導傳鄭𤣥云陽氣盛而恒旱山川百原能興雲致雨者也衆水所出為百原必先祭其本南齊書禮志鷙鳥捨巢必有探卵之患北齊書孝昭帝紀夫何足以配天乎雖然有族有祖可以為衆父而不可以為衆父父莊子天地事有本根各有從来譬之卉木因根而有枝條花葉鬼谷子謀篇註禮有三本天地者生之本也先祖者類之本也君師者治之本也無天地惡生無先祖惡出無君師惡治三者偏亡焉無安人荀子禮論篇譬若羿請不死之藥於西王母嫦娥竊以奔月悵然有喪無以續之何則不知不死之藥所由生也是故乞火不若取燧寄汲不若鑿井淮南子覽㝠訓夫申韓商鞅之為治也挬抜其根蕪棄其本而不窮究其所由生淮南子覽㝠訓兵者所以討暴非所以為暴也樂者所以致和非所以為滛也喪者所以盡哀非所以為偽也故事親有道矣而愛為務朝廷有容矣而敬為上處喪有禮矣而哀為主用兵有術矣而義為本淮南子本經訓今夫天下皆知事治其末而莫知務修其本釋其根而樹其枝也淮南子兵畧訓狐梁之歌可隨也其所以歌者不可為也聖人之法可觀也其所以作法不可原也辯士言可聽也其所以言不可形也淳均之劍不可愛也而歐冶之巧可貴也淮南子齊俗訓席之先雚簟樽之上𤣥樽俎之先生魚豆之先泰羹此皆不快於耳目不適於口腹而先王貴之先本而後末淮南子詮言訓清􅭎之美始於耒耜黼黻之美在於杼軸淮南子説林訓草木洪者為本而殺者為末禽獸之性大者為首而小者為尾末大於本則折尾大於要則不掉矣故食其口而百節肥灌其本而枝葉美天地之性也淮南子泰族訓父者子之天也天者父之天也無天而生未之有也春秋繁露順命周之子孫其親等也而文王最先四時等也而春最先十二月等也而正月最先春秋繁露觀徳為人子而不事父者天下莫能以為可今為天之子而不事天何以異是春秋繁露郊祀堂衣若曰吾始以鴻之力今徒翼耳子貢曰非鴻之力安能舉其翼韓詩外傳驕溢之君寡忠口恵之人鮮信故盈把之木無合拱之枝榮澤之水無吞舟之魚根淺則枝葉短本絶則枝葉枯韓詩外傳夫君臣之與百姓轉相為本如循環無端夫子亦云人之行莫大於孝孝行成於内而嘉號布於外是謂建之於本而榮華自茂矣君以臣為本臣以君為本父以子為本子以父為本棄其本者榮華槁矣説苑建夲一室之中必有主道焉父母之謂也故君正則百姓治父母正則子孫孝慈説苑雜言食其口而百節肥灌其本而枝葉茂本傷者枝槁根深者末厚説苑談叢必貴以賤為本必髙以下為基説苑談叢次六滿其倉蕪其田食其實不飬其根測曰滿倉蕪田不能修本也太𤣥經第六失原本者難由流末者易從太𤣥經太𤣥告夫富民者以農桑為本以游業為末百工者以致用為本以巧飾為末商賈者以通貨為本以鬻竒為末三者守本離末則民富離本守末則民貧潜夫論務本教訓者以道義為本以巧辯為末辭語者以信順為本以詭麗為末列士者以孝悌為本以交游為末孝悌者以致飬為本以華觀為末人臣者以忠正為本以媚愛為末五者守本離末則仁義興離本守末則道徳崩慎本畧末猶可也舍本務末則惡矣潜夫論務本言水横流背其源泉則枯竭木去其根株則枝葉不長人背仁義違忠信亦將遇害也王逸註楚辭惜誓江起岷山流為濤瀨相濤瀨之流孰與初起之源王充論衡感類篇夫根抵植則枝葉必相從也蔡中郎集月令問答所謂抱螢燭於環堵之内者不見天光之熀爛侣鮋鰕於跡水之中者不識四海之浩汗重江河之深而不知吐之者崑崙也珍黍稷之收而不覺秀之者豐壤也今茍知推崇儒術而不知成之者由道道也者所以陶冶百民範鑄二儀胞胎萬類醖釀彞倫者也抱朴子内篇明本使親䟱相承尾為身幹枝雖茂而無傷本之憂流雖盛而無背源之勢抱朴子外篇君道影無違形之状名無離實之文故背源之水必不能揚長流以東漸非時之華必不能稽輝藻於氷霜抱朴子外篇博喻桑林鬰藹無補栢木之凄冽膏壤𢃄郭無解黔敖之蒙袂然繭纊綈䊵此之自出千倉萬箱於是乎生故識逺者貴本見近者務末抱朴子外篇博喻芳草春耀不能離柯以乆鮮吞舟之魚不能舍水而攝生是以名美而實不副者必無沒世之風位髙而器不稱者不免致冦之敗抱朴子外篇博喻翣者武所資也戰死則無武翣将安施所愛屨者為足故耳刖者之屨何為愛之無其本者翣屨以足武為本也郭子註荘徳充符祖考之嘉名美譽亦子孫之冕服墻宇也自古及今獲其庇廕者衆矣夫修善立名者亦猶築室樹果生則獲其利死則遺其澤顔氏家訓名實墻大基峻若不終嵗加之版築故有崩墜之憂猶君子之道不隆其本末必危也太𤣥經第四大觧魁者斗之所用盛而杓之本也故言根本者皆云魁前溪書注游俠傳九月豺祭獸正月獺祭魚豺獺猶有所先人而不祭豺獺之不若也揚子法言註孝至篇人禀氣於父母吉凶夭夀非獨在人譬諸草木華葉盛與零落由本根也李善註文選幽通賦水背流而源竭兮木去根而不長補文選賈誼惜逝蓼蟲在蓼則生在芥則死非蓼仁而芥賊失於本不可也意林魏子守母以存其子崇本以舉其末則形名俱有而邪不生大美配天而華不作故母不可逺本不可失道徳經註捨其母而用其子棄其本而適其末名則有所分刑則有所止雖極其大必有不周雖盛其末必有患憂道徳經註本在無為母在無名棄本捨母而適其子功雖大焉必有不濟名雖美焉偽亦必生道徳經註夫根不深則傾危蔕不固則零落只為根深所以長生蔕固所以乆視道徳經註疏卷六備修萬道而不知命之根本根本者如樹木但有繁枝茂葉而無根本不得乆活也飬性延命錄御女損益篇譬如金剛唯從金剛處及金處生非餘寳處生大方廣佛華嚴經卷七十八譬如樹根腐敗則不能生芽葉華果法集經卷六猶如耕田薄地之中下種雖多収實甚少菩薩本行經卷中譬如無牛則無醍醐華手經卷二譬如有種則有華實華手經卷二譬如一切草木叢林依地為根本法集經卷四譬如營田依時作種子若燋終不生芽蘇波呼童子經卷上譬如樓閣中心堅固衆材所依攝受不散雜阿含經卷十譬如農夫宿有二業一田業髙燥肥沃二田業下濕塉薄於春和時等力興功下種應時耘除草穢至秋獲實升斛懸殊中本起經来學品譬如師匠圖作大城當先度量作基趾已乃可起城那先比丘經卷上樹木生以栽為本五榖生以榖為本那先比丘經卷中譬如好樹其華色鮮果實亦美修行道地經慈品譬如蒲萄其子甘故生果亦甘如旃檀樹根華俱香本縁經月光王品譬如面淨故鏡中像亦淨大智度論卷九十二譬如人欲求多收故大用榖子大智度論卷九十四譬如一斤白檀分為多片片片之中香皆似本攝大乗論釋卷二固本苖稍壮毎耨輒附其根比至盛暑壟盡平而根深能風與旱故嶷嶷而盛也春秋正義昭公元年深根者難㧞據固者難遷蜀志譙周傳譬之猶秋蓬也孤其根而美枝葉秋風一至根且抜矣晏子春秋雜上羽翼美者傷其骸骨枝葉茂者害其根荄能兩美者天下無之文子符言夫築垣墉者務其高而不務其實髙不隠仞而基傾之矣子華子晏子置下不安上不可以載累其足也其最髙而不植局者未之有也鶍冠子王鉄夫謀事不竝仁義者後必敗殖不固本而立髙基者後必崩陸子道基必欲尊貴當以下為本基猶築牆造功因卑成髙下不堅固後必傾危河上公註老子法本寄生無根如過浮雲本立不固斯須落去更為枯樹焦氏易林小畜之植根不固華葉落去便為枯樹焦氏易林蹇之鼎大樹百根比與山連焦氏易林萃之大畜初一廓之恢之不正其基測曰廓之恢之始基傾也太𤣥經第四廓次四小螽營營螮音徳其蛡音詡蛡不介在堅螮測曰小蠭營營固其氐也太𤣥經第六堅次五蛡音詡大螮音徳小虚測曰蛡大螮小國虚空也太𤣥經第六堅王何以山河為固也苟無人民之衆則楚之山河其為猿雁之棲乎天禄閣外史時勢夫根荄不洞地而求柯條干雲淵源不泓窈而求湯流里萬者未之有也抱朴子内篇㣲㫖廓大之家其本宜固太𤣥經第四廓解流長則難竭柢深則難朽文選西京賦基廣則難傾根深則難抜理節則不亂膠結則不遷文選干寳晋紀總論君以臣為本以民為根猶室與柱梁相持也梁不强則上下俱亡故蓼蟲在蓼則生在芥則死非蓼仁而芥賊也本不可失也太平御覽䒹茹部蓼譬如枝條風飄即動其根安静枝不離根根不離枝要須得根風飄不動無上内祕蔵經辨四真品譬如因陀羅柱銅鐵作之於深入地中四方猛風不能令動雜阿含經卷十五譬如石柱長十六肘八肘入地四方風吹不能令動雜阿含經卷十五譬如人身無瘡雖臥毒屑中毒亦不入若有小瘡則死大智度論卷三十七受言人之求多聞善敗以鑑戒也今子聞而棄之猶䝉耳也國語楚山川所以宣地氣而出財用口亦以宣人心而言善敗國語解周上厲王虐鑒於水者見面之容鑒於人者知吉與凶史記蔡澤傳貌言華也至言實也苦言藥也甘言疾也史記商君傳自古賢聖樂聞誹謗之言聽輿人之論蒭蕘有可師之事負薪有廊廟之語故也晉書王沈傳大聲不入於里耳折楊皇荂則嗑然而笑是故髙言不止於衆人之心至言不出俗言勝也荘子天地子不聞夫越之流人乎去國數日見其所知而喜去國旬月見所甞見於國中者喜及期年也見似人者而喜矣不亦去人滋乆思人滋深乎夫逃虚空者藜翟柱乎鼪鼬之逕跟位其空聞人足音跫然而喜矣而况乎昆弟親戚之謦欬其側者乎乆矣夫莫以真人之言謦欬吾君之側乎荘子徐無鬼見教一髙言若饑十日而得太牢焉賈子勸學魯哀公為室而大公宣子諫曰室大衆與人處則譁少與人處則悲願公之適公曰寡人聞命矣築室不輟公宣子復見曰國小而室大百姓聞之必怨吾君諸侯聞之必輕吾國魯君曰聞命矣築室不輟公宣子復見曰左昭而右穆為大室以臨二先君之廟得無害於子乎公乃令罷役除版而去之魯君之欲為室誠矣公宣子止之必矣然三説而一聽者其二者非其道也夫臨河而釣日入而不能得一鯈魚者非江河不食也所以餌之者非其欲也及至良工執竿投而擐脣吻者能以其所欲而釣者也淮南子人間訓非其地而樹之不生也非其人而語之弗聽也得其人如聚沙而雨之非其人如聚聾而鼓之説苑雜言江出汶山其源若甕口至楚國其廣十里無他故其下流多也人而好學受規諫宜哉其立也新序雜事四鑒也者可以察形言也者可以知徳小人耻其面之不及子都也君子耻其行之不如堯舜也故小人尚明鑒君子尚至言徐幹中論貴驗世之謂一言之善貴於千金然蓋亦軍國之得失行已之臧否耳至於告人以長生之訣授之以不死之方非特若彼常人之善言則奚徒千金而已乎抱朴子内篇釋滯為衣冠者已手不能製則之越鄉借人以製之至於理身而不知借言以修其行是處其身輕而於冠重不亦謬乎劉子貴言人皆悦鏡之明已形而不慕士之明已心人欲櫛之理其髪不願善言之理其情劉子貴言人目短於自見故借鏡以觀形髪拙於自理必假櫛以脩束心闇於自炤則假言以榮行面之所以形明鏡之力也髪之所以理假櫛之功也行之所以榮善言之益也劉子貴言越劍性鋭必託槌砧以成純鉤楚柘質勁必資榜檠以成弴弓人性雖敏必藉善言以成徳行故槌砧者夷不平也搒檠者矯不正也善言者正不善也劉子貴言君子若能聽言如響從善如流則身安南山徳茂松栢聲振金石名流千載也劉子貴言夫治膏肓者必進苦口之藥决狐疑者必告逆耳之言如其迷謬未知所投恐俞附見其已困扁鵲知其無功也文選孫楚為石仲容作書梁君出獵見白鴈羣下彀弩欲射之道有行者梁君謂行者止行者不止白鴈羣駭梁君怒欲射行者其御公孫龍止之梁君怒曰龍不與其君而顧他人對曰昔宋景公時大旱卜之必以人祠乃雨景公下堂頓首曰吾所以求雨為民也今必使吾以人祠乃雨将自當之言未卒而大雨何也為有徳於天而恵於民也君以白鴈故以欲射殺人主君譬人無異於豺狼也梁君乃與龍上車歸呼萬嵗曰樂哉人獵皆得禽獸吾獵得善言而歸藝文類聚産業部田獵譬目短於自見必借鏡以觀形髪拙於自理必假櫛以自通故面之所以形明鏡之力也髪之所以理𤣥櫛之功也行之所以芳善言之益也是故身之将敗必不納正諫之言命之将終必不可處於良醫也法苑珠林卷四十五改過九四乗其墉弗克攻吉易同人九四乗其墉弗克攻吉象曰乗其墉義弗克也其吉則困而反則也易同人初九屨校滅趾无咎象曰屨校滅趾不行也易噬嗑成人有其兄死而不為衰者聞子臯将為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰禮記檀弓下失道逺者復之亦難杜氏解左傳襄公二十八年君子之過也如日月之食焉過也人皆見之更也人皆仰之論語子張詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺故君子以人治人改而止中庸夫屋漏在上知之在下然迷而知反失道不逺過而能改謂之不過魏志王朗傳厲之人夜半生其子遽取火而視之汲汲然唯恐其似已也荘子天地梟逢鳩鳩曰子将安之梟曰我将東徙鳩曰何故梟曰鄉人皆惡我鳴以故東徙鳩曰子能更鳴可矣不能更鳴東徙猶惡子之聲説苑談叢次七大奢迃自削以觚或益之餔測曰奢迃自削能自非也太𤣥經第四大上九日月之逝改於尸測曰改於尸尚不逺也太𤣥經第六闕君子服過也非徒飾其辭而已誠發乎中心形乎容貌其愛之也深其更之也速如追兎惟恐不逮故有進業無退功徐幹中論貴驗迷乎雲夢者必須指南以知道竝乎滄海者必仰辰極以得返抱朴子外篇嘉遯猶梟鳴狐嚾人皆不喜音響不改易處何益抱朴子外篇彈禰感悟思愆怛若創痏文選嵇康幽憤詩諺曰失晨之雞思補更鳴太平御覧人事部諺下孤犢觸乳驕子罵母乞今自改何氏語林自新譬如有人墮圊厠中從彼得出刮除糞穢淨水洗沐以香塗身著新潔衣如是此人比在厠中猶未得出淨穢香臭相去㡬何此事懸隔無有等倍大乗造像功徳經卷下為惡自更如鋼鑚珠法句經愛身品譬如穢坑臭不可近時有一人悮墮其中臭穢難堪方便得出身既出已即用諸香煑水沐浴復以塗香以塗其身身既香潔又以殊妙迦尸迦衣及珍寳花鬘荘嚴其身大王句王經上前心作惡如雲覆日後心起善如炬消暗法苑珠林卷八十六亦如霜雪待日而除亦如病疾待良藥除亦如迷方待悟而正亦如惡類衆薪悔如巨火須㬰殄滅法苑珠林卷八十六喻林卷四十
