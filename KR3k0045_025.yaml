body:
  text: 喻林卷二十五明徐元太撰人事門遭遇噬膚滅鼻乘剛也易噬嗑綏之則安動之則苦尊之則為將卑之則為虜抗之則在青雲之上抑之則在深泉之下用之則為虎不用則為鼠前漢書東方朔傳愍吾纍之衆芬兮揚煜煜之芳苓遭季夏之凝霜兮慶夭悴而喪榮前漢書揚雄傳上當塗者入青雲失路者委溝渠旦握權則為卿相夕失勢則為匹夫譬若江湖之雀渤澥之鳥乘鴈集不為之多雙鳬飛不為之少前漢書楊雄傳下曩者王塗蕪穢周失其御侯伯方軌戰國橫騖於是七雄虓闞分裂諸夏龍戰而虎爭遊説之徒風揚電激並起而救之其餘猋飛景附煜霅其間者蓋不可勝載當此之時拉朽摩鈍鉛刀皆能一斷前漢書敘傳上方今大漢灑掃羣穢夷險芟荒廓帝紘恢皇綱基隆於羲農規廣於皇唐其君天下也炎之如日威之如神函之如海養之如春是以六合之內莫不同源共流沐浴玄德稟卬太和枝附葉著譬猶草木之植山林鳥魚之育川澤得氣者蕃滋失時者零落參天地而施化豈云人事之厚薄哉前漢書敘傳上當此之時雖下愚之才居之猶能使恩同天地威侔鬼神暴風疾霆不足以方其怒陽春時雨不足以喻其澤周孔數千無所復角其聖賁育百萬無所復奮其勇矣後漢書仲長統列傳廣厦成而茂木暢逺求存而良馬縶後漢書崔駰列傳芳蘭生門不得不鉏蜀志周羣傳雖薄供時用白茅猶為珍冰霜晝夜結蘭桂摧為薪晉書樂下不幸橫陷此中自不能拔腳於風塵之外晉書庾亮傳偉哉橫海鱗壯矣垂天翼一旦失風水翻為螻蟻食宋書謝晦傳良寶遇拙則竒文不顯逹士逢讒則英才滅耀故墜葉垂蔭明月為之隔輝堂宇留光蘭燈有時不照南齊書劉祥傳希世之寶違時則賤偉俗之器無聖必淪故鳴玉黜於楚岫章甫窮於越人南齊書劉祥傳俱沐溫光獨酸霜露南齊書何昌寓傳由斯言之非兩漢棟梁之所育近代薪樗之所産哉蓋好尚之道殊遭遇之時異也周書史臣儒林傳夫謀莫難於必聽事莫難於必成成必合於數聽必合於情故抱薪加火爍者必先燃平地注水濕者必先濡鄧析子轉辭楊布問曰有人於此年兄弟也言兄弟也才兄弟也貌兄弟也而壽夭父子也貴賤父子也名譽父子也愛憎父子也吾惑之列子力命宋有蘭子者以技干宋元宋元召而使見其技以雙枝長倍其身屬其脛並趨並馳弄七劒迷而躍之五劒常在空中元君大驚立賜金帛又有蘭子又能燕戲者聞之復以干元君元君大怒曰昔有異技干寡人者技無庸適值寡人有歡心故賜金帛彼心聞此而進復望吾賞拘而擬戮之經月乃放列子説符魯施氏有二子其一好學其一好兵好學者以術干齊侯齊侯納之為諸公子之傅好兵者之楚以法干楚王王悅之以為軍正祿富其家爵榮其親施氏之鄰人孟氏同有二子所業亦同而窘於貧羡施氏之有因從請進趨之方二子以實告孟氏孟氏之一子之秦以術干秦王秦王曰當今諸侯力爭所務兵食而已若用仁義治吾國是滅亡之道遂宫而放之其一子之衛以法干衛侯衛侯曰吾弱國也而攝乎大國之間大國吾事之小國吾撫之是求安之道若賴兵權滅亡可待矣若全而歸之適於他國為吾之患不輕矣遂刖之而還諸魯既反孟氏之父子叩胸而讓施氏施氏曰凡得時者昌失時者亡子道與吾同而功與吾異失時者也非行之繆也且天下理無常是事無常非先日所用今或棄之今之所棄後或用之此用與不用無定是非也投隙抵時應事無方屬乎智智茍不足使君博如孔丘術如吕尚焉往而不窮哉孟氏父子舍然無愠容曰吾知之矣列子説符人有見宋王者賜車十乘以其十乘驕稚莊子莊子曰河上有家貧恃緯蕭而食者其子沒於淵得千金之珠其父謂其子曰取石來煆之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也使驪龍而悟子尚奚微之有哉今宋國之深非直九重之淵也宋王之猛非直驪龍也子能得車者必遭其睡也使宋王而寤子為虀粉矣莊子列禦冦楚人和氏得玉璞楚山中奉而獻之厲王厲王使玉人相之玉人曰石也王以和為誑而刖其左足及厲王薨武王即位和又奉其璞而獻之武王武王使玉人相之又曰石也王又以和為誑而刖其右足武王薨文王即位和乃抱其璞而哭於楚山之下三日三夜泣盡而繼之以血王聞之使人問其故曰天下之刖者多矣子奚哭之悲也和曰吾非悲刖也悲夫寶玉而題之以石貞士而名之以誑此吾所以悲也王乃使玉人理其璞而得寶焉遂命曰和氏之璧韓非子和氏凡能聽説者必逹乎論議者也世主之能識論議者寡所遇惡得不茍凡能聽音者必逹於五聲人之能知五聲者寡所善惡得不茍客有以吹籟見越王者羽角宫徴啇不謬越王不善為野音而反善之説之道亦有如此者也吕氏春秋遇合人有大臭者其親戚兄弟妻妾知識無能與居者自苦而居海上海上人有説其臭者晝夜隨之而弗能去説亦有若此者吕氏春秋遇合夫楩柟豫章天下之名木生於深山之中産於溪谷之傍立則為太山衆木之宗仆則為萬世之用浮於山水之流出於冥冥之野因江河之道而逹於京師之下因於斧斤之功舒其文彩之好精捍直理密緻博通蟲蝎不能穿水濕不能傷在高柔軟入地堅強無膏澤而光潤生不尅畫而文章成上為帝王之御物下則賜公卿庶賤不得以備器械間絶以關梁及隘於山阪之阻隔於九坑之隄仆於巍崔之山頓於窅冥之溪樹蒙籠蔓延而無間石崔巍嶄岩而不開廣者無舟車之通狹者無步擔之蹊啇賈所不至工匠所不窺知者所不見見者所不知功棄而德亡腐朽而枯傷轉於百仞之壑惕然而獨僵當斯之時不如道傍之枯楊𡻭𡻭詰屈委曲不同然生於大都之廣地近於大匠之名工則材器制斫規矩度量堅者補朽短者續長大者治罈小者治觴飾以丹漆斁以明光上備大牢春秋禮庠褒以文彩立禮矜莊冠帶正容對酒行觴卿士列位布陳宫堂望之者目眩近之者鼻芳故事閉之則絶吹之則通抑之則沈興之則揚處地楩梓賤於枯楊德美非不相絶也才力非不相懸也彼則枯稿而遠棄此則為宗廟之器者通與不通亦如是也陸子資質夫厯陽之都一夕反而為湖勇力聖知與罷怯不肖者同命巫山之上順風縱火膏夏紫芝與蕭艾俱死故河魚不得明目稚稼不歸育時其所生者然也故世治則愚者不得獨亂世亂則智者不能獨治身蹈於濁世之中而責道之不行也是猶兩絆騏驎而求其致千里也置猿檻中則與豚同非不巧睫也無所肆其能也舜之耕陶也不能利其里南面王則德施乎四海仁非能益也處便而勢利也淮南子俶真訓世無災害雖神無所施其德上下和輯雖賢無所立其功淮南子本經訓夫戟者所以攻城也鏡者所以照形也宫人得戟則以刈葵盲者得鏡則以蓋巵不知所施之也故善鄙不同誹譽在俗趨舍不同逆順在時淮南子人間訓夫項槖七嵗為孔子師孔子有以聽其言也以年之少為閭丈人説救敲不給何道之能明也淮南子修務訓孟子説齊宣王而不説淳于髠侍孟子曰今日説公之君公之君不説意者其未知善之為善乎淳于髠曰夫子亦誠無善耳昔者匏巴鼓瑟而濳魚出聽伯牙鼓琴而六馬仰秣魚馬猶知善之為善而况君人者也孟子曰夫電雷之起也破竹折木震驚天下而不能使聾者卒有聞日月之明遍照天下而不能使肓者卒有見今公之君若此也淳于髠曰不然昔者揖封生高啇齊人好歌杞梁之妻悲哭而人稱詠夫聲無細而不聞行無隱而不形夫子茍賢居魯而魯國之削何也孟子曰不用賢削何有也吞舟之魚不居潛澤度量之士不居汙世夫藝冬至必雕吾亦時矣詩曰不自我先不自我後非遭雕世者歟韓詩外傳夫驥之才千里非造父不能使禹之知萬人非舜為相不能用鹽鐵論利議故事人加則為宗廟器否則厮養之舋木于越之鋌不礪匹夫賤之工人施巧人主服而朝也鹽鐵論殊路方李斯在荀卿之門闒茸與之齊軫及其奮翼高舉龍升驥騖過九軼二翶翔萬仞鴻鵠驊騮且同侣况跛牂燕雀之屬乎鹽鐵論毁學綿綿之葛在於曠野良工得之以為絺紵良工不得枯死於野此七士者不遇明君聖主幾行乞丏枯死於中野譬猶綿綿之葛矣説苑尊賢霜降閉户蟄蟲隱處不見日月與死為伍焦氏易林坤之需典册法書藏在蘭臺雖遭亂潰獨不遇災焦氏易林坤之大畜秋花冬萼數被嚴霜甲兵當庭萬物不生焦氏易林小畜之蹇夏麥麩麯霜擊其芒焦氏易林泰之賁白鶴銜珠夜室反明懷我德音身受光榮焦氏易林謙之泰鸇鳩徙來西至平州遭逢雷雹損我葦蘆焦氏易林謙之革探鷇得螽所願不喜焦氏易林觀之復秋隼冬翔數被嚴霜焦氏易林賁之隨捕魚遇蟹利得無幾焦氏易林旡妄之歸妹三鴈俱飛避暑就涼適與矰遇為繳所傷焦氏易林頥之屯膠車駕東與雨相逢焦氏易林大過之蠱車行千里塗不汚輪焦氏易林坎之履風塵坎坷不見南北行迷失利復反其室焦氏易林坎之咸雲夢苑囿萬物蕃熾犀象玳瑁荆人以富焦氏易林遁之涣登危入厄四時變易春霜夏雪物皆凋落焦氏易林萃之明夷駕福乘喜東至嘉國焦氏易林解之睽蛇得澤草不憂危殆焦氏易林涣之坤次五田遇禽人莫之禁測曰田遇禽誠可勉也太玄經第四遇治世則陽明開而小人為泥沙亂世則陰濁濫而君子為魚肉天祿閣外史黨錮夫貧賤者士之素也用之則為春陽不用則為秋陰逹則萬鍾而不加喜窮則一瓢而不加憂故仲尼聖矣不能為夷吾之霸齊孟軻賢矣不能為子産之興鄭何則遇與不遇耳天祿閣外史待樵子徒知曲竹之可規而烏知曲棟不可以使之直乎知曲世之可規而不知曲主不可使之庭乎鷹隼為鳳狐狸為麟葭菼為蘜蒺藜為蘭故賢士之處世明主求焉常主忽焉是故放勳以之讓后羿以之棄高宗以之夢帝莘以之剖周公以之握穆公以之殉句踐以之謀祖龍以之坑由此觀之賢士之顯戮時也故負鼎而干湯伊尹不知其為顯及授之以阿衡而伐夏則顯矣歷説十二諸侯孔子不知其為戮及絶糧而削迹行不稅冕則戮矣天祿閣外史去就物以春生人保之以秋成人必不能保之卒然牛馬踐根刀鎌割莖生者不育至秋不成不成之類遇害不遂不得生也夫鼠涉飯中捐而不食捐飯之味與彼不汙者鈞以鼠為害棄而不御君子之纍害與彼不育之物不御之飯同一實也俱由外來故為纍害王充論衡纍害篇高鳥死良弓藏狡兔得良犬烹權詐之臣高鳥之弓狡兔之犬也安平身無宜則弓藏而犬烹安平之主非棄臣而賤士世所用助上者非其宜也王充論衡定賢篇螢火之明掩於日月之光忠臣之聲蔽於賢君之名王充論衡定賢篇馬圄之説無方而野人説之子貢之説有義野人不聽吹籟工為善聲因越王不喜更為野聲越王大説故為善於不欲得善之主雖善不見愛為不善於欲得不善之主雖不善不見憎王充論衡逢遇篇或無伎妄以姦巧合上志亦有以遇者竊簪之臣雞鳴之客是竊簪之臣親於子反雞鳴之客幸於孟嘗子反好偷臣孟嘗愛偽客也以有補於人君人君賴之其遇固宜或無補益為上所好籍孺鄧通是也籍孺幸於孝惠鄧通愛於孝文無細簡之才微薄之能偶以形佳骨􅈺皮媚色稱夫好容人所好也其遇固宜或以醜面惡色稱媚於上嫫母無鹽是也嫫母進於黃帝無鹽納於齊王故賢不肖可豫知遇難先圖王充論衡逢遇篇商鞅三説秦孝公前二説不聽後一説用者前二帝王之論後一霸者之議也夫持帝王之論説霸者之主雖精見距更調霸説雖粗見受何則精遇孝公所不得粗遇孝公所欲行也王充論衡逢遇篇處尊居顯未必賢遇也位卑在下未必愚不遇也故遇或抱汙行尊於桀之朝不遇或持潔節卑於堯之廷王充論衡逢遇篇昔周人有仕數不遇年老白首泣涕於塗者人或問之何為泣乎對曰吾仕數不遇自傷年老失時是以泣也人曰仕奈何不一遇也對曰吾年少之時學為文文德成就始欲仕宦人君好用老用老主亡後主又用武吾更為武武節始就武主又亡少主始立好用少年吾年又老是以未嘗一遇仕宦有時不可求也王充論衡逢遇篇進能有益納説有補人之所知也或以不補而得祐或以有益而獲罪且夏時罏以炙濕冬時扇以翣火世可希主不可準也説可轉能不可易也王充論衡逢遇篇蜘蛛結網蜚蟲過之或脫或獲獵者張羅百獸羣擾或得或失漁者罾江湖之魚或存或亡或姦盜大辟而不知或罰贖小罪而發覺災氣加人亦此類也王充論衡幸偶篇德令降於殿堂命長之囚出於牢中天非為囚未當死使聖王出德令也聖王適下赦拘囚適當免死猶人以夜臥晝起矣夜月光盡不可以作人力亦倦欲一休息晝日光明人臥亦覺力亦復足非天以日作之以夜息之也作與日相應息與夜相得也王充論衡偶會篇使火燃以水沃之可謂水賊火火適自滅水適自覆兩名各自敗不為相賊今男女之早夭非水沃火之比適自滅覆之類也王充論衡偶會篇長巨之物強力之人乃能舉之重任之車強力之牛乃能挽之是任車上阪強牛引前力人推後乃能升踰如牛羸人罷任車退却還墮坑谷有破覆之敗矣文儒懷先王之道含百家之言其難推引非徒任車之重也薦致之者罷羸無力遂却退竄於巖穴矣王充論衡效力篇長數仞之竹大連抱之木工技之人裁而用之或成器而見舉持或遺材而遭廢棄非工技之人有愛憎也刀斧如有偶然也蒸榖為飯釀飯為酒酒之成也甘苦異味飯之熟也剛柔殊和非庖厨酒人有意異也手指之調有偶適也調飯也殊筐而居甘酒也異器而處蟲墮一器酒棄不飲鼠涉一筐飯捐不食夫百草之類皆有補益遭醫人采掇成為良藥或遺枯澤為火所爍等之金也或為劒戟或為鋒銛同之木也或梁於宫或柱於橋俱之火也或爍脂燭或燔枯草均之土也或基殿堂或塗軒戶皆之水也或溉鼎釡或澡腐臭物善惡同遭為人用其不幸偶猶可傷痛况含精氣之徒乎王充論衡命義篇厯陽之都長平之坑其中必有命善祿盛之人一宿同填而有遭逢之禍大命善祿盛不能郤也譬猶水火相更也水盛勝火火盛勝水遇其主而用也王充論衡命義篇夫能知之也凡石生光氣不知之也金玉無潤色王克論衡别通篇春物之傷或殘之也殘物不傷秋亦大長王充論衡書解篇譬猶田獵所經而有遺禽脫獸大火既過時餘不燼草木也抱朴子內篇道意譬猶金石之銷於罏冶瓦器之甄於陶竈雖由之以成形而銅鐵之利鈍罌甕之邪正適遇所遭非復罏竈之事也抱朴子內篇塞難孤貧而精六藝者以遊夏之資而抑頓乎九泉之下因風而附鳳翼者以駑庸之資猶回遑乎霞霄之表抱朴子外篇勗學若夫美玉不出重岫良弓不鑿百札驥騄不服朱軒命世不履爵勢則孰知其能攄符彩之耀曄頓雲禽於千仞騁逸迹以追風康庶績於百揆乎夫其不遇亦得不雜糅於瓦石鈞賤於朽木列鑣於下乘等望於凡瑣哉枹朴子外篇名實非分之逹猶林卉之冬華也守道之窮猶竹柏之履霜也抱朴子外篇廣譬虎豹不能摶噬於波濤之中螣蛇不能登凌於不霧之日擊雉兔則鸞鳳不及鷹鷂引耕犂則龍鱗不逮雙牸故武夫勇士無用乎晏如之世碩生逸才不貴乎力競之運抱朴子外篇博喻騄駬之騁逸迹由造父之御也禹稷之序百揆遭唐虞之主也故能不勞而千里至揖讓而頌聲作若乃臧獲之乘驌騻殷辛之臨三仁欲長驅輕騖則轡急轅逼欲盡規竭忠則禍如發機所以車傾於險塗國覆而不振也故良駿敗於拙御智士躓於暗世仲尼不能止魯侯之出晏嬰不能遏崔杼之亂其才則是主則非也抱朴子外篇官理沈閭渟釣精徑之良也而不以擊則朝菌不能斷焉珧華黎緑連城之寶也委之泥濘則瓦礫積其上焉故可珍而不必見珍也可用而不必見用也抱朴子外篇窮逹晝競羲和之末景夕照望舒之餘耀抱朴子外篇任命田蕪廪虛皆由有君夫君非塞田之蔓草臣非耗倉之雀鼠也其蕪其虛卒由厄運水旱疫癘以臻凶荒抱朴子外篇詰鮑種桑長江邉三年望當採枝條始欲茂忽值山河改柯葉自摧折根株浮滄海春蠶既無食寒衣欲誰待本不植高原今日復何悔陶靖節集詩五言然將相以位隆特逹文士以職卑多誚此江河所以騰湧涓流所以寸析者也文心雕龍程器榮凋有命困過有期故春蘂雖茂假朝露而抽翠秋葉誠危因微風而飄零劉子言苑星著天而後天下見王陽貢禹時主所揚而後名顯也仲元雖有賢德而時不高之故不彰楊子法言注淵騫篇浮雲之馳奄忽相踰飄颻不定逮乎因風波蕩各在天之一隅以喻人之客遊飛薄亦爾李善注文選李少卿與蘇武詩明君時有蔽壅喻利眼臨雲而息照俊乂待時而屢歎喻明玉蒙垢而掩輝李善注文選陸士衡演連珠權假日以餘榮比朝華而菴藹文選魏都賦昔騄驥倚輈於吳阪長鳴於良樂知與不知也百里奚愚於虞而智於秦遇與不遇也文選劉琨答盧諶詩序頴苕皆草木也生潛隱之處則怨青陽之不至生陵阜之上則哀素秋之早及文選郭璞遊仙詩注昔為匣中玉今為糞上英文選石崇王明君辭夫虎嘯風馳龍興雲屬故重華立而元凱升辛受生而飛廉進文選劉峻辨命論火炎崑岡爍石與琬琰俱焚嚴霜夜零蕭艾與芝蘭共盡雖遊夏之英才伊顔之殆庶焉能抗之哉文選劉峻辨命論張良受黃石之符誦三略之説以遊於羣雄其言也如以水投石莫之受也及其遭漢祖也其言也如以石投水莫之逆也文選李康運命論蚓蛾以不才陸稿蠎蛇以騰騖暴鱗連城之寶藏於褐裏三秀雖艷糜於麗采香惡乎芬賈惡乎在補文選郭璞客傲顧兹蓬蔚厠根蘭陂膏澤雖均華不足披逮春不茂未秋先萎廣文選潘正叔陸士衡詩芝蘭蕭艾之秋形殊而並悴羽毛鱗介之怨聲異而俱哀藝文類聚人部懷舊銘不見巫山火芝艾豈相離藝文類聚人部隱逸上詩當其潛光荆野抱璞未理衆視之以為石獨見知於卞子矌千載以遐棄倐一旦而見齒為有國之偉寶禮神祇於明祀豈連城之足云嘉遭遇乎知己藝文類聚寶玉部玉賦寒蟲夕呌含輕重而同悲秋葉晚傷雜黃紫而俱墜藝文類聚人部言志書氣氤桃李花青跗含素萼既為風所開復為風所落文苑英華沈約天部六詩不見高巔樹摧抗下為薪豈甘一作目覩井中泥時至出作塵文苑英華劉孝威樂府十九詩松生數寸時遂為草所沒未見籠雲心誰知負霜骨弱幹可摧殘纖莖易凌忽何當數千尺為君覆明月文苑英華吳均寄贈一詩河津一名龍門水陸不通魚鱉之屬莫能上海大魚薄集龍門下數千不得上上則為龍太平御覽居處部門田者命懸於天也人力雖修水旱不時則一年功棄矣太平御覽資産部田銅俱出於石為鈴則小鑄鐘則大絲俱生於蠶為繪則賤為錦則貴太平御覽珍寶部銅在物莫尚於珠玉珠玉不覩王公則不為寶太平御覽珍寶部珠下不謂夷之初旦明而未融虹霓揚輝棄和取同何氏語林識鑒范曄後漢書譬如池水蓮花中生開敷鮮榮甚可愛樂遇天霜雹悉皆毁壞海空智藏經持誡品猶如盲龜值大浮木元陽妙經卷八物有先貴後賤先富後貧猶如朱夏赫曦玄冬凛冽天既炎涼不定人亦貴賤何常道德經注疏卷三如有病者乃假醫藥若無其疾醫藥無用波羅蜜多經卷五百六十六若如彼陶家埏埴作瓦器或盛甘露蜜或受酪酥食計泥本一等為器各别異所受又不同因盛而立名法華經卷三或有時溝澗暴雨溢滿流疾趣下聲震四逺彼岸人唤此不聞聲此間人唤彼不聞聲或時溝澗水盡無餘出矅經一無常品昔有羣賊共行劫盜多取財物即共分之等以為分唯有鹿野欽婆羅色不純好以為下分與最劣者下劣者得之恚恨謂呼大失至城賣之諸貴長者多與其價一人所得倍於衆伴百喻經卷昔有導師入海採寶時有五百人追之共行導師謂曰海中有五難一者激流二者洄波三者大魚四者女鬼五者醉果能度此難乃可共行衆人要訖乘風入海到寶渚各行採寶一人不勝果香食之一醉七日衆人寶足帆風已到欲嚴還出鳴鼓集人一人不滿四布求之見卧樹下醉未曾醒共扶來還折樹枝柱之共歸還國家門聞喜悉來迎逆醉者見無所得獨甚愁戚醉人不樂拄杖入市市人求價乃至二萬兩金其人與之問杖有何德曰此為樹寶搗燒此杖熏諸瓦石悉成珍寶衆經撰雜譬喻經譬如大赦及者得脫不及者則不蒙大智度論卷八十八如壞軍得值大將則活遇小兵則死大智度論卷十五奮激今寡人念吳猶躃者不忘走盲者不忘視吳越春秋句踐歸國外傳水不激不能破舟矢不激不能飲羽後漢書馮衍傳注天生少為隊將十人同火屋後有一大坑廣二丈餘十人共跳之皆渡唯天生墜坑天生乃取實中苦竹剡其端使利交橫布坑內更呼等類共跳並畏懼不敢天生曰我向已不渡今者必墜此坑中丈夫跳此不渡亦何須活乃復跳之往反十餘曾無留礙衆並歎服宋書孝義卜天與傳人仕宦不出當入不入當出安能長居戶限上南史劉穆之傳駛雪多積荒城之隈急風好起沙河之上克己類出甕牗之氓決命必在吞氣之士何者寒荒之地風雪之所積慷慨之懷忠義之所聚劉子激通平原五逹易行之衢也孤峯九折難陟之徑也從高越下駑馬之步也騰峭登危飛鼯之足也以險而陟然後為貴以難而升所以為賢劉子激通衝颷之激則折木湍波之湧必漂石風之體虛水之性弱而能披堅木轉重石者激勢之所成也劉子激通楩柟鬱蹙以成縟錦之瘤蚌蛤結疴以銜明月之珠鳥飛則能翔青雲之際矢驚則能踰白雪之嶺斯皆仍瘁以成明文之珍因激以致高逺之勢劉子激通夫雷霆必發而潛底震動枹鼓鏗鏘而介士奮竦故物不震不發士不激不勇文選王褒四子講德論越王思報吳冬則抱氷夏則握火藝文類聚火部火王彥深不為羣從所禮常懷恥慨欲以將領自奮每撫刀曰龍泉太阿汝知我者何氏語林言志利之所激深宫之女皆儀秦也困學紀聞卷十諸子昔有二人各畜力牛一人自誇欲得與彼牛角力若不如者要金錢五百試牛並耕一牛力實勝之其牛主罵曰弊牛努力牛聞其罵即便卧地輸金錢五百枚復至後日主責牛曰名汝為快牛乃使我失錢令我慚愧牛報其主曰更可試之當盡我力當還倍得彼錢即復更耕如牛所言倍得彼錢出曜經七口品昔有人捕得大象繫以鐵鎖屬王波斯匿閉在華堂繫絆不與食猶暴難禁制是時王家更被暴象皆著器仗有所征伐夫戰象法有所攻伐必同聲唤時彼繫象聞知有外來寇侵境者象懷瞋恚頓鎖自擲踏壞華堂馳走東西命敵而行出曜經五無放逸品之餘喻林卷二十五
