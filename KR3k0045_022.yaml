body:
  text: 喻林卷二十二明徐元太撰人事門二十審勢九四或躍在淵无咎易乾若夫疾病尚輕有可生之道則醫之治也用心鋭扁鵲之療太子知其必可生也疾病已重有将死之勢則醫之治也用心緩秦和之視平公知其不可為也毛詩正義關雎如川之滿不可游也鄭方有罪不可救也左傳哀公九年似樹木知其根本之弱不能生長枝葉以喻所立之人材力劣弱不能保有邦國蕃育子孫則不須自强立之春秋正義莊公六年鄭𤣥云斬而復生曰肄杞是夏後滅而復存猶木之枿生小栽也春秋正義襄公二十九年萬室之國一人陶則可乎曰不可器不足用也孟子告子下馬服君曰夫吳干之劒肉試則斷牛馬金試則截盤匜薄之柱上而擊之則折為三質之石上而撃之則碎為百今以三萬之衆而應强國之兵是薄柱擊石之謂也且夫吳干之劍材難夫無脊之厚而鋒不入無脾之薄而刃不斷兼有是兩者無鉤竿鐔蒙須之便操其刃而刺則未入而手斷君無十餘二十萬之衆而為此鉤竿鐔蒙須之便而徒以三萬行於天下君焉能乎戰國䇿趙惠文王今謂馬多力則有矣若曰勝千鈞則不然者何也夫千鈞非馬之任也今謂楚强大則有矣若越趙魏而鬬兵於燕則豈楚之任也哉戰國䇿楚考烈王諸侯之不可一猶連雞之不能俱止於棲亦明矣戰國䇿秦惠文君搏牛之蝱不可以破蟣蝨史記項羽紀猶饑者甘糟糠穰歲餘粱肉何則有亡之勢異也前漢書循吏傳猛虎處深山百獸震恐及其在穽檻之中揺尾而求食積威約之漸也前漢書司馬遷傳獨不見夫翠虯降螭之将登虖天必聳身於蒼梧之淵不階浮雲翼疾風虛舉而上升則不能橶膠葛騰九閎日月之經不千里則不能燭六合燿八紘太山之髙不嶕嶢則不能浡滃雲而散歊烝前漢書揚雄傳下統之方軌易因險塗難御後漢書鄧張烈傳論九河盈溢非一凷所防帶甲百萬非一勇所抗後漢書蔡邕列傳今之事勢義無旋踵騎猛獸安可中下哉晉書温傳今猶乘龍上天豈可中下晉書吕光記天下重器也一安不可卒危一危亦不可卒安宋書王僧達傳譬諸蛟龍安可借以雲雨北齊書慕容紹宗傳啜羮者熱則置之天子之威欲相挫邪北史趙綽傳武矦問曰若敵衆我寡為之奈何起對曰避之於易邀之於阨故曰以一撃十莫善於阨以十撃百莫善於險以千擊萬莫善於阻今有少卒卒起擊金鳴鼔於阨路雖有大衆莫不驚動故曰用衆者務易用少者務隘吳子應變今能同算均而彼富我貧能不怨則美矣雖怨無所非也才鈞智同而彼貴我賤能不怨則美矣雖怨無所非也其敝在於不知乘權藉勢之異而雖曰智能之同是不達之過尹文子大道下王獨不見夫騰猿乎其得柟梓豫章也攬蔓其枝而王長其間雖羿逢蒙不能眄睨也及其得柘棘枳枸之間也危行側視振動悼懆此筋骨非有加急而不柔也處勢不便未足以逞其能也今處昏上亂相之間而欲無憊奚可得邪莊子山木其勢難匿者雖妬不爲非焉故先王貴勢商子禁使辨説之道其猶張弓髙者抑之下者舉之故羸微為仇從而解之强者為郄從而鬬之也鬼谷子本經隂符權之所以知其輕重量之所以知其長短輕重既分長短既形乃施隱括以輔其曲直鬼谷子飛箝註堂上不糞則郊草不瞻曠芸白刃捍乎胷則目不見流矢㧞㦸加乎首則十指不辭斷非不以此為務也疾養緩急之有相先者也養與癢同荀子彊國夫貪盜不赴谿而掇金赴谿而掇金則身不全賁育不量敵則無勇名盜跖不計可則利不成韓非子守道長袖善舞多錢善賈此言多資之易為工也故治强易為謀弱亂難為計故用於秦者十變而謀希失用於燕者一變而計希得非用於秦者必智用於燕者必愚也蓋治亂之資異也韓非子五蠧今以木擊木則拌以水投水則散以氷投氷則沉以塗投塗則䧟此疾除先後之勢也吕氏春秋論威吞舟之魚陸處則不勝螻蟻權鈞則不能相使勢等則不能相併治亂齊則不能相正故小大輕重少多治亂不可不察此禍福之門也吕氏春秋慎勢夫鴟目大而眎不若鼠蚈足衆而走不若蛇物固有大不若小衆不若少者及至夫彊之弱弱之彊危之安存之亡也非聖人孰能觀之淮南子汜論訓王子慶忌足躡麋鹿手搏兕虎置之㝠室之中不能搏龜鼈勢不便也淮南子説林訓今有六尺之席卧而越之下材弗難植而踰之上材弗易勢施異也淮南子説林訓孟賁探鼠穴鼠無時死必噬其指失其勢淮南子説林訓皮将弗覩毛将何顧淮南子説林訓昌羊去蚤蝨而人弗痒者為其來蛉窮也狸執鼠而不可脱於庭者為搏雞也故事有利於小而害於大得於此而忘於彼者故行棊者或食兩而路窮或予踦而取勝淮南子泰族訓吞舟之魚蕩而失水制於螻蟻者離其居也猿㺅失木禽於狐貉者非其處也騰蛇遊霧而升騰龍乘雲而舉猿得木而挺魚得水而鶩處地宜也説苑談叢麋鹿成羣虎豹避之飛鳥成列鷹鷙不擊衆人成聚聖人不犯説苑雜言子獨不見夫𤣥蝯乎當其居桂林之中峻葉之上從容游戲超騰徃來龍興而鳥集悲嘯長吟當此之時雖羿逢蒙不得正目而視也及其在枳棘之中也恐懼而掉慄危視而蹟行衆人皆得意焉此皮筋非加急而體益短也處勢不便故也夫處勢不便豈可以量功校能哉新序雜事五夫衝風之衰也不能起毛羽强弩之末力不能入魯縞盛之有衰也猶朝之必暮也新序善謀十天災所遊凶不可居轉徙獲福畱止憂危焦氏易林大有之艮隂滛不止白馬為海澤臯之子就髙而處焦氏易林臨之節鼎易其耳熱不可舉焦氏易林觀之中孚懐璧越鄉不可逺行焦氏易林賁之巽千雀萬鳩與鷂為仇威勢不敵雖衆無益焦氏易林无妄之明夷東山西陵髙峻難升焦氏易林大畜之噬嗑利在北陸寒苦難得焦氏易林大過之震上九斧刃缺其柯折可以止不可以伐徃血測曰刃缺柯折将不足徃也太𤣥經第三衆夫富貴則人爭歸之貧賤則人爭去之此物之必至而理之固然也願君勿怨請以市論朝而盈焉夕而虛焉非朝愛之而夕憎之也求在故徃亡故去風俗通窮論角智者皆窮角力者皆負形不堪復伉埶不足復校乃始羈首係頸就我之銜紲耳昌言理亂篇使三軍持木杖匹夫持一刃伸力角氣匹夫必死金性勝木然而木勝金負者木多而金寡也積金如山燃一炭火以燔爍之金必不消非失五行之道金多火少小大不鈞也王充論衡譋時篇兒之始生也手足俱成手不能搏足不能蹶者氣適凝成未能堅彊也王充論衡論死篇水能勝火豈一升之水灌一林之火哉柴也愚何嘗自投於井徐幹中論智行辟險尚逺趣時貴近比復好先乾壯惡首明夷務闇豐尚光大周易畧例明卦若乃髙巖将霣非細縷所綴龍門沸騰非掬壤所遏則不茍且於乾没不投險於僥倖矣抱朴子外篇良規如騏驥之伏於鹽車𤣥猿之束於籠圈非無千里之駛萬仞之㨗然而不異羸鈍者無所肆其巧也劉子通塞庶人因沃瘠而勞逸殊王者亦因險易而强弱異也李善註文選西京賦夫伐深根者難為功摧枯朽者易為力理勢然也文選曹冏六代論然一旅之衆不足以揚名歩武之間不足以騁跡若不改轍易御将何以效其力哉今處此而求大功猶絆良驥之足而責以千里之任檻猿㺅之勢而望其巧㨗之能也文選吳質答東阿王書陸田者命懸於天人力雖修水旱不時則一年之功棄矣水田制之由人人力茍修則地利可盡意林物理論纏牽以長望千里而成累空輪易騁觸三尺而不登茍曰違方難用適逺藝文類聚職官部大尉表勢之所歸威之所假必能繋風捕影㬥虎憑河是以輕則鴻毛沉水重則磐石陵波文苑英華庾信連珠魯連先生見孟嘗君於店堂之門孟嘗君曰吾聞先生有勢數可得聞乎連曰勢數者譬若門關舉之以便則可以一指持中而舉之非便則兩手不舉關非益加重手非加罷也彼所起者非舉勢也彼可舉然後舉之所謂勢數太平御覽居虎部關堯入百仞之谿則不照三里非明闇位卑勢下故也桀紂昇百丈之陵能見四海非照明位髙勢尊故也太平御覽地部陵見未能髙飛者借其羽毛知逸勢冲天者剪其翅翮何氏語林言語欲療病先察其源先候病機五臓未虛六腑未竭血脉未亂精神未散服藥必活若病已成可得半愈病勢已過命将難全本草一卷黄帝問曰醫之治病也一病而治各不同皆愈何也岐伯對曰地勢使然也故東方之域天地之所始生也其病皆為癰瘍其治宜砭石故砭石者亦從東方來西方者金玉之域沙石之處天地之所收引也其病生於内其治宜毒藥故毒藥者亦從西方來北方者天地所閉蔵之域也藏寒生滿病其治宜炙焫故炙焫者亦從北方來南方者天地所長養陽之所盛處也其病攣痺其治宜微鍼故九鍼者亦從南方來中央者其地平以濕天地所以生萬物也衆其病多痿厥寒熱其治宜導引按蹻故導引按蹻者亦從中央出也故聖人雜合以治各得其所宜黄帝素問内經異法方宜論帝曰痺其時有死者或疼久者或易已者其故何也岐伯曰其入藏者死其畱連筋骨間者疼久其畱皮膚間者易已黄帝素問内經痺論拘於鬼神者不可與言至徳惡於鍼石者不可與言至巧病不許治者病必不治治之無功矣黄帝素問内經五蔵别論凡治病察其形氣色澤脉之盛衰病之新故乃治之無後其時形氣相得謂之可治色澤以浮謂之易已脉從四時謂之可治脉弱以滑是有胃氣命曰易治取之以時黄帝素問内經玉機真蔵論今夫五藏之有疾也譬猶刺也猶汚也猶結也猶閇也刺雖久猶可拔也汚雖久猶可雪也結雖久猶可解也閇雖久猶可決也或言久疾之不可取者非其説也夫善用鍼者取其疾也猶拔刺也猶雪汚也猶解結也猶決閇也疾雖久猶可畢也言不可治者未得其術也黄帝素問靈樞經九鉞十二原病九日者三刺而已病一月者十刺而已多少逺近以此衷之黄帝素問靈樞經夀夭剛柔形先病而未入蔵者刺之半其日蔵先病而形乃應者刺之倍其日黄帝素問靈樞經夀夭剛柔譬如有人欲見大海稍稍前行若見樹若樹相若見山若山相當知是中去海尚逺若不見樹無樹相不見山無山相當知大海去是不逺大海深故無有山樹是人雖不見海知必近之小品波羅蜜經卷四譬如二人欲過猛火其一人者着金剛鎧即能過之其一人者身被乾草為火所焚何以故草則易燒金則堅故大方等大集經卷十一譬如金鎚安置火中善作罏豪融銷鍊治熾然毒熱又如鐡丸新從火出炎赫熾然有智之人不應執觸何以故鐡流金熾觸則燒然故大集賢護經卷三譬如醫師知風痰熱等發起所由亦知有藥對治此病有人爽健身無疾病如此之人須師治不文殊師利問經卷下如人病重不可療治醫即捨去不與少藥文殊師利問經卷下若有火聚如須彌山無有所依為當増長為當漸滅迦葉白言是火當滅更不増長大方廣如來秘宻蔵經卷下如水中畫即滅地畫近時若風雨足踐爾乃滅畫石石住石滅四阿含暮抄解藉六譬如繩繋鳥脚初雖得去繩盡攝還若當繩斷鳥便永去禪法要解經卷下榮十又如草木薪火燒烟出炭灰不盡火力薄故大智度論卷二斷食死無疑食者死未定大智度論卷三譬如渡師一人以浮囊草栰渡之一人以方舟而渡二渡之中相降懸殊大智度論卷六譬如燒金丸雖眼見其好不可以手觸燒人手故大智度論卷十如須彌山王小風則不能動若隨藍風至則大動散大智度論卷十譬如小火不能燒大林火勢增益能燒一切大智度論卷十五如火燒金銀煮沸熱蜜雖有色味燒身爛口急應捨之大智度論卷十七譬如洋金燒身若欲除之不得但欲棄火而畱金要當金火俱棄大智度論卷十七譬如藥師欲試毒藥先以與雞雞即時死然後自服乃知藥之威力為大大智度論卷二十二如火焚薪已灰炭猶在火力薄故不能令盡若劫盡時火燒三千大千世界無復遺餘火力大故大智度論卷二十七如大河水投一合鹽則失鹽相不名為鹹大智度論三十又如絶健之人少衆力寡不能制之大軍攻之則伏大智度論三十五譬如深根大樹不可以一斫能辦多用斧力乃斷大智度論卷五十三譬如大逆重罪應死之人雖有强力財寳不可得免有人罪雖入死料理在可救用力勢財物便得濟命不救則死大智度論卷五十七譬如鳥子羽翼未成不可逼令髙翔六翮成就則能逺飛大智度論卷六十一如合衆縷以為繩不知者謂繩有力又如牆崩殺人言牆有力若各各分散則無有力大智度論卷六十二如寳蔵閉門雖有好物而不能得若開其門則隨意所取大智度論卷六十五譬如熱金丸雖是寳物捉則燒手大智度論卷九十二舜耕歴山恩不及州里太公屠牛惠不逮妻子及其見用恩流八荒惠施四海饒財多貨貴其能與貧困屢空貴其履道𢎞明集牟子理惑論譬猶吏人解印脱冠而横道肆㬥五尺之童皆能制之矣𢎞明集正誣論疾重則親降醫王患輕則寄方遥授偏師以翦梟獍重将而戮鯨鯢此亦釋門和扁之術法王孫吳之勢也辨正論卷六勢阻智出乎身理無或困聲係於物才有必窮故陵波之羽不能淨浪盈岫之木無以輟風南齊書劉祥傳聽絶於聰非疾響所握神閉於明非盈灮所燭故破山之雷不發聾夫之耳朗夜之輝不開矇叟之目南齊書劉祥傳椎固有柄而不能自㭬目見百歩之外而不能見其眥文子上德夫目之明能見於百歩之外而顧不見其背也帷牆之後則無睹也子華子大道耳者可以聽調聲而不能為調聲目者可以視異形而不能為異形口者可以道神明而不能為神明鶡冠子天權萬賤之直不能撓一貴之曲鶡冠子近迭夫南行者至於郢北面而不見㝠山是何也則去之逺也莊子天運雖有賢良辯慧不能開一言以枉法雖有千金不能以用一銖商子定分中行繆伯手搏虎而不能生也蓋力優而克不能及也淮南子繆稱訓扶桑受謝日照宇宙炤炤之光輝燭四海闔户塞牖則無由入矣淮南子道應訓夾河為婚水漲無船焦氏易林臨之小過牽羊不前與心戾旋焦氏易林渙之中孚或問聖人之作事不能昭若日月乎何後世之訔訔也曰瞽曠能黙瞽曠不能齊不齊之耳狄牙能喊狄牙不能齊不齊之口揚子問神鳥有毛羽能飛不能升天王充論衡道虛篇天養物能使物暢至秋不得延之至春吞藥養性能令人無病不能壽之為仙王充論衡道虛篇可得箠者小而可得量者少也器至大箠弗能數至多升斛弗能王充論衡定賢篇天地之性能更生火不能使滅火復燃能更生人不能令死人復見王充論衡論死篇苞瓜之汁猶人之血也其肌猶肉也試令人損益苞瓜之汁令其形如故耐為之乎人不耐損益苞瓜之汁天安耐増減人之年王充論衡無形篇蓋盛陽不能榮枯朽之木神明不能變沉溺之性子貢不能悦係馬之野人古公不能釋欲地之戎狄實理有所不通善言有所不行章甫不售於蠻越赤舄不用於跣夷何可强哉抱朴子内篇塞難良匠能與人規矩不能使人必巧也明師能授人方書不能使人必為也抱朴子内篇極言夫聖人知凶醜之自然下愚之難移猶春陽之不能榮枯朽炎景之不能鑠金石抱朴子外篇詰鮑朱緑之藻不秀於枯柯傾山之流不發乎涸源熠耀之宵熖不能使萬品程形志盡勢利不能使芳風邈世抱朴子外篇廣譬造逺者莫能兼通於岐路有為者莫能並舉於耕學抱朴子外篇守塉使駿馬馳騖於屈曲艱阻之中則與驢騾齊足前漢書註揚雄傳人之行投趾在乎容跡之地近不踐而獲安若以足外為無用欲闕之及泉雖則㨗若㺅猨亦不能履也李善註文選秋興賦傾耳求音眡優聽苦澄心狥物形逸神勞是以天殊其數雖同方不能分其慼理塞其通則並質不能共其休文選陸機演連珠理之所開力所常達數之所塞威有必窮是以烈火流金不能焚景沈寒凝海不能結風文選陸機演連珠慈父能食子不能使知味聖人能悦人不能使人必悦意林子思子朝露之蒲土女不能治淄澠之沙計鬼不能數太平御覽地部沙水生石未有居山而溺者火生木未有抱樹而焦者太平御覽地部石上子日沐令人愛卯日沐令人白頭案人之愛憎頭之白黑在乎自然但使嫫母子日沐浴能令人愛耶使十五童子卯日沐能令髪白耶太平御覽人事部沐刻削之道鼻莫如大目莫如小鼻大可小小不可大目小可大大不可小舉事亦然太平御覽人事部目諺曰魯班雖巧不能為乞丏者顔太平御覽人事部諺下譬猛虎浮水不如鳬鴨麒麟登木不如猿㺅太平御覽羽族部鴨補天立地之聖不能止日灮西落疏山奠川之力不能停河水東流初學記禮部饗謙註升離戒晨隂牆不照其景膚雲停夕幽草或漏其津初學記職官部秘書丞註善行水者不能徃冰善穿地者不能鑿凍善用鍼者亦不能取四厥黄帝素問靈樞經刺節真邪譬如妙藥雖能療愈種種重病而不能治已死之人海空智蔵經問病品如金翼之鳥能食能消一切禽魚金銀等物唯除金剛不能吞噉元陽妙經卷一若有人能将藕絲曵懸玉京山者可思議不元陽妙經卷六如人左手所作不便波羅蜜多經卷三百五十一譬如新淨種子善能蔵積不為蟲食無有爛壞乾焦穿穴或復有人選擇良田潤沃之處下此種子令一日中牙莖枝葉扶疏䕃映華菓滋茂皆具足不不也大寶積經卷五十五猶如外學五通仙人雖視胎中不能豫别男女之根阿差未菩薩經卷六譬如剪棄鬚髪雖見烏灮香澤寜可更植於身令重生不大乘顯識經推四猶如力士以輕毛毱擲平户扇彼為受不答曰不也所以者何毛毱輕搏户扇平立是故不受中阿含經卷二十譬如伏雞生子衆多不能隨時䕃消息冷暖而欲令子以觜以爪啄卵自生安隱出㲉當知彼子無有自力堪能方便以觜以爪安隱出㲉雜阿含經卷十如轉輪王所有象寳甚為髙大持一多羅樹葉覆其身體欲令不現可得爾耶别譯雜阿含經卷十四譬如大風能動海水以為波浪而不能動摩羅耶山阿育王經卷八如大海岸水不能破阿育王經卷八如大山堰水水不能壞禪法要觧經卷下榮十譬如㬥河力能漂没唯不能浮大石重山無明羅刹經誰於㬥河乃欲截流誰入虎口欲數其齒無明羅刹經昔有一人頭上無毛冬則大寒夏則患熱兼為蚊䖟之所唼食晝夜受惱甚以為苦有一醫師多諸方術時彼禿人徃至其所語其醫言唯願大師為我治之時彼醫師亦復頭禿即便脱帽示之而語之言我亦患之以為痛苦若令我治能得荖者應先自治以除其患百喻經卷上如人學書時傍人寜能代其工不王言不能代其工如人犯法有罪寜可取無罪之人代不王言不可那先比丘經卷上王使宰人作美羮中有水有肉有蔥蒜有薑有鹽䜴有糯王勅廚下人言所作美羮如前取羮中水味來次取肉味來次取蔥味來次取薑味來次取鹽豉味來次取糯味來羮以成人寜能一一取羮味與王不王言羮一合以後不能一一别味也那先比丘經卷中車載鹽牛軛鹽車牛寜能别知鹽味不那先比丘經卷中譬如日出雖能照了一切天下然不能為盲者作明我亦如是雖復能為一切衆生説無上道然不能為無慧目者而作利益本緣經毗羅摩品譬如夜行嶮道無人執燈必不得過大智度論卷四十一譬如大火常有燒力但以薪不近故不得燒近則能燒大智度論卷六十一譬如猛風除雲能令日月出現而不能作日月也大智度論卷六十四譬如人以酥和毒毒勢則歇不能害人大智度論卷六十八譬如盲人蹈踐珍寶口言非珍寶竟不能令非珍寶大智度論卷七十譬如刀雖利不能破空大智度論卷七十譬如以飛言之鳥則勝人大智度論七十八譬如蠅無處不著唯不著火焰大智度論卷九十四如時雨能益草木不益虛空大智度論卷九十五如日出不能令髙者下下者髙但能照明萬物令有眼者别識大智度論卷九十五父雖愛子不能以頭目與之大智度論卷九十七如大海水波其力雖大到須彌山邉則退而無用大智度論卷九十九譬如一一石女不能有子一一盲人不能見色一一沙不能出油多集亦不能百論卷上守八眼雖見相不自見眼如指端不能自觸百論卷下守九如人乘船隨水至大城井泉陂池水則不能得爾十住毘婆沙論卷十一如物或有近而不可知或逺而不可知或根壞故不可知或心不住故不可知障故不可知同故不可知勝故不可知微細故不可知近而不可知者如眼中藥逺而不可知者如鳥飛虛空髙翔逺逝根壞故不可知者如盲不見色聾不聞聲鼻塞不聞香口爽不知味身頑不知觸心狂不知實心不住故不可知者如心在色等則不知聲障故不可知者如地障大水壁障外物同故不可知者如黑上墨點勝故不可知者如有鐘鼔音不聞捎拂聲細微故不可知者如微塵等不現十二門論守六方寸之心謀已身而致謬圓分之眸隔牆壁而弗見𢎞明集十四河泊雖神不能溺陸地人飄風雖疾不能使湛水揚塵𢎞明集牟子理惑論猶磁石取鐡不能移毫毛矣𢎞明集牟子理惑論離婁察秋毫於百㝷者資其妙目假日而覩耳今布毫於千步之外目力所匱無假以見而於察㣲避危無所少矣何為以千歩所昧還疑百㝷之毫乎𢎞明集明佛論如母乳嬰兒一經月無倦嬰兒㗋若閉乳母欲何為法苑珠林卷八十一譬如有人欲於空地造立空室隨意無礙若於虛空終不能成維摩詰所説經佛國品喻林卷二十二
