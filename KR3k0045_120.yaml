body:
  text: 喻林卷一百二十明徐元太撰物宜門五順性竊脂肉食今無肉而循場啄粟失其天性不能以自活鄭氏箋詩小宛猱之性善登木泥之性善著物因其所善而敎用之故言必也毛詩正義角弓齊大夫諸子有犬犬猛不可叱叱之必噬人客有請叱之者疾視而徐叱之犬不動復叱之犬遂無噬人之心戰國策韓襄王黃帝與炎帝戰於阪泉之野師熊羆狼豹貙虎為前驅鵰鶚鷹鳶為旗幟此其以力使禽獸者也堯使䕫典樂擊石拊石百獸率舞簫韶九成鳯凰來儀此以聲致禽獸者也然則禽獸之心奚為異人形音與人異而不知接之之道焉聖人無所不知無所不通故得引而使之禽獸之智有自然與人同者其齊欲攝生亦不假知於人也牝牡相偶母子相親避平依險違寒就溫居則有羣行則有列小者居内壯者居外飲則相攜食則鳴羣大古之時則與人同處與人並行帝王之時始驚駭散亂矣列子黄帝周宣王之牧正有役人梁鴦者能養野禽獸委食於園庭之内雖虎狼鵰鶚之類無不柔馴者雌雄在前孳尾成羣異類雜居不相搏噬也王慮其術終於其身令毛丘園傳之梁鴦曰鴦賤役也何術以告爾且一言我養虎之法夫食虎者不敢以生物與之為其殺之之怒也不敢以全物與之為其碎之之怒也時其饑飽達其怒心虎之與人異類而媚養己者順也故其殺之逆也然則吾豈敢逆之使怒哉亦不順之使喜也夫喜之復也必怒怒之復也常喜皆不中也今吾心無逆順者也則鳥獸之視吾猶其儕也故游吾園者不思髙林曠澤寢吾庭者不願深山幽谷理使然也列子黃帝天道無為聽恣其性故放魚於川縱獸於山從其性命之欲也不驅魚令上陵不逐獸令入淵者何哉拂詭其性失其所宜也王充論衡自然篇松樅高千仞而無枝非憂王室無柱太平御覽木部樅司南之杓投於地其柄南指魚肉之蟲集地北行自然之性也太平御覽蟲豸部蟲藥性有宜丸者宜散者宜水煎者宜酒漬者宜膏煎者亦有一物兼宜者亦有不可入湯酒者並隨藥性不得違越本草一卷譬如香鳥為人所縛雖有良師不能禁制須絶羈鎖自恣而去元陽妙經卷十譬如蛇行本性好曲若入竹筩則直出筩還曲大智度論卷九十二人為石雖堅尚可轉席雖平尚可卷毛詩柏舟註鍾氏染羽以朱湛丹秫三月而熾之淳而漬之三入為纁五入為緅七入為緇周禮考工記土偶之成也有貴有賤有士有女其質土其壞土人哉關尹子六七宋人有為其君以玉為楮葉者三年而成鋒殺莖柯毫芒繁澤亂之楮葉中而不可别也此人遂以巧食宋國子列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣故聖人恃道化而不恃智巧列子説符牛馬四足是謂天絡馬首穿牛鼻是謂人故曰無以人滅天無以故滅命莊子秋水牛跂蹏而戴角馬被髦而全足者天也絡馬之首穿牛之鼻者人也循天者與道游者也隨人者與俗交者也淮南子原道訓斂諸攻玉无不穿鑿焦氏易林艮之明夷燔埴為瓦則可爍瓦為銅則不可以自然驗於不然詭哉敵犬羊之肉以造馬牛不幾矣申鑒俗嫌陶者用埴為簋廉簋廉一成遂至毁敗不可復變若夫冶者用銅為柈杆柈杆雖已成器猶可復爍柈可得為尊尊不可為簋王充論衡無形篇伐根生以飾無用捕飛禽以供華玩穿本完之鼻絆天放之脚蓋非萬物並生之意抱朴子外篇詰鮑南山有木名為柘良工採之何以射太平御覽人事部笑塗青蚨而還錢埋蜻蛉而變珠埤雅品物門蜻蝏作龍者施木為骨緄繒為皮丹黃為文翠羽為鱗水以游之風以嬉之初學記鱗介部龍註譬如水本非藥以藥内水中而煑之由藥發起水使水亦成藥隨相論卷上制器升景山掄材木取松栢易直者斷而遷之正斵於椹上以為桷與衆楹鄭氏箋詩殷武百工之事皆聖人之作也爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人之所作也周禮考工記一器而工聚焉者車為多周禮考工記輪人為輪斬三材必以其時三材既具巧者和之轂也者以為利轉也輻也者以為直指也牙也者以為固抱也輪敝三材不失職謂之完周禮考工記凡察車之道必自載於地者始也是故察車自輪始凡察車之道欲其樸屬而㣲至不樸屬無以為完久也不㣲至無以為戚速也輪已崇則人不能登也輪已庳則於終古登阤也周禮考工記輻廣而鑿淺則是以大扤雖有良工莫之能固鑿深而輻小則是固有餘而强不足也凡為輪行澤者欲杼行山者欲侔杼以行澤則是刀以割塗也是故塗不附侔以行山則是搏以行石也是故輪雖敝不甐於鑿周禮考工記凡居材大與小無并大倚小則摧引之則絶周禮考工記弓人為弓取六材必以其時六材既聚巧者和之幹也者以為逺也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也周禮考工記凡析幹射逺者用埶射深者用直居幹之道菑栗不迤則弓不發周禮考工記革欲其荼白而疾澣之則堅欲其柔滑而腛脂之則需引而信之欲其直也信之而直則取材正也信之而枉則是一方緩一方急也若茍一方緩一方急則及其用之也必自其急者先裂若茍自急者先裂則是以博為帴也周禮考工記犀甲夀百年兕甲夀二百年合甲夀三百年凡為甲必先為容然後制革權其上旅與其下旅而重若一周禮考工記鐘大而短則其聲疾而短聞鐘小而長則其聲舒而逺聞周禮考工記金有六齊六分其金而錫居一謂之鐘鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈㦸之齊參分其金而錫居一謂之大刃之齊五分其金而錫居二謂之削殺矢之齊金錫半謂之鑒燧之齊周禮考工記凡為弓各因其君之躬志慮血氣豐肉而短寛緩以荼若是者為之危弓危弓為之安矢骨直以立忿埶以奔若是者為之安弓安弓為之危矢其人安其弓安其矢安則莫能以速中且不深其人危其弓危其矢危則莫能以愿中周禮考工記金與錫黑濁之氣竭黃白次之黃白之氣竭青白次之青白之氣竭青氣次之然後可鑄也周禮考工記金謂之鏤木謂之刻骨謂之切象謂之磋玉謂之琢石謂之磨爾雅象謂之鵠音斛角謂之觷音嶽犀謂之剒音錯木謂之剫音鐸玉謂之雕爾雅葛生衍蔓絺綌為願焦氏易林兑之謙百工者所使備器也器以便事為善以膠固為上今工好造彫琢之器巧偽飾之以欺民取賄物以任用為要以堅牢為資今商競鬻無用之貨淫極侈之弊以惑民取產雖於淫商有得然國計愈失矣潛夫論務本輪輿轅軸各自有材故曰數官然後成吕氏春秋君守解天下之物未必皆自成亦有須冶煆而為器者郭子註莊大宗師矩雖為方而非方規雖為圓而非圓譬繩為直而非直也莊子音義天下海中有大魚曰鯨海邊又有獸名蒲牢蒲牢素畏鯨鯨魚擊蒲牢輒大鳴凡鐘欲令聲大者故作蒲牢於上所以撞之者為鯨魚李善註文選東都賦鄞山破而出錫若耶涸而出銅歐冶因為純鈎之劒藝文類聚寳部銅古有作車象月之數月有三十日車有三十輻夫月之懸天流行不息車之輾地亦運載無停是故古車以象月也道德經註疏卷一譬如陶師取好泥團安在輪上隨其器物形勢安布令無差舛大寳積經卷五十六譬如泥丸中具有缾瓫等性以泥為缾破缾為瓫如是轉變都無所失大智度論卷七十審用陟彼阿丘言采其蝱蝱貝母也升至偏高之丘采其蝱者將以療疾毛詩載馳鷺鳥之羽可以為翳毛詩宛丘註蓑所以備雨笠所以禦暑毛詩無羊註鴈者隨陽而處似婦人從夫故昬禮用焉鄭氏箋詩匏有苦葉白桵相樸屬而生者枝條芃芃然豫斫以為薪至祭皇天上帝及三辰則聚積以燎之鄭氏箋詩棫樸天下之大獸五脂者膏者臝者羽者鱗者宗廟之事脂者膏者以為牲臝者羽者鱗者以為筍虡周禮考工記古之君子必佩玉右徵角左宫羽鄭𤣥云徵角在右事也民也可以勞宫羽在左君也物也宜逸春秋正義定公五年瓜曰華胡化切之桃曰膽之棗李曰㚄音帝之樝棃曰鑽子管切之爾雅既差我馬差擇也宗廟齊毫戎事齊力田獵齊足爾雅淮南有懶婦魚俗云昔揚氏家婦為姑所溺而死化為魚焉其脂膏可燃燈燭以之照鳴琴博奕則爛然有光及照紡績則不復明焉述異記上一曰舉日章則晝行二曰舉月章則夜行三曰舉龍章則行水四曰舉虎章則行林五曰舉烏章則行陂六曰舉蛇章則行澤七曰舉鵲章則行陸八曰舉狼章則行山九曰舉韟章則載食而駕管子兵法冠雖穿弊必戴於頭履雖五采必踐之於地韓非子外儲説左下殺人於百步之外者弓矢也殺人於五十步之内者矛㦸也尉繚子制談大㦸去水亭歴愈張用之不節及反為病淮南子繆稱訓和氏之璧隋侯之珠出於山淵之精君子服之順祥以安寧侯王寳之為天下正淮南子説山訓或問犂牛之鞹與𤣥騂之鞹有以異乎曰同然則何以不犂也曰將致孝乎鬼神不敢以其犂也如刲羊刺豕罷賓犒師惡在犂不犂也揚子修身虞書曰予乗四載水行乘舟陸行乗車山行乗欙澤行乘䡅許氏説文卷十簜可為幹篠可為矢許氏說文卷十橦梓屬大者可為棺槨小者可為弓材許氏説文卷十春薦韭卯夏薦麥魚秋薦黍豚冬薦稻鴈制無常牲取與新物相宜而已蔡中郎獨斷洗洿泥者以水燔腥生者用火水火道也用之者事也事末於道王充論衡程材篇穀之始熟曰粟舂之於臼簸其粃糠蒸之於甑爨之以火成熟為飯乃甘可食可食而食之味生肌腴成也粟未為米米未成飯氣腥未熟食之傷人王充論衡量知篇崇吾之山有木焉圓葉而白柎赤華而黑理其實如枳食之宜子孫山海經西山經不周之山爰有嘉果其實如桃其葉如棗黃華而赤柎食之不勞山海經西山經符禺之山其上有木焉名曰文莖其實如棗可以己聾其草多條其狀如葵而赤華黃實如嬰兒舌食之使人不惑山海經西山經乾麻不長天狗不大厥質雖小攘災除害山海經西山經圖讚鵸䳜三頭獂獸三尾俱禦不祥消凶辟眯君子服之不逢不韙山海經西山經圖讚鍾山之寳爰有玉華符彩流映氣如虹霞君子是佩象德閑邪山海經西山經圖讚青丘之山有鳥焉其狀如鳩其音如呵名曰灌灌佩之不惑山海經南山經亶爰之山有獸焉其狀如貍而有髦其名曰類自為牝牡食者不妬山海經南山經基山有獸焉其狀如羊九尾四耳其目在背其名曰猼訑佩之不畏山海經南山經侖者之山有木焉其狀如穀而赤理其汁如漆其味如飴食者不饑可以釋勞山海經南山經龍侯之山決決之水出焉而東流注于河其中多人魚其狀如䱱魚四足其音如嬰兒食之無癡疾山海經北山經北嶽之山諸懷之水出焉而西流注于囂水其中多䱜魚魚身而犬首其音如嬰兒食之已狂山海經北山經縣雍之山晉水出焉而東南流注于汾水其中多鮆魚其狀如鯈而赤鱗其音如吒食之不驕山海經北山經帶山彭水出焉而西流注于芘湖之水其中多儵魚其狀如雞而赤毛三尾六足四首其音如鵲食之可以已憂山海經北山經陽鑒動日土蛇致宵㣲哉鮆魚食則不驕山海經北山經圖讚牛首之山有草焉名曰鬼草其葉如葵而赤莖其秀如禾服之不憂山海經中山經霍山有獸焉其狀如貍而白尾有鬛名曰朏朏養之可以已憂山海經中山經抱木生於水松之旁若寄生然極柔弱不勝刀鋸乘濕時刳而為履易如削瓜既乾則韌不可理也南方草木狀結芻為狗巫祝用之莊子音義天運樓航不挹漿衝車不載薺揚子法言註君子篇使牛捕鼠雖大無施揚子法言註君子篇府庫之藏金玉筐篚之槖簡書李善註文選應璩百一詩桓公伐孤竹行出山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻蠰寸而有水使掘之果得水焉意林韓子桓公伐孤竹失道管仲曰老馬之智可用遂縱馬從而得歸意林韓子子路見孔子豬肩牛膊可以得兆何必蓍龜孔子曰蓍者耆也龜者舊也狐疑之事當問耆舊蓍龜者未可神也取其名耳意林論衡凡律度量衡用銅者所以同天下齊風俗也銅為物至精不為燥濕寒暑變其節不為風雨曝露改其形似於士君子之行是以用銅也藝文類聚寳部銅用藥者得良藥則活人得惡藥則殺人太平御覽方術部醫輕舟可以救溺濡幕可以濟焚太平御覽舟部敘舟中樂車無牛馬而能行者獨一人所致耳太平御覽車部鹿車東夷之人以牛骨占事呈吉示凶無不中牛非智之物骨者若此之効太平御覽方術部牛蹄葛小人得其葉以為羮君子得其材以為絺太平御覽百卉部葛叅絲之絞以絃琴緩張則撓急張則絶太平御覽布帛部絲啼人者絆其足囓人者截其耳埤雅品物門犬傅弓以燕牛之角纒弓以荆麋之筋糊弓以河魚之膠埤雅品物門魴艾可乂疾久而彌善埤雅品物門艾今夫農時雨既至脱衣就功首戴茅蒲身衣襏襫襏襫蓑薜衣也爾雅翼臺五弓弧弓以授射甲革椹質者夾弓庾弓以授射豻侯鳥獸者唐弓大弓以授學射者使者勞者玉海兵制弓矢凡矢枉矢絜矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恒矢庳矢用諸散射玉海兵制弓矢秋禽之肥易牙和之非不美也彭祖以為傷夀故不食困學紀聞卷十諸子上藥一百二十種為君主養命以應天無毒多服久服不傷人欲輕身益氣不老延年者本上經中藥一百二十種為臣主養性以應人無毒有毒斟酌其宜欲遏病補虚羸者本中經下藥一百二十五種為佐使主治病以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者本下經本草上藥卷一療寒以熱藥療熱以寒藥飲食不消以吐下藥鬼疰蟲毒以毒藥癰腫瘡癅以瘡藥風濕以風濕藥各隨其所宜本草一卷藥有陰陽配合子母兄弟根莖花實草石骨肉有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七情和合視之當用相須相使者良勿用相惡相反者若有毒宜制可用相畏相殺者不爾勿合用也本草一卷地不為獸生芻而獸食芻不為人生枸而人食枸無為於萬物而萬物各適其所用則莫不贍矣道德經註如陶師輪繩是為作因如燈燭照闇中物是名了因元陽妙經卷九草生五色五色之變不可勝視草生五味五味之美不可勝極嗜欲不同各有所通黃帝素問内經六節藏象論凡刺之要官鍼最妙九鍼之宜各有所為長短大小各有所施也不得其用病弗能移黃帝素問靈樞經官鍼膏粱菽藿之味何可同也氣滑即出疾其氣濇則出遲氣悍則鍼小而入淺氣濇則鍼大而入深深則欲畱淺則欲疾以此觀之刺布衣者深以畱之刺大人者㣲以徐之此皆因氣慓悍滑利也黄帝素問靈樞經根結譬如持燒熟缾詣河取水若池若井若泉若渠當知此缾終不爛壊何以故是缾善熟堪任盛水極堅牢故波羅蜜多經卷三百一十二譬泥之在均金之在鍜唯所用耳豈有限哉波羅蜜多經卷五百九十一序如人披求芭蕉莖實雖不可得而有葉用波羅蜜多經卷五百九十六譬如諸大城中所棄糞穢若置甘蔗蒲桃田中則有利益大寳積經卷一百一十二譬如好酒香味具足是酒之醍醐醡取已盡下有糟滓人所惡賤無所施用大寳積經卷一百一十三譬如畫堂不以燋柱而作莊嚴僧伽吒經卷一譬如有人以木挑火木則漸燒僧伽吒經巻三猶如箭工用檢撓箭其箭已直不復用檢所以者何彼人本所為者其事已成中阿含經卷四猶如居士為過泉水故作通水槽持斧入林如打諸樹若堅實者其聲便小若空中者其聲便大居士知已便斫治節擬作通水槽中阿含經卷二十九如世人有三種瓫有一水瓫堅完不損無有孔裂亦無滲漏其第二瓫亦完不破無有孔裂少有滲漏第三瓫者亦破亦漏彼人注水應先何器對曰先於不破漏者完器滿已注第二器其第二器雖完不破然小滲漏其第三瓫雖復漏破亦應注水為未漏間暫得用別譯襍阿含經卷十五若人食油則得力若食蘇者得好色食麻滓菜無色力大智度論卷二譬如利刀以割泥土遂成鈍器大智度論卷十四如人得利刀宜應有益中用不於無益中用十住毘婆沙論卷八失實鼎之為義下實上虚是空以待物者也鼎耳之用亦宜空以待鉉今九三處下體之上當此鼎之耳宜居空之地而以陽居陽是以實處實者也既實而不虚則變革鼎耳之常義也常所納物受鉉之處今則塞矣周易正義鼎雖則七襄不成報章睆音莞彼牽牛不以服箱東有啓明西有長庚有捄天畢載施之行詩小雅大東東方有啓導日明之星西方有增長續日之星此亦何曾能有啓續乎毛詩正義大東睆然而明者彼牽牛之星雖則有牽牛之名而不曾見其牽牛以用於牝服大章之箱也毛詩正義大東捄然而長者在天之畢也徒則施之於二十八宿之行列而已亦何曾見其掩兔載肉之用乎毛詩正義大東織之用緯一來一去是報反成章今織女之星駕則有西而無東不見倒反是有名無成也毛詩正義大東觚不觚觚哉觚哉論語雍也一升曰爵二升曰觚觚哉觚哉言非觚也以喻為政不得其道則不成何宴解論雍也不揣其本而齊其末方寸之木可使高於岑樓金重於羽者豈謂一鉤金與一輿羽之謂哉孟子告子下不節其數累積方寸之木可使高於岑樓岑樓山之鋭嶺者寧可謂寸木高於山邪金重於羽謂多少同而金重耳一帶鉤之金豈重一車羽邪如取食色之重者比禮之輕者何翅食色重哉趙氏註孟告子下喻林卷一百二十
