body:
  text: 喻林卷三十五明徐元太撰人事門三十三待時雲上于天需君子以飲食宴樂易需九四歸妹愆期遲歸有時象曰愆期之志有待而行也易歸妹隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有易上繫此人不得進仕伐檀隱居以待可仕之世若待河水清且漣猗然也河水性濁清則難待猶以暗主常多明君稀出毛詩正義伐檀雖有知慧不如乘勢雖有鎡基不如待時孟子公孫丑上子貢曰有美玉於斯韞櫝而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也論語子罕賓又不聞和氏之璧韞於荆石隋侯之珠藏於蚌蛤呼厯世莫視不知其將含景耀吐英精曠千載而流夜光也應龍潛於潢汙魚黿媟之不覩其能奮靈德合風雲超忽荒而躆皓蒼也故泥蟠而天飛者應龍之神也先賤而後貴者和隋之珍也峕暗而久章者君子之真也前漢書敘傳上夫懷寶者須世抱璞者待時後漢紀孝桓上夫河伯以水為城國魚鱉為民庶水盡魚枯豈不欲雨自是不能致也後漢書周舉列傳駿驥骨法異伯樂觀知之但當養羽翮鴻舉必有期魏志劉邵傳注龍鳳隱耀應德而臻明哲潛遁俟時而動是以鸑鷟鳴岐周道隆興四皓為佐漢帝用康魏志管寧傳含竒謨於朱脣握神策於玉掌逍遙川嶽之上以俟真人之求晉書孫惠傳蠖屈以待龍甲之會潛蟠以俟風雲之期晉書桓溫傳凡人取果宜待熟時不撩自落北齊書陸法和傳君子之有智能猶鵷鳳之有文采俟時而振羽翼何患不出雲霞之上南史范泰子日華傳有湯武之賢而無桀紂之時不成有桀紂之時而無湯武之賢亦不成聖人之見時若步之於影不可離水凍方周后稷不種后稷之種必待春故人雖智而不遇時無功方葉之茂終日采之而不知秋霜既下衆林皆羸事之難易不在小大務在知時鄭子陽之難猘狗潰之齊髙國之難失牛潰之衆因之以殺子陽髙國當其時狗牛猶可以為人唱而況乎以人為唱乎吕氏春秋首時春氣至則草木産秋氣至則草木落産與落或使之非自然也故使之者至物莫不為使之者不至物無可為古人審其所以使故物莫不為用吕氏春秋義賞桀紂雖不肖其亡遇湯武也遇湯武天也非桀紂之不肖也湯武雖賢其王遇桀紂也遇桀紂天也非湯武之賢也若桀紂不遇湯武未必亡也桀紂不亡雖不肖辱未至於此若使湯武不遇桀紂未必王也湯武不王雖賢顯未必至於此故人主有大功不聞不肖亡國之主不聞賢譬之若良農辦土地之宜謹耕耨之事未必收也然而收者必此人也始在於遇時雨遇時雨天地也非良農所能為也吕氏春秋長攻良馬非獨騏驥利劔非惟干將美女非獨西施忠臣非獨吕望今有馬而無王良之御有劔而無砥礪之功有女而無芳澤之飾有士而不遭文王道術蓄積而不舒美玉韞櫝而深藏故懷道者須世抱璞者待工陸子術事聖人不先風吹不先雷毁不得已而動故無纍淮南子説山訓聖人之處亂世若夏暴而待暮桑榆之間逾易忍也淮南子説林訓昏暮不行候且時明焦氏易林遁之臨畏昏潛處候時昭明卒遭白日為榮祿主焦氏易林既濟之豫言衆人不知驥力以駕敗車則不肯進遇伯樂知其才力以車代之則至千里流名得也以言俗人不識已志亦將遇明君建道流化垂功業也王逸注楚辭七諫言蛟龍升天其形潺湲若水流縱橫轇轕遂乘雷電而髙舉以言已亦想遭明時舉而進用王逸注楚辭九歎玄鶴俊鳥也君有德則來無德則去若鸞鳳矣故師曠鼓琴天下玄鶴皆銜明月之珠以舞也言已聽玄鶴振音晨鳴乃於髙岡之上峩峩之顛見有德之君乃來下也以言賢者亦宜自安處以須明君禮敬已然後仕也王逸注楚辭九歎五稼非春不生智者之功非時不成吕氏春秋首時解未春無可為生未秋無可為落使之者以其時生則生時落則落吕氏春秋義賞解夫凌雲者泥蟠者也後伸者先屈者也是以神龍以為德尺蠖以求伸曹子建自試表良農不患疆場之不修而患風雨之不節君子不患道德之不建而患時世之不遇徐幹中論爵祿五玉不能自剖於嵩岫騰蛇不能無霧而電征龍淵不能勿操而斷犀兕景鐘不能莫扣而揚洪聲金芝須商風而激耀倉庚俟煙煴而修鳴騏騄不茍馳以赴險君子不詭遇以毁名運屯則沉淪於勿用時行則髙竦乎天庭抱朴子外篇任命淇衛忘歸不能無絃而逺激振塵之音不能無器而興哀超俗拔萃之德不能立功於未至之時抱朴子外篇廣譬縈曲之絃思繞梁以盡妙藏器之士候明時以效績李善注文選陸士衡演連珠應物有方居難則易藏器在身所乏者時是以充堂之芳非幽蘭所難繞梁之音實縈絃所思文選陸機演連珠望循塗而投軌遡朔風以理翮冀雲霧之可慿希天路之開闢藝文類聚人部言志賦蘭蕙含芬有時而馨龍驥踠足有時而征藝文類聚人部别友賦木槿夕死朝榮士亦不長貧也藝文類聚木部木槿書飛龍可濟一作躋而乾爻在四常閽云呌而閶闔未聞文苑英華請勸進及封嶽行幸沈炯表猶如諸國勤力農作得大耕牛良田平正無諸丘墟惡蕪荒穢荆棘毒草於是良田唯希天雨海空智藏經供獻品夫以含心之荄實俟夾鍾吐氣華陽陶隱居集如華始生之時日光所照能令開不不能開也何以故以新生故善根未熟亦如是不得制戒何以故非時節故文殊師和問經卷下如種大麥及麻豆等芽始生時已堪用不不堪用也何以故以未熟故一切衆生善根未熟亦如是不堪制戒文殊師和問經卷下如種榖未熟為可取不不可取也非時尚未有華何况得米及以粳糩文殊師利問經卷下若有士夫初得熱病不應與藥及餘衆治所以者何時未至故要待時至然後乃治二處不知是則敗醫是故病熟然後應治若未熟者要待時至大法鼓經卷下如治癰師知癰已熟破出膿與藥而去若癰未熟是則久住大智度論卷三如榖草子在地中得時節而生不失不壞大智度論卷五又如冬木雖未有華葉果實得時節會則次第而出大智度論卷三十八譬如癰瘡未熟醫則不破但以藥塗令熟則易破大智度論卷九十九遇時上九何天之衢亨易大畜緑兮絲兮女音汝所治平聲兮詩國風緑衣公孫𢎞卜式兒寬皆以鴻漸之翼困於燕雀逺迹羊豕之間非遇其時焉能致此位乎力田不如逢年善仕不如遇合俱史記信惟餓𨽻布實黥徒越亦狗盜芮尹江湖雲起龍襄化為侯王前漢書敘傳述韓彭英盧吳連衡者六印磊落合從者駢組流離後漢書蔡雍傳君子或因風雲之勢以建山嶽之功乘日月之末光以成一匡之業後漢紀光武七遭春值聖受恩特隆越從朽壤蟬蛻朝中吳志華核傳毖挹清露沐浴凱風吳志華核傳蘭芷出荒野萬里升紫庭晉書樂志下謀言協秋蘭清風發其芳洪澤所漸潤礫石為圭璋晉書樂志下在魏參席上之珍居晉為幄中之士晉書馮紞傳黃犬之皮恐當終補狐裘也晉書慕容超傳不患玄黎之不啓竊樂春英之及時晉書王接傳姑臧謡曰鴻從南來雀不驚誰謂孤雛尾翅生髙舉六翮鳳凰鳴晉書張軌傳譬如日出之時向東皆逆晉書徐邈傳霸王繼蹤猶朝日之升扶桑英豪接踵若夕月之登濛泛晉書赫連勃勃記非夫卜世與乾坤比長鴻基與山嶽齊固孰能本枝於千葉重光於萬祀履寒霜而踰榮蒙重氛而彌耀者哉晉書赫連勃勃記玄雲起山嶽祥氣萬里會龍飛何蜿蜿鳳翔何翽翽宋書樂四志若足下可謂冠負日月籍踐淵海心支身首無不通照宋書周朗傳卵翼吹噓得升官秩宋書沈攸之傳且曝鰓之鱗不念杯杓之水雲霄之翼豈顧籠樊之糧何者所託已盛也梁書何敬容傳顧盼增其培價翦拂使其長鳴梁書任昉傳自出守股肱入尸衡尺可以仰首伸眉論列是非者矣梁書張緬弟纘傳且為腹背之毛脫充鳴吠之數陳書蔡景厯傳可謂日月出矣無幽不燭也魏書李彪傳霑雲雨之餘潤照日月之末光隋書宇文慶傳史臣不提生於弗器賤生於無所用中河失船一壺千金貴賤無常時使物然鶡冠子學問空拳握手委地更起富饒豐衍快樂無已焦氏易林乾之履大禹戒路蚩尤除道周匝萬里不危不殆焦氏易林乾之剝谷風布氣萬物出生萌庶長養華葉茂盛焦氏易林坤之乾出於幽谷飛上喬木鼓其羽翼輝光照國焦氏易林坤之比長男少女相向共語析薪在尅福祿歡喜焦氏易林坤之同人冰將泮散鳴雁雍雍丁男長女可以會同焦氏易林豫之豫黃玉溫德君子所服甘露溽暑萬物生茂焦氏易林蒙之觀兩輪自轉南上大阪四馬共轅無有重難焦氏易林小畜之家人離載陽光天下昭明焦氏易林大有之臨晨昏潛處候時煦煦卒逢白日為世榮主焦氏易林大有之中孚鴻雁南飛隨陽休息轉送天和千里不衰焦氏易林蠱之離駕龍騎虎周遍天下焦氏易林臨之履御騂從龍至霍華東焦氏易林觀之漸條風制氣萬物出生明庶長養花葉壯成焦氏易林賁之小畜汙泥生梁下田為王焦氏易林賁之革東風解凍河川流通焦氏易林復之需春生孚乳羽毛成就舉不失宜君臣相好焦氏易林復之漸時乘六龍為帝使東逹命宣旨無所不通焦氏易林離之離騋牝龍身日取三千南上蒼梧興福為婚焦氏易林恆之鼎芽蘖生達陽唱於外焦氏易林遁之兊鎡基逢時稷契臯陶焦氏易林遁之既濟騎龍乘鳳上見神公焦氏易林家人之剝隨風騎龍與利相逢焦氏易林睽之離六藝之門仁義俱存鎡基逢時堯舜為君焦氏易林蹇之否鄉嵗逢時與生為期焦氏易林蹇之隨啓蟄始生萬物美榮焦氏易林解之遁春陽生草夏長條枝萬物蕃滋充實益有焦氏易林井之巽陽春生長萬物茂壯焦氏易林鼎之蹇和氣相薄膏潤津液生我嘉榖焦氏易林艮之大過東風啓戶隱伏歡喜焦氏易林艮之睽雌鸑生雕神異興起乘雲龍騰民載為父焦氏易林渙之革乘龍光土使暗後明焦氏易林既濟之需次二鳳鳥于飛修其羽君子于辰終莫之圉測曰鳳鳥于飛君子得時也太玄經第三疆瞻彼榮寵譬諸雲霄蔡中郎集周巨勝碑春種榖生秋刈榖收求物得物作事事成不名為遇不求自至不作自成是名為遇猶拾遺於塗托棄於野若天授地生鬼助神輔王充論衡逢遇篇人才無定珍器用無常道進趨者以適世為竒役御者以合時為妙故玄冰結則五明捐隆暑熾則裘罏退髙鳥聚則良弓發狡兔多則盧鵲走干戈興則武夫奮韶夏作則文儒起抱朴子外篇廣譬快若輕鴻之泛長風沛若巨魚之縱大壑何異順風而縱聲登峰而長曬劉子通塞屯雲雺雺莫浮切􅀈朏同􅖨􅖨音幽雷奮于音釐龍躋于湫傳曰雲雺雺氣生于水也􅀈􅖨􅖨月生于朔也雷奮于躍于幽穽也龍躋于湫升于深泉也元包仲陽春秋文耀鈎曰春致其時華實乃榮李善注文選兩都賦幸託不肖軀且當猛虎步李善注文選陸士衡辨亡論在於貧賤類乎泥滓縻之好爵同於濯溉李善注文選劉孝標廣絶交論抑若春霆發響而驚蟄飛競潛龍浮景而幽泉髙鏡文選魏都賦於時青陽告謝朱明肇授靡木不滋靡草不茂初莖蔚其曜新陳柯槭瑟以改舊文選射雉賦詵詵衆賢千載一遇整轡髙衢驤首天路文選袁宏名臣序贊夫未遇伯樂則千載無一驥時值龍顔則當年控三傑文選袁宏名臣序贊日月光太清列宿曜紫微文選傅長虞贈何邵王濟詩驥躊躇於弊輂兮遇孫陽而得代吕望窮困而不聊生兮遭周文而舒志廣文選東方曼倩沈江假翼鳴鳳條濯足升龍淵文選陸士衡從梁陳詩種葵北園中葵生鬱萋萋朝榮東北傾夕穎西南晞零露垂鮮澤朗月耀其輝豐條並春盛落葉後秋哀慶彼晚雕福忘此孤生悲文選陸士衡園葵詩逸驥騰夷路潛龍躍洪波文選潘尼贈河陽詩良田無晚嵗膏澤多豐年文選曹植贈徐幹詩振短翮與鸞鳳並翔文選沈休文和謝宣城詩注如得龍躍天衢振翼雲漢揚聲紫微垂光虹霓足以昭近署之多士增四門之穆穆文選孔融薦禰衡表夫蕭規曹隨留侯畫策陳平出竒功若泰山響若坻隤雖其人之贍智哉亦會其時之可為也文選揚子雲解嘲奮躍淵塗跨騰風雲文選潘嶽楊荆州誄夫攀驪龍之髯撫翠禽之毛者而不得絶霞肆跨天津者未之前聞也補文選郭璞客傲援華英而不遑豈暇修枯籜於榛穢哉廣文選郤令先釋譏慶雲興以招龍和風起而儀鳳誠巖穴耀穎之秋河津託乘之日也廣文選陸士龍移太常府薦張贍天庭明兮雲霓藏三光朗兮鏡萬方斥蜥蜴兮進龜龍策謀從兮翼機衡楚辭王逸守志璧由識者顯龍因慶雲翔茨棘非所憩翰飛逰髙岡藝文類聚人部贈答詩忽有一飛鳥五色雜英華一鳴衆鳥至再鳴衆鳥羅長鳴搖羽翼百鳥互相和藝文類聚人部言志詩寶珠出東國美玉産南荆隋侯曜我色卞氏飛吾聲藝文類聚人部言志詩按轡安行誰謂路長藝文類聚雜文部詩江籬生幽渚微芳不足宣被蒙風雲會移居華池邊藝文類聚樂部論樂詩澤蘭被荒徑孤芳豈自通幸逢瑶池曠得與金芝叢藝文類聚樂部論樂詩奪摶風之逸羽窮送日之逺路藝文類聚職官部諸王碑操檜楫於龍津荷梓梁於雲構藝文類聚職官部録尚書表陳蘿故葛攀附不涯解角蛻鱗超踰非次藝文類聚職官部太子詹事啓乘風鬱起化成龍翼藝文類聚職官部僕射墓志值龍顔之鬱起乃慿風而矯翼指皇邑而南轅駕修衢以騁力藝文類聚居處部宅舍賦東臯有一駿名曰千里駒絡首纒騣尾養以甘露芻藝文類聚獸部馬詩南山石嵬嵬松柏何離離上枝拂青雲中心十數圍洛陽發中梁松樹竊自悲斧鋸截是松松樹東而摧持作四輪車載至洛陽宫觀者莫不歎問是何山林誰能刻鏤此公輸與魯班被之用丹漆薰用蘇合香本是南山松今為宫殿梁藝文類聚木部柏歌譬猶龍之未升與魚鱉為伍及其升天鱗不可覩事文類聚龍公孫洪答東方朔書何期毳毛湮淪墜灑漳濱之水逸翮摩霄輕託蓬萊之頂文苑英華尹義尚勸諭上書匠石回顧朽材變於雕梁孫陽一言奔蹄成於駿馬文苑英華庾信謝文序并和詩啓翼靈鳳於蒼梧起滯龍於潢汚初學記天部雲當其潛光荆野抱璞未理衆視之以為石獨見分於卞子曠千載以遐棄欻一朝而見齒為有國之偉寶薦神祗於明祀豈連城之足云喜遭遇於知己初學記寶器部玉注譬如大地至雨際時見上空中密雲含潤天將昏暗漸降大雨陂湖池沼處處充溢大地原隰上下俱潤密雲垂覆甘雨普洽令諸藥物卉木叢林枝葉花果悉皆茂盛水陸山川香氣芬馥波羅蜜多經六百如春陽月天降時雨樹木枝條而便出生大寶積經卷五十五譬如夏月暑燋草木得霖雨時便復茂生五榖豐盛修行道地經行空品如雨潤種能令必生大智度論卷十五審時或躍在淵進旡咎也易乾或躍在淵自試也易乾冬寒夏燠雖有定時或夏須漸寒冬當漸熱雨足則思㿩㿩久則思雨草木春則待風而長秋則待風而落皆是無定時也尚書正義洪範魚之性寒則逃於淵溫則見於渚喻賢者世亂則隱治平則出鄭氏箋詩鶴鳴衛人迎新婦婦上車問驂馬誰馬也御曰借之新婦謂僕曰拊驂無笞服車至門扶教送母曰滅竈將失火入室見臼曰徙之牖下妨往來者主人笑之此三言者皆至言也然而不免為笑者早晚之時失也戰國策衛嗣君墨子北之齊遇日者日者曰帝以今日殺黑龍於北方而先生之色黑不可以北墨子不聽遂北至淄水不遂而返焉史記日者列傳注旱極則水水極則旱故於旱時而預蓄舟水時預蓄車以待其貴收其利也前漢書貨殖傳注龜鳳山翳霧露不除踴躍草萊秪見其愚後漢書蔡雍傳家雞野鵠猶尚知時況於人乎魏志管輅傳注當其有事也則足非千里不入於輿刃非斬鴻不韜於鞘是以駑蹇望風而退頑鈍未試而廢及其無事也則牛驥共牢利鈍齊列而無長塗犀革以決之此離朱與瞽者同眼之説也處守平之世而欲建殊常之勳居太平之際而吐違俗之謀此猶却步而登山鬻章甫於越也晉書張載傳大火猶西流而怪蟄蟲之不藏也晉書律厯志下且女亦大早計見卵而求時夜見彈而求梟炙莊子齊物論宋之富賈有監止子者與人爭買百金之璞玉因佯失而毁之負其百金而理其毁瑕得千鎰焉事有舉之而有敗而賢其母舉之者負之時也韓非子説林咼氏之璧夏后之璜揖讓而進之以合歡夜以投人則為怨時與不時淮南子説山訓春貸秋賦民皆欣春賦秋貸衆皆怨得失同喜怒别為其時異也淮南子説山訓見彈而求梟炙見卵而求晨夜見黂而求成布雖其理哉亦不病暮淮南子説山訓木方茂盛終日采而不知秋風下霜一夕而殫淮南子説林訓使人無度河可中河使無度不可淮南子説林訓古者五帝貴德三王用義五霸任力今取帝王之道而施之五霸之世是猶乘驥逐人於榛薄而蓑笠盤旋也今霜降而樹榖冰泮而求穫欲其食則難矣淮南子人間訓蝙蝠夜藏不敢晝行焦氏易林豫之小畜秋冬探巢不得鵲雛焦氏易林觀之屯春東夏南隨陽有功焦氏易林離之困狸首伏藏以夜為利焦氏易林艮之大畜子欲以儀秦之術行於成康之世猶鷹隼之羣而爭於鸞鳳之林其不然亦明矣天祿閣外史時勢秋蠺不成冬種不生焦氏易林旅之訟春秋戰國以迄於今談兵者雲集角武者熛舉上則折衝于帷幄下則覆軍而殺將當此之時禮樂無有也夫制敵者非揖讓之化強國者非威儀之容故禮樂不可治於用武之世也明矣天祿閣外史問兵五榖生地一豐一耗榖糶在市一貴一賤豐者未必賤耗者未必貴豐耗有嵗貴賤有時時當貴豐榖價增時當賤耗榖直減夫榖之貴賤不在豐耗猶國之治亂不在善惡王充論衡治期篇小暗謂之沛大暗謂之蔀暗甚則明盡未盡則明昧明盡則斗星見明微故見昧周易略例卦略翔集而不擇木者必有離罻之禽矣出身而不料時者必有危辱之士矣時之得也則飄乎猶應龍之覽景雲時之失也則蕩然若巨魚之枯崇陸是以智者藏其器以有待也隱其身而有為也抱朴子外篇良規當其所須則無賤非其時則無貴貴賤有時誰能常也郭子注莊徐無鬼飛轡西頓則離朱與矇瞍收察懸景東秀則夜光與碔玞匿耀是以才換世則俱用功偶時而並劭文選陸機演連珠夜行被繡不足為榮廣文選蘇子卿報李陵書上行下效斯謂之教陳兵策於安平之世譬令未病者服藥意林正論雁候隂陽待時乃舉冬南夏北貴其所有藝文類聚鳥部雁圖官在亂世覔富在荒年文苑英華徐陵贈答上書觸露不搯葵日中不翦韭爾雅翼葵主春者鳥星昏中可以種稷主夏者心星昏中可以種黍主秋者虛星昏中可以種麥主冬者昴星昏中則入山可以具器械王者南靣而坐視四星之中而知民之緩急急則不賦力役玉海天文天文書上春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病者各以其時為齊故刺肥人者秋冬之齊刺瘦人者以春夏之齊黃帝素問靈樞經終始譬如日出照蓮華池熟者先開生者未敷大智度論卷八如月十四日十五日雖同為月十四日不能令大海水潮大智度論卷九十四譬如大海中龍死相出時如果熟應墮金翅鳥則來食之大智度論卷九十七昔有大富長者左右之人欲取其意皆盡恭敬長者唾時左右侍人以腳踏却有一愚者不及得踏而作是言若唾地者諸人踏却欲唾之時我當先踏於是長者正欲咳唾時此愚人即便舉腳踏長者口破脣折齒長者語言汝何以故踏我脣口愚人具答所由故唾未出舉腳先踏望得汝意凡物須時時未及到強設功力反得苦惱以是之故世人當知時與非時法苑珠林卷五十四審理黍可為酒禾入水也一貫三為王推一合十為士孔子集語上昔者東夷慕諸夏之義有女其夫死為之納私壻終身不嫁不嫁則不嫁矣然而非貞節之義也蒼梧之弟娶妻而美好請與兄易忠則忠矣然非禮也孔子集語下棟生撓不勝任則屋覆而人不怨者其理然也弱子慈母之所愛也不以其理動者下瓦則慈母笞之故以其理動者雖覆屋不為怨不以其理動者下瓦必笞管子形勢解塗之人可以為禹則然塗之人能為禹未必然也雖不能為禹無害可以為禹足可以遍行天下然而未嘗有能遍行天下者也荀子性惡凡物之有形者易裁也易割也何以論之有形則有短長有短長則有小大有小大則有方圎有方圎則有堅脆有堅脆則有輕重有輕重則有白黑長短大小方圎堅脆輕重白黑之謂理理定而物易割也韓非子解老髙陽應將為室家匠對曰未可也木尚生加塗其上必將撓以生為室今雖善後將必敗髙陽應曰緣子之言則室不敗也木益枯則徑塗益乾則輕以益徑任益輕則不敗匠人無辭而對受令而為之室之始成也善其後果敗髙陽應好小察而不通乎大理也驥驁緑耳背日而西走至乎夕則日在其前矣目固有不見也智固有不知也數固有不及也吕氏春秋别類善用針者從隂引陽從陽引隂以右治左以左治右以我知彼以表知裏以觀過與不及之理黃帝素問內經隂陽應象大論動而不乘其理若泛舟而無柂太平御覽舟部柂譬若絶工之師能作殿舍意欲揆作如日月宫殿令髙無不見者於須菩提意乃能作不須菩提言日月宫殿甚髙終不能作道行波羅蜜經卷四譬如金師見彼金性作是思惟如此金性何由生垢今當推尋生垢之本為得本不若盡夀思惟尋初因相乃至無始得本際不既不得本亦不得金若巧方便精勤不懈除彼金垢爾乃得金大法鼓經卷下譬如眀眼有目之人豈可羡於盲瞎人不譬如解脫無事之人豈可羡於牢獄繫縳有事人不譬如饒財巨富之人豈可羡於貧窮飢凍乞索人不譬如明了黠慧之人豈可羡於狂顛人不佛本行集經卷二十三譬如田家耕犂種榖多收斂著囤中至後嵗不復耕不復種但仰囤中榖食其田家寧復望得新榖不那先比丘經卷上譬如健鬬人把弓持箭前行向敵以五箭射敵得勝其人寧復望箭歸歸不那先比丘經卷上譬如醫師持五種藥詣病者家以藥飲病人病者飲藥得愈醫寧復望得故藥復行治人不那先比丘經卷上那先言譬如人備火豫作戒火五瓶水如有失火者其人持五瓶水水滴滅火火滅以後其救火人寧復望得完瓶歸家用不王言其人不復望瓶破火滅豈復望瓶耶那先比丘經卷上譬如人盜他人禾穟其主得盜便牽問之汝盜我禾穟為盜者言我不盜卿禾穟卿自種禾我自取穟我何用為犯盜兩人相牽至王前白如是誰為直者誰為不直王言種禾榖為直盜者為不直種禾者為本有不種禾者為無緣何有穟那先比丘經卷中譬如人盜他人果蓏其主得盜果者將至王前白言是人盜我果其盜者言我不盜是人果是人所種小栽耳本不種果也我自取果我何用為盜如是兩人共爭誰為直者誰不直者王言種栽家為直本種栽家所種從栽根生故上有果耳那先比丘經卷中譬如人夜然燭火著壁欲用自照飯食燭稍却及壁上及竹木林材便燒一舍火大熾延及燒一城中舉城中人民共嚾言汝何為燒一城中乃如是然火者言我但然小燭火以自照飯食耳是自大火非我火也如是便共爭訟相牽至王前誰為直者誰為不直者王言然火者為不直本是火所生也汝飯食已不當滅火也而令火燒一城中那先比丘經卷中譬如人持瓶從牧家買乳湩得湩已復還寄其主言我今還不久其人須臾來還取瓶湩湩以轉作酪買湩家言我持湩寄卿今反持酪還我牧牛者言是汝故乳今自轉為酪兩人因共爭訟相牽詣王前誰為直者王言牧牛家為直汝自買湩停置地自轉成酪那先比丘經卷中譬如人以錢娉求人家小女以後女長大他人復更求娉求女得女以為婦前所娉家來自説言汝反取婦為後家言汝自小時娉女我自大時娉婦我何用為嬰汝婦耶便相牽詣王前誰為直者誰為不直者王言前娉家為直是女本小今稍長大是故知為直也是前娉家婦也那先比丘經卷中譬如鑽火以木則火可得析薪求火火不可得大智度論卷十一如言日食千兩金金不可食因金得食故言食金大智度論卷三十無處無位牛角等而出於乳必無是處彼乳房斯有是處無處無位鑽搖水瓶而出生酥必無是處鑽搖於酪斯有是處無處無位壓沙出油必無是處壓苣蕂等斯有是處無處無位鑽濕木等而出於火必無是處鑽於乾木斯有是處瑜伽師地論五十五物不生非物者如石女不生子非物不生物者如龜毛不生蒲百論卷下守九如須油者要從麻取不笮於沙十二門論守六亦猶神農唱粒食以充飢虛黃帝垂衣裳以禦寒暑若閉口而望飽裸袒以求溫不能強與之也𢎞明集正誣論夫目所不覩惟屏為隔耳所不聞遐邇致擁不得以不聞不見便謂無聲無物𢎞明集十如日垂沒山陵堆阜影現東移理無西逝法苑珠林卷六十九喻林卷三十五
