body:
  text: 喻林卷十一明徐元太撰人事門九審宜无妄之藥不可試也易无妄有妄致疾其藥可用若身既无妄自然致疾其藥不可試也若其試之恐更益疾也言非妄有災不可治也若必欲治之則勞煩於下害更甚也周易正義无妄潤濕不穀樹之竹􅓗莞蒲礫石不可穀樹之葛木以為絺綌以爲材用汲冡周書文傳解匏有苦葉濟有深涉深則厲淺則掲與器同苦詩國風匏有葉遭時制宜如遇水深則厲淺則揭矣男女之際安可以無禮義將無以自濟也毛詩匏有苦葉註凢治兎之宜鮮者毛炮之柔者炙之乾者燔之鄭氏箋詩匏葉將稼者必先相地之宜而擇其種鄭氏箋詩大田丈夫陽也陽動故多謀慮則成國婦人隂也隂靜故多謀慮乃亂國鄭氏箋詩瞻卬人采苓采苓於何處采之於首陽之巔采之以興獻公問細小之行於何處求之於小人之身求之毛詩正義采苓彼終南大山之上何所有乎乃有條有梅之木以興彼盛徳人君之身何所有乎乃宜有榮顯之服然山以髙大之故宜有茂木人君以盛徳之故宜有顯服若無盛徳則不宜矣毛詩正義終南治兵則幼賤在前振旅則尊老在前釋文云出為治兵尚威武也入為振旅反尊卑也孫炎曰出則幼賤在前貴勇力也入則尊老在前復常法也毛詩正義采芑且夫茅茨採椽至質之物建日月乘玉輅以處其中象箸玉杯而食於土簋非其類也毛詩正義靈臺地有山川髙下物生各有所宜人君當效之亦順合所宜而任之山者不使居川渚者不使居中原毛詩正義周頌譜居山以魚鼈為禮居澤以鹿豕為禮君子謂之不知禮禮記禮器治雖用禮不本其所宜如農夫徒耕而不下種子也禮記正義禮運山有木工則度之賓有禮主則擇之左傳隱公十一年凢邦國之使節山國用虎節土國用人節澤國用龍節周禮地官掌節以玉作六器以禮天地四方以蒼璧禮天以黄琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方周禮春官大宗伯行澤者欲短轂行山者欲長轂短轂則利長轂則安行澤者反輮行山者仄輮反輮則易仄輮則完周禮考工記方圓角直曲斜凹凸必有形逺近髙下長短疾緩必有制寒暑燥濕風雨逆順必有時金木水火土石羽毛必有濟布帛桑麻筋角齒革必有用三墳形墳張儀欲以漢中與楚請秦王曰有漢中槖種樹不處者人必害之家有不宜之財則傷今漢中南邉爲楚利此國累也戰國䇿秦武王鴻鵠巢於髙林之上暮而得所棲黿鼉穴於深淵之下夕而得所宿夫趣舎行止亦人之巢穴也且各得其棲宿而已天下非所保也後漢書逸民列傳如以舟無推陸之分瑟非常調之音不限局以疑逺不拘𤣥以妨素則化樞各管其極後漢書王仲列傳古善漁者宿沙渠子使漁山側雖十宿沙子不得漁焉宿沙非暗於漁道也彼山者非魚之所生也後漢書馬融傳註魚潛於淵出水喣沫何則物有本性不可横處非分也呉志王蕃傳註夫珍木嘉樹其品非一莫不植根深岨致之未易藉地廣之資因人多之力則役苦費深為敝滋重是以上古聖王采椽不斷斷之則懼刻桷彫楹莫知其限也哲人縣鑑微逺杜漸防萌知采椽不愜後代之心不斷不爲將來之用故加朱施漆以傳厥後散木凢材皆可入用宋書禮五志若謂氊裘之民可以决勝於荆越必不可矣而曰樓船之夫可以爭鋒於燕冀豈或可乎宋書索虜傳雖舟車均於致逺而有川陸之節佛道齊乎達化而有夷夏之别若謂其致既均其法可換者而車可涉川舟可行陸乎南齊書顧歡傳圓行方止器之異也金剛水柔性之别也善御性者不違金石之質善爲器者不易方圓之用梁書張充傳太和五銖雖利於京邑之肆而不入徐揚之市土貨既殊貿鬻亦異便於荆郢之邦者則礙於兖豫之域魏書食貨志夫冬日之不濫非愛水也夏日之不焬非愛火也為不適於身便於體也管子禁藏歲有春秋冬夏月有上下中旬日有朝暮夜有昏晨半星辰序各有其司故曰天不一時山陵岑巖淵泉閎流泉踰瀷而不盡薄承瀷而不滿髙下肥墝物有所宜故曰地不一利鄉有俗國有法食飲不同味衣服異采世用器械規矩繩准稱量數度品有所成故曰人不一事管子宙合夫慮事定物辨明禮義人之所長而蝚蝯之所短也緣髙出險蝚蝯之所長而人之所短也蝚蝯之所長責人故其令廢而責不塞故曰墜岸三仞人之所大難也而蝚蝯飲焉管子形勢解今夫挽車者前呼邪軤火乎切後亦應之此挽車勸力之歌也雖鄭衞胡楚之音不若此之義也文子微明獵羆虎者不於外圂鈎鯨鯢者不居清池何則圂非羆虎之窟也池非鯨鯢之泉也鄧析子無厚烏獲輕千鈞而重其身非其身重於千鈞也勢不便也離朱易百步而難眉睫非百步近而眉睫逺也道不可也故明主不窮烏獲以其不能自舉不困離朱以其不能自見韓非子觀行今舉大木者前呼輿謣後亦應之此其於舉大木者善矣豈無鄭衞之音哉然不若此其宜也夫國亦木之大者也吕氏春秋淫辭白圭新與惠子相見也惠子説之以彊白圭無以應惠子出白圭告人曰人有新取婦者婦至宜安矜烟視媚行豎子操蕉火而鉅新婦曰蕉火大鉅入於門門中有歛䧟新婦曰塞之將傷人之足此非不便之家氏也然而有大甚者今惠之遇我尚新其説我有大甚者吕氏春秋不屈若夫舜湯則苞裹覆容緣不得已而動因時而為以愛利為本以萬民為義譬之若釣者魚有大小餌有宜適羽有動靜吕氏春秋離俗堯之治天下也舜爲司徒契爲司馬禹爲司空后稷爲大田師奚仲爲工其導萬民也水處者漁山處者木谷處者牧陸處者農地宜其事事宜其械械宜其用用宜其人澤皋織網陵阪耕田得以所有易所無以所工易所拙是故離叛者寡而聽從者衆譬若播棊丸於地員者走澤方者處髙各從其所安夫有何上下焉若風之遇蕭忽然感之各以清濁應矣淮南子齊俗訓今之裘與蓑孰急見雨則裘不用升堂則蓑不御此代為常者也譬若舟車楯肆窮廬故有所宜也故老子曰不上賢者言不致魚於木沉鳥於淵淮南子齊俗訓聖人財制物也猶工匠之斵削鑿枘也宰庖之切割分别也曲得其宜而不折傷拙工則不然大則塞而不入小則窕而不周動於心枝於手而愈醜淮南子齊俗訓為魚徳者非挈而入淵為蝯賜者非負而縁木縱之其所而已淮南子説山訓亡者不敢夜揭炬保者不敢畜噬狗淮南子説山訓染者先青而後黒則可先黒而後青則不可工人下漆而上丹則可下丹而上漆則不可萬事猶此所先後上下不可不審淮南子説山訓􅩷䩉在頰則好在顙則醜繡以為裳則宜以為冠則譏淮南子説林訓明月之光可以逺望而不可以細書甚霧之朝可以細書而不可以逺望尋常之外淮南子説林訓嘗被甲而免射者被而入水嘗抱壺而度水者抱而蒙火可謂不知類矣淮南子説林訓夜行者掩目而前其手涉水者解其馬載之舟事有所宜而有所不施淮南子説林訓漁者走淵木者走山所急者存也朝之市則走夕過市則步所求者亡也淮南子説林訓事有所至而巧不若拙故聖人量鑿而正枘淮南子人間訓水火金木土穀異物而皆任規矩權衡凖繩異形而皆施丹青膠漆不同而皆用各有所適物各有宜輪圓輿方轅從衡横勢施便也驂欲馳服欲步帶不厭新鈎不厭故處地宜也淮南子秦族訓方軸圓輪車行不前組囊以錐失其事便焦氏易林无妄之損汚泥為陸不田宜稷焦氏易林㢲之師靈塲之威宜夜矣乎揚子問明次六凖繩規矩不同其施測曰凖繩規矩乖其道也太𤣥經第一戾次六入水載車出水載杭宜于王之更測曰車杭出入其道更也太𤣥經第三更人之有骨法也猶萬物之有種類材木之有常宜巧匠因象各有所授曲者宜為輿檀宜作輻榆宜作轂此其正法通率也若有其質而工不材可如何潛夫論正列當冶工之消鐵也以土為形燥則鐵下不則躍溢而射王充論衡雷虛篇候氣變者於天不於地天文明也衣裳在身文著於衣不在於裳衣法天也王充論衡佚文篇夫不得心意所欲雖盡堯舜之言猶飲牛以酒啖馬以脯也王充論衡自紀篇且禮有所不㣥事有所不須㫁决知辠不必皋陶調和葵韭不俟狄牙閭巷之樂不用韶武里母之祀不待大牢既有不須而又不宜牛刀割鷄舒㦸采葵鈇鉞裁著盆盎酌巵大小失宜善之者希王充論衡自紀篇俗曉露之言勉以深鴻之文猶和神仙之藥以治齀欬制貂狐之裘以取薪菜也王充論衡自紀篇霜風慘烈周棄不蓺禾炎氣赫䂀曹明不製裘知時不可也貨章甫者不造閩越衒赤舄者不入跣㹫知俗不宜也劉子隨時盛暑炎蒸必藉凉風寒交氷結必處温室夏不御氊非憎惡之炎有餘也冬不卧簟非怨讐之凉自足也劉子文武无妄頁音頡顛顛趾延延子欽于父雷奮于天傳曰頁顛顛首首同之髙也趾延延足之行也子欽于父得其順也雷奮于天合其道也元包孟隂靈壇所以為威可宜夜而不可經白日揚子法言註問明篇聖賢之道動合物宜隨俗汚隆用行其正取其濟物而已由求鳥必髙其繳須魚必沈其網也李善註文選陸士衡演連珠器大者不可以小道治勢動者不可以爭競擾文選干寶晉紀總論適物之技俯仰異用應事之器通塞異任是以鳥棲雲而繳飛魚藏淵而網沈賁鼓宻而含響朗笛䟱而吐音文選陸機演連珠車輕道近鞭策不用鞭策所用道逺任重意林尸子濟溺者以金石不如尺索意林文子土不可作鐵而可以作瓦意林物理論玉為彫楹不取材於蟠木丹成繡黼豈襲冕於蘿薜何則適用有所宜朝野不可一指藝文類聚職官部太常表以珠彈不如泥丸各有所用也藝文類聚軍器部彈席為冬設簟為夏施藝文類聚服飾薦蓆凢㑹膳食之宜牛宜稌羊宜黍豕宜稷犬宜梁鴈宜麥魚宜苽凢君子之食嘗放焉藝文類聚食物部食智有所不足故桐不可與為弓藝文類聚木部桐干將莫耶天下之利劍也水㫁鵠鴈陸㫁馬牛將以補屩曽不如一錢之錐藝文類聚獸部馬東方朔傳曰騏驥騄耳飛兎驎駵天下之良馬者也將以捕鼠於深宫之中曽不如跛犬初學記獸部馬註種蘭忌當門懷璧莫向楚楚少别玉人門非種蘭所何氏語林黜免明鏡蒸食未為得所干將補履尤可傷嗟是以氣足凌雲不應止為一作官武騎才堪王佐不應直放長沙文苑英華庾信連珠水不策驥陸不乗舟世無為而俎豆設時有虞而干戈滌太平御覽地部陸公輸子巧用材也不能以檀為瑟太平御覽樂部瑟稼農之本穡農之末農本輕而末重前緩而後急稼欲少穡欲多耨欲緩收欲速此良農之務太平御覽資産部穡黄金滿筒不以投龜明珠徑寸豈勞彈雀太平御覽鱗部龜宿沙瞿子善煮鹽使煮潰沙雖十宿沙不能得也太平御覽飲食部鹽古歌有曰髙田種小麥終乆不成穗爾雅翼麥諺云不聰不明不能為王不瞽不聾不能為公困學紀聞卷下諸子昔三人晨行觸霧一人健一人病一人死健者飲酒病者飲粥死者空腹本草酒卷二十六病在胸膈以上者先食後服藥病在心腹以下者先服藥而後食病在四肢血脉者宜空服而在旦病在骨髓者宜飽滿而在夜本草一卷夫癰氣之息者宜以鍼開除去之夫氣盛血聚者宜石而寫之此所謂同病異治也黄帝素問内經病能論有病膺腫頸痛胸滿腹脹此為何病何以得之岐伯曰名厥逆帝曰治之奈何岐伯曰炙之則瘖石之則狂須其氣并乃可治也黄帝素問内經腹中論刺瘧者必先問其病之所先發者先刺之先頭痛及重者先刺頭上及兩額兩肩間出血先項背痛者先刺之先腰脊痛者先刺郄中出血先手臂痛者先刺手少隂陽明十指間先足脛痠痛者先刺足陽明十指間出血黄帝素問内經刺瘧論兵法曰無迎逢逢之氣無擊堂堂之陣刺法曰無刺熇熇之熱無刺漉漉之汗無刺渾渾之脉黄帝素問靈樞經逆順刺虛者須其實刺實者須其虛黄帝素問内經寶命全形論食者所以治百骸失其時而生百病動者所以安萬物失其機而傷萬物隂符經集註鬼谷子夫饑而倍食渴而倍飲熱而投水寒而入火所苦雖除其身必死胸中有瘕不可鑿喉中有疾不可剥也蟁䖟著面不可射也蟣虱著身不可斫也何則欲除小患而生大賊也道徳經指歸卷十合其時而食則百骸治應其機而動則萬化安乖時失機則禍亂生也天機經安如繫蝦蟆在獼猴手而此獼猴面不囘顧大寶積經卷二譬如牧牛人不知淺處駈牛入水於深處而渡彼牛捨此未到彼岸於其中流而受困危大寶積經七十二譬如木柱若以草土不能斬截必以利斧乃能斬之大寶積經卷八十八譬如曠野之中若山上不生蓮花及優鉢華也佛遺日摩尼寳經推六法若為羅闍作者於浄宅内修耳若欲求於白象者徃象坊作之必獲本願若欲求馬良者於馬坊作法必獲本願若蛇螫者於大池有龍之處作法即可文殊師利寳藏尼經羔七如世醫師明識衆生有風痰熱病其病未起爲逆治不可也文殊師利問經卷下譬如求火鑚木陽燧乃出火耳不從水中而出火矣佛説魔逆經羊十猶如有人至毒家舎竟不服毒自生驚怖受大苦痛發聲大呼我今遇毒我今遇毒有義良醫持不實藥令是病人除不實病得離衆苦若是良醫持於實藥與是人者是人活不不也是人實不服食於毒自生毒想須不實藥以療治之大方廣如來秘宻藏經卷下譬如大國王所寶䕶身刀若在屠膾舎法應強奪取帝王所珍器不應屬惡人鴦崛摩羅經卷二如知山有金故鑿山求金而不鑿樹以無金故鴦崛摩羅經卷四譬如車行當以油塗蘓婆呼童子經卷上譬如初學學五字句界成句偈欲先知義然後乃學當得知不要當先學然後乃知彼善學已然後乃敎界成句義引譬示之彼能聽受大法鼔經卷下猶如有人欲得油者以榨具盛麻子以煖湯漬而取壓之彼必得油所以者何以正求油謂壓麻子也中阿含經卷四十五猶如有人欲得酥者以器盛酪以抨抨之彼必得酥所以者何以正求酥謂抨酪也中阿含經卷四十五如人欲得捉蛇先以鐵杖壓彼蛇項手捉其頭彼蛇雖反尾迴或纒手足及餘肢節然不能蜇捉蛇而得此義不受極苦亦不疲勞所以者何彼以善解取蛇法故中阿含經卷五十四猶如有目之士以淨明珠投白繒上兩不相汙二俱淨故長阿含經卷一譬如然火欲令其滅去其樵炭彼火則滅雜阿含經卷二十七譬如菓美而樹髙無因得食唯有伐樹根躃枝從食菓必矣中本起經現變品猶人須華當詣園圃須珍寶者當詣大海出矅經八信品譬如病疥瘙之轉多身壞増劇良醫授藥疥痒自止禪法要解經卷上榮九譬如放牛以牛難失故守之少事如放獼猴易失故守之多事三昧法門經卷上譬如病人宜將養若復放捨無得活三昧法門經下譬如金師韛扇炭用巧非時失韛法怱怱急韛不知時或時水澆或放捨金融急韛則消過未融便止則不消非時水澆金則生非時放置則不熟三昧法門經卷下如犢未生􅢇牛乳乳不可得非時故若犢生已􅢇牛角乳不可得無智故如鑚濕木求出火火不可得非時故若析乾木以求火火不可得無智故三昧法門經卷下譬如以金錢買銅錢人無笑者何以故賣買法應爾故大智度論卷一譬如師子百獸之王爲小蟲吼爲衆所笑若在虎狼猛獸之中奮迅大吼智人所可大智度論卷三如遭風雨則入舎持盖如地有刺則著鞾鞋大寒然火熱時求水大智度論卷五譬如人從木求火從地求水從扇求風如是等種種各有因縁大智度論卷六譬如利刀著好飲食中刀便生垢飲食雖好而與刀不相宜若以石磨之脂灰瑩治垢除刀利大智度論卷十如人有瘡則須藥塗若無瘡者藥無所施大智度論卷十譬如下藥以巴豆爲主若除巴豆則無下力大智度論卷二十譬如御者試馬曲折隨意然後入陣大智度論卷二十譬如人渴得一掬水則足不須瓶器持水若共大衆人民則須瓶甕持水大智度論卷二十八譬如以不淨器盛諸美食人所不喜如臭皮嚢盛諸寶物取者不樂大智度論卷二十九譬如人爲非人所持而罵辱良醫良醫是時但爲隂鬼不嫌其罵大智度論卷三十譬如梁椽因縁和合故名舍舍空而梁椽不應空大智度論卷三十一譬如軍立宻號有知者有不知者大智度論卷三十八譬如藥師和合諸藥冷病者與熱藥於熱病中爲非藥大智度論卷四十四譬如和合下藥巴豆最有力大智度論卷五十三譬如求重寶必於大海寶山中求之不應在溝瀆臭穢處求大智度論卷五十五譬如深水不應使小兒渡應敎大人令渡大智度論卷六十六譬如小兒可以小杖鞭之不可與大杖大智度論卷六十七譬如以鉗取火雖捉而不燒大智度論卷七十二譬如執菅草捉緩則傷手若捉急則無傷大智度論卷七十六如良醫過去病不可治見在病亦不可治服藥但能治應起病破其冷熱不復令起又如失火燒舎不爲已過火故勤滅亦不爲現在火故勤滅但爲未來火不令更燒故勤滅良醫滅火人勤方便亦不虚大智度論卷九十可熏者則能受熏是故金銀石等皆不可熏以不能受熏故攝大乗論釋卷二如服蘇膏能除風疾不遣痰癊廣百論卷十渴者不必須江海而飲饑者不必待敖倉而飽𢎞明集牟子理惑論示其渡水之方則使資舟艥不能令步涉而得濟也𢎞明集正誣論玉佩金貂莫施於樵野荷衣蕙帶弗踐於王庭故應器非靈廟所陳染衣異朝宗之服辨正論卷六大物當置之大處曷為囘龍象於兎徑注大海於牛跡乎僧肇註維摩詰經弟子品心隱感以心爲深過心則謂之淺末矣周易正義咸我心匪鑒不可以茹音孺柏詩國風舟鑒之察形但知方圓白黑不能度其真僞鄭氏箋詩柏舟人心之不同如其面焉吾豈敢謂子面如吾面乎左傳襄公三十一年莊周有言人情險於山川以其動静可識而沈阻難徵故深厚之性詭於情貌後漢書郭太傅論世路險􅤡一至於此太行孟門寜云􅀈絶梁書任昉傳凢人心險於山川難於知天天猶有春秋冬夏旦暮之期人者厚貌深情莊子列禦冦心所説毁舟爲杖心所欲毁鍾爲鐸淮南子説林訓夫事之所以難知者以其竄端匿跡立私於公倚邪於正而以勝惑人之心者也若使人之所懷於内者與所見於外者若合符節則天下無亡國破家矣夫狐之捕雉也必先卑體弭耳以待其來也雉見而信之故可得而擒也使狐瞋目植睹見必殺之勢雉亦知驚憚遠飛以避其怨矣夫人僞之相欺也非直禽獸之詐計也物類相似若然而不可從外論者衆而難識矣是故不可不察也淮南子人問訓不潔在面人皆耻之不潔在心人不肯愧以面露外而心伏内故善飾其情潛姦隱智終身不可得而見也劉子心隱二儀之大可以章程測也三綱之動可以表裏度也雷霆之聲可以鍾鼔傳也風雨之變可以音律和也故有象可觀不能匿其影有形可見不能隱其跡有聲可聞不能藏其響有色可察不能滅其情夫天地隂陽之難明猶可以術數揆而耳目可知至於人也心居於内情伏於裏非可以筭數測也劉子心隱日在天之外而心在人之内物亦照焉照之於外不可以僞内者也而僞猶生焉心在人之内而智又在其内神亦照焉外之於内無所取徵也而欲求其情不亦難乎劉子心隱物形外顯人神内藏外顯易察内藏難明掦子法言註問神篇天布列象物所以知其度此即逺猶䟱淵之積水人所不能測此即藏於器也李善註文選陸士衡演連珠動循定檢天有可察應無常節身或難照是以望景揆日盈數可期撫臆論心有時而謬文選陸機演連珠晷景有節尺圭可以知其數深情難測淵識不能知其心故光武蔽於龎萌魏武失之張邈文選陸士衡演連珠情見於物雖逺猶䟱神藏於形雖近則宻是以儀天步晷而修短可量臨淵揆水則淺深難察文選陸機演連珠納衆惡拒羣善方寸地九折坂藝文類聚人部性命賦楚越無以况其迥殊山川未足方其險阻藝文類聚職官部吏部尚書表所言不了了藏惡在於心如灰覆炭火設躡燒人足修行道地經慈品喻林卷十一
