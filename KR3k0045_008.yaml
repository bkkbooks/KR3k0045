body:
  text: 喻林卷八明徐元太撰人事門六疾邪羸豕謂牝豕也羣豕之中豭强而牝弱故謂之羸豕也夫陰質而躁恣者羸豕特甚焉言以不貞之陰失其所牽其為淫醜若羸豕之孚務蹢躅也王弼注易姤山有扶蘇隰有荷華叶芳無反不見子都乃見狂且音疽山有橋松隰有游龍不見子充乃見狡童詩國風山有扶蘇墓門有棘斧以斯之夫也不良國人知之墓門有梅有梟萃止夫也不良歌以訊叶息悴反之詩國風墓門為鬼為蜮音域則不可得有靦音腆面目視人罔極詩小雅何人斯扶蘇鄭靈公棄其世臣而任嬖人狂狡子良諫之而作是詩詩說鄭墓門刺陳他也陳他無良師傅以至於不義惡加於萬民焉毛詩墓門無逝我梁無發我笱箋云之人梁發人笱此必有盜魚之罪以言褒姒淫色來嬖於王盜我太子母子之寵鄭氏箋詩小辨虹氣見於東方為夫婦過禮之戒君子之人尚莫之敢指而視之况今淫奔之女見為過惡我誰敢視之也毛詩正義􅤔蝀斧斨者生民之所用以喻禮義者亦國家之所用有人既破我家之斧又缺我家之斨損其斧斨是廢其家用其人是為大罪以喻四國之君廢其禮義壞其國用其君是為大罪毛詩正義破斧薰是香草蕕是臭草一薰一蕕言分數正等使之相和雖積十年尚猶有臭氣香氣盡而臭氣存言善惡聚而多少敵善不能止惡而惡能消善春秋正義僖公四年方今天下聞崇之反也咸欲騫衣手劍而叱之其先至者則拂其頸衝其胸刃其軀切其肌後至者欲撥其門仆其牆夷其屋焚其器應聲滌地則時成創前漢書王莽傳輿猶膩也近則汚人晉書劉輿傳我於水中見蟹且惡之晉書解系傳國人疾視之如目有眯焉子華子晏子敗魚飽室臭不可息焦氏易林隨之同人衆惡之堂相聚為殃焦氏易林大壯之泰雷霆所擊誅者五逆焦氏易林大壯之復次八鴟梟在林㕹於交切彼衆禽測曰鴟梟在林衆所㕹也太𤣥經第五聚天地無不容也不容乎天地者其唯不仁不誼乎太𤣥經太𤣥文子椒為楚大夫虛蘭芷之位而行浮慢佞諛之志王逸注楚辭離騷經鵂鶹江東呼為怪鳥聞之多禍人惡之掩塞耳矣張華注禽經夫以抄盜致財雖巨富不足嘉凶德脅人雖見憚不足榮也抱朴子外篇疾謬聞其言者猶鴟梟之來鳴也覩其面者若鬼魅之見形也其所至詣則如妖怪之集也其在道塗則甚逢虎之羣也抱朴子外篇疾謬如此之徒雖能令壤蟲雲飛斥鷃戾天手捉刀尺口為禍福得之則排冰吐華失之則當春雕悴余代其踧蹐恥於共世抱朴子外篇交際余徒恨不在其位有斧無柯無以為國家流穢濁於四裔投負人於北波抱朴子外篇交際賊鳥所在衆禽所避賊人所在衆賢亦所惡太𤣥經第五聚解譬有人來伐其子而長養彼心反勸助之弗救其子者止以子惡故也言湯武疾惡其心亦然前漢書注翟方進傳水窮則無隙不入木上出窮則旁行故為姦邪前漢書注京房傳管子曰夫士懷耿介之心不蔭惡木之枝惡木尚能恥之况與惡人同處李善注文選陸士衡猛虎行尸子曰孔子至於勝毋草矣而不宿過於盜泉渴矣而不飲惡其名也李善注文選陸士衡猛虎行古叛逆之國瀦其宮室以為汙池名曰凶墟雖生菜蔬而民不食藝文類聚草部菜蔬孔子忍渴於盜泉之水曾參回車於勝毋之閭惡其名也藝文類聚寶部珠蓋聞駑蹇服御良樂􅢻嗟鉛刀剖截歐冶歎息故少師幸而季梁懼宰嚭任而伍員憂藝文類聚雜文部連珠國中有姦久而破國身中有邪久而亡身陰符經注不與惡人同止坐起語笑談論猶如大海不宿死尸如青鸞赤鳳不棲雜木元陽妙經卷七寧近虎狼師子猛獸大火可畏之處終不親近四種五逆之人元陽妙經卷七如大猛火如四毒蛇不可親近大乘妙林經為摧法幢為破法船為斷法性為破法藏大方等大集經二十一往昔有豬名曰大腹時彼大腹引以羣豬入深山野於山野中忽逢師子師子見豬告而言曰我是獸王汝速避路大腹報言令我避路事當不可要我鬭者必不相違且止須臾待我被甲時師子言汝何上族是何名字敢能如是索我相鬬所要被甲今隨汝意時彼大腹往穢坑中遍塗其身還師子前言與汝鬬是時師子報大腹言我是衆獸中王常以麞鹿等獸而為食噉或劣弱者尚棄不食况汝不淨穢汙之身若與汝鬭實染汚我爾時師子即為大腹宣說偈言汝本不淨身今復加臭穢汝意求鬭者我即墮於汝王之所見猶如彼豬與師子鬭我如師子先墮於汝大正句王經下修行惡如七葉華正可遠瞻不中親近本緣經月光王品譬如天雹傷害五榖大智度論卷五猶蒼蠅招白黑之論蝙蝠有鳥鼠之譏蓋妖惑之儔矣辨正論卷六既同棘刺之林亦類蚖蛇之種法苑珠林卷五十二惡有三種一曰惡二曰大惡三曰惡中惡若以惡加已還以惡報是名為惡若人不侵已無故加惡是名大惡若人來供養恭敬不念報恩而反害之是名惡中惡惡中惡魔王最甚也羅什譯維摩詰經菩薩品觀人口柔者必仰面觀人之顏色而為辭似蘧蒢不能俯之人因名口柔者為蘧蒢面柔者必低首下人媚以容色似戚施之人因名面柔者為戚施故箋云蘧蒢口柔常觀人顏色而為之辭故不能俯戚施面柔下人以色故不能仰也毛詩正義新臺彼他人而有讒佞之心我能忖度而知之躍躍然者跳疾之狡兔遇值犬則能獲得之毛詩正義巧言觀其器之善惡而知工匠巧拙器善則工巧器惡則工拙禮記正義禮器曾子不逆薪而㸑知其不為暴也秦仁獲麑知其可為傅也宋書文九王建平傳但大澤之中有龍有蛇縱不盡善不容皆惡梁書賀琛傳欲知其子視其母欲知其君視其所使韓詩外傳螣蛇所指禍福不差羿之引矢命處輒中聽言察情不異於此鬼谷子反應注不知其子視其所友不知其君視其所使說苑雜言言時人無能知臧否觀衆草蒿不能别其香臭豈當知玉之美惡乎以為草木易别於禽獸禽獸易别於珠玉珠玉易别於忠佞知人最為難也王逸注楚辭離騷經夫上世之名鳳皇麒麟聞其鳥獸之奇者耳毛角有奇又不妄翔茍遊與鳥獸爭飽則謂之鳳皇麒麟矣世人之知聖亦猶此也王充論衡講瑞篇見盈丈之尾則知非咫尺之軀覩尋仞之牙則知非膚寸之口抱朴子外篇詰鮑相馬者失在於瘦千里之步虧也相人者失在於貧恩惠之迹缺也劉子辨施覩焦堯之節知非防風之脛視象之牙知其大於豕也見狸之尾知其小於豹也故覩一可以知百觀此可以明彼劉子觀量善觀察者猶風胡之别劍孫陽之相馬覽其機妙不亦難乎劉子遇不遇舜目重瞳是至明之相而項羽王莽亦目重瞳子越王勾踐長頸鳥啄非善終之象夏禹亦長頸鳥啄王莽之重瞳譬駑馬有驥之一毛而不可謂之驥也禹之長頸鳥啄猶龍有蛇之一鱗而不可謂之蛇也劉子命相故明哲之相士聽之於未聞察之於未形而監其神智識其才能可謂知人矣若功成事遂然後知之者何異耳聞雷霆而稱為聰目見日月而謂之明乎劉子知人五嶽崔巍有峻極之勢四瀆皎潔有川流之形五色鬱然有雲霞之觀五聲鏗然有鐘磬之音劉子命相易樂者必多哀輕施者必好奪文中子王道使賢不肖相去如日月之與螢火雖頑嚚之人猶察李善注文選吳都賦曹大家曰人生而心志在內聲音在外骨體有形事變有㑹更相為表裏合成一體此自然之道至於術學論其成敗考其貧賤觀其富貴各取一槩故或聽音聲或見骨體或占色理或視威儀或察心志或省言行或考卜筮或本先祖如水同源而分流也李善注文選幽通賦孫綽子曰撫明鏡則好醜之貌可見李善注文選左太冲招隱詩夫騄驥垂耳於坰牧鴻雀戢翼於汙池䙝之者故以為園囿之凡鳥外廄之下乘也及其整蘭筋揮徑翮陵厲清浮顧盼千里豈可謂其借翰於晨風假足於六駁哉文選陳琳為曹洪作書見驥一毛不知其狀見畫一色不知其美意林尸子相者曰三亭九候定於一尺之面愚智勇怯形於一寸之目意林物理論凡觀金玉寶劍銅鐵皆以辛之日待雨止明日平旦及黃昏夜半觀之所見光白者玉也赤者金黃者銅黑者鐵藝文類聚寶玉部寶諺曰侏儒見一節而長短可知孔子言舉一隅足以三隅反觀吾小時二賦亦足以揆其能否太平御覽人事部諺下兩目不相為視昔吳有二人共評玉者一人曰好一人曰醜久之不决二人各曰爾可求入吾目中則好醜分矣士有定形二人察之有得失非茍相反眼睛異耳太平御覽人事部目石門之水舊曰貪泉俗云徑大庾則清穢之氣分飲石門則淄素之質變太平御覽州郡部嶺南道廣州相經曰筋不束體血不華色手無春荑之柔髮有寒蓬之悴蓋形之下也埤雅卉物門茅此亦威鳳一羽足以驗其五德何氏語林傷逝察其盼睞則賞其心覩其顔步則知其道何氏語林識鑒汝南先賢傳孔子舍於沙丘見主人曰辨士也子路曰夫子何以識之曰其口窮踦其鼻空大其服博其睫流其舉足也高其踐地也深鹿與而牛舍困學紀聞卷十諸子色見青如草兹者死黃如枳實者死黑如炲者死赤如衃血者死白如枯骨者死此五色之見死也青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也黃帝素問內經五藏生成篇下有漸洳上生葦蒲此所以知形氣之多少也黃帝素問靈樞經刺節真邪見烟知有火見雲知有雨行步知君子見星知有月中陰經卷上如一人亦名父亦名子以父故名子以子故名父若觀父則不觀子若觀子則不觀父雜阿毗曇心論卷一猶如金師别金好醜修行道地經慈品金有四試一者燒二者磨石三者煆四者錬譬喻人亦有四試一者嬈二者共從事三者色四為制不止三慧經藉八譬如江河邉有潢池衆象入中澡浴飲水則復退還其時跡現在於泥沙大小廣長道路行者見其足跡言大羣象經過此地雖不見象但觀其跡則知羣象經厯是間修行道地經觀品譬如居士清朝見大雨處語衆人言昨夜雨龍其力甚大衆人言汝何以知之答言我見地濕泥多山崩樹折殺諸鳥獸以此故知龍力為大大智度論卷二十一亦如有人於華池邉見象足跡則知其大大莊嚴經論卷一周公反握猶騏驥之一毛禹耳齊肩乃崑山之片玉非所類也辨正論卷六待人凡三驅之禮禽向己者則舍之背己者則射之是失於前禽也顯比之道與已相應者則親之與己不相應者則疏之與三驅田獵愛來惡去相似周易正義比外柔刃如筠故能與一切物相諧內和澤如松心故能與人無怨禮記正義禮器今之君子進人若將加諸膝退人若將隊諸淵毋為戎首不亦善乎禮記檀弓下唯女子與小人為難養也近之則不遜遠之則怨論語陽貨淳于髠曰狶膏棘軸所以為滑也然而不能運方穿騶忌子曰謹受令請謹事左右史記田完世家傳曰遇人不以義而見疻者與痏人之罪釣惡不直也前漢書薛宣傳得其人重之如山不得其人忽之如草魏志王昶傳欲以小雀遇我使我畏死鷂乎晉書王育傳釣者露餌而藏鉤故魚不見鉤而可得賢者觀功而隱摩故人不知摩而自服鬼谷子摩篇注雖有戈矛之刺不如恭儉之利也故與人善言暖於布帛傷人之言深於矛㦸荀子榮辱人賢而不能敬則是禽獸也人不肖而不敬則是狎虎也禽獸則亂狎虎則危荀子臣道非其人而教之齎盜糧借賊兵也荀子大略篇非我而當者吾師也是我而當者吾友也諂諛我者吾賊也故君子隆師而親友以致惡其賊荀子修身篇狂者傷人莫之怨也嬰兒詈老莫之疾也淮南子說林訓子路曰人善我我亦善之人不善我我不善之子貢曰人善我我亦善之人不善我我則引之進退而已耳顔回曰人善我我亦善之人不善我我亦善之三子所持各異問於夫子夫子曰由之所持蠻貊之言也賜之所言朋友之言也回之所言親屬之言也詩曰人而無良我以為兄韓詩外傳卷九與人以實雖疏必密與人以虛雖戚必疏夫實之與實如膠如漆虛之與虛如薄冰之見晝日君子可不留意哉韓詩外傳卷九魯與齊通壁壁鄰之國也烈女傳周列國臧文仲母小人而為政不可以不敬不敬之則危猶暴虎馮河之必死也呂氏春秋安死解長者賜顔色泰山可動移李善注文選江文通上書不可自見好章甫强越人以文冕也已嗜臭腐養鴛雛以死鼠也文選嵇康絶交書澄以石虎為海鷗鳥世說新語言語譬如城邑邉近路之田為諸人衆象馬侵食彼時田主使一人監視監視之人不勤守護復更增足二三四五若十二十乃至百人守者逾多取者彌衆最後一人作是思惟如此守視非一切護當善方便令無侵害即取田苗手自惠施彼生感愧田苗得全大法鼓經卷下猶犬齧婆羅門婆羅門復可齧犬不也出曜經七學品譬如慈母多有衆子先念羸病給其所須大智度論卷八十七有一婆羅門有摩沙豆陳久煮不可熟持著肆上欲賣都無人買時有一人家有一罷驢市賣難售時陳豆主以豆買此驢用得驢便即說頌曰婆羅門法巧販賣陳久冰豆十六年唐盡汝薪煮不熟蹙折汝家大小齒爾時驢主亦作頌曰汝婆羅門何所喜雖有四腳毛衣好負重著道令汝知錐㓨火燒終不動爾時豆主復說偈言獨生千秋仗頭著四寸針能治敗罷驢何憂不可伏爾時驢聞復瞋即說頌曰安立前二足雙飛後兩蹄折汝前板齒然後自當知爾時豆主聞驢此頌復說偈言蚉虻毒蟲螫唯仰尾自防當截汝尾却令汝知辛苦爾時驢復以偈答言從先祖已來行此𢤱悷法今我故承習死死終不舍爾時豆主知此弊惡不可苦語便更稱譽以頌答曰音聲鳴徹好面白如珂雪當為汝取婦共遊林澤中驢聞軟愛語即復說頌曰我能負八斛日行六百里婆羅門當知聞婦歡喜故法苑珠林卷四十七責人由醉之言俾出童羖箋云汝從行醉者之言使其出無角之羖羊脅以無然之物使戒深也羖羊之性牝牡有角鄭氏箋詩賔之初筵先生之說誠可謂苦藥良針矣魏志邴原傳注健責天下之愚者已之未賢也健責天下之迷者已之未明也以未賢責衆愚未賢者以之亡以未明責衆迷未明者以之傷亢倉子訓道篇子墨子怒耕柱子耕柱子曰我毋俞於人乎子墨子曰我將上大行駕驥與羊我將誰毆耕柱子曰將毆驥也子墨子曰何故毆驥也耕柱子曰驥足以責子曰我亦以子為足以責墨子耕柱人主不自刻以堯而責人臣以子胥是幸殷人之盡如比干韓非子安危田駟欺鄒君鄒君將使人殺之田駟恐告惠子惠子見鄒君曰今有人見君則䀹其一目奚如君曰我必殺之惠子曰瞽兩目䀹君奚為不殺君曰不能勿䀹惠子曰田駟東慢齊侯南欺荆王駟之於欺人瞽也君奚怨焉韓非子說林傳曰惟無瑕者可以戮人亦由無闕者可以論人身有闕而論人是為自論也呂氏春秋先已解責如此之人令信神仙是使牛緣木馬逐鳥也抱朴子內篇至理為政之道恕已及物也耳目在身施之異務不以通塞之故而誅之於已是以存乎物者豈求其備哉李善注文選陸士衡演連珠若病其事而不能為其醫則針石之巧淺矣廣文選伏公表與阮步兵書有父不能孝有兄不能敬而論人父子之義昆弟之節猶彎弓而自射也意林唐子王尼見太傅越曰公負尼物越答初不識此事尼曰昔楚人失布謂令尹盜者以令尹執政賊盜公行是與自盜無異也今君左右有屋舍尼獨窮困是亦明公負尼物也藝文類聚布帛部絹急病讓醫固若此也文苑英華魏收移文欲以前車誡爾後乘也何氏語林德行南史僧䖍戒子書譬如嬰兒父母生已付其乳母隨時摩拭隨時沐浴隨時乳哺隨時消息若乳母不謹愼者兒或以草以土諸不淨物著其口中乳母當即教令除去能時除却者善兒不能自却者乳母當以左手持其頭右手探其鯁嬰兒當時雖苦乳母要當苦探其鯁為欲令其子長夜安樂故雜阿含經卷二十六劫時有國王亦名音悅有鳥名曰鵚梟來在宮上看見鸚鵡獨得優寵即問鸚鵡何緣致此鸚鵡答言我來宮上悲鳴殊好國王愛敬於我取我常著左右五色珠璣瓔珞我身鵚梟聞之懷嫉妒心即念言我亦當鳴不殊於卿國王亦當愛寵我身王時出卧鵚梟即鳴王即驚覺懎然毛竪如畏怖狀王問左右此為何聲驚動怖我侍者白言有惡聲鳥名曰鵚梟王即恚曰促遣大衆分布推索即得與王王令左右生拔毛羽舉身大痛步行而去到其野田衆鳥問言何緣置此鵚梟瞋恚不責己身答衆鳥言正坐鸚鵡故得此患佛言善聲招福惡聲置禍罪報由已反怒鸚鵡長者音悅經尺二愼微初六履霜堅冰至象曰履霜堅冰陰始凝也馴致其道至堅冰也易坤憂悔吝者存乎纖介定失得者愼於樞機韓康伯注易繫辭上合抱之木起於毫末吉凶之彰始於微兆韓康伯注易繫辭上六二咸道轉進所感在腓腓體動躁則成往而行今初六所感淺末則譬如拇指指雖小動未移其足以喻人心初感始有其志志雖小動未甚躁求周易正義咸泰山之霤穿石單極之䋁斷幹水非石之鑽索非木之鋸漸靡使之然也前漢書枚乘傳夫涓流雖寡浸成江河爝火雖微卒能燎野履霜有漸可不懲革後漢書酷吏列傳衆煦飄山聚蚊成雷蓋驕佚所從生也後漢書第五倫列傳君子推微達著尋端見緒履霜知冰踐露知暑後漢書蔡雍列傳輕者重之端小者大之源故隄潰蟻孔氣泄針芒後漢書陳寵列傳今爭睚眦之隙以成千鈞之讐魏志董卓傳注炎火成燎原之勢涓流兆江河之形宋書王僧達傳涓涓不塞將為江河熒熒不救炎炎奈何兩葉不去將用斧柯太公六韜守士爪之生髮之長榮衛之行無頃刻止衆人皆見之於著不能見之於微關尹子七釡經起秋毫之末揮之於太山之本鬼谷子抵巇凡物有乘而來乘其出者是其反者已流言滅之貨色遠之禍之所由生也生自纖纖也是故君子蚤絶之荀子大略篇千丈之隄以螻蟻之穴潰百丈之室以突隙之煙焚故曰白圭之行隄也塞其穴丈人之愼火也塗其隙是以白圭無水難丈人無火患此皆愼易以避難敬細以遠大者也韓非子喻老禍亂未動於朝情欲未見於色如脆弱易除破河上公注老子守微語曰􅀈􅀈弗滅炎炎奈何萌芽不伐且折斧柯賈子審微先針而後縷可以成帷先縷而後針不可以成衣針成幕蔂成城事之成敗必由小生言有漸也淮南子說山訓夫爝火在縹煙之中也一指之所能息也塘漏若􅂒穴一撲之所能塞也及至火之燔孟諸而炎雲臺水決九江而漸荆州雖起三軍之衆弗能救也夫積愛成福積怨成禍若癰疽之必潰也所浼者多矣淮南子人間訓熒熒不滅炎炎奈何涓涓不壅將成江河綿綿不絶將成網羅青青不伐將尋斧柯說苑敬愼蠧喙仆柱梁蚊虻走牛羊說苑談叢江河大潰從蟻穴山以小阤而大崩淫亂之漸其變為興說苑談叢次三小度差差大􅀈音賴之階測曰小度之差大度傾也太𤣥經第四度綿綿不絶必有亂結纖纖不伐必成妖孽武侯十六策治亂吉凶有時不可犯也動靜有適不可過也犯時之忌罪不在大失其所適過不在深動天下滅君主而不可危也侮妻子用顔色而不可易也周易略例明卦夫可欲之物何必金玉錐刀之末愚民競焉越人之大戰由乎分蚺蛇之不均吳楚之反兵起乎一株之桑葉抱朴子外篇詰鮑積微致著纍淺成深鴻羽所以沈龍舟羣輕所以折徑軸寸飊所以燔百尋之室蠧蝎所以仆連抱之木也抱朴子外篇疾謬水之所失在於隟穴事從細生禍由微起者也太𤣥經第四大解或怨大而成小或憾輕而至重深讐不必危而睚眦未可易也譬如風焉披雲飛石卷水􅀢木而人血脉不為之傷隟穴之風輕塵不動毛髮不搖及中肌膚以為深疾大不為害小而成患者大風散漫小風激射也劉子愼巢熒熒不滅能焚崑山涓涓不絶能成江河怨之所生不可類推禍之所延非可情測劉子愼巢故登峭坂而不跌墜者愼於大也跨阜垤而好顚蹶者輕於小也茍兢其步雖履險能安輕易其足雖夷路亦躓劉子愼巢夫為稼於湯之世偏有一溉之功者雖終歸於燋爛必一溉者後枯然則一溉之益固不可誣也而世常謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉榖於旱苗者也文選嵇康養生論細微可不愼隄潰自蟻穴腠理早從事安復勞針石廣文選應德璉雜詩昔之君子同名爵於香餌故傾危不及思憂患而豫防則針石無用洪流壅於涓涓合拱挫於纖蘖介焉是式色斯而舉悟高鳥以風逝鑑醴酒而投紱夫豈敝著而後謀通患結而後思復廣文選傅季友演愼論事由細微不慮不圖禍如丘山本在萌芽古文苑揚雄徐州牧針山陸之禍起於毫芒太平御覽兵部㦸蚤虱雖細困於安寢􅂒鼠雖微猶毁郊牛初學記獸部鼠注夫百圍之木生於毫微喻三塗重釁原乎一念道德經注疏卷六夫十圍之木起於拱把百仞之臺起於足下治小惡不懼必成大禍天機經人譬如甕器先貯石蜜投少毒藥不任食用大集地藏十輪經卷六如尼瞿陀子極細微種之生樹婆娑廣大枝條百千大乘顯識經推四小火得草所燒無限須彌寶山亦從小起中本起經無常品莫輕小惡以為無殃水滴雖微漸盈大器法旬經惡行品譬如迦羅求羅蟲其身微細得風轉大乃至能吞食一切大智度論卷七譬如積微塵成山難可得動移大智度論卷九十四譬如白淨衣以油滴其上垢膩遂增長亦猶油滴水油滴雖微小遍於池水上大莊嚴經論卷四偈密雲導於時雨堅冰創於履霜皆漸積之謂也辨正論卷六愼積初六陰氣之微似若初寒之始但履踐其霜微而積漸故堅冰乃至周易正義坤四月立夏矣至六月乃始盛暑人為惡亦有漸非一朝一夕鄭氏箋詩四月言王政教暴虐如彼天之雨下大雪其雪必先積聚而摶維為小霰而後成為大雪是雪有漸也以興幽王之為惡亦初為小惡而成為大惡亦惡有漸也毛詩正義頍辨始信如彼桃蟲耳為惡不已於後更大似桃蟲翻然而飛維為大鳥矣毛詩正義小毖積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也非明乎性情察乎流俗者孰能知之前漢書董仲舒傳磨礱砥礪不見其損有時而盡種樹畜養不見其益有時而大積德纍行不知其善有時而用棄義背理不知其惡有時而亡前漢書枚乘傳始乎叔季歸乎伯孟必此積也淮南子繆稱訓君子不謂小善不足為也而舍之小善積而為大善不謂小不善為無傷也而為之小不善積而為大不善是故積羽沈舟羣輕折軸故君子禁於微一快不足以成善積快而為德一恨不足以成非積恨而成怨故三代之善千歲之積譽也桀紂之謗千歲之積毁也淮南子繆稱訓積薄為厚積卑為高故君子日孶孶以成輝小人日快快以至辱其消息也離朱弗能見也淮南子繆稱訓陽氣起於東北盡於西南陰氣起於西南盡於東北陰陽之始皆調適相似日長其類以侵相遠或熱焦沙或寒凝冰故聖人謹愼其所積淮南子詮言訓媒怛者非學謾也怛成而生不信立慬者非學鬭爭也慬立而生不讓故君子不入獄為其傷恩也不入市為其侳廉也積不可不愼者也淮南子說山訓生木之長莫見其益有時而修砥礪䃺堅莫見其損有時而薄淮南子修務訓山霤至柔石為之穿蝎蟲至弱木為之弊夫霤非石之鑿蝎非木之鑽然而能以微脆之形陷堅剛之體豈非積漸之致乎孔叢子與子琳書積旬成月積月成年京氏易傳下寒不纍時則霜不降溫不兼日則冰不釋王充論衡感虛篇積載輕物物多至令車軸毁折而鳥之所以能飛翔者以羽翮扇揚之故也前漢書注中山靖王傳河海之跡堙為窮流一簣之釁積成山嶽文選陸機豪士賦序兩軍相當旗幟相望白刃陳于中野者此非一日之謀也能使其民令行禁止士卒無白刃之難者非一日之教也須臾之得也夫至使身被癰疽之病膿血之聚者不亦離道遠乎夫癰疽之生膿血之成也不從天下不從地出積微之所生也故聖人自治于未有形也愚者遭其已成也黃帝素問靈樞經玉版喻林卷八
