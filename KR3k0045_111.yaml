body:
  text: 喻林卷一百十一明徐元太撰性理門二妙道仁之為器重其為道遠舉者莫能勝也行者莫能致也禮記表記道之大如天其廣如地其重如石其輕如羽民之所以知者寡管子白心凡道無根無莖無葉無滎萬物以生萬物以成命之曰道管子內業道沖而用之或不盈淵乎似萬物之宗老子無源三十輻共一轂當其無有車之用埏埴以為器當其無有器之用鑿戶牖以為室當其無有室之用故有之以為利無之以為用老子無用譬道之在天下由川谷之於江海也老子聖德深閎廣大不可為外析毫剖芒不可為內無環堵之宇而生有無之總名也文子道原濁而徐清沖而徐盈淡然若大海汜兮若浮雲文子道原觀道者如觀水以觀沼為未足則之河之江之海曰水至也殊不知我之津液涎淚皆水關尹子一宇吾道如劒以刃割物即利以手握刃即傷關尹子一宇以盆為沼以石為島魚環遊之不知其幾千萬里而不窮也夫何故水無源無歸聖人之道本無首末無尾所以應物不窮關尹子一宇吾道如處暗夫處明者不見暗中一物而處暗者能見明中區事關尹子一宇吾道如海有億萬金投之不見有億萬石投之不見有億萬汙穢投之不見能運小蝦小魚能運大鯤大鯨合衆水而受之不為有餘散衆水而分之不為不足關尹子一宇言之如吹影思之如鏤塵關尹子一宇一灼之火能燒萬物物亡而火何存一息之道能冥萬物物亡而道何在關尹子一宇兩人射相遇則巧拙見兩人奕相遇則勝負見兩人道相遇則無可示者無巧無拙無勝無負關尹子一宇言道者如言夢夫言夢者曰如此金玉如此器皿如此禽獸言者能言之不能取而與之聽者能聞之不能受而得之關尹子九藥谷神不死是謂玄牝玄牝之門是謂天地之根綿綿若存用之不勤列子天瑞使道而可獻則人莫不獻之於其君使道而可進則人莫不進之於其親使道而可以告人則人莫不告其兄弟使道而可以與人則人莫不與其子孫莊子天運萬物有乎生而莫見其根有乎出而莫見其門莊子則陽若夫道德則不然無訝無訾一龍一蛇與時俱化而無肯専為一上一下以禾為量而浮遊乎萬物之祖呂氏春秋必已萬物之朴散則為器用若道散則為神明流為日月分為五行也河上公注老子反朴道之在天下與人相應和如川谷與江海相流通也河上公注老子聖德道若川谷之水其出無已其行無止賈子修政語上舒之幎於六合卷之不盈於一握淮南子原道訓纍之而不髙墮之而不下益之而不衆損之而不寡斫之而不薄殺之而不殘鑿之而不深填之而不淺淮南子原道訓夫道之與德若韋之與革遠之則邇近之則遠淮南子覽冥訓終始若環莫得其倫淮南子精神訓天地之大可以矩表識也星月之行可以厯推得也雷霆之聲可以鼓鐘寫也風雨之變可以音律知也是故大可覩者可得而量也明可見者可得而蔽也聲可聞者可得而調也色可察者可得而别也夫至大天地弗能含也至微神明弗能領也淮南子本經訓今夫為平者準也為直者繩也若夫不在於準繩之中可以平直者此不共之術也故叩宫而宫應彈角而角應此同音之相應也其於五音無所比而二十五絃皆應此不傳之道也故蕭條者形之君而寂寞者音之主也淮南子齊俗訓四方皆道之門户牖嚮也在所從窺之故釣可以教騎騎可以教御御可以教刺舟淮南子説山訓升之不能大於石也升在石之中夜之不能修其嵗也夜在嵗之中仁義之不能大於道德也仁義在道德之包淮南子説山訓道者置之前而不􅀢志錯之後而不軒內之尋常而不塞布之天下而不窕淮南子人間訓河以逶蛇故能遠山以陵遲故能髙陰陽無為故能和道以優遊故能化淮南子泰族訓道若塗若川車航混混不舍晝夜揚子問道夫玄晦其位而冥其畛深其阜而眇其根欀其功而幽其所以然者也太玄經玄攡其上也縣天下也淪淵纎也入薉廣也包畛太玄經玄攡其髙則冠蓋乎九霄其曠則籠罩乎八隅光乎日月迅乎雷馳或倐爍而景逝或飄滭而星流或滉漾於淵澄或氛霏而雲浮抱朴子內篇暢玄夫聲不可勝舉也故吹管操絃雖有繁手遺聲多矣而執籥鳴絃者欲以彰聲也彰聲而聲遺不彰聲而聲全故欲成而虧者昭文之鼓琴不成而無虧者昭文不鼓琴也郭子注莊齊物論光而不耀濁而不昧繩繩兮其無繫泛泛乎其無薄也微妙難名終歸於無李善注文選王簡棲頭陀寺碑文聖人之為道也明於日月微於毫釐黃帝素問靈樞經逆順肥瘦人在道中道在人中魚在水中水在魚中道去人死水乾魚終西升經道象無形端恍惚亡若存譬如種木未生不見枝葉根西升經夫有形鐮利不入無理神明在身出無間入無孔俯仰之頃經數千里道德經指歸卷八大道坦坦不出門户其出彌遠其知彌寡道德經指歸卷八至道幽微非愚非智升三清之上不益其明墜九幽之下不加其暗道德經注疏卷二大道如海衆流所歸大道如天羣物所依玉清經昭靈品如末尼寶雖有大光明而此光明無內外可得波羅蜜多經卷五百九十六陟者彌髙而不能階涉者彌深而不能測謀者慮不能規尋者度不能盡道行波羅蜜經序卷一譬如金剛一切諸物無能壞者而能普壞一切諸物然其體性無所損減大方廣佛華嚴經卷七十八四表為大綩綖其外毫釐為細間關其內故謂之道宏明集牟子理惑論集法藥故不住無為隨授藥故不盡有為知衆生病故不住無為滅衆生病故不盡有為維摩詰所説經見阿閦佛品諸天以種種名藥著海中以寶山摩之令成甘露食之得仙名不死藥佛法中以涅槃甘露令生死永斷是真不死藥也羅什譯維摩詰經佛道品其為道也微妙無相不可為有用之彌勤不可為無故能幽鑑萬物而不耀玄軌超駕而弗夷僧肇注維摩詰經菩薩品其道虛玄妙絶常境聰者無以容其聽智者無以運其知辨者無以措其言像者無以狀其儀僧肇注維摩詰經菩薩品形色乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口易説卦傳木有華葉之容故貌屬木言之決斷若金之斬割故言屬金火外光故視屬火水內明故聽屬水土安靜而萬物生心思慮而萬事成故思屬土尚書正義洪範正氣之在人也上下灌注如環之無端莫知其紀極也不可以為量也是能使其神之所澤鬱鬱勃勃而不可屈是能使其形之所宅完固靜専而不可撓子華子大道一人之身為骨凡三百有六十精液之所朝夕也氣息之所吐吸也心意知慮之所識也手足之所運動而指股之所信屈也皆與天地之大數通體而為一故曰天地之間人為貴子華子執中蚑行喙息莫貴於人孔竅肢體皆通於天天有九重人亦有九竅天有四時以制十二月人亦有四肢以使十二節天有十二月以制三百六十日人亦有十二肢以使三百六十節故舉事而不順天者逆其生者也淮南子天文訓夫孔竅者精神之戶牖也而氣志者五藏之使候也淮南子精神訓其血氣與雷霆風雨比類其喜怒與晝宵寒暑並明淮南子泰族訓求天數之微莫若於人人之身有四肢每肢有三節三四十二十二節相持而形體立矣天有四時每一時有三月三四十二十二月相受而嵗數終矣春秋繁露官制象天一嵗之中有四時一時之中有三長天之節也人生於火而體天之節故亦有大小厚薄之節春秋繁露官制象天人之形體化天數而成人之血氣化天志而行人之德行化天理而義人之好惡化天之暖清人之喜怒化天之寒暑人之受命化天之四時人生有喜怒哀樂之答春秋冬夏之類也喜春之答也怒秋之答也樂夏之答也哀冬之答也天之副在乎人春秋繁露為人者天地身猶天也數與之相參故命與之相連也天以終嵗之數成人之身故小節三百六十六副日數也大節十二分副月數也內有五藏副五行數也外有四肢副四時數也乍視乍瞑副晝夜也乍剛乍柔副冬夏也乍哀乍樂副陰陽也心有計慮副度數也行有倫理副天地也春秋繁露人副天數無角無翼材以道德太玄經大玄棿九者陽之數道之綱紀也故天有九星以正機衡地有九州以成萬邦人有九竅以通精明王逸注楚辭九辨形之血氣也猶囊之貯粟米也一石囊之髙大亦適一石如損益粟米囊亦增減人以氣為夀氣猶粟米形猶囊也王充論衡無形篇生人所以言語吁呵者氣括口喉之中動搖其舌張吹其口故能成言譬猶吹簫笙簫笙折破氣越不括手無所弄則不成音王充論衡論死篇以囊橐盈粟米米在囊中若粟在橐滿盈堅強立樹可見人瞻望之則知其為粟米囊橐何則囊橐之形若其容可察也如囊穿米出橐敗粟棄則囊橐委辟人瞻望之弗復見矣人之精神藏於形體之內猶粟米在囊橐之中也死而形體朽精氣散猶囊橐穿敗粟米棄出也粟米棄出囊橐無復有形精氣散亡何能復有體而人得見之乎王充論衡論死篇人雖七尺之形而天下之理備矣故首圓足方取象二儀鼻隆口窊比象山谷肌肉連於土壤血脈屬於川瀆溫蒸同乎炎火氣息不異風雲內觀諸色靡有一物不備豈須仰觀俯察履涉朝野然後備所見張湛注列仲尼鳥獸大小形性各異人之於聖腑藏並同揚子法言注問明篇血勇怒而面赤脈勇怒而面青骨勇怒而面白意林燕丹子邵云死之言澌精神盡也弼曰此所言澌如射箭盡手中盡也文苑英華杜弼雜論上目以見小為明耳以聽大為聰太平御覽人事部目望視之兔白蹄之豕短喙之犬修頭之馬斯禽獸也猶形乎勢觀况君子之貌獨無表告者哉初學記獸部狗天有五行御五位以生寒暑燥濕風人有五藏化五氣以生喜怒思憂恐黃帝素問內經天元紀大論夫精明五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼黃帝素問內經脈要精微論天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也黃帝素問內經陰陽應象大論夫胸腹藏府之郭也䁴中者心主之宫城也胃者太倉也咽喉小腸者傳送也胃之五竅者門里門戶也廉泉玉英者津液之道也故五藏六府者各有畔界其病各有形狀黃帝素問靈樞經脹論人亦有四海十二經水經水者皆注于海海有東西南北命曰四海黃帝曰以人應之奈何岐伯曰人有髓海有血海有氣海有水榖之海凡此四者以應四海也黃帝素問靈樞經海論夫色脈與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣黃帝素問靈樞經邪氣藏府病形上焦如霧中焦如漚下焦如瀆黃帝素問靈樞經營衛生會夫生之於形也神為之蒂精為之根營爽為宫室九竅為户門聰明為候使情意為乘輿魂魄為左右血氣為卒徒道德經指歸卷九夫耳目口者心之佐助也神之門户也智之樞機也人之禍福也故耳無聰不能别其音目無明不能見其機口無度不能施其令天機經靜譬如內身所有頭頸肩膊手臂腹背胸脅腰脊䏶膝腨脛足等皮內骨髓唯有假名波羅蜜多經卷四百六諺云少所見多所怪覩馲駝言馬腫背堯眉八彩舜目重瞳子臯陶馬喙文王四乳禹耳參漏周公背僂伏羲龍鼻仲尼反頨老子日角月玄鼻有雙柱手把十文足蹈二五此非異於人乎宏明集牟子理惑論殊塗生之謂性也猶白之謂白與曰然白羽之白也猶白雪之白白雪之白猶白玉之白與曰然然則犬之性猶牛之性牛之性猶人之性與孟子告子上岠齊州以南戴日為丹穴北戴斗極為空桐東至日所出為太平西至日所入為太蒙太平之人仁丹穴之人智太蒙之人信空桐之人武爾雅人之性其猶水然水之源本甚潔而無有衰穢其所以湛之者久則不能以無易也易而不能反其本初則還復疑於自性者矣是故方圓曲折湛於所遇而形易矣青黃赤白湛於所受而色易矣砰訇淙射湛於所閡而嚮易矣洄洑浟溶湛於其所以容而態易矣醎淡芳奧湛於其所以染而味易矣子華子大道民濕寢則腰疾偏死鰌然乎哉木處則惴栗恂懼猿猴然乎哉三者孰知正處民食芻豢麋鹿食薦蝍且甘帶鴟鴉耆鼠四者孰知正味猿猵狙以為雌麋與鹿交鰌與魚遊毛嬙麗姬人之所美也魚見之深入鳥見之髙飛麋鹿見之決驟四者孰知天下之正色哉莊子齊物論南國之人祝髮而祼北國之人鞨巾而裘中國之人冠冕而裳九土所資或農或商或田或漁如冬裘夏葛水舟陸車默而得之性而成之莊子湯問廣厦闊屋連闥通房人之所安也鳥入之而憂髙山險阻深林叢薄虎豹之所樂也人入之而畏川谷通原積水重泉黿鼉之所便也人入之而死咸池承雲九韶六英人之所樂也鳥獸聞之而驚深溪峭岸峻木尋枝猿狖之所樂也人上之而栗形殊性詭所以為樂者乃所以為哀所以為安者乃所以為危也淮南子齊俗訓修其善則為善人修其惡則為惡人氣也者所適善惡之馬也歟揚子修身篇日月相斛星辰不相觸音律差列竒耦異氣父子殊面兄弟不孿帝王莫同太玄經大玄棿凡人稟性也清濁貪廉各有操行猶草木異質不可復變易也王充論衡非韓篇玉生於石有純有駁情性於陰陽安能純善王充論衡本性篇豆麥之種與稻梁殊然食能去飢小人君子稟性異類乎譬諸五榖皆為用實不異而效殊者王充論衡率性篇譬如天降一味甘雨江河大海受處不同名為異水雨實唯一十方大聖降一法雨隨三乘器受益不同故名三教靈寶祕密經譬如天降一味之水隨地差别得種種味大方等大集經卷九如河中有木隨流漂轉而木與流體相各别大乘密嚴經卷中譬如畫師各各賦彩心各各異如是隨行所為佛遺日摩尼寶經推六譬如銷金隨師而作金無定也大智度論卷七譬如金師以巧方便故以金作種種異物雖皆是金而各異名大智度論卷一百云何世間病分别説三種或有醫治差或不得醫差或復有病人雖得醫不差是故諸病人分别有三種鴦崛摩羅經卷二俱謂之草衆草之性不可勝言俱謂之金衆金之性不可勝言同類殊性萬物皆然豈徒道乎宏明集牟子理惑論一定人於天下之間如五藏之有心矣人乃生之最靈其心五藏之最聖也禮記正義禮運夫事物之性有自然而成者有待人事而成者有失人事不成者有雖加人事終身不可成者是謂三勢物無不然以小知大近取諸身譬之疾病有不治而自瘳者有治之則瘳者有不治則不瘳者有雖治而終身不可愈者豈非類乎前漢紀髙后周穆馬迹遍於天下若騏驥之性因地而遷則造父之䇿有時而躓南齊書王融傳耳目鼻口形能各有接而不相能也夫是之謂天官心居中虗以治五官夫是之謂天君荀子天論篇心者形之君也而神明之主也出令而無所受令自禁也自使也自奪也自取也自行也自止也荀子解蔽篇鳯凰生而有仁義之意虎狼生而有貪戾之心兩者不等各有其母賈子胎教夫心者五藏之主也所以制使四支流行血氣馳騁于是非之境而出入于百事之門户者也淮南子原道訓人性各有所修短若魚之躍若鵲之駮比自然者不可損益淮南子修務訓道德之論譬猶日月也江南河北不能易其指馳騖千里不能易其處趨舍禮俗猶室宅之居也東家謂之西家西家謂之東家雖臯陶為之理不能定其處故趨舍同誹譽在俗意行鈞窮逹在時淮南子齊俗訓發一端散無竟周八極總一管謂之心淮南子人間訓人受命于天有善善惡惡之性可養而不可改可豫而不可去若形體之可肥臞而不可得革也是故雖有至賢能為君親含容其惡不能為君親令無惡春秋繁露玉杯譬猶練絲染之藍則青染之朱則赤夫決水使之東西猶染絲使之青赤也丹朱商均已染於唐虞之化矣然而丹朱傲而商均虐者至惡之質不受藍朱變也王充論衡本性篇面色或白或黑身形或長或短至老極死不可變易天性然也王充論衡本性篇鳥鳴之惡自取憎人言之惡自取滅不能有纍於當世也而凶人之行弗可易梟鵙之鳴弗可更者天性然也藝文類聚人部諷論五常也者在天為五緯在地為五嶽在處為五方在人為五藏在物為五行辨正論卷一心王正則六臣不邪識意昏沈則其主不明法苑珠林卷八十四形長者目德主者心僧肇注維摩詰經佛國品心君天道尚右日月西移地道尚左水道東流人道尚中耳目役心汲冢周書武順解心有四佐不和曰廢地有五行不通曰惡天有四時不時曰凶汲冢周書武順解權然後知輕重度然後知長短物皆然心為甚孟子梁惠王上耆秦人之炙無以異於耆吾炙夫物則亦有然者也然則耆炙亦有外與孟子告子上白馬之白也無以異於白人之白也不識長馬之長也無以異於長人之長與孟子告子上心非事也而制事必由於心然不可以制事以非事謂心為無也匠非器也而制器必須於匠然不可以制器以非器謂匠非有也晉書裴頠傳道之在天者日也其在人者心也管子樞言撞鈞石之鐘六樂合奏於庭所以寫樂也而隱憂者臨之而逾悲不主乎樂故也鬱搖而行歌促絃而急彈所以寫憂也而安恬者得之而逾歡不主於憂故也然則憂樂在外也所以主之者內也內之所感赭蒼互色東西貿區而昧者則不之知也故曰觀流水者與水俱流其目運而心逝者與子華子執中流者舟也所以流之者是水非舟運者車也所以運之者是牛非車思者心也所以思之者是意非心關尹子五鑑耳目鼻口形能各有接而不相能也夫是之謂天官心居中虛以治五官夫是之謂天君荀子天論猶如太虛於一氣中變成萬物而彼一氣不名太虛我之一心能變為氣能變為形而我之心無氣無形關尹子五鑑夜之所夢或長於夜心無時生於齊者心之所見皆齊國也既而之宋之楚之晉之梁心之所存各異心無方關尹子五鑑心有所結先凝為水心慕物涎出心悲物淚出心愧物汗出關尹子八籌夫播粳眯目則天地四方易位矣蚊虻噆膚則通昔夕同不寐矣夫仁義憯然乃憤吾心亂莫大焉莊子天運兵莫憯於志鏌鎁為下冦莫大於陰陽無所逃於天地之間非陰陽賊之心則使之也莊子庚桑楚其熱焦火其寒凝氷其疾俯仰之間而再撫四海之外其居也淵而靜其動也縣而天僨驕而不可係者其唯人心乎莊子在宥口者心之門户也心者神之主也鬼谷子捭闔口可劫而使墨云形可劫而使詘申心不可劫而使易意是之則受非之則辭荀子解蔽頭之圓也象天足之方也象地天有四時五行九解三百六十六日人亦有四支五藏九竅三百六十六節天有風雨寒暑人亦有取與喜怒故膽為雲肺為氣肝為風腎為雨脾為雷以與天地相參也而心為之主是故耳目者日月也血氣者風雨也淮南子精神訓天以不見為玄地以不形為玄人以心腹為玄天奧西北鬱化精也地奧黃泉隱營魄也人奧思慮含至精也事類賦天部天注請藏之靈蘭之室非敢使泄也黃帝素問靈樞經外揣心者君主之官也神明出焉肺者相傳之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廪之官五味出焉大腸者傳道之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣凡此十二官者不得相失也故主明則下安以此養生則夀殁世不殆以為天下則大昌主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下者其宗大危黃帝素問內經靈蘭祕典論天以斗運為機人以心為機陰符經注以身為國以心為君以精為民陰符經注心王住中道城以諸誡慧為法墻塹牢自莊嚴備諸魔試靈寶祕密經海嶽環區心之影也形骸耳目心之候也生死邅回心之迷也菩提昭曠心之悟也波羅蜜多經五百九十一譬如王於衆人中為上心於諸功德中無上佛遺日摩尼寶經推六佛言人有患淫情不止踞斧刃上以自除其陰佛謂之曰若斷陰不如斷心心為功曹若止功曹從者都息邪心不止斷陰何益佛説四十二章經尺一猶如牛王諸牛隨從亦如衆星隨逐於月譬如衆隨主後亦如衆兵隨逐主將本緣經月光王品是心如須彌極髙大故是心如空不可壞故是心如海深難測故華手經卷二譬如真水精黃物著中則隨作黃色青赤白色皆隨色變心亦如是大智度論卷五視聽香味各有所憑而思識歸乎心器譬如人之有宅東閣延賢南軒引景北牖招風西櫺映月主人端居中霤以收四事之用焉宏明集九喻林卷一百十一
