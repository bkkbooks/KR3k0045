body:
  text: 喻林卷二十六明徐元太撰人事門二十四賴藉九二渙奔其機悔亡象曰渙奔其機得願也易渙城之為體由基土陪扶乃得為城今下不陪扶城則損壞以此崩倒反復于隍猶君之為體由臣之輔翼今上下不交臣不扶君君道傾危故云城復于隍周易正義泰葛也藟也延蔓於木之校本而茂盛喻子孫依緣先人之功而起鄭氏箋詩旱麓周禮上瞽四十人中瞽百人下瞽百六十人有視瞭者相之鄭氏箋詩有瞽王芻篇竹所以美盛者由得淇水浸潤之故武公所以德盛者由得康叔之餘烈毛詩正義淇澳芃蘭之支以柔弱恆延蔓於地有所依緣則起以興幼稚之君以幼時恆暗昧於政有所任用乃能成其德教毛詩正義芃蘭子皮賦野有死麕之卒章趙孟賦常棣且曰吾兄弟比以安尨也可使無吠左傳昭公元年所以傾而未顛決而未潰豈非仁人君子心力之為乎後漢書黃瓊傳論周書小開篇曰嗚呼汝何敬非時何擇非德德枳維大人大人枳維公公枳維卿卿枳維大夫大夫枳維士登登皇皇國枳維都都枳維邑邑枳維家家枳維欲無疆言上下相維遞為藩蔽也後漢書馮衍傳注明珠招駭於暗至蟠木取悅於先容宋書顧覬之傳圖南因於積風伐國在於資給魏書邢巒傳五方易辨尚待指南百世可知猶須吹律北齊書文苑李廣傳今之禽獸麋鹿蜚鳥貞蟲因其羽毛以為衣裘因其蹄蚤以為褲履因其水草以為飲食故唯使雄不耕稼樹藝雌亦不紡績織絍衣食之財固已具矣今人與此異者也賴其力者主不賴其力者不主墨子非樂上湯武聖主也而不能與越人乘翰舟而浮於江湖伊尹賢相也而不能與胡人騎騵馬而服騊駼孔墨博通而不能與山居者入榛薄險阻也由此觀之則人知之於物也淺矣而欲以遍照海內存萬方不因道之數而專已之能則其窮不逹矣淮南子主術訓上隂不能制於陽附於金柅易之柔道牽也京氏易傳姤上秋冬夜行照覽星辰焦氏易林同人之咸不畏猛虎依人為輔焦氏易林遁之家人枯匏不朽利以濟舟渡踰江海旡有溺憂焦氏易林震之震犬畏虎狼依人作輔焦氏易林未濟之隨浩浩之海濟樓航之力也航人無楫如航何揚子寡見次四鑒貞不迷于人攸資測曰鑒貞不迷誠可信也大玄經第六瞢日之照幽不須燈燭賁育當敵不待輔佐使將相知力若日之照幽賁育之難敵則文吏之能無所用也病作而醫用禍起而巫使如自能按方和藥入室求祟則醫不售而巫不進矣橋梁之設也足不能越溝也車馬之用也走不能追遠也足能越溝走能追遠則橋梁不設車馬不用矣王充論衡程材篇且圓物投之於地東西南北無之不可策杖叩動才微輒停方物集地一投而止及其移徙須人舉動賢儒世之方物也其難轉移者其動須人也王充論衡狀留篇湍瀨之流沙石轉而大石不移何者大石重而沙石輕也沙石轉積於大石之上大石沒而不見賢儒俗吏並在世俗有似於此是故金鐵在地焱風不能動毛芥在其間飛揚千里夫賢儒所懷其猶水中大石在地金鐵也其進不若俗吏速者長吏力劣不能用也王充論衡狀留篇火之光也不舉不明有人於斯其知如水其德如山力重不能自稱須人乃舉而莫之助王充論衡效力篇奡育古之多力者身能負荷千鈞手能決斤伸鉤使之自舉不能離地智能滿胸之人宜在王闕須三寸之舌一尺之筆然後可動不能自進王充論衡效力篇良玉須切磋璵璠就其形隋珠豈不曜雕瑩啓光榮嵇中散集阮德如答夫尋端之理猶獵師以得禽也縱使尋迹時有無獲然得禽曷嘗不由之哉嵇中散集答釋難宅無吉凶攝生論損玄黎於汙濘非夜光之不真也由莫識焉投彤盧而不彎非繁弱之不徑也坐莫賞焉故瓊瑶俟荆和而顯連城之賈烏號須逢蒙而著陷堅之功飛兔待子豫而飊騰俊民值知己而宣力抱朴子外篇名實火之然也不風不盛盛則景耀而聲揚太玄經第二釋解瓶所以出水須繘以汲之猶君須於民以及祿也太玄經第六劇解夫火以吹爇生熖鏡以瑩拂成鑑火不吹則無外耀之光鏡不瑩必闕內影之照故吹為火之光瑩為鏡之華人之寓代亦須聲譽以發光華猶比火鏡假吹瑩也劉子因顯目不夜見非暗晝見非明有假也莊子音義天下指之取火以針刺鼠以錐故假於物指是不至也莊子音義天下因雲灑潤則芬澤易流乘風載響則音徽自遠是以德教俟物而濟榮名緣時而顯文選陸機演連珠鑽燧吐火以續暘谷之晷揮翮生風而繼飛亷之功是以物有微而毗著事有瑣而助洪文選陸機演連珠且宦無金張之援遊無子孟之資而圖富貴之榮望殊異之寵是隴西之遊越人之射耳文選應璩與岑文瑜書膺騰撇波而濟水不如乘舟之逸也衝蒙涉田而致遠未若遵塗之疾也才蔽於無人行衰於寡黨此古今之患文選王褒四子講德論牽弱葛之蔓延寄陵風於松把指曲蓬之直逹固有憑於原枲補文選謝眺酬德賦之燕入楚待騣足凌河越海寄輕舟藝文類聚內典部內典頌夫蒼龍非不神不能白日升天飄風雖疾不以霖雨不能揚塵故蒼蠅之飛不過十步自託騏驥之髮乃騰千里之路藝文類聚蟲豸部蠅書晉獻公雖與指南車終不覺矣齊桓公中才矣有指南而悟失之則惑管仲桓公指南車也太平御覽車部指南車譬如有人年百二十老耄衰朽又加衆病所謂風病熱病痰病或三雜病是老病人欲從牀座起往他處而自不能有兩健人各扶一腋徐策令起而告之言莫有所難隨意欲往我等二人終不相棄必逹所趣安穩無損波羅蜜多經卷三百一十二如諸貧人依富長者方出險難波羅蜜多經卷五百六十八如險曠野行人疲倦遇善將導能令安穩波羅蜜多經卷五百六十八譬如大火若遇草木必無退還是諸草木皆順益火發其光明波羅蜜多經卷五百七十二如人左手佐助右手放光波羅蜜經譬如有城無有樓閣園林池沼亦無象馬遊行之處彼城之主雖有力安處而城無樓閣諸功德故則非莊嚴大寶積經二十如人處險要因機杖亦如執炬覩見諸器本緣經鹿品譬如老人夜行無杖則蹶大智度論卷十四譬如絶崖險道假梯能上又如深水因船得度大智度論卷十八譬如水性自冷假火故熱止火停久水則還冷大智度論三十一譬如苦藥服之甚難假之以蜜服之則易大智度論三十五譬如登樓得梯則易上大智度論三十五如人暗道中然燈亦能自益亦能益人大智度論卷三十九譬如老病人依恃他力能行能立大智度論卷五十三如夜中有所見皆是星月力大智度論卷五十八如盲人為有目者所將護故終不墜落溝壑大智度論卷八十五因託賁其須與上興也易賁如木既顛厥巢其猶有枝葉作休汲冢周書嘗麥解綿綿葛藟音壘在河之滸音虎綿綿葛藟在河之涘音俟綿綿葛藟在河之漘音辱葛詩國風藟南有樛音鳩木甘瓠音護纍音雷之詩小雅南有嘉魚蔦音鳥與女蘿音羅施音異于松柏蔦與女蘿施于松上詩小雅頍辨葛生延而蒙楚蘝生蔓於野喻婦人外成於他家毛詩葛生注木枝以下垂之故故葛藟也得纍而蔓之而上下俱盛鄭氏箋詩樛木小鳥知止於丘之曲阿靜安之處而託息焉小臣擇卿大夫有仁厚之德者而依屬焉鄭氏箋詩綿蠻岐山之南周之原地膴膴然其土地皆肥美也其地所生堇荼之菜雖性本若今盡甘如飴味然毛詩正義綿莫莫然而延蔓者是葛也藟也乃施于木之條枚之上而長也以興依緣者此大王王季也乃依緣已之先祖之功業而起也毛詩正義旱麓鹿死不擇音小國之事大國也德則其人也不德則其鹿也鋌而走險急何能擇左傳文公十七年夫子之在此也猶燕之巢于幕上左傳襄公二十九年十室之邑可以逃難百室之邑可以隱死以千乘之魯而不能存子糾以公為病矣穀梁莊公九年甘茂亡秦且之齊出關遇蘇子曰君聞夫江上之處女乎蘇子曰不聞曰夫江上之處女有家貧而無燭者處女相與語欲去之家貧無燭者將去矣謂處女曰妾以無燭故常先至掃室布席何愛於餘明之照四壁者幸以賜妾何妨於處女妾自以為有益於處女何為去我處女相語以為然而留之今臣不肖棄逐於秦而出關願為足下掃室布席幸無我逐也戰國策秦昭襄王蘇代為燕説齊未見齊王先説淳于髠曰人有買駿馬者比三旦立市人莫之知往見伯樂曰臣有駿馬欲賣之比三旦立於市人莫與言子還而視之去而顧之臣請獻一朝之費伯樂乃還而視之去而顧之一旦而馬價十倍今臣欲以駿馬見於王莫為臣先後者足下有意為臣伯樂乎臣請獻玉璧一雙黃金千鎰以為馬食戰國策燕王噲伯夷叔齊雖賢得夫子而名益彰顏淵雖篤學附驥尾而行益顯史記伯夷傳甘茂曰臣得罪於秦懼而遁逃無所容迹臣聞貧人女與富人女會績貧人女曰我無以買燭而子之燭光幸有餘子可分我餘光無損子明而得一斯便焉今臣困而君方使秦而當路矣茂之妻子在焉願君以餘光振之蘇代許諾史記甘茂傳明月之珠夜光之璧以暗投人於道路人無不按劍相眄者何則無因而至前也蟠木根抵輪囷離詭而為萬乘器者何則以左右先為之容也故無因至前雖出隋侯之珠夜光之璧猶結怨而不見德故有人先談則以枯木朽株樹功而不忘今夫天下布衣窮居之士身在貧賤雖抱堯舜之術挾伊尹之辨懷龍逢比干之意欲盡忠當世之君而素無根扺之容雖竭精思欲開忠信輔人主之治則人主必有按劍相眄之迹是使布衣不得為枯木朽株之資也史記鄒陽傳社鼷不灌屋鼠不熏何則所託者然也前漢書景十三王傳但駑馬鉛刀不可強扶數蒙伯樂一顧之價而蒼蠅之飛不過數步即託驥尾得以絶羣後漢書隗囂列傳虎豹在山黿鼉在水各有所託後漢書宋均列傳各著根於石上而垂隂乎千里亦未為易也魏志裂濳傳注輅言吾非四淵之龍安能使白日晝陰卿若能動東風興朝雲吾志所不讓也魏志管輅傳注當今二公有晉之棟楹也吾方希逹如榱椽耳不憑之豈能立乎晉書劉殷傳蘭植中塗必無經時之翠桂生幽壑終保彌年之丹非蘭怨而桂親豈塗害而壑利而生滅有殊者隱顯之勢異也晉書陸機列傳司契以不唱為高冕旒以因寄成用宋書范泰傳眇眇纖蘿憑喬松以自聳蠢蠢輕蚋託驂尾而遠騖陳書蔡景厯傳川澤之大汙潦攸歸松柏之高蔦蘿斯託隋書史祥傳煙霧可依騰蛇與蛟龍俱遠棲息有所蒼蠅同騏驥之速因人成事其功不難隋書李德林傅助祭者得嘗救鬬者得傷蔽於不祥之木為雷霆所撲丈子上德以其所能託其所不能若舟之於車北方有獸名曰蟨鼠前而兔後趨則跲走則顛常為蛩蛩距虛取甘草以與之蟨有患害也蛩蛩距虛必負而走此以其所能託其所不能吕氏春秋不廣虻與驥致千里而不飛無糗糧之資而不飢淮南子説林訓今人待冠而飾首待履而行地冠履之於人也寒不能暖風不能障暴不能蔽也然而冠冠履履者其所自託者然也準南子人間訓有鳥於此架巢於葭葦之顛天喟然而風則葭折而巢壞何其所托者弱也稷蜂不攻而社鼠不薰非以稷蜂社鼠之神其所託者善也故聖人求賢者以輔夫吞舟之魚大矣蕩而失水則為螻蟻所制失其輔也韓詩外傳夫朝無賢人猶鴻鵠之無羽翼也雖有千里之望猶不能致其意之所欲至矣是故遊江海者託於船致遠道者託於乘欲霸王者託於賢伊尹吕尚管夷吾百里奚此霸王之船乘也説苑尊賢孔子曰北方有獸其名曰蟨前足鼠後足兔是獸也甚矣其愛蛩蛩巨虛也食得甘草必齧以遺蛩蛩巨虛蛩蛩巨虛見人將來必負蟨以走蟨非性之愛蛩蛩巨虛也為其假足之故也二獸者亦非性之愛蟨也為其得甘草而遺之故也夫禽獸昆蟲猶知比假而相有報也况於士君子之欲興名利於天下者乎説苑復恩鷦鷯巢於葦苕著之髮毛建之女工不能為也可謂完堅矣大風至則苕折卵破子死者何也其所託者使然也且夫狐者人之所攻也鼠者人之所燻也臣未嘗見稷狐見攻社鼠見燻也何則所託者然也説苑善説孔子見羅者其所得者皆黃口也孔子曰黃口盡得大爵獨不得何也羅者對曰黃口從大爵者不得大爵從黃口者可得孔子顧謂弟子曰君子慎所從不得其人則有羅網之患説苑敬慎蓬生枲中不扶自直白沙入泥與之皆黑説苑談叢依賢固不困依富固不窮馬趼斬而復行者何以輔足衆也説苑雜言鵠思其雄欲隨鳳東焦氏易林需之離嫫母為媒請求不得焦氏易林蠱之姤宛馬疾步肓師坐御目不見路中止不到焦氏易林復之蹇攀龍鱗附鳳翼巽以揚之勃勃乎其不可及乎楊子淵騫明星皓皓華藻之力也歟曰若是則奚為不自高曰皓皓者己也引而高之者天也楊子淵騫舟不能陸車不能浮然更相載故曰以其所能託其所不能也吕氏春秋不廣解河發崑崙江起岷山水力盛多滂沛之流浸下益盛不得廣岸低地不能通流入乎東海如岸狹地仰溝洫決泆散在丘墟矣文儒之知有似於此王充論衡效力篇登高而建旌則其所視者廣矣順風而振鐸則其所聞者遠矣非旌色之益明鐸聲之益遠也所託者然也况居富貴之地而行其政令者乎徐幹中論爵祿騰蛇配龍因霧而躍雖欲登天雲罷陸略仗非啓體難以云託山海經中山經圖讚凡木結根於靈山而匠石為之寢斤斧小鮮寓身於龍池而漁父為之息網罥蚊集鷹首則鳸鵦不敢啄鼠住虎側則貍犬不敢議抱朴子外篇廣譬綴羽於金鐵置之于江湖必也沈溺陷於泥沙非羽質重而性沈所託沈也載石於舟置之江湖則披風截波泛揚長澗非石質輕而性浮所託浮也摶牛之虻飛極百步若附鸞尾則一翥萬里非其翼工所託迅也樓季足捷追越奔光若駕疲騾則日不涉一舍非其脛遲所託蹇也以是觀之附得其所則重石可浮短翅能遠附失其所則輕羽淪溺迅足成蹇劉子託附故霜雁託於秋風以成輕舉之勢騰蛇附於春霧以希凌霄之遊蟨鼠附於蛩蛩以攀追日之步碧蘿附於青松以茂凌雲之蕊以夫鳥獸蟲卉之志猶知因風假霧託峻附高以成其事何况於人而無託附以就其名乎劉子託附天之始旭則目察輕煙歲之將暮則蓬卷雲中目之能見蓬之能高託日之光附風之勢也劉子託附夫燕之巢幕銜泥補綴爛若綬紋雖陶匠逞妙不能為之可謂固矣然凱旋剔幕則巢破子裂是所託危也鷦鷯巢葦之莖紩之以絲髮珠圓羅皺雖女工運巧不能為之可謂固矣然虻風歘至則葦折卵破者何也所託輕弱使之然也劉子託附昔有賣良馬於市者已三旦矣而市人不顧乃謂伯樂曰吾賣良馬而市人莫賞願子一顧請獻半馬之價於是伯樂造市來而迎睇之去而目送之一朝之價遂至千金此馬非昨為駑駘今成駃騠也由人莫之賞未有為之顧盻者也夫樟木盤根鉤枝癭節蠧皮輪囷擁腫則衆眼不顧匠者採焉製為殿堂塗以丹漆畫為黼藻則百辟卿士莫不顧盼仰視木性猶是也而昔賤今貴者良工之為容也荆蹊之珠夜光之璧薦之侯王必藏之以玉匣緘之以金縢若暗以投人則莫不相盻以愕按劍而怒何者為無因而至故也若物無所因則良馬勞於駔闠美材朽於幽谷寶珠觸於按劍若有所因而至則良馬一顧千金樟木光於紫殿珠擎之玉匣今人之居代雖抱才智幽鬱窮閨而無所因未有為之聲譽先之以吹瑩欲望身之光名之顯猶捫虛縳風煎湯覔雪豈可得乎劉子因顯幽蘭生乎通谷而長秀被乎高岑言有託也李善注文選陸士衡悲哉行枳句來巢空穴來風其所託者然文選風賦顧葛藟之蔓延兮託微莖於樛木懼身輕而施重兮若履氷而臨谷文選寡婦賦夫蚊蟲終日經營不能越階序附驥尾則涉千里攀鴻翮則翔四海文選王褒四子講德論北土之性難以託根投人夜光鮮不按劍文選吕安與嵇茂齊書曲蓬何以直託身依叢麻黔黎竟何常政成在民和文選潘安仁河陽縣作詩譬彼樛木蔓葛以敷文選慮諶贈劉琨詩楚使使者聘於齊王饗之於梧宫使者曰大哉梧乎王曰江海之魚必吞舟大國之樹必巨圍使者何怪焉文選王仲宣贈文叔良詩注攀其鱗翼丏其餘論附駔驥之旄端軼歸鴻於碣石文選劉孝標廣絶交論向若垂一鱗回一翼令吾子攀其飛騰之藝挂其羽翼之末猶奮迅於雲霄之際騰驤於四極之外補文選夏侯湛抵疑浮萍無根本非水將何依廣文選傅休奕明月篇寄松為女蘿依水如浮萍廣文選曹子建閨情詩靈芝生河洲動搖因洪波蘭榮一何晚嚴霜悴其柯哀哉二芳草不植泰山阿廣文選韋孟酈文勝詩有階者易成基無因者難成時意林周生列子如彼葛藟衍於樛木藝文類聚嵗時部三月三日詩假摯風雲非由羽翮藝文類聚職官部吏部尚書誄地均指日既無迹而成高仕若乘風故不行而自遠藝文類聚戰官部儀同章傍玉流溫依蘭染薰藝文類聚人部友悌詩孟嘗君寄客於齊王三年不見用客反見孟嘗君曰不知臣罪耶君之過也孟嘗君曰縷因針而入不因針而急夫子之才必薄矣客曰不然臣見鷦鷯巢於葦之苕鴻毛著之已建之安工女不能為可謂完堅矣大風至則苕折卵破者其所託者使然也藝文類聚島部鷦鷯附蒼蠅於驥尾託明鏡於朝光藝文類聚人部贈答賦燕鼎在舟雖重不沈藝文類聚人部贈答詩如懸蘿之附松似浮萍之託津藝文類聚人部哀傷賦青青女蘿草上依高松枝幸蒙庇眷恩為惠不可訾太平御覽樂部莵絲譬如蓮花不生陸地滋濕之處乃生是花三十六部尊經按魔經偈譬如大地以種散中衆緣和合則得生長應知大地與種生長為所依止為能建立波羅蜜多經卷一設空箱篋由曾置珠其器仍為衆人愛重波羅蜜多經卷八如有女人端正巨富若無強夫所守護者易為惡人之所侵凌波羅蜜多經卷三百五十如人依王雖極貧匱而不被辱波羅蜜多經五百八十三譬如有人善解斷事曾於無量長者居士商賈衆中數數斷事有匱乏故頻於長者居士等所借便財物恐他來索無力酬還遂依附王冀免拘縶時諸債主怖畏王故不敢牽掣挫辱彼人所以者何彼所依附王力甚大難可當敵波羅蜜多經五百八十三若是珠在篋中雖舉珠去以珠功德故其篋則貴小品波羅蜜經卷二如依牛糞生蟲糞非是蟲蟲非離糞然依於糞因緣和合蟲乃得生身作黃色大寶積經卷五十六如依棗生蟲棗非是蟲蟲非離棗然依於棗因緣和合蟲乃得生身作赤色大寶積經卷五十六如依青草蟲乃得生草非是蟲蟲非離草然依於草因緣和合蟲乃得生身作青色大寶積經卷五十六如依酪生蟲身作白色大寶積經卷五十六譬如一切種子叢林皆依大地之所生長若地壞者彼亦隨壞大寶積經卷一百一十九譬如射師有諸弟子雖未慣習其師技藝然其智慧方便善巧餘一切人所不能及大方廣佛華嚴經卷七十八譬如黑蜂依船而位遊於大海隨船飄蕩大乘密嚴經卷上譬如有人鞘中拔刀彼作是念鞘異刀異而刀從鞘出又如有人合麻為繩彼作是念麻異繩異而繩從麻出又如有人篋中出蛇彼作是念篋異蛇異而蛇從篋出又如有人從簏出衣彼作是念簏異衣異而衣從簏出長阿含經卷十三如人依於筏安穩至彼岸阿育王經偈基四譬如近尊者必當獲大利修行道地經慈品世間有二知識常與人為因緣令人得大罪亦令人得大福何謂二知識一者惡知識二者善知識譬如賊帥造惡逆殺害君父破亂天下衆生被毒殃無不加與之從事令人得大罪如釋迦文菩薩發意求道救度衆生四等四恩接護一切三界五道靡不蒙度也所謂善知識與之從事令人得大福雜譬喻經上譬如香在器中香雖去餘氣故在大智度論論卷二譬如曲草生於麻中不扶自直大智度論卷十四譬如沈石雖重依船得度大智度論三十五譬如重囚應死有勢力者護則受鞭杖而已又如王子雖作重罪以輕罰除之以是王種中生大智度論卷二十七譬如毒蛇欲食蝦蟇常隨逐之蝦蟇到摩祗藥所蛇聞藥氣毒即消歇大智度論卷五十六如人攀緣枝葉則墜落若促莖幹則堅固大智度論卷六十八故願憑流揚以託鱗翮𢎞明集䆁何衡陽逹性論喻林卷二十六
