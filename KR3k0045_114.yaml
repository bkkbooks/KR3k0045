body:
  text: 喻林卷一百十四明徐元太撰性理門五去欲火含煙而妨火桂懐蠧而賊桂然則火勝則煙滅蠧收則桂折故性明者欲簡嗜繁者氣惛宋書顔延之傳衆人熙熙如享大牢如登春臺我獨泊兮其未兆如嬰兒之未孩老子異俗日月欲明浮雲蔽之河水欲清沙土穢之叢蘭欲修秋風敗之人性欲平嗜欲害之文子上德堯不以有天下為貴故授舜公子札不以有國為尊故讓位子罕不以玉為富故不受寶務光不以生害義故自投於淵由此觀之至貴不待爵至富不待財天下至大矣而以與他人也身至親矣而棄之淵外此其餘無足利矣此之謂無累之人淮南子精神訓子夏見曽子一臞一肥曽子問其故曰出見富貴之樂而欲之入見先王之道又説之兩者心戰故臞先王之道勝故肥淮南子精神訓夫乗舟而惑者不知東西見斗極則寤矣夫性亦人之斗極也以有自見也則不失物之情無以自見則動而惑營譬若隴西之遊愈躁愈沉淮南子齊俗訓逐獸者目不見太山嗜慾在外則明所蔽矣淮南子説林訓蚺蛇珍於越土中國遇而惡之黼黻貴於華夏祼國得而棄之當其無用皆中國之蚺蛇祼國之黼黻也以太和為至樂則榮華不足顧也以恬澹為至味則酒色不足欽也嵇中㪚集答難養生論林之性静所以動者風揺之也水之性清所以濁者土渾之也人之性真所以邪者欲眩之也劉子防慾情慾之萌如木之將蘖火之始熒手可掣而斷露可滴而滅及其熾也結條陵雲煽熛章華雖窮力運斤竭池灌火而不能禁其勢盛也嗜慾之萌耳目可關而心意可鑰至於熾也雖襞情卷慾而不能收其性敗也劉子防慾身之有慾如樹之有蝎樹抱蝎則還自鑿身抱慾而返自害故蝎盛則木折慾熾則身亡劉子防慾珠瑩則塵埃不能附性明而情慾不能染也劉子防慾外疾之害輕於秋毫人知避之内疾之害重於丘山而莫之避劉子防慾利欲感動失其正氣不如深耕熟耰之有實莊子音義則陽煙出於火非火之和情生於性非性之適故火壯則煙微性充則情約文選陸機演連珠水性勝火分之以釡甑則火强而水弱人性勝志分以利欲則志强而性弱意林篤論重階連棟必濁汝真金寶滿室將亂汝神厚味來殃艶色危身求髙反墜務厚更貧閑情塞欲老氏所珍藝文類聚人部鑒誡銘不見可欲使心不亂是以惡迹止步滅影即陰藝文類聚食物部酒戒聖人在於天下如槖籥乎非與萬物交争其德常歸焉以其謙虚無欲也欲者凶害之根也無者天地之元也莫知其根莫知其源太平御覽道部養生奉道不齋戒如無燭夜行失道自苦耳太平御覽道部齋戒檢身止欲莫過於蚓此志士所不及也太平御覽豸部蚯蚓夏王使羿射於方矢之皮征寸之的乃命羿曰子射之中則賞子以萬金之費不中則削子以十邑之地羿容無定色氣戰於胷中乃援弓而射之不中更射之又不中夏王謂傳彌仁曰斯羿也發無不中而與之賞罰則不中的者何也傳彌仁曰若羿也喜懼為之災萬金為之患矣人能遺其喜懼去其萬金則天下之人皆不愧於羿矣夏王曰人聞子之言始得無欲之道太平御覽工藝部射中無貨之貨養我之福也有貨之貨喪我之賊也道德經指歸卷八器之害者莫甚乎戈兵獸之害者莫甚乎兕虎而令兵戈無所容其鋒刃虎兕無所措其爪角斯誠不以欲累其身者也道德經註世間塵土能㸃穢浄物聲色等法能汙清行道德經註疏卷一兵馬所行之處害人損物但有荆棘穢草不生禾稼也亦猶欲心馳騁之處唯増惡業不生善惠道德經註疏卷三宇内清夷無為而治故能却馳走之馬以糞農田治身者却六根兵馬以道糞心道德經註疏卷五覩諸邪道如覩仇讎遠諸愛慾如避臭穢虚皇四十九章譬如佞臣教王作惡海空智藏經持誡品譬如油能燃燈燈明自煎油盡燈滅衆生迷惑亦復如是无上内秘藏經辨相明部襄品猶如毒樹之根汁能殺人元陽妙經卷一凡物取而得之者小不取而得之者大故聖人不取天機經蠢然如大毒藥不可得嘗如盛猛火不可親近大乗妙林經以是當知世間邪見煩惱熾盛猶荆棘林如蒺藜園不可親近大乗妙林經欲如草炬欲如苦果欲如利劔欲如火聚欲如毒器欲如幻惑欲如闇井欲如詐親波羅蜜多經卷四欲儲浄法先滌身器將越愛流前鳩行檝波羅蜜多經序五百八十四如有生此贍部洲人雖於欲界未得離染而或得往北俱盧洲因見彼洲女無繋屬形容端正遊戲自在又見彼洲衣服嚴具鮮浄殊妙皆依樹生又見彼洲有香粳米其味甘美不種自生又見彼洲觸處皆有種種珍寶甚可愛玩見彼洲人於如是類隨意受用無定繋屬正受用時非極躭染既受用已捨而無戀贍部洲人雖未離染具觀見彼種種勝事而不貪著捨棄還歸當知是人甚為希有波羅蜜多經五百九十一佛能斷彼羂由執智劒故大寳積經七十心如盜賊劫一切善根故心常貪色如蛾投火心常貪聲如軍久行樂勝鼓音心常貪香如猪喜樂不浄中臥大寶積經卷一百一十二譬如羅網多有諸結有人在中以呪術力破網得出隨意而去大方等大集經卷九譬如猛火與諸乾薪結期七日當大戰鬭爾時一切乾樹草木種種枝葉悉共聚合如須彌山爾時猛火有一親友而語之言汝今何故不自莊嚴多有救援助彼薪衆汝唯一已何能當之時火荅言彼怨雖多我力能敵不須伴黨大方等大集經卷九譬如病人服苦澀藥但為差病不生貪染大乗莊嚴經論卷六欲如毒樹根不拔芽還生大莊嚴經論卷六偈譬如食毒當死因教服止毒藥便不復死佛經譬如止毒藥佛説罵意經敬三猶如膏瓶處處裂破盛滿膏已而著日中漏遍漏津遍津中阿含經卷五佛言人為道能拔愛欲之根譬如摘懸珠一一摘之㑹有盡時惡盡得道也佛説四十二章經尺一佛言人懐愛欲不見道者譬如濁水以五彩投其中致力攪之衆人共臨水上無能覩其影愛欲交錯心中為濁故不見道若人漸解懴悔來近知識水澄穢除清浄無垢即自見形猛火著釡下中水涌躍以布覆上衆生照臨亦無覩其影者心中本有三毒涌沸在内五蓋覆外終不見道佛説四十二章經尺一譬如火性悉能燒然一切之物本緣經毘羅摩品猶如惡毒箭中則身命滅本緣經毘羅摩品那先言王曽見穫麥者不左手持麥右手刈之那先言智慧之人斷絶愛欲譬如穫麥那先比丘經卷上斷樹無伐本根在猶復生除根乃無樹比丘得泥洹法句經道行品貪意自縛如犢慕乳法句經道行品遠離諸淵如風却雲法句經道行品火莫熱於婬㨗莫疾於怒網莫密於癡愛流駛於河法句經塵垢品樹根深固雖截猶復生愛意不盡除輙當還受苦法句經愛欲品雖獄有鈎鏁慧人不謂牢法句經愛欲品為道行者不與欲㑹先誅愛本無所植根勿如刈葦令心復生法句經愛欲品千千為敵一夫勝之未若自勝為戰中上法句經述千品已度癡淵如鴈棄池法句經羅漢品猶如世人以羅網捕鳥以罥弶捕鹿以深穽捕虎其有鳥獸遭此難者無有出期出曜經三愛品火之熾熱不過於思想火所燒瘡可以藥療思想火被燎不可療治出曜經三愛品世人饑渴可以水漿以濟其命或食草根果蓏或以消息服氣或以藥草神呪可得延夀此愛心饑渴者飲四海水猶不漬愛一尺之地是故説愛渴而難濟也出曜經三愛品若彼猛將身被戒鎧心執慧劔前後固險與結使共戰必能果辦出曜經六戒品此五欲者譬如以羊擲置火中又如盲人墮於深坑無明羅刹經欲如段肉衆鳥競逐以要言之如蛾赴火如魚吞鈎如鹿逐聲如渴飲鹹水三昧法門經卷下當知欲為毒害當求初禪滅斷欲火三昧法門經卷下壞功德苗令不増長大智度論卷五譬如勇士見敵必期吞滅大智度論卷十一如三流狂象如臨大深坑如師子斷道如摩竭魚開口諸欲亦如是甚可怖畏大智度論卷十七此五欲者得之轉劇如火炙疥五欲無益如狗齩骨五欲増争如鳥競肉五欲燒人如逆風執炬五欲害人如踐惡蛇大智度論卷十七譬如人有重罪國王大瞋誅其七世根本令無遺餘大智度論卷二十七如鉤賊魚如弶害鹿如燈焚蛾大智度論三十五如人著木屐踐刺刺則摧折是諸佛以禪定智慧屐摧五欲刺大智度論卷六十一辟支佛經中有一國王見二特牛婬欲故鬭死自覺悟我以財色故征伐他國與此何異大智度論卷八十一譬如室内然燈燭者只為防風以無風故燈熖轉明蘇婆呼童子經卷上如火焚薪已自於是中滅大乗密嚴經卷上常多有愛恒富無明未逹因緣不修對治所以鬱鬱慢山殆髙嵩華滔滔愛水遂廣滄溟法苑珠林卷八十五愛性無厭名之為渴愛斷則得解脱解脱止愛渴故名漿羅什譯維摩詰經佛道品水之為用除垢去熱解脱之性亦除執去閡也羅什譯維摩詰經佛道品如洗穢物至盡乃浄浄則盡盡則無浄也羅什譯維摩詰經入不二法門品我染諸法故諸法縳我我心無染則萬縳斯解僧肇註維摩詰經佛國品去智南康郡君山有獸名格似猩猩之形自知吉凶人無機愛之則可馴狎欲執害之則去不來述異記下海上之人有好漚鳥者每旦至海上從漚鳥游漚鳥之至者百住而不止其父曰吾聞漚鳥皆從汝游汝取來吾玩之明日之海上漚鳥舞而不下也故曰至言去言至為無為齊智之所知則淺矣列子黄帝其使多智之人量利害料虚實度人情得亦中亡亦中其少智之人不量利害不料虚實不度人情得亦中亡亦中量與不量料與不料度與不度奚以異惟亡所量亡所不量則全而亡喪亦非知全亦非知喪自全也自亡也自喪也列子力命聞以有翼飛者矣未聞以無翼飛者也聞以有知知者矣未聞以無知知者也莊子人間世南海之帝為儵北海之帝為忽中央之帝為渾沌儵與忽時相遇於渾沌之地渾沌待之甚善儵與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死莊子應帝王夫弓弩畢弋機變之知多則鳥亂於上矣鉤餌網罟罾笱之知多則魚亂於水矣削格羅落罝罘之知多則獸亂於澤矣知詐漸毒頡滑堅白解垢同異之變多則俗惑於辨矣故天下每每大亂罪在於好知莊子胠篋擢亂六律鑠絶竽瑟塞瞽曠之耳而天下始人含其聰矣滅文章㪚五采膠離朱之目而天下始人含其明矣毁絶鉤繩而棄規矩攦工倕之指而天下始人有其巧矣削曽史之行鉗楊墨之口攘棄仁義而天下之德始𤣥同矣莊子胠篋知為孽約為膠德為接工為商聖人不謀惡用知不斵惡用膠無喪惡用德不貨惡用商莊子德充符今世誅死者相枕也桁楊者相推也刑戮者相望也而儒墨乃始離跂攘臂乎桎梏之間意甚矣哉其無愧而不知恥也甚矣吾未知聖知之不為桁楊椄槢也仁義之不為桎梏鑿枘也焉知曽史之不為桀跖嚆矢也故曰絶聖棄知而天下大治莊子在宥黄帝遊乎赤水之北登乎崑崙之丘而南望還歸遺其𤣥珠使知索之而不得使離朱索之而不得使喫詬索之而不得也乃使象罔象罔得之黄帝曰異哉象罔乃可以得之乎莊子天地子貢南遊於楚反於晉過漢陰見一丈人方将為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者卬而視之曰奈何曰鑿木為機後重前輕挈水若抽數如泆湯其名為橰為圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胷中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不為也莊子天地老聃之役有庚桑楚者偏得老聃之道以北居畏壘之山其臣之畫然知者去之其妾之挈然仁者遠之擁腫之與居鞅掌之為使莊子庚桑楚吾生也有涯而知也無涯以有涯隨無涯殆已莊子養生主復讎者不折鏌干雖有忮心者不怨飄瓦莊子逹生雖有至知萬人謀之魚不畏網而畏鵜鶘去小知而大知明莊子外物其知憯於􅝏蠆之尾鮮規之獸莫得安其性命之情者而猶自以為聖人莊子天運絶聖棄知大盗乃止擿玉毁珠小盗不起焚符破璽而民朴鄙掊斗折衡而民不争殫殘天下之聖法而民始可與論議莊子胠篋聖人相諭不待言有先言言者也海上之人有好蜻者每居海上從蜻㳺蜻之至者百數而不止前後左右盡蜻也終日玩之而不去其父告之曰聞蜻皆從女居取而來吾將玩之明日之海上而蜻無至者矣吕氏春秋精論夫鏡水之與形接也不設智故而方圓曲直弗能逃也故響不肆應而景不一設淮南子原道訓任耳目以聽視者勞形而不明以知慮為治者苦心而無功淮南子原道訓夫舟浮於水車轉於陸此勢之自然也木撃折轊水戾破舟不怨木石而罪巧拙者知故不載焉是故道有智則惑德有心則險淮南子主術訓善博者不欲牟不恐不勝平心定意捉得其齊行由其理雖不必勝得籌必多何則勝在於數不在於欲駎者不貪最先不恐獨後緩急調乎手御心調乎馬雖不能必先載馬力必盡矣何則先在於數而不在於欲也是故滅欲則數勝棄智則道立矣淮南子詮言訓天下非無信士也臨貨分財必探籌而定分以為有心者之於平不若無心者也天下非無㢘士也然而守重寶者必關户而全封以為有欲者之於㢘不若無欲者也人舉其疵則怨人鑑見其醜則善鑑人能接物而不與已焉則免於累矣淮南子詮言訓民知書而德衰知數而厚衰知劵契而信衰知械機而實衰也巧詐藏於胷中則純白不備而神德不全矣淮南子泰族訓衛有五丈夫俱負缶而入井灌韭終日一區鄧析過下車為教之曰為機重其後輕其前命曰橋終日灌韭百區不倦五丈夫曰吾師言曰有機知之巧必有機知之敗我非不知也不欲為也子其往矣我一心溉之不知改已説苑反質不用其知而用衆謀猶網無情故得魚也郭子註莊外物夫舉重携輕而神氣自若此力之所限也而尚名好勝者雖絶膂未足以慊其願此知之無涯也郭子註莊養生為出於不為故以不為為主知出於不知故以不知為宗郭子註莊大宗師人以仁智為臣妾庚桑悉棄仁智也荘子音義庚桑楚夫攻之逾宻避之逾巧則雖禽獸猶不可圖之以智而况於人哉故治天下者惟不任知郭子註莊胠篋羿古之善射者弓矢所及為彀中夫利害相攻則天下皆羿也自不遺身忘知與物同波者皆游於羿之彀中耳郭子註莊德充符智慧多則引血氣如燈火之於脂膏炷大而明明則膏消炷小而暗暗則膏息息則能長久也意林傳子喪明者之目杜知者之口窒聰者之耳斬巧者之手與時相隨與和俯仰道德經指歸卷十二知而絶知不困於知不知用知亦不困於知其所以不困則異矣而於為不困則一也道德經指歸卷十二谿不求物而物自歸之嬰兒不用智而合自然之智道徳經註觀察於識而責之言汝如幻化體性誑惑猶如猿猴輕躁不住亦如掣電不嘗暫停如不調馬不著道路亦如狂象縱逸難禁無明羅刹經全真生為人所不知死為人所不惜至矣喑聾之徒天下之有道者也晉書皇甫謐傳趙襄子狩於山中藉芿燔林扇赫百里有一人從石壁中出隨烟燼上下衆謂鬼物火過徐行而出若無所經涉者襄子怪而留之徐而察之形色七竅人也氣息音聲人也問奚道而處石奚道而入火其人曰奚物而謂石奚物而謂火襄子曰而嚮之所出者石也而嚮之所涉者火也其人曰不知也魏文侯聞之問子夏子夏曰以商所聞夫子之言和者大同於物物無得傷閡者游金石蹈水火皆可也列子黄帝莊子曰子獨不見貍狌乎卑身而伏以候敖者東西跳梁不避髙下中於機辟死於罔罟今夫斄牛其大若垂天之雲此能為大矣而不能執䑕今子有大樹患其無用何不樹之於無何有之鄉廣莫之野彷徨乎無為其測逍遥乎寢卧其下不夭斤斧物無害者無所可用安所困苦哉莊子逍遥遊支離疏者頥隠於齊肩髙於頂㑹撮指天五管在上兩髀為脅挫鍼治繲足以餬口鼓筴播精足以食十人上徴武士則支離攘臂於其間上有大役則支離以有常疾不受功上與疾者粟則受三鍾與十束薪夫支離其形者猶足以養其身終其天年又况支離其德者乎荘子人間世怊乎若嬰兒之失其母也儻乎若行而失其道也莊子天地名公器也不可多取仁義先王之蘧廬也止可以一宿而不可久處覯而多責古之至人假道於仁託宿於義以遊逍遥之虚食於茍簡之田立於不貸之圃逍遥無為也茍簡易養也不貸無出也古者謂是采真之遊莊子天運孔子觀於呂梁縣水三千仞流沫四十里黿鼉魚鼈之所不能游也見一丈夫游之以為有苦而欲死也使弟子竝流而拯之數百步而出被髪行歌而游於塘下孔子從而問焉曰吾以子為鬼察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齊俱入與汨偕出從水之道而不為私焉此吾所以蹈之也孔子曰何謂始乎故長乎性成乎命曰吾生於陵而安於陵故也長於水而安於水性也不知吾所以然而然命也莊子逹生此之謂天府注焉而不滿酌焉而不竭而不知其所由來此之謂葆光莊子齊物論老子曰而睢睢盱盱而誰與居大白若辱盛德若不足陽子居蹴然變容曰敬聞命矣其往也舍者迎將其家公執席妻執巾櫛舎者避席煬者避竈其反也舍者與之争席矣莊子寓言為外刑者金與木也為内刑者動與過也宵人之離外刑者金木訊之離内刑者陰陽食之夫免乎外内之刑者唯真人能之莊子列禦冦室無空虚則婦姑勃谿心無天遊則六鑿相攘荘子外物兒子終日嘷而嗌不嗄和之至也終日握而手不掜共其德也終日視而目不􅀈偏不在外也動不知所為行不知所之身若槁木之枝而心若死灰若是者禍亦不至福亦不來莊子庚桑楚夫水之性清土者抇之故不得清人之性夀物者抇之故不得夀物也者所以養性也非所以性養也今世之人惑者多以性養物則不知輕重也吕氏春秋本生萬人操弓共射其一招招無不中萬物章章以害一生生無不傷以便一生生無不長故聖人之制萬物也以全其天也吕氏春秋本生若然者偃其聰明而抱其太素以利害為塵垢以生死為晝夜是故目觀玉輅琬象之狀耳聽白雪清角之聲不能以亂其神登千仭之谿臨蝯眩之岸不足以滑其和譬若鍾山之玉炊以罏炭三日三夜而色澤不變則至德天地之精也淮南子俶真訓不言之辯不道之道若或通焉謂之天府取焉而不損酌焉而不竭莫知其所由出是謂瑶光瑶光者資糧萬物者也淮南子本經訓次三柔嬰兒于號三日不嗄所嫁切測曰嬰兒于號中心和也太𤣥經第二夷茍以不虧為純則雖百行同舉萬變参備乃至純也茍以不雜為素則雖龍章鳯姿倩乎有非常之觀乃至素也郭子註莊刻意焦火之熱凝氷之寒皆喜怒并積之所生若乃不彫不琢各全其樸則何氷炭之有哉郭子註莊在宥我勞天下久矣息駕𤣥圃以反余真也黄帝本行記以道為父以德為母神明為師太和為友清浄為常平易為主天地為法陰陽為象日月為儀萬物為表因應為元誠信為首道德經指歸卷十凡夫之人實不能度大海水也而是真人實能度彼生死大海元陽妙經卷六害馬之弊既去解牛之刀乃王華陽陶隠居集如物初入爐麤惡先燋滅真者不移動中陰經卷下又如虚空雖遍諸色不相捨離而不為色過所染汙佛説佛地經卷五喻林卷一百十四
