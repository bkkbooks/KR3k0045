body:
  text: 喻林巻七十一明徐元太撰君道門十一求士九五同人先號咷而後笑大師克相遇易同人九五以把包𤓰易姤闢四門明四目達四聰書舜典蒹音兼葭音加蒼蒼白露為霜所謂伊人在水一方遡洄從之道阻且長遡遊從之宛在水中央蒹葭凄凄白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡遊從之宛在水中沚詩國風蒹葭鴥音聿彼晨風鬱彼北林未見君子憂心欽欽山有苞櫟音厯隰有六駮音剝未見君子憂心靡樂山有苞棣隰有樹檖未見君子憂心如醉詩國風晨風豈其食魚必河之魴音房豈其取音娶妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子詩國風衡門南有嘉魚烝然罩罩音笟君子有酒嘉賔式燕以樂叶五教反南有嘉魚烝然汕汕音訕君子有酒嘉賔式燕以衎音看南詩小雅有嘉魚南有嘉魚樂與賢也太平君子至誠樂與賢者共之也毛詩南有嘉魚卷阿召康公戒成王也言求賢用吉士也毛詩巻阿何必河之魴然後可食取其口美而已何必大國之女然後可妻亦取貞順而已君任臣何必至人亦取忠孝而已鄭氏箋詩衡門視彼阪由墝埆之地有菀然其茂特之苗以興視彼空谷側陋之處有傑然其秀異之賢然天之以風雨動揺我特苗如將不我特苗之能勝言風雨之迅疾也以喻王之以禮命徵召我賢者如恐不我賢者之能得言禮命之繁多也毛詩正義正月平原大藪瞻其草之髙豐茂者必有恠鳥獸居之且草可財也如艾而夷之其地必宜五穀髙山多林必有恠虎豹蕃孕焉深淵大川必有蛟龍焉民亦如之君察之此可以見器見才矣大戴禮記四代欲見賢人而不以其道猶欲其入而閉之門也孟子萬章下臣聞之賈人夏則資皮冬則資絺旱則資舟水則資車以待乏也夫雖無四方之憂然謀臣與爪牙之士不可不養而擇也譬如蓑笠時雨既至必求之國語越魯仲連謂孟嘗君曰君之廐馬百乗無不被繡衣而食菽粟者豈有騏驥騄耳哉後宫十妃皆縞紵食粱肉豈有毛嬙西施哉色與馬取於今之世士何必待古哉戰國策齊襄王周有砥厄宋有結緑梁有懸黎楚有和璞此四寶者工之所失也而為天下名器然則聖王之所棄者獨不足以厚國家乎臣聞善厚家者取之於國善厚國者取之於諸侯天下有明王則諸侯不得擅厚矣是何也為其凋榮也戰國策秦昭襄王婦人有夫死三日而嫁者有幽居守寡不出門者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隱居不嫁未嘗卑節下意以求仕也願足下使人禮之前漢書蒯通傳今不循伯者之道廼欲以三代選舉之法取當世之士猶察伯樂之圖求騏驥於市而不可得亦已明矣前漢書梅福傳氣之清者為神人之清者為賢養身者以練神為寳安國者以積賢為道後漢書李固列傳選利器於良材求鏌鋣於明智後漢書崔駰列傳夫物以逺至為珍士以稀見為貴槃木朽株為萬乗用者左右為之容耳王者取士宜㧞衆之所貴後漢書循吏列傳屈平曰國有驥而不知乗焉皇皇而更索魏志任城王傳昔楚葉公好龍神龍下之好偽徹天何况於真蜀志秦宓傳香餌引泉魚重幣購勇士呉志孫奐傳註夫賢才之畜於國由良工之須利器巧匠之待繩墨也器用利則斵削易而材不病繩墨設則曲直正而衆形得矣是以人主必勤求賢而佚以任之也晉書阮种傳四門開闢英彦鳬藻收春花於京輦採秋實於巖藪晉書應詹傳空谷流縶維之詠丘園旅束帛之觀晉書龔𤣥之傳吾逺求騏驥不知近在東鄰晉書馮跋記窮谷無白駒之倡喬岳無遺寳之嗟豈特羅飛翮于垂天網沈鱗于溟海宋書武二王彭城傳必欲探援潛寶傾海求珠自可卜肆巫祠之間馬棧牛口之下宋書王㣲傳豈有欲見大厦而遺其棟梁者哉宋書王曇首傳功照千里非特燭車之珍徳柔鄰國豈徒祕璧之貴宋書謝莊傳懼隱鱗卜祝藏器屠保物色闗下委裘河上梁書王暕傳剖蜯求珍捜巖採幹野無投綸朝盈逸翰魏書段承根傳世求名駿行地能致千里時愛竒寳照車遂有徑寸陳書蔡景厯傳至於旁求俊乂爰逮側㣲用道和羮是隆大厦陳書後主紀今雖唐虞君世俊乂盈朝然修大厦者豈厭夫良材之積也隋書李德林傳采荆南之把梓收㑹稽之箭竹隋書經籍四志收把梓之才闢康莊之館隋書潘徽文學傳冀與羣才共康庻績而彚茅寂漠投竿罕至豈美璞韜采未值良工將介石在懐確乎難拔北史隋本紀下聖人在上賢士百里而有一人則猶無有也王道衰㣲暴亂在上賢士千里而有一人則猶比肩也鬻子守道緡㣲餌明小魚食之緡綢餌香中魚食之緡隆餌豐大魚食之夫魚食其餌乃牽於緡人食其禄乃服於君故以餌取魚魚可殺以禄取人人可竭以家取國國可拔以國取天下天下可畢太公六韜文師夫寒温之變非一精之所化也天下之事非一人之所能獨知也海水廣大非獨仰一川之流也是以明主之治世也急於求人弗獨為也鶡冠子道一雀適羿羿必得之威也以天下為之籠則雀無所逃是故湯以胞人籠伊尹秦穆公以五羊之皮籠百里奚是故非以其所好籠之而可得者無有也莊子庚桑楚譬若欲衆其國之善射御之士者必將富之貴之敬之譽之然後國之善射御之士將可得而衆也况又有賢良之士厚乎德行辯乎言談博乎道術者乎此固國家之珍而社稷之佐也亦必且富之貴之敬之譽之然後國之良士亦將可得而衆也墨子尚賢上古者國君諸侯之不可以不執善承嗣輔佐也譬之猶執熱之有濯也將休其手焉墨子尚賢中今有藥於此食之則耳加聰目加明則吾必説而强食之今夫伊尹之於我國也譬之良醫善藥也而子不欲我見伊尹是子不欲我善也墨子貴義求馬黄黒馬皆可致求白馬黄黑馬不可致公孫龍子白馬論人主無賢如瞽無相何倀倀荀子成相千里而有一士比肩也累世而有一聖人繼踵也士與聖人之所自來若此其難也而治必待之治奚由至雖幸而有未必知也不知則與無賢同此治世之所以短而亂世之所以長也故王者不四霸者不六吕氏春秋觀世今有良醫於此治十人而起九人所以求之萬也故賢者之致功名也比乎良醫而君人者不知疾求豈不過哉吕氏春秋察賢戎人見暴布者而問之曰何以為之莽莽也指麻而示之怒曰孰之壤壤也可以為之莽莽也故亡國非無智士也非無賢者也其主無由接故也吕氏春秋知接荆有善相人者所言無遺策聞於國莊王見而問焉對曰臣非能相人也能觀人之友也觀布衣也其友皆孝悌繩謹畏令如此者其家必日益身必日榮矣所謂吉人也觀事君者也其友皆誠信有行好善如此者事君日益官職日進此所謂吉臣也觀人主也其朝臣多賢左右多忠主有失皆交争証諫如此者國日安主日尊天下日服此所謂吉主也臣非能相人也能觀人之友也莊王善之於是疾收士日夜不懈遂霸天下故賢主之時見文藝之人也非特具之而已也所以就大務也吕氏春秋貴當澤有無水國無無士故士易得而難求也易致而難留也賈子新書大政下渚澤有枯木而國無枯士矣賈子新書大政下有相馬而失馬者然良馬猶在相之中淮南子説山訓一目之羅不可以得鳥無餌之釣不可以得魚遇士無禮不可以得賢淮南子説林訓子思居衛衛人釣於河得鰥魚焉其大盈車子思問之曰鰥魚魚之難得者也子果何得之對曰吾始下釣垂一魴之餌鰥過而弗視也更以豚之半體則吞之矣子思喟然曰鰥雖難得貪以死餌士雖懐道貪以死禄矣孔叢子抗志以言舉人若以毛相馬鹽鐵論利議周公旦白屋之士所下者七十人而天下之士皆至晏子所與同衣食者百人而天下之士亦至仲尼修道行理文章而天下之士亦至矣雖有賢者而無以接之賢者奚由盡忠哉驥不自至千里者待伯樂而後自至也説苑尊賢吾獵將以求士也其榛藂刺虎豹者吾是以知其勇也其攫犀搏兕者吾是以知其勁有力也罷田而分所得吾是以知其仁也因是道也而得三士焉楚國以安説苑君道古者驊騮騏驥今無有王選於衆王好馬矣古者有豹象之胎今無有王選於衆王好味矣古者有毛廧西施今無有王選於衆王好色矣王必將待堯舜禹湯之士而後好之則禹湯之士亦不好王矣説苑尊賢夫珠玉無足去此數千里而所以能來者人好之也今士有足而不來者此是吾君不好之乎説苑尊賢夫劍産于越珠産江漢玉産昆山此三寳者以無足而至今君茍好士則賢士至矣新序雜事一君之好士也有似葉公子髙之好龍也葉公子髙好龍鈎以寫龍鑿以寫龍屋室雕文以寫龍於是天龍聞而下之窺頭於牖施尾於堂葉公見之棄而還走失其魂魄五色無主是葉公非好龍也好夫似龍而非龍者也今臣聞君好士故不逺千里之外以見君七日不禮君非好士也好夫似士而非士者也新序雜事五東求金玉反得弊石焦氏易林家人之否次六大開帷幕以引方客測曰大開帷幕覽衆明也太𤣥經第一童次五龍下于泥君子利用取遇庸夷測曰龍下于泥陽下隂也太𤣥經第五内士不輔而求霸猶病者不用醫而求愈也天禄閣外史受餽夫士國之幹也木無幹則根抵朽壊而葉無所依國無士則綱紀陵夷政教蕩然而民無所附故賢王之待士不可茍也天禄閣外史留賢得其士則利不得其士則替故諸矦之不可失士猶嬰兒之不可失乳也失乳而生者有矣未有失士而利者也臣聞陳軫云夫諸矦以士為體故動無異形以士為心故謀無異慮好士者如飲甘羮擇士者如調亂絃此言士之重于諸矦也天禄閣外史士論昔鄭人有膏肓之疾三年而不出戸或告之曰子之疾危矣求良醫以瘳之可乎曰市無良醫何以求為曰有良醫者在于楚子以百金致之彼必不逺千里而赴鄭人果得楚之良醫以瘳其疾是醫者未嘗求疾而治也醫在而疾者求之耳然則為士者亦諸矦之求之也豈求諸矦而交與吾受晉王之䀻猶楚醫受鄭人之金也鄭人得之而瘳疾晉王得之而不瘳吾豈不若楚人之醫乎亦信與不信也天禄閣外史董卓山林藪澤士之與鳥獸羣而棲者也故獵士則强獵禽則荒惟賢王能得其士而失其禽庸主能得其禽而失其士夫士國之雄也其潛隱於藪澤之間亦欲望賢王之獵也今王輕千乗而為此遊將欲獵士乎抑欲獵禽乎獵士則士必振羽翼而争投于王之羅獵禽雖鸞鳳騶虞不能益於國也王何不念賢士之藪澤張仁義之網羅而田獵哉昔文王獵于渭國人皆以文王為獵禽也而不知惟士之獵故一獵而得吕尚天下稱明焉今以王之賢而不效文王之獵宜士之不遊于國也天禄閣外史諫獵人皆知求良醫以治病人君不知求賢臣以治國吕氏春秋察賢解聘賢求士猶嫁娶之道也未有自嫁之女出財為婦故女慕財䀻而達其真士慕𤣥纁而達其名以禮聘士而其國乃寧矣武矦十六策舉措夫柱以直木為堅輔以直士為賢直木出於幽林直士出於衆下故人君選舉必求隠處武矦十六策舉措夫治國猶於治身治身之道務在養神治國之道務在舉賢是以養神求生舉賢求安武矦十六策舉措舍輕艘而涉無涯者不見其必濟也無良輔而羡隆平者未聞其有成也鴻鸞之凌虚者六翮之力也淵虬之天飛者雲霧之偕也故招賢用才者人主之要務也立功立事者髦俊之所思也若乃樂治定而忽智士者何異欲致逺塗而棄騏騄哉抱朴子外篇貴賢藥以除疾猶明君求賢以袪蔽也太𤣥經第五沈解國之需賢譬車之恃輪猶舟之倚檝也車摧輪則無以行舟無檝則無以濟國之乏賢則無以理國之多賢如託造父之乗附越客之舟身不勞而千里可期足不行而蓬萊可至朝之乏賢若鳳虧六翮欲望背摩青天臆衝絳煙終莫由也劉子薦賢夫連城之璧瘞影荆山夜光之珠潛輝鬱浦玉無翼而飛珠無脛而行揚聲於章華之臺炫燿於綺羅之堂者葢人君之舉也賢士有脛而不肯至者蠧才於幽岫腐智於柴蓽者葢人不能自薦未有為之舉也劉子薦賢今忌人之細短忘人之所長以此招賢是書空而尋跡披水而覔路不可得也劉子妄瑕以方叔召虎之臣鎮衛四境為國爪牙者可謂當矣然而髙鳥未挂於輕繳淵魚未懸於鈎餌者恐釣弋之術或未盡也文選曹植求自試表求賢暫勞垂拱永逸方之疏壤取類導川文選任彦升薦士表豈薪槱之道未𢎞為網羅之目尚簡文選王元長策秀才文當此之時人人自謂握靈虵之珠家家自謂抱荆山之玉吾王於是設天網以該之頓八紘以掩之今悉集兹國矣然此數子猶復不能飛騫絶跡一舉千里也文選曹植與楊德祖書珠玉無踁而自至者以人好之也况賢者之有足乎文選孔融論盛孝章書丘園之秀因時則揚是以大人基命不擢才於后士明主聿興不降佐於昊蒼文選陸士衡演連珠刳舟剡楫將欲濟江海也聘賢選佐將以安天下也補文選郎顗消弭書磁器引鐵於金不連大朝舉士愚不聞焉廣文選曹子建矯志詩桂林生於五嶺把梓出於南荆夫以卉木之盛猶載在方志况千里之朝懐其良彦而使人滯於常流莫登于龍津者乎廣文選庾仲初薦唐㞵牋聽决價而貿玉者無楚和之名因近習而取士者無伯王之功故璵璠之為寳非駔儈之術也伊吕之佐非左右之舊廣文選班固連珠景公曰吾欲霸諸矦若何晏子曰官未具也臣聞仲尼處陋巷廉隅不正則原憲侍志意不通則仲由侍德不長則顔囘侍今君未有能侍故未具也意林晏子夫三光懸象式揚天德岳瀆山澤廣開地道賢人顯進實興聖治藝文類聚人部隱逸下書賢人為德體自然也故語曰黄金累千不如一賢藝文類聚人部賢黄帝夢大風吹天下之塵垢皆去又夢人執千鈞之弩驅羊數萬羣帝寤而歎曰風為號令執政者垢去土解清治者天下豈有姓風名后者哉夫千鈞之弩異力能逺者也驅羊數萬羣是能善牧者也天下豈有姓力名牧者於是依二夢之占而求之得風后于海隅登以為相得力牧於大澤進以為將事文類聚夢世説湯思賢夢見有人負鼎抗俎對已而笑寤而占曰鼎為和味俎者割裁天下豈有人為吾宰者哉事文類聚夢世説得清水淬其鋒越砥斂其鍔必騰躍天路出觀聖世太平御覽治道部薦舉下夫採名珠求之於蚌欲得名士求之於文學或割百蚌不得一珠不可捨蚌求之於魚或百文學不出竒士不可捨文學求之於斗筲也由是言之蚌乃珠之所藏文學亦士之塲矣太平御覽職官部王文學傾嵓捜寳髙羅九霄慶雲集矣鸞駕三招初學記居處部宅以小釣釣川而擒其魚中釣釣國而擒其萬國諸侯初學記武部漁註恢燿和肆必在兼城之寳翼亮崇本宜紆髙世之逸何氏語林棲逸沈約宋書致士九四解而拇朋至斯孚易解鳳凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶音蚌萋萋音妻雝雝喈喈叶居奚反阿詩大雅卷先君招賢人賢人往之駃疾如晨風之飛入北林毛詩晨風註山之櫟隰之駮皆其所宜有也賢者亦國家所宜有之鄭氏箋詩晨風南方水中有善魚人將乆如而俱罩之天下有賢者在位之人將久如而並求致之於朝鄭氏箋詩南有嘉魚鴥然而疾飛者彼晨風之鳥也鬱積而茂盛者彼北林之木也北林由鬱茂之故故晨風飛疾而入之以興疾歸於秦朝者是彼賢人能招者是彼穆公穆公由能招賢之故故賢者疾往而歸之毛詩正義晨風南方有樛然下垂之木甘瓠之草得上而纍蔓之以興在位有下下之君子故在野賢者得往而歸就之言君子之下下猶樛木之下垂賢者所以往矣毛詩正義南有嘉魚有卷然而曲者之阿則飄風從南長養之方來入之以興王有降屈之意則賢者懐其撫養之德來就之阿以岸曲而來風猶王以體屈而致賢也毛詩正義卷阿鳳凰往飛之時翽翽其羽為聲亦與衆鳥集於所止鳳凰所在衆鳥慕而從之故鳳凰亦與之同止以興賢者來仕之時亦與衆羣士集於君朝賢者所在羣士慕而就之故賢者亦與之同朝得大賢而致羣士猶鳳凰飛而來衆鳥毛詩正義卷阿鳳凰與衆鳥俱集所止猶賢者與羣士俱在王朝衆鳥慕鳳猶羣士慕賢毛詩正義卷阿郭隗曰臣聞古之君人有以千金求千里馬者三年不能得㳙人言於君曰請求之君遣之三月得千里馬馬已死買其首五百金反以報君君大怒曰所求者生馬安事死馬而捐五百金㳙人對曰死馬且買之五百金况生馬乎天下必以王為能市馬馬今至矣於是不能期年千里之馬至者三今王誠欲致士先從隗始隗且見事况賢於隗者乎豈逺千里哉戰國䇿燕昭王夫物不産於秦可寶者多士不産於秦而願忠者衆史記李斯傳烏鳶之卵不毁而後鳳凰集誹謗之罪不誅而後良言進前漢書路温舒傳潛虬聳鱗佇利見之期翔鳳弭翼應來儀之感宋書武三王江夏傳公曰致天下之精材若何管子對曰五而六之九而十之不可為數公曰來工若何管子對曰三倍不逺千里管子小問北面而事之則伯己者至先趨而後息先問而後默則什己者至人趨已趨則若己者至憑几據杖指麾而使則厮役者至樂嗟若咄則徒𨽻之人至矣故帝者與師處王者與友處亡主與徒處故德萬人者謂之雋德千人者謂之豪德百人者謂之英鶡冠子博選帝者之臣其名臣也其實師也王者之臣其名臣也其實友也霸者之臣其名臣也其實賔也危國之臣其名臣也其實虜也今王將東面目指氣使以求臣則厮役之材至矣南面聽朝不失揖讓之禮以求臣則人臣之材至矣西面等禮相亢下之以色不乗勢以求臣則朋友之材至矣北面拘指逡巡而退以求臣則師傅之材至矣説苑君道君之賞賜不可以功及也君之誅罰不可以理避也猶舉杖而呼狗張弓而祝雞矣雖有香餌而不能致者害之必也説苑尊賢聲同則處異而相應德合則未見而相親賢者立於本朝則天下之豪相率而趨之矣説苑尊賢齊桓公尊九九之人而有道之士歸之越王敬螳蜋之怒而勇士死之葉公好龍而龍為暴下物之所徵固不須頃列女傳周列國齊孤逐女南山髙岡麟鳳室堂焦氏易林蠱之兊江水沱汜思附君子焦氏易林遯之㢲魯王愛玉有楚人持玉鼎以進曰此荆山之美玉也君能愛乎魯王笑曰寡人聞荆山之玉卞和得之而獻楚王其後也秦人復得之奚其為荆山乎夫地不再産胡能復得邪楚人曰夫荆山之所生者非特和氏之一璧也君何以荆山為無玉乎荆山之鼎楚産也而君疑之若夫璵出于魯昔有倚頓得之以為鳬杯其妾視之誤毁諸地是魯璵無倚頓之杯久矣今有人持璞璵以進君亦以為魯無璵璧可乎夫地之所産不盡出玉之所藏不盡用也豈惟荆魯之玉為然哉若魯國賢士之藪也今君以為地不再産則展禽之後魯無孔子孔子之後魯無顔淵顔淵之後魯無閔損閔損之後魯無子羽子羽之後魯無秦非秦非之後魯無曾㸃曾㸃之後魯無子思子思之後魯無孟軻孟軻之後魯無叔孫通戚麟髙堂生孔安國韋賢疏廣匡衡曹褒之屬矣是今之生于魯國者皆魯璵之沙也遊于魯國者皆荆山之石也奚玉之為臣請完鼎而返楚無使魯庭有刖足之刑而荆山有泣玉之士也魯王慚乃命左右以千金價之左右曰昔者燕昭王以千金致士今君以千金致玉臣恐天下懐寳之士皆以昭王之臺而笑矣天禄閣外史玉論魯王得楚人之玉謂張裘曰昔卞和獻玉于楚王楚王却又刖其足以示衆夫却玉不明也刖士不仁也今寡人好玉楚人以荆山之玉進寡人賞以千金是卞和不幸而遇楚王也由此觀之寡人其優乎張裘對曰王不如也魯王曰何為不如曰臣以為楚王之明也故不如夫得玉不足以强國王知之乎知强國者不以玉則楚王之却不可謂不明也刖士而絶佞人不可謂不仁也當是時使和氏進一荆山之士于楚王則亦不待三獻而三却也况刖之乎今魯國之士抱器而進于王非特楚人之玉也而王不賞之獨何與王自以為遇玉之禮過於楚王待楚人之禮過於和氏而不知王之戮于天下士也有甚于刖足士之抱器而嘆亦有甚于和氏者乎何王之明于玉而闇于士也故曰臣以為王不如也魯王勃然變色而言曰子何以寡人訕也寡人好士築五丈之臺而延賔客叔度不至寡人䀻之叔度至寡人饗之何謂不遇哉曰王之遇叔度特楚人之遇耳遇楚人而猶寵其玉今遇叔度而不能寵其道可謂遇乎哉天禄閣外史重賢言鳥獸相呼雲龍相感無不應其類而從其耦傷君獨無精誠之心以動賢也王逸註楚辭七諫言君不能以禮敬聘請賢者猶以直鍼釣魚無所能得也王逸註楚辭七諫言神龍將舉陞天則景雲覆而扶之輔其類也言君好賢士則英俊往而並集也王逸註楚辭七諫羣臣歸君若輻之輳轂淮南子主術訓解徒英而不雄則雄材者不伏也徒雄而不英則智者不歸往也故雄能得雄不能得英英能得英不能得雄故一人之身兼有英雄得能役英與雄役英與雄故能成大業也劉邵人物志英雄賢者仰之如天地愛之如親戚樂之如塤箎歆之如蘭芳故其歸我也猶決壅導滯水注之大壑何不至之有徐幹中論亡國且莽之爵人其實囚之也囚人者非必著之桎梏而置之囹圄之謂也拘係之愁憂之之謂也使在朝之人欲進則不得陳其謀欲退則不得安其身是則以綸組為繩索以印佩為鉗鐵也小人雖樂之君子則以為辱故明王之得賢也得其心也非謂得其軀也茍得其軀而不論其心也斯與籠鳥檻獸無以異也徐幹中論亡國賢者之視我容貌也如魍魎臺殿也如狴犴采服也如衰絰絃歌也如號哭酒醴也如滫滌肴饌也如糞土從事舉措每無一善彼之惡我也如是其肯至哉徐幹中論亡國垂餌香則鱣鮪來懸賞厚則果毅奮抱朴子外篇安貧臣之附君如水之趨川也太𤣥經第三應解競收杞梓争采松竹鳳不及栖龍不暇伏谷無幽蘭嶺無亭菊文選袁宏名臣序賛蛟龍驤首奮翼則浮雲出流霧雨咸集聖王砥節修德則游談之士歸義思名文選鄒陽上書吳王燕王市駿馬之骨非欲以騁道里乃當以招絶足也文選孔融論盛孝章書非有聖智之君惡有甘棠之臣故虎嘯而風寥戾龍起而致雲氣蟋蟀俟秋吟蜉蝣出以隂文選王褒四子講德論束帛旅於丘園旌命交於塗巷故豪彦尋聲而響臻志士希光而景附異人輻凑猛士如林文選陸士衡辨亡論使夫廉髙之士畢志於衡軛之内文選曹元首六代論賢哲不可以色貌誘之猶張羅恤鳳施穽誘麟意林周生列子夫珠生於南海玉出於須彌無足而至者人好之也士有足而不至者以人不好也太平御覽珍寳部玉下臨江有釣不獲一鱗非江魚之不食以其所餌之者非也是以君子慎舉擢太平御覽鱗介部魚下喻林巻七十一
