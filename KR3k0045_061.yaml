body:
  text: 喻林巻六十一明徐元太撰君道門一履運九五飛龍在天利見大人易乾飛龍在天大人造也易乾飛龍在天上治也易乾飛龍在天乃位乎天徳易乾時乗六龍以御天也雲行雨施天下平也易乾同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也易乾木上有火鼎君子以正位凝命易鼎原田之中有菽藿衆民能力采之者則得食之以興域中之有王位有徳能勤治之者則得處之藿生原中非有主位在域中非有常也毛詩正義小宛中遭傾覆龍徳泥蟠今乗雲髙躋盤桓天位誠所謂將隆大位必先倥偬之也後漢書張衡列傳運隂陽而緯武應變之道如神吞日月以經天成物之功若嵗晉書武昭王列傳龍飛漠南鳯峙朔北長轡逺馭則西罩崑山之外宻網遐張則東絙滄海之表晉書赫連勃勃傳如彼日月連光接鏡晉書赫連勃勃紀夫日月麗天髙明所以表徳山嶽題地柔博所以成功梁書武帝上紀竊以嵩岳既峻山川出雲大國有蕃申甫惟翰梁書元帝紀日月貞明太陽不可以闕照天地貞觀乾道不可以乆惕梁書元帝紀夫惟天為大列晷宿而垂象謂地葢厚疏山嶽以阜物北齊書文宣帝紀惟皇御㝢惟帝乗乾隋書音樂志下觀象則天乾元合其徳觀法審地域大表其尊雨施雲行四時所以生殺川流嶽立萬物於是裁成隋書許善心傳披金繩而握天鏡開玉匣而總地維南史齊本紀上夫有雲霧之勢而能乗遊之者龍虵之材美之也今雲盛而螾弗能乗也霧濃而螘不能遊也夫有盛雲濃霧之勢而不能乗遊者螾螘之材薄也今桀紂南面而王天下以天子之威為之雲霧而天下不免乎大亂者桀紂之材薄也韓非子難勢旋斗運樞順天無憂焦氏易林謙之觀日出温谷照臨萬國焦氏易林履之困次五日正于天利以其辰作王測曰日正于天貴當位也太𤣥經第一中夫風為號令雨為徳惠故風動而草木揺雨降而萬物殖故以風雨諭君言政令徳惠所由出也王逸注楚辭九辯髙祖從亭長提三尺劒取天下光武由白水奮威武海内無尺土所因一位所乗直奉天命推自然此則起髙於淵洿為深於丘山也王充論衡恢國篇周以龍興秦以虎視文選西都賦夫黄河清而聖人生里社鳴而聖人出羣龍見而聖人用文選李蕭逺運命論星廻日薄擊雷鞭電者之謂天岳立川流吐霧蒸雲者之謂地包天地之混成洞隂陽之不測而以財成萬物者其在聖人乎藝文類聚帝王部梁元帝表譬若麟龍發足羣獸追蹤鸞鳯舉翼衆鳥隨風藝文類聚儲官部儲官表日圓盈尺尺光滿天下聖人居髙明燭彌綸六合太平御覽天部三上日在井中不能燭逺目在足下不可以視君之有國猶天之有日居不髙則不明視不尊則不逺太平御覽治道部治政一如轉輪王將登大位於白半月十五日晨沐浴受齋至大殿上昇師子座面東面坐有大輪寶從空而來當知彼王受轉輪位不乆當得具足七寳波羅蜜多經巻六百七支者一有君徳天下仰戴如人之首二有輔臣左右忠良如人之臂三有國境寛富包容如人之腹四有險固囊結萬方如人之䐡五有倉庫財食充盈所往無難如人之䏶六有兵威士馬精鋭制動由己如人之脛七有隣境貢賦以時往復王命如人之足大方廣佛華嚴經巻十一脩徳地勢坤君子以厚徳載物易坤明兩作離大人以繼明照于四方易離明出地上晉君子以自昭明徳易晉九五井冽寒泉食易井若日月之照臨光于四方顯于西土書泰誓下至治馨香感于神明黍稷非馨明徳惟馨書君陳价人維藩大師維垣大邦維屏大宗維翰懐徳維寜宗子維城無俾城壊無獨斯畏詩大雅板華或有黄者或有白者興明王之徳時有駮而不純鄭氏箋詩裳裳者華藿生原中非有主也以喻王位無常家也勤於徳者則得之鄭氏箋詩小宛東方之日兮猶言明盛之君兮日出東方無不鑒照喻君徳明盛無不察理毛詩正義東方之日人情者聖王之田也修禮以耕之陳義以種之講學以耨之本仁以聚之播樂以安之禮記禮運湯之盤銘曰茍日新日日新又日新大學不厚其棟不能任重重莫如國棟莫如徳國語魯夫仁義者治之門士民者君之根本也闓門固根莫如正身越絶外傳計倪其仁如天其知如神就之如日望之如雲史記五帝紀凡有天下治為萬民命者葢之如天容之如地史記呂氏紀與之乎斟酌道徳之淵源肴覈仁義之林藪以望元符之臻焉後漢書班固列傳聖人升髙據上則以徳義為首渉危蹈傾則以賢者為力唐堯以徳化為冠冕以稷契為筋力髙而益崇動而愈據後漢書黄瓊列傳比日之明如天之大隋書音樂中志身不善之毋患人莫己知丹青在山民知而取之美珠在淵民知而取之是以我有過為而民無過命民之觀也察矣不可遁逃管子小稱聖人之在天下怵怵為天下渾其心百姓皆注其耳目聖人皆孩之老子任德王鈇非一世之器者厚徳隆俊也鶡冠子博選夫耀蟬者務在明其火振其樹而已火不明雖振其樹無益也今人主有能明其徳則天下歸之若蟬之歸明火也荀子致仕堯無膠漆之約於當世而道行舜無置錐之地於後世而徳結韓非子安危樹木有曼根有直根根者書之所謂抵也抵也者木之所以建生也曼根者木之所以持生也徳也者人之所以建生也祿也者人之所以持生也今建於理者其持祿也乆故曰深其根體其道者其生日長故曰固其抵韓非子解老徳也者萬民之宰也月也者羣隂之本也月望則蚌蛤實羣隂盈月晦則蚌蛤虚羣隂虧夫月形乎天而羣隂化乎淵聖人形徳乎已而四荒咸飭乎仁呂氏春秋精通嘗得學黄帝之所以誨顓頊矣爰有大圜在上大矩在下汝能法之為民父母呂氏春秋序意立事者不離道徳調絃者不失宫商陸子術事水廣者魚大山髙者木修廣其地而薄其徳譬猶陶人為器也揲挻其土而不益厚破乃愈疾淮南子説山訓齊閔王得宿瘤女宫中諸夫人皆掩口而笑左右失貌不能自止王大慚曰且無笑不飾耳夫飾與不飾固相去十百也女曰夫飾相去千萬尚不足言何獨十百也王曰何以言之對曰性相近也習相逺也㫺者堯舜桀紂俱天子也堯舜自飾以仁義雖為天子安於節儉茅茨不剪采椽不斵後宫衣不重采食不重味至今數千嵗天下歸善焉桀紂不自飾以仁義習為苛文造為高臺深池後宫蹈綺縠弄珠玉意非有饜時也身死國亡為天下笑至今千餘嵗天下歸惡焉由是觀之飾與不飾相去千萬尚不足言何獨十百也列女傳周列國齊宿瘤女次五天門大開恢堂之階或生之差測曰天門大開徳不能滿堂也太𤣥經第四廓次三日常其徳三嵗不食測曰日常其徳君道明也太𤣥經第四常次五靈囊大包其徳珍黄測曰靈囊大包不敢自盛也太𤣥經第六訓次五黄心在腹白骨生肉孚徳不復測曰黄心在腹上徳天也太𤣥經第六養天子之徳光明如日規輪如月衆輝如星霑潤如海太子皆比徳焉故云重爾古今注泰山以崔嵬之故能生養百卉明君以崇髙其徳故為萬姓所尊也前漢書注禮樂志地雖生萬物日出於上其功乃著故君子法之而以明自照其徳玉海周易鄭康成注敬畏洊雷震君子以恐懼脩省易震震不于其躬于其鄰无咎易震无有師保如臨父母易繫辭下傳予臨兆民懔乎若朽索之馭六馬書五子之歌慄慄危懼若將隕于深淵書湯誥心之憂危若蹈虎尾渉于春氷書君牙玩人喪徳玩物喪志書旅獒以人為戲弄則喪其徳以器物為戲弄則喪其志孔氏傳書旅獒兢兢業業如霆如雷詩大雅雲漢局蹐者天髙而有雷霆地厚而有陷淪也鄭氏箋詩正月故上者辟如緣木者務髙而畏下者滋甚六馬之離必於四面之衢民之離道必於上之佚政也故上者尊嚴而絶百姓者卑賤而神大戴禮記子張問入官災異皇天所以譴告人君過失猶嚴父之明誡前漢書谷永傳譬天位於乗犇以虎尾為警戒呉志賀邵傳其懼患也若無轡而乗奔其慎禍也猶履冰而臨谷宋書傅亮傳如彼在泉臨深是懼如彼覆車望途改歩魏書宗欽傳中期對秦王曰王之料天下過矣昔者六晉之時智氏最強滅破范中行又帥韓魏以圍趙襄子於晉陽決晉水以灌晉陽城不沈者三板耳智伯出行水韓康子御魏桓子驂乗智伯曰始吾不知水之可亡人之國也乃今知之汾水利以灌安邑絳水利以灌平陽魏桓子肘韓康子康子履魏桓子躡其踵肘足接於車上而智氏分矣身死國亡為天下笑今秦之強不能過智伯韓魏雖弱尚賢其在晉陽之下也此乃方其用肘足時也願王之勿易也戰國策秦昭襄王乗舟舟漏而弗塞則舟沉矣塞漏舟而輕陽侯之波則舟覆矣今公自以為辨於薛公而輕秦是塞漏舟而輕陽侯之波也戰國䇿韓襄王若渉淵水未知所濟前漢書武帝紀致氷匪霜致隊匪嫚瞻惟我王昔靡不練前漢書韋賢傳若渉巨川㒺知所憑晉書賀循傳然白龍魚服有豫且禍之海若潜游罹葛陂之酷深願陛下清宮蹕路思二神為元鑒不可忽天下之重輕行斤斧之間晉書石季龍上傳古者有二言墻有耳伏㓂在側墻有耳者㣲謀外泄之謂也伏寇在側者沉疑得民之道也管子君臣下違天而黯明神則殛之雖大必折雖炎必撲子華子晏子昔之登髙者下人代之㥄手足為之汗出而上人乃始摶折枝而趨操木止之者僇是故天下寒心而人主孤立鶡冠子備知明君之御民若御奔而無轡履冰而負重鄧析子轉辭篇勿輕小事小隙沉舟勿輕小物小蠱毒身勿輕小人小人賊國闗尹子九藥齊宣王問弋於唐易子曰弋者奚貴唐易子曰在於謹廪王曰何謂謹廪對曰鳥以數十目視人人以二目視鳥奈何其不謹廪也故曰在於謹廪也然則為天下何以為此廪今人主以二目視一國一國以萬目視人主將何以不自為廪乎韓非子外儲説右上君子之居民上若以腐索御奔馬若􅡮薄氷蛟在其下若入林而遇乳虎淮南子説林訓夫流深者其水不測尊至者其敬無窮是故天之所加雖為災害猶承而大之春秋繁露奉本天子父母事天而子孫畜萬民民未偏飽無用祭天者是猶子孫未得食無用食父母也言莫逆於是春秋繁露郊祭子貢問治民於孔子孔子曰懔懔焉如以腐索御奔馬子貢曰何其畏也孔子曰夫通達之國皆人也以道導之則吾畜也不以道導之則吾讐也若何而毋畏説苑政理闕龍翰于天貞栗其鱗測曰龍翰之栗極懼墜也太𤣥經第三應是以九重之臺雖髙必壊故仰髙者不可忽其下瞻前者不可忽其後武侯十六䇿思慮浮滄海者必精占於風氣故保利渉之福善涖政者必戰戰於得失故享惟永之慶抱朴子外篇廣譬且夫挈缾之智守不假器况纂帝業而輕天位文選東京賦常翹翹以危懼若乗奔而無轡文選東京賦白龍魚服見困豫且雖萬乗之無懼猶怵惕於一夫文選東京賦戒出豕之敗御惕飛鳥之跱衡故袛慎乎所常敬備乎所未防文選赭白馬賦念負重於春氷懐御奔於秋駕文選王融曲水詩序太公曰黄帝云余在民上揺揺恐夕不至朝故金人三緘其口慎言語也堯居民上振振如臨深淵舜居民上兢兢如履薄氷禹居民上慄慄如恐不滿湯居民上翼翼恐不敢息道自㣲而生禍自㣲而成慎終與始完如金城意林太公金匱堯曰余坐華殿之上森然而松生於棟余立櫺扉之内霏焉而雲生於牖雖面雙闕無異乎崔巍之冠蓬萊雖背墉郭無異乎廻巒之縈崑崙余安知其所以安藝文類聚帝王部陶唐氏若渉海之無涯懼湮沒於洪流藝文類聚人部言語賦目瞤耳鳴近夫小戒也狐鳴犬噑家人小祅也猶忌慎動作封鎮書符以防其禍是故天地示異災變横起則人主恒恐懼而修政太平御覽人事部鑒戒下冠銘曰居髙無忘危在上無忘敬懼則安敬則正困學紀聞巻二十雜識事親如奉神履民如臨深道徳經指歸巻七誡始慎終是君子之鹽梅敬初䕶末是養生之要趣法苑珠林巻四十六廣大徳大則無所不容財多則無所不濟周易正義豐栁木茂盛則多蟬淵深而旁生萑葦言大者之旁無所不容鄭氏箋詩小弁椒之氣日益逺長似桓叔之徳彌廣博鄭氏箋詩椒聊然此蕭是香物之㣲者天不以其㣲而不潤也喻四海諸侯乃國君之賤者王不以其賤而不及也毛詩正義蓼蕭有菀然而茂者彼柳木也此栁由茂故上有鳴蟬其聲嘒嘒然有漼然而深者彼淵水也此淵由深故傍萑葦其衆渒淠然栁木茂而多蟬淵水深而生葦是大者之傍無所不容毛詩正義小弁故其事大配乎天地參乎日月雜於雲霓總要萬物穆穆純純其莫之能循若天之司莫之能職大戴禮記哀公問五義源泉不竭故天下積也而木不寡短長人得其量故治而不亂大戴禮記子張問入官川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也左傳宣公十五年河出崑崙虚色白所渠并千七百一川色黄百里一小山千里一曲一直爾雅維摩經曰以四大海水入一毛孔中不撓魚鼈等而彼大海本相如故後漢書西域傳論注渾四游而斡五緯天道𢎞也振河海而載山川地道厚也一情紀而合流貫人靈茂也宋書頗延之傳如山之大無不有也如谷之虚無不受也北史魏收傳苞物衆者莫大於天地化物多者莫多於日月民之所急莫急於水火然而天不為一物枉其時明君聖人亦不為一人枉其法天行其所行而萬物被其利聖人亦行其所行而百姓被其利管子白心夫山澤廣大則草木易多也壤地肥饒則桑麻易殖也薦草多衍則六畜易繁也管子八觀天之裁大故能兼覆萬物地之裁大故能兼載萬物人主之裁大故容物多而衆人得比焉故曰裁大者衆之所比也管子形勢解天覆而無外也其徳無所不在地載而無棄也安固而不動故莫不生殖聖人法之以覆載萬民故莫不得其職管子版法解古之善為君者法江海江海無為以成其大窊下以成其廣故能長乆為天下谿谷其徳乃足文子自然江之源出於汶山其大如甕口其流可以濫觴順沿而下控諸羣荆廣袤數千里方舟然後可以濟此無他故也所受於下流者非一壑也子華子虎㑹問夫視入以為出庾氏之職業也操贏而制餘商賈子之所為也中人之家計口然后食閭里之志也乃若天子者大官也有天下者大器也臨萬品御萬民窮天之産罄地之毛無有不共無有不備此則古今常尊之埶也奈何而以閭里之所志商賈子之所為庾氏之職業仰而議夫堯舜之量哉子華子晏子問黨今指馬之百體而不得馬而馬係於前者立其百體而謂之馬也是故丘山積卑而為髙江河合水而為大大人合并而為公莊子則陽故海不辭東流大之至也聖人并包天地澤及天下而不知其誰氏莊子徐無鬼江河不惡小谷之滿己也故能大聖人者事無辭也物無違也故能為天下器是故江河之水非一源也千鎰之裘非一狐之白也墨子親士天地不昭昭大水不潦潦大火不燎燎王徳不堯堯者乃千人之長也其直如矢其平如砥不足以覆萬物是故谿狹者速涸逝淺者速竭磽确者其地不育墨子親上地大則有常祥不庭岐母羣抵天翟不周山大則有虎豹熊螇蛆水大則有蛟龍黿鼉鱣鮪商書曰五世之廟可以觀怪萬夫之長可以生謀室中之無澤陂也井中之無大魚也新林之無長木也凡謀物之成也必由廣大衆多長乆信也呂氏春秋論大兼包萬國一齊殊俗并覆百姓若令一族是非輻輳而為之轂淮南子主術訓海内其所出故能大輻復其所過故能逺淮南子説林訓夫江河之腐胔不可勝數然祭者汲焉大也一杯酒白蠅漬其中匹夫弗嘗者小也淮南子要略訓夫浸水之所及也則生其所不及則死故民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由來者上徳不徳是以無徳孔叢子雜訓日月之明衆下仰之乾坤之廣萬物順之武侯十六䇿治人山小無獸水淺無魚樹弱無巢武侯十六䇿隂察夜舉燈燭光曜所及可得度也日照天下逺近廣狹難得量也浮於淮濟皆知曲折入東海者不曉南北故夫廣大從横難數極深掲厲難測漢徳酆廣日光海外也王充論衡須訟篇東海廣且深由卑下百川五嶽雖髙大不逆垢與塵良木不十圍洪條無所因長者能博愛天下寄其身曹子建當欲遊南山行五嶽巍峩不以藏疾傷其極天之髙滄海滉瀁不以含垢累其無涯之廣故九徳尚寛以得衆宣尼汎愛而與進抱朴子外篇博喻乾坤陶育而庶物不識其惠者由乎其益無方也大人神化而羣細不覺其施者由乎治之於未有也故可知者小也易料者少也抱朴子外篇博喻繁林蘙薈則羽族雲萃𤣥淵浩汗則鱗羣競赴徳盛業廣則宅心者衆舍瑕錄用即逺懐近集抱朴子外篇博喻陶朱白圭之財不一物者豐也雲夢孟諸所生萬殊者曠也抱朴子外篇喻蔽深大之淵衆物所歸包裹而藏之無有方外太𤣥經第四大觧山藪之有草木則毒害者居之川澤之形廣大則能受於汙濁人君之善御下亦當忍恥病也前漢書註路温舒傳山不厭髙海不厭深周公吐哺天下歸心文選魏武帝短歌行行潦暴集江海不以為多鰌鱓並逃九罭不以為虚是以許由匿堯而深隐唐氏不以衰夷齊恥周而逺餓文武不以卑文選王褒四子講徳論夫幽谷無私有至斯響洪鐘虚受無來不應文選王屮頭陀寺碑文君人者乗南面之位操殺生之柄威如秋霜恩如春養何求而不得何化而不從人君當以江海為腹山林為面當使其觀者不知江海何藏山林何有太平御覽皇王部敘皇王上人君以江海為腹山為面如此則下不知其量畏而懐之太平御覽人事部腹通𤣥經曰狹者入大而迷近者行逺而惑道徳經四子集觧惚恍之羅設而無狀之網施道徳經指歸巻十二譬如海水入一㣲塵是海水中蛟龍魚鼈安常如故亦無廹迮海空智藏經捨受品猶如大海容納百川无増无減无穢無淨无心揀擇含容一切金銀珠玉水晶琉璃硨磲碼碯珊瑚琥珀一切珍寳無不包藏真道大藏亦復如是大乗妙林經譬如大地普能荷負一切草木花果藥樹皆悉平等波羅蜜多經巻五百六十二譬如風界行無邉境波羅蜜多經巻五百九十七又如風界以太虚空為所行境波羅蜜多經巻五百九十七猶如衆龍還雨大海不可别知滴數多少阿差未菩薩經巻二如日所照靡不周遍未曽増減法華經巻六大海之水無滿不滿法海經尺一端尚戎狄豺狼不可厭也諸夏親暱不可棄也宴安酖毒不可懐也左傳閔公元年狄人伐衛衛懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰左傳閔公二年無徳者寵國之釁也杜氏觧左傳桓公八年諸侯之寳三土地人民政事寳珠玉者殃必及身孟子盡心下楚書曰楚國無以為寳惟善以為寳舅犯曰亡人無以為寳仁親以為寳大學從善如登從惡如崩國語周圉聞國之寳六而已聖能制議百物以輔相國家則寳之玉足以庇䕃嘉榖使無水旱之災則寳之龜足以憲臧不則寳之珠足以禦火災則寳之金足以禦兵亂則寳之山林藪澤足以僃財用則寳之若夫譁囂之美楚雖蠻夷不能寳也國語楚賢士邦之寳也美女邦之咎也越絶内經九術國有寳有器有用城郭險阻蓄藏寳也聖智器也珠玉末用也先王重其寳器而輕其末用管子樞言墨子見染素絲者而嘆曰染於蒼則蒼染於黄則黄所以入者變其色亦變五入而以為五色矣故染不可不慎也非獨染絲紗也國亦有染舜染於許由伯陽禹染於臯陶伯益湯染於伊尹仲虺武王染於太公望周公旦此四王者所染當故王天下立為天子功名蔽天地舉天下之仁義顯人必稱此四王者夏桀染於羊辛岐踵戎殷紂染於崇侯惡來周厲王染於虢公長父榮夷終幽王染於虢公鼓祭公敦此四王者所染不當故國殘身死為天下僇舉天下之不義辱人必稱此四王者呂氏春秋當染窺赤肉而鳥鵲聚貍處堂而衆䑕散衰絰陳而民知喪竽瑟陳而民知樂湯武修其行而天下從桀紂慢其行而天下畔豈待其言哉君子審在己者而已矣呂氏春秋貴當五榖養性而棄之於地珠玉無用而寳之於身故舜棄黄金於嶄嵓之上禹捐珠玉於五湖之淵陸子術事故其可憂者唯中主爾又以練絲染之藍則青染之緇則黒得善佐則存不得善佐則亡此其不可不憂者耳賈子新書連語昔者齊桓公好味而易牙烹其首子而餌之虞君好寳而晉獻以璧馬釣之胡王好音而秦穆公以女樂誘之是皆以利見制於人也故善建者不拔淮南子主術訓以鑿觀池之力耕則田野必辟矣以積土山之髙修隄防則水用必足矣以食狗馬鴻鴈之費養士則名譽必榮矣以弋獵博奕之日誦詩讀書聞識必博矣淮南子泰族訓撓枉者過直救文者以質鹽鐵論救匱隋和之名寳也而不能安危存亡故喻徳示威惟賢臣良相不在犬馬珍怪是以聖王以賢為寳不以珠玉為寳昔晏子修之罇俎之間而折衝乎千里不能者雖隋和滿篋無益於存亡鹽鐵論崇禮玩好亂目巧聲迷耳賊敗貞良君受其殃焦氏易林困之賁或曰刑名非道邪何自然矣曰何必刑名圍碁擊劍反自眩形亦皆自然也由其大者作正道由其小者作姦道揚子問道篇梁惠王與齊威王田於郊威王問曰王亦有寶乎惠王曰若寡人國小尚有徑寸之珠照車前後各十二乗者十枚奈何以萬乗之國而無寳乎威王曰寡人以為寳與王異吾臣有檀子者使守南城則楚人不敢為寇東取泗上十二諸侯皆來朝吾臣有盼子者使守髙唐則趙人不敢東漁吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺將以照千里豈特十二乗哉梁惠王慙不懌而去藝文類聚寶玉部寳蘭蕙荃蘅植之近疇此亦寡人之所親賢也藜蓬臭蔚棄之乎逺疆此亦寡人之所逺佞也藝文類聚禮部藉田論所貴惟賢所寳惟榖太平御覽百榖部榖金一兩生於境内粟十二石死於境外粟十二石生於境内金一兩死於境外國好生金於境内則金粟兩死倉府兩虚國弱好生粟於境内則金粟兩生倉府兩實國強太平御覽百榖部粟今人主不思神芝朱草而患枇杷荔枝之腐亦鄙甚矣太平御覽果部荔枝臣以為珍竒靡麗之物誠是玩弄之所寳然非經國之至寳太平御覽珍寳部寶雖金玉滿堂明珠滿室飢不為寳非國之用太平御覽珍寳部寳齊景公謂晏子曰韓人既得寳千乗聚萬駟矣方欲珍懸黎㑹金玉其得之耶奚若晏嬰曰臣聞琬琰之外有鳥焉曰金翅氏謂為羽豪其為鳥也非龍肝不食非鳯血不飲其食也常飢而不飽其飲也常渇而後充生未幾何失其天年而死珠玉之珍非乃為君之患也太平御覽羽族部金翅鳥喻林巻六十一
