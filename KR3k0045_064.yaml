body:
  text: 喻林卷六十四明徐元太撰君道門四貴公九五顯比王用三驅失前禽邑人不誡吉易比舍逆取順失前禽也易比夫三驅之禮禽逆來趣己則舍之背己而走則射之愛於來而惡於去也故其所施常失前禽也以顯比而居王位用三驅之道者也王弼注易比時之還也無私貌日之出也無私照汲冢周書周祝解虞人之射禽弩已張從機間視括與所射參相得乃後釋弦發矢為政亦當以己心參於羣臣及萬民可乃後施也鄭氏注禮記緇衣獨樂樂與人樂樂孰樂曰不若與人曰與少樂樂與衆樂樂孰樂曰不若與衆孟子梁惠王下楚共王出獵而遺其弓左右請求之共王曰止楚人遺弓楚人得之又何求焉仲尼聞之曰惜乎其不大也亦曰人遺弓人得之而已何必楚也孔子集語下古人有言滿堂而飲酒有一人鄉隅而悲泣則一堂皆為之不樂王者之於天下譬猶一堂之上也故一人不得其平為之悽愴於心前漢書刑法志夫水至平而邪者取法鏡至明而醜者亡怒水鏡之所以能窮物而無怨者以其無私也水鏡無私猶以免謗蜀志李嚴傳注天地至公故萬民咸育帝王無私而黎民戴賴魏書劉潔傳有善者不留其賞故民不私其利有過者不宿其罰故民不疾其威威罰之制無踰於民則人歸親於上矣如天雨然澤下尺管子君臣上日月之明無私故莫不得光聖人法之以燭萬民故能審察則無遺善無隱姦管子版法解天地不仁以萬物為芻狗聖人不仁以百姓為芻狗老子虛用衡之於左右無私輕重故可以為平繩之於內外無私曲直故可以為正人主之於法無私好憎故可以為令文子下德今之人分財賄而設鉤䇿焉非以夫鉤䇿者為能均也使善惡多寡無所歸其怨也是以聖人窮造物以為識量然且龜卜筮蓍以為決所以立言於公也聲出而應律身出而協度然且權量尺石以為器所以立正於公也義適而理訓舉天下無敢以容其議然且書契章程以為式所以立信於公也德澤汪濊威制宏逺盡四海之大無不面納然且法度禮籍以為凖所以立義於公也子華子晏子惟聖人究道之情唯道之法公政以明斗柄東指天下皆春斗柄南指天下皆夏斗柄西指天下皆秋斗柄北指天下皆冬斗柄運於上事立於下斗柄指一方四塞俱成此道之用法也鶡冠子環流四時殊氣天不賜故歲成五官殊職君不私故國治莊子則陽且假夫禽貪者器是以一人之斷制利天下譬之猶一覕也莊子徐無鬼嚴乎若國之有君其無私德繇繇乎若祭之有社其無私福泛泛乎其若四方之無窮其無所畛域莊子秋水楚王失弓因以利楚不能兼濟天下故曰仁義未遂也人君惟私其黨附之亦如守白求馬獨有白馬來應楚王所謂人者楚國也仲尼所謂人者天下也故離白以求馬衆馬皆至矣忘楚以利人天下咸應矣公孫龍子迹府注以養萬物則天下歸存親疏以待人則海內叛譬如離色命馬衆馬斯應守白求馬唯得白馬故命名而守一白色者非命衆馬也公孫龍子白馬論注白既不定在馬馬亦不専於白故忘色以求馬衆馬皆應矣忘私以親人天下皆親矣公孫龍子白馬論注設使白馬乃為有馬者但是一馬耳其材不異衆馬也猶君之所私者但是一人耳其賢不異衆人也人心不常於一君亦猶馬形不専於一色故君之愛己則附之君之疏己則叛之何可私其親黨而疏於天下乎公孫龍子白馬論注故明主有私人以金石珠玉無私人以官職事業是何也曰本不利於所私也荀子君道民無私則天下為一家而無私耕私織共寒其寒共飢其飢故如有子十人不加一飯有子一人不損一飯尉繚子治本陰陽之和不長一類甘露時雨不私一物萬民之主不阿一人伯禽將行請所以治魯周公曰利而弗利也荆人有遺弓者而不肯索曰荆人遺之荆人得之又何索焉孔子聞之曰去其荆而可矣老𣆀聞之曰去其人而可矣故老𣆀則至公矣吕氏春秋貴公人之少也愚其長也智故智而用私不若愚而用公日醉而飾服私利而立公貪戾而求王舜弗能為吕氏春秋貴公堯有子十人不與其子而授舜舜有其子九人不與其子而授禹至公也晉平公問於祁黃羊曰南陽無令其誰可而為之祁黃羊對曰解狐可平公曰解狐非子之讎邪對曰君問可非問臣之讎也平公曰善遂用之國人稱善焉居有間平公又問祁黃羊曰國無尉其誰可而為之對曰午可平公曰午非子之子邪對曰君問可非問臣之子也平公曰善又遂用之國人稱善焉孔子聞之曰善哉祁黃羊之論也外舉不避讎內舉不避子祁黃羊可謂公矣呂氏春秋去私庖人調和而弗敢食故可以為庖若使庖人調和而食之則不可以為庖矣王伯之君亦然誅暴而不私以封天下之賢者故可以為王伯若使王伯之君誅暴而私之則亦不可以為王伯矣呂氏春秋去私智不公則福日衰災日隆以日倪而西望知之呂氏春秋序意夏不衣裘非愛裘也暖有餘也冬不用􅀢非愛􅀢也清有餘也聖人之不為私也非愛貴也節乎己也節己雖貪汙之心猶若止又況乎聖人呂氏春秋有度入者有受而無取出者有授而無豫因春而生因秋而殺所生者弗德所殺者非怨則幾於道也淮南子詮言訓喜怒威德之不可以不直處而發也如寒暑冬夏之不可不當其時而出也春秋繁露威德所生章善為吏者樹德不善為吏者樹怨公行之也其子羔之謂歟説苑至公鏡以精明美惡自服衡平無私輕重自得説苑談叢次四鳥託巢于叢人寄命于公太玄經第四昆次七蓋偏不覆晏雨不救測曰蓋偏不覆德不均也太玄經第四昆次四宰割平平測曰宰割平平能有成也太玄經第六割春風朝煦蕭艾蒙其溫秋霜宵墜芝蕙被其涼是故威以齊物為肅德以普濟為𢎞文選陸機演連珠至道均被萬物取而咸足淳化普洽百姓用而不匱猶靈耀覯而品物納光清風流而百籟含響也文選陸機演連珠注以義事主不私其己以仁接人不謀其欲火佚焚家家不罪火食過傷人人不罪食以其積之於仁義無私害也伊尹放太甲太甲無怨心管仲黜伯氏伯氏無怨言以其積之於公正無私惡也太平御覽人事部公平取天下若逐鹿得其鹿天下共其肉太平御覽獸部鹿貴因凡溝必因水執防必因地執善溝者水潄之善防者水淫之周禮考工記故曰為髙必因丘陵為下必因川澤為政不因先王之道可謂智乎孟子離婁上所惡於智者為其鑿也如智者若禹之行水也則無惡於智矣禹之行水也行其所無事也如智者亦行其所無事則智亦大矣孟子離婁上夫膠漆至粘也而不能合逺鴻毛至輕也而不能自舉夫飄於清風則橫行四海故事有簡而功成者因也戰國䇿趙孝成王王者隨天譬猶自春徂夏改青服絳者也後漢書郎顗列傳凡為治者動不逆天機作不破地德昔后稷之播百穀不墾磐石禹決江河不逆流勢魏書私署涼州牧張實子駿傳天地之生萬物聖人之馭天下莫不順其性而暢之故黃帝服牛乘馬因生性也禹鑿龍門決洪河因水之勢也后稷之播殖百穀因地之氣也湯武之滅夏商因人之欲也是以有因成無因敗晉書苻堅妾張氏傳取天下者若逐野獸而天下皆有分肉之心若同舟而濟濟則皆同其利敗則皆同其害然則皆有以啓之無有閉之也太公六韜發啓治人如治水潦養人如養六畜用人如用草木管子七法心不為九竅九竅治君不為五官五官治為善者君豫之賞為非者君豫之罰君因其所以來因而豫之則不勞矣管子九守以家為鄉鄉不可為也以鄉為國國不可為也以國為天下天下不可為也以家為家以鄉為鄉以國為國以天下為天下管子牧民天下之物無貴無賤因其所貴而貴之物無不貴因其所賤而賤之物無不賤故不尚賢者言不放魚於木不沈鳥於淵文子自然古之瀆水者因水之流也生稼者因地之宜也征伐者因民之欲也能因則無敵於天下矣文子自然田不因地形不能成榖為化不因民不能成俗鶡冠子天則圓者之轉非能轉而轉不得不轉也方者之止非能止而止不得不止也因圓之自轉使不得止因方之自止使不得轉何苦物之失分故因賢者之有用使不得不用因愚者之無用使不得用用與不用皆非我用因彼所用與不可用而自得其用奚患物之亂乎尹文子大道上若馭撲馬若養赤子若食餧人故因其懼也而改其過因其憂也而辦其故因其喜也而入其道因其怒也而入其怨曲得所謂焉荀子臣道望敵在前因其所長而用之敵白者堊之赤者赭之尉繚子武議管子得於魯魯束縛而檻之使役人載而送之齊共謳歌而引管子恐魯之止而殺己也欲速至齊因謂役人曰我為汝唱汝為我和其所唱適宜走役人不倦而取道甚速管子可謂能因矣役人得其所欲己亦得其所欲以此術也呂氏春秋順説奚仲作車蒼頡作書后稷作稼臯陶作刑昆吾作陶夏鯀作城此六人者所作當矣然而非主道者故曰作者憂因者平呂氏春秋君守夫審天者察列星而知四時因也推歷者視月行而知晦朔因也禹之裸國裸入衣出因也墨子見荆王錦衣吹笙因也孔子道彌子瑕見釐夫人因也湯武遭亂世臨苦民揚其義成其功因也故因則功専則拙因者無敵呂氏春秋貴因三代所寶莫如因因則無敵禹通三江五湖決伊闕溝回陸注之東海因水之力也舜一徙成邑再徙成都三徙成國而堯授之禪位因人之心也湯武以千乘制夏商因民之欲也如秦者立而至有車也適越者坐而至有舟也秦越逺塗也竫立安坐而至者因其械也呂氏春秋貴因十里之間而耳不能聞帷牆之外而目不能見三畝之宮而心不能知其以人至開梧南撫多􅱋西服夀靡北懷儋耳若之何哉故至智棄智至仁忘仁至德不德無唱有和無先有隨古之王者其所為少其所因多因者君術也為者臣道也為則擾矣因則靜矣因冬為寒因夏為暑君奚事哉呂氏春秋任數水用舟陸用車塗用輴沙用鳩山用樏因其勢也勢重者其令行位尊者其教受威立者其姦止此畜人之道也呂氏春秋慎勢古者多有天下而亡者矣其民不為用也用民之論不可不熟劍不徒斷車不自行或使之也夫種麥而得麥種稷而得稷人不怪也用民亦有種不審其種而祁民之用惑莫大焉湯武因夏商之民也得所以用之也管商亦因齊秦之民也得所以用之也民之用也有故得其故民無所不用用民有紀有綱一引其紀萬目皆起一引其綱萬目皆張呂氏春秋用民木處榛巢水居窟穴禽獸有芄人民有室陸處宜牛馬舟行宜多水胸奴出穢裘於越生葛絺各主所急以備燥溼各因所處以御寒暑並得其宜物便其所由此觀之萬物固以自然聖人又何事焉淮南子原道訓九疑之南陸事寡而水事衆於是民人被髮文身以像鱗蟲短綣不褲以便涉遊短袂攘卷以便刺舟因之也鴈門之北狄不榖食賤長貴壯俗尚氣力人不弛弓馬不解勒便之也故禹之裸國解衣而入衣帶而出因之也淮南子原道訓離朱之明察針末於百步之外不能見淵中之魚師曠之聰合八風之調而不能聽十里之外故任一人之能不足以治三畝之宅也修道理之數因天地之自然則六合不足均也是故禹之決瀆也因水以為師神農之播榖也因苗以為教淮南子原道訓是故入其國者從其俗入其家者避其諱不犯禁而入不忤逆而進雖之夷狄徒倮之國結軌乎逺方之外而無所困矣淮南子齊俗訓三代之所道者因也故禹決江河因水也后稷播種樹榖因地也湯武平暴亂因時也故天下可得而不可取也霸王可受而不可求也在智則人與之訟在力則人與之爭未有使人無智者有使人不能用其智於己者也未有使人無力者有使人不能施其力於己者也淮南子詮言訓因髙而為臺就下而為池各就其勢不敢更為淮南子説山訓行逺者假於車濟江海者因於舟公輸子能因人主之材木以搆宫室而不能自為専室狹廬材不足也歐冶能因國君以為金爐大鐘而不能自為一鼎盤材無其用也君子因人主之正朝以和百姓潤衆庶而不能自饒其家勢不便也鹽鐵論貧富聖人之為天下興利也其猶春氣之生草也各因其生小大而量其多少其為天下除害也若川瀆之㵼於海也各順其勢傾側而制於南北故異孔而同歸殊施而鈞德其趣於興利除害一也春秋繁露考功名埏埴而為器窬木而為舟鑠鐵而為刃鑄金而為鐘因其可也駕馬服牛令雞司夜令狗守門因其然也民有好色之性故有大婚之禮有飲食之性故有大饗之誼有喜樂之性故有鐘鼓管絃之音有悲哀之性故有衰絰哭踊之節淮南子泰族訓禹鑿龍門闢伊闕決江濬河東注之海因水之流也后稷墾草發災糞土樹榖使五種各得其宜因地之勢也湯武革車三百乘甲卒三千人討暴亂制夏商因民之欲也故能因則無敵於天下矣淮南子泰族訓若夫以火熯井以淮灌山此用已而背自然故謂之有為若夫水之用舟沙之用鳩泥之用輴山之用蔂夏瀆而冬陂因髙為田因下為池此非吾所謂為之淮南子修務訓善舉事者若乘舟而悲訶一人唱而千人和淮南子説林訓射者因勢治者因法鹽鐵論大論欲粟者務時欲治者因世鹽鐵論遵道水宜舟陸地宜車沙地宜肆泥地宜楯草野宜窮廬物各因其宜故不須用賢淮南子齊俗訓解夫民物之所以卑賤者不能因任故也是以任賤者貴因卑者尊此必然之符也郭子注莊在宥吾一人之所聞不如衆技多故因衆則寧若不因衆則衆之千萬皆我敵也郭子注莊在宥然迷者自思復厲者自思善故我無為而天下化郭子注莊天地因衆所欲亡而亡之雖王紂可去也不因衆而獨用之雖盜跖不可御也郭子注莊盜跖陶唐氏制彤車乘白馬有虞氏因彤車而制鸞車夏后氏因鸞車而制鈎車商因鈎車而制大路玉海車服車輿臨深決水不用功力而水可竭也循掘決衝而經可通也黃帝素問靈樞經逆順肥瘦生因春長因夏收因秋藏因冬失常則天地四塞黃帝素問內經陰陽離合論病之發也如火之熱如風雨不可當也故經言曰方其盛時必毁因其衰也事必大昌此之謂也黃帝素問內經瘧論因節而折循理而割道德經指歸卷七貴信其於信也如四時春秋冬夏其博有萬民也如飢而食如渴而飲下土之人信之夫暑熱凍寒逺若邇非道邇也及其明德也大戴禮記主言地不易其則故萬物生焉主不易其則故百姓安焉管子形勢解四時之行信必而著明聖人法之以事萬民故不失時功管子版法解政令已陳雖覩利敗不欺其民約結己定雖覩利敗不欺其與荀子王霸篇小信成則大信立故明主積於信賞罰不信則禁令不行説在文公之攻原與箕鄭救餓也是以吳起須故人而食文侯會虞人而獵故明主表信如曾子殺彘也患在尊厲王擊警鼓與李悝謾兩和也韓非子外儲説左楚厲王有警為鼓以與百姓為戍飲酒醉過而擊之也民大驚使人止曰吾醉而與左右戲過擊之也民皆罷居數月有警擊鼓而民不赴乃更令明號而民信之韓非子外儲説左李悝警其兩和曰謹警敵人旦暮且至擊汝如是者再三而敵不至兩和懈怠不信李悝居數月秦人來襲之至幾奪其軍此不信患也韓非子外儲説左焚林而田偷多獸後必無獸以詐遇民偷取一時後必無復韓非子難一天行不信不能成歲地行不信草木不大春之德風風不信其華不盛華不盛則果實不生夏之德暑暑不信其土不肥土不肥則長遂不精秋之德雨雨不信其榖不堅榖不堅則五榖不成冬之德寒寒不信其地不剛地不剛則凍間不開呂氏春秋貴信文王晝卧夢人登城而呼己曰我東北陬之稿骨也速以王禮葬我文王曰諾覺召吏視之信有焉文王曰速以人君葬之吏曰此無主矣請以主大夫文王曰吾夢中已許之矣奈何其倍之也士民聞之曰我君不以夢之故不倍稿骨況於生人乎於是下信其上賈子諭誠夢中許人覺且不背其信陛下已諾若日出之灼灼賈子胸奴譬如地之所種皆以時生不失其節亦不違錯應時滋長普超三昧經卷二貴一士之二三猶喪妃耦而況霸主霸主將德是以而二三之其何以長有諸侯乎左傳成公八年聖人之化世也其解在水故水一則人心正水清則民心易一則欲不汚民心易則行無邪是以聖人之治於世也不人告也不戶説也其樞在水管子水地聽羣衆人議以治國國危無日矣何以知其然也老𣆀貴柔孔子貴仁墨翟貴廉關尹貴清子列子貴虛陳駢貴齊陽生貴己孫臏貴勢王廖貴先兒良貴後有金鼓所以一耳必同法令所以一心也智者不得巧愚者不得拙所以一衆也勇者不得先懼者不得後所以一力也故一則治異則亂一則安異則危呂氏春秋不二目不失其明而見白黑之殊耳不失其聽而聞清濁之聲王者執一而為萬物正軍必有將所以一之也國必有君所以一之也天下必有天子所以一之也天子必執一所以摶之也一則治兩則亂今御驪馬者使四人人操一䇿則不可以出於門閭者不一也呂氏春秋執一蚓無筋骨之強爪牙之利上食晞堁下飲黃泉用心一也淮南子説山訓尸鳩之所以養七子者一心也君子之所以理萬物者一儀也以一儀理物天心也説苑反質言皇天不純一其施則萬物大傷人君不純一其政則百姓震動以觸罪也王逸注楚辭九章當知師子獸王一德最勝謂無二心如殺大象盡其勢力殺餘小獸盡力亦然我王亦爾不畏大事不輕小事大方廣佛華嚴經卷十二譬如師子飢餓所逼以大勢力殺害大象若殺野干及諸小獸所施勢力與彼殺象一無所異蘇婆呼童子經卷中貴密君不密則失臣臣不密則失身幾事不密則害成易繫辭上傳事若不密人則乘此機危而害之猶若財之不密盜則乘此機危而竊之周易正義繫辭上天地之化在髙與深聖人之制道在隱與匿鬼谷子謀篇髙山仰之可極深淵度之可測神明之位術正靜其莫之極歟鬼谷子術言唐溪公謂昭侯曰今有千金之玉巵通而無當可以盛水乎昭侯曰不可有瓦器而不漏可以盛酒乎昭侯曰可對曰夫瓦器至賤也不漏可以盛酒雖有千金之玉巵至貴而無當漏不可盛水則人孰注漿哉今為人主而漏其羣臣之語是猶無當之玉巵也雖有聖智莫盡其術為其漏也韓非子外儲説左明主之行制也天其用人也鬼天則不非鬼則不困韓非子八經故以一得十者下道也以十得一者上道也明主兼行上下故姦無所失韓非子八經宓子賤為單父宰辭於夫子夫子曰毋迎而距也毋望而許也許之則失守距之則閉塞譬如髙山深淵仰之不可及度之不可測也説苑政理次三堅不凌或泄其中測曰堅不凌不能持齊也太玄經第六堂屋漏在上知者在下漏大下見之著漏小下見之微王充論衡答佞篇密者天地之際會成敗之機要故陰陽不密則寒暑不能以成歲棟宇不密則九層不可以庇身意林成敗志霧之盛須臾而訖暴雨之盛不過終日是以人君喜怒不見於容太平御覽天部霧法鑒七世之廟可以觀德萬夫之長可以觀政書咸有一德夫明鏡所以察形往古所以知今人主不務襲迹於其所以安存而忽怠所以危亡未有異於却走而求及前人也孔子家語觀周坐則見堯於牆食則覩堯於羮後漢書李固傳不式古訓而好是佞辨不遵王路而覆車是踐晉書潘嶽傳車戒前傾人師先覺北齊書魏收傳古者有語曰君子不鏡於水而鏡於人鏡於水見面之容鏡於人則知吉與凶今以攻戰為利則蓋嘗鑒之於智伯之事乎此其謂不吉而凶既可得而知矣墨子非攻中鄙諺曰不習為吏而視已事又曰前車覆而後車戒夫殷周之所以長久者其已事可知也然而不能從者是不法聖智也秦之亟絶者其軌迹可見也然而不避是後車又覆也賈子保傅夫照鏡見眸子微察秋毫明照晦冥淮南子説山訓且衛君之來也諸侯皆以為蓍龜兆今朝於吳而不利則皆移心於晉矣淮南子人間訓商德之衰不鑒於湯禹也周秦之弊不鑒於民下也側辨垢顔不鑒於明鏡也故君子惟鑒之務申鑒雜言上吳之杪季殊代同疾知前失之於彼不能改絃於此鑒亂亡之未逺而躡傾車之前軌覩枳首之爭莓而忘同身之禍笑蟣虱之晏安不覺事異而患等見競濟之舟沈而不知殊塗而溺均也抱朴子外篇吳失富既與地乎侔訾貴正與天乎比崇齊桓曽不足使扶轂楚嚴未足以為驂乘狹三王之厄僻矯髙舉而大興歷五帝之寥廓涉三皇之登閎文選羽獵賦狹三王之趢趗軼五帝之長驅踵三皇之遐武誰謂駕遲而不能屬文選東京賦前事之不忘後代之元龜也文選劉琨勸進表覆車之軌無或重迹文選張載劍閣銘觀五代之存亡而不用其長䇿覩前車之傾覆而不改其轍迹文選曹元首六代論以三王禮法為局小狹陋過五帝而逺馳則繼三皇之迹也李善注文選東京賦以鑑自照者見形容以人自照者見吉凶補文選武王鏡銘齊王聘田巴先生而將問政焉對曰政在正身正身之本在於羣臣王召臣臣改制鬋飾問於妾奚若妾愛臣諛臣曰佼臣臨淄水而觀然後自知醜惡也今齊之臣諛王者衆王能臨淄水見己之惡過而自改斯齊國治矣藝文類聚人部鑒誡帝者得其根核王者得其英華霸者得其附枝故帝道不行不能王王道不行不能霸霸道不行不能守其身藝文類聚帝王部總載帝王武王伐殷得二大夫而問之曰殷國將亡亦有妖乎一人曰殷國常雨血雨灰石小者如雞子大者如箕嘗六月而雨雪深尺餘武王曰大哉妖也殷人對曰非殷國之大妖也殷國大妖二十六章太平御覽皇王部帝紂居堯舜之位而不行唐虞之政者猶反衣狐白步牽騄耳太平御覽皇王部敘皇王下如彼在泉臨深是懼如彼覆車望塗改步玉海官制儲官喻林卷六十四
