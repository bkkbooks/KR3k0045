body:
  text: 喻林卷九十二明徐元太撰學業門二精專瞽矇也以為樂官者目無所見於聲音審也鄭氏箋詩有瞽端衣𤣥裳冕而乘路者志不在於食葷斬衰蕳屨杖而歠粥者志不在於飲食大戴禮記哀公問五義立則見其參於前也在輿則見其倚於衡也論語衛靈公今夫奕之為數小數也不專心致志則不得也奕秋通國之善奕者也使奕秋誨二人奕其一人專心致志惟奕秋之為聼一人雖聼之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣為是其智弗若與曰非然也孟子告子上二事敗業多疾我力如彼遵衢則罔所極二志靡成聿勞我心如彼兼聼則溷於音後漢書文苑傳詹何以獨繭絲為綸芒鍼為鈎荆條為竿剖粒為餌引盈車之魚於百仞之淵汨流之中綸不絶鈎不伸竿不撓楚王聞而異之召問其故詹何曰臣聞先大夫之言蒲且子之弋也弱弓纖繳乘風振之連雙鶬於青雲之際用心專動手均也臣因其事放而學釣五年始盡其道當臣之臨河持竿心無雜慮惟魚之念投綸沈鈎手無輕重物莫能亂魚見臣之鈎餌猶沈埃聚沫吞之不疑所以能以弱制彊以輕制重也大王治國誠能若此則天下可運於一握將亦奚事哉列子湯問仲尼適楚見痀僂者承蜩猶掇之也仲尼曰子巧乎有道邪曰我有道也五六月累丸二而不墜則失者錙銖累三而不墜則失者十一累五而不墜猶掇之也吾處身也若厥株枸吾執臂也若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為而不得孔子顧謂弟子曰用志不分乃凝於神其痀僂丈人之謂乎莊子逹生大馬之捶鉤者年八十矣而不失豪芒大馬曰子巧與有道與曰臣有守也臣之年二十而好捶鉤於物無視也非鉤無察也是用之者假不用者也以長得其用而况乎無不用者乎物孰不資焉莊子知北遊好書者衆矣而倉頡獨傳者一也好稼者衆矣而后稷獨傳者一也好樂者衆矣而䕫獨傳者一也好義者衆矣而舜獨傳者一也倕作弓浮游作矢而羿精於射奚仲作車乘杜作乘馬而造父精於御自古及今未嘗有兩而能精者也曾子曰是當作視其庭可以搏鼠惡能與我歌矣荀子解蔽心不使焉則白黒在前而目不見雷鼓在側而耳不聞况於使者乎荀子解蔽螾無爪牙之利筋骨之彊上食埃土下飲黄泉用心一也蟹六跪而二螯非蛇蟺之穴無所寄託者用心躁也是故無㝠㝠之志者無昭昭之明無惽惽之事者無赫赫之功荀子勸學意委曲蛇能屈伸故實意法螣蛇也鬼谷子本經隂符註哀公問孔子曰吾聞䕫一足信乎曰䕫人也何故一足彼其無他異而獨通於聲堯曰䕫一而足矣使為樂正故君子曰䕫有一足非一足也韓非子外儲説左工人數變業則失其功作者數揺徙則亡其功一人之作日亡半日十日則亡五人之功矣萬人之作日亡半日十日則亡五萬人之功矣然則數變業者其人彌衆其虧彌大矣韓非子解老目以精明耳以主聼口以别味鼻以聞芳手以之持足以之行各受一性不得兩兼兼則心惑陸子懐慮造父始習於大豆蠭門始習於甘蠅御大豆射甘蠅而不徙人以為性者也吕氏春秋聼言財多者惑於所守學多者惑於所聞河上公註老子益謙道雖近不行不至事雖小不為不成每自多者出人不逺矣夫巧弓在此手也傳角被筋膠漆之和即可以為萬乘之寳也及其被手而賈不數銖人同材鈞而貴賤相萬者盡心致志也韓詩外傳蚯蚓内無筋骨之强外無爪牙之利然下飲黄泉上墾晞土所以然者何也用心一也説苑雜言騰蛇遊於霧露乘於風雨而行非千里不止然則暮託宿於鰌鱣之穴所以然者何也用心不一也説苑雜言目察秋毫之末者視不能見太山耳聼清濁之調者不聞雷霆之聲何也唯其意有所移也説苑雜言傳曰伯樂學相馬顧玩所見無非馬者宋之庖丁學解牛三年不見生牛所見皆死牛也二者用精至矣思念存想自見異物也王充論衡訂鬼篇志有所存顧不見泰山思有所至有身不暇狥也王充論衡書解篇夫能量弓矢之勢逺近之分則入物之與不入在心手之所銓不患所差跌今設令至拙者闇射箭之所至要當其極當其極也則豪分不復進闇其極則随逺近而制其深淺矣張湛註列子仲尼瞽無目而耳不可以察專於聼也鼈無耳而目不可以聞專於視也以瞽鼈之㣲而聼察聰明審者用心一也劉子專學離婁察秋毫之末不聞雷霆之聲季子聼清角之韻不見嵩岱之形視不闗耳而耳不見聼不闗目而目不聞者何也心溺秋毫意入清角故也劉子專學奕秋通國之善奕也當奕之思有吹笙過者乍而聼之則奕敗矣非奕道㬥深情有蹔闇笙猾之也𨽻首天下之善筭也有鳴鴻過者彎弧擬之將發未發之間問以三五則不知也非三五難筭意有㬥昧鴻亂之也奕秋之奕𨽻首之筭窮微盡數非有差也然而心在笙鴻而奕敗筭撓者是心不專一逰情外務也劉子專學是以心駐於目必忘其耳則聼不聞心駐於耳必遺其目則視不見也使左手畫方右手畫圓令一時俱成雖執規矩之心㢠剟劂之手而不能者由心不兩用則手不並運也劉子專學夫蟬之難取而粘之如掇卷耳易採而不盈傾筐專與不專也劉子專學由基李廣奮精誠於末伎感獸而開石豈况乃能推至精耽身於大道之中乎李善註文選幽通賦逐兔之犬終朝尋兎不失其迹雖見麋鹿不暇顧也意林物理論鴻鵠在上鞟弩以待若發善否問二五弗知非二五難計也欲鴻之心亂也藝文類聚巧藝部射佛書云如入薝蔔林中惟聞薝蔔花香不聞它香埤雅品物門薝蔔豫北二山尚有移河中一洲亦可為精誠必至霜塵下意氣所感金石離初學記道釋部佛註向天穿針而不見天何者不輕天意有所在耳太平御覽資産部針董仲舒三年不闚園嘗乗馬不覺牝牡朱買臣貧賤之時孽孽修藝不知雨之流粟志在經傳也太平御覽百榖部粟俯而擇虱不暇見地仰而觀鐵不暇見天天地至大而不見者鋭精於鐵虱也太平御覽蟲豸部蚤視秋毫者不見泰山聼噍嘹者不聞雷霆隂符經註瞽者善聼神不離於耳聾者善視心不離於目其為聼也神則專耳其為視也心則專目耳之與目逓為用天機經倍譬如有人遇中毒箭為苦所切更無餘想但作是念我於何時得遇良醫為㧞此箭得免斯苦波羅蜜多經三百九十八蚓弱質而飲泉蟹壯容而寄穴驊鑣怠矣駑駕先之波羅蜜多經五百九十卷序譬如有人尋水而行影入水中形影相逐不相捨離蘓婆呼童子經卷上佛言諸沙門行道當如牛負行深泥中疲極不敢左右顧趣欲離泥以自蘓息沙門視情欲甚於彼泥直心念道可免衆苦佛説四十二章經尺一譬如垣墻欲倒從邊拄之舍欲傾壊亦復拄之是為精進那先比丘經卷上心堅强者志能如是則以指𤓰壊於雪山以蓮華根鑽穿金山則以鋸斷須彌寳山修行道地經勸意品如人擎油鉢不動無所棄妙慧意如海專心擎油器若人欲學道執心當如是脩行道地經勸意品譬如飛鳥暫下輙逝法句經羅漢品若有精進勇猛心如是轉健得道疾譬如小火多益薪風吹轉熾無滅時三昧法門經卷下譬如人欲逺行初欲去時是名為欲發行不住是為精進能自勸勵不令行事稽留是為不放逸大智度論卷十五如圍中有鹿既著毒箭一向求脱更無他念大智度論三十一散亂之心譬如風中燈燈雖有光明不能照物大智度論三十三譬如鑽燧求火一心勤著不休不息乃可得火大智度論卷四十八如人毒箭在身更無餘念一者苦痛急二者毒不疾出則遍滿身中而失命大智度論卷九十七是以金石克諧泰山不能呈其髙鴻鵠方集奕秋不能傳其㫖𢎞明集宗答何書難白黑論般陀比丘暗鈍然能變形第一者良由佛教使誦掃箒得箒忘掃得掃忘箒六年之中專心誦此意遂解悟而自惟曰箒者篲掃者除篲者即喻八正道糞者喻三毒垢也以八正道篲掃三毒垢所謂掃箒我者正謂此耶深思此理心即開解法苑珠林卷二十五不息天行健君子以自彊不息易乾水洊至習坎君子以常德行習敎事易坎題音第彼脊令音零載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生詩小雅小宛蛾子時術之其此之謂乎禮記學記騏驥一躒不能千里駑馬無極功在不舍大戴禮記勸學雖有天下易生之物也一日㬥之十日寒之未有能生者也吾見亦罕矣吾退而寒之者至矣吾如有萌焉何哉孟子告子上君子遵道而行半塗而廢吾弗能已矣中庸此士所以日夜孶孶敏行而不敢怠也辟若䳭鴒飛且鳴矣前漢書東方朔傳千變萬化譬若懸河寸隂尺日不棄光景隋書李得林傳嬰聞之為者常成行者常至嬰非有異於人也常為而不置常行而不休者故難及也晏子春秋雜下騏驥一躍不能十歩駑馬十駕功在不舍鍥而舍之朽木不折鍥而不舍金石可鏤荀子勸學篇學惡乎始惡乎終曰其數則始乎誦經終乎讀禮其義則始乎為士終乎為聖人眞積力久則入學至乎沒而後止也故學數有終若其義則不可湏臾舍也為之人也舍之禽獸也荀子勸學篇良農不為水旱不耕良賈不為折閲不市士君子不為貧窮怠乎道荀子修身芷蘭生於深林非以無人而不芳君子之學非為通也為窮而不困憂而意不衰也荀子宥坐甯越中牟之鄙人也苦耕稼之勞謂其友曰何為而可以免此苦也其友曰莫如學學三十歳則可以逹矣甯越曰請以十歳人將休吾將不敢休人將卧吾將不敢卧十五歳而周威公師之矢之速矣而不過二里止也歩之遲也而百舍不止也今以甯越之材而久不止其為諸侯師豈不宜哉吕氏春秋博志割而舍之鏌邪不斷肉執而不釋馬氂截玉淮南子説山訓聖人無止無以歳賢昔日俞昨也淮南子説山訓矢疾不過二里也歩之遲百舍不休千里可致淮南子説林訓跬歩不休跛鼈千里累積不輟可成丘埠淮南子説林訓少而好學如日出之陽壯而好學如日中之光老而好學如炳燭之明炳燭之明孰與昧行乎説苑建本百川朝海泛流不止路雖遼逺無不到者焦氏易林剥之大過百川學海而至於海丘陵學山而不至於山是故惡夫畫也揚子學行仰天而天不惓俯地而地不怠惓不天怠不地惓怠而能乎其事者古今未諸太𤣥經太𤣥文君子之於學也其不懈猶上天之動猶日月之行終身亹亹沒而後已徐幹中論治學速悟時習者驥騄之脚也遲解晩覺者鶉鵲之翼也彼雖尋飛絶景止而不行則歩武不過焉此雖咫尺以進徃而不輟則山澤可越焉明暗之學其猶兹乎抱朴子外篇朂學運行潦而勿輟必混流乎滄海矣崇一簣而弗休必鈞髙乎峻極矣抱朴子外篇朂學斵削刻畫之薄伎射御騎乘之易事猶湏慣習然後能善抱朴子外篇朂學言人修行道德有若為山雖於平地始覆一簣之土而作不止可以得成前漢書註王莽傳天子勤耘以牧一國大夫勤耘以收世禄君子勤耘以顯令徳夫農者始於種終於穫澤既時矣苖既美矣棄而不耘則改為荒疇蓋豐年者期於必收譬修道者亦期於沒世補文選曹植籍田記海不辭水故能成大山不辭土故能成髙主不厭人故能成衆士不厭學故能成聖意林管子樂羊子逺尋師學一年來歸妻乃引刀趣機而言曰此織生於蠶繭成於機杼一絲而累以至於寸累寸不已遂成丈匹今若斷斯織也則捐失成功稽廢時月夫子積學當日知其所亡以就懿徳若中道而歸何異斷斯織也事文類聚賢妻譬如磨鏡日日常執不離心胸海空智藏經持誡品學道甚苦如負重登山可厭而止虚皇四十九章道如晨暉暉徳同下流無日不新無時不歸玉清經入節品譬如依酪瓶鑚人功動轉不已得有酥出大寳積經卷五十六日月常廵歴不厭於四方大寳積經卷九十五譬如大海一人斗量經歴劫數尚可窮底得其妙寳人有至心精進求道不止會當尅果何願不得無量壽經卷上又如良醫於諸醫方經書秘術不應懈怠以修醫法佛説淨業障經賢十一求第一襌甚亦難致其餘三禪稍前轉易譬如學射遥立大准習久乃中習不休息工則析毛修行道地經神足品猶如鑛鐵數入百鍊之鑪柔可為剛偽可為真猶如大海日夜沸動濁滓下沈變成寳珍出矅經六戒品譬如馬寳雖到至處去心不息至死不已大智度論卷二十六譬如犢子雖大善母美乳飲猶不止大智度論卷八十九汝等當勤精進譬如小水常流則能穿石若行者之心數數懈廢譬如鑚木未熱而息雖欲火火難可得遺敎經論離十二漸進考工記云匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之畎田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮是畎遂溝洫澮皆通水之道也以小注大故從畎遂溝洫乃以入澮澮入於川川入於海是畎内之水亦入海也尚書正義益稷纁者三入而成又再染以黒則為緅又再染以黑則為緇𤣥色在緅緇之間其六入者是染𤣥纁之法也尚書正義禹貢駒既未曾駕車若忽駕之必當驚奔今以大馬牽車於前而繫駒於後使此駒日日見車之行其駒慣習而後駕之不復驚也言學者亦湏先敎小事操縵之屬然後乃示其業則道乃易成也禮記正義學記人將學琴瑟若不先學調弦雜弄則手指不便手指不便則不能安正其弦先學雜弄然後音曲乃成也禮記正義學記若火之始然泉之始逹孟子公孫丑上流水之為物也不盈科不行君子之志於道也不成章不達孟子盡心上君子之道辟如行逺必自邇辟如登髙必自卑中庸一染謂之縓紆戀切再染謂之赬敇呈切三染謂之纁爾雅必欲昇堂覩奥寧可汨其先後周書熊安生儒林傳或問進曰水或曰為其不舍晝夜歟曰有是哉滿而後漸者其水乎或問鴻漸曰非其往不往非其居不居漸猶水乎請問木漸曰止於下而漸於上者其木也哉亦猶水而已矣揚子學行篇且夫物之生長無卒成㬥起皆有浸漸王充論衡道虚篇箕裘皆須柔屈補接而後成噐為弓冶者調筋角和金鐵亦然故學者必先攻其所易然後能成其所難張湛註列湯問易有漸卦道有漸門人之修眞達性不能頓悟必須漸而進之安而行之天隠子漸門山澗至柔石為之穿蝎蟲至弱木為之弊然而能以㣲脆之形䧟堅剛之體豈非漸之致乎藝文類聚雜文部談講書春秋運斗樞曰粟五變而以陽化生為苖秀為禾三變而粲謂之粟四變入臼米出甲五變而烝飯可食初學記服食部飯槐之生也入季春五日而兎目十目而鼠耳更旬而始規二旬而葉成困學紀聞卷十諸子取類引絲使不斷絶不勤不勞如幽泉之潛澍玉清經幽棲品不緩不急不麤不細猶如嬰兒飲其母乳綿綿㣲吸玉清經幽棲品譬如大樹由有根莖便有枝葉由有枝葉便有花果由有花果復生大樹波羅蜜多經五百九十譬如日初出時其大光明先照鐵圍大鐵圍山須彌山王乃照其餘大寳積經十四譬如殿堂有四梯隥若言不由初第一隥至四隥者無有是處大方等大集經二十三無力飲池河詎能吞大海不習二乘法何能學大乗大集地藏十輪經卷六初發心如種種子第二行發心如芽生增長第三不退發心如莖葉華果初始成就第四一生補處發心如果等有用文殊問菩提經論初發心如車匠集材智第二行發心如斫治材木淨智第三不退發心如安施材木智第四一生補處發心如車成運載智文殊問菩提經論初發心如取藥草方便第二行發心如分别藥草方便第三不退發心如病服藥方便第四一生補處發心如病得差方便文殊問菩提經論初發心如月始生第二行發心如月五日第三不退發心如月十日第四一生補處發心如月十四日如來智慧如月十五日文殊問菩提經論譬如火燒木漸次而轉移此木既已燒復更燒餘木大乘蜜嚴經卷下譬如大海漸次轉深若大海水初便頓深諸求寳者無能得入以漸漸深乃至無等故成大海華手經卷七譬如從華乃成果實華如菩薩果喻菩提蘓婆呼童子經卷中譬如重樓四級次第不由初級至二級者無有是處不由二級至於三級不由三級至四級者亦無是處菩薩善戒經一賢十如濤金者積聚沙土置於槽中然後以水灌之麤土煩惱剛石堅塊随水而去猶有麤沙纒結復以水灌麤沙随水流出然後生金猶為細沙黒土之所纒結復以水灌細沙黒土随水流出然後眞金純淨無雜猶有似金㣲垢然後金師置於爐中增火鼔韝令其融液垢穢悉除然其生金猶故不輕不輭光明不發屈伸則斷彼鍊金師復置爐中增火鼓韝轉側鑄鍊然後生金輕輭光澤屈伸不斷随意所作釵璫鐶釧諸莊嚴具雜阿舍經卷四十七如山頂上天雨霖霪先溪澗滿溪澗滿已小溝瀆滿小溝瀆滿已大溝瀆滿大溝滿已小河滿小河滿已大河滿大河滿已大海滿大海如是漸次方滿聖道大海亦復如是達磨法藴足論預流支品二譬如㹀牛食蒭草出湩湩出酪酪出酥酥成醍醐持心當如醍醐佛般泥洹經卷上如天下水小溪水流入大溪大溪水流入江江流入海佛般泥洹經卷上佛言夫人為道猶所鍜鐵漸深垂去垢成器必好學道以漸深去心垢精進就道佛説四十二章經尺一譬如種樹稍稍生芽後生莖節枝葉華實漸行如是修行道地經菩薩品譬如彼月初生之時若小羊角日月稍大遂至成滿光明普照衆星獨耀修行道地經菩薩品譬如採金沙先除麤石沙然後除細石沙次第得細金沙三昧法門經卷上往昔之世有富愚人癡無所知到餘富家見三重樓髙廣嚴麗軒厰䟱朗心生渴仰即作是念我有財錢不减於彼云何頃來而不造作如是之樓即喚木匠而問言曰解作彼家端嚴舍不木匠答言是我所作即便語言今可為我造樓如彼是時木匠即便經地壘塹作樓愚人復言我不欲下二重之屋先可為我作最上屋木匠答言無有是事何有不作最下重屋而得造彼第二之屋不造第二云何得造第三重屋愚人固言我今不用下二重屋必可為我作最上者百喻經卷上當作事時長老以黒白土為丸而語之言若汝黑心起取黑丸若白心起取白丸是時優波笈多欲作善心心法而取多黒丸乃至不得一白丸復更思惟取二分黒丸一分白丸復更思惟取半黒丸半白丸復更思惟取二分白丸一分黑丸復更思惟乃至一切白心起悉取白丸阿育王經卷八譬如斷皮至肉斷肉至骨斷骨至髄大智度論卷十四譬如乘馬趣象捨馬乘象乘象趣龍捨象乘龍大智度論卷四十九譬如縁梯從一初桄漸上上處雖髙雖難亦能得至大智度論卷八十七譬如有人欲以其火作火所作為求火故下安乾木上施鑚燧精勤策勵勇猛鑚求彼於如是精勤策勵勇猛鑚時於下木上最初生煖次煖增長熱氣上衝次倍增盛其烟遂發次無燄火欻然流出火出無間發生猛燄猛燄生已便能造作瑜珈師地論卷二十九深造言米之率糲十粺九鑿八侍御七者其術在九章粟米之法彼云粟率五十糲米三十粺二十七鑿二十四御二十一言粟五升為糲米三升以下則米漸細故數益少四種之米皆以三約之得此數也毛詩正義召旻將令學者原始要終尋其枝葉究其所窮優而柔之使自求之饜而飫之使自趨之若江海之浸膏澤之潤渙然氷釋怡然理順然後為得也杜氏解左傳序五穀者種之美者也茍為不熟不如荑稗夫仁亦在乎熟之而已矣孟子告子上淵流浩漫非孤學所盡足蹇途遥豈短策能運宋書律志序且君子之難也若美山然名山既多矣松栢既茂矣望之相相然盡目力不知厭而世有所美焉固欲登彼相相之上仡仡然不知厭小人者與此異若部婁之未登善登之無蹊維有楚棘而已逺望無見也俛就則傷晏子春秋雜下學者處不化不聼之勢而以自行欲名之顯身之安也是懐腐而欲香也是入水而惡濡也凡説者兊之也非説之也今世之説者多弗能兊而反説之是拯溺而硾之以石也是救病而飲之以堇也使世益亂吕氏春秋勸學吾嘗蓾焉吾田期歳不收土莫不然焉何况於人乎韓詩外傳孔子曰闚其門不入其中安知其奥藏之所在乎然藏又非難也丘嘗悉心盡志已入其中前有髙岸後有深谷泠泠然如此既立而已矣不能見其裏益謂精㣲者也韓詩外傳吾未見好斧藻其徳若斧藻其楶者歟揚子學行渉淺水者見蝦其頗深者察魚鼈其尤甚者觀蛟龍足形跡殊故所見之物異也入道淺深其猶此也淺者則見傳記諧文深者入聖室觀秘書故入道彌深所見彌大王充論衡別通篇甘酒醴不酤飴蜜未為能知味也王充論衡别通篇人之遊也必欲入都都多竒觀也入都必欲見市市多異貨也百家之言古今行事其為竒異非徒都邑大市也遊於都邑者心厭觀於大市者意飽况遊於道藝之際哉王充論衡别通篇故言者所以明象得象而忘言象者所以存意得意而忘象猶蹄者所以在兎得兎而忘蹄筌者所以在魚得魚而忘筌也然則言者象之蹄也象者意之筌也是故存言者非得象者也存象者非得意者也周易畧例明象夫鑿枘之麤伎而輪扁有不傳之妙掇蜩之薄術而傴僂有入神之巧在乎其人由於至精也抱朴子内篇對俗如世良馬見鞭影而行五燈會元七佛釋迦牟尼佛譬如穿井井穿愈深漸漸功多運土難出既至泉源得止衆渴悉令飽足無饑渴想穿井功勞随泉亦滅修道積行亦復如是無上内秘藏經妙徳品又如逺行遊歩萬里種種艱辛無所不見修道積行亦復如是無上内秘藏經妙徳品譬如妙饍數數修理得種種味海空智藏經平等品譬如真金數數打時鎔銷鍊冶轉更明浄調和柔輭光色微妙其價難量海空智藏經平等品猶如有人欲立大屋先平其地漸興根基稍壘其墻令至髙大以材木覆樑柱牢堅以瓦葢之塗治仰泥作悉成了而堊灑之白璧赤柱儼然巍巍然後請㑹親族門室善友鄉黨無不周遍飲食作樂無不欣歡修行道地經菩薩品但解進其義而不能微妙如人食空羮而無有飯具修行道地經慈品折𠂻窮鄉多異曲學多辨史記趙世家豈不渾沌傷竅嘉樹弊牙雖復人説非馬家握靈虵以無當之巵同畫地之餅矣陳書傳縡傳楊子之隣人亡羊既率其黨又請楊子豎追之楊子曰嘻亡一羊何追者之衆隣人曰多岐路既反問獲羊乎曰亡之矣岐路之中又有岐焉吾不知所之所以反也楊子戚然心都子入而問曰昔有昆弟三人游齊魯之間同師而學進仁義之道而歸其父曰仁義之道若何伯曰仁義使我愛身而後名仲曰仁義使我殺身以成名叔曰仁義使我身名並全彼三術相反而同出於儒孰是孰非邪楊子曰人有濵河而居者習於水勇於泅操舟鬻渡利供百口裹糧就學者成徒而溺死者幾半本學泅不學溺而利害如此若以為孰是孰非心都子嘿然而出曰大道以多岐亡羊學者以多方䘮生學非本不同非本不一而末異若是唯歸同反一為亡得䘮列子説符兼陳萬物而中懸衡焉是故衆異不得相蔽以亂其倫也荀子解蔽聖人之所命天下以為正正朝夕者視北辰正嫌疑者視聖人春秋繁露深察名號視日月而知衆星之篾也仰聖人而知衆説之小也揚子學行萬物紛錯則懸諸天衆言淆亂則折諸聖揚子吾子好書而不要諸仲尼書肆也好説而不要諸仲尼説鈴也揚子吾子赫赫乎日出之光羣目之用也渾渾乎聖人之道羣心之用也揚子五百莊子曰射者非前期而中謂之善射天下皆羿也可乎惠子曰可莊子曰天下非有公是也而各是其所是天下皆堯也可乎惠子曰可莊子徐無鬼市無平必失貴賤之正書無師必謬典謨之㫖揚子法言註學行篇止水能鑒於人聖智能照萬法故大匠取則於止水衆生宗極於聖人道德經註疏卷一豈唯羣聖之户牖抑亦衆玅之法門道徳經註䟽卷一鳧乙之交定者鴻乎吾所以直其繩矣𢎞明集張融門論探本舍源求流無時得源捨本就末無時得本闗尹子一宇君子戰雖有陳而勇為本焉䘮雖有禮而哀為本焉士雖有學而行為本焉是故置本不安者無務豐末墨子修身夫井植生梓而不容甕溝植生條而不容舟不過三月必死所以然者何也皆狂生而無其本者也河九折注於海而流不絶者崑崙之輸也潦水不泄瀇瀁極望旬月不雨則涸而枯澤受瀷而無源者是故乞火不若取燧寄汲不若鑿井淮南子覽㝠訓多聞則守之以約多見則守之以卓寡聞則無約也寡見則無卓也綠衣三百色如之何矣紵絮三千寒如之何矣揚子吾子激修流揚朝宗者不可以背五城而跨積石舒翠葉吐丹葩者不可以含洪荄而去繁柯敗源失本尟不枯汔叛聖違經理不𢎞濟抱朴子外篇廣譬見虎一毛不知其斑道家笑儒者之拘儒者嗤道家之放皆不見本也止響以聲逐影以形姦爭流蕩不知所止也意林物理論中黄老君曰子既知身藏又當知天地父母之家五城十二樓眞秘於叢霄之觀初學記道釋部觀註見其外不睹其内識其流不獲其源秉其末不窮其根道徳經指歸卷自然之道亦猶樹也轉多轉逺其根轉少轉得其本道徳經註仁義母之所生非可以為母形器匠之所成非可以為匠也道徳經註喻林卷九十二
