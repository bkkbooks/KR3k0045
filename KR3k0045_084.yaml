body:
  text: 喻林卷八十四明徐元太撰德行門六成德瞻彼淇澳緑竹猗猗有匪君子如切如磋如琢如磨瞻彼淇澳緑竹如簀音責叶側歴反有匪君子如金如錫如圭如璧詩國風淇澳無然畔援音院無然歆羨誕先登于岸叶魚戰反詩大雅皇矣顒顒卬卬如圭如璋詩大雅卷阿人亦有言德輶如毛民鮮克舉之詩大雅烝民淇澳美武公之德也毛詩淇澳問君子貴玉而賤䃉者何也為玉之寡而䃉之多與孔子曰非為䃉之多故賤之也玉之寡故貴之也夫昔者君子比德於玉焉禮記聘義非彼日月照大明於寰宇類此松筠負貞心於霜雪禮記正義序孔子之謂集大成集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者智之事也終條理者聖之事也孟子萬章下智譬則巧也聖譬則力也由射於百步之外也其至爾力也其中非爾力也孟子萬章下管仲曰苗始其少也眴眴乎其孺子也至其壯也莊莊乎何其士也至其成也由由乎茲免何其君子也天下得之則安不得則危故命之曰禾此其可比於君子之德矣管子小問紀渻子為王養鬭雞十日而問雞已乎曰未也方虚憍而恃氣十日又問曰未也猶應嚮景十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴者已無變矣望之似木雞矣其德全矣異雞無敢應者反走矣莊子達生徵音非無羽聲也羽音非無徵聲也五音莫不有聲而以徵羽定名者以勝者也故仁義智勇聖人之所備有也然而皆立一名者言其大者也淮南子詮言訓井道以澄清不竭之象而成於井之德也易云井者德之基京氏易傳井上牛𤣥􅀈白晬而角其升諸廟乎是以君子全德揚子君子温直而擾毅木之德也剛塞而强義金之德也愿恭而理敬水之德也寛栗而柔立土之德也簡暢而明砭火之德劉邵人物志九徵威施之艷粉黛無以加二至之氣吹呼不能增是以懷英逸之量者不矜風格以示異體邈俗之器者不恤小譽以狥通抱朴子外篇博喻重淵不洞地則不能含螭龍吐吞舟峻山不極天則不能韜琳琅播雲雨立德不絶俗則不能收美聲著厚實執志不絶羣則不能臻成功銘𢎞勲而凡夫朝為蜩翼之善夕望丘陵之益猶立植黍稷坐索於豐收也抱朴子外篇廣譬已有令德類禾之有嘉秀李善註文選思𤣥賦季野雖不言而四時之氣亦備世說新語德行礪金成器相遺滿籯琢玉為寶待價聨城藝文類聚職官部司徒墓誌至仁無親至信碎金太平御覽珍寶部金中譬如商賈遇得寶城身自采取而得還家成大富貴海空智藏經供獻品猶如眞金屢加銷鍊轉轉益明調和柔軟光色妍浄其價難量然後乃為人天之寶元陽妙經卷三光明清涼猶如秋月善法具足猶如滿月衆生樂見猶如朗月增長善法猶如初月一味甘恬如月一味觀一切法如水中月清浄無垢如月無翳大方等大集經十七相生以慈潤莖擢以樂廣念正則增枝願續則長葉内縁成為華外縁成為果當知悲根等如是次第成大乘莊嚴經論卷九若圓輪之抱規猶直桷之附繩𢎞明集十三禪定之海深廣無際自非如來清浄眞心無能度者僧肇註維摩詰經佛國品覺道既成佛寶也法輪既轉法寶也五人出家得道僧寶也僧肇註維摩詰經佛國品德盛夫子之不可及也猶天之不可階而升也論語子張江漢以濯之秋陽以暴之皜皜乎不可尚已孟子滕文公上規矩方員之至也聖人人倫之至也孟子離婁上孔子登東山而小魯登太山而小天下故觀於海者難為水遊於聖人之門者難為言孟子盡心上溥博如天淵泉如淵中庸辟如天地之無不持載無不覆幬辟如四時之錯行如日月之代明中庸肫肫其仁淵淵其淵浩浩其天中庸詩曰德輶如毛毛猶有倫上天之載無聲無臭至矣中庸大成若缺其用不敝大盈若冲其用不窮大直若屈大巧若拙大辯若訥老子洪德上德若谷大白若辱廣德若不足建德若偷質眞若渝大方無隅大器晩成大音希聲大象無形老子同異與兮若冬涉川猶兮若畏四鄰儼兮其若客渙兮若冰之將釋敦兮其若朴曠兮其若谷渾兮其若濁老子顯德尸居而龍見淵黙而雷聲神動而天隨莊子在宥聖人之德若天之高若地之普其有昭於天下也若地之固若山之承不坼不崩若日之光若月之明與天地同常則此言聖人之德章明博大埴固以修久也墨子尚賢中天者高之極也地者下之極也無窮者廣之極也聖人者道之極也荀子禮論秉太乙者牢籠天地彈壓山川含吐陰陽伸曳四時紀綱八極經緯六合覆露照導普氾無私蠉飛蠕動莫不仰德而生淮南子本經訓至味不慊至言不文至樂不笑至音不呌大匠不斲大豆不具大勇不鬭得道而德從之矣譬如黄鍾之比宫大簇之比商無更調焉淮南子說林訓未盡夫子之美也夫子德高則配天深則配海孔叢子記義亘地區充天宇轔高逵踵遐武蔡中郎集大傳胡公碑洋洋乎若德雖崇山千仞重淵百尺未足以喻其高究其深也蔡中郎集周巨勝碑乃暴以秋陽威以夏日澤無不漸螻蟻之穴靡遺明無不察容光之微必照文選沈約安陸王碑文觀海齊量登嶽均厚文選王儉禇淵碑文仲尼無契勝於天下而德著古今善惡明也鏡照醜好而人不怨法明善惡而人不恨意林魏子彼春蘭及秋菊尚無絶於衆芳矧重仁與襲義信遼遼兮未央藝文類聚人部贈答賦禽子問天與地孰仁墨子曰翟以地為仁太山之上則封禪焉培塿之側則生松柏下生黍苗莞蒲水生黿鼉龜魚民衣焉食焉家焉死焉地終不責德焉故翟以地為仁藝文類聚地部地中衢置樽高堂懸鏡其酌不窮其明逾盛藝文類聚儲官部儲官詩置樽待酌懸鍾聽扣聲動天下光照四鄰文苑英華庾信王爵一碑響發地鐘光垂天鏡文苑英華薛道衡碑如金山光明洞映不測邊際玉清經道化四夷品猶如良井遍給衆渴井泉不竭元上内秘藏經究竟品一者其德如虚無澄眞洞寂澹泊自然幽幽㝠㝠為天地之根二者其德如大道恢廓無為為神明之宗一切萬物普受其成功三者其德如天澄虚廣覆高浮上清一切萬物普受生成四者其德如地開張養生含容無細一切萬物受其厚載五者其德如日月光明洞映無幽不徹一切萬物受其柔惠六者其德如衆星照曜諸天朗達幽㝠一切萬物普受光明七者其德如雲雨和天潤地流澤廣施一切萬物普蒙惠灑八者其德如四時轉輪隂陽節氣和平一切萬物普受含生九者其德如太山包容障遏威靈恢恢五帝安鎮神仙所居十者其德如大江柔弱蕩蕩惠流百方不簡穢賤无細不容靈寶眞文要解譬如聚積衆柴若二若三乃至千載如此柴聚經多年嵗甚大乾燥于時有人放火燒之成大火聚更以無量酥油溉灌此火轉熾倍盛難可得近大寶積經六十一猶如秋日初出時蔽諸螢火光普照大寶積經六十一譬如虛空無長無短無有方面無增無減光讃波羅蜜經卷十譬日始出高山之嶽若月盛滿在衆星中又若須彌異於衆山如猛師子出於深林清浄分衞經卷上譬如日輪光明熾盛照贍部洲無不周遍波羅蜜多經卷四如有妙藥名曰莫耆是藥威勢能消衆毒有大毒蛇饑行求食遇見生類欲螫噉之其生怖死走投妙藥蛇聞藥氣尋便退走波羅蜜多經卷一譬如日出能為四事一者有大光明二者除滅闇㝠三者示種種色四者令諸衆生得造事業大方等大集經十七如船師於生死海度衆生故如屋宅覆䕶一切諸世間故如商主能導羣生至寶所故如赫日智慧光明能普照故如君主覺法城中得自在故如熾火能燒衆生我愛薪故如大雲普霔無邊甘露雨故如時雨增長信等善根芽故如船舫運度衆生達彼岸故如橋梁能度衆生越生死故如津濟顯示一切出要道故如風輪持衆生不令墮落三惡趣故如大地悉能增長一切衆生諸善根故如大海具足一切無盡福智功德藏故如滿月普放智光破煩惱暗施清涼故如猛將悉能摧伏一切魔軍令退散故大方廣佛華嚴經卷五又如商客入一切智大寶洲中採求如來十力智寶又如漁師有具足力持正法網入生死海漉諸衆生如阿修羅王能徧㧌動三有大城諸煩惱海普令衆生究竟寂静又如日輪出現虚空照愛水泥令其乾竭猶如滿月出現虚空令可化者心華開敷猶如大地普皆平等無量衆生於中止住恒受履踐心無分别增長一切善法根芽猶如大風所向無礙能拔一切諸見大樹壞散一切生死園苑大方廣佛華嚴經卷十四拔不善㓨滅一切障了達甚深覺法自性堅固精進以為牆壍不思議三昧而為園苑以慧日光破無明闇以方便風開智慧華以廣大願充滿法界心常現入一切智城大方廣佛華嚴經卷十五清白之法具足圓滿猶如雪山照諸功德等一淨故猶大地淨穢好惡無異心故猶如淨水洗除塵勞諸垢染故猶如火王燒滅一切煩惱薪故猶如大風行諸世界無障礙故猶如虚空於一切有無所著故猶如蓮華於諸世間無染汙故猶如大乘運載羣萌出生死故猶如重雲振大法雷覺未覺故猶如大雨雨甘露法潤衆生故無量夀經卷下佛之明慧猶崑崙河千川萬流皆仰之焉川流溢滿而河無涓滴之減佛之為明有踰之矣梵魔喻經縁一如育多摩尼光明清淨餘珠不及菩薩地持經卷七如師子王以一切處不驚不怖故譬如龍象以調伏心荷負一切衆生諸重擔故譬如大雨以其降澍妙雨故譬如日光以智慧光照一切衆生故譬如明月以一切衆生隨其所在見者愛樂故譬如大商主將導衆生趣一切智大寶洲故譬如良醫以能療治一切衆生煩惱病故如拔刺者以能拔出一切衆生於諸法中疑惑心故譬如海導師以能善知一切智知諸方義故譬如船舫以能善度諸衆生大海水故譬如衆水河池等以能資潤一切衆生故如王大道能津通諸衆生故譬如寶洲以能具足一切菩提分法故譬如如意寶須者皆得能與衆生無量利益所求法故譬如良馬以能運代疲苦衆生故譬如大海智慧甚深難測量故譬如須彌山於佛菩提不傾動故譬如一切諸妙寶樹以能具足勝莊嚴故譬如閻浮檀金以希有難得故譬如帝釋王於諸法中能得增上自在力故譬如大梵王具足寂静諸威儀故譬如䕶世四天王等以能䕶持勝妙法故譬如轉輪王以能修行十善業故譬如大臣以能守䕶諸佛如來秘宻法故法集經欲四大海之中金銀琉璃水精珊瑚硨磲瑪瑙摩尼之妙無不備有法海經尺一恒水邊流沙尚可斗量盡知其斗數佛恩不可得量也佛說弟子死復生經當一如彼金翅王吞滅諸龍毒能殄無明闇喻如千日光摧碎我慢山譬猶天帝杵一百五十讃佛頌藉九垂法雲以湛潤開慧日而增暉𢎞明集十形容端正猶如滿月衆星中明衆生視之無有厭足威儀安詳如須彌山智慧甚深猶如大海忍辱成就猶如大地心無變易如閻浮檀金常為一切人天所愛猶如八味清淨之水於諸世間其心平等猶如日月等照於物滿衆生願如如意寶見諸乞者心生歡喜猶如慈母見所愛子本縁經持王子品大成水人所沐浴自潔清者至於深淵洪波所當畏愼也由近人之故或泳之游之褻慢而無戒心以取溺焉有德者亦如水矣初時學其近者小者以從人事自以為可則侮狎之至於先王大道性與天命則遂扞格不入迷惑無聞如溺於大水矣鄭氏註禮記緇衣夫器各施其用而聖人之道𢎞大無所不施故云不器不器而為諸器之本也禮記正義學記遂遵流以至海且因岳而為嵩魏書李順希仁弟騫傳事不本於道德者不可以為儀言不合乎先王者不可以為道音不調乎雅頌者不可以為樂淮南子泰族訓或問仲尼之術周而不泰大而不小用之猶牛鼠也曰仲尼之道猶四瀆也經營中國終入大海他人之道者西北之流也綱紀夷貉或入於沱或淪於漢揚子君子言已積累衆善以自潔飾復植留夷杜蘅雜以芳芷芳香益暢德行彌盛也王逸註楚辭離騷經河水沛沛比夫衆川孰者為大蟲繭重厚稱其出絲孰為多者王充論衡自紀篇誰謂華岱之不高江漢之不長與君子修德亦高而長之將何患矣徐幹中論貴驗單絃不能發韶夏之和音孑色不能成衮龍之煒􅖙一味不能合伊鼎之甘獨木不能致鄧林之茂𤣥圃極天葢由衆石之積南溟浩瀁實須羣流之赴抱朴子外篇交際諸賢之有妙藝猶百川之有四瀆衆山之有五嶽而川可度嶽可登高而且大者惟聖人之道如天不可升也揚子法言註學行篇昭昭若三辰之麗於天滔滔猶四瀆之紀於地文選沈約安陸王碑文孔子文足老君𤣥足山川藪澤萬物歸焉意林太𤣥經宗百川而成海倍萬俊而為英藝文類聚職官部丞相碑譬彼大壑百川俱引初學記道釋部菩薩譬如摩訶迦良那藥蘇隋言大眞藥蘇取種種藥味力煎其内或有辛或有苦或有酢或有鹹或有淡或有甜取諸味已入體成熟色香等味取己彼蘇體捨移而成藥味大寶積經一百九如海有珠名普集衆寶此珠若在一切衆寶常不散失大方廣佛華嚴經卷三十六譬如阿耨達池出四大河其河流注徧閻浮提既無盡竭復更增長乃至入海令其充滿大方廣佛華嚴經三十九如鞞陁梨山王純寶所成一切衆寶咸在其中取不可盡大方廣佛華嚴經三十九如雪山王一切藥草咸在其中取不可盡大方廣佛華嚴經三十九譬如大吉善蘇以衆良藥味力熟功和合為之大吉善蘇棄凡蘇性持良藥力辛苦酸鹹澀甘六味以資人身便與人身作色香味大乗顯識經推四令天下諸水都流入大海水中寧能令海水增多不對曰不能令增多也所以者何是大海為天下諸水中王故能尒耳阿彌陀經卷上猶如衆流四瀆歸海合為一味法華經卷六其欲作大火者當益其薪故能大明菩薩以人為薪乃能成大之光明如來三昧經卷上譬如大海初欲成時於四天下八萬諸洲所有流水及大小雨江河泉源流入其中皆悉能受不增不減海法應爾種種水入皆捨本名俱名海水皆失本味同為一鹹華子經卷如伶人擊動絲竹匏木之類繁㑹成音大乘宻嚴經卷中譬如江河淮海大小異故深淺殊故名文别故水在江中名為江水水在淮中名為淮水水在河中名為河水俱在海中唯名海水金剛三昧經卷下一味實義如一大海一切衆流無有不入一切法味猶彼衆流名數雖殊其水不異若住大海則括衆流住於一味則攝諸味金剛三昧經卷下如阿耨大池出四大河此四大河分為八河及閻浮提一切衆流皆歸大海以沃燋山故大海不增以金剛輪故大海不減此金剛輪隨時轉故令大海水同一鹹味金剛三昧本性清淨不壊不滅經行二如衆藥未相和雜之時各能治病和雜已後則無所不治隨相論卷上集衆法寶如海導師維摩詰所説經佛國品智度菩薩母方便以為父法喜以為妻慈悲心為女善心誠實男畢竟空寂舍弟子衆塵勞隨意之所轉道品善知識由是成正覺諸度法等侣四攝衆伎女歌詠誦法言以此為音樂總持為園苑無漏法林樹覺意淨妙華解脱智慧果八解之浴池定水湛然滿布以七淨菙浴此無垢人象馬五通馳大乘以為車調御以一心遊於八正路相具以嚴容衆好飾其姿慙媿之上服深心為華鬘富有七財寶敎授以滋息如所說修行廻向為大利四禪為牀座從於淨命生多聞增智慧以為自覺音甘露法之食解脫味為漿淨心以澡浴戒品為塗香摧滅煩惱賊勇健無能踰降伏四種魔勝幡建道塲維摩詰所説經佛道品海有五德一澄淨不受死屍二多出妙寶三大龍注雨滴如車軸受而不溢四風日不能竭五淵深難測大士心淨不受毁戒之屍出慧明之寶佛大法雨受而不溢魔邪風日不能虧損其智淵深莫能測者故曰心大如海也羅什譯維摩詰經方便品佛土者即衆生之影響耳夫形修則影長形短則影促豈日月使之然乎形自然耳故隨所化衆生之多少而取佛土之廣狹也是以佛土或以四天下或以三千或以恒沙為一國者也僧肇註維摩詰經佛國品徳驗名山高大宜有茂木人君有盛德乃宜有顯服鄭氏箋詩終南王子宫室車馬衣服多與人同而王子若彼者其居使之然也況居天下之廣居者乎孟子盡心上富潤屋德潤身大學東寶惟金南木有喬發輝曾崖竦幹重霄宋書孝義潘綜傳藴珠玉之餘潤昭羅綺之遺妍梁書張緬弟攅傳夫山藏美玉光照廊廡之間地藴神劒氣浮星漢之表隋書王貞文學傳月盛之時雖有重雲蔽之不見月體而夕猶朗然是月光猶從雲中而照外也隋書天文上志曼曼緜緜其聚必散嘿嘿昧昧其光必逺太公六韜文師善建者不拔善抱者不脱子孫祭祀不輟老子修觀夫丘陵崇而穴成於上狐貍藏矣溪谷深而淵成於下魚鼈安矣松柏茂而陰成於林塗之人則蔭矣子華子孔子贈昔者十日並出萬物皆照而況德之進乎日者乎莊子齊物論而容崖然而目衝然而顙然而口闞然而狀義然似繫馬而止也莊子天道夫盡小者大積微者著德至者色澤洽行盡而聲聞逺荀子大畧篇君子之容純乎其若鍾山之玉桔乎其若陵上之木淳淳乎愼謹畏化而不肯自足乾乾乎取舍不侻而心甚素樸吕氏春秋士容仁者雖在斷割之中其所不忍之色可見也智者雖遇煩難之事其不闇之效可見也淮南子主術訓夫執介胄而後能拒敵者故非聖人之所貴也君子顯之於服而勇武者消其志於貌也矣春秋繁露服制像夫形體也色心也閉關乎其薄也茍有温良在中則眉睫著之矣疵瑕在中則眉睫不能匿之韓詩外傳南山芝蘭君子所有焦氏易林萃之同人文山鴻豹肥腯多脂焦氏易林漸之比次四君子積善至於車耳測曰君子積善至於蕃也太𤣥經第五積東動青龍光離于淵太𤣥經𤣥圖玉飾其本君子之性金飾其中君子之道白虎通考黜佩飾也所以象德也故行清潔者佩芳德光明者佩玉能解結者珮觹能决疑者珮玦故孔子無所不佩也王逸註楚辭離騷經夫水盈而流德交而形是故德行外著洪聲逺布蔡中郎集姜伯淮碑良田無晩嵗膏澤多豐年亮懷璵璠美積久德愈宣曹子建贈徐幹立德踐言行全操清斯則富矣何必玉帛之崇乎高尚其志不降不辱斯則貴矣何必青紫之兼拕也俗民不能識其度量庸夫不得揣其銓衡是則高矣何必凌雲而蹈霓乎問者莫或測其淵流求者未有覺其短乏是則深矣何必洞河而淪海乎抱朴子外篇廣譬玉之瓏􅌑其聲亦猶君子清玲其德音揚子法言註五百篇名之與實猶形之與影也德藝周厚則名必善焉容色姝麗則影必美焉今不修身而求令名於世者猶貌甚惡而責妍影於鏡也顔氏家訓名實白虎通曰所以必有珮者表德見所能也故循道無窮則珮環能本道德則珮琨李善註文選思𤣥賦日月麗天瞻之不墜仁義在躬用之不匱文選袁宏名臣序賛芳處幽而彌馨兮寶在夜而愈光廣文選潘安仁思游賦崇蘭自芳珏玉自光文苑英華王僧孺誄夫良玉徑尺雖有十仞之土不能掩其光明珠度寸雖有函丈之石不能戢其曜茍藴美自厚容止可知矣太平御覽逸民部逸民十仁人常如園圃之藍不異衆草染而後彰太平御覽百卉部藍水帶地而壤潤月流天而宵烱初學記地部井荆藴玉以潤其區漢含珠而清其域初學記地部漢水註猗猗秋蘭植彼中阿有馥其芳其黄其葩雖曰幽深厥美彌嘉困學紀聞卷十八評詩夫人有髮毛如山之草木故山有玉而草木潤身有玉而毛髮黑本草玉井卷五譬如盛日但無炎烈瞻視煥目光芒射人玉清經昭靈品譬如百和之香共在一篋此篋之内芬芳流溢无有一毫臭穢之氣海空智藏經序品譬如大山善能興雲雲能生雨海空智藏經序品又如蓮花隨所在處香氣馚馥波羅蜜多經卷五百六十七如有寶珠名種種色在大海中雖有無量衆多駛流入於大海以珠火力令水銷滅而不盈溢大寶積經卷五譬如高大樓閣宻閉戸牖以摩尼寶置於室中其内有情雖經晝夜常覩光輝大寶積經十九譬如有人服延齡藥長得充健不老不瘦大方廣佛華嚴經卷七十八法雲垂布以興雷震三明解脫以為電光無上法雨以為甘露無盡意菩薩經八其光所照曜如日出於雲阿差末菩薩經卷一譬如出金地無有礫石亦無草木中有紫磨金人便取其金於火中試消合以作諸物著之佛國經卷下如煉眞金塵垢不汙星月光照則雨淨水日光所照尋即出火大法鼓經卷下猶如山頂深泉水自中出不從外來即此池中出清淨水還自浸漬無不周遍長阿含經卷十三譬如有人熟煎乳汁其上便有薄膜停住起世因本經卷九洪熖耀赫晃若寶山如大炬明炤燿幽㝠如大山岡而有積雪如日之光昇於朝陽如秋月盛衆星特明如轉輪王與諸寶臣四部衆俱如樹華殖煒曄繁茂英艷無量鴦崛髻經緣六夫世間諸華香盡順風香不逆風香戒德之香亦逆風香亦順風香世間華香齊熏欲界不熏色界或直熏一方不熏三方持戒之香香徹十方華香逼近乃别特戒之香上徹一究竟天出曜經六戒品栴檀多香青蓮芳花雖曰是眞不如戒香華香氣微不可謂眞持戒之香到大殊勝法句經華香品如日初出光不可隠大人智光亦難隠蔽無明羅刹經如𦂳那蟲有三時變初作土色中作赤色後作黑色無明羅刹經譬如昔者有一小蟲心懷金剛住於海邊閻浮大樹髙四千里樹則戰動不能自安樹神問之卿何故震動不安樹報之曰蟲住我上所以不安神又問曰金翅大鳥立於你上何故不動小蟲處上而獨戰慄樹報之曰此蟲雖小腹懐金剛吾不能勝是故動揺修行道地經菩薩品法寶光無不照照癡㝠也澤無不潤潤生死也喻海有神寶能放光除㝠亦因光能雨甘露潤枯槁也僧肇註維摩詰經佛國品法身圓應猶一月升天影見百水也僧肇註維摩詰經佛國品感孚魚者蟲之幽隠豚者獸之微賤人主内有誠信則雖微隠之物信皆及矣周易正義中孚鶴鳴則子和修誠則物應韋康伯註易繫辭上鶴鳴于陰氣同則和出言戸庭千里或應韋康伯註易繫辭上泂音逈酌彼行潦音老挹彼注兹可以餴音分饎音熾豈弟君子民之父母泂酌彼行潦挹彼注兹可以濯罍音雷豈弟君子民之攸歸泂酌彼行潦浥彼注兹可以濯溉音葢豈弟君子民之攸塈音戲詩大雅泂酌子路戎服見於孔子拔劒而舞之曰古之君子固以劒自衞乎孔子曰古之君子忠以為質仁以為衞不出環堵之室而知千里之外有不善則以忠化之侵暴則以仁固之何待劒乎孔子家語好生桃李以其華實之故非有所召呼而人爭歸趣來往不絶其下自然成徑以喻人懷誠信之心故能潛有所感也前漢書註李廣贊欲崇諸已先下於人猶大樂無聲而蹌鸞斯應者也晉書光逸傳將將鴻鵠貌之美者也貌美故民歌之德義者行之美者也德義美故民樂之民之所歌樂者美行德義也而明主鴻鵠有之故曰鴻鵠將將維民歌之管子形勢解水淵深廣則龍魚生之山林茂盛則禽獸歸之禮義修明則君子懷之韓詩外傳君子者無所不宜也是故韠冕厲戒立于廟堂之上有司執事無不敬者斬衰裳苴絰杖立于喪次賓客弔唁無不哀者被甲纓胄立于桴鼓之間士卒莫不勇者故仁足以懷百姓勇足以安危國信足以結諸侯强足以拒患難威足以率三軍故曰為左亦宜為右亦宜說苑修文敏其行修其理千里之外親如兄弟若行不敏禮不合對門不通矣劉向說苑雜言妾聞玉石墜泥不為汙栁下覆寒女不為亂積之於素雅故不見疑也列女傳周列國齊威虞姬君子者無尺土之封而萬民尊之無刑罰之威而萬民畏之無羽籥之樂而萬民樂之無爵禄之賞而萬民懷之其所以致之者一也徐幹中論法象民之治情歛慾反於端懿者猶草木之偃於翔風百卉之挺於春陽也蔡中郎集陳仲弓銘樂動聲儀曰風雨動魚龍仁義動君子李善註文選琴賦美為士者飛鳥歸之蔽於天魚鼈歸之沸於淵李善註文選袁彥伯三國名臣序贊服美動目行美動神藝文類聚后妃部后妃箴忠誠貫於日月孝義感於冰霜文苑英華請勸進及封岳行幸徐陸表舜行德三年而三苗服孔子聞之曰通乎德之情則孟門太行不為險矣故曰德之速疾乎以郵傳命困學紀聞卷八孟子眞友不待請譬慈母之赴嬰兒也僧肇註維摩詰經佛國品喻林卷八十四
