body:
  text: 喻林卷三十七明徐元太撰人事門三十五尚義入峻谷者當攀葛藟可以免於顛墜猶處時俗者當據道義然後得用自立前漢書敘傳注伐氷之家不利雞豚之息委積之臣不操市井之利後漢書馮衍傳濟於舟者和於水矣義於人者祥於神矣管子白心人而無義唯食而已是雞狗也強食靡角勝者為制是禽獸也列子説符子獨不聞假人之亡與林回棄千金之璧負赤子而趨或曰為其布與赤子之布寡矣為其纍與赤子之纍多矣棄千金之璧負赤子而趨何也林回曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也夫相收之與相棄亦逺矣且君子之交淡若水小人之交甘若醴君子淡以親小人甘以絶彼無故以合者則無故以離莊子山木子墨子言曰我有天志譬若輪人之有規匠人之有矩輪匠執其規矩以度天下之方圜曰中者是也不中者非也墨子天志上商人之四方市賈信徙雖有關梁之難盜賊之危必為之今士坐而言義無關梁之難盜賊之危此為信徙不可勝計然而不為則士之計利不若商人之察也墨子貴義今天下莫為義子獨自苦而為義子不若已子墨子曰今有人於此有子十人一人耕而九人處則耕者不可以不益急矣何故則食者衆而耕者寡也墨子貴義有遊於子墨子之門者子墨子曰盍學乎對曰吾族人無學者子墨子曰不然夫好美者豈曰吾族人莫之好故不好哉夫欲富貴者豈曰吾族人莫之欲故不欲哉好美欲富貴者不視人猶強為之夫義天下之大器也何以視人必強為之墨子公孟力不若牛走不若馬而牛馬為用何也曰人能羣彼不能羣也人何以能羣曰分分何以能行曰以義故義以分則和和則一一則多力多力則強強則勝物荀子王制篇水火有氣而無生草木有生而無知禽獸有知而無義人有氣有生有知亦且有義故最為天下貴也荀子王制篇齊宣王問匡倩曰儒者博乎曰不也王曰何也匡倩曰曰博者貴梟勝者必殺梟殺梟者是殺所貴也儒者以為害義故不博也又問曰儒者弋乎曰不也弋者從下害於上者也是從下傷君也儒者以為害義故不弋又問儒者鼓瑟乎曰不也夫瑟以小弦為大聲以大弦為小聲是大小易序貴賤易位儒者以為害義故不鼓也韓非子外儲説左昔晉文公將與楚人戰於城濮召舅犯而問曰楚衆我寡奈何而可舅犯對曰臣聞繁禮之君不足於文繁戰之君不足於詐君亦詐之而已文公以舅犯言告雍季雍季曰竭澤而漁豈不獲得而明年無魚焚藪而田豈不獲得而明年無獸詐偽之道雖今偷可後將無復非長術也文公用舅犯之言而敗楚人於城濮反而為賞雍季在上左右諫曰城濮之功舅犯之謀也君用其言而賞後其身或者不可乎文公曰雍季之言百世之利也舅犯之言一時之務也焉有以一時之務先百世之利者乎吕氏春秋義賞使人左據天下之圖而右刎喉愚者不為也身貴於天下也死君親之難視死若歸義重於身也天下大利也比之身則小身所重也比之義則輕義所全也淮南子泰族訓今行者見大樹必解衣懸冠倚劒而寢其下大樹非人之情親知交也而安之若此者信也陵上巨木人以為期易之故也又况於士乎士義可知故也則期為必矣人之所乘船者為其能浮而不能沉也世之所以賢君子者為其能行義而不能行邪僻也吕氏春秋一行大旱雩祭而請雨大水鳴鼓而攻社天地之所為隂陽之所起也或請焉或怒焉者何曰大旱者陽滅隂也陽滅隂者尊壓卑也固其義也雖大甚拜請之而已無敢有加也大水者隂滅陽也隂滅陽者卑勝尊也日食亦然皆下犯上以賤傷貴逆節也故鳴鼓而攻之朱絲脅之為其不義也此亦春秋之不畏強禦也春秋繁露精華衆人以毁形為耻君子以毁義為辱説苑談叢君子比義農夫比榖説苑談叢乞人一日不得食則餓死溝壑是欲寄口而不可得也汝必為乞人之計則簞食豆羮之間殆有甚於乞者汝亦畏死而取之耶充以乞人之心則盜跖之貪為是而伯夷之亷為非是盜跖何智而伯夷何愚也天祿閣外史辭受願竭力以守義兮雖貧窮而不改執雕虎而試象兮阽焦原而跟趾注云雕虎以喻貧試象以喻竭力焦原以喻義言已以執雕虎之貧窮願竭試象之力而守焦原之義李善注文選思玄賦莒國有石焦原者廣五十步臨百仞之溪莒國莫敢近也有以勇見莒子者却行齊踵焉所以稱於世夫義之為焦原也亦髙矣賢者之於義必且齊踵此所以服一時也文選思玄賦注中黃伯曰余左執太行之獶而右摶雕虎唯象之未與吾心試焉有力者則又願為牛欲與象鬭以自試今二三子以為義矣將惡乎試之夫貧窮太行之獶也疏賤義之雕虎也而吾日遇之亦足以試矣文選思玄賦注理之所守勢所常奪道之所閉權所必開是以生重於利故據圖無揮劒之痛義貴於身故臨川有投迹之哀文選陸機演連珠草木無大小必待春而後生人待義而後成意林尸子一人舉而萬夫俯首智者不為賞一人而慙萬夫義者不取太平御覽刑法部烹夫瑟二十五絃其僕人鼓之則為笑賢者以其義鼓之欲樂則樂欲悲則悲雖有暴君為之立變太平御覽樂部瑟煞君之室雖生美菜有義之士弗食太平御覽菜部菜丈夫重義如太山輕利如鴻毛可謂仁義也太平御覽羽族部鴻鷹不擊伏鶻不擊妊蓋其義性如此埤雅品物門鷹設一面之網物觸而後誅之蜘蛛義者也埤雅品物門蜘蛛昔有國王喜食鴈肉常遣獵師張網捕鴈日送一鴈以供王食時有鴈王將五百鴈飛下求食鴈王墮網為獵師所得餘鴈驚飛徘徊不去時有一鴈連翻追隨不避弓矢悲鳴吐血晝夜不息獵師見之感憐其義即放鴈王令相隨去羣鴈得王歡喜回繞爾時獵師具以白王王感其義斷不捕鴈法句譬喻經三忿怒品尚勇武力比於虎可以御亂御衆毛詩簡兮注隼急疾之鳥也飛乃至天喻士卒徑勇能深攻入敵也鄭氏箋詩采芑夫撫劒疾視曰彼惡敢當我哉此匹夫之勇敵一人者也孟子梁惠下思以一毫挫於人若撻之於市朝孟子公孫丑上視刺萬乘之君若刺褐夫孟子公孫丑上譬之猶兩鼠鬬於穴中將勇者勝史記趙奢傳田光答燕太子曰竊觀太子客無可用者夏扶血勇之人怒而面赤宋意脈勇之人怒而面青武陽骨勇之人怒而面白光所知荆軻神勇之人怒而色不變史記荆軻列傳注徐廣曰鷙鳥將擊必張羽毛也史記酷吏義縱列傳注一卒畢力百人不當萬夫致死可以橫行後漢書張宗傳猶鳩鵲捕鷹鸇豚羊弋豹虎是以每戰常負後漢書志百官五注夫水行不避蛟龍者漁夫之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也知窮之有命知通之有時臨大難而不懼者聖人之勇也莊子秋水天子之劒以燕溪石城為鋒齊岱為鍔晉魏為脊周宋為鐔韓魏為夾包以四夷裹以四時繞以渤海帶以常山制以五行論以刑德開以隂陽持以春夏行以秋冬此劒直之無前舉之無上案之無下運之無旁上決浮雲下絶地紀此劒一用匡諸侯天下服矣此天子之劒也諸侯之劒以知勇士為鋒以清亷士為鍔以賢良士為脊以忠勝士為鐔以豪傑士為夾此劒直之亦無前舉之亦無上案之亦無下運之亦無旁上法圎天以順三光下法方地以順四時中知民意以安四鄉此劒一用如雷霆之震也四封之內無不賔服而聽從君命者矣此諸侯之劒也庶人之劒蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難相擊於前上斬頸領下決肝肺此庶人之劒無異於鬭雞一旦命已絶矣無所用於國事莊子説劒國以難攻起一取十國以易攻起十亡百國好力曰以難攻國好言曰以易攻民易為言難為用商子説民今使一死賊伏於曠野千人追之莫不梟視狼顧何者恐其暴起而害己也是以一人投命足懼千夫今臣以五萬之衆而為一死賊率以討之固難敵矣吳子厲士有狗彘之勇者有賈盜之勇者有小人之勇者有士君子之勇者爭飲食無亷耻不知是非不辟死傷不畏衆強恈恈然唯利飲食之見是狗彘之勇也為事利爭貨財無辭讓果敢而振猛貪而利恈恈然唯利之見是賈盜之勇也輕死暴是小人之勇也義之所在不傾於權不顧其利舉國而與之不為改視重死持義而不撓是士君子之勇也荀子榮辱篇一武仗劒擊於市萬人無不避之者臣謂非一人之獨勇萬人皆不肖也何則必死與必生固不侔也尉繚子制談百里之衆不用命不如萬人之鬬也萬人之鬬不用命不如百人之奮也賞如日月信如四時令如斧鉞制如干將士卒不用命者未之聞也尉繚子兵令下冉叔誓必死於田侯而齊國皆懼豫讓必死於襄子而趙氏皆恐成荆致死於韓主而周人皆畏又况乎萬乘之國而有所誠必乎則何敵之有矣刃未接而欲已得矣吕氏春秋論威一膊炭熯掇之則爛指萬石俱熯去之十步而不死同氣異積也大勇小勇有似於此淮南子説林訓鳥有沸波者河泊為之不潮畏其誠也故一夫出死千乘不輕淮南子説林訓子真為勇悍矣今未嘗見子之竒辨也一鄰之鬬也千乘之勝也説苑善説夫登髙臨危而目不眴而足不陵者此工匠之所勇悍也入深淵刺蛟龍抱黿鼉而出者此漁夫之勇悍也入深山刺虎豹抱熊羆而出者此獵夫之勇悍也不難斷頭裂腹暴骨流血中野者此武夫之勇悍也今臣居廣廷作色端辨以犯主君之怒前雖有乘軒之賞未為之動也後雖有斧質之威未為之恐也此既之所以為勇悍也説苑善説兩金相擊勇武敢敵終日大戰不破不缺焦氏易林同人之噬嗑昔者與客涉瞿塘之峽即徴君欲之楚遊道也舟覆得楫而渡有猛虎羣飲于峽一摶而獲斃者二客曰吾與子將赴于峽下之流得一楫而俱免又摶羣虎于峽上如制嬰兒是渡二峽也虎不制則後涉者或免于峽而烏能免峽上之虎乎若子之勇可以倒峽而西矣天祿閣外史􅀈山鶡之為鳥同羣相為畸類被侵雖死不避毛飾武士兼厲以義山海經中山經圖讃尸子説云人謂孟賁生乎曰勇貴乎曰勇富乎曰勇三者人之所難而皆不足以易勇故能懾三軍服猛獸也前漢書注東方朔傳使見戰如餓狼之見肉則可用矣意林商君書負長劒赴榛薄析兕豹摶熊羆此徒獵之勇也負長劒赴深泉斬蛟龍摶黿鼉此漁人之勇也登髙涉危鵠立四顧顔色不變此陶缶之勇也剽必刺視必殺此五刑之勇也意林胡非子意氣難干非資扛鼎風神自勇無待翹關是以曹劌登壇汶陽之田遽反相如睨柱連城之璧更還文苑英華庾信連珠韓雉見申羊于魯有龍飲于沂韓雉曰吾聞之出見虎摶之見龍射之今弗射是不行吾聞也遂射之太平御覽池部沂水都尉氣如合抱之榆太平御覽職官部都尉若能力兼三人身與馬如膠漆手與箭如飛虻誠宜寵異太平御覽兵部箭下虎狼見逼不揮戈奮劒而彈琴詠詩者吾未見其身之可保也太平御覽兵部戈中郎將冠兩鶡尾鶡鷙鳥中之異徑者也每所攫撮應爪摧碎太平御覽職官部虎賁中郎將譬如世間大軍戰時少有衆生為護衆故處於前陳惟有果敢雄猛丈夫合率驍勇抗拒勍敵為護已衆處大軍前振威而住大寶積經四十六譬如怯人執持刀應得安隱反生畏大寶積經六十八如有二象角力而鬬若一被傷退而不復大乘密嚴經卷下譬如波斯匿王與敵國戰時彼諸戰士食丈夫祿不勇猛者不名丈夫大法鼓經卷上猶如勇士能却外難著鎧持仗心不怯弱手執弓矢腳不移轉便不復畏外敵出曜經五無放逸品之餘譬如軟夫為將雖復持兵終身智勇不足卒無功名若如英雄奮發禍亂立定一日之勳功蓋天下大智度論卷十三知命知命者不立乎巖墻之下孟子盡心上人之情邀福者必有害若欲急長苖而反使之枯死也趙氏注孟公孫丑上譬使仁者而必信安有伯夷叔齊使智者而必行安有王子比干史記孔子世家君子得時則大行不得時則龍蛇遇不遇命也何必湛身哉前漢書揚雄傳上夫餓饉流𨽻飢寒道路思有短褐之褻儋石之畜所願不過一金然終於轉死溝壑何則貧窮亦有命矣况呼天子之貴四海之富神明之祚可得而妄處哉前漢書敘傳上傳稱鼎之為器雖小而重故神之所寶不可奪移至今負而趣者此亦窮運之歸乎後漢書獻帝紀論賢者不避害譬猶彀弩射市薄命者先死後漢書獨行列傳衮龍出於緼褐卿相起於匹夫故有朝賤而夕貴先卷而後舒晉書王沈傳夫餐椒非飬生之術咀劒豈衛性之經命之所延人肉其骨而含嚼膏粱時或嬰患深澗乖徼寵之津空谷絶探榮之轍運之所集物稊其枯而俯仰竿牘終然離沮宋書顧覬之傳周之尹氏大治産其下趣役者侵晨昏而弗息有老役夫筋力竭矣而使之彌勤晝則呻呼而即事夜則昏憊而熟寐精神荒散昔昔夢為國君居人民之上總一國之事遊燕宫觀恣意所欲其樂無比覺則復役人有慰喻其勤者役夫曰人生百年晝夜各分吾晝為僕虜苦則苦矣夜為人君其樂無比何所願哉尹氏心營世事慮鍾家業心形俱疲夜亦昏憊而寐昔昔夢為人僕趍走作役無不為也數罵杖撻無不至也眠中啽􅀈呻呼徹旦息焉尹氏病之以訪其友友曰若位足榮身資財有餘勝人逺矣夜夢為僕苦逸之復數之常也若欲覺夢兼之豈可得耶列子周穆王貴之或不生賤之或不死愛之亦不厚輕之或不薄此似反也非反也此自生自死自厚自薄或貴之而生或賤之而死或愛之而厚或賤之而薄此似順也非順也此亦自生自死自厚自薄列子力命北宫子謂西門子曰朕與子並世也而人子逹並族也而人子敬並貌也而人子愛並言也而人子庸並行也而人子誠並仕也而人子貴並農也而人子富並商也而人子利朕衣則短褐食則粢糲居則蓬室出則徒行子衣則文繡食則粱肉居則連欐出則結駟在家熙然有棄朕之心在朝諤然有傲朕之色請謁不相及遨遊不同行固有年矣子自以德過朕邪西門子曰子無以知其實汝造事而窮豫造事而逹此厚薄之驗歟而皆謂與豫並汝之顔厚矣北宫子無以應東郭先生曰汝之言厚薄不過言才德之差吾之言厚薄異於是矣夫北宫子厚於德薄於命汝厚於命薄於德汝之逹也非智得也北宫子之窮非愚失也皆天也非人也而汝以命厚自矜北宫子以德厚自愧皆不識夫固然之理矣西門子曰先生止矣豫不敢復言北宫子既歸衣其短褐有狐貉之溫進其茙菽有稻粱之味庇其蓬室若廣厦之廕乘其蓽輅若文軒之飾終身逌然不知榮辱之在彼也在我也東郭先生聞之曰北宫子之寐久矣一言而能寤易怛也哉列子力命農赴時商趣利工追術仕逐勢勢使然也然農有水旱商有得失工有成敗仕有遇否命使然也列子力命遊於羿之彀中中央者中地也然而不中者命也莊子德充符父母於子東西南北唯命之從隂陽於人不翅於父母彼近吾死而我不聽我則悍矣莊子大宗師鹿生於山而命懸於厨今嬰之命有所懸矣吕氏春秋知分虎豹在山林其命在庖厨馳不益生緩不益死新序義勇八楩生荆山命制輸班焦氏易林乾之既濟麥不終夏花不濟春如和氣何申鑒俗嫌終始運也短長數也運數非人力之為也曰亦有仙人乎曰焦僥桂莽産乎異俗就有仙人亦殊類矣申鑒俗嫌並時遭兵隱者不中同日被霜蔽者不傷中傷未必惡隱蔽未必善隱蔽幸中傷不幸王充論衡幸偶篇螻蟻行於地人舉足而涉之足所履螻蟻苲死足所不蹈全活不傷火燔野草車轢所致火所不燔俗或喜之名曰幸草夫足所不蹈火所不及未必善也舉火行有適然也王充論衡幸偶篇人之有吉凶猶嵗之有豐耗命有盛衰物有貴賤一嵗之中一貴一賤一夀之間一盛一衰物之貴賤不在豐耗人之盛衰不在賢愚王充論衡命義篇害氣下􅑙囚命先中聖王德施厚祿先逢王充論衡偶會篇無祿之人商而無盈農而無播非其性賊貨而命妨䅽也命貧居無利之貨祿惡殖不滋之䅽也王充論衡偶會篇知命之工察骨體之證睹富貴貧賤猶人見盤盂之器知所設用也善器必用貴人惡器必施賤者尊鼎不在陪厠之側匏爪不在堂殿之上眀矣王充論衡骨相篇人之溫病而死也先有凶色見於面部其病遇邪氣也其病不愈至於身死命夀訖也國之亂亡與此同驗有變見於天地猶人溫病而死色見於面部也有水旱之災猶人遇氣而病也災禍不除至於國亡猶病不愈至於身死也王充論衡治明篇草木生於實核出土為栽蘖稍生莖葉成為長短巨細皆由實核王者長巨之最也朱草之莖如鐵紫芝之栽如豆成為瑞矣王者稟氣而生亦猶此也王充論衡初稟篇富家之翁資纍千金生有富骨治生積貨至於年老成為富翁矣夫王者天下之翁也稟氣定於身中猶鳥之别雄雌於卵殼之中也卵殼孕而雌雄生日月至而骨節強強則雄自率將雌雄非生長之後或教使為雄然後乃敢將雌此性氣剛強自為之矣夫王者天下之雄也王充論衡初稟篇百嵗之夀蓋人年之正數也猶物至秋而死物命之正期也物先秋後秋則亦如人死或增百嵗或減百也先秋後秋為期增百減百為數王充論衡氣夀篇百嵗之命是其正也不能滿百者雖非正猶為命也譬猶人形一丈正形也名男子為丈夫尊公嫗為丈人不滿丈者失其正也雖失其正猶乃為形也夫形不可以不滿丈之故謂之非形猶命不可以不滿百之故謂之非命也王充論衡氣夀篇猶珠玉之在山澤天命難知人不耐審雖有厚命猶不自信故必求之也王充論衡命祿篇雖其貧賤使富貴若鑿溝伐薪加勉力之趨致強健之勢鑿不休則溝深斧不止則薪多無命之人皆得所願安得貧賤凶危之患哉然則或時溝未通而遇湛薪未多而遇虎仕宦不貴治産不富鑿溝遇湛伐薪逢虎之類也王充論衡命祿篇貴賤在命不在智愚貧富在祿不在頑慧王充論衡命祿篇命貴之人俱學獨逹並仕獨遷命富之人俱求獨得並為獨成貧賤反此王充論衡命祿篇命貴從賤地自逹命賤從貴位自危故夫富貴若有神助貧賤若有鬼禍王充論衡命祿篇春夏囚死秋冬王相非能為之也日朝出而暮入非求之也天道自然王充論衡命祿篇富不可以籌䇲得貴不可以才能成智慮深而無財才能髙而無官懷銀紆紫未必稷契之才積金纍玉未必陶朱之智王充論衡命祿篇夫一棲之雞一欄之羊賔至而有死者豈居異哉故命有制也知命者則不滯於俗矣嵇中散集宅無吉凶攝生論公侯之命稟之自然不可陶易宅是外物方圓由人有可擇之理猶西施之潔不可為而西施之服可為也黼黻芳華所以助貌吉宅之家所以成相嵇中散集答釋難宅無吉凶攝生論明暗者才也自然而不可飾焉窮逹者時也有會而不可力焉吕尚非早蔽而晚智然振素而僅遇韓信非初怯而末勇然危困而後逹抱朴子外篇廣譬安於命者無往而非逍遙矣故雖匡陳羑里無異於紫極間堂也郭子注莊秋水夫命之窮逹猶金玉木石也修以學藝猶磨瑩雕刻也金玉之磨瑩自美其礦璞木石之假塊自醜其雕刻安可言木石之雕刻乃勝金玉之礦璞哉不得以有學之貧賤比於無學之富貴也顔氏家訓務學莊薑適衛美而無寵癭瘤適齊醜而蒙幸遇不遇也遇不遇命也賢不賢性也怨不肖者不通性也傷不遇者不知命也劉子遇不遇諸子以顔冉季路逢災蹈禍或疑其身或非其師是由魍魎問景乃未得有已也言魍魎責景之無操不知景之行止而有待或非三子之行殊不知吉凶之有命也李善注文選幽通賦才非不傑也主非不明也而碎結緑之鴻輝殘懸黎之夜色抑尺之量有短哉文選劉峻辨命論譬天王之冕旒任百官以司職而或者覩湯武之龍躍謂戡亂在神功聞孔墨之挺生謂英睿擅竒響視彭韓之豹變謂鷙猛致人爵見張桓之朱紱謂明經拾青紫豈知有力者運之而趨乎文選劉峻辨命論薺與麥兮夏零蘭桂踐霜逾馨祿命懸天難明廣文選傳休奕董逃行歷九秋篇修心而不知命猶無室而歸意林公孫文子辨命論曰顔回敗其叢蘭冉耕歌其芣苡爾雅翼女蘿譬如陶家作諸瓦器或始作而破者或欲成刀治壞時破者或在磚上破者或下時破者或著地時破者或拍時破者或壞燥時破者或窰中破者或熟時破者或移時破者或用時破者修行道地經五隂成敗品和同妻子好去聲合如鼓瑟琴詩小雅棠棣伯氏吹塤音塤仲氏吹箎音池及爾如貫諒不我知詩小雅何人風而有雨則潤澤行朋友同志則恩愛成鄭氏箋詩谷風江水大汜水小然得並流似嫡媵宜俱行鄭氏箋詩江有汜芬香之酒醴饗燕賓客則多得其歡心鄭氏箋詩載芟百室者出必共洫間而耕入必共族中而居又有祭酺合醵之歡鄭氏箋詩良耜共情性之和上下相親與琴瑟之音宫商相應無異若與琴瑟為友然毛詩正義關雎今譬于草木寡君在君君之臭味也左傳襄公八年和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然左傳昭公二十年吾從子如驂之靳左傳定公九年君子敬而無失與人恭而有禮四海之內皆兄弟也論語顔淵鳥獸不可與同羣吾非斯人之徒與而誰與論語微子爾為爾我為我雖袒裼裸裎於我側爾焉能凂我哉孟子公孫丑上漁父曰夫聖人者不凝滯於物而能與世推移舉世混濁何不隨其流而揚其波衆人皆醉何不餔其糟而啜其醨何故懷瑾握瑜而自令見放為史記屈原傳事以類相從聲以音相應陸子術事聖人不賤石而貴玉視之如一河上公注老子巧用今夫暗飲者非嘗不遺飲也使之自以平則雖愚無失矣是故不同於和而可以成事者天下無之矣淮南子説山訓四馬不和取道不長父子不和其世破亡兄弟不和不能久同夫妻不和家室大凶説苑敬慎比目附翼歡樂相得行止集同終不離忒焦氏易林需之蹇鹿得美草鳴呼其友九族和睦不憂飢乏焦氏易林比之比一室十子同心異母以義防患禍災不起焦氏易林大有之小畜宫商既和聲音相隨焦氏易林謙之同人白鳥銜餌烏呼其子施枝張翅來從其母焦氏易林晉之震宫商角徴五音和起君臣父子弟順有序焦氏易林渙之恆次五和釋之脂四國之夷測曰和釋之脂民説無疆也太玄經第二釋次二上厯施之下律和之非則否皮被切大玄經第三應次二白黑菲菲三禽一角同尾測曰三禽一角無害心也太玄經第四昆夫酸鹹甘苦不同嘉味以濟謂之和羮宫商角徴不同嘉音以章謂之和聲臧否損益不同中正以訓謂之和言趨舍動靜不同雅度以平謂之和行申鑒雜言上不和于民而和于瑟瑟何利于國哉和瑟之音在妾和民之性在君君誠以妾之寵寵于衆以瑟之和和于民則妾雖就鼎鑊之戮而諸侯皆以明歸君也天祿閣外史齊婦身中空虛和氣所行為隂故腎雙為陽故心特隂陽與和共生物形君臣以和共致太平也淮南子精神訓解泰夰音吳入于囦古淵字回浮于玄傳曰夰入于囦天氣降也回浮于玄地氣騰也元包太隂心同琴瑟言鬱郁於蘭􅉅道協膠漆志婉戀於塤箎文選劉峻廣絶交論一人之身俱生父母四支九竅員職不同五臟六腑各有所受上下不相知中外不相覩頭足為天地肘膝為四海肝膽為胡越眉目為齊楚若不同生異軀殊體動不相因靜不相待九天之上黃泉之下未足以喻之然而頭有疾則足不能行胸有病則口不能言心得所安則耳目聰明屈伸調利百節輕便者以同形也道德經指歸卷八決斷遇雨之吉羣疑亡也易睽官占之法先斷人志後命於元龜孔氏傳書大禹謨若射之有志書盤庚上夫決者智之君也疑者事之役也後漢紀光武一國有元龜可以決大謀朝有公卿可以定進否晉書苻堅下傳吳起之出愛妻文公之斬顛頡皆違其情者也故能使人彈疽者必其忍痛者也韓子外儲説右上次七庚斷甲我心孔碩乃後有鑠測曰庚斷甲義斷仁也太玄經第三斷太公六韜云卜戰龜兆焦筮又不吉太公曰枯骨朽蓍不踰人矣困學紀聞卷十一考史昔有一國王為毒蛇所齧王時欲死呼諸良醫令治蛇毒時諸醫言還令蛇􅾌毒氣乃盡是時諸醫各設呪術所齧王蛇即來王所諸醫積薪然火敕蛇還􅾌汝毒若不爾者當入此火毒蛇思惟我既吐毒云何還􅾌此事劇死思惟定心即時入火大智度論卷二強力田者不強囷倉不盈商賈不強不得其嬴婦女不強布帛不精官御不強其勢不成大將不強卒不使令侯王不強沒世無名故云強者事之始也分之理也物之紀也史記龜䇿傳角知者皆窮角力者皆負形不堪復伉藝不足復校乃始羈首係頸就我之銜紲耳後漢書仲長統列傳明公擁之以為爪牙譬驅虎兕以赴犬羊後漢書鄭康成傳天不可以不剛不剛則三光不明王不可以不強不強則宰牧從橫後漢書丁鴻列傳男以強為貴女以弱為美故鄙諺有云生男如狼猶恐其尫生女如鼠猶恐其虎後漢書列女傳黑卵悍志絶衆力抗百夫筋骨皮肉非人類也延頸承刃披胸受矢鋩鍔摧屈而體無痕撻負其材力視來丹猶雛鷇也列子湯問三虎摶狼力不相當如鷹格雉一擊破亡焦氏易林兊之漸次五躆居預切戰喈喈若熊若螭測曰躆戰喈喈恃力作王也太玄經第三衆夫墾草殖榖農夫之力也勇猛攻戰士卒之力也構架斫削工匠之力也治書定簿佐史之力也論道議政賢儒之力也人生莫不有力所以為力者或尊或卑孔子能舉北門之關不以力自章知夫筋骨之力不如仁義之力榮也王充論衡效力篇鷹擊雀鶚啄雁未必鷹鶚南方雀雁西方自以筋力勇壯相勝服也太平御覽羽族部鷹譬如士夫用力乘船逆流而上身小疲怠船則倒還順流而下雜阿含經卷十八如四大中火最有力能照能燒大智度論卷二十七譬如金翅鳥王普觀諸龍命應盡者以翅摶海令水兩闢取而食之大智度論卷二十七譬如師子有所摶撮不以小物故而改其壯勢大智度論卷三十四如能浮人心欲強故而不沉沒亦如猿猴從髙上墮心力強故身無痛患三昧法門經卷下喻林卷三十七
