body:
  text: 喻林卷六十明徐元太撰人事門五十八愚人衛之諸臣顔色褎然如見塞耳無聞知也人之耳聾恆多笑而已鄭氏箋詩旄丘周子有兄而無慧不能辨菽麥左傳成公十八年痛哉言乎人頭畜鳴史記秦始皇紀此禽鹿視肉人靣而能疆行者耳史記李斯列傳劉表道不相越而欲卧收天運擬蹤三分其猶木禺之於人也後漢書劉表傳論此畏水投舟避坎蹈井愚夫之不若何取於政哉晉書刑法志人有畏影惡跡而去之走者舉足愈數而迹愈多走愈疾而影不離身自以為尚遲疾走不休絶力而死不知處隂以休影處靜以息迹愚亦甚矣莊子漁父今是人之口腹安知禮義安知辭讓安知亷耻隅積亦呥呥而噍鄉鄉而飽己矣人無師無法則其心正其口腹也荀子榮辱夫是之謂上愚曽不如好相雞狗之可以為名也荀子儒效夏首之南有人焉曰㳙蜀梁其為人也愚而善畏明月而宵行俯見其影以為伏鬼也仰視其髮以為立魅也背而走比至其家者失氣而死豈不哀哉故傷於溼而擊鼓鼓痺則必有弊鼓喪豚之費矣而未有俞疾之福也故雖不在夏首之南則無以異矣荀子解蔽解門以為薪塞井以為臼人之從事或時相似淮南子說林訓以篙測江篙終而以水為測惑矣淮南子說林訓魯哀公問孔子曰豫聞忘之甚者徙而忘其妻有諸乎孔子對曰此非忘之甚者也忘之甚者忘其身說苑敬慎有鄙心者不可授便勢有愚質者不可豫利器說苑談叢牛耳聾瞶不曉聲味委以鼎爼治亂潰潰焦氏易林小過之隨含血走禽不曉五音匏巴鼓瑟不悅於心焦氏易林小過之兑擲埴索塗冥行而已矣揚子修身畏舟之危自投於水憂難於處樂其亟决風俗通過譽昔有越人行舟而遇低梁望之乃石梁也溢于潮梁不沒者三尺舟不得進越人鑿其梁力竭而斃頃之潮涸後有涉梁者又待潮而不進有漁者曰子何不踰梁而待潮乎若不踰梁而待是使越人笑於梁烏得為善用其舟乎今王用臣之言而復為越人鑿梁之計謂其賢於鴟夷而忽漁者之論也臣竊惑焉天祿閣外史論學物有異類形有同色白石如玉愚者寶之魚目似珠愚者取之狐貉似犬愚者蓄之骷髏似瓜愚者食之武侯十六䇿察疑以已至之瑞效方來之應猶守株待兔之蹊藏身破置之路也王充論衡宣漢篇不學者雖存謂之行尸走肉耳王子年拾遺記後漢假令有人耻迅走而待野火之燒爇羞逃風而致沈溺於重淵者世必呼之為不曉事也抱朴子內篇勤求此何異乎在紗幌之外不能察軒房之內而肆其倨慢謂人之不見己此亦如竊鍾棖物鏗然有聲惡他人聞之因自掩其耳者之類也抱朴子內篇勤求設令抱危篤之疾須良藥之救而不肯即服須知神農岐伯所以用此草治此病本意之所由則未免於愚也抱朴子內篇對俗過而不改斯誠委夷路而陷叢棘舍嘉㫖而咽鈎吻者也抱朴子外篇疾謬愚者夢中自以為寤故竊竊然以所好為君上所惡為牧圉欣然信一家之偏見可謂固陋矣郭子注莊齊物論盲人以杖擲地而求道雖用白日無異夜行夜行之義面牆之論也楊子法言注吾子篇宋之愚人得燕石於梧屋之側藏之以為大寶周客聞而觀焉主人齊七日端冕𤣥服以發寶華匱十重巾十襲客見俯而掩口盧胡而笑曰此特燕石也其與瓦甓不殊主人大怒曰商賈之言醫匠之心藏之愈固守之彌謹文選應璩百一詩注穿窬之徒不避腰領奔北之士不憚斧鉞意林正部妄進者若卵投石逃誅者若走赴深意林物理論北山愚公者年且九十面山而居懲北山之寒出入之迂也遂率子孫荷擔扣石墾壤箕畚運於北海之尾河曲智叟笑而止之愚公長息曰雖我之死有子在焉子又生孫孫又生子子又生孫孫孫子子無窮匱也而山不加增何苦不平河曲智叟無以應之太平御覽宗親部孫希見食笋歸煮竹根太平御覽竹部竹上房麗者趙之賢人立東門之外有行商車轄亡麗告之悟復更告商人怒曰吾轄自亡何須汝告惠加於己而反怒之吾欲比之草木草木有心矣太平御覽車部敘車下鄭人有逃暑於孤林之下者日流影移而徙袵以從隂及至暮反席於樹下及月流影移復徙袵以從隂而患露之濡於身其隂逾去而其身逾濕是巧於用晝而拙於用夕奚不處曜而辭隂反林自露此亦愚之至也太平御覽人事部真愚盤石千里不為有地愚人千億不為有民太平御覽人事部真愚譬如愚人生便無目雖有光明終不覩見海空智藏經普說品如生育人不識乳色便問他言乳色何似他人答言乳色白如貝盲人復問是乳色者如貝聲邪答言不也復問貝為何似邪答言如稻米味盲人復問乳色柔軟如稻米味邪稻米味者復何所似答曰如雪盲人復言彼米味者冷如雪邪雪復何似答言猶如白鶴是生盲人雖聞如是譬喻終不能得識乳真色元陽妙經卷二譬如愚人畏於天地而欲走避所至之處不離天地大乘妙林經譬如有人欲觀香象身量大小形顯勝劣得而不觀反尋其跡波羅蜜多經卷五百四十六貧窮下劣諸有情類豈貪輪王所有輪寶象寶馬寶珠寶女寶主藏臣寶主兵將寶及餘種種上妙衣服末尼真珠金銀珊瑚大琉璃等多價財寶彼貧窮人設遇獲得自懷慙耻不能受用設復轉賣不知價直所索至微隨酬便與或由於寶無鑒别故心便猒賤而棄捨之當知彼貧窮者非唯不了寶之價直亦復不知寶之名字波羅蜜多經卷五百九十四譬若男子大饑得百味之食不肯食之便食六十味之食道行波羅蜜經卷四譬若男子得象觀其腳是男子為黠不道行波羅蜜經卷四譬如愚夫於四月中服蘇患渴尋詣他所求水而飲他人謂曰汝已服蘇勿復飲水而致命終是時愚夫瞋蔽心故毁呰罵詈不順他言飲水而死大寶積經卷二無智隨順諸煩惱如人癡負怨家行大寶積經卷六十八譬如盲人至大寶洲若行若住若坐若卧不能得見一切衆寶以不見故不能採取大方廣佛華嚴經卷六十譬如人卧出於夢中見所有金銀珍寶父母兄弟妻子親屬知識相與娛樂喜樂無量其覺已為人說之後自淚出念夢中所見般舟三昧經卷上猶如白羊頑騃佷弊大集賢護經卷三有牧牛者愚癡無慧夏末秋初不善觀察恆水此岸亦不善觀察恆水彼岸而驅羣牛峻岸而下峻岸而上中間洄澓多起患難雜阿含經卷四十七如拙取水淈泉揚泥法句經篤信品命盡怙親如盲守燈法句經道行品昔有一人多牧羣牛捨己羣牛數他羣牛以為己用己所有牛或遇惡獸或牛草野日有損耗不自覺知便為衆人所見嗤笑世之愚惑莫甚於鄉認他羣牛以為己有出曜經四無放逸品昔有一人貧窮困乏多負人債無以可償即便逃避至空曠處值篋滿中珍寶有一明鏡著珍寶上以蓋覆之貧人見己心大歡喜即便發之見鏡中人便生驚怖乂手語言我謂空篋都無所有不知有君在此篋中莫見瞋也百喻經卷上譬如估客遊行商賈㑹於路中而駝卒死駝上所載多有珍寶細軟上㲲種種雜物駝既死已即剝其皮商主捨行坐二子弟而語之言好看駝皮莫使濕爛其後天雨二人頑癡盡以好㲲覆此皮上㲲盡濕爛皮㲲之價理自懸殊以愚癡故以㲲覆皮百喻經卷上譬如有人因其饑故食七枚煎餅食六枚半已便得飽滿其人恚悔以手自打而作是言我今飽足由此半餅然前六餅唐自捐棄設如半餅能充足者應先食之百喻經卷上昔有愚人生食胡麻子以為不美熬而食之為美便生念言不如熬而種之後得美者便熬而種之永無生理百喻經卷上昔有一人為王所鞭既被鞭己以馬屎傅之欲令速差有愚人見之心生歡喜便作是言我快得是治瘡方法即便歸家語其兒言汝鞭我背我得好法今欲試之兒為鞭背以馬屎傅之以為善巧百喻經卷上有人癡無智慧極渴須水見熱時𦦨謂為是水即便逐走至新頭河既至河所對視不飲傍人語言汝患渴逐水今至水所何故不飲愚人答言若可飲盡我當飲之此水極多俱不可盡是故不飲百喻經卷上昔有人乘船度海失一銀盂墮於水中即便思念我今畫水作記捨之而去後當取之行經二月到師子諸國見一河水便入其中覔本失盂諸人問言欲何所作答言我先失盂今欲覔取問言於何處失答曰初入海失又復問言失經幾時言失來二月問言失來二月云何此覔答言我失盂時畫水作記本所畫水與此無異是故覔之亦如外道不修正行相似善中橫計苦因以求解脫猶如愚人失盂於彼而於此覔百喻經卷上譬如裸人自言我著天衣大智度論卷六十七如狗患頭瘡蛆蟲所唼食良醫用油治既不識他恩反更向醫吠佛以禪定油熱以智威德除我結使蟲我為無明盲不知為益己大莊嚴經論卷十偈譬如盲子採珠懷赤菽而反以為獲寶聾賔聽樂聞驢鳴而悅用為知音𢎞明集駮夷夏論有似行乎層雲之下而不信日月者也𢎞明集明佛論守膏盲而不悟進良藥而不御而受禍臨死之日更多咎聖人深恨良醫非徒東走其勢投穽矣𢎞明集正證論習近五塵流轉三界黏外道之黐貫天魔之杖於是永淪苦海長墜嶮獄法苑珠林卷八十四著指求月守株求兔尚疑駝馬寧分菽麥雖知歡笑將鷽鷽而不殊徒識語言與狌狌而不異法苑珠林卷八十五衆生迷於少樂而不覺衆苦猶以芥子置於山頂唯見芥子而不覩大山也羅什譯摩詰經方便品不悟貪惡之人見道聽之言則應答之見誦詩書之言則冥卧如醉鄭氏箋詩桑柔昔者有鳥止於魯郊魯君說之為具太牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飲食此之謂以己養養鳥也若夫以鳥養養鳥者宜棲之深林浮之江湖食之以委蛇則平陸而已矣今休欵啓寡聞之民也吾告以至人之德譬之若載鼷以車馬樂鴳以鐘鼓也彼又惡能無驚乎哉莊子達生老𣆀曰胡不直使彼以死生為一條以可不可為一貫者解桎梏其可乎無趾曰天刑之安可解莊子德充符五色為有目者施故無目不可得而示其五色五音為有耳者作故無耳不可得告其五音鬼谷子權篇注鋭毛為毫夏落秋生言君用才邪日以漸染隨之變化而不自知若秋毫更生其容微眇而日長大也王逸注楚辭七諌惟此是喻而終莫悟是觀泰山崇崛而謂元氣不浩芒者也湛張注列子仲尼今語俗人云理中四順可以救霍亂欵冬紫苑可以治咳逆雀蘆貫衆之煞九蟲當歸芍藥之止絞痛秦膠獨活之除人風菖蒲乾薑之止痺濕莬絲蓯蓉之補虛乏甘遂葶歷之逐痰癖括樓黃連之愈消渴薺苨甘草之解百毒蘆如益熱之護衆創麻黃大青之主傷寒俗人猶為不然也抱朴子內篇至理夫聰之所去則震雷不能使之聞明之所棄則三光不能使之見豈輷磕之音細而麗天之景微哉而聾夫謂之無聲焉瞽者謂之無物焉又况絃管之和音山龍之綺祭安能賞克諧之雅韻暐曄之鱗藻哉故聾瞽在乎形器則不信豐隆之與𤣥象矣而况物有微於此者乎暗昧滯乎心神則不信有周孔於在昔矣况告之以神仙之道乎抱朴子內篇論仙况長生之事世所希聞乎望使必信是令蚊虻負山與井䗫論海也抱朴子內篇論仙其事雖天之明而人處覆甑之下焉識至言哉抱朴子內篇論仙盛陽不能榮枯朽上智不能移下愚書為曉者傳事為識者貴農夫得彤弓以驅鳥南夷得衮衣以負薪夫不知者何可強哉抱朴子內篇金丹俗有聞猛風烈火之聲而謂天之冬雷見遊雲西行而謂月之東馳人或告之而終不悟抱朴子內篇塞難勛華不能化下愚故教不行於子弟辛癸不能改上智故惡不染於三仁抱朴子外篇博喻不知至言之極妙而以為狂而不信此知之聾盲也郭子注莊逍遙遊夫投人夜光鮮不案劒者未達故耳今回之德信與其不爭之名彼所未達而強以仁義凖繩於彼彼將謂回欲毁人以自成也郭子注莊人間世大聲非委巷所尚俗人得嘖曲則同聲動笑此天下所以未嘗用聖而嘗自用也郭子注莊天地夢飲酒者旦而哭泣夢哭泣者旦而田獵方其夢地不知其夢也夢之中又占其夢焉覺而後知其夢也且有大覺而後知此其大夢也而愚者自以為覺竊竊然知之君乎牧乎固哉莊子齊物論是猶對牛鼓簧耳彼竟不明故己之道術終於昧然也郭子注莊齊物論雷風非不烈不能動聾瞶聖教非不服不能化頑嚚揚子法言注問明篇世俗不悟求仙而怨天施之偏又歎浮生之促類潛穎怨青陽之晚臻陵苕哀素秋之早至也李善注文選郭景純遊仙詩凡人心是所學體安所習鮑肆不知其臭玩其所以先入文選東京賦濁者不信淵之清而甘濯其濁矣意林化清經幽隱長夜未覩山北之燭沈迷逺路詎見司南之機藝文類聚內典部寺碑慧日已照而大夜莫曉香雨時流而深塵未息藝文類聚內典部寺碑眇眇世羅無能免其一目泛泛欲網孰敢解其三面藝文類聚內典部寺碑蠕蠕而蠢切之民昔來號為頑嚚每來抄掠駕牸牛奔遁驅犍牛隨之牸牛不能前異部人教其以犍牛易之者蠕蠕曰其母尚不能行而况其子終於不易遂為敵所虜太平御覽人事部癡胡人見錦不信有蟲食樹吐絲所成者在江南不信有千人氈帳及來河北不信有萬石舟船太平御覽資産部蠶天老謂黃帝曰太陽之草名黃精餌之可以長生太隂之草名鈎吻入口立死人信鈎吻之殺人不信黃精之益夀不亦惑乎事類賦草部草注譬如瘖啞者不能傳人言為聾彈宫商其人豈能聞西升經譬如日月乘天普照而盲者不覩非日月不照又如大地能生隨緣而種皆得果實而愚者不種非地不生無上內祕藏經辨相明部襄品譬如惡子不受師長父母教誨無惡不造海空智藏經持誡品亦如孩童性愛戲弄父母約束或得餉時從以誨示心終不轉或加憷撻亦不能悟玉清經通濟幽冥品此又晨蜉之語嵗夢蝶之議覺乎波羅蜜多經卷五百三十八彼如生盲不見衆色嬰兒七日不見日輪波羅蜜多經卷五百六十七譬如惡馬不受被甲若同良馬為被甲者反生驚怖大寶積經卷二譬如有人癡狂心亂為作音樂不能了知大集地藏十輪經卷六譬如跋陀惒愚癡之子有人與滿手栴檀香不肯受之反謂與之不淨栴檀香貨主語其人言此栴檀香卿莫謂不淨乎且取嗅之知香不試視之知淨不癡人閉目不視不肯嗅般舟三昧經卷上譬如人到大海名珍寶摩尼處其價不可計數其人於珍寶中住而不知摩尼珠價若有一人謂其住寶中者今在是中寧知摩尼處不其人反言不曉所以者何其人不知摩尼珠故文殊師利問菩薩署經悲八譬如有人從生而盲不識五色青黃赤白粗細長短亦不見日月星象丘陵溝壑有人問言青黃赤白五色云盲人答曰無有五色如是粗細長短日月星象山陵溝壑皆言無有長阿含經卷七時有一人好喜養猪詣他空村見有乾糞尋自念言此處饒糞我猪豚饑今當取草裹此乾糞頭戴而歸即尋取草裹糞而戴於其中路逢天大雨糞汁流下至於足跟衆人見已皆言狂人糞塗臭處正使天隂尚不可戴况於雨中戴之而行其人方怒逆罵詈言汝等自癡不知我家猪豚饑餓汝若知者不言我癡長阿含經卷七譬如路側清涼池水香味具足有人以毒著中陽春之月諸行路者風熱渴逼競來欲飲有人語言士夫此是清涼池色香味具足然中有毒汝等勿飲若當飲者或令汝死或近死苦而彼渴者不信而飲雖得美味須㬰或死或近死苦雜阿含經卷十二生盲之人本自不見青黃赤白細妙粗惡長短色相便作是言本無如是青黃赤白細妙粗惡長短色相大正句王經上是諸衆生不知正法微妙之味如鳥不知蓮華之味本緣經持王子品猶如一趣之道有大火坑行人經過先不諳道明者指授語行人曰中道有大火坑不得經過卿等可於此息意勿復前行諸人意勇不信其語各共進前皆墮火坑受痛甚苦號天喚呼悔亦無及出曜經八行品昔有居士誡勑家人以雉為食先持雉肉著釡中然後方覔火㸑之不覺有蛇來墮於釡中煮之居士食法要當問師師曰此不可食不從師教遂便食之經宿蛇毒內發方更問師師曰不從我命知當如何出曜經八行品如人以指指月以示惑者惑者視指而不視月人語之言我以指指月令汝知之汝何看指而不視月大智度論卷九譬如金寶盲者不識大智度論卷五十七如良醫知病說藥服與不服非醫咎也又如善導導人善道聞之不行非導過也遺教經論離十二工輸能與人斧斤繩墨而不能使人巧聖人能授人道不能使人履而行之也臯陶能罪盜人不能使貪夫為夷齊五刑能誅無狀不能使惡人為曾閔堯不能化丹朱周公不能訓管蔡豈唐教之不著周道之不備哉然無如惡人何也𢎞明集牟子理惑論若說佛經之語談無為之要譬對盲者說五色為聾者奏五音也師曠雖巧不能彈無絃之琴狐狢雖煴不能熱無氣之人公明儀為牛彈清角之操伏食如故非牛不聞不合其耳矣轉為蚊虻之聲孤犢之鳴即掉尾奮耳蹀躞而聽𢎞明集牟子理惑論夫淳曦麗天矇瞍莫鑒其色雷霆駭地聾夫弗聆其響者蓋機感之絶也作暴凶跖孔智無以遏其心結憤野夫賜辨莫能蠲其忿亦情性之殊也辨正論卷六九土區分四生殊俗昏波易染慧業難基久復愛河長流苦海不生意樹未啓心燈法苑珠林卷八夫迷其流者則澄愛河而清五濁失其宗者則震邪山而起三障法苑珠林卷六十八兩失六五以羇旅之身進居貴位其位終不可保譬之射雉惟有一矢射之而復亡失其矢其雉終不可得周易正義旅頓子曰天下有有其實而無其名者商人是也無把銚推耨之勢而有積粟之實此有其實而無其名者也無其實而有其名者農夫是也解凍而耕暴背而耨無積粟之實此無其實而有其名者也無其名又無其實者王乃是也已立為萬乘無孝之名以千里養無孝之實戰國䇿秦始皇帝譬若衣敗壞一以相補猶有所完若不如此將兩無所保後漢書虞詡列傳凡黃白之在馬猶親踈之在人私親而背䟱則踈者叛矣踈者離叛則親不能獨存矣公孫龍子白馬論注負子而登墻謂之不祥為其一人隕而兩人殤淮南子說林訓騎豚逐羊不見所望徑涉虎廬亡豚失羊焦氏易林賁之中孚逐金出門并失玉几焦氏易林復之噬嗑無為握無形之風捕難執之影索不可得之物行必不到之路棄榮華而涉苦困釋甚易而攻至難有似喪者之逐遊女必有兩失之悔抱朴子內篇論仙所謂進不得邯鄲之步退又失夀陵之義者也抱朴子內篇雜應動則不能龍攄虎超同機伊霍靜則不能珠潜璧匿連光巢許廣文選伏公表與阮步兵書董仲舒學見深而天才鈍以蜉蜂是神龍者非但不識神龍亦不識蜉蜂意林抱朴子譬如壞瓶多諸瑕隙盛油乳等盡皆滲漏能盛所盛二俱壞失所以者何器有失故大集地藏十輪經卷六昔雪山中有鳥名為共命一身二頭一頭常食美果欲使身得安隱一頭便生嫉妬之心而作是言彼常云何食好美果我不曽得即取毒果食之使二頭俱死雜寶藏經卷三譬如人和毒藥自飲亦復行飲人身自苦亦復苦他人身那先比丘經卷中昔有一人事須火用及以冷水即便宿火以澡盥盛水置於火上後欲取火而火都滅欲取冷水而水復熱火及冷水二事俱失世間之人亦復如是入佛法中出家求道既得出家還復念其妻子眷屬世間之事五欲之樂由是之故失其功德之火持戒之水百喻經卷上昔有二估客共行商賈一賣真金其第二者賣兜羅錦有他買真金者燒而試之第二估客即便偷他被燒之金用兜羅錦裹時金熱故燒錦都盡情事既露二事俱失百喻經卷上昔有二人共種甘蔗而作誓言重好者賞其不好者當重罰之時二人中一者念言甘蔗極甜若壓取汁還灌甘蔗樹甘美必甚得勝於彼即壓甘蔗取汁用溉冀望滋味反敗種子所有甘蔗一切都失世人亦爾欲求善福恃己豪貴專形挾勢迫脅下民陵奪財物以用作福本期善果不知將來反獲其殃如壓甘蔗彼此都失百喻經卷上昔有一人先甕中盛榖駱駝入頭甕中食榖後不得出既不得出以為憂惱有一老人來語之言汝莫愁也我教汝出汝用我語必得速出汝當斬頭自得出之即用其語以刀斬頭既復殺駝而復破甕百喻經卷下昔有一獼猴持一把豆誤落一豆在地便捨手中豆欲覔其一未得一豆先所捨者雞鴨食盡百喻經卷下昔有二人為伴共行曠野一人披一領㲲中路為賊所剝一人逃避走入草中其失㲲者先於㲲頭裹一金錢便語賊言此衣適可值一枚金錢我今求以一枚金錢而用贖之賊言金錢今在何處即便㲲頭解取示之而語賊言此是真金若不信我語今此草中有好金師可往問之賊既見已復取其衣如是愚人㲲與金錢一切都失百喻經卷下譬如一師有二弟子其師患腳遣二弟子人當一腳隨時按摩其二弟子常相憎嫉一弟子行其一弟子捉其所當按摩之腳以石打折彼既來已忿其如是復捉其人所按之腳尋復打折佛法學徒亦復如是方等學者非斥小乘小乘學者復非方等故使大聖法典二途兼忘百喻經卷下譬如雹墮害榖雹自消滅大智度論卷四十三譬如救溺自不能浮而欲濟彼二俱不免大智度論七十七昔有二毗舍闍鬼共有一篋一杖一屐二鬼共諍各欲得二二鬼紛紜竟日不能使平時有一人來見之已而問之言此篋杖屐有何竒異汝等共諍瞋忿乃爾二鬼答言我此篋者能出一切衣服飲食牀褥卧具資生之物盡從中出執此杖者怨敵歸伏無敢與諍著此屐者能令人飛行無有罣礙此人聞已即語鬼言汝等小逺我當為爾平等分之鬼聞其語尋即逺避此人即時抱篋捉杖躡屐而飛二鬼愕然竟無所得人語鬼言爾等所諍我已得去今使爾等更無所諍法苑珠林卷四十五昔有婦人富有金銀與男子交通盡取金銀衣物相遂俱去到一急水河邉男子語言汝持財物來我先度之當還迎汝男子度已便走不還婦人獨住水邉憂苦無人可救唯見一野狐捕得一鷹復見河魚捨鷹拾魚魚既不得復失本鷹婦語狐曰汝何太癡貪捕其兩不得其一狐言我癡尚可汝癡劇我也法苑珠林卷五十四喻林卷六十
