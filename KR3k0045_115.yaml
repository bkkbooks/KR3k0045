body:
  text: 喻林卷一百十五明徐元太撰性理門六齊物天下莫大於秋毫之末而太山為小莫夀於殤子而彭祖為夭天地與我並生而萬物與我為一莊子齊物論無物不然無物不可故為是舉莛與楹厲與西施恢恑譎怪道通為一莊子齊物論自其異者視之肝膽楚越也自其同者視之萬物皆一也莊子德充符統小大者無小無大者也茍有乎小大則雖大鵬之與斥鴳宰官之與御風同為纍物耳齊死生者無死無生者也茍有乎死生則雖大椿之與蟪蛄彭祖之與朝菌均於短折耳故遊於無小無大者無窮者也冥乎不死不生者無極者也郭子注莊逍遙遊魚遊於水水物所同咸謂之知然自鳥觀之則向所謂知者復為不知矣郭子注莊齊物論簫管參差宫商異律故有短長髙下萬殊之聲而所禀之度一也然則優劣無所錯其間矣郭子注莊齊物論無小大無夀夭是以蟪蛄不羡大椿而欣然自得斥鴳不貴天池而榮願已足也郭子注莊齊物論所大者性足也所小者無餘也故因其性足以名大則毫末丘山不得異其名因其無餘以稱小則天地稊米無以殊其稱郭子注莊秋水所謂大者至足也故秋毫無以纍乎天地所謂小者無餘也故天地無以過乎秋毫郭子注莊秋水夫以形相對則太山大於秋毫也若各據性分物冥其極則形大未為有餘形小不為不足茍足於其性則秋毫不獨小其小太山不獨大其大矣郭子注莊齊物論譬夫莛橫楹縱厲醜而西施好所謂齊者豈必齊形狀同規矩哉故縱橫好醜恢恑譎怪形雖萬殊而性同得故曰道通為一也郭子注莊齊物論夫天地運而相通萬物總而為一能知一則無一之不知也不能知一則無一之能知也譬吾處於天下也亦為一物矣淮南子精神訓别而言之則鬚眉異名合而說之則體之一毛也廣文選阮嗣宗莊論人在天地之間如蚤蝨在衣裳之內若螻蟻在巢穴之中意林論衡一舟之覆無一毫不濕一馬之走無一毫不動故大同萬物不一也太平御覽獸部馬五以長形長則無長以短比短則無短故曰長短相形而有也道德經疏卷一見玉京山不以為高無長相故見諸堆峊不以為卑無短相故見諸騫樹不以為賖無夀相故見諸槿花不以為促無夭相故見大羅天不以為遍無大相故見諸毫末不以為細無小相故大乘妙林經若得珍寶瓦石視之一等若有持刀斫截手足有持栴檀塗身亦等無異大智度論卷三達觀怵迫之徒兮或趨西東大人不曲兮億變齊同拘士繫俗兮攌如囚拘史記賈生傳寥廓忽荒兮與道翺翔乘流則逝兮得坻則止縱軀委命兮不私與已其生若浮兮其死若休淡乎若深淵之靜泛兮若不繫之舟史記買生傳萬物皆賤惟人為貴動以九州為狹靜以環堵為大晉書董京傳以造化為工匠天地為陶鈞名位為糟粕勢利為埃塵治其內而不飾其外晉書潘尼傳且世以太虛為輿𤣥爐為肆神游莫競之林心存無營之室晉書束晢傳天地短於朝生兮億代促於始旦顧瞻宇宙微細兮眇若豪鋒之半晉書庾峻傳人之寓於宇宙也何異夫棲蝸之爭戰附蚋之遊禽梁書張緬弟纘傳世之人以獨見者為夢同見者為覺殊不知精之所結亦有一人獨見於晝者神之所合亦有兩人同夢於夜者二者皆我精神孰為夢孰為覺關尹子六七古者謂死人為歸人夫言死人為歸人則生人為行人矣行而不知歸失家者也一人失家一世非之天下失家莫知非焉列子天瑞原憲窶於魯子貢殖於衛原憲之窶損生子貢之殖纍身然則窶亦不可殖亦不可其可焉在曰可在樂生可在逸身故善樂生者不窶善逸身者不殖列子楊朱死生自命也貧窮自時也怨夭折者不知命者也怨貧窮者不知時者也當死不懼在窮不戚知命時也列子力命夫信命者亡夀夭信理者亡是非信心者亡順逆信性者亡安危列子力命麗之姬艾封人之子也晉國之始得之也涕泣沾襟及其至于王所與王同筐牀食芻豢而後悔其泣也子惡乎知夫死者不悔其始之蘄生乎莊子齊物論以指喻指之非指不若以非指喻指之非指也以馬喻馬之非馬不若以非馬喻馬之非馬也天地一指也萬物一馬也莊子齊物論彼以生為附贅縣疣以死為決􅪵潰癰夫若然者又惡知死生先後之所在莊子大宗師浸假而化豫之左臂以為雞豫因以求時夜浸假而化豫之右臂以為彈豫因以求鶚炙浸假而化豫之凥以為輪以神為馬豫因而乘之豈更駕哉莊子大宗師曾子再仕而心再化曰吾及親仕三釡而心樂後仕三千鍾不泊吾心悲弟子問於仲尼曰若參者可謂無所縣其罪乎曰既已縣矣夫無所縣者可以有哀乎彼視三釡三千鍾如鸛雀蚊虻相過乎前也莊子寓言吾以天地為棺槨以日月為連璧星辰為珠璣萬物為齎送吾葬具豈不備邪莊子列禦寇夫天下也者萬物之所一也得其所一而同焉則四肢百體將為塵垢而死生終始將為晝夜而莫之能滑而况得喪禍福之所介乎棄𨽻者若棄泥塗知身貴於𨽻也莊子田子方以道為竿以德為綸禮樂為鉤仁義為餌投之於江浮之於海萬物紛紛孰非其有淮南子俶真訓夫藏舟於壑藏山於澤人謂之固矣雖然夜半有力者負而趨寐者不知猶有所遁若藏天下於天下則無所遁其形矣淮南子俶真訓若人者千變萬化而未始有極也弊而復新其為樂也可勝計耶譬若㝱為鳥而飛于天㝱為魚而沒於淵方其㝱也不知其㝱也覺而後知其㝱也今將有大覺然後知今此之為大㝱也始吾未生之時焉知生樂也今吾未死又焉知死之不樂也淮南子俶真訓上子求行年五十有四而病傴僂脊管高于頂􅠽下迫頥兩脾在上燭營指天匍匐自窺於井曰偉哉造化者其以我為此拘拘邪此其視變化亦同矣淮南子精神訓夫造化者既以我為坯矣將無所違之矣吾安知夫刺炙而欲生者之非惑也又安知夫絞經而求死者之非福也或者生乃徭役也而死乃休息也夫造化者之攫援物也譬猶陶人之埏埴也其取之地而已為盆盎也與其未離於地也無以異其已成器而破碎漫瀾而復歸其故也與其為盆盎亦無以異矣夫臨江之鄉居人汲水以浸其園江水弗憎也苦汙之家決汙而注之江汙水弗樂也是故其在江也無以異其浸園也其在汙也亦無以異其在江也是故聖人因時以安其位當世而樂其業淮南子精神訓廓惝而虛清靖而無思慮大澤焚而不能熱河漢涸而不能寒也大雷毁山而不能驚也大風晦日而不能傷也是故視珍寶珠玉猶石礫也視至尊窮寵猶行客也視毛嬙西施猶䫏醜也以死生為一化以萬物為一方淮南子精神訓魯人有為父報讎於齊者刳其腹而見其心坐而正冠起而更衣徐行而出門上車而步馬顔色不變其御欲驅撫而止之曰今日為父報讎以出死非為生也今事已成矣又何去之追者曰此有節行之人不可殺也解圍而去之使被衣不暇帶冠不及正蒲伏而走上車而馳必不能自免於千步之中矣今坐而正冠起而更衣徐徐而出門上車而步馬顔色不變此衆人之所以為死也而乃反以得活此所謂徐而馳遲於步也夫走者人之所以為疾也步者人之所以為遲也今反乃以人之所為遲者反為疾明於分也有知徐之為疾遲之為速者則幾於道矣故黃帝亡其𤣥珠使離朱捷剟索之而弗能得之也於是使忽恍而後能得之淮南子人間訓人不當惡死死復歸其未生之故耳譬猶瓦器之破而復反於土也淮南子精神訓解大丈夫以天下為室以藏萬物淮南子俶真訓解夫期功於旦夕者聞嵗暮而致歎取美於當年者在身後而長悲此故俗士之近心一世之常情也至於大人以天地為一朝億代為曠息張湛注列湯問以仁義為關鍵用禮教為襟帶自枯槁於當年求餘名於後世者是不達乎生生之極也張湛注列楊朱安時處順謂之懸解一不能自解則衆物共結之能解則無所不解也郭子注莊大宗師若疣之自縣贅之自附此氣之時聚非所樂也若􅪵音換之自決癰之自潰此氣之自散非所惜也郭子注莊大宗師孰能以無為首以生為脊以死為凥苦羔反孰知死生存亡之一體者吾與之友矣莊子大宗師以死生為寤寐以形體為逆旅去生如脫屣斷足如遺土吾未見足以纓茀其心也郭子注莊德充符少而失其故居名為弱喪夫弱喪者遂安於所在而不知歸於故鄉也焉知生之非夫弱喪焉知死之非夫還歸而惡之哉郭子注莊齊物論夫死生之變猶春秋冬夏四時行耳故生死之狀雖異其於各安所遇一也郭子注莊齊物論有大人先生以天地為一朝萬期為須臾日月為扄牖八荒為庭衢行無轍跡居無室廬幕天席地縱意所如文選劉伶酒德頌俯觀萬物擾擾焉如江漢之載浮萍二豪侍側焉如蜾螺之與螟蛉文選劉伶酒德頌死為休息生為役勞冬水之凝何如春氷之消榮位在身不亦輕於塵毛補文選張衡髑髏賦木根挺而枝逺葉繁茂而華零無窮之死猶一朝之生廣文選阮嗣宗大人先生傳枝葉托根柢死生同盛衰廣文選阮嗣宗大人先生傳若先生者以天地為卵耳如小物細人欲論其長短議其是非豈不哀也哉廣文選阮嗣宗大人先生傳榮體變為枯體枯體即是榮體絲體變為縷體縷體即是絲體有何别焉廣文選范子真神滅論彭殤無異葬夷跖可同朝龍蠖非不屈鵬鷃但逍遙藝文類聚人部謳謠太公涓釣於隱溪五十有六而未嘗得一魚魯連聞而觀焉太公涓跽而隱崖不餌而釣仰咏俯吟暮則釋竿其膝所處若背其跗觸崖若路魯連曰釣所本以在魚無魚何釣太公曰不見康王父之釣耶念蓬萊釣巨海摧岸投綸五百年矣未嘗得一魚方吾猶一朝耳太平御覽鱗介部魚以造化為父母以天地為牀褥以雷電為鼓扇以日月為燈燭以雲漢為川池以星辰為珠玉初學記禮部死喪注吾與𤣥子觀東海釋駟而升乎􅵺山未中路而忘馬符子使人求之不獲使鬼索之而獲符子曰六合不可忘故知良馬在其中矣請以六合之觀觀之也事類賦獸部馬注夫以今望昔所以有今以昔望今所以名昔而今自非今何能有昔昔自非昔豈有今哉既其無昔無今何先何後道德經注疏卷一草木零落歸根則靜人物變化反真則安道德經注疏卷二譬如有人於夜中夢見種種事或夢自身被官囚縛受種種苦生大憂惱然後得脫須臾更夢作大國王威勢自在受大快樂即於夢中作念言我向作時受苦如是今復自在受大快樂作是念已忽然睡覺苦樂之事莫知所在海空智藏經普記品衆生世間猶如幻師所作幻術無有決定又如夜夢所有見事皆悉虛妄無有真實大乘妙林經智者觀生死猶如大幻師土梗何曾走木雞詎翔空大乘妙林經偈衆生飄浪如虛中雲如空中色如谷中響如水中月如鏡中像如熱中炎如電中火大乘妙林經聞詈劇絲竹之娛得捶喻捧戴之悅波羅蜜多經五百八十九卷序夫永夀莫美乎上乾而齊之殤子神偉莫美於淩虛而同之􅀈滯至德莫大乎真人而比之朽種高妙莫大乎世雄而喻之幻夢道行波羅蜜經序卷一譬如陶師埏埴成器內盛臭穢彩畫嚴飾誑惑愚夫又如四蛇置之一篋如是四大和合為身一大不調百一病起是故智者應觀此身如養毒蛇如持坯器大方廣佛華嚴經卷十一佛言吾視王侯之位如塵隙視金玉之寶如瓦礫視紈素之服如弊帛視大千世界如一訶子視四耨水如塗足油視方便門如筏實聚視無上乘如夢金帛視求佛道如眼前花視求禪定如須彌柱視求涅槃如晝夜寤視倒正者如六龍舞視平等者如一真地視興化者如四時木佛說四十二章經尺一暫得為人譬如作客作客日少歸家日多佛說五苦章句經尺七一切過患由生而有譬如無薪火無所燒亦如無樹斧無所斫亦如無瓶椎何所破如無藕花霜何所敗無明羅剎經若有山者金剛必壞若無山者金剛雖堅何所能壞凡有身者必有諸苦若無身者苦何所苦無明羅剎經精神居形軀猶雀藏器中器破雀飛去身壞神逝生法句經生死品萬物為泡意如野馬居世若幻奈何樂此法句經世俗品人在生死譬如車輪反覆上下而不離地修行道地經菩薩品是身如聚沫不可手捉是身如海不厭五欲是身如江歸於淵海趣老病死是身如糞明智所捐是身如沙城疾就磨滅是身如邊土多覩怨賊是身如險道常失善法是身如博家百八愛所立是身如裂器常而穿漏是身如畫瓶中滿不淨是身如溷九孔常流是身如水瀆悉為瑕穢是身如幻以惑愚人不識正諦是身如䔉燒毒身心是身如萎華疾至老耄是身如車與無常俱是身如露不得久立是身如宅四百四病之所居止是身如篋毒蛇所處是身如蚖瞋火常燃是身如顚國十八結所由是身如芭蕉樹而不堅固是身如破船六十二見為之所惑是身如朽閣傾壞善相是身如琴因絃有聲是身如鼓皮木褁覆計之本空是身如壞無有堅固是身如灰城風雨所壞歸老病死修行道地經觀品父子二人耕田毒蛇􅀈煞其子其父猶耕如故不看其子亦不啼哭梵志問曰此是誰兒耕者答言是我之子梵志又問是卿之子何不啼哭耕者答曰人生有死夫盛有衰善者有報惡者有對愁憂啼哭無益死者卿今入城我家某處願過語之吾子已死持一人食來梵志自念此是何人而無返復兒死在地情不愁憂反更索食此人不慈無復此比梵志入城詣耕者家見死兒母即便語之卿兒已死其夫寄言持一人食來梵志曰何以不念子耶兒母即為梵志說譬喻言兒來託生我亦不呼兒今自去非我不留譬如行客因過主人客今自去何能得留我之母子亦復如是去來進止非我之力隨其本行不能救護復語其姊卿弟已死何不啼哭姊復說譬喻向梵志言譬如巧師入山斫木縳作大筏安置水中卒逢大風吹破筏散隨水流去前後分張不相顧望我弟亦爾因緣和合共一家生隨命長短死生無常合㑹有離我弟命盡各自所隨不能救護復語其婦卿夫已死何不啼哭婦說喻向梵志言譬如飛鳥暮宿高樹同止共宿伺明早起各自飛去行求飲食有緣即合無緣即離我等夫婦亦復如是無常對至隨其本行不能救護復語其奴大家已死何不啼哭奴復說譬喻言我之大家因緣和合我如犢子隨逐大牛人煞大牛犢子在邊不能救護大牛之命愁憂啼哭無所補益法苑珠林卷五十二夫五陰虛假四大浮危受斯僞質事等盡瓶感此穢刑又同坯哭法苑珠林卷九十四雖復回天震地之威㑹歸磨滅齊冠楚組之麗靡救埃壤所以形非定質衆緣所聚四塵不同風火恆異析而離之本非一物燕肝越膽未足為譬法苑珠林卷九十六如外地古今相傳强者先宅故無主也身亦然爾衆緣所成緣合則起緣散則離何有真宰常主之者僧肇注維摩詰經方便品新新生滅交臂已謝豈待白首然後為變乎僧肇注維摩詰經方便品賊性宋哀云使曲者直直者曲為揉周易音義卦馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之真性也雖有義臺路寢無所用之及至伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皂棧馬之死者十二三矣饑之渴之馳之驟之整之齊之前有撅飾之患而後有鞭莢之威而馬之死者已過半矣陶者曰我善治埴圓者中規方者中矩匠人曰我善治木曲者中鉤直者應繩夫埴木之性豈欲中規矩鉤繩哉然且世世稱之曰伯樂善治馬而陶匠善治埴木此亦治天下者之過也故至德之世其行填填其世顛顛及至聖人蹩躠為仁踶跂為義而天下始疑矣澶漫為樂摘劈為禮而天下始分矣故純朴不殘孰為犧樽白玉不毁孰為圭璋道德不廢安取仁義性情不離安用禮樂五色不亂孰為文采五聲不亂孰應六律夫殘朴以為器工匠之罪也毁道德以為仁義聖人之過也夫馬陸居則食草飲水喜則交頸相靡怒則分背相踶馬知已此矣夫加之以衡扼齊之以月題而馬知介倪闉扼鷙曼詭銜竊轡故馬之知而能至盜者伯樂之罪也莊子馬蹄鹵莽其性者欲惡之孽為性雈葦蒹葭始萌以扶吾形尋擢吾性並潰漏發不擇所出漂疽疥癰內熱溲膏是也莊子則陽百圍之木斬而為犧尊鏤之以剞􅕻雜之以青黃華藻鏄鮮龍蛇虎豹曲成文章然其斷在溝中一比犧尊溝中之斷則醜美有間矣然而失木性鈞也是故神越者其言華德蕩者其行僞至精亡於中而言行觀於外此不免以身役物矣淮南子俶真訓上夫混茫以無名為貴羣生以得意為歡故剝柱刻漆非木之願拔鶡裂翠非鳥所欲促促銜鑣非馬之性荷軛運重非牛之樂抱朴子外篇詰鮑煎熬形氣刻削天和抱朴子內篇道意或好知不倦以困其百體所好不過一枝而舉根俱弊斯以其所知而害所不知也郭子注莊大宗師言其將以形教自虧殘而不能復遊夫自得之場無係之塗也郭子注莊大宗師駢於拇者謂之不足故泣而決之枝於手者謂之有餘故啼而齕之如是則羣品萬殊無釋憂之地矣惟各安其天性不決駢而齕枝則曲成而無傷又何憂哉郭子注莊駢拇天下未嘗慕桀跖而必慕曽史則曾史之簧鼓天下使失其真性甚於桀跖也郭子注莊駢拇夫有耳目者未嘗以慕聾盲自困也所困常在於希離慕曠則離曠雖性聰明乃是亂耳目之主也郭子注莊駢拇雈葦害黍稷欲惡傷正性郭子注莊則陽情之傷性性之妨情猶煙波之與水火也煙生於火而煙鬱火冰出於水而冰遏水故煙微而火盛冰泮而水通性貞則情銷情熾則性滅劉子防欲凝滯者智之蝥也忿憾者仁之螣也纖吝者義之蠧也文中子魏相木從小至大遂能蔭蔽日光譬染心從微至著亦能覆蓋真性道德經注疏卷六毁道德以為仁義不似黥乎破𤣥同以為是非不似劓乎莊子音義大宗師駢枝贅疣雖非性之正亦出於形不可去也五藏之情雖非道德之正亦列於性不可治也今設仁義之教以治五藏之情猶削駢枝贅疣也既傷自然之理又益其疾也莊子音義駢拇譬如惡象心未調順有人乘之不隨意去逺離城邑至於林野海空智藏經持誡品煩惱所侵縳猶如蠶處繭海空智藏經供獻品偈我觀世間一切衆生由於十種染汙法何謂為十一者慳垢染汙二者惡戒垢染汙三者瞋垢染汙四者懈怠垢染汙五者散亂垢染汙六者惡慧垢染汙七者不遵尊教垢染汙八者邪疑垢染汙九者不信解垢染汙十者不恭敬垢染汙大寶積經卷三十五我觀世間一切衆生為十種纒縳之所纒縳何謂為十一者由慳嫉網之所纒縳二者由無明膜之所覆翳三者煩惱迷醉墮愚癡坎四者愛欲駛流之所漂沒五者末摩死節邪箭所中六者忿恨密煙之所熏㶿七者貪欲盛火之所燒然八者過失毒藥之所悶亂九者諸蓋毒刺之所遮礙十者常處生死流轉饑饉曠野正勤疲怠大寶積經卷三十五猶如有人手執利斧入山斬伐材木華果藥草毁壞成功出曜經七口品挒眼去之其視寧廣逺不決耳令大其聽寧能逺不決鼻令大聞香寧能逺不決口令大知味寧能多不那先比丘經卷中譬如蛇行常曲入竹筒中則直大智度論卷二十三心猶水也靜則有照動則無鑒癡愛所濁邪風所扇湧溢波蕩未始暫住以此觀法何往不倒譬如臨面湧泉而責以本狀者未之有也僧肇注維摩詰經觀衆生品失常革四擴則裂胃中滿則充子華子執中楊朱之弟曰布衣素衣而出天雨解素衣衣緇衣而反其狗不知迎而吠之楊布怒將撲之楊朱曰子無撲矣子亦猶是也嚮者使汝狗白而往黑而來豈能無怪哉列子說符駢拇枝指出乎性哉而侈於德附贅縣疣出乎形哉而侈於性多方乎仁義而用之者列於五藏哉而非道德之正也是故駢於足者連無用之肉也枝於手者樹無用之指也多方駢枝於五藏之情者淫僻於仁義之行而多方於聰明之用也是故駢於明者亂五色淫文章青黃黼黻之煌煌非乎而離朱是已多於聰者亂五聲淫六律金石絲竹黃鍾大吕之聲非乎而師曠是已枝於仁者擢德塞性以收名聲使天下簧鼓以奉不及之法非乎而曾史是已駢於辨者纍瓦結繩竄句遊心於堅白同異之間而敝跬譽無用之言非乎而楊墨是已故此皆多駢旁枝之道非天下之至正也莊子駢拇夫待鉤繩規矩而正者是削其性也待繩約膠漆而固者是侵其德也屈折禮樂詬俞仁義以慰天下之心者此失其常然也天下有常然常然者曲者不以鉤直者不以繩圓者不以規方者不以矩附離不以膠漆約束不以纒索故天下誘然皆生而不知其所以生同焉皆得而不知其所以得故古今不二不可虧也則仁義又奚連連如膠漆纒索而遊乎道德之間為哉使天下惑也夫小惑易方大惑易性何以知其然邪自虞氏招仁義以撓天下也天下莫不奔命於仁義是非以仁義易其性與莊子駢拇百年之木破為犧樽青黃而文之其斷在溝中比犧樽於溝中之斷則美惡有間矣其於失性一也跖與曾史行義有間矣然失其性均也莊子天地夫堯既已黥汝以仁義而劓汝以是非矣汝將何以遊夫遙蕩恣睢轉徙之塗乎莊子大宗師譬如駏驉受胎必死雜阿含經卷三十八猶如地性不可捨堅乃至火性不可捨熱如魚投陸命何能存本緣經持王子品昔有一蛇頭尾自諍頭語尾曰我應為大尾語頭曰我應為大頭曰我有耳能聽有目能視有口能食行時在前故可為大汝無此術尾曰我令汝去故得去耳若我不去以身繞木三匝三日不已不得求食饑餓垂死頭語尾曰汝可放我聽汝為大尾聞其言即時放之復語尾曰汝既為大聽汝前行尾在前行未經數步墮大深坑而死法苑珠林卷七十八喻林卷一百十五
