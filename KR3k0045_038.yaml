body:
  text: 喻林卷三十八明徐元太撰人事門三十六見節嵗寒然後知松柏之後雕也論語子罕大寒之嵗衆木皆死然後知松柏不雕傷平嵗則衆木亦有不死者故須嵗寒而後别之凡人處治世亦能自修整與君子同在濁世然後知君子之正不茍容何晏解論子罕風霜以别草木之性危亂而見貞良之節後漢書盧植列傳論渭以涇濁乃顯其清玉居鑠石乃見其貞後漢書何顒傳贊爾乃松栁異質薺荼殊性故疾風知徑草嚴霜識貞木宋書顧覬之傳運纒明夷則艱貞之節顯時屬棟撓則獨立之操彰宋書孝義龔穎傳固此苦節易彼嵗寒霜雪雖厚松柏丸丸宋書孝義潘綜傳嚴冬播氣貞松之操自髙見景時昏若華之映彌顯南齊書髙帝本紀白玉投泥豈能相汚魏書穆崇曾孫弼傳泥漬自消玉質還潔魏書韓麒麟子熙傳迅寒急節乃見松筠之操危機回構方識貞孤之風南史袁湛顗弟子彖傳嵗不寒無以知松柏事不難無以知君子荀子大略見邪乃知其直觀花乃知其實陸子思務夫大寒至霜雪降然後知松柏之茂也據難履危利害陳於前然後知聖人之不失道也淮南子俶真訓嵗寒然後知松柏之後雕也世隘然後知其人之篤固也潜夫論交際𤣥氷未結白雪不積則青松之茂不顯俗化不弊風教不頽則皎潔之操不别抱朴子外篇廣譬風不輟則扇不用日不入則燭不明華不墮則實不結岸不虧則谷不盈九有人安則韓白之功不著長君繼軌則伊霍之勳不成故病困乃重良醫世亂而貴忠貞抱朴子外篇廣譬幽蘭生前庭含薰待清風清風脫然至見别蕭艾中陶靖節集詩五言夫士有忠義之行踐繩墨之節其於為作乃無異於衆人及至處患蹈難而志氣貞剛然後知其殊也譬如鍾山之玉寒嶺之松比之瓀珉梓栁無殊也及其燒以爐炭三日而色不改處於積氷終嵗而枝葉不雕然後知其異於他玉衆木也劉子大質袒裼暴虎而後勇氣發焉超騰絶坂而後迅便露焉手提萬鈞而後多力見焉處難踐患而後貞勇出焉劉子大質殺身以成名節成而身死故曰以死償節莊子音義庚桑楚桂霑霜露而色不渝身經夷險而操不易李善注文選江文通雜體詩香以燔質而發芳絃以特絶而流響喻貞女沒身而譽立烈士效節而名彰也李善注文選陸士衡演連珠徑松彰於嵗寒貞臣見於國危文選西征賦松柏隆冬瘁然後知嵗寒不涉太行險誰知斯路難文選歐陽建臨終詩道逺知驥世僞知賢廣文選曹子建矯志詩弧弓弛而不張兮孰云知其所至無傾危之患難兮焉知賢士之所死東方朔謬諫霜雪既至徑柏冬青藝文類聚人部交友針良玉以經焚不渝故其貞可貴竹柏以䝉霜保榮故見殊列樹藝文類聚賦官部司空碑女貞之樹一名冬生負霜葱翠振河凌風故清士欽其質而貞女慕其名藝文類聚木部女貞頌寒松負雪誠愧節者之徒徑草疾風寧忘烈士之槩文苑英華徐陵贈答上書有美金于此衆人咸共詆訿言其不純賣金者欲其售因取煆燒以見真太平御覽珍寶部全下根為石所蟠枝為風所碎賴我有貞心終凌細草輩初學記果木部松譬如微妙淨琉璃寶雖復在泥經歷百年其性常淨出已如本大方等大集經十一譬如真金在泥終不敗壞銅鐵則壞大智度論卷九十三輕羽在高遇風則飛細石在溪得流則轉唯泰山不為飄風動磐石不為疾流移梅李遇霜而落葉唯松柏之難凋矣𢎞明集牟子理惑論明覺豫若觀火書盤庚上他人有心豫忖度之躍躍音笛毚音殘兔遇犬獲之詩小雅巧言良醫知病人之死生聖王明於成敗之事利則行之害則舍之疑則少嘗之雖堯舜禹湯復生弗能改已戰國策秦昭襄王夫草木遭霜者不可以風過清水明鏡不可以形逃通方之士不可以文亂前漢書韓安國傳金之精者能昭穢者不能昭有能昭之精金寧有不昭之穢質梁書范縝傳有道之士貴以近知逺以今知古以益所見知所不見故審堂下之隂而知日月之行隂陽之變見瓶水之氷而知天下之寒魚鱉之藏也嘗一脬肉而知一鑊之味一鼎之調吕氏春秋察今齊桓公與管仲謀伐莒謀未發而聞於國桓公怪之管仲曰國必有聖人也桓公曰嘻日之役者有執跖􅲘而上視者意者其是耶乃今復役無得相代少頃東郭牙至管仲曰我不言伐莒子何故言伐莒對曰臣聞君子善謀小人善意臣竊意之也管仲曰我不言伐莒子何以意之對曰臣聞君子有三色顯然善樂者鍾鼓之色也湫然清靜者衰絰之色也艴然充盈手足矜者兵革之色也日者臣望君之在屋上也艴然充盈手足矜者此兵革之色也君呿而不􅀈所言者莒也君舉臂而指所當者莒也臣竊以慮諸侯之不服者其惟莒乎臣故言之凡耳之聞以聲也今不聞其聲而以其容與臂是東郭牙不以耳聽而聞也桓公管仲雖善匿弗能隱矣吕氏春秋重言齊桓公朝而與管仲謀伐衛退朝而入衛姬望見君下堂再拜請衛君之罪公曰吾於衛無故子曷為請對曰妾望君之入也足髙氣彊有伐國之志也見妾而有動色伐衛也明日君朝揖管仲而進之管仲曰君舍衛乎公曰仲父安識之管仲曰君之揖朝也恭而言也徐見臣而有慙色臣是以知之君曰善仲父治外夫人治內寡人知終不為諸侯笑矣桓公之所以匿者不言也今管子乃以容貌音聲夫人乃以行步氣志桓公雖不言若暗夜而燭燎也吕氏春秋精論夫雌雄相接隂陽相薄羽者為雛􅙿毛者為駒犢柔者為皮肉堅者為齒角人弗怪也水生蠬蜃山生金玉人弗怪也老槐生火久血為燐人弗怪也山出嘄陽水生罔象木生畢方井生墳羊人怪之聞見鮮而識物淺也天下之怪物聖人之所獨見也利害之反覆知者之所獨明也同異嫌疑者世俗之所眩惑也淮南子汜論訓處於堂上之隂而知日月之次序見瓶中之氷而知天下之寒暑夫物之所以相形者微唯聖人逹其至淮南子兵略訓嘗一臠肉而知一鑊之味懸羽與炭而知燥濕之氣以小明大見一葉落而知嵗之將暮暏瓶中之氷而知天下之寒以近論逺淮南子說山訓千年之松下有茯苓上有兔絲上有叢蓍下有伏龜聖人從外知內以見知隱也淮南子說山訓夫兒說之巧於閉結無不解非能閉結而盡解之也不解不可解也至乎以弗解解之者可與及言論矣淮南子人間訓夫物常見則識之常為則能之故因其患則造其備犯其難則得其便夫以一世之夀而觀千嵗之知今古之論雖未常更也其道理素具可不謂有術乎淮南子泰族訓客有見周公者應之於門曰何以道旦也客曰在外即言外在內即言內入乎將毋周公曰請入客曰立即言義坐即言仁坐乎將毋周公曰請坐客曰疾言則翕翕徐言則不聞言乎將毋周公唯唯旦也踰明日興師而誅管蔡故客善以不言之說周公善聽不言之說若周公可謂能聽微言矣韓詩外傳卷四小忩多明道理利通焦氏易林咸之乾次二明復睒失冉切天覩其根測曰明復睒天中獨爛也太𤣥經第六瞢客有見淳于髠於梁惠王者再見之終無言也惠王怪之以讓客曰子之稱淳于生言管晏不及及見寡人寡人未有得也寡人未足為言邪客謂髠曰固也吾前見王志在逺後見王志在音吾是以默然客具報王大駭曰嗟乎淳于生誠聖人也前淳于生之來人有獻龍馬者寡人未及視㑹生至後來人有獻謳者未及試亦㑹生至寡人雖屏左右私心在彼夫髠之見惠王在逺與音也雖湯禹之察不能過也志在胸臆之中藏匿不見髠能知之王充論衡知實篇夫智出於明猶晝之待白日夜之待燭火其明益盛者所見及逺及逺之明難劉邵人物志八觀夫在天者垂象在地者有形故望山度水則髙深可推風起雲飛則吉凶可步智者觀木不瘁則悟美玉之在山覿岸不枯則覺明珠之沉淵彗星出則知鱣魚之方死日月蝕則識麒麟之共鬬華霍不須稱而無限之重可知矣江海不待量而不測之數已定矣鴻鵠之翼騄騏之足雖未飛走輕迅可必也豪曹之劒徐氏匕首雖未必奮擊其立斷無疑也駮子有吞牛之容鶚􅙿有凌鷙之貌卉茂者土必沃魚大者水必廣虎尾不附狸首象牙不出鼠口抱朴子外篇清鑒路人不能挽徑命中而識飬由之射顔子不能控轡振䇿而知東野之敗故有不能下棊而經目識勝負不能徽絃而過耳解鄭雅者抱朴子外篇博喻顔淵弱冠而與仲尼言易童烏九齡而與揚子論𤣥揚子法言注問神篇且明智之為物猶泉流之吐潤固不於挹酌而為損含佇而增益一作盈也廣文選伏公表與阮步兵書託暗藏形不為巧密倚智隱情不足自匿是以重光發藻尋虛捕景大人貞觀探心昭忒文選陸機演連珠夫人藏形於暗自以為密日發光藻而照之隱情於智自以為匿聖人垂貞觀而明之文選陸士衡連珠注蔡雍在陳留鄰人有以酒食召雍者比往而酒已酣客有彈琴於屏雍至門潜聽之曰以樂召我而有殺心何也彈琴者曰我向見螳蜋方向鳴蟬蟬將去而未飛螳蜋為之一前一却吾心聳然唯恐螳蜋之失蟬也此豈為殺心而形於聲者乎藝文類聚樂部琴緹幔曉披即辨黃鍾之氣靈臺夕望便知玉井之色藝文類聚方術部卜筮序聞鍾於洛浦即辨聲乖聼鐸於邯鄲先知響韻文苑英華庚信雜進奉表心能善知人者如明鏡善自知者如蚌鏡以曜明故鑒人蚌以含珠故內照太平御覽服用部鏡夫審輕重莫若權衡正是非其唯賢明太平御覽資産部党項東海之魚墜一鱗崑崙之木落一葉聖人皆能知之太平御覽木部木下一蟻之行一蚊之飛聖人皆知之太平御覽蟲豸部蚊尸子曰聖人之身猶日也夫日圎尺光盈天地聖人之身小其所燭逺初學記人部聖注墐户牖而知天掩雲霧而測暉初學記器物部漏刻初雍避難江南宿於柯亭之館以竹為篆雍仰而盼之曰良竹也取以為笛竒聲獨絶初學記樂部笛注聖人之通萬物也若日月之光影音聲鼓響聞其聲而知其形黃帝素問靈樞經五音五味日與月焉水與鏡焉鼓與響焉夫日月之明不失其影水鏡之察不失其形鼓響之應不後其聲動搖則應和盡得其情黃帝素問靈樞經外揣譬如有人懸於明鏡見其色像曉了分明無有障蔽元陽寶鏡亦復如是元陽妙經卷九欲得五眼所謂肉眼天眼慧眼法眼佛眼波羅蜜多經卷二譬如田家以囊器盛若干種榖麻米粟豆大麥小麥稻穬明目之人寫之置地分别知之是為麻油是為粳米是豆粟是為稻穬灮讃波羅蜜經卷九譬如轉輪聖王知土地長短廣狹譬如瓦師作器知大小深淺灮讃波羅蜜經卷九譬如比丘有天眼者能見逺方諸善惡色大寶積經二十譬如空中無諸雲霧日輪炎盛放大光明遍照於世大寶積經三十七如日處空離雲霧光明晃曜普皆照大寶積經六十一彼大商主雖未發足能知道中所有一切安危之事善以智慧籌量觀察備其所須令無乏少將諸商衆乃至安隱到彼大城身及衆人悉免憂患大方廣佛華嚴經三十四善知識者則為導師教化令至彼岸道故善知識者則為良醫療治一切煩惱患故善知識者則為雲山長飬明淨智慧藥故善知識者則為勇將防護一切諸恐怖故善知識者則為牢船悉令越度生死海故善知識者則為船師令至一切智法寶洲故大方廣佛華嚴經卷五十八譬如持燈火入冥室火適入室便亡其冥自明明人有智慧譬如火光那先比丘經卷上譬如農夫開倉種種别知麻米豆麥等思惟要略法如好馬見鞭影即覺便著正道大智度論卷一譬如說藥已知其病說病則知其藥大智度論卷十八譬如良醫診病知瘥久近可治不可治也大智度論卷五十如斧㭊薪分分解竟無所失大智度論卷七十夫見博則不迷聽聰則不惑𢎞明集牟子理惑論先見過伯有氏其門上生莠子羽曰其莠猶在乎左傳襄公二十年夫有男戎必有女戎若晉以男戎勝戎而戎亦必以女戎勝晉國語晉初獻公將伐驪戎卜曰齒牙為禍史記晉世家處仲蜂目已露但豺聲未振若不噬人亦當為人所噬晉書王敦傳指洛陽宫門銅駝歎曰㑹見汝在荆棘中耳晉書索靖傳志者察是非龜者知吉凶故曰養志法靈龜鬼谷子本經隂符注兊目也損者謂减損他慮専以心察也兊能知得失蓍能知休咎故損兊法靈蓍也鬼谷子本經隂符注先物行先理動之謂前識前識者無緣而忘意度也何以論之詹何坐弟子侍有牛鳴於門外弟子曰是黑牛也而白題詹何曰然是黑牛也而白在其角使人視之果黑牛而以布褁其角以詹子之術嬰衆人之心華焉殆矣故曰道之華也嘗試釋詹子之察而使五尺之愚童子視之亦知其黑牛而以布褁其角也故以詹子之察苦心傷神而後與五尺之愚童子同功是以曰愚之首也故曰前識者道之華也而愚之首也韓非子解老扁鵲見蔡桓公立有間扁鵲曰君有疾在腠理不治將恐深桓侯曰寡人無扁鵲出桓侯曰醫之好欲治不病以為功居十日扁鵲復見曰君之病在肌膚不治將益深桓侯不應扁鵲出桓侯又不悅居十日扁鵲復見曰君之疾在腸胃不治將益深桓侯又不應扁鵲出桓侯又不悅居十日扁鵲望桓侯而還走桓侯故使人問之扁鵲曰疾在腠理湯尉之所及在肌膚針石之所及也在腸胃火齊之所及也在骨髓司命之所屬無奈何也今在骨髓臣是以無請也居五日桓侯體痛使人索扁鵲已逃秦矣桓侯遂死故良醫之治病也攻之於腠理此皆爭之於小者也夫事之禍福亦有腠理之地故曰聖人早從事焉韓非子喻老紂為象箸而箕子悕以為象箸必不盛羮於土簋則必犀玉之杯玉杯象箸必不盛菽藿則必旄象豹胎旄象豹胎必不衣短褐而舍茅茨之下則必錦衣九重髙臺廣室也稱此以求則天下不足矣聖人見微以知萌見端以知末故見象箸而悕知天下之不足也韓非子說林彼人生不學道理則默然惛於得失不知治亂存亡之所由然忳忳猶醉也而賢主者學問不倦好道不厭鋭然獨先乃學道理矣故未治也知所以治未亂也知所以亂未安也知所以安未危也知所以危故昭然先寤乎所以存亡矣故曰先醒辟猶俱醉而獨先發也故世主有先醒者有後醒者有不醒者賈子新書先醒福之萌也綿綿禍之生也分分禍福之始萌微故民嫚之唯聖人見其始而知其終故𫝊曰魯酒薄而邯鄲圍羊羮不斟而宋國危淮南子繆稱訓德有盛衰風先萌焉故得王道者雖小必大有亡形者雖成必敗夫夏之將亡太史令終古先奔於商三年而桀乃亡殷之將敗也太史令向藝先歸文王朞年而紂乃亡故聖人之見存亡之迹成敗之際也非乃鳴條之野甲子之日也淮南子泛論訓莊王誅里史孫叔敖制冠浣衣文公棄荏席後黴梅黑咎犯辭歸故桑葉落而長年悲也淮南子說山訓紂為象箸而箕子唏魯以偶人葬而孔子嘆故聖人見霜而知氷淮南子說山訓夫鴻鵠之未孚於卵也一指篾之則靡而無形矣及至筋骨之已就而羽翮之所成也則奮翼揮䎚凌乎浮雲背負青天膺摩赤霄翺翔乎忽荒之上倣徉乎虹霓之間雖有徑弩利矰微繳蒲且子之巧亦弗能加也江水之始出於岷山也可攓衣而越也及至乎下洞庭鶩石城經丹徒起波濤舟航一日不能濟也是故聖人者常從事於無形之外而不留思盡慮於成事之內是故患禍弗能傷也淮南子人間訓小人不知禍福之門户妄動而絓羅網雖曲為之備何足以全其身譬猶失火而鑿池被裘而用䈉也且塘有萬穴塞其一魚遽無由出室有百户閉其一盜遽無從入夫牆之壞也於隟劒之折必有齧聖人見之蚤故萬物莫能傷也淮南子人間訓太宰子朱侍飯於令尹子國令尹子國啜羮而熱投巵漿而沃之明日太宰子朱辭官而歸其僕曰楚太宰未易得也辭官去之何也子朱曰令尹輕行而簡禮其辱人不難明年伏郎尹而笞之三百夫仕者先避之見終始微矣淮南子人間訓見亡知存見霜知氷說苑談叢叔姬之始生叔魚也而視之曰是虎目而豕喙鳶肩而牛腹溪壑可盈是不可饜也必以賂死列女傳周列國晉羊叔姬答子治陶三年名譽不興家富三倍其妻數諫不用居五年從車百乘歸休宗人擊牛而賀之其妻獨抱兒而泣姑怒曰何其不祥也婦曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃昔楚令尹子文之治國也家貧國富君敬民戴故福結於子孫名垂於後世今夫子不然貪富務大不顧後害妾聞南山有𤣥豹霧雨七日而不下食何也欲以澤其毛而成文章也故藏而逺害犬彘不擇食以肥其身坐而須死耳今夫子治陶家富國貧君不敬民不戴敗亡之徴見矣列女傳周列國陶答子妻先知其幾於神乎敢問先知曰不知知其道者其如視忽眇綿作昞先甲一日易後甲一日難揚子先知篇國之修短吉凶卜於龜士之兆卜於琴瑟今臣之鼓瑟也始彈白駒其聲戾以殺繼而彈關雎其聲婉以和臣故得禮於賢主也天祿閣外史災異觀九天之變鑽龜占兆淮南子覽冥訓解王命之當興也猶春氣之當為夏也其當亡也猶秋氣之當為冬也見春之微葉知夏有莖葉覩秋之零實知冬之枯萃王充論衡異虛篇人命禀於天則有表候於體察表候以知命猶察斗斛以知容矣王充論衡骨相篇且夫所貴貴乎見俊才於無名之中料逸足乎吳坂之間掇懷珠之蚌於九淵之底指含光之珍於積石之中若伯喈識絶音之氣於煙燼之餘平子剔逸響之竹於未用之前六軍之聚市人之㑹暫觀一覩無所眩惑探其潜生之心計定其始終之事行乃為獨見不𫝊之妙耳抱朴子外篇清鑒必俟考其操蹈之全毁觀其云為之好醜此為絲線既經於銓衡布帛已歷於丈尺徐乃說其斤兩之輕重端匹之修短人皆能之何煩於明哲哉抱朴子外篇清鑒智者料事於倚杖之表伐木於毫末之初吐髙言不於纍棊之際議治裘不於羣狐之中抱朴子外篇知止龜䇿不出聖謀聖謀定將來之基龜䇿告未然之事遞相表裏安有異同關氏易傳穴藏先知雨隂曀未集魚已噞喁巢居之鳥先知風樹未搖鳥已翔李善注文選張茂先雜詩神龍不處網罟之水鳯凰不翔罻羅之鄊賢人不入危國智者不輔亂君意林任子曹公使蔣幹說周瑜瑜先覺之謂幹曰吾雖不及䕫曠聞絃賞音足知雅曲也事文類聚知人水之激也實濁其源木之蠧也將拔其根是以延年之家預論掃墓羊石之族先知滅門文苑英華庾信連珠昔吕望周公問於施政各知其後所以終顔淵乘駟之日見東野車之馭知其將敗子貢觀邾魯之會而昭其所以喪仲尼聞師曠之絃而識文王之操季子聽樂覽衆國之風何必足履目見乎𢎞明集牟子理惑論見幾且初為霰者久必暴雪毛詩正義頍辨惡傷其類視其下等懼次及也語曰鳶鵲䝉害仁鳥增逝此之謂也趙氏注孟離婁上次七見于纍後乃克飛測曰見于纍幾不足髙也大𤣥經第四逃林不容兮鳴蜩國不飬民賢宜退也余何留兮中州我去諸夏將逺逝也王逸注楚辭九懷剝巢破卵鳯凰為之不翔焚林而畋漉池而魚龜龍為之不遊王充論衡指瑞篇夫淵竭池漉則蛟龍不逰巢傾卵拾則鳯凰不集居言于室而翔鷗不下凡卉春剪而芝蓂不秀世俗醜正慢辱將臻彼有道者安得不超然振翅乎風雲之表而翻爾藏軌於𤣥漠之際乎抱朴子內篇明本夫傾庶鳥之巢則靈鳯不集漉魚鱉之池則神虬遐逝刳凡獸之胎則麒麟不峙其郊害一介之士則英傑不踐其境抱朴子外篇逸民蓋梟鴟屯飛則鴛鳯幽集豺狼當路則麒麟遐遁舉善而教則不仁者逺矣姦僞榮顯則英傑潛逝抱朴子外篇審舉徙薪曲突於方熾之火纚舟弭楫於衝風之前瞻九犗而深沉望密蔚而曾逝不託巢於葦苕之末不偃寢乎崩山之崖者也抱朴子外篇知止若夫善卷巢許管胡之徒咸蹈雲物以髙鷔依龍鳯以踈迹覘韜鋒於香餌之中寤覆車乎來軔之路違險塗以遐濟故能免詹何之釣緍可謂善料微景於形外覿堅氷於未霜抱朴子外篇知止仁虎匿爪神龍隱鱗李善注文選任彥升宣德皇后令却騏驥而不乘兮䇿駑駘而取路當世豈無騏驥兮誠莫之能善御見執轡者非其人兮故駒跳而逺去文選宋玉九辨鳬鴈皆唼夫粱藻兮鳯愈飄翔而髙舉文選宋玉九辨鷹隼羣飛鳯凰逺逰小人成列君子深藏諺曰脂粉雖多醜面不加膏澤雖光不可潤草意林唐子趙之相者曰林氏有九子皆賢國人美而稱之號曰九德之父十德之門趙王疾之王乃使擇其果之煩者伐之其父曰果之茂者猶伐之况其人乎吾將以爾為纍矣去之則免乃擕老持子逃於白雲之巖太平御覽果部果譬如有人乘於瓦船入於河中心作是念如此瓦船不久當壞未沒以來可速度岸以免水難大寶積經六十六猶去村不逺有小肉臠墮在露地或烏或鵄持彼肉去餘烏鵄鳥競而逐之若此烏鵄能速捨此小肉臠者餘烏鵄鳥當復競逐耶居士答曰不也中阿含經卷五十五譬如失火之家黠慧之人明識形勢及火未至急出財物舍雖燒盡財物悉在更修室宅大智度論卷十一譬如空聚落賊所止處智者不應久住大智度論卷五十二有備蓄聚美菜者以禦冬月之無時也鄭氏箋詩谷風藩落髙峻絶穿窬之心魏志劉馥傳太公曰戰攻守禦之具盡在於人事耒耜者其行馬蒺藜也馬牛車輿者其營壘蔽櫓也鋤耰之具其矛㦸也蓑薜䔲笠者其甲胄干櫓也钁鍤斧鋸杵臼其攻城器也牛馬所以轉輸糧也雞犬其伺候也婦人織紝其旗旗也丈夫平壤其攻城也春鏺草棘其戰車騎也夏耨田疇其戰步兵也秋刈禾薪其糧食儲備也冬實倉廪其堅守也田里相伍其約束符信也里有吏官有長其將帥也里有周垣不得相過其隊分也輸粟取芻其廪庫也春秋治城郭修溝渠其塹壘也故用兵之具盡於人事也太公六韜農器不行其野不違其馬管子形勢食無備粟不可以待凶饑庫無備兵雖有義不能征無義城郭不備全不可以自守心無備慮不可以應卒墨子七患夫桀無待湯之備故放紂無待武王之備故殺桀紂貴為天子富有天下然而皆滅亡於百里之君者何也有富貴而不為備也故備者國之重也墨子七患魚得水而遊焉則樂塘决水涸則為螻蟻所食有掌修其隄防補其缺漏則魚得而利之淮南子主術訓同日被霜蔽者不傷愚者有備與知者同功淮南子人間訓虎兕所以能執熊羆服羣獸者爪牙利而攫便也秦所以超諸侯吞天下并敵國者險阻固而勢居然也故龜倡有介狐貉不能禽蝮蛇有螫人忌而不輕故有備則制人無備則制於人鹽鐵論險固孟賁奮臂衆人輕之怯夫有備其氣自倍况以吳楚之士舞利劔蹶强弩以與貉虜騁於中原一人當百不足道也鹽鐵論論勇重茵厚席循髙採藿雖躓不懼後反其處焦氏易林屯之豫擁遏隄防水不得行焦氏易林比之大畜畜水備火終無災禍焦氏易林大有之節張弓控弩經涉山道雖有伏虎誰敢害者焦氏易林豫之噬嗑乘船涉濟載水逢火焦氏易林頤之謙畜水待時以備火災焦氏易林大過之歸妹次六泉源洋洋吟音欽于丘園測曰泉源之吟不可譏也太𤣥經第五吟譬如麟角鳳距何必用之抱朴子外篇自叙乘車之法尊者居左御者居中又有一人處車之右以備傾側是以戎事則稱車右其餘則曰驂乘前漢書注文帝紀酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉事文類聚酣飲夫城之有郭猶骨之有皮表裏各異則保障不完皮骨分離則一體不具初學記居處部城郭注猶如帝王具足無量珍寶樂具而須城舍墻塹莊嚴防斷盜賊靈寶祕密經如有軍將臨戰陳時善備種種鎧鉀刀杖鄰國怨敵所不能害波羅密多經卷三百五十一如善射人甲胄堅固執好弓箭不懼怨敵波羅密多經卷三百五十六如人手執利器乃可與賊相禦若無所執而對强敵反以為害禪法要解經卷上榮九喻林卷三十八
