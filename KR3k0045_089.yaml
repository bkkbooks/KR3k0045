body:
  text: 喻林卷八十九明徐元太撰文章門四豐贍江海以水深之故所浸者逺膏澤以雨多之故所潤者博以喻傳之廣記備言亦欲浸潤經文使義理通洽春秋正義序元凱文塲稱為武庫晋書杜預傳山大者雲多泰山不崇朝辦雨雨天下夫然則賢者有雲雨之知故曰其吐文萬牒以上可謂多力矣世稱力者常褒烏獲然則董仲舒揚子雲文之烏獲也秦武王與孟獲舉鼎不任絶脉而死少文之人與董仲舒等涌胸中之思必將不任有絶脉之變王充論衡効力篇人知出榖多者地力盛不知出文多者才知茂失事理之實矣王充論衡効力篇足不彊則跡不逺鋒不銛則割不深連結篇章必大才智鴻懿之俊也王充論衡超竒篇東海之中可食之物雜糅非一以其大也夫水精氣渥盛故其生物也衆多竒異故夫大人之胸懐非一才髙知大故其於道術無所不包王充論衡别通篇夫形大衣不得褊事衆文不得褊事衆文饒水大魚多帝都榖多王市肩磨王充論衡自紀篇寳玉之山土木必潤盛徳之士文藝必衆徐幹中論藝紀價直萬金者不待見其物而好惡可别矣條枝連抱者不俟圍其木而巨細可論矣故望洪濤之滔天則知其不起乎潢汙之中矣觀翰章之汪濊則知其不出乎章句之徒矣抱朴子外篇博喻開源不億仞則無懐山之流崇峻不凌霄則無彌天之雲財不豐則其恵也不博才不逺則其辭也不贍故觀盈丈之牙則知其不出徑寸之口見百尋之枝則知其不附毫末之木抱朴子外篇廣譬羲和昇光以啓旦望舒曜景以灼夜五材並生而異用百藥雜秀而殊治四時㑹而歳功成五色聚而錦繡麗八音諧而簫韶美羣言合而道藝辯抱朴子外篇喻蔽玉以少貴石以多賤夫𤣥圃之下荆華之顛九員之澤折方之淵琳琅積而成山夜光煥而灼天顧不善也抱朴子外篇喻蔽積倚頓之財而用之甚少是何異於原憲也懐無銓之量而著述約陋亦何别於𤨏碌也抱朴子外篇喻蔽兩儀所以稱大者以其函括八荒緬邈無表也山海所以為富者以其包籠曠闊含受雜錯也若如雅論貴少賤多則穹隆無取乎宏燾而旁泊不貴於厚載也抱朴子外篇喻蔽其英異宏逸者則羅網乎元黄之表其拘束齷齪者則覊紲於籠罩之内振翅有利鈍則翔集有髙卑騁迹有遲迅則進趨有逺近駑鋭不可膠柱調也文貴豐贍何必稱善如一口乎抱朴子外篇辭義然古書者雖多未必盡美要當以為學者之山淵使屬筆者得采伐漁獵其中然而譬如東甌之木長洲之林梓豫雖多而未可謂之為大厦之壯觀華屋之𢎞麗也雲夢之澤孟諸之藪魚肉之雖饒而未可謂之為煎熬之盛膳渝狄之加味也抱朴子外篇鈞世若禀經以製式酌雅以富言是仰山而鑄銅煑海而為鹽也文心雕龍宗經夫經典沉深載籍浩汗實羣言之奥區而才思之神臯也揚班以下莫不取資任力耕耨縱意漁獵操刀能割必裂膏腴是以將贍才力務在博見狐腋非一皮能温鷄蹠必數千而飽矣文心雕龍事類經籍深富辭理遐亘􅀈如江海鬰若崑鄧文梓共採瓊珠交贈文心雕龍事類贊言必鵬運氣靡鴻漸倒海探珠傾崑取琰曠而不溢奢而無玷文心雕龍夸飾贊物貎難盡故重㳫舒狀如是嵯峨之類聚葳𬎼之羣積矣文心雕龍物色文辭根葉苑囿其中矣文心雕龍體性洽聞之士宜撮綱要攬華而食實棄邪而採正極睇參差亦學家之壯觀也文心雕龍諸子篇章之珠澤文彩之鄧林鍾嶸詩品雖離方而遯圓期窮形而盡相文選文賦或虎變而獸擾或龍見而鳥瀾文選文賦縟㫖星稠繁文綺合文選沈約謝靈運傳論合綦組以成文列錦繡而為質一經一緯一宫一商此賦之迹也西京雜記千巖競秀萬壑争流草木蒙籠其上若雲興霞蔚世説新語言語從山隂道上行山川自相映發使人應接不暇世説新語言語人有難充書繁重云不在多以為龍少魚衆少者為神充荅曰文衆勝寡財富愈貧世無一分吾有百篇人無一字吾有萬言孰為賢矣太平御覧文部著書下夫𣺌泛滄流則不識涯涘雜陳鍾石則莫辨宫商初學記文部文章註如游羣玉之府琮璜珪璧瓊瑶寳璐光明焜晃莫敢注視如行衡霍嵩岱之境山輝川媚雲蒸霞蔚龍拏鳯跂蒼翠詭異使人應接不暇玉海藝文書目浩汗其源者必總靈怪之儲紛糺其峯者自動鬱㝠之觀波羅蜜多經卷五百七十七佛言以一天下樹枝及與鳥毛作筆書佛經樹枝鳥毛悉皆可盡佛智不可盡大如須彌山墨磨研四海水㸃筆須彌山墨四海水皆可盡佛智終不可盡三摩竭經尺八滔滔焉涌難竭之泉湛湛焉垂長生之露其言巧妙其義深逺譬八河之歸海猶萬象之趣空辯正論卷七簡約舉一綱而萬目張解一卷而衆篇明毛詩詩譜序譬珠玉不可多得以其珍也王充論衡超竒篇瓀少石多多者不為珍龍少魚衆少者固為神王充論衡自紀篇夫瓊瑶以寡為竒磧礫以多為賤故庖犧卦不盈十而彌綸二儀老氏言不滿萬而道徳備舉抱朴子外篇喻蔽根柢槃深枝葉峻茂辭約而㫖豐事近而喻逺文心雕龍宗經事得其要雖小成績譬寸轄制輪尺樞運闗也文心雕龍事類事得其要雖寡而用博易之六爻該綜萬象琴之五絃備括衆聲文選陸士衡演連珠註或謂洪曰流無源則乾條離株則瘁吾恐玉屑盈車不如全璧余答曰詠源流者採珠而捐蚌登荆嶺者拾玉而棄石余之抄略譬猶摘翡翠之藻羽脱犀象之角牙太平御覽文部著書下夫至實不華至辭不餙言約而至者麗事寡而達者明故珠玉少而貴瓦礫多而賤𢎞明集牟子理惑論擅長擢秀幹於一時騁絶轡於千里固諸儒之所揖讓日下之無雙毛詩正義序誠九流之津渉六藝之鈐鍵學覽者之潭奥摛翰者之華苑也爾雅序爻彖垂法宫徵流音羙哉羣彦揚𬎼翰林俱諧振玉各擅鏘金晉書郭澄之傳西都賈馬耀靈蛇於掌握東漢班張發雕龍於綈槧晉書文苑傳若五音之變化濟九成之妙曲梁書任昉傳唱髙則難和理深則難詶魏書宗欽傳文章錯綜煥然蔚炳猶夫子之墻矣魏書崔𤣥伯僧淵傳瑩金璧播芝蘭文質因其宜繁約適其變權衡輕重斟酌古今和而能壯麗而能典煥乎若五色之成章紛乎猶八音之繁㑹周書史臣庾信傳理髙象繋管輅思而不解事富山海郭璞注而未詳至於五色相宣八音繁會鳯鳴不足喻龍章莫之比隋書崔廓隠逸傳能斵削柱梁謂之木匠能穿鑿穴塪謂之土匠能雕琢文書謂之史匠王充論衡量知篇以儒道為城池以機神為干戈故談者莫不望塵而銜璧文士寓目而格筆抱朴子外篇重言精理為文秀氣成采鑒懸日月辭富山海文心雕龍徵聖贊騷經九章朗麗以哀志九歌九辯綺靡以傷情逺遊天問瓌詭而恵巧招魂招𨼆耀艷而深華卜居摽放言之致漁父寄獨往之才故能氣往轢古辭來切今驚采絶艷難與並能矣自九懐以下遽躡其跡而屈宋逸歩莫之能追故其叙情怨則鬱伊而易感述離居則愴怏而難懐論山水則循聲而得貎言節候則披文而見時是以枚賈追風以入麗馬揚㳂波而得竒其衣被詞人非一代也文心雕龍辯騷觀其骨鯁所樹肌膚所附雖取鎔經意亦自鑄偉辭文心雕龍辯騷若能慿軾以倚雅頌懸轡以馭楚篇酌奇而不失其真翫華而不墜其實則顧盼可以驅辭力欬唾可以窮文致亦不復乞靈於長卿假寵於子淵矣文心雕龍辯騷不有屈原豈見離騷驚才風逸壯志烟髙文心雕龍辯騷贊自風雅寢聲莫或抽緒奇文鬱起其離騷哉固已軒翥詩人之後奮飛辭家之前文心雕龍辯騷陳思之表獨冠羣才觀其體贍而律調辭清而志顯應物掣巧随變生趣執轡有餘故能緩急應節文心雕龍章表殷人輯頌楚人理賦斯並鴻裁之寰域雅文之樞轄也文心雕龍銓賦宫商大和譬諸吹籥翻迴取均頗似調瑟瑟資移柱故有時而乖貳籥含定管故無往而不壹陳思潘岳吹籥之調也陸機左思瑟柱之和也文心雕龍聲律按轡文雅之塲而環絡藻繪之府亦幾乎備矣文心雕龍序志唯張載劍閣其才清采迅足駸駸後發前至文心雕龍銘箴負文餘力飛靡弄巧枝辭攢映嘒若參昴文心雕龍雜文贊士衡運思理新文敏而裁章置句廣於舊篇豈慕珠仲四寸之璫乎文心雕龍雜文吟咏之間吐納珠玉之聲睂睫之前卷舒風雲之色其思理之致乎文心雕龍神思若擇源於涇渭之流按轡於邪正之路亦可以馭文采矣文心雕龍情采文帝陳思縱轡以騁節王徐應劉望路而争驅文心雕龍明詩義直而文婉體舊而趣新金鹿澤蘭莫之或繼也文心雕龍哀弔若夫楚辭招魂可謂祝辭之組纚也文心雕龍祝盟玉潤雙流如彼珩佩文心雕龍麗辭贊外文綺交内義脉注跗蕚相銜首尾一體文心雕龍章句後進之才奬氣挾聲軒翥而欲奮飛騰躑而羞跼歩辭入煒燁春藻不能程其艷言在萎絶寒谷未足成其凋談歡則字與笑並論慼則聲共泣偕信可以發藴而飛滯披瞽而駭聾矣文心雕龍夸飾丹青初炳而後渝文章歳久而彌光若能櫽括於一朝可以無慙於千載也文心雕龍指瑕凡大體文章類多枝𣲖整𣲖者依源理枝者循幹文心雕龍附㑹夫能懸識凑理然後文節自㑹如膠之粘木豆之合黄矣是以騶牡異力而六轡如琴馭文之法有似於此去留随心修短在手齊其歩驟總轡而已文心雕龍附㑹爾其縉紳之林霞蔚而飈起王袁聮宗以龍章顔謝重葉以鳯采文心雕龍時序茂先揺筆而散珠太冲動墨而横錦岳湛曜聮璧之華機雲摽二俊之采應傅三張之徒孫摯成公之屬並結藻清英流韻綺靡文心雕龍時序稷下扇其清風蘭陵鬱其茂俗鄒子以談天飛譽騶奭以雕龍馳響屈平聮藻於日月宋玉交彩於風雲觀其豔説則籠罩雅頌故知暐燁之奇意出乎縱横之詭俗也文心雕龍時序夫山木為良匠所度經書為文士所擇木美而定於斧斤事美而制於刀筆研思之士無慙匠石矣文心雕龍事類敬通雅好辭説而坎壈盛世顯志自序亦蚌病成珠矣文心雕龍才略冩氣圖貎既随物以宛轉屬采附聲亦與心而徘徊故灼灼狀桃李之鮮依依盡楊栁之貎杲杲為出日之容瀌瀌擬雨雪之狀喈喈逐黄鳥之聲喓喓學草蟲之韻皎日嘒星一言窮理參差沃若兩字連形並以少總多情貎無遺矣文心雕龍物色翩翩然如翔禽之有羽毛衣服之有綃縠鍾嶸詩品方之於影而形不可逐譬之於聲而響難為係李善註文選文賦譬猶舞者赴節以投袂歌者應絃而遣聲文選文賦烈若鉤星在漢渙若雲梁承天文選景福殿賦優游典籍之場休息篇章之圃發言抗論窮理盡㣲摛藻下筆鸞龍之文奮矣文選呉季重答魏太子牋陸機之賦虚握靈珠孫綽之銘空擅崐玉文選陸陲新漏刻銘屈平宋玉導清源於前賈誼相如振芳塵於後英辭潤金石髙義薄雲天文選沈約謝靈運傳論潘文爛若披錦無處不善陸文若排沙簡金往往見寳世説新語言語英辭雨集妙句雲來意林仲長統昌言君子之作也儼乎若髙山勃乎若浮雲質素也如秋蓬摛藻也如春葩汜乎洋洋光乎䐧䐧與雅頌争流可也藝文類聚雜文部集序平陽撃石山谷為之調大禹吹笛風雲為之動與夫含吐性靈抑揚詞氣曲變陽春光迴白日豈得同年而語哉藝文類聚雜文部集序遂得棟梁文囿冠冕詞林大雅扶輪小生承葢藝文類聚雜文部集序逸態横生新情振起風雨争飛魚龍各變方之珪璧塗山之㑹萬里譬似雲霞赤城之巖千丈文參厯象即入天官之書韻渉絲桐咸歸總章之觀論其壯也則鵬起半天語其細也則鷦巢蚊睫豈直熊羆朝上層城抱日月之輝光燄宵飛南斗觸蛟龍之氣藝文類聚雜文部集序髙調發清音縟藻流餘絢文苑英華楊素寄贈二詩調與金石諧思逐風雲上文苑英華沈約悲悼一詩譬其毫翰則風雨爭飛論其文采則魚龍百變文苑英華庾信謝文序并和詩啟文異水而湧泉筆非秋而垂露文苑英華庾信謝文序并和詩阮瑀之書記不足扶衡孫楚之辭才何以捧轂華陽陶隠居傳譬山王之髙妙谷王之宗長義必重深辭亦豐祕波羅蜜多經四百七十九譬如世間善作樂者能使八音宫商和諧聲律相應同時俱作又如巧畵善布衆彩殊形異像森然顯著無明羅刹經夫五經浩澣百氏扶疎義極知㣲理包盡性譬北辰之臨萬象猶東溟之導百川譬正論卷七均美百家之言與善一揆譬操水者器雖異而救火同焉猶針灸者術雖殊而攻疾均焉抱朴子外篇尚博正經為道義之淵海子書為增深之川流仰而比之則景星之佐三辰也俯而方之則林薄之禆嵩嶽也雖津塗殊闢而進徳同歸雖離於舉趾而合於與化故通人總原本以括流末操綱領而得一致焉抱朴子外篇尚博張衡通贍蔡邕精雅文史彬彬隔世相望是則竹栢異心而同貞金玉殊質而皆寳也文心雕龍才略殊聲而合響異翮而同飛文心雕龍才略傅𤣥篇章義多規鏡長虞筆奏世執剛中並楨幹之實才非羣華之韡蕚也文心雕龍才略文彩髙麗並得虬龍片甲鳯凰一毛鍾嶸詩品以珠玉之句既存故榛楛之辭亦美李善註文選文賦陶匏異器並為入耳之娯黼黻不同俱為悦目之翫作者之致蓋云備矣文選序元黄經緯之辦金碧沈浮之殊僕以為亦合其美並善而已文選江文通雜體詩序夫楚謡漢風既非一骨魏製晉造固亦二體譬猶藍朱成彩雜錯之變無窮宫商為音靡曼之態不極故蛾睂詎同貎而俱動於魄芳草寧共氣而皆悦於魂不其然歟至於世之諸賢各滯所迷莫不論甘而忌辛好丹而非素豈所謂通方廣恕好逺兼愛者哉文選江文通雜體詩序聮跗齊頴接蕚均芳文選謝希逸宣貴妃樝梨橘柚各有其美世説新語品藻曄若春華之並發馥若秋蘭之俱茂意林物理論夫聖賢所陳皆同取道徳仁義以為奇論異文而俱善可觀猶人食皆用魚肉菜茄以為生熟異和而復俱美也太平御覽學部叙經典夫五經則海也傳記則四凟諸子則涇渭也至於百川溝洫畎澮茍能通隂陽之氣達水泉之流以四海為歸者皆溢也太平御覽學部叙經典美疵以燕石之瑜補琬琰之瑕郭璞方言序且夫江海之穢物不可勝計而不損其深也五嶽之曲木不可訾量而無虧其峻也夏君之璜雖有分毫之瑕暉曜符彩足相補也數千萬言雖有不艷之辭事義髙逺足相掩也故曰四瀆之濁不方瓮水之清巨象之瘦不同羔羊之肥矣抱朴子外篇喻蔽若以所言不純而棄其文是治昧翳而剜眼療濕痺而刖足患荑莠而刈穀憎枯枝而伐樹也抱朴子外篇喻蔽屬詞比義又不盡美所謂陂原之蒿莠未若歩武之黍稷也抱朴子外篇喻蔽呉誄雖工而他篇頗疎豈以見稱光武而改盼千金哉文心雕龍誄碑雖三調之正聲實韶夏之鄭曲也文心雕龍樂府若乃尊賢隠諱固尼父之聖㫖葢纖瑕不能玷瑾瑜也文心雕龍史傳然才冠鴻筆多疎尺牘譬九方堙之識駿足而不知毛色牝牡也文心雕龍書記述道言治枝條五經其純粹者入矩踳駁者出規文心雕龍諸子袁宏發軫以髙驤故卓出而多偏孫綽規旋以矩歩故倫序而寡狀文心雕龍才略元長士章並有盛才詞美英淨至於五言之作幾乎尺有所短譬應變將畧非武侯所長未足以貶臥龍鍾嶸詩品尚規矩不貴綺錯有傷直致之竒然其咀嚼英華厭飫膏澤文章之淵泉也鍾嶸詩品一章之中自有玉石鍾嶸詩品闕大羮之遺味同朱絃之清氾雖一唱而三歎固既雅而不豔文選文賦混姸蚩而成體累良質而為瑕象下管之偏疾故雖應而不和文選文賦枚臯文章敏疾長卿制作淹遲皆盡一時之譽然長卿首尾温麗枚臯時有累句故知疾行無善迹矣太平御覽文部思遲工拙臨篇綴慮必有二患理鬱者苦貧辭溺者傷亂然則博聞為饋貧之糧貫一為拯亂之藥博而能一亦有助乎心力矣文心雕龍神思能騁無窮之路飲不竭之源然綆短者銜渴足疲者輟塗非文理之數盡乃通變之術䟱耳文心雕龍通變若愛典而惡華則兼通之理偏似夏人争弓矢執一不可以獨射也若雅鄭而共篇則總一之勢離是楚人鬻矛譽盾兩難得而俱售也文心雕龍定勢拓衢路置闗鍵長轡逺馭從容按節慿情以㑹通負氣以適變采如宛虹之奮鬐毛若長離之振翼廼頴脱之文矣若乃齷齪於偏解矜激乎一致此庭間之迴驟豈萬里之逸歩哉文心雕龍通變今操琴不調必知改張摘文乖張而不識所調響在彼絃乃得克諧聲萌我心更失和律其故何哉良由外聼易為察内聼難為聰也故外聼之易絃以手定内聼之難聲與心紛文心雕龍聲律夫美錦製衣修短有度雖翫其采不倍領袖巧猶難繁况在乎拙文心雕龍鎔裁屬意立文心與筆謀才為盟主學為輔佐主佐合徳文采必霸才學褊狹雖美少功文心雕龍事類善附者異㫖如肝膽拙㑹者同音如胡越文心雕龍附㑹執術馭篇似善奕之窮數無術任心如博塞之遨遊故博塞之文借巧儻來雖前驅有功而後援難繼少既無以相接多亦不知所刪乃多少之非惑何妍蚩之能制乎若夫善奕之文則術有恒數按部整伍以待情㑹因時順機動不失正數逢其極機入其巧則義味騰躍而生辭氣叢雜而至視之則錦繪聼之則絲簧味之則甘腴佩之則芬芳斷章之功於斯盛矣文心雕龍總術事寡而無偶俯求之則寂寞而無其支仰應之則寥廓而無所承李善註文選文賦一人之思遲速天懸一家之文工拙壤隔何獨宫商律吕必責其一人也藝文類聚雜文部文病斯乃鼓怒浪於平流震驚飆於静樹使教者煩而多惑學者勞而少功尚書正義序違背本經多引外義猶之楚而北行馬雖疾而去逾逺矣又欲釋經文唯聚難義猶治絲而棼之手雖繁而絲益亂也禮記正義序俾是道場險成軍路南齊書張融傳君此賦正似疥駱馳伏而無娬媚北史劉晝儒林傳緯之成經其猶織綜絲麻不雜布帛乃成今經正緯奇倍擿千里文心雕龍正緯繁華損枝膏腴害骨無貴風軌莫益勸戒此揚子所以追悔雕蟲貽誚於霧縠者也文心雕龍銓賦曾是莠言有虧徳音豈非溺者之妄笑胥靡之狂歌歟文心雕龍諧讔欲穿明珠多貫魚目可謂壽陵匍匐非復邯鄲之歩里醜捧心不闗西施之嚬矣文心雕龍雜文若夫器分有限智用無涯或慙鳧企鶴瀝辭鐫思於是精氣内銷有似尾閭之波神志外傷同乎牛山之木怛惕之盛疾亦可推矣文心雕龍養氣羿氏舛射東野敗駕雖有雋才謬則多謝文心雕龍指瑕贊是綴金翠於足脛靚粉黛於胸臆也文心雕龍事類駢拇枝指由侈於性附贅懸肬實侈於形二意兩出義之駢枝也同辭重句文之肬贅也文心雕龍鎔裁若刻鶴類鶩則無所取焉文心雕龍比興呉錦好渝蕣英徒豔繁彩寡情味之必厭文心雕龍情采贊兩事相配而優劣不均是驥在左驂駑為右服也若夫事或孤立莫與相偶是夔之一足踸踔而行也文心雕龍麗辭理重事複逓相模斆猶屋下架屋牀上施牀耳顔氏家訓序致其音既瘁其言徒靡類乎下管其聲偏疾升歌與之間奏雖復相應而不和諧李善註文選文賦累句以成文猶衆絃之成曲今短韻孤起譬偏絃之獨張絃之獨張含清唱而無應韻之孤起藴麗則而莫承也李善註文選文賦既混妍蚩共為一體翻累良質而為瑕也李善註文選文賦㫖韻失宜類繡之𤣥黄謬叙故淟涊垢濁而不鮮明李善註文選文賦懼蒙塵於叩缶顧取笑乎鳴玉文選文賦言寡情而鮮愛辭浮漂而不歸猶絃么而徽急故雖和而不悲文選文賦徒悦目而偶俗固聲髙而曲下寤防露與桑間又雖悲而不雅文選文賦喻林卷八十九
