body:
  text: 喻林卷九十三明徐元太撰學業門三博古天在山中大畜君子以多識前言往行以畜其德易大畜聼逺音者聞其疾而不聞其舒望逺者察其貌而不察其形立乎定哀以指隱桓隱桓之日逺矣榖梁桓公十四年食肉不食馬肝不為不知味言學者無言湯武受命不為愚史記儒林傳書非史記周圖仲尼不采道非虛無自然嚴平不演海以受淤歲一蕩清君子博識非禮不視蜀志秦宓傳仲尼嚴平會聚衆書以成春秋指歸之文故海以合流為大君子以博識為𢎞蜀志秦宓傳視漢臣之三篋似涉䝉山對梁相之五車若吞雲夢隋書崔廓隱逸傳上學以神聼中學以心聼下學以耳聼以耳聼者學在皮膚以心聼者學在肌肉以神聼者學在骨髓文子道德天下無粹白狐而有粹白之裘掇之衆白也善學者若齊王之食雞必食其跖數千而後足淮南子說山訓昔者蒼頡作書容成造厯胡曹為衣后稷耕稼儀狄作酒奚仲為車此六人者皆有神明之道聖智之迹故人作一事而遺後世非能一人而獨兼有之各悉其知貴其所欲逹遂為天下備今使六子者易事而明弗能見者何萬物至衆而知不足以奄之周室以後無六子之賢而皆修其業當世之人無一人之才而知其六賢之道者何教順施續而知能流通由此觀之學不可已明矣淮南子修務訓有鳥將來張羅待之得鳥者一目也今為一目之羅無時得鳥矣道雖要也非博無以通矣博其方約其說小荀子時事道之於心也猶火之於人目也中穽深室幽黑無見及設盛燭則百物彰矣此則火之耀也非目之光也而目假之則為明矣天地之道神明之為不可見也學問聖典心思道術則皆來覩矣此則道之材也非心之明也而人假之則為己知矣是故索物於夜室者莫良於火索道於當世者莫良於典典者經也潛夫論讚學人目不見青黃曰盲耳不聞宫商曰聾鼻不知香臭曰癕癕聾與盲不成人者也人不博覽者不聞古今不見事類不知然否猶目盲耳聾鼻癕者也王充論衡別通篇人好觀圖畫者圖上所畫古之列人也見列人之面孰與觀其言行置之空壁形容具存人不激勸者不見言行也古賢之遺文竹帛之所載粲然豈徒墻壁之畫哉王充論衡别通篇法令之家不見行事議罪不可審章句之生不覽古今論事不實王充論衡别通篇耕夫多殖嘉榖謂之上農夫其少者謂之下農夫學士之才農夫之力一也能多種穀謂之上農能博學問謂之上儒王充論衡别通篇大川旱不枯者多所疏也潢汙兼日不雨泥輒見者無所通也是故大川相間小川相屬東流歸海故海大也海不通於百川安得巨大之名夫人含百家之言猶海懷百川之流也不謂之大者是謂海小於百川也王充論衡别通篇如皆為用則多者為上少者為下纍積千金比於一百孰為富者王充論衡自紀篇大樂之成非取乎一音嘉膳之和非取乎一味聖人之德非取乎一道故曰學者所以總羣道也羣道統乎己心羣言一乎己口唯所用之故出則元亨處則利貞默則成象語則成文述千載之上若共一時論殊俗之類若與同室度幽明之故若見其情原治亂之漸若指已效徐幹中論治學誠須所師必深必博猶涉滄海而摙水造長洲而伐木獨以力劣為患豈以物少為憂哉抱朴子內篇袪惑古人歎息於才難故謂百世為隨踵不以璞非崑山而棄耀夜之寶不以書不出聖而廢助教之言抱朴子外篇尚博朱緑所以改素絲訓誨所以移蒙蔽披𤣥雲而揚大明則萬物無所隱其狀矣舒竹帛而考古今則天地無所藏其情矣抱朴子外篇朂學涉若涉水獵若獵獸言歷覽之不專精也前漢書注賈山傳三墳五典八索九丘蓋聖人之陳迹耳子何好焉豫曰上紀五帝之盛下述百王之義粲粲如列宿落落如連珠雖復退居窮處簞食瓢飲未始失其樂矣豫可得無好乎太平御覽人事部樂成少伯工吹竽見安昌侯張子夏鼓琴謂曰音不通千曲以上不足以為知音太平御覽樂部竽夫觀書者譬猶登東嶽而知邱陵之嵔㠥也浮滄海而知江河之不廣也見日月而知衆星之照微也仰聖人而知衆說之少觀也太平御覽學部教學譬如大醫觀諸草木皆入醫方種種方便救治疾病皆得差愈無上內祕藏經顯道品譬如王守藏者知王帑藏中金銀珠玉琉璃珍寶有其多少那經比丘上存心今夫蹶者趨者是氣也而反動其心孟子公孫丑上人有雞犬放則知求之有放心而不知求學問之道無他求其放心而已矣孟子告子上今有無名之指屈而不信非疾痛害事也如有能信之者則不逺秦楚之路為指之不若人也指不若人則知惡之心不若人則不知惡此之謂不知類也孟子告子上饑者甘食渴者甘飲是未得飲食之正也饑渴害之也豈惟口腹有饑渴之害人心亦皆有害人能無以饑渴之害為心害則不及人不為憂矣孟子盡心上山徑之蹊間介然用之而成路為間不用則茅塞之矣今茅塞子之心矣孟子盡心下人知求雞犬莫知求其心者惑也學問所以求之矣趙氏注孟子告子上人之心莫隱乎慈莫便乎恕赤子匍匐使我心惻隱於慈故也凌波而先濟跋而望乎後之人便於恕故也此心之弗失焉可以事帝矣可以格天矣可以入道矣子華子執中人中虛圓不徑寸神明舍焉事物交滑如理亂棼如涉驚浸一則以之怵惕一則以之忌諱一則以之懲創是則一日之間一時之頃而徑寸之地如炎如氷矣子華子北宫子仕心胸之兩間其容幾何然則歷陸嶔嶇太行鴈門橫塞之靈臺之關勺水之不通而奚以有容嗜欲炎之好憎氷之炎與氷交戰焉則必兩相傷者矣子華子執中目視雕琢者明愈傷耳聞交響者聰愈傷心思𤣥妙者心愈傷關尹子五鑑次二植中樞周無隅測曰植中樞立督慮也太𤣥經第一周初一藏心於淵美厥靈根測曰藏心於淵神不外也太𤣥經第六養六根不淨當洗其心心不受垢自無諸穢故心為宰官統御一切降伏其心猶馭猛虎如有縱怠反傷汝身虛皇四十九章譬如善調馬師隨馬𢤱悷即時能伏大寶積經卷一百一十二心如獼猴貪六欲故心如畫師能起種種業因緣故大寶積經卷一百一十二無甘蔗子則無種種石蜜諸味若無菩提心者亦無種種三寶諸味大方等大集經卷九以是正心能制諸惡如執鉤策邪法不生大方廣佛華嚴經卷十二發寶馬心離𢤱悷不調故發大車心載一切故發大象心伏諸根故發大山心一切惡風不能動故發小犬心離瞋恚故大方廣佛華嚴經卷五十八菩提心者則為淨水洗濯一切煩惱垢故菩提心者則為大風一切世間無障礙故菩提心者則為盛火能燒一切邪見愛故菩提心者則為淨日普照一切衆生類故大方廣佛華嚴經卷五十九菩提心者則為利劍斬除一切煩惱惡故菩提心者則為金捶壞散一切憍慢山故大方廣佛華嚴經卷五十九菩提心者則為釿斧斫伐無知諸苦樹故菩提心者則為器仗防護一切諸艱難故大方廣佛華嚴經卷五十九菩提心者則為勇健摧滅煩惱諸怨敵故菩提心者則為善鑷拔出一切煩惱刺故菩提心者則為尊主於餘一切莫能勝故大方廣佛華嚴經卷五十九菩提心者則為淨燈普照一切諸法界故菩提心者則為淨眼悉能覩見邪正道故菩提心者則為大道皆令得入一切智城故大方廣佛華嚴經卷五十九菩提心者則為寶象悉能調伏一切根故菩提心者則為寶馬逺離諸惡𢤱悷法故大方廣佛華嚴經卷五十九菩提心者則為沃燋消盡一切不善法故菩提心者則為金剛壞散一切諸惡法故大方廣佛華嚴經卷五十九菩提心者則為如意珠具足一切切德利故菩提心者則為天德瓶滿足一切所欲樂故菩提心者則為劫初樹出生一切莊嚴具故菩提心者則為恆娑相衣不受一切諸塵垢故大方廣佛華嚴經卷五十九譬如飛鳥獼猴不適止一處也心所因不適止一處也佛遺目摩尼寶經推六人心溢蕩猶如風電獼猴擲樹海波潮浪蘇婆呼童子經卷上如蟻守卵如犛牛愛尾如護一子如護一眼如巫師護身如貧人護寶如海師護舶解脫道論卷一藁一持心當如西方石石在中庭雨墮亦不能壞日炙亦不能消風吹亦不能起佛說阿含正行經敬六意駚於響難護難禁法句經心意品藏六如龜防意如城慧與魔戰勝則無患法句經心意品諸善中獨有一心最第一人能一其心諸善皆隨之譬如樓陛當有所倚諸為善者皆著一心那先比丘經卷上以能伏心如猫制鼠禪要呵欲經如馬不著轡勒左右噉草不肯進路若著轡勒則噉草意斷隨人意去大智度論卷六十八心之可畏甚於毒蛇惡獸怨賊大火越逸未足喻也動轉輕躁但觀於蜜不見深坑譬如狂象無鉤猿猴得樹騰躍踔躑難可禁制當急挫之無令放逸遺教經論離十二勿令放逸入於五欲譬如牧牛之人執杖視之不令縱逸犯人苖稼遺教經論離十二涵養宋人有閔其苖之不長而揠之者芒芒然歸謂其人曰今日病矣豫助苖長矣其子趨而往視之苖則槁矣天下之不助苖長者寡矣以為無益而舍之者不耘苖者也助之長者揠苖者也非徒無益而又害之孟子公孫丑上牛山之木嘗美矣以其郊於大國也斧斤伐之可以為美乎是其日夜之所息雨露之所潤非無萌蘖之生焉牛羊又從而牧之是以若彼濯濯也人見其濯濯也以為未嘗有材焉此豈山之性也哉雖存乎人者豈無仁義之心哉所以放其良心者亦猶斧斤之於木也旦旦而伐之可以為美乎其日夜之所息平旦之氣其好惡與人相近也者幾希則其旦晝之所為有梏亡之矣梏之反覆則其夜氣不足以存夜氣不足以存則其違禽獸不逺矣人見其禽獸也而以為未嘗有才焉者是豈人之情也哉故茍得其養無物不長茍失其養無物不消孟子告子上誠得其養若雨露於草木法度於仁義何有不長也誠失其養若斧斤牛羊之消草木利欲之消仁義何有不盡也趙氏注孟子告子上夫火熱而水滅之金剛而火銷之木強而斧伐之水流而土遏之惟造物者物莫能勝也故中欲不出謂之扃外邪不入謂之塞中扃外閉何事之不節外閉中扃何事之不成弗用而後能用之弗為而後能為之淮南子主術訓下次二間其藏固珍寶測曰間其藏中心淵也大𤣥經第一間風者隂陽亂氣激發而起者也猶人之內氣因喜怒哀樂激越而發也太平御覽天部九風庾公造伯仁曰君何所欣悅而忽肥庾曰君復何所憂慘而忽瘠伯仁曰吾無所憂直是清虛日來滓穢日去太平御覽人事部肥嬰兒之姿貴養厚敦西升經譬如畫石其文恆在畫水易滅勢不可住瞋恚難除譬如畫石善根易滅猶如畫水是故此心難得調伏如大火聚其明久住電光之明其光不停瞋如火聚慈如電火是故此心難得調伏元陽妙經卷五煩惱之人堅牢難去真道之心輕浮易去譬如家犬不畏於人山林野鹿見人怖走瞋恚難去如守家犬慈心易失猶如野鹿是故此心難可調伏元陽妙經卷五能令衆生善根成熟增長善芽大方等大集經卷一譬如調馬師馬有搪揬者當數數教之久後調好佛遺日摩尼寶經推六猶如鬘師以水灑華使不萎枯潤澤鮮明長阿含經卷十八如良地有娑羅林彼中有守娑羅林人明健不懈諸娑羅根以時鋤掘平髙填下糞沃溉灌不失其時若其邊有穢惡草生長盡拔棄之若有橫曲不調直者盡􅀈治之若有極好中直樹者便擁護養隨時鋤掘糞沃溉灌不失其時如是良地娑羅樹林轉茂盛好中阿含經卷三十五佛呼沙門問之汝處于家將何修為對曰恆彈琴佛言絃緩何如曰不鳴矣絃急何如曰聲絶矣急緩得中何如諸音普調佛告沙門學道猶然執心調適道可得矣佛說四十二章經尺一譬象調正可中王乘法句經象喻品制根從正如馬調御法句經羅漢品猶如榖種子入地即變易隨時溉灌萌芽得長出曜經三愛品譬如王有守門者知王有所敬者知王有所不敬者知有利王者知有不利王者守門者知王所敬者知利王者便內之知王不敬者知不利王者守門者即不內那先言人持意亦如是諸善者當內之諸不善者不當內守意制心譬亦如是那先比丘經卷上知色知相知刮刷知覆瘡知作烟知好道知牛所宜處知好度濟知安隱處知留乳知養牛主若放牛人知此十一法能令牛羣蕃息大智度論卷二充才有荏染然柔忍之木是維可以為弓之幹我乃緡被之以絲則有絃而成弓可以為弓明矣亦猶溫溫然寬柔之人是維可以為德之基我乃教訓之以學則有能而成德可以為法矣毛詩正義抑孔子曰野哉君子不可以不學見人不可以不飾不飾無貌無貌不敬不敬無禮無禮不立夫逺而有光者飾也近而逾明者學也譬之如汙邪水潦灟焉莞蒲生焉從上觀之誰知其非源泉也大戴禮記勸學子路曰南山有竹不揉且直斬而用之達於犀革以此言之何學之有子曰栝而羽之鏃而礪之其入之不亦深乎孔子家語子路初見良玉不琢資質潤美不待刻琢此亡異於達巷黨人不學而自知也然則常玉不琢不成文章君子不學不成其德前漢書董仲舒傳龍淵太阿出昆吾之金和氏之璧由井里之田礱之以砥礪錯之以他山故能致連城之價為命世之寶學亦人之砥礪也魏志文帝紀注荆山之璞雖美不琢不成其寶顔冉之才雖茂不學不𢎞其量晋書景帝紀班爾之妙曲木變容朱藍所染素絲改色隋書李德林傳若使貴遊之輩飾以明經可謂稽山竹箭加之以括羽北齊書儒林傳和之璧井里之厥也玉人琢之為天子寶荀子大略且天生人也而使其耳可以聞不學其聞不若聾使其目可以見不學其見不若盲使其口可以言不學其言不若爽使其心可以知不學其知不若狂故凡學非能益也達天性也吕氏春秋尊師夫瘠地之民多有心者勞也沃地之民多不才者饒也由此觀之知人無務不若愚而好學淮南子修務訓弓待檠而後能調劍待砥而後能利玉堅無敵鏤以為獸首尾成形礛諸之功木直中繩揉以為輪其曲中規隱括之力唐碧堅忍之類猶可刻鏤揉以成器用又況心意乎淮南子修務訓劍雖利不厲不斷材雖美不學不髙雖有旨酒嘉殽不嘗不知其㫖雖有善道不學不達其功故學然後知不足教然後知不究韓詩外傳雖有良玉不刻鏤則不成器雖有美質不學則不成韓詩外傳砥所以致於刃學所以盡其才鹽鐵論殊路夫學者崇名立身之本也儀狀齊等而飾貌者好質性同倫而學問者智說苑建本騏驥雖疾不遇伯樂不致千里干將雖利非人力不能自斷焉烏號之弓雖良不得排檠不能自任人才雖髙不務學問不能致聖說苑建本學所以益才也礪所以致刃也吾嘗幽處而深思不若學之速吾嘗跂而望不若登髙之博見說苑建本有刀者礲諸有玉者錯諸不礲不錯焉攸用礲而錯諸質在其中矣揚子學行工欲善其事必先利其器王欲宣其義必先讀其智易曰君子以多識前言往行以畜其德是以人之有學也猶物之有治也故夏后之璜楚和之璧雖有美璞卞和之資不琢不錯不離礫石夫瑚簋之器朝祭之服其始也乃山野之木蠶繭之絲耳使巧倕加繩墨而制之以斤斧女工加五色而制之以機杼則皆成宗廟之器黼黻之章可著於鬼神可御於王公而况君子敦貞之質察敏之才攝之以良朋教之以明師文之以禮樂導之以詩書讚之以周易明之以春秋其有濟乎潛夫論讚學骨曰切象曰磋玉曰琢石曰磨切磋琢磨乃成寶器人之學問知能成就猶骨象玉石切磋琢磨也王充論衡量知篇學猶飾也器不飾則無以為美觀人不學則無以有懿德有懿德故可以經人倫為美觀故可以供神明故書曰若作梓材既勤朴斫惟其塗丹雘徐幹中論治學馬雖有逸足而不間輿則不為良駿人雖有美質而不習道則不為君子故學者求習道也若有似乎畫采𤣥黃之色既著而純皓之體斯亡敝而不渝孰知其素歟徐幹中論治學南威青琴姣冶之極而必俟盛飾以增麗回賜游夏雖天才雋朗而實須墳誥以廣智抱朴子外篇博喻泣血之寶仰礛䃴以摛景沉閭孟勞須楚砥以斂鋒騮驛待王孫而致逺令質俟隱括而成德抱朴子外篇博喻文梓干雲而不可名臺榭者未加班輸之結構也天然爽朗而不可謂之君子者不識大倫之臧否也抱朴子外篇朂學雖云色白匪染弗麗雖云味甘匪和弗美故瑶華不琢則耀夜之景不發丹青不治則純鈞之徑不就火則不鑽不生不扇不熾水則不决不流不積不深故質雖在我而成之由彼也抱朴子外篇朂學吳簳質徑非筈羽而不美越劍性利非淬礪而不銛人性譞惠非積學而不成劉子崇學不登峻岑不知天之髙不瞰深谷不知地之厚不遊六藝不知智之源劉子崇學青出於藍而青於藍染使然也氷生於水而冷於水寒使然也鏡出於金而明於金瑩使然也戎夷之子生而同聲長而異語教使然也劉子崇學海蚌未剖則明珠不顯崑竹未斷則鳯音不彰情性未鍊則神明不發劉子崇學耳形完而聼不聞者聾也目形全而視不見者盲也人性美而不監道者不學也劉子崇學夫繭繅以為絲織為縑紈繢以黼黻則王侯服之學為禮儀絲以文藻而世人榮之繭之不繅則素絲蠧於筐籠人之不學則才智腐於心胸劉子崇學譬諸金木金性苞水木性藏火故鍊金則水出鑽木而火生人能務學鑽鍊其性則才慧發矣劉子崇學不及盛年講肄道義使明珠加磨瑩之功荆璞發採琢之榮不亦良可惜乎補文選戴邈學校疏皎皎練練得藍則青得丹則赤得蘖則黃得涅則黑玉不琢則南山之圓石意林正部水性雖能流不導則不通人性雖能智不教則不逹學猶植也不學將落意林成敗志象弭飾堂溪之材鷲羽加淇園之竹文苑英華周宣帝檄一明珠不瑩焉發其光寶玉不琢不成璋圭太平御覽珍寶部珠下鐵使平越之工鑄之以為劍而弗加砥礪則以刺不入擊不斷磨之以礱礪加之以黃砥則刺也無前擊也無下自是觀之礪之與弗礪其相去逺矣今人皆礪其劒而弗知礪其身夫學身之砥礪也太平御覽雜物部礪志不務學弗能成才如以盆盎之水求一山之形形不可得則志由此惑何氏語林識鑒譬如有人遇得寶珠示治寶者言我此寶價直無量然其形色未甚光鮮汝當為我如法磨瑩但令鮮淨勿懷形色其治寶者隨彼所言依法專心如如磨瑩如是如是光色漸發乃至究竟映徹表裏既修治已價直無量波羅蜜多經卷五百七十五譬如芽種皆依地生由勤溉灌令芽生長蘇婆呼童子經卷上求明誰能革濁清我濯溉誰能昭暗啓我童昧後漢書傅毅傳不知而問堯舜無有而求天府先王之道則堯舜已六二之博則天府已荀子大略朱儒問徑天髙於修人修人不知曰子雖不知猶近之於我故凡問事必於近者淮南子說山訓通於學者若車軸轉轂之中不運於己與之致千里終而復始轉無窮之源不通於學者若迷惑告之以東西南北所居聆聆背而不得不知凡要淮南子說山訓太山之髙背而弗見秋毫之末視之可察淮南子說林訓夫指之拘也莫不事申也心之塞也莫知務通也不明於類也淮南子泰族訓人心必有明焉必有悟焉如火得風而炎熾如水赴下而流速徐幹中論治學民之初載其矇未知譬如寶在於𤣥室有所求而不見白日照焉則羣物斯辨矣學者心之白日也徐幹中論治學茍得其要則八極之外如在指掌百代之逺有若同時不必在乎庭宇之左右俟乎瞻視之所及然後知之也抱朴子外篇對俗欲超千里於終朝必假追影之足欲凌洪波而遐濟必因艘楫之器欲見無外而不下堂必由之乎載籍欲測淵微而不役神必得之乎明師抱朴子外篇朂學浚井不泄則混濘滋積嘉榖不藝則荑莠彌蔓學而不思則疑閡實繁講肄不精則長惑喪功抱朴子外篇博喻登𤣥圃者悟丘阜之卑浮溟海者識池沼之褊披九典乃覺墻面之篤蔽聞至道乃知拘俗之多迷抱朴子外篇廣譬幼而學者如日出之光老而學者如秉燭夜行猶賢乎瞑目而無見者也顔氏家訓務學耳之初窒目之始昧必不吝百金遭醫千里人不涉學猶心之聾盲不知逺祈明師以攻心術性之蔽也劉子崇學夫兩葉掩目則冥默無覩雙珠填耳必寂寞無聞葉作目蔽珠為耳鯁二關外擁視聼內隔固其宜也劉子專學天以神明光燭幽明照曜四方人以潛心鈎深致逺探賾索隱揚子法言注問神篇以明照物明盡則照窮而勿照之明猶無得之得無得而得斯為真得故勿照之明斯為真明矣演真明而廣照何止鑒窮沙界乎李善注文選王簡棲頭陀寺碑文人皆知滌其器莫知洗其心君子審其宗而後學明其道而後行意林物理論登山小魯泛海難沂參珉見璧辨礫知璣藝文類聚內典部內典頌若風之吹雲明乎若見蒼天黃帝素問靈樞經九針十二原猶如半月漸見光明元陽妙經卷二亦如有人處於暗室執大炬火悉見諸物元陽法炬亦復如是元陽妙經卷九如於暗室得大明燈普使一切得是光明三十六部尊經上真經偈猶如明鏡能見色象了了分明種種差别是鏡中象不可定說是有是無而亦得言鏡中有像一切衆生心鏡明故見真道像又如止水無濤波故影現日月星辰飛鳥日月星辰及以飛鳥悉見水底一切諸物亦見自影了了分明此水物及所見影俱非真實不可言有不可言無一切衆生心水澄清見道身影亦復如是靈寶祕蜜經如燈破暗名之為滅海空智藏經哀歎品又如礦中金治已轉增明大寶積經卷二十八譬如有鏡塵翳所覆或取磚末及以油灰磨拭令淨大寶積經卷五十五猶如日月雲霧覆蔽猛風卒起吹令四散而此日月忽然大明大寶積經卷五十五譬如小燈燭光或在壁或在室能滅大黑暗分大寶積經卷一百十譬如千歲𡨕室未曾見明若然燈時暗寧有念我久住此不欲去耶大寶積經卷一百一十二譬如有藥名無垢光若復有人用塗其眼眼得清淨一切暗色不能為障大方廣佛華嚴經卷二譬如日出光之所及衆暗咸除日沒光謝暗便如故大乘顯識經推三譬如熱鐵團熱去鐵無損解脫者亦爾惑盡而清凉大乘密嚴經卷上譬如室內久來有暗若將燈入即便暗滅蘇婆呼童子經卷下問慧者如冥中有燈火佛說阿含正行經敬六譬如人有鏡不明不見形磨去其垢即自見形人已去貪淫瞋恚愚癡譬如磨鏡佛說阿含正行經敬六譬如日出衆冥皆索修行道地經菩薩品譬如日月以五事覆曀烟雲塵霧羅㬋阿修羅手障則不能明照人心亦如是為五蓋所覆自不能利亦不能益人大智度論卷十七治暗光明復有三種一在夜分謂星月等二在晝分謂日光明三在俱分謂火珠等瑜伽師地論卷十一當知初明治三種暗一者夜暗二者雲暗三者障暗瑜伽師地論卷十一千載闕疑從春氷而俱泮一世顛倒與浮雲而俱開𢎞明集卷十夫日舒則夜卷月生則隂滅燈之破暗猶慧之銷障法苑珠林卷三十五喻林卷九十三
