body:
  text: 喻林卷五十六明徐元太撰人事門五十四必敗不利渉大川入于淵也易訟上六濡其首厲象曰濡其首厲何可乆也易既濟以小人之身過而弗遇必遭羅網其猶飛鳥飛而无託必離矰繳周易正義小過王行既可哀傷又將至於傾危猶商人渉路既有疲勞又將困於隂雨商人之遇隂雨則有泥陷之難王行之至傾危必有滅亡之憂毛詩正義正月周將亡如心星之光耀見於魚笱之中其去湏臾也鄭氏箋詩苕之華王自絶於天如泉水之流稍就虚竭鄭氏箋詩抑厚而無基必自崩喻衆所不附將自敗也春秋正義隐公元年幽王敗亂周之法度猶毁壊髙山以為魁陵糞土殘絶川藪以為溝瀆無有悛止之時國語解周下單穆公夫以一縷之任係千鈞之重上縣無極之髙下垂不測之淵雖甚愚之人猶知哀其將絶也馬方駭鼓而驚之係方絶又重鎮之係絶於天不可復結隊入深淵難以復出前漢書枚乗傳雖有孫呉將賁育士若入水火往必焦沒知勇亡所施前漢書西南夷傳炎炎燎火亦允不陽前漢書敘傳述成紀牆隙而髙其崩必疾也後漢書折像傳袁紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絶其哺乳立可餓殺後漢書袁紹列傳若魚遊釡中喘息湏㬰間耳後漢書張皓列傳猶冰霜見日必至消滅後漢書劉陶謝傳猶舉函牛之鼎絓纖枯之末詩人所以眷然顧之澘焉出涕者也後漢書劉陶謝傳以張將軍之衆當百萬之師猶以小雪投沸湯雖欲戮力其勢不全也後漢書張宗列傳鑊中之魚火熾湯盡當悉燋爛後漢書應奉傳註則羣逆冰摧不俟朱陽之耀若秋霜隕蘀豈待勁風之威晉書姚興上傳想來逆者當前行一尺却行一丈晉書長沙王文傳螳黽㣲命擬雷霆之衝已枯之葉當霜飆之隊宋書孔凱傳猶勁飆之拂細草烈火之掃寒原燋卷之形昭然已著宋書鄧琬傳雖窮鳥必啄固等命於梁鶉困獸斯驚終竝懸於㕑鹿南齊書王融傳此其必亡也猶自萬仞之山播而入深淵其死而不振也必矣管子宙合譬之猶廓革者也廓之大則大矣裂之道也淮南子道應訓譬若載無轄之車以臨千仞之谷其不顛覆亦難冀也孔叢子嘉言髙牆豐上激下未必崩也降雨興流潦至則崩必先矣草木根荄淺未必撅也飄風興暴雨墜則撅必先矣君子居是邦也不崇仁義尊賢臣以理萬物未必亡也一旦有非常之變諸矦交争人趨車馳廹然禍至乃始憂愁乾㗋焦唇仰天而嘆庶幾乎望其安也不亦晚乎韓詩外傳搆兵争強而卒俱亡雖以進壤廣地如食萴之充賜也欲其安存何可得也鹽鐵論誅秦是猶措重寳於道路而莫之守也求其不亡何可得乎鹽鐵論世務包丘子不免於甕牖蒿廬如潦嵗之鼃口非不衆也然卒死於溝壑而已鹽鐵論毁學眄雞無距與鵲交鬬翅折目盲為鳩所傷焦氏易林乾之遯弓矢俱張把彈折絃丸發不至道遇害患焦氏易林乾之明夷小狐渡水汗濡其尾焦氏易林蒙之師樹植藿豆不得芸鋤焦氏易林訟之履鰌蝦去海藏於枯里焦氏易林謙之明夷精華墜落形體醜惡齟齬挫頓枯槁腐蠧焦氏易林豫之履冰入炭室消亡不息焦氏易林随之困病篤難醫和不能治焦氏易林臨之益病疾不醫下即蒿廬焦氏易林觀之坤斧斤所砟瘡痏不息鍼口不施下即空室焦氏易林噬嗑之益昧暮乗車履危蹈溝亡失羣物摧折兩軸焦氏易林暌之履執熱爛手大為災咎焦氏易林姤之中孚坎中蝦蟆乍盈乍虚三夕二朝形消无餘焦氏易林困之暌兎跛鹿踦縁山墜墮焦氏易林歸妹之暌言太山將頽為池以喻君且失其位用心迷惑過惡已成若江河之決不可涸塞也王逸註楚辭七諫言使蒯聵無義之人登於清廟而執綱紀放棄聖人咎繇於外野政必亂身危殆也王逸註楚辭九歎言駟馬驚犇雖有執轡之御猶不能制必摧車軛而折其轅以言賢臣奔亡使國荒亂而傾危也王逸註楚辭九歎無異䇿穿蹄之乗而登太行之險亦必顛躓矣徐幹中論審大臣不得其術者古人方之於冰盃之盛湯羽苞之蓄火也抱朴子内篇極言然身中之所以為氣為血者株源已喪但餘其枝流也抱朴子内篇極言夫災蟲害榖至降霜則殄矣佞雄亂羣值嚴時則敗矣抱朴子外篇疾謬重載不止所以沈我舟也昧進忘退所以危我身也聚蝎攻本雖權安然必傾之徴也抱朴子外篇廣譬鄉黨之友不洽而勤逺方之求涖官之稱不著而索不次之顯是以雖佻虚譽猶狂華干霜以寒曜不崇朝而零碎矣雖竊大寳於不料冒惟塵以負乗猶鮮介附騰波以髙凌顧眄已枯株於危陸矣抱朴子外篇循本披褐而喪珠失皮而露質兀若枯木泊若窮流顔氏家訓勉學濳朽之木不能當傾山之風含隟之崖難以值滔天之濤抱朴子外篇廣譬魏明帝善哉行曰權實豎子備則亡虜假氣遊魂鳥魚為伍李善註文選孫子荆為石仲容書薄戍綿羃無異蛛蝥之網弱卒瑣甲無異螳蜋之衛文選魏都賦故函谷擊柝於東西朝顛覆而莫持文選東京賦不知天網設張以在綱目㸑鑊之魚期於消爛也文選陳琳檄呉將校文外失輔車唇齒之援内有毛羽零落之漸文選孫楚為石仲容作書嗟弊廬之難保若霣蘀之從風廣文選沈休文郊居賦薄冰當白日聚毛遇猛火雖欲逺害其勢不可意林魏子舟從流於河而無維檝求安不可得也意林公孫文子桀紂雖有天子之位而無一人之譽猶朽株枯樹逢風則仆意林正部猶搦轡而繁䇿馳覆車之危路羣乗舟而無楫將何川而能渡藝文類聚雜文部賦賦危殆之國治不益之民是猶薄冰當白日聚毛過猛火也藝文類聚水部冰此禍水也滅火必矣事文類聚宫嬪漂櫓溺驂孱然已至亂麻積莽可為寒心文苑英華盧思道檄一食鉤吻以療饑飲鴆毒以救渇文苑英華杜弼檄一夫齎不訾之寳獨宿曠野其危甚於累卵比之秦猶有泰山之安也太平御覽珍寳部寳奔車失轄泛舟無檝欲以不覆未之有也太平御覽舟部敘舟中岐伯曰五官不辨闕庭不張小其明堂蕃蔽不見又埤其牆牆下無基垂角去外如是者雖平常殆况加疾哉黄帝素問靈樞經五閲五使居君者為虜居虎者為䑕名在青雲之上身處黄泉之下道徳經指歸卷八如其不爾無為抱石而濟長津矣漢武帝内傳若以野葛一寸巴豆一兩入㗋輒殭不得俛仰當此之時周文揲蓍孔父占象扁鵲操鍼巫咸叩鼔安能令蘇復起馳走參同契譬如稻莠節蟲即死海空智藏經持誡品猶如河岸臨險之樹若遇驚飆必當顛墮元陽妙經卷一違道失徳如兒生無母如魚脱淵靈寳自然妙經譬如枯朽之木遇風即折將崩之岸值水先頹養性延命錄教誡篇不異舉滄波以注爝火頽華嶺而斷涓流語其易也甚於茲矣養性延命錄教誡篇如仰唾天不離其身如仰射天箭還自中玉清經道化四夷品如履湯炭稀不燒灼玉清經通濟幽㝠品如有商人無巧便智船在海岸未具裝治即持財物安置其上推著水中速便進發是船中道壊沒人船財物各散異處波羅蜜多經卷三百一十二譬如泛海所乗船破其中諸人若不取木器物浮囊板片為依附者定知溺死不至彼岸波羅蜜多經四百四十四譬如斷華著日中即為萎枯道行波羅蜜經卷三譬如以鹽投水消滅無餘大寳積經七十三如以蘇滴置炎鐵上欻自消滅大寳積經卷一百二十如取水魚置夏日中熱惱所逼宛轉于地大寳積經卷一百二十猶如度海乗朽爛船於大海中或沉或浮大寳積經卷一百二十譬如有人吞金剛丸當知是人不乆必死何以故彼金剛丸不可消故大集菩薩三昧經卷十猶衆盲兒各相扶持彼在前者不見於後亦不見中彼在中者不見於前亦不見後彼在後者不見於中亦不見前中阿含經卷三十八如人執小木而入於巨海人木則俱沒雜阿含經卷十六若樓若堂屋不覆若使雨來笮亦漬椽亦漬壁亦漬已漬壁亦腐椽亦腐笮亦腐三觀經縁十如海無主船隨風而東西本縁經毗羅摩品譬如坏器值天降雨悉皆爛壊無有遺餘三界衆生亦復如是遇無常雨無得免者本緣經持王子品譬如兩人俱不曉泅墮於深水欲相勉濟反更溺死譬如盲牽盲欲有所至中道迷惑竟不能達脩行道地經慈品譬如山水流行暴疾起曲横波有人欲渡入水而泅欲至彼岸廻波制還令在中流既疲且極遂沉波水沒在其底脩行道地經數息品佛言愛欲之於人猶執炬火逆風而行愚者不釋炬必有燒手之患佛説四十四章經尺一佛言人繫於妻子寳宅之患甚於牢獄桎梏榔檔牢獄有原赦妻子情欲雖有虎口之禍已猶甘心投焉其罪無赦佛説四十二章經尺一如囚在獄四顧牢宻唯有厠孔更無異路如人中毒唯糞能治更無餘藥禪要呵欲經如毒摩瘡船入洄澓惡行流愆靡不傷剋法句經惡行品如江河無水游魚無所依樹木皆摧折飛禽無所止正法經卷一法船欲破法城欲頹法海欲竭法幢欲倒法燈欲滅説法人欲去大智度論卷二譬如老病失力死事易得大智度論卷十四如吞鉤之魚雖復遊戯池中當知出在外不乆大智度論卷六十六譬如風雨在牛皮中則爛壊大智度論卷七十是以投火有必麋之軀漂海無或生之命法苑珠林卷六十五狥外咸道轉進離栂升腓腓體動躁者也感物以躁凶之道也王弼註易咸今不知道者見柔懦者侵則矜為剛毅見剛毅者亡則矜為柔懦此本無主於中而見聞舛馳於外者也故終身而無所定趨譬猶不知音者之歌也濁之則鬱而無轉清之則燋而不謳及至韓娥秦青薛談之謳侯同曼聲之歌憤於志積於内盈而發音則莫不比於律而和於人心何則中有本主以定清濁不受於外而自為儀表也今夫盲者行於道人謂之左則左謂之右則右遇君子則易道遇小人則陷溝壑何則目無以接物也淮南子汜論訓以瓦鉒者全以金鉒者跋以玉鉒者發是故所重者在外則内為之掘淮南子説林訓觀射者遺其藝觀書者忘其愛意有所在則忘其所守淮南子説林訓次六從其目失其腹測曰從目失腹欲丕從也太𤣥經第二從汝不聞莒人有狥人而忘身者乎以千金遊於天下必求其悦己者有不悦者則分金而惠之悦己者不盈千人而金竭遂憾而死今吾潔其躬而失蜀人之望非固也竊慮莒人之金不足以勝悦己之衆耳天禄閣外史辭爵夫勞形役智以應世務失其自然者也故堯有亢龍之喻舜有卷僂之談周公類之走狼仲尼比之逸狗豈不或信哉荘子音義外物夫人在陽時則舒在隂時則慘此牽乎天者也處沃土則逸處瘠土則勞此繫乎地者也慘則尠於歡勞則褊於惠能違之者寡矣文選西京賦譬如愁人心意昏亂煩毒熱悶於此人前設諸幻術木男木女木牛木馬羅列施張作諸戲術愁者見之生牛馬想息諸煩惱心意泰然大乗妙林經譬如青蓮鬘漂鼔隨波動大莊嚴經論卷四偈飾貌輔頰舌者言語之具咸道轉末在於口舌言語而已故云咸其輔頰舌也周易正義咸靜言庸違象恭淊天書堯典貌象恭敬而心傲狠其侮上陵下若水漫天尚書正義堯典蠶則湏匡以貯繭而今無匡蟹背有匡匡自著蟹則非為蠶設蜂冠無緌而蟬口有緌緌自著蟬非為蜂設亦如成人兄死初不作衰後畏於子臯方為制服服是子臯為之非為兄施亦如蟹匡蟬緌各不關於蠶蜂也禮記正義檀弓下色厲而内荏譬諸小人其猶穿窬之盜也與論語陽貨男子樹蘭美而不芳繼子得食肥而不澤情不相與往來也淮南子繆稱訓不得已而歌者不事為悲不得已而舞者不矜為麗歌舞而不事為悲麗者皆無有根心者淮南子詮言訓畵西施之靣美而不可説規孟賁之目大而不可畏君形者亡焉淮南子説山訓情貌不相副若穿踰之盜自古而患之鹽鐵論國病次五鼎大可觴不齊不莊測曰鼎大可觴饗無意也太𤣥經第四竈口稱静退心希榮利未得𤣥圃之棲禽九淵之濳鱗也抱朴子外篇正郭飾冠以玉光好外見中非所有也前漢書註陳平傳予非荆山璞謬登和氏塲羊質服虎文燕翼假鳯翔文選棗據詩以犬羊之質服虎豹之文無衆星之明假日月之光文選魏文帝與呉質書隼翼鷃披虎威狐假廣文選庾子山哀江南賦程曉女典曰麗色妖容髙才美辭此乃蘭形棘心玉曜瓦質困學紀聞卷十七評文譬若錦韜矛羅縠裹鋒鋩愚者覩其表翫之以自殃優填王經衣六如生盲人著金華鬘是不自知三戒經卷中結跏趺端坐不動如大山其心内迷𣪚情猶象墮澗脩行道地經慈品如是脩行者身定而心亂譬若樹狂華不成果而落脩行道地經慈品口言柔軟而心懐毒如種苦樹其華色鮮成果甚苦脩行道地經慈品譬如畵缾視表甚好裏空且㝠脩行道地經慈品如人得畵缾發之知不淨脩行道地經數息品汝是不淨聚集諸穢惡物雖服珍妙衣如莊嚴厠舎禪要阿欲經亂真孔子曰惡似而非者惡莠恐其亂苖也惡佞恐其亂義也惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄉原恐其亂徳也孟子盡心下西門豹為鄴令而辭乎魏文矦魏文侯曰子往矣必就子之功而成子之名西門豹曰敢問就功成名亦有術乎文矦曰有之矣鄉邑老者而先受坐之士子入而問其賢良之士而師事之求其好掩人之美而揚人之醜者而叅驗之夫物多相類而非也幽莠之幼也似禾黧牛之黄也似虎白骨疑象武夫疑玉此皆似之而非者也戰國䇿魏文侯犂牛之駮似虎莠之㓜似禾事有似是而非者魏志文帝紀註舎實逐聲之行是猶美西施而學其顰眉慕有道而折其巾角所以為慕者非其所以為美徒貴貌似而已矣夫紫之亂朱以其似朱也故鄉原似中和所以亂徳放達似達所以亂道然竹林之為放有疾而為顰者也元康之為放無徳而折巾者也可無察乎晉書戴逵傳使人大迷惑者必物之相似也玉人之所患患石之似玉者相劒者之所患患劒之似呉干者賢主之所患患人之博聞辯言而似通者亡國之主似智亡國之臣似忠相似之物此愚者之所大惑而聖人之所加慮也故墨子見岐道而哭之吕氏春秋疑似梁北有黎丘部有竒鬼焉喜效人之子姪昆弟之狀邑丈人有之市而醉歸者黎丘之鬼效其子之狀扶而道苦之丈人歸酒醒而誚其子曰吾為汝父也豈謂不慈哉我醉汝道苦我何故其子泣而觸地曰孽矣無此事也昔也往責於東邑人可問也其父信之曰譆是必夫竒鬼也我固嘗聞之矣明日端復飲於市欲遇而刺殺之明旦之市而醉其真子恐其父之不能反也遂逝迎之丈人望其真子拔劒而刺之丈人智惑於似其子者而殺其真子夫惑於似士者而失於真士此黎丘丈人之智也吕氏春秋疑似芻狗能立而不能行蛇牀似麋蕪而不能芳淮南子説林訓譬若土龍文章首目具而非龍也葶歴似菜而殊味玉石相似而異類鹽鐵論刺議次五􅀈徒冬切黄疑金中測曰􅀈黄疑中邪奪正也太𤣥經第五疑魚目豈為珠蓬蒿不成檟參同契箋註下篇夫治世不得真賢譬猶治疾不得良醫也治疾當真人參反得支羅服當得麥門冬反烝横麥已而不識真合而服之病以侵劇不自知為人所欺也乃反謂方不誠而藥皆無益於病因棄後藥而弗敢飲而便求巫覡者雖死可也濳夫論思賢所患於其如碔砆之亂瑾瑜鷦螟之似鳯凰凝冰之類水精煙熏之疑雲氣故令不謬者尟也抱朴子外篇行品佞與賢相類詐與信相似辯與智相亂愚直相像若薺苨之亂人參蛇牀之似䕷蕪也劉子心隐蒼蠅間乎白黒紅紫似朱而非揚子法言註吾子篇黄精葉乃與鈎吻相似惟莖不紫花不黄為異而人多惑之其類乃殊遂致死生之反本草黄精珉似玉而非玉雞類鳯而非鳯物誠有之人故宜爾廣文選范子真神滅論君子不以昏行易操不以夜昧易容夫自有髙世之名必有負俗之累有絶羣之節必嬰謗嗤之患白骨擬象魚目似珠遙聽逺望無不亂也意林唐子如似被金塗磨時色不顯金若不真者以石磨則知大莊嚴經論卷七偈忌蕕紫之妨薫朱器雉珉之亂鳯玉𢎞明集十嗟夫北里之亂雅惡緑之奪黄也𢎞明集正誣論失真蚩兄死者言其衰之不為兄死如蟹有匡蟬有緌不為蠶之績范之冠也鄭氏註禮檀弓下燕人生於燕長於楚及老而還本國過晉國同行者誑之指城曰此燕國之城其人愀然變容指社曰此若里之社乃喟然而嘆指舍曰此若先人之廬乃涓然而泣指壠曰此若先人之冢其人哭不自禁同行者啞然大笑曰予昔紿若此晉國耳其人大慚及至燕真見燕國之城社真見先人之廬冢悲心更㣲列子周穆王郢人有遺燕相國書者夜書火不明因謂持燭者曰舉燭云而過書舉燭舉燭非書意也燕相受書而説之曰舉燭者尚明也尚明也者舉賢而任之燕相白王大説國以治治則治矣非書意也今世舉學者多似此類諱非子外儲説左上亡國戮民非無樂也不樂其樂溺者非不笑也罪人非不歌也狂者非不武也亂世之樂有似於此君臣失位父子失處夫婦失宜民人呻吟其以為樂也若之何哉吕氏春秋大樂次三畵象成形孚無成測曰畵象成形非其真也太𤣥經第四禮風之與虎亦同氣類設為土虎置之谷中風能至乎夫土虎不能而致風土龍安能而致雨王充論衡亂龍篇情茍類焉則雖形不與同而物無害心情類茍亡則雖形同母子而不足以固其志矣郭子註荘徳充符慕賞而孝去真逺矣斯尚賢之過也其波蕩傷性遂至於踣河郭子註莊外物不雜為淳以水澆之則味漓薄樸大質也割之則散也前漢書註黄霸傳魏略云大秦國出赤白黒黄青綠縹紺紅紫十種流離此葢自然之物采澤光潤喻於衆玉其色不恒今俗所用皆銷治石汁加以衆藥灌而為之尤虚脆不真實非真物前漢書註西域傳圗形於影未盡纖麗之容察火於灰不覩洪赫之烈是以問道存乎其人觀物必造其質文選陸機演連珠一犬吠形百犬吠聲意林潜夫論譬如畵師畵形而非真形无上内秘藏經顯功徳品譬若木人機關作之既畢觧剝其體節節相離手足狼藉優填王經衣六如有男子欲見大海遊到陂沱及泉江河於彼求寳而獲水精小明月珠自以還得金剛尊光脩行道地經縁覺品譬如有人欲見天帝而覩邉王則謂是帝欲學正覺意有齊限不解深慧還墮縁覺亦如是也脩行道地經縁覺品如機關木人動雖能動作内無有主大智度論卷三十如油中見像黒則非本色如五尺刀中横觀則靣像廣縱觀則靣像長則非本靣大智度論卷三十六有一山羌偷王庫物而逺逃走爾時國王遣人四出推尋捕得山羌答言我衣乃是祖父之物王遣著衣實非山羌本所有故不知著之應在手者著於脚上應在腰者反著頭上借以為譬王者如佛寳藏如法愚癡羌者猶如外道竊聽佛法著己法中以為自有然不解故布置佛法迷亂上下不知法相如彼山羌得王寳衣不識次第顛倒而著百喻經卷上昔有一人入山學道得五通仙天眼徹視能見地中一切伏藏種種珍寳國王聞之心大歡喜便語臣言云何得使此人常在我國不餘處去使我藏中得多珍寳有一愚臣輒便往至挑仙人雙眼持來白王臣以挑眼更不得去常住是國王語臣言所以貪得仙人住者能見地中一切伏藏汝今毁眼何所復住百喻經卷上忽已人病舍其田而芸人之田所求於人者重而所以自任者輕孟子盡心下吾不貴其用智之如目見毫毛而不見其睫也今王知晉之失計而不自知越之過是目論也史記越世家以兩手而揜人之聰明自以為得也而不知其聾瞽之疾已移於己也子華子晏子楊朱見梁王言治天下如運諸掌梁王曰先生有一妻一妾而不能治三畝之園而不能耘而言治天下如運諸掌何也列子揚朱政亂而惡人之非已也致不肖而欲人之賢已也心如虎狼行如禽獸而又怨人之賊已也荀子脩身篇縷因鍼而入不因鍼而急嫁女因媒而成不因媒而親夫子之材必薄矣尚何怨乎寡人哉説苑善説夫薑桂因地而生不因地而辛婦人因媒而嫁不因媒而親子之事王末耳何怨於我新序雜事蔡生欲安項咸陽不能移又亨之或者术辯歟曰生捨其木㺅而謂人木㺅亨不亦宜乎揚子重黎篇己身變異則外物所不達故有是非之議不内求諸已而厚責於人亦猶楊布服異而怪狗之吠也張湛註列傳符譬如藥師持藥囊行而自身病不能療治大寳積經卷一百一十二譬如醫滿一具器藥不能自愈其病佛遺日摩尼寳經推六譬如有人渇欲飲水若至泉池若陂若井未飲其水先擲糞穢寘中擲糞寘已還欲飲水聞水臭穢憎惡不飲不説自汙因緣反説彼過竒哉此水甚大臭穢自過不曉而與彼水作其過咎發覺淨心經卷上衣四猶如癩病人而為諸世間廣説治癩方自病不能救安能療他疾鴦崛摩羅經卷二猶如有人捨已禾稼鋤他田苖長阿含經卷十七是如盲執燭照彼不自明法句經多聞品猶如盲人不自見過本縁經毗羅摩品昔有一人共他相瞋愁憂不樂有人問言汝今何故愁悴如是即答之言有人毁我力不能報不知何方可得報之是以愁耳有人語言唯有毗陀羅咒可以害彼但有一患未及害彼反自害己其人聞已便大歡喜願但教我雖當自害要望傷彼百喻經卷下喻林卷五十六
