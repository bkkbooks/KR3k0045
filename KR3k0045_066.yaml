body:
  text: 喻林巻六十六明徐元太撰君道門六用賢兔罝文王聞大顛閎夭散宜生皆賢人而舉之國史詠其事而美之詩説周南錯石也可以琢玉舉賢用滯則可以治國毛詩鶴鳴註泌水之流洋洋然饑者見之可飲以樂饑以喻人君慤愿任用賢臣則政教成亦猶是也鄭氏箋詩衡門取妻如之何非媒則不得以興治國如之何非禮則不安媒氏能用禮故使媒則得妻以喻周公能用禮故任周公則國治毛詩正義伐柯君子問人之寒則衣之問人之饑則食之稱人之善則爵之禮記表記君如財之曰於此有功匠焉有利器焉有措扶焉以時令其藏必周宻發如用之大戴禮記少間三辰不軌擢士為相蠻夷不恭拔卒為將後漢書陳龜傳賢德不用厥異常陰夫賢者化之本雲者雨之具也得賢而不用猶久陰而不雨也後漢書郎顗傳若必待太公而後用是千載無太公必待夷吾而後任是百世無夷吾所以然者士必從㣲而至著功必積小以至大豈有未任而已成不用而先達也周書蘇綽傳驥舉之在伯樂其功在造父鹽鐵論利議夫懷寶而無語故有粟不食無益於饑覩賢不用無益於削鹽鐵論相刺食其食者不毁其器蔭其樹者不折其枝有士不用何書其言為新序雜事五一身三手无益於輔兩足芙節不能克敏焦氏易林暌之節三嫗治民不勝其任兩馬爭車敗壞家室焦氏易林恒之既濟乗駿馬一日可致千里以言任賢智則可成於治也王逸註楚辭離騷經虬螭神獸宜於駕乗以喻賢人清白宜可信任也王逸註楚辭九章言纎阿不執轡而御則馬不為盡其力君不任賢者賢者亦不盡其節王逸註楚辭九歎賢者之為物也非若美嬪麗妾之可觀於目也非若端冕帶裳之可加於身也非若嘉肴庶羞之可實於口也將以言䇿䇿不用雖多亦奚以為若欲備百僚之名而不問道徳之實則莫若鑄金為人而列於朝也且無食禄之費也然彼亦知有馬必待乗之而後致逺有醫必待行之而後愈疾至於有賢則不知必時用之而後興治者何哉徐幹中論亡國治天下若委裘用賢委裘之實桓公聽管仲而趙襄子信王登此之謂委裘然李善註文選任彦昇薦士表歴危乗險匪杖不行年耆力竭匪杖不彊有杖不任顛跌誰怨有士不用害何足言廣文選劉子政杖銘蒼鷹厲爪翼恥與鷰雀遊成敗在縱者無令鷙鳥憂初學記鳥部鷹註辨才智無所運其籌勇無所奮其氣則勇怯一也才無所騁其能辯無所展其説則頑慧均也是以吳榜越船不能無水而浮青虬赤螭不能無雲而飛晉書張載傳青骹繁霜縶於籠中何以效其撮東郭於鞲下也白猨𤣥豹藏於靈檻何以知其接垂條於千仞也孱夫與烏獲訟力非龍文赤鼎無以明之盖聶政與荆卿爭勇非彊秦之威孰能辨之晉書張載傳夫良玉未剖與瓦石相類名驥未馳與駑馬相離及其剖而瑩之馳而試之玉石駑驥然後始分彼賢士之未用也混於凡品竟何以異要任之以事業責之以成務方與彼庸流較然不同周書蘇綽傳勾粤之簳鏃以精金鷙隼為之羽以之棓箠則其與槁樸也無擇及夫蕩宼爭衝覿武决勝加之駭弩之上則三百步之外不立敵矣蜚景之劒威奪白日氣盛紫蜺以之刲穫則其與劂刃也無擇及夫凶邪流毒沸渭不靖加之運掌之上則千里之内不留行矣夫材有分而用有當所貴善因時而已耳亢倉子政道有智而無為與無智者同道有能而無事與無能者同德淮南子詮言訓金石有聲弗叩弗鳴管簫有音弗吹弗聲淮南子詮言訓言弧弓雖強弛而不張誰知其力之所至乎以言賢者不在職位亦不知其才德也王逸註楚辭七諌物實無中核者謂之郁無刀斧之斷者謂之樸文吏不學世之教無核也郁樸之人孰與程哉王充論衡量知篇望見驥足不異於衆馬之蹄躡平陸而馳騁千里之跡斯須可見王充論衡效力篇夫龍驥維縶則無以别乎蹇驢赤刀韜鋒則曷用異於鉛刃抱朴子外篇任命藏器者珍於變通隨時英逸者貴於吐竒撥亂若乃耀靈翳景於雲表則麗天之明不著哮虎韜牙而握爪則摶噬之㨗不揚太阿潛鋒而不擊則立斷之勁不顯驥騄踠趾而不馳則追風之迅不形竝默則子貢與喑者同口咸瞑則離朱與矇瞽不殊矣抱朴子外篇嘉遯夫衡量小器猶不可使往往而有異況人士之格而可參差而無檢乎抱朴子外篇審舉兩絆而項領則騏騄與蹇驢同矣失林而居檻則猨狖與貛貉等矣韜鋒而不擊則龍泉與鋸刀均矣才逺而任近則英俊與庸𤨏比矣若乃求千里之迹於縶維之駿責匠世之勲於處碎之賢謂之不惑吾不信也抱朴子外篇博喻淳鈎之鋒驗於犀兕宣慈之良効於明試是以同否則元凱與斗筲無殊竝任則騄騏與駑駘不異抱朴子外篇博喻瓊艘瑶楫無涉川之用金弧玉弦無激矢之能是以介潔而無政事者非撥亂之器儒雅而乏治略者非翼亮之手抱朴子外篇博喻摩尼不宵朗則無别於磧礫化鯤不凌霄則靡殊於桃蟲綿駒吞聲則與喑人為羣逸才沈抑則與凡庸為伍故䱇鰍䙝絳虬於淵洿駑蹇黷駿騄於坰野者不識彼物静與之同動與之異抱朴子外篇廣譬夫銓衡不平則輕重錯謬斗斛不正則少多混亂繩墨不陳則曲直不分凖格傾側則滓雜實繁抱朴子外篇審舉不用干將奚以知其鋭也不引烏號奚以知其勁也勁鋭之質卓然易見猶因人獲顯況乃志行難覩曷得不因事而後明乎劉子大質有南威之容乃可以論於淑媛有龍淵之利乃可以議於斷割文選曹植與楊德祖書駑鋭不可以一塗驗筝琴不可以膠柱調也文選劉孝標辨命論註譬如大道徒以奔趨遲疾定其駑良舉足向路物趨一也廣文選伏公表與阮步兵書馬伏皁而不用則駑與良而為羣士齊僚而不職則賢與愚而不分廣文選班固連珠考實推行莫過於鄉閭校才選能莫善於對䇿意林篤論路不險則無以知馬之良任不重則無以知人之才意林物理論水試斷鵠鴈陸試斷牛馬所以觀良劒也藝文類聚軍器部劍必使玉石薫蕕區别靡雜涇渭𤣥黄條流不爽藝文類聚職官部吏部尚書表自非割蚌識珠覩石知玉藝文類聚職官部吏部郎啟人知用賢之利也不能得賢其何故也夫買馬不論足力以白黒為儀必無走馬矣買玉不論美惡以大小為儀必無良寶矣舉士不論才而以貴勢為儀則伊尹管仲不為臣矣藝文類聚治政部薦舉白猨𤣥豹藏於欞檻何以知其㨗太平御覽獸部猨譬若三千大千世界所有人民悉為畵師各有所習巧能不同所善不等或工畵屋宅不工畵體或便模者不能博採或工於手足巧於耳目或頭首不端身形姝好或有不能所習各異或能可人或不可人所知殊别容貌不同王盡召畵師應時皆至王令畵作三界諸形而告之曰各自畵像以持示吾皆合衆師聚於一處各各畵形一師最上悉得其體大寶積經巻一百一十七知人㣲降霜雪以取松栢汲冢周書酆保解蘧伯玉曰君子之人達故觀其器而知其工之巧觀其發而知其人之知禮記禮器澹臺子羽有君子之容而行不勝其貌宰我有文雅之辭而智不克其辯孔子曰語云相馬以輿相士以居弗可廢矣以容取人則失之子羽以辭取人則失之宰予孔子家語子路初見見清知濁見曲知直人君選士各象其德越絶外傳紀䇿考汗明見春申君候問三月而後得見談卒春申君大説之汗明欲復談春申君曰僕已知先生先生太息矣汗明蹙焉曰明願有問君而恐固不審君之聖孰與堯也春申君曰先生過矣臣何足以當堯汗明曰然則君料臣孰與舜春申君曰先生即舜也汗明曰不然臣請為君終言之君之賢實不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相知也今君一旦而知臣是君聖於堯而臣賢於舜也春申君曰善戰國䇿楚考烈王汗明曰君亦聞驥乎夫驥之齒至矣服鹽車而上太行蹄申膝折尾湛肘潰漉汁灑地白汗交流外阪遷延負棘而不能上伯樂遭之下車攀而哭之解紵衣以羃之驥於是俛而噴仰而鳴聲達於天若出金石聲者何也彼見伯樂之知己也今僕之不肖阨於州部堀穴窮巷沉洿鄙俗之日久矣君獨無意湔祓僕使得為君髙鳴屈於梁乎戰國䇿楚考烈王魏文侯與田子方飲酒而稱樂文侯曰鐘聲不比乎左髙田子方笑文侯曰奚笑子方曰臣聞之君明則樂官不明則樂音今君審於聲臣恐君之聾於官也戰國䇿魏文侯王以名使括若膠柱而鼔瑟耳史記趙奢傳吳越春秋云大夫種為宛令之三戸之里范蠡從人竇蹲而吠之從吏恐文種慙令人引衣而鄣之文種曰無鄣也吾聞犬之所吠者人今吾到此有聖人之氣行而求之來至於此且人身而犬吠者謂我是人也乃下車拜蠡不為禮史記越王勾踐世家註夫觀雲機之功則知班匠之巧覩太平之業則悟聖人之明後漢紀光武八先人有言曰知子莫若父知臣莫若君管子大匡猶之買馬者然不論其足力而以色物毛澤而為儀則廐無走馬矣猶之售玉者然不論其廉貞温粹而無瑕者而以大小徑廣為儀則篋無連城矣惟士亦然論士不以其才而以勢地為儀則伊尹仲父不立於朝矣子華子晏子問黨玉之所以難辨者謂其有怪石也金之所以難辨者謂其有鍮石也今夫以隼翼而被之鷃視不明者正以為隼明者視之乃鷃也今夫小人多誦經籍方書或學竒技通説而被以青紫章服使愚者聽而視之正以為君子明者聽而視之乃小人也亢倉子君道伯樂不可欺以馬而君子不可欺以人此明王之道也荀子君道茍仁義之類也雖在鳥獸之中若别白黑荀子儒效篇論人者又必以六戚四隱何謂六戚父母兄弟妻子何謂四隱交友故舊邑里門郭内則用六戚四隱外則用八觀六驗人之情偽貪鄙美惡無所失矣譬之若逃兩汙無之而非是此先聖王之所以知人也呂氏春秋論人凡賢人之德有以知之也伯牙鼓琴鍾子期聽之方鼔琴而志在太山鍾子期曰善哉乎鼔琴巍巍乎若太山少選之間而志在流水鍾子期又曰善哉乎鼔琴湯湯乎若流水鍾子期死伯牙破琴絶絃終身不復鼔琴以為世無足復為鼓琴者非獨琴若此也賢者亦然雖有賢者而無禮以接之賢奚由盡忠猶御之不善驥不自千里也呂氏春秋本味所信者目也而目猶不可信所恃者心也而心猶不足恃知人固不易矣呂氏春秋任數未有功而知其聖也是堯之知舜也待其功而後知其舜也是市人之知聖也呂氏春秋審應使堯度舜則可使桀度堯是猶以升量石也今謂狐貍則必不知狐又不知貍非未嘗見狐者必未嘗見貍也狐貍非異同類也而謂狐貍則不知狐貍是故謂不肖者賢則必不知賢謂賢者不肖則必不知不肖者矣淮南子繆稱訓蛇舉首尺而修短可知也象見其牙而大小可論也薛燭庸子見若狐甲於劒而利鈍識矣㬰兒易牙淄澠之水合者嘗一哈水而甘苦知矣故聖人之論賢也見其一行而賢不肖分矣淮南子汜論訓夫物之相類者世主之所亂惑也娻疑肖象者衆人之所眩耀也故狠者類知而非知愚者類仁而非仁戇者類勇而非勇使人之相去也若玉之與石美之與惡則論人易矣夫亂人者芎藭之與藁本也蛇牀之與麋蕪也此皆相似故劒工惑劒之似莫邪者唯歐冶能名其種玉工眩玉之似碧盧者唯倚頓不失其情闇主亂於姦臣小人之疑君子者唯聖人能見微以知明淮南子汜論訓夫百里奚之飯牛伊尹之負鼎太公之鼔刀寗戚之商歌其美有存焉者矣衆人見其位之卑賤事之洿辱而不知其大略以為不肖淮南子汜論訓孟孫獵而得麑使秦西巴持歸烹之麑母隨之而嗁秦西巴弗忍縱而予之孟孫歸求麑安在秦西巴對曰其母隨而嗁臣誠弗忍竊縱而予之孟孫怒逐秦西巴居一年取以為子傅左右曰秦西巴有罪於君今以為子傅何也孟孫曰夫一麋而不忍又何況於人乎此謂有罪而益信者也淮南子人間訓秦穆公觀鹽見百里奚牛肥曰任重道逺以險而牛何以肥也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也説苑臣衡士之接也非必與之臨財分貨乃知其廉也非必與之犯難涉危乃知其勇也舉事決斷是以知其勇也取與有讓是以知其廉也故見虎之尾而知其大於貍也見象之牙而知其大於牛也一節見則百節知也由此觀之以所見可以占未發覩小節四足知大體矣説苑尊賢宓子賤為單父宰過於陽晝曰子亦有以送僕乎陽晝曰吾少也賤不知治民之術有釣道二焉請以送子子賤曰釣道奈何陽晝曰夫扱綸錯餌迎而吸之者陽鱎也其為魚薄而不美若存若亾若食若不食者鮚也其為魚也薄而厚味宓子賤曰善於是未至單父冠葢迎之者交接於道子賤曰車驅之夫陽晝之所謂陽鱎者至矣於是至單父請其耆老尊賢者而與之共治單父説苑政理夫牛鳴而馬不應非不聞牛聲也異類故也此人必有與人異者矣列女傳周列國齊孤逐女或問人曰難知也曰焉難曰太山之與螘垤江河之與行潦非難也大聖之與大佞難也揚子問神言材木委積非魯班則不能别其好醜國民衆多非明君則不知我之有能也王逸註楚辭九章君察之審明若視俎上之脯指掌中之理數局上之棊摘轅中之馬魚鼈匿淵捕漁者知其源禽獸藏山畋獵者見其脉佞人異行於世世不能見庸庸之主無髙材之人也王充論衡答佞篇是故知人者以目正耳不知人者以耳敗目劉邵人物志七繆姜太公當此時貧且賤矣年又老矣非有貴顯之舉也其言誠當乎賢君之心其術誠合乎致平之道文王之識也灼然若披雲而見日霍然若開霧而觀天斯豈假之於衆人哉徐幹中論審大臣瞻山識璞臨川知珠士於難分之中而無取舎之恨者使臧否區分抑揚咸允抱朴子外篇行品以英逸而遭大明桑陰未移而金蘭之協已固矣以長才而遇深識則不待厯試而相知之情已審矣飄乎猶起鴻之乗勁風翩乎若騰鱗之躡驚雲也抱朴子外篇接疏聰者貴於理遺音於千載之外而得興亡之迹明者珍於鑒逸羣於寒瘁之中而抽匡世之器若夫聆繁㑹之響而顧問於庸工非延州之清聽也枉英遠之才而諮之於常人非獨見之竒識也故與不賞物者而論用凌儕之器是使瞽者指五色也與妬勝己者而謀舉疾惡之賢是與狐議治裘也抱朴子外篇博喻華章藻蔚非矇瞍所玩英逸之才非淺短所識夫瞻視不能接物則衮龍與素褐同價矣聰鑒不足相涉則俊民與庸夫一槩矣抱朴子外篇擢才九方諲之相馬也雖未追風逐電絶塵掣影而迅足之勢固已見矣薛燭之賞劍雖未陸斬𤣥犀水截蛟龍而鋭刃之資亦已露矣劉子知人龍之潛也慶雲未附則與魚鼈為隣驥之伏也孫陽未賞必與駑駘同櫪士之翳也知己未顧亦與傭流雜處自非神機洞明莫能分也劉子知人公輸之刻鳯也冠距未成翠羽未樹人見其身者謂之􅣽鵄上莫項切下鴟同見其首者名曰鸅上於乎切下音澤皆訾其醜而笑其拙及鳯之成翠冠雲聳朱距電揺錦身霞散綺翮焱弋瞻呼昊二切發翽然一翥翻翔雲棟三日而不集然後讚其竒而稱其巧堯遭洪水浩浩滔天蕩蕩懷山下民昏墊禹為匹夫未有功名堯深知之使治水焉乃鑿龍門斬荆山導熊耳通鳥鼠櫛奔風沐驟雨面目黧䵟手足胼胝冠絓不暇取經門不及過使百川東注於海西被於流沙生人免為魚鼈之患於是衆人咸歌詠始知其賢故見其朴而知其巧者是三爾之知公輸也鳯成知其巧者是衆人之知公輸也未有功而知其賢者是堯之知禹也有功而知其賢者是衆人之知禹也故知人之難未易遇也劉子知人卞和潛幽㝠誰能證竒璞冀願神龍來揚光以見燭文選司馬彪贈山濤詩伯樂相馬取之於瘦聖人相士取之於疎意林周生列子伊尹薪於有莘孰知非夏之野人吕尚釣於渭濵孰知非殷之漁者遇湯武文王然後知其非也意林物理論則吾聞音而識其曲食㫖而知其甘藝文類聚人部鑒誡書魏安釐王問子從曰馬回梗梗亮直有大丈夫之節吾欲以為相可乎答曰直亮之節臣未明也王曰何故答曰長目而豕視者必體方而心圓每以其法相人千百不失一臣見回非不偉其體幹也然甚疑其目王卒用之三月果以謟言得罪藝文類聚人部品藻譬如有人以手穿珠忽遇無上真摩尼寶心大歡喜當知是人必已曾見大寶積經巻一百一十六得人六五鼎黄耳金鉉利貞易鼎手足具乃成人有良臣乃成聖孔氏傳書説命下鳯凰于飛翽翽音諱其羽亦集爰止靄靄王多吉士維君子使媚于天子鳯凰于飛翽翽其羽亦傅音附于天靄靄王多吉人維君子命媚于庶人鳯凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶音蚌萋萋雝雝喈喈詩大雅巻阿風雨齊桓得管仲以為相齊人喜之而作是詩詩説齊南山有臺樂得賢也得賢則能為邦家立太平之基矣毛詩南山有臺棫樸文王能官人也毛詩棫樸南山所以得髙峻者以南山之上有臺北山之上有萊以有草木而自覆盖故能成其髙大以喻人君所以能令天下太平以人君所任之官有德所治之職有能以有賢臣各治其事故能致太平言山以草木髙大君以賢臣尊顯毛詩正義南山有臺人道敏政地道敏樹夫政也者蒲盧也中庸所謂故國者非謂有喬木之謂也有世臣之謂也孟子梁惠王下陛下功德陳五帝之上在三王之右非若此而已誠得天下賢士公卿在位咸得其人矣譬若以周召為丞相孔􅉌為御史大夫太公為將軍畢公髙拾遺於後弁嚴子為衛尉臯陶為大理后稷為司農伊尹為少府子贛使外國顔閔為博士子夏為太常益為右扶風季路為執金吾契為鴻臚龍逢為宗正伯夷為京兆管仲為馮翊魯般為將作仲山甫為光禄申伯為太僕延陵季子為水衡百里奚為典屬國栁下惠為大長秋史魚為司直蘧伯玉為太傅孔父為詹事孫叔敖為諸侯相子産為郡守王慶忌為期門夏育為鼎官羿為旄頭宋萬為式道候前漢書東方朔傳股肱蕭曹社稷是經爪牙信布腹心良平龔行天罰赫赫明明前漢書敘傳下刳舟剡楫將欲濟江海也聘賢選佐將以安天下也昔唐堯在上羣龍為用文武創德周召作輔是以能建天地之功増日月之耀者也後漢書郎顗列傳秦欲伐楚使使者往觀楚之寶器楚王聞之召昭奚恤問焉對曰此欲觀吾國之得失而圖之寶器在於賢臣遂使恤應之稱曰客觀楚國之寶器所寶者賢臣也理百姓實倉廩使人各得其所子西在此奉珪璋使諸侯解忿悁之難交兩國之懽使無兵革之憂太宰子方在此守封疆謹境界不侵鄰國鄰亦不侵葉公子髙在此理師旅正兵戎以當強敵提枹鼓以動百萬之衆使皆赴湯火蹈白刅出萬死不顧司馬子反在此若懷霸王之餘義獵理亂之遺風昭奚恤在此惟大國所觀秦使者瞿然無以對後漢書李膺傳註甫欲鑿石索玉剖蚌求珠今乃隋和炳然有如皎日蜀志秦宓傳唐虞之朝無謬舉之才造父之門無駑蹇之足吴志王蕃傳註斯玉鉉之妙味經世之徽猷也晉書王接傳皎皎瑚器來光玉繩晉書髙光傳恢燿和肆必在兼城之寶翼亮崇本宜紆髙世之逸是以渭濵佐周聖德廣運商洛匡漢英業乃昌宋書隱逸周續之傳明王聖主得麒麟鳯凰為瑞是聖德所感非力能致之瑞物雖來不堪使用如李德林來受驅䇿亦陛下聖德感致有大才用無所不堪勝於騏驎鳯凰逺矣隋書李德林傳功傾魏后非待照車之珍德柔秦客豈徒祕璧之貴隆陂所漸成敗之由何嘗不興資得財替因失士南史謝宏㣲子謝莊傳文王將田史編卜曰田於渭陽將大得焉非龍非彲非虎非羆天道汝師以之佐昌施及三王太公六韜文師明主之治天下也必用聖人而後天下治婦人之求夫家也必用媒而後家事成故治天下而不用聖人則天下乖亂而民不親也求夫家而不用媒則身醜恥而人不信也管子形勢解羿蠭門者善服射者也王良造父者善服馭者也聰明君子者善服人者也故人主欲得善射射逺中㣲則莫若羿蠭門矣欲得善馭及速致逺則莫若王良造父矣欲調一天下制秦楚則莫若聰明君子矣荀子王霸絶江者託於船致逺者託於驥霸王者託於賢伊尹呂尚管夷吾百里奚此霸王者之船驥也釋父兄與子弟非疏之也任庖人釣者與仇人僕虜非阿之也持社稷立功名之道不得不然也猶大匠之為宫室也量小大而知材木矣訾功大而知人數矣故小臣吕尚聽而天下知殷周之王也管夷吾百里奚聽而天下知齊秦之霸也豈特驥逺哉非其人而欲有功譬之若夏至之日而欲夜之長也射魚指天而欲發之當也舜禹猶若困而況俗主乎呂氏春秋知度今夫塞者勇力時日卜筮禱祠無事焉善者必勝主功名亦然要在得賢呂氏春秋察賢賢者善人以人中人以事不肖者以財得十良馬不若得一伯樂得十良劒不若得一歐冶得地千里不若得一聖人舜得臯陶而舜受之湯得伊尹而有夏民文王得吕望而服殷商夫得聖人豈有里數哉呂氏春秋贊能三代之法不亾而世不治者無三代之智也六律具存而莫能聽者無師曠之耳也故法雖在必待聖而後治律雖具必待耳而後聽故國之所以存者非以有法也以有賢人也其所亾者非以無法也以無賢人也淮南子泰族訓守不待渠塹而固攻不待衝降而拔得賢之與失賢也故臧武仲以其智存魯而天下莫能亾也蘧伯玉以其仁寧衛而天下莫能危也淮南子泰族訓舉天下之髙以為三公一國之髙以為九卿一縣之髙以為二十七大夫一鄉之髙以為八十一元士故知過萬人者謂之英千人者謂之俊百人者謂之豪十人者謂之傑淮南子泰族訓智如泉源行可以為表儀者人師也智可以砥行可以為輔弼者人友也據法守職而不敢為非者人吏也當前決意一呼再諾者人𨽻也故上主以師為佐中主以友為佐下主以吏為佐危亾之主以𨽻為佐語曰淵廣者其魚大主明者其臣愚韓詩外傳水廣則魚大君明則臣忠昔有桓公故有管仲今桓公在此則車下之臣盡管仲也説苑尊賢鳯凰在左麒麟處右仁聖相遇伊吕集聚焦氏易林訟之咸栢桂棟梁相輔為强焦氏易林比之旅窻牖戸房通利明光賢智輔聖仁施大行焦氏易林大畜之升阿衡服箱太乙載行焦氏易林恒之復千里騂駒為王服車嘉其驪榮君子有成焦氏易林晉之遯和氣所生物皆不朽聖賢居位國无凶咎焦氏易林解之井次二金榦玉楨廓于城測曰金榦玉楨蕃輔正也太𤣥經第四廓次六黄心鴻翼翕于天測曰黄心鴻翼利得輔也太𤣥經第五翕次四將飛得羽利以登于天測曰將飛得羽其輔彊也太𤣥經第六將夫人治國固治身之象疾者身之病亂者國之病也身之病待醫而愈國之亂待賢而治治身有黄帝之術治世有孔子之經然病不愈而亂不治者非鍼石之法誤而五經之言誣也乃因之者非其人茍非其人則規不圓而矩不方繩不直而凖不平鑽燧不得火鼓石不下金金馬不可以追速土舟不可以涉水也濳夫論思賢華霍所以能崇極天之峻者由乎其下之厚也唐虞所以能臻巍巍之功者實頼股肱之良也雖有孫陽之手而無騏驥之足則不得致千里矣雖有稽古之才而無宣力之佐則莫縁凝庶績矣抱朴子外篇審舉千羊不能扞獨虎萬雀不能抵一鷹庭燎攢舉不及羲和之末景百鼓竝伐未及震霆之餘聲是以庸夫盈朝不能使彛倫攸敘英俊孤任足以令庶事根長抱朴子外篇廣譬鑒之正者猶為不迷况得賢者與為治乎太𤣥經第六蓇解鈞天廣樂必有竒麗之觀帝室皇居必畜非常之寶文選孔融薦禰衡表乃鳴鸞在衡奔驥服輅良平鳯栖信布虎據廣文選陸士龍盛徳頌乗騏驥之瀏瀏兮馭安用夫强䇿廣文選宋玉九辯買馬不論足力而以黒白為儀必無走馬矣買玉不論美惡必無良寶矣舉士不論賢良則無士矣意林尸子枯岸之珠既掄潤山之玉已薦藝文類聚治政部薦舉表夫忠謇朝之杷朳正人國之掃篲也秉杷執篲除凶掃穢國之福主之利也太平御覽器物部杷朳人主得地百里則喜四境皆賀得士則不喜不知相賀而通乎輕重太平御覽禮儀部賀夫清忠之士乃千人之表萬人之英得其人則事易於反手不得其人則難於拔筋太平御覽人事部筋王公大人則嘉得良師明輔品庶凡民則樂仁賢哲士皆國之柱棟而人之羽翼太平御覽居處部楝孫綽子曰髙祖御龍光武御虎龍韓彭之類是也虎耿鄧之類是也埤雅品物門龍文王遇太公於渭濵皤然皓首持竿垂釣文王得之灼若祛雲而見日霍若開霧而觀山初學記地部渭水註若使明君用公山於前擢正禮於後所謂御二龍於長途騁騏驥於千里何氏語林賞譽喻林巻六十六
