body:
  text: 喻林卷九十五明徐元太撰學業門五神悟知學如擷影知識如計夢關尹子一宇金玉難捐土石易捨學道之士遇微言妙行慎勿執之若執之則腹心之疾無藥可療關尹子九藥桓公讀書於堂上輪扁斫輪於堂下釋椎鑿而上問桓公曰敢問公之所讀為何言邪公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟粕已夫臣也以臣之事觀之斫輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斫輪古之人與其不可傳也死矣然則君之所讀者古人之糟粕已夫莊子天道筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄言者所以在意得意而忘言莊子外物今夫亡針者終日求之而不得其得之非目益明也眸而見之也心之於慮亦然荀子大略尹儒學御三年而不得焉苦痛之夜夢受秋駕於其師明日往朝其師望而謂之曰吾非愛道也恐子之未可與也今日將教子以秋駕尹儒反走北面再拜曰今昔臣夢受之先為其師言所夢所夢固秋駕已呂氏春秋博志剞劂銷鋸陳非良工不能以制木爐槖埵坊設非巧冶不能以治金屠牛坦一朝解九牛而刀以剃毛庖丁用刀十九年而辦如新剖硎何則游乎衆虛之間若夫規矩鉤繩者此巧之具也而非所以巧也故瑟無絃雖師文不能以成曲徒絃則不能悲故絃悲之具也而非所以為悲也若夫工匠之為連鐖運開陰閉眩錯入於冥冥之眇神調之極游乎心手衆虛之間而莫與物為際者父不能以教子瞽師之放意相物寫神愈舞而形乎絃者兄不能以喻弟淮南子齊俗訓體粗者繫形知精者得神原始見終者有可推之緒得之未眹者無假物之因是以晝見天地未足稱明夜察分毫乃為絶倫抱朴子外篇博喻羿無弧矢不能中微其中微者非弧矢也倕無斧釿不能善斷其善斷者非斧釿也劉子言苑日月之明在乎天而所明在地易之神在乎道而所神在人也關氏易傳神義養由矯矢獸號于林蒲且縈繳神感飛禽末伎之妙動物應心研精耽道安有幽深文選張華勵志詩事在外則易致妙在內則難精奚仲巧見於器故輪工能繼其致也伶倫妙在其神故樂人不傳其術也文選陸士衡演連珠巧盡於器習數則貫道繫於神人亡則滅是以輪匠肆目不乏奚仲之妙瞽史清耳而無伶倫之察文選陸機演連珠知者不言言者不知所以言者以音相聞譬如知音者識音以絃心知其音口不能傳太平御覽道部道世多善弩而拙於弓弓無法准故任巧由意弩有法准故易有善太平御覽兵部弩世尊一日示隨色摩尼珠問五方天王此珠而作何色時五方天王互說異色世尊復藏珠入袖却擡手曰此珠作何色天王曰佛手中無珠何處有色世尊歎曰汝何迷倒之甚吾將世珠示之便各彊說有青黃赤白色吾將真珠示之便總不知五燈㑹元七佛釋迦牟尼佛今末世之刺也虛者實之滿者泄之此皆衆工所共知也若夫法天則地隨應而動和之者若響隨之者若影道無鬼神獨來獨往黃帝素問內經寶命全形論聰明內作外若聾盲思慮𤣥起狀若癡狂故口不能言而意不能明也譬猶夢為君王履危臨深憂喜相反中心獨然覺而道之不能以喻其鄰也道德經指歸卷十達於道者獨見獨聞獨為獨存父不能以授子臣不能以授君猶母之識其子嬰兒之識其親也夫子母相識有以自然也其所以然者知其不能陳也五味在口五音在耳如甘非甘如苦非苦如商非商如羽非羽而易牙師曠有以别之其所以别之者而口不能言也道德經指歸卷十昔有梵志厥年二十天才自然事無大小過目則能自以聰哲而自誓曰天下技術要當盡知一藝不通則非明達也於是遊學無師不造六藝雜術天文地理醫方鎮厭山崩地動摴蒲博奕妓樂摶撮裁割衣裳文繡綾綺厨膳切割調和滋味人間之事無不兼達心自念曰丈夫如此誰能及者試遊諸國摧伏抵對奮名四海技術衝天然後載功竹帛垂勳百代於是遊行往至一國入市觀視見有一人坐作角弓㭊筋治角用手如飛作弓調快買者爭前即自念曰少來所學自以具足邂逅自輕不學作弓若彼鬭技吾則不如矣當從受學耳遂從弓師求為弟子盡心受學月日之中具解弓法所作巧妙乃踰於師布施財物奉辭而去去之一國當度江水有一船師用船若飛回旋上下便疾無雙復自念曰吾技雖多未曾習船雖為賤術其於不知宜當學之萬技悉備遂從船師願為弟子供奉盡敬竭力勞勤月日之中知其逆順御船回旋乃踰於師布施財物奉辭而去復至一國國主宫殿天下無雙即自念曰作此殿匠巧妙乃爾自隱遊來偶不學之若與競巧必不勝矣且當復學意乃足耳遂求殿匠願為弟子盡心供養執持斤斧月日之間具解尺寸方圓規矩雕文刻鏤木事盡知天才明朗事輒勝師布施所有辭師而去周行天下遍十六大國命敵捔技獨言隻步無敢應者心自貢髙曰天地之間誰有勝我者佛在祇植逢見此人應可化度佛以神足化作沙門拄杖持鉢在前而來梵志由來國無道法未見沙門怪是何人頃至當問須臾來到梵志問曰百王之則未見君輩衣裳制度無有此服宗廟異物不見此器君是何人形服改常也沙門答曰吾調身人也復問何謂調身於是沙門因其所習而說偈言弓匠調角水人調船巧匠調木智者調身譬如厚石風不能移智者意重毁譽不傾譬如深淵澄靜清明慧人聞道心淨廓然於是沙門說此偈已身升虛空還現佛身三十二相八十種好光明洞達照耀天地從虛空來下謂其人曰吾道德變化調身之力也於是其人五體投地稽首問曰願聞調身其有要乎佛告梵志五戒十善四等六度四禪三解脫此調身之法也夫弓船木匠六藝奇術斯皆綺飾華譽之事蕩身縱意生死之路也梵志聞之欣然信解願為弟子佛重為說四諦八解之要尋時即得阿羅漢道法句譬喻經二明哲品心得梓匠輪輿之工能以規矩與人人之巧在心拙者雖得規矩之法亦不能成器也蓋喻人不志仁雖誦典憲不能以善趙氏注孟盡心下魯班不能說其手離朱不能說其目非言之難魏志管輅傳注列子學射中矣請於關尹子尹子曰子知子之所以中者乎對曰弗知也關尹子曰未可退而習之三年又以報關尹子尹子曰子知子之所以中乎列子曰知之矣關尹子曰可矣守而勿失也非獨射也為國與身亦皆如之故聖人不察存亡而察其所以然列子說符善為詩者不說善為易者不占善為禮者不相其心同也荀子大略篇夫內不開於中而强學問者不入於耳而不著於心此何以異於聾者之歌也效人為之而無以自樂也聲出於口則越而散矣是故不得於心而有經天下之氣者是猶無耳而欲調鐘鼓無目而欲喜文章也亦不必勝其任矣淮南子原道訓聖人終身言治所用者非其言也用所以言也歌者有詩然使人善之者非其詩也鸚鵡能言而不可使長是何則得其所言而不得其所以言故循迹者非能生迹者也淮南子說山訓楚成王讀書於殿上而輪扁在下作而問曰未審主君所讀何書也成王曰先聖之書輪扁曰此真先聖王之糟粕耳非美者也成王曰子何以言之輪扁曰以臣輪言之夫以規為圓矩為方此其可付乎子孫者也若夫合三木而為一應乎心動乎體其不可得而傳者也以為所傳真糟粕耳故唐虞之法可得而改也其喻人心不可及矣韓詩外傳惟人心之所獨曉父不能以禪子兄不能以教弟也李善注文選魏文帝典論論文思一至饑一與之糧思一至渴一與之漿太平御覽道部養生觀書每得一義如得一真珠船困學記聞卷八孟子仰青雲覩白日不覺為逺矣何氏語林文學得月而指自忘得意而言自息法苑珠林卷九十九或以事伏心或以理伏心今正觀則以無常等觀制伏其心也羅什譯維摩詰經菩薩品五通為象馬大乘為上車一心為御者游於人正道也僧肇注維摩詰經佛國品要成汲水未出而覆喻修德未成而止所以致凶也周易正義井惟若農夫之考田已勞力布發之惟其陳列修治為其疆畔畎壟然後功成孔氏傳書梓材雖奏樂於仁人而不使知逹至順之理亦為未善猶如人雖食五味而調和溫清不順則雖食不肥也禮記正義禮運人身體髮膚骨肉筋脉備足乃為成人若片許不備便不為成人也禮記正義禮器由也升堂矣未入於室也論語先進不踐迹亦不入於室論語先進苗而不秀者有矣夫秀而不實者有矣夫論語子罕黍稷無成不能為榮黍不為黍不能蕃廡稷不為稷不能蕃殖所生不疑惟德之基國語晉謂石為獸射之洞開精之至也積嵗解牛􅒂然游刃習之久也自非渾沌無可鑿之姿窮奇懷不移之情安有至精久習而不成功者焉北齊書文苑傳蘧伯玉行年六十而六十化未嘗不始於是之而卒詘之以非也未知今之所謂是之非五十九非也莊子則陽百發一失不足謂善射千里蹞步不至不足謂善御倫類不通仁義不一不足為善學荀子勸學學也者固學一之也一出焉一入焉塗巷之人也荀子勸學篇學曰遲彼止而待我我行而就之則亦或遲或速或先或後胡為乎其不可以同至也荀子修身篇夫驥一日而千里駑馬十駕則亦及之矣將以窮無窮逐無極與其折骨絶筋終身不可以相及也將有所止之則千里雖逺亦或遲或速或先或後胡為乎其不可以相及也荀子修身日月之塗所行必到無有患晦焦氏易林明夷之屯臺榭不成未得安息焦氏易林蹇之豐垂秋布葉君子比德焦氏易林鼎之蹇或曰耕不穫獵不饗耕獵乎曰耕道而得道獵德而得德是穫饗也揚子學行或曰亦有疾乎曰托我華而不食我實揚子問明禾粟之采生而不成者謂之蕫蓈許氏說文卷七匪惟托華乃尋厥根宫牆重仞允得其門蔡中郎集郭有道碑射必能中畫必象人故曰審本吕氏春秋處方解夫彀徑弩者效力於發箭涉大川者保全於既濟井不達泉則猶不掘也一步未至則猶不往也抱朴子內篇極言夫修道猶如播穀也成之猶收積也厥田雖沃水澤雖美而為之失天時耕鋤又不至登稼被壟不穫不刈頃畝雖多猶無穫也抱朴子內篇極言梁塵之盈尺非可求之漏刻山霤洞徹非可致之於造次也患於聞之者不信信之者不為為之者不終耳抱朴子內篇至理雖失之於暘谷而收之於虞淵方知良田之晚播愈於卒歲之荒蕪也抱朴子外篇勗學方將墾九典之蕪薉播六德之嘉穀厥田邈於上土之科其收盈乎天地之間何必耕也為務哉抱朴子外篇守塉夫學者猶種樹也春玩其華秋登其實講論文章春華也修身利行秋實也顔氏家訓勉學天地以萬物為寶至秋而成也莊子音義庚桑楚如彼南畝力耒既勤藨蓘致功必有豐殷文選張華勵志詩如彼樹芳實穎實發文選顔延之祭屈原文當埏埴以為器之時是土而異於土雖燥未燒遇濕猶壞燒而未熟不久尚毁火力既足表裏堅固河山可盡此形無滅藝文類聚靈異部仙道書醍醐之教踰於佛性從乳出酪從酪出蘇從生蘇出熟蘇熟蘇出醍醐醍醐蘇之精也太平御覽釋部叙佛仙者川也身者舟也濟川得岸何候舟為太平御覽道部道行之則至無謂道賒敦以秋實食以春華初學記禮記冠蘭室改蓬心旌岸變伊草丹青有必渝絲染豈常皓曲轅且繩直詭木遂雕藻一簣或成山百里倦中道初學記道釋部佛注二偏之病既除一中之藥還遣唯藥與病一時俱消道德經注疏卷一若山澤氣相蒸兮興雲為風雨泥竭遂成塵兮火滅化為土若蘖以染黃兮似藍成緑組皮革煮成膠兮麴孽化為酒參同契披列枝條實核可觀參同契知而能勤久而不怠如渡滄海日求著岸虛皇四十九章未有學而不成未有種而不生玉清經幽棲品又如魚母多有胎子成就者少又如果樹華多實少元陽妙經卷二譬如從牛出乳從乳出酪從酪生酥從酥生甘美法味若有服者衆疾皆愈元陽妙經卷二譬如行客隔礙暘谷欲往彼岸無因得過假借舟航以濟沈溺既至彼岸向之舟航無所復用大象妙林經當須積學用心堅固若服食者中廢則疾若遁林澤中廢則危海空智藏經序品譬如有人得度江海不經惡風安穩彼岸海空智藏經普說品譬如大象度駛流水窮盡源底得實法相而入涅槃豈可如獼猴諸兔畏怖駛流趣自度身三昧法門經卷下如鳥未到所至終不中住大智度論卷七十六如四大河無熱池出未入大海終無住義波羅蜜多經卷六百譬如窑師能善調泥安布輪繩下上回轉所造器物而得成就大寶積經卷五十五猶如有人乘大舟船欲渡大海時遇風濤鼓湧飄蕩黿鼉鯨鯢互為嶮害是人因船遂達彼岸大寶積經卷一百二十譬如陶師未成器時不得器名大方等大集經卷九以正住四攝法為輪以真淨十善業為輻以淨功德資糧為轂以堅固淳至畢竟為輨轄釘鑷以善成就諸禪解脫三昧為轅以四無量心為善調以善知識為御者以知時非時為發動以無常苦空無我之音為驅䇿以七覺寶繩為鞦靷以淨五根為索帶以𢎞普端直大悲為旒幢以四正勤為輞以四念處為安詳以四神足為速進以勝五力為鑒陳以八聖道為直進於一切衆生無障礙慧明以為軒以無住六波羅蜜回向薩婆若以無礙四諦度到彼岸是為大乘大方等大集經卷十五大藥正樹以過去所發成就一切智慧善法普覆一切諸衆生界除滅一切諸惡道苦廣大悲願而為其根於一切如來真實智慧種性中生堅固不動善巧方便以為其莖遍法界智諸波羅蜜以為其枝禪定解脫諸大三昧以為其葉總持辨才菩提分法以為其華究竟無變諸佛解脫以為其果大方廣佛華嚴經卷五十一譬如男子渴極求水捨於平地穿鑿髙原日日興功但見燥土積有時節其泉𤣥遠而不得水復於異時掘地甚多乃見泥水濁不可飲當奈之何其人不懈稍進得水法華經卷六譬如因牛有乳因乳有酪因酪有生酥因生酥有熟酥因熟酥有酥精酥精者於彼中為極第一中阿含經卷一譬如抱雞抱其卵或五或十隨時消息愛護將養正復中間放逸猶能以爪以口啄卵得生其子所以者何以彼雞母初隨時消息善愛護故雜阿含經卷三十三如數十人各持弓箭射垜中有前中者中有後中者射不休息必復中準佛殿泥洹經卷上譬如陶家燒作瓦器盛水不漏凡人如壞得道如瓦可燥可濕浸漬不碎佛說梵志阿颰經譬如學射法初始甚難中以能中大准閉目破一毛修行道地經神足品譬如賈客欲得水精之珠便入江海則得此寶并獲真珠金剛珊瑚硨磲瑪瑙修行道地經知人心念品猶彼果樹隨時繁茂狂華生長遇風凋落結實者鮮或以結實遇雹墮落或有未華而凋落者或有已華而凋落者其中成實待熟落者少少爾出曜經卷一無常品猶如張綜以杼投織漸盡其縷出曜經卷一無常品譬如迷人還得正路必定自知去舍不遠必無疑也大方等陀羅尼經卷四如人趣河遙聞水聲必定自知吾今得水而無疑也大方等陀羅尼經卷四譬如瓦器任用之時名之為熟如庵羅果等任取食時亦名為熟菩薩善戒經卷三昔有長者居甚大富衆寶備具唯無赤真珠以為不足便將人入海採珠經厯險阻乃到實處刺身出血油囊裹之懸著海底珠蛤聞血香唼食之乃得出蚌剖蚌出珠採之三年方得一珮發還到海邊同伴見其得好寶欲共圖之俱行取水衆人推著井中覆之而去墮其井底久其人見有師子從傍穴來飲水其人復惶怖師子去後尋孔而出還到本土其伴歸到家呼曰卿得吾一佩無人知兼欲見害卿可密盡相還吾終不言卿也其人怖􅀈盡還其珠珠主得已持還家有兩兒著珠共戲共相問曰此珠出生何處一兒曰生我囊中一兒曰生室甕中父見笑之婦曰何笑答曰吾取此珠勤苦乃爾小兒依我得之不識本末謂生甕中佛告阿難汝但見我成佛不知我從無數劫學之勤苦至今乃得謂之為易如彼嬰兒謂珠生囊中矣衆經撰雜譬喻經期至悉具足如月十五日修行道地經五陰成敗品若心欲住精勤莫廢如鑽火見烟掘井見濕必見不久思惟要略法譬如穿井已見濕泥轉加增進必望得水又如鑽火已得見烟倍復力勵必望得火大智度論卷十五譬如度水初入是無疑出彼岸是决了大智度論卷五十七亦如真金被精進鎧以定為護以智慧箭能射毛百之一所射皆中壞魔軍衆勇健無畏大莊嚴經論卷十四植德耘邪而薈蔚樹福灌正而扶疏𢎞明集卷十一譬之於射後破奪先𢎞明集卷十二六度中前三度屬福德業後三度屬慧明業二業具足必至佛道譬如雨輪能有所至羅什譯維摩詰經菩薩品造士倬音卓彼雲漢為章于天周王壽考遐不作人詩大雅棫朴鳶飛戾天魚躍于淵豈弟君子遐不作人詩大雅旱麓天將以夫子為木鐸論語八佾譬諸草木區以别矣君子之道焉可誣也論語子張羿之教人射必志於彀學者亦必志於彀大匠誨人必以規矩學者亦必以規矩孟子告子上大匠不為拙工改廢繩墨羿不為拙射變其彀率孟子盡心上梓匠輪輿能與人規矩不能使人巧孟子盡心下籧篨不可使俯戚施不可使仰僬僥不可使舉侏儒不可使援矇􅕓不可使視嚚瘖不可使言聾瞶不可使聽僮昏不可使謀質將善而賢良贊之則濟可俟也若有違質教將不入其何善之為國語晉官師之所材也戚施直鏄籧篨蒙璆侏儒扶盧矇􅕓修聲聾瞶司火僮昏嚚瘖僬僥官師所不材也以實裔土夫教者因體能質而利之者也若川然有原以卬浦而後大國語晉為衢樽於上葉號木鐸於前修魏書李順希仁弟騫傳凡可無學而能者唯息與食也故先王傳道以相效屬也鶡冠子道端夫教歌者使先呼而詘之其聲反清徵者乃教之韓非子外儲說右上覿君子者問鑄人不問鑄金或曰人可鑄歟曰孔子鑄顔淵矣或人踧爾曰旨哉問鑄金得鑄人揚子學行或問人有倚孔子之牆絃鄭衛之聲誦韓莊之書則引諸門乎曰在夷貉則引之倚門牆則麾之惜乎衣未成而轉為裳也揚子修身率馬以驥不亦可乎揚子修身春木之芚兮援我手之鶉兮去之五百嵗其人若存兮揚子寡見篇千里之足困於鹽車之下赤刀之礦不經歐冶之門者也抱朴子外篇崇教夫受繩墨者無枉刳之木染道訓者無邪僻之人飭冶之術莫良乎學抱朴子外篇崇教振天惠以廣掃鼓九陽之洪爐運大鈞乎皇極開𤣥模以軌物陶冶庶類匠成翹秀蕩沃積埃革邪反正抱朴子外篇勗學蜾裸遇螟􅘾而受化久乃變成蜂爾七十子之類仲尼又速於是揚子法言注學行篇喜於問鑄金而得鑄人富莫大焉利莫重焉揚子法言注學行篇大匠之誨人也必以規矩君子之訓物也必以仁義揚子法言注吾子篇因人才質刻而畫之文而藻之揚子法言注先知篇春木芚然而生譬若孔氏啓導人心有似援手而進揚子法言注寡見篇鑽蚌瑩珠剖石摛藻絲匪𤣥黃水罔方圓引之斯流染之斯鮮補文選潘尼釋奠頌學猶蒔苗化若偃草補文選潘尼釋奠頌孔子以四科教士隨其所善譬如市肆多列雜物欲置之者並至意林新論若非六經庖厨百家異饌三墳為瑚璉五典為笙簧豈能暴以秋陽紆就望之景濯以江漢潘埀天之澤藝文類聚禮部學校表接光太陽燭之幽夜令欣流者濟津懷寶者剖和藝文類聚禮部學校表置樽候酌懸鐘待叩必須蘊朱藍以成彩立規矩以為式藝文類聚職官部祭酒表學愧聚沙問慙攻木藝文類聚職官部祭酒表仲尼門人餔道醇飲道宗太平御覽人事德尊者在世化導證果最多每度闕人以一籌置於石室其室縱十八肘廣十二肘充滿其間五燈㑹元西天祖師二祖贈人以財不若贈人善言黃金雖貴用之則窮善言於心終身為寶虛皇四十九章吾道猶炬火取之無窮隨其所與能飪熟一切吾法等泉源能灌溉枯槁潤澤一切虛皇四十九章譬如金在沙中陶鍊滓穢然後銷鎔成金之後價值無量三十六部尊經仙人經汝今有所疑滯我為大醫王為汝剖判深疑汝於道性猶未明了我有法炬能為照明汝今欲濟煩惱大河我能為汝作於舟楫元陽妙經卷九譬如金師冶錬真金先除粗垢次除微塵後得名為百錬真金海空智藏經普說品猶如藥師善解藥分復以妙藥教授其子諸餘外學受業之人悉不得見海空智藏經供獻品法雨流澍廣潤心田無上道芽隨時增長玉清經通濟幽冥品如三染汁盛以一器所謂羅若鬱金青黛染三種物所謂毳㲲及憍奢耶衣毳以漿浸則成青色㲲淨浣故成於黃色憍奢耶衣先以灰浸則成赤色如是三物雖同一器受色各異大方等大集經卷十一如工陶師埏埴調泥置之輪上隨意成器大方等大集經卷二十三譬如一兩阿羅娑藥變千兩銅以為真金於彼藥分無所損減大方廣佛華嚴經卷五十九今欲說神呪除其三毒垢拔其愚癡足照以智慧鏡賜其禪定水生長菩提芽令到涅槃岸七佛所說神呪經卷一拔其毒鏃補智慧膏以薩婆若水洗除垢穢拂拭搓磨令心調淨七佛所說神呪經卷三愍念衆生佐佛化愚常以王法攝持守護於生死海拔濟令出身為大船口為法橋心為大海出慈悲水溉灌衆生枯槁福田悉令生長菩提根芽我所饒益其喻如是七佛所說神呪經卷三能轉法輪吹大法蠡擊大法鼓然大法燈施大法橋泛大法船舉大法帆無明羅剎經以智慧藥箆初抉憍陳如等無明眼瞙以大法雨滅優樓迦葉等煩惱熾火以知因緣最上智藥治舍利弗大目連等結使之病以此智鉤鉤摩訶迦葉入佛正道以法梯隥令大名娑羅門趣解脫堂無明羅剎經若有衆生能觀察者為作照明能安立衆生戒之平地得於念處以為止息涉正勤路上如意堂登五根樓入五力室嗅七覺香飲八正水坐於有餘涅槃之林觸於四禪無漏凉風無明羅剎經殊流共委酌而不竭異軫同騖仰以知歸正法念處經序海中有大龍欲雨閻浮利地恐地無當此水者龍意念地無當我雨者還自雨海中耳佛惠弟子威德甚大欲以施外行九十六種道家恐無能堪者是故佛弟子展轉自相惠耳譬如龍自還雨海中也舊雜譬喻經菩薩度人譬若巧乳母養子有四事一者洗浴使淨二者乳哺令飽三者卧寐安穩四者抱將出入恆使歡喜以此四事長養其子令得成就菩薩亦復如是有四事養育衆生一者以正法洗浴心垢二者以經法飲食使飽三者禪定三昧隨時與立四者以四恩饒益一切恆令歡喜以此四事勸誨一切長育衆生使得至道雜譬喻經上佛法為車弟子馬實法寶主佛調御若馬出道失正轍如是當治令調伏若小不調輕法治好善成立為上道若不可治便棄捨以是調御為無上大智度論卷二譬如工巧之人以藥力故能令銀變為金金變為銀大智度論卷十八善欲隨心為說如船順流惡欲以苦切語教如以榍出榍大智度論卷二十四譬如人得好食良藥親里知識受諸病苦云何不與大智度論卷八十七折世智之角杜異人之口導求珠之心開觀象之目救燒灼於火宅拯沈溺於浪海故法雨降而燋種受榮慧日升而長夜蒙曉高僧傳卷八釋寶亮雨甘露於豐草殖旃檀於江湄𢎞明集卷十二虛襟者挹其遺風潄流者味其餘津矣𢎞明集卷十二馬有五種第一見鞭影即時調伏第二得鞭乃伏第三以利錐刺皮乃伏第四穿肌乃伏第五徹骨乃伏羅什譯維摩詰經積佛品譬若惡蛇將取人食先吐毒沫在地人踐其上即時昏熟不能起去然後以氣吸之三寶中作功德亦復如是初作功德時其事雖微冥益已深然後方便引入佛道究竟涅槃其福乃盡羅什譯維摩詰經弟子品法音雷震開導萌芽猶春雷動於百草也僧肇注維摩詰經佛國品引導衆生入大乘海採取法寶使必獲無難猶海師善導商人必獲夜光也僧肇注維摩詰經佛國品慢心自髙如山峯不停水菩薩現為力士伏其髙心然後潤以法水僧肇注維摩詰經佛道品成名人以顔狀為貌者則貌有衰落矣惟用榮名為飾表則稱譽無極也史記游俠列傳論注和氏之璞天下之美寶也待鑑識之工而後明毛嬙天下之姣人也待香澤脂粉而後容周公天下之至聖人也待賢師學問而後通鹽鐵論殊路水積成川則蛟龍生焉土積成山則豫樟生焉學積成聖則富貴尊顯至焉說苑建本士茍欲深明博察以埀榮名而不好問訊之道則是伐智本而塞智原也何以立軀也說苑建本劍伎之家鬭戰必勝者得曲城越女之學也兩敵相遭一巧一拙其必勝者有術之家也孔墨之業賢聖之書非徒曲城越女之功也成人之操益人之知非徒戰鬬必勝之䇿也故劍伎之術有必勝之名賢聖之書有必尊之聲王充論衡别通篇尸子曰禹長頸鳥喙面貌亦惡矣天下從而賢之者好學初學記帝王部總叙帝王注近道名顯如髙山雪法句經廣衍品猶天有三光鼎有三足各稱其德並著其功辨正論卷一喻林卷九十五
