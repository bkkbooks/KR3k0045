body:
  text: 喻林卷四十四明徐元太撰人事門四十二貴全天有四時得以成嵗雷霆以振之霜雪以齊之春陽以暖之雲雨以潤之然後能相育也天且弗違而况於人乎春秋正義莊公二十二年鄭玄曰樂之器彈其宮則衆宫應然而不足樂是以變之使雜也史記樂書注天見其明地見其光君子貴其全也荀子勸學篇視方寸於牛不知其大於羊總視其體乃知其大相去之逺淮南子説山訓見虎一文不知其武見驥一毛不知善走淮南子説林訓行一棊不足以見智彈一絃不足以見悲淮南子説林訓夫五音之數不過宮商角徴羽然而五絃之琴不可鼓也必有細大駕和而後可以成曲今畫龍首觀者不知其何獸也具其形則不疑矣淮南子要略人耳缺目完以目完稱人體全不可從也人桀於刺虎怯於擊人而以刺虎稱謂之勇不可聽也身無敗缺勇無不進乃為全耳王充論衡儒增篇所謂術者內修形神使延年愈疾外攘邪惡使禍害不干比之琴瑟不可以孑絃求五音也方之甲胄不可以一扎待鋒刃也何者五音合用不可闕而鋒刃所集不可少也抱朴子內篇微旨偏才不足以經周用隻長不足以濟衆短是以雞知將旦不能究隂陽之厯數鵲識夜半不能極晷景之道度山鳩知晴雨於將來不能明天文蛇蟻知濳泉之所居不能逹地理抱朴子外篇博喻臘者大祭備物而殽有膍音皮胲音該此雖從散禮應具不可散棄也莊子音義庚桑楚四體合則渾成人五美備則混為聖揚子法言注問道篇火燭一隅則半室無光骨節早成身心不長意林呂氏春秋文軒六駛是無四寸之鍵則車不行小亡則大者不成也藝文類聚舟車部車一枝踡曲終危九層之臺一股岑蹄必傷千里之駕文苑英華庾信藩王讓官表一隂一陽交春夏秋冬備而萬情生焉一柔一剛交東南西北備而萬形成焉一闢一翕交平上去入備而萬聲生焉一唱一和交開發收閉備而萬音成焉玉海藝文小學一輪不為車二輪亦不成亦不由於餘要假人與牛并具於輻轄二輞相資備轅軛兼絡繩爾乃得名車大寶積經卷一百二十如車隻輪如鳥一翼決定不能翔空致逺大方廣佛華嚴經卷十一譬如車乘闕其一輪假令善能御者亦不能進蘇婆呼童子經卷上譬如一目之牛周行邊際當知彼牛其何能行尼拘陀梵志經上譬如有城若干家居東西南北合乃為城色亦如是亦不一色為色隂也修行道地經五隂品那先問王言名車何所為車者軸為車耶王言軸不為車那先言輞為車耶王言輞不為車那先言輻為車耶王言輻不為車那先言轂為車耶王言轂不為車那先言轅為車耶王言轅不為車那先言軛為車耶王言軛不為車那先言輿為車耶王言輿不為車那先言扛為車耶王言扛不為車那先言蓋為車耶王言蓋不為車那先言合聚是諸材木著一面寧為車耶王言合聚是諸材木著一面不為車也那先言假令不合聚是諸材木寧為車耶王言不合聚是諸材木不為車那先言音聲為車耶王言音聲不為車那先言何所為車者王便默然不語那先言佛經説之如合聚是諸材木用作車因得車人亦如是合聚頭面耳鼻口頸項肩臂骨肉手足肝肺心脾腎腸􅠛顏色聲響喘息苦樂善惡合聚名為人那先比丘經卷上具三種德方能善射一由弓德二由箭德三由中的德瑜伽師地論卷七十一譬如車二輪不壞能有所至一輪壞不能有所至阿毗曇八揵度論卷十七譬如鷹鳥二翅不壞能飛至空一翅壞不能至空阿毗曇八揵度論卷十七貴通勉勸天下徙有之無魚鹽徙山林木徙川澤交易其所居積孔氏傳書益稷大伯端委以治周禮仲雍嗣之斷髮文身裸以為飾豈禮也哉有由然也左傳哀公七年吾豈匏瓜也哉焉能繫而不食論語陽貨一逹為之道路二逹謂之岐旁三逹謂之劇旁四逹謂之衢五逹謂之康六逹謂之莊七逹謂之劇八逹謂之崇期九逹謂之逵爾雅夫啾發投曲感耳之聲合之律度淫蛙而不可聽者非韶夏之樂也因執合變偶時之會風移俗易乖忤而不可通者非君子之法也前漢書敘傳上馮子以為大人之德不碌碌落落如石風興雲蒸一龍一蛇與道翺翔與時變化夫豈守一節哉後漢書馮衍列傳安能斷江漢之流為激石之清魏志管輅傳注夫應龍以屈伸為神鳯皇以嘉鳴為貴何必隱形於天外潛鱗於重淵者哉吳志吾燦傳應龍以屈伸為靈大人以知機為美晉書呂隆傳動則行乎至通之路靜則入乎大順之門泰則翔乎寥廓之宇否則淪乎渾冥之泉晉書潘尼傳執藥隨親非情謬於甘苦揮斤斬毒豈忘痛於肌膚蓋以先疑後順忠焉必往忍小存大雖愛必從宋書臧質傳聖人念繞桎之不脫愍黏膠之難離陳書傅縡傳桓公問於管子曰衡有數乎管子對曰衡無數也衡者使物一髙一下不得常固桓公曰然則衡數不可調耶管子對曰不可調調則澄澄則常常則髙下不二髙下不二則萬物不可得而使固管子輕重乙彼且為嬰兒亦與之為嬰兒彼且為無町畦亦與之為無町畦彼且為無崖亦與之為無崖莊子人問世臘者之有膍皮胲該可散而不可散也觀室者周於寢廟又適其偃焉為是舉移是莊子庚桑楚去就之際反覆量宜如員環之轉因彼變化雖傍者莫知其所為鬼谷子內揵注與時遷徙與世偃仰緩急嬴拙府然若渠堰櫽括之於己也曲得所謂焉然而不折傷故君子之度已則以繩接人則用抴荀子非相文久而息節族久而絶守法數之有司極禮而褫荀子非相篇孔子曰龍食乎清而遊乎清螭食乎清而遊乎濁魚食乎濁而遊乎濁今丘上不及龍下不若魚丘其螭邪夫欲立功名者豈得中繩哉救溺者濡追逃者趨吕氏春秋舉難夫善射者有儀表之度如工匠有規矩之數此皆所得以至於妙然而奚仲不能為逢蒙造父不能為伯樂也是曰諭於一曲而不通於萬方之際也淮南子俶真訓行險者不得履繩出林者不得直道夜行瞑目而前其手事有所至而明有不害人能貫冥冥入於昭昭可與言至矣淮南子繆稱訓夫胡人見黂不知其可以為布也越人見毳不知其可以為旃也故不通於物者難與言化淮南子齊俗訓誳寸而伸尺聖人為之小枉而大直君子行之淮南子汜論訓言而必信期而必當天下之髙行也直躬其父攘羊而子證之尾生與婦人期而死之直而證父信而溺死雖有直信孰能貴之夫三軍矯命過之大者也秦穆公興兵襲鄭過周而東鄭賈人弦髙將西販牛道遇秦師於周鄭之間乃矯鄭伯之命犒以十二牛賔秦師而却之以存鄭國故事有所至信反為過誕反為功淮南子泛論訓今世之為武者則非文也為文者則非武也文武更相非而不知時世之用也此見隅曲之一指而不知八極之廣大也故東面而望不見西墻南面而視不覩北方唯無所嚮者則無所不通淮南子汜論訓周公事文王也行無専制事無由己身若不勝衣言若不出口有奉持於文王洞洞屬屬如將不能恐失之可謂能子矣武王崩成王幼少周公繼文王之業履天子之籍聽天下之政平夷狄之亂誅管蔡之罪負扆而朝諸侯誅賞制斷無所顧問威動天地聲懾海內可謂能武矣成王既壯周公屬籍致政北面委質而臣事之請而後為復而後行無擅恣之志無伐矜之色可謂能臣矣故一人之身而三變者所以應時矣淮南子汜論訓昔者神農無制令而民從唐虞有制令而無刑罰夏后氏不負言殷人誓周人盟逮至當今之世忍詢而輕辱貪得而寡羞欲以神農之道治之則其亂必矣淮南子汜論訓夫有形埓者天下公見之有篇籍者世人傳學之此皆以形相勝者也善形者弗法也淮南子兵略訓夫聖人之屈者以求伸也枉者以求直也故雖出邪辟之道行幽昧之塗將欲以直大道成大功猶山林之中不得直道拯溺之人不得不濡足也淮南子泰族訓水之性淖以清窮谷之汙生以青苔不治其性也掘其所流而深之茨其所決而髙之使得循勢而行乘衰而流雖有腐髊流漸弗能汙也其性非異也通之與不通也風俗猶此也淮南子泰族訓六爻有吉凶四時變更不可執一以為規京氏易傳損朝廷之士為祿故入而不出山林之士為名故往而不返入而不能出往而不能返通移有常聖也韓詩外傳故追亡者趨拯溺者濡今民陷溝壑雖欲無濡豈得已哉鹽鐵論論儒直而不能枉不可與大任方而不能圜不可與長存説苑談叢夫草木之中霜霧不可以風過清水明鏡不可以形遁也通方之人不可以文亂新序善謀或曰聖人之道若天天有常矣奚聖人之多變也曰聖人固多變揚子君子篇子未覩禹之行水歟一東一北行之無礙也君子之行獨無礙乎如何直往也水避礙則通於海君子避則通於理揚子君子次二時七時九軫轉其道測曰時七時九不失當也太玄經第三更縣道不通於野野路不逹於邑騎馬乘舟者必不由也故血脈不通人以甚病王充論衡别通篇救火拯溺義不得好辨論是非言不得巧入澤隨龜不暇調足深淵捕蛟不暇定手王充論衡自紀篇一時之制可反而用也一時之吉可反而凶也周易略例明卦吾見溝澮不疑江海之大覩丘陵則知有泰山之髙也若守藥則棄宅見交則非賒是海人所以終身無山山客曰無大魚也嵇中散集答釋難宅無吉凶攝生論信其心智所知及而不知所知之有極者膚識也誠其耳目所聞見而不知視聽之有限者俗士也張湛注列子湯問盤旋揖讓非禦冦之容摜甲纓胄非廟堂之飾垂紳振佩不可以揮刃爭鋒規行矩步不可以救火拯溺抱朴子外篇博喻寢廟則以燕享屏厠則以偃溲當其偃溲則寢廟之是移於屏厠矣是非之移一彼一此誰能常之故至人因而乘之則均矣郭子注莊庚桑楚山中人不信有魚大如木海上人不信有木大如魚漢武不信弦膠魏文不信火布胡人見錦不信有蟲食樹吐絲所成昔在江南不信有千人氊帳及來河北不信有二萬斛船皆實驗也顔氏家訓歸心冬之德隂而有寒炎蕭丘夏之德陽而有霜霰以天地之德由不能一於隂陽况其賢聖豈能一於萬民哉劉子從化動情不能得由一塗由一塗不可以應萬變應萬變而不失其正者惟旁通乎揚子法言注問明篇出申威於河外何猛氣之咆勃入屈節於廉公若四體之無骨文選西征賦事之急者不能安言心之痛者不能緩聲補文選劉陶論盜賊疏飛鳥遺迹蟬蛻亡殼騰蛇棄鱗神龍喪角至人能變逹士拔俗廣文選仲公理述志詩夫以水性沈柔入隘則駛方之人情固知迫隘之地無得保其純美世説新語尤悔山必有阜河必有曲江漢東流必有回復意林任子居不必厄食不求簞豈獨蓬蓼可永而隆棟招患奚必膏粱非美而飲疏以餐藝文類聚居處部室賦三王之治如環之無端如水之勝火太平御覽皇王部敘皇王上事不可預設而變不可先圖猶痛不可先摩而癢不可先折五味不可以升斗和琴瑟不可以尺寸調也道德經指歸卷七月有小大日有短長萬物並至不可勝量黃帝素問內經寶命全形論夫陳爼豆於壘門建旌旗於朝堂衣狐裘以當蕤賔被絺絺巾以御黃鍾非不麗也乖其處非其時也故持孔子之術入商鞅之門賫孟軻之説詣蘇張之庭功無分寸過有丈尺矣𢎞明集牟子理惑論貴忘潛遊者不識其水巢棲者非辨其林飛沈所至何問其主南史孔淳之隱逸傳常以言翹明其與人也其愛人也其有德於人也以此為友則不親以此為交則不結以此有德於人則不報故曰見與之友幾於不親見愛之交幾於不結見施之德幾於不報四方之所歸心行者也管子心術夫須臾無忘其為賢者必困其性百步之中無忘其為容者必纍其形文子符言知物之偽者不必去物譬如見土牛木馬雖情存牛馬之名而心忘牛馬之實關尹子八籌宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐今不識先後不識今闔室毒之謁史而卜之弗占謁巫而禱之弗禁謁醫而攻之弗已魯有儒生自媒能治之華子之妻子以居室之半請其方儒生曰此固非卦兆之所占非祈請之所禱非藥石之所攻吾試化其心變其慮庶幾有瘳乎於是屏左右獨與居室七日莫知其所施為也而積年之疾一朝都除華子既悟乃大怒黜妻罰子操戈逐儒生宋人執而問其以華子曰曩吾忘也蕩蕩然不知天地之有無今頓識既往數十年來存亡得失哀樂好惡擾擾萬緒起矣吾恐將來之存亡得失哀樂好惡之亂吾心如此也須臾之忘可復得乎列子周穆王闉跂攴離無脤説衛靈公靈公説之而視全人其脰肩肩甕盎大癭説齊桓公桓公説之而視全人其脰肩肩故德有所長而形有所忘人不忘其所忘而忘其所不忘此謂誠忘莊子德充符介者拸畫外非譽也胥靡登髙而不懼遺死生也莊子庚桑楚魚相造乎水人相造乎道相造乎水者穿池而養給相造乎道者無事而生定故曰魚相忘乎江湖人相忘乎道術莊子大宗師泉涸魚相與處於陸相詬以濕相濡以沫不如相忘於江湖與其譽堯而非桀也不如兩忘而化其道莊子大宗師今大冶鑄金金踴躍曰我且必為鏌鋣大冶必以為不祥之金今一犯人之形而曰人耳人耳夫造化者必以為不祥之人今一以天地為大爐以造化為大冶惡乎往而不可哉莊子大宗師工倕旋而蓋規矩指與物化而不以心稽故其靈臺一而不桎忘足屨之適也忘要帶之適也知忘是非心之適也不內變不外從事會之適也始乎適而未嘗不適者忘適之適也莊子逹生施於人而不忘非天布也商賈不齒雖以士齒之神者弗齒莊子列禦寇百里奚爵祿不入於心故飯牛而牛肥使秦穆公忘其賤與之政也有虞氏死生不入於心故足以動人莊子田子方楊子過於宋東之逆旅有妾二人其惡者貴美者賤楊子問其故逆旅之父答曰美者自美吾不知其美也惡者自惡吾不知其惡也楊子謂弟子曰行賢而去自賢之心焉往而不美韓非子説林上政之適也君臣相忘於治魚相忘於水獸相忘於林人相忘於世故曰天也王充論衡自然篇夫物未嘗有謝生於自然者而必欣賴於針石故理至則迹滅矣郭子注莊逍遙遊雖負萬鈞忽然不覺重之在身雖應萬務泯然不覺事之在已郭子注莊養生主慕賞乃善故賞不能供畏罰乃止故罰不能勝忘賞罰而自善性命乃大足耳郭子注莊在宥必服恭儉非忘儉而儉也拔出公忠非忘忠而忠也故雖無阿私而不足以勝矯詐之任此皆自處髙顯若臺觀之可覩將使物不止於性分而矯跂自多以附之亢足投迹不安其本步也郭子注莊天地泉涸而魚相詬濡言仁義之譽皆生於不足若相忘於江湖斯乃忘仁而仁者也郭子注莊天運謀而後知非自然也故至知不謀譬之五藏未嘗相親而仁已至故至仁無親郭子注莊庚桑楚忘中者非羿自是者非堯郭子注莊徐無鬼萬民不識主之所務故可安也四肢九竅不諭心之所導故可全也道德經指歸卷十一諺云人不知身為聖馬不知身為龍玉皇本行集經譬如木火因手因鑽而得生火木火之生終不念言是手鑽生火亦不言我能自生海空智藏經持誡品譬如明鏡照衆色像了了明淨無所障蔽而此明鏡終不自言我能明照大乘妙林經譬如盛日雖破衆暗而不念言我能破彼波羅密多經卷五百六十七又如麗日雖照十方而不念言我能遍照波羅密多經卷五百六十七昔天尊在恆水邊廣説經法時有放牛老公拄杖而聽不覺杖下有蝦蟆蝦蟆聽經意美亦不覺背上有杖遂久蝦蟆命終其神即生天上阿育王譬喻經基知止如酌老者之酒則當如孔之有取孔者器中之所受也器之所受有大小滿則止猶老者所勝有多少亦足則停毛詩正義角弓楚狂接輿歌而過孔子曰鳯兮鳯兮何德之衰論語微子譬之如室既鎮其甍矣又何加焉國語晉蘇厲謂白起曰楚有養由基者善射去栁葉者百步而射之百發百中左右皆曰善有一人過曰善射可教射也矣養由基曰人皆善子乃曰可教射子何不代我射之也客曰我不能教子支左屈右夫射栁葉者百發百中而不以善息少焉氣力倦弓撥矢鉤一發不中前功盡矣戰國策周赧王蔡澤謂應侯曰君獨不觀博者乎或欲大投或欲分功此皆君之所明知也今君相秦計不下席謀不出廊廟坐制諸侯利施三川君之功極矣此亦秦之分功之時也戰國策秦昭襄王陳軫謂昭陽曰令尹貴矣主非置兩令尹也臣竊為公譬可也楚有祠者賜其舍人巵酒舍人相謂曰數人飲之不足一人飲之有餘請畫地為蛇先成者飲酒一人蛇先成引酒且飲乃左手持巵右手畫蛇曰吾能為之足未成一人之蛇成奪其巵曰蛇固無足子安能為之足遂飲其酒為蛇足者終亡其酒今君相楚而攻魏破軍殺將得八城不弱兵欲攻齊齊畏公甚公以是為名亦足矣官之上非可重也戰無不勝而不知止者身且死爵且後歸猶為蛇足也戰國策齊閔王譬猶鍾鳴漏盡而夜行不休魏志田豫傳氛祲既澄日月自朗臣亦何可爝火不息晉書阮籍傳圓行方止物之定質修之不已則溢髙之不已則栗馳之不已則躓引之不已則迭是故去之宜疾南史王曇首憎虔傳有人去鄉土離六親廢家業遊於四方而不歸者何人哉世必謂之為狂蕩之人矣又有人鍾賢世矜巧能修名譽誇張於世而不知己者亦何人哉世必以為智謀之士列子天瑞北陸閉蟄隱伏不出目盲耳聾道路不通焦氏易林屯之中孚蛇行蜿蜒不能上阪履節安居可以無憂焦氏易林剝之節夜視失明不利逺鄉焦氏易林大畜之渙安牀厚褥不得久宿焦氏易林家人之睽理盡者不可責有餘一至者不可求兼濟故洪濤之末不能蕩浮萍衝風之後不能揚輕塵徑弩之餘力不能洞霧縠西頽之落暉不能照山東抱朴子外篇廣譬夫莢奔而不止者鮮不傾墜凌波而無休者希不沈溺弄刃不息者傷刺之由也斫擊不輟者缺毁之原也盈則有損自然之理周廟之器豈欺我哉抱朴子外篇知止尺波歸海恆嘆不居爝火為薪猶悲假續况復星回日薄通人有乞老之言鍾鳴漏盡前史有夜行之誡藝文類聚人部老表俯音赴曲操終則仆傾身舉重力殫斯斃藝文類聚人部老表役壯休老上典所優晨行暮息事身恆分若夫玄黃未已非狄駕之衛筋力為用豈強飯之時藝文類聚職官部僕射表年過七十而以居位譬猶鍾鳴漏盡夜行不休藝文類聚職官部衛尉驅奔效駕先輟於羸駘翔進賀成近遺於鎩翮彼常知暮而况臣哉文苑英華庾信請致仕一表字説曰貈善睡則於宜作而無作於宜覺而無覺不可以涉難矣舟以涉難利則涉否則止貈舟在右能止者也埤雅品物門貉譬如甘蔗既被壓已滓無復味海空智藏經持誡品知足子謂衛公子荆善居室始有曰茍合矣少有曰茍完矣富有曰茍美矣論語子路人不患其不知患其為詐也不患其不勇患其為暴也不患其不富患其亡厭也前漢書景帝紀夫人之性陵上猶水之趣下也益而不已必決升而不已必困始於匹夫行義不敦終於皇輿為之敗績固不可不慎也晉書庾峻傳且能約其躬則儋石之稸以豐茍肆其欲則海陵之積不足晉書東晳傳胥靡有免死罪時活今不知足者之憂終身不解韓非子解老夫遊沒者不求沐浴已自足其中矣故食草之獸不疾易藪水居之蟲不疾易水行小變而不失常淮南子説山訓近敖倉者不為之多飯臨江河者不為之多飲其滿腹而已淮南子説林訓夫錦績紛華所服不過溫體三牲大牢所食不過充腹知以身取節者則知足矣孔叢子居衛抱關執籥以守漏刻則臣之心厭飫足矣蔡中郎集讓尚書且鷦鷯巢林不過一枝鼯鼠飲河不過滿腹小人之情求足而已蔡中郎集讓髙陽侯茍足於其性則雖大鵬無以自貴於小鳥小鳥無羡於天地而榮願有餘矣故小大雖殊逍遙一也郭子注莊逍遙遊搖頭鼓缶秦之樂也秦人樂之此故不願天帝之音李善注文選陸士衡演連珠其為實乎則執杓而飲河者不過滿腹棄室而灑兩者不過濡身過此以往弗能受也文選李康運命論放身而居體逸則安肆口而食屬厭則充是以王鮪登爼不假吞波之魚蘭膏停室不思銜燭之龍文選陸機演連珠聽極於音不慕鈞天之樂身足於蔭無假垂天之雲是以蒲密之黎遺時雍之世豐沛之士亡桓撥之君文選陸機演連珠俯仰生榮華咄嗟復雕枯飲河期滿腹貴足不願餘巢林棲一枝可為逹士模文選左思詠史詩蓋聞修已知足慮得其逸甘榮昧進志忘其審是以飲河滿腸而求安愈泰緣木務髙而畏下滋甚廣文選謝惠連連珠飢者易食寒者易衣臣之謂矣藝文類聚封爵部親戚封表士生一世但取衣食足乘下澤車御欵假馬為郡吏守墳墓鄉里稱善人斯可矣藝文類聚獸部馬方丈之食不過一飽綈袍之繡不過一暖太平御覽飲食部食下古箋云偃鼠飲河止於滿腹鷓鴣銜葉才能覆身埤雅品物門鷓鴣量腹而進松木度形而衣薜蘿淡然已足何氏語林棲逸喻林卷四十四
