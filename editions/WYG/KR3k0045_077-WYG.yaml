body:
  text: 喻林卷七十七明徐元太撰臣術門四戒貪九四晉如鼫鼠貞厲易晉碩鼠碩鼠無食我黍三歳貫女莫我肯顧碩鼠碩鼠無食我麥三歳貫女莫肯我徳碩鼠碩鼠無食我苗三歳貫女莫我肯勞詩國風碩鼠碩鼠大夫貪戾魏人怨之而作是詩詩説魏老馬反為駒不顧其後如食音嗣宜饇音飫如酌孔取詩小雅角弓大風有隧貪人敗類詩大雅桑柔伐檀刺貪也在位貪鄙無功而受禄君子不得進仕爾毛詩伐檀鳩鶻鳩也食桑葚過則醉而傷其性毛詩氓註缾罄則罍盈矣罍既無情之物終不以自盈為恥故知是為罍者恥毛詩正義蓼莪周芮良夫之詩曰大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖是貪故也孤之謂矣左傳文公元年我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶左傳襄公十五年象有齒以焚其身賄也左傳襄公二十四年且夫富如布帛之有幅焉為之制度使無遷也夫民生厚而用利于是乎正徳以幅之使無黜嫚謂之幅利利過則為敗吾不敢貪多所謂幅也左傳襄公二十八年梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂魏子將受之魏戊謂閻没女寛曰主以不賂聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召之比至三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子直食之間三嘆何也同辭而對曰或賜二小人酒不夕食饋之始至恐其不足是以嘆中置自咎曰豈將軍食之而有不足是以再嘆及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人左傳昭公二十八年貴人之用心也與嬰兒子何其異哉嬰兒有常病貴臣有常禍父母有常失人君有常過嬰兒常病傷於飽也貴臣常禍傷於寵也哺乳多則生癎病富貴盛而致驕疾愛子而賊之驕臣而滅之者非一也後漢書王符列傳夫鳥以山為埤而增巢其上魚以泉為淺而穿穴其中卒所以得者餌也貴戚願其宅吉而制為令名欲其門堅而造作鐵樞卒其所以敗者非苦禁忌少而門樞朽也常苦崇財貨而行驕僭耳後漢書王符列傳倉庫單於豺狼之口功業無銖兩之效後漢書李陳龜列傳北山有鴟不潔其翼飛不正向寢不定息饑則木攬飽則泥伏饕餮貪汙臭腐是食填腸滿嗉嗜欲無極長鳴呼鳳謂鳳無徳鳳之所趨與子異域後漢書朱暉列傳註羣臣處官位受厚禄莫務治國者期於管國之重而擅其利牧魚其民以富其家管子明法解厚取之君而不施於民是為筐篋之藏也仁人不為也晏子雜下鷸有文而貪鳶不撃而貪師曠禽經夫魚鼈黿鼉猶以淵為淺而掘其中鷹鳶猶以山為卑而增巢其上及其得也必以餌故君子茍能無以利害義則恥辱亦無由至矣荀子法行衛人嫁其子而教之曰必私積聚為人婦而出常也其成居幸也其子因私積聚其姑以為多私而出之其子所以自反者倍其所以嫁其父不自罪於教子非也而自知其益富今人臣之處官者皆是類也韓子説林周鼎著饕餮有首無身食人未咽害及其身以言報更也吕氏春秋先識無周公之徳而有其富無管仲之功而有其侈故編户跛夫而望疾歩也鹽鐵論刺權夫太山鴟啄腐鼠於窮澤幽谷之中非有害於人也今之有司盜主財而食之於刑法之旁不知機之是發又以嚇人其患惡得若太山之鴟乎鹽鐵論毁學當世囂囂非患儒之雞廉患在位者之虎飽嗌咽於求賢無所孑遺耳鹽鐵論褒賢為醫以拙矣又多求謝為吏既多不良矣又侵漁百姓鹽鐵論疾貧履泥汙足名困身辱焦氏易林大有之鼎酷吏曰虎哉虎哉角而翼也貨殖曰蚊揚子淵騫次五蚩蚩干于丘飴或錫之坏測曰蚩蚩之干錫不好也太𤣥經第一干上九干于浮雲從墜于天測曰干于浮雲乃從天墜也太𤣥經第一干次三翕食嘬嘬測曰翕食嘬嘬利如舞也太𤣥經第五翕次六次音咨次一日三餼祗牛之兆肥不利測曰次次之餼肥無身也太𤣥經第六養使餓狼守庖厨饑虎牧牢豚遂至熬天下之脂膏斵生人之骨髓怨毒無聊禍亂並起昌言理亂篇在位之人無有清潔之志皆並進趣貪婪於財利中心雖滿猶復求索不知厭飽者也王逸註楚辭離騷經位髙世重禍基美色伐性不疑厚味腊毒難治如何貪人不思嵇中散集名行顯患滋畏亢悔而貪榮之慾不滅忌毁辱而争肆之情不遣亦猶惡濕而泳深淵憎影而不就隂穿舟而息漏猛爨而止沸者也抱朴子外篇嘉遯伺河龍之睡而撥明珠居量表之寵而冀無患耽漏刻之安蔽必至之危無朝菌之榮望大椿之夀似蹈薄冰以待夏日登朽枝而須勁風淵魚之引芳餌澤雉之咽毒粒咀漏脯以充饑酣鴆酒以止渇也抱朴子外篇嘉遯膏唇拭舌競欲咀嚼補文選吕強論宦官疏撲滿者以土為噐以蓄錢具其有入竅而無出竅滿則撲之土麤物也錢重貨也入而不出積而不散故撲之士有聚歛而不能散者將有撲滿之敗可不誡歟西京雜記甘𤓰抱苦蔕美棗生刺棘刺旁固有刀貪人還自賊事類賦果部𤓰註貪欲無滿如海吞流終不滿足大寶積金卷八十二戒盛上九姤其角吝无咎易姤髙者懼危滿者戒盈豐大者多憂故也韓康伯註易雜卦夫徳福之基也無徳而福隆猶無基而厚墉也其壊也無日矣國語晉常觀富貴之家禄位重疊猶再實之木其根必傷後漢書皇后紀長木之標其勢必顛勢極故也勢極則受患故無全物焉然則貴盛之極傾覆之所由也後漢紀孝安門藏金穴地使其驕馬控龍媒勢成其逼晉書庾亮傳性之有分盈分者顛晉書陳元逹記事窮運盡必於顛仆風起塵合而禍至常酷也晉書陸機傳昔楚人得寵於觀起有馬者皆亡夫徳薄任隆必近覆敗吾恐不獲其利而招其禍南史何之元文學傳三火起明雨滅其光髙位疾顛驕恣深傷焦氏易林大有之師盛盈必毁髙位崩顛焦氏易林頥之大有次五鐘鼓喈喈管絃嚌嚌或承之衰測曰鐘鼔喈喈樂後悲也太𤣥經第二樂次六熾承于天冰萌于地測曰承天萌地陽始退也太𤣥經第三應登峻者戒在於窮髙濟深者禍生於舟重是以西秦有思上蔡之李斯東越有悔盈亢之文種抱朴子外篇博喻養由之射行人識以弛絃東野之御顔子知其方敗成功之下未易久處也夫飲酒者不必盡亂而亂者多焉富貴者豈其皆危而危者有焉抱朴子外篇知止吾聞無熾不滅靡溢不損煥赫有委灰之兆春草為秋瘁之端日中則昃月盈則蝕四時之序成功者退逺取諸物則構髙崇峻之無限則頽壊惟憂矣近取諸身則嘉膳㫖酒之不節則結疾傷性矣况乎其髙概雲霄而積之猶不止其威震人主而加崇又不息者乎抱朴子外篇知止隆隆者絶赫赫者滅有若春華須臾凋落抱朴子外篇自叙位髙者必速顛仆也味厚者為毒久前漢書註五行志君垂恩有如冬日而臣戒懼常若秋霜李善註文選王仲寶褚淵碑文炎炎者滅隆隆者絶觀雷觀火為盈為實天收其聲地藏其熱髙明之家鬼瞰其室攫拏者亡黙黙者存文選揚子雲解嘲厚味腊毒豐屋生災補文選潘尼乗輿箴日不常中月盈有虧履道者固杖勢者危廣文選崔子瑋外戚箴月弦則滿日朝則襲咸池不留陽谷之上而懸車之後將入也故求得者喪争明者失廣文選阮嗣宗莊論夫四道好謙三材忌滿祥萃虚室鬼瞰髙屋豐屋有蔀家之災鼎食無百年之貴廣文選傳季友演慎論將軍不覩盛衰之紀成敗之符譬如野火在原蹈履河冰火滅冰泮將何所依附廣文選吕季平答雍闓檄強梁者亡掘強者折大健者跋大利者缺意林太元經衣成則缺袵宫成則缺隅示不成也鬼神害滿也意林説苑盖基薄墻髙途遥力躓藝文類聚人部言志書爵髙者人妬之官大者王惡之禄厚者怨處之藝文類聚人部妬浮舟千仞吕梁之暢已深總轡萬尋懸車之懼非淺藝文類聚職官部刺史表日中則昃盈虚之定分噐滿必傾往復之恒理藝文類聚職官部儀同章日不恒中月盈則虧崇山落峰髙樹折枝文苑英華梁武帝雜箴譬如大樹根莖枝葉華果茂盛大枝先折亦如寶山大巖先崩雜阿含經巻二十四水流不常滿火盛不久然日出須臾没月滿已復缺尊榮豪貴者無常復過是罪業報應經尺二憂國彼黍離離彼稷之苗行邁靡靡中心揺揺彼黍離離彼稷之穗音遂行邁靡靡中心如醉彼黍離離彼稷之實行邁靡靡中心如噎音咽叶於悉反詩國風黍離匪風發叶方月反兮匪車偈音挈兮顧瞻周道中心怛叶旦悦反兮匪風飄叶匹妙反兮匪車嘌音漂叶匹妙反兮顧瞻周道中心弔兮詩國風匪風蜉蝣之羽衣裳楚楚心之憂矣於我歸處蜉蝣之翼采采衣服心之憂矣於我歸息蜉蝣掘閲麻衣如雪心之憂矣於我歸説音税蜉詩國風蝣鴟鴞鴟鴞既取我子無毁我室恩斯勤斯鬻子之閔叶眉平反斯詩國風鴟鴞沔音免彼流水朝宗于海鴥彼飛隼載飛載止嗟我兄弟邦人諸友莫肯念亂誰無父母沔彼流水其流湯湯音傷鴥彼飛隼載飛載揚念彼不蹟載起載行心之憂矣不可弭忘詩小雅沔水憂心如惔音談不敢戲談詩小雅節南山不敢暴虎不敢馮河人知其一莫知其他音拖小詩小雅旻踧踧音笛周道鞠音菊為茂草我心憂傷惄音溺焉如𢷬詩小雅小弁苕音條之華芸其黄矣心之憂矣維其傷矣苕之華其葉青青音精知我如此不如無生詩小雅苕之華園有桃君子憂國而嘆之詩説魏山有樞唐人憂國之詩詩説唐蜉蝣君怠國危曹大夫閔之而作詩説曹兎爰閔周也桓王失信諸侯背叛構怨連禍王師傷敗君子不樂其生焉毛詩兎爰鴟鴞周公救亂也成王未知周公之志公乃為詩以遺王名之曰鴟鴞焉毛詩鴟鴞黍離閔宗周也周大夫行役至于宗周過故宗廟宫室盡為禾黍閔周室之顛覆彷徨不忍去而作是詩也毛詩黍離陵苕之英華木紫赤而繁多至今亦芸然其色黄而衰矣以興周室之諸夏本兵強國盛今其師病而微矣陵華衰則將落落則苕幹特立矣諸侯師病則將敗敗則京師孤弱矣毛詩正義苕之抑人亦有言曰􅊔不恤其緯而憂宗周之隕為將及焉左傳昭公二十四年詩曰缾之罄矣惟罍之恥王室之不寧晉之恥也左傳昭公二十四年夫五運攸革三微數盡猶髙秋彫候理之自然觀其揺落人有為之流漣者也晉書恭帝紀枳棘充路陟之無縁將伐無柯患兹蔓延孔叢子記問大王獨不聞古之將曰桓司馬者朝朝其君舉而晏御呼車驂亦呼車御肘其驂曰子何越云為乎何為藉呼車驂謂其御曰當呼者呼乃吾事也子當御正子之轡銜耳子今不正轡銜使馬卒然驚妄轢道中行人必逢大敵下車免劍渉血履肝者固吾事也子寧能辟子之轡下佐我乎其禍亦及吾身與有深憂吾安得無呼車哉今大王曰食肉者已慮之矣藿食者尚何與焉設使食肉者一旦失計於廟堂之上若臣等之藿食者寧得無肝膽塗地於中原之野與其禍亦及臣之身臣與有其深憂臣安得無與國家之計乎説苑善説子又不聞郢人之歌乎其辭曰故厦將顛兮奈良工何榱題媛兮斵而為窩昔周室顛而榱題媛者齊晉也斵齊晉之榱題而治公室者則管仲鮑叔牙寗戚狐偃趙衰叔向皆良工也是以能伯諸侯而強公室天禄閣外史漁論魯漆室邑之女過時未適人倚柱而嘯鄰婦曰子欲嫁乎曰非也予憂者魯君老太子幼鄰婦曰此丈夫之憂也女曰不然昔有客過繋馬園中踐予葵使予終歳不飽葵鄰女奔使予兄追之逢水溺死使予終身無兄予聞河潤九里漸洳三百歩今魯國有患君臣父子被其辱婦女獨安所避乎事文類聚憂世戰國䇿榱棟維新便復有黍離之嘆何氏語林方正重國維柞之枝其葉蓬蓬樂只君子殿多見反天子之邦詩小雅采菽山之有草木以自覆盖成其髙大喻人君有賢臣以自尊顯鄭氏箋詩南山有臺毛先生一至楚而使趙重於九鼎大吕毛先生以三寸之舌彊於百萬之師史記平原君傳山有猛獸藜藿為之不采國有忠臣姦邪為之不起前漢書葢寛饒傳海産明珠所在為寶楚雖有才晉實用之英偉君子所游見珍何必本州哉吳志張紘傳註良臣如猛獸髙歩通衢而豺狼避路信矣晉書石季龍上傳國家將墜公惟棟梁周書蘇綽傳夫臣所在辟除開塞者亦逺矣故春秋曰山有虎豹葵藿為之不採國有賢士邊境為之不害也鹽鐵論崇禮仁人也者國之寶也智士也者國之噐也博通士也者國之尊也新序雜事四竇武陳蕃以執政為朝廷重讜議合如應響忠謀奮如疾雷然諾相許確如太山天禄閣外史黨錮神有以開之必先為之生賢智之輔佐若天將降時雨山川為之出雲也李善註文選李蕭逺運命論常聞山有藏玉則卉草常榮林有猛獸則叢枝莫採是以漢儀重見皇王之迹有真周禮猶存龜蒙之田無改藝文類聚雜文部連珠澤民見龍在田徳施普也易乾芃芃音蓬黍苗隂雨膏去聲之悠悠南行召伯勞去聲之詩小雅黍苗視民如子見不仁者誅之如鷹鸇之逐鳥雀也左傳襄公二十五年今有受人之牛羊而為之牧之者則必為之求牧與芻矣求牧與芻而不得則反諸其人乎抑亦立而視其死與孟子公孫丑下禹思天下有溺者由已溺之也稷思天下有饑者由已饑之也是以如是其急也孟子離婁上思天下之民匹夫匹婦有不被堯舜之澤者若已推而内之溝中孟子萬章上醫無方術云吾能治病問之曰何用治病曰用心意病者必不信也吏無經學曰吾能治民問之曰何用治民曰以材能是醫無方術以心意治病也百姓安肯信嚮而人君任用使之乎王充論衡量知篇木而進淵知為船以濟水猶君子之濟民也太𤣥經第二進解木生肥丘根荄見育猶君子以義化人人得以如草木之生肥丘也太𤣥經第六養解時雨随車棠隂逐葢文苑英華隋煬帝誄乃是入境移風非直停車待雨文苑英華庾信傳習習晨風動澍雨潤乎苗郡后恤時務我民以優饒太平御覽職官部良太守下相道朝夕納誨以輔台徳若金用汝作礪若濟巨川用汝作舟楫若歳大旱用汝作霖雨書説命上尹氏作大師之官為周之桎鎋鄭氏箋詩節南山五行氣和則月依其時而生上配日也猶若治理得所臣之功成進受爵位上配君也禮記正義禮運今將軍規橅讀曰模云若管晏而休遂行日仄至周召乃留乎前漢書蕭望之傳陛下之有尚書猶天之有北斗也斗為天喉舌尚書亦為陛下喉舌斗斟酌元氣運乎四時尚書出納王命賦政四海後漢書李固傳比之大厦其榱桷之佐乎晉書髙嵩傳人官之大者不名所職相其是矣天官之大者不名所生土是矣春秋繁露五行之義章御之良者善調馬相之賢者善使士今舉異才而使減騶御之是猶扼驥鹽車而使責之疾此賢良文學多不稱舉也鹽鐡論利議天設三光以照記天子立公卿以明治故曰公卿者四海之表儀神化之丹青也鹽鐵論相刺常星猶公卿也衆星猶萬民也列星正則衆星齊常星亂則衆星墜矣鹽鐵論論菑大王知國之柱乎王曰不知也逐女曰柱相國是也夫柱不正則棟不安棟不安則榱橑墮則屋幾覆矣王則棟矣庶民榱橑也國家屋也夫屋堅與不堅在乎柱國家安與不安在乎相今大王既有明知而國相不可不審也列女傳周列國齊孤逐女子誠不習於禮不逹於人事以此相一國據大衆何以理之譬猶掩目而别黒白也掩目而别黒白猶無患也不逹人事而相國非有天咎必有人禍列女傳周列國魯公乗姒次七升于顛臺或柱之材測曰升臺柱輔弗堅也太𤣥經第一上次三柱不中梁不隆大厦微測曰柱不中不能正基也太𤣥經第三疆在棟伊隆于鼎斯寧蔡中郎集太尉揚公碑天垂三台地建五岳降生我哲應鼎之足蔡中郎集汝南李公碑國之有輔如屋之有柱柱不可細輔不可弱柱細則害輔弱則傾武侯十六䇿舉措大臣者君之股肱耳目也所以視聽也所以行事也徐幹中論審大臣屋之須柱梁猶治之須宰相也柱梁不固故屋微宰相不賢則國危太𤣥經第三疆解三公象五岳在天法三能能即台也贈李善註文選盧子諒劉琨詩瞻旦奭而齊軫軼䕫龍而長騖百辟翹首譬列宿之仰望舒千里結轍若派流之宗江漢藝文類聚職官部太尉碑負日月於中衢撃雷霆於上路徳表生民作舟梁於夷夏噐含羣物制天淵於廟堂正法念處經序擇主鳳凰鳴于山脊之上者居髙視下觀可即止喻賢者待禮乃行翔而後集鄭氏箋詩卷阿交交黄鳥止於棘義以求安棘若不安則移去以興臣仕於君以求行道道若不行則移去毛詩正義黄鳥行人之欲息於茂䕃似諸侯之願朝於有徳毛詩正義苑栁鳳凰之將出則先鳴於髙山之脊居髙視下觀可集止見其梧桐生矣於彼山東之朝陽乃往集之以興賢者之將仕也則相時待禮擇可歸就見其明君出矣於彼仁聖之治世乃往仕之梧桐之生則菶菶萋萋而茂盛以興明君亦徳盛也鳳凰之鳴也則雝雝喈喈然音聲和協以興民臣亦和協也毛詩正義卷阿鳥則擇木木豈能擇鳥左傳哀公十一年國安其主好文則鳳凰居之國亂其主好武則鳳凰去之竹書紀年上貞婦不嫁破亡之家仁賢不官絶滅之國吳越春秋勾踐入臣外傳聫翩輕栖集還為燕雀嗤魏志劉邵傳註以足下聰明揆殷勤之聖意亦足悟海岱之所常在知百川之所宜注矣蜀志許靖傳註風雲之從龍虎賢哲之應聖明隋書髙祖下帝紀魯季孫新弑其君吳起仕焉或謂起曰夫死者始死而血已血而衂已衂而灰已灰而土反其土也無可為者矣今季孫乃始血其毋乃未可知也韓子説林孔思請行魯君曰天下主亦猶寡人也將焉之孔思對曰盖聞君子猶鳥也駭則舉魯君曰主不肖而皆以然也違不肖過不肖而自以為論天下之主乎凡鳥之舉也去駭從不駭去駭從不駭未可知也去駭從駭則鳥曷為舉矣孔思之對魯君也亦過矣吕氏春秋審應奮翅鼔翼將之嘉國焦氏易林随之小畜舉趾振翼南至嘉國焦氏易林蠱之随亂君之門佐鬭傷跟營私貪禄身為悔殘焦氏易林咸之豐工不量度其鑿而方正其枘則物不固而木破矣臣不度君賢愚竭其忠信則被罪過而身殆矣王逸註楚辭離騷經屈原得祝融御已即時還車將即中土乃使仁賢若鸞鳳之人因迎貞女如洛水之神使達已於聖君得若皇帝帝堯者欲與建徳成化制禮作樂以安黎庶也王逸註楚辭逺遊鴻鵠養其羽翼一舉則見山川之屈曲再舉則知天地之圜方身居益髙所睹愈逺賢者亦宜髙望逺慮以知君之賢愚也王逸註楚辭惜誓鸞鳥鳳凰乃髙飛於天大荒之野循於四極回周而戲見仁聖之王乃下來集歸於有徳賢者亦宜處山澤之中周流觀望見髙明之君乃當仕也王逸註楚辭惜誓鸞鳳俊鳥也有聖徳君則來無徳則去以興賢臣難進易退也王逸註楚辭九章夫君猶噐也臣猶物也噐小物大不能相受也髫孺背千金而逐蛺蜨越人棄八珍而甘鼃黽即患不賞好又病不識惡矣夫不用則雖珍而不貴矣莫與則傷之者必至昔衛靈聽聖言而數驚秦孝聞髙談而睡寐而欲緝隆平之化牧良能之勲猶却行以逐馳適楚而首燕也抱朴子外篇官理豹狐之裘不為負薪施九成六變不為聾夫設髙唱逺謀不為庸愚吐忘身致果不為薄徳作抱朴子外篇博喻𤣥雲為龍興非虺蜒所能招也飆風為虎發非狐狢之能致也是以大人受命則逸倫之士集玉帛幽求則邱園之俊起抱朴子外篇廣譬鳥有擇木之性魚有選潭之情劉子託附龍竢風雲而後升士須明君而後進前漢書註揚雄傳屈原以髙行仕楚亦猶資美女之髢賣於九戎而求其利必不得也前漢書註揚雄傳月明星稀烏鵲南飛繞樹三帀何枝可依文選魏武帝短歌行鳳凰集南嶽徘徊孤竹根於心有不厭奮翅凌紫氛豈不常勤苦羞與黄雀羣何時當來儀將須聖明君文選劉楨贈從弟詩朝鴈鳴雲中音響一何哀問子遊何鄉戢翼正徘徊言我塞門來將就衡陽棲往春翔北土今冬客南淮逺行蒙霜雪毛羽日摧頽常恐傷肌骨身隕沈黄泥欲因雲雨會濯翼陵髙梯文選建章臺詩棲鳳難為條淑貺非所臨文選王僧逹答顔延年詩虬虎雖驚風雲未和􅇓魚擇淵髙鳥候柯文選袁宏名臣序賛鳥擇髙梧臣須顧眄文選袁宏名臣序賛鳥則擇木臣亦簡君文選潘岳楊荆州誄髙鳥相木而集智士擇土而翔意林阮子厭禋祀於故墟饗禴祭於東鄰藝文類聚人部言志賦誠以枯澤非應龍之淵棘林非鸞鳳之窟昔食其自匿監門非髙祖不長揖孔明躬稼南陽非劉氏不馳驅望雲霄而偶翮見鴻漸之輕羽瞻長塗而髙鳴知騏驥之迅足太平御覽人事部交友二正當遊翔擇木待椅桐竹實耳𢎞明集十一喻林卷七十七
