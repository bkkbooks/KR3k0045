body:
  text: 喻林卷七明徐元太撰人事門五備患澤上於地萃君子以除戎器戒不虞易萃重門擊柝以待暴客蓋取諸豫易繫辭下傳弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽易繫辭下傳儼矢將至不可以無盾汲冢周書周祝解鴟鴞管叔作亂周公憂之作此詩以貽成王欲王省悟以備殷全篇以鳥之育子成巢者比先王之創業而代之為言也詩説魯無備而官辦者猶拾瀋也左傳哀公三年有十年之積者王有五年之積者霸無一年之積者亾汲冡周書文傳解夏箴曰小人無兼年之食遇天饑妻子非其有也大夫無兼年之食遇天饑臣妾輿馬非其有也汲冢周書文傳解今有人操隋侯之珠持丘之環萬金之財時宿於野内無孟賁之威荆慶之斷外無弓弩之禦不出宿夕人必危之矣今有強貪之國臨王之境索王之地告之以理則不可說之以義則不聽王非戰國守圄之具其何以當之戰國策趙惠文王夫蜂蠆起懐雷霆駭耳雖賁育荆諸之倫未有不冗豫奪常者也後漢書盧植傳臣聞猛獸在田荷戈而出凡人能之蜂蠆作于懷袖勇夫為之驚駭出於意外故也晉書劉毅傳為國之有藩屏猶濟川之有舟楫安危成敗義實相資舟楫具完波濤不足稱其險藩屏式固禍亂何以成其階晉書汝南王列傳豺狼不可以理推為備或不可懈南齊書桺世隆傳憑險弗防沒而不弔魏書穆崇羆第亮傳人之所得於病者多方有得之寒暑有得之勞苦百門而閉一門焉則盜何遽無從入墨子公孟夫矢來有鄉則積鐵以僃一鄉矢來無鄉則為鐵室以盡備之備之則體不傷故彼以盡備之不傷此以盡敵之無姦也韓非子内儲說上凡人之性爪牙不足以自守衛肌膚不足以扞寒暑筋骨不足以從利辟害勇敢不足以却猛禁悍然且猶裁萬物制禽獸服狡蟲寒暑燥溼弗能害不唯先有其備而以羣聚耶羣之可聚也相與利之也呂氏春秋持君被甲者非為十步之内也百步之外則爭深淺深則達五藏淺則至膚而止矣死生相去不可為道里淮南子説山訓巧者善度知者善豫羿死桃部不給射慶忌死劍鋒不給摶淮南子説山訓今被甲者以備矢之至若使人必知所集則懸一札而已矣淮南子説山訓梁人有陽由者其力扛鼎伎巧過人骨騰肉飛手摶􅵕獸國人懼之然無治室之訓禮教不立妻不畏憚浸相泄瀆方乃積怒妻坐於牀荅焉左手建杖右手制其頭妻亦奮恚因授以背使杖擊之而自撮其陰由乃仆地氣絕而不能興隣人聞其凶凶也窺而見之趨而救之妻愈戅忿莫肻舍旃或發其裳然後乃放夫以無敵之伎力而劣於女子之手者何也輕之無備故也孔叢子荅問鴻鵠飛冲天豈不高哉矰繳尚得而加之虎豹為猛人尚食其肉席其皮說苑敬愼方船備水傍河燃火積善有徵終身無禍焦氏易林泰之履救漏防者悉塞其穴則水泄絕穴不悉塞水有所漏漏則水為患害王充論衡薄葬篇夫防決不備有水溢之害網解不結有獸失之患王充論衡對作篇匪以尚武予身是衛麟角是觸鸞距匪蹶曹子建寶刀銘夫儲甲胄蓄蓑笠者葢以為兵為雨也若幸無攻戰時不沈陰則有與無正同耳若矢石霧合飛鋒煙交則知裸體者之困矣洪雨可傾素雷彌天則覺路立者之劇矣抱朴子内篇道意兕之角也鳳之距也天實假之何必日用哉蜂蠆挾毒以衛身智禽銜蘆以扞網貛曲其穴以備徑至之鋒水牛結陣以却虎豹之㬥抱朴子外篇詰鮑霛龜之甲不必為戰施麟角鳳爪不必為鬭設故雋生不釋劍于平世擊柝不輟備於思危抱朴子外篇廣譬以長城扞蔽胡冦如人家之有藩籬前漢書注陳勝項籍贊君子於味必思其毒于利必備其難初學記服食部脯注帝王之居外則飾周衛内則重禁門將行則設兵而後出幄稱警而後踐墀張弧而後登輿清道而後奉引遮列而後轉轂靜室而後息駕所以顯至尊務戒謹垂法戒也玉海官制漢官拾遺有人于怨憎中妄作親善恒相隨從如響從聲伺􅇋其便而欲殺之其怨謹守堅固自防故使怨人不能得害元陽妙經卷一品藻趙衰冬日之日也趙盾夏日之日也左傳文公七年回也聞一以知十賜也聞一以知二論語公冶斗筲之人何足筭也論語子路魯衛之政兄弟也論語子路高子曰禹之聲尚文王之聲孟子曰何以言之曰以追蠡曰是奚足哉城門之軌兩馬之力與孟子盡心下五藏一病輒有五解一藏為下工解三藏為中工解五藏為上工也史記扁鵲列傳注五伯比於他諸矦為賢其比三王猶碔砆之與美玉也前漢書董仲舒傳登見曹公言養將軍譬如養虎當飽其肉不飽則將食人公曰不如卿言譬如養鷹饑即為用飽則颺去後漢書呂布列傳末世陵遲臧否聿興執銓提衡稱量天下之人揚清激濁繩墨四海之士後漢紀孝桓上且攸詡之為人其猶夜光之與蒸燭乎其照雖均質則異焉魏志賈詡傳注華歆與北海邴原管寧俱游學三人相善時人號三人為一龍歆為龍頭原為龍腹寧為龍尾魏志華歆傳注孝起前臨至吳為吾說正方腹中有鱗甲鄉黨以為不可近吾以為鱗甲者但不當犯之耳蜀志陳震傳張府君如瓠壺外雖澤而内實麤蜀志張裔傳戎有人倫鑒識常目山濤如璞玉渾金人皆欽其寶莫知名其器王衍神姿高徹如瑶林瓊樹自然是風塵表物謂裴頠拙於用長荀勗工於用短陳道寧如束長竿晉書王戎傳至夫基構迭汙隆龍蛇俱山澤晉書徐寜傳山濤吾所不解吏非吏隠非隠若以元禮門為龍津則當㸃額暴鱗矣晉書孫綽傳何乃刻畫無鹽唐突西施也晉書周顗傳時人謂湛上方山濤不足下比魏舒有餘湛聞曰欲處我於季孟之間乎晉書王湛傳松栢之姿經霜猶茂蒲桺常質望秋先零晉書顧悦之傳石將軍之擬明公猶陰精之比太陽江河之比洪海爾晉書石勒上傳何異象榱玉簀而對腐木朽楹哉晉書劉聰傳王茂𢎞駑痾耳若卞望之之巖巖刁𤣥亮之察察戴若思之峰岠當敢尒邪晉書卞壺傳見一善則盱衡扼腕遇一才則揚眉抵掌雌黄出其脣吻朱紫由其月旦梁書任昉傳時人謂遠如屏風屈曲從俗能蔽風露言能不乖物理也南史𢎞弟子微傳賢愚之相覺若百丈之溪與萬仞之山若九地之下與重山之巓鄧析子轉辭篇聖人在上則民樂其治在下則民慕其意小人在上位如寢闗曝纊不得須臾寧淮南子繆稱訓故筦子文錦也雖醜登廟子產練染也美而不尊虚而能滿淡而有味被褐懐玉者淮南子繆稱訓吾比夫子猶黄鵠與蠰蟲也終日行不離咫尺而自以為遠豈不悲哉淮南子道應訓君子之過也猶日月之蝕何害於明小人之可也猶狗之晝吠鴟之夜見何益于善淮南子泰族訓譬子產之與夫子其猶浸水之與天雨乎浸水所及則生不及則死斯民之生也必以時雨既以生莫愛其賜説苑貴德孔子問漆雕馬人曰子事臧文仲武仲孺子容三大夫者孰為賢漆雕馬人對曰臧氏家有龜焉名曰蔡文仲立三年為一兆焉武仲立三年為二兆焉孺子容立三年為三兆焉馬人見之矣若夫三大夫之賢不賢馬人不識也孔子曰君子哉漆雕氏之子其言人之美也隱而顯其言人之過也微而著故智不能及明不能見得無數卜乎說苑權謀君子得時如水小人得時如火說苑談叢天下有三檢衆人用家檢賢人用國檢聖人用天下檢揚子修身管仲相齊明法度審國刑不能及聖猶文錦雖惡宜以升廟也子產相鄭先恩而後法猶練染為衣温厚而非宗廟服也淮南子繆稱訓解蝗蟲之飛能至萬里麒麟須獻乃達闕下然而蝗蟲為災麒麟為瑞王充論衡狀留篇夫孤立之翹秀藏器以待賈瑣碌之輕薄人事以邀速夫唯待賈故頓淪於窮瘁矣夫唯邀速故佻竊而騰躍矣抱朴子外篇審舉鋸牙之獸雖低伏而見憚揮斧之蟲雖跧形而不威故君子被褐窮而不可輕小人軒冕達而不足重抱朴子外篇愽喻仁忍有天淵之絕善否猶有無之覺騶虞側足以蹈虚豺狼掩羣以害生虞卿捐相印以濟窮華公讓三事以推賢李斯疾勝已而殺韓非龎涓患不如而刑孫臏抱朴子外篇博喻能言莫不褒堯而堯政不必皆得也舉世莫不貶桀而桀事不必盡失也故一條之枯不損繁林之蓊藹蒿麥冬生無解觱發之肅殺西施有所惡而不能減其美者美多也嫫母有所善而不能救其醜者醜篤也抱朴子外篇博喻如方者乃荒萊之特苗鹵田之善秀資質已良但沾染未足耳移植豐壤必成嘉榖補文選賀循報虞預書龎士元至吳吳人並友之見陸績顧劭全琮而為之目曰陸子所謂駑馬有逸足之用顧子所謂駑牛可以負重致遠或問如所目陸為勝耶曰駑馬雖精速能致一人耳駑牛一日行百里所致豈一人哉世説新語品藻北人看書如顯處視月南人學問如牖中窺日世説新語文學白旃檀非不馥焉能逆風世說新語文學人皆如此便可結繩而治但恐狐狸猯狢噉盡世説新語品藻齊桓晉文之霸如日繼月意林太𤣥經或問齊桓晉文優劣唐子荅曰論功則桓兄而文弟論德則文兄而桓弟意林唐子論曰士非璧也談者謂價耳談者之口猶愛憎之心意林𫝊子庾道季云藺相如雖千載死人懔懔恒如有生氣曹蜍李志雖見在厭厭如在九泉下藝文類聚人部品藻魏明帝世使后弟毛曾與夏侯太初共坐時人謂蒹葭倚玉樹時目夏矦太初朗如日月入懷藝文類聚人部品藻黄穆字伯開博學為山陽守有德政弟奂字仲開為武陵太守貪穢無行武陵人諺曰天有冬夏人有二黄太平御覽時序部夏中邊讓别傳曰讓才辨俊逸孔融薦於魏武曰邊讓為九州之被則不足為單衣襜褕則有餘事類賦服用部衣註子昭誠自幼至長容貌完潔然觀其挿牙齒樹頰頦吐脣吻自非文休之敵何氏語林品藻蒨玉亦是玉巵但無當耳何氏語林品藻三王楚琳琅未若濟南備員方何氏語林品藻曹子建七歩成章世目為繡虎目王仲宣為泥下濳蛙何氏語林賞譽此乃九方歅之相馬略其𤣥黄取其駿逸何氏語林賞譽其才若盆盎之水所見者清不見者濁何氏語林識鑒可謂射侯之巧非破秋毫之妙也何氏語林文學達磨祖師越九年欲返天竺命門人曰時將至矣汝等盍各言所得乎時有道副對曰如我所見不執文字不離文字而為道用祖曰汝得吾皮尼總持曰我今所解如慶喜見阿閦佛國一見更不再見祖曰汝得吾肉道育曰四大本空五藴非有而我見處無一法可得祖曰汝得吾骨最後慧可禮拜依位而立祖曰汝得吾髓五燈㑹元東土祖師逹摩譬如有人精勤受學十善業道已至究竟當知彼人善根成熟已得隣近北俱盧生波羅密多經六百聲聞人悲猶如畫皮菩薩大悲猶如破肉如來大悲破骨徹髓大方等集經卷二内心智德薄外善以美言譬如竹無内但示有其外内心智德厚外善以法言譬如妙金剛中外力具足大智度論巻五破戒之人與善人異如驢在牛羣破戒之人在精進衆譬如儜兒在健人中大智度論卷十三此輩之人不入道品如坏盛水不能致遠也脩行道地經慈品比其類猶五霸之與五帝陽貨之與仲尼比其形猶丘垤之與華恒涓瀆之與江海比其文猶虎鞹之與羊皮斑紵之與錦繡也𢎞明集牟子理惑論堯事尹壽舜事務成旦學呂望丘學老耼四師雖聖比之於佛猶白鹿之與麒麟鷰鳥之於鳳凰也𢎞明集牟子理惑論譬如疊花千斤不如眞金一兩法苑珠林巻八十六賞譽譬之宫牆賜之牆也及肩窺見室家之好夫子之牆數仞不得其門而入不見宗廟之美百官之富得其門者或寡矣論語子張他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉論語子張王生一日千里王佐才也後漢書王允列傳許劭兄虔亦知名汝南人稱平輿淵有二龍焉後漢書許劭傳初彪兄弟三人並有高名而彪最優故天下稱曰賈氏三虎偉節最怒後漢書賈彪傳肅宗嘗賜諸尚書劒唯此三人特以寶劍自手署其名曰韓棱楚龍淵郅壽蜀漢文陳寵濟南椎成時論者為之說以棱淵深有謀故得龍淵壽明達有文章故得漢文寵敦朴善不見外故得椎成後漢書韓棱傳不意雙珠近出老蚌甚珍貴之魏志荀彧傳注夷甫處衆中如珠玉在瓦石間顧愷之作畫贊亦稱衍巖巖清峙壁立千仞晉書王衍傳此人之水鏡見之瑩然若披雲霧而覩青天也晉書樂廣傳臣舉賢良對策為天下第一猶桂林之一枝崑山之片玉晉書郤詵傳頠若武庫五兵縱横一時之傑也晉書裴頠傳王子挺秀質逸氣干青雲明珠既絕俗白鵠信驚羣魏書常景傳素尚邁金貞清標陵玉徹魏書常景傳長卿有艷才直致不羣性鬱若春煙舉皎如秋月映魏書常景傳露竹霜條故多勁節非鸞則鳳其在本枝也魏書河間公齊孫志傳此兒駒齒未落已是我家龍文更十歲後當求之千里外北齊書楊愔傳卞寶復潤於荆陰隨照更明於漢浦周書儒林沈重傳南金之貴屬在斯人隋書虞世基傳王威明風韻遒上神峯標映千里絕迹百尺無枝實俊人也南史王曇首騫子規傳臣譽仲尼譬猶兩手捧土而附泰山其無益亦明矣使臣不譽仲尼譬猶兩手把泰山無損亦明矣韓詩外傳譬如冬雪既潔將以秋月至徹廣文選江文通傷友人賦并序庇其宇下使人㤀寒暑世說新語賞譽裴令公目夏矦太初肅肅如入廊廟中不修敬而人自敬一曰如入宗廟琅琅但見禮樂器見鍾士季如觀武庫但覩矛㦸見傅蘭碩江廧靡所不有見山巨源如登山臨下幽然深遠世說新語賞譽世目李元禮謖謖如勁松下風世說新語賞譽庾子嵩目和嶠森森如千丈松雖磊落有節目施之大廈有棟梁之用世説新語賞譽世目周侯嶷如斷山世説新語賞譽公孫度目邴原所謂雲中白鶴非燕雀之網所能羅也世説新語賞譽卞令目叔向朗朗如百間屋世説新語賞譽世稱庾文康為豐年玉王稚㳟為荒年榖世說新語賞譽有問秀才吳舊姓何如荅曰吳府君聖王之老成明時之儁人朱永長理物之至德清選之高望嚴仲弼九臯之鳴鶴空谷之白駒顧彥先八音之琴瑟五色之龍章張威伯歲寒之茂松幽夜之逸光陸士龍鴻鵠之徘徊懸鼓之待槌凡此諸君以洪筆為鉏耒以紙札為良田以𤣥黙為稼穡以義禮為豐年以談論為英華以忠恕為珍寶著文章為錦繡藴五色為繒帛坐謙虚為席薦張義讓為帷幙行仁義為室宇修道德為廣宅世說新語賞譽張華見禇陶語陸平原曰君兄弟龍躍雲津顧彥先鳳鳴朝陽謂東南之寶已盡不意復見禇生陸曰公未覩不鳴不躍者耳世說新語賞譽挺荆衡之菌簵輝江漢之珠璣藝文類聚人部别下賦京師號曰陳仲舉昻昻如千里驥周孟王瀏瀏如松下風藝文類聚人部品藻所謂劍則干將莫耶木則椅桐梓漆人則顏冉仲弓也藝文類聚人部品藻運鼎阿於襟抱納山岳於胷懐藝文類聚内典部寺碑乃氷其清乃玉其白風抗其高雲垂其澤藝文類聚職官部令長頌荆玉不及喻其温南金未能方其勵藝文類聚職官部令長贊如金有鑛如竹有筠藝文類聚職官部太常墓志信鍾山之珪璧歲寒之靈木者也藝文類聚職官部冡宰碑瑚璉之器無慙垂棘杞梓之林有均廊廟藝文類聚職官部中書令墓志停若鏡之明流如雲之曖藝文類聚職官部司空表玉挺藍田珠潤隋水價重連城聲同垂棘藝文類聚職官部太子中庶子墓志君以藍田美玉大海明珠灼灼美其聲芳英英照其符彩藝文類聚治政部善政碑爛爛如高巖下電騷騷若長松裏風藝文類聚治政部善政碑聲無愧於東筠材有踰乎西杞藝文類聚治政部薦舉表諸葛恪少有名孫權見其父瑾曰藍田生玉眞不虛也事文類聚誕子南邁瑶琨西踰杞梓文苑英華王僧孺誄逸羽難集孤峯易峙文苑英華王僧孺誄謖謖萬尋昻昻千里實鳳靡雜眞龍非似文苑英華王僧孺誄鄉人歌曰蔣氏翁任氏童言蔣氏之門老而方篤任家之學幼而多慧初學記人部聰敏嚴公體沉靜立志明霜雪素節邁金貞清標凌玉澈初學記人部賢調與金石諧思逐風雲上初學記職官部侍郎郎中員外郎羅君章可謂湘中之琳琅何氏語林賞譽謝叔源與從子靈運並有美名時人謂叔源風韻為高目望蔡肅如寒風振松目康樂凛凛如霜臺籠日何氏語林賞譽嘗與二陸談覺辭少理暢語約事舉莫不豁然若春日之判薄氷秋風之掃枯葉何氏語林賞譽世目鄧士載為伏鸞陸士龍為隱鵠何氏語林賞譽或有人言羅君章可謂荆楚之杞梓何氏語林賞譽所謂左把浮丘袖右拍洪崕肩何氏語林賞譽山公目􅄞叔夜巖巖如孤松之獨立何氏語林賞譽劉孝標目劉訏超然越俗如半天朱霞劉歊矯矯出塵如雲中白鶴皆儉歲之粱稷寒年之纎纊何氏語林賞譽隆公肅散森疎若霜下之松竹何氏語林賞譽謝參軍一日詣東府門自通爾時風寒慘厲太祖謂四座曰此客至使人不衣自煖矣何氏語林賞譽宰相之門栝栢豫章雖小已是棟梁器何氏語林賞譽孫興公目劉眞長曰神猶淵鏡言必珠玉何氏語林賞譽衛叔寶是樂彥輔壻並有海内之名裴叔道嘗稱之曰婦翁氷清女壻璧潤何氏語林賞譽亦猶顏回與夫子有步驟之近槭若嚴霜之材婉如流風之雪驚禽走獸駱驛飛馳可謂王之藎臣朝之元老何氏語林自新張懐瓘書斷世目潁川李府君頵頵如玉山汝南陳仲舉軒軒如千里馬南陽朱公叔飂飂如行松栢之下何氏語林賞譽龎德公目諸葛孔明為臥龍龎士元為鳳雛司馬德操為水鏡何氏語林賞譽若披雲霧如對珠玉何氏語林方正北史我昨東方未明過和氏門外見二陸兩潘森然與槐桺齊列何氏語林言語范滂清裁猶以利刃齒腐朽何氏語林政事内含玉潤外表瀾清何氏語林傷逝引領望之𦕈若松喬之在霄漢何氏語林企美智慧多聞猶如大海安住寂定喻妙高山如師子王處衆無畏世法不染猶淨蓮花饒益有情譬之大地洗除垢穢喻如大水成熟世間方諸大火増長善法同彼大風清凉悦意類之朗月能破衆暗其猶烈日摧煩惱怨如威勇士心性調伏猶大象王能震法雷大龍為喻普雨衆法譬之大雲如大良醫除煩惱病猶大國主善御世間如四天王䕶有情類及䕶正法如天帝釋於人天中富貴最勝心得自在如大梵王於堪忍界主領自在身得無礙如揭路荼示教有情如世間父能流法寶如毗沙門能出世間種種珍寶福德智慧之所莊嚴有情見者無不蒙益波羅蜜多經卷五百七十二如見好畫言是好手手非是畫見畫妙故説言好手大智度論卷三十足使魔堞永淪正峰長峻𢎞明集十五經則五味佛道則五榖矣吾自聞道已來如開雲見白日炬火入冥室焉𢎞明集牟子理惑論錦繡忸其文章金玉慙其暉映辨正論卷四知心它日吾見蔑之面而已今吾見其心矣左傳襄公二十五年諺曰有白頭如新傾葢如故何則知與不知也史記鄒陽傳是故鍾期死百牙絶弦破琴而不肻與衆鼓獿人亾則匠石輟斤而不敢妄斷師曠之調鐘竢知音者之在後也孔子作春秋幾君子之前睹也老耼有遺言貴知我者希此非其操與前漢書揚雄傳下諺曰誰為為之孰令聽之葢鍾子期死伯牙終身不復鼔琴何則士為知己用女為說己容前漢書司馬遷傳和璧之在荆山隋珠之濳重川非遇其人焉有連城之價照車之名乎晉書張載傳其相知也如比目之魚見形也若光之與影也其察言也不失若磁石之取鍼舌之取燔骨鬼谷子反應伯牙善鼓琴鍾子期善聽伯牙鼔琴志在登高山鍾子期曰善哉峩峩兮若泰山志在流水鍾子期曰善哉洋洋兮若江河伯牙所念鍾子期必得之伯牙游于泰山之陰卒逢暴雨止于巖下心悲乃援琴而鼓之初為霖雨之操更造崩山之音曲毎奏鍾子期輒窮其趣伯牙乃舍琴而嘆曰善哉善哉子之聽夫志想象猶吾心也吾于何逃聲哉列子湯問温伯雪子適齊舍于魯出而見客入而嘆明日見客又入而歎其僕曰毎見之客也必入而嘆何耶曰吾固告子矣中國之民明乎禮義而陋於知人心昔之見我者進退一成規一成矩從容一若龍一若虎其諫我也似子其道我也似父是以歎也仲尼見之而不言子路曰吾子欲見温伯雪子久矣見之而不言何耶仲尼曰若夫人者目擊而道存矣亦不可以容聲矣莊子田子方莊子送葬過惠子之墓顧謂從者曰郢人堊慢其鼻端若蠅翼使匠石斲之匠石運斤成風聽而斲之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣則嘗能斲之雖然臣之質死久矣自夫子之死也吾無以為質矣吾無與言之矣莊子徐無鬼鍾子期死而伯牙絕絃鼓琴知世莫賞也惠施死而莊子寢說言見世莫可為語者也淮南子修務訓雖然其亦表之而已未覩其裏也夫闚其門而不入其室惡覩其宗廟之奥百官之美乎孔叢子論書上士可以託色中士可以託辭下士可以託財三者固可得而託耶說苑善說詩曰誰能亨魚漑之釜鬵孰將西歸懐之好音此之謂也物之相得固微甚矣說苑善説金玉經于不測者託於輕舟也靈鳥萃于𤣥霄者扶揺之力也芳蘭之芬烈者清風之功也屈士起於丘園者知己之助也抱朴子外篇交際子遊汾亭坐鼓琴有舟而釣者過曰美哉琴意傷而和怨而靜在山澤而有廊廟之志非太公之都磻溪則仲尼之宅四濵也文中子禮樂茍肝膽之可同兮奚鬚髮之足辨也廣文選董仲舒士不遇賦知己之不可遇譬河清之難俟藝文類聚寳玉部玉賦好德參差荇音杏菜左右流之窈窕淑女寤寐求之詩國風闗雎風雨凄凄雞鳴喈喈既見君子云胡不夷風雨瀟瀟雞鳴膠膠既見君子云胡不瘳風雨如晦雞鳴不已既見君子云胡不喜詩國風風雨有枤之杜生于道左彼君子兮噬音筮肻適我有枤之杜生于道周彼君子兮噬肻來遊詩國風有枤之杜蒹音兼葭音加蒼蒼白露為霜所謂伊人在水一方遡洄從之道阻且長遡游從之宛在水中央蒹葭凄凄白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡游從之宛在水中坻音遲蒹葭采采白露未已所謂伊人在水之涘遡洄從之道阻且右遡游從之宛在水中沚詩國風蒹葭菁菁音精者莪在彼中阿既見君子樂且有儀菁菁者莪在彼中沚既見君子我心則喜菁菁者莪在彼中陵既見君子錫我百朋汎汎揚舟載沉載浮既見君子我心則休詩小雅菁菁者莪皎皎白駒食我場苗縶音執之維之以永今朝所謂伊人於焉逍遥皎皎白駒食我場藿音霍縶之維之以永今夕所謂伊人於焉嘉客皎皎白駒賁然來思詩小雅白駒皎皎白駒在彼空谷生芻楚俱反一束其人如玉母金玉爾音而有遐心詩小雅白駒匪饑匪渴德音來括詩小雅車舝隰桑有阿其葉有難音那既見君子其樂如何隰桑有阿其葉有沃既見君子云何不樂隰桑有阿其葉有幽既見君子德音孔膠詩小雅隰桑枤杜晉文公好賢而國人美之詩説唐蒹葭君子隱于河上秦人慕之而作是詩詩説秦干旄美好善也衛文公臣子多好善賢者樂告以善道也毛詩干旄丘中有麻思賢也毛詩丘中有麻緇衣美武公也父子並為周司徒善於其職國人宜之故美其德以明有國善善之功焉毛詩緇衣遵大路思君子也莊公失道君子去之國人思望焉毛詩遵大路風雨思君子也亂世則思君子不改其度焉毛詩風雨吾未見好德如好色者也論語衛靈公孔子曰吐珠于澤誰能不含後漢翟酺列傳珠玉在側覺我形穢晉書衛玠傳言山鬼修飾衆香以崇其善屈原履行清潔以厲其身神人同好故折香馨相遺以同其志也王逸注楚辭九歌婉孌則千載不㤀金石之交一旦輕絕未見好德如好色李善注文選阮嗣宗詠懐詩顏淵之簞瓢則勝慶封玉杯何者德行高遠能絕殊也藝文類聚雜器物部杯一言白璧輕片善黄金賤藝文類聚歲時部三月三日詩齊置士鄉越有君子軍皆異賢之意玉海宫室門闕譬若有人心有所愛而不得見見其住處及相似人或除憂惱復更思惟大乗造像功德經卷上悲九譬若摩尼珠洗之倍好其王者子莫不愛喜所以愛喜者何無瑕穢故文殊師利問菩薩署經悲八喻林卷七
