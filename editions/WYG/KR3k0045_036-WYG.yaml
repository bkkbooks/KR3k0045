body:
  text: 喻林卷三十六明徐元太撰人事門三十四尚剛六二𦕈能視跛能履履虎尾咥人凶武人爲于大君易履六五貞疾乗剛也易豫婦人貞吉從一而終也夫子制義從婦凶也易恒初六進退利武人之貞易巽上九㢲在牀下䘮其資斧貞凶易巽凡物既厭而退者弱也既榮而隕者薄也夫能輝光日新其徳者唯剛健篤實也王弼註易大畜物壯健皆有衰怠唯天運動日過一度盖運轉混没未曽休息周易正義乾戚施之疾不能仰靣柔之人常俯似之爾雅註譬之若金之與木金雖柔猶堅於木呂氏春秋舉難天執其道爲萬物主君執其常爲一國主主不可以不剛主不可以不堅主不剛則列星亂其行主不堅則邪臣亂其官星亂則亡其天臣亂則亡其君故爲天者務剛其氣爲君者務堅其政春秋䌓露天地之行次二毅于心腹貞測曰毅于心腹内堅剛也太𤣥經第三毅初六起履霜至於堅氷隂雖柔順氣亦堅剛京氏易傳坤中猶如卒降㬥雨破壊山林樹木土石沙礫一切諸物唯不能毁壊金剛之寳元陽妙經卷一尚柔用九見羣龍无首吉易乾以訟受服則終朝三禠柔進受寵則一晝三接也王弼註易晉能止健初距不以角柔以止剛剛不敢犯王弼註易大畜外疆而内順牛之善也離之爲體以柔順爲主者也故不可以畜剛猛之物而吉於畜牝牛也王弼註易離柔忍之木荏染然人則被之弦以爲弓寛柔之人温温然則能爲徳之基止言内有其性乃可以有爲徳也鄭氏箋詩抑寛政以安諸侯若柔轡之御剛馬杜氏解左傳襄公二十六年且夫牛馬維婁音呂委已者也而柔焉季氏得民衆久矣君無多辱焉公羊昭公二十五年今也小國師大國而恥受命焉是猶弟子而恥受命於先師也孟子離婁上夫虎之卑勢將以有擊也狸之卑身將求所取也雉以眩移拘於網魚以有悦死於餌吴越春秋句踐入臣外傳猛獸將擊必弭毛帖伏鷙鳥將搏必卑飛戢翼聖人將動必順辭和衆吴越春秋句踐歸國外傳辛垣衍曰先生獨未見夫僕乎十人而從一人者寧力不勝智不若邪畏之也戰國策趙孝成王柔者徳也剛者賊也弱者仁之助也彊者怨之歸也後漢書臧宫傳人之生也柔弱其死也堅强萬物草木之生也柔脆其死也枯槁故堅强者死之徒柔弱者生之徒是以兵强則不勝木强則共强大處下柔弱處上老子戒强執雌牝故能立其雄牡文子守弱飄風暴雨不終日小谷不能須㬰盈飄風暴雨行强梁之氣故不能久而滅小谷處强梁之地故不得不奪文子守弱舌之與齒孰先弊焉繩之與矢孰先直焉文子上徳㞼堅則物必毁之剛斯折矣刀利則物必摧之鋭斯挫矣闗尹子九藥粥子曰欲剛必以柔守之欲彊必以弱保之積於柔必剛積於弱必彊觀其所積以知禍福之鄉彊勝不若已至於若已者剛柔勝出於己者其力不可量老耼曰兵彊則滅木彊則折柔弱者生之徒堅彊者死之徒列子黄帝因以爲茅靡因以爲波流列子黄帝蛇謂風曰予動吾脊脅而行則有似也今子蓬蓬然起於北海蓬蓬然入於南海而似無有何也風曰然予蓬蓬然起於北海而入於南海也然而指我則勝我鰌我亦勝我雖然夫折大木蜚大屋者唯我能也故以衆小不勝爲大勝也爲大勝者唯聖人能之莊子秋水以深爲根以約爲紀曰堅則毁矣鋭則挫矣常寛容於物不削於人莊子天下與時屈伸柔從若蒲葦非懾怯也荀子不茍篇莫不貪强鮮能守㣲若能守㣲乃保其生聖人存之以應事機舒之彌四海卷之不盈杯居之不以室宅守之不以城郭藏之胷臆而敵國服黄石公三畧上柔能制剛弱能制强柔者徳也剛者賊也弱者人之所助强者人之所攻黄石公三畧上萬物中皆有元氣得以和柔若胷中有藏骨中有髄草木中有空虚與氣通故得乆生也河上公註老子道化興物造功大木處下小物處上大道抑强扶弱自然之效河上公註老子戒强人雖知自尊顯當復守之以卑㣲去雄之强梁就雌之柔和如是則天下歸之如水流入深谿也河上公註老子反朴兵强則滅木强則折革固則裂齒堅於舌而先之弊是故柔弱者生之幹也而堅强者死之徒也淮南子原道訓强勝不若已者至於與同則格柔勝出於已者其力不可度故能以衆不勝成大勝者唯聖人能之淮南子詮言訓厲利劔者必以柔砥擊鐘磬者必以濡木轂强必以弱輻兩堅不能相和兩强不能相服故梧桐斷角馬氂截玉淮南子説山訓平子曰柔無乃脆乎叔向曰柔者紐而不折亷而不缺何爲脆也天之道㣲者勝是以兩軍相加而柔者克之兩仇争利而弱者得焉説苑敬慎韓平子問於叔向曰剛與柔孰堅對曰臣年八十矣齒再堕而舌尚存説苑敬慎金剛則折革剛則裂人君剛則國家滅人臣剛則交友絶説苑敬慎直如矢者死直如繩者稱説苑談叢左權曰􅀈山之虎茍無以制夫子尚能倚磬而鼔琴乎曰仁可恃也勇則敵不可以恃故曰柔能制剛弱能制强故不善勇者制於勇善勇者制於仁遇虎而倚磬鼔琴汝徒見吾弱也而不知仁者有無聲之威有無形之兵乎左權曰唯唯吾今而知善勇之術也天禄閣外史􅀈山金以剛折水以柔全山以髙陊谷以卑安是以執雌節者無争雄之禍多尚人者有召怨之患抱朴子外篇廣譬强望者亡掘强者折大健者䟦大利者缺意林太元經河色黄赤衆川之流盖濁之也百里一小曲千里一大曲藝文類聚水部河水火從木生即以水救之即不灰人起火性以柔而救之即身不壊隂符經註夫響以無聲不可窮影以無形不可極水以淖弱貫金石沈萬物地以柔順成大功勝草木舌耳無患角齒傷折由此觀之柔者弊堅虚者馳實道徳經指歸卷八草木之始生也枝條潤澤華葉青青豐茂暢美柔弱以和何則陽氣存也其衰也華葉黄悴物色焦殃及其死也根莖枯槁枝條堅剛何則陽氣去之也道徳經指歸卷十三陽氣之所居木可卷而草可結也陽氣之所去氣可凝而冰可折也道徳經指歸卷十三凡人之性憎西隣之父者以其强大也愛東隣之兒者以其小弱也燔燒枯槁者以其剛强也簮珥榮華者以其和淖也道徳經指歸卷十三堅强實滿死之形象也柔弱滑潤生之區宅也道徳經指歸卷十三是故神明之道天地之理小不載大輕不載重故强人不得爲王强木不得處上何則强人爲王萬國愁憂强木處上則根本枯槁衆人爲大故居下聖人爲小故居上强大居下小弱居上者物自然也道徳經指歸卷十三夫巨木髙百尋大連抱頭剖中門尾判中户不蒙華實常在於下千枝萬木舒條布葉青青葱葱共生其上者以其形大而勢强也道徳經指歸卷十三水之滅火砥之利金角齒傷折舌耳無患卑損制驕暴雌辱勝大怨天下莫不知世俗莫不聞道徳經指歸卷十三髮以柔弱爲人所戴體骨堅强爲人所勞道徳經註䟽卷八猶如嶮岸所有樹木洪水暴長悉随漂溺流入大海唯除楊樹以其軟故元陽妙經卷一譬如僮僕行住坐卧皆當任主不應自在而有所作欲從其舎往市􅆵等先諮問主然後出所須飲食許乃受用諸有所爲皆随主欲波羅蜜多經五百九十猶截角牛至忍温良善調善御從村至村從巷至巷所逰行處無所侵犯中阿含經卷五猶如猫皮囊柔治極軟除㼲力頰切㼲聲無㼲㼲聲彼或有人以手拳扠石擲杖打或以刀斫或撲著地彼寧復有㼲㼲聲耶中阿含經卷五十猶如牛無其雙角極自良善亦不兇暴善可將御随意所至終不疑難増壹阿含經卷三十如乾牛皮卷之有聲舒亦有聲濕以脂膏卷舒皆輭佛説梵志阿颰經譬如牛皮已柔随用可作大智度論卷一譬如牛皮未柔不可屈折大智度論卷一譬如槃馬廻轉随意大智度論卷三十九譬如鐵雖堅䩕入鑪則柔輭随作何器大智度論卷六十一尚動弓久落絃而不張設則失其弓之往來之體喻民久休息而不勞苦則民有驕逸之志禮記正義雜記下吾非好行行有得也觀朝榮則敬才秀之士玩芝蘭則愛徳行之臣覩松竹則思貞操之賢臨清流則貴亷潔之行覧蔓草則賤貪穢之吏逢颷風則惡凶狡之徒若引而申之觸類而長之庶無遺漏矣晉書張天錫傳流水之不腐以其逝故也户樞之不蠧以其運故也子華子北宫意問勢散而後物服猶鳥擊禽獲故散勢法鷙鳥也鬼谷子本經隂符註精無氣之集也必有入也集於羽鳥與爲飛揚集於走獸與爲流行集於珠玉與爲精朗集於樹木與爲茂長集於聖人與爲夐明精氣之來也因輕而揚之因走而行之因美而良之因長而養之因智而明之流水不腐戸樞不螻動也吕氏春秋盡數次三風動雷興從其髙崇測曰風動雷興動有爲也太𤣥經第二釋雷火交動剛柔散氣積則暗動乃明京氏易傳豐上雷動風行山澤通氣人之運動體斯合矣京氏易傳夬中體常動揺榖氣得清血脉流通疾則不生卿見戸樞雖用易腐之木朝暮開閉動揺遂最晚朽藝文類聚方術部養生陳琳曰矢在弦上不可不發太平御覧兵部箭上尚静澤中有雷随君子以嚮晦入宴息易随雷在地中復先王以至日閉闗商旅不行后不省方易復六二咸其腓凶居吉易咸兼山艮君子以思不出其位易艮初六艮其趾无咎利永貞易艮初九不出户庭无咎象曰不出戸庭知通塞也易節非妄之災勿治自復非妄而藥之則凶故曰勿藥有喜王弼註易无妄皮雖從革之物然牛皮堅仭難變初九在革之始革道未成守夫常中未能應變施之於事有似用牛皮以自固未肯造次以從變者也故曰鞏用黄牛之革周易正義革胥靡爲宰寂寞爲尸大味必淡大音必希前漢書揚雄傳下有疾不治恒得中醫隋書經籍三志牝常以静勝牡老子謙徳至人潛行譬猶雷霆之蔵也文子精誠少言者不爲人所忌少行者不爲人所短少智者不爲人所勞少能者不爲人所役闗尹子九藥人君不静則失威治身不静則身危龍静故能變化虎躁故夭虧也河上公註老子重徳夫天不定日月無所載地不定草木無所植所立於身者不寧是非無所形淮南子俶真訓感而應廹而動不得已而往如光之耀如景之放以道爲紃有待而然淮南子精神訓今與人卞氏之璧未受者先也求而致之雖怨不逆者後也三人同舎二人相争争者各自以爲直不能相聴一人雖愚必從旁而决之非以智也以不争也兩人相鬬一羸在側助一人則勝救一人則免鬬者雖强必制一羸非以勇也以不鬬也由此觀之後之制先静之勝躁數也淮南子詮言訓用兵者先爲不可勝以待敵之可勝也治國者先爲不可奪以待敵之可奪也舜修之歴山而海内從化文王修之岐周而天下移風使舜趨天下之利而忘修己之道身猶弗能保何尺地之有故治未固於不亂而事爲治者必危行未固於無非而急求名者必剉也福莫大無禍利莫美不䘮動之爲物不損則益不成則毁不利則病皆險也淮南子詮言訓虎豹不動不入陷穽麋鹿不動不罹罝罘飛鳥不動不絓網羅魚鼈不動不擐脣喙物未有不以動而制者也是故聖人貴静淮南子兵畧訓人不小學不大迷不小慧不大愚人莫鑑於沬雨而鑑於澄水者以其休止不蕩也淮南子説山訓清之爲明杯水見牟子濁之爲闇河水不見太山視日者眩聴雷者聾人無爲則治有爲則傷淮南子説山訓水定則清正動則失平故惟不動則所以無不動也淮南子説山訓黙無過言慤無過事木馬不能行亦不費食騏驥日馳千里鞭箠不去其背説苑談叢履不容足南山多棘毋出房閨乃無病疾焦氏易林恒之訟膠著木連不出牢闗焦氏易林解之坤弱足則跟不利出門焦氏易林艮之恒次二車軔俟馬酋止測曰車軔馬止不可以行也太𤣥經第六止次七車纍其俿馳馬獵其蹄止貞測曰車纍馬獵行可憐也太𤣥經第六止上九折于株木輆口亥切乎泛石止測曰折木輆石君子所止也太𤣥經第六止艮止也於人爲手爲背取象爲山爲石爲門爲狗京氏易傳艮上夫人之形猶草木之體也草木在髙山之顛當疾風之衝晝夜動揺者能復勝彼隠在山谷間鄣於疾風者乎王充論衡道虚篇北辰以不改爲衆星之尊五嶽以不遷爲羣望之宗蟋蟀屢移而不貴禽魚饜深則逢患抱朴子外篇守塉仲長子光日在險而運竒不若宅平而無爲文中子禮樂雖力挾太山將不舉一羽揚波萬里將不濯一鱗咳唾成珠玉揮袂出風雲豈肯䠥􅍷鄙事取才進人補文選夏侯湛扺疑佐鬬者傷預事者亡意林唐子吾將贈子以無爲之樂給子以澹泊之湯刺子以𤣥虚之鍼灸子以淳朴之方安子以恢廓之宇坐子以寂寞之牀藝文類聚人部愁文无闔則无闢无静則无動此歸藏所以先坤歟玉海藝文易凡物輕不能載重小不能鎮大不行者使行不動者制動是以重必爲輕根静必爲躁君也道徳經註象彼仲冬節竹木皆摧傷佐陽詰賈旅人君深自藏參同契中經曰静者夀躁者夭静而不能養減夀躁而能養延年然静易御躁難將養性延命録教誡篇譬如門閾常住不動長阿含經卷十二智人知動揺譬如沙中樹法句經明哲品尚先上六比之无首凶正義曰他人皆比己獨在後是親比於人無能爲頭首也周易正義比逃遯之世宜速逺而居先而爲遯尾禍所及也周易正義遯物之成熟莫先葽草故云物成自秀葽始毛詩正義七月魯人將有事於上帝必先有事於頖宫晉人將有事於河必先有事於惡池齊人將有事於泰山必先有事於配林禮記禮器祈麥實麥實者五榖之先見者故急祈而記之也大戴禮記夏小正秦失其鹿天下共逐之於是髙材疾足者先得焉史記淮隂侯傳且彊弩之極矢不能穿魯縞衝風之末力不能漂鴻毛非初不勁末力衰也史記韓長孺傳豪彊並争虎裂狼分疾摶者獲多遲後者先吞蜀志譙周傳柏梁雲構大匠先居其下管絃䌓奏䕫牙先聆其音晉書庾懌傳天道先貴覆者地道先貴載者人道先貴事者酒保先貴食者鶡冠子天則權先加人者敵不力交武先加人者敵無威接尉繚子戰權欲學歌謳者必先徵羽樂風欲美和者必先始於陽阿采菱此皆學其所不學而欲至其所欲學者淮南子説山訓豪雄争强先者受福焦氏易林睽之屯縷非針無以通故宜先也淮南子説山訓解抱薪爇火燥者先著藝文類聚火部薪炭灰先者在路於後則妨海空智藏經哀歎品養性者先饑乃食先渴而飲恐覺饑乃食食必多盛渴乃飲飲必過養性延命録食誡篇譬如日出諸山髙者其光先照波羅蜜多經卷五百二十七將雨法雨先興法雲普覆衆生未便即雨大方廣佛華嚴經三十五王復問那先言人有欲作善者當前作之耶當後作之乎那先言當居前作之在後作之不能益人也居前作者有益於人那先問王言王渴欲飲時使人掘地作井能赴王渴不王言不赴渴也當居前作井耳那先比丘經卷中譬如妙華衆蜂競採先至之者取其精粹後來至者但味其餘大乗宻嚴經卷中如二人俱至一方一乗疾馬一乗鈍馬雖乗鈍馬以前發故先有所至法苑珠林卷八十三尚後九三咸其股執其随往吝易咸九四臀无膚其行次且牽羊悔亡易夬語曰騏驥之衰也駑馬先之孟賁之倦也女子勝之夫駑馬女子筋力骨勁非賢于騏驥孟賁也何則後起之藉也戰國策齊閔王齊欲伐魏淳于髠謂齊王曰韓子盧者天下之疾犬也東郭逡者海内之狡兎也韓子盧逐東郭逡環山者三騰山者五兎極於前犬廢於後犬兎俱罷各死其處田父見之無勞倦之苦而擅其功今齊魏久相持以頓其兵敝其衆臣恐强秦大楚承其後有田父之功戰國策齊宣王此所謂兩虎相搏者也夫秦楚相弊而韓魏以全制其後戰國策楚懐王聖人虚無因循常後而不先譬若積薪燎後者處上文子上徳瓶存二竅以水實之倒瀉閉一則水不下盡不升則不降井雖千仭汲之水上盖不降則不升是以聖人不先物闗尹子九藥子列子學於壺丘子林壺丘子林曰子知持後則可言持身矣列子曰願聞持後曰顧若影則知之列子顧而觀影形枉則影曲形直則影正然則枉直随形而不在影屈伸任物而不在我此之謂持後而處先列子説符未甞有聞其唱者也常和人而已矣莊子徳充符篇人皆取先己獨取後曰受天下之垢莊子天下鄭人有相與争年者其一人曰我與黄帝之兄同年訟此而不決以後息者爲勝耳韓非子外儲説左上先唱者窮之路也後動者達之原也何以知其然也凡人中夀七十嵗然而趨舎指凑日以月悔也以至於死故蘧伯玊年五十而有四十九年非何者先者難爲知而後者易爲攻也先者上髙則後者攀之先者踰下則後者蹶之先者隤陷則後者以謀先者敗績則後者違之由此觀之先者則後者之弓矢質的也猶錞之與刄刄犯難而錞無患者何也以其託於後位也淮南子原道訓老子學商容見舌而知守柔矣列子學壺子觀景柱而知持後矣故聖人不爲物先而常制之其類若積薪樵後者在上淮南子謬稱訓隂道卑虚無所因緣待陽唱道乃和而承之太𤣥經第一中註錞矛戈之錞刄矛戈之刄刄在前故犯難錞在後故無患淮南子原道訓解我有三寳保而持之一曰慈二曰儉三曰不敢爲天下先太平御覧珍寳部寳通𤣥經曰天地之道先以後爲主聖人法道之退者所以自後也後以自安道徳經四子集解先迷失軌後爲主君參同契尚速盛饌未具不能以虚待之不及壺飡之救饑疾也言已欲滅吴取快意得之而已不能待有餘力也國語解越下王問范蠡失火之家豈暇先言大人而後救火乎史記齊悼世家乗其未堅厭其未發震起機動敵人摧折雖有賁育不及持刺雖有樗里不及回知雖有鬼谷不及造次前漢書王莽傳疾走而㨗先鳴則興晉書慕容寳記智者從之而不釋巧者一决而不猶豫是以疾雷不及掩耳迅雷不及瞑目太公六韜軍勢十里斷者國弱九里斷者國强以日治者王以夜治者强宿治者削商子去强力貴突智貴卒得之同則遫爲上勝之同則濕爲下所爲貴驥者爲其一日千里也旬日取之與駑駘同所爲貴鏃矢者爲其應聲而至終日而至則與無至同吕氏春秋貴卒所以貴鏌邪者以其應物而斷割也􅲣靡勿釋牛車絶轔淮南子説山訓所以尚干將莫邪者貴其立斷也所以貴騏驥者爲其立至也必且厯日曠久乎絲氂猶能挈石駑馬亦能致逺是以聰明㨗敏人之美材也新序雜事二敏教勁疾如猿升木彤弓雖調終不能獲焦氏易林泰之蠱來如飄風去似絶絃焦氏易林困之萃鳳之小者曰鸑鷟五彩之文三嵗始備也張華註禽經成務雖均機速爲上决謀或同遲緩爲下何者才能成功以速爲貴智能决謀以疾爲竒也善濟事者若救火拯溺明其謀者猶驥㨗矢疾劉子貴速今焚燃熛室則飛馳灌之湍波漂人必奔遊拯之若穿井而救火則熛颺棟焚矣方鑿舟而拯溺則𦵏江魚之腹中矣驥所以見珍者以其日行千里也滿旬而取至則與駑馬均矣箭所以爲貴者以其弦直而至也窮日而取至者則與不至者同矣智所以爲妙者以其應時而知若事過而後知則與無知者齊矣劉子貴速言畜貨以遺後畜道俟將來是遲鈍揚子法言註五百篇逸材之馬雖後往而能先至李善註文選舞賦逸翮後塵翶翥先路言飛之疾塵起居鶴之後鶴飛在路之先李善註文選舞鶴賦翔鶤仰而不逮况青鳥與黄雀文選西京賦倐如六龍之所掣一越三千不終朝而濟所届文選海賦西河下龍門其流敵於竹箭文選南都賦註掣電無停光疾雷無餘聲太平御覧天部雷劉向云龜之言久蓍之言耆龜千嵗而靈蓍百年而神玉海藝文藝術夫騕褭以迅驟爲功鷹隼以輕疾爲妙何氏語林夙恵譬如猛火随投草木一切熾然悉成於火大寳積經卷八十四尚遲鵲之作巢冬至架之至春乃成猶國君積行累功鄭氏箋詩鵲巢汝大才當晚成良工不示人以朴且從所好後漢書馬援列傳夫物暴長者必夭折功卒成者必亟壊後漢書朱浮列傳藜藿之生蝡蝡然日加數寸不可以爲櫨棟楩柟豫章之生也七年而後知故可以爲棺舟夫事有易成者名小難成者功大君子修美雖求有利福將在後至淮南子修務訓楓桐之樹生而速長故其皮肌不能堅剛樹檀以五月生葉後彼春榮之木其材彊勁車以爲軸殷之桑榖七日大拱長速大暴故爲變怪大器晚成寳貨難售其不崇一朝輒成賈者菜果之物也王充論衡状留篇陽温隂寒厯月乃至災變之氣一朝成怪故夫河冰結合非一日之寒積土成山非斯須之作干將之劔久在鑪炭銛鋒利刄百熟煉厲久銷乃見作留成遲故能割斷肉暴長者曰腫泉暴出者曰湧酒暴熟者易酸醢暴酸者易臭由此言之賢儒遲留皆有狀故王充論衡狀留篇燕飛輕於鳳凰兎走疾於麒麟鼃躍躁於靈龜蛇騰便於神龍吕望之徒白首乃顯百里之知明於黄髮深爲國謀因爲王輔皆夫沉重難進之人也王充論衡状留篇龜生三百嵗大如錢游於蓮葉之上三千嵗青邊縁巨尺二寸蓍生七十嵗生一莖七百嵗生十莖神靈之物也故生遲留厯嵗長久故能明審實賢儒之在世也猶靈蓍神龜也計學問之日固已盡年之半矣鋭意於道無貪仕之心及其仕也純特方正無員鋭之操故世人遲取進難也王充論衡状留篇美盛者任其時化譬之種植不可一朝成也郭子註莊人間世且墉基不可倉卒而成威名不可一朝而立皆爲之有漸建之有素譬之種樹久則深固其根本茂盛其枝葉若造次徙於山林之中植於宫闕之下雖壅之以黒墳暖之以春日猶不救於枯槁何暇䌓育㢤文選曹冏六代論薫晚華而後落槿早秀而前亡補文選鮑昭觀漏賦夫物速成則疾亡晚就則善終朝華之草夕而零落松栢之茂隆寒不衰是以大雅君子惡速成戒闕黨也補文選王㫤戒子姪書春蘭早芳實忌鳴鴂秋菊晚秀無憚䌓霜何則榮乎始者易悴貞乎末者難傷是以傅長沙而志沮登金馬而名揚廣文選謝恵連連珠盧思道與庾知禮作詩知禮成而思道未就知禮曰盧詩何太眷眷思道曰自許編蒲疾何如織錦遲太平御覧文部思遲桐枝濡毳而又空中難成易傷須成器而後華太平御覧木部桐雙骹長者起遲六翮短者飛急事類賦禽部鷹註實不如虚數不如希茂多卒夭疾不如遲西昇經寧爲菩薩遲證無上正等菩提不爲速求墮二乗地波羅蜜多經卷五百八十七喻林卷三十六
