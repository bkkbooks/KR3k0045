body:
  text: 喻林卷四十五明徐元太撰人事門四十三各得鴉鳥岀食在野甚飽羣飛而歸提提然凡人之父子兄弟岀入宮庭相與飲食亦提提然樂鄭氏箋詩小弁民有寢廟獸有茂草各有攸處徳用不擾左傳襄公四年在野者龍逸在朝者鳯集晉書束晳傳用殊函矢雙美奚躓談異矛戈兩濟何傷宋書顧覬之傳東西正相反而相對各當其所居若左右之不相雜故不害其方也公孫龍子通變論註故小而行大則滔窕而不親大而行小則陿隘而不容貴賤不失其體而天下治矣淮南子本經訓聖人之道猶中衢而致尊邪過者斟酌多少不同各得其所宜是故得一人所以得百人也淮南子繆稱訓東風啓户黔啄翻舞各樂其類咸得生處焦氏易林賁之否蜎飛蠕動各有配偶小大相保咸得其所焦氏易林臨之豫飾貌以强類者失形調辭以務似者失情百夫之子不同父母殊類而生不必相似各以所稟自為佳好王充論衡自紀篇夫好尚不可以一概杚趨舍不可以彼我易也夫欲隮閬風陟嵩華者必不留行於丘垤意在乎游南溟泛滄海者豈暇逍遙於潢洿是以注清聽於九韶者巴人之聲不能悦其耳烹大牢饗方丈者荼蓼之味不能甘其口鵾鵬戾赤霄以髙翔鶺鴒傲蓬林以鼔翼洿隆殊途亦飛之極晦朔甚促朝菌不識蜉蝣怱怱於寸隂野馬六月而後息鯈鮒汎濫以㬥鱗靈虬勿用乎不測行業乖舛意何可得抱朴子外篇守塉夫斥鷃不以蓬榛易雲霄之表王鮪不以幽岫􅐙滄海之曠虎豹入廣厦而懐悲鴻鶤登嵩巒而含慼物各有心安其所長莫不泰於得意而慘於失所也抱朴子外篇逸民夫大鳥一去半嵗至天池而息小鳥一飛半朝槍榆枋而止此比所能則有問矣其於適性一也郭子註莊逍遙遊庖人尸祝各安其所司鳥獸萬物各足於所受帝堯許由各静其所遇此乃天下之至實也郭子註莊逍遙遊各美其所美則萬物一美也各是其所是則天下一是也郭子註莊徳充符各知其極物安其分逍遙者用其本歩而遊乎自得之塲矣郭子註莊秋水夫至仁者百節皆適則終日不自識也聖人在上非有為也恣之使各自得而已耳郭子註莊天運駑驥各適性而足馬之真性非辭鞍而惡乗但無羡於榮華耳有意治之則不治矣郭子註莊馬蹄士之所能各有其極若四時之不可易也當其時物順其倫次則各有用矣是以順嵗則時序易性則不物郭子註莊徐無鬼心膂有位股肱有經豈以處下為戚為榮各安其所舉體用平藝文類聚人部隠逸上箴取舍歿繆畏喜殊方故鶉鷃髙飛終日馳鶩而志在乎蒿苗鴻鵠高舉逕歴東西通千逹萬而志在乎陂池鸞鳯翺翔萬仞之上優游太清之中而常以為卑延頸舒翼凌蒼雲薄日月髙翔逺逝曠時不食徃來九州棲息八極乃得其宜三者殊便皆以為娛道徳經指歸卷七猶如𫝊燈一燈𫝊之百千萬燈一時俱照光明無損前燈後燈無優無劣智慧𫝊者亦復如是无上内祕蔵經妙徳品萬物盗天地之精以生成人盗萬物之形以御用萬物盗人之力以種植彼此相盗各獲其宜天機經安如摩尼珠以加私國㲲而以褁之不相染著何以故彼此淨故淨行法門經卷下譬如種種熏色置一器中熏種種衣復以衆雜染色置一器中染所熏衣隨其所熏受色不同而彼諸色不生分别羌别之心法集經欲一譬如龍王降雨普與天下雨無差别大樹大草根大故多受小樹小草根小故少受大智度論卷十九如大清涼美池無量衆生前後來飲各飽而去大智度論卷五十三金玉不相傷精魄不相妨𢎞明集牟子理惑論自得理定於心不期俗賞情貫於時無悲世辱故芬芳各性不待汨渚之哀明白為寶無假荆南之哭南齊書劉祥傳鷦鷯巢於深林不過一枝偃鼠飲河不過滿腹歸休乎君予無所用天下為莊子逍遙遊夫得者困可以為得乎則鳩鴞之在於籠也亦可以為得矣且夫趣舍聲色以柴其内皮弁鷸冠搢笏紳脩以約其外内支盈於柴柵外重纒繳睆睆然在纒繳之中而自以為得則是罪人交臂歴指而虎豹在於囊檻亦可以為得矣莊子天地孔子窮於陳蔡之間七日不火食左據槁木右擊槁枝而歌焱氏之風有其具而無其數有其聲而無宮角木聲與人聲犁然有當於人之心莊子山木子貢曰吾不知天之髙也地之下也古之得道者窮亦樂通亦樂所樂非窮通也道徳於此則窮通為寒暑風雨之序也莊子讓王曾子居衞緼袍無表顔色腫噲手足胼胝三日不舉火十年不製衣正冠而纓絶捉衿而肘見納屨而踵決曵縰而歌商頌聲滿天地若岀金石天子不得臣諸侯不得友故養志者忘形養形者忘利致道者忘心矣莊子讓王心平愉則色不及傭而可以養目聲不及傭而可以養耳蔬食菜􅅅而可以養口麤布之衣麤紃之履而可以養體屋室廬庾葭藁蓐尚机筵而可以養形荀子正名篇所謂樂者豈必處京臺章華游雲夢沙丘耳聽九韶六瑩口味煎熬芬芳馳騁夷道釣射鷫鷞之樂乎吾所謂樂者人得其得者夫得其得者不以奢為樂不以廉為悲與隂俱閉與陽俱開故子夏心戰而臞得道而肥聖人不以身役物不以欲滑和是故其為樂不欣欣其為悲不惙惙是故有以自得也喬木之下空宂之中足以適情無以自得也雖以天下為家萬民為臣妾不足以養生也夫建鍾鼓列管弦席旃茵𫝊旄象耳聽朝歌北鄙靡靡之樂齊靡曼之色陳酒行觴夜以繼日强弩弋高鳥走犬逐狡兔此其為樂也焱焱赫赫􅇶然若有所誘慕解車休馬罷酒徹樂而心忽然若有所䘮悵然若有所忘也是何則不以内樂外而以外樂内樂作而喜曲終而悲失其得者也淮南子原道訓誠中之人樂而不忣如鶚好聲熊之好經夫有誰為矜淮南子繆稱訓天下有至貴而非勢位也有至富而非金玉也有至壽而非千嵗也原心反性則貴矣適情知足則富矣明死生之分則壽矣淮南子繆稱訓次四拂其繫絶其纗佚厥心測曰拂繫絶纗心誠快也太𤣥經第二樂一枝足以戢鸞羽何煩乎豐林潢洿足以泛龍鱗豈事乎滄海藜藿嘉於八珍寒泉㫖於醽醁躡履美於赤舄緼袍麗於兖服把撞安於杖鉞鳴條樂乎絲竹茅茨艶於丹楹采椽珍於刻桷登嵩峯為臺榭庇巖霤為華屋積篇章為敖庾寶𤣥談為金玉抱朴子外篇嘉遯未若遊神典文吐故納新求飽乎耒耜之端索緼乎杼軸之間腹仰河而已滿身集一枝而餘安萬物芸芸化為埃塵矣抱朴子外篇逸民醇而不雜斯則富矣身不受役斯則貴矣若夫剖符有土所謂禄利耳非富貴也抱朴子外篇逸民遺身而自得故行若曵枯木止若聚死灰郭子註荘逍遙遊以小求大理終不得各安其分則小大俱足矣若秋毫不求天地之功則周身之餘皆為棄物天地不見大於秋毫則顧其形象纔自足耳郭子註莊秋水爾乃龍吟方澤虎嘯山丘註云言已從容吟嘯類乎龍虎李善註文選歸田賦故能虬驤慶霄而不紲豢龍之轡鳯鳴瑤林而不屈伶倫之籠豈必欣太清而樂瓊藹哉廣文選庾元規翟徴君贊善釣者不易淵而釣君子不隣席而追道意林物理論百日之饑一朝而飽豈復覺向者之餒乏耶太平御覽道部養生家有千金之玉而不知猶之貧也良工治之則富弇二國身有至貴而不知猶之賤也聖人告之則貴最天下太平御覽人事部富下入吾室者但有清風對吾飲者唯當明月何氏語林言志如堅翅鳥飛騰虛空自在翺翔久不墮地雖依空戲而不據空亦不為空之所拘礙波羅宻多經三百三十二又如比丘得神足通從海此岸到於彼岸周旋四洲無能礙者大乗造象功徳經卷下譬如飛鳥飛行空中無所觸礙以空為地不畏虛空脩行道地經菩薩品如空中鳥逺逝無礙法句經羅漢品彼見其門我覩其室彼採其華我取其實彼求其備我守其一𢎞明集牟子理惑論譬若臨河飲水飽而自足焉知其餘哉𢎞明集牟子理惑論四信云何先信法次信佛後信僧及戒耶荅曰譬如人重病服藥若病愈則信藥妙藥妙必由師則信師也雖師妙藥良要由善看病人則信看病人也三事雖妙要由我能消息則信我也法中四信亦復如是觀實相見諦時煩惱即除則信法妙也三寶雖妙要行之由我戒業清淨故纍病得除則信戒也羅什譯維摩詰經菩薩品世王自在於民法王自在於法僧肇註維摩詰經佛國品日月不期去闇而闇自除岀家不期摧外道而外道自消也僧肇註維摩詰經弟子品有獲六四悔亡田獲三品易巽以斯解險無險不濟能獲隠伏如似田獵而獲窟中之狐周易正義解園有桃其實之殽園有棘其實之食詩國風園有桃穫之挃挃音窒積之栗栗其崇如墉其比去聲如櫛側瑟反詩頌良耜曾孫之稼如茨如梁曾孫之庾如坻音池如京詩小雅甫田嗟爾朋友予豈不知而作如彼飛蟲時亦弋獲詩大雅桑柔園有桃得其實為之殽以興國有民得其力為君用毛詩正義園有桃草穢既除而禾稼茂禾稼茂而榖成熟榖成熟而積聚多如墉也如櫛也以言積之髙大且相比迫也鄭氏箋詩良耜耕鉏不以水旱息必獲豐年之收杜氏解左傳昭公元年耕鉏不息必有豐年之收以喻禮信不愆必為諸侯之長也春秋正義昭公元年昔者王豹處於淇而河西善謳緜駒處於髙唐而齊右善歌華周把梁之妻善哭其夫而變國俗有諸内必形諸外為其事而無其功者髠未嘗覩之也孟子告子下此秦所禱祀而求也今已得之矣史記韓世家違覆而得中猶棄敝蹻而獲珠玉蜀志董和傳夫芬芳起於椒蘭清響生乎琳琅命世而作佐者必垂可大之餘風髙尚而邁徳者必有明勝之遺事晉書習鑿齒傳如𤓰苗之有衍我是以庇其榮而食其實子華子神氣鄭人緩也呻吟䘮氏之地祗三年而緩為儒河潤九里澤及三族莊子列禦冦彭祖九子據徳不殆南山松栢長壽嘉福焦氏易林乾之蠱江河淮海天之奥府衆利所聚可以饒有焦氏易林乾之觀膏澤肥壤農人豐敞焦氏易林坤之咸龜鱉列市河海饒有長財善賈商季悦喜焦氏易林屯之震獐鹿雉兔羣聚東圃盧黄白脊俱徃追逐九齚十得君子有喜焦氏易林蒙之復望鷄得雛求馬獲駒焦氏易林蒙之解曵綸江海釣掛魴鯉焦氏易林需之損握珠懐玉還歸其鄉焦氏易林訟之壯蜲蛇循流東求大魚預且舉網庖人歌謳焦氏易林小畜之訟探巢得雛鳩鵲俱來焦氏易林履之渙求我所有買鮪得鯉焦氏易林泰之大壯日中為市各抱所有交易貨貲含味懐寶焦氏易林泰之升求兔得獐過其所望焦氏易林泰之明夷桃李花實纍纍日息長大成熟甘美可食為我利福焦氏易林泰之小過把珠入口為我利寶焦氏易林否之履龍隅求泉置雲影從焦氏易林同人之蠱陶朱白圭善賈息資三致千金徳施上仁焦氏易林同人之大畜北方多􅀥橘柚所聚荷囊載香盈我筐筥焦氏易林謙之大過白馬騮駮更生不休富有商人利得如丘焦氏易林隨之噬嗑春多膏澤夏潤優渥稼穡成熟畆獲百斛焦氏易林臨之明夷新田宜粟上農得榖焦氏易林剥之遯崑崙之玉取求必得焦氏易林剥之益白馬騂騮生乳不休焦氏易林復之暌求犬得兔請新遇故焦氏易林復之困三驪負衡南取芝香秋蘭芬馥盈滿匣匱焦氏易林復之艮出得隋珠留獲和玉焦氏易林復之未濟膺栖茂樹候雀徃來一擊獲兩伏不枝梧焦氏易林无妄之困繒帛盛織日就為得焦氏易林頥之夬捕魚河海布網多得焦氏易林坎之大過求􅀈得黄駒犢從行焦氏易林離之觀飛來之福入我居室焦氏易林恒之无妄春鴻飛東以馬貨金焦氏易林大壯之小過旦樹菽豆暮成藿羮焦氏易林明夷之履東市齊魯南賈荆楚羽毛齒革為吾利寶焦氏易林家人之蠱尼父孔丘善釣鯉魚羅網一舉得獲萬頭焦氏易林革之頥結網得鮮受福安生焦氏易林兊之无妄豐年多儲河海饒魚商客善賈大國富有焦氏易林豐之蠱狡兔趯趯犬良逐咋雄雉爰爰為鷹所獲焦氏易林未濟之師吾以仁義為機而得其名子以斧斤為機而得其薪天禄閣外史遇樵漢武享國最為壽考已得養性之小益矣但以升合之助不供鍾石之費畎澮之輸不給尾閭之泄耳抱朴子内篇論仙鳥不暇舉獸不得發青骹摯於韝下韓盧噬於􅔗末文選西京賦夫田種者一畆十斛謂之良田此天下之通稱也不知區種可百餘斛也田種一也至於樹養不同則功收相懸謂商無十倍之價農無百斛之望此守常而不變者也文選嵇康養生論故殖財之寶黄玉自岀令徳之珍卿相是毓古文苑張旭西嶽華山堂闕碑銘讓禮一寸得禮一尺藝文類聚人部讓鐮刀自葵積芻蕘之効太平御覽器物部鐮譬如有人執持明鏡不期見面面像自現亦如農人散種良田不期生芽而芽自生亦如然燈不期滅闇而闇自滅元陽妙經卷六譬如良農善能播植既植其母必得其子玉清經幽棲品如是良農終卒獲利玉清經道化四夷品如善御者駕駟馬車令避險路行於正道隨本意欲能徃所至波羅蜜多經卷三百五十五如人種榖其苗已秀當知是人獲果不久波羅蜜多經卷五百六十九譬如有人銷礦出金出已轉賣所得價直貴賣彼人多百千倍波羅蜜多經五百八十四譬如魚師以食塗網投之深淵既滿所求即尋牽岀大寶積經一百六譬如有人耕田種稻唯求子實不望藁稈子實成熟收穫子已藁稈不求而自然得蘇婆呼童子經卷上如人穿井得至濕泥知當得水不久如人擊賊賊已退散自知得勝意中安稳三昧法門經卷下譬如人種五榖生根從根生莖葉實至後得榖已後年復種得榖甚多那先比丘經卷中譬如有人掘地求蔵本規索一并得餘蔵脩行道地經天耳品汝不見田夫葉少種子後獲大果如人獻王少物而得大報如少鈎餌而得大魚所捨甚少而所獲大多大智度論卷三十譬如人為榖故種禾而槀草自至大智度論卷八十七誰渴飲清流而不充虚乏誰秉熾燃燈而不滅黑闇大莊嚴經論卷八猶如農夫為榖種植至秋收穫亦得草䴬十住毘婆沙論卷九譬猶灑粒於土壤而納百倍之收地榖無情於人而自然之利至也𢎞明集孫綽喻道論再造九二枯楊生稊老夫得其女妻无不利易大過故衰者更盛猶若枯槁之楊更生少壯之稊枯老之夫得其少女為妻也周易正義大過人衰更求盛猶木死生蘖尚書正義盤庚上克伐既滅封其支子為王者之後猶樹既斬其根本更有蘖生之條毛詩正義長發君王之於越也繄起死人而肉白骨也國語吳昔原大夫贖桑下絶氣𫝊稱其仁秦越人還虢太子結脉世著其神設曩之二人不遭仁遇神則結絶之氣竭矣然而糒脯岀乎車軨鍼石運乎手爪今所頼者非直車軨之糒脯手爪之鍼石也乃收之於斗極還之於司命使乾皮復含血枯骨復被肉允所謂遭仁遇神真所宜𫝊而著之後漢書文苑列傳則所謂生繁華於枯荑育豐肌於朽骨晉書元帝紀日月之暉昧而復曜晉書髙宻文獻王泰傳皇綱絶而復紐天緯缺而更張宋書明帝本紀使弛墜之構更獲締造垢辱之甿復得明目宋書謝荘傳再躔日月重綴參辰反龜玉於塗泥濟斯民於阬岸梁書武帝上紀扶傾頺構之下拯溺逝川之中梁書武帝上紀地維絶而重紐天柱傾而更植鑿河津於孟門百川復啓補穹儀以五石萬物再生梁書元帝紀寒灰更然枯骨生肉隋書于仲文傳譬如枯木重起枝葉枯骨重生皮肉隋書突厥北狄傳恩隆絶望之辰慶集㝠心之日熖灰非喻荑枯未擬南史袁湛彖從弟昻傳炎絶續光光滅復明焦氏易林屯之咸視日再光與天相望焦氏易林大有之小過枯木復起秋葉冬實焦氏易林大過之蒙破敝復完危者得安焦氏易林恒之中孚盲者目張跛倚起行焦氏易林升之蠱􅀢微惙惙屬纊聽絶豁然大通復更生活焦氏易林艮之大壯上九過其枯城或蘖青青測曰過其枯城改過更生也大𤣥經第一差上九株生蘖其種不絶測曰株生蘖其類乃長也太𤣥經第三居次七老木生蒔侍永以纒其所無測曰老木生蒔永厥體也太𤣥經第四永易稱懸象著明莫大乎日月然時有昏晦詩美滔滔江漢南北之紀然時有壅滯論語固天縱之莫盛於聖然時有困否日月不失其體故蔽而復明江漢不失其源故窮而復通聖人不失其徳故廢而復興風俗通窮通絶而復屬死而復生世有死而復生之人人必謂之神漢統絶而復屬光武存亡可謂優矣王充論衡恢國篇悴葉更輝枯條以肄文選陸士衡功臣頌使春枯之條更與秋蘭垂芳陸沈之羽復與翔鴻撫翼文選陸機謝内史表得使入湯之禽復假羽毛刖斷之足復蒙連續廣文選蘇子卿報李陵書百榖偃而立大禾顛復持藝文類聚天部霽詩枯木生華白骨更肉藝文類聚封爵部親戚封詔拯龜玉於已毁導涸源於將塞藝文類聚封爵部親戚封詔䘮車復還白骨更肉藝文類聚刑法部刑法書議援三靈之已墜救四海之羣飛文苑英華請勸進及封岳行幸徐陵表絆驥還千里垂鵬更九飛文苑英華庾信寄贈一詩昔沈羲將盡逢司命而還生士爕行埋集作終值仙人而更活今日慈矜斯之謂矣文苑英華庾信謝賜賚啓舟檝無岸海若為之反風薺麥將枯山靈為之岀雨文苑英華庾信謝賜賚唘青牛道士更延將盡之命白鹿真人能生已枯之骨文苑英華庾信謝賜賚啓夫􅀈骨腐於泥得水而再活井萍燥於地得水亦復萌水特一物魚萍得之猶且若是矧上帝非常之恩乎玉皇本行集經如壊復成如滅復生西昇經如披重雲得覩日月猶如盲人得見色象如籠中鳥而得騫翥如小水魚得遊江海亦如枯骨而得成人玉清經慈悲方便品慈雲普覆枯朽再榮白骨成人玉清經通濟幽㝠品反已逝之危魂榮已凋之朽質玉清經八節品譬如火欲滅遇得風薪火則然熾大智度論卷二十九將擢翠翹於寒條之上曜扶渠於重氷之下𢎞明集十一昌後椒聊之實蕃衍盈升彼其音記之子碩大無朋椒聊之實蕃衍盈匊音菊彼其之子實大且篤詩國風椒聊維熊維羆男子之祥維虺維蛇女子之祥詩小雅斯干􅏑斯美周室多男之詩詩説周南麟趾文王之子多仁賢美之詩説周南螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也毛詩螽斯椒聊刺晉昭公也君子見沃之盛彊能脩其政知其蕃衍盛大子孫將有晉國焉毛詩椒聊凡物有隂陽情慾者無不妬忌惟蚣蝑不耳各得受氣而生子故能詵詵然衆多后妃之徳能如是則宜然鄭氏箋詩螽斯如松栢之枝葉常茂盛青青相承無衰落也鄭氏箋詩天保綿綿然枝葉長而不絶者乃是葛藟之草所以得然者由其在河之滸得河之潤故也以興子孫長而昌盛者乃是王族之人所以得然者由其與王同姓得王之恩故也王族宜得王之恩施猶葛藟宜得河之潤澤毛詩正義葛藟有杕然特生之杜其葉湑湑然而盛但柯條稀疏不相比次以興晉君疏其宗族不與相親猶杕杜之枝葉不相比次然也毛詩正義杕杜維此柞木幹上之有枝條其生葉蓬蓬然茂盛新將生故乃落之於地以葉相承無衰落以興維此諸侯先祖之有子孫其有才智亦茂盛繼世以徳相承無乏絶毛詩正義采菽木枝莫不生葉正以柞為興者由柞葉新將生故乃落於地其枝常有葉似前君賢者死後君賢者生其君常有賢也毛詩正義采菽振振子孫或秀或苗後漢書章帝八王傳贊譬如芝蘭玉樹欲使其生於庭階耳晉書謝𤣥傳昔楚國處女諌其王曰有龍無尾言年四十未有太子晉書閣纘傳曰子曰孫重規疊矩晉書周訪傳邦君將昌天遺其道大夫將昌天遺之士庶人將昌必有良子説苑談叢十雌百雛常與母俱抱雞摶虎誰敢害者焦氏易林謙之賁魴生江淮一轉為百焦氏易林蠱之蠱長生無極子孫千億松栢為梁堅固不傾焦氏易林觀之損鳯生五雛長於南郭君子康寧悦樂身榮焦氏易林賁之頥五乳百雛騂駁驤駒焦氏易林无妄之坎麒麟鳯凰子孫盛昌焦氏易林无妄之大壯大樹之子百條共母當夏六月枝葉盛茂鸞鳯以庇召伯避暑翩翩偃仰各得其所焦氏易林大過之需杻陽之山有獸焉其狀如馬而白首其文如虎而赤尾其音如謠其名曰鹿蜀佩之宜子孫山海經南山經鹿蜀之獸馬質虎文驤首吟鳴矯足騰羣佩其皮毛子孫如雲山海經南山經圖讚渾渾長源蔚蔚洪柯羣川載導衆條載羅陶靖節集詩四言言草木本根氣强則枝葉盛而善美人之先祖有大功徳則𦙍緒亦蕃昌也前漢書註叙傳景之行止皆隨於形草木枝葉各稟根祗人之餘慶資於積善亦猶此也前漢書註叙傳邁徳行仁必貽後慶如有言必酬有徃必復也李善註文選思𤣥賦桑末寄夫根生桑末既凋而寄生已茂以喻臯陶之後封於英六衆國已滅而英六獨存言積徳之後必有餘慶也李善註文選思𤣥賦昆山西跱爰有夜光漢水東流是生明月藝文類聚儲官部公主碑漢明帝作太子樂歌四章一曰日重光二曰月重輪三曰星重輝四曰海重潤事文類聚宫嬪古今注韋元將弟誕仲將孔融與其父書曰不意雙珠近出老蚌事文類聚誕子世人有子若不紹繼則名斷種最為可恥大智度論卷一百喻林卷四十五
