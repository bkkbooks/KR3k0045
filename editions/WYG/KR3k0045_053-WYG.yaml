body:
  text: 喻林卷五十三明徐元太撰人事門五十一小用子之武城聞絃歌之聲夫子莞爾而笑曰割雞焉用牛刀論語陽貨枳棘非鸞鳯所棲百里豈大賢之路後漢書循吏列傳傳曰函牛之鼎以烹雞多汁則淡而不可食少汁則熬而不可熟此言大器之於小用固有所不宜也後漢書文苑列傳千鈞之弩不為鼷䑕發機萬石之鐘不以莛撞起音魏志杜襲傳摧鸞鳯之翮遊燕雀之宇蜀志劉巴傳枉髙車以載鼷費明珠以彈雀隋書王貞文學傳小陬之市利不足喜焦氏易林遯之歸妹利劒宜以為威誅無狀以征不服今乃用斫蓬蒿割熟肉非其宜也以言使賢者為僕隷之徒非其宜也王逸註楚辭九歎荆卿朱亥不示勇於怯弱之間孟賁馮婦不奮戈㦸於俚俠之羣英儒碩生不飾細辯於淺近之徒達人偉士不變晈察於流俗之中抱朴子外篇博喻孫興公道曹輔佐才如白地明光錦裁為負版絝非無文采酷無裁製世説新語言語華譚移前松滋令袁甫曰枯澤非應龍之泉平林非鸞鳳之窟太平御覽地部林夫解小而引大了淺而伸深猶以牛刀割雞長殳刈薺太平御覽菜茹部薺張大網以漉鰌蝦辱九鼎以烹鼃􅟑太平御覽鱗介部蝦字說曰善鬬謂之雗非不健也然尾長故飛不能遠譬諸強學務末勝本則其出入亦不能遠爾雅翼鷽游虬一壑栖鸞一叢初學記居處部堂昔有窮寒孤獨老公無以自業遇市得一斧是衆寳之英而不識之持行斫杖賣之以供㣲命用斧欲盡見外國治生大賈客名曰薩薄見斧識之便問老公賣此斧不老公言我仰此斧斫杖生活不賣也薩薄復言與公絹百疋何以不賣公謂調已亦不應和薩薄復言何以不見應和與公二百疋公便悵然不樂薩薄復言嫌少當益公何以不樂與公五百疋公便大啼哭言我不恨絹少我愚癡此斧長尺半斫地已盡餘有五寸猶得五百疋是以為恨耳薩薄復言勿復遺恨今與公千疋即便破劵持去此斧衆寳之英耳地博不問多少以斧著上薪火燒之盡成貴寳阿育王譬喻經基一可欺宰我問曰仁者雖告之曰井有仁焉其從之也子曰何為其然也君子可逝也不可陷也可欺也不可罔也論語雍也昔者有饋生魚於鄭子産子産使校人畜之池校人烹之反命曰始舎之圉圉焉少則洋洋焉攸然而逝子産曰得其所哉得其所哉校人出曰孰謂子産智予既烹而食之曰得其所哉得其所哉故君子可欺以其方難罔以非其道孟子萬章上夫俗士之牽達人也猶鶉鳥之欺孺子也鶉鳥之性善近人飛不峻也不速也蹲蹲然似若將可獲也卒至乎不可獲是孺子之所以􅀈膝腕足而不以為弊也俗士之與達人言也受之雖不肯拒之則無說然而有贊焉有和焉若將可寤卒至乎不可寤是達人之所以乾唇竭聲而不舎也斯人也固達之蔽者也非達之達者也徐幹中論貴言釣者以木為魚丹漆其身近之水流而擊之起水動作魚以為真並來聚㑹夫丹木非真魚也魚含血而有知猶為象至王充論衡亂龍篇譬如空拳以誑小兒小兒著故謂以為有大智度論卷四十三如人手捉重寳有人以少金誑之捨大價寳而取賤物是名耗減大智度論卷六十九貪得碩䑕刺重斂也國人刺其君重斂蠶食於民不修其政貪而畏人若大䑕也毛詩碩䑕所求無饜則不安譬如物偏重則離散杜氏觧左傳哀公十六年齊人見田駢曰聞先生髙議設為不宦而願為役田駢曰子何聞之對曰臣聞之鄰人之女田駢曰何謂也對曰臣鄰人之女設為不嫁行年三十而有七子不嫁則不嫁然嫁過畢矣今先生設為不宦訾養千鍾徒百人不宦則然矣而富過畢矣戰國策齊宣王墨子見楚王曰今有人於此舎其文軒隣有敝輿而欲竊之舎其錦繡隣有裋褐而欲竊之舎其粱肉隣有糟糠而欲竊之此為何若人也王曰必為有竊疾矣墨子曰荆之地方五千里宋方五百里此猶文軒之與敝輿也荆有雲夢犀兕麋鹿盈之江漢魚鼈黿鼉為天下饒宋所謂無雉兎鮒魚者也此猶粱肉之與糟糠也荆有長松文梓楩楠豫章宋無長木此猶錦繡之與裋褐也臣以王吏之攻宋為與此同類也戰國䇿宋景公髠曰今者臣從東方來見道傍有穰田者操一豚蹄酒一盂而祝曰甌窶滿篝汙邪滿車五榖蕃熟穰穰滿家臣見其所持者狹而所欲者奢史記滑稽傳夫無毛髮之勞而欲求人丘山之用此淳于髠所以拍髀仰天而笑者也後漢書張奐列傳宋有澄子者亡其緇衣順塗以求之見婦人衣緇衣焉援之而弗舎曰而以是償我矣婦人曰公雖亡緇衣然此吾所自為者也澄子曰而弗如速以償我矣我昔所亡者紡緇也今子之所衣者禪緇也以禪緇而當我之紡緇也而豈有所不得哉子華子曰夫利之惛心也幸於得而已矣忘其所以為質者矣子華子神氣宋人有曹商者為宋王使秦其往也得車數乗王説之益車百乗反於宋見莊子曰夫處窮閭阨巷困窘織屨槁項黄馘者商之所短也一悟萬乗之主而從車百乗者商之所長也莊子曰秦王有病召醫破癰潰座者得車一乗䑛痔者得車五乗所治愈下得車愈多子豈治其痔邪何得車之多也子行矣莊子列禦寇非無安居也我無安心也非無足財也我無足心也墨子親士魯祝以一豚祭而求百福於鬼神子墨子聞之曰是不可今施人薄而望人厚則人唯恐其有賜於已也今以一豚祭而求百福於鬼神唯恐其以牛羊祀也墨子魯問或曰千金之家其子不仁人之急利甚也桓公五伯之上也爭國而殺其兄其利大也韓非子難四夫増髙者崩貪富者致患河上公註老子道化臣笑臣隣之祠田也以奩飯與一鮒魚其祝曰下田洿邪得榖百車蟹堁者宜禾臣笑其所以祠者少而所求者多説苑復恩臣笑臣隣之祠田也以一奩飯一壺酒三鮒魚祝曰蟹堁者宜禾洿邪者百車傳之後世洋洋有餘臣笑其賜鬼薄而請之厚也説苑尊賢張騫言大苑之天馬汗血安息之真玉大烏縣官既聞如甘水焉鹽鐵論西域經棗整冠意盈不厭焦氏易林解之賁吕不韋之盗穿窬之雄乎穿窬也者吾見擔石矣未見雒陽也揚子淵騫次四夷其牙或飫之徒測曰夷其牙食不足嘉也太𤣥經第二夷次七離如婁如赤肉鴟鴞厲測曰離婁赤肉食不臧也太𤣥經第五沈次五雕鷹髙翔沈其腹好􅦋懐惡粥余六切測曰雕鷹髙翔在腐糧也太𤣥經第五沈齧骨折齒大貪利也太𤣥經第六闕天之制此財也猶國君之有府庫也賦賞奪與各有衆寡民豈得彊取多哉故人有無徳而富貴是凶民之竊官位盜府庫者也終必覺覺必誅矣盜人必誅况乃盜天乎得無受禍焉濳夫論遏利佞人知行道可以得富貴必以佞取爵祿者不能禁欲也知力耕可以得榖勉貿可以得貨然而必盜竊情欲不能禁者也王充論衡答佞篇夫佞與賢者同材佞以情自敗偷盜與田商同知偷盜以欲自劾也王充論衡答佞篇鳶鴟也不善摶擊貪於攫肉也張華註禽經非有通變藐世之才而偷安乎一時之利者皆豕蝨者也郭子註莊徐無鬼禁民酤釀獨官開置如道路設木為榷獨取利也前漢書註武帝紀禁閉其事總利入官而下無由以得有若渡水之𣙜前漢書註武帝紀楚王謂淳于髠曰吾有仇在呉子寜能為吾報之乎對曰臣見來道旁野民持一頭魚上田祝曰髙得萬束下得千斛臣竊笑之以為禮薄而望多也藝文類聚鱗介部魚南州異物志曰俚人不愛骨肉而貪寳貨見賈人財物牛犢便以子易之太平御覽人事部貪齊有一女二家求之其家語其女曰汝欲東家則左袒欲西家則右袒其女兩袒父母問其故對曰願東家食而西家息以東家富而醜西家貧而美也太平御覽人事部美婦人魏文矦見宋陵子三仕不碩文矦曰何貧子曰王見楚富者牧羊九十九而願百嘗訪邑里故人其鄰人貧有一羊富者拜之曰吾羊九十九今君之一盈我成百則牧數足矣隣者與之從此觀之焉富者非富貧者非貧也太平御覽獸部羊齊魯爭汶陽之田魯侯有憂色魯有𨼆者周豐往規曰臣嘗晝寢愀然聞羣蝨之鬭乎衣中甘臣膏腴之肌珍臣項膂之膚相與樹黨爭之日夜不息相殺者太半蝨父止之曰我與爾所慮不過容口奚用竊爭交戰為哉羣蝨止今君以七百里地為君之臣亦以足矣而以汶陽數歩之田惑君之心曽不如一蝨之知竊謂君羞之魯矦曰善太平御覽蟲豸部蚤又如蒼蠅而愛腐臭性之所便無由自改玉清經通濟幽冥品如蜂止華愛樂戀著唼吮華味以自資養蜂棄此華更處餘華或棄香入臭或棄臭入香随其所在莫不自愛戀結貪著大乗顯識經推三人心著欲無有厭足如火得薪如海吞流如頂生王雖雨七寳王四天下帝釋分座猶不知足三昧法門經卷六汝心所作常求果報猶如獼猴入於稠林本縁經毗羅摩品天雨七寳欲猶無厭法句經利養品茍生無恥如鳥長啄法句經塵垢品如春熱渴牛求水不避杖突入清流中飲足乃還歸大莊嚴經論卷五偈譬如大蟒張口吐涎吸引諸物大乗莊嚴經論卷六如臭皮囊中金以貪金故不可棄於皮囊法苑珠林卷七十貪惑亦猶竊鐘掩耳以衆人為不聞鋭意盜金謂市中為莫覩故知貪於近者則遺遠溺於利者則傷名晉書宣帝紀夫國非其有也而欲有之可謂至貪也不能為人又無以自為可謂至愚矣譬白公之嗇也何以異於梟之愛其子也淮南子道應訓知脂蠟之可明燈也而不知其甚多則冥之知利之可娯已也不知其稱而必有也前人以病後人以競庶民之愚而衰闇之至也潛夫論遏利夫失志於韓而受其餽是猶魚之失水於淵而又吞其餌也受餽者傷于義吞餌者傷于舌其貪均也天禄閣外史辭受昔有一人貧窮困乏與他客作得鹿褐衣而披著之有人見之而語之言汝種姓端正貴人之子云何著此麄弊衣褐我今教汝當使汝得上妙衣服當随我語終不欺汝貧人歡喜敬從其言主人即便在前然火語貧人言今可脱汝鹿褐衣著於火中於此燒處當使汝得上妙欽服貧人即便脱著火中既燒之後於此火處求覓欽服都無所得百喻經卷上往昔世時有婦女人始有一子更欲求子問餘婦女誰有能使我重有子有一老母語此婦言我能使爾求子可得當湏祀天問老母言祀湏何物老母語言殺汝之子取血祀天必得多子時此婦女便随彼語欲殺其子傍有智人嗤笑罵詈愚癡無智乃至如此未生子者竟可得不而殺現子百喻經卷上昔者海邊有樹木數十里中有獼猴五百餘頭時海水上有聚沫髙數十丈像如雪山随潮而來住於岸邊諸獼猴見自相與語吾等上是山頭東西遊戲不亦樂乎時一獼猴便上頭徑下沒水底衆獼猴見怪乆不出謂沫山中快樂無極是以不來皆競踊跳入沫聚中一時溺死佛借以為喻海者謂生死海也沫山者五隂身也獼猴者人識神也不知五隂無所有愛欲癡者從是沒生死海莫有出期雜譬喻經下譬如餓狗慞惶緣路遇值璅骨乆無肉膩但見赤塗言是厚味便就銜之至多人處四衢道中以貪味故涎流骨上妄謂甜美或䶧或䑛或齧或吠歡愛纒附初無捨離時有刹帝利波羅門及諸長者皆大富貴來遊此路時此餓狗遙見彼來心生熱惱作如是念彼來人者將無奪我所重美味便於是人發大瞋恚出深毒聲惡眼邪視露現齒牙便行齧害法苑珠林卷九十貪昧太子友曰適游後園聞秋蜩之聲往而觀之夫秋蟬登髙樹飲清露随風撝撓長吟悲鳴自以為安不知螳螂超枝縁條曵腰聳距而稷其形夫螳蜋翕心而進志在有利不知黄雀盈緣林徘徊枝隂􅀈􅀈㣲進欲啄螳蜋夫黄雀但知伺螳蜋之有味不知臣挾彈危擲蹭蹬飛丸而集其背今臣但虚心志在黄雀不知空塪其旁闇忽埳中陷於深井臣故袷體濡履幾為大王取笑王曰天下之愚莫過於斯但貪前利不覩後患呉越春秋夫差内傳髙飛之鳥死於美食深泉之魚死於芳餌今欲伐呉必前求其所好參其所願然後能得其實呉越春秋勾踐隂謀外傳莊辛對楚襄王曰臣聞鄙語曰見兎而顧犬未為晚也亡羊而補牢未為遲也臣聞昔湯武以百里昌桀紂以天下亡今楚國雖小絶長續短猶以數千里豈特百里哉王獨不見夫蜻蛉乎六足四翼飛翔乎天地之間俛啄蚉䖟而食之仰承甘露而飲之自以為無患與人無爭也不知夫五尺童子方將調飴膠絲加已乎四仞之上而下為螻蟻食也黄雀因是以俯噣白粒仰棲茂樹鼔翅奮翼自以為無患與人無爭也不知夫公子王孫左挾彈右攝丸將加已乎十仞之上以其類為招晝游乎茂樹夕調乎酸鹹倐忽之間墜于公子之手夫雀其小者也黄鵠因是以遊乎江海淹乎大沼俯噣鱔鯉仰齧䔖蘅奮其六翮而凌清風飄揺乎髙翔自以為無患與人無爭也不知夫射者方將修其碆盧治其矰繳將加已乎百仞之上被㔋磻引㣲繳折清風而抎矣故晝遊乎江河夕調乎鼎鼐夫黄鵠其小者也戰國策楚項襄王夫虎肉臊其兵利身人猶攻之也若使澤中之麋蒙虎之皮人之攻之必萬之於虎裂楚之地足以肥國詘楚之名足以尊主今子將以欲誅殘天下之共主居三代之𫝊器吞三翮六翼以髙世主非貪而何史記楚世家且夫翠鵠犀象其處世非不遠死也而所以死者惑於餌也蘇秦智伯之智非不足以辟辱遠死而所以死者惑於貪利不止也史記蔡澤傳夫殺人而取其璧不知在已興累傾物而移其寵不忌自我難持宋書王革傳史臣祝宗人𤣥端以臨牢筴説彘曰汝奚惡死吾將三月㹖汝十日戒三日齊藉白茅加汝肩尻乎彫俎之上則汝為之乎為彘謀曰不如食以糠糟而錯之牢筴之中自為謀則茍生有軒冕之尊死得於腞楯之上聚僂之中則為之為彘謀則去之自為謀則取之所異彘者何也莊子達生莊周遊乎雕陵之樊覩一異鵲自南方來者翼廣七尺目大運寸感周之顙而集於栗林莊周曰此何鳥哉翼殷不逝目大不覩蹇裳躩歩執彈而留之覩一蟬方得美䕃而忘其身螳蜋執翳而摶之見得而忘其形異鵲從而利之見利而忘其真莊周怵然曰噫物固相累二類相召也捐彈而反走莊子山木無勇者非先懾也難至而失其守也貪婪者非先欲也見利而忘其害也虞公見垂棘之璧而不知虢禍之及已也故至道之人不可遏奪也淮南子繆稱訓天下縣官法曰發墓者誅竊盜者刑此執政之所司也夫法令者網其姦邪勒率随其蹤跡無愚夫惷婦皆知為姦之無脫也犯禁之不得免也然而不材子不勝其欲蒙死亡之罪而被刑戮之羞然而立秋之後司寇之徒繼踵於門而死市之人血流於路何則惑於財利之得而蔽於死亡之患也淮南子汜論訓臣園中有榆其上有蟬蟬方奮翼悲鳴欲飲清露不知螳蜋之在後曲其頸欲攫而食之也螳螂方欲食蟬而不知黄雀在後舉其頸欲啄而食之也黄雀方欲食螳螂而不知童挾彈丸在下迎而欲彈之童子方欲彈黄雀不知前有深坑後有窟也此皆言前之利而不顧後害者也非獨昆蟲衆庶若此也人主亦然韓詩外傳狗逐兎走俱入谷口與虎逢之廹不得去焦氏易林觀之垢越畝逐兎斷其褌襦焦氏易林遯之泰孩子含餌為利所悦探釡把甑爛其手臂焦氏易林家人之巽炙魚銅斗張伺夜䑕不忍香味機發為祟焦氏易林井之坎髙飛視下貪饕所在腐臭為患害於躬身焦氏易林震之渙魚鼈貪餌死於網釣受危因寵為身殃咎焦氏易林既濟之明夷梟愛養其子子長而食其母也白公愛荆國之財而殺其身也吕氏春秋分職觧狌狌之狀形乍如犬厥性識往為物警辯以酒招災自貽纓罥山海經海内南經圗讚彍弩危機嚴鏃銜弦至可忌也而勇雉觸之而不猜闇政亂邦惡直妬能甚難測也而貪人競之而不避故飛鋒暴集而不覺禍敗奄及而不振抱朴子篇廣譬無異乎犧牛之被紋繡淵魚之愛莽麥渇者之咨口於雲日之酒饑人之取飽於鬱肉漏脯也抱朴子外篇良規寒土有獸其名曰􅭼生角當心俯而磨之憤心而死炎州有鳥其名曰梟嫗伏其子百日而長羽翼既成食母而飛蜀矦之迎秦牛牛逾近而身轉危何異􅭼磨其角角逾利而身速亡乎白公之遽財財逾積而身愈滅何異梟之養子子愈長而身就害也劉子貪愛昔齊有貨美錦於市盜於衆中而竊之吏執而問曰汝何盜錦於衆中對曰吾但見錦不見有人故取之耳若斯人者眩於利而忘於害劉子利害黄口以貪餌而忘害故擒於羅者異鵲以見利而忘身且怵於莊周是以智者見利而思難闇者見利而忘患劉子利害耿弇曰懐金玉者至不生歸李善註文選鮑明逺行藥詩天寒即飛鳥走獸尚知相依周周銜羽以免顛仆蛩蛩負蟨以食美草而當路者知進趨不念暮歸所安為者惟夸譽名故致憔悴而心悲也李善註文選阮嗣宗詠懐詩厚味來殃豔色危身求髙反墜務厚更貧補文選下蘭座右銘𤣥鳥紆幙而不被害鳴隼逺巢咸以欲死盼彼梁魚逡廵倒尾沉吟不決忽焉失水廣文選董威輦答孫楚詩愛餌銜鈎悔在鸞刀披文食豢乃啓其毛藝文類聚人部嘲戲譬如黄雀伺蟬不知随彈應至青鸇逐兎詎識扛鼎方前藝文類聚内典部寺碑衆人之逐世利如青蠅之赴肉汁也青蠅嗜肉汁而忘溺死衆人貪世利而陷罪禍藝文類聚蟲豸部蠅論昔宋人臨萬仞之淵釣數寸之鱗魚將食釣不知膝之日進有傾堕而死能誘也太平御覽鱗介部魚六韜曰緡隆餌重則嘉魚食之緡調餌芳則庸魚食之埤雅品物門鱮譬如貨易齎持雜寳逺到他國種種貪求忽被賊傷喪其身命海空智藏經持誡品譬如大海彼岸之國多有甘露若有食者年得三千除諸病苦安穏快樂愚癡之人貪其味故裝治船舫往彼給取不知海中有大鱗魚能吞船舫海空智藏經持誡品猶如嶮處有草覆於岸邊多有甘露若有食者夀年千嵗永除諸病安穩快樂凡夫衆生貪其味故不知其下有深坑即前欲取不覺堕坑遂殞其命元陽妙經卷一譬如有人欲行遠路至於曠野以饑渇所逼忽值果林便入彼處求食因緣欲活命故而彼之人忽遇大樹華果充足香美成就遇已得味得是味已更上毒樹而服毒果服已命終虚空孕菩薩經卷下如蛾貪火光不避滅身難中隂經卷下如得酒病惛醉不醒乃至數刼猶不得覺酒消始悟金剛三昧經卷上財色之於人譬如小兒貪刀刃之蜜甜不足一食之美然有截舌之患也佛説四十二章經尺一昔有婆羅門家中巨富又乃耆年唯有一子年纔十六母即喪亡彼婆羅門不能鰥獨遂再婚聚未久之間妻乃有姙妻未生産其婆羅門尋亦命終於是其子白繼母言家中財物金銀珍寳乃至一切受用之具悉屬於我更無别人分我財物時彼繼母聞子語已即告子言我今所懐汝父遺體待其長育與汝均分其子時復再言其事母起思念此子年㓜情性癡騃雖與深言未能分曉又以貪惜欲疾娩身多設方便求於速産日月未滿返損其孕大正旬王經上若城失火中有富者為衆導師見舎燒壊貪於寳物不顧身命突前入火至寳藏篋邊有虺篋爾時導師既畏盛火烟熏其目心中憒憒不諦省察誤取虺篋挾之走出賊随後追逼之欲近則更思之我當解篋取中要者以著懷中置餘退去爾乃安隠則開篋視唯見毒虵乃知非寳是虵虺耳修行道地經觀品往有商人貸他半錢乆不得償即便往債前有大河雇他兩錢然後得度到彼往債竟不得見來還度河復度兩錢為半錢債而失四錢兼有道路疲勞之困所債甚少所失甚多果被衆人之所怪笑世人亦爾要少名利致毁大行茍容已身不顧禮義現受惡名後得苦報百喻經卷上昔有一乳母抱兒渉路行道疲極睡眠不覺時有一人持歡喜丸授與小兒小兒得已貪其美味不顧身物此人即時解其鉗鏁瓔珞衣物都盡持去百喻經卷下昔有一人遭事應死繫在牢獄恐死而逃走國法若有死囚踰獄走者即放狂象令蹈殺於是放狂象令逐此罪囚囚見象欲至走入墟井中下有一大毒龍張口向上復四毒蛇在井四邊有一草根此囚怖畏一心急捉此草根復有兩白䑕嚙此草根時井上有一大樹樹中有蜜一日之中有一滴蜜堕此人口中其人得此一滴但憶此蜜不復憶種種衆苦便不復欲出此井是故聖人借以為喻獄者三界囚衆生狂象者無常井衆生宅也下毒龍者地獄也四毒蛇者四大也草根者人命根也白䑕者日月也日月尅食人命日日損減無有暫住然衆生貪著世樂不思大患是故行者當觀無常以離衆苦衆經撰襍譬喻經財物危身猶如毒蛇無得貪著譬如昔日佛遊波斯匿王國中見地有伏藏滿中寳物佛語阿難汝見是毒蛇不阿難言已見時有人随佛後行聞此語試往看之見有好寳嫌佛此語謂為虚綺此實是寳而言為毒蛇其人即時私將家人大小取此寳物其家大富有人向王言之此人随得寳藏而不輸官王即收繫責其寳物即時輸盡王故不信更多方拷治之痛毒備至衆經撰襍譬喻經昔時有二獼猴王各主五百獼猴一王起嫉妬意欲殺一王規圗獨治便往共鬭數數不如羞慚退去到大海邉海曲之中有水聚沫風吹積聚髙數百丈獼猴王愚癡謂是雪山語羣輩言乆聞海中有大雪山其中快樂甘果恣口今日乃見吾當先到往行看視若審樂者不能復還若不樂者當來語汝於是上樹盡力跳騰投聚沫中溺沒海底餘者怪之不出謂必大樂一一投中斷羣溺死法句譬喻經卷三地獄品如蠅堕蜜得味甚寡所失甚多無明羅刹經世間極渇無過於愛如飲鹹水逾増其渇飲有鹹水逾増其愛無明羅刹經譬如愚人貪著好果上樹食之不肯時下人伐其樹樹傾乃堕身首毁壊痛惱而死大智度論卷十七亦如網羅襁魚獸貪其味不見後苦患大莊嚴經論卷二偈曽聞舍衛國中佛與阿難曠野中行於一田畔見有伏藏佛告阿難是大毒蛇阿難白佛是惡毒蛇爾時田中有一耕人聞佛阿難説有毒蛇作是念言我當視之沙門以何為惡毒蛇即往其所見真金聚而作是言沙門所言是毒蛇者乃是好金即取此金還置家中其人先貧衣食不供以得金故轉得富饒衣食自恣王家筞伺怪其卒富而糺舉之繫其獄中先所得金既已用盡猶不得免將加刑戮其人唱言毒蛇阿難惡毒蛇世尊傍人聞之以狀白王王喚彼人而問之曰何故唱言毒虵阿難惡毒虵世尊其人白王我於往日在田耕種聞佛阿難説言毒虵是惡毒虵我於今者方及悟解實是毒虵大莊嚴經論卷六譬如嬰孩者捉火欲食之如魚吞鉤餌如鳥網所覆諸獸墜穽陷皆由貪味故大莊嚴經論卷七偈喻林卷五十三
