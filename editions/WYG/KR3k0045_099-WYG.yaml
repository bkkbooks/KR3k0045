body:
  text: 喻林卷九十九明徐元太撰政治門四賞罰火在天上大有君子以遏惡揚善順天休命易大有訟言終朝晉言一書俱不盡一日明黜陟之速所以示懲勸也周易正義晉天有命有禍有福人有醜有紼絻有斧鉞以人之醜當天之命以紼絻當天之福以斧鉞當天之禍汲冢周書命訓解明主醲於用賞約於用刑後漢書馬援傳受堯誅者不能無怨受桀賞者不能無慕此人情也呉志孫晧傳註懸爵於朝而有功者必縻其賞懸刑於市而有罪者必罹其辜魏書髙祖上紀治斧鉞者不敢讓刑治軒冕者不敢讓賞墳然若一父子若一家之實義禮明也管子君臣下春夏生長秋冬收藏四時之節也賞賜刑罰主之節也四時未嘗不生殺也主未嘗不賞罰也管子形勢解王者刑九賞一強國刑七賞三削國刑五賞五商子去強明君之行賞也曖乎如時雨百姓利其澤其行罰也畏乎如雷霆神聖不能解也韓非子主道善之生如春惡之死如秋故民勸極力而樂盡情韓非子守道賞罰之為道利器也君固握之不可以示人若如臣者猶獸鹿也惟薦草而死韓非子内儲說上賞罰者利器也君操之以制臣臣得之以擁主故君先見所賞則臣鬻之以為德君先見所罰則臣鬻之以為威故曰國之利器不可以示人韓非子内儲說下延陵卓子乘蒼龍桃文之乘鉤飾在前錯錣在後馬欲進則鉤飾禁之欲退則錯錣貫之馬因旁出造父過而為之泣涕曰古之治人亦然矣夫賞所以勸之而毁存焉罰所以禁之而譽加焉民中立而不知所由此亦聖人之所為泣也韓非子外儲說右夫必恃自直之箭百世無矢恃自圜之木千歲無輪矣自直之箭自圜之木百世無有一然而世皆乘車射禽者何也隠括之道用也雖有不恃隠括而有自直之箭自圜之木良工弗貴也何則乘者非一人射者非一發也不恃賞罰而恃自善之民明主弗貴也何則國法不可失而所治非一人也韓非子顯學武王問太公望曰吾欲少間而極用人之要望對曰賞如山罰如谿尉繚子兵教民無道知天民以四時寒暑日月星辰之行知天四時寒暑日月星辰之行當則諸生有血氣之類皆為得其處而安其産人臣亦無道知主人臣以賞罰爵禄之所加知主主之賞罰爵禄之所加者宜則親疎逺近賢不肖皆盡其力而以為用矣吕氏春秋當賞夫登山而視牛若羊視羊若豚牛之性不若羊羊之性不若豚所自視之勢過也而因怒於牛羊之小也此狂夫之大者狂而以行賞罰此戴氏之所以絶也吕氏春秋壅塞為君虛心靜處聰聽其響明視其形以行賞罰之象其行賞罰也響清則生清者榮響濁則生濁者辱影正則生正者進影枉則生枉者絀春秋繁露保位權人君秋賞則溫夏罰則寒王充論衡感虚篇夫賞罰之於萬民猶轡䇿之於駟馬也轡策不調非徒遲速之分也至於覆車而摧轅賞罰之不明也則非徒治亂之分也至於滅國而喪身可不慎乎徐幹中論賞罰天地之道不能純仁故青陽闡陶育之和素秋厲肅殺之威融風扇則枯瘁攄藻白露凝則繁英彫零是以品物阜焉歲功成焉溫而無寒則蝡動不蟄根植冬榮寛而無嚴則姦宄並作利器長守故明賞以存正必罰以閑邪勸沮之器莫此之要抱朴子外篇用刑毫釐蹉於機則尋常違於的與奪失於此則善否亂於彼邪正混侔則彞倫攸斁功過不料則庶績以崩故明君賞猶春雨而無霖淫之失罰擬秋霜而無詭時之嚴抱朴子外篇廣譬二儀不能廢春秋以成嵗明主不能舎刑德以致治抱朴子外篇廣譬賞罰者國之利器而制人之柄也故天以晷數成嵗國以法敎為治晷運於天則時成於地法動於上則治成於人晷之運也先春後秋法之動也先賞後罰劉子賞罰温風發春所以動萌華也寒露降秋所以殞茂葉也明賞有德所以勸善人也顯罰有過所以禁下姧也劉子賞罰賞信而罰明則萬人從之若舟之循川車之遵路亦奚向而不濟何行而弗臻矣劉子賞罰春秋不以善惡殊其彫榮人君不以貴賤革其賞罰文選陸士衡連珠註無賞罰之君而欲世治猶不事梳櫛而求髪治不可得也意林正論行賞不洽於人是春半半生也行罰不威是秋半半死也半生之春不洽於人半死之秋不專於義太平御覧治道部賞賜嵗為善星不福無道火為罰星不罰有德困學紀聞卷六春秋號令天下有風姤后以施命誥四方易姤隨風㢲君子以申命行事易㢲九五渙汗其大號渙王居无咎易渙民之犯令告之已終更復從始告之慇勤不已若天之行四時既終更復從春為始周易正義蠱甲為十日之首創造之令為在後諸令之首故以創造之令謂之為甲故漢時謂令之重者謂之甲令周易正義蠱或宣威以肅震曜或敷和而散風雨得之則百度惟貞失之則千里斯謬樞機之發榮辱之主絲綸之動不可不慎尚書正義序天無大雨則歲不熟而幼弱者饑猶國之無政令則天下民困病矣鄭氏箋詩候人召南大夫以王命施號令於四海猶靁殷殷然發聲於山之陽鄭氏箋詩殷其靁言殷殷然靁聲在南山之陽以喻君子行號令在彼逺方之國毛氏正義殷其靁雨從上而下於地猶敎令從王而下於民而王之敎令衆多如雨然事皆苛虐情不恤民而非所以為政敎之道故作此詩以刺之名之曰雨無正毛詩正義雨無正風氣動聖人以宣號令三墳氣墳夫水激而流渠令疾而物重先王理其號令之徐疾内守國財而外因天下矣管子地數天以時為權地以財為權人以力為權君以令為權管子山權數父之於子也令有必行者有必不行者去貴妻賣愛妾此令必行者也因曰汝無敢恨汝無敢思令必不行者也故為人上者必慎所令尹文子大道下家君發憲布令其家曰若見愛利家者必以告若見惡賊家者亦必以告若見愛利家以告亦猶愛利家者也上得且賞之衆聞則譽之若見惡賊家不以告亦猶惡賊家者也上得且罰之衆聞則非之是以徧若家之人皆欲得其長上之賞譽辟其毁罰是以善言之不善言之家君得善人而賞之得暴人而罰之善人之賞而暴人之罰則家必治矣然計若家之所以治者何也唯以尚同一義為政故也家既已治國之道盡此已邪則未也國之為家數也甚多此皆是其家而非人之家是以厚者有亂而薄者有爭故又使家君總其家之義以尚同於國墨子尚同下言不相聞故為之金鼔視不相見故為之旌旗夫金鼓旌旗者所以一人之耳目也孫子軍争奔車之上無仲尼覆舟之下無伯夷故號令者國之舟車也安則智㢘生危則爭鄙起韓非子安危且父母之所以求於子也動作則欲其安利也行身則欲其逺罪也君上之於民也有難則用其死安貧則盡其力親以厚愛闗子於安利而不聽君以無愛利求民之死力而令行韓非子六反舜使吏決鴻水先令有功而舜殺之禹朝諸侯之君㑹稽之上防風之君後至而禹斬之以此觀之先令者殺後令者斬則古者必貴如令矣韓非子飾邪呉起與秦戰未合一夫不勝其勇前獲雙首而還呉起立斬之軍吏諫曰此材士也不可斬起曰材士則是矣非吾令也斬之尉繚子武議君者民之心也民者君之體也心之所好體必安之君之所命民必從之春秋繁露為人者天地號令發而萬物生焉雷風行而四方齊也京氏易傳上鼓舞萬物者其雷風乎鼓舞萬民者其號令乎雷不一風不再揚子先知言風起而草木之類搖動君令下而百姓之化行也王逸註楚辭九章觀號振振音眞醜甡甡音萃森朱于􅀢音莽飍音休盪他浪切于垠傳曰號振振令之發也醜甡甡衆之多也森朱于􅀢木之茂也飍盪于垠風之行也昔王由是施乃令布乃下以省爾萬方以化爾兆民俾風敎大行臮音暨率土咸順元包太陽天以雷風鼓舞萬物君以號令制御萬民揚子法言註先知篇風者天之號令雲雨者天之膏澤故聲敎與風皆翔恩澤與雲俱行李善註文選東京賦易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也補文選劉向災異封事魯燒積澤天北風火南倚恐燒國哀公懼自將衆趣救火左右無人盡逐獸不救火乃召問仲尼仲尼曰夫逐獸者樂而無罰救火者苦而無賞此火所以不救也事急不及以罰救火者盡賞之則舉國不足以賞於民請從行罰乃下令曰不救火者比降北之罪令下未遍火已滅矣藝文類聚火部火蔡邕封事曰風者天之號令所以敎人玉海天文天文書上雷動物之氣也雷之發聲猶人君出政敎以動國中之人也玉海周易鄭康成注禮樂樂之隆非極音也食饗之禮非致味也清廟之瑟朱絃而疏越壹唱而三歎有遺音者矣大饗之禮尚𤣥酒而俎腥魚大羮不和有遺味者矣禮記樂記土敝則草木不長水煩則魚鼈不大氣衰則生物不遂世亂則禮慝而樂淫禮記樂記禮云禮云玉帛云乎哉樂云樂云鐘鼔云乎哉論語陽貨清廟之瑟朱絃而疏越一唱而三歎有進乎音者矣大饗之禮上𤣥尊而俎生魚大羮不和有進乎味者矣故先王之制禮樂也非特以歡耳目極口腹之欲也將敎民平好惡行禮義也吕氏春秋適音有虞氏之祀其社用土祀中霤葬成畞其樂咸池承雲九韶其服尚黄夏后氏其社用松祀戶葬牆置翣其樂夏籥九成六佾六列六英其服尚青殷人之禮其社用石祀門葬樹松其樂大濩晨露其服尚白周人之禮其社用栗祀竈葬樹栢其樂大武三象棘下其服尚赤禮樂相詭服制相反然而皆不失親疎之恩上下之倫淮南子齊俗訓天生之以孝悌地養之以衣食人成之以禮樂三者相為手足合以成體不可一無也春秋繁露立元神聖人之治天下也礙諸以禮樂無則禽異則貉楊子問道或曰太古塗民耳目惟其見也聞也見則難敝聞則難塞曰天之肇降生民使其目見耳聞是以視之禮聽之樂如視不禮聽不樂雖有民焉得而塗諸楊子問道禮兵之紀也樂兵之精也其紀如梯其精如醴故禮以制其容樂以導其氣天禄閣外史問兵經營宫室立城郭然後知幹楨之能有所立也建宗廟立社稷然後知禮樂之能有所成也楊子法言注五百篇弓良在㯳格人良在禮樂楊子法言注五百篇渡大海在舟船興大治在禮樂楊子法言注寡見篇齊禮上天下澤履君子以辯上下定民志易履生之樂之則母之禮也政之敎之遂以成之則父之禮也父母之禮以加于民汲冢周書本典解相鼠刺無禮也毛詩相鼠野有死麕惡無禮也毛詩野有死麕桑扈刺幽王也君臣上下動無禮文焉毛詩桑扈蒹葭刺襄公也未能用周禮將無以固其國焉毛詩蒹葭芄蘭刺惠公也驕而無禮大夫刺之毛詩芄蘭大車刺周大夫也禮義陵遲男女淫奔故陳古以刺今大夫不能聽男女之訟焉毛詩大車柯斧柄也禮義者亦治國之柄毛詩伐柯注媒所以用禮也治國不能用禮則不安毛詩伐柯註楊木之舟浮於水上汎汎然東西無所定舟人以紼繫其緌以制行之猶諸侯之治民御之以禮法鄭氏箋詩采菽匏有苦葉不可食濟有深渉不可渡以興禮有禁法不可越毛詩正義匏有苦葉若過深水則厲淺水則褰衣過水隨宜期之必渡以興用禮當隨豐儉之異若時豐則禮隆時儉則禮殺遭時制冝不可無禮若其無禮将無以自濟毛詩正義匏有苦葉蒹葭之草蒼蒼然雖盛未堪家用必待白露凝戾為霜然後堅實中用嵗事得成以興秦國之民雖衆而未順徳教必待周禮以教之然後服從上命國乃得興毛詩正義蒹葭鸚鵡能言不離飛鳥猩猩能言不離禽獸今人而無禮雖能言不亦禽獸之心乎夫惟禽獸無禮故父子聚麀是故聖人作為禮以教人禮記曲禮上夫禮者自卑而尊人雖負販者必有尊也而况富貴乎禮記曲禮上故禮之於人也猶酒之有蘖也君子以厚小人以薄禮記禮運經禮三百曲禮三千其致一也未有入室而不由户者禮記禮器禮也者猶體也體不備君子謂之不成人設之不當猶不備也禮記禮器誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝毋輕議禮禮記禮器曾子曰周禮其猶醵與禮記禮器禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圎也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓君子審禮不可誣以奸詐禮記經解夫禮禁亂之所由生猶坊止水之所自來也故以舊坊為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患禮記經解室而無奥阼則亂於堂室也席而無上下則亂於席上也車而無左右則亂於車也行而無隨則亂於塗也立而無序則亂於位也禮記仲尼燕居君子之道辟則坊與坊民之所不足者也人為之坊民猶踰之故君子禮以坊德刑以坊淫命以坊欲禮記坊記醴酒在室醍酒在堂澄酒在下示民不淫也禮記坊記君不稱天大夫不稱君恐民之惑也詩云相彼盍旦尚猶患之禮記坊記月者三日則成魄三月則成時是以禮有三讓建國必立三卿禮記鄉飲酒義猶襄陵之浸修隄防以制之􅀢方用切駕之馬設銜䇿以驅之故乃上法圓象下參方載道之以德齊之以禮禮記正義序人君治國須禮如巧匠治物執斤斧之柄禮記正義禮運禮義以為器可耕於人情人情得禮義之耕如田得耒耜之耕也禮記正義禮運農夫之田用耒耜以耕之和其剛柔聖人以禮耕人情正其上下禮記正義禮運視鼠有其形體人亦有其形體鼠無禮故賤人有禮故貴若人而無禮何異於鼠鼠之無禮不能損害人之無禮傷害更多禮記正義禮運人情備德由於有禮譬如竹箭四時蔥翠由於外有筠也禮記正義禮器禮之於政如熱之有濯也濯以救熱何患之有左傳襄公三十一年男子之䞇羔鴈雉腒婦人之䞇棗栗鍛修榖梁莊公二十四年怠慢於禮則政無車無車則政不行春秋正義襄公二十一年閨門之内具禮矣乎嚴父嚴兄妻子臣妾猶百姓走役也孝經治國而無禮譬猶瞽之無相倀倀乎何所之譬猶終夜有求於幽室之中非燭何以見故無禮則手足無所措耳目無所加進退揖讓無所制孔子家語論禮夫寒熱晦明所以為歲尊卑奢儉所以為禮故以晦明寒暑之氣尊卑侈約之禮為其節也後漢書荀淑子史傳夫勇多則弑其君力多則弑其長然而不敢者維禮之謂也禮者所以御民也轡者所以御馬也晏子春秋諫上文禮之野與禽獸同則言語之暴與蠻夷同謂鶡冠子著希水行者表深使人無陷治民者表亂使人無失禮者其表也先王以禮表天下之亂今廢禮者是去表也荀子大略繩墨誠陳矣則不可欺以曲直衡誠縣矣則不可欺以輕重規矩誠施矣則不可欺以方圓君子審於禮則不可欺以詐偽故繩者直之至衡者平之至規矩者方圓之至禮者人道之極也荀子禮義公輸不能加於繩聖人莫能加於禮荀子法行禮者人主之所以為羣臣寸尺尋丈檢式也人倫盡矣荀子儒效篇人之所以為人者非特二足無毛也以其有辨也今夫猩猩形笑亦二足而毛也然而君子啜其羮食其胾故人之所以為人者非特以其二足而無毛也以其有辨也荀子非相篇尋常之室無奥剽之位則父子不别六尺之輿無左右之義則君臣不明尋常之室六尺之輿處無禮即上下蹐逆父子悖亂而况其大者乎賈子新語禮螈蠶一嵗再收非不利也然而王法禁之者為其殘桑也離先稻熟而農夫耨之不以小利傷大穫也家老異飯而食殊器而享子婦跣而上堂跪而斟羮非不費也然而不可省者為其害義也待媒而結言聘納而娶婦紱絻而親迎非不煩也然而不可易者所以防淫也淮南子泰族訓在天者莫明乎日月在地者莫明乎水火在人者莫明乎禮義故日月不髙則所照不逺水火不積則灮炎不博禮義不加乎國家則功名不白故人之命在天國之命在禮韓詩外傳河決若甕口而破千里況禮決乎其所害必多矣鹽鐵論申韓堤坊成而民無水菑禮義立而民無亂患故禮義壞堤坊決所以治者未之有也鹽鐵論論誹夫禮讓爲國者若江海流彌久不竭其本羙也茍爲無本若蒿火㬥怒而無繼其亡可立而待鹽鐵論誅秦或問太古德懐不禮懐嬰兒慕駒犢從焉以禮曰嬰犢乎嬰犢母懐不父懐母懐愛也父懐敬也獨母而不父未若父母之懿也揚子間道允治天下不待禮文與五敎則吾以黄帝堯舜爲疣贅揚子問道篇見弓之張兮弛而不失其良兮曰檠之而已矣川有防器有範見禮敎之至也經營然後知幹楨之克立也揚子五百或問禮難以彊世曰難故彊世如夷俟倨肆羈角之哺果而㗖之奚其彊揚子五百篇次四牽羊示于叢社執圭信其左股野測曰牽羊于叢不足勞也太元經第五聚使童子變孟賁之意孟賁怒之童子操刃與孟賁戰童子必不勝力不如也孟賁怒而童子修禮盡敬孟賁不忍犯也王充論衡非韓篇天秩有不遷之常尊無禮猶犯遄死之重刺是以𤣥洲之禽獸雖能言而不得厠貴甡蛩蛩之負蹷雖寄命不得爲仁義抱朴子外篇博喻葢人之有禮猶魚之有水矣魚之失水雖暫假息然枯糜可必待也人之棄禮雖猶靦然而禍敗之階也抱朴子外篇譏惑無禮則國不立故謂之幹無敬則禮不行故比之於輿前漢書註五行志川防禁溢器範檢形以喻禮敎人之防範也楊子法言註五百篇貪者難爲惠苛煩者難爲恭君子以禮而已矣太平御覽人事部貪人之所以貴者以其節也人而無禮者其獼猴乎雖人象而蟲質也初學記獸部猴註禮若亢鋸之柄亢舉也禮有所斷割猶舉鋸之柄以斷物也困學紀聞卷十諸子和樂雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考易豫清明象天廣大象地終始象四時周還象風雨禮記樂記歌者上如抗下如隊曲如折止如槀木倨中矩句中鉤纍纍乎端如貫珠禮記樂記歌者在上匏竹在下貴人聲也禮記郊特牲善樂感人則人化之爲善惡樂感人則人隨之爲惡是樂出於人而還感人猶如雨出於山而還雨山火出於木而還燔木禮記正義樂記治國雖聚仁若不奏樂和之則仁心不堅如農夫雖聚穀而不食則甘穀空失也禮記正義禮運聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁大小短長疾徐哀樂剛柔遲速髙下出入周疏以相濟也君子聽之以平其心左傳昭公二十年端如貫珠清同叩玉史記樂書知聲而不知音者禽獸是也知音而不知樂者衆庶是也惟君子爲能知樂史記樂書亦各一世之化度時之樂何必華山之騄耳而後行逺乎史記樂書夫治國家而弭人民又何爲乎絲桐之間騶忌子曰夫大弦濁以春溫者君也小絃廉折以清者相也攫之深而醳之愉者政令也鈞諧以鳴大小相益囘邪而不相害者四時也夫復而不亂者所以治昌也連而徑者所以存亡也故曰琴音調而天下治史記田完世家昔諸侯倦於聽治息於鐘鼓之樂士大夫倦於聽治息於竽瑟之樂農夫春耕夏耘秋斂冬藏息於聆正之樂今夫子曰聖王不爲樂此譬之猶馬駕而不稅弓張而不弛無乃非有血氣者之所不能至邪墨子三辯樂之有情譬之若肌膚形體之有情性也有情性則必有性養矣呂氏春秋侈樂世之人主多以珠玉戈劒爲寳愈多而民愈怨國人愈危身愈危累則失寳之情矣亂世之樂與此同呂氏春秋侈樂爲木革之聲則若雷爲金石之聲則若霆爲絲竹歌舞之聲則若譟以此駭心氣動耳目揺蕩生則可矣以此爲樂則不樂呂氏春秋侈樂耳之情欲聲心不樂五音在前弗聽目之情欲色心弗樂五色在前弗視鼻之情欲芬香心弗樂芬香在前弗嗅口之情欲滋味心弗樂五味在前弗食欲之者耳目鼻口也樂之弗樂者心也呂氏春秋適音民至於焦脣沸肝有今無儲而乃始撞大鐘擊鳴鼓吹竽笙彈琴瑟是猶貫甲胄而入宗廟被羅紈而從軍旅失樂之所由生矣淮南子主術訓夫樂至于娯心而後和和而後化干羽格苗鳳皇儀韶淫魚聽瑟孟嘗泣琴豈耳目所能感哉天禄閣外史樂論和之以心暢之以八音如春陽之鼓萌蘖時雨之沐萬物此之謂娯心之樂天禄閣外史樂論夫樂本心術故響浹肌髓先王慎焉文心雕龍樂府聲之慷慨如壯士澎濞波浪相激之聲李善註文選洞簫賦夫咸池六英所以陳清廟恊神人也鄭衞之樂所以娯密坐接歡欣也文選舞賦夫其悽唳辛酸嚶嚶闗闗若離鴻之鳴子也含㗅嘽諧雍雍喈喈若羣雛之從母也文選笙賦和聲之感人心亦猶酒醴之發人情也廣文選嵇叔夜聲無哀樂論音聲之作其猶臭味在於天地之間其善與不善雖遭遇濁亂其體自若而不變也豈以愛憎易操哀樂改度哉廣文選嵇叔夜聲無哀樂論假使鹿鳴重奏是樂聲也而今慼者遇之雖聲化遲緩但當不能使變令歡耳何得更以哀耶猶一爝之火雖未能溫一室不宜復増其寒矣夫火非隆寒之物樂非增哀之具也廣文選嵇叔夜聲無哀樂論桓溫問孟嘉曰聽伎絲不如竹竹不如肉何謂也答曰漸近自然事文類聚歌黃帝㑹羣臣於太山作清角之音似兩鳳之雙鳴若二龍之齊吟如丹蛇之翹首似雄雉之帶矢太平御覽兵部角孔子至齊郭門之外遇一嬰兒擊一壺相與俱行其視精其心端孔子謂御曰趣駈之韶樂方作故樂不獨自樂又以樂人非獨以自正也又以正人太平御覽樂部雅樂下簫韶者舜之遺音也溫潤以和似南風之至其為音如寒暑風雨之動物如物之動人雷動禽獸風雨動魚龍二儀動君子財色動小人太平御覽皇王部帝舜有虞氏伊耆有葦籥之音伏羲有網罟之詠葛天八闋神農五絃事與功偕其來尚矣玉海音樂樂唐虞之世樵夫牧豎擊轅中韶感於和也班固集擊轅相杵亦足樂也曹子建書擊轅之歌有應風雅困學紀聞卷十七評文喻林卷九十九
