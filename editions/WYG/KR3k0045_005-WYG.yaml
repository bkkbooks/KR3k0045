body:
  text: 喻林卷五明徐元太撰人事門三類應順道吉從逆凶吉凶之報若影之隨形響之應聲孔氏傳書大禹謨喓喓然為聲而鳴者草蟲也聞此草蟲之鳴趯趯然跳躍而從之者阜螽也以喻赫赫然有德而盛者南仲也聞南仲之將徃嚮望而美之者近西戎之諸侯也言阜螽之從草蟲天性然也西方諸侯之美南仲事勢然也毛詩正義出車天下罪人逋逃者以紂為主集而歸之如魚入深淵獸奔藪澤也春秋正義昭公七年夫明闇之徵上亂飛鳥下動淵魚各以類推前漢書終軍傳女魃北而應龍翔洪鼎聲而軍容息溽暑至而鶉火棲寒水沍而黿鼉蟄後漢書張衡列傳鸛鳴臯垤則降陰吐雨騰蛇聳躍而沈雲鬱㝠宋書文九王建平傳視書上有酒者下必有肉上有年者下必有月以類而取之淮南子説林訓百物去其所與異而從其所與同故氣同則㑹聲比則應其驗皦然也試調琴瑟而錯之鼔其宮則他宫應之鼓其商而他商應之五音比而自鳴非有神其數然也春秋繁露同類相動君子潔其身而同者合焉善其音而類者應焉馬鳴而馬應之牛鳴而牛應之非知也其勢然也故新沐者必彈冠新浴者必振衣莫能以已之皭皭容人之混汙韓詩外傳同明相見同音相聞同志相從非賢者莫能用賢韓詩外傳鸞設於鑣和設於軾馬動而鸞鳴鸞鳴而和應行之節也説苑談叢風而識虎雲而知龍賢人作而萬類同太𤣥經太𤣥文叩宫而商應彈角而徵動王逸註楚辭七諫士為知己者死女為悅己者容馬為策己者馳神為通己者明武侯十六策察疑以形逐影以龍致雨雨應龍而來影應形而去天地之性自然之道也王充論衡寒温篇商風漂蕩本無興雲之候暗君政亂不能懷百姓之心至谷風習習必陰必雨明主在上則天下自安也李善註文選陸士衡演連珠夫草蟲鳴則阜螽躍雕虎嘯而清風起故絪緼相感霧涌雲蒸嚶鳴相召星流電激是以王陽登則貢公喜罕生逝而國子悲文選劉峻廣絶交論同音者相和兮同類者相似飛鳥號其羣兮鹿鳴求其友故叩宫而宫應兮彈角而角動虎嘯而谷風至兮龍舉而景雲徃廣文選東方曼倩哀命美事召美類惡事召惡類類之相應而起也如馬鳴則馬應之故以龍致雨以扇逐暑軍之所處生以棘楚美惡皆有從來也藝文類聚服飾部扇隱雷自天昆蟲已聽浮陰在漢柱礎先霑藝文類聚巧藝部圍棊一人執規拾手自負一人吹簫長短皆應太平御覽樂部簫舜云從道必吉反道必凶如影如響太平御覽皇王部帝舜有虞氏獐山物畫山者併畫獐龍水物畫水者併畫龍爾雅翼麕形精之動猶根本之與枝葉也黄帝素問内經五運行大論形動不生形而生影聲動不生聲而生響道德經指歸卷十二五藏皆有合病乆而不去者内舍於其合也故骨痺不已復感於邪内舍於腎筋痺不已復感於邪内舍於肝脉痺不已復感於邪内舍於心肌痺不已復感於邪内舍於脾皮痺不已復感於邪内舍於肺所謂痺者各以其時重感於風寒濕之氣也黄帝素問内經痺論猶如日影皆由於形形長影長形短影短形大影大形小影小形之巨細不得藏影海空智藏經序品猶如空處發起言聲非無響應由其響微不聞於耳海空智藏經序品又如形影形値斜光其影即長形値正光其影即短形不値光其影不見以是因縁形不為殊影則長短有無之異海空智藏經序品行惡得惡如種苦種法句經愛身品如影人去則去人動則動人住則住善惡業影亦如是大智度論巻六如母子身雖異而因縁相續故如母服藥兒病則差大智度論三十一譬如磁石雖不作意諸所有鐡來附於我瑜伽師地論六十善惡無爽狀麟鬭以日虧報應有歸等鯨亡而星現法苑珠林卷五十五自取九三需于泥致㓂至易需上九何校滅耳凶象曰何校滅耳聰不明也易噬嗑慢藏誨盗冶容誨淫易曰負且乘致㓂至盗之招也易繫辭上傳自下訟上悖逆之道故禍患來至若手自拾掇其物言患必來也周易正義訟隼之為鳥宜在山林集於人家高墉必為人所繳射以譬六三處於高位必當被人所誅討周易正義解惠迪吉從逆凶惟影響書大禹謨惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬書說命中虎之猛也而陷於獲人之智也而陷於詐汲冡周書周祝解防邑之中有鵲鳥之巢卭丘之上有美苕之草處勢自然以興宣公之朝有讒言之人亦處勢自然何則防多樹木故鵲鳥徃巢焉卭丘地美故㫖苕生焉以言宣公信讒故讒人集焉毛詩正義防有鵲巢諺有之曰心則不競何憚於病旣不能彊又不能弱所以斃也左傳僖公七年有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孔子曰小子聽之清斯濯纓濁斯濯足矣自取之也夫人必自侮然後人侮之家必自毁而後人毁之國必自伐而後人伐之孟子離婁上夫婚姻禍福之階也利内則福由之利外則取禍今王外利矣其無乃階禍乎國語周夫好船者溺好騎者堕君子各以其所好為禍越絶外傳記吳王占夢虎將卽禽禽不知虎之卽已也而相鬭兩罷而歸其死於虎故使禽知虎之卽已决不相鬭矣今山東之主不知秦之卽已也而尚相鬭兩敝而歸其國於秦智不如禽遠矣戰國策趙武靈王今夫鵠的非咎罪於人也便弓引弩而射之中者則善不中則愧少長貴賤則同心於貫之者何也惡其示人以難也今窮戰比勝而守必不㧞則是非徒示人以難也又且害人者也然則天下仇之必矣戰國策齊閔王人之饑所以不食烏喙者以為雖偷充腹而與死同患也今燕雖弱小強秦之少婿也王利其十城而深與強秦為讐今使弱燕為鴈行而強秦制其後以招天下之精兵此食烏啄之類也戰國䇿燕易王錯之𤨏材智小謀大旤如發機先冦受害前漢書叙傳下閨中容兢淖約兮相態以麗佳知衆嫭之嫉妒兮何必颺纍之蛾睂前漢書揚雄傳上白龍魚鱗網者食之别國洞㝠記猶昆蟲之相囓適足還害其身後漢書孔融列傳前車已覆襲軌而騖曾不見禍以知畏懼後漢書蔡邕列傳夫不有臭穢則蒼蠅不飛後漢書陳蕃列傳譬諸附子療饑酖毒止渴未入腹胃喉咽已絶豈可為哉後漢紀孝順夫松竹貞秀經寒暑而不衰榆柳虚撓盡一時而零落此草木之性修短之不同者也廉潔者必有貪濁之對剛毅者必遇強勇之敵此人事之對感時之不同者也咸自取之豈有為之者哉後漢紀孝桓上鸚鵡能言泗濵浮磬衆人所翫豈合物情𤣥鳥紆幙而不被害鳴集遠巢咸以欲死眄彼梁魚逡巡倒尾沈吟不决忽焉失水晉書董京傳甚愛必大費多獲必厚亡老子立戒人生於世或有事不遂志而宣言云不遇時者是無異負丹頸之罪俟時行戮豈不殆哉亢倉子訓道莊里丈人字長子曰盗少子曰毆盗出行其父在後遽呼之曰盗盗吏聞因縳之其父呼毆喻吏遽而聲不轉但言毆毆吏因毆之幾殪康衢長者字僮曰善搏字犬曰善噬賔客不過其門者三年長者怪而問之乃實對於是改之賔客徃復尹文子大道下丘所謂無病而自炙也疾走料虎頭編虎須幾不免虎口哉莊子盗跖質的張而弓矢至焉林木茂而斧斤至焉樹成蔭而衆鳥息焉醯酸而蚋聚焉故言有召禍也行有召辱也君子愼其所立乎荀子勸學彊自取柱柔自取束邪穢在身怨之所搆荀子勸學翟人有獻豐狐𤣥豹之皮於晉文公文公受客皮而歎曰此以皮之美自為罪夫治國者則以名號為罪徐偃王是也則以城與地為罪虞虢是也故曰罪莫大於可欲韓非子喻老夫善游者溺善騎者堕各以其所好反自為禍是故好事者未嘗不中爭利者未嘗不窮也淮南子原道訓聲自召也貌自示也名自命也文自官也無非己者操銳以刺操刃以擊自取之也其何怨乎人淮南子繆稱訓鐸以聲自毁膏燭以明自鑠虎豹之文來射猿狖之㨗來措故子路以勇死萇𢎞以智困能以智知而未能以智不知也淮南子繆稱訓山生金反自剥木生蟲反自食人生事反自賊淮南子說林訓母曰不幸甑終不墮井抽簪招燐有何為驚淮南子說林訓蘓秦步曰何故趨曰何趍馳有為則議多事固苛淮南子說林訓羊肉不慕螘螘慕於羊肉羊肉羶也醯酸不慕蚋蚋慕於醯酸淮南子說林訓魚鱉厭深淵而游於乾淺故得於釣網禽獸厭深山而下於都澤故得於田獵韓詩外傳徼幸者伐性之斧也嗜慾者逐禍之馬也謾誕者趨禍之路也毁於人者困窮之舍也韓詩外傳今之學者無太公之能騏驥之才有以蜂蠆介毒而自害也鹽鐵論訟賢晉文公時翟人有獻封狐文豹之皮者文公喟然歎曰封狐文豹何罪哉以其皮為罪也大夫欒枝曰地廣而不平財聚而不散獨非狐豹之罪乎說苑政理昔白龍下清冷之淵化為魚漁者豫且射中其目白龍上訴天帝天帝曰當是之時若安置而形白龍對曰我下清冷之淵化為魚天帝曰魚固人之所射也若是豫且何罪夫白龍天帝貴畜也豫且宋國賤臣也白龍不化豫且不射今棄萬乗之位而從布衣之士飲酒臣恐其有豫且之患矣說苑正諫憂夫肉自生蟲而還自食也木自生蠧而還自刻也人自興妖而還自賊也五鼎之具不當生藜藿人主堂廟不當生蒺藜說苑辨物強梁者不得其死好勝者必遇其敵盗怨主人民害其貴説苑敬愼鴻鵠保河海之中厭而欲移徙之小澤則必有弋繒之憂黿鼉保深淵厭而出之淺渚則必有羅網釣射之憂今君逐獸碭入至此何行之太遠也新序雜事二泥滓汙辱棄捐溝瀆焦氏易林屯之訟去辛就蓼毒愈酷甚避井入坑憂患日生焦氏易林觀之益倚鋒據㦸傷我胸臆焦氏易林坎之蒙禾生蟲蠧還自尅賊焦氏易林火壯之旣濟圍碁擊劍反自眩刑揚子問道篇若立巖牆之下動而徵病行而招死命乎命乎揚子問明篇次八夷其角厲測曰夷其角以威傷也太𤣥經第二夷上九郭其目䚩其角不庳其體􅡼測曰郭目䚩角還自傷也太𤣥經第二格上九太山㧞梁柱折其人顚且蹶測曰山㧞梁折終以猛也太𤣥經第三疆次七魁而顏而玉帛班而决欲收㓂測曰魁而顏而盗之招也太𤣥經第五積次八翡翠于飛離其翼狐鼦刁之毛躬之賊測曰翡翠狐鼦好作咎也太𤣥經第五視官府設陳富貴者値之布衣寓焉不符其爵獄犴若居有罪者觸之貞良入焉不受其罰也申鑒俗嫌象以齒焚身蚌以珠剖體匹夫無辜懷璧其罪濳夫論遏利弄刀者傷手打跳者傷足武侯十六策陰察鳥鳴之惡自取憎人言之惡自取滅曹子建令禽惡鳥論交氣疾爭者為易口而自毁也竝辭競詵者為貸手而自毆也劉邵人物志釋爭鸚鵡慧鳥棲林喙桑四指中分行則以觜自貽伊籠見幽坐趾山海經西山經圖讃牛充兵機兼之者旄冠于旌鼓為軍之摽匪肉致災亦毛之招山海經北山經圖讃道家言枉煞人者是以兵刃而更相煞其取非義之財不避怨恨譬若以漏脯救饑鴆酒解渴非不暫飽而死亦及之矣抱朴子内篇㣲㫖准的陳則流鏑赴焉美名起則􅉪讟攻焉瑰貨多藏則不招怨而怨至矣器盈志驕則不召禍而禍來矣抱朴子外篇廣譬斯乃招患之旌召害之符傳非之驛傾身之車也豈徒减其方策之令聞虧其沒世之德音而已哉抱朴子外篇疾謬匹夫枉死於懷璧豐狐召災以美皮抱朴子外篇安貧木生斧柄還自伐膏起火還自消莊子音義人間世堯舜不易日月而興桀紂不異星辰而亡天道不改而人道易也李善註文選任彦昇宣德皇后令海鳥鵎鶋避風而至條枝巨雀踰嶺自致提挈萬里飄颻逼畏夫唯體大妨物而形瓌足瑋也文選鷦鷯賦前車已摧後鑾不息乗危以庶安行險而徼幸於是有顚墜覆亡之禍殘生夭命之釁廣文選傅季友演愼論卑牆來盗榮辱由中出敬侮由外生意林尸子天下之強者東海之惡燋焉水灌而不已惡燋者山名也在東海南方三萬里海水灌之而即消藝文類聚水部海水肉腐出蟲魚枯生蠧太平御覽蟲豸部蟲方周之興大姒夢商之庭産棘小子發取周庭之梓植之于闕間梓化為松柏柞棫覺驚以告文王文王曰勿言冬日之陽夏日之陰不召而物自來爾雅翼柞符子曰木生蝎蝎盛而木枯石生金金曜而石流事類賦木部木註空閱一作門來風桐乳致巢此以其能苦其性者困學紀聞卷十諸子夫天之生風者非以私百姓也其行公平正直犯者得之避者得無殆非求人而人自犯之黄帝素問靈樞經五變風雨寒熱不得虚邪不能獨傷人卒然逢疾風㬥雨而不病者蓋無虚故邪不能獨傷人此必因虚邪之風與其身形兩虚相得乃客其形黄帝素問靈樞經百病始生夫火生於木火發而木焚國生於姦姦深則國亂亦猶蠶能作繭繭成則殺其身人能生事事煩則害其命天機經人如蛾狥明自取焦滅玉清經通濟幽㝠品如阿耨達池水本一味德人用之則有種種㣲妙甘味薄德人用其味則一麄惡不美大方等大集經十八如樹果繁速自害竹蘆結實亦如是如騾懐妊自䘮身無智求利亦復然大集月藏經卷二偈譬如畫師自畫鬼神像還自復恐怖佛遺日摩尼寶經推六如人為樂入海遭種種難為樂入陣箭如雲雨刀矛劒矟更相傷害為樂因縁遠涉嶮路曠野饑渇艱難非一為樂因縁作諸苦行投淵赴火五熱炙身臥棘刺上自饑斷食編椽而坐樹皮草衣食菜食果無明羅刹經所十一其發惡心横加於人還自受罪譬如向風揚塵還自坌身修行道地經慈品譬如肥羊早就屠機大智度論卷十五夫苦李繁子而枝折欒大謬唱而受梟𢎞明集戎華論世間諸人在世時舌上自然生斤斧所謂口說諸毒惡還自衰損害其身法苑珠林卷七有一婆羅門於曠野中造立義井為放牧行者皆就井飲并及洗浴時日向暮有羣野干來趣井飲地殘水有野干主不飲地水便内頭罐中飲水飲已戴罐高舉撲破瓦罐罐口猶貫其項諸野干軰語野干主若濕樹葉可用者常當護之况復此罐利益行人云何打破野干主言我作是樂但當快心那知他事時有行人語婆羅門汝罐已破復更着之猶如前法為野干所破乃至十四諸野干軰數數諫之猶不受語時婆羅門便自念言是誰破罐當徃伺之正是野干便作是念我福德井而作留難便作木罐堅固難破令頭易入難出持着井邊然捉杖屛處伺之行人飲訖野干主如前入飲飲訖撲地不能令破時婆羅門捉杖打煞空中有天說此偈言知識慈心語狼戾不受諫守頑招此禍自喪其身命是故癡野干遭斯木罐苦法苑珠林巻四十五似飛蛾拂㷔自取燒然如蠶作壐非他纒縛法苑珠林卷七十七趨利穫者之遺餘捃拾所以為利鄭氏註禮記坊記人亦孰不欲富貴而獨於富貴之中有私龍斷焉古之為市者以其所有易其所無者有司者治之耳有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣孟子公孫丑下且夫枉尺而直尋者以利言也如以利則枉尋直尺而利亦可為與孟子滕文公下譚拾子曰事之必至者死也理之固然者富貴則就之貧賤則去之請以市諭市朝則滿夕則虚非朝愛市而夕憎之也求存故徃亡故去戰國策齊閔王濮陽人呂不韋賈於邯鄲見秦質子異人歸而謂父曰耕田之利幾倍曰十倍珠玉之贏幾倍曰百倍立國家之主贏幾倍曰無數曰今力田疾作不得暖衣餘食今建國立君澤可以遺世願徃事之戰國䇿秦孝文王宣太后謂尚子曰妾事先王日先王以其髀加妾之身妾困不支也盡置其身妾之上而妾弗重也何也以其少有利焉今佐韓兵不衆糧不多則不足以救韓夫救韓之危日費干金獨可使妾少有利焉戰國策韓襄王彼勸太子戰攻欲啜汁者衆史記魏世家今夫趙女鄭姬設形容揳鳴琴揄長袂躡利屣目挑心招出不逺千里不擇老少者奔富厚也游閒公子飾冠劍連車騎亦為富貴容也弋射漁獵犯晨夜冒霜雪馳坑谷不避猛獸之害為得味也博戲馳逐鬭雞走狗作色相矜必争勝者重失負也醫方諸食技術之人焦神極能為重糈也吏士舞文弄法刻章偽書不避刀鋸之誅者沒於賂遺也農工商賈畜長固求富益貨也此有知盡能索耳終不餘力而讓財矣諺曰百里不販樵千里不販䨀居之一歲種之以榖十歲樹之以木百歲來之以德德者人物之謂也史記貨殖傳凡編户之民富相什則卑下之伯則畏憚之千則役萬則僕物之理也夫用貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也史記貨殖傳貴出如糞土賤出如珠玉財帛欲其行如流水史記貨殖傳淵深而魚生之山深而獸徃之人富而仁義附焉史記貨殖傳故其見敵則逐利如鳥之集其困敗則瓦解雲散矣史記匈奴傳人之於利如蹈水火焉前人雖敗後人復起如彼此無已誰止之者晉書郤詵傳軍無財士不來軍無賞士不徃任無中人不如歸田雖有中人而無家兄不異無翼而欲飛無足而欲行晉書魯褒傳競毛羽之輕趨錐刀之末梁書任昉傳規麴蘖之潤競錐刀之末隋書劉昉傳凡人之情見利莫能勿就見惡莫能勿避其商人通賈倍道兼行夜以續日千里而不遠者利在前也漁人之入海海深萬仞就波逆流乘危百里宿夜不出者利在水也故利之所在雖千仞之山無所不止深源之下無所不入焉故不推而徃不引而來不煩不擾而民自富如鳥之覆卵無形無聲而惟見其成管子禁藏服牛死夫婦哭非骨肉之親也為其利之大也欲知把齊國者則其利之者耶晏子春秋諫下見遺不掇非人情也鶡冠子天則民之生度而取長稱而取重權而索利商子筭地民之於利也若水於下也四旁無擇也商子君臣燔臺而鼔之使民赴火者賞在火也臨江而鼓之使人赴水者賞在水也臨戰而使人絶頭刳腹而無顧心者賞在兵也又况據法而進賢其助甚此矣韓非子内儲説上鱣似蛇蠶似蠋人見蛇則驚駭見蠋則毛起然而婦人拾蠶而漁者握鱣利之所在則忘其所惡皆為孟賁韓非子内儲説上厚賞之使人為賁諸也婦人之拾蠶漁者之握鱣是以效之韓子内儲説上王何疑秦之善臣也以綘􅀢安邑令負牛書與秦猶乃善牛也卭雖不肖獨不如牛乎呂氏春秋應言使民無欲上雖賢猶不能用夫無欲者其視為天子也與為輿𨽻同其視有天下也與無立錐之地同其視為彭祖也與為殤子同天子至貴也天下至富也彭祖至壽也誠無欲則是三者不足以勸輿𨽻至賤也無立錐之地至貧也殤子至夭也誠無欲則是三者不足以禁㑹有一欲則北至大夏南至北戸西至三危東至扶木不敢亂矣犯白刃冒流矢趣水火不敢却也晨寤興務耕疾庸􅀈為煩辱不敢休矣故人之欲多者其可得用亦多人之欲少者其得用亦少無欲者不可得用也羣狗相與居皆靜無爭投以炙雞則相與爭矣或折其骨或絶其筋爭術存也呂氏春秋為欲其餘猖蹶而趨之者乃豕羊驅而徃賈子俗激耕之為事也勞織之為事也擾擾勞之事而民不舍者知其可以衣食也淮南子主術訓待利而後拯溺人亦必以利溺人矣淮南子説林訓此無以異於遺重寶於道而莫之守見者掇之也春秋繁露滅國上今握􅀥與錯金以示嬰兒必取􅀥而不取金也握一斤金與千萬珠以示野人野人必取金而不取珠也故物之於人小者易知也其於大者難見也今利之於人小而義之於人大者無怪民之皆趨利而不趨義也固其所闇也春秋繁露身之養重於義蠋欲類蠶鱓欲類虵人見虵蠋莫不身灑然女工脩蠶漁者持鱓不惡何也欲得錢也說苑談叢府藏之富王以賑貸捕魚河海茍願多得焦氏易林比之臨西行求玉冀得隋璞焦氏易林家人之姤次六經六衢周九路不限其行賈測曰經六衢商旅事也太𤣥經第二裝次四燕食扁扁其志􅩒居遇切􅩒利用征賈測曰燕食扁扁志在頼也太𤣥經第六養工人刻木以入鑿鑿即受之若人施其巧偽索榮顯之名利也淮南子俶貞訓解莫不蒙塵觸雨戴霜履氷懐黄握白提清挈肥以赴邪徑之近易規朝種而暮穫矣抱朴子外篇最學商賈之人志無遠大譬猶僮竪故云賈竪前漢書註張良𫝊寧當爭分寸之末競錐刀之利哉文選江淹上書利之所在若鳥之追鸞廣文選嵇叔夜卜疑集農桑勤而利薄工商逸而利厚故農夫輟耒而雕鏤女工投杼而刺繡意林正論軍無財士不來軍無賞士不徃故良餌之下有懸魚重賞之下有勇夫藝文類聚武部將帥天有所短錢有所長四時行焉百物生焉錢不如天達窮開塞振貧濟乏天不如錢藝文類聚産業部錢論醫善吮人腸含人血非有肌骨之親也利之所加也太平御覽方術部醫猛虎道食不覺蚊䖟來太平御覽蟲豸部蚊獵者嗜肉不多於不獵及其淩岡巒赴谿嶺而有遺身之志太平御覽資産部獵則能目語額瞬動頞塞鼻談智於尺寸之間窺窬于分毫之利初學記居處部市魚在在藻厥志在餌玉海詩攷水動下流人動趨利道德經指歸卷十猶如猫子在鼠穴邊欲捕鼠故中阿含經巻三十猶如鵂狐在燥樵積間為捕䑕故中阿含經卷三十猶如鶴鳥在水岸邊為捕魚故中阿含經巻三十如四交道墮一叚肉鵄烏鵰狼各來爭之修行道地經五陰成敗品猶如獼猴求諸果蓏從樹至樹從林至林出曜經三愛品如鳥銜肉從烏逐之大智度論卷十五召渴馬於滮泉不待鞭策而至矣𢎞明集十喻林卷五
