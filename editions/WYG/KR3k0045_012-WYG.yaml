body:
  text: 喻林卷十二明徐元太撰人事門十應物初六咸其拇象曰咸其拇志在外也易咸九五咸其脢无悔易咸脢者心之上口之下王輔嗣以四爲心神上爲輔頰五在上四之間故直云心之上口之下也明其淺於心神厚於言語周易正義咸委曲同之鍼縷繁碎譬之米鹽梁書王僧孺傳事物之至也如泉源一物不應亂之端也荀子君道鼓不滅於聲故能有聲鏡不沒於形故能有形淮南子詮言訓面慙曰戁心慙曰恧體慙曰逡小爾雅廣義俗之所貴有時而賤物之所大世或小之故順物之迹不得不殊郭子註莊秋水夫畫地而使人循之其迹不可掩矣有其已而臨物與物不㝠矣郭子註莊人間世順理則異類生愛逆節則至親交兵此虎之所以媚於養已也郭子註莊人間世占捶鉤之輕重而無毫芒之差都無懷則物來皆應也郭子註莊知北遊墨翟之徒世謂熱腹楊朱之侣世謂冷腸腸不可冷腹不可熱當以仁義爲節文爾顔氏家訓省事衡平也權重也衡所以任權而鈞物平輕重也李善註文選劉孝標廣絶交論聖人如柱邪王曰如籌算雖無情運之者有情世説新語言語何嘗見明鏡疲於屢照清流憚於惠風世説新語言語聖人之變如水隨形形平則平形險則險意林范子字説曰應從心從䧹心之應物不疾而速不行而至䧹之應物人或使之能疾而已不行不至埤雅品物門鷹申子曰豈不知鏡設精無爲而美惡自備矣初學記器用部鏡𤣥珠雖朗離人莫映初學記居處部堂若鏡之心物來斯照如聖之智感而遂通道徳經註䟽卷三聖人無心有感斯應譬彼明境方茲虚谷感而後應不爲物先道徳經註疏卷五譬如鳴鍾懸在虛空若无扣擊聲理恒存以何因縁聲理恒存以應扣故若有扣者大則大聲中則中聲小則小聲而此鍾中聲體不異各隨其扣發響不同聖人亦爾湛然之理等一不異隨物應形萬種差别海空智藏經治相品譬如大海流澍無極任人取用隨其灌溉有智之人深鑿溝渠以導其流則澆灌無極愚癡之人執持漏器詣於河海隨漏獲潤甚少或有盲人都不見海無所受潤玉清經慈悲方使品譬如虛空無不受持亦非摠持亦無不持普超三昧經卷二譬如若稱隨其輕重或上或下修行道地經五隂成敗品在用如水分千月爲體若鏡鑒萬形辨正論卷二考僞視彼林中謂其當有大木而維有薪維有蒸薪蒸在林則似大木而非大木也以興視彼朝上謂其當有賢者而唯有小人此小人之在朝則似賢人而非賢也毛詩正義正月莠之莖葉似苗佞人詐飾似有義利口辨辭似若有信鄭聲淫人之聽似若美樂紫色似朱鄉原惑衆似有徳此六似者孔子之所惡也趙氏註孟盡心下外傳曰馬不過稂莠爾雅䆁草疏闕子曰宋之愚人得燕石梧臺之東歸而藏之以爲大寶周客聞而觀之主人父齋七日端冕之衣釁之以特牲革匱十重緹巾十襲客見之俛而掩口盧胡而笑曰此燕石也與瓦甓不殊主人父怒曰商賈之言豎匠之心藏之愈固守之彌謹後漢書應奉傳註南海有明珠即鯨魚目瞳鯨死而目皆無精可以鑒謂之夜光述異記上正道而辨姦猶引繩以持曲直是故邪説不能亂百家無所竄荀子正名篇今劍或絶側羸文齧缺卷銋而稱以項襄之劍則貴人爭帶之琴或撥刺枉撓闊解漏越而稱以楚莊之琴則巨室爭鼓之苖山之鋋羊頭之銷雖水㫁龍舟陸剸兕甲莫之服帶山桐之琴澗梓之腹雖鳴亷隅修營唐牙莫之鼔也淮南子修務訓色厲而内荏亂真者也文表而柔裏亂實者也鹽鐵論利議或曰何以處僞曰有人則作之無人則輟之之謂僞觀人者審其作輟而已矣揚子孝至篇昔者姒氏治水土而巫步多禹扁鵲盧人也而醫多盧夫欲讎偽者必假真揚子重黎榝茱茰也佀椒而非以喻子椒佀賢而非賢也王逸註楚辭離騷經故貪者能言亷亂者能言治盜跖非人之竊也莊蹻刺人之濫也王充論衡本性篇海外西南有珠樹焉察之是珠然非魚中之珠也王充論衡説日篇夫易言雲從龍者謂真龍也豈謂土哉楚葉公好龍墻壁盤盂皆畫龍必以象類爲若真是則葉公之國常有雨也王充論衡亂龍篇鼈三足曰能龜三足曰賁案能與賁不能神於四足之龜鼈一角之羊何能聖於兩角之羊王充論衡是應篇聞一増以爲十見百益以爲千使夫純樸之事十剖百判審然之語千反萬畔王充論衡藝増篇夫名之繫於實也猶物之繫於時也物者春也吐華夏也布葉秋也凋零冬也成實斯無爲而自成者也若強爲之則傷其性矣名亦如之故僞名者皆欲傷之者也徐幹中論考僞誘以僞成之名懼以虛至之謗使人憧憧乎若亾惙惙而不定喪其故性而不自知其迷也咸相與祖述其業而寵狎之斯術之於斯民也猶内關之疾也非有痛癢煩苛於身情志慧然不覺疾之已深也然而期日既至則血氣㬥竭故内關之疾疾之中夭而扁鵲之所甚惡也以盧醫不能别而遘之者不能攻也徐幹中論考僞姒氏禹也治水土涉山川病足故行跛也禹自聖人是以鬼神猛獸蜂蠆蛇虺莫之螫耳而俗巫多效禹步揚子法言註重黎篇羊假虎皮見豺則戰人假僞名考實則窮揚子法言註吾子篇先見良物價定而雜與惡物以欺惑下土之人李善註文選西京賦玉爲𤣥真潔白如豬膏叩之鳴者是真也其比類甚多相似宜精别之所以燕石入笥卞氏長號也本草玉屑卷二鳩傅隼翼羔披豹皮類似質違表是裏非意林周生烈子桓靈諺曰舉秀才不知書察孝亷父别居寒素清白濁如泥髙第良將怯如蠅太平御覽人事部諺下日給之華與柰相似也柰結實而日給零落虛僞之初與真實相似也虛僞敗而真實成太平御覽果部㮏夫萍之浮與菱之浮相似也菱植根萍隨波是以堯舜歎巧言之亂徳仲尼惡紫之奪朱太平御覽果部菱盖土龍不可以升天石人不任爲亭長容貌雖似蹄足難奬初學記地部石註琅玕石似珠也碔砆石似玉也初學記地部石素氷象玉難可磨蕩結土成龍遭雨則傷初學記地冰註譬如儛師於大衆中化作城郭象馬車乗作諸瓔珞嚴身之具城邑聚落山林樹木泉池河水於彼衆中有諸衆生无有智慧覩見之時悉以爲實其中智人知其虛誑以幻力故惑人眼目海空智藏經問病品譬如春時有諸人等在天池浴乗船遊戲失璃琉寶珠没深水中是時諸人悉共入水求覓是寶競捉瓦石草木沙礫各各自謂得琉璃珠歡喜持出乃知非真元陽妙經卷十刼初之時有建木鄉人入於山南衒賣真珠時有山東商人姓頗羅墮名曰滿願出庫百金買得一珠圓明曜掌大徑一寸嚢肘自隨不令他見數旬之間忽有山南一人名曰雷詰僞賣魚目滿願西隣壽量之家亦出百金買得魚目亦以懷藏不令他見却後六年二家惡疾祈得明師來療此病和合藥分須好真珠爾時二人各出真珠以閲明師師遥見之懸知後人買得魚目師即語言此非真珠壽量狐疑恐師行誑請師水之浸經一宿合器腥臭真珠入水彌益光明九日出之引長六寸滿願服之所苦立愈玉清經法印品譬如幻師幻作種種象軍馬軍車軍步軍及牛羊等經須㬰頃忽然不現波羅蜜多經三百九十九如工幻師執持少物於衆人前幻作種種異類色相或復幻作男女大小或復幻作象馬牛羊駞驢雞等種種禽獸或復幻作城邑聚落園林池沼種種莊嚴甚可愛樂或復幻作衣服飲食房舎卧具花香纓絡種種珍寶財榖庫藏或復幻作無量種類伎樂俳優令無量人歡娯受樂波羅蜜多經四百七十二譬如逋生稻苗以不熟故名爲逋生以無實故風所吹去無堅重力似稻非稻大寶積經卷一百一十三如野狐鳴而云師子吼色雖相似實非師子大方等大集經十九譬如鷰麥在麥田中芽莖枝葉與麥相似穢雜淨麥乃至彼草其穗未出是時農夫應權捨置穗既出已是時農夫恐穢淨麥并根剪㧞棄於田外大集地藏十輪經卷三譬如有驢被師子皮而便自謂以爲師子有人遥見謂真師子及至鳴已皆識是驢大集地藏十輪經卷七譬如貧人號名大富但得富名無所有也佛遺日摩尼寶經推六如欲食興蕖應當取真實捨真實虛僞自他無利益鴦崛摩羅經卷二譬如驢隨羣牛而行而作是念我作牛聲然其彼形亦不似牛色亦不似聲出不似隨大羣牛謂已是牛而作牛鳴而去牛實逺雜阿含經卷二十九猶如驢入羣牛之中而自稱曰我亦是牛我亦是牛然觀其兩耳復不似牛角亦不似尾亦不似音聲各異爾時羣牛或以角觝者或以脚蹋者或以口嚙者増壹阿含經卷七譬如幻師出意爲化愚人愛戀貪而無厭幻主觀化無染無著所以者何僞而非真中本起經轉法輪品譬如羣牛志性調良所至到處擇軟草食飲清涼水時有一驢便作是念我今亦可斆彼擇軟草食飲清涼水時彼驢入羣牛中前脚跑土觸嬈彼羣牛亦斆羣牛鳴吼然不能改其聲彼羣牛以角觝殺而捨之去佛説羣牛譬經當八如師子皮被驢雖形似師子而心是驢衆經撰襍譬喻經譬如小兒聚土爲臺殿城郭閭里宫舎或名米或名爲麵愛著守䕶日暮將歸其心捨離蹹壞散滅大智度論三十一如見黄色爲金相而内是銅火燒石磨知非金性大智度論三十一譬如僞金火燒磨打若黑若赤若白乃知非真大智度論卷七十三如似破碎鐡間錯於真金大莊嚴經論卷第八偈譬如薝蔔油香用塗頂髮愚惑不解我頂出是香大莊嚴經論卷十五何者世法浮僞喻如驢乳出世真實喻如牛乳然而驢乳爲不能出酥縱強抨之還即成尿所以然者勢分絶也牛乳酥酪乃至醍醐轉抨轉淨唯香唯美五種具足八味甘濃辨正論卷二且賢佞相濫佞泄而賢彰聖詐難分詐窮而聖顯猶蛇床與蘼蕪類質達芳者辨其容茍芴與素華齊根曉藥者分其性辨正論卷六棄實瓠者以非器也廢石田者以難藝也賤左道者以虚僞也辨正論卷六夫真僞相形猶禾莠之相類善耘者存禾而去莠求道者亦依真而捨僞辨正論卷六防詐臣聞士窮非難抑心下人其後有激人之色臣聞越王饑餓民之困窮可因而破也今不用天之道順地之理而反輸之食固君之命狐雉之相戲也夫狐卑體而雉信之故狐得其志而雉必死可不慎哉吳越春秋勾踐隂謀外傳今狐雉之戲也狐體卑而雉懼之夫獸蟲尚以詐相就而況於人乎越絶請糴内傳秦伐宜陽楚王謂陳軫曰寡人聞韓朋巧士也習諸侯事殆能自免也為其必免吾欲先據之以加徳焉陳軫對曰舍之王勿據也以韓朋之智於此困矣今山澤之獸無黠於麋麋知獵者張網前而驅已也因還走而冐人至數獵者知其詐偽舉網而進之麋因得矣今諸侯明知此多詐偽舉網而進者必衆矣舍之王勿據也韓朋之智於此困矣楚王聽之宜陽果拔戰國䇿楚懷王必令其言如循環用兵如刺蜚戰國䇿燕昭王燕王謂蘇代曰寡人甚不喜訑者言也蘇代對曰周地賤媒為其兩譽也之男家曰女美之女家曰男美然而周之俗不自為取妻且夫處女無媒老且不嫁舍媒而自衒敝而不售順而無敗售而不敝者唯媒而已矣且事非權不立非勢不成夫使人坐受成事者惟訑者耳戰國䇿燕昭王西南荒中出訛獸其狀若莬人面能言常欺人言東而西言惡而善其肉美食之言不真矣神異經易稱即鹿無虞諺有掩目捕雀夫微物尚不可欺以得志況國之大事其可以詐立乎後漢書何進列傳猶曜和璧於秦王之庭而塞以連城之價耳魏志劉放傳註鴟夷子皮事田成子田成子去齊走而之燕鴟夷子皮負傳而從至望邑子皮曰子獨不聞涸澤之蛇乎涸澤蛇將徙有小蛇謂大蛇曰子行而我隨之人以爲蛇之行者耳必有殺子不如相銜負我以行人必以我爲神君也乃相銜負以越公道而行人皆避之曰神君也今子美而我惡以子爲我上客千乗之君也以子爲我使者萬乘之卿也子不如爲我舎人田成子因負傳而隨之至逆旅逆旅之君待之甚敬因獻酒肉韓非子説林上鳥窮則噣獸窮則􅠅人窮則詐淮南子齊俗訓巧詐不如拙誠樂羊以有功而見疑秦西巴以有罪而益信由仁與不仁也説苑貴徳言與心詭西行東望焦氏易林未濟之家人若狐之摶雉俯伏弭毛以喜説之雉見而信之不驚憚逺飛故得擒之吕氏春秋决勝解齊人謂齊王曰河伯水神也王不識與之遇乎請使王遇之乃爲壇塲於大水之上而與王立焉有間大魚動因曰此河伯也太平御覽神鬼部神下雪山之中有一惡獸名爲能害變詐百千以取諸獸殺之而食若見牝鹿有子從者便爲子聲悲鳴相呼若見牡鹿便現有角與其相似而徃親附彼無驚懼殺而食之見牛馬等種種諸獸悉同彼形而肆其惡大乗蜜嚴經卷下如誘小兒呼之至前來取手物而噉食之小兒來至一一擘指而無所得脩行道地經勸意品昔有烏梟共相怨憎烏待晝日知梟無見蹋殺羣梟噉食其肉梟便於夜知烏眼闇復啄羣烏開穿其腹亦復噉食畏晝畏夜無有竟已時羣烏中有一智烏語羣烏言已爲怨憎不可求解終相誅滅勢不兩全宜作方便殄覆諸梟然後我等可得歡樂若其不爾終爲所敗衆烏荅言如汝所説當作何方得滅讐賊智烏荅言爾等衆烏但龕啄我㧞我毛羽啄破我頭我當設計要令殄覆即如其言憔悴形容向梟宂外而自悲鳴梟聞聲已便出問言爾今何故破傷頭腦毛羽毁落來至我所悲聲極苦欲何所説烏語梟言衆烏讐我不得生活故來相投以避怨惡時梟憐愍欲存養畜衆梟皆言此是怨家不可親近何縁養畜以長怨敵時梟荅言今以困苦來見投造一身孤單竟何能爲遂便畜養恒與殘肉日月轉久毛羽平復烏詐歡喜微作方計銜乾樹枝并諸草木著梟宂中似如報恩梟語烏言何用是爲烏即荅言孔穴之中純是冷石用此草木以御風寒梟以爲爾黙然不荅而烏於是即求守穴詐給使令用報恩養時㑹㬥雪寒氣猛盛衆梟率來集孔中烏得其便尋生歡喜銜牧牛人火用燒梟孔衆梟一時於孔焚滅雜寶藏經卷八譬如怨家初詐親附久則生害百論卷上守八正法念經云譬如蝙蝠人捕鳥時入宂爲鼠人捕鼠時出宂爲鳥辨正論卷六畏讒將仲子兮無踰我里無折我樹杞將仲子兮無踰我墻無折我樹桑將仲子兮無踰我園無折我樹檀詩國風將仲子防有鵲巢卭有㫖苕音條叶徒刀反誰侜音周予美心焉忉忉音刀中唐有甓卭有㫖鷊音逆誰侜予美心焉惕惕詩國風防有鵲巢相彼投兎尚或先去聲叶蘓晉反之行有死人尚或墐音覲之君子秉心維其忍之詩小雅小弁雨去聲雪瀌瀌音標見睍音現曰消莫肯下去聲遺式居婁音慮驕雨雪浮浮見睍曰流如蠻如髦叶莫侯反我是用憂詩小雅角弓揚之水兄弟爲人所間而被䜛者訴之詞詩説鄶防有鵲巢泄冶被䜛内子憂之而作詩説陳青蠅厲王之世䜛言繁興君子憂之而作詩説小正傳采葛懼䜛也毛詩采葛采苓刺晉獻公也獻公好聽䜛焉毛詩采苓巷伯刺幽王也寺人傷於䜛故作是詩也毛詩巷伯防有鵲巢憂䜛賊也宣公多信䜛君子憂懼焉毛詩防有鵲巢錦文者文如餘泉餘蚳之貝文也䜛人集作已過以成於罪猶女工之集采色以成錦文鄭氏箋詩巷伯欲之楊園之道當先歴畆丘以言此䜛人欲譖大臣故從近小者始鄭氏箋詩巷伯蠅之爲蟲汙白使黒汙黒使白喻佞人變亂善惡也鄭氏箋詩青蠅女工集彼衆采而織之使萋然兮斐然兮令文章相錯以成是貝文以爲其錦也以興䜛人集已諸過而搆之令過惡相積故成是愆狀以爲己罪也毛詩正義巷伯人欲徃之楊園之道當先加歴於畆丘而後至於楊園也以興䜛人欲行譖大臣之法亦當毁害於小臣而訖乃後至於大臣也毛詩正義巷伯有星初本相去哆然寛大爲踵兮其又侈之更益而大爲舌兮乃成是南箕之星言箕之所成以由踵已哆又侈之而爲舌故也以興䜛人因寺人初有小嫌疑爲始乎其又搆之更増而共爲終乎乃成其刑罪之禍言禍之所以成者亦因始有嫌又搆之而爲終故也毛詩正義巷伯人有言曰兄弟䜛䦧侮人百里周文公之詩曰兄弟䦧於牆外禦其侮若是則䦧乃内侮而雖䦧不敗國語周㐮王雖蝎譖焉避之蝎木蟲也譖從中起如蝎食木木不能避也國語解晉一狐突諫申生龎䓤與太子質於邯鄲謂魏王曰今一人言市有虎王信之乎王曰否二人言市有虎王信之乎王曰寡人疑之矣三人言市有虎王信之乎王曰寡人信之矣龎䓤曰夫市之無虎明矣然而三人言而成虎今邯鄲去大梁也逺於市而議臣者過於三人矣願王察之也戰國䇿魏惠王蘓秦爲趙王使於秦反三日不得見謂趙王曰秦乃者過柱山有兩木焉一盖呼侣一盖哭問其故對曰吾已大矣年已長矣吾苦夫匠人且以繩墨案規矩刻鏤我一盖曰此非吾所苦也是故吾事也吾所苦夫鐵銛然自入而出夫人者今臣使於秦而三日不見無有謂臣爲鐵銛者乎戰國䇿趙肅侯甘茂對秦王曰昔者曽子處費費人有與曽子同名族者而殺人人告曽子母曰曽參殺人曽子之母曰吾子不殺人織自若有頃焉人又曰曽參殺人其母尚織自若也頃之一人又告之曰曽參殺人其母懼投杼踰牆而走夫以曽參之賢與母之信也而三人疑之則慈母不能信也今臣之賢不及曽子而王之信臣又未若曽子之母也疑臣者不適三人臣恐王爲臣之投杼也戰國䇿秦武段産謂新城君曰夫宵行者能無爲奸而不能令狗無吠已今臣處郎中能無議君於王而不能使人母議臣於君願君察之也戰國䇿秦昭㐮王莊曰父之於子也令有必行者必不行者曰去貴妻賣愛妾此令必行者也因曰母敢思也此令必不行者也守閭嫗曰某夕某孺子内某士貴妻已去愛妾已賣而心不有欲敎之者人心固有今君雖幸於王不過父子之親軍吏雖賤不卑於守閭嫗且君擅主輕下之日久矣聞三人成虎十夫揉椎衆口所移毌翼而飛戰國䇿秦昭襄王下流之人衆毁所歸不寒而栗雖雅知惲者猶隨風而靡尚何稱譽之有前漢書楊惲傳衆口鑠金積毁銷骨叢輕折軸羽翮飛肉紛驚縫羅澘然出涕前漢書景十三王傳夫䜛䛕所舉無髙而不可升相抑無深而不可淪可不察歟後漢書黄瓊傳景風之賞未甄膚受之言互及後漢書楊璇傳衆喣飄山當為灰土後漢書馮衍傳註以白爲黒以非爲是造作端末妄生首尾後漢書馮衍傳註巧巧佞佞䜛言興兮營營習習似青蠅兮以白爲黒在汝口兮汝非蝮蠆毒何厚兮魏書陽尼從弟固傳良田敗於邪徑黄金鑠於衆口北史魏長賢傳楚莊王之弟春申君有愛妾曰余春申君之正妻子曰甲余欲君之棄其妻也因自傷其身以視君而泣曰得爲君之妾甚幸雖然適夫人非所以事君也適君非所以事夫人也身故不肖力不足以適二主其勢不俱適與其死夫人所者不若賜死君前妾以賜死若復幸於左右願君必察之無爲人笑君因信妾余之詐僞棄正妻余又欲殺甲而以其子爲後因自裂其親身衣之裏以示君而泣曰余之得幸君之日久矣甲非弗知也今乃欲強戲余余與爭之至裂公之衣而此子之不孝莫大於此矣君怒而殺甲也故妻以妾余之詐棄而子以之死從是觀之夫父之愛子也猶可以口害也君臣之相與也非有父子之親也而羣臣之毁言非特一妾之口也何恠夫賢聖之戮死哉此商君之所以車裂於秦而呉起之所以枝解於楚者也韓非子和氏鳥之美羽勾啄者鳥畏之魚之侈口垂腴者魚畏之人之利口贍辭者人畏之是以君子避三端避文士之筆端避武士之鋒端避辨士之舌端韓詩外傳夫雞豚讙嗷即奪鐘鼓之音雲霞充烟則奪日月之明䜛人在側是以見晩也詩曰聽言則對䜛言則退庸得進乎新序雜事五傳言失指圖景失形衆口鑠金積毁消骨久矣其患之也風俗通正失疋居楚鳥遇䜛無辜久散離憂焦氏易林大有之比言我恐鵜鴂以先春分鳴使百草華英摧落芬芳不得成也以諭䜛言先至使忠直之士蒙罪過也王逸註楚辭離騷經言以令鴆爲媒其心䜛賊以善爲惡又使雄䧱銜命而徃多言無實故中心狐疑猶豫意欲自徃禮又不可女當須媒士必待介也王逸註楚辭離騷經言飛鳥走獸羣鳴相呼則芳草合其莖葉芬芳以不暢也以言䜛人口衆多盈君之耳亦可令忠直之士失其本志也王逸註楚辭九章言飄風動揺芳草使不得安以言䜛人亦别離忠直使得辠過也王逸註楚辭九章言人九折臂更歴方藥則成良醫乃自知其病吾被放棄乃信知䜛佞爲忠直之害也王逸註楚辭九章言衆口所論萬人所言金性堅剛尚爲銷鑠以喻䜛言多使君亂惑也王逸註楚辭九章言已欲竭忠謀䜛邪壅塞而不得達若臨江河無橋梁以濟也王逸註楚辭哀時命言風揄揚水流隕徃觸鋭利之石使之危殆以言䜛人亦揚已過使得辠罰也王逸註楚辭九歎言仁人聮結蕙芷芬香之草服之於身過鮑魚之肆則失其性而不芬香也以言已積絫忠信爲䜛人所毁失其忠名也王逸註楚辭七諫辨口之毒爲害尤酷何以明之孔子見陽虎却行白汗交流陽虎辨有口舌口舌之毒中人病也人中諸毒一身死之中於口舌一國潰亂詩曰䜛言罔極交亂四國四國猶亂況一人乎故君子不畏虎猶畏䜛夫之口䜛夫之口爲毒大矣王充論衡言毒篇天下萬物含太陽氣而生者皆有毒螫毒螫渥者在蟲則爲蝮蛇蜂蠆在草則爲巴豆冶一作野字葛在魚則爲鮭與􅯚䱙其在人也爲小人故小人之口爲禍天下王充論衡言毒篇萬麋傾角猛虎爲之含牙千禽鱗萃鷙鳥爲之握爪是以四國流言公旦而不能遏謗者盈路子産而無以塞抱朴子外篇夫漸漬之久則膠漆解堅浸潤之至則骨肉乖析塵羽之積則沈舟折軸三至之言則市虎以成故江充疏賤非親於元儲後母假繼非宻於伯竒而掘梗之誣滅父子之恩袖蜂之誑破天性之愛又况其他安可自必抱朴子外篇嘉遯審夫市之無虎昡三夫之獻説陶靖節集賦譽人不増其義則聞者不快於心毁人不益其惡則聽者不滿於耳代之善人少而惡人多則譽者寂寞而䜛者諠譁是以洗垢求痕吹毛覓瑕揮空爲有轉白爲黒提輕當重引寸至尺墨子所以泣素絲楊朱所以泣岐路以其變爲青黄迴成左右也劉子傷䜛鳥之曲頸鋩距者羽類畏之獸之方啄鈎爪者毛羣畏之魚之哆脣鋸齒者鱗族畏之人之利口䜛諂者人共畏之劉子傷䜛美金見毁衆共疑之數被燒錬以至銷鑠䜛佞之人肆其詐巧離散骨肉而不覺知前漢書註鄒陽傳絲淚毁金骨言䜛邪之人但下如絲之淚而金骨爲之傷毁也李善註文選鮑明逺有所思詩男懽智傾愚女愛衰避妍不惜微軀退但懼蒼蠅前文選陸士衡塘上行樂羊伐中山歸有責功之色魏文侯以謗書兩篋示之樂羊北面再拜曰一寸之書亦止何須兩篋意林吕氏春秋吾令鴆爲媒兮鴆告余以不好雄鳩之鳴逝兮余猶惡其佻巧楚辭離騷經名髙八俊傷於閹豎之黨智周三傑斃於婦女之計是以洪澤之蛟遂挫長饑之虎平皋之蟻能摧失水之龍文苑英華庾信連珠太公金匱硯之書曰石墨相著而黒邪心䜛言無待而汚白事類賦什物部硯註有蓮華池多有水鳥在中而住時有鸛雀在於池中徐步舉脚諸鳥皆言此鳥善行威儀徐序不惱水性時有白鵝而説偈言舉脚而徐步音聲極柔輭欺誑於世間誰不知謟䜛鸛雀語言何爲作此語來共作親善白鵝荅言我知汝謟䜛終不親善汝法苑珠林卷五十四古昔有兩惡獸爲伴一名善牙師子二名善博虎晝夜伺捕衆鹿時有一野干能逐彼二獸後食其殘肉以自全命竊自生念我今不能久與相逐當以何方便鬬亂彼二獸令不復相隨即徃善牙師子所言善博虎有語我生處勝種姓勝形色勝汝力勢勝汝何以故我日日得好美食善牙師子逐我後食我殘肉以自全命善牙問汝以何事得知荅言汝等二獸共集一處相見自知己便徃善博虎言善牙有語我今種姓生處悉皆勝汝力勢亦勝何以故我常食好肉善博虎食我殘肉而自活命善博問汝以何事得知荅言汝等二獸共集一處相見自知後二獸共集一處瞋眼相視善牙師子念我不應不問便先下手打彼向善博虎而説偈曰形色及所生大力而復勝善牙不如我善博説是耶自念必是野干鬭亂我等善博虎亦説偈荅善牙師子即打野干殺爾時佛告諸比丘此二獸爲彼所破共集一處相見不悦况復於人爲人所破心能不惱法苑珠林卷七十六喻林卷十二
