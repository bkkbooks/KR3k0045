body:
  text: 喻林卷一百十六明徐元太撰物宐門一隨時祭鮪祭不必記記鮪何也鮪之至有時美物也鮪者魚之先至者也而其至有時謹記其時大戴禮記夏小正今夫麰麥播種而耰之其地同樹之時又同浡然而生至於日至之時皆熟矣雖有不同則地有肥磽雨露之養人事之不齊也孟子告子上夫𤣥龍迎夏則陵雲而奮鱗樂時也渉冬則淈泥而潜蟠避害也後漢書張衡列傳鶗鴂鳴而草衰澤雉啼而麥齊師曠禽經鳱以水言自北而南􅦐以山言自南而北師曠禽經凡稼蚤者先時暮者不及時寒暑不節稼乃多災亢倉子農道得時之禾長秱而大穗圜栗而薄糠米飴而香舂之易而食之强失時之禾深芒而小莖穗鋭多粃而青蘦亢倉子農道秋木葉落葉落歸林是其充富枝枚扶疏外以示貧其實不貧太𤣥經第一少解夫虎出有時猶龍見有期也陰物以冬見陽蟲以夏出王充論衡遭虎篇春則毛弱夏則稀少而改易秋則刷理冬則更生細毛自溫張華註禽經草榮識節和木衰知風厲陶靖節集雜文陽氣萌而𤣥駒歩陰律凝而丹鳥羞㣲蟲猶或入感四時之動物深矣文心雕龍物色萬物居溫則柔入寒則剛故春角可卷夏條可結秋露可凝冬氷可折劉子言苑陽氣主生物所樂也陰氣主殺物所憾也故春葩含日似笑秋葉泫露如泣劉子言苑鴻之不失寒暑亦猶水之因地制行楊子法言註學行篇覽花蒔之時育兮察盛衰之所託感冬索而春敷兮嗟夏茂而秋落文選秋興賦觀羽族之羣類美𤣥鳥之翔集順陰陽以出處隨寒暑而遊蟄藝文類聚鳥部鷰賦龍春分而登天秋分而入淵太平御覽時序部秋分夫霜樹落葉而鴻鴈南飛桃林披華而𤣥鳥深入太平御覽地部林太𤣥曰斗一北而萬物虚斗一南而萬物盈埤雅天道門斗溽暑至而鶉火棲寒氷沍而黿鼉蟄初學記嵗時部夏春分百草始繁則牧於坰野秋分農功始藏水寒草枯則皆還廐玉海兵制馬政殊性乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兊為􅇗易説卦傳銚弋之性始生正直及其長大則其枝猗儺而柔順不妄尋蔓草木鄭氏箋詩隰有長楚芄蘭柔弱恒蔓延於地有所依緣則起鄭氏箋詩芄蘭河曲疏矣河千里而一曲也公羊文公十一年孟子以為羽性輕雪性消玉性堅雖俱白其性不同趙氏註孟告子上如木楸曰喬如竹箭曰苞如松栢曰茂爾雅槐棘醜喬桑柳醜條椒榝音殺醜莍桃李醜核爾雅翥醜鏬呼暇切螽醜奮强醜捋蠭醜螸音俞蠅醜扇爾雅鵲鵙工役切醜其飛也翪音宗鳶烏醜其飛也翔鷹隼醜其飛也翬爾雅夫陵虚之鳥愛其清高不願江漢之魚淵沼之魚樂其濡涇不易騰風之鳥由性異而分不同也魏志管輅傳註鵜志在水鴷志在木師曠禽經雞鷽惡烏路反其類鴛鴦𤣥鳥愛其類師曠禽經鸐嶲周子規也啼必北嚮江介曰子規蜀右曰杜宇隨楊越雉鷓鴣也飛必南翥晉安曰懐南江左曰逐隱師曠禽經林鳥朝嘲水鳥夜㖡師曠禽經鸚鵡摩背而瘖鴝鵒剔舌而語師曠禽經夫鵠不日浴而白鳥不日黔而黑黑白之朴不足以為辯莊子天運梁麗可以衝城而不可窒宂言殊器也騏驥驊騮一日而馳千里捕鼠不如貍狌言殊技也鴟鵂夜撮蚤察毫末晝出瞑目而不見丘山言殊性也莊子秋水昔者海鳥止於魯郊魯侯御而觴之於廟奏九韶以為樂具太牢以為膳鳥乃眩視憂悲不敢食一臠不敢飲一杯三日而死此以已養養鳥也非以鳥養養鳥也夫以鳥養養鳥者宜栖之深林遊之壇陸浮之江湖食之鰌䱔隨行列而止委蛇而處彼唯人言之惡聞奚以夫譊譊為乎咸池九韶之樂張之洞庭之野鳥聞之而飛獸聞之而走魚聞之而下入人卒聞之相與還而觀之魚處水而生人處水而死彼必相與異其好惡故異也莊子至樂今夫徙樹者失其陰陽之性則莫不枯槁故橘樹之江北則化而為枳鴝鵒不過濟貈渡汶而死形性不可易勢居不可移也淮南子原道訓以兎之走使大如馬則逮日歸風及其為馬則又不能走矣淮南子説林訓馬不食脂桑扈不啄粟非廉也淮南子説林訓夫物有以自然而後人事有治也故良匠不能斵金巧冶不能鑠木金之性不可斵而木之性不可鑠也淮南子泰族訓夫尺蠖蜉蝤同出於陽而不為尺蠖之鳴黄雀蜻蜓同翔於空而不為黄雀之舉鯤魚蝮蛇同潛於水而不為鯤魚之化若此者豈限於物力哉氣使然也故蜉蝤之安於黙蜻蜓之限於飛蝮蛇之困於遊者彼亦烏知尺蠖之鳴黃雀之舉而鯤魚之化也唯不知故以類羣而不毒是萬物之淑慝皆以無所知而能相安也使其有所知則必慕慕則必傾焉天禄閣外史智論鍾山之玉燔以爐炭三日三夜色澤不變陸上之木鴻且大皆天性也吕氏春秋士容解頓牟掇芥礠石引針皆以其眞是不假他類他類肖似不能掇取者何也氣性異殊不能相感動也王充論衡亂龍篇使物性可變金木水火可革更也王充論衡道虚篇能飛升之物生有毛羽之兆能馳􅋅之物生有蹄足之形馳􅋅不能飛升飛升不能馳􅋅禀性受氣形體殊别也王充論衡道虚篇既為物矣則方圓剛柔靜躁沈浮各有其性張湛註列子天瑞蚤虱之性茍尋而進太𤣥經第一􅕳解義茍在健何必馬乎類茍在順何必牛乎周易畧例明象青鳥海上遊鸒斯蒿下飛沈浮不相宜羽翼各有歸文選阮歩兵籍詩鍼雖小入水則沈毛雖大入水則浮性自然也意林秦子劉子曰飛鼯甘煙􅋅貘美鐵所居隔絶嗜好不同未足怪也埤雅品物問貘鴻雁愛力遇風迅舉孔雀愛毛遇雨高止埤雅品物門雁鳥樂空曠鵲樂稠閙埤雅品物門鳥鶴愛陰而惡陽雁愛陽而惡陰埤雅品物門鶴鶴以怨望鴟以貪顧雞以嗔聣鴨以怨瞋雀以猜瞿燕以狂䀪視也鸎以喜囀鳥以悲啼鳶以饑鳴鶴以潔唳梟以凶呌鴟以愁嘯鳴也埤雅品物門鶴冠鳥性勇帶鳥性仁纓鳥性樂埤雅品物門鸚鵡鵝見異類差翅鳴雞見同類拊翅鳴埤雅品物門鵝􅇗性淫而狠豬性卑而率鵝性頑而傲狗性險而出埤雅品物門鵝白楊性勁直堪為屋材寧折終不曲撓榆性濡軟久無不曲比之白楊不如逺矣埤雅卉物門梅犅以乗而不逆為剛牂以承而不隨為臧爾雅翼牂巢生而啄胎生而乳鳥驚而散獸驚而聚陰物穴居陽物巢處火動炎上水動潤下道德經指歸卷八譬如士夫遊空宅中得六種衆生一者得狗即執其狗繫著一處次得其鳥次得毒蛇次得野干次得失收摩羅次得獼猴得斯衆生悉縛一處其狗者樂欲入村其鳥者常欲飛空其蛇者常欲入穴其野干者樂向塚間失收摩羅者長欲入海獼猴者欲入山林此六衆生悉繫一處所樂不同各各嗜欲到所安處雜阿含經卷四十一蜂蠆蘊毒虵蝮懷瞋鴿雀嗜婬犲狼騁暴或復被毛戴角抱翠銜珠􅬄巨鋒芒爪牙長利或復聽物往還受人驅䇿犬勤夜吠雞競曉鳴牛弊田農馬勞行陣肌肉於是消耗皮膚為之零落或潛藏草澤遂被罝羅竄伏陂池横遭罾網法苑珠林卷六大小泰山巖巖魯邦所詹詩頌閟宫山無不容河無不潤毛詩君子偕老江也漢也南國之大水紀理衆川使不雝滯鄭氏箋詩四月桃蟲鷦也鳥之始小終大者毛詩小毖鳥之大者惟鶴小者惟雀乎尚對曰大者有秃鶖小者有鷦鷯吳志張經傳註景公問晏子曰天下有極大乎晏子對曰有足游浮雲背凌蒼天尾偃天間躍啄北海頸尾咳於天地乎然而漻漻不知六翮之所在公曰天下有極細乎晏子對曰有東海有蠱巢於蟁睫再乳再飛而蟁不為驚臣嬰不知其名而東海漁者命曰焦㝠晏子春秋外篇一蜂至微亦能游觀乎天地一鰕至㣲亦能放肆乎大海闗尹子六七夫蚊䖟墜乎千仞之谿乃始翺翔而成其容牛馬墜焉碎而無形由是觀之則大者不便重者創深鶡冠子天龍終髮北之北有溟海者天池也有魚焉其廣數千里其長稱焉其名為鯤有鳥焉其名為鵬翼若垂天之雲其體稱焉世豈知有此物哉大禹行而見之伯益知而名之夷堅聞而志之江浦之間生麽蟲其名曰焦瞑羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也離朱子羽方晝拭眥楊眉而望之弗見其形􅚞俞師曠方夜擿耳俛首而聽之弗聞其聲唯黄帝與容成子居空同之上同齋三月心死形廢徐以神視塊然見之若嵩山之阿徐以氣聽砰然聞之若雷霆之聲列子湯問北㝠有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名為鵬鵬之背不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南㝠南㝠者天池也莊子逍遥遊鵬之徙於南㝠也水擊三千里摶扶搖而上者九萬里去以六月息者也莊子逍遙遊小知不及大知小年不及大年奚以知其然也朝菌不知晦朔蟪蛄不知春秋此小年也楚之南有㝠靈者以五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋而彭祖乃今以久特聞衆人匹之不亦悲乎莊子逍遙遊因其所大而大之則萬物莫不大因其所小而小之則萬物莫不小知天地之為稊米也知毫末之為邱山也則差數覩矣莊子秋水寅邱無壑泉源不溥尋常之谿灌千頃之澤淮南子説林訓木大者根擢山高者基扶蹠巨者志逺體大者節疏淮南子説林訓江海之魚吞舟大國之樹必巨説苑善説斥澤之鷃為飛不能出於頃畮淮南子精神訓解不見僬僥之㣲不知泱漭之泰不見果下之乘不别龍馬之大高下相懸所以致觀也曹子建上牛表眇眇尋木生於河邊竦枝千里上干雲天垂陰四極下蓋虞淵山海經海外北經圗讃蚊䖟墮山適足翺翔兕虎之墜碎而為􅕖此言大物不可失所也抱朴子外篇知止鯤之化鵬非㝠海不足以運其身非九萬里不足以負其翼郭子註莊逍遙遊窮百川之量懸於河河懸於海海懸於天地則各有量也郭子註莊秋水奔蜂不能化藿蠋而能化螟蛉越雞不能伏鵠卵魯雞能伏之藿蠋與螟蛉俱蟲也魯雞與越雞同禽也然化與不化伏與不伏者藿蠋大越雞小也劉子均任淮南子曰鯨魚死而彗星出易井卦曰九二井谷射鮒夫感動天地此魚之至大射鮒井谷此魚之至小李善註文選吳都賦巨細舛錯衆繁類殊鷦螟巢於蚊睫大鵬彌乎天隅文選鷦鷯賦方蚊翼下有小飛蟲焉尘九卵復成九子飛而俱去蚊遂不知藝文類聚蟲豸部蚊海人與山客辦其方物海人曰横海有魚額若華山之頂一吸萬頃之波山客曰鄧林有木圍三萬尋直上千里傍蔭數國太平御覽資產部釣五尺之鯉一寸之鯉但大小殊鱗之數太平御覽鱗介部鯉魚㝠海之棗大如𤓰鍾山之李大如瓶漢武帝外傳海有衆魚巨􅥟巍巍第一魚身長四千里第二魚身長八千里第三魚身長萬二千里第四魚身長萬六千里第五魚身長二萬里第六魚身長二萬四千里第七魚身長二萬八千里海八德經尺一那先問王曾聞大海中有大魚名質身長二萬八千里者不王言然有是我曹聞之那先言如是二萬八千里魚其脇骨長四千里那先比丘經卷下曾共婆羅門道中行見一尼拘盧陀樹蔭覆賈客五百乗車蔭猶不盡大智度論卷八七極㣲成一阿耨彼是最細色天眼能見及菩薩轉輪王見七阿耨為銅上塵七銅上塵為水上塵七水上塵為兔毫上塵七兔毫上塵為一羊毛上塵七羊毛塵成一牛毛塵七牛毛塵成一向遊塵七向遊塵成一蟣七蟣成一蝨七蝨成一􅜿麥七􅜿麥為一指二十四指為一肘雜阿毗曇心論卷二如菩薩處胎經云第一大鳥不過金翅鳥頭尾相去八千由旬高下亦爾若其飛時從一須彌至一須彌終不中止廣如經説第二獸者不過於龍如阿含經説難陁跋難陁二龍其形最大繞須彌山七帀頭猶山頂尾在海中第三魚身者不過摩竭大魚如四分律説摩竭大魚身長或三百由旬四百由旬乃至極大者長七百由旬故阿含經云眼如日月鼻如大山日如赤谷法苑珠林卷六榮枯九二枯楊生稊易大過象曰枯楊生華何可久也易大過老過則枯少過則稚以老分少則稚者長以稚分老則枯者榮過以相與之謂也王弼註易大過葛之覃兮施音異于中谷維葉萋萋葛之覃兮施于中谷維葉莫莫詩國風葛覃盛極則墮落者梅也毛詩摽有梅註旱山之足林木茂盛者得山雲雨之潤澤也鄭氏箋詩旱麓鵻之傷於水始則濕中而修久而乾鄭氏箋詩中谷椒之性芬香而少實今一捄之實蕃衍滿升非其常也鄭氏箋詩椒聊坰之牧地水草既美牧人又良飲食得其時則自肥健耳鄭氏箋詩駉𤓰之本實繼先歲之𤓰必小狀似瓝故謂之瓞緜緜然若將無長大時鄭氏箋詩緜葛之能藟蔓繁滋者以本枝廕庥之多杜氏解左傳文公七年王知夫苖乎七八月之間旱則苖槁矣天油然作雲沛然下雨則苖浡然興之矣孟子梁惠王上木謂之華草謂之榮不榮而實者謂之秀榮而不實者謂之英爾雅完不能無毁也是以韋革雖柔擴之則裂礦石雖堅攻之則碎子華子執中形氣發於根柢兮柯葉彚而靈茂前漢書叙傳上塞其源者竭背其本者枯淮南子説林訓再生者不穫華大早者不胥時落淮南子説林訓魴鱮甫甫語其大也麀鹿麌麌語其衆也小爾雅廣訓專獨不能自蔭潤其根故多枯死也吕氏春秋辨土解草木之生者濕濕者重死者枯枯者輕枯而輕者易舉濕而重者難移也然元氣所在在生不在枯王充論衡狀留篇虵折鱗於平皋龍脱骨於深谷曹子建神龜賦其在晨也灼若旭日栖扶桑其在昏也奭若燭龍吐潛光藝文類聚菓部石榴賦爛若羅宿之垂光灼若隋珠之宵列爽若翡翠之羣翔練若珊瑚之映月藝文類聚木部木賦其望之也曄若皦日燭崑山其節之也晃若盈尺映藍田藝文類聚草部芙蕖賦灼若夜光之在𤣥岫赤若太陽之映朝雲藝文類聚草部芙蕖賦又如水大漬草木根能使傾㧞隨流而去波羅宻多經卷五百六十七譬如樹枝所依花葉果實終歸墮落大寳積經卷四十一猶如有人擕持種子於荒穢田隨所種殖然彼種子依大地界遇天雨潤决定生芽至於花實少得收穫大寳積經卷一百二十靈蠢蟲莫知於龍以其不生得也左傳昭公二十九年龜生於水發之於火於是爲萬物先爲禍福正龍生於水被五色而游故神欲小則化如蠶蠋欲大則藏於天下欲上則凌於雲氣欲下則入於深泉變化無日上下無時謂之神龜與龍伏闇能存而能亡者也管子水地鶡毅鳥也毅不知死鷗信鳥也信不知用師曠禽經龍也者人主之辟也亢龍往而不返故易曰有悔悔者凶也潛龍入而不能出故曰勿用勿用者不可也龍之神也其惟玆龍乎能與細細能與巨巨能與高高能與下下吾故曰龍變無常能幽能章賈子新書容經太陰所建蟄蟲首穴而處鵲巢鄉而為户淮南子天文訓猩猩知往而不知來乾鵲知來而不知往此修短之分也淮南子記論訓雞知將旦鶴知夜半而不免於鼎俎淮南子説山訓狗彘不擇甂甌而食偷肥其體而顧近其死鳯凰高翔千仭之上故莫之能致淮南子説林訓牛蹏彘顱亦骨也而世弗灼必問吉凶於龜者以其歴歲久矣淮南子説林訓夫天之所覆地之所載包於六合之内託於宇宙之間陰陽之所生血氣之精含牙戴角前爪後距奮翼攫肆蚑行蟯動之蟲喜而合怒而鬬見利而就避害而去其情一也雖所好惡其與人無以異然其爪牙雖利筋骨雖强不免制於人者知不能相通才力不能相一也各有其自然之勢無禀受於外故力竭功沮淮南子修務訓鴈順風以愛氣力銜蘆而翔以備矰弋螘知為垤貛貉為曲穴虎豹有茂草野彘有芄莦槎櫛堀虚連比以像宫室陰以防雨景以蔽日此亦鳥獸之所以知求合於其所利今使人生於辟陋之國長於窮櫩漏室之下長無兄弟少無父母目未嘗見禮節耳未嘗聞先古獨守專室而不出門使其性雖不愚然其知者必寡矣淮南子修務訓鶴夜半而鳴也以無知謀不能免於鼎俎淮南子説山訓解羔有角而不任設備而不用類好仁者執之不鳴殺之不諦類死義者羔食於其母必跪而受之類知禮者故羊之為言猶祥與故卿以為䞇春秋繁露執䞇鴈乃有類於長者長者在民上必施然有先後之隨必俶然有行列之治故大夫以䞇春秋繁露執䞇鸞翔女牀鳯出丹穴拊翼相和以應聖哲擊石靡詠韶音其絶山海經西山經圖讚猾褢之獸見則興役膺政而出匪亂不適天下有道幽形匿迹山海經南山經圖讚幽頞似猴俾愚作智觸物則笑見人佯睡好用小慧終是嬰擊山海經北山經圖讚駝惟竒畜肉鞍是被迅鶩流沙顯功絶地潛識泉源㣲乎其智山海經北山經圖讚澄濁剖判庶物化生羽族或能應對焉毛宗或有知言焉於玃識往歸終知來𤣥禽解陰陽虵螘逺泉流蓍竈無以過焉甘石不能勝焉抱朴子外篇譏惑天將風也纖塵不動而䲰日鳴其且雨也寸雲未布而蟻蚓移矣巢居知風穴處識雨風雨方至而鳥蟲應之劉子類感言良犬之取莵仰觀人主之意而獲之喻不妄殺前漢書註嚴延年傳神龍不處罔罟之水鳯凰不翔罻羅之鄉事類賦鱗介部龍註猩猩啼而就禽􅍛音翡􅍛笑而被格太平御覽獸部􅍛􅍛霜傅彊枝鳥以武生者少雪封枯原鳥以文死者多埤雅品物門鶩雉鴈銜蘆而捍網牛結陣以脚虎埤雅品物門牛燕識戊巳不銜泥狐潛上伏不越渡阡陌又曰狐狼知虚實虎豹識衝破埤雅品物門狐鸛俯鳴則陰仰鳴則晴埤雅品物門鸛字説曰奚也曷也皆無知也雞可畜焉以放於死奚物而無知者也鶡善鬬焉以放於死曷物而無知者也埤雅品物門鶡拙者莫如鳩巧者莫如鶻埤雅品物門鵻青鵽愛子忘親司馬彪曰鵽鳥專愛其子而忘其母也困學紀聞卷十諸子閻浮洲有諸商人乘船入海持視岸鷹行彼入大海不逺便放視岸鷹若視岸鷹得至大海岸者終不還船若視岸鷹不得至大海岸者便來還船中阿含經卷三十譬如師子王在林中吼有人見之叩頭求請則放令去虎豹小物不能爾也何以故師子王貴獸有智分别故虎豹賤蟲不知分别故大智度論卷十五喻林卷一百十六
