body:
  text: 喻林卷六明徐元太撰人事門四避害六三即鹿无虞惟入于林中君子幾不如舍往吝易屯初六遯尾厲勿用有攸徃易遯北風其凉雨雪其雱惠而好我攜手同行莫赤匪狐莫黑匪烏惠而好我攜手同車詩國風北風碩鼠碩鼠無食我黍三歲貫音慣女莫我肻顧叶果五反逝將去女適彼樂土樂土樂土爰得我所詩國風碩鼠黄鳥黄鳥無集于榖無啄我粟此邦之人不我肻榖言旋言歸復我邦族黄鳥黄鳥無集于桑無啄我梁黄鳥黄鳥無集于栩音許無啄我黍詩小雅黄鳥匪鶉匪鳶翰飛戾天匪鱣音氊匪鮪濳逃于淵詩小雅四月匹夫無罪懐璧其罪吾焉用此其以賈害也左傳桓公十年賔孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也遽歸告王且曰雞其憚為人用乎人異於是犧者實用人人犧實難已犧何害左傳昭公二十二年刳胎殺夭則麒麟不至其郊竭澤而漁則蛟龍不處其淵覆巢破卵則鳳凰不翔其邑鳥獸之於不義尚知避之况于人乎孔子家語困誓不觀高崖何以知隕墜之患不臨深泉何以知沒溺之患不觀巨海何以知風波之患失之者其不在此乎士愼此三者則無累於身矣孔子家語困誓流者曰川川不可防而口又甚川之潰決害于人也民之敗亂害於上也國語解周上厲王虐臣聞饑人所以饑而不食烏喙者為其愈充腹而與餓死同患也史記蘇秦傳鴻鵠高飛一舉千里羽翮已就横絕四海横絕四海當可柰何雖有矰繳尚安所施史記留侯世家大行不顧細謹大禮不辭小讓如今人方為刀俎我為魚肉何辭為史記項羽紀鳳凰翔於千仞之上兮覽德輝而下之見細德之險微兮遥増翮逝而去之彼尋常之汙瀆兮豈能容吞舟之魚横江湖之鱣鱏兮固將制於螻蟻史記賈生傳䳒鵲遭害則仁鳥増逝愚者蒙戮則知士深退前漢書梅福傳欲談者宛舌而固聲欲行者擬足而投迹前漢書揚雄傳下當君子困賤之時跼高天蹐厚地猶恐有鎭厭之禍也後漢書仲長統列傳羣車方奔乎險路安能與之齊軌後漢書蔡邕列傳龍不隱鱗鳳不藏羽網羅高懸去將安所後漢書逸民列傳劍㦸在門何暇有讓百弩環舍何可彊復後漢書馮衍傳黄龍不反于涸澤鳳皇不離其罻羅故刳胎焚林則麒麟不臻覆巢破卵則鳳皇不翔竭澤而漁則龜龍不見鳥獸之於不仁猶知避之况丘乎故虎嘯而谷風起龍興而景雲見擊庭鍾于外而黄鍾應於内夫物類之相感精神之相應若響之應聲影之象形故君子違傷其類者魏志劉廙傳註夫猛獸當途麒麟恐懼况臣脆弱敢不􅋺懼晉書王濬傳常恐洪濤蕩嶽餘波見漂况可臨尾閭而闚沃焦哉晉書韋忠傳窮猿投林豈暇擇木晉書李充傳賢人之處亂世也知道之不可行則沉抑以辟罰靜黙以侔免辟之也猶夏之就清冬之就温焉可以無及於寒暑之菑矣管子宙合氣之害人者謂之不適味之害人者謂之毒鶡冠子環流且鳥高飛以避矰弋之害鼷鼠深穴乎神丘之下以避熏鑿之患而曾二蟲之無知莊子應帝王鷙鳥逐雀有襲人之懐入人之室者非出生也後有憚也尉繚子武議譬之若瞽師之避柱也避柱而疾觸􅍻也狐狸水泉姦邪盜賊冦亂之患此􅍻之大者也慈親孝子避之者得葬之情矣呂氏春秋節喪義小為之則小有福大為之則大有福於禍則不然小有之不若其亡也射招者欲其中小也射獸者欲其中大也物固不必安可推也呂氏春秋别類夫鳥飛千仞之上獸走叢薄之中禍猶及之又况編戸齊民乎淮南子俶貞訓未嘗灼而不敢握火者見其有所燒也未嘗傷而不敢握刃者見其有所害也淮南子汜論訓下嫁女於病消者夫死則後難復處也故沮舍之下不可以坐倚牆之􅅖不可以立淮南子説山訓兇虎在於後隋矦之珠在於前弗及掇者先避患而後就利淮南子說林訓狂馬不觸木猘狗不自投於河雖聾蟲而不自陷又况人乎淮南子説林訓人性便絲衣帛或射之則被鎧甲為其所不便以得所便淮南子説林訓夫行者先全已而後求名仕者先辟害而後求禄夫香餌非不美也龜龍聞而深藏鸞鳳見而高逝者知其害身也夫為鳥鵲魚鼈食香餌而後狂飛奔走遜身屈遰無益於死鹽鐵論褒賢鴻飛戾天避害紫淵雖有逢門不能危身焦氏易林益之小畜次八羡其足濟于溝瀆面貞測曰羨其足避凶事也太𤣥經第一羨次五見鷕音杳踤于林獺入于淵征測曰見鷕及獺深居逃凶也太𤣥經第四逃言鸞鳳飛於千仞蛟龍藏於旋淵故矰繳不能逮羅㒺不能加賢者亦宜高舉隱藏法令不能拘也王逸注楚辭哀時命塗有狂夫投刃而􅇋澤有猛虎厲牙而望知見之者不敢前進如不知見則遭狂夫之刃犯猛虎之牙矣王充論衡知實篇神龜實可樂明戒在刳腸嵇中散集阮德如荅夫人受形於造化與萬物並存有生之最靈者也異於草木草木不能避風雨辭斤斧殊於鳥獸鳥獸不能遠網羅而逃寒暑嵇中散集向子期難養生論慮巫山之失火恐芝艾之并焚耳抱朴子外篇嘉遯瘕疾塡胸而不敢鈹蠆尾螫附而不敢斫非好疾而愛毒以鈹斫之患甚疾螫也酖酒盈巵渴者弗飲非不渇也飲之立死銷金在爐盜者不掬非不欲也掬而灼爛虓虎在前地有隋珠雖貪如盜蹠則手不暇拾懸彀向心路有西施雖婬如景陽則目不暇視非不愛寶而悦色而不顧者利緩而害急也劉子利害孫武曰避其銳氣謂鋭氣之利甚于鋒刃也李善注文選魏都賦匪擇木以棲集尠林焚而鳥存文選西征賦鸞鳳翔於蒼雲兮故矰繳而不能加蛟龍濳於旋淵兮身不挂於網羅知貪餌而近死兮不如下遊乎清波補文選莊忌哀時命鴛雛遠害不羞卑栖靈虬避難不恥汚泥廣文選曹子建矯志詩鵷雛翔窮冥蒲且不能視鸛鷺遵臯渚數為矰所繫廣文選張孟陽招隱詩騰猨疑矯箭驚雁避虚弓文苑英華梁庾肩吾應制六詩鑠金為洪爐盜𨽻不探鴆肉在俎餓徒不食太平御覽飲食部食下譬如有人常畏怨家捨棄父母妻子產業服具而遠逃避元陽妙經卷一譬如有人畏於債主遠適邊國不為債主及於他人之所陵奪何以故由路遠險絕債主家人不能達彼大寶積經二十譬如孤寡恐懼之人畏對家便徃至城中卽安對家人無那之何所以者何是人已離於對人得安隱處故佛國經卷下如鴈將羣避羅高翔法句經世俗品譬如有王以四毒蛇盛之一篋令人養食瞻視卧起摩洗其身若令一虵生瞋恚者我當准法戮之都市爾時其人聞王切令心生惶怖捨篋逃走王時復遣五旃陁羅拔刀隨後其人迴顧見後五人遂自捨去是時五人以惡方便藏所持刀密遣一人詐為親善而語之言汝可還來其人不信投一聚落欲自隱匿既入聚中闚看諸舍都不見人執持缸器悉空無物既不見人求物不得即便坐地聞空中聲咄哉男子此聚空曠無有居民今夜當有六大賊來汝設遇者命終今汝當云何而得免之爾時其人恐怖遂增復捨而去路値一河其水漂急無有船筏以恐畏故即取種種草木為筏復更思惟我設住此當為毒蛇五旃陁羅一詐親者及六大賊之所危害若度此河筏不可依當没水死寧没水死終不為彼虵賊所害即推草筏置之水中身倚其上手把脚踏截流而去即達彼㟁安隱無患心意泰然怖懼消除法苑珠林巻六十六除害豕牙横猾剛㬥難制之物二剛而進能豶其牙柔能制健禁㬥抑盛王弼注易大畜天惟喪亾殷國者若稼穡之夫務去草也天意既然我何敢不終我壠畆也言穢草盡須除去殷餘皆當殄滅也尚書正義大誥伐除蒺藜與棘自古之人何乃勤苦為此事乎我將得黍稷焉鄭氏箋詩楚茨柞棫之所以茂盛者乃人愾燎除其旁草養治之使無害也鄭氏箋詩旱麓吳在蔡蔡必速飛去吳所以翦其翼也左傳昭公十五年樹德莫如滋去疾莫如盡左傳哀公元年使醫除疾而曰必遺類焉者未之有也左傳哀公十一年是豢吳也夫越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志於齊猶獲石田也無所用之越不為沼吳其泯矣左傳哀公十一年庭氏掌射國中之夭鳥若不見其鳥獸則以救日之弓與救月之矢射之若神也則以大陰之弓與枉矢射之周禮秋官庭氏赤犮氏掌除牆屋以蜃炭攻之以灰灑毒之周禮秋官赤犮氏伐木不自其本必復生塞水不自其源必復流滅禍不自其基必復亂國語晉本根猶樹枝葉益長本根益茂是以難已也今若大其柯去其枝葉絕其本根可以少閒國語晉國家將敗必用奸人而嗜其疾味其子之謂乎夫誰無疾眚能者早除之舊怨滅宗國之疾眚也為之闗籥藩籬而遠備閒之猶恐其至也國語楚譬越之在吳也猶人之有腹心之疾也夫齊魯譬諸疾疥癬也國語吳夫飛鳥在青雲之上尚欲繳音灼微矢以射之而况近卧於華池集於庭廡乎今越王放于南山之中游於不可存之地幸來渉我壤土入吾梐梱此乃㕑宰之成事食也豈可失之乎吳越春秋勾踐人臣外傳人之所以善扁鵲者為有臃腫也使善扁鵲而無臃腫也則人莫之為之也戰國策韓釐王詩云樹德莫如滋除害莫如盡吳不㤀越越故亡呉齊不㤀燕燕故亡齊齊亡於燕呉亡於越此除疾不盡也戰國䇿秦昭襄王夫戰者萬乗之存亡也且臣聞之曰削株掘根無與禍鄰禍乃不存戰國策秦昭襄王猛如虎狠如羊貪如狼彊不可使者皆斬之史記項羽紀深耕穊種立苗欲疏非其種者鋤而去之史記齊悼世家蝮螫手則斬手螫足則斬足何者為害於身也今田假田角田間於楚趙非直手足戚也何故不殺且秦復得志於天下則齮齕用事者墳墓矣史記田儋傳河南天下㗋咽二周餘斃莠盛苗穢何可不鉏也前漢書酷吏傳疾其末者絕其本前漢書貢禹傳故穆張理天網補綴漏目羅取殘禍以塞天意後漢書朱暉孫穆傳誅惡及本本誅則惡消振裘持領領正則毛理後漢書儒林列傳臣聞農夫去草嘉榖必茂忠臣除姦王道以清後漢書范滂傳燎其餘燼有若秋原晉書明帝紀夫除惡人猶農夫之去草令絕其本勿使能滋晉書張軌傳桂蠧必除人邪必翦宋書文五王桂陽傳絶其心根勿使能植銜索之枯幾何不蠧宋書袁淑傳養魚者除其徧獺育禽者去其豺狼宋書索虜傳庶亂羊永除害馬長息梁書賀琛傳問豺狼其何者訪虺蝪之為誰梁書朱异傳堰水先塞其源伐木必拔其本源不塞本不拔雖翦枝竭流終不可絶矣魏書高閭傳若苗穢害田隨風烈火芝艾俱焚安能白别乎魏志公孫度傳註鋤彼草茅逐兹鳥雀北史魏長賢傳草茅弗去則害禾榖盜賊弗誅則傷良民夫舍公法而行私惠則是利姦邪而長暴亂也管子明法解桓公曰魯梁之於齊也干榖也蠭螫也齒之有脣也今吾欲王魯梁何行而可管子輕重戊削跡無遺根無與禍鄰禍乃不存韓非子初見秦豺狼在牢其羊不繁韓非子揚權放此類者鳥獸之儕徒狐狸之醜類也生之為患殺之無咎賈子耳痺治國者若耨田去害苗者而已今沐者墮髮而猶為之不止以所去者少所利者多淮南子說山訓治疽不擇善惡醜肉而并割之農夫不察苗莠而并耘之豈不虚哉淮南子說山訓鳥不干防者雖近弗射其當道雖遠弗釋淮南子說林訓且天之欲利人非宜其欲利榖也除穢不待時况穢人乎春秋繁露天地之行夫三折肱為良毉梁丘子遇虺毒而獲療猶有與之同疾者必問所以己之之方焉孔叢子嘉言田䑕野雞意常欲逃拘制籠檻不得動揺焦氏易林需之隨逐兎驅狼避去不祥焦氏易林隨之訟虜豹擒虎為王得福焦氏易林中孚之㢲次五礥下研切而閒而㧞我姦而非石如石厲測曰礥閒如石其敵堅也太𤣥經第一閑上九豨毅其牙發以張弧測曰豨毅其牙吏所獵也太𤣥經第三毅次八􅪇怗堅禍惟用解蝝之貞測曰􅪇堅禍用直方也太𤣥經第六堅次三闗其門戸用止狂蟲測曰闗其門戸禦不當也太𤣥經第六止痛不著身言忍之錢不出家言與之假使公卿子弟有被羌禍朝夕切急如邊民者則競言當誅羌矣濳夫論救邊今有妖狐成羣游於大苑之中憇於金宛之内其容足以媚太陽之光其氛足以侵雷霆之聲貪如鼫鼠矯若雄鷹狀如狒狒巧若猩猩其突如羝其蟲如麋倐忽萬態莫知厥機足蟠乎魑魅之域跡􅥓乎魍魎之墟飾之以冶容粲之以文皮能禮北辰而弗惠乎黔黎何以為黨其名曰貍此皆獸苑之所不畜者也今肆然而馳據以要路使麒麟不遊於郊騶虞不躡于囿羣䝈憑威以噬人肉而入苑者不可勝數肝腦積丘陵膏脂致淵藪誠欲彎弓而射狐設網而驅䝈以廓清其苑囿豢畜其騶虞若此者果何術以制哉晉王曰狐也養禍于苑藏富于穴何忍肆也欲亟制之子其問諸虞人天禄閣外史三難梁冀之誅徵君謂袁閎曰甫聞去惡木者易去惡根者難袁閎曰子何不效斧斤之力而去其根乎天禄閣外史去惡治人猶如養苗先去其穢武矦十六䇿治人雖埋輪之志無屈權石而狐鼠㣲物亦蠧大猷文選沈約彈王源養雞者不畜貍牧獸者不育豺樹木者憂其蠧保民者除其賊文選王褒四子講德論暫擾以制敵愈於放敵而常擾也夫四體者人之所甚愛茍宜伐病則削肌刮骨矣補文選王鑒勸親征疏蔓草猶不可長况狼兕之冦乎補文選王鑒勸親征疏封人有能以輕鑿修鉤去樹之蝎者樹得以茂繁中舍人曰不識天下者亦有蝎者乎寡人告之曰昔三苗共工鯀驩兠非堯之蝎與問曰諸侯之國亦有蝎乎寡人告之曰齊之諸田晉之六卿魯之三桓非諸侯之蝎與然三國無輕鑿修鉤之任終于齊簒魯弱晉國以分不亦痛乎曰不識為君子者亦有蝎乎寡人告之曰固有之也富而慢貴而驕殘仁賊義甘財悦色此亦君子之蝎也補文選曹植籍田說陳繩則木之枉者有罪措凖則地之廢險者有罪審名分則羣臣不安者有罪農之耨去害苗者賢者之治去害義者意林尸子今鷹隼始擊當從天氣取姦惡以成嚴霜之誅藝文類聚歲時部秋馬援擊尋陽山賊上書曰除其竹木譬如嬰兒頭多蟣蝨而剃之蕩蕩然蟣蝨無所復依事文類聚蝨東觀漢記戮巨海之奔鯨殱中原之封豕文苑英華徐陵勸諭上書夫剽悍禍賊始從事於干戈宼賊姦宄始容心於兵革非智術有以過之勇力有以勝之决未可以挫其威虐也玉皇本行集經善拔衆毒箭故稱大醫王海空智藏經平等品偈有如毒蛇放毒螫人雖有良咒世之草藥無如之何唯有聖人甘露妙藥能消其毒元陽妙經卷一如有良藥名曰離箭隨所著處衆箭皆除毒藥於中無得住者此藥威力所逼遣故波羅蜜多經五百九十三如阿伽陁一丸之藥能破大毒大方等大集經卷九譬如蘧麥妨麥稗莠根莖枝葉與麥相似若未秀出時不可分别穟旣出已田畯農士并根俱棄何以故壞淨麥故大方廣十輪經卷三天下禾中生草草敗禾實人當誅拔草去之禾乃成好實佛般泥洹經卷上譬如毒蛇入人室不急除之害必至三昧法門經卷上譬如良毉能破病不問甘苦以能究竟除病安穏故大智度論卷七十一譬如種榖其苗雖好穢草多故不能增長大智度論卷八十二如樹根不㧞其樹猶生貪根不拔苦樹常在法苑珠林卷九十七慮患水在火上既濟君子以思患而豫防之易既濟謂此上天蓋實高矣而有雷霆擊人不敢不曲其脊以敬之以喻已恐觸王之忌諱也謂此下地葢實厚矣而有陷溺殺人不敢不累其足以畏之以喻己恐陷在位之羅網也毛詩正義正月水若遠於民則人不没溺但由水近人則人得用之沐浴而日日狎習不復畏懼或泳之或游之無有誡忌至於洪波浪起亦猶習以為常故致覆溺也禮記正義緇衣鄧矦曰人將不食吾餘對曰若不從三臣抑社稷實不血食而君焉取餘左傳莊公六年蠭蠆有毒而况國乎左傳僖公二十二年是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎左傳宣公四年得臣猶在憂未歇也困獸猶鬭况國相乎左傳宣公十二年深山大澤實生龍蛇彼美余懼其生龍蛇以禍女左傳襄公二十一年彼其髮短而心甚長其或寢處我矣左傳昭公三年雞以毛羽牲具恐其被養為犧故自斷其尾殘毁其形春秋正義昭公二十二年吾觀君夫人也若為亂其猶􅈻農也雖獲田沃而勤易之將弗克饗為人而已國語晉大夫種勇而善謀將還玩吳國於股掌之上以得其志國語呉蜹蛾蜂蠆皆能害人况君相乎國語晉文公逐麋而失之問農夫老古曰吾麋何在老古以足指曰如是往公曰寡人問子以足指何也老古振衣而起曰亦不意人君如此也虎豹之居也厭閒而近人故得魚鼈之居也厭深而之淺故得諸矦厭衆而亾其國詩云維鵲有巢維鳩居之君故不歸人將居之於是文公恐歸晉文春秋失麋越在我猶心腹有積聚不發則無傷動作者有死亾越絶請糴内傳夫鼠㤀壁壁不㤀鼠今越人不㤀吳矣越絕請糴内傳臣聞狼子有野心仇讐之人不可親夫虎不可餧以食蝮蛇不恣其意今大王捐國家之福以饒無益之讐棄忠臣之言而順敵人之欲臣必見越之破吳豸疑當作豕鹿游于姑胥之臺荆榛蔓於宮闕吳越春秋句踐陰謀外傳伍舉進諫曰有一大鳥集楚國之庭三年不飛亦不鳴此何鳥也於是莊王曰此鳥不飛飛則冲天不鳴鳴則驚人伍舉曰不飛不鳴將為射者所圖弦矢卒音猝發豈得冲天而驚人乎吳越春秋王僚使公子光傳蘇子謂李兌曰今日臣之來也暮後郭門藉席無所得寄宿人田中􅅖有大叢夜半土梗與木梗鬬曰汝不如我我者乃土也使我逢疾風淋雨壞沮乃復歸土今汝非木之根則木之枝耳汝逢疾風淋雨漂入漳河東流至海氾濫無所止臣竊以為土梗勝也今君殺主父而族之君之立於天下危於累卵戰國策趙恵文王范睢曰秦韓之地形相錯如繡秦之有韓若木之有蠧人之病心腹天下有變為秦害者莫大於韓戰國策秦昭襄王夫秦王之㬥而積怨于燕足為寒心又况聞樊將軍之在乎是謂委肉當餓虎之蹊禍必不振矣戰國策燕王喜齊王母家駟鈞惡戾虎而冠者也史記齊悼世家里語有之䑛糠及米吳與膠西知名諸侯也一時見察恐不得安肆矣史記吳王濞傳今釋弗擊此所謂養虎自遺害也史記項羽紀脛脛者未必全也我不能自保眞人所謂鼠不容穴銜窶數者也前漢書楊惲傳困獸猶鬭蜂蠆有毒况大衆乎後漢書皇甫嵩列傳懼煙炎之毁熸何光芒之敢揚哉後漢書蔡邕傳而不見聽必窮鹿抵虎華陽國志進無威鳳來儀之美退無鷹鸇摶擊之用徘徊湘川將為怪鳥晉書孫盛傳雖處高臺之上逍遥重仞之墉及其危亡之憂過於頻翟之慮晉書齊王冏傳風塵之變出於非常晉書陶璜傳蔓草猶不可長况虎兕之冦乎晉書王鑒傳譬猶蚤虱疥癬雖為小疴令人終歲不安宋書索虜傳古諺有之敵不可縱夫以一酌之水或為不測之淵如不時滅恐同原草魏書郭祚傳螳螂之志何能自息魏書邢巒傳諸君不見毒蛇乎斷其頭猶能為害况除腹心疾而曰必遺其類其可乎魏書陸侯傳門有倚禍事不可不宻墻有伏冦言不可而失北齊書魏收傳類傷鳥之驚弦等窮獸之謀觸陳書畱異傳夫愛馬者以筐盛矢以蜃盛溺適有蚉䖟僕縁而拊之不時則缺銜毁首碎胸意有所至而愛有所亾可不愼邪莊子人間世狡兎盡則良犬烹敵國滅則謀臣亾大夫何不釋吳而患越乎韓非子内儲說下夫吳越之勢不兩立越之於吳也譬若心腹之疾也雖無作其傷深而在内也夫齊之與吳也疥癬之病也不苦其已也且其無傷也今釋越而伐齊譬之猶懼虎而刺猏雖勝之其後患未央呂氏春秋知化本細末大弛必至心賈子大都蠧衆則木折隙大則牆壞懸垂之類有時而隧枝格之屬有時而弛淮南子說林訓非其事者勿仞也非其名者勿就也無故有顯名者勿處也無功而富貴者勿居也夫就人之名者廢仞人之事者敗無功而大利者後將為害譬猶縁高木而望四方也雖愉樂哉然而疾風至未嘗不恐也患及身然後憂之六驥追之弗能及也淮南子人間訓虎兕相據而螻蟻得志兩敵相機而匹夫乘間鹽鐵論擊之燕雀離巢宇而有鷹隼之憂坎井之蛙離其居而有蛇鼠之患况翺翔千仞而游四海乎其禍必大矣此李斯之所以折翼而趙高沒淵也鹽鐵論復古行者比於鳥上畏鷹鸇下畏網羅夫人為善者少為讒者多若身不死安知禍罪不施說苑敬愼且夫吳若蜂蠆然不棄毒於人則不靜余恐棄毒於我也說苑權謀臣之來也過於淄水上見一土偶人方與木梗人語木偶謂土偶人曰子先土也持子以為耦遇天大雨水潦並至子必沮壞應曰我沮乃反吾眞耳今子東園之桃也刻子以梗遇天大雨水潦並至必浮子汎汎乎不知所止今秦四塞之國也有虎狼之心恐其有木梗之患說苑正諫堅氷黄鳥啼哀悲愁數驚鷙鷂飄為我憂焦氏易林小畜之否東方孟春乘氷載盆焦氏易林晉之兌雞雉失雛常畏狐狸焦氏易林解之益鳥嚕夜中以戒災凶焦氏易林大過之渙上九㩣其角維用抵族測曰㩣其角殄厥類也太𤣥經第五翕臣恐秦將取其脣而䕶其齒天禄閣外史傷時言南方有高山深林其路險阨又多虎豹匍匐蛇蜒以􅇋伺人也王逸註楚辭大招船漏則水入囊穿則内空武矦十六策隂察牆壊屋傾堤決水流武矦十六策陰察譬猶𤣥象著明莫大乎日月水火之原於是在焉然節而宣之則以養生立功用之失適則焚溺而死豈可恃懸象之在天而謂水火不殺人哉抱朴子外篇酒誡至若蘭茝傾頓桂林移植根萌未樹牙淺絃急常恐風波潛駭危機宻發文選呂安與􅄞茂齊書是賊踰我垣墻之内闚我室家之好黷武之衆易動驚弓之鳥難安補文選王鑒勸親征疏大嚼者咋斷其舌右手執斧左手執鉞傷夷一身之中尚有不可信况於人乎雖無深瑕潛釁隱過匿愆乃可以為人廣文選曹子建黄初五年令和鸞未調而身在轅側庭宇未踐而棟折榱覆廣文選郤令先釋譏夫據圖揮刃愚夫弗為臨淵登峭莫不惴慄何則害交故慮篤患切而懼深廣文選𫝊季友演愼論魯城門朽頓欲頽孔子疾行而過之左右曰如此久矣孔子曰吾惡其久也脫遇壞則不幸意林論衡葢聞磨礪脣吻脂膏齒牙陵風扇毒向影吹沙是以敬而遠之豺有五子吁可畏也鬼有一車文苑英華庾信連珠經云寶者衆之所利也茍利其利害必存焉太平御覽珍寶部寶魚縣獸檻天下一契何氏語林言志憂患日夜長莚如蔓草生法句經愛欲品如截葱薤後則復生修行道地經行空品我今頼君破壊牢獄斷絕繫縛汝今復欲還我牢獄繫縛我耶本縁經持王子品又如服藥藥能破病病已得破藥亦應出若藥不出則復是病大智度論三十一如與師子虎狼共住常懐憂畏大智度論卷五十四喻林卷六
