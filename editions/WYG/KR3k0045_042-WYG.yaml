body:
  text: 喻林卷四十二明徐元太撰人事門四十通才左之左之君子宜之右之右之君子有之維其有之是以似之詩小雅裳裳者華刀味核生南荒中樹形髙五十丈實如棗長五尺金刀剖之則甜竹刀剖之則飴木刀剖之則酸蘆刀剖之則辛神異經世稱君子之徳其猶龍乎蓋以其善變也魏志裴潛傳註聖智之不窮若轉圓之無止轉圓之無止猶獸威無盡故轉圓法猛獸鬼谷子本經隂符註龍則變化無窮神則隂陽不測故盛神之道法五龍也鬼谷子本經隂符註次五達于中衢大小無迷測曰達于中衢道四通也太𤣥經第二達或曰人材有能大而不能小猶函牛之鼎不可以烹鷄愚以為此非名也若夫雞之與牛亦貫體之大小也故鼎亦宜有大小若以烹犢則豈不能烹雞乎故能治大郡則亦能治小郡矣劉邵人物志材能智周通塞不為時窮才經夷險不為世屈是以陵飈之羽不求反風曜夜之目不思倒日文選陸機演連珠卑髙相配而天地位三光並照則小大備能髙而不能下非兼通也能麤而不能細非妙工也古文苑宋玉小言賦才大有力如虎執轡如組詩國風簡兮夫器博者無近用道長者其功逺後漢書宋𢎞傳論誠知晝不操燭日有餘光蜀志秦宓傳嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用晉書和嶠傳良弓難張然可以及髙入深良馬難乗然可以任重致逺良才難令然可以致君見尊墨子親土相髙下視墝肥序五種君子不如農人通財貨相美惡辨貴賤君子不如賈人設規矩陳繩墨便備用君子不如工人不恤是非然不然之情以相薦樽以相恥怍君子不若恵施鄧析也若夫謫徳而定次量能而受官使賢不肖皆得其位能不能皆得其官萬物得其宜事變得其應慎墨不得進其談恵施鄧析不得竄其察言必當理事必當務是然後君子之所長也荀子儒效大器之人若九鼎瑚璉不可卒成也河上公註老子同異良馬疾走千里一宿焦氏易林節之蒙請問大器曰大器其猶規矩凖繩乎先自治而後治人之謂大器揚子先知篇臣與之議如探九淵其際無有天禄閣外史去秦殷周之地極五千里荒服要服勤能牧之漢氏廓土牧萬里之外要荒之地襃衣博帶夫徳不優者不能懐逺才不大者不能博見王充論衡别通篇夫一石之重一人挈之十石以上二人不能舉也世多挈一石之任寡有舉十石之力儒生所載非徒十石之重也王充論衡效力篇江河之水馳涌滑漏席地長逺無枯渴之流本源盛矣知江河之流逺地中之源盛不知萬牒之人胸中之才茂迷惑者也王充論衡效力篇夫勁弩難彀而可以摧堅逮逺大舟難乗而可以致重濟深猛將難御而可以折衝拓境髙賢難臨而可以攸敘􅂜倫抱朴子外篇任能垂䕃萬畆者必出峻極之嶺滔天襄陵者必發板桐之源邈世之勲必由絶倫之器定傾之算必吐冠俗之懐是以蟭螟之巢無乗風之羽溝澮之中無宵朗之琦抱朴子外篇博喻靈鳯所以晨起丹穴夕萃軒丘日未移晷周張九陵淩風蹈雲不䟾不閡者以其六翮之輕勁也夫良才大智亦有國之六翮也抱朴子外篇廣譬夫迹水之中無吞舟之鱗寸枝之上無垂天之翼蟻垤之顛無扶桑之林潢潦之源無襄陵之流巨鼇首冠瀛洲飛波淩乎方丈洪桃盤於度陵建水竦於都廣沈鯤横於天地雲鵬戾乎𤣥象且夫雷霆之駭不能細其響黄河之激不能局其流騏騄追風不能近其迹鴻鵠奪翅不能卑其飛雲厚者雨必猛弓勁者箭必逺王生學博才大又安省乎抱朴子外篇喻蔽夫以規矩凖繩而能使上下無猜者大器也大器者必籠沓羣疑之表莫得與之爭量也揚子法言註先知篇馬有餘氣力乃能敗駕士行卓異不入俗檢李善註文選武帝詔逸翮思拂霄迅足羡逺遊清源無增瀾安得運吞舟文選郭璞遊仙詩大才乃主之股肱羽翮也意林新論大才治世猶櫛之理髮也太平御覧服用部梳篦楚文王好獵人有獻鷹為獵於雲夢烟燒漲天毛羣羽族爭噬競搏此鷹瞪目雲際無搏噬之志王謂獻者曰汝將欺余耶答曰若效於雉臣豈敢獻俄而雲際有物凝翔鮮白不辨其形膺便聳翮而升須㬰毛墮若雪血下如雨有大鳥墮地度其兩翅數十里衆莫能識有博物君子曰此大鵬鶵也乃厚賞之事類賦禽部膺註沙彌雖小能度人王子雖小能殺人龍子雖小能興雲致雨雷電霹靂阿育王傳二超羣誕彌厥月先生如達音撻詩大雅生民阪田崎嶇墝埆之處而有菀然茂特之苗喻賢者在閒辟隠居之時鄭氏箋詩正月鴻者大鳥不宜與鳧鷖之屬飛而循渚以喻周公聖人不宜與凡人之輩共處東都毛詩正義九罭毛蟲之精者曰麟羽蟲之精者曰鳯介蟲之精者曰龜鱗蟲之精者曰龍倮蟲之精者曰聖人注闕麒麟之於走獸鳯凰之於飛鳥泰山之於丘垤河海之於行潦類也聖人之於民亦類也岀乎其類拔乎其萃孟子公孫丑上臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育臣之愚竊以為人誠有之獸亦宜然史記司馬相如傳駃騠駿馬也生七日而超其母史記魯仲連列傳註聲之𦕈者不可同於衆人之耳形之美者不可混於世俗之目辭之衍者不可齊於庸人之聽前漢書揚雄傳下若廼牙曠清耳於管絃離婁眇目於毫分逢蒙絶技於弧矢班輸𣙜巧於斧斤良樂軼能於相馭烏獲抗力於千鈞龢鵲發精於鍼石研桑心計於無垠僕亦不任厠技於彼列故宻爾自娛於斯文前漢書敘傳上士中之俊猶毛中之髦後漢書順冲質帝紀卿所謂鐵中錚錚傭中佼佼者也後漢書劉盆子列傳飛鳥遺跡蟬蛻亡殻騰蛇棄鱗神龍喪角至人能變達士拔俗乗雲無轡騁風無足後漢書仲長統列傳大道夷且長窘路狹且促脩翼無卑棲逺趾不歩局舒吾凌霄羽奮此千里足超邁絶塵驅倐忽誰能逐後漢書文苑列傳夫英偉大賢多出於山澤河北土平氣均蓬蒿裁髙三尺不足成林故也晉書陳頵傳昨於稠人中一見嵇紹昻昻然如野鶴之在雞羣晉書嵇紹傳斯蓋軒冕之龍門豪梁之宗匠晉書范汪傳乃是一國所推豈但牧豎中逸羣邪晉書楊方傳此虜矯矯所謂有豕白蹢晉書馮跋記若紫㣲之帶皇穹閬風之跨后土晉書赫連勃勃傳爾撃賊如鶻入鵶羣宜思好事北史齊宗室諸王上落元海傳智與衆同非國師也技與衆同非國工也太公六韜年勢分地若一彊者能守分財若一智者能收智者有十倍人之功愚者有不賡本之事管子國蓄魚欲異羣魚捨水躍岸即死虎欲異羣虎捨山入市即擒聖人不異衆人特物不能拘爾關尹子三極欲踰至徳之美者其慮不與俗同欲驗九天之髙者行不徑請鶡冠子世兵受命於地唯松栢獨也在冬夏青青受命於天唯舜獨也正莊子徳充符人之情於害之中爭取小焉於利之中爭取大焉故同味而嗜厚膊者必其甘之者也同師而超羣者必其樂之者也弗甘弗樂而能為表者未之聞也淮南子繆稱訓呂望使老者奮項託使嬰兒矜以類相慕淮南子説林訓聖人處於隂衆人處於陽聖人行於水衆人行於霜淮南子説林訓君子髙其行則人莫能階也逺其志則人莫能及也孔叢子居衞夫鳯凰之初起也翾翾十歩之雀喔咿而笑之及其升於髙一詘一信展而雲間藩木之雀超然自知不及逺矣士褐衣緼著未嘗完也糲藿之食未嘗飽也世俗之士即以為羞耳及其出則安百議用則延民命世俗之士超然自知不及逺矣韓詩外傳以世俗言之鄉曲有桀人尚辟之鹽鐵論備胡客有歌於郢中者其始曰下里巴人國中屬而和者數千人其為陽陵採薇國中屬而和者數百人其為陽春白雪國中屬而和者數十人而已也引商刻角雜以流徴國中屬而和者不過數人是其曲彌髙者其和彌寡新序雜事一鳥有鳯而魚有鯨鳯鳥上擊於九千里絶浮雲負蒼天翺翔乎窈㝠之上夫糞田之鴳豈能與之斷天地之髙哉鯨魚朝發崑崙之墟暴鬐於碣石暮宿於孟諸夫尺澤之鯢豈能與之量江海之大哉故非獨鳥有鳯而魚有鯨也士亦有之新序雜事一川有瀆山有嶽髙而且大者衆人所不能踰也揚子學行力稱烏獲捷言羌亥勇期賁育聖云仲尼壽稱彭祖物有俊傑不可誣也非學之致也申覽俗嫌寡者為人上者也衆者為人下者也一伍之長才足以長一伍者也一國之君才足以君一國者也天下之王才足以王天下者也愚役於智猶枝之附榦此理天下之常法也昌言損益篇林生於山山未必皆有林風出於谷谷未必皆有風金生於石石未必皆有金聖人出衆人衆人未必皆聖賢也淮南子説林訓解君子絶徳小人絶力或問絶徳曰舜以孝禹以功臯陶以謨非絶徳耶力秦悼武烏獲任鄙扛鼎抃牛非絶力耶揚子淵騫篇或曰力有扛洪鼎揭華旗智徳亦有之乎曰百人矣徳諧頑嚚讓萬國知情天地形不測百人乎揚子孝至篇言沅水之中有盛茂之芷灃水之外有芬芳之蘭異於衆草以興湘夫人美好亦異於衆人也王逸註楚辭九歌言皇天后土生美橘樹異於衆木來服習南土便其性也屈原自喻才徳如橘樹亦異於衆也王逸註楚詞九章舉擔千里之人杖筴越彊之士手足胼胝面目驪黑無傷感不任之疾筋力皮革必有與人異者矣王充論衡定賢篇采玉者心羡於玉鑚龜能知神於龜能差衆儒之才累其髙下賢於所累王充論衡超竒篇飾面者皆欲為好而運目者希文音者皆欲為悲而驚耳者寡故夫鴻儒所謂超而又超者也以超之奇退與儒生相料文軒之比於敝車錦繡之方於緼袍也其相過逺矣如與俗人相料太山之巔墆長狄之項跖不足以喻故夫丘山以土石為體其有銅鐵山之竒也銅鐵既竒或岀金玉然鴻儒世之金玉也竒而又竒矣王充論衡超竒篇龍食與蛇異故其舉措與蛇不同王充論衡道虚篇夫鳯皇鳥之聖者也騏驎獸之聖者也五帝三王臯陶孔子人之聖也王充論衡講瑞篇夫草之精秀者為英獸之特羣者為雄故人之文武茂異取名於此故聰明秀出謂之英膽力過人謂之雄此其大體之别名也劉邵人物志英雄嵩維岳宗華岱恒衡氣通天漢神洞幽明嵬然中立衆山之英山海經中山海圖讃人中之有老彭猶木中之有松栢稟之自然何可學得乎抱朴子内篇對俗世人以人所尤長衆所不及者便謂之聖故善圍碁之無比者則謂之碁聖故嚴子卿馬綏明于今有碁聖之名焉善史書之絶時者則謂之書聖故衞協張墨於今有書聖之名焉善刻削之尤巧者則謂之木聖故張衞馬忠於今有木聖之名焉抱朴子内篇辨問夫班秋倕狄機械之聖也附扁和緩治疾之聖也子韋甘均占候之聖也史蘇辛廖卜筮之聖也夏育杜囘筋力之聖也荆軻聶政勇敢之聖也飛廉夸父輕速之聖也子野延州知音之聖也孫吳韓白用兵之聖也聖者人事之極號也不獨於文學而已矣抱朴子内篇辨問蓋刻削者比肩而班秋擅絶手之稱援琴至衆而䕫襄専知音之難廐馬千駟而騏驥有邈羣之價美人萬計而威施有超世之容蓋有逺過衆者也抱朴子外篇尚博翠虬無翅而天飛螣蛇無足而電鶩鼈無耳而善聞蚓無口而揚聲故臯繇喑而與辯者同功晉野瞽而與離朱齊明抱朴子外篇博喻閬風𤣥圃不借髙於丘垤懸黎結緑不假觀於瓊珉是以英偉不羣而幽蕙之芬駭峻概獨立而衆禽之響振抱朴子外篇博喻特受自然之正氣者至希也下首則唯為松栢上首則唯有聖人故凡不正者皆來求正耳若物皆有青全則無貴松栢人各自正則無羡於大聖而趣之也郭子註莊徳充符人皆天地之靈也五行之秀也靈全秀淳則為君子靈秀不具則為小人千人一靈萬人一秀故曰君子之道鮮矣關氏易傳神義如虎之别百獸炳然殊異揚子法言註吾子篇物以希為貴人以衆為賤李善註文選顔延年陶徴士誄如金在沙顯然自異猶玉在泥湼而不緇廣文選沈休文髙士贊處市井之肆服君子之服在小人之中行賢哲之事猶夜珮珠玉也亦灼然矣意林傅子孔子見老􅅨歸三日不談弟子問曰夫子見老􅅨何規哉子曰人用意如飛鴻者為弓弩射之如遊鹿者走狗而逐之若遊魚者釣繳以投之吾今見龍合而成體敗而成章藝文類聚鱗介部龍老子見孔子從弟子五人問曰為誰對曰子路為勇其次子貢為智曾子為􅍿顔回為仁子張為式老子歎曰吾聞南方有鳥其名為鳯所居積石千里天為生食其樹名瓊枝髙百仞以璆琳琅玕為實天又為生離珠一人三頭遞卧遞起以伺琅玕鳯鳥之文戴聖嬰仁右智左賢藝文類聚鳥部鳯夫麟鳯以形狀為别聖人以心神為異藝文類聚鳥部鳯夫畜生賤也然有尤善者皆見記識故馬稱驊騮驥騄牛譽郭椒丁櫟藝文類聚獸部萬雀不及一鳯皇衆星不如一月明藝文類聚鳥部雀隨光燭魏非折水之恒珍和璧入秦豈潤山之常寶藝文類聚内典部内典墓志賢者之處世猶金石生於沙中豫章産於幽谷太平御覽木部豫樟驪龍之眸見百里纖芥埤雅品物門龍靈蛇棄鱗神龍解角以言致人達士超世拔俗委蛻萬物之上埤雅品物門螣蛇五鹿岳岳朱雲折其角事文類聚國子博士木生地中日長而上猶聖人在諸侯之中明徳日益髙大也玉海周易鄭康成注如諸寳中有明月寳珠最為勝妙如諸味中有甘露漿最為勝妙元陽妙經卷五如秋滿月暉映衆星如夏日輪光奪諸色如四大寳妙髙山王臨照諸山威光迥岀波羅宻多經卷一如我今者於大衆中作師子吼無所畏吼大丈夫吼自然智吼波羅宻多經五百九十七是人中尊人中善士人中豪貴人中牛王人中蓮花人中龍象人中師子人中勇健人中調御人中英傑波羅宻多經五百四十九譬如三千大千世界初成即有妙髙山王及以大海波羅宻多經卷五百七十二其智宏深譬之巨海菩提髙廣喻若須彌自身威光超於日月凡所思擇與慧相應猶如雪山其心潔白光明普照無邊功徳燒煩惱薪方之於火不為善惡之所搖動心靜常安猶如大地洗滌煩惑如清淨水心無所主猶如火不著世間猶如風養諸有情猶如地觀諸世界如虛空荷載衆生猶如良乗不染世法譬之蓮華逺暢法音猶如雷震雨一切法方之大雨光蔽賢聖猶彼大仙善能調伏如大龍象勇猛無畏如師子王覆䕶衆生如尼拘陀樹他論不動如鐵圍山修慈無量如彼恒河諸善法王能為前導如大梵天無所聚積猶如飛鳥摧伏他論如金翅王難遇希有如優曇華大寳積經十八譬如比丘證得天耳身雖在逺能聞諸聲大寳積經二十修攝諸根如大龍象澄靜無濁如深泉池盛徳巍巍如金樓觀色相超挺如紫金山又如大海衆寶充盈如帝釋主諸天圍遶如大梵王心慮寂静大寳積經四十七譬如帝釋天中之王坐善法堂諸天之中光明顯赫大寳積經六十一譬如諸山須彌為最大寳積經卷八十四譬如一切諸水之中海為最勝大寶積經卷八十四如大海中有羅㬋羅阿脩羅王亦有其餘衆生之類唯阿脩羅王能得其􅔄餘則不得大方等大集經十八譬如鹽中先陁婆鹽而為第一能除諸病及能明眼大方廣佛華嚴經卷三十六譬如一切水生華中優鉢羅華而為最勝陸生華中瞻博迦華而為最勝大方廣佛華嚴經卷三十六譬如王子生在王家王后所生具足王相生已即勝一切臣衆但以王力非是自力若身長大藝業悉成乃自力超過一切大方廣佛華嚴經三十七譬如真金治作寳冠置閻浮提主聖王頂上一切臣民諸莊嚴具無與等者大方廣佛華嚴經三十八譬如月輪有四竒特一者映蔽一切星宿光明二者隨逐於時示現虧盈三者於閻浮提澄淨水中影無不現四者一切見者皆對目前而此月輪無有别矣大方廣佛華嚴經卷五十譬如迦毘伽鳥在㲉中時有大勢力餘鳥弗及大方廣佛華嚴經卷五十九譬如有人用師子筋以為琴弦音聲既奏餘弦斷絶大方廣佛華嚴經卷五十九譬如大師子吼小師子聞皆悉勇健一切禽獸逺避竄伏大方廣佛華嚴經卷五十九譬如金翅鳥初始生時其目明淨有大勢力大小諸鳥所不能及大方廣佛華嚴經卷五十九譬如牛馬羊乳合在一器以師子乳投彼器中餘乳消盡直過無礙大方廣佛華嚴經卷五十九譬如金剛雖破不全一切衆寳猶不能及大方廣佛華嚴經卷七十八如金翅鳥王子初始生時目則明利飛則勁捷一切諸鳥雖久成長無能及者大方廣佛華嚴經卷七十八猶如師子王獨歩無所懼無盡意菩薩經八譬如衆流歸於大海須彌者諸山中尊月者衆星中大明日者明於衆㝠若師子諸獸中之猛如王於衆而為上如釋於忉利而為尊梵者於衆梵而獨髙如來三昧經卷上作甚猛降伏衆魔作醫王調和諸藥作師曉知諸事若持弓弭箭在所射其箭無所不入若力士持兵有所擊應時無有全命者持是智慧擊於愚㝠無有不盡者如來三昧經卷上猶諸根香沉香為第一猶諸樹香赤旃檀為第一猶諸水華青蓮華為第一猶諸陸華須摩那華為第一中阿含經卷三十四王為人中尊海為江河長月為星中明中阿含經卷四十一江河泉源流大海深為最衆星列空中日月明為最中本起經馬麥品衆施經施勝衆味道味勝衆樂法樂勝法句經愛欲品衆明日為最諸智佛為最三昧法門經卷上譬如三種師子一黄師子二白髦師子黄師子雖亦能踔不如白髦師子王大智度論卷十七如一切照中日為第一一切人中轉輪聖王最第一一切蓮花中青蓮為第一一切陸生華須曼色第一一切木香中牛頭旃檀為第一一切珠中如意珠為第一大智度論卷二十七譬如須彌山於衆山中自然最第一大智度論卷二十七譬如人中力士踔不過三四丈若天中力士無復限數大智度論卷三十九譬如雖有星宿日月最勝大智度論卷七十六菩薩善生有四義一者種子勝以菩提心為種子故二者生母勝以般若波羅宻為生母故三者胎蔵勝以福智二聚住持為胎蔵故四者乳母勝以大悲長養為乳母故大乗莊嚴經論卷一生勝由四義者一種子勝信大乗法為種子故二生母勝般若波羅宻為生母故三胎蔵勝大禪定樂為胎蔵故四乳母勝大悲長養為乳母故大乗莊嚴經卷三是人中師子離怖畏故是人中牛王御大衆故是人中持御衆上首故是人中龍王無誤失故是人中良馬心善調故是人中最勝家族姓等映衆人故瑜伽師地論卷八十二譬如須彌山王顯於大海安處衆寶師子之坐蔽於一切諸來大衆維摩詰所説經佛國品須彌山天帝釋所住金剛山也秦言妙髙處大海之中水上方髙三百三十六萬里如來處四部之中威相超絶光蔽大衆猶金山之顯溟海者也僧肇註維摩詰經佛國品大用茅潔白之物也自牧田歸荑其信美而異者可以供祭祀猶貞女在窈窕之處媒氏達之可以配人君鄭氏箋詩静女鯤非溟海無以運其軀鳯非脩梧無以晞其翼卿有佐時之器夜光之寶當振纓雲閣耀價連城區區河右未足以逞卿才力晉書利鹿孤傳明月在天衆水咸見清風在林羣籟畢響陳書傅縡傳乗紫氛以厲羽負青天而鼔翼魏書李順希仁弟騫傳舟大者任重馬駿者逺馳隋書蘇威傳任公子為大鉤巨緇五十犗以為餌蹲乎㑹稽投竿東海旦旦而釣期年不得魚已而大魚食之牽巨鉤䤾沒而下騖揚而奮鬐白波若山海水震蕩聲侔鬼神憚赫千里任公子得若魚離而腊之自淛河以東蒼梧以北莫不厭若魚者已而後世輇才諷説之徒皆驚而相告也夫揭竿累趣灌瀆守鯢鮒其於得大魚難矣飾小説以干縣令其於大達亦逺矣是以未嘗聞任氏之風俗其不可與經於世亦逺矣莊子外物白圭謂魏王曰市丘之鼎以烹雞多洎之則淡而不可食少洎之則焦而不熟然而視之蝺焉美無所可用恵子之言有似於此恵子聞之曰不然使三軍饑而居鼎旁適為之甑則莫宜之此鼎矣呂氏春秋應言薄疑説衞嗣君以王術嗣君應之曰予所有者千乗也願以受敎薄疑對曰烏獲舉千鈞又况一斤乎淮南子道應訓撰良馬者非以逐狐貉將以射麋鹿砥利劒者非以斬縞衣將以斷兕犀淮南子説山訓刀便剃毛至伐大木非斧不尅淮南子説山訓百星之明不如一月之光十牖畢開不若一户之明淮南子説林訓梁相死恵子欲之梁渡河而遽墮水中船人救之船人曰子欲何之而遽也曰梁無相吾欲徃相之船人曰子居船檝之間而困無我則子死矣子何能相梁乎恵子曰居艘楫之間則吾不如子至於安國家全社稷子之比我蒙蒙如未視之狗耳説苑雜言呂望鼓刀在列肆文王親徃問之呂望對曰下屠屠牛上屠屠國王逸註楚辭天問修策迥馭長羅逺羈關氏易傳誠帝室之瑰寶清朝之偉器廣樂九奏必登旻天之庭韶夏六變必響上帝之祀矣廣文選陸士龍移太常府薦張贍森森千丈松磊砢非一節雖無衰桶麗較為梁棟桀藝文類聚木部松詩足下頓彌天之網收萬仞之魚量之以溪谷數之以陔兆何其壯乎觀夫任公子之所釣此為鰌鰕未足為吾子之道太平御覽資産部網罟如有玅寳世所希絶在愚下人邊常被汙賤智者得已獻之於王用飾寶冠為王所戴大乗􅁡嚴經卷下圖大楚人有好以弱弓微繳加歸鴈之上者頃襄王聞召而問之對曰小臣之好射鶀鴈羅鸗小矢之發也何足為大王道也且稱楚之大因大王之賢所弋非直此也昔者三王以弋道徳五霸以弋戰國故秦魏燕趙者騏鴈也齊魯韓衞者青首也鄒費郯邳者羅鸗也外其餘則不足射者見鳥六雙以王何取王何不以聖人為弓以勇士為繳時張而射此六雙者可得而囊載也其樂非特朝夕之樂也其獲非特鳬鴈之實也史記楚世家秦為大鳥負海内而處東面而立左臂據趙之西南右臂𫝊楚鄢郢膺聲韓魏垂頭中國處既形便勢有地利奮翼鼔翅方三千里則秦未可得獨招而夜射也史記楚世家今不獵猛敵而獵田彘不摶反冦而摶畜菟翫細娛而不圖大患非所以為安也前漢書賈誼傳逐麋之狗當顧菟耶前漢書外戚傳豺狼横道不宜復問狐貍前漢書孫寶傳大丈夫焉能處斗筲之役乎後漢書郭太列傳大丈夫處世當掃除天下安事一室乎後漢書陳蕃列傳虎狼當路不治狐貍先除大害小害自己魏志蔣濟傳當為崇岡峻阜何能為培塿乎晉書劉元海傳志行萬里者不中道而輟足圖四海者匪據細以害大吳志陸遜傳良田百頃不計一畝但見逺志無有當歸宋書五行一志棄䴏雀之小志慕鴻鵠以髙翔梁書陳伯之傳卿身乃短慮何長也魏書陸侯傳荷峻極之層構導積石之洪流魏書李順希仁弟騫傳方將振神綱以掩六合灑𤣥澤以潤八荒魏書盧水胡沮渠蒙遜傳星之昭昭不若月之曀曀小事之成不若大事之廢君子之非賢於小人之是也晏子春秋諫下吞舟之魚不游枝流鴻鵠髙飛不集汙池何則其極逺也黄鍾大呂不可從煩奏之舞何則其音䟽也將治大者不治細成大功者不成小此之謂矣列子揚朱民智之不可用猶嬰兒之心也夫嬰兒不剔首則腹痛不㨽痤則寖益剔首㨽痤必一人抱之慈母治之然猶啼呼不止嬰兒子不知犯其所小苦致其所大利也韓非子顯學有席卷天下包舉宇内囊括四海之意并吞八荒之心賈子過秦上宰制天下分裂山河賈子過秦上挾管仲之知者非為厮役之使也懐陶朱之慮者不居貧困之處鹽鐵論地廣為地戰者不能成王為禄仕者不能成政説苑君道小忠大忠之賊也小利大利之殘也説苑譚叢鱣鯉遊於百川不如江海之深逝朱鳥遊於山澤不如雲漢之髙飛賢俊遊於諸侯不如一王之殊遇子其慎所遊也天禄閣外史待樵夫楚磯之漁也擊竿而歌隠笠而卧自謂無懐子棲於洞庭之渚磯於七澤之畔吞雲吸霞浩浩乎與太虛同流羡魚而無心於釣倚磯而無迹於物臨洞庭而望瀟湘窺九谿而瞰七澤旁矚乎武陵之源和飲乎滄浪之水終日坐而得魚大釣無空網小釣無空鈎雖五溪三澨之魚皆慕餌而投其鈎故能為魚之司命今漢之七國猶楚之七澤也七國之封建乎諸侯猶七澤之棲息乎魚也七澤倚洞庭而為固不猶七國倚漢室而為藩籬乎子何不以洞庭之渚為棲以七澤之畔為磯坐而得諸侯以顯其業使國家乂安海内殷庶九夷八蠻不毛之類者皆慕義而賔乎天禄閣外史漁論大王知食葉之蟲乎有數仞之木其葉扶䟱油然而隂人皆以為值寒而凋待黄而落也方其五六月之間蟲生其下以枯葉綢繆而為巢附絲於枝上潛飲朝露以為無傷其木也不知旬日之内其葉稀稀其木濯濯向也扶䟱而成隂今則頹然而無葉矣其所傷者即其所棲以為䕃者也夫蟲依乎木而亦傷乎木豈其心哉所食在此固不能舍木而求食也然則一蟲之微非能傷乎數仞之木一木之傷亦非一蟲之力也木之質不疆而所䕃之葉徒足以資餓蟲耳故葉欲榮則蟲益附葉欲凋則蟲益食其勢然也豈惟食葉之蟲乎有三寸之魚畜乎方渚憑依乎茂藻之間蕩漾乎回瀾之際以為是魚之所逝而息也不知苑囿潰於淫雨而方渚之波通於川瀆而魚皆掉尾而去遐逝乎江湖旁泛乎藪澤而東躍乎滄海若鯤之變化而飛翔焉雲行雨施周流八綖而鼔動宇内之萬物是其在渚也安于渚而不知海其在海也又安於海而忘渚也亦其勢然也吾聞聖人觀魚蟲之所靜而知其所動故一弛一張或柔或剛伸縮無迹動靜無方亂世則為魚蟲治世則為侯王吸而為秋隂呼而為春陽其變化也莫知其涯故聖人之顯烈無窮焉王何不為聖烈之跡而忍魚蟲之舉也天禄閣外史時勢萬鈞之為重衝飇不能移簫韶未九成靈鳥不紆儀也是以俟扶搖而登蒼霄者不充詘於蓬蒿之杪騁蘭筋以陟六萬者不爭塗乎蹇驢之羣抱朴子外篇安貧吾子茍知商販可以崇寳耕也可以免饑不識逐麋者不顧兔道逺者其到遲也且夫尚父之鼓刀素首乃吐竒也抱朴子外篇安貧始悟立不朽之言者不以産業汨和追下帷之績者不以窺園㳙目子以臭鶵之甘呼鴛鳯擗蟹之計要猛虎豈不陋乎抱朴子外篇守塉今察𤣥洲之釣也左挾魚罶栁右執槁竿立於潢汙之涯倚乎楊栁之間精不離乎魚啄思不岀乎鮒鯿形容枯槁神色憔悴樂不復勤獲不當費斯乃水濵之役夫也已君王又何稱焉王若建堯舜之洪竿攄禹湯之修綸投之於瀆視之於海漫漫羣生孰非吾有其為大王之釣亦不樂乎補文選宋玉釣賦大道夷且長窘路狹且促修翼無卑棲逺趾不歩局舒吾陵霄羽奮此千里足超邁絶塵驅倐忽誰能逐廣文選韋孟酈文勝詩欲行大道莫示小逕三十六部尊經道徳經如有二人作大方便入深山窟求無價寳彼入未久便見兩邊有諸少價金銀等寳俱見不取漸次前行復見兩邊有多價寳一見貪著荷負而還一見不取更復前進至極勝處獲無價寳恣意持還多所饒益波羅蜜多經五百八十七我當逆流而行非順流者我當作師子吼非野干鳴我當示現金翅鳥王之大勢力不應示現微細蜫蟲之所有力大寳積經四十四鴻鵠將飛便懐四海之志驥騄方騁已有千里之心辯正論卷四令庶覽者捨河伯秋水之自多逺遊於海若之淵門不束情於近敎而駭神於長廣之説也𢎞明集十四喻林卷四十二
