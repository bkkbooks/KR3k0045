body:
  text: 喻林卷一明徐元太撰造化門一天道鼓之以雷霆潤之以風雨日月運行一寒一暑易繫辭上傳雷以動之風以散之雨以潤之日以晅之易說卦傳萬物尊天而貴風雨所以尊天者為其莫不受命焉也所以貴風雨者為其莫不待風而動待雨而濡也若使萬物釋天而更有所受命釋風而更有所仰動釋雨而更有所仰濡則無為尊天而貴風雨矣管子版法解天者誠其日德也日誠出誠入南北有極故莫弗以為法則天者信其月刑也月信死信生終則有始故莫弗以為政天者明星其稽也􅍌星不亂各以序行故小大莫弗以章天者因時其則也四時當名代而不干故莫弗以為必然天者一法其同也前後左右古今自如故莫弗以為常鶡冠子王鈇天之處高其聽卑其目芒其視察賈子耳痺四時者天之吏也日月者天之使也星辰者天之期也虹霓彗星者天之忌也淮南子天文訓天道者無私就也無私去也能者有餘拙者不足順之者利逆之者凶譬如隋侯之珠和氏之璧得之者富失之者貧淮南子覽冥訓夫至明者其照無疆至晦者其暗無疆春秋繁露奉本夫本末相兼猶手背之相包一身和則百節皆適天道順則本末俱暢郭子註莊天地春秋漢合孳曰強幹弱流天之道李善註文選兩都賦使星司夜月司時猶使雞司晨也藝文類聚天部月斗極天之中也言天者必擬之人故自臍以下人之陰也自極以北天之隂也太平御覽天部下日月若懸璧五星若編珠初學記天部星註天有四時五行日月相推寒暑迭代其轉運也和而為雨怒而為風散而為露亂而為霧凝而為霜雪立為蚿􅀈此天地之常數也若四時失運寒暑乖違則五緯盈縮星辰錯行日月薄蝕彗孛流飛此天地之色診也法苑珠林卷六十三形氣天形穹隆如雞子幕其際周接四海之表浮於元氣之上譬如覆奩以抑水而不没者氣充其中故也晉書天文上虹霓也雲霧也風雨也四時也此積氣之成乎天者也山嶽也河海也金石也水火也此積形之成乎地者也知積氣也知積塊也奚謂不壞夫天地空中之一細物有中之最巨者􅍌子天瑞清陽者薄靡而為天重濁者凝滯而為地清妙之合專易重濁之凝竭難故天先成而地後定淮南子天文訓天地之間有陰陽之氣常漸人者若水常漸魚也所以異於水者可見與不可見耳其澹澹一也然則人之居天地之間其猶魚之離水一也春秋繁露如天之為山猶人之有骨節也水猶人之有血脉也王充論衡祀義篇地以名山為輔佐石為之骨川為之脉草木為之毛土為之肉三尺以上為糞三尺以下為地博物志夫天者統元氣焉非止蕩蕩蒼蒼之謂也地者統元形焉非止山川丘陵之謂也人者統元識焉非止圓首方足之謂也文中子立命宋均曰渾渾混混雞卵未分也李善註文選江賦元氣周行終始無已如水之流不得獨處李善註文選幽通賦衆星累累如連貝江河四海如衣帶李善註文選陸士衡贈顧公眞詩地常動不止而人不知譬如閉舟而行不覺舟之運也李善註文選張茂先勵志詩日薄星廻穹天所以紀物山盈川沖后土所以播氣文選陸士衡演連珠夫地有形而天無體譬如火焉煙在上灰在下也太平御覽天部下造化權輿以為東方之氣風也故凍非東風不能解湛非東風不能溢埤雅天道門風風經曰調暢祥和天之喜氣也折揚奔厲天之怒氣也埤雅天道門風仰觀天形如車蓋衆星纍纍如連貝初學記天部星註土精為石石氣之核也氣之生石猶人筋絡之生爪牙也初學記地部石日處君而盈度月象臣而虧􅅖雲逶迤而上布星離離以舒灮初學記文部文字夫土地皆有形名而人莫察焉有龜龍體有鱗鳳貌有弓弩勢有斗升象有張舒形有塞閉容有隱眞之安有累卵之危有膏腴之利有塉埆之害事類賦地部地註地東西為緯南北為經山為積德川為積刑高者為生下者為死丘陵為牡川谷為牝事類賦地部地註天不足西北地不足東南西北為天門東南為地戸天門無上地戸無下玉海天文天文書上昔者周公問於商高曰夫天不可階而升地不可得尺寸而度請問數安從出商高曰數之法出於圓方玉海天文天文書上岐伯曰言天者求之本言地者求之位言人者求之氣交帝曰何謂氣交岐伯曰上下之位氣交之中人之居也故曰天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之萬物由之此之謂也黄帝素問内經六微旨大論易稱天𤣥蓋取幽㴱之名莊說蒼天近在遠望之色於是野人信明謂旻青如碧儒士據典謂乾黑如漆青黑誠異乖體是同儒野雖殊不知是一法苑珠林卷二流行闔戸謂之坤闢戸謂之乾一闔一闢謂之變往來不窮謂之通易繫辭上傳鳥獸俄呦呦俄旬旬俄逃逃草木俄茁茁俄停停俄蕭蕭天地不能畱聖人不能繫有運者存焉爾闗尹子八籌鬻熊曰運轉亡已天地宻移疇覺之哉列子天瑞雜乎芒芴之間變而有氣氣變而有形形變而有生今又變而之死是相與為春秋冬夏四時行也莊子至樂鈞旋轂轉周而復匝淮南子原道訓日出暘谷入於虞淵莫知其動須臾之間俛人之頸淮南子說林訓陽陰之時雖異二體常存猶如一鼎之水而未加火純陰也加火極熱純陽也純陽則無陰氣息火水寒則更陰矣純陰則無陽氣加火水熱則更陽矣春秋繁露雨雹對三統者天地人之始道之大綱也五行者品物之宗也道以三興德以五成故三皇五帝三王五伯至道不遠三五復反譬右循連鐶順鼎耳窮則反本終則復始也風俗通五伯雷風炫煥與物時行太𤣥經𤣥圖日有南有北月有徃有來日不南不北則無冬無夏月不往不來則望晦不成太𤣥經太𤣥告夫地之有百川也猶人之有血脉也血脉流行泛揚動靜自有節度百川亦然其朝夕往來猶人之呼吸氣出入也王充論衡書虚篇星宿之相次如歲月之相襲新故相易周而復始太𤣥經第六養解夫五行四時佐天地造物者也然水火相踐金木相代而共成陶鈞之致春秋異􅇋寒暑繼節而俱濟一歲之功李善註文選陸士衡演連珠剖而為二判而為五或為白黑或為水火或為酸鹹或為徵羽道德經指歸卷八生剋露雖湛湛然見陽則乾毛詩湛露註五行四時十二月還相為本也五聲六律十二管還相為宫也五味六和十二食還相為質也五色六章十二衣還相為質也禮記禮運譬如火斜照水日斜照鏡則水鏡之灮㫄照他物若使鏡正當日水正當火則水鏡之灮不能有照日之奪月亦猶是也春秋正義桓公三年惟火之為物能鎔金而銷之能燔木而燒之關尹子四符篇鍊土生木鍊木生火鍊火生雲鍊雲生水鍊水反土鍊甘生酸鍊酸生辛鍊辛生苦鍊苦生鹹鍊鹹反甘變宮生徵變徵生商變商生羽變羽生角變角生宮淮南子地形訓金勝木者非以一刃殘林也土勝水者非以一墣塞江也淮南子說林訓夫大生小多生少天之道也故丘阜不能生雲雨涔水不能生魚鼈者小也牛馬之氣蒸生蟣虱蟣虱之氣蒸不能生牛馬故化生於外非生於内也淮南子泰族訓凡天地之物乘以其泰而生厭於其勝而死四時之變是也故冬之水氣東加於春而木生乘其泰也春之生西至金而死厭於勝也生於木者至金而死生於金者至火而死春之所生而不得過秋秋之所生不得過夏天之數也春秋繁露天地之行金木交刑水火相敵休廢於時吉凶生焉京氏易傳隨上陰陽死于位生于時死于時生于位進退不可詰正盛則衰來正衰則盛來京氏易傳渙中剛柔相傷火爛銷金焦氏易林大壯之遯五生不相殄五克不相逆不相殄乃能相繼也不相逆乃能相治也相繼則父子之道也相治則君臣之寶也太𤣥經太𤣥吿水之於火氣志交通然相克害不可其器隔以釡鼎太𤣥經第三親解火近於水水則焦遠於水火則炎熾焱怒太𤣥經第四迎解緯書曰火鑠金鵲啄蝟爾雅翼彚水火相息而更用事猶王者受命改正朔易服色玉海周易鄭康成注周髀云日猶火月猶水火則外灮水則含景故月灮生於日所照魄生於日所蔽當日則灮盈就日則明盡玉海天文天文圖木得金而伐火得水而滅土得木而達金得火而缺水得土而絶萬物盡然不可勝竭黄帝素問内經寳命全形論此五陰滅彼五陰生譬如燈明燈生闇滅燈滅闇生海空智藏經哀歎品復有風輪名為遍霔刼火燒時暜於世界降霔大雨復有風輪名為乾竭刼水漂時能令彼水悉皆枯涸大寶積經卷八十五如水得增上力滅火火得增上力則消水乃至草木各有相害大智度論卷六十八如水能滅火火不自滅火大智度論卷七十土資水澤金由火煎高僧傳十讚消息天地不變不能通氣五行迭終四時更廢君臣取象變節相移能消者息必專者敗此其變易也周易正義序天有時以生有時以殺草木有時以生有時以死石有時以泐水有時以凝有時以澤此天時也周禮考工記詩曰高岸為谷㴱谷為陵三后之姓於今為庶左傳昭公三十二年臣聞峻高者隤茂葉者摧日中則移月滿則虧四時不竝盛五行不俱馳陰陽更倡氣有盛衰故溢堤之水不淹其量熻乾之火不復其熾水靜則無漚瀴之怒火消則無熹毛之熱吳越春秋句踐歸國外傳天不足西北星辰西北移地不足東南以海為池日中必移月滿必虧史記日者傳衝風之衰不能起毛羽彊弩之末力不能入魯縞夫盛之有衰猶朝之必莫也前漢書韓安國傅夫白日登天運景萬里無物不照及其入地一炭之灮不可得見三五盈月清耀燭夜可以遠望及其在晝明不如鏡魏志管輅傳注道有隆窳物有興廢有聲有寂有灮有翳朱陽否於素秋𤣥陰抑於孟春羲和逝而望舒係運氣匿而耀靈陳蜀志郤正傳天道不常盛寒暑更進退蜀志郤正傳註道㒺隆而不殺物無盛而不衰晉書曹攄傳有始有終天地之經自非三灮誰能不零晉書左貴嬪傳且物極則虧禍盈而覆者天之道也晉書馮跋記天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者與之天之道損有餘而補不足老子天道庳者隆之因虧者成之漸子華子執中凡一氣不頓進一形不頓虧亦不覺其成不覺其虧亦如人自生至老貌色智態無日不異皮膚爪髮隨生隨落非嬰孩時有停而不易也􅍌子天瑞物損於彼者盈於此成於此者虧於彼􅍌子天瑞陰極則陽來陰消則陽長衰則退盛則戰京氏易傳坤中夫李梅實多者來年為之衰新穀熟者舊穀為之虧自天地不能兩盈而況於人事乎故利於彼者必耗於此猶陰陽之不竝曜晝夜之有長短也鹽鐵論非鞅江河之溢不過三日飄風㬥雨須臾而畢說苑談叢黑龍吐灮使陰復陽焦氏易林否之小過㴱谷為陵衰者復興焦氏易林明夷之比日月運行一寒一暑榮灮赫赫不可得保焦氏易林中孚之晉次六月闕其博不如開明于西測曰月闕其博明始退也太𤣥經第一中上九陵崢岸峭陁詩是切測曰陵崢岸峭陁鋭極必崩也太𤣥經第二鋭數多者見貴而實索數少者見賤而實饒太𤣥經𤣥圖晝數多夜數少象月闚而日溢君行灮而臣行滅君子道全小人道缺太𤣥經𤣥圖日一南而萬物死日一北而萬物生斗一北而萬物虚斗一南而萬物盈太𤣥經𤣥攡四時之序節滿卽謝五行之性功成必退故陽極而陰降陰極而陽升日中則昃月盈則虧此天之常道也勢積則損財聚必散年盛返衰樂極還悲此人之恒也劉子誡盈木落歸本水流歸末故水利在亥木利在辰盛衰各得其所故樂也前漢書註京房傳人之觀火聽雷謂其盈實終以天收雷聲地藏火熱則為虚無言極盛者亦滅亾也前漢書註揚䧺傳太公曰春道生萬物榮秋道成萬物零李善註文選應休璉與曹長思書一闔一開兩儀之迹一沖一溢懸象之節渙沍期於寒暑凋蔚要乎春秋補文選郭璞客傲若飄風不終朝兮驟雨不終日雷隆隆而輒息兮火猶熾而速滅自夫物有盛衰兮況人事之所極廣文選揚子雲太𤣥賦月盈則沖華不再繁廣文選魏文帝丹霞蔽日日發星廻昊天無以爽其節山盈川沖厚地不能虧其度藝文類聚職官部司空表四運忽其代序兮萬物紛以廻薄覽蕐蒔之時育兮察盛衰之所託感冬索而春敷嗟夏茂而秋落初學記歲時部秋天地極則反盈則損日月是也日中則移月滿則虧而況於人乎道德經四子集解是以日中而昃月滿而缺四時變化一消一息高山之下必有㴱谷大泉之流必有激波爍金湯石存于凝冰裂地之端陰陽所成道德經指歸卷十三炎極則涼理之恒數物壯則老其義必然道德經註疏卷三江河之枯竭兮水流注于海叅同契三相類上篇三千三百年為小陽九小百六九千九百年為大陽九大百六天厄謂之陽九地虧謂之百六靈寶自然妙經大海江河猶有枯竭萬仞大魚曝脊在外出曜經一無常品有無凡動息則靜靜非􅍟動者也語息則黙黙非􅍟語者也然則天地雖大富有萬物雷動風行運化萬變寂然至無是其本矣王弼註易復天了無質仰而瞻之高遠無極眼瞀精絶故蒼蒼然也譬之旁望遠道之黄山而皆青俯察千仞之㴱谷而窈黑夫青非眞色而黑非有體也晉書天文上一陶能作萬器終無有一器能作陶者能害陶者一道能作萬物終無有一物能作道者能害道者闗尹子一宇篇寒暑溫涼之變如瓦石之類置之火卽熱置之水卽寒呵之卽溫吹之卽涼特因外物有去有來而彼瓦石實無去來譬如水中之影有去有來所謂水者實無去來闗尹子二柱篇形動不生形而生影聲動不生聲而生響無動不生無而生有􅍌子天瑞有實而無乎處者宇也有長而無本剽者宙也有乎生有乎死有乎出有乎入入出而無見其形是謂天門天門者無有也萬物出乎無有莊子庚桑楚灮曜問乎無有曰夫子有乎其無有乎灮曜不得問而熟視其狀貌窅然空然終日視之而不見聽之而不聞摶之而不得也灮曜曰至矣其孰能至此乎予能有無矣而未能無無也莊子知北遊夫無形者物之大祖也無音者聲之大宗也其子為灮其孫為水皆生於無形乎夫灮可見而不可握水可循而不可毁故有像之類莫尊於水淮南子原道訓夫秋豪之末淪於無間而復歸於大矣蘆苻之厚通於無􅀢而復反於敦龎若夫無秋豪之微蘆苻之厚四達無境通於無圻而莫之要御夭遏者其襲微重妙挺挏萬物揣丸變化天地之間何足以論之淮南子俶眞訓有有者言萬物摻參落根莖枝葉青蔥苓蘢萑委蔰戸炫煌蠉飛蝡動蚑行喙息可切循把握而有數量有無者視之不見其形聽之不聞其聲捫門之不可得也望之不可極也諸與扈冶浩浩瀚汗瀚不可隱儀揆度而通灮耀者淮南子俶眞訓夫木之死也青青去之也夫使木生者豈木也猶充形者之非形也故生生者未嘗死也其所生則死矣化物者未嘗化也其所化則化矣淮南子精神訓無形生有形故為物大祖也無音生有音故為聲大宗也淮南子原道訓解無為之本則無畱於一象無係於一味故能為形氣之主動必由之張湛註􅍌子天瑞夫道之而無語名之而無名視之而無形聽之而無聲則道之全焉故能昭音響而出氣物包形神而章灮影𤣥以之黑素以之白矩以之方規以之圓圓方得形而此無形白黑得名而此無名也張湛註􅍌子天瑞道者涵乾括坤其本無名論其無則影響猶為有焉論其有則萬物猶為無焉􅝗􅈡不能計其多少離朱不能察其髣髴吳札晉野竭聰不能尋其音聲乎窈㝠之内􅀈狶􅀈猪疾􅋅不能迹其兆朕乎宇宙之外抱朴子内篇道意如鳥出巢如蛇出穴由其尚有故無所不之何氏語林文學魏書恍惚之數生於毫釐毫釐之數起於度量千之萬之可以益大黄帝素問内經靈蘭秘典論無形附有形有形為之宅有形附無形無形為之主金庭無為妙經譬如畵師以衆雜彩畵作衆像若男若女若牛若馬凡夫无知見之則生男女等相畵師了知无有男女海空智藏經持誠品譬如根眼開時見色閉時无見海空智藏經哀歎品譬如影灮雖可顯說而無實法可令執取雖無可執取而有所顯照波羅蜜多經五百九十六譬如呼響因於山谷及音聲起無有形狀不可覩見亦無分别而能隨逐一切語言大方廣佛蕐嚴經卷五十一知有非實如陽焰水知實非無如火性生金剛三昧經卷下如灰覆火豈得稱無若闇尋聲當知必有辯正論卷七倚伏九三无平不陂无往不復艱貞无咎易泰城復于隍其命亂也易泰初九悔亾喪馬勿逐自復易暌若四月純陽用事陰在其中靡草死也十月純陰用事陽在其中薺麥生也周易正義賁水激則旱兮矢激則遠萬物囘薄兮振蕩相轉史記賈生傳成敗之轉譬若糾墨史記南越尉佗傳論陽降陰升一㬱一興流而為川滯而為陵禍不可攘福不可徵晉書摰虞傳夫明晦迭來屯平代有南齊書海陵王本紀晦為明始亂實治基魏書出帝紀宋人有好行仁義者三世不懈家無故黑牛生白犢以問孔子孔子曰此吉祥也以薦上帝居一年其父無故而盲其牛又復生白犢其父又復令其子問孔子其子曰前問之而失明又何問乎父曰聖人之言先迕後合其事未究姑復問之其子又復問孔子孔子曰吉祥也復敎以祭其子歸致命其父曰行孔子之言也居一年其子又無故而盲其後楚攻宋圍其城民易子而食之析骸而炊之丁壯者皆乘城而戰死者大半此人以父子有疾皆免及圍解而疾俱復􅍌子說符嶢山崩而薄落之水涸區冶生而淳鈎之劒成紂為無道左強在側太公竝世故武王之功立由是觀之利害之路禍福之門不可求而得也淮南子覽冥訓有榮蕐者必有憔悴有羅紈者必有麻蒯淮南子說林訓塞上之人有善術者馬無故亾而入胡人皆弔之其父曰此何遽不為福乎居數月其馬將胡駿馬而歸人皆賀之其父曰此何遽不能為禍乎家富良馬其子好騎墮而折其髀人皆弔之其父曰此何遽不為福乎居一年胡人大入塞丁壯者引弦而戰近塞之人死者十九此獨以跛之故父子相保故福之為禍禍之為福化不可極深不可測也淮南子人間訓禍與福同門利與害為鄰非神聖人莫之能分淮南子人間訓貞良而亾先人餘殃猖蹶而活先人餘烈說苑談叢天地之道極則反滿則損五采曜眼有時而渝茂木豐草有時而落物有盛衰安得自若說苑談叢天將與之必先苦之天將毁之必先累之說苑談叢有奇福者必有奇禍有甚美者必有甚惡列女傳周列國晉羊叔姬盛中後跌衰者復掇盈滿或毁疾羸肥腯焦氏易林遯之坎利端始萌害漸亦芽速速方轂夭夭是加欲豐其屋乃蔀其家蔡中郎集釋誨豈覺崇朁之相為􅈡尾哀樂之相為朝暮抱朴子外篇知止昔宋人有白犢之祥而有失明之禍雖有失明之禍以至獲全之福北叟有胡馬之利卒有奔墜之患雖有奔墜之患以至保身之福劉子禍福禍福同根妖祥共域劉子禍福人皆愛少而惡老重榮而輕悴故簪珥英蕐而焚灰枯朽莫識枯朽生於英蕐英蕐歸於枯朽劉子言苑禍福相為表裏如糾繩索相附㑹也前漢書註賈誼傳得固易失榮難久恃膏以明自煎人以財興累李善注文選阮嗣宗詠懷詩春秋相代若環之無端天道常也譬如天馬本出西北忽由東道況富之與貧貴之與賤易至乎李善注文選阮嗣宗詠懷詩福為禍始禍作福階天地盈虚寒暑周廻文選盧諶贈劉琨詩休咎相乘躡飜覆若波瀾文選陸機君子行禍福相轉利害相生如循環而運丸耳其作不可見其端不可覺意林唐子一宅同姓相代或吉或凶一官同姓相代或遷或免成康居之而興幽厲居之而衰吉凶興衰在人不由宅矣意林潛夫論董生有云弔者在門賀者在閭言有憂則恐懼敬事敬事則必有善功而福至也又曰賀者在門弔者在閭言受福則驕奢驕奢則禍至故弔隨而來藝文類聚人部鑒誡書蓋聞市朝遷􅐙山川悠遠是以狐兎所處由來建始之宮荆棘參天昔日長洲之苑文苑英蕐庾信連珠夫否終斯泰屯極則亨若日月之廻環猶陰陽之報復文苑英蕐徐陵邊防上書阮嗣宗蘇門歌曰日沒不周西月出丹淵中陽精蔽不見陰灮代為䧺亭亭在須臾厭厭將復隆富貴俯仰間貧賤何必終困學紀聞卷十三攷史利為福始利與害同門福為禍先禍與福同鄰道德經四子集解譬如有人閉在暗室眼無所見復有異人曾受苦惱作是思惟此人受苦甚為可愍若不得脱是人必死以火與之令得少明時暗室人見火歡喜心得安穩爾時彼火以少因縁熾然火焰燒彼暗室爾時彼人被燒而死僧伽吒經卷三夫貴賤靡恒貧富無定譬水火更王寒暑遞來法苑珠林卷二十三相須剛柔分動不溷乃明雷電竝合不亂乃章王弼注易噬嗑子夏傳云地得水而柔水得地而流故曰比周易音義比彼廻風從上下谷風未與相扶謂之為頽若谷風既與相扶而上則為焱不復為頹也毛詩正義谷風方祗體安儷乾儀而合德圓舒循晷配羲曜以齊明故知陽爍陰凝萬物假其陶鑄火炎水潤六氣由其調理晉書恭思褚皇后傳金木水火土其勢相害其道相待故至寒傷物无寒不可至暑傷物无暑不可文子自然天不發其陰則萬物不生地不發其陽則萬物不成天圓地方道在中央淮南子天文訓正月失政七月涼風不至二月失政八月雷不藏三月失政九月不下霜四月失政十月不凍五月失政十一月蟄蟲冬出其鄉六月失政十二月草木不脱七月失政正月大寒不解八月失政二月雷不發九月失政三月春風不濟十月失政四月草木不實十一月失政五月下雹霜十二月失政六月五穀疾狂淮南子時則訓以水和土以土和火以火化金以金治木木復反土五行相治所以成器用淮南子地形訓川竭而谷虚丘夷而淵塞脣竭而齒寒河水之㴱其壤在山淮南子說林訓金與水二氣相資父子之謂京氏易傳訟中一晝一夜然後作一日一陰一陽然後生萬物太𤣥經𤣥圖朗月竝衆星日出擅其明冬寒地為裂春和草木榮陽德雖暜濟非陰亦不成藝文類聚天部星詩一晝一夜成一日一男一女成一室意林風俗通譬如木牀離木无牀離牀无木海空智藏經哀歎品陽不獨王以陰為得陰不獨王以陽為得亦如冬以溫暖為德夏以涼冷為德男以女為德女以男為德之義黄帝宅經上譬如泥瓶泥與瓶合泥滅瓶成而是泥相終不名瓶瓶雖非泥不餘處來以泥因縁而生是瓶海空智藏經哀歎品相禪日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉易繫辭下傳三心五噣四時更見毛詩小星注陰陽協氣而代謝寒暑隨時而推移晉書成公綏傳夫天地一險一易若鼔之有揨擿擋則擊管子宙合朱明長贏不能盡其所以為溫也必隨之以揫斂之氣而為秋𤣥武沍陰不能盡其所以寒也必隨之以敷榮之氣而為春孰為此者天也天且不可以盡而況人乎子華子執中將來者進成功者退已用則賤當時則貴太𤣥經太𤣥文萬物㒺乎北直乎東蒙乎南酋乎西冥乎北故㒺者有之舍也直者文之素也蒙者亾之主也酋者生之府也冥者明之藏也太𤣥經太𤣥文春榮秋落四時所以迭代金行水流五德所以互序藝文類聚帝王部陳武帝表日沒不周西月出丹淵中陽精蔽不見陰灮代為雄何氏語林言志魏氏春秋四時更運功成則移道德經注譬如花果花生无果果生无花海空智藏經問病品如彼水上泡一生而一滅中陰經卷下循環三界内猶如汲井輪佛說身觀經當九譬如雞生卵卵生雞從卵生卵從雞生雞人生死亦如是無有絶時那先比丘經卷中去而復生如火燄之連出來而更逝若水波之續轉集沙門不應拜俗等事卷二冠二至大時有俊風俊者大也大風南風也何大於南風也曰合冰必於南風解冰必於南風生必於南風收必於南風故大之也大戴禮記夏小正樸至大者無形狀道至眇者無度量故天之圓也不得規地之方也不得矩淮南子齊俗訓夫天地之施化也嘔之而生吹之而落豈此契契哉故凡可度者小也可數者少也至大非度之所能及也至衆非數之所能領也故九州不可頃畞也八極不可道里也太山不可丈尺也江海不可斗斛也故大人者與天地合德日月合明鬼神合靈四時合信淮南子泰族訓包裹天地陶冶萬物大通混冥􅅧閎廣大不可為外析毫剖芒不可為内無環堵之宇而生有無之根淮南子俶眞訓鯤鵬方之猶蚊蚋蚤蝨耳則太虚之所受亦奚所不容哉張湛注􅍌子陽問雖有至明而有形者不可畢見焉雖禀極聰而有聲者不可盡聞焉雖有大章竪亥之足而所常履者未若所不履之多雖有禹益齊諧之識而所識者未若所不識之衆也抱朴子内篇論仙天稱其高者以無不覆地稱其廣者以無不載日月稱其明者以無不照江海稱其大者以無不容文選曹植求通表挹朝夕之池者無以測其淺㴱仰蒼蒼之色者不足知其遠近文選王􅋄頭陀寺碑文夫九蒼之高迅羽不能尋其巓四溟之深幽鱗不能測其底廣文選阮嗣宗荅伏義書天不可階而升地不可尺寸而度太平御覽地部地上且夫陰陽者有名而無形故數之可十離之可百散之可千推之可萬黄帝素問靈樞經陰陽繫日月大海虚谷百川競凑至道寥廓萬物歸之道德經註疏卷三夫道不為萬物而生春萬物感春炁而自生秋不為萬物而殺萬物感秋炁而自殺其為生也不恃其恩不求其報故其恩大矣其為殺也不恃其威不求其懼其威大矣天機經蠢然譬如虚空無有邊際不可思議金剛三昧經卷下又如空中種種色相現增現減而此虚空無增無減佛說佛地經卷五至神其受命也如嚮无有遠近幽深遂知來物易上繫神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水易說卦傳靁出地奮震驚百里山出雲雨以潤天下毛詩殷其靁且夫天地為罏兮造化為工陰陽為炭兮萬物為銅合散消息兮安有常則千變萬化兮未始有極史記賈生傳一在而不可見道在而不可專切譬于淵其㴱不測凌凌乎泳澹波而不竭鶡冠子能天天地未剖陰陽未判四時未分萬物未生注然平靜寂然清澄莫見其形若灮燿之問於無有退而自失也曰予能有無而未能無無也及其為無無至妙何從及此哉淮南子俶眞訓崑崙之丘或上倍之是謂涼風之山登之而不死或上倍之是謂縣圃登之乃靈能使風雨或上倍之乃維上帝登之乃神是謂大帝之居淮南子地形訓寒不能生寒熱不能生熱不寒不熱能生寒熱故有形出於無形未有天地能生天地者也淮南子說山訓卜者操龜筮者端策以問於數安所問之哉淮南子説林訓夫鬼神視之無形聽之無聲然而郊天望山川禱祠而求福雩禜而請雨卜筮而決事淮南子泰族訓雖乗雲附景不足以比速晨鳧失羣不足以喻疾文選海賦注疾雷不及塞耳疾電不暇掩目埤雅天道門雷山川石水井竈洿池猶有精氣人身之中亦有魂魄況天地為物物之大者於理當有精神有精神則宜賞善罰惡但其體大網疏不必機發而應耳太平御覽妖異部精道無始故迎之不見其􅈡道無終故隨之不見其後道德經註疏卷二弧弓為射非弦而不能發天之為射無弓必中道德經四子集解譬彼虚空無有動住無起無作無彼無此金剛三昧經卷上譬如呼響於善惡聲無所是在亦無所受佛說魔逆經手十譬如虚空本來不生不生故無滅滅無故無物可離故名虚空力莊嚴三昧經卷下至虚天地之道其猶鼓籥以虚為德自近及遠者也後漢書郎顗􅍌傳天地之間其猶橐籥乎虚而不屈動而愈出老子虚用水可析可合精無人也火因膏因薪神無我也闗尹子四符篇於穆無窮變無形像優游委縱如響之與景淮南子原道訓在於小則忘於大在於中則忘於外在於上則忘於下在於左則忘於右無所不充則無所不在是故貴虚者毫末為宅也淮南子原道訓天無情於生死則不可以情而憾怨故暄然而春榮蕐者不謝悽然而秋凋零者不憾劉子言苑太素之前幽清寂寞不可為象惟虚惟無蓋道之根也藝文類聚天部上天喻林卷一
