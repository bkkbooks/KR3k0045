body:
  text: 喻林卷十六明徐元太撰人事門十四異趨庶民之性惟若星然星有好風星有好雨以喻民有好善亦有好惡尚書正義洪範我思肥泉兹之永歎所出同所歸異為肥泉毛詩泉水君子譬精米嘉器也小人譬麤米弊器也譬如釀酒共用一麴分半持釀精米嘉器則其味醇和一半釀麤米弊器則其味醨薄亦猶如禮自是一耳行之自有厚薄若君子性識純深得禮而彌深厚小人智慮淺薄得禮自虚薄者也禮記正義禮運曹大家女誡曰生男如狼猶恐其虺生女如鼠猶懼其武是男欲剛而女欲柔也春秋正義昭公元年墨子貴兼孔子貴公皇子貴哀田子貴均列子貴虛料子貴别爾雅釋詁疏燕雀安知鴻鵠之志哉史記陳渉世家貪夫殉財烈士殉名夸者死權衆庶馮生史記伯夷傳人之操行所尚不同立德立言期於不朽亦猶蘭蕙松柏各有本性馨烈材幹並擅貞芳前漢書叙傳註人各有志所規不同故乃有登山而採玉者有入海而採珠者豈可謂登山者不知海之深入海者不知山之髙哉君謂僕以鄭為東家丘君以僕為西家愚夫邪魏志邴原傳註雖復鉗桎羿奡思服巢許之情捶勒曽史言膺蹻跖之慮不然之事斷可知也宋書顧覬之傳運屬波流勢無防慮命徼山立理無放情宋書顧覬之傳雲飛泥沈卑髙異等圓行方止動息殊致是以摩霄運海輕罻羅於藪澤五衢四照忽斤斧於山林隋書盧思道傳貴爵位者以巢由為桎梏愛山林者以伊吕為管庫束名實則芻芥柱下之言翫清虛則糠粃席上之説南史馬樞隱逸傳釡槩之於量也不能以容於所不受尋墨之於度也不能以及其所不至鈞天廣奏飛鳥過而不止崇盈繢拱猱􅎜逃焉且員動而方息所性不同也火炎而水流習使之然也子華子大道農攻食工攻器賈攻貨亢倉子農道篇刻意尚行離世異俗髙論怨誹為亢而已矣此山谷之士非世之人枯槁赴淵者之所好也語仁義忠信恭儉推讓為脩而已矣此平世之士教誨之人遊居學者之所好也語大功立大名禮君臣正上下為治而已矣此朝廷之士尊主疆國之人致功并兼者之所好也就藪澤處閒曠釣魚閒處無為而已矣此江海之士避世之人閒暇者之所好也吹呴呼吸吐故納新熊經鳥申為壽而已矣此道引之士養形之人彭祖壽考者之所好也若夫不刻意而髙無仁義而脩無功名而治無江海而閒不道引而壽無不忘也無不有也澹然無極而衆美從之此天地之道聖人之德也莊子刻意野語有之曰衆人重利廉士重名賢士尚志聖人貴精莊子刻意招世之士興朝中民之士榮官筋力之士矜難勇敢之士奮患兵革之士樂戰枯槁之士宿名法律之士廣治禮樂之士敬容仁義之士貴際農夫無草萊之事則不比商賈無市井之事則不比庶人有旦暮之業則勸百工有器械之巧則壯錢財不積則貪者憂權勢不尤則夸者悲勢物之徒樂變遭時有所用不能無為也莊子徐無鬼好肆不守折長者不為市荀子哀公烹獸不足以盡獸嗜其脯則幾矣然則王者有嗜乎理義也亡者亦有嗜乎暴慢也所嗜不同故其禍福亦不同吕氏春秋誣徒登山而望其何不臨而何不見凌遲而入淵其孰不䧟溺賈子新書修政語上古人味而弗貪也今人貪而弗味淮南子繆稱訓君子非仁義無以生失仁義則失其所以生小人非嗜欲無以活失嗜欲則失其所以活故君子懼失仁義小人懼失利觀其所懼知各殊矣淮南子繆稱訓王子比干非不知箕子被髪佯狂以免其身也然而樂直行盡忠以死節故不為也伯夷叔齊非不能受祿任官以致其功也然而樂離世伉行以絶衆故不務也許由善卷非不能撫天下宅海内以德民也然而羞以物滑和故弗受也豫讓要離非不知樂家室安妻子以偷生也然而樂推誠行必以死主故不留也今從箕子視比干則愚矣從比干視箕子則卑矣從管晏視伯夷則戇矣從伯夷視管晏則貪矣趨舍相非嗜欲相反而各樂其務將誰使正之曽子曰擊舟水中鳥聞之而髙翔魚聞之而淵藏故所趨各異而皆得所便夫重生者不以利害己立節者見難不茍免貪祿者見利不顧身而好名者非義不茍得此相為論譬猶氷灰鈎繩也何時而合若以聖人為之中則兼覆而并之未有可是非者也夫飛鳥主巢狐狸主穴巢者巢成而得棲焉穴者穴成而得宿焉趨舍行義亦人之所棲宿也各樂其所安致其所蹠謂之成人淮南子齊俗訓惠子從車百乗以過孟諸莊子見之弃其餘魚鵜胡飲水數斗而不足鱓鮪入口若露而死智伯有三晉而欲不贍林類榮啓期衣若縣衰而意不慊由此觀之則趣行各異何以相非也淮南子齊俗訓或曰知其且赦也而多殺人或曰知其且赦也而多活人其望赦同所利害異故或吹火而然或吹火而滅所以吹者異也淮南子説山訓栁下惠見飴曰可以養老盜跖見飴曰可以黏牡見物同而用之異淮南子説林訓彼君子也以養賢為富我鄙人也以鍾石金玉為富新序刺奢六宋人有得玉者獻諸司城子罕子罕不受獻玉者曰以示玉人玉人以為寳故敢獻之子罕曰我以不貪為寳爾以玉為寳若與我者皆䘮寳也不若人有其寳故宋國之長者曰子罕非無寳也所寳者異也新序節士七二人共路東趍西歩千里之外不相知處焦氏易林蠱之師二人異路東趍西歩千里之行不相知處焦氏易林比之損天下有三門由於情欲入自禽門由於禮義入自人門由於獨智入自聖門楊子脩身吾聞先生相與言則以仁與義市井相與言則以財與利楊子學行賢者司禮小人司巇况拊鍵乎揚子重黎或曰聖人不師仙厥術異也聖人之於天下恥一物之不知仙人之於天下恥一日之不生揚子君子篇或問孔子知其道之不用也則載而惡乎之曰之後世君子曰賈如是不亦鈍乎曰衆人愈利而後鈍聖人愈鈍而後利揚子五百鶉鷃羣遊終日不休亂舉聚跱不離蒿茆鴻鵠髙飛雙别乖離通千達萬志在陂池鸞鳯翶翔黄歴之上徘徊太虛之中隨景風而飄颻時抑揚以從容意猶未得喈喈然長鳴蹷號振翼陵朱雲薄升極呼吸陽露曠旬不食其意尚猶嗛嗛如也三者殊務各安所為是以伯夷採薇而不恨巢父木棲而自願由斯觀諸士之志量固難測度濳夫論相列夫聖人以仁義為機賢者以禮信為機謀士以術數為機辯士以縱横為機此機者皆利于諸侯而顯名者也吾子其握聖人之機以游説諸侯則漢室可舉矣當今之時得機者顯得聖賢之機者貴不可限子翕而不張亦何取于機也盍奮而張之噫仁義之氣而解衆庶之鬱哉天祿閣外史機論夫操尚不同猶金沈羽浮也志好之乖次猶火升而水降也茍不可同雖造化之靈大塊之匠不可使同也何可强哉抱朴子外篇交際出處有氷炭之殊躁靜有飛沈之異是以墨翟以重繭怡顔莊叟以遺世得意抱朴子外篇博喻方圓舛狀逝止異歸故渾象尊於行健坤后貴於安貞七政四氣以周流成功五嶽六柱以峙靜作鎮是以宋墨楚申以載馳存國干木胡明以無為折衝抱朴子外篇博喻且夫洪陶範物大象流形躁靜異尚翔沈舛情金寳其重羽矜其輕篤隘者執束於滓湼達妙者逍遥於𤣥清潢洿納行潦而潘噎渤澥吞百川而不盈鮋鰕踊悦於泥濘赤螭凌厲乎髙冥嚼香餌者快嗜欲而赴死味虚淡者含天和而趨生識機神者瞻無兆而弗惑闇休咎者觸强弩而不驚各附攸好安肯改營抱朴子外篇任命樂生者畏犧而辭聘髑髏聞生而矉蹙此死生之情異而各自當也郭子註莊列禦冦物各重其所主而桀紂之狗可以吠堯故盜蹠之徒賢盜蹠而鄙仲尼劉子言苑夫以䇿試而後學者為官也得不䇿試而好學者為己也為己之學也内為官之學也外外之與内由南之與北相去甚逺揚子法言註寡見篇聖人以行道為務凡人以祿殖為先揚子法言註五百篇孫綽子曰或問雅俗曰涇渭殊流雅鄭異調李善註文選王仲寳褚淵碑文寧昻昻若千里之駒乎將泛泛若水中之鳬乎與波上下偷以全吾軀乎寧與騏驥抗軛乎將隨駑馬之迹乎寧與黄鵠比翼乎將與鷄鶩爭食乎文選屈原卜居衆以虧形為辱君子以虧義為辱文選江文通詣建平王上書註董生不云乎明明求仁義常恐不能化民者卿大夫之意也明明求財利常恐困乏者庶人之事也故道不同不相為謀文選楊惲報孫會宗書人固有一死死或重於太山或輕於鴻毛用之所趣異也文選司馬遷報任少卿書君子以心導耳目小人以耳目導心意林子思子農夫比粟商賈比財烈士比義意林尸子小人食於力君子食於道意林慎子匹夫好仁義在磨踵君子得道達斯兼濟藝文類聚帝王部梁武帝令如壠生木木有異心如林鳴鳥鳥有殊音如江游魚魚有浮沈藝文類聚人部隱逸上詩夫鳥居山上曽巢木末魚濳川下窟穴沙泥豈好異哉盖性然也故有忽白璧而樂垂綸負玉鼎而要卿相行藏紛糾顯晦蹐駮無異火炎水流圓動方息斯則廟堂之與江海蓬戸之與金闔並然其所然悦其所悦藝文類聚人部隱逸上誌有虞之君天下也使天下貢善商周之君天下也使天下貢財太平御覽皇王部帝舜有虞氏伯夷叔齊饑死首陽無地故也桀放于歴山紂殺于鄗宫無道故也有道無地則餓有地無道則亡太平御覽皇王部帝桀巢許蔑四海商賈爭一錢太平御覽資産部錢下干木盖賢人也干木富乎義賈人富乎財初學記人部賢註夫披翠雲以為衣戴北斗以為冠帶虹霓以為紳連日月以為佩此服非不美也然而帝王不服者望殊於天志絶於心矣事類賦服用部冠註馬首欲東誰其能禦何氏語林文學魏書鳥獸並興各有所趣羣士經世各有所歸道德經指歸卷七上士貪善下士貪財虚皇四十九章善惡二種元同一道亦猶行人一者向道二者背道背道之人迷入㝠山轉向幽谷又多惡獸荆棘毒刺衣糧窮盡為苦所逼百種煩惱故卒而致死玉清經通濟幽冥品若有人取狗野狐獼猴鱣魚蛇􅚣飛鳥皆悉縳之共繫一處而放之爾時六種之蟲各有性行爾時狗意中欲起趣村中野狐意中欲起趣塜間鱣魚意中欲趣水中獼猴意中欲向山林之間毒蛇意中欲入穴中飛鳥意中欲飛在空增壹阿含經卷三十三伊蘭栴檀生有四軰何謂為四一曰有栴檀樹伊蘭繞之二曰有伊蘭樹栴檀圍之三曰有栴檀栴檀自為叢林四曰有伊蘭伊蘭以相圍繞何謂栴檀伊蘭繞之有家長者直信為道妻子兒婦室内不從其教是謂栴檀為主伊蘭繞之者也何謂伊蘭栴檀圍之有家長者信邪倒見妻子兒婦室内不從其教是謂伊蘭為主栴檀圍之者也何謂栴檀栴檀自為叢林有家長者為道家室眷屬皆隨其教不相違戾是謂栴檀栴檀自為叢林者也何謂伊蘭伊蘭自相圍繞有家長者信邪倒見闔門烹殺意同歡喜是謂伊蘭伊蘭自相圍繞者也佛説五苦章句經尺七譬如鳥棲暮集一樹晨則隨緣各自飛去三昧法門經卷上吾未聞仲尼追盜跖湯武法桀紂者矣𢎞明集牟子理惑論吾見道士與道人戰儒墨道人與道士獄是非昔有鴻飛天道積逺難亮越人以為鳬楚人以為乙人自楚越耳鴻常一鴻爾夫澄本雖一吾自俱宗其本鴻迹既分吾已翔其所集弘明集張融門論有三人俱行遶塔一為念佛功德二為盜竊三為清涼雖復身業同行而有善惡法苑珠林卷七十三羣生之疾癡愛為本菩薩之疾大悲為源僧肇註維摩詰經問疾品穢食充饑小乘法也盛無上寶大乘器也僧肇註維摩詰經弟子品同歸地之相去也千有餘里世之相後也千有餘嵗得志行乎中國若合符節孟子離婁下此其分波而共源百慮而一致者也後漢書仲長統傳論夫千仞之木既摧於斧斤一寸之草亦瘁於踐蹋髙涯之脩榦與深谷之淺條存亡之要巨細一揆耳宋書王景文傳猶馬殊毛而齊逸玉異色而均美是以晉棘荆和等價連城驊騮盜驪俱致千里梁書范縝傳聖人之從事也所由異路而同歸存亡定傾若一志不忘乎欲利人也故秦楚燕魏之歌異聲而皆樂九夷八狄之哭異聲而皆哀夫歌者樂之徵哭者哀之效也文子精神行雖至卓不離髙下言雖至公不離是非能雖至神不離巧拙貌雖至殊不離妍醜闗尹子三極篇東西南北之道踹然其為分等也隂陽不同氣然其為和同也酸醎甘苦之味相反然其為善均也五色不同采然其為好齊也五聲不同均然其可喜一也鶡冠子環流好者不必同色而皆美醜者不必同狀而皆惡陸子思務歌而不比於律者其清濁一也繩之外與繩之内皆失直者也淮南子繆稱訓夫織者日以進耕者日以却事相反成功一也淮南子繆稱訓夫玉璞不厭厚角䚩不厭薄漆不厭黑粉不厭白此四者相反也所急則均其用一也淮南子齊俗訓公西華之養親也若與朋友處曽參之養親也若事嚴主烈君其於養一也故胡人彈骨越人契臂中國㰱血也所由各異其於信一也三苖髽首羌人括領中國冠笄越人劗髪其於服一也淮南子齊俗訓蘧伯玉以德化公孫鞅以刑罪所極一也病者寢席醫之用針石巫之用糈藉所救鈞也淮南子説山訓江出岷山河出崑崙濟出王屋潁出少室漢出嶓冡分流舛馳注於東海所行則異所歸則一淮南子説山訓滿堂之坐視鉤各異於環帶一也淮南子説林訓釣者靜之􅷟者扣舟罩者抑之罣者舉之為之異得魚一也淮南子説林訓西施毛嬙狀貌不可同世稱其好美鈞也堯舜禹湯法籍殊類得民心一也淮南子説林訓蹠越者或以舟或以車雖異路所極一也淮南子説林訓夫墨子跌蹏而趨千里以存楚宋叚干木闔門不出以安秦魏夫行與止也其勢相反而皆可以存國此所謂異路而同歸者也今夫救火者汲水而趨之或以甕缻或以盆盂其方員鋭橢不同盛水各異其於滅火均也故秦楚燕魏之謌也異轉而皆樂九夷八狄之哭也殊聲而皆悲一也淮南子脩務訓天不一時地不一利人不一事是以緒業不得不多端趍行不得不殊方五行異氣而皆適調六藝異科而皆同道淮南子泰族訓自周室以來千有餘嵗獨有文武成康如言必參一焉取所不能及而稱之猶躄者能言逺不能行也聖人異途同歸或行或止其趣一也鹽鐵論論儒周以順赧以成周而西傾秦之惠文昭襄以西山而東并孰愈曰周也羊秦也狼然則狼愈歟曰羊狼一也揚子淵騫篇美色不同面皆佳於目悲音不共聲皆快於耳酒醴異氣飲之皆醉百穀殊味食之皆飽王充論衡自紀篇總其所以乖皷之於一響成其所以變混之於一象山海經序妍姿媚貌形色不齊而悦情可均絲竹金石五聲詭韻而快耳不異繳飛鉤沈罾舉􅆯抑而有獲同功樹勲立言出處殊塗而所貴一致抱朴子外篇博喻四瀆辯源五河分流赴卑注海殊塗同歸色不均而皆艷音不同而咸悲香非一而並芳味不等而悉美抱朴子外篇廣譬區畛相異而衢路交通矣文心雕龍章句跡雖有殊歸趣無異猶五行相滅亦還相生四氣相反而共成嵗淄澠殊源同歸於海宫商異聲俱㑹於樂劉子九流昭景甲三姓雖異論本則同也莊子音義庚桑楚雖非一姓同出公族喻死生同也莊子音義庚桑楚雖百材異所同以大澤為居雖木石異端同以大山為壇莊子音義則陽人之操行所尚不同立德立言期於不朽亦猶蘭蕙松栢各有本性馨烈材幹並擅貞芳前漢書註叙傳聖人與聖也猶規之相周矩之相襲李善註文選顔延年皇太子釋奠㑹詩物雖貴賤殊流髙卑異級至其極也殊塗共歸雖方諸禀水於月不加於水之涼陽燧取火於日不加於火之輝也李善註文選陸士衡演連珠髙術而共逕豈異袖而同襟廣文選江文通傷友人賦水㑹于海雲翔于天道之所混孰後孰先廣文選陸士衡贈潘岳詩夫食辛之與甚噱薰目之與哀泣同用出淚使狄牙嘗之必不言樂淚甜而哀淚苦斯可知矣何者肌液肉汗踧笮便出無主於哀樂猶簁酒之囊漉雖笮具不同而酒味不變也廣文選嵇叔夜聲無哀樂論四節異氣以成嵗君子殊道以成名故微子奔走而顯比干剖心而榮廣文選魏文帝連珠面岐路者有行迷之慮仰髙山者有飛天之志或乘馬乘車而俱至秦者所謂形異而實同也意林物理論在天成象羣星仰於北辰在地成形百川赴於東海是知璿璣盈縮並運天樞江漢所宗爭環地軸藝文類聚内典部内典墓志昔有鴻飛天道積逺難亮越人以為鳬楚人以為乙人自楚越鴻常一爾何氏語林文學芝蘭蕭艾之秋形殊而共一作並瘁羽毛鱗介之怨聲異而俱哀文苑英華庾信思舊銘四河入海无復河名四姓為沙門皆稱釋種初學記道釋部僧木之生也末因於條條因於枝枝因於莖莖因於本本因於根根因於天地道德經指歸卷十一萬派枝流同歸于海萬法紛紜同歸于道虚皇四十九章如木中之火竹中之火二俱相燒無有異也元陽妙經卷七如贍部洲東方諸水無不皆趣殑伽大河與殑伽河俱入大海波羅蜜多經卷三百五十一譬如重流若大若小皆入大海同一鹹味波羅蜜多經卷三百五十一如贍部洲所有諸樹枝條莖幹華葉果實雖有種種形類不同而其䕃影都無差别波羅蜜多經卷五百四十一譬如大海中水同一鹹味佛法海中亦復如是同一法味大方等大集經十六如然燈器金則黄光銅則赤光其色雖異燈無差别大方等大集經十八譬如一市開四大門是四門中皆歸一市金剛三昧經卷下天下大雨水水流入水溝水溝流入溪澗溪澗流入江江流入海中海水不増不減佛説四諦經積八天下有五江東流一江字沙祿南流一江字阿夷西流一江字恒北流一江字黙徘徊中流名字為江轉流入海皆棄本名字當為海水佛説四諦經積八波陀類便取青黄白黑四種之繒懸著空中問於四王四色在空各自異不四王曰異色灼然矣臣曰繒影在地為異無荅曰不異也臣言今四種受形各異譬如繒色質不同也今之法齋志趣一味譬如地影無若干也雜譬喻經下若有一雙飛鳥一鳥於大樹上止一鳥於小卑樹上止兩鳥俱止誰影先在地者王言其影俱到地耳那先比丘經卷下譬如城有多門入處各各至處不異大智度論卷七譬如美食雜毒惡食雜毒美惡雖殊雜毒不異亦如盲闇蹈火晝夜雖異燒足一也大智度論卷十三如人入海有始入者有盡其源底者深淺雖異俱名為入大智度論卷十八譬如一盲無見則千盲俱爾大智度論卷三十六譬如乳中著毒乳變為酪酪變為酥乳非酪酪非酥酥非乳乳酪雖變而皆有毒大智度論卷三十八如栴檀火滅糞草木火滅滅法無異取未滅時相於滅時説故有别異於滅中則無異大智度論卷五十四譬如除宫殿及諸陋廬如燒栴檀及雜木其處虛空無有異色大智度論卷七十三譬如大水有人入深者入淺者皆名入水不得言入淺者不入水大智度論卷八十三譬如煮石蜜欲熟時雖異物和合皆為石蜜又如大海百川歸之皆為一味大智度論卷一百猶如伊蘭及栴檀木俱能出火熱與光明無有别異大莊嚴經論卷七譬猶靈暉朝覯稱物納照時風夕灑程形賦音故形殊則音異物異則照殊日不為異物而殊照風不為殊形而異音將知其日一也其風一也禀之者不同耳𢎞明集駮夷夏論猶清濟濁河歸滄海而同味綠膺絳顙集須彌而共色辯正論卷六好名好名之人能讓千乘之國茍非其人簞食豆羹見於色孟子盡心下斯盖好名之士欲以身為珪璋皦皦然使塵玷之累不能加也宋書王微傳史臣實無名名無實名者偽而已矣昔者堯舜偽以天下讓許由善卷而不失天下享祚百年伯夷叔齊實以孤竹君讓而終亡其國餓死於首陽之山實偽之辯如此其省也列子楊朱演門有親死者以善毁爵為官師其黨人毁而死者半堯與許由天下許由逃之湯與務光務光怒之紀他聞之帥弟子而踆於􅑆水諸侯弔之三年申徒狄因以踣河莊子外物故其就義若渴者其去義若熱莊子列禦冦是姦人將以盜名於晻世者也險莫大焉故曰盜名不如盜貨田仲史鰌不如盜也荀子不茍趙主父令工施鈎梯而緣潘吾刻疎人迹其上廣三尺長五尺而勒之曰主父常遊於此秦昭王令工施鈎梯而上華山以松柏之心為博箭長八尺棊長八寸而勒之曰昭王常與天神博於此矣韓非子外儲説左上為客治飯而自藜藿名尊於實也淮南子説林訓水激則悍矢激則逺人激於名不毁為聲説苑談叢次四大其門郊不得其刀鳴虛測曰大其門郊實去名來也太𤣥經第四太枯槁一生以為娛其所寢宿唯名而已莊子音義徐無鬼禽之貪者殺害無極仁義貪者傷害無窮莊子音義徐無鬼昔人有慕讓財之名推田業與弟俄而貧乏反以威力就弟强貸此不當也意林正論齊桓卧於柏寢謂仲父曰吾國富民殷無餘憂矣一物失所寡人悒悒今白鳥營營是必饑耳因開翠紗之幬進之其蚊有知禮者不食公之肉而退其蚊有知足者㗱子文反公之肉而退其蚊有不知足者遂長嘘短吸而食之及其飽也腹腸為之漬破事文類聚蚊金樓子齊有貧者命其狗為富命其子為樂方將祭狗入于室叱之曰富出祝曰不祥家果有禍長子死哭之曰樂乎而不自悲也太平御覧獸部狗楚有直躬者其父竊羊而謁之上上執而將誅之直躬者請代之將誅矣告吏曰父竊羊而謁之不亦信乎父誅而代之不亦孝乎信且孝而誅之國將有不誅者乎荆王聞之乃不誅也孔子聞之曰異哉直躬之為信也一父而載取名焉故直躬之信不若無信困學紀聞卷七論語禍世之匠亂國之工絶逆天地傷害我身莫大乎名道德經指歸卷八人隨情欲求華名譬如燒香衆人聞其香然香以熏自燒愚者貪流俗之名譽不守道真華名危已之禍其悔在後時佛説四十二章經尺一好難充仲子之操則蚓而後可者也夫蚓上食槁壤下飲黄泉孟子滕文公下糟丘生乎象􅀈炮烙生乎熟升子路撜溺而受牛謝孔子曰魯國必好救人於患子贛贖人而不受金於府孔子曰魯國不復贖人矣子路受而勸德子贛讓而止善孔子之明以小知大以近知逺通於論者也由此觀之廉有所在而不可公行也故行齊於俗可隨也事周於能易為也矜偽以惑世伉行以違衆聖人不以為民俗淮南子齊俗訓夫先知逺見達視千里人才之隆也而治世不以責於民博聞强志口辯辭給人智之美也而明主不以求於下敖世輕物不汙於俗士之伉行也而治世不以為民化神機隂閉剞劂無迹人巧之妙也而治世不以為民業故萇𢎞師曠先知禍福言無遺䇿而不可與衆同職也公孫龍折辨抗辭别同異離堅白不可與衆同道也北人無擇非舜而自投清泠之淵不可以為世儀魯般墨子以木為鳶而飛之三日不集而不可使為工也故髙不可及者不可以為人量行不可逮者不可以為國俗淮南子齊俗訓申徒狄負石自沈於淵而溺者不可以為杭弦髙誕而存鄭誕者不可以為常事有一應而不可循行淮南子説山訓或問要離非義者歟不以家辭國曰離也火妻灰子以反於慶忌實蛛蝥之靡也焉可謂之義也揚子淵騫篇言屈轂之瓠難鑽疏屬之拘難解今欲以辯而鑽解之也李善註文選張景陽七命龍門魚之難也太行牛之難也以德報怨人之難也藝文類聚山部太行山喻林卷十六
