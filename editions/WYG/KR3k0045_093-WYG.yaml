body:
  text: 喻林卷九十三明徐元太撰學業門三博古天在山中大畜君子以多識前言往行以畜其徳易大畜聼逺音者聞其疾而不聞其舒望逺者察其貎而不察其形立乎定哀以指隠桓隠桓之日逺矣榖梁桓公十四年食肉不食馬肝不為不知味言學者無言湯武受命不為愚史記儒林傳書非史記周圖仲尼不采道非虚無自然嚴平不演海以受淤歳一蕩清君子博識非禮不視蜀志秦宓傳仲尼嚴平會聚衆書以成春秋指歸之文故海以合流為大君子以博識為𢎞蜀志秦宓傳視漢臣之三篋似渉䝉山對梁相之五車若吞雲夢隋書崔廓隠逸傳上學以神聼中學以心聼下學以耳聼以耳聼者學在皮膚以心聼者學在肌肉以神聼者學在骨髓文子道徳天下無粹白狐而有粹白之裘掇之衆白也善學者若齊王之食雞必食其蹠數千而後足淮南子説山訓昔者蒼頡作書容成造厯胡曹為衣后稷耕稼儀狄作酒奚仲為車此六人者皆有神明之道聖智之迹故人作一事而遺後世非能一人而獨兼有之各悉其知貴其所欲逹遂為天下備今使六子者易事而明弗能見者何萬物至衆而知不足以奄之周室以後無六子之賢而皆修其業當世之人無一人之才而知其六賢之道者何敎順施續而知能流通由此觀之學不可已明矣淮南子修務訓有鳥將來張羅待之得鳥者一目也今為一目之羅無時得鳥矣道雖要也非博無以通矣博其方約其説小荀子時事道之於心也猶火之於人目也中穽深室幽黑無見及設盛燭則百物彰矣此則火之耀也非目之光也而目假之則為明矣天地之道神明之為不可見也學問聖典心思道術則皆來覩矣此則道之材也非心之明也而人假之則為己知矣是故索物於夜室者莫良於火索道於當世者莫良於典典者經也潛夫論讚學人目不見青黄曰盲耳不聞宫商曰聾鼻不知香臭曰癕癕聾與盲不成人者也人不博覽者不聞古今不見事類不知然否猶目盲耳聾鼻癕者也王充論衡別通篇人好觀圖畫者圖上所畫古之列人也見列人之面孰與觀其言行置之空壁形容具存人不激勸者不見言行也古賢之遺文竹帛之所載粲然豈徒墻壁之畫哉王充論衡别通篇法令之家不見行事議罪不可審章句之生不覽古今論事不實王充論衡别通篇耕夫多殖嘉榖謂之上農夫其少者謂之下農夫學士之才農夫之力一也能多種穀謂之上農能博學問謂之上儒王充論衡别通篇大川旱不枯者多所疏也潢汙兼日不雨泥輙見者無所通也是故大川相間小川相屬東流歸海故海大也海不通於百川安得巨大之名夫人含百家之言猶海懐百川之流也不謂之大者是謂海小於百川也王充論衡别通篇如皆為用則多者為上少者為下累積千金比於一百孰為富者王充論衡自紀篇大樂之成非取乎一音嘉膳之和非取乎一味聖人之徳非取乎一道故曰學者所以總羣道也羣道統乎己心羣言一乎己口唯所用之故出則元亨處則利貞黙則成象語則成文述千載之上若共一時論殊俗之類若與同室度幽明之故若見其情原治亂之漸若指已效徐幹中論治學誠須所師必深必博猶渉滄海而摙水造長洲而伐木獨以力劣為患豈以物少為憂哉抱朴子内篇袪惑古人歎息於才難故謂百世為随踵不以璞非崑山而棄耀夜之寳不以書不出聖而廢助教之言抱朴子外篇尚博朱緑所以改素絲訓誨所以移蒙蔽披𤣥雲而揚大明則萬物無所隠其狀矣舒竹帛而考古今則天地無所藏其情矣抱朴子外篇朂學渉若渉水獵若獵獸言歴覽之不專精也前漢書註賈山傳三墳五典八索九丘葢聖人之陳迹耳子何好焉予曰上紀五帝之盛下述百王之義粲粲如列宿落落如連珠雖復退居窮處簞食瓢飲未始失其樂矣予可得無好乎太平御覽人事部樂成少伯工吹竽見安昌侯張子夏鼓琴謂曰音不通千曲以上不足以為知音太平御覽樂部竽夫觀書者譬猶登東嶽而知邱陵之嵔㠥也浮滄海而知江河之不廣也見日月而知衆星之照微也仰聖人而知衆説之少觀也太平御覽學部敎學譬如大醫觀諸草木皆入醫方種種方便救治疾病皆得差愈无上内秘藏經顯道品譬如王守藏者知王帑藏中金銀珠玉瑠璃珍寳有其多少那經比丘上存心今夫蹶者趨者是氣也而反動其心孟子公孫丑上人有雞犬放則知求之有放心而不知求學問之道無他求其放心而已矣孟子告子上今有無名之指屈而不信非疾痛害事也如有能信之者則不逺秦楚之路為指之不若人也指不若人則知惡之心不若人則不知惡此之謂不知類也孟子告子上饑者甘食渇者甘飲是未得飲食之正也饑渴害之也豈惟口腹有饑渴之害人心亦皆有害人能無以饑渴之害為心害則不及人不為憂矣孟子盡心上山徑之蹊間介然用之而成路為間不用則茅塞之矣今茅塞子之心矣孟子盡心下人知求雞犬莫知求其心者惑也學問所以求之矣趙氏註孟子告子上人之心莫隠乎慈莫便乎恕赤子匍匐使我心惻隠於慈故也凌波而先濟跋而望乎後之人便於恕故也此心之弗失焉可以事帝矣可以格天矣可以入道矣子華子執中人中虚圓不徑寸神明舍焉事物交滑如理亂棼如渉驚浸一則以之怵惕一則以之忌諱一則以之懲創是則一日之間一時之頃而徑寸之地如炎如氷矣子華子北宫子仕心胸之兩間其容幾何然則歴陸嶔嶇太行鴈門横塞之靈臺之闗勺水之不通而奚以有容嗜欲炎之好憎氷之炎與氷交戰焉則必兩相傷者矣子華子執中目視雕琢者明愈傷耳聞交響者聰愈傷心思𤣥妙者心愈傷闗尹子五鑑次二植中樞周無隅測曰植中樞立督慮也太𤣥經第一周初一藏心於淵美厥靈根測曰藏心於淵神不外也太𤣥經第六養六根不淨當洗其心心不受垢自無諸穢故心為宰官統御一切降伏其心猶馭猛虎如有縱怠反傷汝身虚皇四十九章譬如善調馬師随馬􅙸悷即時能伏大寳積經卷一百一十二心如獼猴貪六欲故心如畫師能起種種業因縁故大寳積經卷一百一十二無甘蔗子則無種種石蜜諸味若無菩提心者亦無種種三寳諸味大方等大集經卷九以是正心能制諸惡如執鉤筞邪法不生大方廣佛華嚴經卷十二發寳馬心離􅙸悷不調故發大車心載一切故發大象心伏諸根故發大山心一切惡風不能動故發小犬心離瞋恚故大方廣佛華嚴經卷五十八菩提心者則為浄水洗濯一切煩惱垢故菩提心者則為大風一切世間無障礙故菩提心者則為盛火能燒一切邪見愛故菩提心者則為浄日普照一切衆生類故大方廣佛華嚴經卷五十九菩提心者則為利劍斬除一切煩惱惡故菩提心者則為金搥壊散一切憍慢山故大方廣佛華嚴經卷五十九菩提心者則為釿斧斫伐無知諸苦樹故菩提心者則為器仗防䕶一切諸艱難故大方廣佛華嚴經卷五十九菩提心者則為勇健摧滅煩惱諸怨敵故菩提心者則為善鑷抜出一切煩惱刺故菩提心者則為尊主於餘一切莫能勝故大方廣佛華嚴經卷五十九菩提心者則為浄燈普照一切諸法界故菩提心者則為淨眼悉能覩見邪正道故菩提心者則為大道皆令得入一切智城故大方廣佛華嚴經卷五十九菩提心者則為寳象悉能調伏一切根故菩提心者則為寳馬逺離諸惡􅙸悷法故大方廣佛華嚴經卷五十九菩提心者則為沃燋消盡一切不善法故菩提心者則為金剛壊散一切諸惡法故大方廣佛華嚴經巻五十九菩提心者則為如意珠具足一切切徳利故菩提心者則為天徳瓶滿足一切所欲樂故菩提心者則為劫初樹出生一切莊嚴具故菩提心者則為恒娑相衣不受一切諸塵垢故大方廣佛華嚴經卷五十九譬如飛鳥獼猴不適止一處也心所因不適止一處也佛遺目摩尼寳經推六人心溢盪猶如風電獼猴擲樹海波潮浪蘓婆呼童子經卷上如蟻守卵如犛牛愛尾如䕶一子如䕶一眼如巫師䕶身如貧人䕶寳如海師䕶舶解脱道論卷一藁一持心當如西方石石在中庭雨墮亦不能壊日炙亦不能消風吹亦不能起佛説阿含正行經敬六意駚於響難䕶難禁法句經心意品藏六如龜防意如城慧與魔戰勝則無患法句經心意品諸善中獨有一心最第一人能一其心諸善皆随之譬如樓陛當有所倚諸為善者皆著一心那先比丘經卷上以能伏心如猫制鼠禪要呵欲經如馬不著轡勒左右噉草不肯進路若著轡勒則噉草意斷随人意去大智度論卷六十八心之可畏甚於毒蛇惡獸怨賊大火越逸未足喻也動轉輕躁但觀於蜜不見深坑譬如狂象無鉤猿猴得樹騰躍踔躑難可禁制當急挫之無令放逸遺教經論離十二勿令放逸入於五欲譬如牧牛之人執杖視之不令縱逸犯人苖稼遺教經論離十二涵養宋人有閔其苖之不長而揠之者芒芒然歸謂其人曰今日病矣予助苖長矣其子趨而往視之苖則槁矣天下之不助苖長者寡矣以為無益而舍之者不耘苖者也助之長者揠苖者也非徒無益而又害之孟子公孫丑上牛山之木嘗美矣以其郊於大國也斧斤伐之可以為美乎是其日夜之所息雨露之所潤非無萌蘖之生焉牛羊又從而牧之是以若彼濯濯也人見其濯濯也以為未嘗有材焉此豈山之性也哉雖存乎人者豈無仁義之心哉所以放其良心者亦猶斧斤之於木也旦旦而伐之可以為美乎其日夜之所息平旦之氣其好惡與人相近也者幾希則其旦晝之所為有梏亡之矣梏之反覆則其夜氣不足以存夜氣不足以存則其違禽獸不逺矣人見其禽獸也而以為未嘗有才焉者是豈人之情也哉故茍得其養無物不長茍失其養無物不消孟子告子上誠得其養若雨露於草木法度於仁義何有不長也誠失其養若斧斤牛羊之消草木利欲之消仁義何有不盡也趙氏註孟子告子上夫火熱而水滅之金剛而火銷之木強而斧伐之水流而土遏之惟造物者物莫能勝也故中欲不出謂之扃外邪不入謂之塞中扃外閉何事之不節外閉中扃何事之不成弗用而後能用之弗為而後能為之淮南子主術訓下次二閑其藏固珍寳測曰閑其藏中心淵也大𤣥經第一閑風者隂陽亂氣激發而起者也猶人之内氣因喜怒哀樂激越而發也太平御覽天部九風庾公造伯仁曰君何所欣悦而忽肥庾曰君復何所憂慘而忽瘠伯仁曰吾無所憂直是清虚日來滓穢日去太平御覽人事部肥嬰兒之姿貴養厚敦西昇經譬如畫石其文恒在畫水易滅勢不可住瞋恚難除譬如畫石善根易滅猶如畫水是故此心難得調伏如大火聚其明久住電光之明其光不停瞋如火聚慈如電火是故此心難得調伏元陽妙經卷五煩惱之人堅牢難去眞道之心輕浮易去譬如家犬不畏於人山林野鹿見人怖走瞋恚難去如守家犬慈心易失猶如野鹿是故此心難可調伏元陽妙經巻五能令衆生善根成熟增長善芽大方等大集經卷一譬如調馬師馬有搪揬者當數數敎之久後調好佛遺日摩尼寳經推六猶如鬘師以水灑華使不萎枯潤澤鮮明長阿含經卷十八如良地有娑羅林彼中有守娑羅林人明健不懈諸娑羅根以時鋤掘平髙塡下糞沃溉灌不失其時若其邊有穢惡草生長盡拔棄之若有横曲不調直者盡􅀈治之若有極好中直樹者便擁護養随時鋤掘糞沃溉灌不失其時如是良地娑羅樹林轉茂盛好中阿含經卷三十五佛呼沙門問之汝處于家將何修為對曰恒彈琴佛言絃緩何如曰不鳴矣絃急何如曰聲絶矣急緩得中何如諸音普調佛告沙門學道猶然執心調適道可得矣佛説四十二章經尺一譬象調正可中王乘法句經象喻品制根從正如馬調御法句經羅漢品猶如榖種子入地即變易随時溉灌萌芽得長出曜經三愛品譬如王有守門者知王有所敬者知王有所不敬者知有利王者知有不利王者守門者知王所敬者知利王者便内之知王不敬者知不利王者守門者即不内那先言人持意亦如是諸善者當内之諸不善者不當内守意制心譬亦如是那先比丘經卷上知色知相知刮刷知覆瘡知作烟知好道知牛所宜處知好度濟知安隠處知留乳知養牛主若放牛人知此十一法能令牛羣蕃息大智度論卷二充才有荏染然柔忍之木是維可以為弓之幹我乃緡被之以絲則有絃而成弓可以為弓明矣亦猶温温然寛柔之人是維可以為徳之基我乃敎訓之以學則有能而成徳可以為法矣毛詩正義抑孔子曰野哉君子不可以不學見人不可以不飾不飾無貎無貎不敬不敬無禮無禮不立夫逺而有光者飾也近而逾明者學也譬之如洿邪水潦灟焉莞蒲生焉從上觀之誰知其非源泉也大戴禮記勸學子路曰南山有竹不揉且直斬而用之達於犀革以此言之何學之有子曰栝而羽之鏃而礪之其入之不亦深乎孔子家語子路初見良玉不琢資質潤美不待刻琢此亡異於達巷黨人不學而自知也然則常玉不琢不成文章君子不學不成其徳前漢書董仲舒傳龍淵太阿出昆吾之金和氏之璧由井里之田礱之以砥礪錯之以他山故能致連城之價為命世之寳學亦人之砥礪也魏志文帝紀註荆山之璞雖美不琢不成其寳顔冉之才雖茂不學不𢎞其量晋書景帝紀班爾之妙曲木變容朱藍所染素絲改色隋書李徳林傳若使貴遊之輩飾以明經可謂稽山竹箭加之以括羽北齊書儒林傳和之璧井里之厥也玉人琢之為天子寳荀子大畧且天生人也而使其耳可以聞不學其聞不若聾使其目可以見不學其見不若盲使其口可以言不學其言不若爽使其心可以知不學其知不若狂故凡學非能益也達天性也吕氏春秋尊師夫瘠地之民多有心者勞也沃地之民多不才者饒也由此觀之知人無務不若愚而好學淮南子修務訓弓待檠而後能調劍待砥而後能利玉堅無敵鏤以為獸首尾成形礛諸之功木直中繩揉以為輪其曲中規隠括之力唐碧堅忍之類猶可刻鏤揉以成器用又況心意乎淮南子修務訓劍雖利不厲不斷材雖美不學不髙雖有旨酒嘉殽不嘗不知其㫖雖有善道不學不達其功故學然後知不足敎然後知不究韓詩外傳雖有良玉不刻鏤則不成器雖有美質不學則不成韓詩外傳砥所以致於刃學所以盡其才鹽鐵論殊路夫學者崇名立身之本也儀狀齊等而餙貎者好質性同倫而學問者智説苑建本騏驥雖疾不遇伯樂不致千里干將雖利非人力不能自斷焉烏號之弓雖良不得排檠不能自任人才雖髙不務學問不能致聖説苑建本學所以益才也礪所以致刃也吾嘗幽處而深思不若學之速吾嘗跂而望不若登髙之博見説苑建本有刀者礲諸有玉者錯諸不礲不錯焉攸用礲而錯諸質在其中矣揚子學行工欲善其事必先利其器王欲宣其義必先讀其智易曰君子以多識前言徃行以畜其徳是以人之有學也猶物之有治也故夏后之璜楚和之璧雖有美璞卞和之資不琢不錯不離礫石夫瑚簋之器朝祭之服其始也乃山野之木蠶繭之絲耳使巧倕加繩墨而制之以斤斧女工加五色而制之以機杼則皆成宗廟之器黼黻之章可著於鬼神可御於王公而况君子敦貞之質察敏之才攝之以良朋敎之以明師文之以禮樂導之以詩書讚之以周易明之以春秋其有濟乎潛夫論讚學骨曰切象曰磋玉曰琢石曰磨切磋琢磨乃成寳器人之學問知能成就猶骨象玉石切磋琢磨也王充論衡量知篇學猶飾也器不飾則無以為美觀人不學則無以有懿徳有懿徳故可以經人倫為美觀故可以供神明故書曰若作梓材既勤樸斵惟其塗丹雘徐幹中論治學馬雖有逸足而不閑輿則不為良駿人雖有美質而不習道則不為君子故學者求習道也若有似乎畵采𤣥黄之色既著而純皓之體斯亡敝而不渝孰知其素歟徐幹中論治學南威青琴姣冶之極而必俟盛飾以增麗回賜游夏雖天才雋朗而實湏墳誥以廣智抱朴子外篇博喻泣血之寳仰礛䃴以摛景沉閭孟勞須楚砥以斂鋒騮驛待王孫而致逺令質俟隠括而成徳抱朴子外篇博喻文梓干雲而不可名臺榭者未加班輸之結構也天然爽朗而不可謂之君子者不識大倫之臧否也抱朴子外篇朂學雖云色白匪染弗麗雖云味甘匪和弗美故瑶華不琢則燿夜之景不發丹青不治則純鈞之勁不就火則不鑽不生不扇不熾水則不决不流不積不深故質雖在我而成之由彼也抱朴子外篇朂學呉簳質勁非筈羽而不美越劍性利非淬礪而不銛人性譞惠非積學而不成劉子崇學不登峻岑不知天之髙不瞰深谷不知地之厚不遊六藝不知智之源劉子崇學青出於藍而青於藍染使然也氷生於水而冷於水寒使然也鏡出於金而明於金瑩使然也戎夷之子生而同聲長而異語敎使然也劉子崇學海蚌未剖則明珠不顯崑竹未斷則鳯音不彰情性未鍊則神明不發劉子崇學耳形完而聼不聞者聾也目形全而視不見者盲也人性美而不監道者不學也劉子崇學夫繭繰以為絲織為縑紈繢以黼黻則王侯服之學為禮儀絲以文藻而世人榮之繭之不繰則素絲蠧於筐籠人之不學則才智腐於心胸劉子崇學譬諸金木金性苞水木性藏火故鍊金則水出鑽木而火生人能務學鑽鍊其性則才慧發矣劉子崇學不及盛年講肄道義使明珠加磨瑩之功荆璞發採琢之榮不亦良可惜乎補文選戴邈學校疏皎皎練練得藍則青得丹則赤得蘖則黄得湼則黒玉不琢則南山之圓石意林正部水性雖能流不導則不通人性雖能智不敎則不逹學猶植也不學將落意林成敗志象弭飾堂谿之材鷲羽加淇園之竹文苑英華周宣帝檄一明珠不瑩焉發其光寳玉不琢不成璋珪太平御覽珍寳部珠下鐵使平越之工鑄之以為劍而弗加砥礪則以刺不入擊不斷磨之以礱礪加之以黄砥則刺也無前擊也無下自是觀之礪之與弗礪其相去逺矣今人皆礪其劒而弗知礪其身夫學身之砥礪也太平御覽雜物部礪志不務學弗能成才如以盆盎之水求一山之形形不可得則志由此惑何氏語林識鑒譬如有人遇得寳珠示治寳者言我此寳價直無量然其形色未甚光鮮汝當為我如法磨瑩但令鮮淨勿懐形色其治寳者随彼所言依法專心如如磨瑩如是如是光色漸發乃至究竟映徹表裏既修治已價直無量波羅蜜多經卷五百七十五譬如芽種皆依地生由勤溉灌令芽生長蘓婆呼童子經卷上求明誰能革濁清我濯溉誰能昭闇啟我童昩後漢書傅毅傳不知而問堯舜無有而求天府先王之道則堯舜已六二之博則天府已荀子大畧朱儒問徑天髙於修人修人不知曰子雖不知猶近之於我故凡問事必於近者淮南子説山訓通於學者若車軸轉轂之中不運於己與之致千里終而復始轉無窮之源不通於學者若迷惑告之以東西南北所居聆聆背而不得不知凡要淮南子説山訓太山之髙背而弗見秋毫之末視之可察淮南子説林訓夫指之拘也莫不事申也心之塞也莫知務通也不明於類也淮南子泰族訓人心必有明焉必有悟焉如火得風而炎熾如水赴下而流速徐幹中論治學民之初載其矇未知譬如寳在於𤣥室有所求而不見白日照焉則羣物斯辯矣學者心之白日也徐幹中論治學茍得其要則八極之外如在指掌百代之逺有若同時不必在乎庭宇之左右俟乎瞻視之所及然後知之也抱朴子外篇對俗欲超千里於終朝必假追影之足欲凌洪波而遐濟必因艘檝之器欲見無外而不下堂必由之乎載籍欲測淵㣲而不役神必得之乎明師抱朴子外篇朂學浚井不渫則混濘滋積嘉榖不芸則荑莠彌蔓學而不思則疑閡實繁講肄不精則長惑喪功抱朴子外篇博喻登𤣥圃者悟丘阜之卑浮溟海者識池沼之褊披九典乃覺墻面之篤蔽聞至道乃知拘俗之多迷抱朴子外篇廣譬㓜而學者如日出之光老而學者如秉燭夜行猶賢乎瞑目而無見者也顔氏家訓務學耳之初窒目之始昧必不恡百金遭醫千里人不渉學猶心之聾盲不知逺祈明師以攻心術性之蔽也劉子崇學夫兩葉掩目則冥黙無覩雙珠填耳必寂寞無聞葉作目蔽珠為耳鯁二闗外擁視聼内隔固其宜也劉子專學天以神明光燭幽明照曜四方人以潛心鈎深致逺探賾索隠揚子法言註問神篇以明照物明盡則照窮而勿照之明猶無得之得無得而得斯為眞得故勿照之明斯為眞明矣演眞明而廣照何止鑒窮沙界乎李善註文選王簡棲頭陁寺碑文人皆知滌其器莫知洗其心君子審其宗而後學明其道而後行意林物理論登山小魯汎海難沂叅珉見璧辯礫知璣藝文類聚内典部内典頌若風之吹雲明乎若見蒼天黄帝素問靈樞經九鍼十二原猶如半月漸見光明元陽妙經卷二亦如有人處於闇室執大炬火悉見諸物元陽法炬亦復如是元陽妙經卷九如於暗室得大明燈普使一切得是光明三十六部尊經上眞經偈猶如明鏡能見色象了了分明種種差别是鏡中象不可定説是有是無而亦得言鏡中有像一切衆生心鏡明故見眞道像又如止水無濤波故影現日月星辰飛鳥日月星辰及以飛鳥悉見水底一切諸物亦見自影了了分明此水物及所見影俱非眞實不可言有不可言無一切衆生心水澄清見道身影亦復如是靈寳秘蜜經如燈破闇名之為滅海空智藏經哀歎品又如鑛中金治已轉增明大寳積經卷二十八譬如有鏡塵翳所覆或取塼末及以油灰磨拭令淨大寳積經卷五十五猶如日月雲霧覆蔽猛風卒起吹令四散而此日月忽然大明大寳積經卷五十五譬如小燈燭光或在壁或在室能滅大黒闇分大寳積經卷一百十譬如千歳𡨕室未曾見明若然燈時闇寧有念我久住此不欲去耶大寳積經卷一百一十二譬如有藥名無垢光若復有人用塗其眼眼得清淨一切暗色不能為障大方廣佛華嚴經卷二譬如日出光之所及衆闇咸除日沒光謝闇便如故大乘顯識經推三譬如熱鐵團熱去鐵無損解脱者亦爾惑盡而清凉大乘密嚴經卷上譬如室内久來有闇若將燈入即便闇滅蘇婆呼童子經卷下問慧者如㝠中有燈火佛説阿含正行經敬六譬如人有鏡不明不見形磨去其垢即自見形人已去貪婬瞋恚愚癡譬如磨鏡佛説阿􅅤正行經敬六譬如日出衆㝠皆索修行道地經菩薩品譬如日月以五事覆曀烟雲塵霧羅㬋阿修羅手障則不能明照人心亦如是為五葢所覆自不能利亦不能益人大智度論卷十七治暗光明復有三種一在夜分謂星月等二在晝分謂日光明三在俱分謂火珠等瑜伽師地論卷十一當知初明治三種暗一者夜暗二者雲暗三者障暗瑜伽師地論卷十一千載闕疑從春氷而俱泮一世顛倒與浮雲而俱開𢎞明集卷十夫日舒則夜卷月生則隂滅燈之破暗猶慧之銷障法苑珠林卷三十五喻林卷九十三
