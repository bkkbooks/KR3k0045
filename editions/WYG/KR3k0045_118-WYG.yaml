body:
  text: 喻林卷一百十八明徐元太撰物宜門三天機尺蠖之屈以求信也龍蛇之蟄以存身也易上繫鵓將生子呼母應雛既生母呼子應師曠禽經萬物負陰而抱陽冲氣以為和和居中央是以木實生於心草實生於筴卵胎生於中央文子上德地平則水不流輕重均則衡不傾物之生化也有感以然文子上德蜣蜋轉丸丸成而精思之而有蝡白者存丸中俄去殻而蟬彼蜣不思彼蝡奚白關尹子四符篇夫白鶂之相視眸子不運而風化蟲雄鳴於上風雌應於下風而化類自為雌雄故風化莊子天運䕫謂蚿曰吾以一足趻踔而行予無如矣今子之使萬足獨奈何蚿曰不然子不見夫唾者乎噴則大者如珠小者如霧雜而下者不可勝數也今予動吾天機而不知其所以然蚿謂蛇曰吾以衆足行而不及子之無足何也蛇曰夫天機之所動何可易邪吾安用足哉莊子秋水兔絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴有然之者也淮南子説林訓雞卵之未字也鳩溶於鷇中潰而視之若水之形良雌傴伏體方就成就成之後能啄蹶之王充論衡論苑篇鳥飛以翼當扈則鬚廢多任少沛然有餘輪運於轂至用在無山海經西山經圖讚或以尾翔或以髯凌飛䑕鼔翰翛然背騰山海經北山經圖讚龍馮雲遊騰蛇假霧未若天馬自然凌翥有理懸運天機濳御山海經北山經圖讚蹠實以足排虚以羽翹尾飜飛奇哉耳鼠厥皮惟良百毒是禦山海經北山經圖讚烏孺魚沬細要者化言物之自然各有性也郭子註莊天運海崖間波有水母東海謂之䖳正白濛濛如沫生物有智識無耳目故不知避人常有蝦依隨之蝦見人則驚此物亦隨之而沒李善註文選江賦礠石吸鐵琥珀取芥氣有濳通數亦㝠㑹藝文類聚地部石如兔絲之草下有伏兔之根無此兔在下則絲不得生於上然實不屬也藝文類聚草部兔絲雞伏鴨卵雛成入水雞母隨岸呼之雛出而隨母鴨雞異能相隨也太平御覽羽族部鴨乾臯斷舌則坐歌孔雀拍尾則立舞人勝之也鸞入夜而歌鳯入朝而舞天勝之也埤雅品物門鳯如種子中無有根芽莖節枝葉而能生起如是等事大方廣佛華嚴經卷四十四譬如魚子母念則得生不念則壞大智度論卷三十七相戕上六龍戰于野其血𤣥黄易坤躍躍毚音讒兔遇犬獲叶黄郭反之詩小雅巧言虎有子不能摶攫者輒殺之為墮武也淮南子説林訓鳥與鳥遇則相躅獸與獸遇則相觸馬與馬遇則趹踶相傷天之生此物多其力而少其智也太平御覽獸部馬五鹿制於犬猨伏於鼠埤雅品物門猨貍之捕䑕雀之畏鸇各得其剋何敢有聲參同契譬如兩木相磨便有火生還燒是木大寶積經卷一百一十二猶師子瞋聞獐鹿聲本緣經月光王品居處初六鴻漸于干易漸九三鴻漸于陸易漸九五鴻漸于陵易漸魚以依蒲藻為得其性毛詩魚藻註鳴鳩不自為巢居鵲之成巢毛詩鵲巢註富人之屋烏所集也毛詩正月註平林之木茂則耿介之鳥往集焉鄭氏箋詩車牽山鳥巖棲原鳥地處師曠禽經草食之獸不疾易藪水生之蟲不疾易水行小變而不失其大常也莊子田子方榛巢者處林茂安也窟穴者託埵防便也淮南子説林訓鱣鮪不居牛迹大鵬不滯蒿林抱朴子外篇任命獸因窟而獲騁鳥先巢而後翔廣文選沈休文郊居賦鳥噪類而比栖獸異跡而同處藝文類聚天部雲賦鸞鳯不遷於竹實騶虞不移於生物太平御覽羽族部鳯避害鵰鳶之高飛鯉鮪之處淵性自然也非鵰鳶能高飛非鯉鮪能處淵皆驚駭辟害爾鄭氏箋詩四月色斯舉矣翔而後集曰山梁雌雉時哉時哉子路共之三嗅而作論語鄉黨猶魚鼈得免毒螫之淵鳥獸得離羅網之綱吳志陸凱傳鳥莫知於鷾鴯目之所不宜處不給視雖落其實棄之而走其畏人也而襲諸人間莊子山木夫猨狖得茂木不舍而穴狟狢得埵防弗去而緣物莫避其所利而就其所害淮南子齊俗訓羊驚虎狼聳耳羣聚焦氏易林既濟之巽鷹懷欲害之心故鳥魚知其情實而逺之淮南子繆稱訓解鷹翔川魚鼈沈飛鳥揚必逺害也淮南子繆稱訓刳胎焚夭則麒麟不至乾澤而漁蛟龍不游覆巢毁卵則鳯凰不翔丘聞之君子重傷其類者也説苑權謀烏之巨觜者善避矰弋彈射張華註禽經鸞鳯避罻羅逺託崑崙墟嵇中㪚集答二郭矰繳紛紜則鴛雛徊翮坑穽充谿則鱗虞歛跡抱朴子外篇知止鴈自河北渡江南痩瘠能高飛不畏矰繳江南沃饒每至還河北體肥不能高飛恐為虞人所獲嘗銜蘆長數寸以防矰繳焉古今注昔公明儀有牛彈清角之操伏食如故轉為蟁䖟聲則翹尾而躡蹀太平御覽蟲豸部蚊暴腮龍門垂耳轅下善為魚者不求為龍望禹門輒逝是以無暴腮㸃額之患埤雅品物門鮪鹿性警防分背而食以備人物之害埤雅品物門鹿虎聞聲而深伏鷹見形而高飛埤雅品物門鷹從類雄雉見雌雉飛而鼓其翼泄泄然毛詩雄雉註鳥則雄者鳴鴝雌能順服獸則牡爲唱導牝乃相從後漢書荀淑子爽傳羽蟲盛者毛蟲不育毛蟲盛者鱗蟲不育關尹子六七篇水之守土也審影之守人也審物之守物也審莊子徐無鬼羊有角牛有角牛之而羊也羊之而牛也未可是俱有而類之不同也公孫龍子通變論施薪若一火就燥也平地若一水就濕也草木疇生禽獸羣焉物各從其類也荀子勸學類固相召氣同則合聲比則應鼓宫而宫動鼓角而角動平地注水水流濕均薪施火火就燥山雲草莽水雲角旱雲煙火雨雲水波無不皆類其所生以示人故以龍致雨以形逐影師之所處必生棘楚禍福之所自來衆人以為命安知其所吕氏春秋名類毛羽者飛行之類也故屬於陽介鱗者蟄伏之類也故屬於陰淮南子天文訓夫物類之相應𤣥妙深㣲知而不能論辯而不能解故東風至而酒湛溢蠶咡絲而商絃絶或感之也畫隨灰而月暈闕鯨魚死而彗星出或動之也淮南子覽冥訓橘柚有鄉雚葦有叢獸同足者相從游鳥同翼者相從翔淮南子説林訓檀柘而有鄉雚葦而有叢言物類之相從也鹽鐵論論誹龍渴求飲雲黑景從焦氏易林未濟之鼎石鐵之母也以有慈石故能引其子石之不慈者亦不能引也吕氏春秋精通解夫牡馬見雌牛雄雀見牝雞不相與合者異類故也王充論衡竒怪篇鸞鳯翔止百鳥皆從也張華註禽經蒼鷹之屬以象東方木行朱鳥之屬以象南方火行黄鳥之屬應土行以象季夏白鷺之屬以象西方金行𤣥鳥以象北方水行張華註禽經磁石吸鐵瑇瑁取芥氣有濳感數亦冥㑹物之相投出乎意外山海經北山經圖讚桂出合浦生必以高山之巓冬夏常青其類自為林間無雜樹南方草木狀夫龜龍甲鱗之宗麟鳯毛羽之長爰逮蜎飛蠕動皆鳴呼相聞各有意趣共相制御張湛註列子黄帝脂非火種水非魚屬然脂竭則火滅水竭則魚死伐木而寄生枯芟草而兔絲萎川蟹不歸而蛣敗葉樹見斷而蠧殄觸類而長之斯可悟矣抱朴子内篇對俗萬物雖以形相生亦皆自然故胎卵不能易種而生郭子註莊知北游上有叢蓍下有伏龜藝文類聚草部蓍欲知牛馬貴賤秋葵下小葵生牛馬貴大葵不蟲牛馬賤藝文類聚草部葵獨一叫而猨散鼉一鳴而龜伏埤雅品物門猨鵝飛則蜮沈鵙鳴則蛇結埤雅品物門鵝淘河在岸則魚沒沸河在岸則魚涌埤雅品物門鵰鵙鳴在上蛇盤不動鵲鳴在上蝟反不行埤雅品物門鵙煑羊以䶉煑鼈以蚊言其性類相感省火易熟有如此者埤雅品物門鼠磨鐵致蛄汗韉引兔蜄灰除蠧蛤陽去伏言物之相關感有如此者埤雅品物門螻蛄蠓飛起則天風舂則天雨埤雅品物門蠓螳蜋之氣含之生火蚯蚓之塵背洒起霧埤雅品物門螳蜋雞羽焚而清飈起蘆灰缺而月暈移埤雅卉物門葦尋萬物之性皆有離合虎嘯風生龍吟雲起磁石引鍼琥珀拾芥漆得蟹而散麻得漆而湧桂得葱而軟樹得桂而枯戎鹽累卵獺膽分盃其氣爽有相關感多如此類埤雅卉物門芥雄不獨處雌不孤居参同契植禾當以穀覆雞用其卵以類輔自然物成易陶冶參同契箋註下篇大腰無雄細腰無雌無雄外接無雌外育三化之蟲先孕後交兼愛之獸自爲牡牝寄生因夫高木女蘿託乎茯苓木株於土萍植於水鳥排虚而飛獸蹠實而走蟲土􅐬而蟄魚淵濳而處本乎天者親上本乎地者親下本乎時者親旁則各從其類也法苑珠林卷三十二辨異乾以龍御天坤以馬行地王弼註易坤涇渭相入而清濁異毛詩谷風註乃有厭然而特茂者其傑立之苗也厭厭然而長大者其齊等之苗也毛詩正義載芟鳴鳩言始相命也先鳴而後鳩何也鳩者鳴而後知其鳩也大戴禮記夏小正莠雚葦未莠則不為雚葦莠然後為雚葦故先言莠雚未莠為菼葦未莠為蘆大戴禮記夏小正凡聲高聲䃂正聲緩下聲肆陂聲散險聲斂達聲贏㣲聲韽囘聲衍侈聲筰弇聲鬱薄聲甄厚聲石周禮春官典同鳥罟謂之羅兔罟謂之罝音嗟麋罟謂之罞音茆彘罟謂之羉音鸞魚罟謂之罛音孤爾雅橘生淮南則爲橘生于淮北則爲枳葉徒相似其實味不同所以然者何水土異也晏子春秋襍下霄鳸司夜行鳸主晝雄翼掩左雌羽掩右師曠禽經寀寮雝雝鴻儀鷺序鷃雀啁啁下齊衆庶師曠禽經鳧鶩之雜鷴鷺之潔師曠禽經首有彩毛曰山雞頸有彩囊曰避株背有彩羽曰翡翠腹有彩文曰錦雞師曠禽經有七尺之骸手足之異戴髮含齒倚而趣者謂之人而人未必無獸心雖有獸心以狀而見親矣傳翼戴角分牙布爪仰飛伏走謂之禽獸而禽獸未必無人心雖有人心以狀而見疏矣列子黄帝羊合牛非馬牛合羊非雞公孫龍子通變論以羊牛俱有角因謂牛為羊又謂羊為牛者未可其所以俱有角者天然也而羊牛類異不可相為也公孫龍子通變論註假令羊居左牛居右共成一物不可偏謂之羊亦不可偏謂之牛既無所名不可合謂之馬謂二物不可為一明矣公孫龍子通變論註堅土人剛弱土人肥壚土人大沙土人細息土人美耗土人醜食水者善游能寒食土者無心而慧食木者多力而食草者善走而愚食葉者有絲而娥食肉者勇敢而悍食氣者神明而夀食穀者知慧而夭不食者不死而神凡人民禽獸萬物貞蟲各有以生或竒或偶或飛或走莫知其情唯知通道者能原本之淮南子地形訓蔏苗類絮而不可為絮黂不類布而可以為布淮南子説林訓鱓之與蛇蠶之與蠋狀相類而愛憎異淮南子説林訓銅英青金英黄玉英白黂燭捅膏燭澤也淮南子説林訓馬齒非牛蹏檀根非倚枝故見其一本而萬物知淮南子説林訓九州田土之性善惡不均故有黃赤黑之别上中下之差水潦不同故有清濁之流東西南北之趨王充論衡本性篇當康如豚見則歳穰䱻魚鳥翼飛乃流光同出殊應或災或祥山海經東山經圗讚白羽白性輕白雪白性消白玉白性貞雖俱白其性不同也意林孟子食水者善浮而耐寒魚屬也食土者無心而慧蚯蚓是也食木者多力而愚麋鹿是也食桑者有絲而蛾蠶屬也食肉者勇敢而悍虎豹是也食氣者神明而夀龜蛇之類王喬赤松是也食榖者智慧而夭人是也意林淮南子素纓之鴨翰音之雞望視之兔白蹄之豕短喙之狗修頸之馬君子之貌異也太平御覽羽族部鴨北方寒其人夀南方暑其人夭此寒暑之方驗於人也均之蠶也寒而餓之則引日多溫而飽之則引日少此寒溫餓飽之為修短驗於物者也太平御覽資產部蠶鸇鸇之信不如鴈周周之智不如鴻埤雅品物門鸇執錫分銀操橙證柚埤雅卉物門柚檜柏葉松身則葉與身皆曲樅松葉柏身則葉與身皆直樅以直而從之檜以曲而㑹之爾雅翼樅車前之草别名芣苢王㑹之云其實如李名之相亂在乎疑似爾雅翼女蘿菊花與薏花相似直以甘苦别之耳菊甘而薏苦所謂苦如薏者也初學記草部菊燕雀不生鳯狐兔不乳馬水流不炎上火動不潤下參同契箋註下篇不齊天生殺不共在一時猶春夏華卉自生薺麥自死秋冬草木自死而薺麥自生故云不齊也不齊為諸齊之本也禮記正義學記先種後熟謂之穜後種先熟謂之稑鄭氏註周禮天官内宰夫物之不齊物之情也或相倍蓰或相什伯或相千萬子比而同之是亂天下也巨屨小屨同賈人豈為之哉孟子滕文公上萬物好醜異賈精粗異功其不齊同乃物之情性也譬若和氏之璧雖與凡下之璧尺寸厚薄適等其價豈可同哉趙氏註孟滕文公上鴽鶉野則義豢則摶水鶩澤則羣擾則逐師曠禽經鶴以聲交而孕鵲以音感而孕白鷁相眡而孕鵁鶄睛交而孕師曠禽經昔之得道以立至今不遷者四時太山是也其得道以危至今不可安者苓巒堙谿橐木降風是也其得道以生至今不亡者日月星辰是也其得道以亡至今不可存者苓葉遇霜朝露遭日是也鶡冠子能天荆之南有冥靈者以五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋朽壤之上有菌芝者生於朝死於晦春夏之月有蠓蚋者因雨而生見陽而死列子湯問亶爰之獸自孕而生曰類河澤之鳥視而生曰鶂純雌其名大􅆎純雄其名穉蜂列子天瑞鴟目有所適鶴脛有所節解之也悲莊子徐無鬼夫草有莘有藟獨食之則殺人合而食之則益夀萬堇不殺漆淖水合兩淖則為蹇溼之則為乾金柔錫柔合兩柔則為剛燔之則為淖或溼而乾或燔而淖類固不必可推知也小方大方之類也小馬大馬之類也小智非大智之類也吕氏春秋别類夫燧之取火於日磁石之引鐵蟹之敗漆葵之鄉日雖有明智弗能然也故耳目之察不足以分物理心意之論不足以定是非淮南子覽冥訓貍頭愈鼠雞頭已瘻䖟散積血斵木愈齲此類之推者也膏之殺鼈鵲矢中蝟爛灰生蠅漆見蠏而不乾此類之不推者也淮南子説山訓鐘之與磬也近之則鐘音充逺之則磬音章物固有近不若逺逺不若近者淮南子説山訓馬之似鹿者千金天下無千金之鹿玉待礛諸而成器有千金之璧而無錙錘之礛諸淮南子説山訓鶴夀千歲以極其游蜉蝣朝生而暮死而盡其樂淮南子説林訓布之新不如紵紵之弊不如布或善為新或惡為故淮南子説林訓漆得溼而乾燥金遇燔而流淖皆非其類也吕氏春秋别類解河水濁故魚不得明目穉稼為霜所凋故不得待其自熟淮南子俶眞訓解女子鮫人體近蠶蚌出珠非甲吐絲匪蛹化出無方物豈有種山海經海外北山經圗讚䳜鼵二蟲殊類同歸聚不以方或走或飛不然之然難以理推山海經西山經圗讚水松葉如檜而細長出南海土產衆香而此木不大香故彼人無佩服者嶺北人極愛之然其香殊勝在南方時植物無情者也不香於彼而香於此豈屈於不知己而伸於知己者歟物理之難窮如此南方草木狀老子有言以貍頭之治鼠漏以啄木之䕶齲齒此亦可以類求者也若蠏之化漆麻之壞酒此不可以理推者也抱朴子内篇對俗謂夏必長而薺麥枯焉謂冬必凋而竹栢茂焉抱朴子内篇論仙盛陽宜暑而夏天未必無涼日也極陰宜寒而嚴冬未必無暫溫也百川東注而有北流之浩浩坤道至靜或震動而崩弛水主純冷而有溫谷之湯泉火體宜熾而有蕭丘之寒焰重類應沈而南海有浮石之山輕物當浮而䍧牱有沈羽之流萬殊之類不可以一槩斷之正如此也久矣抱朴子内篇論仙物有生而有識者有生而無識者有不生而有識者有不生而無識者夫生而有識者蟲類也生而無識者草木也不生而無識者水土也不生而有識者鬼神也古今注問答釋義蛇形雖長而命不久龜形雖短而命甚長莊子音義天下彼神蔡之靈長獲萬春之悠緬有蕣華之灼灼寄一朝之浮淺藝文類聚人部哀傷文終風掃於暮節霜露交於杪秋有萋萋之綠薺方滋繁於中丘藝文類聚草部薺薺與麥兮夏零蘭桂踐霜逾馨藝文類聚樂部樂府覩衆草之萎悴覽林菓之零殘悲纎條之槁摧慜枯葉之飄殫見芳薺之時生被畦疇而獨繁藝文類聚草部薺水戰之鴨何必白纓盈俎之雞何必長鳴太平御覽羽族部鴨野雞屬陰先鳴而後鼓翼家雞屬陽先鼓翼而後鳴埤雅品物門鵲林鳥以朝嘲水鳥以夜㖡埤雅品物門鶌鳩鷺目威而受胎鸛影接而懷卵鴛鴦交頸野鵲傳枝埤雅品物門鷺雀奚夕瞽鴟奚晝盲埤雅品物門鴟鵂睢鳩奚别鴛鴦奚雙埤雅品物門鴛鴦金得伯勞之血則昏鐵得鸊雞之膏則瑩石得鵲髓則化銀得雉糞則枯埤雅品物門􅀈鸚鵡摩其背而瘖鸜鵒剪其舌而語埤雅品物門鸚鵡龜鼈之類無雄蜂蝶之類無雌埤雅品物門蝶魚無耳蟬無口蛇無足蚓無筋埤雅品物門蚯蚓蛇豸腹竄蠐螬背行埤雅品物門蟦蠐蠐螬行以其背蟪蛄鳴非其口埤雅品物門蟪蛄螣蛇聽而有孕白鷺視而有胎埤雅品物門螣蛇桉山海經有獸以其尾飛有鳥以其鬚飛埤雅品物門蟪蛄鴺鳥不登山鶮鳥不踏土鴺鳥不能從下上高埤雅品物門鼠𤓰寒於曝油冷於煎埤雅卉物門𤓰竹布實而根枯蕉舒花而株槁埤雅卉物門竹黄河多淘河之屬有曰漫畫者常以觜畫水求魚有曰信天緣者常開口待魚爾雅翼鵜聲氏之牛夜亡而遇䕫止而問焉我有四足動而不善子一足而超踊何以然䕫曰以吾一足王於子矣困學紀聞卷十諸子夫以尺比寸尺即為高以丈比尺尺即為下向者之高今之成下故知高下竟無定相更相傾奪道德經註疏卷一蓮華有三種一者人華二者天華三者菩薩華人華人蓮華十餘葉天華百葉菩薩華干葉大智度論卷十喻林卷一百十八
