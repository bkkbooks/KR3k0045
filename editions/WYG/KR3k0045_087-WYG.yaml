body:
  text: 喻林卷八十七明徐元太撰文章門二經義龍出於河則八卦宣其象麟傷於澤則十翼彰其用周易正義序芟煩亂而翦浮辭舉宏綱而撮機要上斷唐虞下終秦魯時經五代書總百篇採翡翠之羽毛拔犀象之牙角罄荆山之石所得者連城窮漢水之濱所求者照乘巍巍蕩蕩無得而稱郁郁紛紛於斯為盛斯乃前言往行足以垂法將來者也尚書正義序詩人所陳者皆亂狀淫形時政之疾病也所言者皆忠規切諫救世之鍼藥也尚書之三風十愆疾病也詩人之四始六義救藥也毛詩正義關睢一字所嘉有同華衮之贈一言所黜無異蕭斧之誅春秋正義序河洛由文興六經由文起君子懿文德采藻其何傷蜀志秦宓傳書之論事也昭昭然若日月之代明離離然若星辰之錯行吼叢子論書詩之於事也昭昭乎若日月之光明燎燎乎如星辰之錯行韓詩外傳天俄而可度則其覆物也淺矣地俄而可測則其載物也薄矣大哉天地之為萬物郛五經之為衆說郛揚子問神惟聖人得言之解得書之體白日以照之江河以滌之浩浩乎其莫之禦也揚子問神或曰良玉不彫美言不文何謂也曰玉不彫璵璠不作器言不文典謨不作經揚子寡見捨舟航而濟乎瀆者末矣捨五經而濟乎道者末矣揚子吾子孰有書不由筆言不由舌吾見天常為帝王之筆舌也揚子問道或問大聲曰非雷非霆隠隠􅀈􅀈久而愈盈尸諸聖揚子問道天地作函日月固明五行該醜五嶽宗山四瀆長川五經括矩太𤣥經𤣥棿察龍虎之文觀鳥龜之理太𤣥經𤣥攡聖人之制經以遺後賢也譬猶巧倕之為規矩準繩以遺後工也昔倕之巧目茂圓方心定平直又造規繩矩墨以誨後人試使奚仲公班之徒釋此四度而傚倕自制必不能也凡工妄匠執規秉矩錯準引繩則巧同於倕也是倕以心來制規矩往合倕心也故度之工幾於倕矣先聖之智心達神明性直道德又造經典以遺後人試使賢人君子釋於學問抱質而行必弗具也及使從師就學按經而行聰達之明德義之理亦庶矣是故聖人以其心來造經典往合聖心故條經之賢德近於聖矣潜夫論讃學三軍六師萬二千人足以陵敵伐冦横行天下令行禁止未必有所法也孔子作春秋紀魯十二公猶三軍之有六師也士衆萬二千猶年有二百四十二也六師萬二千人足以成軍十二公二百四十二年足以立義王充論衡正說篇至夫子繼聖獨秀前哲鎔鈞六經必金聲而玉振雕琢情性組織辭令木鐸啟而千里應席珍流而萬世響寫天地之輝光曉生民之耳目矣文心雕龍原道重以公旦多材縟其徽烈剬詩緝頌斧藻羣言文心雕龍原道龍圖獻體龜書呈貌天文斯觀民胥以傚文心雕龍原道賛河圖孕乎八卦洛書韞乎九疇玉版金鏤之實丹文緑牒之華誰其尸之亦神理而已文心雕龍原道自夫子删述而大寶咸耀文心雕龍宗經揚子比雕玉以作器謂五經之含文也文心雕龍宗經牆宇重峻而吐納自深譬萬鈞之洪鐘無錚錚之細響矣文心雕龍宗經並窮高以樹表極逺以啟疆所以百家騰躍終入環内者也文心雕龍宗經性靈鎔匠文章奥府淵哉鑠乎羣言之祖文心雕龍宗經贊韋編三絶固哲人之驪淵也文心雕龍宗經夫六經彪炳而緯候稠疊孝論昭哲而鉤䜟葳蕤文心雕龍正緯詩為樂心聲為樂體樂體在聲瞽師務調其器樂心在詩君子宜正其文文心雕龍樂府郛郭限内外禦姦宄聖人崇仁義正愆違揚子法言註吾子篇雷霆之聲聞當時聖人之言傳無窮揚子法言註問道篇丹青初則炳然久則渝變聖人之言久而益明揚子法言註君子篇若夫姬公之籍孔父之書與日月俱懸鬼神爭奥孝敬之準式人倫之師友豈可重以芟夷加之剪截文選序聖人之道如天地諸子之異如四時四時相反天地合而通焉意林物理論經徑也如五路無所不通可常用也藝文類聚雜文部經典詩者天地之心君德之祖百福之宗萬物之戸也藝文類聚雜文部詩譬彼影圭居四方之中極猶彼黄鍾總六律之殊氣藝文類聚雜文部談講表銜轡衡軛無心於馬而所以御馬籍典禮度無心於治而所以為治太平御覽學部敘經典六藝之文樂以和神仁之表詩以正言義之用禮以明體故無訓書以廣聽知之術春秋以斷事信之符五者五常之道而易為之原易與天地相終始至於五學世有變改猶五行之更用事玉海藝文經解桓譚新論云連山八萬言歸藏四千三百言夏易詳而殷易簡困學紀聞卷一易增一字即成疣贅損一文即成瘢瘡道德經指歸卷七𤣥義䆳滄溟之逺直機崇崑嶽之高言言彰解脱之門語語鼓清淨之吹玉皇本行集經設使江河水波浪能生蓮慈烏毛能白如經故難遇設使龜生毛堪採為衣服夜月能消氷如經故難遇設使蚊蠓足堪構為舟橋能載一切重如經故難遇設使黄口雀能銜諸太山擲之地方界如經故難遇設使一葉舟力能載崑崙浮渡於大海如經故難遇設使諸水蛭口能生巨齒其大如象牙如經故難遇設使蓬蒿葉能覆無鞅界蔭芘無鞅衆如經故難遇設使烏梟類同樹一巢棲銜食共相飼如經故難遇設使兔生角堪用為梯磴上窮有頂天如經故難遇設使鼷鼠等縁於兔角梯至天能食月如經故難遇設使驢顏脣色如蘋婆果復能作歌舞如經故難遇設使蠅蟲等能飲鍾石酒迷荒而沈醉如經故難遇玉皇本行集經經者常也通也謂常通而無滯亦猶布帛之有經矣必須銓綜緯緒僅乃成功若機關疎越杼軸乖謬安能斐然成文華陽陶隠居集著述習杜義而攻杜氏猶蠧生於木而還食其木非其理也雖規杜過義又淺近所謂捕鳴蟬於前不知黄雀在其後春秋正義序凡著書者為衆人之所好也美味期乎合口工聲調於比耳前漢書揚雄傳下鈞天廣樂必有竒麗之觀帝室皇居必蓄非常之寶後漢書文􅁐列傳公羊墨守左氏膏肓穀梁癈疾𤣥乃發墨守鍼膏肓起癈疾休見而嘆曰康成入吾室操吾矛以伐我乎後漢書鄭𤣥列傳三都二京五經之鼓吹也晉書孫楚傳葺宇重軒之下施牀連榻之上竒詞異義罕見稱焉晉書陳夀列傳機文喻海韞蓬山而肓蕪岳藻如江濯美錦而增絢晉書夏侯湛列傳義則戰爭之塲辭亦劒㦸之鋒晉書荀崧傳諸子為經籍之鼓吹文章乃政化之黼黻皆為治之具也隋書經籍志一冷冷然若躡飛葉而遊乎天地之混溟茫茫乎若履横校而浮乎大海之渺漠超若處金碧琳琅之居森若握鬼魅神姦之印倏若飄鸞鶴怒若鬬虎兕清若浴碧慘若夢紅葛洪關尹子序巵言日出和以天倪莊子寓言爰有大物非絲非帛文理成章非日非月為天下明荀子賦篇寓言十九藉外論之親父不為其子媒親父譽之不若非其父者也莊子寓言𤣥者以衡量者也高者下之卑者舉之饒者取之罄者與之明者定之疑者提之太𤣥經𤣥攡言已耳目聰明如日月之光無所不照發文序詞爛然成章如玉石有文采也王逸註楚辭九歎開戸納日之光日光不能照幽鑿窻啟牖以助戸明也夫一經之說猶日明也助以傳書猶窻牖也百家之言令人曉明非徒窻牖之開日光之照也是故日光照室内道術明胸中王充論衡别通篇古今作書者非一各穿鑿六經之實傳違聖人質故謂之蕞殘比之玉屑故曰蕞殘滿車不成為道玉屑滿篋不成為寶王充論衡書解篇入山見木長短無所不知入野見草大小無所不識然而不能伐木以作室屋採草以和方藥此知草木所不能用也夫通人覽見廣博不能掇以論說與彼草木不能伐採一實也王充論衡超竒篇師曠調音曲無不悲狄牙和膳肴無澹味然則通人造書文無瑕穢王充論衡自紀篇著紙者糟粕之餘事可傳者祭畢之芻狗卑高之格是何譏矣抱朴子外篇向傳崇琬琰於懷抱之内吐琳琅於毛墨之端抱朴子外篇任命抑輕則鴻羽沈於弱水抗重則玉石漂於飛波離同則肝膽為胡越合異則萬殊而一和切論則秋霜春肅溫辭則氷條吐葩摧高則竣極頹淪竦卑則淵池嵳峩疵清則倚暗夜光救濁則立澄黄河抱朴子外篇嘉遯夫自六國以前去聖未逺故能越世高談自開戸牖兩漢以後體勢浸弱雖明于坦途而類多依採文心雕龍諸子聖人作經賢者緯之也前漢書註敘傳衣有華藻文繡書有經傳訓解也文繡之衣服分明易察訓解之書灼然易曉揚子法言註寡見篇收百世之闕文採千載之遺韻謝朝華於已披啟夕秀於未振文選文賦一字之襃寵踰華衮之贈片言之貶辱過朝市之撻補文選范甯穀梁傳序夫銓序一文為易彌綸羣言為難雖或輕採毛髮深極骨髓或有曲意宻源似近而逺廣文選劉彥和文心雕龍序時見微意有所裨補譬嘒星之繼朝陽飛塵之集華嶽廣文選裴龍駒史記集解序經與傳猶衣表裏相待而成意林新論蛩蛩之謀止於善草周周之計利在銜翼故鳩集斯文藝文類聚雜文部書煥若星經漢兮昺如水宗海參同契三相類上篇眞人立象垂訓本不為蒙校設言故每摽通衢而恒略曲徑知可敎之士自當觀其隅轍華陽陶隠居集月可令熱日可令冷佛說四諦不可令異佛說若諦實苦不可令樂佛遺敎經羊五夫日月俱明各有所照二十八宿各有所主百藥並生各有所愈狐裘備寒絺􅗽御暑舟輿異路俱致行旅孔子不以五經之備復作春秋孝經者欲博道術恣人意耳𢎞明集牟子理惑論何但詞省意深固亦義周文愜猶丹青之寫狀若水鏡之圖形也並懸諸日月足稱罇俎矣辯正論卷一其間散說流文數過八億象䭾負而弗窮龍宫溢而未盡將令乗蹄以得兔藉指以知月知月則廢指得兔則忘蹄高僧傳八論雖雅趣佳詞無足於傳記所以搴文囿之菁華齅大義之薝蔔法苑珠林序翰墨獻之雖有父風殊非新巧觀其字勢疎瘦如隆冬枯樹覽其筆蹤拘束若嚴家之餓𨽻其枯樹也雖槎枿而無屈伸其餓𨽻也則羈羸而不放縱兼斯二者故翰墨之病歟晉書王羲之列傳觀其㸃曳之工裁成之妙煙霏露結狀若斷而還連鳯翥龍蟠勢如斜而反正晉書王羲之列傳從者如懸衡者如編杳杪邪趣不方不圓若行若飛跂跂翾翾逺而望之象鴻鵠羣游駱驛遷延迫而視之端際不可得見指撝不可勝原晉書衞瓘傳或龜文鍼列櫛比龍鱗紓體放尾長短複身頽若黍稷之垂頴蘊若蟲蛇之棼縕揚波振撆膺跱鳥震延頸脅翼勢似陵雲晉書衞瓘傳或穹隆恢廓或櫛比鍼列或砥平繩直或蜿蜒膠戾或長邪角趣或規旋矩折脩短相副異體同勢晉書衛瓘傳方不中矩圓不副規抑左揚右望之若﨑疎企鳥跱志在飛移狡獸暴駭將奔未馳晉書衞瓘傳其曲如弓其直如弦矯然特出若龍騰于川森爾下頽若雨墜于天或引筆奮力若鴻鴈高飛邈邈翩翩或縱肆阿􅄼若流酥懸羽靡靡緜緜是故逺而望之若翔風厲水清波漪漣就而察之有若自然晉書衞瓘傳若鍾簴設張庭燎飛煙嶄巖􅀈嵯高下屬連似崇臺重宇增雲冠山逺而望之若飛龍在天近而察之心亂目眩晉書衞瓘傳論者謂瓘得伯英筋靖得伯英肉晉書衞瓘傳子雲近世擅名江表然僅得成書無丈夫之氣行行如縈春蚓字字若綰秋蛇卧王蒙於紙中坐徐偃於筆下雖秃千兔之翰聚無一毫之筋窮萬穀之皮斂無半分之骨晉書許邁傳草書之為狀也婉如銀鉤漂若驚鸞舒翼未發若舉復安蟲蛇虬蟉或往或還類阿那以羸形歘奮釁而桓桓及其逸遊盼嚮乍正乍邪騏驥暴怒逼其轡海水窊隆揚其波芝草蒲陶還相繼棠棣融融載其華𤣥熊對距於山嶽飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窈嬈廉苫隨體散布紛擾擾以猗靡中持疑而猶豫𤣥螭狡獸嬉其間騰猨飛鼺相奔趣凌魚奮尾蛟龍反據投空自竄張設牙距或若登高望其類或若既往而中顧或若俶儻而不羣或若自檢於常度晉書索靖傳彈毫珠零落紙錦粲魏書宗欽傳子並崔家州里頗相倣効可謂醬醎於鹽氷寒於水書品詹尹端策故以迷其變化英韶傾耳無以察其音聲殆善射之不注妙斵輪之不傳書品分行紙上類出繭之蛾結畫篇中佀聞琴之鶴峯㠋間起瓊山慙其歛霧漪瀾遞振碧海愧其下風書品龜若浮溪蛇如赴宂流星疑燭垂露佀珠書品夫紙者陣也筆者刀弰也墨者鍪甲也水硯者城也本領者將軍也心意者將副也結構者謀畫也颺筆者吉凶也出入者號令也屈折者殺戮也太平御覽工藝部書中飛文綺縠采落紙波濤流初學記文部文章飛毫列錦繡拂素起龍魚鳯舉崩雲絶鸞驚遊霧疎初學記文部文字飛白猶煙空炤灼霧縠卷舒玉海聖文御書蔡邕飛而不白羲之白而不飛玉海聖文御書鮑照飛白書執銘超工八法盡竒六文鳥企龍躍珠解泉分珪角星芒明麗爛逸絲縈髮垂平理端宻玉海聖文御書蕭引書法遒逸陳宣帝嘗指其署名語諸人曰此字筆勢翩翩似鳥之欲飛引答曰此乃陛下假其羽毛耳何氏語林言語純骨無媚純肉無力華陽陶隠居集德暉追音堆琢其章金玉其相詩大雅棫樸有道之世則依禮所行外餘美好猶如樹幹之外更有枝葉也禮記正義表記玉在山而草木潤淵生珠而岸不枯淮南子說山訓次五鸞鳯紛如厥德暉如測曰鸞鳯紛如德光皓也太𤣥經第五視相玉書言珵美六寸其曜自照王逸註楚辭離騷經橘葉青其實黄雜糅俱盛爛然而明言已敏達道德亦爛然有文章也王逸註楚辭九章重明登天六合俱照無有蓬艾而不光被也夫日月雖無私于照猶有所不及德則無不得也郭子註莊齊物論玉生雖麗光不踰把德積雖微道映天下文選袁宏名臣序贊逍遥乎文雅之囿翶翔乎禮樂之場風儀與秋月齊明音徽與春雲等潤文選王儉禇淵碑文才藝味道則理貫莊肆研妙則穎奪豪鋒晉書曹毘傳多以幹翮相許自家光國晉書裴秀傳筆敷華藻吻縱濤波晉書庾亮傳藻分葩列如春之榮蔡中郎集圂叔則銘木無枝葉則不能豐其根􅆬故謂之瘣人無藝則不能成其德故謂之野徐幹中論藝紀藝者德之枝葉也德者人之根􅆬也斯二物者不偏行不獨立徐幹中論藝紀含章如龍鳯被文如虎豹吐之如波濤陳之如錦繡抱朴子外篇安貧立德何隠含道必授條流殊述若甪區囿文心雕龍諸子賛集雕篆之軼材發綺縠之高喻文心雕龍時序買臣負薪而衣錦相如滌器而被繡文心雕龍時序御六龍之珍駕兮遊道德之平林結典籍而為罟兮敺儒墨而為禽文選思𤣥賦鑽屈轂之瓠解疏屬之拘文選張協七命握中有懸璧本自荆山璆文選劉越石重贈盧諶詩咸以自騁驥騄於千里仰齊足而並馳文選魏文帝典論論文芬芳之氣罕有而幽蘭豐其氣才明之術所希而賢人懐其術文選陸士衡演連珠註蘭生而芳玉產而潔陽葩熈氷寒松負雪莫邪挺鍔天驥汗血茍云其雋誰與比傑補文選庾闡弔賈誼文煥乎若望舒耀景而焯羣星矯乎若翔鸞拊翼而逸宇宙也補文選庾闡弔賈誼文壯思如泉湧逸藻似雲翔藝文類聚職官部尹詩麗藻若龍雕洪才類河瀉藝文類聚職官部尹詩心為學府辭同錦肆藝文類聚職官部太常墓誌鐘鼓辭林笙簧文苑藝文類聚職官部中書令墓誌耕耘書囿弋獵文場藻思綺合尺牘繡揚藝文類聚職官部特進墓誌口含碧雞之辨手握雕龍之文藝文類聚職官部司徒墓誌碧雞自口靈蛇在握藝文類聚職官部諸王碑管絃入耳則溪谷俱調文雅沿心則煙霞並韻文苑英華庾信王爵一碑養由百發落鴈吟猿應奉五行綈緗縹帙文苑英華庾信王爵一碑文史該富琬琰為心辭章辨博𤣥黄成采何氏語林傷逝中美黄裳元吉文在中也易坤初一祫古合切􅘛苦貴切何縵莫半切玉貞測曰祫􅘛何縵文在内也太𤣥經第四文空器在厨金銀塗飾其中無物益於饑人不顧也肴膳甘醢土釜之盛入者鄉之古賢文之美善可甘非徒器中之物也讀觀有益非徒膳食有補也故器空無實饑者不顧胸虚無懷朝廷不御也王充論衡别通篇玉水記方流璇源載圓折蓄寶每希聲雖秘猶彰徹文選顔延之贈王太常詩如美玉在水鼃衣所覆大乗宻嚴經卷下如人融眞金鑄在泥模中外有燋黑泥内有眞金像究竟一乗寶性論卷一飾治龍無雲雨不能參天鴻筆之人國之雲雨也載國德於傳書之上宣昭名於萬世之後厥高匪徒參天也城牆之土平地之壤也人加築蹈之力樹立臨池國之功德崇於城牆文人之筆勁於築蹈王充論衡須頌篇船車載人孰與其徒多也素車朴船孰與加漆畫也然則鴻筆之人國之船車采畫也王充論衡須頌篇絃歌為妙異之曲坐者不曰善絃歌之人必怠不精何則妙異難為觀者不知善也聖國揚妙異之政衆臣不頌將順其美安得所施哉王充論衡須頌篇涉聖世不知聖主是則盲者不能别青黄也知聖主不能頌是則喑者不能言是非也王充論衡須頌篇農無疆夫穀粟不登國無疆文德闇不彰王充論衡須頌篇廬宅始成桑麻纔有居之歴嵗子孫相續桃李梅杏菴邱蔽野根荄衆多則華葉繁茂漢氏治定久矣土廣民衆義興事起華葉之言安得不繁夫華與實俱成者也無華生實物希有之山之秃也孰其茂也地之瀉也孰其滋也文章之人滋茂漢朝者乃夫漢家熾盛之瑞也天晏列宿煥炳陰雨日月蔽匿方今文人並出見者乃夫漢朝明明之驗也王充論衡超竒篇天晏𤾉者星辰曉爛人性竒者掌文藻炳漢今為盛故文繁湊也王充論衡佚文篇孟子相人以眸子焉心清則眸子瞭瞭者目文瞭也夫候國占人同一實也國君聖而文人聚人心惠而目多采王充論衡佚文篇道立國表路出其下望國表者昭然知路漢德明著莫立邦表之言故浩廣之德未光於世也王充論衡佚文篇然史之為任乃彌綸一代負海内之貴而羸是非之尤秉筆荷擔莫此之勞文心雕龍史傳故授官選賢則義炳重離之輝優文封策則氣含風雨之潤勅戒恒誥則筆吐星漢之華治戎燮伐則聲有洊雷之威眚災肆赦則文有春露之滋明罰勅法則辭有秋霜之烈此詔策之大略也文心雕龍詔策出入由門關閉宜審庶務在政通塞應詳文心雕龍書記且夫寒谷豐黍吹律暖之昏情爽曙箴規顯之雖明珠兼寸尺璧有盈曜車二六三傾五城未若申錫典章之為逺也文選魏都賦有用吉甫作是工師之誦其調和人之性情如清微之風化養萬物使之日有長益也毛詩正義烝民廣樂九奏必登昊天之庭韶夏六變必饗上帝之祀晉書陸雲傳今聖朝留心典誥發精於殊語欲以驗考四方之事不勞戎馬高車之使坐知傜俗適子雲攘意之秋也不以是時發倉廩以振贍殊無為明語將何獨挈一作絜之寶上以忠信明於上下以置恩於罷朽所謂知蓄積善布施也葢蕭何造律張倉推厯皆成之於帷幕貢之於王門功列於漢室名流乎無窮誠以隆秋之時收藏不殆饑春之嵗散之不疑故至於此也方言後載劉子駿與雄書孔子之春秋素王之業也諸子之傳書素相之事也觀春秋以見王意讀諸子以睹相指王充論衡超竒篇陳平未仕割肉閭里分均若一能為丞相之驗也夫割肉與割文同一實也如君山得執漢平用心與為論不殊指矣王充論衡定賢篇知屋漏者在宇下知政失者在草野知經誤者在諸子王充論衡定賢篇玉亂於石人不能别或逢楚之王尹以玉為石卒使卞和受刖足之誅是反為非虚轉為實安能不言王充論衡對作篇夫制器者珍於周急而不以采飾外形為善立言者貴於助敎而不以偶俗集譽為高抱朴子外篇應嘲夫豐草不秀塉土巨魚不生小水格言不吐庸人之口高文不墮頑夫之筆故披洪範而知箕子有經世之器覽九術而見范生懷治國之略省夷吾之書而明其有撥亂之幹視不害之文而見其精霸王之道抱朴子外篇審舉申商刀鋸以制理鬼谷脣吻以策勲文心雕龍諸子暨戰國爭雄辨士雲踊從横參謀長短角勢轉丸騁其巧辭飛鉗伏其精術一人之辨重於九鼎之寶三寸之舌强於百萬之師文心雕龍論説君子藏器待時而動發揮事業固宜蓄素以弸中散采以彪外梗楠其質豫章其幹摛文必在緯軍國負重必在任棟梁窮則獨善以垂文達則奉時以騁績若此文人應梓材之士矣文心雕龍程器春秋大夫則修辭騁㑹磊落如琅玕之圃焜燿似縟錦之肆文心雕龍才畧襃見一字貴踰軒冕貶在片言誅深斧鉞文心雕龍史傳三驅弛綱九伐先詰鞶鑑吉凶蓍龜成敗摧壓鯨鯢抵落蜂蠆移寶易俗草偃風邁文心雕龍檄移贊分閫推轂奉辭伐罪非唯致果為毅亦且厲辭為武使聲如衡風所繫氣似攙搶所掃百尺之衝摧折於咫書萬雉之城顚墜於一檄者也文心雕龍檄移姦慝懲戒實良史之直筆農夫見莠其必鋤也文心雕龍史傳魯之敬姜婦人之聰明耳然推其機綜以方治國安有大夫學文而不達於政事哉文心雕龍程器擊劒可以衞䕶安身辭賦可以諷諭勸人也揚子法言註吾子篇彼瓊敷與玉藻若中原之有菽同槖籥之㒺窮與天地乎竝育文選文賦夫辯言之豔能使窮澤生流枯木發榮庶感靈而激神況近在乎人情文選曹植七啟邪鋒颯焉落刃慧日赫以舒光辯正論卷五緝𤣥詞者探卷而得意珠軌正道者披文而飲甘露法苑珠林序喻林卷八十七
