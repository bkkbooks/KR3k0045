body:
  text: 喻林卷一百十九明徐元太撰物宜門四物產江漢之間魚所產也毛詩南有嘉魚註漆沮之水麀鹿所生也毛詩吉日註周之原地在岐山之南膴膴然肥美其所生菜雖有性苦者甘如飴也鄭氏箋詩緜搖木不生危松栢不生埤國語晉高山峻原不生草木松栢之地其土不肥國語晉故玉處於山而木潤淵生珠而岸不枯者潤澤之所加也史記龜䇿傳東吳有齒角之饒西蜀有丹砂之富兖豫漆絲之廥燕齊恠石之府秦邠旄羽逈帶琅玕荆郢桂林旁通竹箭江干橘柚河外舟車遼西旃罽之鄉葱右蒱梢之駿殖物恠錯於何不有晉書食貨志代馬胡駒出自冀北梗柟豫章植乎中土蓋天地所以分區域也宋書索虜傳上有丹砂者下有黃金上有慈石者下有銅金上有陵石者下有金錫赤銅上有赭者下有鐵此山之見榮者也管子地數東方之美者有醫毋閭之珣玗琪焉東南方之美者有㑹稽之竹箭焉南方之美者有梁山之犀象焉西南方之美者有華山之金石焉西方之美者有霍山之珠玉焉西北方之美者有崑崙之球琳琅玕焉北方之美者有幽都之筋角焉東北方之美者有斥山之文皮焉中央之美者有岱岳以生五穀桑麻魚鹽出焉淮南子地形訓水圓折者有珠方折者有玉清水有黄金龍淵有玉英淮南子地形訓明目之珠出於蠬􅀈周之簡圭生於垢石大蔡神龜出於溝壑淮南子説山訓隴蜀之丹漆旄羽荆揚之皮革骨象江南之楠梓竹箭燕齊之魚鹽旃裘兖豫之漆絲絺紵養生送死之具也待商而通待工而成鹽鐵論本議隴西冀北多見駿馬焦氏易林益之師陸居千里不見河海无有魚市焦氏易林益之咸江有寳珠海多大魚焦氏易林渙之需發視之山其上多金玉其下多砥礪山海經中山經薰吳之山無草木多金玉山海經西山經吳有谿名干谿越有山名若耶並出善鐵鑄為名劎也莊子音義刻意河汾之寳有曲沃之懸匏焉鄒魯之珍有汶陽之孤篠焉文選笙賦崑山何有有瑤有珉文選潘尼贈陸機詩鬱氣之下必有祕伏重奥之内必有積寳廣文選伏義與阮步兵書明珠胎於靈蚌兮夜光潛乎𤣥洲雜神寳其充盈兮豈魚龜之足收古文苑蔡邕漢津賦太山多貞木藝文類聚木部女貞魏郡好杏地產不為珍藝文類聚菓部杏高山多林虎豹蕃孕焉深泉大川魚龍交焉太平御覽地部林東方多麥南方多稷西方多麻北方多菽中央多禾五土之所宜也太平御覽百榖部麥魚托水而成鯤木在山而有松太平御覽鱗介部海鯤魚地性生草山性生木故地種葵韭山種棗栗名曰美園茂林也埤雅卉物門韭龍首之山若水出焉其中多美玉放臯之山明水出焉其中多蒼玉初學記寳器部玉珠澤之藪方三十里爰有雚葦莞浦茅萯蒹葽穆天子傳譬如高原陸地不生蓮蕐大寳積經卷一百一十二如旃檀香出摩黎山除摩棃山無出旃檀大智度論卷二金出山石沙赤銅中眞珠出魚腹中竹中蛇腦中龍珠出龍腦中珊瑚出海中石樹玉貝出蟲甲中銀出燒石餘琉璃頗黎等皆出山窟中如意珠出自佛舍利若法沒盡時諸舍利皆變為如意珠大智度論卷十土宜扶胥山木宜生於高山荷蕐水草宜生於下隰言高下大小各得其宜毛詩正義山有扶蘇橘踰淮而北為枳鸜鵒不踰濟貉踰汶則死此地氣然也鄭之刀宋之斤魯之削吳粤之劎遷乎其地而弗能為良地氣使然也周禮考工記江南燠熱橘柚冬青渭北沍寒楊榆晩葉周書王褒傳白水宜玉黑水宜砥青水宜碧赤水宜丹黃水宜金清水宜龜汾水濛濁而宜麻濟水通和而宜麥河水中濁而宜菽雒水輕利而宜禾渭水多力而宜黍漢水重安而宜竹江水肥仁而宜稻平土之人慧而宜五穀淮南子地形訓吳越之竹隋唐之材不可勝用而曹衛梁宋采棺轉尸江湖之魚菜黃之鮐不可勝食而鄒魯周韓藜藿蔬食鹽鐵論通有山川汙澤陵陸丘阜五土之宜聖王就其勢因其便不失其性高者黍中者稷下者秔蒲葦菅蒯之用不乏麻麥黍粱亦不盡山林禽獸川澤魚鼈滋殖王者京師四通而致之説苑辨物高山之巓無美木傷於多陽也大樹之下無美草傷於多陰也説苑談叢磝磽秃白不生黍稷焦氏易林巽之蹇五土所宜黃白宜種禾黑墳宜麥黍蒼赤宜菽芋下泉宜稻得其宜則利百倍博物志葛山之尾無草木多砥礪山海經東山經縞氐之山無草木多金玉山海經中山經長石之山無草木多金玉山海經中山經婁􅃰之山無草木多金玉山海經中山經傅山無草木多瑤碧山海經中山經蕪菁嶺嶠已南俱無之偶有士人因官攜種就彼種之出地則變為芥亦橘種江北為枳之義也南方草木狀傳言貉不踰汶鸜鵒不踰濟狐不渡江而南橘不越江而北區宇之内咫尺不同而况分之蕐夷限以山海魁詭俶怪可勝言哉埤雅品物門貉橘柚凋於北徙若榴鬱於東移也埤雅卉物門柚周禮大司徒辨五地之物一曰山林其動物宜毛物其植物宜皁物二曰川澤其動物宜鱗物其植物宜膏物三曰邱陵其動物宜羽物其植物宜覈物四曰墳衍其動物宜介物其植物宜筴物五曰原隰其動物宜臝物其植物宜藂物初學記地部摠載地今嶺南多毒足解毒藥之物即金蛇白藥之屬是也江湖多氣足破氣之物即薑橘吳茱茰之屬是也寒溫不節足療溫之藥即柴胡麻黃之屬是也凉氣多風足理風之藥即防風獨活之屬是也濕氣多痺足主痺之物即魚鼈螺蜆之屬是也陰氣多血足主血之物即地錦石血之屬是也嶺氣多瘴足主瘴之物即常山鹽麩涪醋之屬是也石氣多毒足主毒之物即犀角麝香羚羊角之屬是也水氣多痢足主痢之物即黄連黄蘖之屬是也野氣多蠱足主蠱之物即蘘荷茜根之屬是也沙氣多狐足主短狐之物即鸀鳿鸂鶒之屬是也大畧如此各隨所生本草一卷譬如有人以諸穀麥而為種蒔各各分别而無間雜其後依時彼諸種子皆悉成熟是人即時次第而收若穀若麥亦無間雜如是展轉收已復種種已復收無有窮盡正法經卷四種樹盡生房矣盡成實矣盡堅熟矣盡齊好矣而無稂莠擇種之善民力之專時氣之和所致之鄭氏箋詩大田立苗有行故速長强弱不相害故速大正其行通其中疏為冷風則有收而多功亢倉子農道凡苗之患不俱生而俱死是以先生者美米後生者為粃是故其耨也長其兄而去其弟亢倉子農道苗其弱也欲孤其長也欲相與居其熟也欲相與扶三以為族稼乃多穀亢倉子農道樹肥無使扶疏樹墝不欲專生而族居肥而扶疏則多粃墝而專居則多死吕氏春秋辨土種樹務修田疇滋植桑麻肥磽高下各因其宜丘陵阪險不生五穀者以樹竹木春伐枯槁夏取果蓏秋畜疏食冬伐薪蒸以為民資淮南子生術訓蓴性易生種以深淺為候水深則莖肥而葉少水淺則葉多而莖瘦埤雅卉物門芹譬如種穀得穀種麥得麥稗子生稗如以種子種於薄地收果減少若以種子種之良田多收果實正法念處經卷七十珍異金錫練而精圭璧性有質毛詩淇澳註馬八尺為駥音戎牛七尺為犉閏旬切羊六尺為羬五咸切彘五尺為􅙊音厄狗四尺為獒五刃切雞三尺為鶤音昆爾雅黃金謂之􅀢其美者謂之鏐音求白金謂之銀其美者謂之鐐爾雅拂楊其華捽如芙蓉始出觀其鈲爛如列星之行觀其光渾渾如水之溢於溏觀其斷巖巖如瑣石觀其才煥煥如氷釋此所謂純鈞耶越絶外傳記寳劎東北荒中有獸名獬豸一角性忠見人鬭則觸不直者聞人論則咋不正者後漢書志輿服下註昔有黃三鼎周之九寳咸以一體使調一味豈若斯釡五味時芳魏志鍾繇傳註東海島龍川穆天子養八駿處也島中有草名龍芻馬食之一日千里古語云一株龍芻化為龍駒述異記上南海中有軒轅丘鸞自歌鳯自舞古云天帝樂也述異記上玉以絜潤丹紫莫能渝其質松表嵗寒霜雪莫能凋其采可謂溫仁勁直性之然乎隋書蘇威傳有干越之劎者柙而藏之不敢用也寳之至也莊子刻意夫玉潤澤而有光其聲舒揚渙乎其有似也無内無外不匿瑕穢近之而濡望之而隧淮南子説山訓徐無鬼曰嘗語君吾相狗也下之質執飽而止是貍德也中之質若視日上之質若亡其一吾相狗又不若吾相馬也吾相馬直者中繩曲者中鉤方者中矩圓者中規是國馬也而未若天下馬也天下馬有成材若䘏若失若喪其一若是者超軼絶塵不知其所莊子徐無鬼白玉不琢美珠不文質有餘也淮南子説林訓蓍百莖而共一本龜千載而人寳是以三代傳决疑焉春秋繁露奉本飛者宗鳯􅋅者宗鱗為其難致也孔叢子記問家有千金之玉不知治猶之貧也良工宰之則富及子孫君子謀之則為國用韓詩外傳玉有六美君子貴之望之溫潤近之栗理聲近徐而聞逺折而不撓闕而不荏廉而不劌有瑕必示之於外是以貴之望之溫潤者君子比德焉近之栗理者君子比智焉聲近徐而聞逺者君子比義焉折而不撓闕而不荏者君子比勇焉廉而不劌者君子比仁焉有瑕必見之於外者君子比情焉説苑雜言鴛生會稽稍巨能飛翶翔桂林為衆鳥雄焦氏易林升之師五色金也黃爲之長久薶不生衣百鍊不輕从革不違許氏説文卷四玉石之美有五德潤澤以溫仁之方也䚡理自外可以知中義之方也其聲舒揚專以逺聞智之方也不撓而折勇之方也鋭廉而不劌潔之方也許氏説文卷十崑山之玉燔以爐炭三日三夜色澤不變玉之美者也江漢有夜光之明珠珠之美者也吕氏春秋重已解腰褭良馬飛兔其子褭兔􅋅蓋皆一日萬里也淮南子齊俗訓解九德之氣是生長乗人狀豹尾其神則凝妙物自潛世無得稱山海經西山經圖讚有浮金之鐘沈明之磬以羽毛拂之則聲振百里王子年拾遺記顓頊南得煙丘碧樹酈水􅀈沙賁都朱泥雲岡素竹東得䓤巒錦百漂檖龍松寒河星柘岏雲之梓西得漏海浮金狼淵羽墾滌嶂霞桑沈塘員籌北得宜阜乾漆陰板文梓褰流黒魄闇海香瓊珍異是集王子年拾遺記秦始皇夫松栢特禀自然之鍾氣故能為衆木之傑耳非能為而得之也郭子註莊德充符圓丘有奇草鍾山出靈液文選郭景純遊僊詩崦山多靈草海濱饒竒石文選江文通雜體詩步光之劎華藻繁縟飾以文犀彫以翠綠綴以驪龍之珠錯以荆山之玉陸斷犀象未足稱㒞隨波截鴻水不漸刃文選曹植七啓良玉比德君子珪璋見美詩人晉之垂棘魯之璵璠宋之結綠楚之和璞價越萬金貴重都城有稱疇昔流聲將來是以垂棘出晉虞虢雙禽和璧入秦相如抗節文選魏文帝與鍾大理書玉者色不如雪澤不如雨潤不如膏光不如燭取玉甚難越三江五湖至崑崙之山千人往百人反百人往十人反至中國覆十萬之師解三千之圍意林尸子鶴陽鳥也而遊於陰蓋羽族之宗長仙人之騏驥也藝文類聚鳥部鶴得綏山一桃雖不能仙亦足以豪藝文類聚菓部桃周穆王時西胡獻玉杯是百玉之精明夜照夕以杯於庭中比明旦而水滿於杯中汁甘而香美斯靈器也藝文類聚寳玉部玉魏田父有耕於野者得玉徑尺不知其玉也以告鄰人鄰人詐之曰此怪石也畜之弗利其家田父雖疑猶豫以歸置於廡下其玉明照一室大怖遽而棄之於逺野鄰人取之以獻魏王召玉工相之玉工望之再拜賀曰大王得天下之寳臣所未嘗見王問其價玉工曰此無價以當之五城之都僅可一觀魏王賜獻玉者千金長食上大夫之禄藝文類聚寳玉部玉赤瓊以照燎為光碧石以葳㽔為色咸見珍於東國並被貴於西極藝文類聚草部空青賦荆山萬重地產卞和之玉隨流千仞水出靈蛇之珠藝文類聚職官部中書令墓志獹韓良犬也㹱音鵲宋良犬也事文類聚狗字林溟海之􅀥大如瓜鍾山之李大如瓶太平御覽果部李昆流素蓮一房百子凌冬而茂埤雅卉物門菡蓞嘉禾五穀之長盛德之精也文者異本而同秀質者同本而異秀埤雅卉物門禾稼員嶠之山名環邱有氷蠶以霜雪覆之然後作繭其色五采織為文錦入水不濡以之投火經宿不燎初學記天部霜御天惟龍御地以驥利有攸往不期而至初學記地部總載地東南之美生於㑹稽牛斗之氣蓄於毘溪有瑤者玉連城是齊有威者鳯非梧不棲初學記職官部侍御史註太阿之劒世濟其美淬以清波斂以越砥如玉斯曜若景在水不運自肅率土從軌初學記武部劎玉有五德温潤而澤有似於智鋭而不害有似於仁抑而不撓有似於義有瑕於内必見於外有似於信垂之如墜有似於禮初學記寳器部玉輕迅者莫如鷹猛捷者莫如虎惟良犬之禀性兼一雋之勁武初學記獸部狗犬則青鸇白雀飛龍虎子馴良捷警難狎易使也初學記獸部狗龜者陰蟲之老也龜三千嵗上游於卷耳之上老者先知故君子舉事必考之初學記鱗介部龜逸論語曰璠璵魯之寳也孔子曰美哉璠璵逺而望之栗若也近而視之瑟若也一則理勝一則孚勝事類賦寳貨部玉註木有扶桑梧桐松栢皆受氣淳矣異於羣類者也事類賦木部桐註玉出崑山珠生南海逺方異域各生珍寳何氏語林品藻黃帝乃採首山之銅鑄鼎象物鼎成以象太一於雍州其鼎知吉知凶知存知亡能輕能重能息能行不灼而沸不汲而盈自生五味眞神鼎也黄帝本行記天子之駿赤驥盜驪白義踰輪山子渠黃華驑騄駬穆天子傳夫玉之為物也㣲以寡而石之為物也巨以衆衆故賤寡故貴道徳經指歸卷上夫草木皆春生秋落必矣而木有松栢橿檀之倫百八十餘種草有芝英萍實靈沼黄精白符竹翣戒火長生不死者萬數盛冬之時經霜歴雪蔚而不彫列仙傳如水清珠能清濁水波羅蜜多經卷五百七十三譬如金剛自體堅宻刀不能斫火不能燒水不能爛毒不能害波羅蜜多經卷五百七十二如雪山中有妙藥樹枝條莖榦不枯不折波羅蜜多經卷五百七十二如烏曇䟦華時乃一現彼諸衆生發希有心起難遭闕金光明最勝正經卷一譬如一瑠璃珠勝於水精如須彌山大寳積經卷一百一十二又如大地是四種寳所生之處何等為四一者無價二者上價三者中價四者下價大寳積經卷一百一十九譬如牛麝身命殄後雖是無識而牛有黄而麝有香能為無量無邉有情作大饒益大集地藏十輪經卷三多羅寳樹周帀圍繞鮮明可愛七寳合成其黄金樹白銀為葉及以華果白銀樹者眞珠為葉及以華果眞珠樹者琉璃為葉及以華果琉璃樹者玻琍為葉及以華果玻琍樹者瑪瑙為葉及以華果瑪瑙樹者硨磲為葉及以華果硨磲樹者赤眞珠為葉及以華果赤眞珠樹者珊瑚為葉及以華果珊瑚樹者眞金為葉及以華果大集菩薩三昧經卷一其菩提樹高顯殊持金剛為身琉璃為榦衆雜妙寳以為枝條寳葉扶疎垂蔭如雲寳華雜色分枝布影復以摩尼而為其果含暉發燄與華間列大方廣佛華嚴經卷一此日藏大寳光明照觸海水悉變為乳離潤大寳光明照觸其乳悉變為酪火燄光大寳光明照觸其酪悉變為酥盡無餘大寳光明照觸其酥變成醍醐大方廣佛華嚴經巻五十一譬如大海有四熾然光明大寳布在其底性極猛熱常能飲縮百川所注無量大水是故大海無有增減大方廣佛華嚴經卷五十一如來出現品譬如金翅鳥王飛行虚空迴翔不去以清浄眼觀察海内諸龍宫殿奮勇猛力以左右翅鼔揚海水悉令兩闢大方廣佛華嚴經卷五十二譬如白栴檀以塗其身除諸惱熱得清涼樂大方廣佛華嚴經卷五十九譬如離垢大摩尼寳處閻浮提能照四萬由旬日月宫殿皆悉顯現大方廣佛華嚴經卷五十九譬如摩尼名淨光明有人以此瓔珞身者蔽餘寳光悉如聚墨大方廣佛華嚴經卷五十九譬如憂陀伽婆羅栴檀若燒一銖智氣普熏小千世界三千大千世界珍寳所不能及大方廣佛華嚴經卷五十九如摩尼寳體性清淨若有置於日月光中隨其所應各雨其物大乗蜜嚴經卷下若有異國生即應草若以彼草著乳中者即成為酪不移時節出曜經八行品譬如金剛雖小能勝一切寳不得言少故不如多大智度論七十九見貴醯醢之美而煎鹽之尚貴天產也割刀之用而鸞刀之貴貴其義也聲和而后斷也禮記郊特牲有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋禮記明堂位凡為俎者以骨為主骨有貴賤殷人貴髀周人貴肩凡前貴於後禮記祭統殷人貴髀周人貴肩者殷質貴髀之厚賤肩之薄周文貴肩之顯賤髀之隱各隨所貴禮記正義祭統狗有吠守者有主獵者主獵者貴吠守者賤春秋正義昭公二十三年君物龍臣物龜三墳山墳越俗以珠為上寳生女謂之珠娘生男謂之珠兒吳越間俗説明珠一斛貴如玉者述異記上漢代賤軺車而貴輜軿魏晉賤輜軿而貴軺車宋書禮五志鳯翥鸞舉百羽從之鳯靡鸞吪百鳥瘞之師曠禽經藥也其實堇也桔梗也雞㢕也豕零也是時為帝者也何可勝言莊子徐無鬼曹氏之裂布蛷者貴之然非夏后氏之璜淮南子説林訓春栗夏梨少鮮希有斗千石萬貴不可求焦氏易林否之漸牛皮為賤正三軍之衆淮南子說山訓凡字朋者羽蟲之長烏者日中之禽舄者知太歲之所在燕者請子之候作巢避戊巳所䝿者故皆象形許氏說文卷一桂江南木百藥之長許氏説文卷十土龍以求雨芻狗以求福時見貴也淮南子説林訓解土五行之尊者牛五畜之大者四行之牲無足以配土德者故以牛為季夏食也蔡中郎集月令問答且烏以反哺託體太陽羔以跪乳為䞇國卿禽鳥之㣲猶以孝寵蔡中郎集上孝子虎豹之獸以其文貴太𤣥經第四文解荔枝過即龍眼熟故謂之荔枝奴言常隨其後也南方草木狀藥草有時迭相為帝謂其王相休廢藥各得所用也莊子音義徐無鬼狐掖下之皮其毛純白集以為裘輕柔難得故貴今人則以背毛為裘而棄其白蓋取厚而溫也前漢書註匡衡傳鷰鳥比諸侯鶚比天子李善註文選鄒陽上書吳王集陳之隼以自逺而稱神栖漢之雀乃出幽而見珍補文選鮑昭野鵝賦鼎以希出而世重之釡鐺常用而世輕之意林魏子鼓不預五音而為五音主意林申子五穀者萬民之命國之重寳也藝文類聚百穀部榖橘柚之實堯舜所不常御山龍華蟲帝王不以為䙝服藝文類聚菓部甘昔人稱雞有五德至於寒蟬才齊其美而莫斯述夫頭上有緌則其文也含氣飲露則其清也黍稷不享則其廉也處不巢居則其儉也應候守節則其信也事文類聚蟬寒蟬賦序瓦缻木杯比門所饒金觴玉爵萬家所無也太平御覽文部著書下八音之中唯絲最宻而琴為之首太平御覽樂部琴下荆山不貴玉鮫人不貴珠太平御覽珍寳部玉下鯉最為魚之主埤雅品物門鯉葵為百菜之主埤雅卉物門葵鳯為羽族之美麟為毛類之俊龜龍為介蟲之長楩柟南為衆材之最是物之貴也初學記鳥部鳯譬如師子獸中之王若其死已虎狼鳥獸無有能得食其肉者大寳積經卷一百一十三譬如眞金為無價寳若無眞金銀為無價若無銀者鍮石為無價若無鍮石偽寳為無價若無偽寳赤白銅鐵白􅀈鉛錫為無價寳大集月藏經卷九喻林卷一百十九
