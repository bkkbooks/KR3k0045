body:
  text: 喻林卷八十二明徐元太撰德行門四特立上火下澤睽君子以同而異易睽阪田﨑嶇墝埆之處而有菀然茂特之苗喻賢者在閒辟𨼆居之時鄭氏箋詩正月舉世混濁而我獨清衆人皆醉而我獨醒是以見放史記屈原傳新沐者必彈冠新浴者必振衣人又誰能以身之察察受物之汶汶者乎寧赴常流而葬乎江魚腹中耳又安能以浩浩之白而蒙世之溫蠖乎史記屈原傳抱景特立與士不羣葢高樹靡陰獨木不林後漢書崔駰列傳介然之志峭聳霜崖確乎之情峯横海岸梁書張充傳夫賢材者非尚膂力豈繫文華唯須正身負戴確乎不動譬棟之處屋如骨之在身所謂棟梁骨鯾之材也隋書房彥謙傳言鷙鳥執志剛厲特處不羣以言忠正之士亦執分守節不隨俗人王逸註楚辭離騷經言已懷德不用復高我之冠長我之佩尊其威儀整其服飾以異於衆人之服王逸註楚辭離騷經歌曲彌妙和者彌寡行操益清交者益鮮夫歌曲妙者和者則寡言得實者然者則鮮和歌與聽言同一實也曲妙人不能盡和言是人不能皆信王充論衡定賢篇衆鳥羣相追鷙鳥獨無雙何必相呴濡江海自可容嵇中散集郭遐叔贈貌愚而志逺面垢而行潔確乎若嵩岱銓衡所不能測也浩乎若滄海斗斛所不能校也峻其重仞之高隠其百官之富觀彼佻竊若草莽也邈世之操眇焉冠秋雲之表遺俗之神緬焉棲九𤣥之端抱朴子外篇名實冰炭不衒能於冷熱瑾瑜不證珍而體著是以君子恭已不恤乎莫與至人尸居心遺乎毁譽抱朴子外篇博喻微飆不能揚大海之波毫芒不能動萬鈞之鍾是以漆園思惠有捐斤之歎伯氏哀期有剿絃之憤短唱不足以致𢎞麗之和勢利不足以移淡泊之心抱朴子外篇廣譬與奪不汨其神者至粹者也利害不染其和者極醇者也浩浩乎非瓢觶所校矣茫茫乎非跬步所尋矣聲希所以為大音和寡所以崇我貴抱朴子外篇廣譬夫入虎狼之羣後知賁育之壯勇處禮廢之俗乃知雅人之不渝抱朴子外篇刺驕揚清波以激濁流執勁矢以厲羣枉抱朴子外篇刺驕吾以為寜作不載之寶不飛之鵬不颺之蘭無黨之士亦損於夜光之質垂天之大含芳之卉不朽之業乎抱朴子外篇交際青松在東園衆草没竒姿凝霜殄異類卓然見高枝連林人不覺獨樹衆乃竒陶靖節集詩五言鷙鳥之不羣兮自前代而固然何方圓之能周兮夫孰異道而相安文選屈原離騷經似夜光之剖荆璞兮若茂松之依山巔也文選籍田賦如金在沙顯然自異猶玉在泥涅而不淄藝文類聚人部隠逸上贊貞操與日月俱懸孤芳隨山壑共逺藝文類聚人部隠逸下啟危松擢本且觀後彫之質貞桂挺生便體冬華之秀藝文類聚職官部太保碑危勁之節貫四序而踰秀堅貞之操經百鍊而不銷藝文類聚職官部太保碑處塵貴不染被褐重懷珠美玉耀幽石曽蘭挺叢芻藝文類聚内典部内典頌澹臺子羽齎千金之璧渡河河欲之陽侯波起兩蛟夾船子羽左操璧右操劒擊蛟皆死既濟三投璧於河河伯三躍而歸之子羽毁璧而去太平御覽鱗介部蛟浮舟千仞壑總轡萬尋巔流沬不足險石牀豈為艱初學記居處部園圃稟天然之貞勁經巖冬而不零雖凝霜而挺榦近青春而秀榮若君子之順時又似乎眞人之抗貞初學記果木部柏又如猛風依於虚空而能吹盪烟雲塵霧不依於地大集月藏經卷三降棄一切衆邪異學若干法戰堅跱幢旛猶如勇將大軍之師折伏嚴敵阿差朱菩薩經卷一利衰毁譽稱譏苦樂八法之風不動如來猶四風之吹須彌也僧肇註維摩詰經佛國品有本本小而後至大是小為大本先學然後至聖是學為聖本也禮記正義學記不官為羣官之本不器為羣器之本不約為羣約之本不齊為羣齊之本言四者莫不有本人亦以學為本也禮記正義學記原泉混混不舍晝夜盈科而後進放乎四海有本者如是是之取爾茍為無本七八月之間雨集溝澮皆盈其涸也可立而待也故聲聞過情君子恥之孟子離婁上觀水有術必觀其瀾日月有明容光必照焉孟子盡心上戰而死者其人之葬也不以翣資刖者之屨無為愛之皆無其本矣莊子德充符𤣥寂虚靜者神明之本也陰陽柔剛者二儀之本也巍峩巖岫者山嶽之本也德行文學者君子之本也莫或無本而能立焉是以欲致其高必豐其基欲茂其末必深其柢抱朴子外篇循本止於下者根本也漸於上者枝條也士人據道義為根本業貴無虧進禮學如枝條德貴日新揚子法言註學行篇欲崇其高必重其層立德之柄莫匪安恒文選潘岳為賈謐作詩水泉東流日夜不休上不竭下不滿意林吕氏春秋始則觀大江之水泛泛不絶溢子心源終則決滄海之波浩浩不止流於神府金庭無為妙經如是無上正法阿竭陀膏藥從於何所而來集此當知如是膏藥從大菩提法器中來彼菩提器從何而來當知從菩薩法財寶篋中來如是菩薩寶篋從何而來當知不異大菩薩藏法門中來大寶積經四十八如人命根即以出息為本如修學大乗以大悲為本如轉輪聖王以輪寶為本無盡意菩薩經下如餘處中不出衆寶衆寶要出於大海中大方等大集經卷九譬如寶渚能出無量若干種寶大方廣十輪經卷二譬如五大河水能滿大海不以小河大集月藏經卷三具足般若海不住涅槃城如彼妙蓮華高原非所出金剛三昧經卷上譬如蘇油豐饒燈炷清淨光明亦盛大智度論卷二十六慧芽因斯以成定水沿茲而滿必莊嚴於六度瓔珞乎四等雖復棟宇未成而基階已廣法苑珠林卷八十九執守雷風恒君子以立不易方易恒六二執之用黄牛之革莫之勝說易遯初九鞏用黄牛之革象曰鞏用黄牛不可以有為也易革我心匪石不可轉也我心匪席不可卷音捲也詩國風柏舟鳲鳩在桑其子在梅鳲鳩在桑其子在棘鳲鳩在桑其子在榛詩國風鳲鳩我心非如石然石雖堅尚可轉我心堅不可轉也我心又非如席然席雖平尚可卷我心平不可卷也毛詩正義柏舟風而且雨寒涼淒淒然雞以守時而鳴音聲喈喈然此雞雖逢風雨不變其鳴喻君子雖居亂世不改其節毛詩正義風雨禮釋囘增美質措則正施則行其在人也如竹箭之有筠也如松柏之有心也二者居天下之大端矣故貫四時而不改柯易葉禮記禮器人而無恒不可以為卜筮古之遺言與龜筮猶不能知也而況於人乎禮記緇衣人經夷險不變其德由禮使然譬如松柏陵寒而鬱茂由其内心貞和故也禮記正義禮器三軍可奪帥也匹夫不可奪志也論語子罕不曰堅乎磨而不磷不曰白乎涅而不緇論語陽貨周于利者凶年不能殺周于德者邪世不能亂孟子盡心下且芝蘭生於深林不以無人而不芳君子修道立德不為窮困而改節孔子家語在厄子貢曰夫子之道至大故天下莫能容夫子盍少貶焉子曰賜良農能稼不必能穡良工能巧不能為順君子能修其道綱而紀之不必其能容今不修其道而求其容賜爾志不廣矣思不逺矣孔子家語在厄詩云緡蠻黄鳥止于丘隅子曰於止知其所止可以人而不如鳥乎大學人皆曰予知驅而納諸罟擭陷穽之中而莫之知辟也人皆曰予知擇乎中庸而不能期月守也中庸久幽而不改其操雖隨和何以加諸前漢書王吉傳夫嚴氣正性覆折而已豈有員园委屈可以每其生哉懔懔焉皜皜焉其與琨玉秋霜比質可也後漢書孔融列傳論雖風雨之如晦亮膠喈而不已魏書李順希仁弟騫傳貧者士之常焉得登枝而捐其本晉書殷仲堪傳風雨急而不輟其音霜雪零而不渝其色梁書任昉傳任之重者莫如神塗之畏者莫如口期而逺者莫如年以重任行畏塗至逺期惟君子乃能矣管子戒物扃於所甘士扃於所守子華子孔子贈君子通於道之謂通窮於道之謂窮今丘抱仁義之道以遭亂世之患其何窮之為故内省而不窮於道臨難而不失其德天寒既生霜雪既降吾是以知松柏之茂也陳蔡之隘於丘其幸乎莊子讓王天不為人之惡寒也而輟冬地不為人之惡遼逺也而輟廣君子不為小人匈匈也而輟行天有常道矣地有常數矣君子有常體矣君子道其常小人計其功荀子天論蘭生幽谷不為莫服而不芳舟在江海不為莫乗而不浮君子行義不為莫知而止休淮南子說山訓貂裘而雜不若狐裘而粹故人莫惡於無常行淮南子說山訓改邑不改井德不可渝也京氏易傳井上夫蘭茝生於茂林之中深山之間不為人莫見之故不芬夫學者非為通也為窮而不困憂而志不衰先知禍福之始而心無惑焉韓詩外傳芝蘭生深林非為無人而不香故學者非為通也為窮而不困也說􅁐雜言初一閉朋牖守元有測曰閉朋牖善持有也太𤣥經第五守初一磐石固内不化貞測曰磐石固内不可化也太𤣥經第六堅次五羮無糝其腹坎坎不失其範測曰羮無糝猶不失其正也太𤣥經第六窮烈風雖變不易其趣蔡中郎集太尉揚公碑木蘭去皮不死宿莽遇冬不枯屈原以喻讒人雖欲困已已受天性終不可變易也王逸註楚辭離騷經言君所以廢棄己者以余帶佩衆香行以忠正之故也然猶復重引芳茝以自結束執意彌篤也王逸註楚辭離騷經言已行雖據履根本猶復矯直菌桂芬香之性紉索胡繩令之澤好以善自約束終無懈已也王逸註楚辭離騷經言已進不見納猶復製裁芰荷集合芙蓉以為衣裳被服愈潔修善益明也王逸註楚辭離騷經言工明於所畫念其繩墨修前人之法不易其道則曲木直而惡木好也以言人遵先聖之法度修其仁義不易其行則德譽興而榮名立也王逸註楚辭九章言已雖出陰入陽流歴殊方猶思離居隠士將折神麻采玉華以遺與之明已行度如玉不以苦樂易其志也王逸註楚辭九歌言已雖見疏逺執志彌堅想乘神龍轔轔然而有節度抗志高行冲天而驅不以貧困有挫撓也王逸註楚辭九歌言已願往於芬芳絶異之洲采取杜若以與眞正之人思與同志終不變更也王逸註楚辭九歌夫農者始於種終於穫澤既時矣苗既美矣棄而不耘則改為荒疇蓋豐年者期於必收譬修道亦期於殁身也曹子建藉田說以嵗之有凶穰而荒其稼穡者非良農也以利之有盈縮而棄其資貨者非良賈也以行之有禍福而改其善道者非良士也徐幹中論修本琴瑟鳴不為無聽而失其調仁義行不為無人而滅其道故絃絶而宫商亾身死而仁義廢徐幹中論修本耶悉茗花末利花皆胡人自西國移植於南海南人憐其芳香競植之陸賈南越行紀曰南越之境五穀無味百花不香此二花特芳香者縁自胡國移至不隨水土而變與夫橘北為枳異矣南方草木狀不蓬轉以隨衆不改雅以入鄭抱朴子外篇刺驕若力之不能末如之何且當竹帛其行使嵗寒而無改也抱朴子外篇刺驕慮寡和而廢白雪之音嫌難售而賤連城之價余無取焉抱朴子外篇應嘲鷙駿危苦於嶮峻之端不樂咈呼之役吉光饑渴於冰霜之野不願犧牲之飽孤竹不以絶粒易鹿臺之富子廉不以困匱貿銅山之豐抱朴子外篇博喻剛柔有不易之質貞撓有天然之性是以百鍊而南金不虧其眞危困而烈士不失其正抱朴子外篇博喻和鵲雖不長生而鍼石不可謂非濟命之器也儒者雖多貧賤而墳典不可謂非進德之具也播種有不收者矣而稼穡不可廢仁義有遇禍者矣而行業不可惰抱朴子外篇廣譬震雷輷􅮣而不能致音乎聾瞶之耳重光麗天而不能曲景於幽岫之中凝冰慘慄而不能凋款凍之華朱飆鑠石而不能靡蕭丘之木故至德有所不能移抱朴子外篇廣譬登山不以艱險而止則必臻乎峻嶺矣清苦不以窮否而怨則必永其令聞矣抱朴子外篇廣譬連城之寶非貧寒所能市也高世之器非淺俗所能識也然盈尺之珍不以莫知而暗其質逸倫之士不以否塞而薄其節抱朴子外篇廣譬榮華猶贅疣也萬物猶蜩翼也若然者豈肯詰屈其支體俯仰其容儀挹酌於其所不喜修索於其所棄遺怡顏以取進曲躬以避退恐俗人之不悦慼我身之凌遲屈龍淵為錐鑽之用抑靈鼖為鼗鼙之音推黄鉞以適釤鎌之持撓華旗以入林杞之下乎抱朴子外篇逸民風雖疾而枝不撓身雖困而操不改抱朴子外篇漢過葢饑寒難堪者也而清節者不納不義之穀帛焉困賤難居者也而高尚者不處危亂之榮貴焉抱朴子外篇酒誡火之性也太寒慘悽凝冰裂地而炎氣不為之衰大熱烜赫燋金鑠石而炎氣不為之熾者何也有自然之質而寒者不能移也故丹可磨而不可奪其色蘭可燔而不可滅其馨玉可碎而不可改其白金可銷而不可易其剛各抱自然之信非可强變者也士有忠義之性懷貞直之操不移之質亦如茲者也劉子大質天不為人怨咨而輟其寒暑君子不為人之醜惡而輟其正直文中子魏相大人用之不為善惡改常日月用之不為賢愚易光揚子法言註問神篇人能篤信好學守死善道不漸染於流俗是為白爾天質何有渝變之色也李善註文選幽通賦夫冒霜雪而松柏不凋此由是堅實之性也天雖損無害也雞善伺晨雖陰晦而不輟其鳴此謂時累不能淫也李善註文選陸士衡演連珠帶長鋏之陸離兮冠切雲之崔嵬被明月兮珮寶璐世溷濁而莫余知兮吾方高馳而不顧楚辭九章涉江遵通衢之大道兮求捷徑欲從誰文選東征賦義分明於霜信行直如絃文選表陽源倣白馬篇詩青青陵上松亭亭高山柏光色冬夏茂根柢無凋落吉士懷貞心悟物思逺託文選何邵遊仙詩嘉樹生朝陽凝霜封其條執心守時信嵗寒終不彫文選陸機擬古詩蒼蒼山中桂團團霜露色霜露一何緊桂枝生自直文選江文通擬劉文學詩饑不食邪蒿菜倦不息無終里邪蒿乖素尚無終喪若始文選任彥升王文憲集序註桃李蒨粲於一時時至而後殺至於松柏經隆冬而不彫蒙霜雪而不變可謂得其眞矣文選左太沖招隠詩註志烈秋霜心貞琨玉亭亭高疎不雜風塵文選劉孝標辨命論風雨急而不輟其音霜雪零而不渝其色斯賢達之素交歴萬古而一遇文選劉孝標廣絶交論譬如水也通之斯為川焉塞之斯為淵焉升之於雲則雨施沈之於地則土潤體清以洗物不亂於濁受濁以濟物不傷其清是以聖人處窮達如一也文選李康運命詩在湼貴不淄曖曖内含光文選崔子玉座右銘誄虐暑熏天不減堅氷之寒涸陰凝地無累陵火之熱是以吞縱之彊不能反蹈海之志漂櫓之威不能降西山之節文選陸機演連珠虐暑涸陰之隆不能易火氷之性吞縱漂鹵之威不能移貞介之節文選陸士衡演連珠註鳶鵲能飛不假風力鴟鶚夜見豈藉還曜此與聖人通塞而不窮夷險而不屈何以異哉文選陸士衡演連珠註懲熱羮而吹兮何不變此志也補文選屈原惜誦知前轍之不遂兮未改此度車既覆而馬顚兮蹇獨懷此異路補文選屈原思美人上同鑿枘於伏羲兮下合矩矱於虞唐願遵節而式高兮志猶卑夫禹湯雖知困其不改操兮終不以邪枉而害方補文選莊忌哀時命何時俗之工巧兮滅規榘而改鑿獨耿介而不隨兮願慕先聖之遺敎廣文選宋玉九辯食不媮而為飽兮衣不茍而為溫廣文選宋玉九辯不枉繩以追曲兮屈情素以從事端余行其如玉兮述皇輿之踵跡廣文選劉子政逢紛猶賢哲之處時時昏昧而道明若蘭香之在幽越羣臭而弭馨廣文選潘安仁螢火賦象以牙喪身不能去其白薰以芳自燒不能去其香太平御覽香部薰香如彼松竹春榮冬蒨柯葉藹然不渝霜霰初學記職官部侍御史註魯有恭士者名曰汜行年七十其恭益甚冬日行陰夏日行陽一食之間三起魯君問曰子年甚長矣何不釋恭氾對曰君子好恭以成其名小人學恭以除其刑譽人者少惡人者多行年七十常恐斧鑕之加於氾者何釋恭焉初學記人部恭敬風摧霜敗芝蘭之性終香日逺天高葵藿之心未死困學記聞卷十九評文譬如有人住高山頂兩手堅執輕固傘蓋臨山峯仞翹足引頸俯觀巖下險絶深坑傘蓋承風力所持御雖臨險岸而不墮落波羅蜜多經五百八十七又如大地蟲蟻蚊虻種種諸苦不能傾動勝天王波羅蜜經譬如伭彌羅樹隨分斷處皆有音萬字之文大寶積經二十譬如眞金由工巧力隨意所作種種纓絡莊嚴之具其相各異而彼金性無有差别大寶積經卷八十三譬如眞金以有妙色而得其名終無有時離於妙色大方廣佛華嚴經卷四十三譬如金剛以不可壞而得其名終無有時離於不壞大方廣佛華嚴經卷四十三譬如須彌山王以四寶峯處於大海迥然高出而得其名終無有時捨離四峯大方廣佛華嚴經卷四十三譬如大海以舍衆水而得其名終無有時捨離於水大方廣佛華嚴經卷四十三譬如軍將以能慣習戰鬭之法而得其名終無有時捨離此能大方廣佛華嚴經卷四十三猶如魚師深水作塢為守護水不令流出中阿含經卷二十八猶河東流終不西顧出曜經一無常品譬如石山種種風水不能漂動三昧法門經卷下譬如厚石風不能移智者意重毁譽不傾法句經明哲品第十四譬如眞閻浮檀金火燒不異搥打磨斫不敗不異大智度論卷二十七譬如行道日日發引而不止息到所至處無復去心大智度論三十二夫凝氷慘慄不能彫款冬之花朱飆鑠石不能靡蕭邱之木辯正論卷二海水可竭須彌可傾彼上人者秉志堅貞高僧傳十一釋慧嵬器局奉高之器譬之泛濫雖清而易挹叔度之器汪汪若千頃之陂澄之不清撓之不濁不可量也後漢書郭泰列傳顧實南金虞惟東箭銑質無改筠心不變晉書張闓傳裒雖不言而四時之氣亦備矣晉書禇裒傳質清浮磬聲若孤桐琅琅其璞巖巖其峯晉書庾闡傳其風韻遒正神峯標映千里絶迹百尺無枝梁書王規傳器宇𢎞深神表峯峻金山萬丈縁陟未登玉海千尋窺映不測加以珪璋新琢錦組初搆觸響鏗鏘値采便發梁書朱异傳彼白玉之雖潔此幽蘭之信芳思在物而取譬非斗斛之能量匹聳峙於東岳比凝厲於秋霜梁書陸倕傳懷五岳其猶輕吞八荒而不梗隋書宇文慶傳正情與皦日同亮明略與秋雲競爽南史齊本紀上煥乎其文如星之布確乎不拔如山之固蔡中郎集周巨勝碑如淵之清如玉之素溷之不濁湼之不汙蔡中郎集范史雲銘如玉之固如岳之喬蔡中郎集文烈侯碑如淵之浚如岳之嵩威壯虓虎文繁雕龍蔡中郎集橋公廟碑言已之心智謀溶溶廣大如川不可度量情意深奥澹澹若淵不可妄動王逸註楚辭九歎身挫憑乎道勝時屯寄於情泰莫不淵岳其心麟鳯其采文心雕龍雜文人見其形而不能測其量非百人之倫也揚子法言註孝至篇識包上仁義兼高行如彼清波可挹可鏡又象沖室惟清惟淨廣文選江文通知己賦不為山而自高不為海而彌廣藝文類聚人部隠逸上窟該通五經洗洞墳籍為萬里之場圃九隩之林澤挹之若江湖仰之若華光𤣥𤣥焉測之則無源汪汪焉酌之則不竭藝文類聚人部隠逸下碑淡乎若深泉之靜皜乎若寒霜之潔千仞不足議其高萬頃不足儔其量藝文類聚人部隠逸下碑氣蘊風雲身負日月藝文類聚職官部諸王碑泱泱萬源落落千仞藝文類聚職官部諸王碑注焉若洪河之源不可竭也確焉若華嶽之停不可拔也藝文類聚職官部尚書令碑峩峩焉非嶽陵之所至浩浩焉惣江漢而為長故能擊水三千摶風九萬排天關而俯眂掩浮雲而上征藝文類聚職官部司空碑昂昂千里孰辯麒麟之蹤汪汪萬頃誰測波瀾之際望之若披雲霧覩之如觀日月藝文類聚内典部内典墓志聳茲千仞氣振此百尋條文苑英華沈約悲悼一詩四時銜火燭龍開照地之光六月摶風大鵬運垂天之翼文􅁐英華婦人二志汪汪巨壑曖曖重牆文苑英華王僧孺誄直幹千尋澄波萬頃文􅁐英華庾信職官十二碑澄波千畆不能變其清濁高牆百仞無以測其汙隆文􅁐英華庾信職官二十七刺史一神道碑弱木一枝旁蔭數國長河一直自然千里風飆欲逺光景將昇文苑英華庾信王爵一碑牆仞無以覩清濁不能測道風與星漢同高勝氣與煙霞共逺華陽陶隠居傳喻林卷八十二
