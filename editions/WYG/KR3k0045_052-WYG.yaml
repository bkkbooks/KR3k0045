body:
  text: 喻林卷五十二明徐元太撰人事門五十用術鉤距者設欲知馬賈則先問狗已問羊又問牛然後及馬參伍其賈以類相凖則知馬之貴賤不失實矣唯廣漢至精能行之它人效者莫能及也前漢書趙廣漢傳家挾殊議人懷異計故從横者歘披其胷狙詐者暫吐其舌也蜀志郤正傳朝四暮三衆狙皆喜名實未虧而喜怒為用南史梁本紀中故關之捭闔制之以出入捭之者開也言也陽也闔之者閉也黙也隂也鬼谷子捭闔故捭者或捭而出之或捭而納之闔者或闔而取之或闔而去之捭闔者天地之道鬼谷子捭闔或開而示之或闔而閉之開而示之者同其情也闔而閉之者異其誠也鬼谷子捭闔符應不失如螣蛇之所指若羿之引矢鬼谷子反應其張罝網而取獸也多張其㑹而司之道合其事彼自出之此釣人之網也常持其網驅之其言無比乃為之變鬼谷子反應皆見其權衡輕重乃為之度數聖人因而為之慮其不中權衡度數聖人因而自為之慮鬼谷子捭闔此飛箝之綴也用於人則空往而實來綴而不失以究其辭可箝而從可箝而横可引而東可引而西可引而南可引而北可引而反可引而覆鬼谷子飛箝樞所以主門之動静機所以主弩之放發言既知其諸矦智謀能否然後立法鎮其動静制其放發猶樞之於門機之於弩鬼谷子飛箝註古之善摩者如操鈎而臨深淵餌而投之必得魚焉鬼谷子摩篇西門豹為濮令佯亡其車轄令吏求之不能得使人求而得之家人屋間韓非子内儲説上七術周主下令索曲杖吏求之數日不能得周主私使人求之不移日而得之乃謂吏曰吾知吏不事事也曲杖甚易也而吏不能得我令人求之不移日而得之豈可謂忠哉吏乃皆悚懼以君為神明韓非子内儲説上七術周主亡玉簪令吏求之三日不能得也周主令人求而得之家人之屋間周主曰吾知吏之不事事也求簪三日不得之吾令人求之不移日而得之於是吏皆悚懼以為君神明也韓非子内儲説上七術有相與訟者子産離之而毋得使通辭倒其言以告而知也惠嗣公使人偽關市關市呵難之因事關市以金關市乃舎之嗣公謂關市曰其時有客過而予汝金因譴之關市大恐以嗣公為明察韓非子外儲説左上人主之大物非法則術也法者編著之圗籍設之於官府而布之於百姓者也術者藏之於胷中以偶衆端而潜御羣臣者也故法莫如顯而術不欲見是以明主言法則境内卑賤莫不聞知也不獨滿於堂用術則親愛近習莫之得聞也不得滿室而管子猶曰言於室滿室言於堂滿堂非法術之言也韓非子難三御圓者不以信誠率衆執方者必以權謀自顯文選袁宏名臣序贊以智力求者喻如奕奕進退取與攻劫放舎在我者也藝文類聚巧藝部圍棊善説者若巧士因人之力以自為力因其來而與來因其往而與往聽因便也太平御覽人事部游説下投䑕者機動釣魚者機浮太平御覽獸部䑕傳稱蘇秦張儀學縱横之術於鬼谷先生掘地為坎曰能下説合我泣出則能分人主之地蘇秦説鬼谷先生泣沾衿張儀下説鬼谷先生泣亦沾衿太平御覽人事部游説下縛葦作機關多用於綖縷大莊嚴經論卷四偈排善夫至音不合衆聽故伯牙絶絃至寳不同衆好故卞和泣血仲尼聖徳而不容於世况於竹帛餘文其為雷同者所排固其宜也後漢書陳元列傳羣犬吠新客佞闇排疎賔直途既以塞曲路非所遵魏書胡叟傳世俗之君子視義士不若負粟者今有人於此負粟息於路側欲起而不能君子見之無長少貴賤必起之何故也曰義也今為義也君子奉承先王之道以語之縱不説而行又從而非毁之則是世俗之君子之視義士也不若視負粟者墨子貴義為義而不能必無排其道譬若匠人之斵而不能必無排其繩墨子貴義百人操觽不可為固結千人謗獄不可為直辭萬人比非不可為顯士説苑雜言言飄風轉運揚起塵埃搖動草木使之即時枯槁莖葉被病不得盛長以言讒人亦運轉其言紛歴忠直使之被病而傷刑也王逸註楚辭九歎魏女色豔鄭袖鼻之朝呉忠貞無忌逐之戚施彌妬蘧除多佞是故濕堂不灑塵卑屋不蔽風風衝之物不得育水湍之岸不得峭王充論衡累害篇以塗摶泥以黒㸃繒孰有知之清受塵白取垢青繩所汙常在練素處顛者危勢豐者虧頹墜之類常在懸垂屈平潔白邑犬羣吠吠所怪也王充論衡累害篇非鷃擅蒿林仰笑神鳯飛坎井蝤蛭宅神龜安所歸嵇中散集述志詩夫直繩者枉木之所憎也清公者姦慝之所讎也抱朴子外篇名實曾閔獲商人之謗孔墨蒙盜跖之垢懐正居貞者填笮乎泥濘之中而狡猾巧偽者軒翥乎虹霓之際矣抱朴子外篇審舉𢎞偉之士履道之生其崇信匪徒重仞之牆其淵澤不唯吕梁之深也故短近不能賞而淺促不能側焉因以異乎已而薄之矣以不求我而疾之矣不貴不用何足言乎乃有播埃塵於白珪生瘡痏於玉肌訕疵雷同攻伐獨立曾參蒙劫剽之垢巢許獲穿窬之謗自匪明竝懸象𤣥鑒表㣲者焉能披泥抽淪玉澄川掇沉珠哉抱朴子外篇擢才讒邪人之蔽善人也猶朝日洞明霧甚則不見天沙石至淨流濁則不見地雖有明淨之質而不發明者水霧蔽之也蘭蓀欲茂秋風害之賢哲欲正讒人敗之劉子傷讒夫忠直之迕於主獨立之負於俗理勢然也故木秀於林風必摧之堆出於岸流必湍之行髙於人衆必非之文選李康運命論蘭薫而摧玉貞則折物忌堅芳人諱明潔文選顔延之祭屈原文任重載盛兮陷滯而不濟懷瑾握瑜兮窮不知所示邑犬羣吠兮吠所怪也誹駿疑傑兮固庸態也廣文選屈平懷沙顧浩日之顯行兮雲濛濛而蔽之竊不自聊而願忠兮或黕㸃而汙之廣文選宋玉九辯齊景公惡仲尼為魯政犂鉏曰去仲尼如吹毛耳意林韓子智海廣難量不測反増謗牛飲水成乳蛇飲水成毒大方廣佛華嚴經讚卷十二猶如雲霧障蔽淨月本縁經月􅊍王品夫鶡旦鳴夜不翻白日之光精衛銜石無損滄海之勢然以闇亂明以小罔大雖莫動毫髮而有塵眡聽𢎞明集序害正牀者人之所以安也剥牀之足㓕下之道也下道始滅剛隕柔長則正削而凶來也王弼註易剥剥之為害小人得寵以消君子貫魚者謂衆隂也駢頭相次以若貫穿之魚周易正義剥為惡不已如彼飜飛之蟲恃其羽翮之力自恣東西南北有時亦為弋者所獲言貪人恃此詐偽之智自恣侵害良善有時亦將為所誅毛詩正義桑柔貪人之敗善類若大風之行毁壊衆物所在成蹊徑杜氏觧左傳文公元年神異經云崑崙西有獸焉其狀如犬長毛四足似熊而無爪人有徳行而往抵角有凶惡而行依慿之名渾沌史記五帝本紀虞舜註西北有獸其狀似虎有翼能飛便勦食人知人言語聞人鬬輒食直者聞人忠信輒食其鼻聞人惡逆不善輒殺獸往饋之名曰窮竒史記五帝本紀虞舜註夫衆煦漂山聚蟁成靁朋黨執虎十夫撓椎是以文王拘於羑里孔子阨於陳蔡此乃烝庶之成風増積之生害也前漢書景十三王傳使朱紫共色粉墨雜蹂所謂抵金玉於沙礫碎珪璧於泥塗後漢書黄瓊列傳乃欲撓折棟梁孤弱漢室後漢書袁紹列傳士有懐琬琰以就煨塵者亦何可支哉後漢書竇融列傳論渭以涇濁玉以礫貞物性既區嗜惡從形蘭蕕無竝銷長相傾徒恨芳膏煎灼燈明後漢書黨錮列傳忠臣碎於虎口貞良弊於豺狼宋書武帝上本紀從昏者忌明同枉者毁正搦弦為鉤張一作百行坐欬􅅉皆生風塵宋書文九王建平傳衆霧麗集共奪日光焦氏易林噬嗑之艮比陸陽伏不知黒白君子傷讒正害善人焦氏易林恒之履他山之錯與璆為仇焦氏易林明夷之明夷否則介鱗易我衣裳揚子孝至百草為稼穡之穢讒佞亦為忠直之害也王逸註楚辭離騷經言芳草為物其性㣲𦕈易以隕落言賢者用志精㣲亦易傷害也王逸註楚辭九章言秋時百草將實㣲霜夜下而殺之使不得成熟也以言讒人晨夜毁已亦將害己身使其忠名不得成也王逸註楚辭七諫言破和氏之璧以繼築杵而舂敗玉寳失其好也以言取賢人刑傷使執厮役亦害忠良失其宜也王逸註楚辭九歎回風為飄以喻小人造飾奸偽賊害仁賢為君垢穢如回風之起塵埃也王逸註楚辭九思佞人欲害賢如蠆之有螫毒王逸註楚辭九思讒人畵蛇足於無形姦臣畏忠貞之害己抱朴子外篇擢才虹蜺邪隂之氣而有照曜以蔽日月云讒言流行忠良浸㣲也前漢書註息夫傳小水不容大魚而横鱣鯨於汙瀆必為螻蟻所制以况小朝主闇不容受忠逆之言亦為讒賊小臣所害前漢書註賈誼傳黄鵠後時而寄處兮䲭梟羣而制之神龍失水而陸居兮為螻蟻之所裁夫黄鵠神龍猶如此兮况賢者之逢亂世哉補文選賈誼甫逝譬如鴆毒藥以和甘露漿所向無不壞飲之皆仆僵優填玉經衣六佛言惡人害賢者猶仰天而唾唾不汙天還汙己身逆風坌人塵不汙彼還坌于身賢者不可毁禍必滅己也佛説四十二章經尺一如金翅鳥欲食法龍斷法雨乎汝如惡風吹滅法炬是大惡象欲拔法樹本縁經月光王品法岳崩壊法船流沒法樹已摧法海枯竭阿胄王傳三然道大信難聲髙和寡須彌峻而藍風起寳藏積而怨賊生𢎞明集序芳蘭竝茂而欲藴崇焚之不亦暴乎𢎞明集釋駮論害人禹以四海為壑今吾子以鄰國為壑孟子告子下今有人於此入人之場園取人之桃李瓜薑者上得且罰之衆聞則非之是何也曰不與其勞獲其實已非其有所取之故而况有踰於人之牆垣抯格人之子女者乎與角人之府庫竊人之金玉蚤纍者乎與踰人之欄窖竊人之牛馬者乎而况有殺一不辜人乎墨子非攻下子墨子見齊大王曰今有刀於此試之人頭倅然斷之可謂利乎大王曰利子墨子曰多試之頭倅然斷之可謂利乎大王曰利子墨子曰刀則利矣孰將受其不祥大王曰刀受其利試者受其不祥子墨子曰并國覆軍賊敖百姓孰將受其不祥大王俯仰而思之曰我受其不祥墨子魯問今人曰某氏多貨其室培濕守狗死其勢可穴也則必非之矣曰某國饑其城郭痺其守具寡可襲而簒之則不非之乃不知類矣吕氏春秋聽言善射者發不失的善於射矣而不善所射善釣者無所失善於釣矣而不善所釣故有所善則不善矣淮南子説山訓親莫親於骨肉節族之屬連也心失其制乃反自害况疏遠乎淮南子説林訓鬻棺者欲民之疾病也畜粟者欲歳之荒饑也淮南子説林訓愚人縱火於沛澤不能復振蜂蠆螫人放死不能息其毒也鹽鐵論申韓莒子展輿虐而好劒茍鑄劒必試諸人太平御覽人事部貪雖霜戈曜日寳劒暉天此乃凶荒之具非太平之器也道徳經註疏卷三譬如旃陀羅常於冡間行求死屍無慈悲心視於衆生得見死屍心大喜悦大寳積經卷一百一十三譬如多毒能傷害人少亦能害華手經卷七如種藥樹有人剪伐不令増長是人則壞無量衆生療治病事令多衆生為病所困華手經卷八猶如獵師見彼羣鹿但欲殺之無一善念長阿舍經卷二十二譬如野澤之中獵者見麋鹿欲害殺之樓灰經三小劫品譬如蛟龍不擇好醜唯欲殺人大智度論卷十四失人交交黄鳥止于棘交交黄鳥止于桑交交黄鳥止于楚詩國風黄鳥伐檀君子能其宦而不用魏人慕之而作是詩詩説魏此所謂衣褐懷寳者也當其貧困時人莫省視至其貴也乃爭附之諺曰相馬失之痩相士失之貧其此之謂邪史記滑稽傳公愛班固而忽崔駰此葉公之好龍也後漢書崔駰列傳衛人有病將死者扁鵲至其家欲為治之病者之父謂扁鵲曰吾子病甚篤將為迎良醫治非子所能治也退而不用乃使靈巫求福請命對扁鵲而咒病者卒死靈巫不能治也夫扁鵲天下之良醫而不能與靈巫爭用者知與不知也陸子資質鴻魚逆流至人濳處蓬蒿代柱天屋顛倒焦氏易林同人之屯明徳隠伏麟鳯遠匿焦氏易林随之歸妹鴻鵠失珠無以為明焦氏易林臨之師夫智大量遠者盤桓以山峙器小志近者蓬飛而萍浮夫唯山峙故莫之能動焉夫唯萍浮故流而不滯焉方之貨也則緘連以待賈者唯至珍而難售鳴鼔以狥之者雖凡蔽而易盡比之材也則結根於嵩岱者雖竦葢千仞垂䕃萬畝而莫之知也挿株於塗要者雖鈎曲戾細而速朽而猶見用也故廟堂有枯楊之瑚簋窮谷多不伐之梓橡也抱朴子外篇名實恐千里之足屈於槽櫪之下贊世之才委於壟畝之間藝文類聚治政部薦舉表被裘公者呉人也延陵季子出遊見道中遺金顧而覩之謂公曰取彼金公投鑣瞋目拂手而言曰何子居之高視之卑吾被裘而負薪豈取遺金者哉季子大驚既謝而問其姓名曰吾子皮相之士何足語姓名哉藝文類聚人部隠逸上楊公用人如貧士市瓜取其大者何氏語林輕詆徒近𤣥流無心灑垢神醫在側不知愈疾玉清經法印品失時九五枯楊生華老婦得其士夫易大過不出門庭凶失時極也易節若其不明終始之道應濳而飛應飛而濳應生而殺應殺而生六位不以時而成也周易正義乾山有樞隰有榆子有衣裳弗曵弗婁子有車馬弗馳弗驅宛其死矣他人是愉山有栲音考隰有杻音紐子有廷内弗灑弗掃子有鐘鼔弗鼔弗考宛其死矣他人是保山有漆音七隰有栗子有酒食何不日鼓瑟且以喜樂且以永日宛其死矣他人入室詩國風山有樞盛徳不報重寄不歸天與不受天奪之寳史記龜䇿傳若其羲和促轡大火西頽臨川恨晚將復何階晉書皇甫謐傳寧謂罻羅裁舉㣲禽先落閶闔始吹細草仍墜梁書王僧儒傳夫遭風雲之㑹不建騰躍之功者非人豪也北史張衮傳跛躓未起失利後市焦氏易林屯之困秋冬探巢不得鵲雛焦氏易林訟之暌逐兎索烏破我弓車日暮不及失利後時焦氏易林履之井固隂沍寒常冰不温焦氏易林泰之噬嗑乆隂霖雨塗行泥潦商人休止市空無有焦氏易林謙之恒兩足不獲難以遠行疾歩不能後侣失時焦氏易林豫之泰秋季孟冬寒露霜降大隂在庭庶物不生焦氏易林蠱之夬鬱映不明隂積無光日在北陸萬物彫藏焦氏易林无妄之蒙鶴鳴九臯處子失時焦氏易林无妄之解寒露所凌漸致堅冰草木瘡瘍花落葉亡焦氏易林坎之解六月種黍歳晩無雨焦氏易林恒之革寒燠失時陽旱為災焦氏易林明夷之同人積水不温北陸苦寒露宿多風君子傷心焦氏易林暌之巽陽伏在下隂制祐福生不逢時濳龍隠處焦氏易林萃之頥次三東辰以明不能以行測曰東辰以明奚不逝也太𤣥經第一童言黄鵠一飛千里常集髙山茂林之上設後時而欲寄處則鴟梟羣聚禁而制之不得由也言賢者失時後軰亦為讒佞所排逐之王逸註楚辭惜誓幸遭聖主平世而久懐寳是伯牙去鍾期而舜禹遁帝堯也文選王褒四子講徳論盍亦因子都而事博陸凴鷁首以渉洪流蹈翠雲以駭逸龍振光躍以驚沈鰌徒屈靈蟠於埳井眄天路而不遊廣文選束廣微𤣥居釋不知盰豫之讖悔遲而忘夫朋盍之義務疾亦登海湄而抑東流之水臨虞泉而招西歸之日廣文選東廣微𤣥居釋㣲霜降而下淪兮悼芳草之先蘦楚辭逺遊如彼引鯤魚待盡守空梁藝文類聚人部愁詩頭白可期汗青無日事文類聚作史龍門有竒價自言梧桐枝華暉實掩映細葉能披離不降周王子空待嵗時移嚴風忽交勁遂使無人知初學記果木部桐凡治瘧先發如食頃乃可以治過之則失時也黄帝素問内經刺瘧論如曉時燈雖有無用禪要呵欲經昔有愚人將㑹賔客欲集牛乳以俟供設而作是念我今若預於日日中􅢇取牛乳牛乳漸多都無安處或復酢敗不如即就牛腹盛之待臨㑹時當頓􅢇取作此念已便捉牸牛母子各繫異處却後一月爾乃設㑹延置賔客方牽牛來欲􅢇乳取而此牛乳即乾無有時為衆賔或瞋或笑百喻經卷上世間愚人亦復如是不别時節春秋冬夏便於冬時擲種土中望得果實徒喪其功空無所獲芽莖枝葉一切都失百喻經卷下過時九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可乆也易離桑之落矣之時其葉黄而隕墜以興婦人年之老矣之時其色衰而彫落毛詩正義氓六梅實尚餘七未落喻始衰也謂女二十春盛而不嫁至夏則衰鄭氏箋詩摽有梅若爾之年者冢上之木拱矣公羊僖公三十三年田光曰臣聞騏驥盛壯之時一日而馳千里至其衰也駑馬先之今太子聞光壯盛之時不知吾精已消亡矣戰國䇿燕王喜今夫烏獲舉千鈞之重行年八十而求扶持故齊雖強國也西勞於宋南罷於楚則齊軍可敗而河間可取戰國䇿燕昭王徒恐鷤䳏之將鳴兮顧先百草為不芳前漢書揚雄傳上田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳湏富貴何時前漢書揚惲傳跛踦相随日暮牛罷陵遲後旅失利亡雌焦氏易林乾之渙老楊日衰條多枯枝焦氏易林蒙之訟冬生不花老女无家霜冷蓬室競為枮株焦氏易林蒙之兌早凋被霜花葉不長焦氏易林蒙之中孚酒為酸漿魴臰鮑羮焦氏易林豫之小畜日在阜顛嚮昧為昏小人成羣君子傷倫焦氏易林随之明夷枯竹後生失其寵榮焦氏易林頥之兌南至之日陽消不息北風烈寒萬物藏伏焦氏易林坎之歸妹海老水乾魚鼈蕭索焦氏易林遯之否嵗暮花落陽入隂室焦氏易林夬之坤夜長日短隂為陽賊萬物空枯藏於北陸焦氏易林夬之明夷朝暮日月四馬過隙嵗短期促時難再得焦氏易林鼎之大壯次八月髙弦火幾縣不可以動動有愆測曰月弦火縣恐見咎也太𤣥經第五去次六日失烈烈君子將衰降太𤣥經第六將狡兎訖則知獵犬之不用髙鳥盡則覺良弓之將棄抱朴子外篇知止風吹飛藿之時葢桃李零落之日華實既盡柯葉又彫無復一毫可悦李善註文選阮嗣宗詠懐詩恃已知而華予兮鶗鴂鳴而不芳冀一年之三秀兮遒白露之為霜文選思𤣥賦傷彼蕙蘭花含英揚光輝過時而不采將随秋草萎文選古詩嘉樹下成蹊東園桃與李秋風吹飛藿零落從此始繁華有憔悴堂上生荆把藝文類聚人部言志詩語曰夜行被繡不足為榮藝文類聚人部别下書團團明月魄滿則缺亭亭陽暉曜過則逝藝文類聚禮部婚箴昔周人有仕不遇年老白首泣涕於途者或問何為泣乎對曰吾仕數不遇自傷年老失時是以泣藝文類聚人部泣吾年往志盡譬如八百錢馬死生同價藝文類聚獸部馬嵗㫚㫚其若頹兮時亦冉冉而將至薠蘅槁而節離兮芳已歇而不比楚辭九章悲回風譬如折輪無所復用老苦將至亦復如是元陽妙經卷一如大富家豐諸珍寳衣服卧具怨賊入家劫奪家資悉皆空盡男子盛年壯色亦復如是常為老賊之所劫奪元陽妙經卷一老如形變喻如故車法句經老耄品老如白鷺守伺空池法句經老耄品業雜晉如鼫䑕无所守也者蔡邕勸學篇云鼫䑕五能不成一伎周易正義晉如當路築室得人而與之謀所為路人之意不同故不得遂成也鄭氏箋詩小旻士農工商四民者國之石民也不可使雜處雜處則其言哤其事亂管子小匡青染於白而白不全滅是青不勝白之謂也潔白之質而為青所染是白不勝青之謂也謂之青而白猶不滅謂之白而為青所染兩色竝章故曰兩明也公孫龍子通變論註賈多端則貧工多技則窮心不一也故木之大者害其條水之大者害其深有智而無術雖鑽之不通有百技而無一道雖得之弗能守淮南子詮言訓喜武非俠也喜文非儒也好方非醫也好馬非騶也知音非瞽也知味非庖也此有一槩而未得主名也淮南子説山訓君子賤二而貴一人孰無善善不一故不足以立身治孰無常常不一故不足以致功春秋繁露天道無二目不能二視耳不能二聽一手不能二事一手畫方一手畫圓莫能成春秋繁露天道無二一門二關結弭不便峻道異路日暮不到焦氏易林革之坤初一蟹之郭索後蚓黄泉測曰蟹之郭索心不一也太𤣥經第二鋭稱干將之利刺則不能擊擊則不能刺非刃不利不能一旦二也蛢彈雀則失鷜射鵲則失鴈方圓畫不俱成左右視不竝見人材有兩為不能成一使干將寡刺而更擊蛢捨鵲而射鴈則下射無失矣王充論衡書解篇蟹之後蚓者用心之不一雖有郭索多足之蟹不及無足之蚓也太𤣥經第二鋭觧純則巧偽息雜則姦邪生楊子法言註明神篇鼫五伎䑕也能飛不能上屋能縁不能窮木能浮不能渡谷能伏不能掩身能走不能先人藝文類聚獸部䑕鴻鶴在上扞弓鞟弩待之若發若否問二五弗知非二五難計也欲鴻之心亂也太平御覽兵部弓譬如獼猴遊林樹間湏臾處處攀捉枝條放一取一雜阿含經卷十二譬如工師多有所能所能多故普不精悉如有人偏能一事則必盡其美大智度論卷五十三有羣雞依榛林住有狸侵食雄雞唯有雌在後有烏來覆之共生一子子作聲時公説偈言此兒非我有野父聚落母共合生一子非烏復非雞若欲學公聲復是雞母生若欲學母鳴其父復是烏學烏似雞鳴學雞作烏聲烏雞二兼學是二俱不成法苑珠林卷五十一喻林卷五十二
