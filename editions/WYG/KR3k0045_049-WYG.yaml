body:
  text: 喻林卷四十九明徐元太撰人事門四十七混淆或以其酒不以其漿鞙鞙音瑁佩璲不以其長詩小雅大東君臣賢愚適同如鳥雌雄相似誰能别異之乎鄭氏箋詩正月屨以兩隻為具五為數之竒言葛屨服之賤雖有五兩其數雖竒以冠緌往配而雙止則非其宜毛詩正義南山悲時俗之險阸兮哀好惡之無常棄衡石而意量兮隨風波而飛揚後漢書馮衍傳欲以雞鶩厠鴛鴻於池沼將移瓦礫参金碧之聲價陳書蔡景厯傳致使薫猶之質均誨學庭蘭蕭之體等教文肆魏書南安王禎子英傳厠鄭璞於周寶編魚目於隋珠魏書李順希仁弟騫傳當今之世醜必托善以自為解邪必䝉正以自為僻遊不論國仕不擇官行不辟汙曰伊尹之道也分别争財親戚兄弟搆怨骨肉相賊曰周公之義也行無㢘恥辱而不死曰管子之趍也行貨賂趣勢門立私廢公比周而取容曰孔子之術也此使君子小人紛然殽亂莫知其是非者也故百川並流不注海者不為川谷趣行蹖馳不歸善者不為君子淮南子泰族訓黄白色也衆馬形也而獨以色為形飛者入池之謂也公孫龍子白馬論註牛騎同堂郭氏以亡焦氏易林小畜之晉牛馬聾蒯不知聲味遠賢賤仁自令亂憒焦氏易林頤之鼎次六升于堂顛衣倒裳廷人不慶測曰升堂顛倒失大衆也太𤣥經第一上待遇茍合之人與忠直之士曽無别異猶并紉絲與茅共為索也王逸註楚辭惜誓言患苦衆人稱物量榖不知審其多少同其稱平以失情實則使衆人怨也以言君不稱量士之賢愚而同用之則使智者恨也王逸註楚辭惜誓言君選士用人雜用駑駿不異賢愚若駕罷牛驂以騏驥才力殊也王逸註楚辭七諫圜澤為珠麤瑀為璣以言君不知賢愚忠佞之士猶雜魚眼與珠璣同貫而不别也王逸註楚辭七諫言持菎蕗香直之草雜於黀蒸燒而燃之則不識於物也以言取忠直棄之林野亦不知賢也王逸註楚辭七諌言世人不識善惡乃以甑窐之土雜厠圭玉又使醜婦與好女同室也以言君闇惑不别賢愚也王逸註楚辭哀時命言已君不明智斥逐忠良而任用佞䛕委棄明珠而貴魚眼乗駑驘雜駿馬重班駮喜闒茸心迷意惑終不悟也王逸註楚辭九難君不識賢使紫奪朱世無别知之者王逸註楚辭九思紫朱雜厠瓦玉雜糅王充論衡對作篇竊華名者螻蜥騰於雲霄失實賈者翠虬淪乎九泉於是斥鷃凌風以髙奮靈鳯卷翮以幽戢鉛鋒充太阿之寶犬羊佻勅髙切獨行貌虎狼之資矣抱朴子外篇名實以傾倚申脚者為妖妍摽秀以風格端嚴者為田舍朴騃抱朴子外篇疾謬於是釋銓衡而以疏數為輕重矣棄度量而以綸集為多少矣抱朴子外篇窮逹鶉鷃棲翔鳯之條黿鼉游升龍之川識真者所為憤結也文選陸士衡從梁陳詩註珪璋雜於甑窐兮隴㢘與孟娵同宫補文選莊忌哀時命繋累名利場駑駿同一輈廣文選阮嗣宗詠懷詩玉與石而同匱兮貫魚眼與珠璣駑駿雜而不分兮服罷牛而驂驥廣文選東方曼倩哀命或偷合而茍進兮或隠居而深藏苦稱量之不審兮同權槩而就衡或推迻而茍容兮或直言之諤諤傷誠是之不察兮并紉茅絲以為索廣文選賈誼惜誓以為聖人純一之教不如賢者支離之術鄭衛可以易咸池激楚可以陵韶武耶藝文類聚刑法部刑法議謂蜥蜴為神龍者非但不識神龍亦不識蜥蜴太平御覽蟲豸部守宮名實失當賞罰妄舉是猶使屍起哭而代大匠斵也夫死人無為而子弟悲者以為死而不為哭也不與方圓而處大堂者任大匠而身無作也使屍起哭則哭者亡主人代匠斵則功不成道德經指歸卷十二譬若男子欲見大海者尚未見大海若見大陂池水便言是水將無是大海道行波羅蜜經卷四猶如稗麥在好麥中大寶積經卷一百十三猶如栴檀之林鄉以伊蘭臭穢亂于真正法海經尺一譬如醍醐蜜雜以辛苦鹹修行道地經慈品譬如甜藥雜以鹹苦不可分别修行道地經慈品栴檀與蓼蘓同芬夜光與熠燿齊暉𢎞明集十三玉石同匱猗頓為之於悒朱紫相奪仲尼為之歎息𢎞明集牟子理惑論聖教綿遠終使鼠璞濫名𤣥化幽微遂令雞鳯混質辯正論卷六如人不識金以鍮石為妙髙僧傳二鳩摩羅什無以穢食置於寶器維摩詰所説經弟子品計失商人慮有陰雨宜用輔以佐車今其車既載重矣乃棄爾之車輔反令車載溺也以喻王政慮有傾危宜用賢以治國今其既有大政矣乃棄汝之賢人反令國政亂也車既棄輔又遇陰雨則隳敗汝之車載既隳敗然後請長者助我則晚矣以喻國既棄賢又遇傾敗則滅亡汝之國國家既滅矣然後求賢人佐已則亦晚矣王何不及其未敗用賢自輔乎毛詩正義正月勞師於戎而失諸華雖有功猶得獸而失人也安用之國語晉夫太子國之棟也棟成乃制之不亦危乎國語晉夫攻形不如越而攻心不如吳而君臣上下少長貴賤畢呼霸王臣竊以為猶之井中而曰我將為爾求火也戰國䇿韓釐王語曰寧為雞口毋為牛後今大王西面交臂而臣事秦何以異於牛後乎戰國策韓昭侯今人有謂臣曰入不測之淵而必出不出請以一䑕首為汝殉者臣必不為也今秦不可知之國也猶不測之淵也而許綰之首猶鼠首也内王於不可知之秦而殉王以鼠首臣竊為王不取也戰國策魏安釐王以地事秦譬猶抱薪而救火也薪不盡則火不止今王之地有盡而秦之求無窮是薪火之説也戰國策魏安釐王王獨不見夫博者之用梟邪欲食則食欲握則握今君刼於羣臣而許秦因曰不可革何用智之不若梟也戰國策魏安釐王秦敗魏於華魏王且入朝於秦周訢謂王曰宋人有學者三年反而名其母其母曰子學三年反而名我者何也其子曰吾所賢者無過堯舜堯舜名吾所大者無大天地天地名今母賢不過堯舜母大不過天地是以名母也其母曰子之於學者將盡行之乎願子之有以易名母也子之於學也將有所不行也願子之且以名母為後也今王之事秦尚有可以易入朝者乎願王之有以易之而以入朝為後戰國策魏安釐王臣聞爭名者於朝争利者於市今三川周室天下之市朝也而王不争焉顧争於戎狄去王業遠矣戰國䇿秦惠文君今使太子將之此無異使羊將狼也史記留侯世家欲湯之滄一人炊之百人揚之無益也不如絶薪止火而已不絶之於彼而救之於此譬猶抱薪而救火也前漢書枚乗傳父子首足也昆弟四支也當使筋骨髓血動静足以相勝長短大小幹用足以相衞豈有割脛致腹取骨肉以増頭剗背露骨剝膏腴以禆頷而謂顱顙魁岸可得比夀松晉喉咽擁腫必能長生久視哉後漢書志百官五及今成計殊尚善也過是欲少味矣後漢書馬援傳議者喻以補衣猶有所完詡恐其疽食侵滛而無限極後漢書虞詡傳豈有觸冒死禍以解細微譬猶療饑於附子止渴於酖毒未入膓胃已絶咽喉豈可為哉後漢書霍諝列傳夫紲食鷹鳶欲其鷙鷙而亨之將何用哉後漢書盖勲列傳豈敢傾根竭本寄命洪流以徼乾沒乎魏志傅蝦傳若棄紹近援而求瓚遠助此假人於越以救溺子之説也魏志程昱傳此何異乎抱薪救焚扇火止沸哉魏志公孫瓉傳註無異於埋金路隅而書表於上也雖甚愚之人必將笑之晉書皇甫謐傳若乃海運既徙而鵬翼不舉永結根於南垂廢神州於龍漠晉書桓温傳保左右議曰蝮蛇在手壯士解其腕且斷隴道以觀其變從事中郎裴詵曰蛇已螫頭頭可截不晉書索靖傳陛下心腹四支何處無患復誅巫咸戮扁鵲臣恐遂成桓侯膏肓之疾後雖欲療之其如病何晉書劉聰傳繫狗當繫頸今反繫其尾何得不然晉書惠賈皇后傳非徙不足致益乃是蠶漁之所資晉書董景道傳今人知不以羊追狼蟹捕䑕而令重車弱卒與肥馬悍胡相逐其不能濟固宜矣宋書周郎傳發雷霆之怒争蟲鳥之氣南齊書孔稚圭傳愛毛反裘甚無謂也魏書髙祖上紀將涉千里殺騏驥而䇿蹇驢可悲之甚北齊書楊愔傳譬之畜狗本取其吠今以數吠殺之恐將來無復吠狗北齊書酷吏宋遊道傳莊子曰齊人蹢子於宋者其命閽也不以完其求鈃鍾也以束縳其求唐子也而未始出域有遺類矣夫楚人寄而蹢閽者夜半於無人之時而與舟人鬬未始離於岑而足以造於怨也莊子徐無鬼子墨子謂魯陽文君曰今有一人於此羊牛犓㹖維人但割而和之食之勝食也見人之生餅則還然竊之曰舍予食不知日月安不足乎其有竊疾乎魯陽文君曰有竊疾也子墨子曰楚三意之田曠蕪不可勝辟􅨜靈數千不可勝見宋鄭之間邑則還然竊之此與彼異乎魯陽文君曰是猶彼也實有竊疾也墨子耕柱我不以貨事上而求遷者則如以貍餌鼠爾必不兾矣若以情事上而求遷者則如引諸絶繩而求乗枉木也愈不兾之矣商子農戰争利如蚤甲而喪其掌荀子大畧是渠衝入穴而求利也是仁人之所羞而不為也荀子彊國篇事彊暴之國難使彊暴之國事我易事之以貨寶則貨寶單而交不結約信盟誓則約定而畔無日割國之錙銖以賂之則割定而欲無厭事之彌煩其侵人愈甚必至於資單國舉然後己雖左堯而右舜未有能以此道得免焉者也辟之是猶使處女嬰寶珠珮寶玉負戴黄金而遇中山之盗雖為之逢蒙視詘要撓膕君廬屋妾由將不足以免之荀子富國魯穆公使衆公子或宦於晉或宦於荆犂鉏曰假人於越而救溺子越人雖善游子必不生矣失火而取水於海海水雖多火必不滅矣遠水不救近火也今晉與荆雖强而齊近魯患其不救乎韓非子説林上昔秦伯嫁其女於晉公子令晉為之飾装從衣文之媵七十人至晉晉人愛其妾而賤公女此可謂善嫁女妾而未可謂善嫁女也楚人有賣其珠於鄭者為木蘭之櫃薰桂椒之櫝綴以珠玉飾以玫瑰輯以翡翠鄭人買其櫝而還其珠此可謂善賣櫝矣未可謂善鬻珠也韓非子外儲説左君子終日行不離輜重也邦者人君之輜重主父生𫝊其邦此離其輜重者也韓非子喻老今世上卜筮禱祠故疾病愈來譬之若射者射而不中反修于招何益于中夫以湯止沸沸愈不止去其火則止矣吕氏春秋盡數弗肯早為已乃墮骨肉之屬而抗剄之賈子宗首魯人身善制冠妻善織屨往徙於越而大困窮以其所修而游不用之鄉譬猶樹荷山上而畜火井中操釣上山揭斧入淵欲得所求難也方車而蹠越乗桴而入胡欲無窮不可得也淮南子説山訓遺人馬而解其羈遺人車而脱其轙所愛者少而所亡者多故里人諺曰烹牛而不鹽敗所為也淮南子説山訓壊塘以取龜發屋而求貍掘室而求鼠割脣而治齲桀跖之徒君子不與淮南子説山訓治䑕穴而壊里閭潰小皰而發痤疽淮南子説林訓捨茂林而集於枯不弋鵠而弋烏難與有圖淮山子説林訓昌羊去蚤蝨而來汵窮除小害而致大賊欲小快而害大利淮南子説林訓為酒人之利而不酤則竭為車人之利而不僦則不逹握火提人反先之熱淮南子説林訓夫鵲先識嵗之多風也去髙木而巢扶枝大人過之則探鷇嬰兒過之則挑其卵知備遠難而忘近患故秦之備胡也鳥鵲之智也淮南子人間訓强養弱抑則齊民消若衆穢之盛而害五榖鹽鐵論禁耕夫不早絶其源而憂其末若决吕梁沛然其所傷必多矣鹽鐵論禁耕無異於愚人反裘而負薪愛其毛不知其皮盡也鹽鐵論非鞅崇利而簡義髙力而尚功非不廣壤進地也然猶人之病水益水而疾深鹽鐵論非鞅此所謂攣朐之智而愚人之計也夫何大道之有故曰小人先合而後忤初雖乗車卒必泣血此之謂也鹽鐵論非鞅夫犀象兕虎南夷之所多也騾驢馲駞北狄之常畜也中國所鮮外國賤之南越以孔雀珥門户崑山之旁以玉璞抵鳥鵲今貴人之所賤珍人之所饒非所以厚中國明盛德也鹽鐵論棠禮今驘驢之用不中牛馬之功鼲音渾鼦音貂旃罽不益錦綈之實美玉珊瑚出於崑山珠璣犀象出於桂林此距漢萬有餘里計耕桑之功資財之費是一物而售百倍其價一也一挹而中萬鍾之粟也鹽鐵論力耕是由棄江臯河濵而田於嶺坂菹澤也鹽鐵論輕重匈奴貪狼因時而動乗可發飆舉電至而欲以誠信之心金帛之寶而信無義之詐是猶親蹠蹻而扶猛虎也鹽鐵論世務今不固其外欲安其内猶家人不堅垣墻狗吠夜驚而暗昧妄行也鹽鐵論險固終日逐禽罷而釋之則非計也鹽鐵論擊之茫茫乎若行九臯未知所止浩浩乎若無網羅而漁江海雖及之三軍罷弊適遺之餌也鹽鐵論西域國有封疆猶家之有垣墻所以合好覆惡也室不能相和出訟鄰家未為通計也新序雜事二載金販狗利棄我走焦氏易林訟之旅袍衣剝脱夏熱冬寒焦氏易林大有之未濟載土販鹽難為功力焦氏易林无妄之解争雞失羊亾其金囊焦氏易林恒之夬築室水上危於一齒焦氏易林大壯之離作蠶不織寒無所得焦氏易林家人之泰折挺舂稷君不得食頭痒搔跟无益於疾焦氏易林蹇之革販鼠賣鼃利少無謀焦氏易林姤之晉買椒失粟亾我大利焦氏易林萃之大壯去辛就蓼毒愈酷甚避穽遇坑憂患日生焦氏易林豐之益次三闗無鍵舍金管測曰闗無鍵盗入門也太𤣥經第一閑次五奔鹿懐鼷得不訾測曰奔鹿懐鼷奚足功也太𤣥經第四唐譬諸孺子掩目巨夫之腋而曰逃可乎申鑒俗嫌信用衆愚欲以致治猶若駕跛鼈而欲上山我固知其不能登也王逸註楚辭哀時命居累卵之危而圖太山之安為朝露之行而思𫝊世之功豈不惑哉潛夫論貴忠焚椒蘭其望治由倒裳而求領曹子建九詠何異圖畫騏驥以代徒行之勞遙指海水以解口焦之渴張魚網於峻極之巔施釣緡於修木之末雖自以為得所猶未免乎迂闊也抱朴子外篇安貧今吾子督余以誨盗之業敦余以召賊之䇿進酖酒以獻酬非養夀之忠益抱朴子外篇安貧世人不問愚智皆欲識人之多見事之廣而不肯讀書是欲求飽而懶營饌欲暖而惰裁衣也顔民家訓勉學菖蒲去蚤蝨而來蚰蜒礬石止齒齲之痛而朽牙根躁痛雖弭必生後害此取小利而􅁯大利雖去輕害而負重害也劉子利害一簣之土固不能障塞江河是以其身沈没也前漢書註師丹傳臨川日暮而又相思何為汎舟而不濟以相從乎李善註文選曹子建朔風詩註尋斧始於所庇制國昩於弱下文選陸士衡五等諸侯論割剝富强以養貧弱何異餓耕牛乗馬而飽吠犬棄干將而礪鉛刀也意林物理論忿飆焚衣其損多矣忿㸑之熟推甑而棄之損益多意林物理論趙簡子舉兵伐齊有被甲士申䕶笑簡子曰子何笑對曰臣乃有宿笑當桑之時臣鄰家父與妻俱之田見桑中女因追之不能得還反其妻怒而去之臣笑其曠也簡子曰今吾伐國失國是吾曠也還師而歸藝文類聚人部諷亾載得輿所獲益寡争雞失牛所損更大文苑英華元世俊移文功以才成業由才廣若捨此不任防其後患是猶備風波而逆廢舟楫非長計也何氏語林德行襄陽記鴟鴞所以愛養其子者適以病之愛憐養其子者謂堅固其窠巢病之者謂不知託於大樹茂枝反敷之葦䓟風至䓟折巢覆有子則死有卵則破是其病也玉海詩攷韓詩譬如有人欲求香象得此象已捨而求跡波羅蜜多經卷三百三譬如餓狗捨其主食返從僕使而求覓波羅蜜多經卷三百三犬唯逐塊不知逐人壊終不息外道亦爾不知斷生終不離死波羅蜜多經卷五百六十九譬如狗子從大家得食不肯食之反從作務者索食道行波羅蜜多經卷四譬如有人年耆極老身嬰長病卧在牀席不能起止時有一人巨富饒財齎持珍寶至病人所而語之言我有緣事當至他方以寶相寄為我守䕶或十年還若二十年待我還時汝當歸我彼老病人卧在牀席無有子息唯獨一身彼人已去未久之間時彼病人因至命終所寄財物悉皆㪚失彼人行還求索無所大寶積經卷八十八譬如有人到寶渚所捨帝釋青寶及大青寶金銀真珠皆悉捨離大價之寶取於水精大方廣十輪經卷四譬如有犬摶擲令怖反走逐之不趣擲者摩訶衍寶嚴經推七譬如癡人破車遲牛欲過險道甚難可過七佛所説神咒經卷三譬如商人計數金錢置一器中其子啼時授與一錢彼器中錢日日損減大法鼓經卷上譬如大田家收入甚大豐但食不復種榖盡亦饑窮佛説五苦章句經尺七譬如有人卒患脊僂諸醫療治醫以酥塗上下著板用力痛壓不覺雙目一時併出百喻經卷上譬如有人磨一大石勤加功力經厯日月作小戲牛用功既重所期甚輕百喻經卷上破滅法炬自燋其心斫伐法樹乃殖毒林本緣經鹿品不應挑其右目以治左眼本緣經持王子品如有人欲食甘露而食毒藥欲求安樂而反入賊欲安隠身反服非藥欲除斷渴愛反飲鹹水欲斷媱欲反樂衆女本緣經持王子品譬如種榖雖多得收不復種種但稍稍飯雖久飯不止㑹有盡時小道地經藉九人治生譬如蜂作蜜採取衆華勤苦積日已成人便竊取持去亦不得自食適自疲極三慧經藉八昔有一婆羅門居家貧窮正有一㹀牛􅢇乳日得一斗以自供活聞説十五日飯諸衆僧沙門得大福德便止不復􅢇牛停至一月并取望得三斛持用供養諸沙門至滿月便大請諸沙門至舍皆坐時婆羅門即入􅢇牛乳正得一斗雖久不􅢇乳而不多諸人呵罵言汝癡人云何日日不􅢇乃至一月也而望得多今世人亦如是有財物時不能隨多少布施停積久後須多乃作無常水火及以身命須臾難保若當不遇一朝蕩盡虚無所䕶衆經撰雜譬喻經得入栴檀林而但取其葉既入七寶山而更取水精大智度論卷五如人以手障鉾但自傷其手鉾無所損大智度論卷五十六譬如人在寶洲但得水精珠則所利益薄大智度論卷七十九是忿風濤而毁舟檝也𢎞明集九無異人苦頭蝨因欲并首俱焚患在足刺遂欲通股全解不亦濫乎𢎞明集釋駮論竭溟海而求珠浄康衢而徙石盖勞力也辨正論卷六以好栴檀貿易瓦木以金易鍮石以銀易白蠟以絹易氀褐以甘露易於惡毒法苑珠林卷三譬鼠入角路窮何趣法苑珠林卷二十今愛榮而不知慕賢求福而不知避禍譬猶播植粃粺而欲嵗取精糧驅駕駑蹇而望騰超夐絶不亦惑哉法苑珠林卷五十一昔有一人貧窮困苦為王作事日月經久身體羸痩王見憐愍賜一死駞貧人得已即便剝皮嫌刀鈍故求石欲磨乃於樓上得一磨石磨刀令利來下而剝如是數數往來磨刀後轉苦憚不能上樓懸鈍上樓就石磨刀深為人笑法苑珠林卷五十三欲須甘果翻種苦栽欲除渴乏反趣鹹水法苑珠林卷五十五譬如有牛厭患車故欲使車壊前車若壊續得後車扼其項領法苑珠林卷八十九令反罪諫臣而求直言亦猶北行詣越豈有得邪晉書慕容皝傳猶揭表而令之止也管子君臣上君使服之於内而禁之於外猶懸牛首於門而賣馬肉於内也晏子春秋雜下其在後世以急刻而責恕以譌偽而課忠言非其願意非其真而保人之弗叛悲夫是正坐於夕室也是白之懸而黑之募也是縱櫂於陸而發軔於川也其亦不可以幸而幾矣子華子孔子贈彊令之笑不樂彊令之哭不悲彊令之為道也可以成小而不可以成大缶醯黄蚋聚之有酸徒水則必不可以貍致䑕以氷致蠅雖工不能以茹魚去蝇蝇愈至不可禁以致之之道去之也桀紂以去之之道致之也罰雖重則雖嚴何益呂氏春秋功名執彈而招鳥揮棁而呼狗欲致之顧反走淮南子説山訓喻林卷四十九
