body:
  text: 喻林卷二十四明徐元太撰人事門二十二分量薈蔚之小雲朝升於南山不能為大雨鄭氏箋詩候人泉之大者則流行無窮小者有時而虛竭毛詩正義抑部婁無松栢左傳襄公二十四年子夏子游子張皆有聖人之一體冉牛閔子顏淵則具體而微孟子公孫丑上智譬猶人之有技巧也可學而益之聖譬猶力之有多少自有極限不可强增趙氏註孟萬章下隨廝養之役者失萬乗之權守儋石之儲者闕卿相之位史記淮陰侯傳駑蹇之乗不騁千里之塗燕雀之疇不奮六翮之用楶梲之材不荷棟梁之任斗筲之子不乘帝王之重前漢書叙傳上繭栗犢豈能負重致遠乎後漢書趙憙列傳枳棘之林無梁柱之質涓流之水無洪波之勢魏志王脩傳註駑馬雖精所致一人耳駑牛一日行三百里所致豈一人之重哉蜀志龎統傳註山河之量非塵露可益神鑒之慮非愚淺所測晉書虞預傳鵾鴻飜翥而莫及何但鷰雀之翩翾宋書謝靈運傳駘駟安局步騏驥志千里宋書索虜傳列草深岫不改先冬之悴植松澗底無奪後凋之榮故展禽三黜而無下愚之譽千秋一時而無上智之聲南齊書劉祥傳斯固龍象之騰驤鯤鵬之摶運蹇乘決羽豈能觖望其間哉陳書傳縡𫝊非珪璋之特逹詎芳菲之易襲未砥礪以自進寧琢磨而成章魏書李順希仁弟騫傳等渤澥之乘鴈類九罭之逃魚魏書李順希仁弟騫傳弊箄不能救鹽池之鹹阿膠不能止黄河之濁周書庾信傳九鼎之譬鴻毛夫喻輕重培塿之方嵩岱曾何等級隋書楊𤣥感史臣傳佛日也道月也儒五星也北史李孝伯士謙傳察於刀筆之迹者不知治亂之本習於行陣之事者不知廟戰之權文子微明夫子軫方而轂圓者也將無乎而不可我則有所可也子華子虎㑹問夫指之不能率其臂猶臂之不能運其體也子華子晏子若龍若蛟若蛇若龜若魚若蛤龍皆能之蛟蛟而已不能為龍亦不能為蛇為龜為魚為蛤聖人龍之賢人蛟之關尹子三極篇天下之理夫者倡婦者隨牡者馳牝者逐雄者鳴雌者應是以聖人制言行而賢人拘之關尹子三極篇且夫水之積也不厚則負大舟也無力覆杯水於坳堂之上則芥為之舟置杯焉則膠水淺而舟大也風之積也不厚則其負大翼也無力故九萬里則風斯在下矣而後乃今培風背負青天而莫之夭閼者而後乃今將圖南蜩與鸒鳩笑之曰我决起而飛搶榆枋時則不至而控於地而已矣奚以之九萬里而南為適莽蒼者三餐而反腹猶果然適百里者宿舂糧適千里者三月聚糧莊子逍遙遊窮髪之北有溟海者天池也有魚焉其廣數千里未有知其修者其名為鯤有鳥焉其名為鵬背若泰山翼若垂天之雲摶扶搖羊角而上者九萬里絶雲氣負青天然後圖南且適南溟也斥鷃笑之曰彼且奚適也我騰躍而上不過數仭而下翶翔蓬蒿之間此亦飛之至也而彼且奚適也此小大之辨也故夫知効一官行比一鄉德合一君而徵一國者其自視也亦若此矣莊子逍遙遊日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎莊子逍遙遊井鼃不可以語於海者拘於虛也夏蟲不可以語於冰者篤於時也曲士不可以語於道者束於教也莊子秋水褚小者不可以懷大綆短者不可以汲深夫若是者以為命有所成而形有所適也夫不可損益莊子至樂小夫之知不離苞苴竿牘敝精神乎蹇淺莊子列禦寇今休欵啓寡聞之民也吾告以至人之德譬之若載鼷以車馬樂鴳以鐘鼓也彼又惡能無驚乎哉莊子逹生夫尋常之溝巨魚無所還其體而鯢鰌為之制歩仞之丘陵巨獸無所隱其軀而㜸狐為之祥莊子庚桑楚短綆不可以汲深井之泉知不幾者不可與及聖人之言荀子榮辱是規摩之說也溝中之瘠也則未足與及王者之制也語曰淺不足與測深愚不足以謀知坎井之鼃不可與語東海之樂此之謂也荀子正論夫世愚學之人比有術之士也猶塏垤之比大陵也其相去遠矣韓非子和氏吾已見孔子則視子猶蚤蝨之細者也韓非子説林上地薄者大水不產水淺者大魚不遊樹秃者大禽不棲林疎者大獸不居黄石公素書安履不至則不知不知則不信無骨者不可令知氷吕氏春秋任數今使燕爵為鴻鵠鳯凰慮則必不得矣其所求者瓦之間隙屋之翳蔚也與一舉則有千里之志德不盛義不大則不止其郊卑痺之民其為賢者慮亦猶此也固妄誹訾豈不悲哉吕氏春秋長利鉏耰棘矜不銛於鉤㦸長鎩也賈子過秦上夫臨江而釣曠日而不能盈羅雖有鈎箴芒距微綸芳餌加之以詹何娟嬛之數猶不能與網罟争得也射者扞烏號之弓彎綦衞之箭重之羿逢蒙子之巧以要飛鳥猶不能與羅者競多何則以所持之小也張天下以為之籠因江海以為之罟又何亡魚失鳥之有乎夫釋大道而任小數無以異於使蠏捕鼠蟾蠩捕蚤不足以禁奸塞邪亂乃逾滋淮南子原道訓凍者假兼衣於春而暍者望冷風於秋夫有病於内者必有色於外矣夫梣木色青翳而羸瘉蝸睆此皆治目之藥也人無故求此物者必有蔽其明者聖人之所以駭天下者真人未嘗過焉賢人之所以矯世俗者聖人未嘗觀焉准南子俶真訓夫牛蹏之涔無尺之鯉塊阜之山無丈之材所以然者何也皆其營宇狹小而不能容巨大也又况乎以無裹之者邪此其為山淵之勢亦遠矣淮南子俶真訓交拱之木無把之枝尋常之溝無吞舟之魚根淺則末短本傷則枝枯淮南子繆稱訓受光於隙照一隅受光於牗照北壁受光於戸照室中無遺物况受光於宇宙乎天下莫不藉明於其前矣由此觀之所受者小則所見者淺所受者大則所照者博淮南子説山訓宫池涔則溢旱則涸江水之原淵泉不能竭淮南子説林訓短綆不可以汲深器小不可以盛大非其任也淮南子説林訓十頃之陂可以灌四十頃而一頃之陂可以灌四頃大小之埶然淮南子説林訓見象牙乃知其大於牛見虎尾而知其大於狸一節見而百節知也淮南子説林訓矢之於十步貫兕甲及其極不能入魯縞淮南子説林訓茍如子之方譬如以管窺天以錐刺地所窺者大所見者小所刺者巨所中者少韓詩外傳登高而臨深遠見之樂臺榭不若丘山所見高也平原廣望博觀之樂沼池不如川澤所見博也韓詩外傳山岳有饒然後百姓澹古贍字焉河海有潤然後民取足焉夫尋常之汙不能溉陂澤丘阜之木不能成宫室小不能苞大少不能澹多鹽鐵論貧富宇宙之内鷰雀不知天地之高也坎井之鼃不知江海之大窮夫否婦不知國家之慮負荷之啇不知猗頓之富鹽鐵論復古禄不過秉握者不足以言治家不滿擔石者不足以計事鹽鐵論地廣宇小者用菲功巨者用大鹽鐵論園池夫短綆不可以汲深井知鮮不可以與聖人之言惠士可與辨物智士可與辨無方聖人可與辨神明夫聖人之所為非衆人之所及也説苑政理建天下之鳴鐘而撞之以莛豈能發其聲乎哉君問先生無乃猶以莛撞乎說苑善説坎井無黿鼉者隘也園中無修林者小也説苑談叢或問航不槳衝不薺有諸曰有之或曰大器固不周於小乎曰斯械也君子不械揚子君子次八昏辰利于月小貞未及星測曰昏辰利月尚可願也太𤣥經第六瞢糠粃小生學術虛淺蔡中郎集讓髙陽侯小馬不可以進道致千里故不得與大馬同類小知不可以治世長民故不得與大知同類淮南子説山訓解才力而致富貴命禄不能奉持猶器之盈量手之持重也器受一升以一升則平受之如過一升則滿溢也手舉一鈞以一鈞則平舉之過一鈞則躓仆矣王充論衡命禄篇夫命富之人筋力自彊命貴之人才智自高若千里之馬頭目蹄足自相副也王充論衡命禄篇富人之宅以一丈之地為内内中所有柙匱所羸縑布絲綿也貧人之宅亦以一丈為内内中空虛徒四壁立故名曰貧夫通人猶富人不通者猶貧人也俱以七尺為形通人胷中懷百家之言不通者空腹無一牒之誦貧人之内徒四所壁立也王充論衡别通篇夫壯士力多者扛鼎揭旗儒生力多者博大疏通故博大疏通儒生之力也舉重㧞堅壯士之力也王充論衡效力篇牛刀可以割鷄雞刀難以屠牛刺繡之師能縫帷裳納縷之工不能製錦儒生能為文吏之事文吏不能立儒生之業王充論衡程材篇富累千金孰與貲直百十也京廩如丘孰與委聚如坻也世名材為名器器大者盈物多然則儒生所懷可謂多矣王充論衡程材篇所知同業多少異量所道一途步騶相過王充論衡實知篇地性生草山性生木如地種葵韮山樹棗栗名曰美園茂林不復與一恒地庸山比矣文吏儒生有似於此俱有材能並用筆墨而儒生竒有先王之道非徒葵韮棗栗之謂也恒女之手紡績織經如或竒能織錦刺繡名曰卓殊不復與恒女科矣夫儒生與文吏程材儒生侈有經傳之學猶女工織錦刺繡之奇也王充論衡量知篇染練布帛名之曰采貴吉之服也無染練之治名縠麤縠麤不吉喪人服之人無道學仕宦朝廷其不能招政也猶喪人服麤不能招吉也王充論衡量知篇夫令鳩雀施氣於鴈鵠終不成子者何也鳩雀之身小鴈鵠之形大也王充論衡奇怪篇夫明之所及雖𤣥陰幽夜之地毫釐芒髪之物不以為難焉茍所不逮者雖日月麗天之炤灼嵩岱干雲之峻峭猶不能察焉抱朴子内篇㣲旨皁𨽻之巷不能紆金根之軒布衣之門不能動六轡之駕同為人類而尊卑兩絶抱朴子内篇道意侏儒之手不足以傾嵩華焦僥之脛不足以測滄海抱朴子内篇明本夫虎豹之所餘乃狸鼠之所爭也陶朱之所棄乃原顔之所無也抱朴子内篇祛惑又諸小餌丹方甚多然作之有深淺故力勢不同雖有優劣轉不相及猶一酘之酒不可以方九醖之醇耳抱朴子内篇金丹夫瞶者不可督之以分雅鄭瞽者不可責之以别丹漆井鼃不可語以滄海庸俗不中説以經術吾子茍知老農之小功未喻靣牆之巨拙何異拾瑣沙而捐隋和向炯燭而背白日也抱朴子外篇守塉夫麟不吠守鳯不司晨騰黄不引犂尸祝不治庖也且夫揚大明乎無外宣嫗煦之和氣者日也耀華燈於閉夜治金石以致用者火也天下不可以經時無日不可以一旦無火然其大小不可同也江海之外彌綸二儀升為雲雨降成百川而朝夕之用不及累仞之井灌田溉園未若溝渠之沃校其巨細孰為曠哉抱朴子外篇逸民茅蓬不能動萬鈞之鏗鏘侏儒不能看重仞之𢎞麗抱朴子外篇刺驕懸象雖薄蝕不可以比螢燭之貞耀黄河雖混渾不可以方沼沚之清澄山雖崩猶峻於丘垤虎雖瘠猶猛於豺狼抱朴子外篇廣譬以此為憂世念國希擬素王有似蹇足之尋龍騏斥鷃之逐鴻鵠焦㝠之方雲鵬鼷鼬之比巨象也抱朴子外篇止郭識在鉼管何能矩矱文心雕龍序志江湖鱣鯨非溝瀆所容也文中子禮樂故鵾鵬一軒横厲寥廓背負蒼天足蹠浮雲有六翮之資也騕褭一鶩騰光萬里絶塵掣微有迅足之勢也今以燕雀之羽而慕冲天之迅犬羊之蹄而覬追日之步勢不能及亦可知也劉子均任夫龍蛇有飜騰之質故能乘雲依霧賢才有政理之德故能踐處勢位雲霧雖宻蟻蚓不能昇者無其質也勢位雖高庸蔽不能治者乏其德也故智小不可以謀大德狹不可以處廣劉子均任蹄窪之内不生蛟龍培塿之上不植松栢非水土之性有所不生乃其營宇隘也數粒而炊枰薪而㸑非茍為艱難由性􅄶恡而細碎也劉子觀量枳棘之生數寸而抽枝豫章之植百尺而蒔柯其何故耶豈非質小者枝條蔇之而體大者節目疎乎是以逹者之懷則滉瀁而無涯􅄶人之情必刻覈而煩細劉子觀量江湖之流爛胔漂屍縱横接連而人飲之者量大故也盆盂之水鼠尾一曵必嘔吐而棄之者量小故也劉子觀望蟲狐以小丘為善莊子音義庚桑楚言凡鳥獸之不可得而鳯麟亦猶凡夫不可强通聖人之道楊子法言註問明篇譬八荒之於中國如彼諸子之於聖人楊子法言註問道篇且盲者不見咫尺而離婁燭千里之隅文選長楊賦由此而揆之西蜀之於東吳小大之相絶也亦猶棘林螢燿而與夫樳木龍燭也否泰之相背也亦猶帝之懸解而與夫桎梏疏屬也庸可共世而論巨細同年而議豐确乎文選吳都賦亦猶犨麋之於子都培塿之與方壺也文選魏都賦彼桑榆之末光喻長庚之初暉况河冀之爽塏與江介之湫湄文選魏都賦貫三灮而洞九泉曽未足以喻其髙下也文選西征賦譬猶鷇卵始生翰毛文選陳琳檄吳將校文譬猶飛兔流星超山越海龍驥所不敢追况於駑馬可得齊足文選陳琳答東阿王牋將欲希企前賢髣髴崇軌譬猶丘坻之望華岱恒星之繫日月也其不逮明矣補文選潘尼乗輿箴鷦鷯不可與論雲翼井鼃難與量海鼇補文選郭璞客傲夫干將之劒陸斷狗馬水截蛟龍而鉛刀不能入泥騏驥驊騮之乘一日而致千里而駑蹇不能邁畝百鍊之鑑别鬚眉之數而壁土不見泰山鴻鵠一舉横四海之區出青雲之外而斥鷃不陵桑榆此利鈍之覺優劣之決也補文選夏侯湛抵疑彼埳井之横汙固不容夫吞舟且洛邑之渟瀯曷足以居乎萬乘哉廣文選杜季雅論都賦燭龍之灮不照一堂之上鍾山之口不談曲室之内廣文選阮嗣宗莊論行潦之流不致江海之深丘垤之資不成太山之高魚鼈之類不希雲龍之軌一官之守不經大人之變廣文選傅彥林王命敘蒲桞之姿望秋而落松栢之質凌霜猶茂世説新語言語露不廣海塵不增山藝文類聚職官部尚書令表策蹇長途終慙一日之致懸縷層臺詎任千鈞之重固知本弱不可自彊力微難以企及藝文類聚職官部冡宰表拂羽決起力謝摩天策蹇載馳功微送日將短翮難以陵高駑乘無由致遠藝文類聚職官部太尉表顧蹄涔不足以濯神鬚翳薈不足以翔雲翮藝文類聚人部隱逸上贊瓶缻琑器實非瑚璉之才稊稗之賤不中粢盛之用藝文類聚人部隱逸下表陋巷之居無高密之宇壁立之室無旬朔之資藝文類聚人部貧書顧茲􅅾蔚廁根蘭陂膏澤雖均華不足披逮春不茂未秋先萎藝文類聚人部贈答詩以十鈞射者見天而不見雲以七鈞射者見鵠而不見鶬以五鈞射者見鶬而不見雀藝文類聚巧藝部射故不見僬僥之微不知泱漭之泰不見果下之乗不别龍馬之大高下相懸所以致觀也藝文類聚獸部牛表千鈞之弩不為鼷鼠發機萬石之鐘不以尺莛起音事文類聚德量壤蟲之比黄鵠轍鮒之仰河決未足云也文苑英華徐陵贈答上書或問曰諺云人之相去如九牛毛寧有此理乎譚對曰昔許由讓天子之貴市道小人爭半錢之利此相去何啻九牛毛也太平御覽人事部辯下羊不任駕鹽車椽不可為楣棟太平御覽獸部羊上士學道輔佐帝王好生之德也中士學道欲度其家下士學道裁脱其身太平御覽道部道有千金之裘而無千金之布太平御覽服章部裘夜光匪與魚目比映三秀難與朝華爭榮故布鼓自嫌於雷門礫石有忌於琳琅矣太平御覽文部吊文拙者得工輸之斤斧不能以成雲梯怯者得馮婦之刀㦸不能以擒兕虎太平御覽兵部㦸誠知武夫非和寶之倫長庚啓明非曜靈之匹太平御覽珍寶部武夫太山雨天下小山雨一國埤雅天道門雲禽經曰鵻上無尋鷚上無常雉上有丈鷃上有尺埤雅品物門雉聖人喻龍君子喻蛇玉海周易鄭康成注小巫見大巫拔茅而棄此其所以終身弗如困學紀聞巻十諸子比丘諸眷屬離佛不莊嚴猶如虛空中衆星之無月五燈㑹元西天祖師一祖無以大海内水譬諸小水無以太陽譬於餘灮三十六部尊經道德經猶如育蛾何能思於一乗寶藏深奥之義海空智藏經供獻品天府如海非一缾所汲華陽陶隱居集又如日出月及星灮皆悉不現波羅蜜多經卷五百六十七又如大地蟲蟻蚊蛇種種若事不能傾動波羅蜜多經卷五百六十七又如大地若聞師子龍象等聲終無驚怖波羅蜜多經卷五百六十七如見日輪尚有隱沒即知螢火不得久住波羅蜜多經卷五百六十八亦如大海小獸不入波羅蜜多經卷五百六十九如月輪出放大灮明一切星灮皆被映奪波羅蜜多經五百八十六如日輪出放大灮明螢火等灮悉皆隱没波羅蜜多經五百八十六大海中水一毛端水百分千分乃至鄔波尼殺曇分亦未能比其量多少波羅蜜多經五百八十九今問尊者妙高山王與小芥子大小高下輕重何别波羅蜜多經五百八十九世間鏵鐵所有灮彩難可方比贍部真金謂贍部金所有灮彩廣大微妙清淨殊勝波羅蜜多經五百八十九譬如日輪與贍部洲作灮明事螢不能辦所謂日輪放無量灮普照贍部諸有情類螢灮唯照自身波羅蜜多經五百九十二譬如螢火蟲不作是念言我灮明照閻浮提普令大明光讚波羅蜜經卷二如世間中燈油之灮於螢火灮為廣為大顯照明淨超過最勝燭炬之耀超勝燈灮庭燎火聚又勝燭炬藥草發灮踰於火聚星宿之灮倍過藥草滿月流灮又過星耀炎盛日灮踰超於月大寶積經三十七如贍部捺陀金置凡金中令彼凡金猶如墨聚失於明照大寶積經三十七猶如日中盛隆熾陵於星辰故不現大寶積經六十一猶如日中陵月明令月失光明不現大寶積經六十一不以野干聲能令獸王恐唯有師子王一吼飛鳥落大寶積經卷九十九譬如螢火雖有無量千萬億數不能障蔽日之光明大方等大集經卷九如日月星宿俱遊虛空而星宿明不及日月大方等大集經十八譬如波利質多樹華一日熏衣薝蔔華婆師華雖千歳熏所不能及大方廣佛華嚴經卷五十九曾見大海神為小小陂池溝渠泉流作禮不須彌山寧為衆小山作禮不日月之光明與螢火之明等不阿述逹菩薩經衣八師子獸王大吼之時其餘小獸能堪忍不不也又如香象其所負重諸驢騾等能堪忍不不也決定毗尼經衣三何因縁故名日燈三昧譬如日出燈火月光星宿諸明悉不復現無盡意菩薩經九金翅鳥飛烏能及不菩薩善戒經卷一如師子吼猫狸能不菩薩善戒經卷一譬如真金為莊嚴具餘金不及菩薩地持經卷七譬如大河在於大谷谷大耶河大耶谷能盛河非河盛谷谷必大也大方等陀羅經卷四譬如野千獸常與師子遊雖久相習近其聲不相類聞彼聲怖死况能師子吼鴦崛摩羅經卷四譬如從乳出酪酪出生酥生酥出熟酥熟酥出醍醐凡夫邪見如初生乳乳血共雜受三歸者猶如純乳隨信行等及初發心菩薩住解行地猶如成酪七種學人及七地住菩薩猶如生酥意生身阿羅漢辟支佛得自在力及九住十住菩薩猶如熟酥如來應供等正覺猶如醍醐大法鼔經卷下當知十駱駝力不如一凡象力又復十駱駝及一凡象力不如一迦羅勒象力又復十駱駝及一凡象力并迦羅勒象力不如一鳩陁延象力正使十駱駝一凡象乃至鳩陁延象力不如一婆摩那象力復計此象之力不如一迦泥留象力也復計諸象之力復不如一優鉢象力復計爾許象力復不如一鉢頭摩象力復計爾許象力復不如一拘牟陀象力復取計校之復不如一分陀利象力復取計校之復不如一雪象之力復取計校之復不如一香象之力増壹阿含經卷三十六此人間螢火之明不如燈火之明燈火之明不如炬火之明炬火之明不如大火之明大火之明不如星之明星之明不如月之明月之明不如日之明樓灰經忉利天品凡牛之力百當水牛力一水牛力百當青牛力一青牛力百當犛牛力一犛牛力百當竹牛力一竹牛力百當草象力一草象力百當凡象力一凡象力百當黑象力一黑象力百當白象力一白象力百當龍力一龍力百當可畏力士力一可畏力士力百當叚力士力一段力士力百當崩惰力士力一崩惰力士力百當大破壞力士力一大破壞力士力百當半人乘力士力一半人乘力士力百當人乘力士力一人乘力士力百當大人乘力士力一鴦崛髻經縁六譬如日灮比於闇㝠如以實語比於妄談如以須彌山比於衆山如以解脫比於繫縛如以利益比於衰損如以善友比於怨家如以甘露比於毒藥如以白日比於昏夜如以偽珠比於真寶如以巨富比於貧窮猶如行使比安住者如以螢火比於日光如無足者欲比猛風相去懸遠如以盲人比明眼者如以嶮路比平坦道正法念處經卷二十一譬如牛跡不受海水阿盲王傳第一須彌山南有一大樹高四千里諸鉢义鳥栖宿其上樹常不動有小鳥形類鶉鴳住止其上樹即振搖鉢义鳥語樹神言無知我身將重而初不動小鳥未宿反更振動樹神言此鳥雖小從大海底來純食金剛金剛為物所墮之處無不破壞所以大怖不能自安經以為喻若有凡人解深經一句口誦心念身中三毒四魔八萬垢門皆不能自安何况博採衆法為世橋梁者也衆經撰襍譬喻經譬如小龍能雨一縣而不周遍雖為人民潤不足言修行道地經修行品如蠅蟲翅所有風力不能吹動須彌山王本縁經持王子品如諸法無量智慧亦無量如函大葢亦大函小葢亦小大智度論卷二譬如恒河不受大河以其狹小故大海能受衆流以其廣大故大智度論卷四譬如月光雖大日出則滅大智度論卷九如人雖到大海以器小故不能取無量水大智度論三十二如一切草木力不如火一切諸明勢不如日亦如十方世界諸山不如一金剛珠大智度論卷三十五譬如快馬下一鞭便走駑馬多鞭乃去大智度論卷三十六譬如遠行或有乘羊而去或有乘馬而去或有神通去者乗羊者乆乆乃到乘馬者差速乗神通者發意頃便到大智度論卷三十八譬如時雨如有國土溉灌種蒔及種種用水常苦不足若時雨普降無不沾洽無不如願大智度論卷五十五譬如大雨大樹則多受小樹則少受大智度論卷六十五譬如水深淺無定若於小兒則深長者則淺乃至大海於人則深於羅㬋阿脩羅王則淺大智度論卷六十六如雷霆小鳥則怖畏悶死孔雀大鳥歡喜儛戲大智度論卷七十一譬如大臣功業雖大不及太子大智度論卷七十一譬如壁中先有空相小兒以撅釘之力少故不入大力者能入大智度論卷七十二譬如轉輪聖王寶藏中諸寶無能分别知其價者聖王出寶賜人正可知其所得者大智度論卷八十五譬如國王見一張㲲不以為多貧者見之以為多大智度論卷九十六如小海船力可度大海水船力不可渡唯有神通者能渡大智度論卷一百譬如香象蹴蹋非驢所及入大乗論卷下雖善修理彼迦柘珠終不能為鞞瑠璃寶菩提資糧論卷四譬如人以小器盛水著一升鹽則不可飲若復有人以一升鹽投入大海尚不覺鹽味何况叵飲何以故水多鹽少故十住毘婆沙論卷五譬如一縷其量微小能持一華一繫華已勢力便盡不復能繫復有一縷能持二華再繫華已勢力便盡復有一縷能持多華多繫華己其力方盡又如流水其性微小流經一步勢力便盡有第二水其性稍大流經兩步勢力方盡有第三水其性廣大流經多步勢力乃盡又如酢滴其性淡薄唯能酢彼一滴之水不能酢多有第二滴其性稍嚴酢二滴水不能酢多有餘酢滴其性更嚴乃至能酢衆多滴水瑜伽師地論六十譬猶秋毫之慿五嶽觸氏之附六軍𢎞明集十郄克躧足豈從邯鄲比蹤盧敖捷至寧與若士齊跡𢎞明集十江海淵曠非井蛙所逹泊然入定豈外道能干𢎞明集十篤時之蟲驚疑於徃來滯甃之鼃河漢於遠大其故何也淪蒙怠而爭一息抱孤陋而守井幹豈知天地之長乆溟海之壯闊𢎞明集十江海所以異於行潦者以其深廣也五岳所以别於丘陵者以其高大也若高不絶山阜跛羊凌其巔深不絶涓流孺子浴其淵麒麟不處苑囿之中吞舟之魚不遊數仞之溪剖三寸之蚌求明月之珠探枳棘之巢求鳯凰之雛必難獲也何者小不能容大也𢎞明集牟子理惑論語其量也猶嵩華與培塿殊峻溟渤將坎井異深辯正論卷六猶炎威赫耀童子不能正目而視迅雷奮擊懦夫不能張耳而聽辯正論卷六終馗無大椿之乆蜉蝣罕龜鶴之年辯正論卷六匠者之前難為斤斧辯正論卷七譬如輭夫為將雖復將兵終身卒無功名若英雄奮發禍亂立定一日之勲名葢天下法苑珠林卷八十八吞舟之魚不產溝洫之水鵬鵾之鳥豈翔尺鷃之林也法苑珠林卷八十八小乗人骨金剛肉非金剛也大乗中内外金剛一切實滿有大勢力無病處故羅什譯維摩詰經弟子品喻林卷二十四
