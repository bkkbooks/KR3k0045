body:
  text: 喻林卷一百十明徐元太撰性理門一貞一天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也易上繫夫衆不能治衆治衆者至寡者也夫動不能制動制天下之動者貞夫一者也故衆之所以得咸存者主必致一也動之所以得咸運者原必無二也周易畧例明彖自統而尋之物雖衆則知可以執一御也由本以觀之義雖博則知可以一名舉也故處璇璣以觀大運則天地之動未足怪也據㑹要以觀方來則六合輻輳未足多也周易畧例明彖一為太極太極者天地之父母也三墳山墳一大之物目天一塊之物目地一炁之􅽨蔀也名混沌乾坤鑿度乾鑿度上譬如大海變化億萬蛟魚水一而已我之與物蓊然蔚然在大化中性一而已關尹子七釡意有變心無變意有覺心無覺惟一我心則意者塵往來爾事者歘起滅爾吾心有大常者存關尹子五鑑音之數不過五而五音之變不可勝聽也味之和不過五而五味之化不可勝嘗也色之數不過五而五色之變不可勝觀也故音者宫立而五音形矣味者甘立而五味停矣色者白立而五色成矣道者一立而萬物生矣是故一之理施四海一之解際天地萬物之總皆閱一孔百事之根皆出一門淮南子原道訓所謂一者無匹合於天下者也卓然獨立塊然獨處上通九天下貫九野員不中規方不中矩大渾而為一葉累而無根淮南子原道訓今夫萬物之疏躍枝舉百事之莖葉條㮆音蘖皆本於一根而條循千萬也若此則有所受之矣而非所授者所授者無受也而無不受也無不受也者譬如周雲之籠蓯遼巢彭濞而為雨沈溺萬物而不與為濕焉淮南子俶真訓或問鳥有鳳獸有麟鳥獸皆可鳯麟乎曰羣鳥之於鳯也羣獸之於麟也形性豈羣人之於聖乎揚子問明篇千人聚不以一人為主不亂則㪚故多賢不可以多君無賢不可以無君郭子注莊子人間世天能守一覆而不舉地能守一静而能處岳能守一不避寒暑海能守一流而不還人能守一必持真仙太平御覽道部養生三一者一身之虚宗百神之命根津液之山源魂精之玉室太平御覽道部養生一者萬物之所導而變化之至要也萬方之準繩而百變之權量也道德經指歸卷七譬如夜室暉光隨孔而照光雖萬殊而本之者一无上内秘藏經妙德品如世間火貴賤皆同波羅蜜多經卷五百六十七譬如月輪有滿未滿月性無異波羅蜜多經卷五百六十八譬如初月十五日月虧盈有異月性無差勝天王波羅蜜經譬如日輪體無晝夜但出時名晝没時名夜大方廣佛華嚴經卷二十五大海之水惟有一味無若干味無不以鹹為味法海經尺一譬如筭數法筭一乃至算百百算竟還至一大智度論卷四譬如虚空雖徧諸色種種相中而不可説有種種相體唯一味佛説佛地經卷五譬如大城西門失火從次燒之乃到東門皆冷灰燼計東門火非是初火也然其燋燃不離本火修行道地經五隂成敗品譬如樹葉春夏則青秋時則黄冬時則白隨時異故樹葉則異而其始終是一葉也大方便佛報恩經卷六又如乳酪酥醍醐四時差别雖隨時有異而故是一大方便佛報恩經卷六各足人之有是四端也猶其有四體也孟子公孫丑上夫一人死而天下號者以為損也一人生而四海笑者以為益也然則號笑非益死損生也是以至道不損至德不益何哉體足也晉書皇甫謐傳彼正正者不失其性命之情故合者不為駢而枝者不為跂長者不為有餘短者不為不足是故鳬脛雖短續之則憂鶴脛雖長斷之則悲駢於拇者决之則泣枝於手者齕之則啼二者或有餘於數或不足於數其於憂一也莊子駢拇不㩴所有不强所無譬諸身増則贅而割則虧太𤣥經𤣥瑩仁如居宅可以安身義如道路可以安行禮如衣服可以表儀智如燈燭可以照察信如符契可以致誠揚子法言註吾子篇性之所期貴賤同量理之所極卑髙一歸是以准月禀水不能加凉晞日引火不必増輝文選陸士衡演連珠譬如橋梁隨諸行人或重或輕以是橋梁無有増減衆生道性亦復如是海空智藏經哀嘆品同然龍子曰不知足而為屨我知其不為蕢也屨之相似天下之足同也孟子告子上口之於味有同耆也易牙先得我口之所同耆者也如使口之於味也其性與人殊若犬馬之與我不同類也則天下何耆皆從易牙之於味也至於味天下期於易牙是天下之口相似也惟耳亦然至於聲天下期於師曠是天下之耳相似也惟目亦然至於子都天下莫不知其姣也不知子都之姣者無目者也故曰口之於味也有同耆焉耳之於聲也有同聽焉目之於色也有同美焉至於心獨無所同然乎心之所同然者何也謂理也義也聖人先得我心之所同然耳故理義之悦我心猶芻豢之悦我口孟子告子上傳曰人心不同譬若其面斯盖謂大小窳隆醜美之形至於鼻目衆竅毛髪之狀未有不然者也情之異者剛柔舒急倨敬之間至於趨利避害畏死樂生亦復均也後漢書霍諝列傳道之所載四出拓坦有足者斯踐之矣夫何故平故也子華子執中惟以我之精合天地萬物之精譬如萬水可合為一水以我之神合天地萬物之神譬如萬火可合為一火以我之魄合天地萬物之魄譬如金之為物可合異金而鎔之為一金以我之魂合天地萬物之魂譬如木之為物可接異木而生之為一木關尹子四符比於大澤百材皆度觀乎大山木石同壇莊子則陽天之所覆地之所載六合所包陰陽所呴雨露所濡道德所扶此皆生一父母而閲一和也是故槐榆與橘柚合而為兄弟有苖與三危通為一家夫目視鴻鵠之飛耳聽琴瑟之聲而心在鴈門之間一身之中神之分離剖判六合之内一舉而千萬里是故自其異者視之肝膽胡越自其同者視之萬物一圏也淮南子俶真訓昔者馮夷得道以濳大川鉗且得道以處崑崙扁鵲以治病造父以御馬羿以之射倕以之斵所為者各異而所道者一也夫禀道以通物者無以相非也譬若同陂而溉田其受水均也今屠牛而烹其肉或以為酸或以為甘煎熬燎炙齊味萬方其本一牛之體伐楩柟豫章而剖梨之或為棺槨或為柱梁披斷撥檖所用萬方然一木之樸也故百家之言指奏相反其合道一體也譬若絲竹金石之㑹樂同也其曲家異而不失於體伯樂韓風秦牙管青所相各異其知馬一也故三皇五帝法籍殊方其得民心鈞也淮南子齊俗訓酒或厚或泊也非厚與泊殊其釀也麯蘖多少使之然也是故酒之泊厚同一麯蘖人之善惡共一元氣王充論衡率性篇人心之於是非也如口於味也口者非以己之調膳則獨美而調人調之則不美也故君子之於道也在彼猶在己也徐幹中論覈辨人食五味而生食五味而死無有怨而棄之者也心之於味也亦然陰符經集註太公譬如一路或大或小一切衆生悉於中行無障礙海空智藏經哀歎品譬如閻浮利地上種種好樹若色種種各異葉葉各異華華各異實實各異種種枝液其影無有異道行波羅蜜經卷一鄙聞海無異鹹湯無異熱辨正論卷一本善仁人之安宅也義人之正路也曠安宅而弗居舍正路而不由哀哉孟子離婁上告子曰性猶把柳也義猶桮棬也以人性為仁義猶以把柳為桮棬孟子曰子能順把柳之性而以為桮棬乎將戕賊把柳而後以為桮棬也如將戕賊把柳而以為桮棬則亦將戕賊人以為仁義與孟子告子上告子曰性猶湍水也决諸東方則東流决諸西方則西流人性之無分於善不善也猶水之無分於東西也孟子曰水信無分於東西無分於上下乎人性之善也猶水之就下也人無有不善水無有不下今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其勢則然也人之可使為不善其性亦猶是也孟子告子上仁人心也義人路也舍其路而不由放其心而不知求哀哉孟子告子上人化而為善獸化而為惡人而不善者謂之獸鬻子湯治天下石生而堅蘭生而芳少有其質長而愈明淮南子説林訓稷為兒以種樹為戲孔子能行以爼豆為弄石生而堅蘭生而香禀善氣長大就成故種樹之戲為唐司馬俎豆之弄為周聖師禀蘭石之性故有堅香之驗王充論衡本性篇七緯順度以光天象五性順理以成人行劉子思順五玉不染而堅寒氷不礲而朗太平御覽地部氷譬如氷寒之堂淳以氷凍而為梁柱牀席屏帷莫非氷結就此中間云何得火云何得熱海空智藏經序品如魚在水始生之初便習江湖不假教令亦如玉質本白黛色本青火性本熱水性本冷不關習學理分自然海空智藏經序品譬如黒雲障於日光日光之光不生不滅不去不來不有不无海空智藏經問病品譬如真金隨人造作種種瓔珞海空智藏經持誡品譬如甘蔗若人割截若不割截不失甘味法集經欲一譬如清水垢來則濁後時若清唯除垢耳清非外來本性清故心性本浄客塵故染後時清浄除客塵耳浄非外來本性浄故大乗莊嚴經論卷六譬如水性體非清濁但由穢不穢故有清濁名若泥滓濁亂故不澄清雖不澄清而水清性不失佛性論卷二真心今人乍見孺子將入於井皆有怵惕惻隠之心非所以内交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也孟子公孫丑上一簞食一豆羮得之則生弗得則死嘑爾而與之行道之人弗受蹴爾而與之乞人不屑也孟子告子上中路嬰兒失其母焉何常聲之有禮記雜記下芥入目也撫捫之從中發非為觀容之也淮南子繆稱訓解譬如犀在園中雖被毒箭猶能顧戀其子大智度論卷三十一無我凡自有形象者不可以制他物之形象猶若海不能制山之形象山不能制海之形象遺忘已象者乃能制衆物之形象也周易正義繋辭上聖人力行猶之發矢因彼而行我不自行聖人堅守猶之握矢因彼而守我不自守關尹子一宇如桴扣鼓鼓之形者我之有也鼓之聲者我之感也桴已往矣餘聲尚存終亦不存而已矣關尹子四符我之為我如灰中金而不若礦砂之金破礦得金淘砂得金揚灰終身無得金者關尹子六七枯龜無我能見大知磁石無我能見大力鐘鼔無我能見大音舟車無我能見遠行故我一身雖有智有力有行有音未嘗有我關尹子六七目自觀目無色耳自聽耳無聲舌自嘗舌無味心自揆心無物衆人逐於外賢人執於内聖人皆偽之關尹子六七譬如火也躁動不停未嘗有我關尹子六七爪髪不痛手足不思亦我也豈可以思痛異之關尹子六七昔者莊周夢為胡蝶栩栩然胡蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢為胡蝶與胡蝶之夢為周與周與胡蝶則必有分矣此之謂物化莊子齊物論陽子之宋宿於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤陽子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也陽子曰弟子記之行賢而去自賢之行安往而不愛哉莊子山木不得其道若觀儵魚故聖若鏡不將不迎應而不藏故萬化而無傷淮南子覽宜訓無心𤣥應唯感之從汎乎若不繋之舟東西之非已也郭子註莊子逍遥逰物有小大能有少多所大即駢所多即贅駢贅之分物皆有之若莫之任是都棄萬物之性也郭子注莊子駢拇鑑鏡也鑑物無私故人美之夫鑑者豈知鑑而鑑耶生而可鑑則人謂之鑑耳郭子注莊子則陽三異同處而二異訟其所取是必於不訟者俱異耳而獨信其所是非借外而何郭子注荘子寓言絃節有恒清濁之聲難越對物有恒則應化之功不廣然明鏡無心物來斯照聖人𤣥同感至皆應是以滯有之與懷豁道難得而校也李善注文選陸士衡演連珠自井中視星所見不過數星自丘上以望則見始出也非明益也勢使然也私心井中也公心丘上也藝文類聚天部星水鏡不以妍蚩殊照芝蘭寧為貴賤異芳是以宏道歸於兼濟至德由乎兩忘藝文類聚雜文部連珠未若兹雪因時興滅元陰凝而不昧其潔太陽曜而不固其節節豈我名潔豈我貞憑雲升降從風飄零值物賦象任地頒形素因遇立汚隨染成縱心皓然何慮何營初學記天部雪棄已任物則莫不理若槖籥有意於為聲也則不足以共吹者之求也道德經注猶如幻化隨聲而有種種形相種種所造海空智藏經持誡品猶如俱蘭吒華無色無香大乗大方等日藏經卷一譬如虚空火災起時不能焚燒水災起時不為所㵱大方等大集經卷十二如因種有華種中無華因華有果華中無果大乗顯識經推四譬如開於大國城門而以管籥去其關軸内外無礙法華經卷六猶如掃篲浄與不浄悉掃掃篲不以此而有憎愛不羞不慙亦不愧恥我亦如是心如掃篲中阿含經卷五譬如人種榖溉灌修理地亦不喜大智度論卷五縱任有自由謂之我而外火起滅由薪火不自在火不自在火無我也外火既無我内火類亦然僧肇注維摩詰經方便品四大既無主身我何由生譬一沙無油聚沙亦然也僧肇注維摩詰經問疾品至虚若以數數物則不能極其物數猶若以萬而數則不能苞億以一億而數則不能苞千億萬億遺去數名者則无所不苞周易正義繋辭上今構羣材以成大厦罔專寢之實積一毫以致合抱無檀木之體宋書蠻夷天竺傳若影之象形響之應聲也故物至則應過則舍矣管子心術上雲之卷舒禽之飛翔皆在虚空中所以變化不窮聖人之道則然關尹子三極贍彼闋者虚室生白莊子人間世夫疾風勃木而不能拔毛髮雲臺之高墮者折脊碎腦而蟁蝱適足以翺翔夫與蚑蟯同乘天機夫受形於一圏飛輕微細者猶足以脱其命又况未有類也淮南子俶真訓夫載哀者聞歌聲而泣載樂者見哭者而笑哀可樂者笑可哀者載使然也是故貴虚淮南子齊俗訓方船濟乎江有虚舟從一方來觸而覆之雖有忮心必無怨色有一人在其中一謂張之一謂歙之再三呼而不應必以醜聲隨其後響不怒而今怒響虚而今實也人能虚已以遊於世孰能訾之淮南子詮言訓節欲之本在於反性反性之本在於去載去載則虗虗則平平者道之素也虗者道之舍也淮南子詮言訓鼻之所以息耳之所以聽終以其無用者為用矣物莫不因其所有而用其所無以為不信視籟與竿淮南子説山訓弁冕輅輿可服而不可好也大羮之和可食而不可嗜也朱絃漏越一唱而三嘆可聽而不可快也故無聲者正其可聽者也其無味者正其足味者也淮南子泰族訓儒墨之師天下之難和者而無心猶能和之况其凡乎郭子註莊子知北遊絃有常音故曲終則改鏡無畜影故觸形則照是以虚已應物必究千變之容挾情適事不觀萬殊之妙文選陸機演連珠水性本無泡激流遂聚沫即異成貌狀消㪚歸虚壑藝文類聚内典部内典賛本出於虚無感激生精神譬如起音者掇絃手動傳宫商角徴羽口氣呼吸元西昇經意中空虚如木之浮如壤之休道德經指歸卷九和水土燒以成器器中空無故得盛受况聖人心空故能容物道德經注疏卷一譬如風聲聲響遍徹風質非無執不可得海空智藏經序品譬如箜篌隨風出聲何絃有音何絃無音海空智藏經持誡品譬如天丁力士能摧伏一切魔鬼唯除大風何以故以無礙故元陽妙經卷一雖惱趣森横寂㟁層逈莫不同幻蘂之開落不滅不生比夢象之妍蚩無染無浄飆谷投嚮則譽毁共銷月池寖色則物我俱謝波羅蜜多經卷四百一目隣虚之有間投刃曷傷念機關之無主觸舟奚若波羅蜜多經五百八十九卷序如虚空界及如風界俱不可執非圓成實亦無色相而可筭數波羅蜜多經卷五百九十七如師子王吼於林野人中師子吼於性空大寶積經卷八十六譬如虚空悉能容受一切萬物而是虚空初無増減大方等大集經卷九如風行空無所罣礙無盡意菩薩經卷十一指㑹成拳故無自性指亦如是故無他性羅什譯維摩詰經弟子品夫有心則有封有封則不普以聖心無心故平等虚空也僧肇注維摩詰經佛國品貴於萬物而始終不改謂之人而外水善利萬形方圓隨物汙隆異適而體無定體無定則水無人也外水既無人内水類可知也僧􅒊注維摩詰經方便品因物彼長而我長之非有長於我也猶彼白而我白之從其白於外也孟子告子上夫金剛水柔性之别也員行方正器之異也故善御性者不違金木之質善為器者不易方員之用後漢紀光武五若椀若盂若瓶若壺若甕若盎皆能建天地兆龜數蓍破瓦文石皆能告吉凶關尹子二柱篇東郭子問於莊子曰所謂道惡乎在莊子曰在螻蟻曰何其下邪曰在稊稗曰何其愈下邪曰在瓦甓曰何其愈甚邪曰在屎溺東郭子不應莊子曰夫子之問也固不及質正獲之問於監市履豨也每下愈况莊子知北遊神清意平物乃可正若璽之抑埴正與之正傾與之傾淮南子齊俗訓夫水一也而隨髙下夷險有洄激流止之異似至人之心因外物難易有動寂進退之容張湛注列子黄帝以一家之平平萬物不若任萬物之自平不應萬物之自應而欲以其所見應之必不合矣郭子注莊子列御冦夫監市之履豕以知肥痩者愈履其難肥之處愈知豕肥之要今問道之所在而每况之下賤則明道之不逃於物也必矣郭子注莊子知北遊磨石所剴麄細全在人莊子音義天下夫市魁履豕履其股脚豨難肥處故知豕肥耳問道亦况下賤則知道也莊子音義知北遊性命之道雖係於天然其來也必憑人而御物譬如天王冕旒而執契必因百官司職以立政李善註文選劉孝標辨命論稊稗瓦甓悉皆至道道德經注疏卷四譬如蓮花從於泥生泥生之生亦不是泥亦不非泥海空智藏經問病品如木寄生隨木而生生非木種海空智藏經問病品向言真道衆生如木中火非一非異非即非離即木有火而木非火離木無火而火非木木非是火故云非一火不離木故云非異大乗妙林經非初熖能燋炷亦不離初熖能燋炷非後熖能燋炷亦不離後熖能燋炷波羅蜜多經卷三百三十譬如水之與波不一不異仁王䕶國波羅蜜經譬如山間有師子吼瞿枳羅鳥迦陵頻迦孔雀等聲人聲牛聲驢聲馬聲響隨聲發而是響者實無差别隨聲發故響則不同大方等大集經卷十八譬如妙頗棃寶隨所處物若黒若白寶色隨物成白成黒大乗顯識經推三如面之像現之於鏡如印之文顯之於泥大乗顯識經推三又如多指共合成拳離指求拳即無所有大乗蜜嚴經卷中譬如印章以用印泥印不著泥亦不離之如種五榖苖生莖實不是本種亦不離本修行道地經五陰成敗品譬如乾沙緣手團握緣捉故合緣放故㪚三昧法門經卷上譬如火隨所燒處為名若離燒處火不可得大智度論卷三十一譬如日出影現於水隨水大小水大則影久水小則速滅大智度論卷三十四又如火燒草木然少則速滅然多則久住大智度論卷三十四衆生皆以煩惱為病而諸佛即以之為藥如婬女以欲為患更極其情欲然後悟道毒龍以瞋為患更増其忿恚然後受化此以欲除欲以瞋除瞋猶良醫以毒除毒斯佛事之無方也僧肇注維摩詰經菩薩行品探良藥必在險山非華堂之所出集法藥必在險有非無為之法所出焉僧肇注維摩詰經菩薩行品喻林卷一百十
