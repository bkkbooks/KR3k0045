body:
  text: 喻林巻六十七明徐元太撰君道門七任人臣作朕股肱耳目書益稷人惟求舊器非求舊惟新書盤庚上股肱惟人良臣惟聖書説命下今命爾予翼作股肱心膂書君牙法人惟重老重老惟寳汲冢周書大匡解譬若衆畋常扶予險乃而予于濟汲冡周書皇門解終其永懐又窘隂雨其車既載音在乃棄爾輔載如字輸爾載音在將伯助予詩小雅正月他山逺國之石取而得之可以為錯物之用興異國沈滯之賢任而官之可以為理國之政國家得賢匡輔以成治猶寳玉得石錯琢以成器毛詩正義鶴鳴商人留輔顧僕之故終用踰度陷絶之險汝商人何得曾不以是輔僕為意乎喻王用賢禮相之故終用是得濟免禍害之難汝何得曾不以是賢相為意乎毛詩正義正月言此商人載大車當無棄爾之車輔益於爾之輪輻以喻王之治天下當無棄爾之賢佐益於爾之國事也毛詩正義正月商人既不棄輔又數顧念爾將車之僕汝能若是則輔益車輻僕能勤御則得不隳敗爾之車載以喻王既不棄賢又善禮遇爾執政之相王能如此用賢益於國家相能幹職則得不傾覆爾之王業毛詩正義正月今有璞玉於此雖萬鎰必使玉人彫琢之至於治國家則曰姑舍女所學而從我則何以異於教玉人彫琢玉哉孟子梁惠王下教人治玉不得其道則玉不得美好教人治國不以其道則何由能治乎趙氏註孟梁惠王下御四馬者執六轡御天下者正六官孔子家語執轡山月升騰聖人以命相統治三墳形墳有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之累而立功名夫泛駕之馬跅弛之士亦在御之而已前漢書武帝紀傳曰以賢難得之故因曰事不待賢以食難得之故而曰飽不待食惑之甚者也前漢書匡衡傳謂其鷹犬之才爪牙可任後漢書袁紹列傳昔騏驥之於吳阪可謂困矣及其伯樂相之孫郵御之形體不勞而坐取千里葢伯樂善御馬明君善御臣伯樂馳千里明君致太平誠任賢使能之明效也魏志任城王傳飛龍御天故資雲雨之勢帝王興運必俟股肱之力晉書王導列傳夫嵩岱配極則乾道增輝藩嶽作屏則帝王成務宋書武帝中本紀聖不獨明而治鼎不單足而立是以熒火之光猶增日月之曜魏書安同子原傳惟時三事若三階之在天惟兹四輔若四時之成歲周書蘇綽傳凡厥在位譬諸股肱若濟巨川義同舟檝北史隋本紀下天道不言功成四序聖皇垂拱任在百司隋書元壽傳寡人之有仲父也猶飛鴻之有羽翼也若濟大水有舟楫也管子霸形夫管仲民之父母也將欲治其子不可棄其父母管子小匡與驥逐走即人不勝驥託於車上即驥不勝人故善用道者乗人之資以立功以其所能託其所不能也文子上仁與馬逐走筋絶不能及也上車攝轡馬服衡下伯樂相之王良御之明主乗之無御相之勞而致千里善乗人之資也文子上仁先王置士也舉賢用能無阿於世仁人居左忠臣居前義臣居右聖人居後左法仁則春生殖前法忠則夏功立右法義則秋成熟後法聖則冬閉藏先王用之髙而不墜安而不亡此萬物之本􅳩天地之門戸道德之益也鶡冠子道端鄧析謂伯豐子曰汝知養養之義乎受人養而不能自養者犬豕之類也養物而物為我用者人之力也使汝之徒食而飽衣而息執政之功也長㓜羣聚而為牢籍庖厨之物奚異犬豕之類乎伯豐子不應伯豐子之從者越次而進曰大夫不聞齊魯之多機乎有善治土木者有善治金革者有善治聲樂者有善治書數者有善治軍旅者有善治宗廟者羣才備也而無相位者無能相使者而位之者無知使之者無能而知之與能為之使焉執政者乃吾之所使子奚矜焉列子仲尼古者之置正長也將以治民也譬之若絲縷之有紀而􅘩罟之有綱也將以運役天下淫暴而一同其義也墨子夫聖人不自用其聰明思慮而任之天下故明者為之視聰者為之聴智者為之謀若雲從龍風從虎霈然而莫之禦鬼谷子符言註一曰長目二曰飛耳三曰樹明鬼谷子符言立天子以為天下非立天下以為天子也立國君以為國非立國以為君也立官長以為官非立官以為官長也慎子威德便嬖左右者人主之所以窺逺收衆之門戸牖嚮也不可不早具也荀子君道人主不可以獨也卿相輔佐人主之基杖也不可不早具也荀子君道天下國有俊士世有賢人迷者不問路溺者不問遂亡人好獨荀子大略人主者以官人為能者也匹夫者以自能為能者也人主得使人為之匹夫則無所移之百畝一守事業窮無所移之也今以一人兼聴天下日有餘而治不足者使人為之也荀子王霸大有天下小有一國必自為之然後可則勞苦耗悴莫甚焉如是則雖臧獲不肯與天子易勢業荀子王霸篇揺木者一一攝其葉則勞而不徧左右拊其本而葉徧揺矣臨淵而揺木鳥驚而髙魚恐而下善張網者引其綱若一一攝萬目而後得則是勞而難引其綱而魚已囊矣故吏者民之本綱者也故聖人治吏不治民韓非子外儲説右欲成方圓而隨於規矩則萬事之功形矣而萬物莫不有規矩議言之士計㑹規矩也聖人盡隨於萬物之規矩故曰不敢為天下先韓非子解老立官者以全生也今世之惑主多官而反以害生則失所為立之矣譬之若修兵者以備冦也今修兵而反以自攻則亦失所為修之矣吕氏春秋本生今五音之無不應也其分審也宫徵商羽角各處其處音皆調均不可以相違此所以不受也賢主之立官有似於此百官各處其職治其事以待主主無不安矣吕氏春秋圜道凡為善難任善易奚以知之人與驥俱走則人不勝驥矣居於車上而任驥則驥不勝人矣人主好治人官之事則是與驥俱走也必多所不及矣夫人主亦有居車無去車則衆善皆盡力竭能矣吕氏春秋審分祓篲日用而不藏於篋故用則衰動則暗作則倦衰暗倦三者非君道也大橈作甲子黔如作虜首容成作厯羲和作占日尚儀作占月后益作占歲胡曹作衣夷羿作弓祝融作市儀狄作酒髙元作室虞姁作舟伯益作井赤翼作臼乗雅作駕寒衰作御王氷作服牛史皇作圖巫彭作毉巫咸作筮此二十官者聖人之所以治天下也聖王不能二十官之事然而使二十官盡其巧畢其能聖王在上故也聖王之所不能也所以能之也所不知也所以知之也養其神修其德而化矣豈必勞形愁弊耳目哉是故聖王之德融乎若月之始出極燭六合而無所窮屈昭乎若日之光變化萬物而無所不行神合乎太一生無所屈而意不可障精通乎鬼神深㣲𤣥妙而莫見其形吕氏春秋勿躬趙襄子之時以任登為中牟令上計言於襄子曰中牟有士曰膽胥已請見之襄子見而以為中大夫相國曰意者君耳而未之目耶為中大夫若此其易也非晉國之故襄子曰吾舉登也已耳而目之矣登所舉吾又耳而目之是耳目人終無已也遂不復問而以為中大夫襄子何為任人則賢者畢力人主之患必在任人而不能用之用之而與不知者議之也吕氏春秋知度夫馬者伯樂相之造父御之賢主乗之一日千里無御相之勞而有其功則知所乗矣今召客者酒酣歌舞鼓瑟吹竽明日不拜樂己者而拜主人主人使之也先王之立功名有似於此使衆能與衆賢功名大立於世不予佐之者而予其主使之也譬之若為宫室必任巧匠奚故曰匠不巧則宫室不善夫國重務也其不善也豈特宫室哉巧匠為宫室為圓必以規為方必以矩為平直必以凖繩功己就不知規矩繩墨而賞匠巧匠之宫室已成不知巧匠而皆曰善此某君某王之宫室也此不可不察也棗棘之有裘狐之有也食棘之棗衣狐之皮先王固用非其有而已有之吕氏春秋分職夫據除而窺井底雖達視猶不能見其睛借明於鑑以照之則寸分可得而察也是故明王之耳目不勞精神不竭物至而觀其象事來而應其化淮南子主術訓目所見不過十里而欲遍照海内之民哀樂弗能給也無天下之委財而欲遍贍萬民利不能足也淮南子濟俗訓昔堯之佐九人舜之佐七人武王之佐五人堯舜武王於九七五者不能一事焉然而垂拱受成功焉善乗人之賢也故人與驥逐走則不勝驥託於車上則驥不能勝淮南子道應訓匹夫百畮一守不遑啟處無所移之也以一人兼聽天下日有餘而治不足使人為之也處尊位者如尸守官者如祝宰尸雖能剥狗燒彘弗為也弗能無虧俎豆之列次黍稷之先後雖知弗教也弗能無害也不能祝者不可以為祝無害於為尸不能御者不可以為僕無害於為佐故位愈尊而身愈佚身愈大而事愈少譬如張琴小絃雖急大絃必緩淮南子詮言訓凡用人之道若以燧取火疏之則不得數之則弗中正在疏數之間淮南子説林訓夫載重而馬羸雜造父不能以致逺車輕馬良雖中工可使追速是故聖人舉事也豈能拂道里之數詭自然之性以曲為直以屈為伸哉未嘗不因其資而用之也淮南子主術訓治身者以積精為寳治國者以積賢為道身以心為本國以君為主精積於其本則血氣相承受賢積於其主則上下相制使使血氣相承受則形體無所苦上下相制使則百官各得其所形體無所背然後身可得而安也百官各得其所然後國可得而守也春秋繁露通國身藍有青而絲假之青於藍地有黄而絲假之黄於地藍青地黄猶可假也仁義之事不可假乎哉東海之魚名曰鰈比目而行不相得不能達北方有獸名曰婁更食而更視不相得不能飽南方有鳥名曰鶼比翼而飛不相得不能舉西方有獸名曰蹷前足鼠後足兎得甘草必銜以遺蛩蛩距虚其性非能蛩蛩距虚將為假之故也夫鳥獸魚猶相假而况萬乗之主而獨不知假此天下英雄俊士與之為伍則豈不病哉故曰以明扶明則昇於天以明扶闇則歸其人兩瞽相扶不傷墻木不陷井穽則其幸也韓詩外傳人主之疾十有二發非有賢醫莫能治也何謂十二發痿蹶逆脹滿支膈肓煩喘痺風此之曰十二發賢醫治之何曰省事輕刑則痿不作無使小民饑寒則蹶不作無令財貨上流則逆不作無令倉廩積腐則脹不作無使府庫充實則滿不作無使羣臣縱恣則支不作無使下情不上通則膈不作上材恤下則肓不作法令奉行則煩不作無使下怨則喘不作無使賢伏匿則痺不作無使百姓歌吟誹謗則風不作夫重臣羣下者人主之心腹支體也心腹支體無疾則人主無疾矣故非有賢醫莫能治也人皆有此十二疾而不用賢醫則國非其國也韓詩外傳先君能以人之長續其短以人之厚補其薄是以辭令窮逺而不逆兵加於有罪而不頓説苑君道宓子賤治單父彈鳴琴身不下堂而單父治巫馬期亦治單父以星出以星入日夜不處以身親之而單父亦治巫馬期問其故於宓子賤宓子賤曰我之謂任人子之謂任力任力者固勞任人者固佚人曰宓子賤則君子矣佚四肢全耳目平心氣而百官治任其數而已矣巫馬期則不然弊性事情勞煩教詔雖治猶未至也説苑政理髙樓無柱顛僵不久紂失三仁身死牧野焦氏易林家人之升執斧破薪使媒求婦焦氏易林家人之漸上九崔嵬不崩賴彼峽於兩切崥方爾切測曰崔嵬不崩羣士橿僵橿太𤣥經第一增上九與荼有守辭于盧首不殆測曰與荼有守故愈新也太𤣥經第五守次五割其股肱喪其服馬測曰割其股肱亡大臣也太𤣥經第六割是故養壽之士先病服藥養世之君先亂任賢是以身常安而國永永也潜夫論思賢君以臣為基然後髙能可崇也馬肥然後逺能可致也人君不務此而欲致太平此猶薄趾而望髙墻驥瘠而責逺道其不可得也必矣潜夫論班禄輔之於人猶杖之扶疾也人有病須杖而行王充論衡問孔篇故疾步累趨未若託乗乎逸足尋飛逐走未若假伎乎鷹犬抱朴子外篇任能騁逸策迅者雖遺景而不勞因風凌波者雖濟危而不傾是以元凱分職而則天之勲就伊吕既任而革命之功成抱朴子外篇博喻能任賢自輔猶髙峻之山賴峽崥也太𤣥經第一增解崔嵬當崩而不崩者以用疆足之故也髙位之君而不危者以有賢輔之臣也太𤣥經第一增解鳴者律之所生言者法之所出法律皆衆人所為聖人就用之故無不當而未之嘗言未之嘗為也郭子註莊寓言工匠之利利斧猶明君之利利賢也匠非斧無以展其巧君非賢臣無與共其治太𤣥經第三斷解雷當託雲猶君之託臣也二世不恤天下人有畔心象獨號令而無臣也前漢書註楚元王傳網之有綱紀猶君之有股肱也綱紀張則網目正股肱良則庶事康揚子法言註先知篇周書陰符曰四輔不存若濟河無舟矣李善註文選思𤣥賦譬猶芟刈股肱獨任胸腹浮舟江海捐棄楫櫂觀者為之寒心文選曹元首六代論五行錯而致用四時違而成歲是以百官恪居以赴八音之離明君執契以要克諧之㑹文選陸士衡演連珠輶車運在輪飛骨須六翮文選任彦升讓吏部表註通壤引川則溺者安任賢用能則亂者理文選任彦升薦士表振鷺雖飛非六翮無以翔四海帝王雖賢非良臣無以濟天下廣文選王仲宣倣連珠良匠度其材而成大厦明主器其士而建功業廣文選班固連珠鸞鳳養六翮以凌雲帝王乗英雄以濟民廣文選班固連珠一目視則不明一耳聽則不聰一足少則不行選賢自代上下各得其所意林太公金匱天道不言資寒暑而成歲宸居垂拱寄守宰以宣風藝文類聚治政部薦舉表翼德扶耆捨杖焉資輔相天地匪賢而誰藝文類聚服飾部杖銘逢蒙雖巧必得良弓賢主雖智亦待英雄藝文類聚人部鑒誡詩堯分四岳是以望秩山川舜命九官是以光華日月文苑英華庾信藩王讓官表鳳有翼龍有鱗君不獨興必須良臣初學記帝王部總叙帝王註舜嘗駕五龍以騰唐衢武嘗服九駮以馳文塗此上御也太平御覽皇王部帝舜有虞氏漢祖驂三龍而乗雲路振長策而驅天下玉海官制人物器使采葑采菲無以下體詩國風谷風瘖聾跛躃斷者侏儒百工各以其器食之禮記王制墨者使守門劓者使守關宫者使守内刖者使守囿髠者使守積周禮秋官掌戮楚昭王使由于城麇復命子西問髙厚焉弗知子西曰不能如辭城不知髙厚小大何知對曰固辭不能子使余也人各有能有不能王遇盗於雲中余受其戈其所猶在袒而視之背曰此余所能也脾洩之事余亦弗能也左傳定公五年夫聖人之作樂不可以自娛也所以觀得失之效者也故聖人不取備於一人必從八能之士故撞鍾者當知鍾擊鼓者當知鼓吹管者當知管吹竽者當知竽擊磬者當知磬鼓琴者當知琴後漢書志禮儀中註為天下宰匠欲大收物之力而不量才節任隨器付業蜀志馬良傳註物各有所施榱椽之材不合以為藩落也晉書褚裒傳夫興化之要在於官人才非一流職有不同譬諸林木洪纎枉直各有攸施晉書傅咸傳人各有能有不能譬繒中之好莫過錦錦不可以為幍榖中之美莫過稻稻不可以為齎是以聖王使人必先以器茍非周材何能悉長晉書袁甫傳鳬鶴從方所憂去矣宋書孔覬傳便當隨彼方圓飾之矩矱陳書後主紀大夏云構非一木之枝帝王之功非一士之略長短殊用大小異宜㮞棁棟梁莫可棄也隋書李諤列傳重而後損之是不知任也輕而後益之是不知器也不知任不知器不可謂之有道管子立政地不同生而任之以一種責其俱生不可得人不同能而任之以一事不可責徧成責焉無已智者有不能給求焉無饜天地有不能贍也晏子春秋問上任人之長不强其短任人之工不强其拙晏子問上奔蜂不能化藿蠋越雞不能伏鵠卵魯雞固能矣雞之與雞其德非不同也有能與不能者其才固有巨小也莊子庚桑楚是不能治百人者使處乎千人之官不能治千人者使處乎萬人之官墨子尚賢中聖人之用士也各因其材而用之無所去取也齊王以所好求士亦如守白命馬豈得士乎公孫龍子跡府註使輕貨者出費則費可全使輕難者據危則危可安使達數者立功則功可成總三材而用之可以光耀千里豈徒十二乗而已鬼谷子謀篇註使雞司夜令狸執鼠皆用其能上乃無事韓非子揚權世之所不足者理義也所有餘者妄茍也民之情貴所不足賤所有餘故布衣人臣之行潔白清廉中繩愈窮愈榮雖死天下愈髙之所不足也然而以理義斵削神農黄帝猶有可非微獨舜湯飛兎要褭古之駿馬也材猶有短故以繩墨取木則宫室不成矣吕氏春秋離俗夫華騮騄耳一日而至千里然其使之搏兎不如豺狼伎能殊也鴟夜撮蚤蚊察分秋毫晝日顛越不能見丘山形性詭也夫螣蛇游霧而動應龍乗雲而舉猿得木而捷魚得水而騖故古之為車也漆者不畫鑿者不斵工無二伎士不兼官各守其職不得相姦人得其宜物得其安是以器械不苦而職事不嫚淮南子主術訓今人之才或欲平九州幷方外存危國繼絶世志在直道正邦决煩理拏而乃責之以閨閣之禮隩窔之間或佞巧小具諂進愉説隨鄉曲之俗卑下衆人之耳目而乃任之以天下之權治亂之機是猶以斧􅗴毛以刃抵木也皆失其宜矣淮南子主術訓賢主之用人也猶巧工之制木也大者以為舟航柱樑小者以為楫楔修者以為櫚欀短者以為侏儒枅櫨無大小修短各得其所宜規矩方圓各有所施天下之物莫凶於雞毒然而良醫槖而藏之有所用也是故林莽之材猶無可棄者而况人乎鹿之上山獐不能跂也及其下牧竪能追之才有所修短也是故有大略者不可責以無巧有小智者不可任以大功人有其才物有其形有任一而太重或任百而尚輕譬猶狸之不可使搏牛虎之不可使搏鼠也淮南子主術訓聾者可令嗺䈥而不可使有聞也瘖者可使守圍而不可使言也形有所不周而能有所不容也淮南子主術訓天雄烏喙藥之凶毒也良醫以活人侏儒瞽師人之困懟者也人主以備樂是故聖人制其剟材無所不用矣淮南子繆稱訓夫待騕褭飛兎而駕之則世莫乗車待西施毛嬙而為配則終身不家矣然非待古之英俊而人自足者因所有而並用之夫騏驥千里一日而通駑馬十舍旬亦至之淮南子齊俗訓伊尹之興王功也修脛者使之踏钁强脊者使之負土眇者使之准傴者使之塗各有所宜而人性齊矣胡人便於馬越人便於舟異形殊類易事而悖失處而賤得勢而貴聖人總而用之其數一也淮南子齊俗訓勇者可令進鬬而不可令持牢重者可令埴固而不可令凌敵貪者可令進取而不可令守職廉者可令守分而不可令進取信者可令持約而不可令應變五者相反聖人兼用而材使之夫天地不包一物隂陽不生一類海不讓水潦以成其大山不讓土石以成其髙夫守一隅而遺萬方取一物而棄其餘則所得者鮮而所治者淺矣淮南子泰族訓夫聖人之官人猶大匠之用木也取其所長棄其所短故杞梓連抱而有數尺之朽良工不棄何也知其所妨者細也卒成不訾之器孔叢子居衛待周公而為相則世無别國待孔子而後學則世無儒墨鹽鐵論申韓夫士者貴其用也不必求備故四友雖美能不相兼三人齊致事不一節潛夫論實貢且攻玉以石洗金以鹽濯錦以魚浣布以灰夫物固有以賤理貴以醜化好者矣智者棄短取長以致其功潛夫論實貢大厦之朽棟以之削而為椽則不知其為朽也髙岡之枯竹以之纎而為籠則不知其為枯也藪澤之賤士以之汲而為臣則不知其為賤也僕雖抱朽棟枯竹之資亦可以為良工之一用願先生其汲之天禄閣外史將才禹决江河不秉钁鍤周公築雒不把築杖夫筆墨簿書钁鍤築杖之類也而欲合志大道者躬親為之是使將軍戰而大匠斵也王充論衡程材篇陵三軍者或懼於朝廷之儀暴威武者或困於酒色之娛周易略例明爻然劍㦸不長於縫緝錐鑚不可以擊斷牛馬不能吠守雞犬不任駕乗役其所長則事無廢功避其所短則世無棄材矣抱朴子外篇務正用得其長則才無或棄偏詰其短則觸物無可故輕羅霧縠冶服之麗也而不可以禦流鏑沈閭巨闕斷斬之良也而不可以挑脚刺抱朴子外篇博喻瓊珉山積不能無挾瑕之器鄧林千里不能無偏枯之木論珍則不可以細疵棄巨美語大則不可以少累廢其多故叛主者良平也而吐六奇以安上羣盗者彭越也而建𢎞勲於佐命抱朴子外篇博喻量才而授者不求功於器外揆能而受者不負責於力盡故滅熒燭者不煩滄海扛斤兩者不事烏獲運薪輦鹽不宜枉騏驥之脚碎職瑣任安足屈獨行之俊矣抱朴子外篇博喻物有美惡施用有宜美不常珍惡不終棄紫貂白狐製以為裘鬱若慶雲皎如荆玉此毳衣之美也黶菅蒼蒯編以蓑笠葉微疎絫黯若朽壤此卉服之惡也裘蓑雖異被服寔同美惡雖殊適用則均今處繡戸洞房則蓑不如裘被雪沐雨則裘不及蓑以此觀之適才所施隨時成務各有宜也劉子適才伏臘合歡必歌採菱牽石拖舟則歌嘘􅤍非無激楚之音然而棄不用者方引重抽力不如嘘􅤍之宜也卞莊子之昇殷庭也鳴珮趨蹌温色怡聲及其搏虎必攘袂鼓肘瞋目震呼非不如温顔下氣之美然而不能及者方格猛獸不如攘袂之宜也劉子適才水火金木土穀六府異物而皆有施規矩權衡凖繩六法殊形而各有任故伊尹之興土功也長頸者使之蹋鍤强脊者使之負土眇目者使之凖繩傴僂者使之塗地因事施用仍便效才各盡其分而立功焉劉子適才夫檉栢之斷也大者為之棟梁小者為之椽桁直者中繩曲者中鈎隨材所施未有可棄者是以君子善能拔士故無棄人良匠善能運釿故無棄材劉子適才安陵神童通國之麗也八音繁㑹使以噭吹􅓐聲而人悦之則不及瞽師侏儒之美蛇銜之珠百代之傳璧以之彈鴞則不如泥丸之勁也棠磎之劍天下之銛也用之穫穗曾不如鈎鎌之功也劉子適才萬碩之鼎不可滿以盂水一鈞之鍾不可容於泉流十圍之木不可葢以茅茨榛棘之柱不可負於廣厦何者即小非大之量大非小之器重非輕之任輕非重之制也劉子均任耳之與目同在於身而苦樂有殊不能相救良由造化隔其通七竅理其用也李善註文選陸士衡演連珠足下見直木不可以為輪曲者不可以為桶葢不欲以枉其天才令得其所也文選嵇康絶交書以繩墨取木則宫室不成意林吕氏春秋良匠度其材而成大厦明主器其士而建功業藝文類聚雜文部連珠人各有能此人雖好好莫過錦錦不可以為􅀈太平御覽布帛部錦明目者可使視色聰耳者可使聴音捷疾辭語者可使傳論語徐而安静手巧而心審諦者可使行鍼艾理血氣而調諸逆順察陰陽而兼諸方緩節柔筋而心和調者可使導引行氣疾毒言語輕人者可使唾癰呪病爪苦手毒為事善傷者可使按積抑痺各得其能方乃可行其名乃彰黄帝素問靈樞經官能喻林巻六十七
