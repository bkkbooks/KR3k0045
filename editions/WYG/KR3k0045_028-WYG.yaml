body:
  text: 喻林卷二十八明徐元太撰人事門二十六才盛肅肅兎􅆯椓之丁丁音爭赳赳武夫公侯干城肅肅兎􅆯施于中逵赳赳武夫公侯好仇肅肅兎􅆯施于中林赳赳武夫公侯腹心詩國風兎􅆯視彼中原之野其諸禽獸大而甚有故儦儦然有趨者俟俟然有行者其趨行或三三為羣或二二為友毛詩正義吉日夫十歩之間必有茂草十室之邑必有忠信是故亂殷有三仁小衛多君子後漢書王符列傳方斯之際處士山積學者川流衣裳被宇冠盖雲浮譬猶衡陽之林岱隂之麓伐尋抱不為之稀蓺拱把不為之數悠悠罔極亦各有得彼採其華我收其實後漢書崔駰列傳譬猶鍾山之玉泗濱之石累珪璧不為之盈採浮磬不為之索後漢書蔡邕列傳方今朝士山積髦俊成羣猶鱗介之潛乎巨海毛羽之集乎鄧林㳺禽逝不為之尠浮魴臻不為之殷蜀志卻正傳聞延陵之理樂覩吾子之治易乃知東南之美者非徒㑹稽之竹箭也吴志虞翻傳自時厥後龍宗有麟鳯集有翼華陽國志信乃金相玉潤埜㑹川冲埒美前修垂裕來葉晉書文苑傳以八紘之廣兆庶之衆豈當無卓越雋逸之才乎譬猶南海不少明月之寳大宛不乏千里之駒也晉書華譚傳始知天族多竒玉林皆寳晉書慕容超傳抱玉者連肩握珠者踵武梁書鍾嶸傳人謂得𤣥珠於赤水策奔電於崑邱開四照於春華成萬寳於秋實北齊書文苑傳㕘之有隋多士取其開物成務皆廊廟之榱桷亦北辰之衆星也隋書李諤史臣傳造父攝轡馬無駑良皆可取道周公之時士無賢不肖皆可與言至治鹽鐵論利議伯虎仲熊徳義洵美焦氏易林申之姤大都王市稠人多寳焦氏易林損之萃乃屯敶我車前後千乗齊以玉爲車轄並馳左右言從已者衆皆有玉徳宜輔千乗之君也王逸注楚辭離騷經大國多良才譬海出明珠曹子建贈丁廙千龍並馳萬驥徂征紛紜交競逝若流星嵇中散集卜疑集經世之士悠悠皆是一日無君惶惶如也譬猶藍田之積玉鄧林之多材良工大匠肆意所用亦何必棲魚而沈鳥哉抱朴子外篇逸民或以文藝而龍躍或以武功而虎踞抱朴子外篇自序披其藂薄非無香草視其涯㟁皆有潤珠書品崑山積瓊玉廣厦構衆材㳺鱗萃靈沼撫翼希天階文選潘尼贈王元貺詩家有千里驥而不珍焉人懐盈尺和氏而無貴矣文選曹植與吴季重書龍徳時乗羣才雲駭藹若鄧林之㑹逸翰爛若溟海之納奔濤補文選郭璞客傲羈九有之竒駿咸總之於一朝豈惟豐沛之英南陽之豪昆吾挺鋒驌驦軒髦杞梓競敷蘭荑爭翹嚶聲冠於伐木援類䌓乎拔茅是以水無浪士巖無幽人刈蘭不暇爨桂不給安事錯薪乎補文選郭璞客傲如彼和肆莫匪瓊瑶如彼儀鳳樂我雲韶補文選潘尼釋奠頌如彼崑山列此琚玉藝文類聚嵗時部三月三日詩誠以鄧林昆吾翔鳳所棲懸黎和肆垂棘所集藝文類聚治政部薦舉書今日之行觸目見琳琅珠玉世説新語容止才難夫物之有材者其精華之藴神明之所固䕶而祕惜不可以知力窺也蒙金以沙固玉以璞珠之所生漩桓之淵而隈澳之下也豫章楩柟之可以大斵者必在夫大山窮谷孱顔嶇峿之區抉剔之椅摭之剥削之茍不中于程度則有虎狼蛟噩虺蜴之變雷霆崩墜覆壓之虞何以故天地之生材也實難其有以生也必有所用也子華子晏子物以少者爲貴多者為賤至於人事豈獨不然故藜藿彌原而芝英不泄枳棘被野而尋木間秀沙礫無量而珠璧甚尠鴻隼屯飛而鸞鳳罕出虺蜴盈藪而虬龍希覿抱朴子内篇明本累世一聖是繼踵千里一賢是比肩意林任子伯樂敎其憎者相千里馬教其愛者相駑馬以千里馬世一有其利少駑馬多其利多也藝文類聚獸部馬譬如大地少處出生金銀等寳多處出生沙石瓦礫波羅蜜多經五百二十譬如海寳無價者少餘寳甚多華手經卷二驥及和氏以希為貴今若家有千里人懐盈尺即驥及和氏寧得珍貴乎李善註文選曹子建與吴季重書勞苦辛苦之味入口猶困阨之事在身故謂殃厄勞役之事爲辛苦也尚書正義洪範陟彼崔嵬我馬虺隤音灰頹陟彼髙岡我馬𤣥黄陟彼砠音疽矣我馬瘏音塗矣詩國風卷耳肅肅鴇羽集于苞栩音許王事靡盬音古不能蓺稷黍肅肅鴇翼集于苞棘王事靡盬不能蓺黍稷肅肅鴇行音杭集于苞桑王事靡盬不能蓺稻粱詩國風鴇羽蜎蜎音娟者蠋音蜀烝在桑野敦音堆彼獨宿亦在車下詩國風東山緜蠻黄鳥止于丘阿道之云遠我勞如何飲之食之教之誨之命彼後車謂之載之緜蠻黄鳥止于丘隅緜蠻黄鳥止于丘側詩小雅緜蠻何草不黄何日不行叶戸郎反何人不將經營四方何草不𤣥何人不矜音鰥哀我征夫獨爲匪民匪兕匪虎率彼曠野哀我征夫朝夕不暇有芃音蓬者狐率彼幽草有棧上板反之車行彼周道詩小雅何草不黄大東刺亂也東國困於役而傷於財譚大夫作是詩以告病焉毛詩大東北山大夫刺幽王也役使不均已勞於從事而不得養其父母焉毛詩北山君子仕於亂世其顔色痩病如魚勞則尾赤鄭氏箋詩汝墳荼誠苦矣而君子於已之苦毒又甚于荼比方之荼則甘如薺鄭氏箋詩谷風有杕然特生之杜猶得其時有晥然其實蕃滋得所我君子獨行役勞苦不得安於室家以盡天性而生子孫乃杕杜之不如毛詩正義杕杜鴇鳥之羽飛而集于苞栩之上以興君子之人乃下從于征役之事然鴇之性不樹止今乃集于苞栩之上極爲危苦喻君子之人當居平安之處今乃下從征役亦甚為危苦毛詩正義鴇羽蜎蜎然者桑中之蠋蟲常久在桑野之中似有勞苦以興敦敦然彼獨宿之軍士亦常在車下而宿甚為勞苦毛詩正義東山有専専然繋綴於蔓者𤓰也而其瓣甚苦既繋苦於蔓似如勞苦而其瓣又苦以喻君子繋屬於軍是事苦也又憂軍事是心又苦也毛詩正義東山役人若是野獸可常在外今非是兕非是虎何為久不得歸常循彼空野之中與兕虎禽獸無異乎毛詩正義何草有芃芃然而小者當狐也此狐本是草中之獸故可循彼幽草今我有棧之輦車人輓以行此人本非禽獸何為行彼周道之上常在外野與狐在幽草同乎毛詩正義何草𤣥黄虺隤行者勞疲役夫憔悴喻時不歸焦氏易林乾之革乗雲帶雨與飛鳥俱焦氏易林同人之泰九里十山道却峻難牛馬不前焦氏易林咸之觀踐履寒氷十歩九尋惟有苦痛不為病憂焦氏易林明夷之乾隔在九山往來勞難焦氏易林睽之否歴險登危道逺勞疲焦氏易林蹇之秦道渉多阪牛馬蛇蟺焦氏易林蹇之既濟驥疲鹽車出於銜箠焦氏易林夬之井霄冥髙山道險峻難王孫罷極困於阪間焦氏易林小過之頤聖人憂世深思事勤愁擾精神感動形體故稱堯若腊舜若腒桀紂之君垂腴尺餘王充論衡語増篇枯桑無枝尚知天風海冰廣大尚知天寒君子行役豈不離風寒之患乎李善注文選飲馬長城窟行身如大火身如大風身如谷中響如水中影無暫安時海空智藏經供獻品菩薩在樹下坐禪有一烏一鴿一虺自相問何等為苦烏言飢最為苦何以知為苦飢不能行亦不能有所作人坐飢餓死以是知飢為苦鴿言觸色爲苦何以故知色為苦人意念色無有終極人皆坐色死以是知色為苦虺言獨瞋恚為苦何以故知瞋恚為苦人瞋恚無所避欲自殺亦欲殺人故知瞋恚為苦惟日雜難經危困九三伏戎于莽升其髙陵三嵗不興易同人六五貞疾恒不死象曰六五貞疾乗剛也恒不死中未亡也易豫初九屨校滅趾无咎易噬嗑初六剥牀以足篾貞凶易剥六二剥牀以辨篾貞凶易剥六四剥牀以膚凶易剥上六過渉滅頂凶易大過初六習坎入于坎窞凶象曰習坎入坎失道凶也易坎上六係用徽纆寘于叢棘易坎初九壯于趾征凶有孚易大壯九三小人用壯君子用㒺貞厲羝羊觸藩羸其角易大壯上六羝羊觸藩不能退不能遂无攸利艱則吉易大壯初九明夷于飛垂其翼易明夷六三見輿曳其牛掣其人天且劓无初有終易睽九三臀无膚其行次且厲易姤初六臀困于株木入于幽谷三嵗不覿易困六三困于石據于蒺藜易困九四來徐徐困于金車易困上六困于葛藟于臲卼易困九三艮其限列其夤厲薫心易艮上九鳥焚其巢旅人先笑後號咷䘮牛于易凶易旅剠額為天截鼻為劓既處二四之間皆不相得其為人也四從上刑之故剠其額二從下刑之又截其鼻故曰其人天且劓周易正義睽民畏紂之虐危懼不安若崩摧其角無所容頭孔子傳書泰誓中中谷有蓷吐雷反暵音罕其乾矣中谷有蓷暵其修矣中谷有蓷暵其濕矣詩國風中谷有蓷魚在于沼叶音灼亦匪克樂潛雖伏矣亦孔之炤音灼雅詩小正月相去聲彼泉水載清載濁叶殊五反我日構禍曷云能榖詩小雅四月巢之翹翹而危以其所託枝條弱也以喻今我子孫不肖故使我家道危也鄭氏箋詩鴟鴞狀如舟之流行無制之者不知終所至也鄭氏箋詩小弁王無恩恵於天下天下之人如旱嵗之草皆枯槁無潤澤如樹上之棲苴鄭氏箋詩召旻室如懸磬野無青草何恃而不恐左傳僖公二十六年如魚竀尾衡流而方羊裔焉左傳哀公十七年南夷與北狄交中國不絶若綫公羊僖公四年服虔云鹿得美草呦呦相呼至于困廹將死不暇復擇善音急之至也春秋正義文公十六年夫子之在此猶燕之巢於幕也史記吴世家鷹隼横厲鸞徘徊兮矰若浮猋動則機兮叢棘棧棧曷可栖兮發忠亡身自繞㒺兮寃頸折翼庸得往兮前漢書息夫躬傳有一窮鳥戢翼原野罩網加上機穽在下前見蒼隼後見驅者繳彈張右羿子彀左飛丸激矢交集於我思飛不得欲鳴不可舉頭畏觸揺足恐墮内獨怖急乍冰乍火後漢書文苑列傳細政苛慘科防互設矰繳充蹊阬穽塞路舉手挂網羅動足蹈機埳後漢書袁紹列傳雖欲竭誠而盡忠路絶險而靡縁九重既不可啟又羣吠之狺狺後漢書文苑列傳嚴文尅剥痛於霜雪張羅海内設罝萬里逐臣者窮人迹追臣者極車軌後漢書冦恂傳論閶闔九重陷穽歩設舉趾觸罘罝動行絓羅􅃠後漢書冦恂傳論創基冰泮之上立足枳棘之林後漢書黄瓊傳欲使墜萬仭之阬踐必死之地令陛下忽慈母之仁發投杼之怒後漢書冦恂傳論將軍不覩盛衰之紀成敗之符譬如野火在原蹈履河冰火滅冰泮將何所依附蜀志呂覬傳以累卵之身處雷霆之衝繭粟之質當豺狼之路其見吞噬豈抗脣齒晉書王濬傳雖茹荼之苦銜蓼之辛何以諭之晉書苻丕記今猶俎上肉任人膾截耳晉書孔愉傳至若蘭芷傾䪺桂林移埴根萌未樹而牙淺弦急每恐風波潛駭危機宻發此所以怵惕於長衢也晉書趙至傳陵九折於卭僰汎衝波於呂梁宋書傅亮傳將軍魚㳺於沸鼎之中燕巢於飛幕之上不亦惑乎梁書陳伯之傳延膠船而越水若朽索而乗奔魏書李順希仁弟騫傳時無逸勒路盈摧輪魏書宗欽傳予一生而三化備荼苦而蓼辛鳥焚林而鍜翮魚奪水而暴鱗北齊書文苑顔之推傳横生瘡痏動挂網羅北史周本紀上亡魂禠魄若牛兄之遇獸心戰色沮似葉公之見龍隋書盧思道傳莒客之踵躋焦原匹兹非險齊人之手執馬尾方此未危隋書盧思道傳㦸既在脰劔既在心晏子雜上荒飆怒號而獨秀者先隕霜露宵零而朱草立槁媾市之徒又從而媒孽以髠揺之是以萌意於方寸未有毫分也而觸機穽展布其四體未有以爲容也而得桎梏懐抱其一槩之操泯泯黙黙而願有以試也而漫漫之長夜時未旦也疾雷破山澍雨如霪雞喑於塒而失其所以爲司晨也子華子神氣今巨楚縣吾前大燕鰌吾後勁魏釣吾右西壤之不絶若繩荀子彊國今矰繳機而在上􅘩罟張而在下雖欲翺翔其勢焉得淮南子俶真訓語曰五盜執一良人枉木惡直繩今欲下鍼石通闗鬲則恐有盛胡之累懐鍼槖艾則被不工之名狼跋其胡載􅠶其尾君子之路行止之道固狹耳此子石所以歎息也鹽鐵論塩鐵鍼石縞素不能自分於緇墨聖賢不能自理於亂世鹽鐵論非鞅心憧憧若渉大川遭風而未薄鹽鐵論刺復車傾盖亡身常憂惶焦氏易林乾之屯山險難登澗中多石車馳轊擊載重傷軸焦氏易林乾之謙弱足刖跟不私出門市賈不利折亡為患焦氏易林乾之鼎路多枳棘歩刺我足焦氏易林屯之賁蠆室蜂戸螫我手足不可進取為身害咎焦氏易林屯之明夷雌單獨居歸其本巢毛羽憔悴志如死灰焦氏易林需之否蹇兎缺唇行難齒寒焦氏易林訟之復虎厲其牙以待犬猪往必傷殘摧敗無餘焦氏易林訟之鼎干旄旌旗執幟在郊雖有寳珠無路致之焦氏易林師之随駕駟逐狐輪掛荆棘車不結轍公子無得焦氏易林小畜之觀轅折輪破馬倚僕卧焦氏易林履之兆濟深難渡濡我衣袴焦氏易林泰之坤載石上山歩跌不前焦氏易林同人之小畜雀行求食出門見鷂顛蹶上下㡬無所處焦氏易林大有之萃鹿求其子虎廬之里焦氏易林随之否雞方啄粟為狐所逐走不得食惶怖惕息焦氏易林蠱之升賣袍續食糟糠不飽焦氏易林復之觀襦燒袴燔羸剥飢寒病症凍攣焦氏易林復之益鳥鳴葭端一呼三顛動揺東西危而不安焦氏易林復之井棘鉤我襦為絆所拘焦氏易林坎之大有深水難渉泥塗至轂牛罷不進浮陷為疾焦氏易林坎之蠱据棘履杞趺刺為憂焦氏易林坎之未濟梁破橋壊水深多畏焦氏易林咸之師九登十陟馬跌不前焦氏易林恒之姤路多枳棘前刺我足焦氏易林遯之艮左有噬熊右有嚙虎前觸銕矛後躓强弩無可抵者焦氏易林大壯之大壯東行食榆困於枯株焦氏易林晉之睽鷹飛雉退兎伏不起狐張狼鳴野雞驚駭焦氏易林暌之大壯水深難逰霜寒難渉焦氏易林解之震張羅百目鳥不能北縮頸掛翼困於窘國焦氏易林蹇之頤席多針刺不可以卧為身作累動而有悔焦氏易林困之困虎饑欲食見蝟而伏焦氏易林鼎之渙鳥飛无羽雞鬬折距焦氏易林節之大過焦逆訐而順守之雖辯劘虎牙矣揚子重黎次八足纍纍其歩蹉躟太𤣥經第一差次八升于髙危或斧之梯測曰升危斧梯失士民也太𤣥經第一上次八頸加于矰維䋚翌其繩測曰頸加維䋚無自勞也太𤣥經第四逃次七翕繳惻惻測曰翕繳惻惻被離害也太𤣥經第五翕次六方輪廣軸坎軻其輿測曰方輪坎軻還自震也太𤣥經第六止次八渉于霜雪纍項于䣛思栗切測曰纍項于䣛亦不足生也太𤣥經第六窮次六大車川川上輆于山下觸于川測曰大車川川上下輆也太𤣥經第六難次五出野見虚有虎牧豬􅀈絝與襦測曰出野見虛無所措足也太𤣥經第六劇懼煙炎之燬熸何光芒之敢揚哉蔡中郎集釋誨言天有虎豹地有土伯東有長人西有赤蟻南有雄虺北有増水皆為姦惡以賊害已也王逸註楚辭招魂言已居於衰亂之世常低頭俛視若以背肩負擔丈尺而歩不敢伸要仰首以逺罪過也王逸註楚辭哀時命言已居常怖懼若附强弩機臂畏其妄發上恐牽聫於堆䠶身被矰繳也王逸註楚辭哀時命舉挂時網動亂國經曹子建責躬不見籬間雀見鷂自投羅曹子建野田黄雀行鳥盡良弓藏謀極身心危嵇中散集兄秀才公穆入軍贈詩雙鸞匿景曜戢翼太山崕抗首潄朝露晞陽振羽儀長鳴戯雲中時下息蘭池自謂絶塵埃終始永不虧何意世多難虞人來我疑雲網塞四區髙羅正參差奮迅勢不便六翮無所施隠姿就長纓卒為時所羈嵇中散集兄秀才公穆入軍贈詩立剡鋒之端登方崩之山非所以延年長世逺危之術抱朴子外篇良規􅑆枯之木而當衝風故振太𤣥經第二耎解蹇漦音釐囦囦古淵字屵音業顛顛君音隠退也靡返兟音萃進也靡遷憩於險間愀然佷很同然傳曰漦囦囦水之深也屵顛顛山之髙也君靡返礙乎山也兟靡遷限乎險也元包少隂禽獸驚走得草則伏遇木則栖非其常處茍寄而居值穴而託為人窮廹之意李善註文選西京賦在木􅇅不材故匠者時盼在雁乏善鳴故不免饌賓也李善注文選盧子諒贈劉琨詩根萌未樹故恐風波潛駭牙淺弦急故懼危機宻發李善注文選趙景真與嵇茂齊書鳥不擇木獸不擇音文選吴都賦危素卵之累殻甚𤣥燕之巢幕心戰懼以兢􅋺如臨深而履薄文選西征賦撛白刃以萬舞危冬葉之待霜履虎尾而不噬實要伯於子房文選西征賦身寄虎吻危同朝露文選桓元子薦譙元彦表鳳鳴髙岡以逺罻羅賢聖之徳也鸋鴂之鳥巢于葦苕苕折子破下愚之惑也今江東之地無異葦苕諸賢處之信亦危矣文選陳琳檄吴將校文洪波振壑川無恬鱗驚飆拂野林無静柯何者勢弱則受制于巨力質微則莫以自保文選殷仲文自解表翔鳳嬰籠檻騏驥見維縶文選潘尼迎大駕詩昔如韝上鷹今似檻中猿文選鮑明逺東武吟綿綿女蘿施于松標禀澤洪幹晞陽豐條根淺難固莖弱易彫操皮纖質承此衝飇文選盧諶贈劉琨詩如彼危根當此衝飇文選潘岳楊仲武誄矰弋機而在上兮罻羅張而在下設張辟以娱君兮願側身而無所補文選屈原惜誦負擔荷以丈尺兮欲伸要而不可得外廹脅於機臂兮上牽聫於矰隿音弋哀補文選莊忌時命雖魚鳥之欲安駭風川而回薄補文選謝眺酬徳賦奚異渉海之失柂積薪而待然補文選趙壹疾邪賦若慿舟之失棹譬縁厓而無攀補文選陶潛閒情賦執朽轡以御逸駟承勁風以握秋蓬補文選曹昆對儒如箸弊絮在荆棘中觸地挂閔世説新語排詞白刃交前不救流矢意林魯連子十里九坎牛馬低昻意林太𤣥經輿中塗以回畔兮駟馬驚而横犇執組者不能制兮必折軛而摧轅楚辭劉向逢紛下堂兮見蠆出門兮觸蜂巷有兮蚰蜒邑多兮螳螂楚辭王逸傷時危光似燭察命如絲藝文類聚職官部儀同表譬懸厨之獸如離繳之鳥將充庖鼎以飷鷹鸇藝文類聚人部言志書真欲令三泉之下復鎮之以大石厄乎此時也藝文類聚人部别下書雖事異鑚皮文非刺骨猶復因兹舌杪成此筆端藝文類聚人部言志書枯枝葉易零疲客心易驚藝文類聚嵗時部秋詩騏驥負鹽車垂頭於太行之坂屠者持刀睨之藝文類聚獸部馬推直轡於三危碎平途於九折文苑英華庾信志一賦同冰魚之不絶似蟄蟲之猶蘇良可哀也文苑英華徐陵贈答上書卧薪待火方此弗危繋草從風儔之非切文苑英華徐陵贈答上書塗艱行易跌命舛志難逢文苑英華沈約悲悼一詩累棊十二方此未危懸縷千鈞比斯非切文苑英華􅊾一隋􅊾陳尚書文乗奔牛驚馬未足諭其嶮墜矣漢武帝外傳譬如有人曽行刼盜王所訪括其人惶恐竊入市􅆵於雜閙處欲自藏隠正值其中揺鈴聲鼔宣王教令欲相掩捉彼人爾時更無餘想唯作是念勿我今時為他識知而見擒縶波羅蜜多經卷五百八十譬如無夫之婦無不陵易者放光波羅蜜經譬如生育羣狗逼逐臨大坑澗大寶積經四十一譬如野干於彼塚間為諸羣狗之所搏逐逃迸走避臨大峻厓窮途所逼夜中嘷呌大寶積經四十一如箭著身觸之則痛大寳積經卷九十六猶如商人失其徒侣猶如渉海舟船破壊亦如有人失如意珠又如危峰朽壊之樹為彼猛風揺動吹撃復如龍子為金翅鳥之所銜啄大寳積經卷一百二十如小綿丸小刼貝華丸置四衢道頭四方風吹則随風去向於一方雜阿含經卷十五時有一人逰於曠野為惡象所逐怖走無依見一空井傍有樹根即尋根下潛身井中有黒白二鼠互齧樹根於井四邊有四毒蛇欲螫其人下有毒龍心畏龍蛇恐樹根斷樹有蜂蜜五滴墮口樹摇蜜散下螫斯人野火復來燒然此樹曠野者喻於無明長夜曠逺言彼人者喻於異生象喻無常井喻生死險岸樹根喻命黒白二鼠以喻晝夜齧樹根者喻念念滅其四毒蛇喻於四大蜜喻五欲蜂喻邪思火喻老病毒龍喻死是故當知生老病死甚可怖畏常應思念勿被五欲之所吞廹佛説譬喻經當十譬如大風鼔扇林樹枝柯相棖又如失水之魚宛轉在地又如斬截大樹崩倒狼籍須摩提長者經救亡如惡瘡疱難合其竅痛不可忍大乗經上見於生死諦如水漂岸樹修行道地經慈品譬如險岸大樹上有大風下有大水崩其根土誰當信此樹得久住者三昩法門經卷上譬如人噎旣不得吐又不得咽龍樹菩薩傳籍十驚怖墮床如熱沙中魚大智度論卷三我今如在秤低昻墮死處大莊嚴經論卷九偈譬如燒利劔火光耀入眼執之在側欲以相害於念念中恒生大怖畏随相論卷上喻林卷二十八
