body:
  text: 喻林卷一百九明徐元太撰政治門十四襲弊六四裕父之蠱往見吝易蠱月之行度失道從星所好以致風雨喻人君政教失常從民所欲則致國亂尚書正義洪範與覆車同軌者未嘗安也與死人同病者未嘗生也與亡國同法者未嘗存也晋書􅴶灼傳與覆車同軌者傾與亡國同事者滅見已生慎將生惡其迹者預避之黄石公素書安履匿痼不醫亂政生災焦氏易林暌之大畜夫㿂瘕不除而不修越人之術者難圖老彭之夀也姦黨實繁而不嚴彈造之制者未見其長世之福也抱朴子外篇用刑大魏承衰弊復欲宻其羅蚍蜉猶見得何云鰌與鰕太平御覽蟲豸部蝎更張古之帝王不必以豐儉移都茍宏衞文大帛之冠則無往不可若不績其麻則樂土為虚矣晉書王導傳愛易轍之勤而得覆車之軌晉書江統傳言味者予易牙言音者予師曠言治者予三王三王既已定法度制禮樂而傳之有不用而改自作何以異於變易牙之和更師曠之律荀子大畧輸子之制材木也正其規矩而鑿枘調師曠之諧五音也正其六律而宮商調當世之工匠不能調其鑿枘則改規矩不能協聲音則變舊律是以鑿枘刺戾而不合聲音泛越而不和鹽鐵論刺復言今世之士才知强巧背去規矩更造方圓必不堅固敗材木也以言佞臣巧於言語背違先聖之法以意妄造必亂政治危君國也王逸註楚辭離騷經法無一定而慕權宜之隨時功不倍前而好屢變以偶俗猶剸髙馬以適卑車削附踝以就褊履斷長劔以赴短鞞割尺璧以納促匣也抱朴子外篇博喻且改轍易行非良樂之御易民而治非楚鄭之政願足下勉之而已矣文選曹植與吳季重書九華臺樓觀精巧先稱平衆木輕重然後造無錙銖相結臺雖髙峻常隨風揺動而終無傾倒之理明帝登臺懼其勢危别以大木扶持之樓即頺壊論者謂輕重力偏也玉海宫室臺市上之人有善戴尊者累十尊而行人有與之更者行道未半而以其尊顛困學紀聞卷十諸子屯膏屯其膏施未光也易屯九二井谷射鮒甕敝漏易井九二鼎耳革其行塞雉膏不食易鼎大雨不時行國無恩澤汲冡周書時訓解揚之水不流束薪揚之水不流束楚揚之水不流束蒲詩國風揚之水英英白雲露彼菅茅叶莫侯反天步艱難之子不猶滮符彪反池北流浸彼稻田叶地因反嘯歌傷懷念彼碩人詩小雅白華黍苗刺幽王也不能膏潤天下毛詩黍苗激揚之水至湍迅而不能流移束薪喻平王政教煩急而恩澤之令不行於下民鄭氏箋詩揚之水池水之澤浸潤稻田使之生殖喻王無恩意於申后滮池之不如也鄭氏箋詩白華桑之柔需其葉菀然茂盛謂蠶始生時也人庇陰其下者均得其所及已將采之則葉爆爍而疏人息其下則病於爆爍喻民當被王之恩惠羣臣恣放損王之德鄭氏箋詩桑柔旱嵗之草如水上之苴言其枯槁無潤下民不得王恩亦如是也毛詩正義召旻王無恩於民致使下民如彼嵗之大旱其草不得生遂而盛茂致使此草如彼水上棲止逐流之浮苴也毛詩正義召旻罍大器缾小器常禀於罍者禀所受罄盡則罍為無餘故恥之杜氏解左傳昭公二十四年有復於王者曰吾力足以舉百鈞而不足以舉一羽明足以察秋毫之末而不見輿薪則王許之乎曰否今恩足以及禽獸而功不至於百姓者獨何與然則一羽之不舉為不用力焉輿薪之不見為不用明焉百姓之不見保為不用恩焉孟子梁惠王上寶咳唾之音愛錙銖之力晉書夏侯湛傳收既往之詔奪已澍之施晉書摰虞傳時雨不霑春苗委悴魏書髙祖上紀假獲其利猶是富専口齗不及四體也北史甄琛傳貧賤之望富貴甚微而富貴不能酬其甚微之望夫富者之所惡貧者之所美貴者之所輕賤者之所榮然而弗酬弗與同苦樂故也雖弗酬之於物弗傷今萬民之望人君亦如貧賤之望富貴其所望者盖欲料長幼平賦斂時其饑寒省其疾痛賞罰不濫使役以時如此而已則於人君弗損也然而弗酬弗與同勞逸故也尹文子大道下久旱水涸枯槁無澤焦氏易林師之大壯冦行揺尾逐雲吹水汙泥為陸下田為稷焦氏易林同人之漸泉閉澤竭主母饑渴焦氏易林豫之賁火石相得乾無潤澤焦氏易林賁之渙陸居少泉山髙無雲焦氏易林坎之履初一唫音欽不予丈夫婦處測曰唫不予人所違也太𤣥經第五唫次二唫于血資乾骨測曰唫于血䂄自肥也太𤣥經第五唫霡霂小雨也言裁霡厯霑漬如人沐頭惟及其上枝而根不濡也釋名空穗滿田無所得也以言上不惠施則下不竭其力王逸註楚辭九章瓜苞蕁蔓於地木不下其枝枚則不得虆而蔓之而逹於上民弱於下君不施仁以存恤之上下懸絶不相及也太𤣥經第二達解次四土不和木科橢徒和切測曰土不和病乎民也太𤣥經第六窮吝江河之流不以濯舟船之畔惜東壁之光不以寓貧婦之目補文選夏侯湛扺疑如天亢旱不生華實及水陸所生之物皆悉枯悴無有潤澤不能増長三十六部尊經仙人經如似雲雷降注大雨孔雀歡喜汝於今者但興雲雷未見雨水如此旱雷将何所益無明羅刹經喪亂若苗之有莠若粟之有秕書仲虺之誥今殷其淪喪若涉大水其無津涯書微子百姓懔懍若崩厥角書㤗誓中為天下逋逃主萃淵藪書武成殷政總總若風草有所積有所虛汲冡周書大聚解苦菜不秀賢人潛伏靡草不死國縱盗賊汲冡周書時訓解鴻鴈不來遠人背畔𤣥鳥不歸室家離㪚汲冡周書時訓解民之危險若䧟泥墜火無救之者孔氏傳書仲虺之誥月經於箕則多風離於畢則多雨政教失常以從民欲亦所以亂孔氏傳書洪範無不相冦賊為鴟梟之義以相奪攘孔氏傳書呂刑儒雅與深穽同埋經典共積薪俱燎尚書正義序魴音房魚赬音蟶尾王室如燬詩國風汝墳北風其涼雨雪其雱惠而好我擕手同行北風其喈音皆雨雪其霏惠而好我擕手同歸莫赤匪狐莫黒匪烏惠而好我擕手同車詩國風北門鴥彼飛隼率彼中陵民之訛言寧莫之懲詩小雅沔水駕彼四牡四牡項領我瞻四方蹙蹙靡所騁詩小雅節南山瞻烏爰止于誰之屋詩小雅正月謂山盖卑為岡為陵民之訛言寧莫之懲詩小雅正月佌佌音此彼有屋蔌蔌音速方有榖民今之無祿夭夭是椓音卓詩小雅正月如彼流泉無淪胥以敗詩小雅小旻維南有箕不可以簸揚維北有斗不可以挹酒漿維南有箕載翕其舌維北有斗西柄之掲詩小雅大東四月維夏六月徂暑先祖匪人胡寧忍予秋日凄凄百卉具腓亂離瘼音莫矣奚其適歸冬日烈烈飄風發發民莫不榖我獨何害山有嘉卉侯栗侯梅廢為殘賊莫知其尤相彼泉水載清載濁我日構禍曷云能榖詩小雅四月牂音臧羊墳首三星在罶音柳人可以食鮮可以飽詩小雅苕之華咨女殷商如蜩如螗音唐如沸如􅅅叶盧當反小大近喪去聲叶平聲詩大雅蕩人亦有言顛沛之揭枝葉未有害本實先撥詩大雅蕩如彼嵗旱草不潰茂如彼棲音西苴七如反詩大雅召旻北風􅆁人厭亂之詩詩説􅆁葛藟王族流㪚而作詩説王苕之華景王崩王室亂兵連嵗饉民物盡耗君子自傷生逢其難詩説王雨無正大夫刺幽王也雨自上下者也衆多如雨而非所以為政也毛詩雨無正何草不黄下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸君子憂之毛詩何草不黄不復考慎自有肺腸行其心中之所欲乃使民盡迷惑也鄭氏箋詩桑柔焚輪暴風從上來降謂之頺頺下也扶揺暴風從下升上故曰焱焱上也毛詩正義谷風今日之風非有道之風發發兮大暴疾今日之車非有道之車偈偈然大輕嘌毛詩正義匪風我有圃生之把乎左傳昭公十二年天或者以陳氏為斧斤既斲喪公室而他人有之不可知也左傳哀公十五年梁亡此未有伐者其言梁亡何自亡也其自亡奈何魚爛而亡也公羊僖公十九年城郭不完兵甲不多非國之災也田野不辟貨財不聚非國之害也上無禮下無學賊民興喪無日矣孟子離婁上夫癘雖癰腫胞疾上比前世未至絞纓射股下比近代未至擢筋而餓死也夫劫弑死亡之主也心之憂勞形之困苦必甚於癘矣由此觀之癘雖憐王可也戰國䇿楚考烈王詐國指鹿災生噬虎史記秦始皇賛其威盡勢極閭巷之人為敵國史記律書亡秦鹿走偽楚狐鳴史記項羽贊禍盈斯驗蒼狗為菑史記呂后紀昔秦燔詩書以立私議莽誦六蓺以文姦言同歸殊塗俱用滅亡皆炕龍絶氣非命之運紫色淫聲餘分閏位聖王之驅除云爾前漢書王莽傳賛邊境雷動四野風起京師雖有武蠭精兵未有能窺左足而先應者也前漢書息夫躬傳昔有彊秦封豕其士窫窳其民鑿齒之徒相與摩牙而爭之前漢書楊雄傳天網縱人紘弛王塗壊太極陁君臣土崩上下瓦解後漢書蔡邕列傳彼日而微遂祲天路後漢書安帝紀虎兕長蛇相隨塞路魏志烏丸東夷傳註蚌蛤浮翔於淮泗鼲鼬讙譁於林木魏志任城傳今胷背有嫌首尾多難乃國朝之厄㑹也吳志華覈傳物號忠良於兹拔本人稱妖孽自此疏源晉書惠帝紀自兩京殄覆九土分崩赤縣成􅉬豕之墟紫宸遷鼃黽之穴干戈日用戰争方興猶逐鹿之並驅若瞻烏之靡定晉書符丕列傳每朝㑹貂蟬盈坐時人為之諺曰貂不足狗尾續晉書趙王倫傳難起蕭墻毒痛函夏九州波駭五嶽塵飛晉書王彌列傳貪鄙竊位不知誰升之者獸兕出檻不知誰可咎者網漏吞舟何以過此晉書郤詵傳無賴之徒易相扇動飆風駭蕩則滄海横波晉書劉𢎞傳纂繼凶逆鴟目有年晉書張軌傳豺狼易驚遂肆醜毒晉書譙剛王遜傳塵飛五嶽霧晻三精晉書石季龍下列傳關西為豺狼之藪楊越為鴟鴞之林晉書慕容德記六州蕩然無復餘蔓殘搆至於乳䴏赴時銜泥靡託宋書索虜傳故老遺氓還號舊落桓山之響未足稱哀宋書索虜傳治舟試艦恒以朝廷為旗的秣馬按劔常願天下有風塵南齊書張敬兒傳鴟梟厲吻翦焉已及梁書武帝上紀水羣飛於溟海火載燎於中原魏書李順希仁弟騫傳政亂如風草師亡猶彈丸魏書匈奴劉聰傳未正滄海之流詎息崑山之燎隋書薛道衡傳八紘九野𤓰剖豆分南史陳本紀上廊廟有序翦成狐兔之場珪帛有儀碎夫犬羊之手北史許善心文苑傳吾觀其野草菅勝榖吾觀其衆邪曲勝直太公六韜發啟政令不善墨墨不夜譬若野獸無所朝處管子四稱與死人同病者不可生也與亡國同事者不可存也韓非子孤憤今之世至寒矣至熱矣而民無走者取則行鈞也呂氏春秋功名棄捐五帝之恩刑推蹶三王之法籍是以至德滅而不揚淮南子覽㝠訓水擊則波興氣亂則智昏智昏不可以為政波水不可以為平淮南子齊俗訓天下為之麋沸螘動雲徹席卷淮南子兵畧訓與死者同病難為良醫與亡國同道難與為謀淮南子説林訓夫死病無可為醫夫政令者人君之銜轡所以制下也今齊君失之已久矣子雖欲扶其輈而扶其輪良弗及也孔叢子嘉言夫㪚其本而待之刑辟猶决其牢而發以毒矢也亦可哀乎故曰未可殺也昔者先王使民以禮譬之如御也刑者鞭䇿也今猶無轡銜而鞭䇿以御也欲馬之進則䇿以後欲馬之退則䇿其前御者以勞而馬亦多傷矣今猶此也上憂勞而民多罹刑韓詩外傳今之治民者若御拙馬行則頓之止則擊之身創於箠吻傷於銜求其無失何可得乎鹽鐵論詔聖病之将死也不可為良醫國之将亡也不可為計謀吾數諌吾君吾君不用是以知國之将亡也説苑權謀螟蟲為賊害我五榖箄笥空虚家無所食焦氏易林坤之革武庫軍府甲兵所聚井里邑居不可舍止焦氏易林師之蹇巨蛇大鰌戰於國郊焦氏易林同人之益兩虎相鬭血流浮杵城郭空虚蒿藜塞道焦氏易林同人之鼎水壊我里東流為海龜鳬讙譁不睹我家焦氏易林謙之萃星隕如雨力弱無輔焦氏易林豫之訟白鳥赤烏戰於東都敗悔為憂焦氏易林豫之既濟千嵗廟堂棟橈傾僵天厭周德失其寵光焦氏易林臨之鼎徑路隔塞燕雀驚駭焦氏易林賁之泰羊驚虎狼獮猴羣走焦氏易林坎之臨魚擾水濁桀亂我國焦氏易林无妄之益鳬池水溢髙陸為海江河横流魚鼈成市焦氏易林无妄之震三手六目政多煩惑臯陶瘖聾亂不可從焦氏易林遯之需陰積不已雲作滛雨傷害平陸民無室屋焦氏易林明夷之坎陰霧不清濁政亂民焦氏易林家人之晉且如驚鹿不能定足焦氏易林益之噬嗑揚風偃草塵埃俱起清濁溷㪚忠直隠處焦氏易林蹇之履衆星宵亂不知所據焦氏易林井之復放御委轡奔亂不制法度无常君失其位焦氏易林艮之泰靈龜陸處釡甑草土人知敗國桀亂無緒焦氏易林艮之晉饑蠶作室絲多亂緒端不可得焦氏易林兑之坎江漢上流政逆民憂焦氏易林歸妹之晉烏飛狐鳴國亂不寧下强上弱為陰所刑焦氏易林中孚之大有是以四疆之内各以其力來侵攘肌及骨赧獨何以制秦乎揚子重黎上九車軸折其衡抈四馬就括髙人吐血太𤣥經第一羨次四晦其類失金匱測曰晦其類法度廢也太𤣥經第五晦次七小子牽象婦人徽猛君子養病太𤣥經第六養次六山無角水無鱗困犯身測曰山無角困百姓也太𤣥經第六窮次七趹音决船䟦車其害不遐測曰趹船䟦車不遠害也太𤣥經第六将何以知人且病也以其不嗜食也何以知國之将亂也以其不嗜賢也是故病家之厨非無嘉饌也乃其人弗之能食故遂於死也亂國之官非無賢人也其君弗之能任故遂於亡也夫生飰秔粱㫖酒甘醪所以養生也而病人惡之以為不若菽麥糟糠欲清者此真将死之候也尊賢任能信忠納諫所以為安也而闇君惡之以為不若姦佞闒茸讒䛕言者此其将亡之徴潜夫論思賢漢室之形譬如垂瓦扶則暫安不扶則速危天祿閣外史招賢長城若頹堵雄關若敝甕雖以四塞為襟而烽烟之警每舉祍席之上天祿閣外史傷時上政迷亂則下怨父行悖惑則子恨王逸註楚辭離騷經言上有罥繳弋射之機下有張施罻羅之網飛鳥走獸動而遇害喻君法繁多百姓動觸刑罪也王逸註楚辭九章言秋風疾則草木揺湘水波而樹葉落矣以言君政急則衆民愁而賢者傷矣王逸註楚辭九歌浮雲鬱兮晝昏楚圖潰亂氣未除也霾土忽兮厯厯風俗塵濁不可居也王逸註楚辭九懐亡國之君其朝未嘗無致治之臣也其府未嘗無先王之書也然而不免乎亡者何也其賢不用其法不行也茍書法而不行其事爵賢而不用其道則法無異乎路説而賢無異乎木主也徐幹中論亡國微烟起於蕭牆而飆焚徧於宇宙淺隙發於膚寸而波濤漂乎四極金城屠於庶冦湯池杭於一葦勁鋭望塵而氷泮征人倒戈而奔北飛鋒薦於扆闥左袵掠於禁省禾黍生於廟堂榛莠秀乎玉階雲觀變為狐兎之藪象魏化為虎豹之蹊東序烟燼於委灰生民燋淪於淵火抱朴子外篇漢過駑蹇星馳以兼路豺狼奮口而交争抱朴子外篇安貧陸无含秀之苖水無吐穗之株稗糲曠於圌廩薪㸑廢於庖厨抱朴子外篇守塉逸蚪遶雲奔鯨駭流陶靖節集詩四言夫先王之道墜地乆矣改張易調其興實難苛化虐政其窮必酷故曰大軍之後必有凶年積亂之後必有凶主理當然也關氏易傳卜百年義小過下怫怫音佛上悸悸趾之􅠆音顛爪之墜傳曰下怫怫愎其上也上悸悸懼其下也趾之􅠆足之跌也爪之墜手之失也元包少陰紅塵塞天地白日何冥冥李善註文選兩都賦風驚塵起喻惡積而釁生鹿㪚而不止喻釁生而不滅李善註文選李蕭遠運命論于時景燭雲火風馳羽檄言雲火之多如景之照羽檄之疾若風之馳李善註文選任彦昇文宣王行狀竢時風之清激兮愈氛霧其如塺楚辭劉向遠逝茫茫宇宙上墋下黷波振四海塵飛五岳文選陸士衡功臣頌乾象棟傾坤儀舟覆文選劉琨答盧諶詩王室之亂靡邦不泯如彼墜景曽不可振文選陸機答賈長淵詩彼堯舜之耿介兮既遵道而得路何桀紂之昌披兮夫唯㨗徑以窘步文選屈原離騷經舉動廻山海呼吸變霜露阿㫖曲求則光寵三族直情忤意則参夷五宗漢之綱紀大亂矣文選范蔚宗宦者傳論禮法刑政於此大壊如室斯構而去其鑿契如水斯積而决其隄防如火斯畜而離其薪燎也國之将亡本必先顛其此之謂乎文選干寶晉紀總論弛禮崩樂塗民耳目遂欲流唐漂虞滌殷蕩周文選揚雄劇秦美新譬層棟之将傾必華榱之先落補文選謝眺酬德賦豺牙宻厲虺毒潜吹廣文選庾子山哀江南賦飄風蓬龍埃拂拂兮草木揺落時槁悴兮遭傾遇禍不可救兮廣文選劉子政離世鳥驚獸駭莫知所從於是豪彊並争虎裂狼分疾摶者獲多遲後者見吞廣文選譙允南仇國論呂后專制社稷不傾若髮漢書云如帶公羊云如綫意林晁錯新書欲知人將病不嗜食欲知國將亡不嗜賢也病非無嘉饌病不能食至於死國非無賢人君不能用故速亡理國不得真賢猶治病不得真藥治病當得真人参反得蘿菔服之増劇非藥無效也意林潜夫論陵頹谷踊五行互錯藝文類聚后妃部后妃誄豺狼當路非止一人鯨鯢不梟倐焉五載文苑英華請勸進及封岳行幸沈烱表乃使猛獸欲以為亂比獸之角能以為城舉其尾能以為旌太平御覽獸部􅁫獸秦失金鏡魚目入珠初學記器用部鏡冀州糜沸泫沄如湯初學記州郡部河東道母逐鷓鴣而南去子隨胡馬而北歸夫類日影而西奔婦似川流而東逝法苑珠林卷七十四失民九四包无魚起凶象曰无魚之凶遠民也易垢君夭之在位椓之毛詩正月註寒涼之風病害萬物喻君政教酷暴使民㪚亂鄭氏箋詩北風日之熱恒在日中之後道東之杜人所宜休息也今人不休息者以其特生陰寡也鄭氏箋詩有枤之杜山有美善之草生於海栗之下人取其實蹂踐而害之令不得蕃茂喻上多賦歛富人財盡而弱民與受困窮鄭氏箋詩四月哀哉今之人何故而為虺蜴也虺蜴之性見人則走民聞王政莫不逃避毛詩正義正月皮之不存毛將安傅左傳僖公十四年衆㪚為弱川壅為澤左傳宣公十二年衆怒如水火焉不可為謀左傳昭公十三年衆㪚流移若積水之潰杜氏解左傳文公三年茍無固志盈城之衆一朝而㪚如積水之敗故曰潰春秋正義文公三年以萬乗之國伐萬乘之國簞食壺漿以迎王師豈有他哉避水火也如水益深如火益熱亦運而已矣孟子梁惠王下夫吳民離矣體有所傾譬如羣獸然一个負矢將百羣皆奔王其無方收也國語吳一國棄之如遺跡焉國語楚斬木為兵揭竿為旗天下雲集響應嬴糧而景從史記秦始皇紀天下之患在於土崩不在於瓦解古今一也史記主父傳易曰鳥焚其巢旅人先笑後號咷喪牛于易凶言王者處民上如鳥之處巢也不顧䘏百姓百姓畔而去之若鳥之自焚也雖先快意説笑其後必號而無及也百姓喪其君若牛亡其毛也故稱凶前漢書外戚傳方岳無鈞石之鎮關門無結草之固晉書孝愍帝紀淵池廣魚獨希宋書樂四志去黄取白則衆馬各守其色自殊而去故唯白馬獨應矣王者黨其所私而踈天下則天下各守其踈自殊而叛矣公孫龍子白馬論註百姓賤之如㑌惡之如鬼日欲司間而相與投籍之去逐之荀子王霸篇川淵者魚鼈之居也山林者鳥獸之居也國家者士民之居也川淵枯則魚龍去之山林險則鳥獸去之國家失政則士民去之荀子致仕天下之人其離之若崩其背之也不約而若期賈子連語虎豹之居也厭閑而近人故得魚鼈之居也厭深而之淺故得諸侯厭衆而亡其國新序雜事卷二山石朽弊稍崩墜落下上離心君失其崇焦氏易林謙之垢狐貍雉兎畏人逃去分首竄匿不知所處焦氏易林暌之大有槽空無實豚彘不食庶民屈竭離其居室焦氏易林垢之節鷹隼搏鷙衆雀憂潰焦氏易林既濟之大壯上九海水羣飛蔽于天杭測曰海水羣飛終不可語也太𤣥經第六劇上九螽焚其翊音詡喪于尸測曰螽焚其翊所憑喪也太𤣥經第六堅山有猴猿谷有虺蛇左右衆鳥聞無人民所以愁懼也王逸註楚辭九思根傷則葉枯葉枯則花落花落則實亡武侯十六䇿隂察民欲有畔意若狼之顧望也前漢書註食貨志皮朽則毛落水涸則魚逝其勢然也李善註文選應休璉與曹長思書天下苦秦猶終日擔重而行思息其肩者也文選謝宣遠張子房詩註星辰麗天猶萬國之附王者也下將畔上故星亦畔天補文選襄楷災異䟽孔子曰商汝知君之為君乎子夏曰魚失水則死水失魚猶為水也孔子曰商知之矣藝文類聚帝王部搃載帝王夫國以民為本民勞去者國立廢矣所謂出其無極之寶入賊利斧㦸也西昇經譬如屠家羣中捕猪牽欲殺之餘猪悉聚驚怖側耳聽聲惶懅愕視譬如猛虎羣中摶牛餘牛見之驚怖而走或入山巖或投深谷又入樹間跳騰哮吼譬如魚師持網捕魚餘魚見之怖㪚沈竄石岸草底又如倉鷹臨其衆鳥有所獲取餘鳥見之各㪚飛去修行道地經五陰成敗品喻林卷一百九
