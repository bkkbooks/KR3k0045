body:
  text: 喻林卷九十明徐元太撰文章門五飾外平雖美丈夫如冠玉耳其中未必有也史記陳丞相世家魯哀公問乎顔闔曰吾以仲尼為貞幹國其瘳乎曰殆哉汲汲乎仲尼方且飾羽而畫從事華辭以支為㫖莊子列御寇君子之學也入乎耳著乎心布乎四體形乎動静端而言蠕而動一可以為法則小人之學也入乎耳出乎口口耳之間則四寸耳曷足以美七尺之軀哉荀子勸學篇且先王之賦頌鍾鼎之銘皆潘吾之跡華山之博也韓非子外儲説左上至美素璞物莫能飾也至賢保真偽文莫能增也故金玉不琢美珠不畫今仲由冉求無檀柘之材隋和之璞而强文之譬若雕朽木而礪鉛刀飾嫫母畫土人也被以五色斐然成章及遭行潦流波則沮矣夫重懐古道枕藉詩書危不能安亂不能治郵里逐雞難亦無黨也鹽鐵論殊路次二不增其方而增其光㝠測曰不增其方徒飾外也太𤣥經第一增次六鴻文無范恣於川測曰鴻文無范恣意往也太𤣥經第四文次四粉其題䪻弁雨其渥須視無姝測曰粉題雨須不可忍瞻也太𤣥經第五視次六素車翠葢維視之害貞測曰素車翠葢徒好外也太𤣥經第五視次二無質飾先文後失服測曰無質先文失貞也太𤣥經第五飾鄷文茂記繁如榮華恢諧劇談甘如飴蜜未必得實王充論衡本性篇彼利口者茍美其聲氣繁其辭令如激風之至如暴雨之集徐幹中論覈辯茍言茍辯則小人也雖美説何異乎鵙之好鳴鐸之喧譁哉徐幹中論覈辯以其泉不自中涌而注之者從外來也徐幹中論考偽為小人之道不飾其心而飾其面猶姝姝之好而遇於雨故視無好也太𤣥經第五視解心中所有盡附皮膚抱朴子外篇行品率皆皮膚狡澤而懐空抱虚有似蜀人瓠壺之喻抱朴子外篇疾謬虚談則口吐氷霜行已則濁於泥潦抱朴子外篇呉失竝未能振葉以尋根觀瀾而索源文心雕龍序志昔秦女嫁晉從文衣之媵者晉人貴媵而賤女楚珠鬻鄭為薰桂之櫝鄭人買櫝而還珠若文浮於理末勝其本則秦女楚珠復在於兹矣文心雕龍議對金樽玉杯不能使薄酒更厚文選謝靈運鄴中詩註淮南王安多華少實意林太𤣥經夫論事比類不得其體雖飾以華辭文以美言無異錦繡衣掘株管絃樂土梗非其趨也太平御覧布帛部繡魯人有好釣者以桂為餌黄金之鈎錯以銀碧垂翡翠之綸其持竿處位則是然其得魚不幾矣故曰釣之務不在芳飾事之急不在辯言太平御覽資産部釣譬如畫篋巧工所成中盛臭穢種種不淨大寳積經卷一百一十三飾以珠瓔珞外好如畫瓶禪要呵欲經譬如􅄢賔三藏比邱行阿蘭若法至一王寺寺設大㑹守門人見其衣服麤弊遮門不前如是數數以衣服弊故每不得前便作方便假借好衣而來門家見之聼前不禁既至㑹坐得種種好食先以與衣衆人問言何以爾也答言我比數來每不得入今以衣故得在此坐得種種好食實是衣故得之故以與衣大智度論卷十四夫忠言所以顯理綺語所以垂真法苑珠林卷七十七戒靡畫蛇之説文擅於縱横非馬之談辯離於堅白禮記正義序詩曰衣錦尚絅惡其文之著也故君子之道闇然而日章小人之道的然而日亡中庸連篇累牘不出月露之形積案盈箱唯是風雲之狀北史李諤傳雖如來須彌之寳塔帝釋刀利之神宫尚未足以喻其麗方其飾矣晉書赫連勃勃傳道𨼆於小成言隠於榮華莊子齊物論明主制禮義而為衣分節行而為帶衣足以覆形從典墳虚循撓便身體適行歩不務於奇麗之容隅􅗃之削帶足以結紐收衽束牢連固不亟於為文句疏短之鞵淮南子齊俗訓今之學也非獨為之華藻也又從而繡其鞶帨揚子寡見或曰女有色書亦有色乎曰有女惡華丹之亂窈窕也書惡淫辭之淈法度也揚子吾子篇或問吾子少而好賦曰然童子雕蟲篆刻俄而曰壯夫不為也或曰霧縠之組麗曰女工之蠧矣揚子吾子篇詩人之賦麗以則辭人之賦麗以淫如孔氏之門用賦也則賈誼升堂相如入室矣如其不用何揚子吾子篇綺麗以艷説藻飾以辯雕文辭之變於斯極矣文心雕龍情采夫青生於藍絳生於蒨雖踰本色不能復化文心雕龍通變凡摛表五色貴在時見若青黄屢出則繁而不珍文心雕龍物色辭人愛竒言貴浮詭飾羽尚畫文繡槃帨離本彌甚將遂訛濫文心雕龍序志夫奇曲雅樂所以禁淫也錦繡黼黻所以禦暴也縟則泰過是以檀卿刺鄭聲周人傷北里也古文苑宋玉笛賦麗物若偽魏器多牢華璧易碎金鐵難陶藝文類聚人部質文論昔人或以瑠璃象牙為筆管麗飾則有之然筆須輕便重則躓矣初學記文部筆華盛而實毁末隆而本衰道徳經指歸卷七無補良由棄大聖之軌模構無用以為用也北史李諤傳墨子之説傳先王之道論聖人之言以宣告人若辯其辭則恐人懐其文忘其直以文害用也此與楚人鬻珠秦伯嫁女同類故其言多不辯韓非子外儲説左常恨莊生言行自伐桎梏世業身居漆園而多誕談好畫鬼魅憎圖狗馬狹細忠貞貶毁仁義可謂彫虎畫龍難以徵風雲空扳億萬不能救無錢孺子之竹馬不免於脚剝土柈之盈案無益於腹虚也抱朴子外篇應嘲不能拯風俗之流遯世塗之凌夷通疑者之路賑貧者之乏何異春華不為肴糧之用茝蕙不救氷寒之急抱朴子外篇辭義聚無用之語如瓦之纍繩之結也莊子音義駢拇霧縠雖麗蠧害女工辭賦雖巧惑亂聖典揚子法言註吾子篇且夫玉巵無當雖寳非用侈言無驗雖麗非經文選三都賦序布在方册無彰器用譬春華同夫海棗寧可以軌物字民作範垂訓者乎文選陸陲新漏刻銘魯仲連聞田巴毁五帝往見而謂曰今楚軍南陽趙伐髙唐亡在朝夕今臣將罷南陽之師還髙唐之兵所貴談説此之謂也如先生之言有似梟音人皆惡之田巴於是杜口易業終身不談文選曹子建與楊徳祖書註若僕之言皆糞土之説消磨灰爛垢辱招穢適可充衛士之㸑盈掃除之器譬猶投盈寸之膠而欲使江海易色燒一羽之毛而欲令大罏增熱若燎原之煙彌天之雲嘘之不益其熱噏之不減其氣補文選夏侯湛抵疑䧺為太𤣥經由鼠坻之與牛場也如其用則實五稼保邦民否則為抵糞棄之於道矣廣文選揚子雲答劉歆書凋零之後殘缺所餘又已雜用補袍随時覆醬文苑英華庾信謝文序并和詩啟譬如畵燈但有燈名無有燈用太智度論卷二十七雖辭多語博猶玉屑一車不以為寳矣𢎞明集牟子理惑論夫言尚浮華語非實錄猶瓦雞靡司晨之用陶犬無守夜之功辯論正卷二猶藏史之説園吏之談寳經浮誕錦籍紆恠同鏤氷而無成若書空而匪實法苑珠林序召禍文之美而以身剝自謂智也者故不足角之美殺其牛榮華之言後有茅汲冡周書周祝解葉之美也解柯柯之美也離其枝枝之美也拔其本汲冡周書周祝解其文好者皮必剥其角美者身必殺甘泉必竭直木必伐華榮之言後為愆石有玉傷其山文子符言孔雀翠尾自累其身埤雅品物門孔雀羽毛之色莫美於鷩以其美斃焉五物之味莫美於鼈以其美斃焉是以物惡有其美也埤雅品物門鷩雉山鷄有美毛采自愛其色終日映水目眩則溺翟雉長尾雨雪降惜其毛棲樹杪不敢下食往往餓死葢文之溺物也如此埤雅品物門鷩雉好尚樂春藻之繁華而忘秋實之甘口也呉志諸葛恪傳註孟子疾過我門而不入我室或曰亦有疾乎曰摭我華而不食我實揚子問明篇膳無苦酸之肴口所不甘味手不舉以啖人王充論衡超奇篇玩揚子雲之篇樂於居千石之官挾桓君山之書富於積猗頓之財王充論衡佚文篇夫口論以分明為公筆辯以荴露為通吏文以昭察為良王充論衡自紀篇世俗率神貴古昔而黷賤同時雖有追風之駿猶謂之不及造父之所御也雖有連城之珍猶謂之不及楚人之所泣也雖有擬斷之劒猶謂之不及歐冶之所鑄也雖有起死之藥猶謂之不及和鵲之所合也雖有超羣之人猶謂之不及竹帛之所載也雖有益世之書猶謂之不及前代之遺文也是以仲尼不見重於當時太𤣥見蚩薄於比肩也俗士多云今山不及古山之髙今海不及古海之廣今日不及古日之熱今月不及古月之朗何肯許今之才士不减古之枯骨重所聞輕所見非一世之所患矣昔之破琴剿絃者諒有以而然乎抱朴子外篇尚博以磋切之至言為騃拙以虚華之小辯為妍巧真偽顛倒玉石混淆同廣樂於桑間鈞龍章於草服抱朴子外篇尚博夫文章之體尤難詳賞茍以入耳為佳適心為快尟知忘味之九成雅頌之風流也所謂考鹽梅之醎酸不知大􅅅之不致明飄颻之細巧蔽於沈深之宏䆳也抱朴子外篇辭義才髙者菀其鴻裁中巧者獵其艷辭吟諷者銜其山川童蒙者拾其香草文心雕龍辯騷承流而枝附者不可勝筭竝飛辯以馳術饜禄而餘榮矣暨於暴秦烈火熱炎崑岡而烟燎之毒不及諸子文心雕龍諸子歌謠文理與世推移風動於上而波震於下文心雕龍時序春秋以後角戰英䧺六經泥蟠百家飈駭文心雕龍時序咸池之音本不與䵷咬同而衆聼者乃有疑惑李善註文選東京賦瓦缶器而不鳴更蒙之以塵故取笑乎玉之鳴聲也李善註文選文賦抱玉者聮肩握珠者踵武廣文選鍾嶸詩品上此是屋下架屋耳事事擬學而不免儉狹世説新語言語鏗鏘竝奏能驚趙鞅之魂輝煥相華時瞬安豐之眼文苑英華徐陵文章上書握之不置恒如趙璧翫之不足同於玉枕文苑英華徐陵文章上書所覩黄絹之詞彌懐白雲之頌文苑英華徐陵文章上書豐城兩劒尚不阻來韓子雙環必希皆見文苑英華徐陵文章上書堯舜之典伍伯不肯觀孔墨之籍季孟不能讀辯正論卷五金玉異珍在人共寳𤣥儒别義遐邇同遵法苑珠林卷六十一窮究亡國之社屋其上柴其下者示絶於天地春秋薄社周以為城夫經藝傳書人當覽之猶社當通氣於天地也故人之不通覽者薄社之類也是故氣不通者彊壯之人死榮華之物枯王充論衡别通篇夫經熟講者要妙乃見國極論者恢奇彌出王充論衡恢國語讀之者曉然若盲之開目聆然若聾之通耳王充論衡自紀篇若夫翰迹韻畧之宏促屬辭比事之疏宻源流至到之修短藴藉汲引之深淺其懸絶也雖天外毫内不足以喻其遼邈其相傾也雖三光熠燿不足以方其巨細龍淵鉛鋌未足譬其鋭鈍鴻羽積金未足比其輕重抱朴子外篇尚博夫應龍徐舉顧盼凌雲汗血緩歩呼吸千里而螻螘恠其無階而髙致駑蹇患其過已之不漸也若夫馳驟於詩論之中周旋於傳記之間而以常情覽巨異以褊量測無涯以至粗求至精以甚淺揣甚深雖始自髫齓訖於振素猶不得也抱朴子外篇尚博内闢不測之深淵外播不匱之逺流其所祖宗也髙其所紬繹也妙變化不繫滯於規矩之方圓旁通不凝閡於一塗之逼促是以偏嗜酸醎者莫能識其味用思有限者不能得其神也抱朴子外篇尚博至精而後闡其妙至變而後通其數伊摯不能言鼎輪扁不能語斤其㣲矣乎文心雕龍神思夫唯深識鑒奥必歡然内懌譬春臺之熈衆人樂餌之止過客葢聞蘭為國香服媚彌芬書亦國華翫澤方美文心雕龍知音道既可以通中國而適夷狄學亦可以統正典而兼諸子揚子法言註問道篇天以精粹覆萬物各成其類人以潛心考校同異搜暢精義掦子法言註問神篇望衢罕窺其術觀海莫際其瀾文選任彦升王文憲集序嗢飫膏液咀嚼英華不知地之為輿天之為葢藝文類聚雜文部書若觀𤣥圭如觀金版洽日九披流光照灼慶雲五色垂采氤氲藝文類聚雜文部談講啟經猶的也一人射之不若衆人射之其中者多也玉海藝文經解子之食蜜徧口皆甜舌有餘味味吾之言有甚於是虚皇四十九章言上求言不貫為言之脉絡字間究字不參訂字之根苖玉皇本行集經口誦心存如虚玉光之内神交意晤如遊寳苑之中玉皇本行集經譬如甘蔗味雖不離皮節亦不從皮節而得於勝味皮節如世話義理猶勝味是故捨虚言思惟於實義太寶積經卷九十二評品取彼素絲織為綺縠或色美而材薄或文惡而質良唯善賈者别之取彼歌謠播為音樂或辭是而意非或言邪而志正唯達樂者曉之毛詩正義闗雎抉瑕擿釁掩其𢎞美所謂小辯破言小言破道者也後漢書陳元傳仲宣傷於肥戇休伯都無格檢元瑜病於體弱孔璋實自麤疏文蔚性頗忿鷙如是彼為非徒以脂燭自煎麋也其不髙蹈葢有由矣然君子不責偹於一人譬之朱漆雖無楨幹其為光澤亦壯觀也魏志王粲傳註已大見其文筆浩浩如長河東注比來所見後生制作乃涓澮之流耳隋書李徳林傳吾於荀卿歟見同門而異户也惟聖人為不異揚子君子篇仲尼多愛愛義也子長多愛愛奇也揚子君子篇兩刃相割利鈍乃知二論相訂是非乃見王充論衡書解篇漢作書者多司馬子長揚子雲河漢也其餘涇渭也王充論衡書解篇然時無聖人目其品藻故不得騁驊騄之迹於千里之塗編近世之道於三墳之末也抱朴子外篇尚博夫尚書者政事之集也然未若近代之優文詔䇿軍書奏議之清富贍麗也毛詩者華彩之辭也然不及上林羽獵二京三都之汪濊慱富也抱朴子外篇鈞世若夫俱論宫室而奚斯路寢之頌何如王生之賦靈光乎同説遊獵而叔畋盧鈴之詩何如相如之言上林乎竝美祭祀而清廟雲漢之辭何如郭氏南郊之艷乎等稱征伐而出軍六月之作何如陳琳武軍之壯乎抱朴子外篇鈞世二班兩劉奕葉繼采舊説以為固文優彪歆學精向然王命清辯新序該練璿璧産於崑岡亦難得而踰本矣文心雕龍才畧夫鱗鳯與麏雉懸絶珠玉與礫石超殊白日垂其照青眸冩其形然魯臣以鱗為麏楚人以雉為鳯魏氏以夜光為怪石宋客以燕礫為寳珠形器異徵謬乃若是文情難鑒誰曰易分文心雕龍知音心之照理譬目之照形目瞭則形無不分心敏則理無不達然而俗監之迷者深廢淺售此莊周所以笑折楊宋玉所以傷白雪也文心雕龍知音各執一隅之解欲擬萬端之變所謂東向而望不見西墻也凡操千曲而後曉聲觀千劍而後識器故圓照之象務先博觀閲喬岳以形培塿酌滄波以喻畎澮無私於輕重不偏於憎愛然後能平理若衡照辭如鏡矣文心雕龍知音洪鍾萬鈞䕫曠所定良書盈篋妙鑒廼訂流鄭淫人無惑失聼獨有此律不謬蹊徑文心雕龍知音贊猶如𤣥圃積玉炎洲聚桂其中實相推謝故有兹多品然終能振此鱗翼俱上龍門儻後之學者更随㸃曝云爾書品誠以驅馳竝駕不逮前鋒而中權後殿各盡其美書品皆五味一和五色一彩視其雕文非特刻鵠書品昔二人評玉一人曰好一人曰醜久不能辯各曰爾來入吾目中則好醜分矣夫玉有定形而察之不同非茍相反瞳睛殊也劉子正賞綠衣雖有三百領雜色不可入宗廟紵絮雖有三千紙單薄不可以禦冬文賦雜子不可以經聖典揚子法言註吾子篇雖實唱髙猶賞爾音文選潘岳夏侯常侍誄孫興公作天台賦成以示范榮期云卿試擲置地要作金石聲范曰恐子之金石非宫商中聲藝文類聚雜文部賦陳思之於文章也譬人倫之有周孔鱗羽之有龍鳯音樂之有琴笙女工之有黼黻俾爾懐鉛吮墨者抱篇章而景慕映餘暉以自燭故孔氏之門如用詩則公幹升堂思王入室景陽潘陸自可坐於廊廡之間矣鍾嶸詩品課其實錄則豫章僕射宜分庭抗禮徵君太尉可託乘後車征虜卓卓殆欲度驊騮前鍾嶸詩品范詩清便宛轉如流風迴雪丘詩㸃綴暎媚似落花依草鍾嶸詩品譬猶青松之抜灌木白玉之暎塵沙未足貶其髙潔也鍾嶸詩品謝詩如芙蓉出水顔如錯彩鏤金鍾嶸詩品王右軍書如謝家子弟縱復不端正者爽爽有一種風氣王子敬書如河洛間少年雖皆荒悦而舉體蹉跎殊不可耐􅇗欣書如大家婢為夫人雖處其位而舉止羞􅉣終不似真徐淮南書如南江士大夫徒好尚風軌終不免寒氣阮研書如貴胄失品次不能復排英賢王儀同書如晉安帝非不處尊位而都無神思呉興書如新亭唱父一往見楊州人共語音態便出陶隠居書如呉興少兒形雖未成長而骨體甚駿快殷鈞書如髙麗使人抗浪甚有意氣滋韻終不精味袁山松書如深山道士見人便欲退縮蕭子雲書如春初望山林花無處不發崔子玉書如危峯阻日孤松一披有絶望之意師宜官書如雕羽未息嗣自長逝韋誕書如虎威彪振劒拔弩張蔡邕書骨氣風逺爽爽為神鍾司徒書字十二種意外殊妙少實多奇邯鄲淳書應規入矩方圓乃成張伯英書如漢武帝愛道慿虚欲仙索靖書如飄風忽舉鷙鳥不飛皇象書如歌聲繞梁琴人捨揮衞常書如挿花美人舞笑鏡臺孟光禄書如崩山絶崖人見可畏張芝篤奇鍾繇特絶逸少鼎能獻之冠世四英其頽洪芳不滅􅇗真孫草蕭行范篆各一時妙絶鍾繇書若飛鴻戲海舞鶴遊天行間希宻實亦難過蕭思話書走墨連字勢屈强若龍跳淵門虎卧鳯闕薄紹之書字勢蹉跎如舞妓低腰仙人嘯樹太平御覽工藝部書中珠玉少而貴凡屬多而賤聖人七經而已佛遂萬億言恐煩而無當也太平御覽珍寳部珠下謝五言如初發芙蓉自然可愛君詩若鋪錦列繡亦雕繢滿眼何氏語林文學可與過秦王命分路揚鑣何氏語林文學李充言潘安仁之文如翔禽之羽毛衣被之絹縠何氏語林賞譽君文如朝菌須臾之翫豈比吾千丈松嘗有風霜劉荅云既有寒木又發春花可乎何氏語林棑調能引一切智智有大勢用譬如樹根諸餘經典無如是用譬如枝葉波羅蜜多經卷五百四十六周既達而未盡信齊諧之小醜見鵬鯤而標大不覩鳥王與魚母𢎞明集十三辨偽昔鄭人以乾鼠為璞鬻之於周宋愚夫亦寳燕石緹䌌十重夫覩之者掩口盧胡而笑斯文之族無乃類旃後漢書應奉列傳夫㝈子之相似者唯其母能知之玉石之相類者唯良工能識之書傳之㣲者唯聖人能論之今取新聖人書名之孔墨則弟子句指而受者必衆矣故美人者非必西施之種通士者不孔墨之類淮南子修務訓若鳥鳴似語蟲葉成字篇條滋蔓必假孔氏文心雕龍正緯越人臛蛇以饗秦客秦客甘之以為鯉也既而知其是蛇攫喉而嘔之此為未知味也趙人有曲者託以伯牙之聲世人競習之後聞其非乃束指而罷此為未知音也宋人得燕石以為美玉錮匣而藏之後知是石因捧匣而棄之此為未識玉也郢人為賦託以靈均舉世而誦之後知其非皆緘口而捐之此為未知文也故以蛇為鯉者唯易牙不識其味以趙曲為雅聲者唯鍾期不溷其音以燕石為美玉者唯倚頓不謬其真以郢賦為麗藻者唯相如不濫其賞劉子正賞學文夫才有天資學慎始習斵梓染絲功在初化器成綵定難可翻移故童子雕琢必先雅製㳂根討葉思轉自圓八體雖殊㑹通合數得其環中則輻輳相成故宜摩體以定習因性以練才文之司南用此道也文心雕龍體性紛哉萬象勞矣千想𤣥神宜寳素氣資養水停以鑒火静而朗無擾文慮鬱此精爽文心雕龍養氣贊夫才量學文宜正體製必以情志為神明事義為骨髄辭采為肌膚宫商為聲氣然後呈藻𤣥黄摛振金玉文心雕龍附㑹操斧伐柯雖取則不逺若夫随手之變良難以辭逮文選文賦嚬眉難巧學歩非工文苑英華李那文章上書不食八珍何以知味之奇不為學文何以知世之資太平御覽學部叙學字書眼學韻書耳學眼學以母為主耳學以子為主母主形子主聲玉海藝文小學喻林卷九十
