body:
  text: 喻林卷十五明徐元太撰人事門十三情殊今有同室之人鬬者救之雖被髪纓冠而救之可也鄉鄰有鬬者被髪纓冠而往救之則惑也雖閉戸可也孟子離婁下有人於此越人闗弓而射之則已談笑而道之無他疏之也其兄闗弓而射之則已垂涕泣而道之無他戚之也孟子告子下今羣臣非有葭莩之親鴻毛之重前漢書景十三王傳夫越人而臧否者非憎於彼也親戚而加譽者非優於此也處情之地殊故公私之心異也後漢紀光武八兒童之所簡者廼耆耋之所非耳目之所娛者廼心慮之所疾亢倉子訓道篇蹍市人之足則辭以放驁兄則以嫗大親則已矣故曰至禮有不人莊子庚桑楚鄭人有一子將宦謂其家曰必築壊牆是不善人將竊其巷人亦云不時築而人果竊之以其子為智以巷人告者為盜韓非子説林王良愛馬越王勾踐愛人為戰與馳醫善吮人之傷含人之血非骨肉之親也利所加也故輿人成輿則欲人之富貴匠人成棺則欲人之夭死也非輿人仁而匠人賊也人不貴則輿不售人不死則棺不買情非憎人也利在人之死也韓非子僃内夫挾相為則責望自為則事行故父子或怨譟取庸作者進美羹韓非子外儲説左上心哀而歌不樂心樂而哭不哀夫子曰絃則是也其聲非也淮南子繆稱訓拘囹圄者以日為脩當死市者以日為短日之脩短有度也有所在而短有所在而脩也則中不平也故以不平為平者其平不平也淮南子説山訓人食礜石而死蠶食之而不饑魚食巴菽而死鼠食之而肥類不可必推淮南子説林訓次三螟蛉不屬蜾臝取之不迓侮測曰螟蛉不屬失其體也太𤣥經第三親化國之日舒以長故其民閒暇而力有餘亂國之日促以短故其民困務而力不足舒長者非謂羲和安行乃君明民靜而力有餘也促短者非謂分度損减乃上闇下亂力不足也潛夫論愛日獵者獲禽觀者樂獵不見漁者之心不顧也是故觀於齊不虞魯遊於楚不懽宋王充論宣漢篇春女感陽則思秋士見隂而悲淮南子繆稱訓解蹍市人則稱已脱悞以謝之兄則言嫗詡之無所辭謝大親則已矣明恕素足也郭子註莊庚桑楚蟻得水則死魚得水則生羊得水則病莊子音義徐無鬼人慘戚則不能以驩逸勞苦則不能以施惠少有能易此者李善註文選西京賦華落向本故曰歸華葉下離枝故曰别葉李善註文選鮑明逺翫月詩志士惜日短愁人知夜長文選傅咸詩鴛鴦自用親不若比翼連他人雖同盟骨肉天性然藝文類聚樂部論樂詩夫樹樹異風人人異心不可以一檢量故黿鼉得水則生虎豹得水則死太平御覧鱗介部黿子髙曰泣有二焉大奸之人以泣自信婦人懦夫以泣著愛太平御覧人事部泣無窮之原萬尋之泉神龍之所歸小魚之所去髙山大丘深林巨壑茂林暢枝鴻鳥虎豹之所喜而雞狗之所惡道德經指歸卷七彼非喜凶而惡吉貴禍而賤福也性與之逺情與之反若處黄泉聽視九天遼逺絶滅不能見聞而已矣道德經指歸卷七譬如牧牛有二人一持酪缾一持漿缾俱共詣市而欲賣之於路脚跌二缾俱破一則喜悦一則愁惱元陽妙經卷六譬如一人而有七子是七子中一子遇病父母之心非不平等然於病子心生偏愛元陽妙經卷七如親愛罵之雖罵不恨非親惡言聞則生恚大智度論卷五譬如熱時清涼池有目有足皆可入雖近不欲入者則不入大智度論卷八十三猶如春夏之時人患日熱皆欲離之既至冬寒人皆思念大莊嚴經論卷一世人固有啖菖蒲而棄桂薑覆甘露而啜酢漿者矣毫毛雖小視之可察泰山之大背之不見志有留與不留意有銳與不銳𢎞明集牟子理惑論至若娑婆世界謂俄頃為百齡袈裟刹土將永劫以浹日斯染淨之别也法苑珠林卷一同情同道者相愛同蓻者相嫉同與者相愛同取者相嫉同病者相愛同壯者相嫉人情自然也亢倉子用道篇虎狼殺人烏蒼從上螾蛾從下聚之六者異類然同時俱至者何也所欲同也由是觀之有人之名則同人之情耳何故不可乎鶡冠子王鈇在一不少在萬不衆同如林木積如倉粟斗石以成升委無失也鶡冠子王鈇舞者舉節坐者不期而􅂸皆如一所極同也淮南子説林訓謂許由無德烏獲無力莫不醜於色人莫不奮於其所不足淮南子説林訓赤肉縣則烏鵲集鷹隼鷙則衆鳥散物之散聚交感以然淮南子説林訓小人之從事也曰茍得君子曰茍義所求者同所期者異乎擊舟水中魚沉而鳥揚同聞而殊事其情一也淮南子繆稱訓踒人日夜願一起盲不忘視説苑談叢夫納棄妻而論前壻之惡買僕虜而毁故主之㬥凡人庸夫猶不平之何者重傷其類自然情也抱朴子外篇良規五味萬殊而大同於美曲變雖衆亦大同於和美有甘和有樂然隨曲之情盡於和域應美之口絶於甘境安得哀樂於其間哉廣文選嵇叔夜聲無哀樂論春秋保乾圖曰吐珠於澤誰能不含宋均注曰珠出於野澤之中誰能不含取以為寳也初學記寳器部珠又如禽獸夜見火光恐怖逺避波羅蜜多經卷五百六十七一切諸法由食而存非食不存眼者以眠為食耳者以聲為食鼻者以香為食舌者以味為食身者以細滑為食意者以法為食涅槃者以無放逸為食増壹阿舎經卷三十一情變涇水雖濁未有彰見由涇渭水相入而清濁異言已顔色雖衰未至醜惡由新舊并而善惡别毛詩正義谷風樓緩謂趙王曰王亦聞夫公甫文伯母乎公甫文伯官於魯病死婦人為之自殺房中者二人其母聞之不肯哭也相室曰焉有子死而不哭者乎其母曰孔子賢人也逐於魯是人不隨今死而婦人為死者十六人若是者其於長者薄而於婦人厚故從母言之為賢母也從婦言之必不免為妬婦也故其言一也言者異則人心變矣今臣新從秦來而言勿與則非計也言與之則恐以為臣之為秦也故不敢對戰國䇿趙孝成王物之興衰情之起伏理有固然矣而崇替去來之甚者必唯寵惑乎當其接牀笫承恩色雖險情贅行莫不德焉及至移意愛析燕私雖惠心妍狀愈獻醜焉愛升則天下不足容其髙歡隊故九服無所逃其命斯誠志士之所沉溺君人之所抑揚未或違之者也後漢書皇后紀論夫逆旅之妾惡者自以為惡主忘其惡而貴焉美者自以為美主忘其美而賤焉夫色之美惡定於妾之面美惡之情變於主之心况君子之人有善不敢識有過不敢忘者乎其為美亦以𢎞矣故楊子之言足師逆旅之妾足誡也後漢紀光武六宋有蘭子者以技干宋元宋元召而使見其技以雙技長倍其身屬其踁並趨並馳弄七劒迭而躍之五劒常在空中元君大驚立賜金帛又有蘭子又能燕戲者聞之復以干元君元君大怒曰昔有異技干寡人者技無庸適值寡人有歡心故賜金帛彼必聞此而進復望吾賞拘而擬戮之經月乃放列子説符妻子具而孝衰於親嗜欲得而信衰於友爵祿盈而忠衰於君荀子性惡篇語曰其母好者其子抱然則其為之反也其母惡者其子釋韓非子僃内今上下之接無子父之澤而欲以行義禁下則交必有郄失且父母之於子也産男則相賀産女則殺之此俱出父母之懐袵然男子愛賀女子殺之者慮其後便計之長利也故父母之於子也猶用計筭之心以相待也而况無父子之澤乎韓非子六反趣舍合即言忠而益親身疎即謀當而見疑親母為其子治㧉音盖秃而血流至耳見者以為其愛之至也使在於繼母則過者以為嫉也事之情一也所從觀者異也從城上視牛如羊視羊如豕所居髙也闚面於盤水則圓於杯則隨面形不變其故有所圓有所隨者所自闚之異也今吾雖欲正身而待物庸遽知世之所自窺我者乎若轉化而與世競走譬猶逃雨也無之而不濡淮南齊俗訓隣之母死往哭之妻死而不泣有所劫以然也淮南子説材訓鍾鼓之聲怒而擊之則武憂而撃之則悲喜而擊之則樂其志變其聲亦變其志誠通乎金石而况人乎説苑修文彌子瑕愛於衛君衛國之法竊駕君車罪刖彌子瑕之母疾人聞夜往告之彌子瑕擅駕君車而出君聞之賢之曰孝哉為母之故犯刖罪哉君遊果園彌子瑕食桃而甘不盡而奉君君曰愛我而忘其口味及彌子瑕色衰而愛弛得罪於君君曰是故嘗矯吾車又嘗食我以餘桃故子瑕之行未必變初也前見賢後獲罪者愛憎之至變也説苑雜言祁射子見秦惠王惠王説之於是唐姑讒之復見惠王懐怒以待之非其説異也所聽者易也故以徵為羽非絃之罪也以甘為苦非味之過也説苑雜言鶩野鴨也飛止大澤之中羣處既豢擾之惡其族類而相逼逐也張華註禽經鴽在田得食鳴相呼夜則羣飛晝則草伏馴養之久見食相摶鬬也張華註禽經饑飡者於將獲所欲則悦情注心飽滿之後釋然疏之或有厭惡然則榮華酒色有可疏之時嵇中散集荅難養生論妍􅃖有定矣而憎愛異情故兩目不相為視焉雅鄭有素矣而好惡不同故兩耳不相為聽焉真偽有質矣而趣舍舛忤故兩心不相為謀焉以醜為美者有矣以濁為清者有矣以失為得者有矣抱朴子内篇塞難有弟而兄啼者言人之性舍長親㓜故啼也郭子註莊天運以財助人者財盡則交絶以色助人者色盡則愛弛是以嬖女不弊席嬖男不弊輿安陵所以悲魚也李善註文選阮嗣宗詠懐詩萁在竈下然豆居釜中泣本是同根生相煎何太急文選任彦升齊文宣王行狀註夫㑹賔盈堂酒酣奏琴或忻然而歡或慘爾而泣非進哀於彼導樂於此也其音無變於昔而歡慼並用斯非吹萬不同耳廣文選嵇叔夜聲無哀樂論桃生露井上李生桃樹傍蟲來齧桃根李樹代桃僵樹木身相代骨肉還相忘藝文類聚菓部李詩夫嬰兒未知而忠信於仇讎及其壯大有識欺殆兄嫂三軍得意則下亡虜窮溪之獸不避兕虎其性非易事理然也道德經指歸卷十二檢情先王之樂所以節百事也故有五節遲速本末以相及中聲以降五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘平和君子弗聽也物亦如之至於煩乃舍也已無以生疾左傳昭公元年預常稱濟有馬癖嶠有錢癖武帝聞之謂預曰卿有何癖對曰臣有左傳癖晉書杜預傳體舒則懐卷視溺則思濟北史常爽孫景傳五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂難得之貨令人行妨是以聖人為腹不為目老子檢欲目視雕琢者明愈傷耳聞交響者聰愈傷心思𤣥妙者心愈傷闗尹子五鑑篇楊朱曰生民之不得休息為四事故一為夀二為名三為位四為貨有此四者畏鬼畏人畏威畏刑此謂之遁人也可殺可活制命在外不逆命何羨夀不矜貴何羨名不要勢何羨位不貪富何羨貨此之謂順民也天下無對制命在内故語有之曰人不婚宦情欲失半人不衣食君臣道息周諺曰田父可坐殺晨出夜入自以性之恒啜菽茹藿自以味之極肌肉麤厚筋節㟡急一朝處以柔毛綈幕薦以梁肉蘭橘心㾓體煩内熱生病矣商魯之君與田父侔地則亦不盈一時而憊矣故野人之所安野人之所美謂天下無過者列子楊朱夫畏塗者十殺一人則父子兄弟相戒也必盛卒徒而後敢出焉不亦知乎人之所取畏者袵席之上飲食之間而不知為之戒者過也莊子達生今有聲於此耳聽之必慊已聽之則使人聾必弗聽有色於此目視之必慊已視之則使人盲必弗視有味於此口食之必慊已食之則使人瘖必弗食是故聖人之於聲色滋味也利於性則取之害於性則全之此全性之道也吕氏春秋本生昔先聖王之為苑囿園池也足以觀望勞形而已矣其為宫室臺榭也足以辟燥濕而已矣其為輿馬衣裘也足以逸身煖骸而已矣其為飲食酏醴也足以適味充虛而已矣其為聲色音樂也足以安性自娛而已矣吕氏春秋重已夫耳目鼻口生之役也耳雖欲聲目雖欲色鼻雖欲芬香口雖欲滋味害於生則止在四官者不欲利於生者則弗為由此觀之耳目鼻口不得擅行必有所制譬之若官職不得擅為必有所制此貴生之術也吕氏春秋貴生耳聞所惡不若無聞目見所惡不若無見故雷則揜耳電則揜目此其比也吕氏春秋貴生秋早寒則冬必煗矣春多雨則夏必旱矣天地不能兩而况於人類乎故古之治身與天下者必法天地也尊酌者衆則速盡萬物之酌大貴之生者衆矣故大貴之生常速盡非徒萬物酌之也又損其生以資天下之人而終不自知吕氏春秋情欲甚愛色費精神甚愛財遇禍患所愛者少所亡者多河上公註老子立戒兵甲不用却走馬治農田治身者却陽精以糞其身河上公註老子儉欲夫夏日之不被裘者非愛之也燠有餘於身也冬日之不用翣者非簡之也清有餘於適也夫聖人量腹而食度形而衣節於已而已貪汚之心奚由生哉淮南子俶真訓射者非矢不中也學射者不治矢也御者非轡不行學御者不為轡也知冬日之箑夏日之裘無用於已則萬物之變為塵埃矣故以湯止沸沸乃不止誠知其本則去火而已矣淮南子精神訓至人量腹而食度形而衣容身而遊適情而行餘天下而不貪委萬物而不利處大廓之宇遊無極之野登太皇馮太一玩天地於掌握之中天豈為貧富肥臞哉淮南子精神訓五色亂目使目不明五聲譁耳使耳不聰五味亂口使口爽傷趣舍滑心使行飛揚此四者天下之所養性也然皆人累也故曰嗜慾者使人之氣越而好憎者使人之心勞弗疾去則志氣日耗夫人之所以不能終其壽命而中道夭於形戮者何也以其生生之厚夫惟能無以生為者則所以脩得生也淮南子精神訓今夫霤水足以溢壺榼而江河不能實漏巵故人心猶是也自當以道術度量食充虚衣禦寒則足以養七尺之形矣淮南子汜論訓割痤疽非不痛也飲毒藥非不苦也然而為之者便於身也渴而飲水非不快也饑而大飱非不贍也然而弗為者害於性也此四者耳目鼻口不知所取去心為之制各得其所由是觀之欲之不可勝明矣淮南子詮言訓隂陽之氣在上天亦在人在人者為好惡喜怒在天者為暖清寒暑出入上下左右前後平行而不止未嘗有所稽留滯鬱也其在人者亦冝行而無留若四時之條條然也春秋繁露如天之為毒智者莫甚於酒留事者莫甚於樂毁亷者莫甚於色摧剛者反已於弱説苑談叢鳥獸觸其情者也衆人則異乎賢人則異衆人矣聖人則異賢人矣楊子學行篇故美味腐腸好色惑心勇夫招禍辯口致殃四者世之毒也王充論衡言毒篇夫嗜欲雖出於人而非道之正猶木之有蝎雖木之所生而非木之冝也故蝎盛則木朽欲勝則身枯嵇中散集荅難養生論夫欲官不識君位思食不擬親戚何者止其所不得則不當生心也故嗜酒者自抑於鴆醴貪食者忍饑於漏脯知吉凶之理故背之不惑棄之不疑也豈恨向不得酣飲與大嚼哉嵇中散集荅難養生論古之人知酒肉為甘鴆棄之如遺識名位為香餌逝而不顧嵇中散集荅難養生論今談者不覩至樂之情甘减年殘生以從所願此則李斯背儒以殉一朝之欲主父發憤思調五鼎之味耳嵇中散集荅難養生論夫渴者唯水之是見酌者唯酒之是求人皆知乎生於有疾也今若以從欲為得性則渴酌者非病淫湎者非過嵇中散集荅難養生論富貴多殘伐之者衆也野人多夀傷之者寡也嵇中散集荅難養生論惑目者必逸容鮮藻也惑耳者必妍音淫聲也惑鼻者必茝蕙芬馥也惑口者必珍羞嘉㫖也惑心者必勢利功名也五者畢惑則或承之禍為身患者不亦信乎抱朴子外篇酒誡其抑情也劇乎隄防之僃決其御性也過乎腐轡之乘奔抱朴子外篇誡酒蜘蛛張網蚤蝨不餒使人智巧役用萬物食口衣身何足劇乎但患富者無知止之心貴者有無限之用耳豈可以一䟾之故而終身不行以桀紂之虐思乎無主也抱朴子外篇詰飽夫五聲八音清商流徵損聰者也鮮華豔采彧麗炳爛傷明者也宴安逸預清醪芳醴亂性者也冶容媚姿鈆華素質伐命者也抱朴子内篇暢𤣥民結繩而用之足以紀要而已適故常甘當故常美若思夫侈靡則無時慊矣郭子註莊胠篋五闗者情慾之路嗜好之府也目愛綵色命曰伐性之斤耳樂淫聲命曰攻心之鼓口貪滋味命曰腐腸之藥鼻悦芳馨命曰燻喉之煙身安轝駟命曰召蹷之機此五者所以養生亦以傷生劉子防慾譬由愚者之養魚鳥也見天之寒則内魚於温湯之中而棲鳥於火林之上水木者所以養魚鳥也養之失理必至燋爛色聲芳味所以悦人也悦之過理還以害生劉子防慾夫蜂蠆螫指則窮日煩擾蚊䖟噆膚則通宵失寐蜂蚊小害指膚外疾人入山則避蜂蠆入室則驅蚊䖟何者以其害於體也嗜慾攻心正性顛倒嗜慾大害攻心内疾方於指膚亦以多也劉子防慾人有牛馬遊逸不歸必知收之情慾放逸而不知收之不亦惑乎劉子防慾出輿入輦命曰蹷痿之機洞房清風命曰寒熱之媒皓齒蛾睂命曰伐性之斧甘脆肥醲命曰腐腸之藥文選枚乘七發有味如醽而不醉人其味如黍飲之則醉何也秦子曰醉在小人不在君子意林秦子凡病可治也人不可治也體羸性弱不堪藥石或剛㬥狷急喜怒不節或情慾放縱貪淫嗜食此皆良醫不能加功焉夫君子病也猶可為也必使無病也不可為矣盖謂節其飲食量其多少也太平御覧疾病部總叙疾病下兹乃伐人之生甚於斤斧蝕人之性猛於豺狼太平御覧方術部養生跣而上坐者謂之宴能飲者飲之不能飲者已謂之醧齊顔色均衆寡謂之沉閉門不出者謂之湎故君子可以宴可以醧不可以沉不可以湎初學記服食部酒求髙反墜務厚更貧閉情塞欲老氏所珍困學紀聞卷十七評文隂陽失節則驚風驟雨人失中和則為㬥疾道德經註疏卷三清淨者道之本榮華者道之殃子勿憎淡泊是中有至味愚癡戀世欲類蛾投火光不知其為害以至於滅亡虚里四十九章譬如有主知典酒知而不飲則亦不醉元陽妙經卷七然養生之具譬猶水火不可失適反為害耳養生延命録教誡篇所有智慧如空中日諸煩惱海如㣲煙障金剛三昧本性清淨不壊不滅經行二内外六情之受邪行猶海受流餓夫受飯盖無滿足也佛説太安般守意經序猶如有人近大火坑遂近遂熱欲避其熱當求巧便求滅彼火出曜經三欲品如摩樓樹初生為葛藤所纒長便枯死愛欲之意亦如是出曜經三愛品㧞愛根本者如選擇細辛者所以稱説擇細辛者有二因緣一者除病二者販賣思惟選擇好者便取病者得愈販者得利出曜經三愛品恚能自制如止奔車是為善御法句經忿怒品人不持戒滋蔓如藤逞情極欲惡行日増法句經愛身品第二十時有五通比丘名精進力在山中樹下閑寂求道時有四禽依附左右常得安隱一者鴿二者烏三者毒蛇四者鹿是四禽者晝行求食暮則還宿四禽一夜自相問言世間之苦何者為重烏言饑渇最苦饑渴之時身羸目㝠神識不寧投身羅網不顧鋒刃我等䘮身莫不由之以此言之饑渴為苦鴿言婬欲最苦色欲熾盛無所顧念危身滅命莫不由之毒蛇言瞋恚最苦毒意一起不避親疎亦能殺人復能自殺鹿言驚怖最苦我在林野心恒怵惕畏懼獵師及諸豺狼髣髴有聲奔投坑岸母子相捐肝膽悼悸以此言之驚怖為苦比丘聞之即荅之曰汝等所論是其末耳不究苦本天下之苦無過有身身為苦器憂畏無量法句譬喻經三安寜品若樂衆者則受衆惱譬如大樹衆鳥集之則有枯折之患遺教經論離十二亦如惡馬不以轡制將當牽人墜於坑陷遺教經論離十二何時當得闗閉六情如縶狗鹿魚蛇猴鳥狗樂聚落鹿樂止澤魚樂池沼蛇好穴處猴樂深林鳥依虚空十住毘婆沙論卷七此身猶如車好惡無所擇香油及臭脂等同於調利法苑珠林卷四十二如水火擁之煞之則其用彌全决之散之則其勞彌薄法苑珠林卷五十四豈可放縱心馬不加轡勒馳騁情猴都無制鏁浮囊既毁前路何期德瓶已破勝緣長絶法苑珠林卷八十二豈得恣其愚懐縱情憍蕩致使善根種子不復開敷道樹枝條彌加枯瘁法苑珠林卷八十三畧小草木之生長雖至於盛夏之月萬物茂壯無能使草不有死者無能使木不有萎者以時不齊實小有萎死者也以興道德之進益雖至於成就之功百事通曉無能使色不有忿者無能使辭不有訟者以大義不虧實小有忿訟也然小萎無虧於夏長小怨無損於交好毛詩正義谷風大德不踰閑小德出入可也論語子張不信百戰之効而執一攻之驗棄多從少於理安乎譬若射者百發而一不中可謂之拙乎晉書蔡謨傳害法在犯尤而謹捜微過何異放兕豹於公路而禁鼠盜於隅隙古人有言鈇鉞不用而刀鋸日弊不可以為政此言大事緩而小事急也晉書劉頌傳譬如為屋但外望髙顯楹棟平正基壁完牢風雨不入足矣斧斤不平斵削不宻非屋之病也魏書源賀傳小謹者不大立飺食者不肥體管子形傳聖人參於天地鳥飛准繩此言大人之義也夫鳥之飛也必還山集谷不還山則困不集谷則死山與谷之處也不必正直而還山集谷曲則曲矣而名繩焉以為鳥起於北意南而至於南起於南意北而至於北茍大意得不以小缺為傷故聖人美而著之曰千里之路不可扶以繩萬家之都不可平以准言大人之行不必以先帝常義立之謂賢管子宙合為主而賊為父母而㬥為臣下而不忠為子婦而不孝四者人之大失也大失在身雖有小善不得為賢所謂平原者下澤也雖有小封不得為髙故曰平原之隰奚有於髙為主而惠為父母而慈為臣下而忠為子婦而孝四者人之髙行也髙行在身雖有小過不為不肖所謂大山者山之髙者也雖有小隈不以為深故曰大山之隈奚有於深管子形勢解工匠不能無害於巧君子不知無害於治尹文子大道上今以人之小過揜其大美則天下無聖王賢相矣故目中有疵不害於視不可灼也喉中有病無害於息不可鑿也河上之丘冡不可勝數猶之為易也水激興波髙下相臨差以尋常猶之為平也淮南子汜論訓今人君論其臣也不計其大功總其畧行而求小善則失賢之數也故人有厚德無問其小節而有大譽無疵其小故夫牛􅕭之涔不能生鱣鮪而蜂房不容鵠卵小形不足以包大體也淮南子汜論訓逐鹿者不顧兎决千金之貨者不争銖兩之價淮南子説林訓瘡瘍疥瘙孝婦不省焦氏易林渙之震明者舉大畧細不忮不求故能取威定功成天平地豈肯稱薪而㸑數粒乃炊并瑕棄璧披毛索黶哉抱朴子外篇接疏娥英任姒不以蠶織為首稱湯武漢髙不以細行招近譽故澄視於三辰者不遑紆鑒於井谷清聽於韶濩者豈暇垂耳於桑間抱朴子外篇博喻大鵬無戒旦之用巨象無馳逐之才故蔣琬敗績於百里而為三台之標陳平困瘁於治家而懐六竒之畧抱朴子外篇廣譬姜望至德而佃不復種重華大聖而漁不償網抱朴子外篇守塉權衡雖正不能無毫釐之差鈞石雖平不能無抄撮之較劉子從化有人譏周僕射與親友言戲穢雜無檢節周曰吾若萬里長江何能不千里一曲世説新語任誕晝覽太山不假秋毫之察夜仰列宿豈藉燭龍之明藝文類聚職官部尚書令表姜維有言良田百頃不在一畆太平御覽兵部戰不顧親髪生於皮去髪而皮不知爪生於肉去爪而肉不知太平御覧人事部皮膚譬如長者有一子愛之甚重其子得病但求良藥能差病者不求分别諸藥名字取之時節合和分數大智度論卷二十七喻林卷十五
