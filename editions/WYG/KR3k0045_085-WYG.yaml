body:
  text: 喻林卷八十五明徐元太撰德行門七聲聞鶴鳴于九臯聲聞音問于野鶴鳴于九臯聲聞于天詩小雅鶴鳴臯數至九喻深逺也鶴在中鳴焉而野聞其鳴聲賢者雖隠居人咸知之鄭氏箋詩鶴鳴原與隰同聚矣猶兄弟相求矣原隰以聚居之故故能定高下之名兄弟以相求之故故能立榮顯之譽毛詩正義常棣鶴鳴于九臯之中其聲聞于外方之野鶴處九臯人皆聞之以興賢者隠於幽逺之處其名聞於朝廷之間賢者雖隠人咸知之毛詩正義鶴鳴鄙夫鄙婦相㑹于廧陰可謂宻矣明日則或揚其言矣故士執仁與義而明行之未篤故也胡為其莫之聞也大戴禮記曾子制言上夫令名德之輿也德國家之基也有基無壞無亦是務乎左傳襄公二十四年驥不稱其力稱其德也論語憲問詩云既醉以酒既飽以德言飽乎仁義也所以不願人之膏粱之味也令聞廣譽施於身所以不願人之文繡也孟子告子上人無本行暴得善聲令聞過其情若潦水不能久也趙氏註孟離婁下北中郎將盧植名著海内學為儒宗士之楷模國之楨幹也後漢書盧植列傳彼與草木俱朽也此與金石相傾豈得同年而語並日而談哉後漢書朱暉列傳嶢嶢者易缺皦皦者易汙陽春之曲和者必寡盛名之下其實難副後漢書黄瓊列傳夫名者心志之操牓也故行著一家一家稱焉德播一鄉一鄉舉焉後漢紀光武三蘭桂異質而齊芳韶武殊音而並美晉書張禕傳朝野挹其風流人倫推其表燭晉書王湛列傳親譽生於不足未若不知之有餘良藥效於瘳疾未若無病之為貴也晉書王坦之傳治古之時積美於躬如膚革之就充惟恐其不修弗憂於無聞如擊考鼓鐘其傳以四達繹如也子華子神氣身修而名不立無為於擇術矣庶羞百品雜進於盤几而咽不下無為於貴饌矣抱璧而徒乞無為於貴寶矣子華子大道實為善人孰不知譬若良玉處而不出有餘精譬若義女處而不出人爭求之行而自衒人莫之取也墨子公孟聲無小而不聞行無隠而不形玉在山而木草潤淵生珠而崖不枯為善不積邪安有不聞者乎荀子勸學夫名聲之部發於天地之間也豈不如日月雷霆然哉荀子王霸篇貴名起之如日月天下應之如雷霆荀子儒效篇響不辭聲鑑不辭形君子正一而萬物皆成夫行非為影也而影隨之呼非為響也而響和之故君子功先成而名隨之說􅁐雜言寶金兮委積志意堅固策謀明也美玉兮盈堂懿譽光明滿朝廷也王逸註楚辭九懐夫形體者人之精魄也德義令聞者精魄之榮華也君子愛其形體故以成其德義也夫形體固自朽弊消亡之物夀與不夀不過數十嵗德義立與不立差數千嵗豈可同日言也哉徐幹中論夭夀根深而枝葉茂行久而名譽逺徐幹中論貴驗禾之秀其頴猶人之洪其道也禾秀頴則實結人崇道則德聞洪大揚子法言註孝至篇雖隙駟不留尺波電謝而秋菊春蘭英華靡絶文選劉孝標答劉詔書香以燔質而發芳絃以特絶而流響文選陸士衡連珠註玉以兼城為寶士以知名為賢明月不妄映蘭葩豈虚鮮補文選郭璞客傲善不由外來兮名不可以虚作孰無施而有報兮孰不實而有穫廣文選屈平抽思琴瑟高張則哀彈發節士抗行則榮名至是以申胥流音於南極蘇武揚聲於朔裔廣文選魏文帝連珠或問陳季方足下家君太邱有何功德而天下重名季方曰吾家君譬如桂樹生泰山之阿上有萬仞之高下有不測之深上為甘露所霑下為淵泉所潤當斯之時桂樹焉知泰山之高淵泉之深不知有功德與無也世說新語德行形之正不求影之直而影自直聲之平不求響之和而響自和德之崇不求名之逺而名自逺意林物理論昔卞和獻寶以罹折趾屈平納忠終於沈身已而和氏之璧千載垂光屈子之篇萬世彌章藝文類聚雜文部書語曰士非玉璧談者為價藝文類聚寶部璧譬如陶師泥在輸時不得物名既成器已名隨物立大方等大集經卷十一譬如金師金未成器亦不得名及其成已得瓔珞名大方等大集經卷十一王曰吾欲作大鼓令其音震聞百里能有為之者乎衆臣僉曰臣等無能為者有一臣名曰匡土常忠於上慈濟國民前對曰臣能為之當須資費王曰大善即開藏付之因輦寶於王宫門鳴鼔令之今天仁之王施善慈欲濟黎民之窮乏若有乏者悉詣宫門四國乏者襁負相扶塡國塞路一嵗之後王有詔曰鼓成未乎對曰已成王言何故不聞其聲臣白言願明王勞屈聖體出臨國内聽佛法鼔聲震十方王即嚴駕出行國中其民比肩王曰民多乎對曰王前勅臣令作大鼓使聞百里欲以揚德聲於四逺臣念枯木死皮不能揚王之德譽臣所受寶供沙門梵志之衣食以濟國民之窮乏也布告之來四隣歸潤猶饑子之慕慈母天王太子辟羅經行六譬如師子大力不自言力大皆是衆獸名之大智度論卷二十七無名粤無鏄燕無函秦無廬胡無弓車粤之無鏄也非無鏄也夫人而能為鏄也燕之無函也非無函也夫人而能為函也秦之無廬也非無廬也夫人而能為廬也胡之無弓車也非無弓車也夫人而能為弓車也周禮考工記大智不智大謀不謀大勇不勇大利不利太公六韜武韜知我者希則我者貴是以聖人披褐懐玉老子知難至貴國爵并焉至富國財并焉至願名譽并焉是以道不渝莊子天運至人無已神人無功聖人無名莊子逍遥遊羿工乎中微而拙乎使人無已譽聖人工乎天而拙乎人莊子庚桑楚彼且蘄以諔詭幻怪之名聞不知至人之以是為已桎梏耶莊子德充符大道之君仁義没孝慈滅猶日中盛時衆星失光河上公註老子俗薄不可名者非一色也不可以青黄白黑别非一聲也不可以宫商角徵羽聽非一形也不可以長短大小度之也河上公註老子贊𤣥橋子良修實而不修名為善不為人之知已不撞不發如大鐘然天下之深人也孔叢子抗志臣終身戴天不知天之高也終身踐地不知地之厚也若臣之事仲尼譬猶渴操壺杓就江海而飲之腹滿而去又安知江海之深乎韓詩外傳日月天下眼目而人不知德李善註文選陸士衡演連珠子貢見太宰嚭太宰嚭問曰孔子何如對曰臣不足以知之太宰曰子不知何以事之對曰惟不知故事之夫子其猶大山林也百姓各足其材焉太宰嚭曰子增夫子乎對曰夫子不可增也夫賜其猶一累壤也以一累壤增大山不益其高且為不知太宰嚭曰然則子有所酌也對曰天下有大尊而子獨不酌焉不識誰之罪也說苑善說孝子不生慈父之家忠臣不生聖君之下意林愼子華葢中天之峰未階其峻虞淵浴日之水不盡其源文苑英華庾信職官十銘夫無名之名生我之宅也有名之名喪我之橐也道德經指歸卷八模倣陰陽之眞形繪畫日月之神光雖良工決不可以用其巧矧帝之功德崇大廣博容可言揚哉玉皇本行集經譬如泉源陂池五河駛流各各有名悉歸於海便無本名菩薩處􅇇經卷四成物水未及用則井功未成其猶人德未被物亦是功德未就也周易正義井搢紳之徒莫不廕其德宇晉書陸􅁮傳人加脂粉物競琢磨俱報稻粱各施鳴吠隋書潘徽文學傳善迹者欲人繼其行善歌者欲人繼其聲北史李彪傳常季問於仲尼曰王駘兀者也從之遊者與夫子中分魯立不教坐不議虚而往實而歸莊子德充符南郭惠子問於子貢曰夫子之門何其雜也子貢曰君子正身以俟欲來者不距欲去者不止且夫良醫之門多病人櫽括之側多枉木是以雜也荀子子道篇夫櫽括之旁多枉木良醫之門多疾人砥礪之旁多頑鈍夫子修道以俟天下來者不止是以雜也詩云菀彼栁斯鳴蜩嘒嘒有漼者淵莞葦淠淠言大者之旁無所不容說苑雜言世人之益者倉廪也取之如單仲尼神明也小以成小大以成大雖山川邱陵草木鳥獸裕如也揚子五百奏希聲於宇宙濟溺喪於𤣥津李善註文選王簡棲頭陁寺碑文居厚者不矜其多處薄者不怨其少窮涯而反盈量知歸文選任昉王文憲集序挹其源者游泳而莫測懷其道者日用而不知文選沈約安陸王碑文孟軻驅世事於仁義之域行者步中正之塗若使南海無採珠之氏崑山無破玉之工則明珠不御於椒室美玉不佩於桂宅意林士緯芃芃黍苗陰雨膏之詵詵纓冕儲王道之藝文類聚儲官部儲官詩或望路以窺門空升堂而入室藝文類聚人部贈答詩涉其流者則擯落囂塵得其門者則騰驟雲霧文苑英華薛道衡碑庚市子者聖人無欲者也見人爭財而訟推千金之璧於其傍而訟者息太平御覽逸民部逸民九一切衆生迷淪苦海誰能於中作大船師一切衆生恒為煩惱疾病縈纒誰能於其中間為作良醫元陽妙經卷二令諸凡夫衆生趣大乗河飲八種味水速悟无上正眞之道離諸疑滯斷煩惱業渴元陽妙經卷五願諸凡夫燃大乘法燈離小乘見元陽妙經卷五願諸凡夫得忍辱榻雖於生死饑餓困苦願諸凡夫得无畏榻永離煩惱一切怨賊願諸凡夫得清浄榻專无上正眞之道願諸凡夫得善法榻常為善友之所擁護願諸凡夫得左脇卧榻依於聖人所行之法元陽妙經卷五願諸凡夫必為无上一切智屋願諸凡夫悉皆得入觀喜甘露法屋願諸凡夫初中後心常入元陽清淨之宅願諸凡夫於未來世常處眞人所居宫室元陽妙經卷五令諸凡夫得天中所卧之榻得大智慧坐四如意處卧於眞人之榻不卧邪魔非法之榻願諸凡夫得安穩卧離生死席成自然師子卧榻元陽妙經卷五亦如日出𤾉谷有大光明悉能照朗令得一切逺見虚空是大元陽清淨慧日亦復如是照了幽㝠深䆳之處令一切衆生逺見眞道元陽妙經卷五譬如橋船無心度物不揀淨穢是人非人牛馬騾驢皆悉通過大乘妙林經譬如室中宿有寶藏貧窮忍餓終無見寶忽有明師地鏡占之自知有寶鑿深四丈便即得寶无上内秘藏經辯四眞品猶如良醫得以妙藥治諸盲人令見日月三十六部尊經黄林經偈吾道猶日光明普照種種色相人始能别廢日之光有目絶視虚皇四十九章以鏡燭物有形者皆現以灰覆物不潔者皆鮮玉皇本行集經常以法雷而警衆生令其覺悟常以大雲等覆衆生令不孤露常以法雨潤洽衆生令無渴乏常以慈風揺動衆生令立信根常以慧日而照衆生令不昏冥常以舟航廣作津濟攝生理具運載无窮玉清經慈悲方便品必能為一切世人作大橋梁作大舟楫作大寶車能致世間昇於妙土海空智藏經序品譬如衆生欲度海水善䕶船舫得到彼岸海空智藏經持誡品譬如鹽味置於諸物乃至水中皆悉有鹹海空智藏經哀歎品譬如寃讐或千或百若一人和百千亦和一人相怨百千亦怨道性亦爾一人得時一切亦得一人不得一切不得海空智藏經哀歎品師皇典馬廏無殘駟列仙傳盲者能視聾者能聽瘂者能言狂者得念亂者得定貧者得富露者得衣饑者得食渴者得飲病者得除愈醜者得端嚴形殘者得具足根缺者得圓滿迷悶者得醒悞疲頓者得安適波羅蜜多經卷一轉妙法輪即令無量無數有情逺塵離垢生淨法眼波羅蜜多經卷三又如火大悉能成熟一切物類波羅蜜多經卷五百六十七如衆鳥等依妙高山形類雖殊而同一色波羅蜜多經卷六百譬如日輪雖復遥逺與閻浮提衆生而作光明大寶積經卷二十為失路者示其路拔欲淤泥置岸上如興雲蔭覆枯池注雨充足原隰滿大寶積經卷六十一如水沾地及山川幷諸百卉叢林樹藥草條莖及枝蔓諸花蓊蔚遍山好大寶積經卷六十一譬如香篋以盛衣服衣服皆香篋香不減大方等大集經卷二十九與熱渴者作清冷水與饑乏者作諸甘果為露形者作諸衣服為熱乏者作大宻雲為貧匱者作如意寶為恐懼者作所歸依為諸稼穡作甘澤雨為諸濁水作月愛珠大集地藏十輪經卷一如無足者所得車乗如逺涉者所備資糧如迷方者所逢示導如狂亂者所服妙藥如疾病者所遇良醫如羸老者所凭几杖如疲倦者所止牀座渡四流者為作橋梁趣彼岸者為作船筏大集地藏十輪經卷一譬如貴家盲子墮大深坑饑窮困苦食糞食泥父甚愍之為求方便拯之於深坑飼之以上饌三昧法門經卷下心常愛念一切衆生猶如父母念所生子敎化衆生法則禮儀如大博士本縁經持王子品譬天下極美不過蒲桃酒飲一升便可醉持一升水澆一升酒中飲之不能復醉佛在世時說經知人意態譬如人飲一升酒便得醉今我輩不知是佛說經知人意態應病與藥故人多得道三慧經藉八守䕶法藏猶如關鑰普集法寶猶如妙高山破無明闇猶如燈燭普蔭羣生猶如高葢大方廣佛華嚴經卷十若有羣生行闇夜中迷惑十方於平坦路生險難想於險難道起平坦想以高為下以下為高其心迷惑生大苦惱我以方便舒光照及若欲出者示其門戸若欲行者示其道路欲濟彼岸示其橋梁欲涉河海與其船筏若於熱時示其清冷若於寒際示作溫和大方廣佛華嚴經卷十七正法雨名曰除滅除滅衆生煩惱盛火或有法雨名曰能起能起衆生一切善根或有法雨名曰能壊能壊衆生諸惡邪見或有法雨名曰成寶能成衆生一切智寶大方廣佛華嚴經卷三十四譬如船師常以大船於河流中不依此岸不著彼岸不住中流而度衆生無有休息大方廣佛華嚴經卷七十三為被四流漂汨者造大法船為被見泥没溺者立大法橋為被癡闇昏迷者然大智燈為行生死曠野者開示聖道為嬰煩惱重病者調和法藥為遭生老死苦者飲以甘露令其安穏為入貪恚癡火者沃以定水使得清涼多憂惱者慰喻使安繫有獄者曉誨令出入見網者開以智劒住界城者示諸脱門在險難者導安穏處懼刧賊者與無畏法墮惡趣者授慈悲手拘害藴者示􅄺槃城大方廣佛華嚴經卷七十八譬如醫自治身不能愈一切人若有醫多治人是乃為名醫師阿述達菩薩經衣八譬如衆生若依須彌金色之邊其身即與彼山同色所以然者山勢力故念佛三昧經卷五猶如大醫王勤行療衆疾無盡意菩薩經卷八猶如導師將護衆賈法華經卷九譬如船師度人往返法華經卷九若諸行人三垢覆蔽久處生死纒綿難解為業垢河之所漂流我時當乗大乗法船撈接救拔以智慧火燒其結使以禪定水洒澤令淨以烏和拘舍羅拂拭搓摩敎以六度布以四禪令出三界七佛所說神咒經卷二是神咒力譬如大葢能覆三千況此一國普雨法雨無不蒙益枯木石山皆能生華七佛所説神咒經卷三亦如須彌跱立難動雜色衆鳥往依附山皆同一色便無本色菩薩處胎經卷四猶如病人良醫授藥而是病人毁罵是藥及與良醫先毁罵已後乃服藥汝意云何藥以罵故不為藥耶病不除耶不也雖復毁罵不失藥勢而能除病大方廣如來秘宻藏經卷下譬如此閻浮洲有旃檀那樹若芽生時童男童女所有患者與此樹芽悉差其患若葉出時丈夫婦人童男童女所有患者與此樹葉悉差其患若樹大時入其陰者衆生諸患亦皆除愈於後成果其光遍照十方世界若有衆生念此光者彼亦當得無老病死若斫此樹取其木者不畏貧窮彼木破已猶有此益若取其木將作宅舍入其内者諸怖悉除亦皆無有寒熱饑渴諸法最上王經景三我已為諸天人吹大法螺擊大法鼓覺悟長夜無明睡眠我已為諸天人建大法幢然大法炬普照一切除滅暗㝠我已為諸有情作大法橋為大法船濟渡一切暴流所溺我已為諸有情注大法流降大法雨一切枯槁皆令潤洽我已開顯解脱正路引諸世間迷失道者佛臨涅槃記法注經景十當如清水無所不淨死人死狗死虵屎尿亦皆洗之然不毁水清亦當持心有如掃箒掃地淨不淨死人死狗死虵屎尿皆亦掃之然不毁於箒矣亦當復如風火之力光死人死狗死虵屎尿亦吹亦燒然不毁風火之力光佛說堅意經尺七有牧牛人不愚不癡者有方便慧夏末秋初能善觀察恒水此岸亦善觀察恒水彼岸善度其牛至平博山谷好水草處彼初渡時先渡大牛能領羣者斷其急流次驅第二多力少牛隨後而渡然後第三驅羸小者隨逐下流悉皆次第安穏得渡新生犢子愛戀其母亦隨其後得渡彼岸雜阿含經卷四十七如有百千萬億衆生為水所溺以慈愍心為作船筏而度脱之終不勞疲佛説淨飰王般涅槃經尺七譬如慈父愛子子欲墮坑持令不墮大智度論卷五譬如國王以常食之餘賜諸羣下得者大喜大智度論卷八其衆也如草木之依大地其遇也猶鱗介之汎長川辯正論卷三照電光於炎塗弭魔賊於險澤汎靈舟於信風接浮生於苦海𢎞明集辯惑論序矜局蛙於井谷哀危蟪於寸陰𢎞明集十詳夫三有區分四生稟性共遊火宅俱淪欲海蠢蠢懷生喁喁哨類所以法王當洲渚之運覺者應車乗之期導彼戲童歸兹勝地法苑珠林卷第十扇廣大之慈風灑滂沱之法雨能使身田被潤即吐無上之芽心樹既榮便茂不彫之葉法苑珠林卷十三不此岸不彼岸不中流而化衆生維摩詰所說經見阿閦佛品譬如良醫遇疫刼中醫術大行廣施衆藥所療者衆致供無量菩薩大士處不淨國亦復如是衆惡彌滋兼濟乃𢎞羅什譯維摩詰經香積佛品一惠施惠施有二種施下人以財施上人以法施二愛語愛語復有二種於下人則以軟言將悦於上人則以法語慰諭皆以愛心作愛語也三利語利語亦有二種下人則為設方便令得俗利上人則為作方便令得法利四同事同事亦有二種同惡人則誘以善法同善人則令增善根羅什譯維摩詰經菩薩品子有所須則咨之父母菩薩所須則求之六度取其饒益比之父母也羅什譯維摩詰經菩薩行品天澤無私不潤枯木佛威雖普不立無根所建立者道根必深也僧肇註維摩詰經佛國品俗王以俗力勝民故能澤及一國法王以法力超衆故能道濟無疆僧肇註維摩詰經佛國品生老病死患之重者濟以法藥故為醫王長也僧肇註維摩詰經佛國品夫以方㑹人不可一息期以財濟物不可一時周是以㑹通無偶者彌綸而不漏法澤冥被者不易時而同覆僧肇註維摩詰經菩薩品企仰高山仰止景行行止詩小雅車牽泰山衆山所仰梁木衆木所放哲人亦衆人所仰放也鄭氏註禮記檀弓上昔有學步於邯鄲者曽未得其髣髴又復失其故步遂匍匐而歸耳前漢書叙傳上效伯高不得猶為謹勅之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也後漢書馬援列傳孔文舉於時英雄特傑譬諸物類猶衆星之有北辰百穀之有黍稷天下莫不屬目也後漢書孔融傳註衆士慕仰若水之歸海蜀志諸葛亮傳諺曰得黄金一笥不如為伯騫所議華陽國志蹈其閫閾若升闕里之堂入其奥隅謂登龍門之坂梁書任昉傳若能紆鳯彩以耀榛薈迴連城以映瓦礫者是所望也魏書宗欽傳閭閻之士莫不忘味於遺韻眩精於末光猶丘陵之仰嵩岱川流之宗溟渤也周書史臣庾信傳昭然如日月望之者不迷曠乎如大路行之者不惑隋書刑灋志仰而不至方見學仙之逺窺而不覩始知游聖之難隋書王貞文學傳昔人有圖畫僑札輕以自方耳南史宗少文孫測隠逸傳聞善易以正身難夫子見禾之三變也滔滔然曰狐鄉丘而死我其首禾乎故君子見善則痛其身焉淮南子繆稱訓南假子過程本本為之烹鱺魚南假子曰聞君子不食鱺魚本子曰此乃君子食也我何與焉假子曰夫高比所以廣德也下比所以狹行也比於善者自進之階比於惡者自退之原也且詩不云乎高山仰止景行行止吾豈自比君子哉志慕之而已矣韓詩外傳睎驥之馬亦驥之乗也睎顔之人亦顔之徒也揚子學行或問治已曰治已以仲尼或曰治已以仲尼仲尼奚寡也曰率馬以驥不亦可乎揚子修身篇言已修行衆善冀若仙人王僑得道不死遂與天地同其夀命與日月比其光榮流名於後世不腐滅也王逸註楚辭九歎菌閣兮蕙樓節度彌高德成就也觀道兮從横衆人瞻望聞功名也王逸註楚辭九懐夫賢者言足聽貌足象行足法加乎善奬人之美而好攝人之過其不隠也如影其不諱也如響故我之憚之若嚴君在堂而神明處室矣雖欲為其不善其敢乎徐幹中論貴驗古人云千載一聖猶旦暮也五百年一賢猶比膊也言聖賢之難得疎濶如此顏氏家訓慕賢昔三后之純粹兮固衆芳之所在雜申椒與菌桂兮豈維紉夫蕙􅊉文選屈原離騷經豈不企高蹤麟趾邈難追文選傅長虞贈何邵王濟詩見西施之容歸憎其貌者也文選楊修答臨淄侯牋過高唐者效王豹之謳游睢渙者學藻繢之綵文選陳琳為曹洪作書于時纓緌之徒紳珮之士望形表而影附聆嘉聲而響和者猶百川之歸巨海鱗介之宗龜龍也文選蔡邕郭有道碑文見之者雖影而必駭聞之者雖響而必震言驚懼之甚不俟形聲也李善註文選班孟堅答賓戲雀鼠雖愚猶知徽烈李善註文選任彥昇太宰碑表揚雄覈靈賦曰枝附葉從表立景隨李善註文選蔡伯喈郭有道碑文江河慕海邱陵樂山廣文選陸士龍陸府君誄望其形者猶登嶽涉海蕩然無以究其高測其深覽其神者猶旁璞親珪肅然無不欽其寶而偉其竒也廣文選嵇叔夜阮歩兵碑人聞長安樂則出門西向而笑肉味美對屠門而哨此猶時人雖不别聖亦復欣慕意林新論士林景附羣英式慕由毛羽之宗鵬鸞衆山之仰五嶽也藝文類聚職官部司空賛臨川擬潔仰華思崇藝文類聚職官部司空碑凡厥搢紳之士所以挹酌洪流含咀英芳者猶旱苖之仰膏雨湛露之晞朝陽也藝文類聚職官部司空碑林宗常行陳梁之間遇雨故其巾一角霑而折二國學士著巾莫不折其角云作林宗巾其見儀則如此藝文類聚巾帽晨風之鬱北林龍魚之趣深澤藝文類聚内典部内典墓志觀其德行竒偉風韻劭邈有似明月之映幽夜清風之過松林也太平御覽文部弔文勝範清規風流以為準的儒宗學府衣冠以為領袖初學記職官部尚書令如彼七寶城安住於海中海空智藏經供獻品偈夫行堯之行即堯之身希顔之人亦顔之徒玉皇本行集經如雲龍之在虚類舞鳯之翔空玉清經幽棲品為師為導為明為炬為燈為照為解為覺為智為慧為救為護為室為宅為洲為渚為歸為趣為父為母波羅蜜多經卷三百三十三誠嶮道之夷隥闇室之凝缸度疾之仙丸出苦之神馭鑒德者之明鏡嚴心者之寶鬘波羅蜜多經序五百八十四譬如大海諸水依持常為衆流之所歸趣波羅蜜多經卷六百如滿月在空衆星共遶如旭日初出采霞紛映大乗造像功德經卷上悲九閻浮提中無有如來譬如暗夜星中無月如國無君如家無主大乗造像功德經卷上悲九若妙高之處宏海猶朗月之冠衆星者豈不以本𢎞基永者歟達摩法藴足論後序十二如月獨明衆星迴附出曜經七學品譬如渴牛不避於死我實渴於佛法是以冒突聽法阿育王傳二譬河海之紀地猶日月之麗天𢎞明集十信滄海之舟梁𤣥霄之日月也𢎞明集十垣墻崇䆳得門自難輒罄愚管罔象𤣥珠𢎞明集十一意珠騰曜智炬凝輝總納百川濬東溟之在地綱維萬象逾北極之居天辯正論卷一金牆玉室豈易入哉高僧傳入釋寶亮猶羣流之歸巨壑衆星之拱北辰懋哉邈矣高僧傳序十四譬如嬰兒不離其母行路不離糧食熱時不離涼風寒時不離煖火度水不離堅船病苦不離良醫是故菩薩常不離佛法苑珠林卷二十威德為萬億所遵風化為萬靈之範故善人􅂞向若羣流之歸溟壑大光攝受如兩曜之伴衆星法苑珠林卷六十二在天為天寶在人為人寶寶於天人者豈天人之所能故物莫不敬承也僧肇註維摩詰經佛國品喻林卷八十五
