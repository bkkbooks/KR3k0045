body:
  text: 喻林卷七十五明徐元太撰臣術門二諫諍正物之噐不獨規也規以正圓矩以正方繩正曲直權正輕重皆可以比諫君獨言規者以主仁恩以恩親正君曰規規之使圓則外無廉隅猶人之為恩貌不嚴肅故五行規主東方是主仁恩也毛詩正義沔水摩厲以須王出吾刃將斬矣左傳昭公十二年諫必三者取月生三日而成魄臣道就也何休解公羊莊公二十四年愛之能勿勞乎忠焉能勿誨乎論語憲問昔者天子有争臣七人雖無道不失其天下諸侯有争臣五人雖無道不失其國大夫有争臣三人雖無道不失其家士有争友則身不離於令名父有争子則身不陷於不義孝經今我以忠辨吾君王譬浴嬰兒雖啼勿聽彼將有厚利越絶請糴内傳千羊之皮不如一狐之腋千人之諾諾不如一士之諤諤史記商君傳鷙鳥纍百不如一鶚前漢書鄒陽傳卿不識韓非逆鱗之言耶而欻摩天子逆鱗自知所陳誠頟頟觸猛獸之鬚耳晉書傳咸傳臣聞之近臣嘿逺臣瘖晏子諫上畏鞭箠之嚴而不敢諫其父非孝子也懼斧鉞之誅而不敢諫其君非忠臣也韓詩外傳扁鵲不能治不受鍼藥之疾賢聖不能正不食諫諍之君鹽鐵論相刺臣之諫君何取法法金正木也子之諫父法火以揉木也臣諫君以義故折正之也子諫父以恩故但揉之也木無毁傷也白虎通諫諍火性有恒寒暑雖至不為增減猶正直之臣堅意犯顔不變其色太𤣥經第六馴解百尺之髙累於九碁之上千鈞之重懸於一木之枝是以截虎尾而非險傷龍鱗而未危文苑英華庾信連珠桀觀炮烙於瑶臺謂龍逢曰樂乎逢曰樂桀曰觀刑曰樂何無惻怛之心焉逢曰天下苦之而君為樂臣為君股肱孰有心悦而股肱不悦乎桀曰聽子諫諫得我功之不能我刑子龍逢曰臣觀君冕非冕也冕危石也臣觀君履非履也履春氷也未有冠危石而不壓踏春氷而不陷桀嘆曰子知我之亡而不自知亡子就炮烙之刑吾觀子亡子不知我亡龍逢行歌曰造化勞我以生休我以炮烙乃赴火而死太平御覽皇王部帝桀勤事殷音隠其靁在南山之陽何斯違斯莫敢或遑殷其靁在南山之側何斯違斯莫敢遑息殷其靁在南山之下何斯違斯莫敢遑處詩國風殷其靁旄丘之葛兮何誕之節兮叔兮伯兮何多日也詩國風旄丘予手拮音吉据音居予所捋力活反荼予所蓄租予胡反予口卒瘏音徒曰予未有室家叶古胡反予羽譙譙音樵予尾翛翛音消予室翹翹風雨所漂揺予維音嘵嘵音囂鴟詩國風鴞翩翩音篇者鵻音佳載飛載下叶後五反集于苞栩音許王事靡盬不遑將父翩翩者鵻載飛載止集于苞把王事靡盬不遑將母叶滿彼反牡詩小雅四有杕音第之杜有睆音莞其實王事靡盬繼嗣我日有杕之杜其葉萋萋王事靡盬我心傷悲陟彼北山言采其杞王事靡盬憂我父母詩小雅杕杜小星小臣奉使行役之詩詩説召南土氣緩則葛生闊節衛伯不恤其職故其臣於君事亦疏廢也鄭氏箋詩旄丘彼采葛兮一日不見如三月兮彼采蕭兮一日不見如三秋兮彼采艾兮一日不見如三歳兮傳曰葛所以為絺綌也事雖小一日不見於君憂懼於讒矣蕭所以共祭祀艾所以瘳疾箋云以采葛喻臣以小事使出彼采蕭者喻臣以大事使出彼采艾者喻臣以急事使出鄭氏箋詩采葛翩翩然者鵻之鳥也此鳥其性慤謹人皆愛之可以不勞猶則飛而後則下始得集於苞栩之木言先飛而後獲所集以喻人亦當先勞而後得所安毛詩正義四牡鷙蟲攫摶不程勇者引重鼎不程其力禮記儒行夫適市之妻教嗣糞除出亡之君勅臣守禦子問以事臣謀以能吳越春秋勾踐入臣外傳春日將至百草從時君王動大事羣臣竭力以佐謀越絶請糴内傳夫君者舟也人者水也羣臣乗舟者也將軍兄弟操檝者也若能平志畢力以度元元所謂福也如其怠弛將淪波濤可不慎乎後漢書皇甫規列傳志不求易事不避難臣之職也不遇槃根錯節何以别利噐乎後漢書虞詡列傳為人下者其猶土也深抇之而得甘泉焉樹之而五穀蕃焉草木殖焉禽獸育焉生則立焉死則入焉多其功而不息荀子堯問為人臣者譬之若手上以修頭下以修足清煖寒熱不得不救入鏌鎁傳體不敢不搏韓非子有度首如蓬葆體如漆幹勞瘁辛苦如此其重也蔡成郎集讓髙陽侯臣喻股肱則手足也履氷執熱不得辭焉是以古人方之於地掘之則出水泉樹之則秀百穀生者立焉死者入焉功多而不望賞勞瘁而不敢怨審識斯術保已之要也抱朴子外篇臣節僕以為戴盆何以望天故絶賓客之知亡室家之業日夜思竭其不肖之才力務一心營職以求親媚於主上文選司馬遷報任少卿書使獲燿日月之末光絶炎以展采錯事文選司馬長卿封禪文譬猶衆目營方則天網自昶四體辭難而心膂獲乂文選陸機五等諸侯論君者中心臣者外體外體作然後知心之好惡臣下動然後知君之節趨好惡不形則是非不分節趨不立則功名不宣文選王子淵四子講徳論被鞍銜鍊盡力馳驟指蹤投緤駑兔或擒而弱才負重折足是慮文苑英華魏收移文召公賢者也明不能與聖人分職常戰慄恐懼故舎於樹下而聽斷焉勞身苦體然後乃與聖人齊是周南無美而召南有之初學記人部賢螢光向日盡蚊力負山疲初學記職官部中書侍郎若真生馬繋槽􅇫上不念水草但作是念駕乗之事雜阿含經卷三十三立功夫賢士之處世也譬若錐之處囊中其末立見史記平原君傳經營宇宙寧唯斷鼇足之功𢎞濟蒼生非直鑿龍門之嶮陳書髙祖上紀隆家光國盛烈與河海争流授命滅親峻節與竹柏俱茂周書孝義傳髙勲踰於象緯積徳冠於嵩華陳書髙祖上紀帷幄盡其謨猷方面宣其庸績擬巨川之舟艥為大厦之棟梁周書㓂洛史臣傳次七拔石􅀈之人切􅀈力没以盡測曰拔石􅀈􅀈乗時也太𤣥經第六難事輕葭莩功薄蟬翼蔡中郎集讓髙陽侯泰山之功長立於國家日月之明久著於天地李善註文選揚子雲解嘲禽息鳥視終於白首此徒圏牢之養物非臣之所志也文選曹植求自試表膏蘭孰為消濟治由賢能文選潘正叔贈王元貺詩志在髙構增堂及陛文選袁宏名臣序賛大略淵回元功響效文選陸士衡功臣頌將使伊周奉轡桓文扶轂文選任昉到大司馬記室箋芳樹雖香難以餌烹尸位素餐難以成名廣文選曹子建矯志詩五絲為䌰倍䌰為升倍升為緎倍緎為紀倍紀為緵倍緵為襚皆自少之多自微至著也士之立功勲効名節亦復如之勿以小善不足修而不為也廣文選鄒長倩遺公孫賢良書景照明以妙見音振響而攄聞金淬堅以示斷芑靡質而效芬廣文選陸士龍考志前世俊士立功垂名圖畫於殿閣宫省此乃國之大寶亦無價矣雖積和璧累夏璜囊隋侯篋夜光未足喻也意林新論萬尋由積匱千里一歩超藝文類聚人部贈荅詩康衢飛駛羽大海滴微涓文苑英華張王見應制二詩進賢野有蔓草晉臼季薦郤缺于文公晉人美之詩説唐有至誠之心思遲此賢者欲致之於朝猶罩者之願魚也毛詩正義南有嘉魚鄒忌事宣王仕人衆宣王不説晏首貴而仕人寡王説之鄒忌謂宣王曰忌聞以為有一子之孝不如有五子之孝今首之所進仕者以幾何人戰國䇿齊宣王淳于髠一日而見七人於宣王王曰子來寡人聞之千里而一士是比肩而立百世而一聖若隨踵而至也今子一朝而見七士則士不亦衆乎淳于髠曰不然夫鳥同翼者而聚居獸同走者而俱行今求柴胡桔梗於沮澤則累世不得一焉及之睪黍梁父之隂則郄車而載耳夫物各有疇今髠賢者之疇也王求士於髠若挹水於河而取火於燧也髠將復見之豈特七士也戰國䇿齊宣王夫富貴在身而列士不舉是有狐白之裘而反衣之前漢紀孝元上君顔色何以消減於故邪孔曜言體中無藥石之疾然見清河郡内有一騏驥拘縶後廐厯年去王良伯樂百八十里不得騁天骨起風塵以此憔悴耳魏志管輅傳註使君方欲流精九皋垂神幽藪欲令明主不獨治逸才不久滯髙風遐披莫不草靡宜使輅特蒙隂和之應得及羽儀之時必能翼宣隆化揚聲九國也魏志管輅傳註貢玉之士歸之潤山論珠之人出於枯岸是以蒭蕘之言擇於廊廟者也梁書顧協傳昔荆玉未剖刖卞和之足百里未用碎禽息之首隋書王孝籍儒林傳肥利之地不為私邑賢質之士不為私臣晏子問下歸國寶不若獻賢而進士墨子親士下臣事君以貨中臣事君以身上臣事君以人荀子大略篇少室周為襄主驂乗至晉陽有力士牛子耕與角力而不勝周言於主曰主之所以使臣騎乗者以臣多力也今有多力於臣者願進之韓非子外儲説三少室周者古之貞亷潔慤者也為趙襄主力士與中牟徐子角力不若也入言之襄主以自代也襄主曰子之處人之所欲也何為言徐子以自代曰臣以力事君者也今徐子力多臣臣不以自代恐他人言之而為罪也韓非子外儲説左齊有隠士東郭先生梁石君當曹相國為齊相也客謂匱生曰夫東郭先生梁石君世之賢也隠於深山終不詘身下志以求仕者也吾聞先生得謁曹相國願先生為之先臣里母相善婦見疑盜肉其姑去之恨而告於里母里母曰安行今令姑呼汝即束藴請火去婦之家曰吾犬争肉相殺請火治之姑乃直使人逐去婦還之故里母非談説之士束藴請火非還婦之道也然物有所感事有可適何不為之先匱生曰愚恐不及然請盡力為東郭先生梁石君束藴請火於是乃見曹相國曰臣之里有夫死三日而嫁者有終身不嫁者自為娶將何娶焉相國曰吾亦娶其終身不嫁者耳匱生曰齊有隠士東郭先生梁石君世之賢士也隠於深山終不詘身下志以求仕相國娶婦欲娶其不嫁者取臣獨不取其不仕之臣耶於是曹相國因匱生束帛安車迎東郭先生梁石君厚客之韓詩外傳珠玉者人主之所貴也和雖獻寶而美未為玉尹用也進寶且若彼之難也况進賢人乎賢人與奸臣猶仇讐也於庸君意不合夫欲使姦臣進其讐於不合意之君其難萬倍於和氏之璧又無斷兩足之臣以推其難猶拔山也千歳一合若繼踵然後賢王之君興焉其賢而不用不可勝載故有道者之不戮也宜白玉之璞未獻耳新序雜事五妾聞堂上兼女所以觀人能也妾不能以私蔽公欲王多見知人能也列女傳周列國楚莊樊姬且賢儒之不進將相長吏不開通也農夫載穀奔都賈人齎貨赴逺皆欲得其願也如門郭閉而不通津梁絶而不過雖有勉力趨時之勢奚由早至以得盈利哉王充論衡狀留篇抱翼之鳳奮翮於清虚項領之駿騁迹於千里抱朴子外篇朂學徒能知人不肯薦舉何異知沃壤之任良田識直木之中梁柱而終不墾之以播嘉穀伐之以構梁棟奚辭於不粒何救於露居哉抱朴子外篇正郭夜光之璧顯價於和氏之肆千里之足定功於伯樂之庭廣文選應休璉薦和慮則箋公孫枝獻百里奚於繆公三月請屬事焉公曰買之五羊之皮而屬事無乃為天下笑乎藝文類聚人部賢鳳鳴朝陽必資藍田之寶龍門㸃額亦俟堂溪之珍是以紫玉見稱黄金為貴藝文類聚治政部薦舉啟殷殿初基拾龍淵之寶虞祠始構獻鳳管之玉文苑英華梁元帝薦舉表欲報君以財幣則君府藏已盈而伋又貧欲報君以美善恐未合君心而徒言不聽也願有報君者唯逹賢耳太平御覽人事部叙賢天羅廓矣野人猶有罩翳之勤太平御覽資産部罩昔百里奚賢秦繆公欲用之繆公好牛奚因賃官以養牛蹄上乗肉三寸公使禽息行牛息入言之公不信怒息後言之公又怒吏曰再怒其主罪當刖使守門公出禽息跪而請之曰夫養牛者願君勿忘也公乃問百里奚曰臣之長非養牛者也乃養民也公視牛察之則賢人也遂與同車而出謝禽息曰所以不死者君未知客也今已知之矣乃觸門而死太平御覽獸部牛中稱任上九或錫之鞶帶終朝三褫之易訟大車以載積中不敗也易大有棟橈本末弱也易大過棟橈之凶不可以有輔也易大過棟隆之吉不橈乎下也易大過六三負且乗致㓂至貞吝易解九四鼎折足覆公餗易鼎六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也易漸負也者小人之事也乗也者君子之噐也小人而乗君子之噐盜思奪之矣易上繋斧小不勝柯者亡汲冡周書史記解譬若畋犬驕用逐禽其猶不克有獲汲冡周書皇門解不稼不穡胡取禾三百㕓兮不狩不獵胡瞻爾庭有縣音𤣥貆音暄兮彼君子兮不素餐叶七宣反兮不稼不穡胡取禾三百億兮不狩不獵胡瞻爾庭有縣特兮不稼不穡胡取禾三百囷邱倫反兮不狩不獵胡瞻爾庭有縣鶉音純兮詩國風伐檀維鵜音蹄在梁不濡其翼彼其之子不稱音聲其服叶蒲北反維鵜在梁不濡其咮音晝彼其之子不遂其媾音垢候詩國風人節彼南山維石巖巖赫赫師尹民具爾瞻詩小雅節彼南山汚澤善居泥水之中在魚原以不濡汚其翼為才如君子以稱其服為有徳鄭氏註禮記表記美服不稱必以惡終美車何為左傳襄公二十七年子于鄭國棟也棟折榱崩僑將厭焉敢不盡言左傳襄公三十一年三公鼎足承君一足不任則覆亂美實前漢書彭宣傳近臣已不足杖矣屋大柱小可為寒心前漢書李尋傳鼎足不彊棟幹微橈前漢書佞幸傳賛夫徳不稱禄猶鑿墉之趾以益其髙豈量力審功安固之道哉後漢書皇甫規列傳公餗覆而不憂美錦碎而愈截後漢書志百官五註玩既拜有人詣之索杯酒瀉置柱梁之間呪曰當今乏材以爾為柱石莫傾人梁棟邪晉書陸玩傳况臣糠䵃糅之彫胡庸夫錦衣不稱其服也晉書皇甫謐傳或曰食如螘衣如華朱輪駟馬金朱煌煌無已泰乎曰由其徳舜禹受天下不為泰不由其徳五兩之綸半通之銅亦泰也揚子孝至次五不田而穀毅于揀禄測曰不田而穀食不當也太𤣥經第三毅次六毅于棟柱利安大主測曰毅于棟柱國任彊也太𤣥經第三毅竊人之財猶謂之盜况偷天官以私已乎以罪犯人必加誅罰况乃犯天得無咎乎潜夫論貴忠生非工女職不狎練蔡中郎集讓尚書君無虚授臣無虚任故無負山之累折足之憂也劉子均任豐有折肱而鼎覆其餗書歌股肱詩刺南山初學記職官部太尉司徒司空今以一節之任建三軍之威豈特寵其八大之竹犛牛之尾哉玉海噐用符節譬樹木粗強故枝條共壓其上亦猶梁棟宏壯故椽瓦壓其上也道徳經註疏卷八行令皇皇者華君遣使臣也送之以禮樂言逺而有光華也毛詩皇皇者華木葉槁待風乃落君有政教臣乃行之鄭氏箋詩蘀兮渒渒然順流而行者是涇水之舟船此舟船所以得順流而行者乃由衆徒船人以檝擢之故也以興随民而化者乃由諸臣賢者以力行之故也毛詩正義棫樸人之於天也以道受命於人也以言受命不若於道者天絶之也不若於賢者人絶之也穀梁莊公元年次四凖繩規矩莫違我施測曰凖繩規矩由身行也太𤣥經第三法夫明君之詔也若聲忠臣之和也如響長短大小清濁疾徐必相應也潜夫論實貢夫法令者人君之銜轡箠䇿也而民者君之輿馬也若使人臣廢君法禁而施已政令則是奪君之轡䇿而已獨御之也潜夫論衰制受命如絲明之如緡文選王褒四子講徳論震為雷巽為風雷動風行二者相成猶人君出教令臣奉行之玉海周易鄭康成註所謂行人受使四方往復王命如日照使流光原隰幽谷無私大方廣佛華嚴經卷十二攻邪上六公用射隼于髙墉之上獲之无不利象曰公用射隼以解悖也易解九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎易夬激揚之水可謂不能流漂一束之楚乎言能流漂之以興忠臣良士豈不能誅除逆亂之臣乎言能誅除之毛詩正義揚之水譬于禽獸臣食其肉而寢處其皮矣左傳襄公二十一年貂勃曰跖之狗吠堯非貴跖而賤堯也狗固吠非其主也且今使公孫子賢而徐子不肖然而使公孫子與徐子鬭徐子之狗猶將攫公孫子之腓而噬之也若乃得去不肖者而為賢者狗豈特攫其腓而噬之耳哉戰國䇿齊襄王農勤於除草故穀稼豐茂忠臣務在除姦故令徳道長後漢紀孝桓下毅將彈河南尹司𨽻不許曰攫獸之犬鼷鼠蹈其背毅曰既能攫獸又能殺鼠何損於犬晉書劉毅傳彤嘗大㑹謂叅軍王銓曰我從兄為尚書令不能啖大臠大臠故難銓曰公在此獨嚼尚難矣晉書宣五王傳行父盡忠無禮斯疾農夫去草見惡必耘南齊書謝超宗傳曾無犬馬識主之誠方懐梟獍返噬之志魏書侯剛㤙倖傳夫猛虎憑威于山猶猛臣憑威于國不可逸也故猛虎在山勇者制之猛臣在國仁者制之昔虞有猛臣曰驩兠虞舜驅之周有猛臣曰飛亷周公戮之魯有猛臣曰少正夘孔子誅之此皆制于仁者也嗟乎今國之猛虎逸矣而仁者不制豈無仁者與抑仁者在下位而不能制與天禄閣外史􅀈山義痛其心事傷其目文苑英華孔熙元檄一良農耘穢勿使能植无禮是逐安惜翅翼初學記職官部御史中丞唯當擊隼去復覩落鵰歸初學記職官部侍御史盡職主厯之官為厯之法節氣先天時者殺無赦不及時者殺無赦失前失後尚猶合殺况乎不知日食其罪不可赦也尚書正義𦙍征忠臣奉使能光君命無逺無近如華不以髙下易其色毛詩皇皇者華土氣緩則葛生闊節衛伯不恤其職故其臣於君事亦疏廢也鄭氏箋詩旄丘言碩人既有武力比如虎可以能御亂矣乂有文徳能治民如御馬之執轡使之有文章如織組矣以御者執轡於此使馬騁於彼織組者摠紕於此而成文於彼皆動於近成於逺以興碩人能治衆施化於已而有文章在民亦動於近成於逺矣毛詩正義簡兮煌煌然而光明者是草木之華於彼原之與隰皆煌煌而光明不以髙下而易其色也以言臣之出使當光顯其君常不辱命於彼遐之與邇皆使光揚不以逺近而易其志也毛詩正義皇皇者華且大將軍之事豈得珪璧其行束修其心而已哉後漢書馮衍傳一州清晏恬波於沸海之中百城安堵静祲於稽天之際晉書劉𢎞列傳惟若王官陶均萬國若天之有斗斟元氣酌隂陽弗失其和周書蘇綽傳坐人物之源運銓衡之柄反披狐白不好緇衣隋書王孝籍儒林傳報國之道有四一曰貢賢二曰獻猷三曰立功四曰興利賢者國之幹猷者國之規功者國之將利者國之用是皆報國之道惟其能而行之忠經報國章無曰我平而慢爾衡無曰我審而怠爾明廣文選崔子玉尚書箴如虎有牙如鷹有爪國以自固獸以自保牙爪葸葸動作宜時用之不理實反生災廣文選揚子雲執金吾箴且表正而象平日夕而景側處喉舌者患銓衡之無常不患於不明古文苑傅𤣥吏部尚書箴後漢庖參為漢陽太守郡人任棠者有奇節隠居教授參到任時先候之棠不與言但以薤一鉢水一盂置于屏前自抱兒伏户下參思其微意曰水者欲吾清也薤者欲吾擊強宗也抱兒當户下者欲吾開門恤孤幼也率而行之漢陽大治事文類聚總管府司𨽻校尉舊號卧虎誠以舉綱而萬目理提領而衆毛順太平御覽職官部司𨽻校尉喻林巻七十五
