body:
  text: 喻林卷五十五明徐元太撰人事門五十三敗成九四田無禽易恒上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也易明夷上六女承筐无實士刲羊无血无攸利易歸妹未濟亨小狐汔濟濡其尾无攸利易未濟初九曵其輪濡其尾无咎易既濟池之竭矣不云自頻泉之竭矣不云自中叶諸仍反詩大雅召旻流離鳥也少好長醜始而愉樂終以微弱毛詩旄丘註衛之諸臣初有小善終無成功似流離也鄭氏箋詩旄丘𤨏兮而少尾兮而好者乃流離之子也此流離之子少而美好長即醜惡以興衛之諸臣始而愉樂終以㣲弱言無徳自將不能常為樂也毛詩正義旄丘士刲羊亦無􅎺也女承筐亦無貺也左傳僖公十五年夫其敗也如日月之食焉何損于明左傳宣公十二年狐埋之而狐搰之是以無成功國語呉亡國之臣不敢語政敗軍之將不敢語勇呉越春秋勾踐入臣外傳百年累之一朝毁之豈不惜乎後漢書竇融列傳敗材傷錦所宜至慮後漢書劉𤣥列傳初升髙岡終隕幽壑朝含榮潤夕為枯魄蜀志郤正傳用使金暉絶于中天神轡輟于促路晉書赫連勃勃記椎蘆作蘧蒢不成文章晉書苻堅下記所得未毛銖所喪如山崖晉書祈嘉傳構厦止於尺土為山頓於一簣魏書源賀子恭傳築十仞之城城者既十仞矣則又壊之此胥靡之所苦也莊子則陽烹牛以饗其里而罵其東家母徳不報而身見殆淮南子説山訓臨菑之女織紈而思行者為之悖戾室有美容繒為之纂繹淮南子説林訓鷁飛中退舉事不進焦氏易林乾之兑弊笱在梁魴逸不禁漁父勞苦連室乾口焦氏易林坤之履多載重負捐棄于野焦氏易林屯之恒樹栽藿豆為鹿兎食君不慎䕶秋無收入焦氏易林屯之歸妹黍稷禾稼垂秀方造中旱不雨傷風枯槁焦氏易林需之艮機杼騰擾女巧不成焦氏易林訟之渙魃為菑虐風吹雲却焦氏易林小畜之中孚鷹逐雉兎爪折不得焦易林履之大有老妾踞機緯絶不知女功不成冬寒無衣焦氏易林否之中孚大車難駕兩引如繩馬奔山後輪脱不行焦氏易林同人之賁羊子逐兎犬踦不得焦氏易林謙之既濟螟蟲為賊害我稼穡盡禾殫麥秋無所得焦氏易林豫之謙衣成無闗不知所穿焦氏易林豫之離搏鳩彈雀獵兎山北丸盡日暮失獲無得焦氏易林随之泰刲羊不當血少無羮女執空筐不得採桑焦氏易林随之艮舎車而徒亡其駁牛焦氏易林賁之恒蹇驢不才駿驥失時筋力勞盡罷於沙丘焦氏易林剝之師黍稷禾稻垂畆方好中旱不雨傷風病槁焦氏易林剝之蠱踦牛傷暑不能成畆草萊不墾年嵗無有焦氏易林復之无妄織縷未就針折不復女工多態亂我政事焦氏易林无妄之賁釣鯉失綸魚不可得焦氏易林大畜之豐毁盤破盆棄其飯飡焦氏易林頥之訟棟橈榱壊廊屋大敗宫闕空廊如冬枯樹焦氏易林頥之无妄設網張羅捕魚園池網罟自决雖得復失焦氏易林坎之益早霜晚雪傷害禾麥損功棄力饑無所食焦氏易林離之蠱登髙傷軸上阪棄粟焦氏易林咸之蠱播輪折輻馬不得行焦氏易林恒之豐畜牝無駒養雞不雛焦氏易林遯之小畜織組无文燒香不芬焦氏易林大壯之小畜桑蠶不得女功無成焦氏易林家人之兌兎聚東郭衆犬俱獵圍缺不成無所能獲焦氏易林蹇之坤上政揺擾蟲螟並起害我嘉榖季嵗無稷焦氏易林觧之既濟往來井上破甕壊盆焦氏易林益之萃置筐失筥輪破無輔焦氏易林萃之蒙緣山升木中堕於谷焦氏易林困之大壯羅張目列圍合月缺採捕無功魚鳥得脱焦氏易林鼎之同人下田陸黍萬華生齒大雨霖集波病潰腐焦氏易林兑之履夏麥􅜿􅜿霜擊其芒焦氏易林歸妹之鼎牀傾竇折屋漏垣缺焦氏易林旅之同人次八車不拔髀井弭切軸折測曰車不拔躬自賊也太𤣥經第一礥上九倉靈之雌不同宿而離失則嵗之功乖測曰倉靈之雌失作敗也太𤣥經第一戾上九務成自敗雨成自隊測曰務成自敗非厥命也太𤣥經第二務上九紅蠶緣于枯桑其繭不黄測曰緣于枯桑蠶功敗也太𤣥經第六將患乎升勺之利未堅而鍾石之費相尋根移之據未極而氷霜之毒交攻抱朴子内篇極言宋氏引苖郢人張革誠欲其快而實速萎裂知進忘退斯之以乎抱朴子外篇知止東海人黄公少時能幻制蛇御虎韋佩赤金刀及衰老飲酒過度有白虎見於東海以赤刀往厭之術不行遂為虎所食李善註文選西京賦將覆簣於浚谷擠為山乎九天文選陸機弔魏武帝文中駕每傾輪當騫復集作輒摧翼文苑英華呉均行邁一詩譬如池有蓮華光色鮮榮芬芳可愛忽值天雹一時零落元陽妙經卷一譬盲人捉雀入手復去靈寳通㣲經譬如有人先未曽有末尼珠寳後時遇得深自欣慶珍玩無􅌅歘爾亡遺常懐慨歎波羅蜜多經卷三百三十五譬如闇室燈油盡故明滅大寳積經卷七十一譬如摩尼寳珠堕不浄中不可復著大寳積經卷一百一十二譬如士夫入慈室藏以明月珠置于髻中醉酒卧寐不自唯省寤忘明珠不知所在法華經卷五譬如有人入於大海至寳渚中多取寳物置于船上欲度大海於中沈沒蓮華面經卷上悲六譬如有人從髙樓下乗於大象下象乗馬下馬乗輿下輿坐床下床墮地從地落坑雜阿含經卷四十二譬如稻田禾稼粗熟而有惡露災氣則令善榖傷敗中本起經比丘品譬如世間所有臺觀若一中心不善覆蔽則椽梁壁皆被淋漏以椽梁壁被淋漏故皆悉敗壊本事經卷五又如苦瓠青未成熟人所斷取而彼枝葉尋即萎悴漸次枯弱後乃乾合身毛喜豎經下譬如有象洗其身沐浴適浮復卧土脩行道地經慈品如暴秋中暑無所能成熟脩行道地經慈品譬如師治箭失墮火燒之安能使其箭成就而可用脩行道地經慈品譬如利刀人所愛敬恒自防備不離其身中便忘誤安置不牢便生塵垢本鐵不存追惟此刀乃無有價一朝壊敗不可任用出曜經八行品猶如淨鐵及明淨鏡瑩治淨潔無有塵垢然其人藏隠不牢或在土中或在溼地便生重垢觸便碎散不任本用出曜經八行品昔有一人有二百五十頭牛常驅逐水草随時餧食時有一虎噉食一牛爾時牛主即作念言已失一牛俱不全足用是牛為即便驅至深坑髙㟁排著坑底盡皆殺之凡夫愚人亦復如是受持如來具足之戒若犯一戒不生慚愧清淨懴悔便作念言我以破一戒歸不具足何用持為一切都破無一在者百喻經卷上昔有一小兒陸地遊戲得一大龜意欲殺之不知方便而問人言云何得殺有人語言汝但擲置水中即時可殺爾時小兒信其語故即擲水中龜得水已即便走去百喻經卷下譬如清凉池而有毒蛇不中澡浴亦如好花果樹而多逆刺大智度論卷十三初若登天光被俗表末如入淵明夷輝淪𢎞明集難夷夏論無及處罰之極惡積不改者也罪非所懲故刑及其首至于滅耳及首非誡滅耳非懲凶莫甚焉王弼注易噬嗑棄女車輔則墮女之載乃請長者見助以言國危而求賢者已晚矣鄭氏箋詩正月若不早圖後君噬嚌其及圖之乎左傳莊公六年禍敗日深如火之燎原其可救乎晉書王接傳然鞭短勢殊恐無所及晉書姚泓記覆水不收悔將何及晉書慕容超紀魚以泉涸而喣沫鳥因將死而悲鳴梁書任昉傳固機發而後思圗車覆而後改躅改之無及故狡兎失穴思之在後故逆鱗易觸魏書常景傳恐拯弱遲于援手救經緩於扶足待越人之舟楫求魯匠之雲梯則必懸于槁樹之枝沒於深淵之底矣隋書王孝籍儒林傳詩曰涓涓源水不雝不塞轂已破碎乃大其輻事以敗矣乃重太息其云益乎荀子子道篇寡人所謂饑而求黍稷渇而穿井者未嘗能以歡喜見子今國事急百姓恐懼願藉子大夫使齊説苑善説譬之猶渇而穿井臨難而後鑄兵雖疾從而不及也説苑雜言言君信任佞䛕不慮艱難卒遭憂患然後乃覺若放火於秋蒿不可救制也王逸注楚辭七諫明侯此時不以誕吿諸矦靖寧國歩以為功首至於肝腦塗函谷麋鹿棲銅駝乗輿蒙沙而中原流於左袵然後圗之是猶火既及薪而後覓井以救不亦鈍乎天祿閣外史尊王夫隨覆車之軌追陷溺之後以赴其前何及之有武矦十六策思慮孝子之養親病也未死之時求卜迎醫冀禍消藥有益也既死之後雖審如巫咸良如扁鵲終不復生何則知死氣絶終無補益王充論衡薄葬篇恃藏疾之大言忘膏盲之近急何異焦喉之渇切身而遥指滄海於萬里之外滔天之水已及而方造舟於長洲之林安得免夸父之禍脱淪水之害哉抱朴子外篇用刑犀象珠玉無足而至自萬里之外定傾之器能行而淪乎四境之内二豎之疾既據而募良醫棟橈之禍已集而思謀夫何異乎火起乃穿井覺饑而占田哉抱朴子外篇貴賢不與智者共其安而望有危而見救不與竒士同其歡而欲有戚之見恤猶災火張天方請雨於名山洪水凌空而伐舟於東閩不亦晚乎抱朴子外篇廣譬宿不樹惠臨難而施恩本不防萌害成而修慎是以臨渇而穿井方饑而植禾雖疾無所及也劉子言苑此甘餐毒藥戲猛獸之爪牙也所從來者至深遠淹滯永乆而不廢雖令扁鵲治内巫咸治外尚何及哉文選枚乗七發害成於㣲而救之於著故有無功之治文選嵇叔夜養生論臨死修善於計已晚事廹乃歸於救已㣲意林周生烈子離憂患而乃寤兮若縱火於秋蓬楚辭東方朔初放惠子家窮餓數日不舉火乃見梁王王曰夏麥方熟請以割子可乎惠子曰施方來遇羣川之水長有一人溺流而下呼施救之施應曰吾不善游方將為子吿急於東越之王簡其善游者以救子可乎溺人曰我得一瓢之力則活矣子方告急於東越之王簡其善游者以救我是不如求我於重淵之下魚龍之腹矣太平御覽人事部餓夫病之始生也極㣲極精必先入結於皮膚今良工皆稱曰病成名曰逆則鍼石不能治良藥不能及也黄帝素問内經湯液醪醴論昔有貧人在路而行道中偶得一囊金錢心大喜踊即便數之數未能周金主忽至盡還奪錢其人當時悔不疾去懊恨之情甚為極苦百喻經卷下譬如鹿未被箭時不知怖畏既被箭已踔圍而出大智度論卷九譬如屋被燒竟更求水救之如實論華二莫振枯槁之楊被拯纔得生華何可長乆尋當衰落也周易正義大過天之用楚如人用五材力盡而敝敝則棄之是以無救助之者春秋正義昭公十有一年三枿之起本根既朽枯楊生華曷惟其舊前漢書敘傳下若膏育之疾長桑不治體府之病陽慶弗理宋書顧凱之傳根未及植葉已先枯南齊書東昏矦本紀朽根倒樹花葉落去卒逢火猋隨風偃仆焦氏易林屯之坎踦牛失角下山傷軸焦氏易林屯之損晉平有疾迎醫秦國病乃大怒分為兩豎逃匿育上伏于膏下和不能愈焦氏易林需之㢲削根燒株不生肌膚病在心腹日以燋枯焦氏易林師之益耋老衰去箴石不祐焦氏易林同人之履花燈百枝消暗衰㣲精光訖盡奄有灰􅀢焦氏易林随之大有聾瞢闇盲跛倚不行焦氏易林咸之夬老河空虚舊井無魚焦氏易林遯之井亂憂並作姦邪充塞雖有百堯顛不可救焦氏易林家人之履上九傒尫尫天撲顙測曰傒尫之撲終不可治也太𤣥經第二傒時當亂也堯舜用術不能立功命當死矣扁鵲行方不能愈病王充論衡定賢篇譬猶入水之燼火滅而煙不即息既斷之木柯葉猶生二者非不有煙非不有葉而其所以為煙為葉者已先亡矣抱朴子内篇極言人有復病難可醫治湏㬰則死海空智藏經持誡品譬如猛火燒焚枯木亦如芭蕉逢於霜雹海空智藏經持誡品譬如敗種種已先滅滅即無牙大乗妙林經譬如朽敗不可令堅猶如巨石墜千丈坑難可逆上玉清經明威真人威邪品患源斯作疾用醫方倍功療治猶不能愈玉清經明威真人威邪品猶如瓦礫一破之後不可更合玉清經通濟幽冥品譬如春雨是物皆潤獨有枯木而不受洽縱不潤者益其朽爛終不能生枝葉花果玉清經通濟幽冥品譬如有人年百二十老耋衰朽又加衆病所謂風病熱病痰病或三雜病是老病人頗從牀座能自起不設有扶令起立亦無力行一俱盧舍二俱盧舍三俱盧舍所以者何老病甚故波羅蜜多經卷三百一十二如斷多羅樹畢竟不復生何有智慧人於中求果實大寳積經卷二十九譬如酥油為火所燒無有遺餘大寶積經卷七十三如樹枯朽火從内起根本既燒枝葉亦盡大乗大方等日藏經卷一譬如鳥翮入火則卷不可舒展雜阿含經卷十八譬如火滅以灰覆之若持枯草及乾牛屎積著其上手觸足蹈無所能燒而不成熟所以者何無所堪任修行道地經分别行相品沉溺於世根猶朽車沒泥不能自拔濟修行道地經集散品如雪聚得火疾而為解釋内身勸章句經令十譬如雪山日光所照悉皆融消無有遺餘阿育王經偈七如敗軍將怖懼失瞻視彼敵人皆謂勇士三昧法門經卷下譬如有人自斷其頭時有一人持以良藥所謂摩叱迦良藥虞尼那嚩良藥竭哩多嚩良藥帶梨那嚩良藥如是等良藥塗所斷頭其何能活正法經卷一譬如疽瘡無不痛時若以藥塗可得少差而不可得愈大智度論卷六譬如必死之病雖有良醫神藥不能救濟大智度論卷五十八猶如病者大醫不治其餘少醫無能治者大莊嚴經論卷十世間縛著沒於衆苦譬如老象溺泥不能自出遺教經論離十二與將隕之疾饋藥不服流矢通中忍痛不拔要求矢藥造構之始以致命絶夫何異哉𢎞明集明佛論譬如有人墮在糞坑全身沒入無髮可拔法苑珠林卷九十禍及九三需于泥致宼至象曰需于泥災在外也易需初二剝牀民所以安未剝其身也至四剝道濡長牀既剝盡以及人身王弼注易剝辨謂牀身之下牀足之上足與牀身分辨之處也今剝落侵上乃至於辨是漸近人身故云剝牀以辨也周易正義剝諸侯以國相連屬憂患相及如葛之蔓延相連及也毛詩旄丘注魚在於沼池之中為人所驚駭不得逸遊亦非能有樂退而濳處雖伏於深淵之下亦甚於炤炤然易見不足以避網罟之害莫知所逃也以興賢者在於朝廷之上為時所陷害不得行道意非能有樂退而隐居雖遁於山林之中又其姓名聞徹不足以避苛虐之政莫知所逃毛詩正義正月言山有此美善之草矣其生也維在梅在栗之下人往取其梅栗之實則蹂踐害此美草使不得蕃茂以興國中有此貧弱之民矣其居也維在富人之傍上多賦斂富人財盡則又并賦此貧弱使之不得生育俱受困窮毛詩正義四月樹木將欲顛仆傾拔之時其根掲然而見此時枝葉未有折傷之害而根本實先斷絶但根本既絶枝葉亦從而絶以喻王位將欲傾覆䘮亡之時而其勢㣲弱而危此時羣臣未有死亡之害而王身實先誅滅王身既滅羣臣亦隨之而滅毛詩正義蕩嵗星客在𤣥枵惟衝鶉火而鶉尾亦有咎者葢以嵗星漸西衝則漸東尾之於鳥猶是一身故衝其身而及其尾春秋正義襄公二十八年安有巢毁而卵不破乎後漢書孔融列傳和鸞未調而身在轅側庭宁未踐而棟折榱覆蜀志郤正傳天收其精地縮其澤人弔其躬鬼芟其頟蜀志郤正傳恐霜威一震玉石俱摧晉書索靖傳譬縣㕑之獸如離繳之鳥將充庖鼎以餌鷹鸇梁書王僧孺傳宋桓司馬有寳珠抵罪出亡王使人問珠之所在曰投之池中於是竭池而求之無得魚死焉此言禍福之相及也呂氏春秋必已適啓其口匕首已陷於胸矣賈子親疏危亂雖以獲功見封猶食毒肉愉飽而羅其咎也鹽鐵論非鞅脣亡而齒寒河水崩其懐在山説苑談叢盜憎主人民愛其上有愛好人者必有憎妬人者夫子好直言枉者惡之禍必及身矣列女傳周列國晉伯宗妻大蛇當路使我畏懼湯火之災切近我膚焦氏易林屯之井雙鳬俱飛欲歸稻池經渉萑澤為矢所射傷我胸臆焦氏易林屯之旅暗旦乗車履危蹈溝亡失裙襦摧折兩軸焦氏易林需之革狼虎所嘷患害必遭焦氏易林噬嗑之履鵠求魚食道遇射弋繒加我頸繳縳兩翼欲飛不能為羿所得焦氏易林剝之革蚍蜉戴盆不能上山脚摧跛蹶損傷其頭焦氏易林復之萃履蛇躡虺與鬼相視驚恐失氣如騎虎尾焦氏易林坎之觀中夜狗吠盜在廬外焦氏易林遯之升狼虎所宅不可以居為我患憂焦氏易林明夷之謙登山伐輻虎在我側焦氏易林蹇之中孚裹糗荷糧與跖相逢欲飛不得為罔所獲焦氏易林旅之恒匠卿操斧豫章危殆焦氏易林小過之師次七乗火寒泉至測曰乗火泉至禍不遠也太𤣥經第三盛且王不見夫鸇之追雀乎翔薄干霄際而下視其雀雀仰覩其鸇之追也而伏于巖垣之側鸇乃垂翼而下之有蛛網張於巖垣渉之而敝是鸇欲捕其雀也非為其蛛網也而固渉焉是鸇也實有捕蛛之名鸇又何辭乎由此觀之外國鸇也王室雀也晉國蛛網也寇王室而及晉不猶捕雀而及蛛乎天祿閣外史防胡俯無鱗以遊遁仰無翼以翻飛曹子建臨觀賦夫藏多者亡厚好謙者忌盈含夜光者速剖循覆車者必傾過載者沈其舟慾勝者殺其生抱朴子外篇安貧陵九折於卭僰泛衝波於呂梁傾側成於俄頃性命哀而莫救廣文選傅季友演慎論豈見覆巢之下復有完卵乎世説新語言語今猶俎上腐肉任人膾截耳世説新語方正但恐革車之所􅞂轢劍騎之所蹂踐椅梓於焉傾折竹箭以此摧殘藝文類聚雜文部檄文嚴霜之零無所不肅長林之斃無所不摽是以楚塹既填遊魚無託呉宫已火歸燕何巢文苑英華庾信連珠本畏車輪折翻嗟馬骨傷文苑英華江揔行邁一詩周書曰魚龍成則藪澤竭藪澤竭則蓮藕掘爾雅翼芙蕖福禧出門妖孽入户天網以發不可觧之也道徳經指歸卷八如置火在乾蘆草舍樓堂臺觀亦被焚燒達磨法藴足論多界品十譬如入賊中行不自慎䕶為賊所得大智度論卷十滋甚言天既終日風且其間又有暴疾以興州吁既不善而其間又有甚惡毛詩正義終風天既終日風且又有暴甚雨土之時以興州吁常為不善又有甚惡恚怒之時毛詩正義終風天既終日風且復隂而曀不見日光矣而又曀以興州吁既常不善且復怒而甚不見喜悦矣而又甚毛詩正義終風言四月已漸暑至六月乃暑極以興王初即位雖為惡政矣未甚酷至于今乃極酷也毛詩正義四月豕性本自能水又加以滂沱之雨是豕彌得性益難禁制以喻荆舒本自好叛加以王之不善是彼彌得志益難咸服毛詩正義漸漸以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也後漢書第五倫列傳蜂目彌彰梟聲無改陳書留異傳火既熾矣更負薪以促之數既窮矣又為惡以促之欲求大厦不燔延期過歴不亦難乎北齊書幼主帝紀狼子之心出而彌野隋書髙祖下帝紀以火救火以水救水名之曰益多莊子人間世里人有病里人問之病者能言其病然其病病者猶未病也若趎之聞大道譬猶飲藥以加病也莊子庚桑楚惜乎惠施之才駘蕩而不得逐萬物而不反是窮響以聲形與影競走也莊子天下其國亂弱矣又皆釋國法而私其外則是負薪而救火也亂弱甚矣韓非子有度止言以言止事以事譬猶揚堁而彌塵抱薪而救火流言雪汙譬猶以湼拭素也淮南子説山訓以詐應詐以譎應譎若披簔而救火毁瀆而止水乃愈益多淮南子説林訓病熱而強之餐救暍而飲之寒救經而引其索拯溺而授之石欲救之反為惡淮南子説林訓求白潔而益其垢猶抱石以救溺愈不濟矣孔叢子陳士義城愈髙而衝愈巧池逾深而梯逾妙法令明而盜賊多盟約數而叛亂甚猶風波駭而魚鼈擾於淵纖羅密而羽禽躁於澤豺狼衆而走獸劇於林㸑火猛而小鮮糜於鼎也抱朴子内篇明本真君建徳之事適足推波助瀾縱風止燎爾文中子問易炙鼓使鳴絞絃令悲實能鼔速穿絃早絶意林抱朴子可謂吞氷療寒揚湯止沸藝文類聚人部説將軍平日與攀無郄而欲殺之者但恐其為蜂蠆耳今攀以去而尚拘閉其家以情推之其念為毒螫必滋甚矣藝文類聚寳玉部金風雨之傷人也先客於皮膚傳入於孫脉孫脉滿則傳入於絡脉絡脉滿則輪於大經脉血氣與邪并客於分腠之間其脉堅大故曰實實者外堅充滿不可按之按之則痛黄帝素問内經調經論風者百病之長也今風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也或痺不仁腫痛當是之時可湯熨及火炙刺而去之弗治病入舎於肺名曰肺痺弗治肺即傳而行之肝病名曰肝痺當是之時可按若刺耳弗治肝傳之脾病名曰脾風當此之時可按可藥可浴弗治脾傳之腎病名曰疝瘕當此之時可按可藥弗治腎傳之心病筋脉相引而急病名曰瘛當此之時可灸可藥弗治滿十日法當死黄帝素問内經玉機真藏論如負乾草而欲救火又如愚人抱疾避病亦如童稚奔走避影玉清經通濟幽冥品譬如惡狗以苦膽灌鼻彼狗倍生凶惡心不大寳積經卷二如世間以火滅火以毒治毒佛本行集經卷五十七譬如大火投之乾薪其燄轉更倍常増多本緣經龍品倍更増益瞋恚猶如膏油投之猛火本緣經月光王品猶如猛火投之膏油膏油既至倍復熾然亦如毒藥投生血中其力則盛譬如渇人飲於鹹水如秋増熱春多洟唾本緣經月光王品如酥注火倍増熾劇無明羅刹經婬人行慈益癡悶如人冷病服冷藥三昧法門經卷下瞋人觀惡増恚心如人熱病服熱藥三昧法門經卷下譬如重病之人雖有衆藥療之無損藥復作病大智度論卷九十四有一人於行路側作小苦行若有人時卧棘刺上若無人時别居餘處有人見已而語之言汝今亦可徐卧刺上何必縱體傷毁甚多此人聞已深生瞋忿放身縱體投棘刺上轉劇於前時有一優婆塞在其傍立是苦行者見已自擺轉復増劇優婆塞即語之言汝於前者但以小刺今復乃用瞋恚之棘而以自刺先所刺者傷毁甚淺貪瞋之刺乃為深刺卧棘刺者苦止一世貪瞋刺苦及無量身以刺刺身此瘡易滅貪瞋刺瘡歴劫不差是故宜速除深毒刺大莊嚴經論卷二如似疥搔瘡搔之痒轉増大莊嚴經論卷七偈夫日月麗天而瞽者莫覩其明雷電震地而聾者不聞其響是誰之過與而方欲議宫商之音篾文章之觀真過之甚者𢎞明集釋駮論喻林卷五十五
