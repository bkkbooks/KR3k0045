body:
  text: 喻林卷一百五明徐元太撰政治門十更新蠱元亨利渉大川先甲三日後甲三日易蠱山下有風蠱君子以振民育德易蠱幹父之蠱意承考也易蠱先庚三日後庚三日吉易㢲若顚木之有由蘖書盤庚上今往遷都更求昌盛如顛仆之木有用生蘖哉孔氏傳書盤庚上此都毁壞若枯死之木若棄去毁壞之邑更得昌盛猶顚仆枯死之木用生蘖哉尚書正義盤庚上人之有疾治之以理則疾去人之有惡化之以道則惡除尚書正義康誥原田毎毎􅃕其舊而新是謀左傳僖公二十八年今有人日攘其隣之雞者或告之曰是非君子之道曰請損之月攘一雞以待來年然後已如知其非義斯速已矣何待來年孟子滕文公下及漢興依日月之末光何謹守管籥因民之疾苦秦法順流與之更始史記蕭相國世家臨淵羡魚不如退而結􅃠今臨政而願治七十餘歲矣不如退而更化前漢書董仲舒傳琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也前漢書董仲舒傳前尹司馬芝舉其綱而太簡次尹劉静綜其目而太蜜後尹李騰毁常法以收一時之聲蝦立司馬氏之綱統裁劉氏之綱目以經緯之魏志傅蝦傳註藜蓧糧莠化為善草魑魅魍魎更成虎士呉志諸葛恪傳清直之風既澆糟粃之俗猶在誠宜濯以滄浪之流漉以吞舟之網晉書應詹傳改前轍者則車不傾革往弊者則政不爽晉書􅄞紹傳琴瑟時未調改弦當更張矧乃治天下此要安可忘宋書樂四志匪更惉懘奚取九成宋書謝莊傳譬琴瑟不調必改而更張法度不平亦須蕩而更制魏書崔𤣥伯傳問道者更正聞道者更容晏子問上龎煖曰王其忘乎昔伊尹醫殷太公醫周武王百里醫秦申麃醫郢原季醫晉范蠡醫越管仲醫齊而五國霸其善一也然道不同數卓襄王曰願聞其數煖曰王獨不聞魏文侯之問扁鵲耶曰子昆弟三人其孰最善為醫扁鵲曰長兄最善中兄次之扁鵲最為下魏文侯曰可得聞邪扁鵲曰長兄於病視神未有形而除之故名不出於家中兄治病其在毫毛故名不出於閭若扁鵲者鑱血脉投毒藥副肌膚間而名出聞於諸侯魏文侯曰善使管子行醫術以扁鵲之道曰桓公㡬能成其霸乎凡此者不病病治之無名使之無形至功之成其下謂之自然故良醫化之拙醫敗之雖幸不死創伸股維卓襄王曰善寡人雖不能無創孰能加秋毫寡人之上哉鶡冠子世賢俗茍沴必為治以矯之物茍溢必立制以檢之累於俗飾於物者不可與為治矣尹文子大道上國亂而治之者非案亂而治之之謂也去亂而被之以治人汙而修之者非案汙而修之之謂也去汚而易之以修故去亂而非治亂也去汚而非修汙也荀子不茍篇善毛廧西施之美無益吾面用脂澤粉黛則倍其初言先王之仁義無益於治明吾法度必吾賞罰者亦國之脂澤粉黛也韓非子顯學去其瞀而載之木解其劍而帶之笏淮南子道應訓衣弊而革裁法弊而更制鹽鐵論詔聖繼大功之勤養勞勌之民此用麋鬻之時鹽鐵論復占墟弊室舊更為新家焦氏易林屯之蠱雖不當路踰吾舊􅃕焦氏易林復之困深谷爲陵衰者復興亂傾之國民德安息焦氏易林明夷之比故室舊廬消散无餘不如新創可以樂居焦氏易林萃之小過膏澤沐浴洗去汚辱焦氏易林漸之噬嗑次八駟馬跙才與切跙而更其御測曰駟馬跙跙更御乃良也太𤣥經第三更鼔瑟者誤於張弦設柱宫商易聲其師知之易其弦而復移其柱王充論衡譴告篇火焚宿草以殖嘉穀更之道也宜更而不更嘉穀之病也太𤣥經第三更解王莽在位如妖氣之在天世祖除之凶惡無餘李善註文選東京賦譬彼針與石效疾而稱良行葦非不厚悠悠何詎央琴瑟時未調改弦當更張廣文選何承天正邪篇逐下祑於後堂兮迎宓妃於伊雒刜䜛賊於中廇兮選呂管於榛薄叢林之下無怨士兮江河之畔無隐夫三苖之徒以放逐兮伊臯之倫以充廬廣文選劉子政憂苦御馬失節其車是碎御天下失節四海失墜桀紂是湯武之梯秦項是大漢之階意林周生列子夫君政陵遲如乘敝車若能求巧工使葺理之折則接之緩則揳之可復新矣意林正論乆成日月得天而能乆照四時變化而能乆成聖人乆於其道而天下化成易恒若今日勤而明日惰昨日是而今日非自旁觀之則有新有舊言王德行終始皆同不有衰殺從旁觀之每日益新尚書正義咸有一德視彼鶺鴒之鳥尚則飛則鳴既飛以翼又鳴以口翼也口也無有止息之時况人之處世其可自舎視此鶺鴒以為喻節故我王當日此行行視朝之禮又而月此行行視朔之政與羣臣議政事日有所决月有所行亦如鶺鴒無肯止息時也毛詩正義小宛王之為政當如昊天之德寒暑有常不為差忒毛詩正義抑農夫既勤耘耨苗稼成熟當本此仁恩愛惜之心以聚集所收勿令浪為費散聖王勸課行善既畢本此仁恩和親聚集善道使不廢棄也禮記正義禮運傳曰五年再閏天道乃僃夫以天地之靈猶五載以成其化况人道哉後漢書朱浮傳天下非一時之用也海内非一旦之功也後漢書朱浮傳天地不能頓為寒暑人主亦不能頓為隆替故寒暑漸於春秋隆替起於得失晉書郤詵傳地不易其則故萬物生焉主不易其則故百姓安焉管子形勢解天覆萬物制寒暑行日月次星辰天之常也治之以理終而復始主牧萬民治天下蒞百官主之常也治之以法終而復始管子形勢解百工之子不學而能者非生巧也言有常事也今也國無常道官無常法是以國家日繆慎子威德上九星如歲如復繼之初測曰星如歲如終始養也太𤣥經第六養人賴其利百年而崩人畏其神百年而亡人用其敎百年而移初學記帝王部總叙帝王視效若有疾惟民其畢棄咎若保赤子惟民其康又書康誥一人有事於四方若卜筮罔不是孚書君奭爾惟風下民惟草書君陳化惡爲善如欲去疾治之以理則惟民其盡棄惡修善孔氏傳書康誥民從上敎而變猶草應風而偃不可不愼孔氏傳書君陳水之性可停可行亦言姪娣之善惡在文姜也鄭氏箋詩敝笱如雨言無常天下之則下天不下則止以言姪娣之善惡亦文姜所使止鄭氏箋詩敝笱文王為政先以心研精合於禮義然後施之萬民視而觀之其好而樂之如覩金玉然鄭氏箋詩棫樸佼佼然飛而往來者桑扈之鳥也有鶯然其羽之文章故人皆觀視而念愛之以興動而升降者王與羣臣也當有威儀禮法則天下亦觀視而樂仰之毛詩正義桑扈泉水有芹而人得采焉王者有道而諸侯法焉毛詩正義采菽有人鼓擊其鐘於宫内其聲必聞於外擊鐘而欲外之不聞不可得也以興王既廢黜其后於宫内其化必流於天下廢后而使天下之不傚王亦不可得也毛詩正義白華墟墓之間未施哀於民而民哀社稷宗廟之中未施敬於民而民敬禮記檀弓下子云上酌民言則下天上施上不酌民言則犯也下不天上施則亂也禮記坊記堂上觀乎室堂下觀乎上禮記坊記孔子射於矍相之圃蓋觀者如堵牆禮記射義我以惡人爲君亦使我惡如大鳥姜姜於上小鳥賁賁於下鄭氏註禮表記善冶之家其子弟見其父兄世業鋾鑄金鐵使之柔合以補治破噐皆合全好故此子弟仍能學爲袍裘補續獸皮片片相合以至完全也善爲弓之家使幹角撓屈調和成其弓故其子弟亦覩其父兄世業仍學取楊柳和軟撓之成箕也禮記正義學記夫君也者民之川澤也行而從之羙惡皆君之由民何能爲焉國語魯一人善射百夫决拾國語呉莫敖子華對威王曰昔者先君靈王好小腰楚士約食馮而能立式而能起食之可欲忍而不入死之可惡然而不避華聞之其君好發者其臣决拾君王直不好若君王誠好賢此五臣者皆可得而致之戰國䇿楚威王雅頌之音理而民正嘄噭之聲興而士奮鄭衞之曲動而心淫史記樂書雙劍之節崇而飛白之俗成挾琴之容飾而赴曲之和作晉書禮上辰極既廻衆星斯仰本源既運枝泒自遷晉書桓温傳衆之從上猶水之居噐也故兆庶之情信於所習晉書裴秀傳御民之轡在上之所貴道民之門在上之所先召民之路在上之所好惡故君求之則臣得之君嗜之則臣食之君好之則臣服之君惡之則臣匿之管子牧民主好本則民好墾草菜主好貨則人賈市主好宫室則工匠巧主好文采則女工靡夫楚王好細腰而美人省食呉王好劍而國士輕死死與不食者天下之所共惡也然而為之者何也從主之所欲也而况愉樂音聲之化乎管子七臣七主桓公曰弓弩多匡䡔音啓者而重籍於民奉繕工而使弓弩多匡䡔者其故何也管子對曰鵞鶩之􅃕近鵾雞鵠䳈音保之通逺鵠鵾之所在君請式璧而聘之桓公曰諾行事期年而上無闕者前無趨人三月解􅂒弓弩無匡䡔者召管子而問曰此何故也管子對曰鵠鵾之所在君式璧而聘之菹澤之民聞之越平而射逺非十鈞之弩不能中鵾雞鵠䳈彼十鈞之弩不得􅀢擏不能自正故三月解􅂒而弓弩無匡䡔者此何故也以其家習其所也管子輕重甲鴻鵠鏘鏘唯民歌之濟濟多士殷民化之管子形勢政煩苛則人姦偽政省一則人醇樸夫人俗隨國政之方圓猶蠖屈之於葉也食黄則身黄食蒼則身蒼亢倉子政道昔齊桓好衣紫闔境不鬻異采楚莊愛細腰一國皆有饑色上之所以率下乃治亂之所由也尹文子大道上合符節别契劵者所以為信也上好權謀則臣下百吏誕詐之人乘是而後欺探籌投鈎者所以為公也上好曲私則臣下百吏乘是而後偏衡石稱權者所以為平也上好傾覆則臣下百吏乘是而後險斗斛敦槩者所以為嘖也上好貪利則臣下百吏乘是而後鄙荀子君道君者儀也儀正而景正君者槃也槃圓而水圓君者盂也盂方而水方君射則臣决楚莊王好細腰故朝有餓人荀子君道主者民之唱也上者下之儀也彼將聽唱而應視儀而動唱嘿則民無應也儀隱則下無動也不應不動則上下無以相有也荀子正論趙王好勇而民多輕死楚靈王好細腰而國中多餓人齊桓公妬而好内故豎刁自宫以治内桓公好味易牙蒸其首子而進之燕子噲好賢故子之明不受國故君見惡則羣臣匿端君見好則羣臣誣能人主欲見則羣臣之情態得其資矣韓非子二柄廣廷嚴居衆人之所肅也宴室獨處曾史之所慢也觀人之所肅非得情也且君上者臣下之所為飾也好惡在所見臣下之飾姦物以愚其君必也韓非子難三為人君者猶盂也民猶水也盂方水方盂圜水圜韓非子外儲說左上叔向御坐平公請事公腓痛足痺轉筯而不敢壊坐晉國聞之皆曰叔向賢者平公禮之轉筯而不敢壊坐晉國之辭仕託慕叔向者國之錘矣韓非子外儲說左上齊王好紫衣齊人皆好也齊國五素不得一紫齊王患紫䝿傅說王曰詩云不躬不親庶民不信今王欲民無衣紫者王以自解紫衣而朝羣臣有紫衣進者曰益逺寡人惡臭是日也郎中莫紫衣是月也國中莫紫衣是歲也境内莫紫衣韓非子外儲說左上上好道下好德上好武下好力聖人原小知大察内知外河上公註老子鑒逺為人君者其出令也其如聲士民學之其如響曲折而從君其如景矣賈子大政上人主之居也如日月之明也天下之所同側目而視傾耳而聽延頸舉踵而望也淮南子主術訓上求材臣殘木上求魚臣乾谷上求楫而下致船上言若絲下言若綸淮南子說山訓夫刻肌膚鑱皮革被創流血至難也然越為之以求榮也聖王在上明好惡以示之經誹譽以導之親賢而進之賤不肖而退之無被創流血之苦而有髙士尊顯之名民孰不從淮南子㤗族訓夫上之化下猶風靡草東風則草靡而西西風則草靡而東在風所由而草為之靡是故人君之動不可不慎也說苑君道臣聞之君好之則臣服之君嗜之則臣食之夫尺蠖食黄則其身黄食蒼則其身蒼君其猶有諂人言乎說苑君道君使服之於内而禁之於外猶懸牛􅈡於門而求買馬肉也公胡不使内勿服則外莫敢為也說􅁐政理明主有擊壤之歌則大臣有輿人之誦上有畫一之諺則下有五袴之謠此表樹而影必從者也楚人有言曰大臣無貂裘則有司寒大臣無甘饌則有司瘠大臣無私門則有司廉天禄閣外史黜陟言叩擊五音各以其聲感而相應也以言君求仁則仁至修正而下直也王逸註楚辭七諫衝飆謐氣則轉蓬山峙修綱既舒則萬目齊理故未有上好謙而下慢主賤寶而俗貧抱朴子外篇廣譬上之所多者下不能安其少也郭子註莊胠篋君以民為體民以君為心心好之身必安之君好之民必從之未見心好而身不從君欲而民不隨也劉子從化人之從君如草之從風水之從器故君之德風之與器也人之情草之與水也草之戴風風鶩東則東靡風鶩西則西靡是隨風之東西也水之在器器方則水方器圓則水圓是隨器之方圓也下之事上從其所行猶影之隨形響之應聲言不虛也劉子從化昔齊桓公好衣紫闔境盡被異綵晉文公不好服羔裘羣臣皆衣䍧羊魯哀公好儒服舉國皆着儒衣趙武靈王好鵕􅀈國人咸冠鵕冠紫非正色䍧非羙毳儒非俗服鵕非冠飾而競之者隨君所好也劉子從化靁霆始發草木舒榮則蟄蟲處巖崖者莫不傾聽而起前漢書註禮樂志物無常性惟化所珍故水本驚蕩風静則安屋本貞堅風來則傾亦由貞專之女值淫奔之俗或有桑中之心凶虐之人被淳風之化當挾賢士之義李善註文選陸士衡演連珠夫馬者王良御之則和馴端正致逺道矣僕人御之則遲奔毁車矣民者譬之馬也堯舜御之則天下端正桀紂御之則天下奔於歴山太平御覽工藝部御治效上九何天之衢亨象曰何天之衢道大行也易大畜六五貞吉升階易升上六井收勿幕有孚元吉易井凡物可收成者則謂之收如五穀之有收也上六處井之極水已出井井功大成者也故曰井收周易正義井天下惡草煥然咸飾若草木同華孔氏傳書湯誥周道如砥音紙其直如矢詩小雅大東翩彼飛鴞音梟集于泮林食我桑黮音甚懷我好音詩頌泮水桃夭后妃之所致也不妬忌則男女以正婚姻以時國無鰥民也毛詩桃夭兎罝后妃之化也關雎之化行則莫不好德賢人衆多也毛詩兎罝騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也毛詩騶虞既醉太平也醉酒飽德人有士君子之行焉毛詩既醉四體既正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣廉官職相序君臣相正國之肥也天子以德為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也禮記禮運聖帝流德天下震懾諸侯賔服連四海之外以為帶安於覆盂動猶運之掌前漢書東方朔傳金石不足以銘髙八音不足以贊羙晉書齊王冏傳皇風載韙時聖道醇舉實為秋摛藻為春晉書潘岳傳雕顏卉服之鄉龍荒朔漠之長莫不廻􅈡朝陽沐浴𤣥澤宋書武帝中本紀德漏下泉功昭上象南齊書海陵王本紀文敎與鵬翼齊舉武功與日車並運梁書武帝上紀野蠶自績何謝歐絲閑田生稻寧殊雨粟梁書元帝紀莫不浸仁沐義照景飲醴梁書江淹傳配天之業光辰象而利貞格地之功侔川岳而長逺陳書宣帝紀今聖化淳洽穆如韶夏食椹懷音梟獍猶變魏書竇瑗良吏傳其他碌碌咸知款貢豈牛馬内向東風入律者也魏書髙句麗史臣傳威德所被飇飛霧襲北史王憲曾孫王晞傳太平之時無瘖龎跛𦕈尫蹇侏儒折短父不哭子兄不哭弟道無襁負之遺育然各以其序終者賢醫之用也故安止平正除疾之道無他焉用賢而已矣韓詩外傳卷三龍逰鳯舞歲樂民喜焦氏易林解之革種一得十日益有息仁政獲民四國親睦焦氏易林萃之姤被珠銜玉沐浴仁德焦氏易林未濟之離次六昆于井市文車同軌測曰昆于井市同一倫也太𤣥經第四昆徽纒縈而靡係鞭朴棄而無加蔡中郎集太傅胡公碑使附德者若潛萌之恱甘雨見歸者猶行潦之赴大川黎民安之若綠葉之綴脩柯左衽仰之若衆星之繫北辰抱朴子外篇君道員􅈡遽善猶氤氲之順勁風要荒承指若響亮之和絶音抱朴子外篇君道恩德比之於水近者游其原逺者浮其末也前漢書註司馬相如傳却走馬以糞車何惜騕褭與飛兎文選東京賦聲與風翔澤從雲遊文選東京賦於是百姓滌瑕盪穢而鏡至清文選東都賦註南箕之風不能暢其化離畢之雲無以豐其澤文選張恊七命庶士傾風萬流仰鏡文選顏延之釋奠詩逺無不肅邇無不懐如風之偃如樂之諧文選王儉禇淵碑文位以龍飛文以虎變𤣥澤旁流仁風潛扇區内宅心方隅回面文選應禎詩惠露霑呉仁風扇越文選沈約安陸王碑文鴻鈞之世何物不樂飛鳥翕翼泉魚奮躍文選王褒四子講德論邇陿遊原遐濶泳沬文選司馬長卿封禪文厥被風濡化者京師沈潛甸内帀洽侯衞厲揭要荒濯沐文選揚子雲劇秦羙新靈輝朝覯稱物納照時風夕灑程形賦音是以至道之行萬類取足於世大化既洽百姓無匱於心文選陸機演連珠九夷之從王化猶洪聲之收清響黎苗之樂函夏若遊形之招惠景補文選夏侯湛抵疑蜂蠆止毒熊羆輟猛廣文選束廣微𤣥居釋善為治者士實於朝野牛馬實於陸鳥獸實於林意林晁錯新書山神曰螭物精曰魅土精曰羵水精曰罔象木精曰畢方火精曰遊光金精曰清明天下有道則衆精潛藏意林正部至徳之明日月若連璧藝文類聚天部日共瀛海而恒流並嵩華而莫朽藝文類聚帝王部陳宣帝哀䇿甘露降耆老得敬則松栢受之尊賢容衆則竹葦受之甘露者仁澤也其凝如脂其美如飴事文類聚霜晉中興書丹丘千年一燒黄河千年一清皆至聖之君以為瑞事文類聚河王子年拾遺記八風並唱未足頌其英聲六樂俱陳無以歌其神武文􅁐英華庾信賀㨗一表六代之舞陳於惣章九州之音一作歌登於司樂虞䕫拊石晉曠調鐘未足頌此英華一作聲無以宣其盛德者也文􅁐英華徐陵遷譴上書仁澤之所灑沾惠風之所偃靡威武之所騰驤刑政之所宣暢浩浩乎其不可涯涘文􅁐英華移文移虜淮陽太守文爰自開闢不羈不絆周公攝祚白雉是獻初學記州郡部嶺南道至治大和之國無待於意而為醫大和之俗無待於養而為藥不以物滑和不以欲亂情子華子北宫意問彼其視鳳凰麒麟也豢牢之養爾彼其視醴液甘露也甽澮之寫爾彼其視芝房竹實凡草木之異者畦圃之毓爾彼其視玉石瓌恠凡種種之族者篋襲之藏爾子華子北宫意問德之盛山無徑迹澤無橋梁不相往來舟車不通何者其民猶赤子也鶡冠子備知至德之世不尚賢不使能上如標枝民如野鹿莊子天地呴嫗覆育萬物羣生潤於草木浸於金石禽獸碩大毫毛潤澤羽翼奮也角觡生也獸胎不贕鳥卵不􅖁父無喪子之憂兄無哭弟之哀童子不孤婦人不孀虹蜺不出賊星不行含德之所致也淮南子原道訓當此之時禽獸蝮蛇無不匿其爪牙藏其螫毒無有攫噬之心淮南子覽㝠訓臥倨倨興眄眄一自以為馬一自以為牛其行蹎蹎其視瞑瞑侗然皆得其和莫知所由生浮游不知所求魍魎不知所往淮南子覽㝠訓虎狼不妄噬鷙鳥不妄摶鳳凰翔於庭麒麟遊於郊青龍進駕飛黄伏皁諸北儋耳之國莫不獻其貢職淮南子覽㝠訓鳳麟至蓍龜兆甘露下竹實滿流黄出而朱草生淮南子本經訓虎豹可尾虺蛇可蹍而不知其所由然淮南子本經訓明德比於馨香甘實故臭而含之李善註文選揚子雲劇秦羙新太平之世則風不鳴條開甲散萌而已雨不破塊潤葉津莖而已雷不驚人號令啟發而已電不眩目宣示光耀而已霧不塞望浸淫被泊而已雪不封條凌殄毒害而已雲則五色而為慶三色而成矞露則結味而成甘結潤而成膏此聖人之在上則陰陽和風雨峕也西京雜記舜南面而治天下天下太平燭於玉燭息於水風食於膏火飲於醴泉舜之行其猶河海乎千仞之溪亦滿焉由此觀之禹湯之功不足言也太平御覽皇王部帝舜有虞氏傳曰虞氏之恩被於動植故鳥鵲之巢可俯而窺埤雅卉物門􅗾無聲而萬物駭無音而萬物唱道德經指歸卷七滅其文章平其險阻折關破鍵使姦自止壊城散獄使民自守道德經指歸卷上水草為稸積裘褐為盛服巨木為廊廟巖宂為室宅主如天地民如草木被道合德恬淡無欲道德經指歸卷七主如天地民如嬰兒飲主之德合主之和道德經指歸卷八天下惘惘味味喁喁不知若鷇無為若雛道德經指歸卷八民闕鷇主如赤子智偽無因而生巧故無由而起道德經指歸卷十喻林卷一百五
