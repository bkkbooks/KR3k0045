body:
  text: 喻林卷九明徐元太撰人事門七所重子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮論語八佾魏􅴃謂建信君曰人有置係蹯者而得虎虎怒决蹯而去虎之情非不愛其蹯也然而不以環寸之蹯害七尺之軀者權也今有國非直七尺軀也而君之身於王非環寸之蹯也願公之熟圖之也戰國䇿趙孝成王權曰昔惠施尊齊為王客難之曰公之學去尊今王齊何其倒也惠子曰有人於此欲擊其愛子之頭而石可以代之子頭所重而䂖所輕也以輕代重何為不可乎方有事於西北江表元元恃主為命非我愛子邪彼所求者於我瓦䂖耳孤何惜焉呉志孫權傳註故毒之在體必割其緩處宋書周朗傳人君無以三寳借人借人則君失其威文王曰敢問三寶太公曰大農大工大商謂之三寶農一其鄉則穀足工一其鄉則噐足商一其鄉則貨足太公六韜六守故明主之務務在行道不顧小物燕爵之集道行不顧管子形勢解民愚則智可以王世智則力可以王民愚則力有餘而智不足世智則巧有餘而力不足商子開塞身以積精為徳家以資財爲徳鄉國天下皆以民為徳韓非子解老或問周寶九鼎寶乎曰器寶也器寶待人而後寶揚子寡見篇或問星有甘䂖何如曰在徳不在星徳隆則晷星星隆則晷徳也揚子五百篇衣裳服者不坐於塵塗愛也衣裳愛焉而不愛其容止外矣容止愛焉而不愛其言行末矣言行愛焉而不愛其明淺矣故君子本神為貴申鑒雜言下蘋蘩藴藻非豐肴之匹潢汙行潦非重酎之對薦之宗廟感靈降祉是知神饗徳之與信不以所養為主猶九土述職各貢方物以効誠耳嵇中散集荅難養生論道存則器不亡道亡則器不存揚子法言註寡見篇愛赤子不慢其保經險者不慢其御意林慎子嚮之取也於囿中勇力之取也今之取也於澤宫揖譲之取也是選士於澤不射侯也但試武而已玉海禮儀射我道有三寶以卑取尊以儉取廣以退取先道徳經四子集解夫言車者以衆材合成乃名車也君以衆人共載乃成君也然無材車何以為有無人君何以為高故愛車者當須重材寶元者當須守人也道徳經註疏巻五慈念蒼生㧞苦與樂此道寶也少欲知足守分不貪此經寶也謙撝柔弱先物後已退身度人此師寶也道徳經註疏卷七譬如慈母長養惠子抱不離膝常以守䕶不與他人共相鬬争海空智藏經供獻品譬如長者其家失火長者見已從􅃕而出諸子在後未脱火難長者爾時定知火害為諸子故旋還救䕶不見其難元陽妙經卷六譬如瞎人唯餘一目䕶持此目畏有損傷大乗妙林經譬如商人以車重載種種財寶逺趍大城若時其車運轉漸漸前進爾時轂輞軸等漸漸鈋鋭如是展轉得入大城車遂一時衆分散壞所為既辦主無顧惜波羅蜜多經卷五百八十如愛一子常將䕶之不令寒温饑渴之苦非為蚊䖟蚤蝨所齧也修行道地經曉了食品譬如有人以草易毳服毒愈病本縁經月光王品若人生百歲不見水老鶴不如生一日得見水老鸖若人生百歲不解生滅法不如生一日得解生滅法阿育王傳三如阿伽陀藥樹葉而裹之取藥塗毒竟樹葉還棄之百喻經卷下譬如野干在林樹間依隨獅子及諸虎豹求其殘肉以自存活時間空乏夜半踰城深入人􅃕求肉不得屏處睡息不覺夜竟惶怖無計走則慮不自免住則懼畏死痛便自定心詐死在地衆人來見有一人言我須野干耳即便截取野干自念截耳雖痛但令身在次有一人言我須野干尾便復截去野干復念截尾雖痛猶是小事次有一人言我須野干牙野干心念取者轉多儻取我頭則無活路即從地起奮其智力絶踊門開徑得自濟大智度論卷十四譬如失火以瓶水救之唯存滅火而不惜瓶大智度論卷十五譬如空地有樹名􅃕摩梨柧枝廣大衆鳥集宿一鴿後至住一枝上其枝及枛即時壓折澤神問樹神大鳥鵰鷲皆能任持何至小鳥便不自勝樹神荅言此鳥從我怨家尼俱盧樹上來食彼樹菓來棲我上必當放糞子墮地者惡樹復生為害必大以是故於此一鴿大壞憂畏寜捨一枝所全者大大智度論卷二十七轉輪聖王少一不滿千子雖有大力諸天世人所不貴重有真轉輪聖王種處在胎中初受七日便為諸天所貴重所以者何九百九十九人不能嗣轉輪聖王種令世人得二世樂是雖在胎必能紹胄聖王是故㳟敬大智度論卷二十八又如人無命根則餘根皆滅有命根故餘根有用大智度論巻二十九譬如合散雖衆藥各各有力石勢大故名為石散又如大軍摧敵雖各各有力主將力大故主得名字大智度論卷六十二譬如欲過嶮道應當敬重頂戴導師又如良醫雖賤為貴者所重大智度論卷八十七譬如慈母愛子雖為子受勤苦不淨不以為惡大智度論卷九十九譬如賈客主欲逺出他國雖以財寶囑累於子大價妙寶偏獨慇懃以其子未識妙寶價重故餘人以估客主是識寶價人而慇懃囑累必知其貴若聞其子讃説寶價則不信之大智度論卷一百夫辨竒貨者採驪珠不忌九洄之深求華璞者追藍琰無憚三襲之險貴其寶也慕至道者窺其户牖輕勢利於鴻毛入其隩隅忽榮位於脱屣重其真也辨正論卷六爲䕶一家寧捨一人為䕶一村寧捨一家為䕶一國寧捨一村為䕶身命寧捨國財法苑珠林卷九十二辯實啟明長庚皆有助日之名而無實光也鄭氏箋詩大東織女有織名爾駕則有西無東不如人織相反報成文章鄭氏箋詩大東牽牛不可用於牝服之箱鄭氏箋詩大東祭器有畢者所以助載鼎實今天畢則施於行列而已鄭氏箋詩大東哀公問於孔子曰寡人聞東益不祥信有之乎孔子曰夫損人自益身之不祥棄老取㓜家之不祥擇賢而任不肖國之不祥老者不教㓜者不學俗之不祥聖人伏匿愚者擅權天下不祥不祥有五東益不與焉孔子家語正論獸行於地隂之物也禽飛戾天陽之物也三墳山墳夫亂人者若芎藭之與藁本蛇床之與蘪蕪許慎云此四者藥草臭味之相似而治病則不同力爾雅釋草疏徒稱無量之壽孰見期頥之叟咨嗟金剛之固安覿不朽之質宋書夷蠻天竺傳仰手似乞俯手似奪捧手似謝擬手似訴拱臂似自􅈡攘臂似格鬭晉書刑法志珉似玉而非玉鷄􅁼鳯而非鳯物誠有之人故宜爾梁書范縝傳譬諸木犬猶被泥龍循名督實事歸烏有北齊書文宣帝紀臣聞彫獸畫龍徒有風雲之勢金舟玉馬終無水陸之功北齊書文苑李廣傳今國子雖有學宫之名無教授之實何異兎絲䴏麥南箕北斗哉北齊書邢邵傳殘固之謂㓂毁則之謂賊夫穿垣竇發扃鑰其盜之細也夫子華子北宫子仕昔宋有丁氏家故無井而出溉汲焉常一日而一人居外懲其如是也鳩工而穿井於庭家相與語曰今吾之穿井得一人矣有聞而傳之者曰丁氏穿井而得一人也國人更相道之語徹於宋君宋君召其人而質之丁氏對曰自臣穿井家獲一人之力非得一人於井也是故黄帝之鑄神鼎是井中人之譬也知者正之是宋君召其人而質之譬也子華子陽城胥渠問則是有譽義之名而不察其實也此譬猶盲者之與人同命白黒之名而不能分其物也則豈謂有别哉墨子非攻下今瞽曰鉅者白也黔者墨也雖明目者無以易之兼白墨使瞽取焉不能知也故我曰瞽不知白墨者非以其名也以其取也今天下之君子之名仁也雖禹湯無以易之兼仁與不仁而使天下之君子取焉不能知也故我曰天下之君子不知仁者非以其名也亦以其取也墨子貴義馬者所以命形也白者所以命色也命色者非命形也公孫龍子白馬論如求白馬於廏中無有而有驪色之馬然不可以應有白馬也不可以應有白馬則所求之馬亾矣公孫龍公蹟府故從山上望牛者若羊而求羊者不下牽也逺蔽其大也從山下而望木者十仞之木若著而求著者不上折也高蔽其長也荀子解蔽客有爲周君畫筴者三年而成君觀之與髹筴者同狀周君大怒畫筴者曰築十仞之墻鑿八尺之牖而以日始出時加之其上而觀周君爲之望見其狀盡成龍蛇禽獸車馬萬物之狀備具周君大悦此畫筴之功非不微難也然其用與素髹筴同韓非子外儲説左上客有為齊王畫者齊王問曰畫孰最難者曰犬馬難孰易者對曰鬼魅最易夫犬馬人之所知旦暮罄於前不可類之故難鬼神無形者不罄於前故易之也韓非子外儲説左上田伯鼎好士而存其君白公好士而亂荆其好士則同其所以為則異公孫友自刖而尊百里竪刁自刖而諂桓公其自刑則同其所以自刑之為則異慧子曰狂者東走逐者亦東走其東走則同其所以東走之為則異故曰同事之人不可不審察也韓非子説林磐石千里不可謂富象人百萬不可謂強石非不大數非不衆也而不可謂富強者磐不生粟象人不可使距敵也今商官技藝之士亦不墾而食是地不墾與磐石一貫也儒俠毋軍勞顯而榮者則民不使與象人同事也夫禍知磐石象人而不知禍商官儒俠為不墾之地不使之民不知事類者也韓非子顯學人之目以照見之也以瞑則與不見同其所以為照所以為瞑異吕氏春秋知接問瞽師曰白素何如曰縞然曰黑何如曰黮然援白黑而示之則不處焉人之視白黑以目言白黑以口瞽師有以言白黒無以知白黑故言白黑與人同其别白黑與人異淮南子主術訓狂者東走逐者亦東走東走則同所以東走則異溺者入水拯之者亦入水入水則同所以入水者則異故聖人同死生愚人亦同死生聖人之同死生通於分理愚人之同死生不知利害所在淮南子説山訓徐偃王以仁義亾國國亾者非必仁義比干以忠靡其體被誅者非必忠也故寒顫懼者亦顫此同名而異實淮南子説山訓或謂冢或謂隴或謂笠或謂簦頭虱不空木之瑟名同異實也淮南子説林訓湯放其主而有榮名崔杼弑其君而被大謗所以為之則同其所以爲之則異淮南子説林訓通人則不然服劍者期於銛利而不期於墨陽莫邪乘馬者期於千里而不期於驊騮綠耳鼓琴者期於鳴亷修營而不期於濫脇號鍾誦詩書者期於通道畧物而不期於洪範商頌聖人見是非若白黑之於目辨清濁之於耳聽衆人則不然中無主以受之譬則遺腹子之上隴以禮哭泣之而無所歸心淮南子修務訓欲審曲直莫如引繩欲審是非莫如引名名之審於是非也猶繩之審於曲直也春秋繁露深察名號人有聞諸侯之君射貍􅈡之樂者於是自斷貍􅈡縣而射之曰安在於樂也此聞其名而不知其實者也春秋繁露楚莊王單快曰國有五寒而氷凍不與焉一曰政外二曰女厲三曰謀泄四曰不敬卿士而國家敗五曰不能治内而務外説苑敬慎晉平公閒居師曠侍坐平公曰子生無目联甚矣子之墨墨也師曠對曰天下有五墨墨而臣不得與一焉平公曰何謂也師曠曰羣臣行賂以采名譽百姓侵寃無所告訴而君不悟此一墨墨也忠臣不用用臣不忠下才處高不肖臨賢而君不悟此二墨墨也姦臣欺詐空虛府庫以其少才覆塞其惡賢人逐姦邪貴而君不悟此三墨墨也國貧民罷上下不和而好財用兵嗜欲無厭諂諛之人容容在旁而君不悟此四墨墨也至道不明法令不行吏民不正百姓不安而君不悟此五墨墨也國有五墨墨而不危者未之有也臣之墨墨小墨墨耳何害乎國家哉新序雜事一刻木象形聞言不信焦氏易林晉之解孔子讀而儀秦行何如也曰甚矣鳳鳴而􅋧翰也揚子淵騫古之得天下而帝者其謀於草莽之初猶盗也及其得郡㧞一邑傾一城秋毫無所攘美女無所淫從善而納策順如崩石疾如決流然後知其為帝王之器也天禄閣外史蟾臺以汙穢之徳隨潔白之蹤里諺所謂懸牛頭而賣馬脯此理之謂也吕氏春秋審分解鏌鎁良劍也取其能斷無取於名也吕氏春秋察今解從平地望泰山之巔鶴如烏烏如爵者􅪮山高逺物之小大失其實王充論衡説日篇飯黍粱者饜飡糟糠者飽雖俱曰食為腴不同儒生文吏學俱稱習其於朝廷有益不鈞王充論衡量知篇有馬於此足行千里終不名驥者與驥毛色異也有人於此文偶仲舒論次君山終不同於二子者姓名殊也故馬效千里不必驥騄人期賢知不必孔墨王充論衡案書篇馬有千里不必騏驎之駒鳥有仁聖不必鳯凰之鶵王充論衡講瑞篇名者所以名實也實立而名從之非名立而實從之也故長形立而名之曰長短形立而名之曰短非長短之名先立而長短之形從之也徐幹中論考偽假空名以求實者亦如執遺契以求富也張湛註列説符多力何必孟賁烏獲逸容豈唯鄭旦毛嬙飊迅非徒驊驑驌騻立斷未獨沉閭干將是以能立素王之業者不必東魯之丘能治掩枯之仁者不必西鄰之昌抱朴子外篇博喻貴逺而賤近者常人之用情也信耳而疑目者古今之所患也是以秦王歎息於韓非之書而想其為人漢武慷慨於相如之文而恨不同世及既得之終不能㧞或納讒而誅之或放乎冗散此盖葉公之好僞形見真龍而失色也抱朴子外篇廣譬周人玉璞其實死鼠楚之鳯凰乃是山鷄愚谷智叟而象頑稱黄公美女乃得醜名魯人縫掖實非儒行東郭吹竽而不知音劉子審名隱者在山樵者亦在山在山則同所以在山則異李善註文選謝靈運田南詩維此魚目唐突璵璠文選任昉到大司馬記室牋頗有蕪菁唐突人參也文選任彦升到記室牋註物固亦有似之而非者玉之未理者為璞死鼠未屠者亦為璞月之旦為朔車之輈亦謂之朔名齊實異所宜辨也西京雜記樹上懸瓠非木實也背上被裘非脊毛也此似而非意林物理論亦猶筌雖得魚筌非魚也蹄雖得兎蹄非兎也藝文􅁼聚方術部卜筮論馬之駿者名曰騏驥犬之駿者名曰韓盧犬之有韓盧馬之有騏驥猶人之聖也名號等設騏驥與韓盧並是寧能頭尾相當八脚如一無有先後之覺矣太平御覽獸部馬五臣聞鴈門不見壘鴈為門金城郡不見積金為郡臣雖居日南未嘗向北㸔日太平御覽天部四日下天子之珤萬金諸侯之珤千金大夫之珤百金士之珤五十金庻人之珤十金穆天子傳譬如空谷因聲有響愚人聞之謂是實聲有智之人解無定實但有聲音誑於耳根海空智藏經問病品譬如山谷響聲愚癡之人謂之實聲達解之人知其非真元陽妙經卷七如人執鏡自見面像愚癡之人謂爲真面智者了達知其非真元陽妙經卷七猶如小兒於炎夏月見熱時盛謂之為水有慧之人於此熱炎終不生於實水之想元陽妙經卷八如幻如陽焰如夢如水月如響如空花如像如光影如變化事如尋香城雖皆無實而現似有離波羅蜜多經卷一如轉輪王若無七寶不得名為轉輪聖王要具七寶乃得名為轉輪聖王波羅蜜多經卷三百五十一譬如丈夫男根成就有根缺者自稱丈夫彼有虚言而無實義波羅蜜多經卷五百八十三如善射師箭不中的應知彼類非善射師波羅蜜多經卷五百八十六如雪山王具山王徳餘山不具若具徳者得山王名若不具徳不立王號波羅蜜多經卷五百八十六如工幻師於四衢道幻作大王及四種軍勇健難敵此中幻王不作是念我今具有四種勇軍勢力難敵四種幻軍不作是念我等一切皆屬大王隨王意轉何以故此中一切若王若軍皆非實有波羅蜜多經五百八十七譬如凡人輙升王座其人即得名為王不波羅蜜多經五百九十二一切世間善治僞珠不能令成瑠璃寶珠大寶積經卷一百一十二如人無子而説有子某時當生空有此言云何可信何以故不真實故文殊師利問經卷下譬如有人立梯空地餘人問言立梯何爲答曰我欲上堂又問堂何所在東西南北耶答曰不知此人立梯欲上堂者豈非虛妄耶長阿含經卷十六如山河草木土地人民州郡城邑名之為國巷里市陌廬館宫殿名之為都梁柱椽棟瓦竹壁石名之為殿大智度論卷三十六譬如種種好藥不能破病不名為藥趣得土泥等能差病者是名為藥大智度論卷三十九譬如井深綆短不及便言失井井實不失大智度論卷五十七人心以聲為實以響為虛影以面鏡為實像為虚燄以風塵日光為實水為虚幻以祝術為實祝術所作為虚大智度論卷六十五如象有䨇牙垂一鼻頭有三隆耳如箕脊如彎弓腹大而垂尾端有毛四脚麁圓是為象相若離是相更無有象可以相相如馬竪耳垂鬉四脚同蹄尾通有毛若離是相更無有馬可以相相十二門論守六蛩非驉也驉非蛩也今滅蛩蛩而駏驉不死斬駏驉而蛩蛩不亾𢎞明集九夫蘭庭鮑肆日久愛其先狎楊文敦洽寵積緣其曲情是以鹿馬殊形秦人一其貌麟􅍪異質魯俗迷其容吠聲之儔頓至於此辨正論卷八尚實且華而不實怨之所聚也左傳文公五年應矦曰鄭人謂玉未理者璞周人謂鼠未腊者朴周人懷朴過鄭賈曰欲買朴乎鄭賈曰欲之出其朴乃鼠也因謝不取今平原君自以賢顯名於天下然降其主父沙丘而臣之天下之王尚欲尊之是天下之王不如鄭賈之智眩於名不知其實也戰國策秦昭襄王傳聞不如親見視景不如察形後漢書馬援傳夭夭園桃無子空長虛美難假偏輪不行宋書樂三志真龍將下誰好有名濫吹先逃何須别聽隋書崔廓隱逸傳宋人有游於道得人遺契者歸而藏之宻數其齒告鄰人曰吾富可待矣列子説符人主於説也皆如燕王學道也而長説者皆如鄭人爭年也是以言有纎察微難而非務也故李惠宋墨皆畫策也論有深閎大非用也故畏震瞻車狀皆鬼魅也言而拂難堅硧非功也故務卞鮑介墨翟皆堅瓠也且虞慶拙匠也而屋壞范且窮工而弓折是故求其誠者非歸餉也不可韓非子外儲説左上今巫祝之祝人曰使若千秋萬歲千秋萬歲之聲聒耳而一日之壽無徵於人此人所以簡巫祝也今世儒者之説人主不言今之所以治而皆道上古之傳譽先王之成功曰聽吾言則可以霸王此説者之巫祝有度之主不受也韓非子顯學琬琰之玉在洿泥之中雖亷者弗釋弊箄甑瓾在􅀈茵之上雖貪者不摶美之所至雖汚辱世不能賤惡之所在雖高隆世不能貴淮南子説山訓象肉之味不知於口鬼神之貌不著於目捕景之説不形於心淮南子説林訓嚼而無味者弗能内於㗋視而無形者不能思於心淮南子説林訓説西施之美無益於容道堯舜之徳無益於治鹽鐡論遵道響像无形骨體不成焦氏易林暌之旅夫説梁飰食肉有好於面目而不若糲粢藜蒸之可食於口也圖西施毛嬙可説於心而不若醜妻陋妾之可御於前也虛張高譽彊蔽疵瑕以相誑耀有快於耳而不若忠選實行可任於官也潛夫論實貢子欲以忠信為笈仁義為贐則弟子之從子也安能食子之忠信飲子之仁義而免其饑餓耶天禄閣外史辭受所謂土柈瓦胾無救朝饑者也抱朴子外篇用刑何異乎畫敖倉以救饑仰天漢以解渴説崑山之多玉不能賑原憲之貧觀藥藏之簿領不能治危急之疾墨子刻木鷄以厲天不如三寸之車鎋管青鑄騏驥於金象不如駑馬之周用言高秋天而不可施者丘不與易也抱朴子外篇應嘲霜雪巖巖苫盖不可以代裘室如懸磬草木不可以當糧劉子貴農以穀帛爲珍寶比珠玉如糞土何者珠玉止於虚玩而穀帛有實用也劉子貴農假使天下瓦礫盡化爲和璞砂石皆變爲隋珠如值水旱之歲瓊粒之年則璧不可以禦寒珠不可以充饑也雖有奪日之鑑代月之光歸於無用也何異畫為西施美而不可悦刻作桃李似而不可食也劉子貴農畫繒刻木以爲龍而求致雨則不可得也掦子法言註先知篇爲事非虛立功須實故三章設而漢隆𤣥言流而晉滅李善註文選陸士衡演連珠周孔以禮樂訓世故其迹可尋倪惠以堅白爲辭故其辨難繼是以唐虞逺而淳風流存蘓張近而解環易絶也李善註文選陸士衡演連珠美女之影不惑荒婬之人高山之陰不止不進之馬虛實之騐在兹也李善註文選陸士衡演連珠春華雖美期於秋實氷璧雖澤期於見日藝文􅁼聚后妃部后妃箴如攀珠樹徒仰照車之輝若踐玉田不知照廡之價藝文􅁼聚職官部太子詹事表選舉莫取有名如畫地作䴵不可噉也藝文􅁼聚職官部中書侍郎盈尺徑寸易取琢磨南箕北斗難爲簸挹何則良工質美在器成珍假名責實涉求必殆藝文􅁼聚職官部尹表劍鏤七星非有司天之用縑圖五嶽寜識崇朝之雲是知策彼泥龍不能令其逐日乘斯流馬安可使其奔電藝文類聚職官部尹表繫風捕影涉求之路靡階玉馬金舟適逺之資無託藝文􅁼聚職官部刺史表鏤冰雕脂不見大龍之象課虛叩寂寜聞駕辨之音藝文􅁼聚職官部太守章觀於龍門有一魚奮鱗鼓鬐而登乎龍門而爲龍又一術士凌波蹈流而不陷摇鈴行歌飄浪於龍門而終日棲遲而不化符子曰彼同功而事異迹一而理二夫何哉無乃魚以實應而人以僞求乎藝文􅁼聚鱗介部魚野馬不任騎兔絲不任織藝文類聚草部鹿葱詩薄氷凝池非登廟之寶零露垂珠非綴冕之飾必將採素璧於層山掇圓珠於重澗事􅁼賦地部氷註如影隨形雖有非實五燈㑹元東土祖師達摩華要歸其實莖葉如木根西昇經譬如鏡中影可見不可取言如響中應風聲豈可緒西昇經如水中月水動則動猶如畫像難成易壞元陽妙經卷二譬如夏熱有人西行在於曠野復有一人從西而至問前人曰我今熱渴如何處有清水樹䕃可見憂濟彼人荅曰從此東行當有二路一左一右宜從右路漸次前行有清泉池及凉䕃樹彼熱渴者雖聞如是泉及樹名思惟徃趣取除熱渴得清凉不不也彼至入池洗飲息𣗳方離熱渴乃得清凉波羅蜜多經卷五百六十七譬蜃樓切景知積氣以忘躋鸞鏡含姿悟唯空而輟攬波羅蜜多經卷五百七十六汝等不應猶如銅鈸空有其聲應順如來修行此法大寶積經卷二譬如貧窮賤人假富貴名稱此名不大寶積經卷一百一十二譬如虚空中不生穀實也地種乃生穀實耳佛遺日摩尼寶經推六譬如有人在空閒地以泥瓦草木葺之成宇既而諦觀一一物中無􅃕可得大乘蜜嚴經卷中譬如善射人仰射於虛空箭勢不盡空尋復墜於地菩薩處胎經卷一如月樹葉影現於水野干飲之終竟無獲中隂經卷下譬如空聚落川竭瓶無水非無彼諸器中虛故名空鴦崛摩羅經卷二譬如伎人王前作樂王許千錢後從王索王不與之王語之言汝向作樂空樂我耳我與汝錢亦樂汝耳百喻經卷下如小兒求水中月鏡中像如是等願皆不可得可得願者鑚木求火穿地得水大智度論卷三十譬如人有一子喜在不淨中戯聚土爲穀以草木爲鳥獸而生愛著人有奪者􅀈恚啼哭其父知已此子今雖愛著此事易離耳小大自休何以故此物非真故大智度論卷九十二喻林卷九
