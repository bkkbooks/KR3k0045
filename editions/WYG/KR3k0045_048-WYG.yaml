body:
  text: 喻林卷四十八明徐元太撰人事門四十六倒置緑兮衣兮緑兮黄裏緑兮衣兮緑兮黄裳詩國風緑衣山有扶蘇隰有荷華叶芳無反不見子都乃見狂且山有喬松隰有游龍不見子充乃見狡童詩國風山有扶蘇舟人之子熊羆是裘私人之子百僚是試詩小雅大東隰桑刺幽王也小人在位君子在野毛詩隰桑鶖也鶴也皆以魚為美食者也鶖之性貪惡而今在梁鶴潔白而反在林幽王養褒姒而餒申后近惡而遠善鄭氏箋詩白華為綠衣兮當先染絲而後製衣是汝婦人之所為汝何故亂之先製衣而後染使失制度也以興嫡在先而尊貴妾在後而卑賤是汝賤妾之所為汝何故亂之令妾在先而尊嫡在後而卑是亂嫡妾之禮失本末之行毛詩正義緑衣間色之緑不當為衣猶不正之妾不宜嬖寵今綠兮乃為衣兮間色之緑今為衣而見正色之黄反為裏而隠以興今妾兮乃蒙寵兮不正之妾今蒙寵而顯正嫡夫人反見踈而微緑衣以邪干正猶妾以賤陵貴毛詩正義緑衣山上有扶蘇之木隰中有荷華之草木生於山草生於隰髙下各得其宜以喻君子在上小人在下亦是其宜今忽置小人於上位置君子於下位是山隰之不如也毛詩正義山有扶蘇山上有枯槁之松木隰中有放縱之龍草松木雖生髙山而柯條枯槁龍草雖生於下隰而枝葉放縱喻忽之養臣君子在於上位則不加恩澤小人在於下位則禄賜豐厚言忽養臣顛倒失其所也毛詩正義山有扶蘇𤣥文幽處兮矇謂之不章離婁微睇兮瞽以為無明變白而為黒兮倒上以為下鳯凰在笯兮雞雉翔舞同糅玉石兮一槩而相量史記屈原傳鸞鳯伏竄兮鴟梟翺翔闒茸尊顯兮讒䛕得志聖賢逆曵兮方正倒植世謂伯夷貪兮謂盜跖㢘莫邪為頓兮鉛刀為銛于嗟嘿嘿兮生之無故斡棄周鼎兮而寶康瓠騰駕罷牛兮驂蹇驢驥垂兩耳兮服鹽車章甫薦屨兮漸不可久史記賈生傳子獨不見鴟梟之與鳯凰翔乎蘭芷芎藭棄於廣野蒿蕭成林使君子退而不顯衆公等是也史記日者傳資娵娃之珍髢兮鬻九戎而索賴鳯皇翔於蓬陼兮豈鴐鵞之能㨗騁驊騮以曲囏兮驢騾連蹇而齊漢書揚雄傳上珍蕭艾於重笥兮謂蕙芷之不香斥西施而弗御兮羈要裊以服箱後漢書張衡列傳公卿所舉率黨其私所謂放鴟梟而囚鸞鳯後漢書劉陶傳燕石緹襲以華國兮和璞遥棄於南荆夏像韜塵于市北兮瓶罍抗方於兩楹鸞凰耿介而偏栖兮蘭桂背時而獨榮晉書摰虞傳倒戈授人必至之禍宋書胡藩傳冠履倒錯珪甑莫辯梁書武帝紀中墨以為明狐而為蒼以一為二以二為三公不能禁也子華子晏子問黨仁人詘約暴人衍矣忠臣危殆讒人服矣璇玉瑶珠不知佩也雜布與錦不知異也閭娵子奢莫之媒也嫫母刁父是之喜也以盲為明以聾為聰以危為安以吉為凶荀子賦篇螭龍為蝘蜓鴟梟為鳯凰荀子賦篇夫有天賞得為主而未常得主之實此之謂大悲是正坐於夕室也其所謂正乃不正矣吕氏春秋明理夫本末舛逆首尾横决國制搶攘非有紀也賈子數寜披羊裘而賃固其事也貂裘而負籠甚可怪也淮南子説山訓鳯鳥不識珍寶梟鴟孔叢子記問頭尾顛倒不知緒處焦氏易林離之井首陽為拙柱下為工揚子淵騫楚國户服白蒿滿其要𢃄以為芬芳反為幽蘭臭惡為不可佩也以言君親愛讒佞憎遠忠直賢良而不宜近之也王逸註楚辭離騷經麋當在山林而在庭中蛟當在深淵而在水涯以言小人宜在山野而陞朝廷賢者當居尊官而為僕𨽻也王逸註楚辭九歌言世人皆棄崑山之玉大澤之龜反相與重貴小石也言闇君貴佞偽賤忠直也王逸註楚辭惜誓言君乃拔去芝草賤棄橘柚種植芋荷養育苦李愛重小人斥逐君子也王逸注楚辭七諫言君放遠要褭英俊之士而駕槖駝任使罷駑鈍朽之人而棄明賢之士也王逸註楚辭七諫言甂甌之器登明堂周鼎反入於深淵之水言小人任政賢者隠思也王逸註楚辭七諫痛鳯兮遠逝仁智之士遁世去也畜鴳兮近處畜養佞䛕而親附也鯨鱏兮幽潛大賢隠匿竄林藪也從蝦兮遊陼小人並進於朝廷也王逸注楚辭九懐言葛有正直之枝抑棄枯槁而不見采朽壤惡者滿車陞進反見珍重御尊顯以言真正之人棄於山野佞曲之臣陞於顯朝也王逸注楚辭九懷言與多力烏獲同車驂乗令仁賢邵公執役養馬失其宜者也王逸注楚辭九歎言甘棠香美之木枯於草中而不見御反種蒺藜棘刺之木滿於中庭以言遠仁賢近讒賊也王逸注楚辭九歎言蔡女美好反見貶黜而去離帷幄戎狄醜婦反入椒房被五綵繡衣夫人之服也王逸注楚辭九歎言葛藟惡草乃緣於桂樹鴟鴞貪鳥而集於木蘭以言小人進在顯位貪佞升為公卿者也王逸注楚辭九歎言西施美好棄於後宮不見進御仳倠醜女反倚立徧兩楹之間侍左右也王逸注楚辭九歎言乃藏九鼎於江淮之中反炊土釡於堂宇之上猶言棄賢智近愚頑者也王逸注楚辭九歎言乃破伯牙號鍾所鼓之鳴琴反持凡人小筝急張其絃而彈之以言世憎惡大賢之言親信小人之語也王逸注楚辭九歎言退却騏驥以轉物徙重車乗駑頓驢驘反以奔走馳逐急疾失其性也以言役使賢者令之負擔進用頑愚以任政職亦失其志也王逸注楚辭九歎言鳴鳩鳥輕佻巧利乃棲於桑榆居茂木之上鼓翼而鳴得其所也此言讒佞弄口妄説以居尊位得志意也王逸注楚辭九歎不辨黑白棄玉取石虎羊同羣武侯十六䇿隂察且夫含血氣物之生也行則背在上而腹在下其病若死則背在下而腹在上何則背肉厚而重腹肉薄而輕也賢儒俗吏並在當世有似於此將明道行則俗吏載賢儒賢儒乗俗吏將闇道廢則俗吏乗賢儒賢儒處下位猶物遇害腹在上而背在下也且背法天而腹法地生行得其正故腹背得其位病死失其宜故腹反而在背上非唯腹也凡物仆僵者足又在上賢儒不遇仆廢於世踝足之吏皆在其上東方朔曰目不在面而在於足救昧不給能何見乎王充論衡狀留篇棄此蓀芷襲彼蕭艾嵇中散集兄秀才公穆入軍贈詩夫以玉為石者亦將以石為玉矣以賢為愚者亦將以愚為賢矣以石為玉未有傷也以愚為賢者亡之診盖診亡者雖存而必亡猶脉死者雖生而必死也可勿慎乎抱朴子外篇權材背公之俗彌劇正直之道遂壊於是斥鷃因驚風以凌霄朽舟託迅波而電邁鸞鳯卷六翮於叢棘鷁首滯潢汙而不擢矣抱朴子外篇吳失駑蹇矯首於琱多么切輦駥驥委牧乎林坰抱朴子外篇名實於是鼖鼓戢雷霆之音鞉徒刀切鞞奴移切咨蝶鼛音髙之響芳蕙芟夷臭鮑佩御𤣥鬯傾棄而不羞醨酪専灌於圓丘汗血驅放而垂耳跛蹇馳騁於鑾軒此古人之所以懷沙負石赴流魚𦵏而不堪與之同世也抱朴子外篇名實養豺狼而殱驎虞殖枳棘而翦椒桂抱朴子外篇漢過殷雷輷磕於龍潛之月凝霜肅殺乎朱明之運抱朴子外篇吳失小畜髀補尒切之反頁音頡之􅠆傳曰髀之反股在上也頁之􅠆首在下也元包仲陽蘇糞壤以充幃兮謂申椒其不芳文選屈原離騷經蟬翼為重千鈞為輕黄鐘毁棄瓦釡雷鳴讒人髙張賢士無名文選屈原卜居順帝之末京師謡曰直如弦死道邊曲如鉤反封侯文選袁陽源倣白馬篇詩注方世俗之幽昏兮眩白黒之美惡放山川之龜玉兮相與貴夫礫石補文選賈誼惜逝握剞劂而不用兮操規榘而無施騁騏驥於中庭兮焉能極夫遠道置猿狖于櫺檻兮夫何以責其㨗巧駟跛鼈而上山兮吾固知其不能陞釋管晏而任臧獲兮何權衡之能稱箟昆簬路雜於黀鄒蒸兮機逢矢以射革補文選莊忌哀時命伊優北堂上骯髒倚門邊補文選趙壹疾邪賦梟鴞既以成羣兮𤣥鶴弭翼而屏移蓬艾親入御於牀第兮馬蘭踸踔而日加棄捐廣文選東方曼倩怨世西施媞媞而不得見兮嫫母勃屑而日侍桂蠧不知所淹留焉蓼蟲不知徙乎葵菜廣文選東方曼倩怨世親讒諛而踈賢聖兮訟謂閭娵為醜惡愉近習而蔽遠兮孰知察其黑白廣文選東方曼倩怨世行明白而曰黒兮荆棘聚而成林江離棄於窮巷兮蒺藜曼乎東廂賢者蔽而不見兮讒䛕進而相朋梟鴞並進而俱鳴兮鳯皇飛而髙翔廣文選東方曼倩怨世斥逐鴻鵠兮近習鴟梟斬伐橘柚兮列樹苦桃廣文選東方曼倩七諫鸞皇孔鳯日以遠兮畜鳬鴐鵞雞鶩滿堂壇兮鼃黽游乎華池要褭奔亡兮騰駕槖駝鉛刀進御兮遥棄太阿拔搴𤣥芝兮列樹芋荷橘柚委枯兮苦李旖旎甂甌登於明堂兮周鼎潜乎深淵廣文選東方曼倩謬諫今反表以為裏兮顛裳以為衣戚宋萬扵兩楹兮廢周邵於遐夷却騏驥以轉運兮騰驢驘以馳逐蔡女黜而出帷兮戎婦入而綵繡服慶忌囚於阱室兮陳不占戰而赴圍破伯牙之號鍾兮挾人筝而彈緯藏瑉石於金匱兮捐赤瑾於中庭韓信蒙於介胄兮行夫將而攻成莞芎棄於澤洲兮瓟􅀈蠧於筐簏麒麟奔於九臯兮熊羆羣而逸囿折芳枝與璚華兮樹枳棘與薪柴掘荃蕙與射干兮耘藜藿與蘘荷廣文選劉子政憂吿傷明珠之赴泥兮魚眼璣之堅藏同駑驘與乗駔兮雜班駮與闒茸葛藟虆於桂樹兮鴟鴞集于木蘭偓促談於廊廟兮律魁放乎山間惡虞氏之簫韶兮好遺風之激楚潜周鼎於江淮兮㸑土鬵於中宇廣文選劉子政惜賢播規榘以背度兮錯權衡而任意操䋲墨而放棄兮傾容幸而侍側甘棠枯於豐草兮藜棘樹於中庭西施斥於北宮兮仳倠倚於彌楹烏獲戚而驂乗兮燕公操於馬圉蒯瞶登於清府兮咎繇棄於壄外廣文選劉子政愍命菀蘼蕪與菌若兮漸藁本於洿瀆淹芳芷於腐井兮棄雞駭於筐簏執棠谿以刜蓬兮秉干將以割肉筐澤㵼以豹鞹兮破荆和以繼築廣文選劉子政靈懐載約屨而正朝服兮降皮弁以為履寶礫石於廟堂兮面隋和而不眠廣文選劉子駿遂初賦􅅃冬而生兮凋彼葉柯瓦礫進寶兮捐棄隋和鉛刀厲御兮頓棄太阿驥垂兩耳兮中坂蹉跎蹇驢服駕兮無用日多修潔處幽兮貴寵沙劘鳯皇不翔兮鶉鴳飛揚廣文選王子淵陶壅指正義兮為曲訿璧玉兮為石鶻鵰遊兮華屋鵕䴊棲兮柴簇廣文選王叔師遭厄菽藟兮蔓衍芳虈兮挫枯朱紫兮雜亂曽莫兮别諸廣文選王叔師怨上貪枉兮黨比貞良兮煢獨鵠竄兮枳棘鵜集兮帷幄􅀢蕠兮青葱藁本兮萎落廣文選王叔師憫士茅絲兮同䋴冠屨兮共絇督萬兮侍宴周邵兮負芻白龍兮見射霛龜兮執拘廣文選王叔師悼亂寶彼兮沙礫捐此兮夜光椒瑛兮湼汙葈耳兮充房楚辭王逸傷時鸞鳥鳯皇日以遠兮燕雀烏鵲巢堂壇兮露申辛夷死林薄兮腥臊並御芳不得薄兮楚辭屈原惜誦痛鳯兮遠逝畜鴳兮近處鯨鱏兮幽潛從蝦兮遊陼楚辭王褒匡機堇荼茂兮敷疏蘅芷彫兮瑩嫇楚辭王逸悼亂穢盃盂之周用令瑚璉以抗閣恨騾驢之進庭屏騏驥於溝壑藝文類聚人部言志賦鸋鴂軒翥鸞鳯挫翮啄碎琬琰寶其瓴甋藝文類聚禮部弔文淳于髠至鄰家見其竈突之直而積薪在傍謂曰此且有火使為曲突而徙薪鄰家不聽後果焚其屋鄰家救火乃滅烹羊具酒謝救火者不肯呼髠智士譏之曰曲突徙薪無恩澤燋頭爛額為上客盖傷其賤本而貴末也藝文類聚火部竈俚語云州縣符如霹靂得詔書但以掛壁太平御覽天部霹靂二至改度乖錯委曲隆冬大暑盛夏霜雪参同契猶如有人濟海求寶不取真珠直取金精亦如有人棄妙音聲而聽惡響如捨正室而愛婢妾如捨金器而取瓦盂如棄甘露法味而食惡毒食如捨善男子而親諸惡友如棄良醫而信巫鬼如捨元始天尊甘露法食而服魔怨種種惡味元陽妙經卷八如有貧人得無價寶棄而翻取迦遮末尼波羅蜜多經卷四百四十如有飢人得百味食棄而求噉稊稗等飯波羅蜜多經卷四百四十譬如愚人捨月禮事星宿大寶積經卷一百一十二惑亂上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪寇婚媾往遇雨則吉易睽蓼蓼然長大者正是莪也而不精審視之以為非莪反謂之維蒿毛詩正義蓼莪如當路築室得人而與之謀所為路人之意不同故不得遂成也鄭氏箋詩小旻譬欲秦而更楚假南路於東尋北齊書文苑顏之推傳適鄢郢而迷塗入邯郸而失步隋書王貞文學傳惑者狂者木石之樸也而道義未戴焉晏子春秋問下秦人逢氏有子少而惠及壯而有迷罔之疾聞歌以為哭視白以為黒饗香以為朽嘗甘以為苦行非以為是意之所之天地四方水火寒暑無不倒錯者焉其父之魯過陳遇老耼因吿其子之證老耼曰汝庸知汝子之迷乎今天下之人皆惑於是非昏於利害同疾者多固莫有覺者且一身之迷不足傾一家一家之迷不足傾一鄉一鄉之迷不足傾一國一國之迷不足傾天下天下盡迷孰傾之哉向使天下之人其心盡如汝子汝則反迷矣哀樂聲色臭味是非孰能正之且吾之言未必非迷而况魯之君子迷之郵者焉能解人之迷哉列子周穆王三人行而一人惑所適者猶可致也惑者少也二人惑則勞而不至惑者勝也而今也以天下惑予雖有祈嚮不可得也莊子天地水動而影揺人不以定美惡水勢𤣥也瞽者仰視而不見星辰不以定有無用精惑也荀子解蔽冥冥而行者見寢石以為伏虎也見植木以為後人也冥冥蔽其明也醉者越百步之溝以為蹞步之澮也俯而出城門以為小之閨也酒亂其神也厭目而視者視一為兩掩耳而聽者聽漠漠以為洶洶勢亂其官也荀子觧蔽齊景公游少海𫝊騎從中來謁曰嬰疾甚且死恐公後之景公遽起𫝊騎又至景公曰趨駕煩且之乗使騶子韓樞御之行數百步以騶為不疾奪轡代之御可數百步以馬為不進盡釋車而走以煩且之良而騶子韓樞之巧而以為不如下走也韓非子外儲説左毁譽成黨衆口熏天賢不肖不分以此治國賢主猶惑之也又况乎不肖者乎呂氏春秋離謂鄰父有與人鄰者有枯梧樹其鄰之父言梧樹之不善也鄰人遽伐之鄰父因請而以為薪其人不説曰鄰者若此其險也豈可為之鄰哉此有所宥也夫請以為薪與弗請此不可以疑枯樹之善與不善也齊人有欲得金者清旦被衣冠往鬻金者之所見人操金攫而奪之吏搏而束縛之問曰人皆在焉子攫人之金何故對吏曰殊不見人徒見金耳此真大有所宥也夫人有所宥者固以晝為昏以白為黒以堯為桀宥之為敗亦大矣吕氏春秋去宥夫衆口之毁譽浮石沈木羣邪所抑以直為曲視之不察以白為黒夫曲直之異形白黑之異色乃天下之易見也然自謬也或不能分明其是非者衆邪誤之矣陸子辨惑事之適亂如地形之惑人也機漸而往俄而東西易面人不自知也故墨子見衢路而哭之悲一跬而繆千里也賈子新書審微今陳卒設兵兩軍相當將施令曰斬首拜爵而屈撓者要斬然而隊階之卒皆不能前遂斬首之功而後被要斬之罪是去恐死而就必死也故利害之反禍福之接不可不審也事或欲之適足以失之或避之適足以就之楚人有乗船而遇大風者波至而自投於水非不貪生而畏死也惑於恐死而反忘生也故人之嗜慾亦猶此也淮南子汜論訓北楚有任俠者其子孫數諌而止之不聽也縣有賊大搜其廬事果發覺夜驚而走追道及之其所施德者皆為之戰得免而遂反語其子曰汝數止吾為俠今有難果頼而免身而諫我不可用也知所以免於難而不知所以無難論事如此豈不惑哉宋人有嫁子者告其子曰嫁未必成也有如出不可不私藏私藏而富其於以復嫁易其子聽父之計竊而藏之若公知其盗也逐而去之其父不自非也而反得其計知為出藏財而不知藏財所以出也為論如此豈不悖哉今夫僦載者救一車之任極一牛之力為軸之折也有加轅軸其上以為造不知軸轅之趣軸折也楚王之珮玦而逐兔為走而破其玦也因珮兩玦以為之豫兩玦相觸破乃逾疾亂國之治有似於此淮南子汜論訓故通於道者如車軸不運於已而與轂致千里轉無窮之原也不通於道者若迷惑告以東西南北所居聆聆一曲而辟然忽不得復迷惑也故終身𨽻於人辟若俔之見風也無須臾之間定矣淮南子齊俗訓窮鄉多曲學小辯害大知巧言使信廢小惠妨大義説苑談叢言周家建立德化其道平直公方所履無失而言蕪穢傾危者心惑意異也以平直為傾危則以忠正為邪枉也王逸註楚辭七諫言世人愚惑惡虞舜簫韶之樂反好俗人淫泆激楚之音猶惡典謨忠正之言而好諂䛕之説也王逸註楚辭九道陟多阪胡言連蹇譯瘖且聾莫使道通焦氏易林乾之乾三癡俱走迷路失道惑不知歸反入患口焦氏易林乾之晉二人異趣反覆迷惑一身五心亂無所得焦氏易林坤之賁癡狂妄作心誑善惑迷行失路不知南北焦氏易林屯之小過三癡且狂欲之平鄉迷惑失道不知昏明焦氏易林大有之遯客指東西未得便安焦氏易林豫之離鼻目易處不知香臭焦氏易林随之乾一身三口語無所主東西南北迷惑失道焦氏易林咸之離心西意東事無成功焦氏易林晉之家人次八迷目逹腹測曰迷目逹腹外惑其内也太𤣥經第二逹次二迷腹逹目測曰迷腹逹目以道不明也太𤣥經第二逹不智之人辯慧懷給不知所裁之猶棄驥而惑不知所詣也淮南子主術訓解夫尋常咫尺之近理人間取舍之細事沈浮過於金羽皂白分於粉墨而抱惑之士猶多不辨焉抱朴子内篇微㫖或奔車走馬赴阬谷而不憚以九折之阪為螘封或登危蹋頹雖墮墜而不覺以呂梁之淵為牛跡也抱朴子外篇酒􅶸視泰山如彈丸見滄海如盤盂抱朴子外篇酒誡疢美而無直亮之鍼艾羣惑而無指南以自反抱朴子外篇疾謬以二缶鍾惑而所適不得者言各自信據故不知所之郭子注莊天地今指犬似人轉白似黒則不類矣轉以類推以此象彼謂犬似玃玃似狙狙似人則犬似人矣謂白似緗緗似黄黄似朱朱似紫紫似紺紺似黒則白成黑矣劉子審名海濵居者望島如舟望舟如鳬而須舟者不造島射鳬者不向舟知是望遠目亂而心惑也山底行者望嶺樹如簪視岫虎如犬而求簪者不上樹求犬者不往呼知是望髙目亂而心惑也劉子正賞白黑相渝能無微乎是非相擾能無散乎文中子天地臣猶吳牛見月而喘世説新語言語堯舜之智桀紂以為不智堯舜以為智惡知堯舜之非桀紂桀紂之非堯舜乎藝文類聚人部智良御惑燕楚玅察亂澠淄藝文類聚樂部論樂詩今有疑者所謂蚌異蛤二五為非十也太平御覽文部著書下傾耳求音不聞霆擊澄神密眠豈覿山髙初學記服食部酒同昧其本而競談其末猶未識辰緯而意斷南北羣迷暗争失得無準何氏語林文學如盲人自無所見引人路途轉轉迷惑而不知覺三十六部尊經黄林經如盲不見道進尺不知寸雖有四衢路隨意任奔馳海空智藏經問病品偈譬如有人行路拾得遺篋開篋視鏡自見其影謂是篋主心地惶怖稽首而謝棄之而去衆生迷惑捨真取偽棄本尋末亦復如是无上内秘藏經辨四真品身口意業有四種惑何等為四一者貪惑二者癡惑三者淫惑四者嗊嗃惑所謂嗊嗃惑者詐言道術無真實相元陽妙經卷五譬如道士觀不净時見所著衣服悉是皮相而實非皮所可食噉皆作蟲相而實非蟲觀好美羮作糞穢汁相而實非糞穢觀所食乳酪猶如髓腦而實非髓腦觀骨碎秣猶如粉相而實非粉元陽妙經卷五譬如人醉其心眩亂視諸山川城郭宫殿日月星辰皆悉廻轉元陽妙經卷十譬如有人欲見大海既至海㟁返觀牛跡作是念言大海中水淺深多少豈及此耶波羅蜜多經卷三百二如有工匠欲造大殿如天帝釋殊勝殿量見彼殿已而返揆摸日月宫殿波羅蜜多經卷三百三如彼渴人愚癡無智為熱所逼見動陽熖於無水中妄生水想波羅蜜多經卷三百九十九譬如見熖而生水想實無有水以眼亂故文殊師利問經卷上譬如盛日舒光燭地氣蒸飄動猶如水流渴獸迷惑向之奔走大乗密嚴經卷下譬如有人聞俱耆羅聲又見其形尋復見烏而生迷惑作是説言俱耆羅俱耆羅汝等如是非法為法守䕶非法如彼見烏謂俱耆羅鴦崛摩羅經卷三譬如有愚夫見雹生妄想謂是琉璃珠取己執持歸置之瓶器中守䕶如真寶不久悉融消空想黙然住於餘真琉璃亦復作空想鴦崛摩羅經卷三如有士夫度大曠野聞合羣鳥鳴時彼士大夫畏是鳥聲謂有刼賊異道而去入空澤中至虎狼處為虎所食大法鼔經卷下如遊曠野指東謂為西中隂經卷下譬如夏熱或有賈客失衆伴輩獨在後行上無傘盖足下無履體面汗出脣口焦乾熱炙身軀張口吐舌劣極甚渴四顧望視其心迷惑遥見野馬意謂是水謂為不遠盡力馳走趣於野馬身劣益渴遂更困頓日轉晚暮時向欲凉不見野馬無有此水心既覺之是熱盛炎之所作耳修行自念吾本亦然渴於情欲追之不息著終始愛還自焦然迷為疑想癡網所盖野馬見惑吾從久遠儻有是心貪著于我修行道地經行空品昔有愚人其婦端正情甚愛重婦無貞信後於中間共他交往邪婬心盛欲就傍夫捨離已壻於是密語一老母言我去之後汝可賫一死婦女屍安著屋中語我夫言云我已死老母於後伺其夫主不在之時以一死屍置其家中及其夫還老母語言汝婦已死夫即往視信是己婦哀哭懊惱火積薪油燒取其骨以囊盛之晝夜懷挾婦於後時心厭傍夫便還歸家語其夫言我是汝妻夫荅之言我婦久死汝是阿誰妄言我婦乃至二三猶故不信如彼外道聞他邪説心生惑著謂為真實永不可改雖聞正教不信受持百喻經卷上昔乾陀衞國有諸伎人因時飢儉逐食他土經婆羅新山而此山中素饒惡鬼食人羅刹時諸伎人㑹宿山中山中風寒然火而卧伎人之中有患寒者著彼戲衣羅刹之服向火而坐時行伴中從睡寤者卒見火邊有一羅刹竟不諦觀捨之而走遂相驚動一切伴侣悉皆逃奔時彼伴中著羅刹衣者亦復尋逐奔馳絶走諸同行者見其在後謂欲加害倍増惶怖越度山河投赴溝壑身體傷破疲極委頓乃至天明方知非鬼百喻經卷下譬如無目人得蛇以為瓔珞有目人語是蛇非是瓔珞大智度論卷七十如人闇中見似人物謂是實人而生畏怖又如惡狗臨井自吠其影水中無狗但有其相而生惡心投井而死大智度論卷八十九如人目翳視清浄珠見其目影便謂珠不浄大智度論卷九十五譬如衆生盲人彼未曽見象為彼盲人將示象諸生盲者或捉象鼻或牙或耳或足或尾或背彼示已問象何相或説言如犁轅或言如杵或言如簸箕或言如碓臼或言如苕箒或言如石山如是不通逹攝大乗論卷四可謂指蟲迹為蒼文餌螫乳為醍醐良可哀也𢎞明集折夷夏論夫導師失路則迷塗者衆𢎞明集難夷夏論致令雪山採藥争取毒草深水求珠競持瓦礫辨正論卷一喻林卷四十八
