body:
  text: 喻林卷五十七明徐元太撰人事門五十五忽大養其一指而失其肩背而不知也則為狼疾人也孟子告子上不能三年之喪而緦小功之察放飯流歠而問無齒決是之謂不知務孟子盡心上諦毫末者不見天地之大審小音者不聞雷霆之聲闗尹子九藥夫目察秋毫之末耳不聞雷霆之聲耳調玉石之聲目不見太山之髙何則小有所志而大有所忘也淮南子俶真訓殺戎馬而求狐狸援兩鼈而失靈龜斷右臂而争一毛折鏌邪而爭錐刀用智如此豈足髙乎淮南子説山訓畫者謹毛而失貌射者儀小而遺大淮南子説林訓觴酒豆肉遷延相讓辭小取大雞亷狼吞鹽鐵論褒賢夫小事者味甘而大道者醇淡近物者易驗而逺數者難效非大明君子則不能兼通者也故皆惑於所甘而不能至乎所淡眩於所易而不能反於所難徐幹中論務本夫所知麥之善於菽稻之勝於稷由有効而識之假無稻稷之域必以菽麥為珍養謂不可尚矣然則世人不知上藥良於稻稷猶守菽麥之賢於蓬蒿而必天下之無稻稷也嵇中散集答難養生論避牛跡之淺嶮而墮百仞之不測違濡足之泥涇投鑢冶而不覺乎抱朴子外篇逸民澄視於秋毫者不見天文之煥炳肆心於細務者不覺儒道之𢎞遠翫鮑者忘􅊉蕙迷大者不能及抱朴子外篇崇教夫曲思於細者必忘其大鋭精於近者必略於遠由心不並駐則事不兼通小有所係大必所忘也故仰而貫針望不見天俯而拾蝨視不見地天地至大而不見者眸掩於針蝨故也劉子觀量智伯庖人亡炙一篋而即知之韓魏將反而不能知邯鄲子陽園亡一桃而即覺之其自亡也而不能知斯皆鋭情於小而忘大者也劉子觀量今人主不思甘露零醴泉涌而患枇杷荔支之腐亦鄙矣藝文類聚果部枇杷修習蚊蚋行而不志龍象鴦崛摩羅經卷二昔有父子二人緣事共行路賊卒起欲來剝之其兒耳中有真金璫其父見賊卒發畏失耳璫即便以手挽之耳不時決為耳璫故便斬兒頭須􅁷之間賊便棄去還以兒頭著於肩上不可平復如是愚人為世間所笑百喻經卷下山中掲鳥尾有長毛毛有所著便不敢復去愛之恐㧞覆為獵者所得身為分散而為一毛故三慧經藉八譬如犛牛護尾一毛著樹守樹而死不令毛斷達摩多羅禪經下榮八焉得閉目以觀天地塞耳而聽雷霆辯正論卷五曷為存濡沫之小惠捨夫江海之大益僧肇註維摩詰經菩薩品自多以此視物猶如𦕈目自為能視不足為明也以此履踐猶如跛足自為能履不足與之行也周易正義履君臣並不自知俱曰我身大聖唯各自矜而賢愚無别譬之於烏誰能知其雌雄者毛詩正義正月彼童羊實無角而為有角自用妄為觝觸人以喻王后本實無徳而為有徳自用横干政事毛詩正義抑齊莊公朝指殖綽郭最曰是寡人之椎也州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴左傳襄公二十一年王好戰請以戰喻填然鼓之兵刃既接棄甲曵兵而走或百歩而後止或五十歩而後止以五十歩笑百歩則何如曰不可直不百歩耳是亦走也孟子梁惠王上往時遼東有豕生子白頭異而獻之行至河東見羣豕皆白懐慚而還若以子之功論於朝廷則為遼東豕也後漢書朱浮列傳墨杘單至嘽咺憋懯四人相與游於世胥如志也窮年不相知情自以智之深也巧佞愚直婩斫便辟四人相與游於世胥如志也窮年而不相語術自以巧之㣲也㺒㤉情露􅟌㥛凌誶四人相與游於世胥如志也窮年不相曉悟自以才之得也眠娗諈諉勇敢怯疑四人相與游於世胥如志也窮年不相讁發自以行無戾也多偶自專乗權隻立四人相與游於世胥如志也窮年不相顧眄自以時之適也此衆態也列子力命塪井之鼃謂東海之鼈曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接掖持頥蹶泥則沒足滅跗還虷蟹與科斗莫吾能若也莊子秋水鄭人緩為儒使其弟墨儒墨相與辯其父助翟十年而緩自殺其父夢之曰使而子為墨者予也闔胡嘗視其良既為秋栢之實矣夫造物者之報人也不報其人而報其人之天彼故使彼夫人以已為有以異於人以賤其親齊人之井飲者相捽也故曰今之世皆緩也莊子列御宼夫醜者自以為姣故不飾愚者自以為知故不學觀笑在已而不自知不好用人自是之過也鹽鐵論殊路莫視而自見莫賈而自貴鹽鐵論訟賢言以荷葉為衣雖香好然浩浩蕩蕩而不可帶又易敗也以諭懐王自以為有賢明之徳猶以荷葉為衣王逸註楚辭九辨上聖兼䇿載馳猶懼不逮前而庸主緩歩按轡而自以為過之抱朴子外篇君道但知私財不入公事夙辦便云我能治民不知誠已形物執轡生組反風滅火化鴟為鳯之術也顔氏家訓勉學徳行未著而稱我能猶足不能行而賣躄藥望人信之實為難矣劉子辨施嫫母闚井自謂媚勝西施齊桓矜徳自稱賢於堯舜若子貢始事孔子一年自謂勝之二年以為同徳三年方知不及以子貢之才猶不識聖人之徳望風相崇奚况世人而能推已耶劉子心隐穿井之人為已有造泉之功而捽飲者不知泉之天然也莊子音義列御宼各以所長相輕所短里語曰家有敝帚享之千金斯不自見之患也文選魏文帝典論論文馮夷不遇海若則不以已為小雲將不失於其鴻濛則無以知其少由斯言之自是者不章自建者不立廣文選阮嗣宗莊論西施自窺於井不恃其美猶佐湯沐堯舜自窺於世不恃其美猶湏寸徳况中庸而拒諫嫫母自窺於井以為媚於西施桀紂自窺於世以為賢於堯舜太平御覽人事部美婦人莊子曰介鬭閭里有狗宋人之駑狗也其家命之為淖逐狗不及而止止而望之自以為過矣初學記獸部狗註薛談學謳於秦青未窮青之技而辭歸青餞於郊乃撫節悲歌聲振林木響遏行雲乃謝求反初學記樂部歌少學或心髙易滿如牛跡如䑕手持物自謂已能多大方廣佛華嚴經讃卷十二譬如有鹽大如㣲塵此鹽自謂世間鹹者更無過我世有智者而便取之投之於海唐失其身鹹何所在大方等佗羅尼經卷四昔有大長者子共諸商人入海採寳此長者子善誦入海捉船方法若入海水漩洑洄流磯激之處當如是捉如是正如是住語衆人言入海方法我悉知之衆人聞已深信其語既至海中未經幾時船師遇病忽然便死時長者子即便代處至洄洑駃流之中唱言當如是捉如是正船槃廻旋轉不能前進至於寳所舉船商人沒水而死百喻經卷下舎利弗白佛言譬如貧家饑凍之人得大珍寶如湏彌山寧歡喜不佛言甚善舎利弗言我到彼刹得聞彼佛説阿惟越致深奥之事是以欣踊不能自勝佛言善哉如汝所言佛語舎利弗譬如長者大迦羅越純以紫摩金摩尼珠為寳内有掃除銅鐵鈆錫棄在於外糞壤之中有貧匱者喜得持歸言我大得迦羅越寳寧是長者珍妙寳非荅言非也佛語舍利弗汝所聞得如是貧者舊雜譬喻經有一梵志道士智博通達衆經備舉無事不貫貢髙自譽天下無比求敵而行無敢應者晝日執炬行城市中人問之曰何以晝日執炬而行梵志荅曰世皆愚冥目無所見是以執炬照之耳佛即化作一賢者居肆上坐即呼梵志何為作此梵志荅曰以衆人冥晝夜不見明故執炬火而照之耳賢者重問梵志經中有四明法為知之不梵志慚愧棄炬乂手有不及心佛知其意即還復身光明炳然晃照天地便持梵聲為梵志若多少有聞自大以憍人是以盲執燭照彼不自明佛説偈已告梵志曰冥中之甚無過於汝而晝執炬行入大國如卿所知何如一塵法句譬喻經一多聞品譬如春種秋穫自以力得何足自憍大智度論卷十四指南為北自謂不惑以西為東自謂不矇以鵄梟而咲鳯凰執螻蚓而調龜龍𢎞明集牟子理惑論猶如羣猪中有一猪出羣已詣大糞聚此猪飽食􅜴已還至猪羣中便自貢髙我能得此好食諸猪不能得食法苑珠林卷九十不量芄蘭刺霍叔也以童子僭成人之服比其不度徳量力而助武庚作亂詩説邶語曰以筦闚天以蠡測海以莛撞鐘豈能通其條貫考其文理發其聲音哉繇是觀之譬猶鼱鼩之襲狗孤豚之咋虎至則靡耳何功之有前漢書東方朔傳武嘉區區以一蕢障江河用沒其身前漢書何武王嘉師丹傳賛此猶河濱之人捧土以塞孟津多見其不知量也後漢書朱浮列傳乃欲運螳螂之斧禦隆車之墜後漢書袁紹列傳然儉以區區一掌而欲獨堙江河終嬰疾甚之亂後漢書黨錮列傳夫僬僥之歩而企及夸父之蹤近才所以躓礙也要離之羸而強赴扛鼎之勢秦人所以斷筋也晉書葛洪傳既樹非梧桐而希鸞鳯降翼晉書索襲傳何足以抗沸海之濤當燒山之熖宋書沈攸之傳惟此魚目唐突璵璠梁書任昉傳盖基薄牆髙塗遙力躓傾蹷必然顛匐可俟梁書王僧孺傳浩以蓬蒿之才荷棟梁之重魏書髙允傳繭犢引大車弱質任厚棟所謂愛之所以害之矣魏書外戚傳而欲以狗犢齒虎口也魏書崔浩傳以彼曲師危卒望我軍鋒何異蛣蜣被甲蝍蛆舉尾魏書島夷蕭衍傳何異於蹄涔之魚冀拯江海魏書慕容白曜傳豈寃禽之能塞海非愚叟之可移山周書庾信傳怖甚真龍之降慚過白豕之歸隋書王貞文學傳夸父不量力欲追日影逐之於隅谷之際渇欲得飲赴飲河渭河渭不足將走北飲大澤未至道渇而死列子湯問以君之力曽不能捐魁父之丘如太行王屋何列子湯問汝不知夫螳螂乎怒其臂以當車轍不知其不勝任也是其才之美者也莊子人間世二三子有復於子墨子學射者子墨子曰不可夫知者必量其力所能至而從事焉國士戰且扶人猶不可及也今子非國士也豈能成學又成射哉墨子公孟能小而事大辟之是猶力之少而任重也舎粹折無適也身不肖而誣賢是猶傴身而好升髙也指其頂者愈衆荀子儒效譬之是猶以塼塗而塞江海也以僬僥而戴太山也蹎跌碎折不待頃矣荀子正論以詐遇齊辟之猶以錐刀墮太山也非天下之愚人莫敢試荀子議兵乳狗之噬虎也伏雞之摶貍也恩之所加不量其力淮南子説林訓吾以是默口於小道塞耳於諸子乆矣而子立尺表以度人植寸指以測淵孔叢子荅問今齊世庸士之人不好學問專以已之愚而負荷巨任若無檝舳濟江海而遭大風漂沒於百仞之淵東流無崖之川安得沮而止乎鹽鐵論殊路鄰不我顧面望玉女身多癩疾誰肯媍者焦氏易林師之小過家在海隅橈短流深焦氏易林觀之明夷卵與石鬬麋碎無處焦氏易林復之豫欲飛無翼鼎重折足焦氏易林坎之頥上九童麋觸犀灰其首測曰童麋觸犀還自纍也太𤣥經第一童次五大爵集于宫庸小人庳音婢傒空測曰宫庸之爵不可空得也太𤣥經第二傒次八觸石決木維折角測曰觸石決木非所治也太𤣥經第六難次四卵破石毈徒玩切測曰卵破之毈小人難也太𤣥經第六難子幹欲以坯土而塞濁涇以握石而補崩山其不戮也幸矣天祿閣外史去蜀夫以筯撞鐘以算擊鼔不能鳴者所用撞擊之者小也王充論衡感虚篇如泰山失火沃以一杯之水河決千里塞以一掊之土能勝之乎非失五行之道小大多少不能相當也王充論衡譋時篇何異操圭爵以量滄海執毫釐而廻日月其可得乎王子年拾遺記燕昭王知其嘍嘍無所先入欲以弊藥必規昇騰者何異䇿蹇驢而追迅風棹籃舟而濟大川乎抱朴子内篇金丹猶斥鷃之揮短翅以凌陽矦之波猶鱦力駑質以渉昫猿之峻非其所堪祗足速困抱朴子内篇明本昔西施心痛而卧於道側姿顔妖麗蘭麝芬馥見者咸美其容而念其疾莫不躊躇焉於是隣女慕之因偽疾伏於路間形狀既醜加之酷臭行人皆憎其貌而惡其氣莫不睨面掩鼻疾趨而過焉今世人無戴阮之自然而効其倨慢亦是醜女闇於自量之類也抱朴子外篇刺驕猶褰裳以越滄海企佇而躍九𤣥抱朴子外篇廣譬猛獸不奮摶於度外鷹鷂不揮翮以妄擊若廟算既内不揆徳進取又外不量力猶輕羽之投洪罏飛雪之委沸鑊朝菌之試干將羔犢之犯虣虎也抱朴子外篇廣譬麋童犀角而相觝觸剛柔不等有勝有否也太𤣥經第一童觧以短小之物欲測深大之域莊子音義庚桑楚非醇粹之方壯謀踳駮於王義孰愈尋靡􅀢於中逵造沐猴於棘刺文選魏都賦排終身之積慘求數刻之暫歡譬由疾疢彌年而欲一丸銷之其可得乎文選劉琨答盧諶詩序夫錙銖之衡縣千金之重徑尺之鏡照尋丈之形用過其力傷其本性故在權則衡危於鏡則照暗也文選陸士衡演連珠註覆蕢之量而塞北川之洪廣文選曹輔佐對儒太子若以燕當秦猶以羊捕狼意林燕丹子欲顯白於雪中馳光於日下不可得也意林秦子彼洪川之方割豈一簣之所堙藝文類聚禮部弔文師金曰西施病心而矉其里之醜人見而美之歸亦捧心而矉其里之富人見之堅閉門而不出貧人見之挈妻子而去之事文類聚美女孟子艾子使於燕燕王曰吾小國也日為強秦所侵徴求無已吾國貧無以供之欲草兵一戰又力弱不足以拒敵如之何則可先生其為謀之艾子曰亦有分也王曰其有説乎艾子曰昔有龍王逢一蛙於海濵相問訊後蛙問龍王曰王之居處如何王曰珠宫貝闕翬飛璇題龍復問汝之居何若蛙曰綠苔碧草清泉白石復問曰王之喜怒如何龍曰吾喜則時降膏澤使五榖豐稔怒則先之以暴風繼之以飛電使千里之内寸草不留龍問蛙曰汝之喜怒何如曰吾之喜則清風明月一部鼔吹怒則先之以努眼次之以腹脹然至於脹過而休於是燕王有慙色事文類聚蛙所以舉尾支山怒臂當轅一作轍文苑英華盧思道檄一舉螳螂之斧被蛣蜣之甲當窮轍以待輪坐積薪而候燎文苑英華杜弼檄一穴蟻衝泉未知逺慮𤣥禽巢幕何能支乆是以大厦既焚不可灑之以淚長河一決不可障之以手文苑英華庾信連珠盖聞北邙之髙魏君不能削榖洛之鬬周王不能改是以愚公何徳遂荷鍤而移山精衛何禽欲銜石一作枝而塞海文苑英華庾信連珠敢以不肖之軀而慕龍鳯之年欲以朝花之質希晦朔之期漢武帝内傳有似無翅之鸎願鼓翼天池朝生之蟲而樂春秋者哉漢武帝内傳譬如螢火並於日月亦如掬水比於大海玉清經慈悲方便品譬如男子得無價摩尼珠持水精比之欲令合同道行波羅蜜經卷四諸小蟲獸欲驚師子大寳積經卷十一猶如野干入師子羣大寳積經卷三十二以孫陁羅比此天女還如香醉山内以瞎獼㺅比孫陁羅百千萬倍不及其一大寳積經卷五十六譬如有人不著甲胄不持刀仗輒入陣中必遭傷害大集地藏十輪經卷六譬如有人持一束草言欲堰塞恒河大流大集菩薩三昧經卷四如有人至大海際或取一板或持小筏或欲身渉或欲身浮廣施方便發如是言我度大海登陟彼岸大集菩薩三昧經卷四譬如有人無有脚足而欲趣彼鬱單越土如無目者而欲讀書如無手者而欲執作大方等大集經卷二十四喻如有人以一把䴰投恒河中謂能以此斷彼駛流念佛三昧經卷三譬如湏彌山王殊妙髙顯有小黑山而居其側云何可言相與等比正法經卷一譬如有人入於大海而欲盡見其水邉際又如有人臨於大海以手勺水欲盡枯涸終不能就徒自疲勞正法經卷二豈當以螢火之光與日競明田家灰堆欲比湏彌鵄鷲烏鵲金鳥並飛出矅經八信品豈可以藕根中絲懸湏彌山耶可以兎身度大海耶可以蚊觜盡海底耶本緣經毗羅摩品不可以芥子同彼湏彌螢火之光等於日月一滴之水同於大海阿育王傳四昔有一貧人有少財物見大富者意欲共等不能等故雖有少財欲棄水中傍人語言此物雖尠可得延君性命數日何故捨棄擲著水中百喻經卷下如人眼視不明指示好醜大智度論卷六十五所謂管闚穹極寧辨西東蠡度滄溟安知髣髴𢎞明集十所謂輕陳一旅敵堂堂之鋒輒馳駑駘與騏驥而並行𢎞明集十無異䇿駑足以均驊騮繫澤雉以雙鸞鶴𢎞明集十一吾之所襃猶以塵埃附嵩泰收朝露投江海子之所謗猶握瓢觚欲減江海躡耕耒欲損崐崘側一掌以翳日光舉土塊以塞河衝𢎞明集牟子理惑論譬猶持瓢欲減江海側掌以蔽日月不能損江海之泉掩日月之明也𢎞明集駮夷夏論足下猶欲抗遺燎於日月之下𢎞明集張融門論以螢燭之見疑三光之盛芸隙之滴怪淵海之量𢎞明集孫綽喻道論舉熠滛八反燿於日月之間非智也擁甂甌於鴻鐘之側非慮也辯正論卷二矜白鳥之翼望駭嵩華負爝火之光爭輝日月辯正論卷五豈陽文與􅀈蔑比麗孟娵與儱亷競妍辯正論卷六猶螢光與龍燭競輝魚目與蛇珠並耀辯正論卷六騰鷃共鵬翼偶髙馳駑與驥足爭逺辯正論卷六無以欄甃之辯譏滄海之廣狹榆枋之智測崑閬之髙卑乎辯正論卷六豈以坳塘小水匹馮夷大波者哉辯正論卷七竟以淺深較其闕蟻蛭之小比峻於嵩華牛岑之闕猶如鶴尾俟於罏炭猶如蚊子與金翅鳥捔飛遲疾猶如小兎共師子王捔其威力如此之比不自度量法苑珠林卷二十八欲以手爪抱湏彌山欲以口齒齚齧金剛法苑珠林卷五十五強為上九翰音登于天貞凶易中孚二三子復於子墨子曰告子勝為仁子墨子曰未必然也告子為仁譬猶跂以為長偃以為廣不可乆也墨子公孟不是師法而好自用譬之是猶以盲辨色以聾辨聲也舍亂妄無為也荀子脩身篇使但吹竽使氐厭竅雖中節而不可聽無其君形者也淮南子説林訓時不至不可強生也事不究不可強成也説苑談叢延頸遠望昧為目病焦氏易林升之謙使遽者揖讓百拜非禮也憂者絃歌鼓瑟非樂也申鑒雜言上雖有喬喬之莠其榖不可得雖懐忉忉之怨遠人不可見言仲尼之道深遠不可彊學揚子法言註吾子篇不念己之短翮不隨燕雀為侣而欲以黄鵠比遊黄鵠一舉冲天翺翔四海短翮追而不逮將安歸乎李善註文選阮嗣宗詠懐詩今吾子聞仁義之羈絆係聲名之韁鏁伏孔氏之軌躅馳顔閔之極藝何以大道為自眩也昔有學歩邯鄲者匍匐而歸耳藝文類聚人部隱逸上顔淵所以命短慕孔子所以傷其年也若庸馬良馬相追至暮共列良馬宿所鳴食如故庸馬垂頭不復食何異顔淵與孔丘優劣太平御覽獸部馬五凡人才所不至而極思之則志傷也力所不勝而極舉之則形傷也攝生養性論如菴羅果樹上熟者其味甘美人所貪嗜若生鬱者其味則苦人所薄賤大方等大集經十八有一師子獸王在深林中住師子清旦初出窟時四向顧望奮迅三吼然後遊行擇肉而食彼師子獸王食已還林常有一野干隨後食殘氣力充足便自言彼林中師子竟是何獸能勝我耶我今寧可獨擅一林清旦出窟四向顧望奮迅三吼然後遊行擇肉食耶彼尋獨處一林清旦出窟奮迅三吼然後遊行欲學師子吼而作野干鳴長阿含經卷十一譬如朽故車輪以雜繩索而用繫縳強使運轉身毛喜豎經下譬如有人富貴自在忽於一時以水沐髮復以鮮潔上妙衣服而為嚴飾乃出其舎時有貧人見已欣樂即自還家亦沐其髪復以故衣洗濯令淨是人雖復多汲其水濯彼故衣徒使疲勞終不能令服飾新好一切生中若乆生者同彼貧人濯其故服終不能淨若初生者如彼富人衣新好衣未生塵垢正法經卷三昔有一人其婦端正唯其鼻醜其人出外見他婦女面貌端正其鼻甚好即截他婦鼻持來歸家急喚即割其鼻尋以他鼻著婦面上既不相著復失其鼻唐使其婦受大苦痛百喻經卷上昔有梵志兄弟四人皆得五通自知命促七日必死兄弟議曰我等兄弟神通自在能以神力翻覆天地現極大手捫摸日月移山住流無所不辦寧當不能避此難也第一兄曰吾入大海上下平等正處中間無常煞鬼安知我處第二弟言吾入湏彌山腹中間還合其表使無際現無常煞鬼焉知我處第三弟言吾處虚空隠形無跡無常煞鬼安知我處第四弟言吾當隠在大市之中衆人猥閙各不相識無常煞鬼趣得一人何必取吾四人議訖相將辭王而白王曰吾等計算餘命日促各欲逃走欲求多福王尋告曰善進其徳於是别去各適所至七日期滿各從其處而皆命終法苑珠林卷四十九喻林卷五十七
