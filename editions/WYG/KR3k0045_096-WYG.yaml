body:
  text: 喻林卷九十六明徐元太撰政治門一端本聖人作則必以天地為本以陰陽為端以四時為柄以日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜禮記禮運上者民之儀也有司執政民之表也邇臣使辟者羣臣僕之倫也故儀不正則民失誓表弊則百姓亂邇臣便辟不正亷而羣臣服汙矣大戴禮記子張問入官上者民之表也表正則何物不正是故君先立於仁則大夫忠而士信民敦工璞商慤女憧婦空空七者敎之志也七者布諸天下而不窕内諸尋常之室而不塞是故聖人等之以禮立之以義行之以順而民棄惡也如灌大戴禮記主言事父可以事君事兄可以事師長使子猶使臣也使弟猶使承嗣也能取朋友者亦能取所予從政者矣賜與其宫室亦猶慶賞於國也忿怒其臣妾亦猶用刑罰於萬民也是故為善必自内始也大戴禮記曾子立事田無主則荒廢故用人為主今以人情為田用聖人以為田主則人情不荒廢也禮記正義禮運夫表曲者景必邪源清者流必潔猶叩樹本百枝皆動也後漢書李固列傳澄其源者流清溷其本者末濁後漢書郎顗列傳今冦賊在外四支之疾内政不理心腹之患後漢書陳蕃列傳濁其源而望流清曲其形而欲景直不可得也後漢書劉般傳上邪下難正衆枉不可矯音和響必清端影縁直表宋書樂四志人君之身者乃百姓之表一國之的也表不正不可求直影的不明不可責射中今君身不能自治而望治百姓是猶曲表而求直影也君行不能自修而欲百姓修行者是猶無的而責射中也周書蘇綽傳一人之治亂在其心一國之存亾在其主管子七臣七主君之在國都也若心之在身體也道德定於上則百姓化於下矣戒心形於内則容貌動於外矣管子君臣下天或維之地或載之天莫之維則天以墜矣地莫之載則地以沈矣夫天不墜地不沈夫或維而載之也夫又况於人人有治之辟之若夫靁鼓之動也管子白心景不為曲物直響不為惡聲美是以聖人明乎物之性者必以其類來也故君子繩繩乎慎其所先管子宙合王者國之心也心治則百節皆安心擾則百節皆亂故其身治者支體相遺也其國治者君臣相忘也文子上德山有猛虎林樾弗除江河納汙衆流是瀦子華子虎㑹問德音者所謂聲也未聞音出而響過其聲者也鶡冠子博選致治之自在已者也招髙者髙招庳者庳鶡冠子泰録本不固者末必幾碓而不修者其後必墮原濁者流不清行不信者名必耗墨子修身械數者治之流也非治之源也君子者治之源也官人守數君子養源源清則流清源濁則流濁荀子君道上一則下一矣上二則下二矣辟之若艸木枝葉必類本此之謂也荀子富國枉士無正友曲上無直下黄石公素書安履善響者不於響於聲善影者不於影於形為天下者不於天下於身是故百仞之松本傷於下而末槁於上商周之國謀失於胷令因於彼聖人組修其身而成文於天下矣故子華子曰丘陵成而穴者安矣大水深淵成而魚鼈安矣松栢成而塗之人已蔭矣孔子見魯哀公哀公曰有語寡人曰為國家者為之堂上而已矣寡人以為迂言也孔子曰此非迂言也丘聞之得之於身者得之人失之於身者失之人不出於門戸而天下治者其惟知反於已身者乎吕氏春秋先已今夫射者儀毫而失牆畫者儀髪而易貌言審本也本不審雖堯舜不能以治故凡亂也者必始乎近而後及逺必始乎本而後及末治亦然故百里奚處乎虞而虞亾處乎秦而秦覇向摯處乎商而商滅處乎周而周王百里奚之處乎虞智非愚也向摯之處乎商典非惡也無其本也其處於秦也智非加益也其處於周也典非加善也有其本也吕氏春秋處方治末者求其本端影者正其形陸子術事求逺者不可失於近治影者不可忘其容陸子術事心之於九竅四支也不能一事焉然而動静聽視皆以為主者不忘於欲利之也故堯為善而衆善至矣桀為非而衆非來矣淮南子主術訓夫鳥獸之不可同羣者其類異也虎鹿之不同遊者力不敵也是故聖人得志而在上位䜛佞姦邪而欲犯主者譬猶雀之見鸇而䑕之遇狸也亦必無餘命矣是故人主之一舉也不可不慎也繩正於上木直於下非有事焉所縁以修者然也故人主誠正則直士任事而姦人伏匿矣夫人之所以莫㧓𤓰瓠者何也無得於五石弗犯也使人主執正持平如從繩凖髙下則羣臣以邪來者猶以卵投石以火投水淮南子主術訓君根本也臣枝葉也根本不美枝葉茂者未之聞也淮南子繆稱訓上多故則民多詐矣身曲而景直者未之聞也淮南子繆稱訓矩不正不可以為方規不正不可以為員身者事之規矩也未聞枉已而能正人者也淮南子詮言訓使景曲者形也使響濁者聲也淮南子說林訓貨之下流猶水之赴下不竭不止今大川江河飲巨海巨海受之而欲谿谷之讓流潦百官之亷不可得也夫欲影正者端其表欲下亷者先之身鹽鐵論疾貪有正春者無亂秋有正君者無危國說􅁐建本春致其時萬物皆及生君致其道萬人皆及治說苑君道夫樹曲木者惡得直景人君不直其行不敬其言者未有能保帝王之號􅂷顯令之名者也說􅁐君道天子者天下之表也公侯者一國之儀也天子失制則天下亂諸侯失節則其國危列女傳周列國楚平伯嬴雌之不才其卵􅖁矣君之不才其民野矣揚子先知次三龍出於中首尾信可以為庸測曰龍出於中見其造也太𤣥經第一中次三鑪鈞否利用止測曰鑪鈞否化内傷也太𤣥經第六將天清則雲霓除日月星辰昭君明下理賢愚得所也王逸註楚辭九思先有形而後有影形可忘而影不可傷淮南子繆稱訓解治國之政其猶治家治家者務立其本本立則末正矣夫本者倡始也末者應和也武侯十六䇿治國膏壤在荄而柯葉含榮率俗以身則不言而化故有唐以鹿裘臻太平齊桓以捐紫止奢競抱朴子外篇廣譬渾沌之原無皎澄之流毫釐之根無連抱之枝分寸之燼無炎逺之熱隙穴之中無炳蔚之羣鈎曲之形無繩直之影參差之上無整齊之下抱朴子外篇廣譬三辰蔽於天則清景暗於地根荄蹷於此則柯條瘁於彼道失於近則禍極於逺政繆於上而民困於下抱朴子外篇廣譬眞龍而後能致雲雨明君而後道化行也揚子法言註先知篇如彼日月萬景攸正文選陸雲讌詩臣之所懼在於治水不自其源末流彌增其廣耳補文選傅燮宦官疏君本也臣枝葉也本美則葉茂本枯則葉凋意林子思子源静則流清本正則末茂内修則外理形端則影直意林魏子玉磨逾潔蘭動彌馨源流潔清水無濁波藝文類聚樂部論樂詩爾形信直影亦不曲爾聲信清響亦不濁藝文類聚后妃部后妃箴水清照淨表直影端文􅁐英華梁武帝雜箴箴知潔其流者澄其源直其末者正其本源源本本其惟大道乎文苑英華薛道衡碑樹彼司牧既懸百姓之命及乎厭世復傾天下之心是以一馬之奔無一毛而不動一舟之覆無一物而不沈文苑英華庾信連珠道在於身不在於野化自於我不由於彼道德經指歸卷八木不相摩火無由出國無亂政姦無由生天機經八我王聖德如彼日輪大明御宇無幽不矚開物成務辯别除昏十千大臣一億猛將皆王照使為國之光大方廣佛華嚴經卷十二何為五城一者山城憑髙據險斷岸周圍二者水城塹以江河㳂流四遶三者沙城曠磧懸逺外無水草四者土城堅壁髙壘内實兵儲五者人城主聖臣賢深謀逺畧如是五城量宜相敵人城最勝我國所尊大方廣佛華嚴經卷十二源清則津流應鮮根深則條頴必茂𢎞明集釋駮論尚德斧斨民之用也禮義國家之用也毛詩破斧不能御民者棄其德法譬猶御馬棄轡勒而專以筴御馬馬必傷車必敗無德法而專以刑法御民民心􅋅國必亾大戴禮記盛德治國不以禮猶無耜而耕也為禮不本於義猶耕而弗種也為義而不講之以學猶種而弗耨也講之以學而不合之以仁猶耨而弗穫也合之以仁而不安之以樂猶穫而弗食也安之以樂而不達於順猶食而弗肥也禮記禮運工欲善其事必先利其器若治國用禮義為器是器之利者故所治之事行必有成也禮記正義禮運以不忍人之心行不忍人之政治天下可運之掌上孟子公孫丑上域民不以封疆之界固國不以山谿之險威天下不以兵革之利孟子公孫丑下天子不仁不保四海諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人不仁不保四體今惡死亡而樂不仁是猶惡醉而强酒孟子離婁上今也欲無敵於天下而不以仁是猶執熱而不以濯也詩云誰能執熱逝不以濯孟子離婁上民患虐政甚矣若饑者食易為美渴者飲易為甘德之流行疾於置郵傳書命也趙氏註孟子公孫丑上今弛棄纖紈損絶梁豢必云徼生委命豈不已曉其迷至乎煙斥廉義屏出信禮責以祈存推數遂乃未辨其惑宋書顧覬之傳聖人執左契而不責於人有德司契無德司徹老子任契川淵深而魚鼈歸之山林茂而禽獸歸之刑政平而百姓歸之禮義備而君子歸之荀子致仕在天者莫明於日月在地者莫明於水火在物者莫明於珠玉在人者莫明於禮義故日月不高則光輝不赫水火不積則煇潤不博珠玉不覩乎外則王公不以為寶禮義不加於國家則功名不白故人之命在天國之命在禮荀子天論為天下及國莫如以德莫如行義以德以義不賞而民勸不罰而邪止此神農皇帝之政也以德以義則四海之大江河之水不能亢矣華山之髙㑹稽之險不能障矣闔廬之教孫吳之兵不能當矣吕氏春秋上德百姓以德附骨肉以仁親陸子道基革堅則兵利城成則衝生若以湯沃沸亂乃逾甚是故鞭噬狗䇿􅕭馬而欲教之雖伊尹造父弗能化欲害之心亡於中則饑虎可尾何况狗馬之類乎故體道者逸而不窮任數者勞而無功夫峭法刻誅者非霸王之業也箠䇿繁用者非致逺之術也淮南子原道訓昔孫叔敖恬臥而郢人無所害其鋒市南宜遼弄丸而兩家之難無所關其辭鞅鞈鐵鎧瞋目扼􅒆其於以御兵刃縣矣劵契束帛刑罰斧鉞其於以解難薄矣待目而照見待言而使令其於為治難矣淮南子主術訓府吏守法君子制義法而無義亦府吏也不足以為政淮南子主術訓季子治亶父三年而巫馬期徃觀化焉見夜魚釋之巫馬期問曰凡子所為魚者欲得也今得而釋之何也漁者對曰季子不欲人取小魚也所得者小魚是以釋之巫馬期歸以報孔子曰季子之德至矣使人闇行若有嚴刑在其側者淮南子道應訓仁義者治之本也今不知事修其本而務治其末是釋其根而灌其枝也且法之生也以輔仁義今重法而棄義是貴其冠履而􅁯其頭足也故仁義者為厚基者也不益其厚而張其廣者毁不廣其基而增其髙者覆語曰不大其棟不能任重淮南子泰族訓以德為國者甘於飴蜜固於膠漆是以聖賢勉而崇本而不敢失也春秋繁露立元神文子曰以御言之左手執轡右手運䇿不亦速乎若徒轡無䇿馬何懼哉孔子曰吾聞古之善御者執轡如組兩驂如舞非䇿之助也是以先王盛於禮而薄於形故民從命孔叢子刑論以禮齊民譬之於御則轡也以刑齊民譬之於御則鞭也執轡於此而動於彼御之良也無轡而用䇿則馬失道矣孔叢子刑論師曠之調五音不失宫商聖王之治世不離仁義故有改制之名無變通之實鹽鐵論遵道義之服無義疾於原馬良弓德之召逺疾於馳傳重驛鹽鐵論論勇所謂金城者非謂築壤而髙土鑿地而深池也所謂利兵者非謂呉起之鋌干將之劍也言以道德為城以仁義為郭莫之敢攻莫之敢入文王是也以道德為䩜以仁義為劒莫之敢當莫之敢御湯武是也鹽鐵論論勇吏以不多斷為良毉以不多刺為工鹽鐵論周秦有聲之聲不過百里無聲之聲延及四海說􅁐政理或曰為政先殺後教曰嗚呼天先秋而後春乎將先春而後秋乎吾見𤣥駒之步雉之晨雊也化其可以已矣哉民可使覿德不可使覿刑覿德則純覿刑則亂象龍之致雨也難矣哉揚子先知次六韯螮音德紗士了切紗縣於九州測曰韯螮之縣民以康也太𤣥經第六堅王之二姬臣實不知其美也臣之所美與王不類有名曰仁狀若慶雲容若幽蘭藹若陽春使之輔諸侯則百姓懷之而頌音作九夷八蠻皆來朝有名曰義狀若凜霜容若青松厲若秋宇使之輔諸侯則禁淫慝誅暴亂使盜跖可化為伯夷此二姬者臣之所美也若王之姬朝不過絲竹之奉夜不過枕席之安弛庶政棄百姓禍足以亾國故珠玉為塵錦練為灰綺幕鏤床棲於浮雲寶瑟箜篌寂於烟霧富貴之樂於王何有哉王不寵仁義而昵冶容臣竊以為賢王之蠱也天録閣外史寵幸天子諸侯以士為鼎以仁義為羮其馨香足以荐之上帝達之祖考蒸之社稷布之民人夫鼎之有羮也猶士之有仁義也鼎之馨香則王知之何仁義之為美不如羮乎是羮也惟王與臣之師嘗之矣魯國之民不聞其美也若仁義之羮烹一心而暢百順調太和而育庶物若睹淵泉之洋沛而渴者不及飲觀五穀之豐茂而饑者不及爨也賢王何不徹其鼎而舉其士舍其獸味而陶仁義之羮乎天禄閣外史君賜賢王欲輔王室而不修德是猶大舟之濟江河而焚其楫也其不能濟亦明矣天禄閣外史形勢夫繩墨者工之法度也仁義者民之正路也繩墨用則曲木截仁義進則䜛佞滅王逸註楚辭九辨法制禮義可以為治之基耳非所以為治治在其人之德猶弓矢射之具也非能必中中在其人之巧淮南子汜論訓解夫世不乏於德猶嵗不絶於春也謂世衰難以德治可謂嵗亂不可以春生乎人君治一國猶天地生萬物天地不為亂嵗去春人君不以衰世屏德王充論衡非韓篇夫治人不能捨恩治國不能廢德治物不能去春王充論衡非韓篇夫急轡繁䇿伯樂所不為宻防峻法德政之所恥抱朴子外篇審舉夫繁䇿急轡非造父之御嚴刑峻罰非三五之道故有虞手不指揮口不煩言恭己南面而治化雍熈矣宓生政以率俗彈琴詠詩身不下堂而漁者宵肅矣抱朴子外篇用刑仁愛附人堅於金石金石可銷而人不可離故君者壤地人者卉木也未聞壤肥而卉木不茂君仁而萬民不盛矣劉子愛民政猛寧若恩法速寧若緩獄繁寧若簡臣主之際其猜也寧信文中子間朗夫不傷民之不治而伐已之能得姦猶弋者覩鳥獸挂罻羅而喜也補文選鹽鐵議以德養民猶草木之得時以仁化人猶天生草木以雨潤澤之意林鬼谷子道德之懷民猶春陽之柔物履深水而不寒結木條而不折意林任子天之為嵗也先春而後秋君之為治也先禮而後刑春以生長為德秋以殺戮為功禮以教訓為美刑以威嚴為用故先生而後殺天之為嵗先敎而後罰君之為治也天不以久逺更其春冬而君也得以古今改其禮刑哉藝文類聚刑法部刑法論天道貴信地道貴貞不信不貞萬物不生太平御覽地部地上歌在堂上舞在堂下歌者象德舞者象功君子上德而下功玉海音樂樂舞日昃陰生燥至風起谿谷小動海波大興髙下相臨差以百尋者以其形大故也千仞之岸萬丈之崖物類登之崖隤下顛蚊䖟螻蟻適足以游翔而犀象虎豹之麋骸者以其形重也飄風隆盛發屋折木石飛鐵揚山陵崩弛而人血脉不為之傷者以其暴大也隙穴之風不動鬢眉及其中人也生百病而成死亡者以其纎介也夫大國者江海犀象之徒也而德化者飄風隙穴之類也道德經指歸卷十創始奕奕寢廟君子作之秩秩大猷聖人莫之詩小雅巧言作之屏音丙之其菑其翳脩之平之其灌其栵音例啟之辟音闢之其檉其椐音居叶紀庶反攘之剔之其檿音厭其柘叶都故反詩大雅皇矣綿綿𤓰瓞音垤民之初生詩大雅綿豐水猶以其潤澤生草武王豈不以其功業為事乎鄭氏箋詩文王有聲鴟鴞言作巢之苦予羽譙譙然而殺予尾消消而敝手口既病羽尾殺敝乃有此室巢以喻先王勤修德業勞神竭力得成此王業毛詩正義鴟鴞鴟鴞言已作巢之苦予手撠拘其草予所捋者是荼之草其室巢所用者皆是予之所蓄為予手口盡病乃得成此室巢用免大鳥之難喻周之先王亦勤勞經營乃得成此王業用免侵毁之患毛詩正義鴟鴞德厚者流光德薄者流卑是以貴始德之本也始封必為祖穀梁僖公十五年天下初作難也俊雄豪傑建號壹呼天下之士雲合霧集魚鱗雜襲飄至風起前漢書蒯通傳王者受圖咸資世德猶混成之先大帝若一氣之生兩儀是以中陽勃興資豢龍之構趾景亳埀統本吞鷰之開基晉書涼武昭王列傳聖人見鳥獸容貌草木英華始創衣冠而𤣥黄殊采見秋蓬孤轉杓觽旁建乃作輿輪而方圓異則晉書輿服志天下殽亂髙皇帝與諸侯併肩而起非有側室之勢以豫席之也賈子親䟽危亂聖人師蜂立君臣師蜘蛛立網罟師拱鼠制禮儀師戰蟻置兵衆關尹子三極篇見􅑆木浮而知為舟見飛蓬轉而知為車見鳥跡而知著書以類取之淮南子說山訓夫本不正者未必陭始不勝者終必衰說􅁐建本摹者如畫工未施采土摹之矣前漢書註髙帝紀譬如為人裁衣始制之洪大服者得而衣之何能更小之乎李善註文選東京賦昧旦丕顯後世猶怠况初制於甚泰服者焉能改裁文選東京賦守成若稽田既勤敷菑惟其陳修為厥彊畎若作室家既勤垣墉惟其塗塈茨若作梓材既勤樸斵惟其塗丹艧書梓材若考作室既底法厥子乃弗肯堂矧肯構厥父菑厥子乃弗肯播矧肯穫書大誥父已致法子乃不肯為堂基况肯構立屋乎不為其易則難者可知孔氏傳書大誥菀音欝彼桑柔其下侯旬捋力活反采其劉瘼音莫此下民詩大雅桑柔鳧鷖守成也太平之君子能持盈守成神祗祖考安樂之也毛詩鳧鷖鴟鴞之意如何乎言人既取我子幸無毁我室以其積日累功作之甚苦故愛惜之不欲見其毁損毛詩正義鴟鴞農夫收穫既畢布其歡樂之心共相飲食以安美之聖王既勸民善道備足又說樂感動使其勤行善道保寧堅固也禮記正義禮運古人有言曰其父析薪其子弗克負荷施將懼不能任其先人之禄其况能任大國之賜左傳昭公七年國有固籍兵有常經變籍則亂失經則弱故利不百者不變俗功不什者不易器戰國䇿趙武靈王孝子善繼人之意忠臣善成人之事予思若考作室厥子堂而構之厥父菑厥子播而穫之前漢書翟方進傳五穀百草秀頴成實皆因舊苗無廢絶也前漢書註禮樂志父有作室之意則子當築堂而構棼撩以成之父菑耕其田子當布種而収穫之前漢書註翟方進傳小家畜産百萬之資子孫尚恥愧失其先業况乃産兼天下受之先帝而欲懈怠以自輕忽乎後漢書陳蕃列傳若劉累傳守其業庖人不乏龍肝之饌斷可知矣南齊書崔祖思傳欲成方圓而隨於規矩則萬事之功形矣而萬物莫不有規矩議言之士計㑹規矩也聖人盡隨於萬物之規矩故曰不敢為天下先韓子解老大智不形大器晚成大音希聲禹之決江水也民聚瓦礫事已成功已立為萬世利禹之所見者逺也而民莫之知故民不可與慮化舉始而可以樂成功吕氏春秋樂成亂國若盛治國若虚亾國若不足存國若有餘虚者非無人也皆守其職也盛者非多人也皆徼於末也有餘者非多財也欲節而事寡也不足者非無貨也民躁而費多也故先王之法籍非所作也其所因也其禁誅非所為也其所守也淮南子齊俗訓隨人故迹不能創基造制自為新迹如鸚鵡知効人言不能自為長主之言也淮南子說山訓解父之所生其子長之父之所長其子養之父之所養其子成之諸父所為其子皆奉成而續行之不敢不致如父之意盡為人之道也春秋繁露五行對言君棄先王之法度而不奉循猶置衡稱不以量物更任其意而商輕重必失道違人情也王逸註楚辭九歎俾前聖之緒布濩流衍而不韞櫝文選揚子雲劇秦美新昔殷湯以七十里周文以百里興利除害天下歸之其餌可謂芳矣南面而掌天下厯載數百到今不廢其綸可謂多矣羣生􅀢其澤民垊畏其罰其鈞可謂均矣功成而不隳名立而不改其竿可謂彊矣若夫竿折綸絶餌墜鈎决波涌魚失是則夏桀殷紂不通夫釣術也補文選宋玉釣賦鳴鶴匪和析薪弗荷隱憂孔疚我堂靡構藝文類聚人部鑒誡詩天道煌煌非一帝之功王者赫赫非一家之常順命者存逆命者亾初學記帝王部摠叙帝王譬如朽舍將欲崩倒不令壞故以柱支持蘇婆呼童子經卷上喻林卷九十六
