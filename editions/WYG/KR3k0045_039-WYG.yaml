body:
  text: 喻林卷三十九眀徐元太撰人事門三十七豫圖水在火上既濟君子以思患而豫防之易既濟今日當預思眀日之事如家人宿火矣左傳正義昭二十九年為虺弗摧為蛇将若何國語吴徳不素積人不為用備不豫具難以應卒後漢書馮衍傳治疾及其未篤除患貴其未深吳志駱統傳原火不撲蔓草難除青青不伐終致㝷斧宋書武三王傳去草絶根在於未蔓撲火止燎貴乎速滅陳書周迪傳善戰者不待張軍善除患者理於未生勝敵者勝於無形上戰無與戰故爭勝於白刃之前者非良将也設備於已失之後者非上聖也太公六韜軍勢慮不先定不可以應卒兵不閑習不可以當敵鄧析子無厚篇不用在早圖不窮在早稼鄧析子轉辭篇凡治身飬性節寝䖏節飲食和喜怒便動静使在已者得而邪氣因而不生豈若憂瘕疵之興痤疽之發而豫備之哉淮南子詮言訓夫至巧不用劔善閉者不用闗楗淮南子説山訓良醫者常治無病之病故無病聖人者常治無患之患故無患也淮南子説山訓事者難成而易敗也名者難立而易廢也千里之隄以螻螘之穴漏百尋之屋以突隙之煙焚人莫蹪於山而蹪於垤是故人皆輕小害易微事以多悔患至而後憂之是猶病者已惓而後索良醫也雖有扁鵲俞跗之巧猶不能生也淮南子人間訓殘材木以成室屋者非良匠也殘賤民人而欲治者非良吏也故公輸子因木之宜聖人不費民之性是以斧斤簡用刑罰不任政立而化成扁鵲攻於腠理絶邪氣故癰疽不得成形聖人從事於未然故亂原無由生是以砭石蔵而不施法令設而不用斷已然鑿已發者凡人也治未形覩未萌者君子也鹽鐵論大論所貴良醫者貴其審消息而退邪氣也非貴其下鍼石而鑚肌膚也所貴良吏者貴其絶惡於未萌使之不為非非貴其拘之囹圄而刑殺之也鹽鐵論申韓兵不豫定無以待敵計不先慮無以應卒説苑談叢富必念貧壮必念老年雖㓜少慮之必早説苑談叢不困在於早慮不窮在於早豫説苑談叢或曰奔壘之車沈流之航可乎曰否或曰焉用智曰用智於未奔沈大寒而後索衣裘不亦晚乎揚子寡見賊方至以疾走為務食不消以黄丸為先子徒知此為賢於安須㬰與求乞胡而不知制賊病於無形事功幽而無跌也夫救火以水雖自多於抱薪而不知曲突之先物矣嵇中散集難宅無吉凶攝生論君子欲正其末必端其本欲輟其流則遏其源抱朴子外篇守塉旱極則水水極則旱故於旱時而預蓄舟水時預蓄車以待其貴収其利也前漢書註貨殖昔先王傳已亂而後治之戰鬭而後獲勝則不足貴前漢書註匈奴傳御災在於未發思患在乎預防揚子法言註寡見篇甲者一旬之始已有之祕也先之一日未兆也後之一日已形也夫求福於未兆之前易救禍於已形之後難揚子法言註光知篇伐謀先兆擠響於音文選陸士衡功臣頌将伐其謀先其未兆欲墜其響在於為音然兆為謀始響為音初也李善註文選陸士衡漢功臣頌渴而後穿井飢而後殖種可以圖逺難以應卒也補文選曹植諫伐遼東表夫瘧之未發也隂未并陽陽未并隂因而調之真氣得安邪氣乃亾故工不能治其已發為其氣逆也黄帝素問内經瘧論聖人不治已病治未病不治已亂治未亂此之謂也夫病已成而後藥之亂已成而後治之譬猶渴而穿井鬭而鑄兵不亦晚乎黄帝素問内經四氣調神大論上工救其萌芽必先見三部九候之氣盡調不敗而救之故曰上工下工救其已成救其已敗黄帝素問内經八正神眀論善治者治皮毛其次治肌膚其次治筋脉其次治六府其次治五蔵治五蔵者半死半生也黄帝素問内經隂陽應象大論上工刺其未生者也其次刺其未盛者也其次刺其已衰者也下工刺其方襲者也與其形之盛者也與其病之與脉相逆者也故曰方其盛也勿敢毁傷刺其已衰事必大昌故曰上工治未病不治已病此之謂也黄帝素問靈樞經逆順且一身猶一國也胸腹之位猶宫室也四肢之列猶郊境也骨節之分猶百官也神猶君也血猶臣也氣猶民也故知理身則知理國愛其民所以安其國吝其氣所以全其身民散則國亡氣竭則身死亡者不可存死者不可生所以至人消未起之患理未病之疾堅守之於無事之前不追之於既逝之後廣黄帝本行記治之未亂正之未傾禁姦之本制偽之端閉邪之户塞枉之門道徳經指歸卷十一大難之将生也猶風邪之中人未然之時慎之不来在於皮毛湯熨去之入於分理㣲箴取之在於蔵府百藥除之入於骨髓天地不能憂而造化不能治道徳經指歸卷之一未疾之人易為醫也未危之國易為謀也萌牙之患易事也小弱之禍易憂也道徳經指歸卷十一任車未虧僮子行之及其傾覆也顛髙墮谷千人不能安卵之未剖也一指摩之及其為飛鴻也奮翼凌雲罾繳不能連也胎之新乳也一繩制之及其為牡也羅網不能禁也虎也執羣獸食牛馬劒㦸不能難也故漣滴之流乆乆而成江海小蛇不死化為神龍積㣲之善以至吉祥小惡不止乃至滅亡道徳經指歸卷十一菓𤓰結實未堅虚脆易破初心起染亦復如是結業㣲淺故易除也道徳經註疏卷六譬如已滅之火不復求救但多方便防未来火又如治病已減之病不復加治但治将生病大智度論卷三十八譬如有人始遇患苦或有醫師少給湯藥則可令差亦如小樹初生之時以爪能斷及其長大雖有百斧伐之猶難本縁經持王子品原道為尊者諱耻為賢者諱過為親者諱疾榖梁成公九年趙王封孟甞君以武城孟甞君擇舍人以為武城吏而遣之曰鄙語豈不曰借車者馳之借衣者被之哉皆對曰有之孟甞君曰文甚不取也夫所借衣車者非親友則兄弟也夫馳親友之車被兄弟之衣文以為不可今趙王不知文不肖而封之以武城願大夫之往也母伐樹木母發屋室訾然使趙王悟而知文謹使可全而歸之戰國䇿趙恵文王國之有封疆家之有垣墻所以合好掩惡也室不能相和出語隣家未為通計也怨惡未見而眀棄之未為盡厚也戰國䇿燕王喜君子不臨深以為髙不因少以為多况創病君父以為已功者哉風俗通過譽人足所履不過數寸然而咫尺之途必顛蹷於崖岸拱把之梁每沉溺於川谷者為其傍無餘地故也君子之立已抑亦如之至誠之言人未能信至潔之行物或致疑皆由言行聲名無餘地也顔氏家訓名實淳酒味甘飲之者醉不相知薄酒酸苦賔主嚬蹙王充論衡自然篇居窮則志篤䖏逹則恩輕是以楚君施轡激三軍之澆俗少原流慟誚輕薄之頽風李善註文選陸士衡演連珠宣帝時公卿朝㑹丞相次曰聞梟生子長且食其母寧然有賢者應曰但聞烏子反哺耳丞相大慚君子之於鳥獸尚為之諱况人乎事文類聚伯勞桓譚新論孔子将行雨無盖門人曰商也有焉孔子曰商也之為人也甚短於財吾聞與人交者推其長者違其短也者故能以乆也太平御覽服用部盖人亦有言賈則易交利重太山道輕鴻毛乆而益敬見之晏平霜雪既至勁栢冬青初學記人部交友越俗性率朴初與人交有禮封土壇祭以犬雞祝曰卿雖乗車我戴笠後日相逢下車揖我步行卿乗馬後日相逢卿當下初學記人部交友新序樂毅書君子絶交無惡言去臣無惡聲困學紀聞卷十一攷史博愛東風生長之風也山巔之上草木猶及之鄭氏箋詩谷風畀之為言與也能以其餘畀其下者也煇者甲吏之賤者也胞者肉吏之賤者也翟者樂吏之賤者也閽者守門之賤者也古者不使刑人守門此四守者吏之至賤者也尸又至尊以至尊既祭之末而不㤀至賤而以其餘畀之禮記祭統當尚同之為説也上用之天子可以治天下矣中用之諸侯可以治其國矣小用之家君可以治其家矣是故大用之治天下而不窕小用之治一國一家而不横者若道之謂也故曰治天下之國若治一家使天下之民若使一夫墨子尚同下藉為人之國若為其國夫誰獨舉其國以攻人之國者哉為彼者由為已也為人之都若為其都夫誰獨舉其都以伐人之都者哉為彼猶為已也為人之家若為其家夫誰獨舉其家以亂人之家者哉為彼猶為已也墨子兼愛下隂陽以廣陶濟物三光以普照著眀嵩華以蔵疾為曠北溟以含垢稱大碩儒以與進𢎞道逺教以博愛容衆抱朴子外篇廣譬具以九圍共溺竝識歸涯萬國均夢一日俱曉藝文類聚内典部寺碑表尸子曰舜兼愛百姓務利天下其田歴山也荷彼耒耜耕彼南畝與四海俱有其利其漁雷澤也旱則為耕者鑿瀆險則為獵者表虎故有光若日月天下歸之若父母困學紀聞卷十諸子維摩詰言從癡有愛則我病生以一切衆生病是故我病若一切衆生得不病者則我病滅維摩詰所説經問疾品譬如長者唯有一子其子得病父母亦病若子病愈父母亦愈菩薩如是於諸衆生愛之若子衆生病則菩薩病衆生病愈菩薩亦愈維摩詰所説經問疾品施徳子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也左傳僖公二十三年吾儕小人所謂取諸其懐而與之也左傳宣公十年小國之仰大國也如百榖之仰膏雨焉若常膏之其天下輯睦豈惟敝邑左傳襄公十九年小國為繁大國為省穡而用之其何實非命左傳昭公元年雖獲歸骨於晉猶子則肉之左傳昭公十三年勝如卵余翼而長之左傳襄公十六年公子賦黍苖子餘曰重耳之卬君也若黍苖之卬隂雨也若君實庇廕膏澤之使能成嘉榖薦在宗廟君之力也國語晉若君不忘周室而為弊邑宸宇亦寡人之願也國語越杜赫欲重景翠於周謂周君曰君之國小盡君之重寳珠玉以事諸侯不可不察也譬之如張羅者張之於無鳥之所則終日無所得矣張於多鳥䖏則又駭鳥矣必張於有鳥無鳥之際然後能多得鳥矣今君将施於大人大人輕君施於小人小人無可以求又費財焉君必施於今之窮士不必且為大人者故能得欲矣戰國䇿周恵公宣揚朝恩示以和睦曠若開雲見日後漢書袁紹列傳倍知厚徳篤於慈父寖滛肌膚滲漉骨髓徳重山嶽澤深河海後漢書馮衍傳註冀髙世之徳施於田子老馬之恵贈以秦穆駿馬之恩使長有依歸以效忠心後漢書馮衍傳註於覆巢之下䝉全卵之施晉書慕容徳傳拯我塗炭恵隆丘阜潤同江海恩猶父母晉書應詹傳鳥雀投人尚能濟免晉書赫連勃勃記濯其泥沙假以毛羽陳書周迪傳隂徳者何猶耳鳴已獨聞之人無知者隋書李士謙隠逸傳荘周家貧故往貸粟於監河侯監河侯曰諾我将得邑金将貸子三百金可乎荘周忿然作色曰周昨来有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚来子何為者耶對曰我東海之波臣也君豈有升斗之水而活我哉周曰諾我且南游吴越之王激西江之水而迎子可乎鮒魚忿然作色曰吾失我常與我無所䖏吾得升斗之水然活耳君乃言此曾不如早索我於枯魚之肆荘子外物有力者疾以助人有財者勉以分人有道者勸以教人墨子尚賢下今贛人敖倉予人河水饑而餐之渴而飲之其入腹者不過簞食瓢漿則身飽而敖倉不為之減也腹滿而河水不為之竭也有之不加飽無之不為饑與守其篅􅖧有其井一實也淮南子精神訓僖負羈以壺飡表其閭趙宣孟以束脯免其軀禮不隆而徳有餘仁心之感恩接而憯怛生故其入人深俱之呌呼也在家老則為恩厚其在債人則生爭鬭故曰兵莫憯於意志莫邪為下冦莫大於隂陽枹鼓為小淮南子繆稱訓君子見過㤀罰故能諌見賢㤀賤故能讓見不足忘貧故能施淮南子繆稱訓今人放燒或操火往益之或接水往救之兩者皆未有功而怨徳相去亦逺矣淮南子説山訓請而得其賞亷者不受也言盡而名至仁者不為也今天油然作雲沛然下雨則苖草興起莫之能禦今為一人言施一人猶為一塊土下雨也土亦不生之矣説苑復㤙荘周貧者往貸粟於魏文侯曰待吾邑粟之来而獻之周曰乃今者周之来見道傍牛蹄中有鮒魚焉大息謂周曰我尚可活也周曰須我為汝南見楚王决江淮以溉汝鮒魚曰今吾命在盆甕之中耳乃為我見楚王决江淮以溉我汝則求我枯魚之肆矣今周以貧故来貸粟而曰須我邑粟来也而賜臣即来亦求臣傭肆矣説苑善説朝露不久為恩恵少膏澗欲盡咎在枯稿焦氏易林震之同人妾之幸於君王猶魚之狎於江海也江海不為一魚而深其流君王不為一妾而深其恩天禄閣外史齊姬絲成帛縷成布賜人絲縷猶為重厚况遺人以成帛與織布乎王充論衡異虚篇袁将軍再與兄子分家財多有以為恩義崑山之下以玉為石彭蠡之濵以魚食犬豕使推讓之人財若崑山之玉彭蠡之魚家財再分不足為也王充論衡定賢篇設使有困病垂死而有能救之得愈者莫不謂之為𢎞恩重施矣今若按僊經飛九丹水金玉則天下皆可令不死其恵非但活一人之功也抱朴子内篇釋滯饑饉之春不賑朋戚多稔之秋饗及四隣不賑朋戚人之惡行恵及四隣人之善義善惡之行出於性情而繋於饑穰也劉子辨施夫山阜非為鳥植林林茂而鳥自棲之江湖非為魚鑿潭潭深而魚自歸之䖏世非為人積財財積而人自依之非其所招勢使然也劉子辨施䇿駟登山不得直轡而行泛舟入海不得安身而坐何者山路迂廻海水淪波行者欲直而路曲之坐者欲安而水蕩之仁者欲施而貧遏之劉子辨施食不滿腹豈得輟口恵人衣不蔽形何得露體而施物非性儉恡不足故也劉子辨施施暢春風澤如時雨是以不别荆棘者慶雲之恵也七子均飬者鳲鳩之仁也舍罪責功者眀君之舉也矜愚愛能者慈父之恩也是以愚臣徘徊於恩澤而不敢自棄者也文選上責躬詩表不悟日月之眀遂垂曲照雲雨之澤播及朽瘁文選陸機謝内史表重䝉陛下愷悌之宥廻霜収電使不隕越文選陸機謝内史表咳唾為恩盼睐成節文選任昉到大司馬記室牋愛流成海情塵為岳文選王巾頭陀寺碑文一言之譽東陵侔於西山一盼之榮鄭璞踰於周寳文選任昉王文憲集序竊以月滿則虧恩来無爽海潮雖大萬江恒注藝文類聚食物部束啟攀窘逼歸原曰窮鳥入懐原曰焉知斯懐之可入遂匿之藝文類聚寶玉部金洪恩罔極雲雨增加既榮本幹枝葉并䝉藝文類聚封爵部親戚封章故知假人延譽重於連城借人羽毛榮於尺玉溟池九萬里無踰此澤之深華山五千仞終愧斯恩之重文苑英華庾信謝文序并和詩啟况復棲鳥挾子同知桂樹之恩澤雉将雛共喜行春之令根株一潤枝葉俱榮文苑英華庾信謝賜賚啟花開四照唯見其榮鼇載三山深知其重文苑英華庾信謝賜賚啟莊周車轍實有涸魚信陵鞭前元非窮鳥文苑英華庾信謝賜賚啟得使已枯之木蒙靈陽之潤焦炎之草幸甘雨之溉漢武帝内傳喻如甘露雨柯葉悉沾恩海空智蔵經問病品偈或施以物歸獻三寳或施以法覺悟一切虚皇四十九章行施時於諸凡夫衆生起慈念想譬如父母瞻視病子行施散時其心喜恱猶如父母見子病愈元陽妙經卷五一切有情須食與食須飲與飲須乗與乗須衣與衣須花香與花香須瓔珞與瓔珞須房舍與房舍須牀榻與牀榻須臥具與臥具須燈明與燈明須財榖與財榖須珍寳與珍寳須伎樂與伎樂須侍衛與侍衛隨其所須種種資具波羅宻多經卷八譬如摩那斯龍王將欲降雨先興重雲彌覆虚空凝停七日而未降雨先令衆生究意諸業何以故彼大龍王慈悲心故過七日已漸降㣲雨普潤大地大方廣佛華嚴經三十五所行恵施無有斷絶如春夏樹華果相續本縁經毗羅摩品譬如大雨百榖滋長恒以五指施人財猶如五龍降注大雨本縁經持王子品若人饑渴給足飲食感恩則深大智度論卷五十四施有三種一財施二心施三法施以財施人名為布施慈心等心與人樂名為心施說法利人名為法施羅什譯維摩詰經菩薩品順施伐木者掎其巔析薪者隨其理毛詩小弁乗風理弋追逸羽於髙雲臨波命鈎引沈鱗於大壑茍得其道為工其事北齊書杜弼傳天下之物有甚滑稽而難持者女知之矣乎疾之則脫緩之則浟焉以逝非捉圜之謂也而所謂善持者能為之於疾徐之間子華子神氣天不能冬蓮春菊是以聖人不違時地不能洛橘汶貉是以聖人不違俗聖人不能使手步足握是以聖人不違我所長聖人不能使魚飛鳥馳是以聖人不違人所長闗尹子九藥度已以繩故足以為天下法則矣接人用抴故能寛容因求以成天下之大事矣荀子非相篇與陽言者依崇髙與隂言者依卑小鬼谷子捭闔假之有人而欲南無多而惡北無寡豈為夫南者之不可盡也離南行而北走也哉今人所欲無多所惡無寡豈為夫所欲之不可盡也離得欲之道而取所惡也哉荀子正名周書曰掩雉不得更順其風淮南子覽㝠訓言已朝發天之東津萬物所生夕至地之西極萬物所成動順隂陽之道王逸註離騷經風從於雷趾􅗸平表切于髀元包經傳孟隂股運于腹婦歸於姑元包經傳孟陽无妄頁音頡顛顛趾延延子欽于父雷奮于天元包經傳孟隂念故鹿之奔走其勢宜疾而走伎伎然舒留其羣也鄭氏箋詩小弁豈如弁髦而因以敝之左傳昭公九年子不聞河上歌乎同病相憐同憂相救驚翔之鳥相隨而集瀬下之水因復俱流胡馬望北風而立越鷰向日而熈誰不愛其所近悲其所思者乎吴越春秋闔閭内傳食其實者不傷其枝飲其水者不濁其流吴越春秋越王無余外傳陳軫曰王獨不聞吴人之遊楚者乎楚王甚愛之病故使人問之曰誠病乎意亦思乎左右曰臣又知其思與不思誠思則將吴吟今軫將為王吴吟戰國䇿秦恵文君秦恵王曰子去寡人之楚亦思寡人不陳臻對曰王聞夫越人莊舄乎王曰不聞曰越人莊舄仕楚執珪有頃而病楚王曰舄故越之鄙細人也今仕楚執珪富貴矣亦思越不中謝對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人徃聽之猶尚越聲也今臣雖棄逐之楚豈能無秦聲哉史記張儀傳富貴不歸故鄉如衣繡夜行誰知之者史記項羽紀家貧則思良妻國亂則思良相史記魏世家太公封齊五世葬周狐死首丘代馬依風夫周齊同在中土千里之間况於逺處絶域小臣能無依風首丘之思哉後漢書班超列傳忠臣過故墟而歔欷孝子入舊室而哀歎後漢書馮衍傳朔馬心何悲念舊中心勞燕雀何徘徊意欲還故巢晉書吕光記衣莫若新人莫若故晏子春秋襍上景公有愛女請嫁於晏子公乃徃燕晏子之家飲酒酣公見其妻曰此子之内子耶晏子對曰然是也公曰嘻亦老且惡矣寡人有女少且姣請以滿夫子之宫晏子違席而對曰乃此則老且惡嬰與之居故矣故及其少而姣也且人固以壯託乎老姣託乎惡彼甞託而嬰受之矣君雖有賜可以使嬰倍其託乎晏子雜下舊國舊邦望之暢然雖使丘陵草木之緡入之者十九猶之暢然况見見聞聞者也荘子則陽昔楚昭王與吴人戰楚軍敗昭王走屨决背而行失之行三十步復旋取履及至於隋左右問曰王何曽惜一踦履乎昭王曰楚國雖貧豈愛一踦履哉思與偕反也自是之後楚國之俗無相棄者賈子諭誠孔子出遊少源之野有婦人中澤而哭其音甚哀孔子使弟子問焉曰夫人何哭之哀婦人曰鄉者刈蓍薪亾吾蓍簮吾是以哀也弟子曰刈蓍薪而亡蓍簮有何悲焉婦人曰非傷亡簮也盖不忘故也韓詩外傳籩豆茵席所以官者也而棄之顔色黎黒手足胼胝所以執勞苦而皆後之臣聞國君蔽士無所取忠臣大夫蔽遊無所取忠友今至於國臣在所蔽之中矣說苑復恩好諌者思其君食美者念其親説苑反質與人同寒苦雖有小過猶與之同死而不去况於安新㤀舊乎列女傳周列國晉趙衰妻飛不逺去還歸故處焦氏易林小過之巽在貴多忘賤為恩誰能博狐白足禦冬焉念無衣客曹子建贈丁儀鷓鴣白黑成文其鳴自呼象小雉其志懐南不北徂也張華註禽經羈鳥戀舊林池魚思故淵陶靖節集詩五言胡馬仰朔雲越鳥巢南樹李善註文選赭白馬賦狐獸思故藪離鳥悲舊林文選陸士衡贈從兄車騎詩越人衣文虵代馬依北風君子於其國也愴愴傷於心李善註文選張景陽雜詩鍾儀幽而楚奏兮莊舄顯而越吟人情同於懐土兮豈窮逹而異心文選登樓賦感平生之遊處兮若壎箎之相須何今日之兩絶若胡越之異區文選鸚鵡賦信松茂而栢恱嗟芝焚而蕙歎茍性命之不殊豈同波而異瀾文選歎逝賦况復已朝餐曷由知我饑文選郭泰機荅傳咸詩逹之所服貴有㦯遺窮之所接賤而必尋是以江漢之君悲其墜屨少原之婦哭其亾簮文選陸機演連珠茱萸自有芳不若桂與蘭新人雖可愛不若故所懽廣文選曹子建浮萍篇莫以豪賢故棄捐素所愛莫以魚肉賤棄捐葱與薤莫以麻枲賤棄捐菅與蒯廣文選曹孟徳塘上行延陵季子使過徐徐君心欲得其寳劍弗忍言季子心許之而未及與及還而徐君已薨乃脫寳劍懸於墓樹徐人竒之曰延陵季子不㤀舊故脱千金之劍掛丘樹藝文類聚人部懷舊故交不可忘猶如蘭桂芳新知雖可恱不異茱萸香藝文類聚人部閨情詩衣不厭新人不厭故藝文類聚人部别下書陳席不棄故劍無遺藝文類聚職官部太子詹事表武王衣之銘曰桑蠶苦女工難得新捐故後必寒玉海聖文御製賦譬如陸龜心常念水海空智藏經持誠品利人古者聖王亦甞厚措歛乎萬民以為舟車既已成矣曰吾将惡許用之曰舟用之水車用之陸君子息其足焉小人休其肩背焉故萬民出財齎而予之不敢以為慼恨者何也以其反中民之利也墨子非樂上所為貴良寳者為其可以利也而和氏之璧隋侯之珠三棘六異不可以利人是非天下之良寳也今用義為政於國家人民必衆刑政必治社稷必安所為貴良寳者可以利民也而義可以利人故曰義天下之良寳也墨子耕柱公輸子削竹木以為䧿成而飛之三日不下公輸子自以為至巧子墨子謂公輸子曰子之為鵲也不如翟之為車轄須㬰斵三寸之木而任五十石之重故所為巧利於人謂之巧不利於人謂之拙墨子魯問人為嬰兒也父母飬之簡子長而怨子盛壯成人其供養薄父母怒而誚之子父至親也而或譙或怨者皆狹相為而不周於為已也夫賣庸而播耕者主人費家而美食調布而求易錢者非愛庸客也曰如是耕者且深耨者熟耘也庸客致力而疾耕耕者盡巧而正畦陌者非愛主人也曰如是􅃵且美錢布且易云也此其養功力有父子之澤矣而心調於用者皆挾自為心也故人行事施予以利之為心則越人易和以害之為心則父子離且怨韓非子外儲説左匡章謂恵子曰公之學去尊今又王齊王何其到也恵子曰今有人於此欲必撃其愛子之頭石可以代之匡章曰公取之代乎其不與施取代之子頭所重也石所輕也撃其所輕以免其所重豈不可哉匡章曰齊王之所以用兵而不休攻撃人而不止者其故何也恵子曰大者可以王其次可以覇也今可以王齊王而夀黔首之命免民之死是以石代愛子頭也何為不為民寒則欲火暑則欲水燥則欲濕濕則欲燥寒暑燥濕相反其於利民一也利民豈一道哉當其時而已矣吕氏春秋愛類象觧其牙不憎人之利之也死而棄其招蔶不怨人取之人能以所不利利人則可淮南子説山訓屠者􅃵藿為車者步行陶者用缺盆匠人處狹盧為者不得用用者弗肯為淮南子説林訓家人有嚴君焉井竈之謂也俾冬作夏非竈孰能俾夏作冬非井孰閑藝文類聚火部竈齊女徐吾者東海上貧婦與其鄰婦李吾合燭夜績徐吾最貧而燭不屬或謂李吾曰徐吾燭數不屬請無與夜徐吾曰妾以貧故起常先去常後掃陳席以待来者坐常處下為貧故也今一室之中益一人燭不為益明去一人燭不為益闇何愛東壁餘光莫之能應遂復與夜績事文類聚燭舜兼愛百姓務利天下其田歴山也荷彼耒耜耕彼南畝與四海俱有其利其魚雷澤也旱則為耕者鑿瀆險則為獵者表虎故有光若日月天下歸之若父母太平御覽皇王部帝舜有虞氏欲蠲人之憂則贈以丹棘丹棘一名忘憂欲蠲人之忿則贈以青棠青棠一名合歡太平御覽木部合歡譬如良藥能除衆生種種病根海空智藏經持誡品譬如衆生身有病苦恰逺夷塗而行嶮道嶮道多難備受衆苦忽有異人見愍念之即將教以平坦之路海空智藏經供獻品譬如有人患諸重疾枕卧牀席飲食不能氣命無㡬忽於空中得甘露藥盈滿一巵歘在頭首其人大驚疑是鬼毒妖災所降又復疑是神明所賜當欲飲之進退未敢忽於空中有一善神發聲唱言是大妙藥可取服之疾者聞已方大歡喜取藥而飲病便除瘥海空智藏經序品亦如有人欲之彼國隔大河流翹彼岸渺然萬里愁苦屏營不能自抑善濟神王忽於岸邉化作一舟篙檝行具觸事無乏中有一人語欲度人汝可入此當載汝過其人即驚我在此乆多時覔船終不能得那忽今日挺然化有當是鬼魅誘我入水若是化惑後必生害我寧止此卒於性命脱失計去死悔無及即於爾時善濟神王化作飛仙於靈霞間髙聲唱言此是善神欲濟汝命度去無嫌是時此人得聞斯語心大歡喜安隠無量便入船中直過彼岸海空智藏經序品譬如虚舟汎浮濟溺無意而浮任人東西到所岸者捨舟便去况非舟耶無上内祕藏經解脱品譬如有人墮墜圊厠糞穢之處在此厠中云何得出有善男子見而愍之尋前捉髪㧞之令出元陽妙經卷七悉如良井縱使天下大旱百丈絶源此井猶滿井主足用餘以施人百千萬人舉鄉郭人恣意汲取給拯無極終於無竭靈寳通㣲經一切有情長時履踐猶如道路亦如橋梁波羅蜜多經三百三十七如大長者無量資財為一切人之所受用波羅蜜多經卷五百六十八譬如三千大千世界所出諸物無不皆為有情受用波羅蜜多經卷五百七十譬如真金常與有情作大饒益謂未出礦若出礦時若轉變成諸莊嚴具若復出賣轉買餘物皆與無量無邉有情隨其所應作大饒益波羅蜜多經五百八十三譬如王子未紹王位與諸有情作大饒益若紹王位亦與有情作大饒益若命終後亦與有情作大饒益波羅蜜多經五百八十三譬如刹利灌頂大王多有倉廪盈儲榖豆嚴誡王司善令監守何以故於饑饉世當濟羣生大寳積經二十如大雪山中有大藥王名為毗伽摩若聞其聲一切世間猛烈毒熱皆悉消滅若藥所住百踰繕那其威盛故令諸惡毒皆無勢力若以藥王塗大螺鼓芳擊若吹其聲所及諸有衆生或飲毒藥或被毒螫毒塗毒刺衆毒惱者但聞如是螺鼔之聲暫至於耳一切諸毒皆得除滅大寳積經四十八譬如雪山王中生諸藥草無有所屬無所分别隨病所服皆能療治大寳積經卷一百一十二䕶諸怖畏如親如友訪諸怨敵如壍如城救諸危難猶如父母蔵諸怯劣猶若叢林大集地蔵十輪經卷一譬如大雲於夏暑月降霔大雨乃至増長一切種子大方廣佛華嚴經卷四十三譬如日出生育衆生無眼根故未曾得見雖未曾見然為日光之所饒益何以故因此得知晝夜時節受用種種衣服飲食令身調適離衆患故大方廣佛華嚴經卷五十譬如大水以能利潤受用衆生故譬如大城以能滿足一切智慧功徳故譬如僮僕以心慈悲代諸衆生勤苦事故法集經欲四四駛生死河法船度彼岸中隂經卷下菩薩妙行有四事何等為四一者願我常生無佛世界喻如日月行閻浮提為其隂冥二者如以金錍决其眼瞙令覩光明三者作大藥樹一切衆生得聞香者病苦悉除四者常演説法澍雨法雨萌芽生長成就果實悉發無上菩提之心是為菩薩四大𢎞誓七佛所說神咒經卷四譬如種種妙香一人賣一人買傍人在邉亦得香氣於香無損二主無失大智度論卷二十八譬如甘美果樹茂盛成就人大歡喜以樹有種種利益有庇其䕃者有用其華食其果實大智度論三十五如深水難渡有人分散此水令淺則渡者皆易大智度論卷六十五譬如人行安隱道免諸患難常念此道以示人大智度論卷七十喻林卷三十九
