body:
  text: 喻林卷八十三明徐元太撰德行門五齊家夫妻反目不能正室也易小畜風自火出家人君子以言有物而行有恒易家人關關睢音疽鳩在河之洲窈窕淑女君子好逑音求詩國風關睢參初金反差初宐反荇音杏菜左右流之窈窕淑女寤寐求之參差荇菜左右采叶此禮反之窈窕淑女琴瑟友叶羽已反之參差荇菜左右芼音帽叶音邈之窈窕淑女鍾鼓樂音洛之詩國風關睢桃之夭夭灼灼其華音花之子于歸宜其室家詩國風桃夭牆有茨不可埽叶蘇后反也中冓音垢之言不可道叶徒后反也牆有茨不可襄也中冓之言不可詳也牆有茨不可束也中冓之言不可讀也詩國風牆有茨蝃音帝蝀音凍在東莫之敢指詩國風蝃蝀桑之未落其葉沃若于音吁嗟鳩兮無食桑葚音甚叶知林反詩國風氓南山崔崔雄狐綏綏詩國風南山藝麻如之何衡音横從其畆取妻如之何必告父母詩國風南山葛屨五兩如字又音亮冠緌音􅅋雙叶所終反止詩國風南山敝笱在梁其魚魴鰥音關叶古倫反齊子歸止其從去聲如雲敝笱在梁其魚魴鱮音序齊子歸止其從如雨敝笱在梁其魚唯唯上聲齊子歸止其從如水詩國風敝笱有扁音辯斯石履之卑兮詩小雅白華關睢后妃之德也風之始也所以風天下而正夫婦也毛詩關睢鵲巢夫人之德也國君積行累功以致爵位夫人起家而居有之德如鳴鳩乃可以配焉毛詩鵲巢草蟲大夫妻能以禮自防也毛詩草蟲采蘋大夫妻能循法度也毛詩采蘋緑衣衞莊姜傷己也妾上僣夫人失位而作是詩也毛詩緑衣谷風刺夫婦失道也衞人化其上淫於新昏而棄其舊室毛詩谷風敝笱刺文姜也齊人惡魯桓公微弱不能防閑文姜使至淫亂為二國患焉毛詩敝笱此二菜者蔓菁與葍之類也皆上下可食然而其根有美時有惡時采之者不可以根惡時并棄其葉喻夫婦以禮義合顔色相親亦不可以顔色衰棄其相與之禮鄭氏箋詩谷風國君以禮防制一國今其宫内有淫昬之行者猶牆之生蒺藜鄭氏箋詩牆有茨鳥之雌雄不可别者以翼右掩左雄左掩右雌陰陽相下之義也夫婦之道亦以禮義相下以成家道鄭氏箋詩白華言嘒然㣲者彼小星此星雖微亦隨三星之心五星之噣以次列在天見於東方以興禮命卑者是彼賤妾妾雖卑亦隨夫人以次序進御於君所由夫人不妬忌惠及故也毛詩正義小星習習然和舒之谷風以陰以雨而潤澤行百物生矣以興夫婦和而室家成即繼嗣生矣毛詩正義谷風言采葑菲之菜者無以下體根莖之惡并棄其葉以興為室家之法無以其妻顏色之衰并棄其德毛詩正義谷風敝敗之笱在於魚梁其魚乃是魴鰥之小魚魴鰥自是魚之易制者但笱以敝敗不能制以喻文姜是婦人之易制者但由魯桓以微弱不能制毛詩正義敝笱事父可以事君事兄可以事師長使子猶使臣也使弟猶使承嗣也能取朋友者亦能取所予從政者矣賜與其宫室亦猶慶賞於國也忿怒其臣妾亦猶用刑罰於萬民也是故為善必自内始也大戴禮記曾子立事腐木不可以為柱卑人不可以為主前漢書劉輔傳夫羽翮不修則不可以致千里闑内不理無以整外前漢王尊傳龍漦結釁宗周鞠為黍苗鷰尾挺灾隆漢墜其枌社晉書后妃上天地之道葢相須而化成帝后之德必相恊而政隆然後品物流形彛倫攸叙靈根長固本枝百世晉書孝武定王皇后傳貞鳥睢鳩執一无尤􅃦門治理君子恱喜焦氏易林晉之同人次四夫妻反道維家之保測曰夫妻反道各有守也太𤣥經第一戾次二家無壼婦承之姑或洗之塗測曰家無壼無以相承也太𤣥經第三居初一謹于媐㐜初貞後寧測曰謹于媐㐜始女貞也太𤣥經第五内疥癬蚊䖟或未能免限以大分故稀鬭䦧之恥顔氏家訓後娶笞怒廢於家則豎子之過立見刑罰不中則民無所措手足治家之寛猛猶國焉顔氏家訓治家今使疎薄之人而節量親厚之恩猶方底而圓葢必不合矣顔氏家訓兄弟父者猶天母者猶地子猶萬物也故天平地安陰陽和調物迺茂成父慈母愛室家之中子迺􅍿順補文選壺關三老茂救太子書荀爽女誡曰七嵗之男王母不抱七嵗之女王父不持親非父母不與同車親非兄弟不與同筵非禮不動非義不行困學記聞卷十七評文婦道六五恒其德貞婦人吉夫子凶易恒六五帝乙歸妹其君之袂不如其姊之袂良月幾望吉易歸妹婦人之制夫猶如月在望時盛極以敵日也周易正義小畜汎彼柏舟在彼中河髧音窞彼兩髦音毛實維我儀叶牛何反汎彼柏舟在彼河側髧彼兩髦實維我特詩國風柏舟燕燕于飛差初宜反池其羽燕燕于飛頡與潔同之頏與抗同之燕燕于飛下上上聲其音詩國風燕燕采采卷耳不盈頃筐嗟我懷人寘彼周行詩國風卷耳南有喬木不可休息漢有游女不可求思漢之廣叶古曠反矣不可泳叶于誑反思江之永叶弋亮反矣不可方叶甫妄反思詩國風漢廣桃夭周人美后妃終始婦道之詩詩說周南漢廣文王化行江漢而男女知禮詩說周南江有汜諸侯之媵始不容於嫡終而進之故作是詩詩說召南后妃說樂君子之德無不和諧又不淫其色愼固幽深若關睢之有别焉然後可以風化天下毛詩關睢註葛覃后妃之本也后妃在父母家則志在於女功之事躬儉節用服澣濯之衣毛詩葛覃卷耳后妃之志也又當輔佐君子求賢審官毛詩卷耳芣苢后妃之美也和平則婦人樂有子矣毛詩芣苢采蘩夫人不失職也夫人可以奉祭祀則不失職矣毛詩采蘩小星惠及下也夫人無妬忌之行惠及賤妾進御於君知其命有貴賤能盡其心矣毛詩小星柏舟共姜自誓也衞世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之毛詩柏舟鳲鳩因鵲成巢而居有之而有均壹之德猶國君夫人來嫁居君子之室德亦然鄭氏箋詩鵲巢女德貞靜然後可畜美色然後可安又能服從待禮而動自防如城隅故可愛之鄭氏箋詩静女杞非常菜也而升北山采之託有事以望君子鄭氏箋詩枤杜於池中柔麻使可緝績作衣服喻賢女能柔順君子成其德敎鄭氏箋詩東門之池婦人思其君子之居處專專如瓜之繫綴焉瓜之瓣有苦者以喻其心苦也鄭氏箋詩東山其情性宻緻操行正直如髮之本末無隆殺也鄭氏箋詩都人士關關然聲音和美者是睢鳩也此睢鳩之鳥雖雌雄情至猶能自别退在河中之洲不乗匹而相隨也以興情至性行和諧者是后妃也后妃雖說樂君子猶能不淫其色退在深宫之中不褻瀆而相慢也毛詩正義關睢燕燕往飛之時必舒張其尾翼以興戴嬀將歸之時亦顧視其衣服毛詩正義燕燕言日之始照月之盛望皆出東方月盛之時有與日同以興國君之平常夫人之隆盛皆秉其國事夫人之盛時亦當與君同毛詩正義日月日月雖分照晝夜而日恒明月則有盈有闕不常盛盛則與日皆出東方猶君與夫人雖各聽内外而君恒伸夫人有屈有伸伸則與君同居尊位毛詩正義日月言凱樂之風從南長養之方而來吹彼棘木之心故棘心夭夭然得盛長以興寛仁之母以已慈愛之情養我七子之身故七子皆得少長然棘木之難長者凱風吹而漸大猶七子亦難養者慈母養之以成長毛詩正義凱風如人之渡水若就其深矣則方之舟之若就其淺矣則泳之游之隨水深淺期於必渡以興已於君子之家事若値其難也則勤之勞之若値其易也即優之游之隨事難易期於必成毛詩正義谷風言始為荑終為茅可以供祭祀以喻始為女能貞靜終為婦有法則可以配人君毛詩正義静女東門之外有池水此水可以漚柔麻草使可緝績以作衣服以興貞賢之善女此女可以柔順君子使可修政以成德敎毛詩正義東門之池子未學禮乎丈夫之􅃣也父命之女子之嫁也母命之往送之門戒之曰往之女家必敬必戒無違夫子以順為正者妾婦之道也孟子滕文公下浴不必江海要之去垢馬不必騏驥要之善走士不必賢世要之知道女不必貴種要之貞好史記外戚世家女憲曰婦如影響焉不可賞後漢書曹世叔妻傳天固不可逃夫固不可離也行違神祗天則罰之禮義有愆夫則薄之後漢書曹世叔妻傳初踐椒宫逞梟心於長樂方觀梓樹頒鴆羽於離明晉書恭惡褚皇后傳隰桑有阿其葉有幽既見君子德音孔膠夫婦人以色親以德固姜氏之德行謂孔膠也列女傳周宣姜后賢人之所以成者其道愽矣非特師傅朋友相與切磋也妃匹亦居多焉列女傳周列國齊相御妻適人之道一與之醮終身不改不幸遇惡疾不改其意且夫采采芣苢之草雖其臭惡猶始於捋采之終於懷擷之浸以益親況於夫婦之道乎列女傳周列國蔡人妻夫婦人之禮精五飯幕酒漿養舅姑縫衣裳而已矣故有閨内之修而無境外之志列女傳周列國鄒孟軻母妾聞忠臣事君無懈音戒倦時􅍿子養親患無日也妾豈敢以少貴之故變妾之節哉列女傳周列國衞宗二頥於結根於山阿喻婦人託身於君子也李善註文選古詩魯陶門女者少寡養姑紡績為産魯人欲求之女乃歌曰黄鵠早寡七年不雙宛頸獨宿不與衆同飛鳥尚然況於貞良魯人聞之遂不復求藝文類聚鳥部鵠女貞之樹柯葉冬生寒涼守節險不能傾藝文類聚木部女貞膏不厭鮮水不厭清玉不厭潔蘭不厭馨藝文類聚后妃部后妃箴語曰嫁雞與之飛嫁狗與之走埤雅卉物門葛蔡邕女誡曰心猶首面也是以甚致飾焉面一旦不修則塵垢穢之心一朝不思善則邪惡入之咸知飾其面不修其心夫面之不飾愚者謂之醜心之不修賢者謂之惡愚者謂之醜猶可賢者謂之惡將何容焉故覽照拭面則思其心之潔也傅脂則思其心之軟也加粉則思其心之鮮也澤髮則思其心之順也用櫛則思其心之理也立髻則思其心之正也攝鬢則思其心之整也太平御覽人事部鑒戒下甘隠潛龍勿用陽氣潛藏易乾六四括囊无咎无譽象曰括囊无咎愼不害也易坤天地不交否君子以儉德辟難不可榮以禄易否初九賁其趾舍車而徒象曰舍車而徒義弗乗也易賁上九肥遯无不利易遯上九鴻漸于陸其羽可用為儀吉易漸魚有能潛在淵者或在於渚者小魚不能入淵而在渚良魚則能逃處於深淵以興人有能深於隠者或出於世者小人不能自隠而處世君子則能逃遯而隠居毛詩正義鶴鳴雖分國如錙銖不臣不仕禮記儒行不義而富且貴於我如浮雲論語述而顔先生與寡人遊食必大牢出必乗車妻子衣服麗都顔斶辭去曰夫玉生於山制則破焉非弗寶貴矣然大璞不完士生乎鄙野推選則禄焉非不尊遂也然而形神不全斶願得歸晚食以當肉安歩以當車無罪以當貴清淨貞正以自虞戰國策齊宣王子獨不見郊祭之犧牛乎養食之數嵗衣以文繡以入太廟當是之時雖欲為孤豚豈可得乎子亟去無汚我我寧游戲汙瀆之中自快無為有國者所羈史記老莊傳鳯漂漂其高遰兮夫固自縮而逺去襲九淵之神龍兮沕深潛以自珍彌融爚以隠處兮夫豈從螘與蛭螾所貴聖人之神德兮逺濁世而自藏使騏驥可得係羈兮豈云異夫犬羊史記賈生傳漁釣於一壑則萬物不奸其志棲遲於一丘則天下不易其樂不絓聖人之網不齅驕君之餌蕩然肆志談者不得而名焉故可貴也前漢書叙傳上琛寶可懷貞期難對後漢書申屠蟠列傳贊夫覆巢破卵則鳯皇不翔刳牲夭胎則麒麟不臻誠物類相感理使其然後漢書黄瓊列傳所謂雲中白鶴非鶉鷃之網所能羅矣魏志邴原傳註藏聲江海之上卷迹囂氛之表潄流而激其清寢巢而韜其耀晉書隠逸傳清流可飲至道可飡何為棲棲自使疲單魚懸獸檻鄙夫知之晉書董京傳韜光逐藪含章未曜龍潜九泉䃘然執高晉書皇甫謐傳楚少時欲隠居謂濟曰當欲枕石潄流誤云潄石枕流濟曰流非可枕石非可潄楚曰所以枕流欲洗其耳所以潄石欲厲其齒晉書孫楚傳望絶於榮華之塗而志安乎窮圮之域藜藿有八珍之甘蓬蓽有藻梲之樂也故權貴之家雖咫尺弗從也知道之士雖艱逺必造也晉書葛洪傳巖穴人情所高吾得當此則雞鶩變作鳯皇宋書王㣲傳非但土石侯卿腐鴆梁錦實迺竚意天后睨目羽人宋書周朗傳委明珠而樂賤辭白璧以安貧北齊書文苑顔之推傳豈若蹙足入絆申頸就羈北史蕭大圜傳魚鼈之不食餌者不出其淵樹木之勝霜雪者不聽其天士能自治者不從聖人管子侈靡威鳯以難見為神是以聖人以深為根走麝以遺香不捕是以聖人以約為紀關尹子九樂澤雉十步一啄百步一飲不蘄畜乎樊中神雖王不善也莊子養生主夫函車之獸介而離山則不免於網罟之患吞舟之魚碭而失水則蟻能苦之故鳥獸不厭高魚鼈不厭深夫全其形生之人藏其身也不厭深眇而已矣莊子庚桑楚莊子釣於濮水楚王使大夫二人往先焉曰願以境内累矣莊子持竿不顧曰吾聞楚有神龜死已三千歳矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曳尾於塗中乎二大夫曰寧生而曳尾塗中莊子曰往矣吾將曳尾於塗中莊子秋水鹿食山草不思邑里焦氏易林豐之萃或曰回之簞瓢臞如之何曰明明在上百官牛羊亦山雌也闇闇在上簞瓢捽茹亦山雌也何其臞千釣之輕烏獲力也簞瓢之樂顔氏德也揚子修身初一逃水之夷滅其創跡測曰逃水之夷跡不創也太𤣥經第四逃草木落於待黄之秋而衡門之蒿獨茂塵礫沸於㑹風之候而寒谷之雲不飛亦以休風之宣暢而聖情之凝鬱也天禄閣外史祝頌言麒麟仁智之獸逺見避害常藏隠不見有聖德之君乃肯來出如使可得羈係而畜之則與犬羊無異不足貴也言賢者亦以不可枉屈為高如可趨走亦不足稱也王逸註楚辭惜誓言已懷德不用譬若蛟龍潜於川澤忽然乘雲汎淫而游紛紜若霧而乃見之也王逸註楚辭九歎澤雉窮野草靈龜樂泥蟠榮名穢人身高位多災患嵇中散集與阮德如澤雉雖饑不願園林安能服御勞形苦心嵇中散集兄秀才公潜龍尚泥蟠神龜隠其靈嵇中散集阮德如答握耒甫田而麾節忽若執鞭啜荈潄泉而大牢同乎藜藿抱朴子内篇暢𤣥繿縷帶素不以貿龍章之暐曄也負步杖筴不以易結駟之駱驛也藏夜光於蒿岫不受他山之攻沈鱗甲於𤣥淵以違鑚灼之災抱朴子内篇暢𤣥軒轅之臨天下可謂至理也而廣成不與焉唐堯之有四海可謂太平也而偓佺不佐焉而德化不以之損也才子不以之乏也抱朴子内篇釋滯以芳林為臺榭峻岫為大厦翠蘭為絪牀緑葉為幃幙被褐代衮衣薇藿當嘉饍抱朴子内篇釋滯士以自衒為不高女以自媒為不貞何必委洗耳之峻標效負俎之干榮哉抱朴子外篇任命四靈翳逸而為隆平之符幽人嘉遁而為有國之寶何必司晨而銜鑣羈紲於憂責哉有用人之用也無用我之用也抱朴子外篇博喻鸞鳯競粒於庭塲則受䙝於雞鶩龍鱗雜厠於芻豢則見黷於六牲是以商老棲峻以播遯世之操卞隋赴深以全遺物之聲抱朴子外篇愽喻身與名難兩濟功與神尠並全支離其德者苦而必安用以適世者樂而多危故鷙禽以奮擊拘縶言鳥以智慧見籠瓊瑶以符采剖判三金以琦玩冶鑠蘭􅊉以芬馨剪刈文梓以含音受伐是以翠虬覩伯益而登𤣥雲靈鳯値孟戲而反丹穴子永歎天倫之偉漆園悲被繡之犧抱朴子外篇愽喻棲鸞戢鸑雖饑渴而不願籠委於庖人之室乘黄天鹿雖幽餓而不樂蒭秣於濯龍之廏是以掇蜩之叟忘萬物於芳林垂綸之生忽執珪於南楚抱朴子外篇博喻夫山之金玉水之珠貝雖不在府庫之中不給朝夕之用然皆君之財也退士不居肉食之列亦猶山水之物也豈非國有乎許由不竄於四海之外四皓不走於八荒之表也抱朴子外篇逸民空谷有項領之駿者孫陽之恥也太平遺􅃣世之才者賞眞之責也抱朴子外篇嘉遯藜藿不供而意佚於方丈齊編庸民而心歡於有土抱朴子外篇嘉遯侣雲鵬以高逝故不縈翮於腐鼠以蕃武為厚誡故不改樂於簞瓢抱朴子外篇嘉遯吾特遊繒繳之下也若夫子可謂㝠㝠矣文中子魏相魚葺鱗以自别兮蛟龍隠其文章故荼薺不同畆兮蘭􅊉幽而獨芳楚辭九章悲回風騏驥伏匿而不見兮鳯皇高飛而不下鳥獸猶知懷德兮何云賢士之不處文選宋玉九辨鸞翮有時鎩龍性誰能馴文選顔延之詠嵇中散詩靈鳯振羽儀戢景西海濱朝食琅玕實夕飲玉池津文選江文通擬嵇中散詩頓網探淵不能招龍振網羅雲不必招鳯是以巢箕之叟不眄丘園之幣洗渭之民不發傅巖之夢文選陸機演連珠夫璿玉致美不為池隍之寶桂椒信芳而非園林之實豈期深而好逺哉蓋云殊性而已文選顔延之陶徵士誄譬彼鴛雛豈競鳶鴟之肉猶斯雜縣寧勞文仲之牲補文選昭明太子陶淵明集序玉之在山以見珍而終破蘭之生谷雖無人而自芳補文選昭明太子陶淵明集序夫自衒自媒者士女之醜行不忮不求者明達之用心是以聖人韜光賢人遁世補文選昭明太子陶淵明集序夫寶以含珠為貴士以藏器為峻麟以絶跡標竒松以負霜稱㒞是以蘭生幽澗玉輝千仞補文選曹毗對儒寂然尸居儼焉山立遵渚龍見在林鳯戢廣文選陸士龍逸民賦甘餌含毒難數嘗兮麟而可羈近犬羊兮鸞鳳高翔戾青雲兮不掛網羅固足珍兮廣文選揚子雲太𤣥賦葢聞獻技者易忽養德者難致是以子張重趼不獲哀公之禄干木偃息不受文侯之位廣文選謝惠連連珠巖嶺高則雲霞之氣鮮林藪深則蕭瑟之音清廣文選戴安道閑遊賛知溟海之禽不以籠樊服養櫟散之質不以斧斤致用故能樹之於廣漢棲之於江湖廣文選戴安道􅐬遊贊顧蹄涔不足以濯神鬚翳薈不足以翔雲翮是故藐姑有綽約之廬箕阜有高嘯之宇廣文選廋元規翟徵君贊寧隠鱗藏彩若淵中之龍乎寧舒翼揚聲若雲間之鴻乎廣文選嵇叔夜卜疑集鴻鵠相隨飛浩渺運荒裔揮翮凌長風須㬰萬里逝朝餐琅玕實夕栖丹山際抗身青雲中網羅孰能制廣文選阮嗣宗詠懷詩鱗翼成而愈伏術業優而不試乃欲闔匵辭價泥蟠深處木戢琳琅之耀匿首窮魚之渚廣文選束廣微𤣥居釋比從政於匣笥之龜譬官者於郊廟之犢廣文選束廣微𤣥居釋獨不見夫鸞鳯之高翔兮乃集太皇之壄循四極而囘周兮見盛德而後下廣文選賈誼惜誓既有凌霄之姿何肯為作耳目之翫世說新語言語鸞雛鳯子養甡高峙隠耀深林不食滓穢意林太元經巢父堯時隠人年老以樹為巢而􅃦其上故人號為巢父堯之讓許由也由以告巢父巢父曰汝何不隠汝形藏汝光非吾友也乃擊其膺而下之許由悵然不自得乃遇清冷之水洗其耳拭其目曰嚮者聞言負吾友遂去終身不相見藝文類聚人部隠逸上堯以天下讓巢父巢父曰君之牧天下亦猶余之牧孤犢君牧天下是各有其所牧矣君焉用惴惴然以所牧而與余余無用天下為也於是牽犢而去藝文類聚獸部牛符子方介丘於尺阜託雲林乎一木藝文類聚人部隠逸上窟故能虬驤慶霄而不紲豢龍之轡鳯鳴瑶林而不屈伶倫之籠藝文類聚人部隠逸上賛河上有文人緯蕭棄明珠甘彼藜藿食樂是蓬蒿廬藝文類聚人部言志詩濯清水追涼風釣游鯉弋高鴻不受當世之責永保性命之期則可以凌雲霄出宇宙之外矣藝文類聚人部且麟隠於遐荒不紆機穽之路鳯皇翔於寥廓故節高而可慕藝文類聚人部嘲戲鳯皇鳴高岡有翼不好飛安知鳯皇德貴其來見稀藝文類聚鳥部鳯詩夫夜光結緑非胠篋之恒珍逸羽翔鱗豈園池之近玩寧期心於逺大葢不知其所以然也是以潁陽高蹈洗耳於唐朝漢陰貞棲滅迹於周代盛德風流有自來矣文苑英華蕭綸隠隠居碑山梁飲啄非有意於籠樊江海飛浮本無情於鐘鼓文􅁐英華徐陵遷譴上書禽巢欲逺魚沈唯深清聲一作蹤滅跡何必山林文􅁐英華庾信聖賢讃鸞鳯棲堂廡不若翔廖廓太平御覽居處部堂老萊子隠於䝉山之陽以葭為葢蓬為室蓍木為艾席枝為牀衣緼飲水墾山播植楚王親至其門方織畚王去有間其妻戴畚萊挾薪而至問車馬跡之多答曰楚王妻曰可食以酒肉者可加以鞭捶可受以官禄者可隨以鈇鉞先生受人官禄為人所制妾不能為人所制者妻負畚萊而去也太平御覽地部䝉山驪龍之珠必沈紫泉之裏垂天之翼必翔青㝠之表太平御覽治道部薦舉下漢王聞宋勝子方牧羊於巨澤鼓而歌南風之詩使者進謂宋勝子曰漢王聞先生之賢使使者致命於先生而委國政焉宋勝子矍然而顧謂使者曰是何言歟今漢王待四海之士與十羣之羊其於職司也奚以異乎而大王廢牧羊之任委以四海之政是錯亂天位倒置人倫勝不願為也太平御覽資産部牧金玉有本質焉能不堅剛惟在逺爐炭幽居永潜藏初學記寶器部金必欲飾混沌以蛾眉冠越客於文冕走雖不敏請附高節有蹈東海而死爾何氏語林言語非志驕富貴但性畏廟堂若使麏䴥可驂何以異夫騏驥何氏語林言語生若浮雲朝露寧俟長繩繫量何氏語林言志艮背却行求心自處羅含蘭菊仲蔚蓬蒿文􅁐英華李商隠獻河東君藉纖草以蔭長松結幽蘭而援芳桂仰翔禽於百仞俯泳鱗於千尋何氏語林言志測性同鱗羽愛上山壑眷戀松筠輕迷人路何氏語林棲逸民樵採麋鹿之伍終其解毛之衣馳騁日月之車得保自耕之禄於大王之恩亦已深矣何氏語林棲逸長羣魚鳥畢景松阿雖復玉没於訪珪之辰桂掩於搜芳之日汎濫漁父之游偃息卜居之㑹如此而已何氏語林蕳傲南史昔堯優許由非不𢎞也洗其兩耳楚聘莊周非不廣也執竿不顧僕得曝背隴畆之中誦顔氏之簞瓢詠原憲之蓬戸時翺翔於林澤與沮溺為等儔聽𤣥猿之悲吟察鶴鳴於九􅆏安身為樂無憂為福處虚空之名居不靈之龜何氏語林言志見朱闈廣厦雖識是華樂而初無欲往之心望高巖廣澤亦知此難立正自恒欲往就華陽陶隠居傳上身無所貪慕樂於山川如野鹿常自守不與人從事般舟三昧經卷上喻林卷八十三
