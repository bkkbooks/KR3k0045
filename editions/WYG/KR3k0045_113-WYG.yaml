body:
  text: 喻林卷百十三明徐元太撰性理門四守要戸之開闔必由於樞情之通塞必在於感後漢書廉范傳論註凡在天非日不明居地以斗而辨宋書厯志下萬物有所生而獨知守其根百事有所出而獨知守其門淮南子原道訓今夫調絃者叩宫宫應彈角角動此同聲相和者也夫有改調一絃其於五音無所比鼔之而二十五絃皆應此未始異於聲而音之君已形也淮南子覽㝠訓猶本與末也從本引之千枝萬葉莫不隨也淮南子精神訓慎子曰匠人知為門能以門所以不知門也故必杜然後能門淮南子道應訓風自動而依之德自立而秉之斯易持易行之道也郭子註莊天運示應於近遠有可察託驗於顯微或可包是以寸管下傃天地不能以氣欺尺表逆立日月不能以形逃文選陸士衡演連珠通於變者用約而利博明其要者器淺而應𤣥是以天地之賾該於六位萬殊之曲窮於五絃文選陸機演連珠尺表能審璣衡之度寸管能測往復之氣世説新語言語終年為車無一人之輪則不可馳意林子思子玉律追天故躔次之期不變緹室候景則發歛之氣罔踰藝文類聚内典部寺碑此是世寶未足為上於諸寶中法寶為上此是世光未足為上於諸光中智光為上此是世明未足為上於諸明中心明為上五燈㑹元西天祖師二十七祖夫約方者猶約囊也囊滿而弗約則輪泄方成弗約則神與弗俱黄帝素問靈樞經禁服家者知人之本根也身者知天之淵泉也道德經指歸卷八去家出户不見天下去身窺牖不知天道其出愈遠其知益少周流四海其迷益甚道徳經指歸卷八茍解提綱而振領自然掘土而得金玉皇本行集經萬象森羅不離兩儀之育百法紛凑無越三教之境華陽陶隠居集譬如有人塊擲師子師子逐人而塊自息波羅蜜多經卷五百六十九譬如桴筏以繩貫穿連綴竹木不令分㪚於河流中遊行自在大方廣佛華嚴經卷三十六如人䕶身先䕶命根大方廣佛華嚴經卷七十八譬如有人調和藥汁必當先取好清浄水大方廣佛華嚴經卷七十八如機關木人若無有楔身即離㪚不能運動大方廣佛華嚴經卷七十八菩提心者如白㲲線從本已來性清浄故菩提心者如快利犁能治一切衆生田故菩提心者猶如快箭能破一切諸苦的故菩提心者猶如利矛能穿一切煩惱甲故菩提心者猶如堅甲能䕶一切如理心故菩提心者猶如利刀能斬一切煩惱首故菩提心者猶如利劒能斷一切憍慢鎧故菩提心者如勇將幢能伏一切諸魔軍故菩提心者猶如利鋸能截一切無明樹故大方廣佛華嚴經卷七十八菩提心者如錬金藥能治一切煩惱垢故菩提心者猶如好蜜圓滿一切功德味故菩提心者猶如正道令諸菩薩入智城故菩提心者猶如好器能持一切白净法故大方廣佛華嚴經卷七十八譬如人病喉咽痛舉一身皆為痛佛遺日摩尼寶經推六云何貍心謂順修徐進法云何狗心謂得少分以為喜足云何鼠心謂思惟斷諸繋縛大毘盧遮那成佛神變加持經詩一云何師子心謂修行一切無怯弱法云何鵂鶹心謂常暗夜思念云何烏心謂一切處驚怖思念大毘盧遮那成佛神變加持經詩一如膏車轄令不敗傷有所至到大毘盧遮那成佛神變加持經詩七譬如工巧匠善守於機發亦如海船師執柁而揺動大乗密嚴經卷上以不放逸行為種子故而成善法果以尸波羅蜜行為足故而能善去以菩提心為命根故而不死滅以舍摩他毘婆舍􅃚為手故而能善巧作業以信業果報為眼故而現見智慧修空慧為首故而無所分别法集經欲一如膏車省牛氣力車即易牽蘇婆呼童子經卷中猶如列陣共鬭戰時唯要誓為第一猶樓觀椽彼一切皆依承椽梁立承椽梁承椽梁皆攝持之承椽梁者為最第一中阿含經卷三十四譬如國王有邊境城四周堅固巷陌平正唯有一門立守門者聰明黠慧善能籌量外有人來應入者聽入不應入者不聽周市繞城求第二門都不可得都無猫貍出入之處况第二門彼守門者都不覺悟入者出者然彼士夫知一切人唯從此門若出若入更無餘處雜阿含經卷三十四譬如防水善治堤塘勿漏而已中本起經比丘品佛以忍為鎧精進為鋼鉀持戒為大馬禪定為良弓智慧為好箭外破魔王軍内滅煩惱賊大智度論卷二忍為堅鉀胄慧為利刀仗天清問經當三信能度淵攝為船師精進除苦慧到彼岸法句經篤信品如逸象無鉤終不順調道三昧法門經卷上大慈悲為軸智慧為兩輪精進為快馬戒定以為銜忍辱心為鎧總持為轡勒大智度論卷四譬如人射先得平地地平然後心安心安然後挽滿挽滿然後䧟深戒為平地定意為弓挽滿為精進箭為智慧賊是無明大智度論卷十四如人上屋非梯不昇不得戒梯禪亦不立大智度論卷十四譬如國王有一大臣自覆藏罪人所不知王言取無脂肥羊來汝若不得者當與汝罪大臣有智繋一大羊以草榖好養日三以狼而畏怖之羊雖得養肥而無脂牽羊與王王遣人殺之肥而無脂王問云何得爾荅以上事菩薩亦如是見無常苦空狼令諸結使脂消諸功德肉肥大智度論卷十五是覺觀能生三昧亦能壞三昧譬如風能生雨亦能壞雨大智度論卷二十一譬如農夫遇好良田而無種子雖欲加功無以肆力大智度論卷三十實智慧者則是度老病死海堅牢船也亦是無明黒暗大明燈也一切病者之良藥也伐煩惱樹之利斧也遺教經論離十二或復方之日月譬若寶珠義等塗香事同惜水越渡大海號曰牢船生長善芽又稱平地法苑珠林卷八十二若菩薩欲得浄土當浄其心隨其心浄則佛土浄維摩詰所説經佛國品寶積當知直心是菩薩浄土深心是菩薩浄土大乗心是菩薩浄土布施是菩薩浄土持戒是菩薩浄土忍辱是菩薩浄土精進是菩薩浄土禪定是菩薩浄土智慧是菩薩浄土四無量心是菩薩浄土四攝法是菩薩浄土方便是菩薩浄土三十七品是菩薩浄土廻向心是菩薩浄土説除八難是菩薩浄土自守戒行不譏彼闕是菩薩浄土十善是菩薩浄土維摩詰所説經佛國品障蔽風雨莫過於舍滅除衆想莫妙於空亦能絶諸問難降伏魔怨猶密宇深重冦患自消羅什譯維摩詰經佛道品三乗法以三十四心成道大乗中唯以一念則豁然大悟具一切智也羅什譯維摩詰經菩薩品夫欲響順必和其聲欲影端必正其形此報應之定數也僧肇註維摩詰經佛國品至人夫古之至人藏器於靈褞袍不能令暖軒冕不能令榮動如川之流静如川之渟晋書董京傳舜者處民之中則自齊乎士處君子之中則齊乎君子上與聖人則固聖人之林也晏子春秋外篇善行無轍跡善言無瑕讁善計不用籌䇿善閉無關鍵而不可開善結無繩約而不可解老子巧用大丈夫恬然無思淡然無慮以天為盖以地為車以四時為馬以陰陽為御行乎無路遊乎無怠出乎無門以天為盖則無所不覆也以地為車則無所不載也四時為馬則無所不使也陰陽御之則無所不備也是故疾而不揺遠而不勞文子道原其動若水其静若鑑其應若響芒乎若亡寂乎闕關尹子三極入水不溺入火不熱斫撻無傷痛指擿無痟癢乗空如履實寢虚若處牀雲霧不硋其視雷霆不亂其聽美惡不滑其心山谷不躓其步神行而已列子黄帝絶跡易無行地難莊子人間世予方將與造物者為人厭則又乗夫莽眇之鳥以出六極之外而遊無何有之鄉以處壙埌之野莊子應帝王孔子見老􅆅歸三日不談弟子問曰夫子見老􅆅亦將何規哉孔子曰吾乃今於是乎見龍龍合而成體㪚而成章乗乎雲氣而養乎陰陽予口張而不能嗋予又何規老􅅨哉子貢曰然則人固有尸居而龍見雷聲而淵默發動如天地者乎莊子天運至人神矣大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚若然者乗雲氣騎日月而遊乎四海之外死生無變於已而况利害之端乎莊子齊物論夫水之於汋也無為而才自然矣至人之於德也不修而物不能離焉若天之自髙地之自厚日月之自明夫何修焉莊子田子方在已無居形物自著其動若水其静若鏡其應若響莊子天下内視若盲反聽若聾莫知所長河上公註老子顯德猶如嬰兒之未言雞子之未分明珠在蚌中美玉處石間内雖昭昭外如愚頑河上公註老子體道泰古二皇得道之柄立於中央神與化游以撫四方是故能天運地滯輪轉而無廢水流而不止淮南子原道訓上昔者馮夷大丙之御也乗雲車入雲蜺游微霧騖恍忽厯遠彌髙以極往經霜雪而無迹照日光而無景扶揺抮抱羊角而上經紀山川蹈騰崑崙排閶闔淪天門末世之御雖有輕車良馬勁䇿利錣不能與之争先淮南子原道訓唯體道能不敗湍瀨旋淵呂梁之深不能留也太行石澗飛狐旬望之險不能難也淮南子俶真訓夫鉗且大丙不施轡銜而以善御聞於天下伏羲女媧不設法度而以至德遺於後世何則至虚無純一而不􅭵喋苛事也淮南子覽冥訓昔者王良造父之御也上車攝轡馬為整齊而歛諧投足調均勞逸若一心怡氣和體便輕畢安勞樂進馳騖若滅左右若鞭周旋若環世皆以為巧然未見其貴者也若夫鉗且大丙之御除轡銜去鞭棄䇿車莫動而自舉馬莫使而自走也日行月動星輝而𤣥運電奔而鬼騰進退屈伸不見朕垠故不招指不咄叱過歸鴈於碣石軼鶤雞於姑餘騁若飛騖若絶縱矢躡風追猋歸忽朝發槫桑日入落棠此假弗用而能以成其用者也非慮思之察手爪之巧也嗜欲形於胷中而精神踰於六馬此以弗御御之者也淮南子覽㝠訓召遠者使無為焉親近者使無事焉惟夜行者為能有之故却走馬以糞而車軌不按於遠方之外是謂坐馳陸沈晝㝠宵明以冬鑠膠以夏造氷淮南子覽㝠訓覩堯之道乃知天下之輕也觀禹之志乃知天下之細也原壺子之論乃知死生之齊也見子求之行乃知變化之同也夫至人倚不拔之柱行不關之塗禀不竭之府學不死之師無往而不遂無至而不通生不足以挂心死不足以幽神屈伸俯仰抱命而婉轉禍福利害千變萬紾孰足以患心若此人者抱素守精蟬蜕蛇解游於太清輕舉獨往忽然入㝠鳯凰不能與之儷而况斥鷃乎淮南子精神訓甘暝太宵之宅而覺視于昭昭之宇休息于無委曲之隅而游敖于無形埓之野淮南子精神訓通體于天地同精于陰陽一和于四時明照于日月與造化者相雌雄淮南子本經訓蠢乎若新生之犢而無求其故淮南子道應訓剛柔炎涼各有攸宜安於一域則困於餘方至於聖人心與元氣𤣥合體與陰陽㝠諧方圓不當於一象温涼不值於一器張湛註列黄帝萌然不動亦不自止與枯木同其不華死灰均其寂魄此至人無感之時也夫至人其動也天其静也地其行也水流其湛也淵嘿淵嘿之與水流天行之與地止其於不為而自然一也張湛註列黄帝髙巢不探深淵不漉鳯鸞栖息於庭宇龍鱗羣遊於園池饑虎可履虺蛇可執涉澤而鷗鳥不飛入林而狐兎不驚抱朴子外篇詰鮑知死生者命之極非妄然也若夜旦耳奚其係哉真人在晝得晝在夜得夜以死生為晝夜豈有所不得乎郭子註莊大宗師止若立枯木動若運槁枝坐若死灰行若游塵郭子註莊齊物論不滿不竭者至人之心若鏡應而不藏故曠然無盈虚之變也郭子註莊齊物論至人之道也如鏡有明有照有引有致初學記器用部鏡註道德為父神明為母清浄為師太和為友道德經指歸卷八晝見星於天夜見魚於淵耳比八風之調目領羣獸之毛此思慮之極也道德經指歸卷九夫月現于空凡有水處影無不沈也雷震于天凡可聞處聲無不徹也玉帝妙道真身譬之虚空無所不在豈雷與月之可比哉玉皇本行集經法輪常自轉希音不可聽玉清經中元品見有劫火徧燒三千大千世界天地洞然欲以一氣吹令頓滅波羅蜜多經卷三見有三千大千世界所依風輪飄撃上涌將吹三千大千世界蘇迷盧山大蘇迷盧山輪圍山大輪圍山及餘小山大地等物碎如糠糩欲以一指障彼風力令息不起波羅蜜多經卷三欲析一毛以為百分取一分毛盡舉三千大千世界大海江河池沼澗谷陂湖中水棄置他方無邊世界而不惱觸水族生類波羅蜜多經卷三地中出没如出没水水上經行如經行地身出煙熖如燎髙原體注衆流如消雪嶺波羅蜜多經卷九一切諸海水可知其滴數無有能數知釋迦之夀量析諸妙髙山如芥可知數無有能數知釋迦之夀量一四大地土可知其塵數無有能算知釋迦之夀量金光明最勝王經卷一火中生蓮華是可謂希有在欲而行禪希有亦如是維摩詰所説經佛道品道之極者稱曰菩提菩提者葢是正覺無相之真智乎僧肇註維摩詰經菩薩品去情夢中鑑中水中皆有天地存焉欲去夢天地者寢不寐欲去鑑天地者形不照欲去水天地者盎不汲彼之有無在此不在彼是以聖人不去天地去識關尹子二柱篇曰想如思鬼心慄思盜心怖曰識如認黍為稷認玉為石者浮游罔象無所底止譬覩竒物生竒物想生竒物識此想此識根不在我譬如今日今日而已至於來日想識殊未可卜及至來日紛紛想識皆緣有生曰想曰識譬如犀牛望月月形入角特因識生始有月形而彼真月初不在角胷中之天地萬物亦然關尹子五鑑昔遊再到記憶宛然此不可忘不可遣關尹子五鑑衆罔兩問於景影曰若向也俯而今也仰向也括而今也被髪向也坐而今也起向也行而今也止何也景曰捜捜蕭一作叟也奚稍問也予有而不知其所以予蜩條甲也蛇蛻退也似之而非也火與日吾屯豚也陰與夜吾代也彼吾所以有待耶而况乎以有待者乎莊子寓言人大怒破陰大喜墜陽薄氣發瘖驚怖為狂憂悲多恚病乃成積好憎繁多禍乃相隨故心不憂樂德之至也淮南子原道訓夫函牛之鼎沸而蠅蚋弗敢入崑山之玉瑱而塵垢弗能汚也聖人無去之心而心無醜無取之美而美不失故祭祀思親不求福饗賔修敬不思德唯弗求者能有之淮南子詮言訓念慮者不得卧止念慮則有為其所止矣兩者俱亡則至德純矣淮南子説山訓遺腹子不思其父無貌於心也不夢見像無形於目也淮南子説林訓意所偏感則隨念想而轉易及其甚者則白黒等色方圓共形豈外物之變故語有之曰萬事紛錯皆從意生張湛註列説符今日適越昔何由至未成乎心是非何由生郭子註莊齊物論環中空者也今以是非為環而得其中空則無是無非故能應乎是非郭子註莊齊物論取其棄人間之好若草木之無心故為鳥獸所不畏郭子註莊山木喜懼戰於胷中固已結氷炭於五藏矣郭子註莊人間世有情於為離曠而弗能也然離曠以無情而聰明矣有情於為賢聖而弗能也然賢聖以無情而賢聖矣郭子註莊德充符體天地㝠變化者雖手足五藏未嘗相與而百節同和相與於無相與也未嘗相為而表裏俱濟相為於無相為也若乃役心志以恤手足運股肱以營五藏則相為愈篤而内外愈困矣郭子註莊大宗師夫體道合變者與寒暑同其溫嚴而未嘗有心也郭子註莊大宗師人皆知金之有係為不祥故明已之無異於金則所係之情可解郭子註莊大宗師志之所攖焦火凝氷故其為兵甚於劒㦸郭子註莊庚桑楚鑑之可喜由於無情不問知與不知聞與不聞來即鑑之故終無已若鑑由聞知則有時而廢也性所不好豈獨久照聖人無愛若鏡耳郭子註莊則陽若鏡者鑒物而無情也不將不迎不藏來即應去即止也物來即鑒鑒不以心故雖天下之廣而無勞神之累也郭子註莊應帝王干將鏌鎁與讎為用然報讎者不事折之以其無心飄落之瓦雖復中人人莫之怨者由其無情是以天下平均凡不平者由有情也無情之道大矣郭子註莊逹生賊莫大乎德有心而心有睫及其有睫也而内視内視而敗矣莊子列御冦三人居室二人交争必取信於不争者以辯彼此之得失夫不争者未必平而交争者未必偏而信於不争者何也以争者之心竝挾勝情故也劉子去情今人目若驪珠心如權衡評人好醜雖言得其實彼必嫌怨及其自照明鏡摹倒其容醜状既露則内慙而不怨向之評者與鏡無殊然而向怨今之慙者以鏡無情而人有心也劉子去情使信士分財不如投䇿探鈎使㢘士守藏不如閉局全封何者有心之於平不若無心之不平也有慾之於㢘不若無慾之不㢘也劉子去情無情以接物在遇而恒通有情以接人觸應而成礙由此觀之則情之所處物之所疑也是以媒揚譽人而受譽者不以為德身膚强飯而蒙飽者不以為惠嬰兒傷人而被傷者不以為怨侏儒嘲人而獲嘲者不以為辱何者挾利以為已有情於譽飽雖蒙惠而非德無情於傷辱也雖獲毁而無憾劉子去情魚不畏網而畏鵜復讎者不怨鏌鎁而怨其人網無心而鳥有情劒無情而人有心也劉子去情飄瓦撃人虚舟觸已雖有忮心而不怒者以彼無情於撃觸也劉子去情不知冒陰之可以無景而患景之不匿不知無惜之可以無患而恨惜之不巧豈不哀哉藝文類聚人部公平論國去其姦則邦寧人去其情即身安陰符經註橐籥之器在其用者虚實有無方圓大小長短廣狹聽人所為不與人争善人在於天下譬如橐籥乎非與萬物之交争其德常歸焉以其虚空無欲故也西昇經用心思公不若無心之大同也有欲禁過不若無求之得忠也道德經指歸卷十一如麋鹿一如鴻鴈不在憂喜亦不雜亂道德經指歸卷十二除苦惱根斷親愛緣㝠㝠濁海自得浄界虚皇四十九章譬如耕田秋耕為上如諸迹中鳥迹為勝於諸想中元常為最元陽妙經卷十是身如城血肉筋骨皮裹其上手足以為却敵樓櫓目為察孔頭為殿堂心王處中如是身城諸善真仙之所棄捨凡夫愚人常所味著貪婬瞋恚愚癡羅刹止住其中是不堅固猶如蘆葦伊蘭水沫芭蕉之樹元陽妙經卷十譬如智人見熱時炎如大幻師見所幻事知非真故心無所望大乗妙林經邪見生煩惱蒺䔧荆棘叢大乗妙林經偈不著眼界不著耳鼻舌目意界不著色界不著聲香味觸法界波羅蜜多經卷八譬如天地増之不喜減之不憂波羅蜜多經卷五百六十七譬如火大雖燒一切樹木藥草而不念言我能燒物波羅蜜多經卷五百六十七譬夫大浸稽空而空無溺懼積洿歸澤而澤無垢忿况已謝之聲毁譽一貫既遷之色損益同科波羅蜜多經五百八十九卷序比慙愧而為衣則龍衮不侔其麗禦煩惱而成鎧則犀渠有謝其堅波羅蜜多經五百八十九卷序譬如大地雖以可愛色香味觸擲置其中而都不生髙欣喜愛雖以非愛色香味觸擲置其中而都不生下慼憂恚波羅蜜多經卷五百八十九譬如造作海中大船所以者何作欲度賈客船亦不作是念言我當度人何以故船本無念故道行波羅蜜經卷八我觀世間一切衆生常為十種大毒箭所中何謂為十一者愛毒箭二者無明毒箭三者欲毒箭四者貪毒箭五者過失毒箭六者愚癡毒箭七者慢毒箭八者見毒箭九者有毒箭十者無有毒箭大寶積經卷三十五如是彼人撃鼓已其鼓不生憎愛心大寶積經卷六十七譬如四靣鏡輪清徹明浄無諸垢翳懸於四衢所對色像皆於中現無有増減而此明鏡亦不念言我能現此種種色像大寶積經卷八十三心如怨家能與一切諸苦惱故心如狂象蹈諸土舍能壞一切諸善根故心如吞鈎苦中生樂想故大寶積經卷一百一十二譬如有人求娑羅枝為娑羅枝故齎持利斧入娑羅林中至一大樹下斫其一枝餘枝不作是念彼已被斫不斫我等其被斫者亦不作是念我已被斫餘者不斫大方等大乗經卷十一譬如燈炷之明不自念言我當逐㝠去㝠也然燈炷照不知㝠所去處佛遺日摩尼寶經推六其心如地水火風亦無所愛亦無所憎如來三昧經卷上譬如有人見牛鹿山羊有角之獸即於彪兎生無角解若使不見牛等有角於彪兎等决定不生無角之見大乗宻嚴經卷中當以智慧利斧破汝根本六情枝葉自然墮落無明羅刹經當以念慧水洗除煩惱垢阿育王經偈卷八種燋不復生意盡如火滅法句經泥洹品一切意流衍愛結如葛藤唯慧分别見能斷意根源法句經愛欲品如無求士遇入一林雖見娑羅樹或多羅樹或夜鬘樹或馬相樹或鄔曇跋羅樹或諾瞿陀樹等而不起分别此是娑羅樹此是多羅樹乃至此是諾瞿陀樹等唯起平等樹林勝解逹磨法藴足論無量品七往昔有一聚落其中人民不識螺相亦復未曽聞其螺聲忽有一人從外而來到彼聚落而便止住是人常持一螺以為功業每日執螺詣於聖像鳴螺供養一切人民忽聞螺聲咸悉驚怪共往螺處問彼螺言爾從何來可依實荅若不言實我當破汝螺既無情豈能言荅大正句王經上昔有一人行來渴乏見木桶中有清浄流水就而飲之飲水已足即便舉手語木桶言我已飲竟水莫復來雖作是語水流如故便瞋恚言我已飲竟語汝莫來何以故來有人見之言汝大愚癡無有智慧汝何以不去語言莫來即為挽却牽餘處去世間之人亦復如是為生死渴愛飲五欲鹹水既為五欲之所疲厭如彼飲足便作是言汝色聲香味莫復更來使我見也然此五欲相續不斷既見之已便復瞋恚語汝速滅莫復更生何以故來使我見之時有智人而與之言汝欲得離者當攝汝六情閉其心意妄想不生人得解脫何必不見欲使不生百喻經卷上譬如人遭風雨寒熱亦無所瞋大智度論卷三十三譬如除厠作舍今雖無厠猶有不浄想若能知厠本無幻化所作則無厠想大智度論卷五十三譬如草木無有瞋心大智度論卷八十八又如火燒物不擇好惡薪大莊嚴經論卷八瞋是失諸善法之根本墮諸惡道之因緣法樂之怨家善心之大賊惡口之府藏福惠之刀斧法苑珠林卷七十一喻林卷一百十三
