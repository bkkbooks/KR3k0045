body:
  text: 喻林卷八十明徐元太撰德行門二謹言六四括囊無咎無譽易坤咸其輔頰舌滕口説也易咸六五艮其輔言有序悔亡易艮亂之所生也財言語以為階易繫辭上傳石有玉而傷其山萬民之患在口言汲冡周書周祝解荏音忍染柔木君子樹叶上主反之往來行言心焉數之詩小雅巧言白圭之玷尚可磨也斯言之玷不可為也詩大雅抑君子樹善木如人心思數善言而出之鄭氏箋詩巧言荏染柔忍之木君子之人所樹之也言君子樹木必身簡擇取吾木然後樹之喻往來可行之言亦君子口所出之也言君子出言必心焉思數知善而後出之毛詩正義巧言弔喪弗能賻不問其所費問疾弗能遺不問其所欲見人弗能館不問其所舍禮記曲禮上王言如絲其出如綸王言如綸其出如綍故大人不倡遊言禮記緇衣雷之發聲物無不同時應者人之言當各由已不當然也鄭氏注禮記曲禮上過言一出駟馬不能及不可得悔也口舌所覆亦如溺矣鄭氏注禮緇衣君子溺於口者言卿大夫之君子以口傷人而致怨恨遂被覆沒亦如溺於水不能自活也禮記正義緇衣牀第之言不踰閾況在野乎左傳襄公二十七年溺人必笑吾將有問也注云所問不急猶溺人不知所為而反笑杜氏解左傳哀公十六年鳥之將死其鳴也哀人之將死其言也善論語泰伯道聽而塗説德之棄也論語陽貨士未可以言而言是以言餂之也可以言而不言是以不言餂之也孟子盡心下君子慎言語母先已而後人擇言出之令口如耳孔子集語上楚人諺曰得黃金百斤不如得季布一諾足下何以得此聲於梁楚間哉史記季布傳周廟之人三緘其口漏巵在前欹器留後北齊書魏收傳言室滿室言堂滿堂是謂賢王管子牧民一聲而非駟馬勿追一言而急駟馬不及故惡言不出口茍語不留耳鄧析子轉辭篇狗不以善吠為良人不以善言為賢而況為大乎夫為大不足以為大而況為德乎莊子徐無鬼先王之書術令之道曰惟口出好興戎則此言善用口者出好不善用口者以為讒賊冦戎則此豈口不善哉用口則不善也故遂以為讒賊冦戎墨子尚同中凡出言談則必先立儀而言若不先立儀而言譬之猶運鈞之上而立朝夕焉也我以為雖有朝夕之辨必將終未可得而從定也墨子非命下君子共已以待問焉則言不問焉則止譬若鐘然扣則鳴不扣則不鳴墨子公孟言之信者在乎區蓋之間荀子大略薄薄之地不得履之非地不安也危足無所履者也凡在言也荀子榮辱篇口食可以肥百體故可食也口言或可以招百殃故不可以言也鬼谷子權篇注美言者獨可於市耳夫市交易而退不相宜善言美語求者欲疾得賣者欲疾售也河上公注老子為道山有玉掘其山水有珠濁其淵辨口多言亡其身河上公注老子顯質多事害神多言害身口開舌舉必有禍患河上公注老子虛用人有多言者猶百舌之聲人有少言者猶不脂之戶也淮南子説山訓祭之日而言狗生取婦夕而言衰麻置酒之日而言上冡渡江河而言陽侯之波淮南子説山訓田中之潦流入於海附耳之言聞於千里也淮南子説林訓夫言不在多在於當理施不在豐期於救乏孔叢子連叢子小人之聞道入之於耳出之於口茍言而已譬如飽食而嘔之其不惟肌膚無益而於志亦戾矣韓詩外傳朕嘉宇內之士故詳延四方豪俊文學博習之士超遷官祿言者不必有德何者言之易而行之難有舍其車而識其牛貴其不言而多成事也吳鐸以其舌自破主父偃以其舌自殺鶡鴠夜鳴無益於明主父鳴鴟無益於死非有司欲成利文學桎梏於舊術牽於間言者也鹽鐵論利議口者關也舌者機也出言不當四馬不能追也口者關也舌者兵也出言不當反自傷也説苑談叢言猶射也括既離弦雖有所悔焉不可從而追已説苑談叢言人之善澤於膏沐言人之惡痛於矛戟説苑談叢響不能獨為聲影不能倍曲為直物必以其類及故君子愼言出已説苑談叢百行之本一言也一言而適可以却敵一言而得可以保國説苑談叢一言而非四馬不能追一言而急四馬不能及説苑談叢忠信者士之行也言語者士之道路也道路不修治士無所行矣新序雜事二實穀不華至言不飾今陽子華而不實言而無謀是以禍及其身列女傳周列國晉伯宗妻梟鳴室北聲醜可惡焦氏易林豫之恆多虛少實語不可知尊空無酒飛言如雨焦氏易林豫之升口方圓舌為智樞門焦氏易林無妄之鼎言無要約不成劵契焦氏易林離之革華言風語自相詿誤焦氏易林咸之頥次七觥羊之毅鳴不類測曰觥羊之毅言不法也太玄經第三毅次四耎其哇一佳切三歲不噣音晝測曰耎哇不噣時數失也太玄經第三耎次四利口哇鳥佳切哇商人之貞測曰哇哇之貞利於商也太玄經第五飾次六言無追如抑亦飛如大人震風測曰言無追如抑亦揚也太玄經第五飾次八蛁刁鳴喁喁血出其口測曰蛁鳴喁喁口自傷也太玄經第五飾次六囊失括泄珍器測曰囊失括臣口溢也太玄經第六馴夫聖人為天口賢者為聖譯是故聖人之言天之心也賢者之所説聖人之意也潛夫論考績昔會朝議者有人問曰寧有聞梟食其母乎有答之者曰嘗聞烏反哺未聞梟食母也問者慚唱不善也曹子建令禽惡鳥論若與之言必以其方農夫則以稼穡百工則以技巧商賈則以貴賤府史則以官守大夫及士則以法制儒生則以學業故易曰艮其輔言有序不失事中之謂也徐幹中論貴言靈蔡默然而吉凶昭晳於無形春蛙長譁而醜音見患於聒耳聲希者響必巨辭寡者信必著抱朴子外篇廣譬奔驥不能及既往之失千金不能救斯言之玷故博其施者未若防其微勤其求者不如寡其辭抱朴子外篇廣譬且八音九奏不能無長短之病養由百發不能止將有一失之疏玩慿河者數溺於水好劇談者多漏於口抱朴子外篇重言伯牙謹於操絃故終無煩手之纍儒者敬其辭令故無樞機之辱抱朴子外篇重言奉老氏多敗之戒思金人三緘之義括鋒頴而如訥韜修翰於彤管含金懷玉抑謐華辨抱朴子外篇重言激雷不能追既往之失辭班輸不能磨斯言之既玷抱朴子外篇疾謬言非不可復追其猶射也懸機未發則猶可止矢一離弦雖欲返之弗可得也劉子愼言言語在口譬含鋒刃不可動也動鋒刃者必傷喉舌言失之害非唯鋒刃其所傷者不惟喉舌故天有卷舌之星人有緘口之銘所以警恌言防口訧也劉子愼言言者風也無足而行無翼而飛不可易也是以聖人當言而懼發言而憂如蹈水火臨危險也劉子愼言易誡樞機詩刺言玷斯言一玷非礛䃴所磨樞機既發豈駭電所追劉子愼言汝將閉門却掃歟不如緘口而內修也文中子禮樂口為禁闥舌為發機門機之關楛矢不追廣文選曹子建矯志詩小人溺於水君子溺於口也意林子思子自古及今其道一也變化無窮各有所歸或陰或陽或柔或剛或開或閉或弛或張是以聖人守司其門戶審察其先後口者心之門戶智謀皆從之出意林鬼谷子人者天之舌物者神之口意林周生烈子蟻孔潰河淄川傾山病從口入患自口出存亡之機開闔之術意林物理論無曰莫傳宣于四海無曰莫聞響振萬里藝文類聚人部鑒誡針時好細腰宫中皆飢時恱廣額下作細眉逆龍之鱗必陷斯機括囊無咎乃免誅夷藝文類聚人部言語銘一言正天下定一言倚天下靡藝文類聚人部言語言美則響美言惡則響惡藝文類聚人部言語束修之業其上在於不言其次莫如寡知也故諺曰使口如鼻至老不失藝文類聚人部口勿曰不傳伏流成川蟻孔潰河流冗傾山藝文類聚人部口誡宣納之由實伊樞機唯舌是出馳駟安追差氂千里君子愼微何用口爽信在甘肥藝文類聚人部口針墨子曰子禽問曰多言有益乎對曰蝦蟇日夜鳴口乾而人不聽之鶴雞時夜鳴天下振動多言何益太平御覽羽族部鶴潛龍以不見為德言非其時皆招禍之道也何氏語林識鑒通玄經曰風不動火不出大人不言小人無述火之出也必待薪大人之言必有信道德經四子集解言者禍之戶也不言者福之門也道德經指歸卷八夫士之生斧在口中所以斬身由其惡言法句經言語品昔者國王有一大象猛黠能戰其力勢勝五百小象其王興軍欲伐逆國被象鐵鎧象士御之以雙矛戟繫象兩牙復以二劒繫著兩耳以曲刃刀繫象四腳復以鐵棒繫著象尾被象九兵皆使嚴利象惟藏鼻護不用鬭象士歡喜知象護身命所以者何象鼻軟脆中箭即死是以不出鼻鬭耳象鬭殊久出鼻求劒象士不樂念此猛象不惜身命出鼻求劒欲著鼻頭王及羣臣惜此大象不復使鬭人犯九惡惟當護口如此大象護鼻不鬭所以然者畏中箭死人亦如是所以護口法句譬喻經四象喻品昔有鱉遭遇枯旱湖澤乾竭不能自到有食之地時有大鶴集住其邊鱉從求哀乞相濟度鶴遂銜之飛過都邑上鱉不默聲問此何等如是不止鶴便應之口開鱉乃墮地人得屠裂食之夫人愚頑無慮不謹口舌其譬如是也舊雜譬喻經但有口言説如雷而無雨法苑珠林卷四十六如脣口是弓心慮如絃音聲如箭長夜空發徒染身口法苑珠林卷五十八語雖是實非時而説亦落綺語也法苑珠林卷七十六水邊有二鴈與一龜共結親友後時池水涸竭二鴈作是議言今此池水涸竭親友必受大苦議已語龜言此池水涸竭汝無濟理可銜一木我等各銜一頭將汝著大水處銜木之時愼不可語即便銜之經過聚落諸小兒見皆言鴈銜龜去鴈銜龜去龜即瞋言何預汝事即便失木墮地而死法苑珠林卷八十二兵者不祥之器不獲已而用之言者不真之物不獲已而陳之高僧傳八論愼行初六藉用白茅無咎易大過雷在天上大壯君子以非禮弗履易大壯茍錯諸地而可矣藉之用茅何咎之有愼之至也夫茅之為物薄而用可重也愼斯術也以往其無所失矣易上繫行與其慢寧過乎恭家與其瀆寧過乎嚴王弼注易家人若虞機張往省括于度則釋書太甲上夙夜思之明旦行之如射先省矢括于度釋則中孔氏傳書太甲上告汝行事之難當如射之有所凖志必中所志乃善孔氏傳書盤庚上謂之為山者人意蓋猶以為卑況為岡為陵乎今所見非高山乃岡陵也以興行君子之道者人意尚謂之為淺況為小人之行乎今在位非君子乃小人也毛詩正義正月白玉為圭圭有損缺猶尚可更磨鑢而平若此政教言語之有缺失則遂往而不可改為毛詩正義抑政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣左傳襄公二十五年聖人道雖虎變事則鱉行道雖絲紛事則棊布關尹子三極色盛者驕力盛者奮未可以語道也故不班白語道失而況行之乎列子説符子張曰昔者桀紂貴為天子富有天下今謂臧聚曰汝行如桀紂則有怍色有不服之心者小人所賤也仲尼墨翟窮為匹夫今謂宰相曰子行如仲尼墨翟則變容易色稱不足者士誠貴也故勢為天子未必貴也窮為匹夫未必賤也貴賤之分在行之美惡莊子盜跖宫有堊器有滌則潔矣行身亦然無滌堊之地則寡非矣韓非子説林下終年為車無三寸之轄不可以驅馳匠人斫戶無一尺之楗不可以閉藏故君子行思乎其所結淮南子繆稱訓曉自然以為智知存亡之樞機禍福之門戶舉而用之陷溺於難者不可勝計也使知所為是者事必可行則天下無不達之塗矣是故知慮者禍福之門戶也動靜者利害之樞機也淮南子人間訓夫山兊則不高水徑則不深行磏者德不厚志與天地擬者其為人不祥韓詩外傳志善者忘惡謹小者志大俎豆之間足以觀禮閨門之內足以論行鹽鐵論褒賢心如天地者明行如繩墨者章説苑談叢邑名勝母曽子不入水名盜泉孔子不飲醜其聲也説苑談叢曽哀公問於孔子曰吾聞君子不博有之乎孔子對曰有之哀公曰何為其不博也孔子對曰為其有二乘哀公曰有二乘則何為不博也孔子對曰為行惡道也説苑君道北行出門履蹈躓顚踒足據塗汚我襦袴焦氏易林坎之旅新作初陵踰陷難登焦氏易林明夷之咸舞非其處失節多悔焦氏易林兊之觀修身以為弓矯思以為矢立義以為的奠而後發發必中矣揚子修身仁宅也義路也禮服也智燭也信符也處宅由路正服明燭執符君子不動動斯得矣揚子修身珍其貨而後市修其身而後交善其謀而後動成道也揚子修身次五孔道夷如蹊路微如大輿之憂測曰孔道之夷奚不遵也太玄經第一羡堯舜桀紂之事常並存於世唯人所用而已楊朱哭岐路所通逼者然也夫岐路惡足悲哉中反焉若夫縣度之厄索舉足而已矣申鑒雜言上先民有言適楚而北轅者曰吾馬良用多御善此三者益侈其去楚益逺矣遵路而騁應方而動君子有行行必至矣申鑒雜言下赴谷必隊失水必溺人見之也赴穽必陷失道必沈人不見之也不察之故君子愼乎所不察申鑒雜言下芷閭兮藥房居仁履義守忠貞也奮搖兮衆芳動作應禮行馨香也王逸注楚辭九懷矯貞亮以作矢當苑囿之呈藝驅仁義以為禽必信忠而後發曹子建潛志賦𢎞道德以為宇築無怨以作藩溜慈惠以為圃耕柔順以為田曹子建玄暢賦一尺之錦足以見其巧一仞之身足以見其治是以君子愼其寡也徐幹中論修本言者風波也故行之則實喪遺風波而不行則事得其實危可安而蕩可定也郭子注莊人間世昔顏叔子獨處於室鄰之婺婦又獨處室夜暴風雨至屋壞婦人趨而至叔子納之而使執燭放於平旦蒸盡摍屋而繼之自為避嫌不審矣李善注文選洞簫賦人咸躓於垤莫躓於山咸跌於汚莫跌於川廣文選楊子雲揚州牧針努力觸藩徒摧角矣不出戶庭庶無過矣古文苑董仲舒士不遇賦夫行者榮辱之皂白君子居必選鄉遊必擇士意林體論寡門不入宿臨甑不取塵避嫌也意林鄒子扈江離與辟芷兮紉秋蘭以為佩楚辭離騷經朝搴阰之木蘭兮夕攬洲之宿莽楚辭離騷經踰枳棘之籬則有絓挂之患登椒桂之圃則有榮華之芳太平御覽木部棘人有遺余琉璃巵者小兒竊弄墮之不潔意既惜之又感寶物之汙辱乃喪其所以為寶況君子行身而可以有玷乎太平御覽器物部巵尸子謂孔子至於勝母暮矣而不宿過於盜泉渴矣而不飲惡其名也困學記聞卷十諸子惟法是修惟禮是克手執圭璧足履繩墨何氏語林言志晉書通玄經曰陰陽之動有常節大人之動不極物道德經四子集解莫行如獺莫行如究暮莫行如鷲莫行如食吐鳥莫行如豺莫行如鳥當行如狌狌所以者何世中無著真人如狌狌獸中阿含經卷十三譬如聚落邊有奈林多諸棘刺時有士夫入於林中所有營作入林中已前後左右上下盡有棘刺爾時士夫正念而行正念來去正念明目正念端視正念屈身所以者何莫令利刺傷壞身故雜阿含經卷四十三蓋屋不密天雨則漏意不惟行淫泆為穿蓋屋善密雨則不漏攝意惟行淫泆不生法句經雙要品當如乳母伺視其子莫令墜於坑井險道思惟要略法如以毛繩戮皮斷肉骨壞髓斷爾乃止利養過毛繩絶於持戒皮能破禪定肉析於智慧骨滅妙善心髓大莊嚴經論卷七偈且阿保傳愛愼及溷腴良庖提刀情怵介族𢎞明集釋何衡陽達性論中行用九見羣龍無首吉易乾上九鼎玉鉉大吉無不利易鼎外強而內順牛之善者若內外俱強則失於猛害若外內俱順則失於劣弱周易正義離人亦有言柔則茹音汝之剛則吐之維仲山甫柔亦不茹剛亦不吐詩大雅蒸民孔子曰管仲鏤簋而朱紘旅樹而反坫山節而藻梲賢大夫也而難為上也晏平仲祀其先人豚肩不掩豆賢大夫也而難為下也君子上不僭上下不逼下禮記雜記下詩云馬之剛矣轡之柔矣馬亦不剛轡亦不柔志氣麃麃取與不疑春秋正義襄公二十六年天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也中庸於心有猜則簋飱饌餔猶不屑餐旌瞀以之意之無疑則兼金盈百而不嫌辭孟軻以之後漢書張衡列傳不樂前以顧軒不就後以慮輊蜀志郤正傳善不善取信而止矣若左若右正中而已矣縣乎日月無已也管子白心不欲琭琭如玉落落如石老子法本誠能由於中矣一左一右雖過於中也而在中之庭一前一却雖不及於中也而在中之皇及小人好盡則逺於中矣遠於中則必窘於邊幅而裂矣必觸於巖牆而僵矣必墜於坑塹而亡矣如以石而投之於淵也不極則不止矣子華子執中夫堅白同異有厚無厚之察非不察也然而君子不辨止之也倚魁之行非不難也然而君子不行止之也荀子修身篇西門豹之性急故佩韋以緩已董安于之心緩故佩弦以自急故以有餘補不足以長續短之謂明主韓非子觀行玉少故見貴石多故見賤不欲如玉為人所貴如石為人所賤當處其中也河上公注老子法本聖人無思慮無設儲來者弗迎去者弗將人雖東西南北獨立中央故處衆枉之中不失其直天下皆流獨不離其壇域淮南子詮言訓太剛則折太柔則卷聖人正在剛柔之間乃得道之本淮南子泛論訓法人八尺四尺其中也宫者中央之音也甘者中央之味也四尺者中央之制也是故三王之禮味皆尚甘聲皆尚和春秋繁露循天之道中者天地之大極也日月之所至而却也長短之隆不得過中天地之制也春秋繁露循天之道能以中和理天下者其德大盛能以中和養其身者其夀極命春秋繁露循天之道次八黃不黃覆秋常測曰黃不黃失中德也太玄經第一中次三耎音軟其膝守其節雖勿肆終無拂測曰耎其膝體不可肆也太玄經第三耎夫中庸之德其質無名故醎而不鹻淡而不􅬭質而不縵文而不繢能威能懷能辨能訥變化無方以達為節是以抗者過之而拘者不逮劉邵人物志體别心棲清虛之域行在玉石之間蔡中郎集蔡公碑天下有道聖人推而行之天下無道聖人述而藏之所謂流之斯為川焉塞之斯為淵焉升則雲施則雨潛則潤何往不利也文中子關朗動則虎發靜如鱗潛若彼赫赫若此洋洋意林化清經安能斷江漢之波為激石之流何氏語林言志與時俯仰因物變化不為石不為玉常在玉石之間不多不少不貴不賤道德經指歸卷七言為禍匠默為害工進為妖式退為孽容道德經指歸卷十三蹈仁治國雖講之以學而不聚其仁行者如農夫雖耘壅成熟而不收穫取之也禮記正義禮運民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也論語衛靈公夫仁天之尊爵也人之安宅也孟子公孫丑上鷹飛退去不食其雛禽尚如此何況人乎焦氏易林解之比或問龍龜鴻鵠不亦夀乎曰夀曰人可夀乎曰物以其性人以其仁揚子君子篇次四詘其角直其足維以傒穀測曰屈角直足不伎音置刺也太玄經第二傒夫物不能為春故候天春而生人則不然存吾春而已矣申鑒俗嫌逸周書曰不卵不𦌔以成鳥獸許氏説文卷七然觀孺子之墜井非仁者之意視瞽人之觸柱非兼愛之謂邪抱朴子內篇明本因斧以得柯因柯以成用種一粟則千萬之粟滋種一仁衆行之美僃矣意林秦子有鸚鵡飛集他山山中禽輒相愛重鸚鵡自念雖樂不可久也便去後數月山中大火鸚鵡遙見便入水霑羽飛而灑之天神言汝雖有志意何足云也對曰雖知不能救然嘗僑居是山禽獸行善皆為兄弟不忍見耳天神嘉感即為滅火藝文類聚鳥部鸚鵡舜不登而高不行而逺拱揖於天下而天下稱仁太平御覽人事部仁德天地溫厚之氣始於東北盛於東南此天地之仁氣也太平御覽人事部仁德駙馬共為荆使於巴見擔鴆問之是何以曰所以鴆人也於是請買之金不足又益之車馬已得之盡注之於江太平御覽人事部仁惻齊宣王見屠宰羊哀其無罪以豕代之太平御覽資産部屠鶬鶊有聲鷹隼匿爪初學記居處部門應發如犗牛心無威怒故應發如舟船心往來不倦故應發如橋梁心濟渡忘疲故大方廣佛華嚴經卷七十七譬如暴河漂流迅急險難可畏中有橋梁於諸衆生平等悉與濟波之樂而無分别濟渡之想法集經卷二如有象羣處大林中四邊火起誰見是厄不生悲愍時最大象挽於樹枝以打火滅導道令過得離火難一切衆生為生老病死火之所圍繞誰有智者不生悲愍欲令得出無明羅剎經所十一被大慈鎧遮煩惱箭慈為法藥消怨結毒煩惱燒心慈能除滅慈為法梯登解脫臺慈為法船度生死海求善法財慈為上寶行趣涅槃慈為道糧慈為駿足度入涅槃慈為猛將越三惡道三昧法門經卷下祗劫有大林樹多諸禽獸野火來燒三邊俱起唯有一邊而隔一水衆獸窮逼逃命無地我爾時為大身多力鹿以前腳跨一岸以後腳踞一岸令衆獸蹈脊上而渡皮肉盡壞以慈愍力忍之至死最後一兔來氣力已竭自強努力忍令得過過已脊折墮水而死大智度論卷二十六譬如六牙白象雖被毒箭猶憐愍怨賊大智度論卷三十九縱彼飛沈隨其飲啄當使紫鮮頳尾並相忘於江湖錦臆翠毛等逍遙於雲漢法苑珠林卷六十五行寂滅慈無所生故行不熱慈無煩惱故行等之慈等三世故行無諍慈無所起故行不二慈內外不合故行不壞慈畢竟盡故行堅固慈心無毁故行清淨慈諸法性淨故行無邊慈如虛空故行阿羅漢慈破結賊故行菩薩慈安衆生故行如來慈得如相故行佛之慈覺衆生故行自然慈無因得故行菩提慈等一味故行無等慈斷諸愛故行大悲慈導以大乘故行無厭慈觀空無我故行法施慈無遺惜故行持戒慈化毁禁故行忍辱慈護彼我故行精進慈荷負衆生故行禪定慈不受味故行智慧慈無不知時故行方便慈一切示現故行無隱慈直心清淨故行深心慈無雜行故行無誑慈不虛假故行安樂慈令得佛樂故菩薩之慈為若此也維摩詰所説經觀衆生品喻林卷八十
