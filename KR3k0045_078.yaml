body:
  text: 喻林卷七十八明徐元太撰臣術門結知江乙説於安陵君曰以財交者財盡而交絶以色交者華落而愛渝是以嬖色不敝席寵臣不敝軒今君擅楚國之勢而無以自結於王竊為君危之戰國䇿楚宣王田需貴於魏王惠子曰子必善左右今夫楊横樹之則生倒樹之則生折而樹之又生然使十人樹楊一人㧞之則無生楊矣故以十人之衆樹易生之物然而不勝一人者何也樹之難而去之易也今子雖自樹於王而欲去之者衆則子必危矣戰國䇿魏哀王魏王與龍陽君共船而釣龍陽君得十餘魚而涕下王曰有所不安乎如是何不相告也對曰臣無敢不安也王曰然則何為涕出曰臣為臣之所得魚也王曰何謂也對曰臣之始得魚也臣甚喜後得又益大今臣直欲棄臣前之所得矣今以臣之㐫惡而得為王拂枕席今臣爵至人君走人於庭避人於途四海之内美人亦甚多矣聞臣之得幸於王也必褰裳而趨大王臣亦猶曩臣之前所得魚也臣亦將棄矣臣安能無涕出乎戰國䇿魏安釐王王亦聞老妾事其主婦者乎子長色衰重嫁而已今臣之事王若老妾之事其主婦者戰國䇿魏哀王臣雖薄也得蒙肺附前漢書景十三王傳夫士以才智要君女以媚道求主後漢桓譚列傳蚨母養子以葢覆穴出入徃來初無閒眹故物不能止之今内揵之臣委曲從君以自結固無有閒隙亦由是也鬼谷子内揵註士為知己死女為悦已玩恩義茍潜暢他人焉能亂李善註文選任彦昇文宣王行狀驚鴻别水但見徘徊黄鶴去闗唯知反顧棲戀之心事同於此文苑英華庾信謝賜賚啓明使君始垂哀憐意眷日崇譬之疾病乃使炎農分藥岐伯下鍼疾雖未除就没無恨何者以其天醫至神而榮魄自盡也太平御覽疾病部總叙疾病下然宿瘤以醜見傳而臣以醉見識向氏語林言語思退六二介於石不終日貞吉易豫考槃刺莊公也不能繼先公之業使賢者退而窮處毛詩考槃吾聞天有四時春生冬伐人有盛衰泰終必否知進退存亡而不失其正惟賢人乎蠡雖不才明知進退髙鳥已散良弓將藏狡兎已盡良犬就烹吳越春秋勾踐伐吳外傳蔡澤曰夫四時之序成功者去戰國䇿秦昭襄王非闚天者不可與圖逺君不授驥以重任驥亦俛首裹足而去耳後漢書郅暉列傳今崎嶇於鋒刃之間在疑忌之際愚則為人所猜智則危甚巣幕當如鴻鵠髙飛一舉萬里不可坐待罟網也晉書慕容盛傳僕固脂車以須放秣馬以待却反耕於枳落歸志乎渦瀨從容乎農夫優游乎卒歳矣晉書夏侯湛傳方當横潭亂海就魚鼈而為羣披榛捫樹從虺虵而相伍梁書王僧儒傳籠樊之念既多寥廓之想彌切魏書李順希仁弟騫傳君獨不見夫雞乎首戴冠者文也足摶距者武也敵在前敢鬭者勇也得食相告仁也守夜不失時信也雞有此五徳君猶日瀹而食之者何也則以其所從來者近也夫黄鵠一舉千里止君園池食君魚鼈啄君黍粱無此五者君猶貴之以其所從來者逺矣臣將去君黄鵠舉矣韓詩外傳介子推曰推聞君子之道為人子而不能承其父者則不敢當其後為人臣而不見察於其君者則不敢立於其朝然推亦無索於天下矣新序節士七九疑鬱林沮濕不中鸞鳳所惡君子攸去焦氏易林小過之晉賢士之嫁也非刑戮之國則就之非篡弑之朝則就之若是而蹇必内有䜛姬外有譛臣二網張國仁者潔身不待塵而舉不待逐而行引之不浮垂之不沈天禄閣外史漁論汝不見出穴之蟻上垣籬而扛百足之蟲有稚子臨穴而憎蟻以泥覆其上雖欲返穴而安之亦不得已今楚之疑非特稚子之憎也疑覆於國而距後至之士非特覆穴之泥也而欲返楚以求鳴是何丘蟻之弗若乎汝又不見遊魚之逝千仞之藪而無患者以其能與水相信也故浮沈得揚其意出入得暢其情是水益深則魚益逝君益信則士益歸而况士之於諸侯哉使逰魚遇無水之壑則偃蹇而困於泥求咫尺之㳺亦不可得已今楚無水之壑也欲以藪澤之魚而㳺之必蹇矣故魚不厭深士不厭信或止或行其知幾乎天禄閣外史龜邱夫魚不潜縁磯之藪以為能逝也而時遇漁人之罟又逆鱗而入鳥不巢覆廬之林以為能舉也而時遇獵者之網又解翅而投乎天禄閣外史遇漁言衆魚張其鬐尾葺累其鱗則蛟龍隠其文章而避之俗人朋黨恣其口舌則賢者亦伏匿深藏也王逸註楚辭九章譬彼四時功成則退在盈思中升隆以順蔡中郎集太傳胡公碑見幾而作如鴻之翔蔡中郎集太守胡公碑吾聞景風起則裘鑪息世道夷則奇士退抱朴子内篇釋滯繁弱既韜盧鵲將烹子房出𤣥帷而反閭巷信布釋甲胄而修魚釣抱朴子内篇釋滯譬猶池魚籠鳥有江湖山藪之思文選秋興賦方將耕於東皋之陽輸黍稷之税以避當塗者之路文選阮籍奏記詣蔣公惟羡肅肅翰濱紛戾髙㝠文選謝靈運鄴中詩註將随渤澥去刷羽汎清源文選沈約和謝宣城詩雖無𤣥豹姿終隠南山霧文選謝眺之宣城詩哲匠感蕭晨肅此塵外軫文選殷仲文九井作詩子獨不聞夫神人乎噏風飲露不食五穀登太清逰山嶽靡紫芝弄白玉不因而獨備無假而自足不與人路同嗜慾不與世務齊榮辱故能入無窮之門享不死之年以此言之何待進賢補文選夏侯湛抵疑世雷同而炫曜兮何毁譽之昧昧人修飾而窺鏡兮後尚可以竄藏廣文選宋玉九辯黄鵠之一舉兮知山川之紆曲再舉兮睹天地之圜方廣文選賈誼惜誓譬籠鳥與池魚本山川而有思藝文類聚産業部園賦思依林而羽戢願託水而鱗藏藝文類聚居處部宅舎賦一葉將隕寧待於風露百川皆到自竭者潢汙文苑英華庾信請致仕一表銜羈之馬伏櫪之駒莫不思平原曠澤翹尾而馳足也太平御覽兵部羈楚國龔舎初随楚王朝宿未央宫見蜘蛛焉有赤蜘蛛大如栗四面縈羅網有蟲觸之而死者退而不能出焉舎乃歎曰吾生亦如是耳仕官者人之羅網也豈可淹歳於是掛冠而退時人笑之謂舎為蜘蛛之隠太平御覽蟲豸部蜘蛛孤鴻已摩天去吾儕戀稻粱跳躑網羅中華陽陶隠居傳上立節澤无水困君子以致命遂志易困老狼有胡進則躐其胡退則跲其尾進退有難然而不失其猛毛詩狼跋見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也左傳文公十八年此行也吾聞鼓而已不聞金矣左傳哀公十年天下無道循道而行衡塗而僨大戴禮記曾子制言中魚我所欲也熊掌亦我所欲也二者不可得兼舎魚而取熊掌者也生亦我所欲也義亦我所欲也二者不可得兼舎生而取義者也孟子告子上天下有道以道殉身天下無道以身殉道未聞以道殉乎人者也孟子盡心上好船者必溺好戰者必亡臣好直言不顧於命吳越春秋夫差内傳豫讓遁逃山中曰嗟乎士為知己者死女為悦己者容吾其報智氏之讐矣戰國䇿趙襄子跖之狗吠堯堯非不仁狗固吠非其主史記淮隂侯傳人固有一死死有重於太山或輕於鴻毛用之所趨異也前漢書司馬遷傳曲㦸在頸不易其心後漢書馮衍傳布衣之交猶有務信誓而蹈水火感知已而披肝膽徇聲名而立節義者况於束帶立朝致仕卿相所務者非特匹夫之信所感者非徒知己之惠所徇者豈聲名而已乎魏志杜畿傳葅醢之戮甘之如薺晉書劉沈傳勁松方操嚴霜比烈白刃可陵貞心難折晉書張禕傳夫繁霜降節彰勁心於後凋横流在辰表貞期於上徳晉書烈女列傳是知隕節茍合其宜義夫豈吝其没捐軀若得其所烈士不愛其存故能守鐵石之深衷厲松筠之雅操見貞心於歳暮摽勁節於嚴風赴鼎鑊其如歸履危亡而不顧書名竹帛畫象丹青前史以為美談後來仰其徽烈者也晉書忠義傳貞松標於歳寒忠臣亮於國危晉書毛璩傳所謂命輕鴻毛義貴熊掌晉書江統列傳封狐萬里投軀而弗顧猰窳千羣探穴而忘死晉書郄鑒傳匪石為心寒松比操晉書鍾雅傳其盛烈所著與河海而争流峻節所標共松柏而俱茂魏書史臣節義傳死有重於太山貴其理全也生有輕於鴻毛重於義全也北史節義傳曲刃句之直兵推之嬰不革矣晏子襍上齊攻魯求岑鼎魯君載他鼎以往齊侯弗信而反之為非使人告魯侯曰栁下季以為是請因受之魯君請於栁下季栁下季答曰君之賂以欲岑鼎也以免國也臣亦有國於此破臣之國以免君之國此臣之所難也於是魯君乃以真岑鼎往也且栁下季可謂此能説矣非獨存已之國也又能存魯君之國吕氏春秋審已美女以貞顯其行烈士以義彰其名陸子道基荆蒯苪可謂守節死義矣則僕夫無為死也猶食飲而遇毒也韓詩外傳有命之父母不知孝子有道之君不知忠臣夫豫讓之君亦何如哉説苑尊賢越甲至齊雍門子狄請死之齊王曰鼔鐸之聲未聞矢石未交長兵未接子何務死之為人臣之禮邪雍門子狄對曰臣聞之昔者王田於囿左轂鳴車右請死之而王曰子何為死車右對曰為其鳴吾君也王曰左轂鳴者工師之罪也子何事之有焉車右曰臣不見工師乗而見其鳴吾君也遂刎頸而死知有之乎齊王曰有之雍門子狄曰今越甲至其鳴吾君也豈左轂之下哉車右可以死左轂而臣獨不可以死越甲也遂刎頸而死是日越人引甲而退七十里説苑立節次八石赤不奪節士之心測曰石赤不奪可與有要也太𤣥經第四度義者臣子死節乎君親之難也離自平人而焚燒妻子詐為吳仇讐求信於慶忌反而刺之若蜘蛛之小巧耳揚子法言註淵騫篇立朝則以砥矢為操居已則以羔羊為節抱朴子外篇臣節惟漢有木曾不踰境惟南有金萬邦作詠文選陸機答賈長淵詩琅琅先生雅杖名節雖遇塵務猶振霜雪文選袁宏名臣序賛如彼竹柏負雪懐霜如彼騑駟配服驂衡文選顔延之陽給事誄郁烈之芳出於委灰繁㑹之音生於絶絃是以貞女要名於没世烈士赴節於當年文選陸機演連珠貞朗志而玉折厲勁心而蘭摧廣文選陸士龍紆思梁姑姊其室失火兄子與二子在内欲取兄子輙得其子火盛不得復入婦人曰梁豈可户告人曉耶被不義之名何面見兄弟國人哉遂赴火而死藝文類聚火部火平路康衢從容之道進危塗險徑忠貞之節興登平路者易為功渉險塗者難為力藝文類聚人部志序信順為甲胄大節為城池藝文類聚職官部冡宰碑譬如燒香其質雖壊而氣芬馥熏他令香大集地藏十輪經卷三保身鳴鳩此大夫遭周之亂而兄弟相戒以免禍之詩詩説小正傳鮑莊子之知不如葵葵猶能衛其足左傳成公十七年豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也論語憲問狡兎死走狗烹髙鳥盡良弓藏敵國破謀臣亡史記淮隂侯傳夫卜而有不審不見奪糈為人主計而不審身無所處史記日者傳假令僕伏法受誅若九牛亡一毛與螻螘何異前漢書司馬遷傳古人畏患茍免以計安身撓直為曲斵方為圓穢素絲之潔推亮直之心前漢紀孝成審能騎龍弄鳳翔嬉雲間者亦非狐兎燕雀所敢謀也後漢書逸民列傳知善不薦聞惡無言隠情惜己自同寒蟬後漢書黨錮列傳上蔡之犬不誡於前華亭之鶴方悔於後晉書陸機傳使燕雀微羣得保叢蔚宋書后妃孝武皇后傳以亡為行者不足以存君以死為義者不足以立功嬰豈其婢子也哉其縊而從之也晏子襍上夫龍之為蟲也柔可狎而騎也然其喉下有逆鱗徑尺若人有嬰之者則必殺人人主亦有逆鱗説者能無嬰人主之逆鱗則幾矣韓非子説難諸生獨不見季夏之螇乎音聲入耳秋風至而聲無者生鹽鐵論散不足淵涸龍憂箕子為奴焦氏易林泰之剝或問活身曰明哲或曰童蒙則活何乃明哲乎曰君子所貴亦越用明保慎其身也如庸行翳路衝衝而活君子不貴也揚子問明篇吾聞無巢之林其下必廬無魚之藪其上必磯子乃洋洋然悲歌慷慨浮而不歸敝褐垢體為時所疑之楚逰者能不懐噫是子之智不如魚之逺磯而虚其藪鳥之畏廬而廢其巢乎天禄閣外史遇漁甫亦樂魚之樂而亦憂魚之憂也不得則縱得之則烹魚樂於縱而憂於烹今吾之憂是魚得其餌而吾得其魚也故憂然則今之為士者皆得餌之魚乎郭泰笑曰子其縱矣窺子之意將王室以為壑諸侯以為池洋然縱之而赴於壑是子以王室為憂乎天禄閣外史燕言言蛟龍明於被害知貪香餌必近於死故下逰於清波無人之處以言賢者亦不宜貪禄位以危其身也王逸註楚辭哀時命髙樹多悲風海水揚其波曹子建野田黄雀行必死之病不下苦口之藥朽爛之材不受琱鏤之飾是以比干匪躬而剖心於情忠田豐見微而夷戮於言直抱朴子外篇博喻毒粥既陳則旁有爛腸之鼠明燎宵舉則下有聚死之蟲芻豢之豐則鼎俎承之才小任大則泣血漣如桑霍為戒厚矣范䟽之鑒明矣抱朴子外篇廣譬秦燒詩書坑儒士於湯火之中但苦太熱耳時亦有寒者謂四皓隠居尸子避地斯皆清涼其身不燠秦之湯火揚子法言註寡見篇得君象曰子克家剛柔接也易蒙晉康侯用錫馬蕃庻晝日三接易晉六四入於左腹獲明夷之心易明夷九二困於酒食朱紱方來易困九二鳴鶴在隂其子和之我有好爵吾與爾靡之易中孚君子至止福禄如茨詩小雅瞻彼洛矣裳裳者華其葉湑上聲兮我覯之子我心寫兮我心寫兮是以有譽處兮裳裳者華芸其黄矣我覯之子維其有章矣維其有章矣是以有慶矣裳裳者華或黄或白我覯之子乗其四駱乗其四駱六轡沃若詩小雅裳裳者華汎汎楊舟紼音佛纚音離維之樂只君子天子葵之詩小雅采菽雞犧雖見寵飾然卒當見殺若人見寵飾則當貴盛杜氏解左傳昭公二十二年山則材之所生此人有山之材言其必大富也上天以明臨下照之以天光言天子臨照之也於是乎又居於土上既富矣而被天照又復居有土地是為國君之象也春秋正義莊公二十二年臣之所處重卵也王謂臣曰吾必不聽衆口與䜛言吾信汝也猶列眉也戰國䇿燕昭王世必有聖知之君而後有賢明之臣故虎嘯而冽風龍興而致雲蟋蟀竢秋吟蜉蝤出以隂前漢書王褒傳千載一合論説無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑前漢書王褒傳明明在朝穆穆列布聚精㑹神相得益章雖伯牙操遞鍾逢門子彎烏號猶未足以喻其意也前漢書王褒傳條垂藟蔓上下相求後漢書崔駰傳繁弱登御然後髙墉之功顯孤竹在肆然後降神之曲成是以髙世之主必假逺邇之噐藴匵之才思託大音之和晉書戴若思傳瓶磬小噐蒙國厚恩頻繁擢敘遂過其任晉書王濬傳良馬有䇿逺道可致賢士有合大道可明尉繚子武議晉平公問於叔向曰昔者齊桓公九合諸侯一匡天下不識其君之力乎其臣之力乎叔向對曰管仲善制割隰朋善削縫賔胥無善純縁桓公知衣而已亦其臣之力也師曠侍曰臣請譬之以五味管仲善斷割之隰朋善煎熬之賔胥無善齊和之羮以熟矣奉而進之而君不食誰能強之亦君之力也新序雜事四太乙駕騮從天上來焦氏易林屯之隨終身不辱盈盛之門髙屋光覆君先其固焦氏易林遯之解履堦登墀髙升峻巍福禄洋溢依天之威焦氏易林漸之剥次六幹干於天貞馴測曰幹干之貞順可保也太𤣥經第一千次六朱車燭分一日增我三千君子慶小人傷測曰朱車之增小人不當也太𤣥經第一増計如投水思若轉規䇿定帷幄謀成几案文選陸陲石闕銘瞻彼榮寵譬諸雲霄廣文選蔡伯喈汝南周巨勝碑文崔浩論事語至中夜太宗大悦賜浩縹醪酒十斛水精戎鹽一兩曰朕味卿言若此鹽酒故與卿同其味也事類賦飲食部酒註得民蔽芾音廢甘棠勿翦勿伐召伯所茇音鈸蔽芾甘棠勿翦勿敗召伯所憇音噐蔽芾甘棠勿翦勿拜召伯所説音税風詩國甘棠緇衣之宜分敝予又改為兮緇衣之好兮敝予又改造叶在早反兮緇衣之蓆叶祥籥反兮敝予又改作兮詩國風緇衣泂音逈酌彼行潦音老挹音楫彼注兹可以餴音分饎音熾叶昌里反豈弟君子民之父母詩大雅泂酌甘棠美召伯也召伯之教明於南國毛詩甘棠此公侯之所以扞城其民也左傳成公十二年天下有道則公侯能為民扞城而制其腹心左傳成公十二年宋皇國父為太宰為平公築臺妨於農收子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役邑中之黔實慰我心左傳襄公十七年蔽芾甘棠勿翦勿伐召伯所茇思其人猶愛其樹况用其道而不恤其人乎左傳定公九年大海蕩蕩水所歸髙賢愉愉民所懐大山崔百卉殖民何貴貴有徳前漢書禮樂志我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶灾後漢書岑彭傳父母何在在我庭化我隝梟哺所生後漢書循吏列傳造父為齊王駙駕以渇服馬百日而服成請効駕齊王王曰効駕於圃中造父驅車入圃馬見圃池而走造父不能禁造父以渇服馬久矣今馬見池駻而走雖造父不能治今簡公之以法禁其衆久矣而田恒利之是田恒傾圃池而示渇民也韓非子外儲説右紂作梏數千睨諸侯之不謟已者杖而梏之文王桎梏於羑里七年而後得免及武王克殷既定令殷之民投撤桎梏而流之於河民輸梏者以手撤之弗敢墜也跪之入水弗敢投也曰昔者文王常擁此故愛思文王猶敬其梏况守其法教乎賈子新書君道周文王問於粥子曰敢問君子將入其職則其於民也何如粥子對曰唯疑請以上世之政詔於君王政曰君子將入其職則其於民也旭旭然如日之始出也周文王曰受命矣曰君子既入其職則其於民也何若對曰君子既入其職則其於民也暯暯然如日之正中周文王曰受命矣曰君子既去其職則其於民也何若對曰君子既去其職則其於民也暗暗然如日之已入也故君子將入而旭旭者義先聞也既入而暯暯者民保其福也既去而暗暗者民失其教也賈子新書修政語下昔禹治水平壤區畫萬國以鎮民神故巡狩諸侯百姓若捧太陽之餘光瞻候雲之潤氣故臨九河而頌禹烈躡㑹稽而懐禹功天禄閣外史巡幸相與援衡軒而雨涕若赤子於父母也藝文類聚職官部令長頌亂離既著殆為灰朽僥倖之運賴兹應后䕃我塗炭惠隆邱阜潤同江海恩猶父母太平御覽人事部歌幾合狐貍化為豺虎賴我郭君不畏強禦太平御覽人事部諺下我府君道教舉恩如春威如虎愛如母訓如父太平御覽職官部尹思其人猶愛其樹尊其人必歌其道太平御覽禮儀部宗廟喻林卷七十八
