body:
  text: 喻林卷十九明徐元太撰人事門十七嗟逝雖泰山頹峻一簣不遺而泗水餘瀾千載猶在梁書敬帝紀摧苖落穎彌可傷惋梁書張緬傳霜早梧楸風先蒲栁隋書韋世康傳玉沒於訪珪之辰桂掩於搜芳之日南史張裕克傳仲尼悼顔淵苗而不秀子雲傷童烏育而不秀揚子法言註問神篇恨其蘭玉夙凋故長轡未騁鍾嶸詩品歸華先委為露所墮别葉早辭為風所隕李善註文選鮑明逺翫月詩音以應聲影以隨形形聲咸以翳没影響故亦必蔵李善註文選陸士衡弔魏武帝文言德業之美類於蘭玉始含芳而積耀遽毁璧而摧柯李善註文選潘安仁楊仲武誄夫日蝕由乎交分山崩起於朽壤亦云數而已矣然百姓怪焉者豈不以資髙明之質而不免卑濁之累居常安之勢而終嬰傾離之患故乎文選陸機弔魏武帝文春蘭擢莖方茂其華荆寳挺璞将剖於和含芳委耀毁璧摧柯文選潘岳楊仲武誄顧長康拜桓宣武墓作詩云山崩溟海竭魚鳥将何依人問之曰卿憑重桓乃爾哭之状其可見乎顧曰鼻如廣莫長風眼如懸河決溜或曰聲如震雷破山淚如傾河注海世説新語言語埋玉樹著土中使人情何能已已世説新語傷逝劒匿光芒璧碎符采藝文類聚人部友悌啓林木雖茂無形可久碑誄雖美無後可守藝文類聚人部吟麟亡星落月死珠傷瓶罄罍耻芝焚蕙歎藝文類聚人部懐舊銘弔蕙若之暫芳慟琬琰之永缺藝文類聚人部哀傷賦彼蘭菊之芳茂及渠槿之榮色終於邑乎繁霜俱飄颻於路側藝文類聚人部哀傷賦盡若窮煙離若箭弦如影滅地猶星殞天藝文類聚人部哀傷賦何德之盛而年或闕何華之繁而實不結藝文類聚儲官部公主誄律谷罷煊龍鄉輟曉照車去魏聯城辭趙藝文類聚后妃部后妃誄樂慶雲之普覆悼時雨之不廣藝文類聚后妃部后妃誄存若燭龍銜曜沒若庭燎俱滅藝文類聚職官部散騎常侍誄東耀方逺北芒已及墜露曉團悲風暮急藝文類聚職官部太常墓志常懼慶雲之惠不酬而揺落奄至豈謂經塵之效莫展而峻極先頽藝文類聚職官部司空碑繁霜夏被修梧摧幹藝文類聚職官部司空碑榮珪掩采靈劒摧鋒宋郊淪鼎洛水沈鐘藝文類聚職官部太子中庶子墓誌玖璇隱曜美玉韜光藝文類聚雜文部詩來無見兮進無聞泣下雨兮歎成雲藝文類聚雜文部賦中峰岳斷半海鵬埀鳳沈丹穴龍亡黑陂文苑英華庾信王爵一碑冀後凋於歲寒遭繁霜於夏零滅皎皎之玉質絶琅琅之金聲太平御覧文部弔文石堅而朽星華而滅太平御覽文部弔文壑舟今已去寧有濟川時初學記職官部僕射冬水之凝何如春水之消初學記禮部死䘮何言集大鳥忽此䘮元龜初學記職官部僕射譬如火焉薪盡而火滅則無光矣故滅火之餘無遺炎矣人死之後無遺魂矣初學記禮部死喪註王威明風韻遒正神峯標映千里絶迹百尺無枝實俊人也一爾過隙永歸長夜金刀掩鋩長淮絶涸何氏語林傷逝使夫八真明珠未揜而蔵曜百味淳乳不澆而自薄哀哉髙僧傳十三論智炬昏冥慈雲消滅長夜諸子誠可悲矣法苑珠林卷十二譏調魯敗於狐駘國人誦之曰臧之狐裘敗我於狐駘我君小子朱儒是使朱儒朱儒使我敗於邾左傳襄公四年師慧過宋朝将私小便焉其相曰朝也慧曰無人焉相曰朝也何故無人慧曰必無人焉若猶有人豈其以千乘之相易滛樂之矇必無人焉故也左傳襄公十有五年衛侯為夫人南子召宋朝會于洮太子蒯瞶獻盂于齊過宋野野人歌之曰旣定爾婁豬盍歸吾艾貑左傳定公十四年公羊傳云晉靈公将殺趙盾躇階而走靈公有周狗謂之獒呼獒而屬之獒亦躇階而從之祁彌明逆而踆之絶其頷趙盾顧曰君之獒不若臣之獒也爾雅六畜疏酒客難法度士譬之於物曰子猶瓶矣觀瓶之居居井之眉處髙臨深動常近危酒醪不入口臧水滿懐不得左右牽於纆徽一旦叀礙為瓽所轠身提黄泉骨肉為泥自用如此不如鴟夷鴟夷滑嵇腹如大壺盡日盛酒人復借酤常為國器託於屬車出入兩宫經營公家繇是言之酒何過乎前漢書游俠傳士有不談此者則芸夫牧竪已叫呼之矣後漢書陳實傳論本聞卿作狗何意為龍輅言潛陽未變非卿所知焉有狗耳得聞龍聲乎魏志管輅傳註于時謗書謂臺中有三狗二狗崖柴不可當一狗憑黙作疽囊三狗謂何鄧丁也黙者爽小字也其意言三狗皆欲囓人而謐尤甚也魏志曹真子爽傳註時有謗書曰曹爽之勢熱如湯太傅父子冷如漿李豐兄弟如游光其意以為豐雖外示清淨而内圖事有似於游光也魏志夏侯尚傳註洪祗俱會亮門下洪謂祗曰君馬何駛祗對曰故吏馬不為駛明府馬不進耳華陽國志愽陵崔洪為尚書左丞時人為之語曰叢生棘刺來自愽陵在南為鷂在北為鷹晉書崔洪傳時梅陶及鍾雅數説餘事納輙困之因曰君汝潁之士利如錐我幽冀之士鈍如槌持我鈍槌捶君利錐皆當摧矣陶雅並稱有神錐不可得槌納曰假有神錐必有神槌晉書祖納傳王導嘗與諸葛恢戲爭族姓曰人言王葛不言葛王也恢曰不言馬驢而言驢馬豈驢勝馬邪晉書諸葛恢傳時尚書僕射山濤領吏部王濟裴楷等並為帝所親遇岳内非之乃題閣道為謡曰閣道東有大牛王濟鞅裴相鞧和嶠刺促不得休晉書潘岳傳綽性通率好譏調嘗與習鑿齒共行綽在前顧謂鑿齒曰沙之汰之瓦石在後鑿齒曰簸之颺之糠粃在前晉書孫綽傳羣非孔子厄同匡人雖陽和布氣鷹化為鳩至於識者猶憎其目晉書孔羣傳既開青雲覩白雉何不張爾弓挾爾矢隱曰本謂是雲龍騤騤乃是山鹿野麋獸微弩强是以發遲晉書陸機傳吾軰與先帝共興事業而不預時權君無汗馬之勞何敢專管大任是為我耕稼而君食之乎猛曰方當使君為宰夫安直耕稼而已晉書苻堅上傳弟受海内駭笑不過如燕石秃鶖宋書王微傳栢直狗雖老猶能獵蕭漂陽馬雖老猶駿徐娘雖老猶尚多情南史后妃下簡文皇后傳無處不逢鳥噪無處不逢鮑佐正南史鮑泉客卿傳偃乘車在前瑀䇿駟居後相去數十歩瑀蹋馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遲曰騏驥羅於覊絆所以居後偃曰何不著鞭使致千里答曰一蹙自造青雲何至與駑馬爭路南史劉穆之傳諶恚曰見炊飯推以與人王晏聞之曰誰復為蕭諶作甌筯者南史衡陽公諶傳趙修小人背如土牛殊耐鞭杖北史甄琛傳今日吾譏晏子訾猶倮而髙橛者也晏子春秋問下非人不得其故是猶澤人之非斤斧山人之非網罟也晏子春秋外篇堂衣若曰子何年少言之絞子貢曰大車不絞則不成其任琴瑟不絞則不成其音子之言絞是以絞之也韓詩外傳夫服事何足以端士行乎昔者荆為長劒危冠令尹子西出焉齊短衣而遂偞之冠管仲隰朋出焉越文身鬋髪范蠡大夫種出焉西戎左袵而椎結由余亦出焉即如君言衣狗裘者當犬吠衣羊裘者當羊鳴且君衣狐裘而朝意者得無為變乎説苑善説木門閫兮梁上柱敝鑿頭兮斷柯斧鞞鼓兮補履樸脱椎衲兮𢷬衣杵視短人兮形如許蔡中郞集短人賦今為犯禮之行而不喜聞遄死之譏是負豕而憎人説其臭投泥而諱人言其汚也枹朴子外篇刺驕是以世人為文競於詆訶吹毛取瑕次骨為戾文心雕龍奏啓魏晉滑稽盛相驅扇遂乃應瑒之鼻方於盗削卵張華之形比乎握舂杵文心雕龍諧讔與世殊技固孤是求子憂朱泙曼之無所用吾恨輪扁之無所教也子覩木雕獨飛愍我垂翅故棲吾感去鼃附鴟悲爾先笑而後號也補文選張衡應間汝故是吳興溪中釣碣耳何敢譸張世説新語雅量康僧淵目深而鼻髙王丞相每調之僧淵曰鼻者面之山目者面之淵山不髙則不靈淵不深則不清世説新語排調王孝伯問王大阮籍何如司馬相如王大曰阮籍胸中壘塊故須酒澆之世説新語任誕鴻臚卿孔羣好飲酒王丞相語云卿何為恒飲酒不見酒家覆瓿布日月糜爛羣曰不爾不見糟肉乃更堪久世説新語任誕謝幼輿謂周侯曰卿類社樹逺望之峨峨拂青天就而視之其根則羣狐所託下聚溷而已答曰枝條拂青天不以為髙羣狐亂其下不以為濁世説新語排調支道林因人就深公買印山深公曰未聞巢由買山而隱藝文類聚人部隱逸上又問荀令君趙盪寇皆足蓋世乎衡見荀有容儀趙有腹乃答曰文若可借面弔喪稚長可使監厨請客其意以為荀但有貌趙健啖肉也藝文類聚人部品藻道真嘗與一人共索袢草中食見一嫗将二兒過並青衣調之曰青羊将兩羔嫗答曰兩猪共一槽藝文類聚人部嘲戲殷方語孫卿曰公勿作强口馬我當併卿控孫亦曰卿勿作冗鼻牛我當穿卿頰太平御覽人事部言語諺曰上車不落為著作體中何如則秘書言其不用才也初學記職官部秘書郞司馬宣王辟州泰為新城太守尚書鍾毓請泰曰君釋褐登宰府乞兒乘小車一何䭾泰曰君明公之子少有文彩故守吏職獼猴乘上牛一何遲衆賔悦服初學記獸部猴齊世有席昆蚩鄙文學嘲劉逖云君文若朝菌須臾之翫非宏才豈比吾千丈松常有風霜劉云既有寒木又發春華可乎事類賦木部松註仕進不止執虎子虎子溲器也侍中親省起居故謂之執虎子蘇笑曰我誠不能効汝蹇蹇驅鹿車馳也何氏語林排調劉道真於河側自牽船見一老嫗採梠劉調之曰女子何不調機利杼而採梠嫗答曰丈夫何不跨馬揮鞭而牽船何氏語林排調孫權嘗燕見蜀使費禕逆勅羣臣使禕至伏食勿起禕至權為輟食而諸人不起禕調之曰鳳凰來翔麒麟吐哺驢騾無知伏食如故諸葛恪應聲答曰爰植梧桐以待鳳凰有何燕雀自稱來翔何不彈射使還故鄉何氏語林排調惠子始與莊子相見而問乎莊子曰今日自以為見鳳凰而徒遭燕雀耳坐者俱笑困學紀聞卷十諸子宋明帝紀胡母顥專權奏無不可時人語曰禾絹閉眼諾胡母大張槖禾絹謂上也困學紀聞卷十七評文悋大官而腫口臨滄海而攝腹真子之謂也𢎞明集釋駮論託比鷺白鳥也以興潔白之士毛詩有駜註子貢問於孔子曰敢問君子貴玉而賤䃉者何也為玉之寡而䃉之多與孔子曰非為䃉之多故賤之也玉之寡故貴之也夫昔者君子比德於玉焉温潤而澤仁也縝宻以栗知也亷而不劌義也埀之如隊禮也叩之其聲清越以長其終詘然樂也瑕不揜瑜瑜不揜瑕忠也孚尹旁達信也氣如白虹天也精神見于山川地也圭璋特達德也天下莫不貴者道也詩云言念君子温其如玉故君子貴之也禮記聘義自號鴟夷者言若盛酒之鴟夷多所容受而可卷懐與時張弛也前漢書貨殖傳註阮脩所著述甚寡嘗作大鵬贊曰蒼蒼大鵬誕自北溟假精靈鱗神化以生如雲之翼如山之形海運水擊扶揺上征翕然層舉背負大清志存天地不屑雷霆鷽鳩仰笑尺鷃所輕超世髙逝莫知其情晉書阮籍傳素既屢被徴辟聲譽甚髙山中有蚿蟲聲清長聽之使人不厭而其形甚醜素乃為蚿賦以自况宋書隱逸王素傳文王乃齋三日乘田車駕田馬田於渭陽卒見太公坐茅以漁文王勞而問之曰子樂漁邪太公曰君子樂得其志小人樂得其事今吾漁甚有似也文王曰何謂其似也太公曰釣有三權禄等以權死等以權官等以權夫釣以求得也其情深可以觀大矣太公六韜文韜離騷之文依詩取興引類譬諭故善鳥香草以配忠貞惡禽臭物以比䜛佞靈修美人以嫓於君宓妃佚女以譬賢臣虬龍鸞鳳以託君子飄風雲霓以為小人其詞温而雅其義皎而朗凡百君子莫不慕其清髙嘉其文彩哀其不遇而憫其志焉王逸註楚辭離騷經行當如蒼龍能屈能申志當如大虹能揚文采精當若彗星能耀光明舉當若鵕䴊飛能冲天也王逸註楚辭九歎雷為諸侯以興於君雲雨㝠昧以興佞臣猨猴善鳴以興䜛人風以喻政木以喻民雷填填者君妄怒雨㝠㝠者羣佞聚也猨啾啾者䜛夫弄口也風颯颯者政煩擾也木蕭蕭者民驚駭也王逸註楚辭九歌言橘枝重累又有利刺以象武也實圓摶又象文也以喻已有文武能方圓王逸註楚辭九章日以喻君山以喻臣霰雪以興殘賊雲以象佞人山峻髙以蔽日者謂臣蔽君明也下幽晦以多雨者羣下專擅施恩也霰雪紛其無垠者殘賊之政害賢人也雲霏霏而承宇者佞人並進滿朝廷也王逸註楚辭九章周禮后六服一曰翬衣取其雉性介而守以比后德也張華註禽經佩鳴玉以比潔齊幽蘭以爭芬陶靖節集賦木度北而變質故不可以踰境金百鍊而不銷故萬邦作􅦔李善註文選陸士衡答賈長淵詩蘭以秋馥可以喻言桂以冬榮可以喻性李善註文選曹子建朔風詩鷦鷯小鳥也生於蒿莱之間長於藩籬之下翔集尋常之内而生生之理足矣色淺體陋不為人用形微處卑物莫之害繁滋族類乘居匹遊翩翩然有以自樂也彼鷲鶚鵾鴻孔雀翡翠或凌赤霄之際或託絶垠之外翰舉足以冲天觜距足以自衛然皆負矰嬰繳羽毛入貢何者有用於人也文選鷦鷯賦惟鷦鷯之微禽兮亦攝生而受氣育翩翾之陋體兮無𤣥黄以自貴毛弗施於器用兮肉不登乎爼味鷹鸇過猶俄翼兮尚何懼於罿罻翳薈蒙籠是焉遊集飛不飄颺翔不翕習其居易容其求易給巢林不過一枝每食不過數粒棲無所滯遊無所盤匪陋荆棘匪榮􅉅蘭動翼而逸投足而安委命順理與物無患伊兹禽之無知兮何處身之似智不懐寳以賈害兮不飾表以招累文選鷦鷯賦不以資質之鄙薄兮欲增輝乎太清雖無補於日月兮期自照於陋形當朝陽而戢景兮必宵昧而是征進不競於天光兮退在晦而能明諒有似於賢臣兮於疏外而盡誠廣文選傅虞螢賦騖無他心故庶人以為贄藝文類聚鳥部鴨顧惟燭之自焚以致用亦猶殺身以成仁矣藝文類聚火部燭賦我嘉兹櫛惡亂好理一髪不順實以為耻雖日用而匪懈不告勞而自己茍以理而委任期竭力而沒齒藝文類聚服飾部梳枇賦北園有一樹布葉埀重隂外雖多棘刺内實有赤心藝文類聚菓部棗詩願為緑蘋草託身寄清池藝文類聚草部萍俯觀萬物擾擾焉如水之載浮萍藝文類聚草部萍蘭既春敷菊又秋榮芳薰百草色艶羣英孰是芳質在幽愈馨藝文類聚草部菊銘文伯相魯敬姜謂之曰吾語汝治國之要盡在經耳幅者所以正枉也不可不强故幅可以為将畫所以均不服也故畫可以為正物者所以治蕪與莫也故物可以為都大夫持而不出入不絶者捆也捆可以為大行人推而往引而來者綜也綜可以為關内之師主多少之數者均也均可以為内史服重任行逺道正直而固者軸也軸可以為相舒而無窮者摘也摘可以為三公文伯載拜受教太平御覧資産部織去婦不顧門萎韭不入園以婦人之性草菜之情猶有所耻想忠壯者意何所之太平御覧菜部韭至夫重隂之夕風雨晦暝萬物眩惑翩翩獨征竒姿燎朗在隂益榮猶賢哲之處時時昏昧而道明若蘭香之在幽越羣臭而彌馨初學記蟲部螢板則紫栢杵則木𤓰何斯材而斯用也用言築城草則離離靡靡縁岡而殖但使十步而有一芳余亦何辭間於荆棘何氏語林言志石出荆山懸巖之顛外有五色之文内含卞氏之珍磨之不加瑩雕之不增文禀氣堅貞受之自然顧其理枉屈紆繞而不得申何氏語林言語惟斯屏風出自幽谷根深枝茂號為喬木孤生陋弱畏金彊族移根易土委伏溝瀆飄飄危殆靡安措足天啓我心遭遇微禄中郎繕理收拾捐朴大匠攻之刻雕削斵表雖剥裂心實貞慤等化器類庇䕃尊屋列在左右近君頭足頼蒙成濟其恩𢎞篤不逢仁人永為枯木初學記器用部屏風註是錫杖者名為智杖亦名德杖彰顯聖智故曰智杖行功德本故曰德杖如是杖者聖人之表幟賢士之明記趣道法之正幢得道梯隥錫杖經尺八隱語還無社與司馬卯言號申叔展叔展曰有麥麴乎曰無有山鞠窮乎曰無河魚腹疾奈何曰目於眢井而拯之若為茅絰哭井則已明日蕭潰申叔視其井則茅絰存焉號而出之春秋左傳宣公十二年吳申叔儀乞糧於公孫有山氏曰佩玉蘂兮余無所繫之㫖酒一盛兮余與褐之父睨之對曰粱則無矣麤則有之若登首山以呼曰庚西方主糓癸北方主水乎則諾左傳哀公十三年羊性滛而狠猪性卑而率鵝性頑而傲狗性險而出皆指斥貴勢南史卞彬文學傳桓公使管仲求寗戚寗戚應之曰浩浩乎育育乎管仲不知至中食而慮之婢子曰公何慮管仲曰非婢子之所知也婢子曰公其母少少毋賤賤昔者吳干戰未齔不得入軍門國子擿其齒遂入為干國多百里奚秦國之飯牛者也穆公舉而相之遂霸諸侯由是觀之賤豈可賤少豈可少哉管仲曰然公使我求寗戚寗戚應我曰浩浩乎吾不識婢子曰詩有之浩浩者水育育者魚未有室家而安召我居寗子其欲室乎管子小問公遊於紀得書曰食魚無反勿乘駑馬公曰善哉知苦言食魚無反則惡其鱢也勿乘駑馬惡其取道不逺也晏子對曰不然食魚無反毋盡民力乎勿乘駑馬則無置不肖於側乎晏子春秋襍上有物於此居則周靜致下動則綦髙以鉅圓者中䂓方者中矩大參天地德厚堯禹精微乎毫毛而盈大乎㝢宙忽兮其極之逺也攭兮其相逐而反也卭卭兮天下之咸蹇也德厚而不損五采備而成文往來惛憊通于大神出入甚極莫知其門天下失之則滅得之則存弟子不敏此之願陳君子設辭請測意之曰此夫大而不塞者與充盈太宇而不窕入郄穴而不偪者與行逺疾速而不可託訙者與往來惛憊而不可為固塞者與暴至殺傷而不億忌者與功被天下而不私置者與託地而游宇友風而子雨冬日作寒夏日作暑廣大精神請歸之雲荀子賦篇有物於此㒩㒩兮其状屢化如神功被天下為萬世文禮樂以成貴賤以分養老長幼待之而後存名號不美與暴為隣功立而身廢事成而家敗棄其耆老收其後世人屬所利飛鳥所害臣愚而不識請占之五帝帝占之曰此夫身女好而頭馬首者與屢化而不夀者與善壯而拙老者與有父母而無牝牡者與冬伏而夏游食桑而吐絲前亂而後治夏生而惡暑喜温而惡雨蛹以為母蛾以為父三俯三起事乃大已夫是之謂蠶理荀子賦篇有物於此生於山阜處於室堂無知無巧善治衣裳不盗不竊穿窬而行日夜合離以成文章以能合從又善連衡下覆百姓上飾帝王功業甚薄不見賢良時用則存不用則亡臣愚不識敢請之王王曰此夫始生鉅其成功小者耶長其尾而鋭其剽者耶頭銛達而剽趙繚者耶一徃一來結尾以為事無羽無翼反覆甚極尾生而事起尾邅而事已簪以為父管以為母既以縫表以連裏夫是之謂箴理荀子賦篇常摐曰過故鄉而下車子知之乎老子曰過故鄉而下車非謂其不忘故邪常摐曰嘻是已常摐曰過喬木而趨子知之乎老子曰過喬木而趨非謂敬老邪常摐曰噫是已張其口而示老子曰吾舌存乎老子曰然吾齒從乎老子曰亡常摐曰子知之乎老子曰夫舌之存也豈非以其柔邪齒之亡也豈非以其剛邪常摐曰嘻是已説苑敬慎淳于髠等曰狐白之裘補之以弊羊皮何如鄒忌曰敬諾請不敢雜賢以不肖淳于髠曰方内而圓釭如何鄒忌曰敬諾請謹門内不敢留賔客淳于髠等曰三人共牧一羊羊不得食人亦不得息何如鄒忌曰敬諾減吏省員使無擾民也新序雜事二歛小器投諸台者言取郭外萌内之於城中也食獵犬組羊裘者言趣饗戰鬬之士而繕甲兵也琴之合甚思之者言思妻也臧我羊羊有母是蓋告妻善養母也食我以同魚同者其文錯錯者所以治鋸鋸者所以治木也是有木治係於獄矣冠纓不足𢃄有餘者頭亂不得梳饑不得食也故知吾子拘而有木治者烈女傳周列國臧文仲母然文辭之有諧隱譬九流之有小説蓋稗官所采以廣視聽若效而不已則髠袒而入室旃孟之石交乎文心雕龍諧􅀈寓言元氣為舟微風為杝敖翔大清縱意容冶後漢書仲長統傳父之譽子人多不信時有信者輙以常嫌見疑故借外論之郭子註莊寓言方地為車圓天為蓋長劍耿介倚乎天外補文選宋玉大言賦析飛塵以為輿剖粃糠以為舟泛然投乎杯水淡若巨海之洪流憑蜽眥以顧盼附蠛蠓而遐遊集寜隱微之原渾存亡而不憂補文選宋玉小言賦開館尺捶餘築榭微塵裏蝸角列州縣毫端建朝市藝文類聚人部言語詩攀蚊髯附蚋翼我自謂重彼不極邂逅有急相切逼竄於針孔以自匿藝文類聚人部言語賦河流既竭日月俱騰置羅微物動落雲鵬藝文類聚人部言語詩針鋒於焉止息髪杪可以翺翔蚊眉深而易阻蟻目曠而難航藝文類聚人部言語詩館于蠅鬢宴于毫端亨蝨腦切蟣肝㑹九族而同嚌猶委餘而不殫藝文類聚人部言語賦俯身望日入下視見星羅噓八風而為氣吹四海而揚波藝文類聚人部言語詩并吞四夷飲枯河海跂越九州無所容止藝文類聚人部言語賦坐卧鄰空塵憑附蟭螟翼越咫尺而三秋度毫釐而九息藝文類聚人部言語詩噫氣為風揮汗成雨聊灼戴山龜欲持探䆳古藝文類聚人部言語詩觀修鯤其若轍鮒視滄海之如濫觴經二儀而跼蹐跨六合以翺翔藝文類聚人部言語詩四瀆流如淚五岳羅若垤藝文類聚靈異部仙道詩九河之水不足以漬麵蘖八藪之木不足以為薪蒸七澤之麋不足以充庖爼事文類聚酣飲拾遺記春雲為馬秋風為駟按之不遲勞之不疾初學記天部天註手頓羲和轡足踏閶闔開東海猶蹄涔崑崙螻蟻堆初學記道釋部仙譬如有樹名為好堅是樹在地中百歲枝葉具足一日出生髙百丈是樹出已欲求大樹以䕃其身是時林中有神語好堅樹言世中無大汝者諸樹皆當在汝䕃中大智度論卷十先後必須雷動於前風散於後然後萬物皆益如二月啓蟄之後風以長物八月收聲之後風以殘物風之為益其在雷後周易正義益自羊徂牛言先小後大也毛詩絲衣註樹麻者必先耕治其田然後樹之鄭氏箋詩南山三王之祭川也皆先河而後海或源也或委也此之謂務本禮記學記凡食果實者後君子火熟者先君子禮記玉藻大猶已成發其小者逺猶已成發其近者将行重器先其輕者先清而後濁者天地也大戴禮記少間善問之人如匠善攻治堅木先斫治其濡易之處然後斫其節目其所問師之時亦先問其易後問其難也禮記正義學記鐘之為體必待其擊每一舂而為一容然後盡其聲言善答者亦待其一問然後一答乃後盡説義理也禮記正義學記凡國之大事先簭而後卜周禮春官簭人天尊地卑神明之位也春夏先秋冬後四時之序也莊子天道先倮而浴則可以浴而倮則不可先祭而後饗則可先饗而後祭則不可物之先後各有所宜也淮南子説山訓聖人以人占天者先乎天也史以天占人者後乎天也大聖先天而天不違良吏後天而奉天時知其所先後則天人之情得矣揚子法言註五百篇天道先春後秋以成歲為政先令後誅以成治揚子法言註先知篇大極初搆清濁始分故天先成而地後定初學記地部摠載地病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本黄帝素問内經標本病傳論痛從上下者先刺其下以遏之後刺其上以脱之痛從下上者先刺其上以遏之後刺其下以脱之黄帝素問靈樞經周痺春夏先治其標後治其本秋冬先治其本後治其標黄帝素問靈樞經師傳病之中外何如岐伯曰從内之外者調其内從外之内者治其外從内之外而盛於外者先調其内而後治其外從外之内而盛於内者先治其外而後調其内黄帝素問内經至真要大論篇譬如日出先照一切諸大山王次照一切大山次照金剛寳山然後普照一切大地日光不作是念我當先照諸大山王次第乃至普照大地但彼山地有髙下故照有先後大方廣佛華嚴經三十五如人學射先安其足後習其法大方廣佛華嚴經卷七十八譬如有人欲入大海應先知彼水之深淺然後當入虛空孕菩薩經卷下如世人有三種田有一上田良美沃壤極為上好第二田者適處其中好第三田者曠野邉逺沙鹵鹹惡有諸田夫先於何田而下種為利益者先種良田望獲大利若良田盡次種中者種中田已次種下田别譯雜阿含經卷十五譬如揺樹取菓熟者前墮若未熟者更復後揺又如捕魚前網不盡後網乃得大智度論卷七如人有重罪先以打縳楚毒然後乃殺大智度論三十五譬如先以好寶示人然後讚寶所能大智度論卷五十六如人重病先以除病為急然後以寶物衣服莊嚴其身大智度論卷九十四如垢衣先浣後淨乃染所以者何染法次第故以垢衣不受染故百論卷上守八喻林卷十九
