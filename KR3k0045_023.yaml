body:
  text: 喻林卷二十三明徐元太撰人事門二十一逐勢齊人有一妻一妾而處室者其良人出則必饜酒肉而後反其妻問所與飲食者則盡富貴也其妻吿其妾曰良人出則必饜酒肉而後反問其與飲食者盡富貴也而未嘗有顯者來吾将瞷良人之所之也蚤起施從良人之所之徧國中無與立談者卒之東郭墦間之祭者乞其餘不足又顧而之他此其為饜足之道也其妻歸告其妾曰良人者所仰望而終身也今若此與其妾訕其良人而相泣於中庭而良人未之知也施施從外來驕其妻妾由君子觀之則人之所以求富貴利達者其妻妾不羞也而不相泣者幾希矣孟子離婁下生者必有死物之必至也富貴多士貧賤寡友事之固然也君獨不見夫朝趨市者乎明旦側肩爭門而入日暮之後過市朝者掉臂而不顧非好朝而惡暮所期物忘其中史記孟嘗君傳河清不可俟人命不可延順風激靡草富貴者稱賢文籍雖滿腹不如一囊錢伊優北堂上骯髒倚門邉後漢書文苑列傳埶家多所宜咳唾自成珠被褐懐金玉蘭蕙化為芻後漢書文苑列傳于時名勢赫奕若火猛風疾當塗之士莫不枝附葉連魏志管輅傳註握權則赴者鱗集失寵則散者瓦解求利則託刎頸之懽爭路則構刻骨之隙於是浮偽波騰曲辯雲沸寒暑殊聲朝夕異價駑蹇希奔放之跡鈆刀競一割之用晉書潘尼傳東野丈人觀時以居隱耕汙腴之墟有冰氏之子者出自沍寒之谷過而問塗丈人曰子奚自曰自涸隂之鄉奚適曰欲適煌煌之堂丈人曰入煌煌之堂者必有赫赫之光今子困於寒而欲求諸熱無得熱之方冰子瞿然曰胡為其然也丈人曰融融者皆趣熱之士其得罏冶之門者惟挾炭之子晉書王沉傳䑛痔兼車鳴鳶吞腐晉書光逸傳託身權戚憑勢假力擇棲芳林飛不待翼晉書束晳傳攀其鱗翼丏其餘論附騏驥之髦端軼歸鴻於碣石梁書任昉傳冀宵燭之末光邀潤物之微澤魚貫鳬踊颯㳫鱗萃分鴈騖之稻粱沾玉斚之餘瀝梁書任昉傳若其寵鈞董石權壓梁竇雕刻百工鑪錘萬物吐潄興雲雨呼吸下霜露九域聳其風塵四海疊其燻灼靡不望影星奔藉響川騖雞人始唱鶴蓋成隂髙門旦開流水接軫梁書任昉傳馳騖之俗澆薄之倫無不操權衡秉纖纊衡所以揣其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顔冉龍翰鳳雛曾史蘭薰雪白舒向金玉泉海卿雲黼黻江漢視若遊塵遇同土梗莫肯費其半菽罕有落其一毛若衡重錙銖纊微彯撇雖共工之蒐慝驩兜之掩義南荆之跋扈東陵之巨猾皆為匍匐委蛇折枝䑛痔金膏翠羽将其意脂韋便辟𨗳其誠梁書任昉傳投烈風之門趣炎火之室北齊書魏收傳貴人之家雲行於塗轂擊於道鹽鐡論刺權以毁譽為蠶織以威福代稼穡抱朴子外篇吳失若夫操隋珠以彈雀䑛瘡痔以屬車登朽緡以探巢泳吕梁以求魚旦為稱孤之客夕為狐鳥之餘棟橈餗覆傾溺不振蓋世人之所為載馳企及而達者之所為寒心而慘愴者也抱朴子内篇暢𤣥所論薦則蹇驢蒙龍駿之價所中傷則孝已受商臣之談故小人之赴也若決積水於萬仞之髙隄而放烈火乎雲夢之枯草焉欲望肅雍濟濟後生有式是猶炙冰使燥積灰令熾矣抱朴子外篇刺驕贄幣濃者瓦石成珪璋請託薄者龍駿棄林垌黨援多者偕驚飈以凌雲交結狹者侣跛鼈以沉泳抱朴子外篇安貧至於顧眄增其倍價翦拂使其長鳴彯組雲臺者摩肩趨走丹墀者疊跡文選劉峻廣絶交論凡希世茍合之士蘧蒢戚施之人俛仰尊貴之顔逶迆勢利之間意無是非讚之如流言無可否應之如響文選陸士衡辨亡論勢之所集從之如歸市勢之所去棄之如脱遺文選李康運命論夫官人有跖之惡結駟過市士以謂榮况實有益乎處子有顔閔之賢被褐造門人以謂辱况實有損乎故富貴易為容貧賤難得通意林潜夫論萎葉愛榮條涸流好河廣藝文類聚人部友悌詩林中多疾風富貴多諛言太平御覽天部九風猶如春華敷時羣蜂盡至色香細味不知厭足及其飛落羣蜂盡去三十六部尊經仙人經如風吹絶炎空中而去炎則依止於風大智度論卷九十昔有一比丘被擯懊惱悲嘆啼泣而行道逢一鬼此鬼犯法亦為毗沙門天王所擯時鬼問比丘言汝有何事啼泣而行比丘答言犯僧事衆僧所擯一切檀越供養失盡又惡名聲流布逺近是故愁嘆啼泣耳鬼語比丘言我能令汝滅惡名聲大得供養汝便可立我左肩上我當擔汝虛空中行人但見汝而不見我身汝若大得供養當先與我彼鬼即時擔比丘於先被擯聚落上虛空中行時聚落人見皆驚恠謂其得道轉相謂言衆僧無状枉擯得道人時聚落人皆詣此寺訶責衆僧即送此比丘住於寺内遂大得供養此比丘隨所得衣食諸物輙先與鬼不違本要此鬼異日復擔此比丘遊行空中正值毗沙門天王官屬鬼見伺官甚大驚怖擲棄比丘絶力而走此比丘遂墮地而死身首碎爛此喻行者宜應自修所向無疑恃託豪勢一旦傾覆與彼無異也衆經撰襍譬喻經勢然人以牆防禁一家之非常今上有蒺藜之草不可掃而去之欲掃去之反傷牆而毁家以興國君以禮防制一國之非法今宫中有淫昏之行不可滅而除之欲除滅之反違禮而害國毛詩正義牆有茨埶得容姦伯夷可疑茍曰無猜盜跖可信後漢書馮緄傳諺言貧不學儉卑不學恭非人性分也勢使然耳魏志任城陳蕭王傳評註膏粱方丈沈疾弗顧瑶碧盈尺阽危弗存宋書顧覬之傳秋葉辭條不假風飊之力太陽躋景無俟螢爝之暉南齊書王儉傳百仞之臺不挺陵霜之木盈尺之泉時降夜光之寶故理有大而乖權物有微而至道南齊書劉祥傳習數之功假物可㝷探索之明循時則缺故班匠日往繩墨之伎不衰大道常存機神之智永絶南齊書劉祥傳故仰遊雲以觀日月常動而雲不移乘船以渉水水去而船不徙矣隋書天文上志夫置器廣庭則函牛之鼎如釡堂崇十仞則八尺之人猶短物有陵之非形異也隋書天文上志與人同病相救同情相成同惡相助同好相趨太公六韜武韜縵密不能蔍苴學者詘身晏子春秋問上質的張而矢射集林木茂而斧斤入非或召之也形勢之所致文子上德子獨不見夫閉關乎立而倚之則婦人揭之仆而措之則不擇性而能舉其中若操其端則雖選士不能絶地關尚一身而輕重異之者埶使之然也鶡冠子兵政目能見物而不見堅則堅蔵矣手能知物而不知白則白蔵矣公孫龍子堅白論註視不得其所堅而得其所白者無堅也拊不得其所白而得其所堅者無白也公孫龍子堅白論勢不能為姦雖跖可信也勢得為姦雖伯夷可疑也商子畫䇿夫物至則目不得不見言薄則耳不得不聞故物至則變言至則論商子禁使資衰苴杖者不聽樂非耳不能聞也服使然也黼衣黻裳者不茹葷非口不能味也服使然也資齊同公荀子哀惠子曰羿執鞅持扞操弓關機越人爭為持的弱子扞弓慈母入室閉户故曰可必則越人不疑羿不可必則慈母逃弱子韓非子説林人無毛羽不衣則不犯寒上不屬天而下不著地以腸胃為根本不食則不能活是以不免於欲利之心欲利之心不除其身之憂也韓非子解老夫山居而谷汲者膢臘而相遺以水澤居苦水者買庸而決竇故饑歲之春幼弟不饟穰歲之秋疏客必食非疏骨肉愛客過也多少之實異也韓非子五蠧登髙而望臨深則窺人之性非窺且望也勢使然也賈子新書審微登髙使人欲望臨深使人欲窺處使然也射者使人端釣者使人恭事使然也淮南子説山訓泰山之容巍巍然髙去之千里不見埵堁逺之故也秋毫之末淪於不測是故小不可以為内者大不可以為外矣淮南子説山訓躄者見虎而不走非勇勢不便也淮南子説林訓聾者不謌無以自樂盲者不觀無以接物淮南子説林訓酤酒而酸買肉而臭然酤酒買肉不離屠沽之家故求物必於近之者淮南子説林訓戰兵死之鬼憎神巫盜賊之醜吠狗淮南子説林訓設鼠者機動釣魚者泛杭任動者車鳴也淮南子説林訓髙阜所在隂氣不淋焦氏易林剥之夬獨宿憎夜嫫母畏晝焦氏易林渙之蠱夫近水則寒近火則温逺之纔微何則氣之所加逺近有差也王充論衡寒温篇人坐樓臺之上察地之螻蟻尚不見其體安能聞其聲何也螻蟻之體細不若人形大聲音孔氣不能達也王充論衡變虛篇千里不同風百里不共雷王充論衡雷虛篇漁者不死於山獵者不溺於淵王充論衡遭虎篇從門應庭聽堂室之言什而失九如升堂闚室百不失一王充論衡佚文篇日刻徑重千里人不謂之廣者逺也望夜甚雨月灮不暗人不睹曜者隱也王充論衡佚文篇夫髙下相受不可逆之流也小大相羣不得已之勢也郭子註莊大宗師不行則易欲行而不踐地不可能也無為則易欲為而不傷性不可得也郭子註莊人間世鏡形如盃以照西施鏡縱則面長鏡横則面廣非西施貌易所照變也劉子正賞登峭嶺者則欲望逺臨峻谷者必欲窺墟墟墓之間使情哀清廟之中使心敬此處無心而情偽之發者地勢使之然也劉子激通益風從于雷趾􅗸平表切丞也于髀補爾切傳曰風從于雷獲其所也趾􅗸于髀得其宜也元包孟隂水中視魚必先見水灮中視物必先見灮莊子音義天下言水之激疾則去盡不能浸潤矢之激發則去逺前漢書註賈誼傳門户孔空風善從之李善註文選風賦垣草易雕階露易隕李善註文選何敬祖雜詩清源不能行運吞舟之魚以喻塵俗不足容乎仙者李善註文選郭景純遊仙詩蓋如飛鶴馬似遊魚李善註文選劉孝標廣絶交論登髙使人意遐臨深使人意清文選張景陽雜詩註近河之地濕近山之木長山出雲而邱阜生氣四瀆東流而百川無西意林陸賈新書經漸車之水歴繞輪之沙趾跡髙下不可論意林士緯釣者之恭非為魚也餌鼠以肉非愛之也藝文類聚産業部釣堯遭洪水而貴陸湯遭大旱而重水太平御覽地部陸取狼皮以當空户則羊畏不敢出矣太平御覽獸部狼鬻棺者欲民之死蓄榖者欲民之饑船漏水入囊洞内虛也太平御覽百穀部穀猛虎不處卑勢鷙鳥不立垂枝也太平御覽獸部虎上枯桑葉易落疲客心易驚初學記歲時部秋空桑穢飲醖以稷麥以成醇醪酒之始也烏梅女䴷胡板反甜醹九投澄清百品酒之終也初學記服食部酒響應聲還誠如妙説若深山邃谷林障重疊如此之處發一小聲響還極大若小屋小器如此之處發一大聲響還猶小以何因縁聲俱不異而應有差又如空地雖發音聲而無響應云何此處徒發巨聲了無應者海空智蔵經序品譬如陶師埏埴瓦器若大若小終歸破壞大寶積經四十二猶如乾地灑水之時即便易燥大寶積經卷五十六猶如潤地水灑之時即便難燥大寶積經卷五十六如轉輪王入城邑時一切悉知如薄德之人入城邑時乃至親厚猶不覺知大方等大集經十八譬如鐡丸雖擲空中終不暫住速疾投地大方廣十輪經卷三如是五大和合成身如世倉篅終歸敗散大方廣佛華嚴經卷十一譬如迦葉天無雲者雨不可得摩訶衍寶嚴經推七譬如天上天下共治一水精㑹不能得摩尼珠也佛遺日摩尼寳經推六譬如有人上向瞻空其目所覩不能别知何所是空何所非空阿差末菩薩經卷一譬如有人見其父母多有財産珍寶豐盈便於財物不生希有難遭之想金灮明冣勝王經卷一譬如日出霧露皆盡大乘造像功德經卷上悲九如或有人手執强弓於樹林中向上射葉其箭徹徃曾無所礙大乘造像功德經卷下譬如兩手和合能出音聲為從左手生為從右手生若從左手生常應有聲右手亦然何以故二手常有故一手無聲合故有聲文殊師利問經卷下如闇射人或中不中菩薩善戒經卷八復如寒霜日曜即消蘇婆呼童子經卷下猶如力士以大重石擲淖泥中泥為受不答曰受也所以者何泥淖石重是故必受中阿含經卷二十譬如雞毛幷筋入火便縮皺不得伸長阿含十報法經卷上亦如酥缾在水中壞是時瓦石便沉在下酥便浮在上増壹阿含經卷三十五譬如脂膏之汁著大火中即無烟矣樓灰經災變品譬如羣宿鳥夜聚旦隨飛佛説無常經當九天下人心如流水中有草木各自流去不相顧望前者亦不顧後後者亦不顧前草木流行各自如故佛説阿含正行經敬六猶如旱時諸草木等必令焦滅猶如春時酥置日下自然融消佛本行集經卷二十八如擊空缾易為破壞尼拘陀梵志經上譬如以土為佛若敬禮者但作佛想不作土想阿育王經卷八譬如果物未熟不强熟也已熟亦無所復待那先比丘經卷上那先問王言前車行有轍後車行當從何所行王言後車當從前車轍中行那先言前車輪寜語後輪言汝當隨我處從後來後輪車寜語前輪我當隨汝處行寜相語言爾不王言俱不相語也那先比丘經卷中那先言譬如大城都有一門其中有一人欲出當從何向王言當從門出耳那先言後復有一人欲出當復從何向出王言故當從前一人門出耳那先言王前出人寜語後人言汝當隨我後出後人寜語前人言我當隨卿所從門出兩人寜相語言爾不王言前人後人俱不相語也那先比丘經卷中如數疾輪無有端緒出曜經六念品譬如陶家埏埴作器一切要壞人命亦然法句經無常品譬如有人多諸子息愛無偏黨然於病者心則偏重本縁經鹿品如四衢道頭華果之樹常為多人之所抖擻本縁經毗羅摩品譬如殺賊㧞刀注箭常求殺人無憐愍心三昧法門經卷上譬如少薪無燄火不得風吹便自滅三昧法門經卷下譬如大火大風吹大水來澆無不滅三昧法門經卷下如惡風摧折大樹若無樹者則無所壞禪法要解經卷下榮十譬如入稠林採木直者易出曲者難出禪法要解經卷下榮十譬如人被鎻初脱時行猶不便大智度論卷二譬如須彌山凡人口吹不能令動大智度論卷五如小兒仰視青天謂有實色有人飛上極逺而無所見以逺視故謂為青色大智度論卷六譬如覆缾水不得入大智度論卷十三又如麞鹿為虎搏逐追之不捨雖得好草美水飲食心無染著大智度論卷十四譬如樹常東向曲若有斫者必當東倒大智度論卷十八如一斗蜜投之大河則失氣味大智度論卷十九譬如羊近於虎雖得好草美水而不能肥大智度論卷十九譬如父母雖常愛子若得病急是時愛心轉重大智度論卷二十譬如城有三門一人身不得一時從三門入若入則從一門大智度論卷二十譬如大河水中著少毒不能令水異大智度論卷二十三譬如鐡器中空故在水能浮中實則没大智度論卷二十七譬如上山既得到頂則不畏墮未到之間傾危畏墮大智度論卷四十一譬如小草加功易除大樹功重難除大智度論卷四十二又如雨墮不住山頂必歸下處大智度論卷四十九如人著衰常有不吉大智度論卷五十四譬如射地無不著時若射餘物或著或不著大智度論卷六十一譬如新擘乾毳隨風東西濕毳緤緻則不可動大智度論卷六十六譬如山上投縷丸縷盡自止大智度論卷七十譬如車分壞故車相亦滅又如輪分壞故輪相亦滅大智度論卷八十六譬如雲霧逺視則見近之則無所見大智度論卷八十八如草木有生故必可焚燒若當不生雖有猛火大風無所燒害大智度論卷九十以杖置日中豎卧俱無影執杖倚亞者其影則修長大莊嚴經論卷二偈譬如鎔真金注水則發聲大莊嚴經論卷四偈譬如鑽火燸為前相攝大乘論釋卷六譬如瘂人求覓諸塵不能説塵攝大乘論釋卷十二如鎔鐡鋋其鋋一頭先與火合餘頭雖復不與火合由體一故亦漸鎔銷廣百論卷三譬如火不至不能燒刀不至不能斫如實論華二譬如菴羅子生芽之時必破其皮然後得出佛性論卷四譬如岸崩不更還本十八空論守七如疊與著為因如席與障為因如車與載為因十二門論守六若有長必有短有高必有下有空必有實百論卷下守九譬如炎熾琉璃蚊蚋等蟲樂昇其上而不能住如人履放熱地以熱觸故不能停足法勝阿毗曇心論卷三然體無毛羽不可袒而無衣腹非匏瓜不可繫而不食𢎞明集釋駮論所謂重病加於毒藥宜令刳腹洗腸深罪約以嚴刑必須誅宗滅嗣辯正論卷六小方易擬大器難像髙僧傳四淮陽支孝龍讃勢盛火田為燎燎之方盛之時炎熾熛怒寜有能滅息之者鄭氏箋詩正月長轂雷野髙鋒慧雲後漢書灮武帝紀身當隆極族漸河潤視景爭暉方山並峻後漢書曹皇后紀舉動回山海呼吸變霜露後漢書宦者列傳指撝足以振風雲叱咤可以興雷電後漢書皇甫嵩列傳曹子丹汝非徒機上肉吳質吞爾不搖㗋咀爾不搖牙何敢恃勢驕邪魏志王粲傳註勝氣籠霄飛談卷霧並蘭芬菊耀無絶於終古矣晉書王湛列傳廻山壓卵未足為譬晉書河無忌傳今以蕩西域之威擁歸師之鋭鋒若猛火之盛於原弗可敵也晉書苻丕記鼔怒則冰原激電奮發則霜野奔靁宋書沈攸之傳樓艦騰川則滄江霧咽鋭甲赴野則林薄摧根宋書二凶元凶劭傳原火一燎異物同灰宋書二凶元凶劭傳是由涸澤而漁焚林而狩若浚風之儛輕蘀杲日之拂浮霜宋書袁淑傳此即恒山不足指而傾渤海不足飲而竭南齊書顧歡傳此蓋捧海澆熒烈火消凍耳南齊書陳顯達傳朱旗夕建如赤城之霞起戈船夜動若滄海之奔流梁書元帝紀捧崑崙而壓卵傾渤海而灌熒如駟馬之載鴻毛若奔牛之觸魯縞梁書元帝紀孟諸焚燎芝艾俱盡宣房河決玉石同沈梁書元帝紀勢傾河以覆岱威回天而震宇梁書張緬弟纘傳握金鏡以照耀擊玉鼔以鏗鏘神武之所牢籠威風之所􅞂轢莫不雲徹霧卷瓦解冰消魏書出帝紀譬猶太陽之消微露巨海之蕩熒燭魏書季平傳金鼔振讋若火焚毛鋒刃縱横如湯沃雪隋書焬三子越王侗傳忤意者嚴霜夏零阿㫖者膏雨冬澍榮枯由其脣吻廢興候其指麾隋書梁毗傳咳唾足以活枯鱗吹嘘可用飛窮羽芬椒蘭之氣暖布帛之詞隋書王孝籍儒林傳顧眄則山岳傾頽叱咤則風雲騰鬱腹心攸同爪牙斯在北史隋本紀下名聲足以㬥炙之威彊足以捶笞之拱揖指麾而强暴之國莫不趨使譬之是猶烏獲與焦僥搏也荀子富國應矦謂秦王曰王得宛葉藍田陽夏斷河内困梁鄭所以未王者趙未服也弛上黨在一而已以臨東陽則邯鄲口中蝨也王拱而朝天下後者以兵中之韓非子内儲説上鴻聲大視高舉神化焦氏易林困之離當此之時雖下愚之才居之猶能使恩同天地威侔鬼神暴風疾霆不足以方其怒陽春時雨不足以喻其澤周孔數千無所復角其聖賁育百萬無所復奮其勇矣昌言理亂篇雍門周説孟嘗君曰以强秦之勢伐弱韓譬猶􅀈蕭斧以伐朝菌也李善註文選魏都賦車服則灮可以鑒豐屋則羣烏爰止叱吒疾於雷霆禍福速於鬼神抱朴子外篇吳失汨若湯谷之揚濤沛若濛汜之涌波文選蜀都賦擁之者龍騰據之者虎視麾城若振槁搴旗若顧指文選吳都賦渙若天星之羅浩若濤水之波文選羽獵賦建衆檣以成林兮譬無山之樹藝廣文選王仲宣浮淮賦大晉應期一舉席卷猶震霆摧枯千鈞壓卵無餘類矣意林唐子何異一毛之落牛體雙鳬之飛海濱藝文類聚雜文部檄文譬猶翻東海以注螢爝倒崑崙以壓螻蟻其身縻爛豈假多力藝文類聚雜文部檄文按劒而叱江水為之倒流抽戈而揮皎日為之還舍藝文類聚雜文部檄文何慮而不成何征而不尅雖拔泰山填滄海可也藝文類聚武部戰伐論若溟海之引回流岱靈之吐行雲藝文類聚武部戰伐論轟轟隱隱若轉石之墜髙崖硍硍礚礚如激水之投深谷藝文類聚内典部寺碑按驪龍取其頷下之珠搦鯨魚㧞其眼中之寶藝文類聚寶部壁檄皇恩所被繁枯潤涸威之所加窮河絶漠藝文類聚寶部壁􅊾欲抑則大鵬垂翅欲抗則尺鷃冲天文苑英華梁昭明太子問答一雜文鳥遊曠澤之地而比翮者萬羣虎居繁林之藪而接毫者千數太平御覽地部林人君其尊重矣音聲振於金玉咳唾甘於醴泉太平御覽人事部唾若太陽之泮積雪似夜炬之朗重昏窈靄消亡層冰解散玉清經通濟幽㝠品又如火大悉能枯竭諸濕物類波羅蜜多經卷五百六十七猶如猛獸師子遥見人來有恐怖心乎終無此事增壹阿含經卷三十猶如融銅若有人以二十滴水著彼融銅中彼水滴速疾滅思念如來經縁七猶如師子獸王出於山谷而觀四方復三鳴吼方行而求諸有獸蟲之類各奔所趣莫知所如飛逝沉伏若復有力神象聞師子聲各奔所趣不能自安所以然者由師子獸王極有威神須摩提女經縁四是師子吼諸小師子尚皆怖畏况餘鳥獸華手經卷九如師子王處深谷中隨所住處諸小蟲獸不能得近以不堪受其氣響故若有近者聞其氣響即皆躃地華手經卷九如火燒薪盛能然濕三昧法門經卷下譬如多薪熾大火大風來吹不肯滅三昧法門經卷下如金翅鳥投龍宫中搏撮諸龍而食噉之亦如師子在獐鹿羣威猛本縁經毗羅摩品譬如惡龍放雹殺榖如金剛杵摧破大山如阿脩羅王遮捉日月猶如暴雨漂没村落猛盛大火焚燒乾草本縁經月光王品譬如熱鐡丸著少綿上雖燒此綿而火熱勢不減大智度論卷二十四譬如大龍尾在大海頭在虛空震電雷霆而降大雨大智度論卷二十七譬如白香象王在獵圍中雖被箭射顧視獵者心無所畏大智度論三十一如五色近須彌山自失其色皆同金色大智度論卷三十五譬如衆獸戲時若見師子率皆怖懾師子戲時自在無所畏難大智度論卷四十七譬如大熱鐡丸以著擘起毳上直燒下過勢熱無損但更無可燒者大智度論卷五十五如人壯年力盛腹中火熱雖食不適飲食不能生病又如有好藥雖被惡毒不能為害大智度論卷九十六猶如大海風鼔濤波出大音聲大莊嚴經論卷七勢均一栖不兩雄後漢書董卓傳註德均則衆者勝寡力侔則安者制危吳志陸遜子抗傳日月不竝出狐不二雄神龍不匹猛獸不羣鷙鳥不雙淮南子説林訓兩髙不可重兩大不可容兩勢不可同兩貴不可雙説苑談叢兩矛相刺勇力鈞敵焦氏易林需之同人兩火爭明雖鬬不傷焦氏易林比之賁虎狼竝處不可以事焦氏易林復之謙兩智不能相使兩貴不能相臨兩辨不能相屈力均勢敵故也意林尹文子智均不相使力均不相勝意林申子兩貴不相事兩賤不相使意林喻林卷二十三
