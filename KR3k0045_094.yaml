body:
  text: 喻林卷九十四明徐元太撰學業門四求道射之有所凖志志之主欲得中也必中所志乃為善耳以喻人將有行豫思念之行得其道為善耳尚書正義盤庚上玉不琢不成器人不學不知道是故古之王者建國君民敎學為先禮記學記雖有嘉肴弗食不知其旨也雖有至道弗學不知其善也禮記學記道者開通性命猶如道路開通於人人行於道路不可須臾離也若離道則礙難不通猶善道須臾離棄則身有患害也禮記正義義中庸誰能出不由户何莫由斯道也論語雍也君子謀道不謀食耕也餒在其中矣學也禄在其中矣君子憂道不憂貧論語衛靈公百工居肆以成其事君子學以致其道論語子張夫道若大路然豈難知哉人病不求耳孟子告子下道則髙矣美矣宜若登天然似不可及也孟子盡心上雖有拱璧以先駟馬不如坐進此道老子為道古之知道者築壘以防邪疏源以毓眞子華子大道不知道妄意卜者如射覆盂髙之存金存玉中之存角存羽卑之存瓦存石是乎非是乎惟置物者知之闗尹子一宇仰道者跂如道者駸皆知道之事不知道之道是以聖人不望道而歉不恃道而豐不惜道於聖不賈道於愚關尹子一宇習射習御習琴習奕終無一事可以一息得者惟道無形無方故可得之於一息關尹子一宇篇吾與汝既其文未既其實而固得道與衆雌而無雄而又奚卵焉莊子應帝王向吾見若眉睫之間吾因以得汝矣今汝又言而信之若規規然若喪父母揭竿而求諸海也莊子庚桑楚丘之於道也其猶醯雞與微夫子之發吾覆也吾不知天地之大全也莊子田子方夫體道者天下之君子所繫焉今於道秋毫之端萬分未得處一焉莊子知北遊夫人之在道若魚之在水得水而生失水而死黄石公三略下畧道髙比於天道明比於日道安比於山賈子修政語上聖人之與道猶葵之與日也雖不能與終始哉其鄉之誠也淮南子說林訓夫道有形者皆生焉其為親亦戚矣享穀食氣者皆受焉其為君亦惠矣諸有智者皆學焉其為師亦傳矣射者數發不中人敎之以儀則喜矣又况生儀者乎淮南子泰族訓求道者不以目而以心取道者不以手而以耳說苑君道棄常珍而嗜乎異饌者惡覩其識味也委大聖而好乎諸子者惡覩其識道也揚子吾子塗雖曲而通諸夏則由諸川雖曲而通諸海則由諸易子問道稽其門闢其户叩其鍵然後乃應況其否者乎太𤣥經𤣥攡近𤣥者𤣥亦近之逺𤣥者𤣥亦遠之譬若天蒼蒼然在於東面南面西面北面仰而無不在焉及其俯則不見也天豈去人哉人自去也太𤣥經𤣥攡道之於人也其簡且易耳其修之也非若採金攻玉之渉厯艱難也非若求盈司利之兢逐囂煩也不要而遘不徵而盛徐幹中論修本凡探明珠不於合浦之淵不得驪龍之夜光也採美玉不於荆山之岫不得連城之尺璧也抱朴子内篇袪惑粗之與妙猶塗之夷險耳遊者豈嘗改其足哉郭子註莊子在宥今瞿鵲子方聞孟浪之言而便以為妙道之行斯亦無異見卵而責司晨之功見彈而求鴞炙之實也郭子注莊子齊物論有鳥有鳥則飛於天有魚有魚則潛於淵知道者葢黙黙焉文中子禮樂𤣥關難啓善楗易開李善注文選王簡栖頭陀寺碑文夫食稻粱進芻豢衣狐貉襲氷紈觀窈眇之奇舞聽雲和之琴瑟此生人之所急非有求而為也脩道德習仁義敦孝悌立忠貞漸禮樂之腴潤蹈先王之盛則此君子之所急非有求而為也文選劉峻辨命論棄餌取罝而責功蹄筌失統喪歸而寄旨忘言補文選李充學箴輪者車之跡檝者舟之羽身之須道如此二物意林通語得道者生六翮於背長毛羽於腹飛無階之蒼天度無窮之世俗意林仲長統昌言夫人無幽顯道在則為尊雖生芻之賤也不能脫落君子埤雅卉物門芻要乎哉問道昭乎其如日醒窘乎其如夜暝黄帝素問靈樞經病傳昭乎哉問明乎哉道如鼔之應桴響之應聲也黄帝素問内經天元記大論音樂有聲行者為之止住道言無味學者罕見留心嗟乎世人迷妄之甚但能淫聽有聲之聲詎能咀嚼無味之味耶道德經註疏卷二如蜂採花取其香味元陽妙經卷五譬如地有八味之水一切衆生而不能得有慧之人用功穿鑿則便得水眞道亦爾譬如盲人不覩日月良醫療之而能得見如是日月非是今有真道亦爾元陽妙經卷九道猶良藥勤而服用定能愈疾有病不服稀能自愈玉清經法印品若欲求火於木中求不於水中求若欲求道於身中求不於他求於氷求火他方求道假使力能移山功能竭海力之彌勤功之殊妙終刧行之去道愈遠大乗妙林經捨身求道而不知道已在身中譬如愚人捨形求影黙聲求響而不知形是影根聲為響本大乗妙林經不知身心即是真道譬如愚人但見竹木而不知火捨木求火而不知火已在木中大乗妙林經其猶髙山大澤非欲蟲魚鳥獸而蟲魚鳥獸歸之人能虚無無為非欲為道道自歸之矣聖母資傳仙道深山有寳名曰上勝人若取之則成富有衆生道性亦復如是海空智藏經哀歎品如追逝者尋跡能得是跡與人非一非異靈寶祕宻經譬如有人欲食菴没羅果或半娜娑果先取其子於良美田而種植之隨時溉灌守䕶營理漸次生長芽莖枝葉時節和合便有華果果成熟已取而食之波羅蜜多經卷四百六十如重病思遇良醫如在大闇思見光明如溺大河思登彼㟁如遭急難思求依䕶大乘大方等日藏經卷一譬病思良醫如飢思美饍大方廣佛華嚴經卷二十三譬如有人願欲得金處處求覓遂得金礦既得礦已即便碎之擇取精者罏中銷錬得清淨金隨意廻轉作諸鐶釧種種嚴具雖有諸用金性不改金光明最勝王經卷二如雪山下有出淨光摩尼寶性有人善知摩尼寶相見相則知即取持去大法鼔經卷下夫為道者譬如持炬火入冥室中其冥即滅而明猶存學道見諦愚癡都滅無不明矣佛說四十二章經尺一佛言人為道猶若食蜜中邊皆甜吾經亦爾其義皆快行者得道矣佛説四十二章經尺一佛言夫為道者猶木在水尋流而行不左觸岸亦不右觸岸不為人所取不為鬼神所遮不為洄流所住亦不腐敗吾保其入海矣人為道不為情欲所惑不為衆邪所誑精進無疑吾保其得道矣佛說四十二章經尺一譬如有人欲逺所詣即履昔人所行之道又被昔人所被之甲乃尋昔人舊所都城或行深山或行曠野行之不已到彼舊城其城廣大乃是往昔王之所都而此都城嚴麗依然池沼園苑皆悉殊好人之見者心無厭捨我亦如是履於諸佛舊所行道被於諸佛所被舊甲行詣諸佛湼槃舊城佛說舊城喻經興八如蜂集華不嬈色香但取味去法句經華香品第一譬如大冶錮石然後得金大智度論卷三十一又如犢子周慞嗚呼得母乃止大智度論卷三十二穀實在糩中無人能受用時有須用者方便除皮糩究竟一乘寶性論卷一不求魚兎之實競攻筌蹄之末𢎞明集卷十二但求夜光於巨海正自未得耳𢎞明集宗答何書難白黒論直心是道塲無虚假故發行是道塲能辦事故深心是道場增益功德故菩提心是道場無錯謬故布施是道場不望報故持戒是道場得願具故忍辱是道場於諸衆生心無閡故精進是道場不懈退故禪定是道場心調柔故智慧是道場現見諸法故慈是道場等衆生故悲是道場忍疲苦故喜是道場悅樂法故捨是道場憎愛斷故神通是道場成就六通故解脫是道場能背捨故方便是道場敎化衆生故四攝是道場攝衆生故多聞是道場如聞行故伏心是道場正觀諸法故三十七品是道場捨有為法故諦是道場不誑世間故縁起是道場無明乃至老死皆無盡故諸煩惱是道場知如實故衆生是道場知無我故一切法是道場知諸法空故降魔是道場不傾動故三界是道場無所趣故師子吼是道場無所畏故力無畏不共法是道場無諸過故三明是道場無餘閡故一念知一切法是道場成一切智故維摩詰所說經菩薩品道不須求經生死刧數苦盡自得如轉縷丸於髙山縷盡自止何暇求耶羅什譯維摩詰經弟子品求益風雷益君子以見善則遷有過則改易益子夏傳云雷以動之風以散之萬物皆益周易正義益不學操縵不能安弦不學博依不能安詩不學雜服不能安禮禮記學記夫學殖也不學將落左傳昭公十八年學如殖草木也令人日長日進猶草木之生枝葉也不學則才知日退將如草木之墜落枝葉也春秋正義昭公十八年人而不為周南召南其猶正牆面而立也與論語陽貨人之學也猶木之有枝葉也木有枝葉猶庇蔭人而況君子之學乎國語晉千鈞之重加銖兩而移史記仲尼弟子傳學之資於人也其猶藍之染於素乎魏志王朗子肅傳注美寶為質雕摩益光不足以損吳志虞翻傳學之染人甚於丹青丹青吾見其久而渝矣未見久學而渝者也夫工人之染先修其質後事其色質修色積而染工畢矣學亦有質孝悌忠信是也晉書虞溥傅不學將落嘉植靡由梁書武帝中紀過緇為紺踰藍作青北齊書魏收傳吾嘗終日而思矣不如須臾之所學也吾嘗跂而望矣不如登髙之博見也荀子勸學不登髙山不知天之髙也不臨深谿不知地之厚也不聞先王之遺言不知學問之大也于越夷貊之子生而同聲長而異俗敎使之然也荀子勸學學不可以已青出之於藍而青於藍冰水為之而寒於水木直中繩輮以為輪其曲中規雖有槁暴不復挺者輮使之然也故木受繩則直金就礪則利君子博學而日參省乎已則知明而行無過矣荀子勸學登髙而招臂非加長也而見者逺順風而呼聲非加疾也而聞者彰荀子勸學君子之學如蛻蟠然遷之故其行効其立効其坐効其置顔色出辭氣効荀子大略子贛季路故鄙人也被文學服禮義為天下列士學問不厭好士不倦是天府也苟子大略篇鄉也混然塗之人也俄而並乎堯禹豈不賤而貴矣哉鄉也效門室之辨混然曾不能决也俄而原仁義分是非圖迴天下於掌上而辨白黑豈不愚而知矣哉鄉也胥靡之人俄而治天下之大器舉在此豈不貧而富矣哉荀子儒效篇如垤而進吾與之如丘而止吾已矣今學曾未如肬贅則具然欲為人師荀子宥坐善學者若齊王之食雞也必食其跖數千而後足雖不足猶若有跖物固莫不有長莫不有短人亦然故善學者假人之長以補其短被褐而出衣錦而入戎人生乎戎長乎戎而戎言不知其所受之楚人生乎楚長乎楚而楚言不知其所受之今使楚人長乎戎戎人長乎楚則楚人戎言戎人楚言矣吕氏春秋用衆學聖王之道者譬其如日静思而獨居譬其若火夫舍學聖之道而靜居獨思譬其若去日之明於庭而就火之光於室也然可以小見而不可以大知賈子新書修政語上夫以西施之美而蒙不潔則過之者莫不睨而掩鼻當試傅白黱黑榆流波雜芷若籠蒙視冶由笑佳態佻志從容為說焉則雖王公大人孰能無悇憛癢心而巔一視之今以二三子材而蒙愚惑之智予恐過之有掩鼻之容也賈子新書勸學夫純鈎魚腸劍之始下型擊則不能斷刺則不能入及加之砥礪摩其鋒鄂則水斷龍舟陸剸犀甲明鏡之始下型朦然未見形容及其粉以𤣥錫磨以白旃鬢眉㣲毛可得而察夫學亦人之砥錫也而謂學無益者所以論之過淮南子修務訓且夫身正性善發憤而成仁帽慿而為義性命可說不待學問而合於道者堯舜文王也沉湎躭荒不可敎以道不可喻以德嚴父弗能正嚴師不能化者丹朱商均也曼頰皓齒形夸骨佳不待脂粉芳澤而性可說者西施陽文也啳􅢦哆噅蘧蒢戚施雖粉白黛黑弗能為美者嫫母仳倠也夫上不及堯舜下不及商均美不及西施惡不若嫫母此敎訓之所喻也而芳澤之所施淮南子修務訓且聾者耳形具而無能聞也盲者目形存而無能見也夫言者所以通已於人也聞者所以通人於己也瘖者不言聾者不聞既瘖且聾人道不通故有瘖聾之病者雖破家求醫不顧其費豈獨形骸有瘖聾哉心志亦有之淮南子泰族訓吾嘗深有思而莫之得也於學則寤焉吾嘗企有望而亦莫之見也登髙則覩焉孔叢子雜訓湯稱學聖王之道者譬如日焉静居獨思譬如火焉夫捨學聖王之道若捨日之光何乃獨思若火之明也可以見小耳未可用犬知惟學問可以廣明德慧也說苑建本人皆知以食愈饑莫知以學愈愚説苑建本人知糞其田莫知糞其心糞田莫過利苗得粟糞心易行而得其所欲說苑建本庭燎夜明追嗣日光焦氏易林剝之大有刻畫為飾毛嬙西施焦氏易林升之井造父疾趨百歩而廢而託乘輿坐致千里水師汎軸解維則溺自託舟楫坐濟江河是故君子者性非絶世善自託於物也人之情性未能相百而其明智有相萬也此非其眞性之材也必有假以致之也濳夫論讃學夫肥沃墝埆土地之本性也肥而沃者性美樹稼豐茂墝而埆者性惡深耕細鋤厚加糞壤勉致人功以助地利其樹稼與彼肥沃者相似類也地之髙下亦如此焉以钁鍤鑿地以埤增下則其下與髙者齊如復增钁鍤則夫下者不徒齊者也反更為髙而其髙者反為下王充論衡率性篇蒸所與衆山之材幹同也伐以為蒸燻以火烟熱究浹光色澤潤焫之於堂其耀浩廣火竈之效加也繡之未㓨錦之未織恒絲庸帛何以異哉加五綵之巧施針縷之飾文章炫耀黻華蟲山龍日月學士有文章之學猶絲帛之有五色之巧也本質不能相過學業積聚超踰多矣王充論衡量知篇夫穀未舂蒸曰粟銅未鑄鑠曰積石人未學問曰矇矇者竹木之類也夫竹生於山木長於林未知所入截竹為筒破以為牒加筆墨之跡乃成文字大者為經小者為傳記斷木為槧㭊之為板力加刮削乃成奏牘夫竹木麤苴之物也雕琢刻削乃成為器用況人含天地之性最為貴者乎王充論衡量知篇銅錫未採在衆石之間工師鑿掘鑪橐鑄鑠乃成器未更鑪槖名曰積石積石與彼路畔之瓦山間之礫一實也王充論衡量知篇潤下作鹹水之滋味也東海水鹹流廣大也西州鹽井源泉深也人或無井而食或穿井而不得泉有鹽井之利乎不與賢聖通業有髙世之名難哉王充論衡别通篇不出横難不得從說不發苦詰不聞甘對導才低仰欲求禆也砥石劘厲欲求銛也王充論衡變動篇倦立而思逺不如速行之必至也矯首而狥飛不如循雌之必獲也孤居而願智不如務學之必達也徐幹中論治學夫聽黄鍾之聲然後知擊缶之細視衮龍之文然後知被褐之陋渉庠序之教然後知不學之困故學者如登山焉動而益髙如寤寐焉久而愈足顧所由來則杳然其逺以其難而懈之誤且非矣徐幹中論治學腥臊未化飲血茹毛以充其虚食之始也茹之火齊糝以蘭橘雖所未嘗嘗必美之適於口也蕢桴土鼓撫腹而吟足之蹈之以娛其喜樂之質也加之管絃雜以羽毛雖所未聽察之必樂當其心也嵇中散集張遼叔自然好學論泥湼可令齊堅乎金玉曲木可攻之以應繩墨百獸可敎之以戰陳畜牲可習之以進退沈鱗可動之以聲音機石可感之以精誠又況乎含五常而稟最靈者哉抱朴子外篇勗學低仰之駟敎之功也鷙擊之禽習之馴也與彼凡馬野鷹本實一類此以飾貴彼以質賤抱朴子外篇勗學粉黛至則西施以加麗而宿瘤以藏醜經術深則髙才者洞逸鹵鈍者醒悞抱朴子外篇勗學夫學者所以清澄性理簸揚埃穢雕鍛鑛璞礲鍊屯鈍啓導聦明飾染質素抱朴子外篇勗學登閬風捫晨極然後知井谷之闇隘披七經玩百氏然後覺面牆之至困也抱朴子外篇勗學夫不學而求知猶願魚而無網焉雖勤而無獲矣廣博以窮理猶順風而託焉體不勞而致逺矣抱朴子外篇勗學雖長大而不學道侏侏然若未成之人也太𤣥經第一童解林根增益益根而榦長求益之道也太𤣥經第一增解山抱玉而草木潤焉川貯珠而岸不枯焉口納滋味而百節肥焉心愛典誥而五性通焉劉子崇學君子愛日以學及時而成難者不避易者不從旦就業夕自省可謂守業年三十四十無藝則無藝矣年五十不以善聞則無聞矣鄙夫鄙婦相㑹於牆之陰可謂宻矣明日或有知之故云執仁與義莫不聞也蓬生麻中不扶自直白沙在湼與之俱黒君子之遊苾乎如入蘭芷之室久而不聞則與之化矣小人之遊戲乎如入鮑魚之室久亦不聞而亦化矣故君子慎其去就也意林曾子人之學如渴而飲河海大飲則大盈小飲則小盈大觀則大見小觀則小見意林物理論若不學譬如無目而視無脛而走無翅而飛無口而語不可得也意林正部斵玉為器諭乎知道惟山出泉譬乎從學是以執射執御雖聖猶然為弓為箕不無以矣藝文類聚人部鑒誡書矯首伺飛不如修弋宛足念逺莫若驅䮽故樸斵成於丹雘篠簜資於括羽藝文類聚禮部學校啓將使良璣修竹兼增瑩羽藝文類聚職官部祭酒表金鎔乃器水術伊瀾漸芳則馥履氷固寒藝文類聚禮部釋奠詩醬成於鹽而鹹於鹽夫物之變有時而重藝文類聚食物部醬已漚為菅未霑人功故謂之野菅埤雅卉物門白華胸中無學猶手中無錢文苑英華庾信連珠夫學之於人猶土地之山川也珍寶於是乎出猶樹木之有枝葉本根於是乎庇也太平御覽學部叙學干將鏌鎁巨闕辟閭古之良劍也然而不加砥礪則不能利不得人力則不能斷驊騮騏驥纖離騄耳此皆古之良馬也然而必前有銜轡之制後有鞭䇿之威加之造父之御然後一日而致千里夫人雖有性質美而心辯智必將求賢師而事之初學記人部師人而不學命之曰視皮一作肉學而不行命之曰輒一作撮囊困學紀聞卷十諸子譬如鑄劍煆煉滓穢始見精鋼勇烈無滯當成妙器虚皇四十九章如人種樹為得蔭凉為得花果及以材木元陽妙經卷九猶如甘蔗噉嚼口中得於甘味我亦如是從聖人數聞經典多得法味元陽妙經卷三譬如有人飢渴欲求飲食疾病之人求於良醫苦惱之人求於救䕶元陽妙經卷七大師求法隨種種求隨種種有海空智藏經捨受品譬如良農三陽之時善役調牛鈎引懸澍隄捍綿密踖乘通濘加以好糞次選良種治擇蕪穢温濕宜之然後調樹芸耗莠稗壅䕶苗根晨夕㸔視無令六畜侵食踐蹋如是苗子三月假生萋蔚蘩盛水陸通美無有蝥螣凉秋結實髙下通熟即命童僕收藏貯積藏吏監守不令餘耗唯供食用儲備盈長家給豐足傍惠貧乏玉清經道化四夷品如吠瑠瑠若時若時匠者瑩拭尒時尒時光已轉淨波羅蜜多經卷五百八十四譬如乳牛或噉乾草或噉濕草或飲冷水或飲煗水而能出於乳酪生酥熟酥尺以醍醐大寶積經卷四十一譬如有人於大火聚投以薪木數數添之如是添已其焰轉熾彌更增明無有盡滅大寶積經卷九十一如火焚燒時不厭於草木大寶積經卷九十五譬如有人得摩尼珠示其珠師珠師答曰此是無價眞摩尼寶即求師言為我治磨勿失光色珠師治已隨其摩時珠色光明映徹表裏大寶積經卷一百一十六猶以琉璃寶瑩磨於眞金光明轉清淨餘所不能及大方廣佛華嚴經卷二十六譬如眞金以毗瑠璃寶數數磨瑩轉更明淨大方廣佛華嚴經卷三十七譬如燈炷隨其精麄光明亦尒若益膏油光明轉增大方廣佛華嚴經卷五十九如酥未鑚揺酥終不可得是故諸智者鑚酪而得酥大乘宻嚴經卷下譬如眞金得迦私藥著於火中轉增明淨菩薩地持經卷七譬如成鍊眞金以摩尼珠寶莊嚴勝閻淨檀金菩薩地持經卷七譬如成鍊眞金瑩以硨磲光明清淨勝於餘金菩薩地持經卷七譬如燃燈因油因炷彼若無人更增益油亦不續炷是為前已滅訖後不相續無所復受中阿含經卷四十二如人捨於麄食食百味飯食已充足復求勝者長阿含經卷五如䇿善馬進道能逺法句經刀杖品既自解慧又多學問漸進普廣油酥投水自無慧意不好學問凝縮狹小酪酥投水法句經廣衍品譬如飽滿人得好食猶尚更食云何飢渴人而言不應食大智度論卷三譬如一燈能除諸暗得有所作更有大燈倍復明了大智度論卷六如人於暗室燃燈照諸器物皆悉分了更有大燈益復明審則知後燈所破之闇與前燈合住前燈雖與暗共住而亦能照物若前燈無暗則後燈無所增益大智度論卷十八譬如破闇故然燈更有大燈明則轉勝當知先燈雖照㣲闇不盡若盡後燈則無用大智度論卷七十九既懷玉在中又匠以成器𢎞明集卷十二志惰宰予晝寢子曰朽木不可雕也糞土之牆不可杇也論語公冶力不足者中道而廢今汝畫論語雍也蹞歩不休跛鼈千里累土不輟邱山崇成厭其源開其瀆江河可竭一進一退一左一右六驥不致彼人之才性之相懸也豈若跛鼈之與六驥足哉然而跛鼈致之六驥不致是無他故焉或為之或不為之耳道雖邇不行不至事雖小不為不成其為人也多暇日者其出入不遠矣荀子脩身且子有弑父者然而天下莫疏其子何也愛父者衆也儒有邪辟者而先王之道不廢何也其行之者多也今以為學者之有過而非學者則是以一飽之故絶穀不食以一蹪之難輟足不行惑也淮南子修務訓子之廢學若吾斷斯織也夫君子學以立名問則廣知是以居則安寧動則遠害今而廢之是不免於厮役而無以離於禍患也何以異於織績而食中道廢而不為寧能衣其夫子而長不乏糧食哉女則廢其所食男則隋於修德不為竊盜則為虜役矣列女傳周列國鄒孟軻母如有多人以諸鎧甲牢自莊嚴欲往討賊臨行陣時心生恐怖則便退走元陽妙經卷二佛之經戒譬如寶瓶初聞精進所願必得後小懈慢忘經失戒譬如瓶破無所復得也佛說生經卷五譬如有人鑚木求火數數休息而不專一終不到之既不獲火唐勞其功其以懈心欲求無為譬猶亦然脩行道地經集散品昔有長者子入海取沈木積有年載方得一車持來歸家詣市賣之以其貴故卒無買者經厯多日不能得售心生疲厭以為苦惱見人賣炭時得速售便生念言不如燒之作炭可得速售即燒為炭詣市賣之不得半車炭之價直世間愚人亦復如是無量方便勤行精進仰求佛果以其難得便生退心不如發心求聲聞果速斷生死作阿羅漢百喻經卷上昔有一人病患委篤良醫占之云須恒食一種雉肉可得愈病而此病者市得一雉食之已盡更不復食醫於後時見便問之汝病愈未病者答言醫先敎我恒食雉是故今者食一雉已盡更不敢食醫復語言若前雉已盡何不更食汝今云何止食一雉望得愈病百喻經卷下譬如渡河未到而還名爲不到彼岸大智度論卷十二懈怠之心燒諸功德譬如大火燒諸林野懈怠之人失諸功德譬如被賊無復遺餘大智度論卷十五譬如鑚火數息無得火期大智度論卷二十三喻林卷九十四
