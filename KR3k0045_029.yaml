body:
  text: 喻林卷二十九明徐元太撰人事門二十七隠禍氣狡憤於外則血脈必周身而作随氣張動外雖有彊形而内實乾竭杜氏解左傳僖公十五年吾恐季孫之憂不在顓臾而在蕭牆之内也論語季氏驪姬使優施飲里克酒歌曰暇豫之吾吾不如鳥烏人皆集於菀已獨集於枯國語晉嗛嗛之徳不足就也不可以矜而秪取憂也嗛嗛之食不足狃也不能爲膏而秪離咎也國語晉毒之猶腊者其殺也滋速國語鄭雖有烏獲逢蒙之伎力不得用枯木朽株盡爲害矣是胡越起於轂下而羌夷接軫也豈不殆哉史記司馬相如傳禍固多藏於隠微而發於人之所忽者也故鄙諺曰家累千金坐不垂堂此言雖小可以喻大史記司馬相如傳霍顯之謀將行於杯杓荆軻之變必起於帷幄前漢書息夫躬傳胡貊守闗青徐之寇在於帷帳矣後漢書范升傳禍生肘腋釁起蕭牆北史周本紀上壊我法者必在子孫譬如猛獸物不能害反爲毛間蟲所損食耳北史隋宗室諸王庶人秀傳張軍衛外禍反在内所備甚逺賊在所愛鶡冠子道端秦之有韓若人之有腹心之病也虛處則㤥然若居濕地著而不去以極走則發矣韓非子存韓日月暈圍於外其賊在内備其所憎禍其所愛韓非子備内譬如伏虎見便必動將何時已賈子新書威不信夫孫叔敖之請有寝之丘沙石之地所以累世不奪也晉厲公之合諸侯於嘉陵所以身死於匠驪氏也衆人皆知利利而病病也惟聖人知病之爲利利之爲病也夫再植之木根必傷掘藏之家必有殃以言大利而反爲害也淮南子人間訓死不再生窮鼠齧貍匹夫奔萬乗舎人折弓鹽鐵論詔聖憂在腹内山崩爲疾禍起蕭牆竟制其國焦氏易林豫之随衆兎俱走雄羆在後焦氏易林豫之漸内畔生賊自爲心疾焦氏易林遯之明夷次七跙切居子與二切跙閒于蘧除或寝之廬測曰跙跙之閒惡在舎也太𤣥經第一閒次八狼盈口即矢字在其後測曰狼盈口不顧害也太𤣥經第二争上九濕迎牀足罦于牆屋測曰濕迎牀足顛在内也太𤣥經第四迎初一骨纍其肉内幽測曰骨纍其肉賊内行也太𤣥經第八劇汝獨不見蛛之結網于屋梁之隅中坐而待食自以爲安及棟梁朽而榱題傾蛛乎雖欲寄一絲以聊適不可獲矣天禄閣外史論易務於逺者或失於近治其外者或患生乎内覆頭者不必能令足不濡蔽腹者不必能令背不傷故秦始築城遏胡而禍發帷幄漢武懸旌萬里而變起蕭牆抱朴子外篇廣譬夫虎豹以其形容修廣爪牙堅强肌膚盛大毛物豐文章明故執百獸而制於人榮華香草以其所有光曜芬香故悦於衆俗而傷其根大國之君以其地廣民衆勢尊形寵威隆名顯故張其鄰國而危其身有道則固於磐石寧於太山失道則危於累卵輕於鴻毛俱弱則先困俱亂則先亡是故大國者霸王之梯而亡滅之階也道徳經指歸卷十師子身中自生諸蟲還食其肉大寳積經卷一百十三有一貓貍飢渴羸痩於孔穴中伺求鼠子有時䑕子出穴逰戯時被貓貍疾取吞之鼠子身小生入腹中入腹中已食其内藏食内藏時貓貍迷悶東西狂走空宅塚間不知何止遂至於死雜阿含經卷四十七猶若以灰覆火人不覺足往蹈之漸漸熱徹乃知燒足出曜經八行品譬如灰下火猶能燒萬物本緣經毘羅摩品横禍六三无妄之災或繋之牛行人之得邑人之災易无妄六五䘮羊于易无悔易大壯凡禍疾所起由有妄而來今九五居得尊位爲无妄之主下皆无妄而偶然有此疾害故云无妄之疾也周易正義无妄誰謂雀無角何以穿我屋誰謂䑕無牙何以穿我墉詩國風行露有兎爰爰雉離于羅有兎爰爰雉離于罦音孚叶歩妙反有兎爰爰雉離于罿音衝兎詩國風爰伐木掎音已叶居何反矣析薪柂音侈叶湯何反矣舎彼有罪予之佗音唾叶湯何反矣詩小雅小弁長木之斃無不摽也國狗之瘈無不噬也左傳哀公十二年齊人諺曰上山斫檀榽橀先殫爾雅釋木註臣隣家有逺爲吏者其妻私人其夫且歸其私之者憂之其妻曰公弗憂也吾已爲藥酒以待之矣後二日夫至妻使妾奉巵酒進之妾知其爲藥酒也進之則殺主父言之則逐主母乃陽僵棄酒主父大怒而笞之妾之棄酒上以活主父下以存主母也忠至如此然不免於笞此以忠信得罪者也臣之事適不幸而有類妾之棄酒也戰國策燕易王矯翮南辭翻栖火樹飛鱗北逝卒委湯池遂使穴碎雙龍巢傾兩鳳激浪之心未騁遽骨修鱗凌雲之意將騰先灰勁翮望其翔躍焉可得哉晉書陸機列傳所謂火烈髙原芝蘭同泯梁書武帝上紀爾乃猘狗逐而華子奔腐鼠遺而虞氏滅匣猨逸而林木殘櫝珠亡而池水竭宋書顧愷之傳火燎孟諸芝艾同爛河決金隄淵丘同體宋書袁湛傳宋有澄子者亡緇衣求之塗見婦人衣緇衣援而弗舎欲取其衣曰今者我亡緇衣婦人曰公雖亡緇衣此實吾所自爲也澄子曰子不如速與我衣昔吾所亡者紡緇也今子之衣襌緇也以襌緇當紡緇子豈不得哉吕氏春秋淫辭楚王亡其猿而林木爲之殘宋君亡其珠池中魚為之殫故澤失火而林憂淮南子説山訓子路宰我生不逢伯樂之舉而遇狂屠故君子傷之鹽鐡論訟賢從風放火荻芝俱死焦氏易林乾之小過鵲巢栁樹鳩奪其處焦氏易林豫之晉作室山根人以爲安一夕崩顛破我壺飱焦氏易林賁之明夷張網捕鳩鳥麗其災雌雄俱得爲網所賊焦氏易林賁之歸妹堂桑折衡佐鬬者傷暴臣失國良臣被殃焦氏易林咸之解雀行求粒誤入網罭焦氏易林益之革張網捕鳩兎離其災焦氏易林歸妹之節上九破璧毁圭臼竈生鼃天禍以他測曰破璧毁圭逢不幸也太𤣥經第六窮立巖牆之下爲壊所壓蹈坼㟁之上爲崩所墜輕遇無端故爲不幸王充論衡幸遇篇江南數郡有畜蠱者主人行之以殺人行食飲中人不覺也其家絶滅者則飛逰妄走中之則斃李善注文選鮑明逺苦熱行不見巫山火芝艾豈相離廣文選張孟陽招隠詩億兆與崑岡並燎縉紳與藴崇共日藝文類聚帝王部梁武帝勅宋城門失火因汲池水以沃灌之池中空竭魚悉露死喻惡之滋并中傷良謹也藝文類聚鱗介部魚宋桓司馬有寳珠獲罪出亡王使人問珠之所在曰投之池中於是竭池而求之魚盡死焉此言禍福之相及也藝文類聚寳部珠河傾一作流酸棗杞梓與樗櫟俱流海淺蓬萊魚鼈與一作共蛟龍共一作並盡文苑英華庾信雜銘銘將恐程門霣霜梧檟與樗櫟同凋崑山火燎天球共碔砆俱燼文苑英華周宣帝􅊾一時有一婦人焰榖作麨有䍧牴來抴焰麥不可柰何捉擿火杖用打䍧牴杖頭有火著羊毛住羊毛得火熱用揩象廐象廐火然并燒王象象身爛破便殺獼猴用拍象身天於空中而説偈言瞋恚鬬諍邊不當於中止羯羠共相抵蠅蟻於中死婢具䍧牴鬬獼猴而坐死智者逺嫌疑莫與愚人止菩薩本行經卷中昔有一婢禀性亷謹常爲主人典麨麥豆時主人家有一羝羊伺空遂便噉食麥豆斗量折損爲主所瞋信已不取皆由羊噉縁是之故婢常因嫌每自杖捶用打羝羊羊亦含怒來觝觸婢如此相犯前後非一婢因一日空手取火羊見無杖直來觝婢婢縁急故用所取火著羊脊上羊得火熱所在觸突焚燒村人延及山野于時山中五百獼猴火來熾盛不及避走即皆一時被火燒死雜寳藏經卷八奚獨䘮蜯池空遂使亡狙林盡辯正論卷一孤立日之熱恒在日中之後道東之杜人所宜休息也今人不休息者以其特生隂寡也武公初兼其宗族不求賢者與之在位君子不歸似乎特生之杜然鄭氏箋詩有杕之杜有杕然特生之杜生於道路之左人所宜休息今日所以人不休息者由其孤特獨生隂涼寡薄故也以興武公一國之君人所宜往仕今日所以人不往仕者由其孤特為君不求賢者故也毛詩正義有杕之杜譬彼内傷病之木以内疾之故是用無枝也毛詩正義小弁彼堂堂然光明者華也此華乃芸然其色黄而盛矣以興顯著者君也此君其徳彰而明矣華盛而不言其葉見君明而其臣不賢毛詩正義裳裳者華徒鼓瑟謂之歩徒吹謂之和胡卧切徒歌謂之謡徒撃鼓謂之咢五各切徒鼓鐘謂之修徒鼓磬謂之寋音蹇爾雅深厲淺揭随時為義曽何貪於支離而習其孤技邪後漢書張衡列傳越俗易驚孤音少和直轡安歸髙謀誰佐後漢書荀彧列傳論受堯之誅不能稱堯直臣無黨古今所悉晉書劉毅傳夫獨構之唱唱虚而莫和晉書王湛坦之傳昔有一國國中一水號曰狂泉國人飲此水無不狂唯國君穿井而汲獨得無恙國人既並狂反謂國主之不狂為狂於是聚謀共執國主療其狂疾火艾針藥莫不畢具國主不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃歡然我既不狂難以獨立此亦欲試飲此水宋書袁粲傳公無黨援譬如水間一堵牆大危矣隋書元諧傳女嬃言衆人皆佩薋菉枲已為䜛佞之行滿於朝廷而獲富貴汝獨服蘭蕙守忠直判然離别不與衆同故斥棄也王逸注楚辭離騷經言已使鳳鳥往求同志之士欲與俱共事君反見邪惡之人相與屯聚謀欲離已又遇佞人相肆來迎欲使我變節以随之也王逸注楚辭離騷經言東風飄然而起則神靈應之而雨以言隂陽相感風雨相和屈原自傷獨無與和也王逸注楚辭九歌然不覩金雖克木而錐鑚不可以伐鄧林水雖勝火而升合不足以救焚山寸膠不能治黄河之濁尺水不能却蕭丘之熱是以身名並全者甚稀而先笑後號者多有也抱朴子外篇嘉遯夫丸泥已不能遏彭蠡之沸騰獨賢亦焉能反流遁之失正抱朴子外篇安貧升水不能救八藪之燔爇撮壤不能遏砥柱之沸騰寸刃不能刋長洲之林獨是不能止朋黨之非抱朴子外篇廣譬發音則響與俗乖抗足則跡與衆迕抱朴子外篇自敘昔余夢登天兮魂中道而無抗吾使厲神占之兮曰有志極而無旁楚辭九章惜誦薋菉葹以盈室兮判獨離而不服文選屈原離騷經徒樂枕經藉書紆體衡門上無所蔕下無所根文選班固答賔戯似孤臣之介立随排擠之所往内一志以奉朝兮外結心以絶黨萍出水而主枯兮士失㩀而身往覩斯草而慷慨兮固知直道之難爽廣文選夏侯孝若浮萍賦鷹隼厲天翼恥與燕雀逰廣文選傅休奕長歌行直木無隂直士無徒是以賢人直士常不容於世意林任子孔文舉金性太多木性不足背隂向陽雄倬孤立意林士緯宋玉識音而善文襄王好樂而愛賦既美其材而憎其似屈原也乃謂之曰子盍從楚之俗使楚人貴子之徳乎對曰昔楚有善歌者王其聞與始而曰下里巴人國中唱而和之者數萬人中而曰陽阿採菱國中唱而和之者數百人既而曰陽春白雪朝日魚麗含商吐角絶節赴曲國中唱而和之者不過數人盖其曲彌髙其和彌寡藝文類聚樂部歌猶如犀牛獨一無侣虚空孕菩薩經卷上極反白賁无咎上得志也易賁物積而後始極既極而後方衰從旦積暖故日中之後乃極熱從昏積涼故半夜之後始極寒毛詩正義有杕之杜極則美先盡矣美盡必有惡生故美盡則生疾春秋正義昭公元年日極則反月滿則虧極之徒反滿之徒虧巨之徒滅孰能已無已乎効夫天地之紀管子白心恩甚則怨生愛多則憎至亢倉子用道篇目將𦕈者先睹秋毫耳將聾者先聞蚋飛口將爽者先辨淄澠鼻將窒者先覺焦朽體將僵者先亟犇佚心將迷者先識是非故物不至者則不反列子仲尼東海之極水至而反夏熱之下化而爲寒吕氏春秋君守有知順之爲倒倒之爲順者則可與言化矣至長反短至短反長天之道也吕氏春秋似順草木壯極則枯落人壯極則衰老也言强者不可以壯河上公注老子儉武春夏陽氣躁疾於上萬物盛大極則寒寒則零落死亡也河上公注老子洪徳壯不可極極則敗物不可極極則反京氏易傳大壯中髙山崩顛丘陵爲溪焦氏易林蹇之咸次八極陽徵隂不移日而應測曰極陽徵隂應其發也太𤣥經第三應上九隂陽啟􅀢音吪其變赤白測曰隂陽啟􅀢極則反也太𤣥經第六䦯隂不極則陽不生亂不極則徳不形太𤣥經太𤣥文極暌而合極異而通故先見怪焉洽乃疑亡也周易畧例卦畧然樂極則哀集至盈必有虧故曲終則歎發醼罷則心悲也實理勢之攸召猶影響之相歸也抱朴子内篇暢𤣥陽勝則熱隂勝則寒重寒則熱重熱則寒黄帝素問内經隂陽應象大論物壯則老兵强則衰道徳經注疏卷三夫行迷則改路術窮則反故𢎞明集牟子理惑論反本上九白賁无咎易賁昔日貴雕飾今尚儉與素昔日多纖介今去情與故宋書樂四志物生於土終變於土事生於意終變於意闗尹子五鑑天下莫相憎於膠漆而莫相愛於氷炭膠漆相賊氷炭相息也牆之壊愈其立也氷之泮愈其凝也以其反宗淮南子説山訓夫五色雖明有時而渝豐交之木有時而落物有成衰不得自苦故三王之道周則復始窮則反本韓詩外傳將入之日既赤且黄若初出之時也故曰用視其始太𤣥經第五視解三王之統若循連環周則復始窮則反本文選西征賦注如尺蠖尋條安前足進後足盡樹端更無所依止還歸本䖏大智度論卷六十六難全松栢之下其草不殖左傳襄公二十九年神龜知吉凶而骨直空枯日爲徳而君於天下辱於三足之烏月爲刑而相佐見食於蝦蟆蝟辱於鵲騰蛇之神而殆於即且竹外有節理中直空虚松栢為百木長而守門閭日辰不全故有孤虚黄金有疵白玉有瑕事有所疾亦有所徐物有所拘亦有所據㒺有所數亦有所疎人有所貴亦有所不如何可而適乎物安可全乎天尚不全故世爲屋不成三瓦而陳之以應之天史記龜策傳明有所不見聴有所不聞人雖賢不能左畫方右畫圎日月之明而時蔽於浮雲羿名善射不如雄渠蠭門禹名爲辯智而不能勝鬼神史記龜策傳晝長則宵短日南則景北天且不堪兼况以人該之後漢書張衡列傳鳳闕司晨之功火無内照之美梁書元帝紀佼麗之苦窳也而醜則堅牢華璧之易以碎也而金鐵則難陶甚矣物之不可以全也如是子華子大道天地無全功聖人無全能萬物無全用故天職生覆地職形載聖職教化物職所宜然則天有所短地有所長聖有所否物有所通列子天端目能視手能操目之與手所任各異故曰其異任也目自不能見于堅不可以手代目之見堅手自不能知於白亦不可以目代手之知白故曰其無以代也公孫龍子堅白論註以全舉人固難物之情也尺之木必有節目寸之玉必有瑕瓋先王知物之不可全也故擇務而貴取一也吕氏春秋舉難魯人有公孫淖者告人曰我能起死人人問其故對曰我固能治偏枯今吾倍所以為偏枯之藥則可以起死人矣物固有可以爲小不可以爲大可以爲半不可以爲全者也吕氏春秋别類火燭一隅則室偏無光骨節早成空竅哭厯身必不長吕氏春秋士容察一曲者不可與言化審一時者不可與言大日不知夜月不知晝日月為明而弗能兼也唯天地能函之淮南子繆稱訓羽翼美者傷骨骸枝葉美者害根莖能兩美者天下無之也淮南子詮言訓小謹者無成功訾行者不容於衆體大者節疏蹠距者舉逺自古及今五帝三王未有能全其行者也淮南子汜論訓月照天下飴於詹諸騰蛇㳺霧而殆於蝍蛆烏力勝日而服於䳡禮能有修短也淮南子説林訓衣成則必缺衽宫成則必缺隅屋成則必加措示不成者大道然也韓詩外傳意不並鋭事不兩隆盛於彼者必衰於此長於左者必短於右憙夜卧者不能早起也説苑談叢子獨不聞和氏之璧乎價重千金然以之間紡曽不如瓦塼隋侯之珠國之寳也然用之彈曽不如泥丸騏驥騄駬倚衡負軛而趨一日千里此至疾也然使捕鼠曽不如百錢之貍干將鏌鎁刜鐘不錚試物不知揚刃離金斬羽契鐡斧此至利也然以之補􅛛曽不如兩錢之錐今子持楫乗扁舟處廣水之中當陽侯之波而臨淵流適子所能耳若誠與子東説諸侯王見一國之主子之蒙蒙無異夫未視之狗耳説苑雜言太公田不足以償種漁不足以償網治天下有餘智文公種米曽子駕羊孫叔敖相楚三年不知軛在衡後務大者固忘小智伯厨人亡炙選而知之韓魏反而不知邯鄲子陽園人亡桃而知之其亡也不知務小者亦忘大也説苑雜言夫尺有所短寸有所長驊騮騄驥天下之駿馬也使之與貍鼬試於釜竈之間其疾未必能過貍鼬也黄鵠白鶴一舉千里使之與燕服翼試之堂廡之下廬室之間其便未必能過燕服翼也辟閭巨闕天下之利器也擊石不缺刺石不銼使之與管槀决目出眯其便未必能過管槀也由此觀之華髮墮顛與卭何以異哉新序雜事五嘖以牙者童其角㩣以翼者兩其足太𤣥經太𤣥棿稻榖千鍾糠皮大半閲錢滿億穿決出萬大羮必有澹味至寳必有瑕穢大簡必有大好良工必有不巧王充論衡自紀篇明白之士逹動之機而暗於𤣥慮𤣥慮之人識静之原而困於速㨗猶火日外照不能内見金水内映不能外光二者之義蓋隂陽之别也劉邵人物志九徵夫體適於一方者造餘塗則閡矣王弼曰形必有所分聲必有所屬若温也則不能涼若宫也則不能商張湛注列子天瑞他人之所念慮蚤蝨之所首向隔牆之朱紫林下之草芥匣匱之書籍地中之寳藏豐林䆳藪之鳥獸重淵洪潭之魚鼈令周孔委曲其采色分别其物名經列其多少審實其有無未必能盡知抱朴子内篇辯問騕褭能奮蘭筋以絶㬌而不能履冰以乗深猛虎能似雷霆以搏噬而不能踊雲霧以凌虛鴻鶤不能振翅於籠罩之中輕鷂不能電擊於九筵之下物既然矣人亦如之故能調和隂陽者未必能兼百行修簡書也能敖五邁九者不必能全小潔經曲碎也抱朴子外篇備闕天不能平其西北地不能隆其東南日月不能摛光於曲穴衝風不能揚波於井底擿齒則松檟不及一寸之莛挑耳則棟梁不如鷦鷯之羽彈鳥則千金不及丸泥之用縫緝則長劔不及數分之針何必伏巨象而捕䑕制大鵬以司晨乎抱朴子外篇備闕尋飛繩㬌之足而不能騁逸放於吕梁凌波泳淵之屬而不能陟峻而攀危故離朱剖毫於百歩而不能辨八音之雅俗子野合通靈之絶響而不能指白黒於咫尺抱朴子外篇博喻衝飇傾山而不能効力於枝毫火鑠金石而不能耀烈以起溼是以淮隂善戰守而拙理治之策絳侯安社稷而乏承對之給抱朴子外篇博喻粗理不可浹全能事不可畢兼故懸象明而可蔽山川滯而或移金玉剛而可柔堅冰宻而可離公旦不能與伯氏跟絓於馮雲之峻仲尼不能與吕梁較伎於百仭之溪抱朴子外篇廣譬能走者奪其翼善飛者減其指有角者無上齒豐後者無前足盖天道不使物有兼焉也古人云多爲少善不如執一鼯鼠五能不成伎術顔氏家訓省事神明有所不及聖人有所不訓揚子法言注五百篇人戴盆則不得望天望天則不得戴盆事不可兼施言已方一心營職不假修人事也李善注文選司長子長報任少卿書夫尺有所短寸有所長物有所不足智有所不明數有所不逮神有所不通文選屈原卜居目無常音之察耳無照影之神故在乎我者不誅之於已存乎物者不求備於人文選陸機演連珠鱗者無毛毛者無羽􅀈者無牙角者無齒見於晝者滅於夜得於前者失於後再便重利未之甞有道徳經指歸卷十三雞司夜貍執鼠日燭人此皆不能自全意林尸子人多患逺見百歩而不自知眉頰知眉頰者復不能察百歩也意林唐子宋元君夜夢人披髮云予為清江使河泊之所漁者豫且得予元君覺使人占之曰此神龜也君曰漁者有豫且乎左右曰有明日豫且朝君曰漁何得對曰旦之網得白龜圎五尺君曰獻若之龜龜至君再欲殺再欲活心疑卜之曰殺龜以卜吉乃刳龜七十鑚而無遺筴仲尼曰神能夢於元君而不能避豫且之網智能七十鑚無遺筴不能避刳腸之患是則智有所困神有所不及藝文類聚靈異部夢盈虚之道雖修平而必陂損益之由在至象而無蠲是以謂地之厚而東南缺唯天為大而西北懸藝文類聚雜文部連珠天精為日地精為月天地至貴精不兩明太平御覧天部三上墨子曰甘𤓰苦蔕天下物無全美也埤雅卉物門𤓰俗之談者以為火外照無納影之能内鑒無朗闇之功初學記器用部火注戴角者無上齒何氏語林言語猶如滿月盛光晝則不明元陽妙經卷一譬如大海其水一味多有諸寳亦有水精下價之珠大方等大集經十八如孔雀好青項鳥飛行不如野雁歩四阿含暮抄解藉五孔雀雖有色嚴身不如鴻雁能逺飛大智度論卷三夫長左者必短右大前者必狹後孟公綽為趙魏老則優不可以為滕薛大夫𢎞明集牟子理惑論難制豕之性能水又唐突難禁制四蹄皆白曰駭則白蹄其尤躁疾者今離其繒牧之處與衆豕渉入水之波漣矣喻荆舒之人勇悍㨗敏其君猶白蹄之豕也鄭氏箋詩漸漸之石笱者捕魚之器弊敗之笱在於魚梁其魚乃是魴鰥之大魚非弊敗之笱所能制毛詩正義敝笱草之滋長引蔓則難可芟除喻叚之威勢稍大難可圖謀也春秋正義隠公元年恐蛟龍得雲雨終非池中物也吴志周瑜傳堅若得洛不可復制此為除狼而得虎也吴志孫堅傳注隼質難羈狼心自野晉書慕容寳列傳失籠之鳥非羅所羈脱網之鯨豈罟所制晉書慕容垂傳蛟龍猛獸非可馴之物不如除之晉書苻堅上紀遂使衝鯨潰流暴鱗奔漢宋書武帝上本紀猛獸安可出穴北齊書髙祖十一王永安傳騊駼野駿産自北域交頸相摩分背翹陸雖有孫陽終不能服山海經海外北經圖讃禽鹿長而見羈則赴蹈湯火文選范蔚宗皇后紀論注其下注也若奔車失轡狂牛無縻廣文選崔子玉漢桂陽太守周府君碑譬如狂象之牙不可觸也大寳積經卷六十一譬如大力狂象搪揬蹴蹋無能制者大智度論卷一但衆生心性譬若獼猴戯跳攀縁歡娱奔逸法苑珠林卷八十四喻林卷二十九
