body:
  text: 喻林卷十三明徐元太撰人事門十一見忌江有汜音祀之子歸不我以江有渚之子歸不我與江有沱音跎之子歸不我過音戈有詩國風江汜在人之右衆必害之前漢書霍光傳芳蘭既茂内懷憎惡宋書武帝中本紀大鵬始欲舉燕雀何啾唧北史王憲曾孫王晧傳好女之色惡者之孽也公正之士衆人之痤也循乎道之人汗邪之賊也荀子君道夫貴者即賤者惡之富者即貧者惡之智者即愚者惡之韓詩外傳淑好之人戚施之所妒也賢智之士闒茸之所惡也鹽鐵論非鞅夫美女者醜婦之仇也盛徳之士亂世所疏也正直之行邪枉所憎也説苑尊賢東壁餘光數暗不明主母嫉妒亂我業事焦氏易林謙之屯故徳薄者惡聞美行政亂者惡聞治言此亡秦之所以誅偶語而坑術士也今世俗之人自慢其親而憎人敬之自簡其親而憎人愛之者不少也潛夫論賢難言已欲如雄鳩進其耿耿小節之誠信䜛人尚復分隔蔽而障之况有鸞鳯之志當獲譖毁固其宜也王逸註楚辭九歎言衆人所謗非傑異之士斯庸夫惡態之人也何則徳高者不合於衆行異者不合於俗故爲犬之所吠衆人之所訕也王逸註楚辭九章言犬羣而吠者怪非常之人而噪之也以言俗人羣聚毁賢智者亦以其行度異故羣而謗也王逸註楚辭九章孟賁之尸人不刃者氣絶也死灰百斛人不沃者光滅也動身章智顯光氣於世奮志敖黨立卓異於俗固常通人所䜛嫉也王充論衡累害篇絃者思折伯牙之指御者願摧王良之手何則欲專良善之名惡彼之勝已也王充論衡累害篇動百行作萬事嫉妬之人隨而雲起枳棘鉤掛容體蠭蠆之黨啄螫懷操王充論衡累害篇不清不見塵不髙不見危不廣不見削不盈不見虧王充論衡目紀篇體曲者忌繩墨之容夜裸者憎明燭之來抱朴子外篇擢才精鈍舛迹則凌遲者愧恨壯弱異科則扛鼎者見忌是以淮隂顯擢而庸𨽻悒懊以疾其超武安功髙而范睢飾談以破其事抱朴子外篇博喻所競者細則利同而讐結善否殊塗則事異而妒生是以嫫母宿瘤惡見西施之艶容商臣小白憎聞延州之退耕抱朴子外篇博喻般旋之儀見憎於裸裾之鄉繩墨之匠獲忌於曲木之肆貪婪饕餮者疾素絲之皎潔比周實繁者讐髙操之孤立猶賈豎之惡同利醜女之害國色抱朴子外篇廣譬箕踞之俗惡盤旋之容被髮之域憎章甫之飾故忠正者見排於䜛勝之世雅人不容乎惡直之俗抱朴子外篇廣譬䜛嫉之人必好聞人惡惡聞人善妒才智之在已前諅富貴之在其上猶喉中有噎吞之思入目上有翳決之願去吞決之情深則萋斐之辭作故揚蛾眉者爲醜女之所妒行貞潔者爲䜛邪之所嫉劉子傷䜛衆女嫉余之蛾眉兮謠諑謂余以善淫文選屈原離騷經妒佳冶之芬芳兮􅙵謨母姣而自好雖有西施之美容兮䜛妒入以自代補文選屈原惜徃日揚蛾眉而見妬兮固醜女之情也曲木惡直繩兮亦小人之誠也廣文選劉子駿遂初賦夫有髙人之行見非於世有獨知之明見怨於人意林商君懷蘭茞之芬芳兮妒被離而折之楚辭劉向怨思盖聞豔麗居身而以蛾眉入妒貞華炤物而以絶等見猜是以班姬辭寵非無妖冶之色陽子寂寞豈乏炫曜之才藝文類聚雜文部連珠醜婦以明鏡爲害無所逃其陋太平御覽羽族部鳯戒疑初無決當敗則相推故謀無所成也其君臣之謀事如此似欲行之人非於道徃而但坐謀逺近是用不得於道里何以異乎謀而不行則於道不進言而無決則於事不成毛詩正義小旻進謝羣龍自躍於千里退懷首鼠恒持於百心陳書留異傳癰疽破潰骨肉無絲髮之嫌自疑之臣皆保生全之福魏志袁紹傳註芒刺在背交㦸入頸上下相疑何由可久北史王憲曾孫王睎傳夫人之中虛也不得其所欲則疑得其所不欲則惑疑惑載於中虛則荆棘生矣子華子北宫子仕百事成而一事疑道必廢三人行而一人惑議必格子華子北宫子仕人有亡鈇者意其鄰之子視其行步竊鈇也顔色竊鈇也言語竊鈇也作動態度無爲而不竊鈇也俄而抇其谷而得其鈇他日復見其鄰人之子動作態度無似竊鈇者列子説符使賢者爲之則與不肖者規之使智者慮之則與愚者論之使修士行之則與汙邪之人疑之雖欲成立得乎哉譬之是猶立直木而恐其景之枉也惑莫大焉荀子君道篇以束薪爲鬼以火烟爲氣以束薪爲鬼朅而走以火烟爲氣殺豚烹狗先事如此不如其後淮南子説山訓虐除善疑難爲攻醫焦氏易林艮之夬上九九疑無信控弧擬麋無測曰九疑無信終無所名也太𤣥經第五疑以性制情者鮮矣我未見處岐路而不遲迴者文中子立命猶如􅕱善登木此獸性多疑慮常居山中忽聞其聲即恐有人且來害之每豫上樹久之無人然敢後下須臾又上如此非一故不決者稱猶豫焉前漢書註高后紀隴西俗謂犬子爲猶犬隨人行毎豫在前待人不得又來迎候故云猶豫也前漢書註髙后紀鹿馳走無顧六馬不能望其塵所以及者顧也意林尸子多疑少決譬執腐索以御奔馬藝文類聚刑法部刑法賦其心數轉如秤乍低乍仰大明度無極經潛入譬如羯羊鬭將前而更却汝爲欲持戒其事亦如是法苑珠林卷二十二譬如野干在於樹下風吹枝折墮其脊上即便閉目不欲看樹捨棄而走到於露地乃至日暮亦不肯來遙見風吹大樹枝柯動揺上下便言喚我還來樹下愚痴弟子亦復如是法苑珠林卷五十三夫婦二人向蒲桃酒瓮内欲取酒夫婦兩人乍見人影二人相妒謂瓮内藏人二人相打生死不休時有道人爲打破瓮酒盡了無二人意解知影懷愧法苑珠林卷五十三戒泥譬猶修隄以防川㤀淵丘之改易膠柱於昔弦忽宫商之乖調宋書袁湛傳子可謂扶繩而辨循刻而議宋書顧愷之傳殊塗而同歸者不得守其發輪之轍也宋書夷蠻天竺傳客所謂撫絃徽音未達燥濕變響張羅沮澤不覩鵠鴈高飛梁書任昉傳夫居後而望前則爲前居前而望後則爲後而前後之事猶如彼此彼呼此爲彼此呼彼爲彼彼此之名的居誰處陳書傳縡傳夫瞀視者以黄爲赤以蒼爲𤣥吾乃今所謂皂白安知識者不以爲頳黄吾又安知天下之正色哉亢倉子全道篇目之所見不知其幾何或愛金或愛玉是執一色爲目也耳之所聞不知其幾何或愛鍾或愛鼓是執一聲爲耳也惟聖人不慕之不拒之不處之關尹子九藥夫六經先王之陳迹也豈其所以迹哉今子之所言猶迹也夫迹履之所出而迹豈履哉莊子天運彼已盡矣而女求之以爲有是求馬於唐肆也莊子田子方右移於左則物一而變爲異類如鯤化爲鵬忠變爲逆存亡靡定禍福不居公孫龍子通變論註慎子有見於後無見於先老子有見於詘無見於信墨子有見於齊無見於畸宋子有見於少無見於多有後而無先則羣衆無門有詘而無信則貴賤不分有齊而無畸則政令不施有少而無多則羣衆不化荀子天倫先王之言有其所爲小而世意之大者有其所爲大而世意之小者未可必知也説在宋人之解書與梁人之讀記也故先王有郢書而後世多燕説夫不適國事而謀先王皆歸取度者也韓非子外儲説左上鄭縣人乙子使其妻爲袴其妻問曰今袴何如夫曰象吾故袴妻子因毁新令如故袴韓非子外儲説左上夫少者侍長者飲長者飲亦自飲也一曰魯人有自喜者見長年飲酒不能釂則唾之亦効唾之一曰宋人有少者亦欲効善見長者飲無餘非斟酒飲也而欲盡之韓非子外儲説左上書曰紳之束之宋人有治者因重帶自紳束也人曰是何也對曰書言之固然書曰既雕既琢還歸其樸梁人有治者動作言學舉事於文曰難之顧失其實人曰是何也對曰書言之固然韓非子外儲説左上荆人欲襲宋使人先表澭水澭水暴益荆人弗知循表而夜涉溺死者千有餘人軍驚而壞都舍嚮其先表之時可導也今水已變而益多矣荆人尚猶循表而導之此其所以敗也吕氏春秋察今楚人有涉江者其劍自舟中墜於水遽契其舟曰是吾劍之所從墜舟止從其所契者入水求之舟已行矣而劍不行求劍若此不亦惑乎以此故法爲其國與此同時已徙矣而法不徙以此爲治豈不難哉有過於江上者見人方引嬰兒而欲投之江中嬰兒啼人問其故曰此其父善游其父雖善游其子豈遽善游哉此任物亦必悖矣吕氏春秋察今今夫王喬赤誦子吹嘔呼吸吐故納新遺形去智抱素反真以遊𤣥冥上通雲天今欲學其道不得其養氣處神而放其一吐一吸時詘時伸其不能乘雲升霞亦明矣五帝三王輕天下細萬物齊死生同變化抱大聖之心以鏡萬物之情上與神明爲友下與造化爲人今欲學其道不得其清明𤣥聖而守其法籍憲令其不能爲治亦明矣故曰得十利劍不若得歐冶之巧得百走馬不若得伯樂之數淮南子齊俗訓今之修干戚而笑钁揷是從牛非馬以徵笑羽也以此應化無以異於彈一絃而㑹棘下淮南子齊俗訓今握一君之法籍以非傳代之俗譬猶膠柱而調瑟也淮南子齊俗訓越人學逺射參天而發適在五步之内不易儀也世已變矣而守其故譬猶越人之射也淮南子説山訓以一世之度制治天下譬猶客之乘舟中流遺其劍遽契其舟㧪暮薄而求之其不知物類亦甚矣淮南子説林訓中夏用箑快之至冬而不知去褰衣涉水至陵而不知下未可以應變淮南子説林訓隨古不革襲故不改是文質不變而椎車尚在也鹽鐵論遵道文學可令扶繩循刻非所論道術之外也鹽鐵論遵道文學竊周公之服有司竊周公之位文學桎梏於舊術有司桎梏於財利鹽鐡論利議趙王遣使者之楚方鼓瑟而遣之誡之曰必如吾言使者曰王之鼓瑟未嘗悲若此也王曰宫商固方調矣使者曰調則何不書其柱耶王曰天有燥濕絃有緩急宫商移徙不可知是以不書使者曰明君之使人也任之以事不制以辭遭吉則賀之凶則吊之今楚趙相去千有餘里吉凶憂患不可豫知猶柱之不可書也説苑善説愚人有學逺射者參天而發已射五步之内又復參天而發世以易矣不更其儀譬如愚人之學逺射説苑雜言或曰以徃聖人之法治將來譬猶膠柱而調瑟有諸曰有之曰聖君少而庸君多如獨守仲尼之道是漆也掦子先知藥生非一地太白辭之呉鑄多非一工世稱楚棠溪温氣天下有路畏入南海王充論衡言毒篇本末皆弱棟已橈矣而守其常則是危而弗扶凶之道也周易畧例卦畧盖因事託規隨時所急譬猶治病之方千百而針灸之處無常却寒以温除熱以冷其於救死存身而已豈可詣者逐一道如齊楚而不改路乎抱朴子外篇喻蔽可謂賴甲胄以完刃又兼之浮泳以射走之儀又望求之於准的也抱朴子外篇逸民夫蛣蜣之知非於轉丸而笑蛣蜣者乃以蘓合爲貴故所同之知未可正據郭子註莊齊物論或者聞任馬之性乃謂放而不乗聞無爲之風遂云行不如卧何其狂而不返哉郭子註莊馬蹄萬物萬形而以一劑割之則傷也郭子註莊徐無鬼矢飛水流各有常度爲物所激或旱或遠萬物變化烏有常則乎李善註文選鵩賦有造蕭何之律於唐虞之世則誖矣有作叔孫通儀於夏殷之時則惑矣有建婁敬之䇿於成周之世則乖矣有談范蔡之説於金張許史之門則狂矣文選揚子雲解嘲天徳平分而四時之名或異聖功一揆而皇王之稱不同藝文類聚帝王部齊武帝議汝又焉得擇地而行趨歩商羽廣文選阮嗣宗大人先生傳是識春香之爲馥而不知秋蘭之亦芳也藝文類聚人部隱逸下弔有論戰陣之權於清廟之堂者狂矣陳俎豆之器於城濮之墟者則悖矣藝文類聚人部嘲戯所謂循軌常趨未能釋連環之結也藝文類聚人部質文論齊景公好馬命畫工圖而訪之殫百乗之價期年而不得像過實也今使愛賢之君考古籍以求其人雖期百年不可得也太平御覽獸部馬五水生於石未有居石而溺火生於木未有抱木而燋太平御覽木部木上伯樂令其子執馬經以求馬經年無有似者歸以告父更令求之出見大蝦蟆謂其父曰得一馬畧與相同而不能具伯樂曰何也對曰其馬隆顙跌目但蹄不如累麴爾伯樂笑曰此馬好跳躑不堪御也埤雅品物門馬蓼中之蟲豈知藍之甘乎人之域於一方何以異此埤雅卉物門藍徒知已指之爲指不知彼指之無殊何氏語林文學𢎞明集何必龍袞可襲而瓔珞難乘者哉何氏語林文學𢎞明集但聞嘈噆在耳迺曰不聾不知聲相即空與聾何異道徳經註䟽卷二世有言曰干羽不足以釋圍鄉飲不足以息戰此事理之當然者也玉皇本行集經猶如瞎牛食草偏逐所見長阿含經卷八譬如士夫膠著於手以執樹枝手即著樹不能得離所以者何膠著手故雜阿含經卷十八譬如四輩鼠一者屋間鼠二者家中鼠三者野田鼠四者圊溷中鼠屋間鼠不能居平地平地鼠不能居室間野田中鼠不能居人家人家鼠不能居野田圊溷中鼠不能出圊溷中不知倉中饒榖故也佛説四諦經積八譬如鐵丸亦有輕重軟硬之異其鐵熱時體輕而軟其鐵冷後體重而硬大正句王經上昔有一人䀻取二婦若近其一爲一所瞋不能裁㫁便在二婦中間正身仰卧值天大雨屋舍淋漏水土俱下墮其眼中以先有要不敢起避遂令二目俱失其明百喻經卷下昔摩羅國有一刹利得病極重必知定死誡勅二子我死之後善分財物二子隨教於其死後分作二分兄言弟分不平爾時有一野老人言教汝分物使得平等現所有物破作二分云何破之所謂衣裳中割作二分盤瓶亦復中破作二分所有瓮𤬪亦破作二分錢亦破作二分如是一切所有財物盡皆破之而作二分如是分物人所嗤笑百喻經卷下此皆一國偏法非天下通制亦由寒鄉無絺綌之禮日南絶旃裘之律𢎞明集十二米糠在目則東西易位偏著分心則辭義舛惑𢎞明集難夷夏論何詎怏怏執吕以毁律𢎞明集釋何衡陽達性論棟宇易曾巢之居文字代結繩之制飲血茹毛之饌則先用而未珍粒食火化之功雖後作而非弊亦如㓜噉藜藿長餐粱肉少爲布衣老遇侯服豈得以藜藿先獲謂勝粱肉之味侯服晩遇不如布衣之貴乎法苑珠林卷五十五戒巧巧爲言語結構虛辭速相待合如笙中之簧聲相應和毛詩正義巧言墨子爲木鳶三年而成蜚一日而敗弟子曰先生之巧至能使木鳶飛墨子曰吾不如爲車輗者巧也用咫尺之木不費一朝之事而引三十石之任致逺力多久於歲數今我爲鳶三年成蜚一日而敗惠子聞之曰墨子大巧巧爲輗拙爲鳶韓非子外儲説左夫其多能不若寡能其有辨不若無辨周鼎著倕而齕其指先王有以見大巧之不可為也吕氏春秋離謂昔者蒼頡作書而天雨粟鬼夜哭伯益作井而龍登𤣥雲神棲崑崙能愈多而徳愈薄矣淮南子本經訓以巧鬭力者始於陽常卒於隂以慧治國者始於治常卒於亂使水流下孰弗能治激而上之非巧不能淮南子詮言訓倕堯之巧工也以巧聞天下周家鑄鼎著倕於鼎使自齕其指明不當大巧為也吕氏春秋離謂解觀夫蜘蛛之經絲以㒺飛蟲也人之用作安能過之任胸中之知舞權利之詐以取富夀之樂無古今之學蜘蛛之類也王充論衡别通篇白猿肆巧由基撫弓應吁而號神有先中數如循環其妙無窮山海經南山經圖讃巧者有為以傷神器之自成故無為者因其自生任其自成萬物各得自為蜘蛛猶能結網則人人自有能矣無貴於工倕也郭子註荘天下善用人者使能方者為方能圓者為圓各任其所能人安其性不責萬民以工倕之巧故衆技以不相能似拙而天下自能則大巧矣用其自能是以規矩可棄而妙匠之指可攦也郭子註莊胠篋世以任自然而不加巧者爲不善治也揉曲爲直厲駑習驥郭子註莊馬蹄司馬云工巧而商賈起莊子音義徳充符道徳不爲智巧故能陶冶天地造化隂陽而天地不能欺也天地不爲知巧故能含吐變化殺生羣類而萬物不能逃也道徳經指歸卷九嬰兒以不知益髙年以多事損由此觀之愚爲智巧之形也智巧爲愚之影也無爲遂事之聲也遂事無爲之響也智巧擾亂之羅也有爲敗事之網也道徳經指歸卷十二色欲何彼穠音濃矣唐棣音第之華何彼穠矣華如桃李詩國風何彼穠矣爰采唐矣沬音妹之鄉矣云誰之思美孟姜矣爰采麥矣沬之北矣云誰之思美孟弋矣爰采葑矣沬之東矣云誰之思美孟庸矣詩國風桑中手如柔荑音啼膚如凝脂領如蝤音囚蠐音齊齒如瓠音互犀螓音秦首蛾眉巧笑倩兮美目盼叶匹見反兮詩國風碩人有女同車顔如舜華叶芳無反有女同行叶户郎反顔如舜英叶於良反詩國風有女同車出其闉音因闍音都有女如荼詩國風出其東門彼君子女綢直如髮彼君子女卷音權髮如蠆音瘥詩小雅都人士桑中刺奔也衛之公室淫亂男女相奔毛詩桑中鶉之奔奔刺衛宣姜也衛人以爲宣姜鶉鵲之不若也毛詩鶉之奔奔蝃蝀止奔也衛文公能以道化其民淫奔之恥國人不齒也毛詩蝃蝀月出刺好色也在位不好徳而説美色焉毛詩月出葛延蔓於谷中喻女在父母之家形體浸浸日長大也葉萋萋然喻其容色美盛也鄭氏箋詩葛覃於何采唐必沬之鄉猶言欲爲淫亂者必之衛之都惡衛爲淫亂之主鄭氏箋詩桑中我視女之顔色美如茈芣之華然鄭氏箋詩東門言葛之漸長稍稍延蔓而移於谷中非直枝幹漸長維葉則萋萋然茂盛以興后妃之生浸浸日大而長於父母之家非直形體日大其容色又美盛毛詩正義葛覃言雄雉飛之時下上其音聲以怡悦雌雉以興宣公小大其言語以怡悦婦人毛詩正義雄雉人欲采唐菜於何采唐菜乎必之沬之鄉矣以興人欲淫亂者於何處淫亂乎必之衛之都言沬鄉唐所生衛都淫所主故也毛詩正義桑中言鶉則鶉自相隨奔奔然鵲則鵲自相隨疆疆然各有常匹不亂其類今宣姜爲母頑則爲子而與之淫亂失其常匹曾鶉鵲之不如矣毛詩正義鶉之奔奔吁嗟鳩兮無得非時食椹吁嗟女兮無得非禮與士毛詩正義氓六桑之未落之時其葉則沃沃然盛以興已色未衰之時其貌亦灼灼然美毛詩正義氓六諸侯不下漁色故君子遠色以爲民紀禮記坊記夫爲寄豭殺之無罪史記秦始皇本紀縱輕軀以迅赴若孤鵠之失羣振華𬒮以逶迤若遊龍之登雲後漢書邉讓傳振弱支而紆繞兮若緑繁之垂幹忽飄颻以輕逝兮似鸞飛於天漢後漢書邉譲傳目傾心惑夏姬在側申公顛倒巫臣亂國焦氏易林隨之履次三沈于美失貞矢測曰沈于美作聾盲也太𤣥經第五沈是二姬之事寡人若影之附於形也今寡人之出不謀二姬以寡人是懟遂哀歌而死是寡人若行隂雪中而不覺形影之離也天禄閣外史愛憎北辰言不移也𤣥龍喻美女也言棄彼北辰之心而問此𤣥龍之色譏好色而不好徳李善註文選陸士龍爲彦先贈婦詩初光武適新野聞隂后美心悦之後至長安見執金吾甚盛因歎曰仕宦當作執金吾娶妻當得隂麗華藝文類聚人部言志煌煌曄曄奪人目精爛兮若列星藝文類聚靈異部神賦其始來也曜乎若白日初出照屋梁其少進也皎如日月舒其光藝文類聚靈異部神賦忽兮改容婉若遊龍乘雲翔藝文類聚靈異部神賦曄乎如華温乎如瑩藝文類聚靈異部神賦被華藻之可好若翡翠之奮翼藝文類聚靈異部神賦望余帷而延視若流波之將瀾藝文類聚靈異部神賦其形也翩若驚鴻婉若遊龍榮曜秋菊華茂春松髣髴兮若輕雲之蔽月飄颻兮若流風之迴雪遠而望之皎若太陽升朝霞迫而察之灼若芙蕖出緑波藝文類聚靈異部神賦其在近也若神龍彩鱗翼將舉其既遠也若披雲掃漢見織女太平御覽人事部美婦人衆生欣愛聲色情染極深如饑人享大牢之饌悦美之甚又如春日登臺眺望林野暢適其心道徳經註疏卷二恣則裂身之車淫爲破年之斧漢武帝内傳且淫欲頗恣如飲鹹水多飲多渇唯死而已何有厭足靈寶通㣲經色欲劇於渇小忍差可度何爲進鹹水水鹹益渇固子能善解渇當飲天甘露甘露香且薰通體皆流布靈寳通微經愚癡嬰兒爲欲所盲爲欲所繫爲欲所使爲欲所迷恒順欲心而爲僮僕常隨欲轉如犢逐母大方廣佛華嚴經巻十七被諸女色昏醉其心猶如嬰孩無有自性亦如素衣易受染色爲欲所溺不能得出如糞中蟲樂著糞處如穢弊猪不淨嚴身大方廣佛華嚴經卷十七如執利刀自害其身蘓婆呼童子經卷下見諸妙色則發過去愛欲之心譬如濕地雨易成泥本縁經龍品譬如畫師作婦女像還自愛著三昧法門經卷上如毛繩縳人㫁膚截骨大智度論卷五桎梏枷鏁閇繫囹圄雖曰難解是猶易開女鏁繫人染固根深無智没之難可得脱衆病之中女病最重大智度論卷十四執劍向敵是猶可勝女賊害人是不可禁蚖虵含毒猶可手捉女情惑人是不可觸大智度論卷十四有王名曰光明乘調順象出行遊觀前後導從歌舞唱妓徃到山所嶮難之處王所乗象遙見牸象欲心熾盛哮吼狂逸如風吹雲欲徃奔走不避岨嶮時調象師種種鈎斵不能令住時光明王甚大驚怖象師白王更無餘方唯當攀樹王聞是語以手攀樹象即奔走逐於牸象時王瞋忿而作是言汝先言象調順可乗云何以此狂象而欺於我象師合掌而白王言如此狂逸非我所調王語之曰爲是何過非汝所調彼即白王象有貪欲以病其心非我所治大王當知如此之病杖捶鈎斵所不能治貪欲壞心亦復如是大莊嚴經論卷九女人之相其言如蜜而其心如毒譬如停淵澄鏡而蛟龍居之金山寶窟而師子處之當知此害不可暫近法苑珠林卷七十五室家不和婦人之由毁宗敗族婦人之罪實是隂賊滅人慧明亦是獵圍尠得出者譬如髙羅羣鳥落之不能奮飛又如宻網衆魚投之刳腸俎几亦如暗坑無目投之如蛾赴火是以智者知而遠之不受其害惡而穢之不爲此物之所惑也法苑珠林卷七十五喻林卷十三
