body:
  text: 喻林卷六十二明徐元太撰君道門二仁厚麟之趾振振音真公子于音吁嗟麟兮麟之定音訂振振公姓于嗟麟兮麟之角叶虗谷反振振公族于嗟麟兮麟之趾樛木后妃逮下也言能逮下而無嫉妬之心焉毛詩樛木行葦忠厚也周家忠厚仁及草木毛詩行葦古者不風不㬥不行火草木不折不操斧斤不入山林豺祭獸然後殺獺祭魚然後漁鷹隼擊然後罻羅設是以天子不合圍諸侯不掩羣大夫不麛不卵士不隱塞庶人不數罟罟必四寸然後入澤梁故山不童澤不竭鳥獸魚鱉皆得其所毛詩魚麗注麟角之末有肉示有武而不用鄭氏箋詩麟之趾木枝以下垂之故故葛藟也得纍而蔓之而上下俱盛喻后妃能以意下逮衆妾使得其次序則衆妾上附事之而禮義亦俱盛鄭氏箋詩樛木敦敦然道傍之葦牧牛羊者毋使踐履折傷之草物方茂盛以其終將為人用故周之先王為此愛之况於人乎鄭氏箋詩行葦我視彼宗周之洛水矣維此洛水則泱泱然深而廣大能灌溉以時浸潤以成嘉榖以喻我視彼古昔之明王矣維此明王則仁而寬愛能爵賞以理賜命以成賢者是王恩之深厚也毛詩正義瞻彼古太平之時交於萬物有道欲取鴛鴦之鳥必待其長大於其能飛乃罼掩之而羅取之不於幼小而㬥夭也非但於鳥獨然以興於萬物皆爾至獺祭魚然後取魚豺祭獸然後捕獸皆待其成而取之也毛詩正義鴛鴦服䖍云奧休痛其痛而念之若今時小兒痛父母以口就之曰奧休代其痛也春秋正義昭公三年天不崇大則覆幬不廣地不深厚則載物不博人不敦龎則道數不遠後漢書朱暉列傳天地之於萬物也好生帝王之於萬人也慈愛後漢書寇恂傳流大漢之愷悌蕩亡秦之毒螫後漢書班彪傳前王作典明慎議獄而僣濫易意朱公論璧光澤相如而倍薄異價宋書顔延之傳孱焉則差的焉則暗是以禮道尚優法意從刻優則人自為厚刻則物相為薄宋書顔延之傳然楚履既墜江君徘徊鍾牛一聲東向改釁魏書趙修恩幸傳乳獸含牙蒼鷹垂翅北齊書文苑樊遜傳淵者衆物之所生也能深而不涸則沈玉至主者人之所仰而生也能寬裕純厚而不苛忮則民人附管子形勢解臣聞君子如美淵澤容之衆人歸之如魚有依極其游泳之樂若淵澤決竭其魚動流夫往者維雨乎不可復已晏子春秋問下譖慝之言無入之耳批扞之聲無出之口殺傷人之孩無存之心雖有詆訐之民無所依矣墨子修身衣人以其寒也食人以其饑也饑寒人之大害也救之義也人之困窮甚如饑寒故賢主必憐人之困也必哀人之窮也如此則名號顯矣國士得矣吕氏春秋愛士聖人愛念百姓如孩嬰赤子長養之而不責望其報河上公注老子任德墻薄則亟壞繒薄則亟裂器薄則亟毀酒薄則亟酸夫薄可以曠日持久者殆未有也故有國畜民施政教者臣竊以為厚之而可耳賈子新書連語先王之法畋不掩羣不取麛夭不涸澤而漁不焚林而獵豺未祭獸罝罦不得布於野獺未祭魚網罟不得入於水鷹隼未摰羅網不得張於溪谷草木未落斤斧不得入山林昆蟲未蟄不得以火燒田孕育不得殺􅑹卵不得探魚不長尺不得取彘不期年不得食是故草木之發若蒸氣禽獸歸之若流原飛鳥歸之若煙雲有所以致之也淮南子主術訓善御者不忘其馬善射者不忘其弩善為人上者不忘其下淮南子繆稱訓慈父之愛子非為報也不可內解於心聖王之養民非求用也性不能已若火之自熱水之自寒夫有何修焉及待其力賴其功者若失火舟中故君子見始斯知終矣媒妁譽人而莫之德也取庸而强飯之莫之愛也雖親父慈母不加於此有以為則恩不接矣淮南子繆稱訓古者杆木穿皮不蠧不出於四方以是君子之重禮而賤財也韓詩外傳故為民父母以養疾子長恩厚而已鹽鐵論周秦聖人之於天下百姓也其猶赤子乎饑者則食之寒者則衣之將之養之育之長之唯恐其不至於大也說苑貴德聖人之於天下也譬猶一堂之上也今有滿堂飲酒者有一人獨索然向隅而泣則一堂之人皆不樂矣聖人之於天下也譬猶一堂之上也有一人不得其所者則孝子不敢以其物薦進說苑貴德河以委蛇故能逺山以陵遲故能髙道以優游故能化德以純厚故能豪說苑談叢明君之制賞從重罰從輕食人以壯為量事人以老為程說苑談叢臣之家有二白璧其色相如也其徑相如也其澤相如也然其價一者千金一者五百金王曰徑與色澤相如也一者千金一者五百金何也朱公曰側而視之一者厚倍是以千金梁王曰善故獄疑則從去賞疑則從與新序雜事四覩觳觫而改牲避行葦而不蹈者仁之事也抱朴子外篇仁明人置四面未必得鳥湯去三面置其一面以網四十國非徒網鳥也新序雜事五君聞昔者公劉之行乎羊牛踐葭葦惻然為民痛之恩及草木豈欲殺不辜者乎列女傳周列國晉弓士妻澤枯無魚山童難株焦氏易林觀之㢲次六厚厚君子秉斗測曰厚厚君子得人無疆也太𤣥經第三親傳曰慈母之怒子也雖折葼笞之其惠存焉方言第二獺未祭魚不施網罟豺未祭獸不修田獵鷹隼未擊不張罻羅霜露未霑不伐草木草木有生而無識鳥獸有識而無知猶施仁愛以及之奚况在人而不愛之乎劉子愛民君者其仁如春其澤如雨德潤萬物則人為之死矣劉子愛民明明后辟仁以為政魚遊清沼鳥萃平林文選補亡詩若墜之惻每勤如傷之念恆軫文選王融䇿秀才文三方落網一面驅禽德以行政仁乎用心藝文類聚帝王部殷成湯贊幸聖王留善貸之德紆好生之施解網祝禽下車泣罪藝文類聚人部言志書今主君以寬宏為宇仁惠為廬若地之載如天之燾藝文類聚人部嘲戲若能服溫厚而知穿弊之苦周明之德也厭滋㫖而識空嗛之急仁恕之功也藝文類聚人部鑒誡詰恩加禽獸胎卵於是獲全仁霑草木牛羊所以勿踐文苑英華薛道衡帝德上頌景公探爵鷇弱故反之晏子逡巡再拜賀曰君有聖人之道矣君探爵鷇鷇弱故反之此聖人之道也太平御覽禮義部賀童牛不服童馬不馳是謂大仁太平御覽人事部仁惻邯鄲之民以正月之旦獻鳩於簡子簡子大悅厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君欲放之故競而捕之死者衆矣君而欲生之不若禁民弗捕捕而放之恩不遍不相補矣太平御覽時序部元日麟肉角鳳肉咮皆示有武而不用也埤雅品物門麟被銘曰被雖溫無忘人之寒無厚於己無薄於人困學紀聞卷二十雜識騶虞雖饑非自死之草不食何氏語林文學南史君子殺民如殺身活人如活己道德經指歸卷十二精誠觀盥而不薦有孚顒若易觀王道之可觀者莫盛乎宗廟宗廟之可觀者莫盛於盥也至薦簡略不足復觀故觀盥而不觀薦也王弼注易觀明信顯著不存外飾處坎以斯雖復一樽之酒二簋之食瓦缶之器納此至約自進於牖乃可羞之於王公薦之於宗廟王弼注易坎天地感而萬物化生聖人感人心而天下和平易咸孚乃利用禴易萃今豫其敷心腹腎腸書盤庚下匠人有以感斤欘故繩可得料也羿有以感弓矢故彀可得中也造父有以感轡策故遫獸可及逺道可致管子小稱含德之厚比於赤子毒蟲不螫猛獸不據玃鳥不摶骨弱筋柔而握固未知牝牡之合而䘒作精之至也終日號而不啞和之至也老子𤣥符精之所動若春氣之生秋氣之殺故君子者其猶射者也於此毫末於彼尋丈矣文子精誠譬猶兆龜數蓍至誠自契五行應之誠茍不至兆之數之無一應者關尹子四符篇真者精誠之至也不精不誠不能動人故强哭者雖悲不哀强怒者雖嚴不威强親者雖笑不和真悲無聲而哀真怒未發而威真親未笑而和真在內者神動於外是所以貴真也莊子漁父乳彘觸虎乳狗不遠遊不忘其親也荀子榮辱天地為大矣不誠則不能化萬物聖人為知矣不誠則不能化萬民父子為親矣不誠則疏君上為尊矣不誠則卑荀子不茍篇人或謂兔絲無根非無根也其根不屬也伏苓是慈石召鐵或引之也樹相近而靡或軵之也聖人南面而立以愛利民為心號令未出而天下皆延頸舉踵矣則精通乎民也吕氏春秋精通今夫攻者砥厲五兵侈衣美食發且有日矣所被攻者不樂非或聞之也神者先告也身在乎秦所親愛在於齊死而志氣不安精或往來也吕氏春秋精通養由基射虎中石矢乃飲羽誠乎虎也伯樂學相馬所見無非馬者誠乎馬也宋之庖丁好解牛所見無非死牛者三年而不見生牛用刀十九年刃若新􅀈研順其理誠乎牛也吕氏春秋精通子之於父母也一體而兩分同氣而異息若草莽之有華實也若樹木之有根心也雖異處而相通隱志相及痛疾相救憂思相感生則相歡死則相哀此之謂骨肉之親神出於忠而應乎心兩精相得豈待言哉吕氏春秋精通三月嬰兒軒冕在前弗知欲也斧鈇在後弗知惡也慈母之愛諭焉誠也故誠有誠乃合於情精有精乃通於天乃通於天水木石之性皆可動也又况於有血氣者乎故凡說與治之務莫若誠聽言哀者不若其哭也聽言怒者不若其鬬也說與治不誠其動人心不神吕氏春秋具備齊有善相狗者其鄰假以買取鼠之狗期年乃得之曰是良狗也其鄰畜之數年而不取鼠以告相者相者曰此良狗也其志在獐麋豕鹿不在鼠欲其取鼠也則桎之其鄰桎其後足狗乃取鼠夫驥驁之氣鴻鵠之志有諭乎人心者誠也人亦然誠有之則神應乎人矣言豈足以諭之哉此謂不言之言也吕氏春秋士容夫疾呼不過聞百步志之所在踰於千里冬日之陽夏日之陰萬物歸之而莫使之然故至精之象弗招而自來不麾而自往窈窈冥冥不知為之者誰而功自成淮南子主術訓至精之所動若春氣之生秋氣之殺也雖馳傳騖置不若此其亟故君人者其猶射者乎於此毫未於彼尋常矣故慎所以感之也夫榮啓期一彈而孔子三日樂感於和鄒忌一徽而威王終夕悲感於憂動諸琴瑟形諸音聲而能使人為之哀樂縣法設賞而不能移風易俗者其誠心弗施也寧戚商歌車下桓公喟然而寤夫至精入人深矣淮南子主術訓湯之時七年旱以身禱於桑林之際而四海之雲湊千里之雨至抱質效誠感動天地神諭方外令行禁止豈足為哉淮南子主術訓勇士一呼三軍皆辟其出之也誠故倡而不和意而不戴中心必有不合者也故舜不降席而王天下者求諸己也淮南子繆稱訓金錫不消釋則不流刑上憂尋不誠則不法民淮南子繆稱訓心之精者可以神化而不可以導人目之精者可以消澤而不可以昭誋在混冥之中不可諭於人故舜不降席而天下治桀不下陛而天下亂蓋情甚乎呌呼也淮南子繆稱訓三月嬰兒未知利害也而慈母之愛愈篤者情也故言之用者昭昭乎小哉不言之用者曠曠乎大哉淮南子繆稱訓寧戚擊牛角而歌桓公舉以大政雍門子以哭見孟嘗君涕流沾纓歌哭衆人之所能為也一發聲入人耳感人心情之至者也故唐虞之法可效也其諭人心不可及也淮南子繆稱訓哭之發於口涕之出於目此皆憤於中而形於外者也譬若水之下流煙之上尋也夫有孰推之者故强哭者雖病不哀强親者雖笑不和情發於中而聲應於外故釐負羈之壺餐愈於晉獻公之垂棘趙宣孟之束脯賢於智伯之大鐘故禮豐不足以效愛而誠心可以懷逺淮南子齊俗訓太王亶父處邠狄人攻之杖䇿而去百姓携幼扶老負釜甑踰梁山而國乎岐周非令之所能招也秦穆公為野人食駿馬肉之傷也飲之美酒韓之戰以其死力報非券之所能責也宓子治亶父巫馬期往觀化焉見夜漁者得小即釋之非刑之所能禁也孔子為魯司寇道不拾遺市買不豫賈田漁皆讓長而班白不戴負非法之所能致也夫矢之所以射遠貫牢者弩力也其所以中的剖微者正心也賞善罰㬥者政令也其所以能行者精誠也故弩雖强不能獨中令能明不能獨行必自精誠所以與之施道故攄道以被民而民弗從者誠心弗施也淮南子泰族訓夫蛟龍伏寢於淵而卵割於陵螣蛇雄鳴於上風雌鳴於下風而化成形精之至也淮南子泰族訓勇士一呼三軍皆辟士之誠也昔者楚熊渠子夜行見寢石以為伏虎關弓射之滅矢飲羽下視知石也却復射之矢摧無迹熊渠子見其誠心而金石為之開况人心乎唱而不和動而不隨中必有不全者矣新序雜事四次二蛟濳于淵陵卵化之人或隂言百姓和之測曰蛟濳之化中精誠也太𤣥經第四迎祭祀之道莫盛修德故紂之牛牲不如文王之蘋藻也前漢書注郊祀志鏡質薄而能照目形小而能視以其精明也故聖人以至精感人至誠應物為樂不假鐘鼓之音為禮不待玉帛之惠此所感之至也李善注文選陸士衡演連珠萬邦凱樂非悅鐘鼓之娛天下歸仁非感玉帛之惠文選陸士衡演連珠譬如慈母唯有一子其子得病父母亦病其子病愈父母亦愈海空智藏經捨受品操柄令行禁止王始也出一曰神明出二曰分光出三曰無適異出四曰無適與無適與者亡汲冡周書文傳解日之中也仄月之望也食威之失也陰食陽汲冢周書周祝解無虎傅翼將飛入宫擇人而食汲冢周書寤敬解日君象也月臣象也微謂虧傷也君道當常明如日而月有虧盈今君失道則任小人大臣專次則日如月然鄭氏箋詩柏舟日當常明月即有虧今日何為與月更迭而虧傷乎猶君何為與臣更迭而屈伸乎毛詩正義柏舟有頍然者之皮辨實維伊何乎宜在於首以為表飾也以興有尊貴者之天王維如何乎宜君於上以正綱紀也毛詩正義頍辨泛泛然浮於水上者楊木之舟舟人以紼繩繫而維持之使不得東西也以興居於民上者諸侯之君也明王以禮法約而制禦之使不得違叛也毛詩正義采菽糟者猶糟實者猶實玉者猶玉血者猶血酒者猶酒優以繼愖政出自家門此之謂失政也大戴禮記少間孔子曰天無二日土無二王者天有二日則草木枯萎土有二王則征伐不息禮記正義曽子問然君異于器不可以二器二不匱君二多難左傳哀公六年夫水能浮草木亦能沉之地能生萬物亦能殺之江海能下溪谷亦能朝之聖人能從衆亦能使之吳越春秋勾踐歸國外傳應侯謂昭王曰亦聞恆思有神叢與恆思有悍少年請與叢博曰吾勝叢叢藉我神三日不勝叢叢困我乃左手為叢投右手自為投勝叢叢藉其神三日叢往求之遂弗歸五日而叢枯七日而叢亡今國者王之叢勢者王之神藉人以此得無危乎臣未嘗聞指大於臂臂大於股若有此則病必甚矣戰國䇿秦昭襄王萬乘之主不制於人臣十乘之家不制於衆人匠夫徒步之士不制於妻妾而又况於當時之賢主者乎戰國䇿燕昭王百人輿瓢而趨不如一人持而走疾百人誠輿瓢瓢必裂今秦國華陽用之穰侯用之太后用之王亦用之不稱瓢為器則已稱瓢為器國必裂矣戰國䇿秦昭襄王荆宣王問羣臣曰吾聞北方之畏昭奚恤也果誠何如江乙對曰虎求百獸而食之得狐狐曰子無敢食我也天帝使我長百獸今子食我是逆天帝命也子以我為不信吾為子先行子隨我後觀百獸之見我而敢不走乎虎以為然故遂與之行獸見之皆走虎不知獸畏己而走也以為畏狐也今王之地方五千里帶甲百萬而專屬之昭奚恤故北方之畏奚恤也其實畏王之甲兵也猶百獸之畏虎也戰國策楚宣王至秦則不然張誹謗之罔以為漢毆除倒持太阿授楚其柄故誠能勿失其柄天下雖有不順莫敢觸其鋒前漢書梅福傳如下有泰山之安則上有纍卵之危前漢書楚元王傳天子盛威若燎火之陽今委政王氏不炎熾矣前漢書叙傳述成紀注恐威權外假歸之良難虎翼一奮卒不可制後漢書翟酺列傳夫釣者中大魚則縱而隨之須可制而後牽則無不得也人主之威豈徒大魚而已魏志劉曄傳自古至今安有四五人把持刑柄而不離刺轉相蹄齧者也吳志諸葛瑾傳且垂猶鷹也饑則附人飽便髙揚遇風塵之會必有凌霄之志惟宜急其羈靽不可任其所欲晉書慕容垂傳宸極居中則列宿齊其晷帝王順天則羣后仰其度魏書太祖紀以大督小從近及遠如身之使手幹之總條魏書食貨志見未能髙飛者借其羽毛知逸勢冲天者剪其翅翮北齊書盧文偉傳日中必彗操刀必割執斧必伐日中不彗是謂失時操刀不割失利之期執斧不伐賊人將來太公六韜守土無借人國柄借人國柄則失其權無掘壑而附丘無舍本而治末太公六韜守土無借人利器借人利器則為人所害而不終其世太公六韜守土無實則無勢失轡則馬焉制管子七臣七主夫明王之所輕者馬與玉其所重者政與軍若失主不然輕與人政而重與人馬輕豫人軍而重豫人玉重宫門之營而輕四境之守所以削也夫權者神聖之所資也獨明者天下之利器也獨斷者微密之營壘也此二者聖人之所則也聖人畏微而愚人畏明聖人之憎惡也內愚人之憎惡也外管子霸言鯨魚失水則制於螻蟻人君舍其所守而與臣爭事則制於有司文子上仁術者人君之所密用羣下不可妄窺勢者制法之利器羣下不可妄為人君有術而使羣下得窺非術之奧者有勢使羣下得為非勢之重者尹文子大道上白君道也青臣道也青驪於白謂權臣擅命雜君道也君道雜則君不勝矣公孫龍子通變論注君之制臣猶金之勝木其來久矣而白不勝為青所驪是木賊金而臣掩君之謂也青染於白其色碧也臣而掩君其道亂也君道之所以亂由君不正舉也公孫龍子通變注諺曰蠧衆而木折隙大而墻壞故大臣爭於私而不顧其民則下離上下離上者國之隙也秩官之吏隱下以漁百姓此民之蠧也故有隙蠧而不亡者天下鮮矣是故明王任法去私而國無隙蠧矣商子修權樞者居中以運外處近而制逺主於轉動者也故天之北辰謂天樞門之運轉者謂之戶樞然則持樞者動運之柄以制物也鬼谷子本經陰符注君者國之隆也父者家之隆也隆一而治二而亂自古及今未有二隆爭重而能長久者荀子致仕篇不謹其閉不固其門虎乃將存不慎其事不掩其情賊乃將生韓非子主道夫勢者便治而利亂者也故周書曰毋為虎傅翼將飛入邑擇人而食之夫乘不肖人於勢是為虎傅翼也韓子難勢夫虎之所以能服狗者爪牙也使虎釋其爪牙而使狗用之則虎反服狗矣人主者以刑德制臣者也今君人者釋其刑德而使臣用之則君反制於臣矣韓非子二柄夫人臣之侵其主也如地形焉即漸以往使人主失端東西易面而不自知故先王立司南以端朝夕韓非子有度道不同於萬物德不同於陰陽衡不同於輕重繩不同於出入和不同於燥濕君不同於羣臣凡此六者道之出也韓非子揚權內索出圉必身自執其度量厚者虧之薄者靡之虧靡有量毋使民比周同欺其上虧之若月靡之若勢韓非子揚權彼求我豫假求人斧假之不可彼將用之以伐我韓非子揚權故上失􅀈寸下得尋常韓非子揚權毋弛而弓一棲兩雄一棲兩雄其鬬㘖㘖韓非子揚權腓大於股難以趨走主失其神虎隨其後韓非子揚權毋富人而貸焉毋貴人而逼焉毋轉信一人而失其都國焉韓非子揚權掘其根本木乃不神填其洶淵毋使水清韓非子揚權主上不知虎將為狗主不蚤止狗益無已虎成其羣以弒其母為主而無臣奚國之有主施其法大虎將怯主施其刑大虎自寧法刑狗信虎化為人復反其真韓非子揚權為人君者數披其木毋使木枝扶疏木枝扶疏將塞公閭私門將實公庭將虗主將壅圍數披其木無使木枝外拒木枝外拒將逼主處數披其木毋使枝大本小枝大本小將不勝春風不勝春風枝將害心韓非子揚權黃帝有言曰上下一日百戰下匿其私用試其上上操度量以割其下故度量之立主之寶也黨與之具臣之寶也韓非子揚權虎豹必不用其爪牙而與鼷鼠同威萬金之家必不用其富厚而與監門同資韓非子八說人之不事衡石者非貞廉而逺利也石不能為人多少衡不能為人輕重求索不能得故人不事也明主之國官不敢枉法吏不敢為私利貨賂不行是境內之事盡如衡石也韓非子八說有術而御之身坐於廟堂之上有處女子之色無害於治無術而御之身雖瘁臞猶未有益韓非子外儲說左人主者利害之軺轂也射者衆韓非子外儲說左夫獵者託車輿之安用六馬之足使王良佐轡則身不勞而易及輕獸矣今釋車輿之利損六馬之足與王良之御而下走逐獸則雖樓季之足無時及獸矣託良馬固車則臧獲有餘國者君之車也勢者君之馬也夫不處勢以禁誅擅愛之臣而必德厚以與天下齊行以爭民是皆不乘君之車不因馬之利舍車而下走者也韓非子外儲說左方吾子曰吾聞之古禮行不與同服者同車不與同族者共家而况君人者乃借其權而外其勢乎韓非子外儲說右賞罰共則禁令不行何以明之以造父於期子罕為出彘田恆為圃池故宋君簡公弒患在王良造父之共車田連成竅之共琴也韓非子外儲說右淖齒之用齊也擢閔王之筋李兊之用趙也餓殺主父此二君者皆不能用其椎煆榜擎故身死為戮而為天下笑韓非子外儲說右入齊則獨聞淖齒而不聞齊王入趙則獨聞李兊而不聞趙王故曰人主者不操術則威勢輕而臣擅名韓非子外儲說右靖郭君相齊與故人久語則故人富懷左右刷則左右重久語懷刷小資也猶以成富况於吏勢乎韓非子內儲說下勢重者人主之淵也臣者勢重之魚也魚失於淵而不可復得也人主失其勢重於臣而不可復收也韓非子內儲說下凡耳之聞也藉於靜目之見也藉於昭心之知也藉於理君臣易操則上之三官者廢矣吕氏春秋任數人君不重則不尊治身不重則失神草木之華輕故零落根重故長存也河上公注老子重德不正本而反自修則人主逾勞人臣逾逸是猶代庖宰割牲而為大匠斫也與馬競走筋絶而弗能及上車執轡則馬死於衡下故伯樂相之王良御之明主乘之無御相之勞而致千里者乘於人資以為羽翼也淮南子主術訓管子曰權不兩錯政不二門故曰脛大於股者難以步指大於臂者難以把本小末大不能相使也說苑君道虎饑欲食為蝟所伏焦氏易林豫之比大尾小頭重不可搖上弱下强陰制其雄焦氏易林咸之坎放銜垂轡奔馬不制棄法作奸君失其位焦氏易林蹇之姤君猛臣懾虎行兔伏焦氏易林震之遁龍而蛇伏故不君者也太𤣥經第一間注初一蛇伏於泥無雄有雌終莫受施測曰蛇伏於泥君不君也太𤣥經第一間夫國不可從外治兵不可從中御潜夫論勸將婦人専政國不靜牝雞雄鳴主不榮蔡中郎集答災異明銓衡者所重不可得誣也仗法度者所愛不可得私也故得人者先得之於己者也失人者先失之於己者也抱朴子外篇廣譬然則刑之為物國之神器君所自執不可假人猶長劒不可倒捉巨魚不可脫淵也抱朴子外篇用刑君孤立於上臣弄權於下本末不能相御身手不能相使文選曹元首六代論曾不知鼠憑社貴狐藉虎威文選沈約恩幸傳論姦人無所逃其刑惡吏無所窮其詐如身手之相驅弦括之相接矣藝文類聚刑法部刑法表君臣之間猶權衡也權左撅則右重右重則左輕輕重迭相移天地之理也太平御覽資産部稱夫威福者人主之神器也譬之操莫邪執其柄則人莫敢抗失其柄則還見害也太平御覽刑法部律令科附可怒而不怒臣乃為虎可殺而不殺大賊乃發太平御覽皇王部敘皇王上魚藏於水權隱於心故物莫之害也魚失水為物所擒權示人即為人所制道德經注疏卷二喻林卷六十二
