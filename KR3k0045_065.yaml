body:
  text: 喻林卷六十五明徐元太撰君道門五思危其亡其亡繫于包桑易否勿憂宜日中宜照天下也日中則昃月盈則食天地盈虗與時消息而況於人乎易豐六四繻有衣袽終日戒易既濟我臨兆民之上常畏人怨凛凛乎危懼若腐索之馭六馬索絶則馬逸尚書正義五子之歌若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷書説命上逮天之未陰雨徹彼桑土音杜綢繆牖戶今女下民或敢侮豫叶演女反梟詩國風鴟無棄爾輔貟音云于爾輻屢顧爾僕不輸爾載終踰絶險曾是不意詩小雅正月戰戰兢兢如臨深淵如履薄氷詩小雅小旻鴟梟又言室巢雖成以所託枝條弱故豫室今翹翹然而危又為風雨之所漂搖此巢將毁豫是以維音之嘵嘵然而恐懼以喻王業雖成今成王幼弱而為凶人所振蕩周室將毁故周公言己亦嘵嘵然而危懼毛詩正義鴟梟臣之妻歸臣送之反見桑者而助之顧臣之妻則亦有送之者矣晉文春秋伐衛千金之子坐不垂堂百金之子不騎衡聖主不乘危而徼幸史記袁盎傳夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器亡以異在天子之所置之前漢賈誼傳千金之子坐不垂堂萬乘之主行不履危晉書苻堅上傳夫存者非存在於慮亡樂者非樂在於慮殃今王已慮其源豈憂其流乎太公六韜兵道髙為其居危顛莫之救管子宙合君者舟也庶人者水也水則載舟水則覆舟君以此思危則危將焉不至矣荀子哀公紹績昧醉寐而亡其裘宋君曰醉足以亡裘乎對曰桀以醉亡天下韓非子説林齊桓公出遊遇一丈夫裒衣應步帶著桃殳桓公怪而問之丈夫曰是名二桃桃之為言亡也夫日日慎桃何患之有故亡國之社以戒諸侯人之戒在於桃殳韓詩外傳夫有生者不諱死有國者不諱亡諱死者不可以得生諱亡者不可以得存説苑正諫乘國者其如乘航乎航安則人斯安矣揚子寡見今有宗族巨室子孫保之西疇千畝百農耕之以衡門為闕以隄堰為垣以溝澮為池溉彼千畝深耕穫而望災畬若無患也一夕北風沸塵驟雨衝界侵犯我疆場崩潰我隄堰播蕩我藩籬浸淫我溝澮汙濁我妻孥傾覆我廬舍此巨室之憂也出守者可為寒心哉當是之時農夫荷鋤而流歎結笠而增哀如欲修其疆扞其災以鎮撫其巨室阜豐其民財培沃其土膏疏導其津埃使西疇蒼然允茂嘉禾優遊於樂歲恬淡於康塗領巨室之託者得無䇿乎晉王曰風雨之虐固災沴之厲農也禦則巨室安玩則巨室危雖出守之責而為巨室者其亦不能豫患哉天祿閣外史二難若乃安居而不思危寇至而不知懼此謂燕巢於幕魚遊於鼎亡不俟夕武侯心書戒備晉靈公造九層臺孫息聞之求見曰臣能纍十二博棊加九雞子其上公曰子作之孫息以棊子置下加九雞子於其上靈公曰危哉孫息曰是不危復有危於此者九層之臺三年不成鄰國將欲興兵社稷亡滅君欲何望公即壞臺文選魏都賦注夫樹猶親戚土猶士民建置不久則輕下慢上平居猶懼其離叛危急將如之何是以聖王安而不逸以慮危也存而設備以懼亡也故疾風卒至而無摧拔之憂天下有變而無傾危之患矣文選曹元首六代論舟非水不行水入則舟沒君非民不治民犯上則君危藝文類聚舟車部舟善治國者不忘危善養生者不諱死藝文類聚人部諫議戒察古者冕而前旒所以蔽明也統絖塞耳所以掩聰也故水至清則無魚人至察則無徒大戴禮記子張問入官水清無大魚察政不得下和後漢書班超列傳江海之流混混故能成其深廣也晉書傅玄傳為政以苛為察以功為明以刻下為忠以計多為功如此者譬猶廣革者也大敗大裂之道也文子上禮晉國苦盜有郤雍者能視盜之貌察其眉睫之間而得其情晉侯使視盜千百無遺一焉晉侯大喜告趙文子曰吾得一人而一國盜為盡矣奚用多為文子曰吾君恃伺察而得盜盜不盡矣且郤雍必不得其死焉俄而羣盜謀曰吾所窮者郤雍也遂共盜而殘之晉侯聞而大駭立召文子而告之曰果如子言郤雍死矣然取盜何方文子曰周諺有言察見淵魚者不祥智料隱匿者有殃且君欲無盜莫若舉賢而任之使教明於上化行於下民有恥心則何盜之為於是用隨會知政而羣盜奔秦焉列子説符夫權輕重不差蚊首扶撥枉橈不失針鋒是任術而釋人心者也淮南子主術訓子曰委任不一亂之媒也監察不止姦之府也裴晞聞之曰左右相疑非亂乎上下相伺非姦乎古謂之蛇豕之政文中子關朗天子坐九重之內樹塞其門旒以翳明衡以隱聽鸞以抑馳太平御覽皇王部敘皇王上不癡不聾不堪作大家翁此言雖小可以喻大太平御覽職官部工部尚書諺云不聰不明不能為王不瞽不聾不能為公太平御覽人事部諺下戒侵為治有體上下不可相侵請為明公以作家譬之今有人使奴執耕稼婢典炊㸑雞主司晨犬主吠盜牛負重載馬涉逺路私業無曠所求皆足雍容髙枕飲食而已忽一旦盡欲以身親其役不復付任勞其體力為此碎務形疲神困終無一成豈其智之不如奴婢雞狗哉失為家主之法也蜀志贊麋子仲傳注李子曰非狗則不得兔兔化而狗則不為兔人君而好為人官有似於此其臣蔽之人時禁之君自蔽則莫之敢禁夫自為人官自蔽之精者也呂氏春秋勿躬今以衆地者公作則遲有所匿其力也分地則速無所匿遲也主亦有地臣主同地則臣有所匿其邪矣主無所避其纍矣呂氏春秋審分人主之車所以乘物也察乘物之理則四極可有不知乘物而自怙恃奪其智能多其教詔而好自以若此則百官恫擾呂氏春秋審分祓篲賤物也日用掃除故不藏於篋人君好治人臣之職與祓篲何異呂氏春秋勿躬解今使人君視如離婁聰如師曠御如王良射如夷羿書如史籀計如𨽻首走追駟馬力折門鍵有此六者可謂善於有司之職矣何益於治乎徐幹中論務本王上不為冢宰之任則伊呂靜而司尹矣冢宰不為百官之所執則百官靜而御事矣百官不為萬民之所務則萬民靜而安其業矣郭子注莊天道戒侈蜉蝣刺奢也昭公國小而迫無法以自守好奢而任小人將無所依焉毛詩蜉蝣甫田齊景公急於圖霸大夫諷之詩説齊人治田無得田此大田若大田過度力不充給田必蕪穢維有莠草驕驕然以喻公無霸德思念逺人若思彼遠人德不致物人必不至維勞其心忉忉然毛詩正義甫田齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為左傳襄公二十七年夫獸三為羣人三為衆女三為粲王田不取羣公行下衆王御不參一族國語周梁王魏嬰觴諸侯於范臺酒酣請魯君舉觴魯君興避席擇言曰昔者帝女令儀狄作酒而美進之禹禹飲而甘之遂疏儀狄絶旨酒曰後世必有以酒亡其國者齊桓公夜半不嗛易牙乃煎熬燔炙和調五味而進之桓公食之而飽至旦不覺曰後世必有以味亡其國者晉文公得南之威三日不聽朝遂推南之威而逺之曰後世必有以色亡其國者楚王登強臺而望崩山左江而右湖以臨倣徨其樂忘死遂盟強臺而弗登曰後世必有以髙臺陂池亡其國者今主君之尊儀狄之酒也主君之味易牙之調也左白台而右閭須南威之美也前夾林而後蘭臺強臺之樂也有一於此足以亡其國今主君兼此四者可無戒與戰國䇿魏惠王過任之事父不得於子無己之求君不得於臣戰國䇿秦昭襄王東海之外荒海中有山焦炎而峙髙深莫測蓋稟至陽之為質也海水激浪投其上吸然而盡計其晝夜吸攝無極若熬鼎受其灑汗耳神異經晏子稱夫人生厚而用利於是乎正德以幅之謂之幅利言人情須節以正其德亦由布帛須幅以成其度焉後漢書濟陰悼王長傳夫飢而思食寒而欲衣生之所資也遇其貧則粳糧緼袍快然自足矣然富有天下者其欲彌廣雖方丈黼黻猶曰不足必求河海之珍以充耳目之玩則神勞於上民疲於下矣夫萬物之非能自止也上之所為民之凖的也今以不止之性而殉凖的於上是彌而開之使其侈競也古之帝王不為靡麗之服不貴難得之貨所以去華競以默止喧也後漢紀孝順且飢者不待美饌而後飽寒者不俟狐貉而後溫為味者口之竒文繡者身之飾也吳志華核傳崇臺霄峙秀闕雲亭千榭連隅萬閣接屏晃如晨曦昭若列星晉書赫連勃勃載記玄棟鏤榥若騰虹之揚眉飛簷舒咢似翔鵬之矯翼晉書赫連勃勃載記昔周王驥迹實窮四溟漢帝鸞軫夙遍五嶽宋書孝武帝本紀隅奧有竈齊侯蔑寒犬馬有秩管燕輕飢宋書顔延之傳苞池江海籠苑嵩岱南齊書劉善明傳主上無積而宫室美氓家無積而衣服修乘車者飾觀望步行者雜文采本資少而末用多者侈國之俗也管子八觀山林雖廣草木雖美禁發必有時國雖充盈金玉雖多宫室必有度江海雖廣池澤雖博魚鱉雖多網罟必有正管子八觀臺榭相望者亡國之廡也馳車充國者追寇之馬也羽劒珠飾者斬生之斧也文繡纂組者燔功之窑也明王知其然故遠而不近也管子七臣七主夫明王不美宫室非喜小也不聽鐘鼓非惡樂也為其傷於本事而妨於教也管子禁藏工事競於刻鏤女事繁於文章國之貧也管子立政寸之管無當天下不能足之以粟今齊國丈夫耕女子織夜以接日不足以奉上而君側皆雕文刻鏤之觀此無當之管也而君終不知五尺童子操寸之煙天下不能足以薪今君之左右皆操煙之徒而君終不知晏子春秋諫下大道甚夷而民好徑朝甚除田甚蕪倉甚虛服文采帶利劒厭飲食資財有餘是謂盜夸非道哉老子益證衛小國也處於齊晉之間猶貧家之處於富家之間也貧家而學富家之衣食多用則速亡必矣墨子貴義國富則淫淫則有蝨有蝨則弱商子説民獄訟繁倉廩虛而有以淫侈為俗則國之傷也若以利劒刺之韓非子解老簡王謂左右車席泰美夫冠雖賤頭必戴之履雖貴足必履之今車席如此大美吾將何屩以履之夫美下而耗上妨義之本也韓非子外儲説左其王之與樂也若氷之於炎日反以自兵此生乎不知樂之情而以侈為務故也呂氏春秋侈樂治國者當愛民財不為奢泰治身者當愛精氣不放逸河上公注老子守道然後以六合為家崤函為宫賈子過秦上貧民糟粳不接於口而虎狼熊羆厭芻豢百姓短褐不完而宫室衣錦人主急茲無用之功百姓黎民憔悴於天下是故使天下不安其性淮南子主術訓川源不能實漏巵山海不能淡古贍字溪壑鹽鐵論本議智襄子為室美士茁夕焉智伯曰室美矣對曰美則美矣抑臣亦有懼也智伯曰何懼對曰臣以秉筆事君記有之曰髙山浚源不生草木松柏之地其土不肥今土木勝人臣懼其不安人也室成三年而智氏亡説苑貴德晉平公為馳逐之車龍旌衆色挂之以犀象錯之以羽芝車成題金千鎰立之於殿下令羣臣得觀焉田差三過而不一顧平公作色大怒問曰差爾三過而不一顧何為也田差對曰臣聞説天下者以天下説諸侯者以國説大夫者以官説士者以事説農夫者以食説婦姑者以織桀以奢亡紂以淫敗是以不敢顧也説苑反質夫山林不能給野火江海不能實漏巵皆所宜禁也潛夫論浮侈猶大厦既燔而運水於滄海洪潦凌室而造船於長洲矣夫巍巍之稱不可驕吝搆而東嶽之封未易以恣欲修也抱朴子外篇君道目力疲於綺粲而不以覽庶事之得失耳聰盡於淫音而不以證獻言之邪正抱朴子外篇吳失幹以檢扞於井泄取有時太玄經第三法解必以肆奢為賢則是黃帝合宫有虞總期固不如夏癸之瑶臺殷辛之瓊室也湯武誰革而用師哉文選東京賦厚味臘毒豐屋生災廣文選潘正叔乘輿針昔周穆王欲肆其心周行天下將皆必有車轍馬迹焉藝文類聚人部行旅慶封奔獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也藝文類聚舟車部車秦皇兼天下都咸陽渭水貫都以象天漢橫橋南渡以法牽牛事文類聚國都三輔黃圖昔者桀紂縱欲長樂以苦百姓珍怪遠味必南海之葷北海之鹽西海之菁東海之鯨此其禍天下亦厚矣太平御覽皇王部帝桀有肉如丘有酒如淵有殽如林有貨如山太平御覽時序部夏至人之言君天下者瑶臺九纍而堯白屋黼衣九種而堯大布官中三市而堯鶉居糲飯菜粥麒麟青龍而堯素車玄駒太平御覽皇王部帝堯陶唐氏二世修驪山陵採玉者傾山採珠者蔽海太平御覽羽族部鴻秦皇漢祖楚羽吳䇿並勢橫海外雄架天維寸氣不續則為一丘之壤華陽陶隱居傳上戒滿上九亢龍有悔易乾亢龍有悔盈不可久也易乾亢龍有悔窮之災也易乾亢龍有悔與時偕極易乾以陽之質處鼎之中有實者也有實之物不可復加益之則溢反傷其實王弼注易鼎凡人各有志意但不得自滿故六韜云器滿則傾志滿則覆禮記正義曲禮上亡下陽不懼而又有功是天奪之鑑而益其疾也左傳僖公二年譬如火焉火中寒暑乃退此其極也能無退乎左傳昭公三年如川之滿不可遊也左傳哀公九年食充其腹謂之飽酒卒其量謂之醉醉飽者是酒食饜足過度之名也穆王用民之力不知饜足故令去其醉飽過盈之心春秋正義昭公十二年時吳強而無道敗齊臨淄乘勝大會中國齊晉前驅魯衛驂乘滕薛俠轂而趨何休解公羊哀公十三年孔子觀魯桓公之廟有欹器焉問於守廟者曰此謂何器對曰此蓋為宥坐之器孔子曰吾聞宥坐之器虛則欹中則正滿則覆明君以為至誡故常置之於坐側顧謂弟子曰試注水焉乃注之水中則正滿則覆夫子喟然歎曰嗚呼夫物惡有滿而不覆者哉孔子家語三恕能消者息必専者政乾坤鑿度上夫窮髙則危大滿則溢月盈則缺日中則移凡此四者自然之數也後漢書李固列傳日不常中月盈有虧履道者固仗藝者危後漢書文苑傳月滿如規後夜則虧槿榮于枝望暮而萎北齊書魏收傳夫居髙而必危每處滿而防溢北史后妃下煬愍皇后傳太強必折太張必缺太公六韜三疑聖人著之簡策傳以告後進曰奮盛苓落也盛而不落者未之有也故有道者不平其稱不滿其量管子宙合滿盛之國不可以仕任滿盛之家不可以嫁子驕倨傲暴之人不可與交管子白心釜鼓滿則人概之人滿則天概之故先王不滿也管子樞言甚矣百姓之惡人之有餘忌也是以長者斷之短者續之滿者洫之虛者實之管子小稱持而盈之不如其已揣而鋭之不可長保老子運夷跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長老子苦恩山峭者崩澤滿者溢黃石公素書安履趙襄子攻翟勝老人中人使使者來謁之襄子方食摶飯有憂色左右曰一朝而兩城下此人之所以喜也今君有憂色何襄子曰江河之大也不過三日飄風暴雨日中不須臾今趙氏之德行無所於積一朝而兩城下亡其及我乎孔子聞之曰趙氏其昌乎夫憂所以為昌也而喜所以為亡也勝非其難者也持之其難者也賢主以此持勝故其福及後世呂氏春秋慎大冬與夏不能兩刑草與稼不能兩成新榖熟而陳榖虧凡有角者無上齒果實繁者木必痺用智褊者無遂功天之數也故天子不處全不處極不處盈全則必缺極則必反盈則必虧先王知物之不可兩大故擇務當而處之呂氏春秋博志詩曰將欲毁之必重纍之將欲踣之必髙舉之其此之謂乎纍矣而不毁舉矣而不踣其唯有道者乎呂氏春秋行論天當有陰陽施張晝夜更用不可但欲清明無已時將恐分裂不為天地當有髙下剛柔氣節五行不可但欲安靜無已時將恐發泄不為地神當有王相囚死休廢不可但欲靈無已時將恐虛歇不為神谷當有盈縮虛實不可但欲盈滿無已時將恐枯竭不為谷萬物當隨時生死不可但欲生無已時將恐滅亡不為物侯王當屈己以下人汲汲求賢不可但欲髙於人將恐顛蹶失其位也河上公注老子法本后稷廣利天下猶不自矜禹無廢功無廢財自視猶觖如也滿如陷實如虛盡之者也淮南子繆稱訓夫物未嘗有張而不弛成而不毁者也唯聖人能盛而不衰盈而不虧淮南子泰族訓陽之行始於北方之中而止於南方之中陰之行始於南方之中而止於北方之中陰陽之道不同至於盛而皆止於中春秋繁露循天之道衣成則缺袵宮成則缺隅屋成則加錯示不成者天道然也説苑敬慎聖人不敢當盛升輿而遇三人則下二人則軾調其盈虛故能長久也説苑敬慎大人失宜盈滿復虧成長之木盛者滅衰焦氏易林觀之豐或問持滿曰扼欹揚子重黎篇次五日正中月正隆君子自晦不入窮測曰日中月隆明恐挫也太玄經第五晦上九極廓于髙庸三歲無童測曰極廓髙庸終無所臣也太玄經第四廓道罔降而不殺物無盛而不衰日中則昃月滿則微崇猶塵積替若駭機文選張華女史針登泰山見天下之大不察細者視逺故也處髙位知人主之貴不恤卑賤者意滿故也意林任子於髙思危在滿戒溢可以永年天之大律玉海器用鼎鼐通玄經曰古者三皇有誡之器名曰侑巵其虛則正其盈則覆道德經四子集解譬如瓶滿天降雨時而不受一滴大寶積經卷九十九如大海水不可量不可度不可見邉際大智若此猶復受泉流如牛迹中水自謂以滿足寧可方之於大海阿述達菩薩經衣八譬以瓶盛滿水置露地天雨瓶中一渧不受渧亦不得入所以者何其瓶已滿故阿述達菩薩經衣八譬如月初生人皆為作禮月成滿無有為作禮者佛遺日摩尼寶經推六猶如有瓶水滿其中正安著地若人持水來瀉瓶中彼瓶如是復受水不答曰不也所以者何彼瓶水滿正安著地是故不受中阿含經卷二十如人得如意寶則心生自髙輕賤他人是為衰因緣大智度論卷六十五水運鍾卑人道惡矜𢎞明集十三虛懷山上有澤咸君子以虛受人易咸木以髙其枝葉之故故人不得就而止息也鄭氏箋詩漢廣昔者禹見耕者五耦而武過十室之邑則下為秉德之士存焉大戴禮記曽子制言下簡子曰與吾得革車千乘不如聞行人燭過之一言也韓非子難二賢主知其若此也故日慎一日以終其世譬之若登山登山者處已髙矣左右視尚巍巍焉山在其上賢者之所與處有似於此身已賢矣行已髙矣左右視尚盡賢於己故周公旦曰吾不如者吾不與處纍我者也與我齊者吾不與處無益我者也惟賢者必與賢於己者處賢者之可得與處也禮之也呂氏春秋觀世轂中有孔故衆輻共湊之治身者當除情去欲使五藏空虛神乃歸之也治國者寡能總衆弱能使強河上公注老子無用下者萬物歸之虛者天下遺之淮南子主術訓匿病者不得良醫羞問者聖人去之以為逺功而近有災春秋繁露執贄鳥鷇之卵不毁而後鳯凰集誹謗之罪不誅而後良言進説苑貴德次八廓其外虛其內利鼓鉦測曰廓外虛內乃能有聞也太玄經第四廓昔者武王罷朝而結絲􅙋絶左右顧無可使結之者俯而自申之故能成王道桓公坐友三人諫臣五人日舉過者三十人故能成伯業周公一食而三吐哺一沐而三握髮所執贄而見於窮閭隘巷者七十餘人故能存周室彼二聖一賢者皆伯王之君也而下人如此其所與遊者皆過己者也是以日益而不自知也今以子年之少而位之卑所與遊者皆為服役子之不益亦以明矣列女傳周列國魯季敬薑夫酒食人之所愛者也而人相見莫不進焉不吝於所愛者以彼之嗜之也使嗜者甚於酒食人豈愛之故忠言之不出以未有嗜之者也徐幹中論虛道文子問曰王者得其百歡心為之奈何老子曰若江海即是也淡乎無味用之不既先小而後大道德經四子集解天地雖廣以無為心聖王雖大以虛為主道德經注江海善下為百川之所共湊聖道虛容為衆生之所歸往道德經注疏卷二山之髙海之廣夫何故以其有容焉華陽陶隱居集譬如大海能受諸河及雲雨等何以故以大海是無量器故大寶積經卷九十九猶如有瓶中空無水正安著地若人持水來瀉瓶中彼瓶如是當受水不答曰受也所以者何彼空無水正安著地是故必受中阿含經卷二十大海吞受百川萬流江恆之水無不受之終日終夜無有盈溢減盡之名法海經尺一喻林卷六十五
