body:
  text: 喻林卷十八明徐元太撰人事門十六莫知司冦布為周最謂周君曰函冶氏為齊大公買良劒公不知善歸其劒而責之金越人請買之千金折而不賣將死而屬其子曰必無獨知今君之使最為太子獨知之契也天下未有信之者也君何不買信貨哉戰國䇿周赦王巧匠不斵兮孰察其揆正史記屈原傳今夫絃者髙張急徽追趨逐耆則坐者不期而附矣試為之施咸池揄六莖發簫韶詠九成則莫有和也前漢書揚雄傳下絶節赴曲非常耳所悲見殊心異雖竒莫察晉書習鑿齒傳玉徽金銑反為拙目所嗤巴人下里更合郢中之聽陽春髙而不和妙聲絶而不尋梁書庾於陵弟肩吾傳孟賁過於河先其五船人怒而以楫虓其頭顧不知其孟賁也中河孟賁瞋目而視船人髪植目裂鬢指舟中之人盡揚播入於河使船人知其孟賁弗敢直視渉無先者又况於辱之乎此以不知故也吕氏春秋必已夫以徵為羽非絃之罪以甘為苦非味之過楚人有烹猴而召其隣人以為狗羮也而甘之後聞其猴也據地而吐之盡㵼其食此未始知味者也邯鄲師有出新曲者託之李竒諸人皆爭學之後知其非也而皆棄其曲此未始知音者也鄙人有得玉璞者喜其狀以為寳而藏之以示人人以為石也因而棄之此未始知玉者也故有符於中則貴是而同今古無以聽其説則所從來者逺而貴之耳淮南子脩務訓夫驥罷鹽車此非無形容也莫知之也使驥不得伯樂安得千里之足造父亦無千里之手矣韓詩外傳人之言曰安者不能恤危飽者不能食饑故餘粱肉者難為言隱約處佚樂者難為言勤苦夫髙堂䆳宇廣厦洞房者不知専屋狹廬上漏下濕者之廇也繫馬百駟貨財充内儲陳納新者不知有旦無暮稱貸者之急廣第唐園良田連比者不知無運踵之業竄頭宅者之役也原馬被山牛羊滿谷者不知無孤豚瘠犢者之窶也髙枕談卧無呌號者不知憂私責與吏正戚者之愁也被紈躡韋摶梁嚙肥者不知短褐之寒糖􅹞之苦也從容房闈之間垂拱持案食者不知蹠耒躬耕者之勤也垂堅驅良列騎成行者不知負擔歩行者之難也同床旃席侍御滿側者不知負輅輓船登髙絶流者之難也衣輕暖被英裘處温室戴安車者不知乗邊城飄胡代鄉清風者之危寒也妻子好合子孫保之不知老母之顦顇匹婦之悲恨也耳聽五音目視弄優者不知蒙流矢距敵方外之死者也東嚮㐲几振筆如文調者不知求索之急箠楚之痛者也坐旃茵之上按圖籍之言若易易然亦不知歩渉者之難也鹽鐵論鹽鐵取下盖越人美蠃蚌而簡大牢鄙夫樂咋音而怪韶濩故不知味者以芬香為臭不知道者以美言為亂耳鹽鐵論論菑夫驥厄罷鹽車非無驥狀也夫世莫能知也使驥得王良造父驥無千里之足乎説苑雜言九臯難和絶不相知焦氏易林訟之謙言我駕飛龍乘明智之獸象玉之車文章雜錯以言已德佀龍玉而世莫之識也王逸註楚辭離騷經言離婁明目無所不見微有所睇盲人輕之以為無明也言賢者遭困厄俗人侮之以為癡也王逸註楚辭九章言已見美大之丘葛草緣之而生交錯茂盛人不異而采取則不成絺綌以言楚國士民衆多君不異而舉用則不知其有德也王逸註楚辭九懐今或時鳯凰騏驎以仁聖之性隱於恒毛庸羽無一角五色表之世人不之知猶玉在石中也王充論衡講瑞篇或時以有鳯凰麒麟亂於鵠鵲麞驎世人不知美玉隱在石中楚王令尹不能知故有抱玉泣血之痛王充論衡講瑞篇宋元王之時漁者網得神龜焉漁父不知其神也方今世儒漁父之類也王充論衡講瑞篇胡人見布而疑黂越人見罽而駭毳夫􅥬所習見而竒所希聞此人情之常蔽也山海經序且常人之所愛乃上士之所憎庸俗之所貴乃至人之所賤也英儒偉器養其浩然者猶不樂見淺薄之人風塵之徒况彼神仙何為汲汲使芻狗之倫知有之何所索乎而怪於未嘗知也抱朴子内篇論仙所謂以明鑑給朦瞽以絲竹娛聾夫也抱朴子内篇極言夫見玉而指曰石非玉之不真也待和氏而後識焉見龍而命之曰蛇非龍之不神也須蔡墨而後辨焉所以貴道者以其加之不可益而損之不可減也所以貴德者以其聞毁而不慘見譽而不悦也抱朴子内篇塞難何異奏雅樂於木梗之側陳𤣥黄於土偶之前哉抱朴子外篇重言夫雷霆輷磕而或不聞焉七曜經天而或不見焉豈唯形器有聾瞽哉心神所蔽亦又如之是以聞格言而不識者非無耳也見英異而不知者非無目也由乎聰不經妙而明不逮竒也抱朴子外篇名實若席上之珍不積環堵之操不粹者予之過也知之者希名位不臻以玉為石謂鳯曰鷃者非余罪也抱朴子外篇任命小鮮不解靈虬之逺規鳬鷖不知鴻鵠之非匹是以耦耕者笑陳勝之投耒淺識者嗤孔明之抱膝抱朴子外篇博喻世無離朱皂白混焉時乏管青騏蹇糅焉磧礫積於金匱瑾瑶委乎溝洫匠石緬而遐淪梓豫忽而莫識抱朴子外篇吳失夫非漢東之人不能料明珠於泥淪之蜯非泣血之民不能識夜光於重崖之裏蟭螟屯蚊眉之中而笑彌天之大鵬寸鮒游牛迹之水不貴横海之巨鱗故道業不足以相渉聰明不足以相逮理自不合無所多怪抱朴子外篇刺驕以管闚天者莫見其涯故似不齊郭子註莊應帝王雖懐瓊而握蘭徒芳潔而誰亮陶靖節集賦鴻進於陸以其羽翼為威儀𢎞等皆有鴻之羽儀未進之時燕爵所輕也前漢書註公孫𢎞卜式兒寛贊惟聖知聖惟龍知龍愚不知聖蚖不知龍聖道未彰羣愚玩矣龍蟠未升蚖其肆矣楊子法言註問神篇蓼蟲避葵堇習苦不言非小人自齷齪安知曠士懐文選鮑昭放歌行不見郢中歌能否居然别陽春無知者巴人皆下節文選張協詩懐質抱情獨無匹兮伯樂既没驥焉程兮補文選屈原懐沙若不一叩洪鐘伐雷鼓則不識其音響也世説新語言語人有以狐為狸以瑟為箜篌此非徙不知瑟狐又不知狸與箜篌意林新論荆南雅曲髙音鮮和河西名驥滅没誰賞藝文類聚人部隱逸下書連城之寳照廡之珍野老怪而相捐工人迷而不識藝文類聚内典部内典碑爾鼠子軰安知君子豹變之志乎太平御覽人事部笑希世之寳違時必賤偉俗之器無聖則淪是以明玉黜於楚岫章甫窮於越人何氏語林輕詆南史孔子出衛之東門逆姑布子卿曰二三子引車避有人將來必相我者也孔子下歩姑布子卿曰嬴乎若喪家之狗子貢以告孔子曰丘何敢乎子貢曰何足辭也子曰汝獨不見夫喪家之狗歟既歛而椁布器而祭顧望無人意欲施之上無明王下無賢方伯王道衰政教失强陵弱衆暴寡百姓縱心莫之綱紀是人固以丘為欲當之者也丘何敢乎困學紀聞卷十諸子譬如商人有無價寳詣市賣之愚人見之而問寳主曰此寳何價寳主曰此寳價值百千萬數聞已復詈此是何物誑我是寳各相謂曰此非真寳三十六部尊經仙人經譬如金剛不識寳人不知其能不得其用大方廣佛華嚴經卷七十八譬如有人賣摩尼寳有愚癡人見彼寳已即便問言仁者斯寳其價云何寳主答言汝今當知是寳精勝世間所無非可造次以世價論也吾今且説此寳功能威德力用粗為約耳卿若欲知此摩尼寳光明所照近逺若干卿今若須當以真金布滿斯地爾乃相與彼愚癡人聞是語已便大嗤笑種種呰毁是摩尼寳竟不酬價大集賢䕶經卷二譬如冥夜興雲降雨脩行道地經慈品譬如人著新衣初著日若不故第二日亦不應故如是乃至十嵗應常新不應故而實已故當知與新俱有微故不覺故事已成方乃覺知大智度論卷十九懐憂喓喓音腰草蟲趯趯阜螽未見君子憂心忡忡陟彼南山言采其蕨未見君子憂心惙惙音拙陟彼南山言采其薇未見君子我心傷悲詩國風草蟲心之憂矣如匪澣音緩衣詩國風柏舟蜉蝣之羽衣裳楚楚叶創舉反心之憂矣於我歸處詩國風蜉蝣鴻鴈于飛哀鳴嗸嗸音翶維此哲人謂我劬勞維彼愚人謂我宣驕叶音髙鴈詩小雅鴻沔彼流水朝宗于海叶虎有反鴥彼飛隼載飛載止嗟我兄弟邦人諸友莫肯念亂誰無父母詩小雅沔水憂心如酲音呈南詩小雅節山心之憂矣如或結之詩小雅正月宛音苑彼鳴鳩翰飛戾天我心憂傷念昔先人詩小雅小宛弁音盤彼鸒音豫斯歸飛提提音匙民莫不穀我獨于罹詩小雅小弁心之憂矣疢音趂如疾首詩小雅小弁譬彼舟流不知所届詩小雅小弁鹿斯之奔維足伎伎音祁雉之朝雊音姤尚求其雌譬彼壊木疾用無枝詩小雅小弁無將大車祇自塵兮無思百憂祇自疧眉貧反兮無將大車維塵冥冥莫迥反無思百憂不出于熲音耿無將大車維塵雝兮無思百憂祇自重兮詩小雅無將大車苕音條之華芸其黄矣心之憂矣維其傷矣苕之華其葉青青音精知我如此不如無生詩小雅苕之華如彼遡風亦孔之僾音愛桑詩大雅柔旱魃音跋為虐如惔音談如焚我心憚暑憂心如熏詩大雅雲漢觱音必沸音弗檻胡覽反泉維其深矣心之憂矣寧自今矣詩大雅瞻卬仕於闇君猶行而出北門心為之憂殷殷然鄭氏箋詩北門今王之為政見之使人唈然如鄉疾風不能息也鄭氏箋詩桑柔涌泉之源所由者深喻已憂所從來久也鄭氏箋詩瞻卬故心之憂矣如不澣之衣衣之不澣憒辱無照察似已之憂煩憒無容樂毛詩正義柏舟王肅云言盡力勞病以成攻堅之巢而為風雨所漂揺則鳴音嘵嘵然而懼以言我周累世積德以成篤固之國而為凶人所振蕩則已亦嘵嘵而懼毛詩正義䲭鴞刈薪者惜其樵薪不欲使氿泉妄浸之以妄浸之則濕腐不中用故也以興今譚大夫契契憂苦而寤寐之中哀憐我譚國勞苦之民人不欲使周人極斂之極斂之則困病不堪其事也毛詩正義大東觱沸然而涌出者檻泉也此泉濆涌而出言其所從來維其深逺矣喻天下之人心之憂愁亦所由來久逺寧從今日矣毛詩正義瞻卬織者常苦緯少寡婦所宜憂杜氏解左傳昭公二十四年閔閔然如農夫之望嵗懼以待時左傳昭公三十二年寡人卧不安席食不甘味心摇揺如懸旌而無所終薄戰國策齊威王悲者不可為纍欷思者不可為歎息前漢書景十三王傳猶懐老牛䑛犢之愛後漢書楊震傳伏讀感切五情若灼晉書齊王冏傳毒螫㿊膚則申旦不寐饑寒切體亦卒嵗無聊何則痛苦難以安貧窮易為蹙隋書王孝籍儒林傳濳鬢髪之内居眉睫之間子野未曽聞離朱所不見隋書王孝籍儒林傳心有憂者筐牀衽席弗能安也菰飯犓牛弗能甘也琴瑟鳴竽弗能樂也患解憂除然後食甘寢寧居安游樂淮南子詮言訓魯監門之女嬰相從績中夜而泣涕其偶曰何謂而泣也嬰曰吾聞衛世子不肖所以泣也其偶曰衛世子不肖諸侯之憂也子曷為泣也嬰曰吾聞之異乎子之言也昔者宋之桓司馬得罪於宋君出於魯其馬佚而𩥇吾園而食吾園之葵是嵗吾聞園人亡利之半越王勾踐起兵而攻吳諸侯畏其威魯往獻女吾姊與焉兄往視之道畏而死越兵威者吳也兄死者我也由是觀之禍與福相及也今衛世子甚不肖好兵吾男弟三人能無憂乎韓詩外傳堅冰黄鳥常哀悲愁不見甘粒但見藜蒿數驚鷙鳥為我心憂焦氏易林乾之噬嗑水載船舟無根以浮往來溶溶心勞且憂焦氏易林屯之益失意懐憂如幽狴牢焦氏易林比之否望驥不來拘蹇為憂焦氏易林泰之比鳬過稻廬甘樂􅜿鰌雖驅不走田畯懐憂焦氏易林同人之升離女去夫閔思苦憂焦氏易林豫之遯簪短帶長出思苦窮焦氏易林恒之咸川淵難遊水為我憂焦氏易林蹇之豫次二􅛥古牙切鵝慘于冰翼彼南風内懐其乘測曰􅛥鵝之慘懐憂無快也太𤣥經第三裝次六𤣥鳥維愁明降于幽測曰𤣥鳥維愁將下昧也太𤣥經第五晦言已憂愁腸中運亂繚繞而轉涕泣交流若磨屑之下而無絶時也王逸註楚辭九歎嵗之秋也涼風鳴條清露變葉則寒蟬抱樹而長呌吟烈悲酸瑟于落日之際何也哀其時命迫于嚴霜而寄悲於菀栁劉子惜時髙山之有崖林木之有枝愚智同知之今憂來仍無定方而人皆無能知之李善註文選魏文帝善哉行達人之智混齊死生今反感木衰之秋華悲豐草之零露是乃在殷憂而不去何云識道乎李善註文選歎逝賦恐鷤鴂之先鳴兮使百草為之不芳文選屈原離騷經雞鶩以稻梁致憂燕雀以堂搆貽愁既銜利之情近又遁害之無由廣文選江文通翡翠賦憂隨積霖密慨因朗旭彰藝文類聚人部愁詩譬如有人多齎珍財入於曠野其中多有凶暴刼賊彼人爾時更無餘想唯作是念我於何時當出如斯險難之處得至豐樂安隱國土波羅密多經卷五百八十譬如有人身患瘡癬但念除差以藥塗之蘇婆呼童子經卷上心為愁慼猶初月煙霧所覆無有光明本緣經持王子品譬如罪人臨當受戮雖復美味在前家室勸喻以憂死故雖欲飲食餚饍不覺滋味大智度論卷十四憂世我視彼泉水之流尚有一泉則清一泉則濁我視彼諸侯之行何為一皆為惡曽無為善乃泉水之不如也毛詩正義四月鵰也鳶也貪殘之鳥乃髙飛至天今在位非鵰也鳶也何故貪殘驕暴如鳥之髙飛至天也鱣也鮪也長大之魚乃濳逃於淵今賢者非鱣非鮪也何為隱遁避亂如魚之濳逃於淵也毛詩正義四月子擊磬於衛有荷簣而過孔氏之門者曰有心哉擊磬乎論語憲問孔子生於亂世思堯舜之道東南西北灼頭濡足庶幾世主之悟悠悠者皆是君闇大夫妬孰合有謀是以嫫母飾恣而矜夸西子彷徨而無家非不知窮厄而不見用悼痛天下之禍猶慈母之伏死子也知其不可如何然惡已鹽鐵論大論農夫輟耕而容與兮恐田野之蕪穢廣文選宋玉九辯駑蹇服御良樂咨嗟鉛刀剖截區冶歎息故少師幸而季梁懼宰嚭任而伍貟憂廣文選魏文帝連珠世變鹿鳴廢則和樂缺矣四牡廢則君臣缺矣皇皇者華廢則忠信缺矣棠棣廢則兄弟缺矣伐木廢則朋友缺矣天保廢則福祿缺矣采薇廢則征伐缺矣出車廢則功力缺矣枤杜廢則師衆缺矣魚麗廢則法度缺矣南陔廢則孝友缺矣白華廢則廉恥缺矣華黍廢則蓄積缺矣由庚廢則隂陽失其道理矣南有嘉魚廢則賢者不安下不得其所矣崇丘廢則萬物不遂矣南山有臺廢則為國之基墜矣由儀廢則萬物失其道理矣蓼蕭廢則恩澤乖矣湛露廢則萬國離矣彤弓廢則諸夏衰矣菁菁者莪廢則無禮儀矣毛詩小雅六月序誥誓不及五帝盟詛不及三王交質子不及三伯穀梁隱公八年今之世猶人之市置貨以設詐抱謀以待敵不幸䧟厄求伸而已吳越春秋勾踐入臣外傳孝經鉤命決曰三皇歩五帝驟三王馳宋均注云德隆道用日月為歩時事彌順日月亦驟勤思不已日月乃馳後漢書曹褒傳註故揖讓之禮行乎堯舜之朝干戈之功盛于殷周之世清風以長物成春素霜以凋嚴戒節南齊書劉祥傳搢笏干戚不適有方鐵銛登降周旋不逮日中奏百貍首射侯不當强弩趨發干城距衝不若烟宂伏櫜古人極於德中世逐於智當今爭於力韓非子八説古之人貴能射也以長幼養老也今之人貴能射也以攻戰侵奪也其細者以刼弱暴寡也以遏奪為務也仁人之得飴以養疾侍老也跖與企足得飴以開閉取楗也吕氏春秋異用周室衰而王道廢儒墨乃始列道而議分徒而訟淮南子俶真訓句爪居牙戴角出距之獸於是鷙矣淮南子本經訓古之兵弓劒而已矣槽柔無擊脩㦸無别晚世之兵隆衝以攻渠幨以守連弩以射銷車以鬬淮南子汜論訓伯成子髙辭為諸侯而耕天下髙之今之時人辭官而隱處為鄉邑之下豈可同哉淮南子汜論訓古之伐國不殺黄口不獲二毛於古為義於今為笑古之所以為榮者今之所以為辱也古之所以為治者今之所以為亂也淮南子汜論訓治身太上養神其次養形治國太上養化其次正法神清志平百節皆寧養性之本也肥肌膚充腸腹供嗜欲養生之末也民交讓爭處卑委利爭受寡力事爭就勞日化上遷善而不知其所以然此治之上也利賞而勸善畏刑而不為非法令正於上而百姓服於下此治之末也上世養本而下世事末此太平之所以不起也淮南子泰族訓世有盛衰衰極久有弊也譬猶衣食之於人也初成鮮完始熟香絜少久穿敗連日臭茹矣王充論衡齊世篇如以上世人民侗長佼好堅彊老夀下世反此則天地初立始為人時長可如防風之君色如宋朝壽如彭祖乎從當今至千世之後人可長如莢英色如嫫母夀如朝生乎王充論衡齊世篇愛憎好惡古今不鈞時移俗易物同賈異譬之夏后之璜曩直連城鬻之於今賤於銅鐵故昔以隱居求志為髙士今以山林之儒為不肖故聖世之良幹乃闇俗之罪人也往者之介潔乃末葉之羸劣也抱朴子外篇擢才盖三皇歩而五帝驟霸王已來載馳載鶩抱朴子外篇用刑太息而言仁孝者失於江湖乃思濡沬也郭子註莊天運幽厲之時多有諷刺在下祖習如風之散如水之流故曰彌著李善註文選沈休文謝靈運傳論世路嶮巇一至於此太行孟門豈云嶄絶文選劉孝標廣絶交論帝者得其英華王者得其根核霸者得其附枝故帝道不行不能王王道不行不能霸霸道不行不能守其身太平御覽皇王部叙皇王上堯歩舜驟禹馳湯騖德有優劣故曰行轉疾也太平御覽皇王部叙皇王上三皇垂䇿而五帝繁手唐虞按轡禹湯馳轅雖使周公御衡仲尼促節固不已也太平御覽皇王部叙皇王上天先春而後秋地先榮而後凋日月先光而後幽是以王者則之亦先教而後刑三王結繩五帝畵像三王肉刑五霸黠巧此言歩驟稍有優劣也太平御覽皇王部叙皇王下神農氏夫負妻戴以治天下堯曰朕之比神農猶旦與昏也太平御覽皇王部炎帝神農氏京房别對曰太平日行上道升平行次道霸世行下道玉海天文天文書上以知為凖以巧為繩詐為之斧偽為之斤道德經指歸卷九上古聖人作湯液醪醴為而不用何也岐伯曰自古聖人之作湯液醪醴者以為備耳夫上古作湯液故為而弗服也中古之世道德稍衰邪氣時至服之萬全帝曰今之世不必已何也岐伯曰當今之世必齊毒藥攻其中鑱石鍼艾治其外也黄帝素問内經湯液醪醴論黄帝問曰余聞古之治病惟其移精變氣可祝由而已今世治病毒藥治其内鍼石治其外或愈或不愈何也岐伯對曰往古人居禽獸之間動作以避寒隂居以避暑内無眷慕之累外無伸宦之形此恬澹之世邪不能深入也故毒藥不能治其内鍼石不能治其外故可移精祝由而已今之世不然憂患緣其内苦形傷其外又失四時之從逆寒暑之宜賊風數至虚邪朝夕内至五藏骨髓外傷空竅肌膚所以小病必甚大病必死故祝由不能已也黄帝素問内經移精變氣論世界如車輪時變如輪轉人亦如車輪或上而或下大智度論卷一傷志出自北門叶眉貧反憂心殷殷詩國風北門瞻彼阪音反田有菀音鬱其特天之杌音兀我如不我克詩小雅正月山有蕨薇隰有杞桋音夷君子作歌維以告哀詩小雅四月終風衛莊姜傷已也遭州吁之暴見侮慢不能正也毛詩終風二子乗舟思伋壽也衛宣公之二子爭相為死國人傷而思之毛詩二子乗舟春女怨秋士悲感其物化也毛詩七月註雍雍鳴鴈厲翼北游順時而動得意忘憂嗟我憤歎曽莫能疇晉書嵇康傳猶眇者願明痿之思歩宋書袁淑傳况懐抱之内水火鑠脂膏腠理之間風霜侵骨髓安可齰舌緘唇吞聲飲氣惡呻吟之響忍酸辛之酷哉隋書王孝籍儒林傳鳥鳴東西迎其羣侣似有所屬不得自専焦氏易林隨之隨雄處弱水雌在海濵將别持食悲哀於心焦氏易林剝之同人言已所種衆芳草當刈未刈蚤有霜雪枝葉雖蚤萎病絶落何能傷於我乎哀惜衆芳摧折枝葉蕪穢而不成也以言已循行忠信冀君任用而遂斥棄則使衆賢志士失其所也王逸註楚辭離騷經言我佩瓊玉懐美德偃蹇而盛衆人薆然而蔽之傷不得施用也玉逸註楚辭離騷經言湛湛江水浸潤楓木使之茂盛傷已不蒙君惠而身放棄曽不若樹木得其所王逸註楚辭招魂言有便娟長好之竹生於江水之潭被蒙潤澤而茂盛自恨放流而獨不蒙君之惠也王逸註楚辭七諫夫燕蟬遇秋寒將入穴處而懐憂懼候鴈鵾雞喜樂而逸豫言已無有候鴈鵾雞之喜樂而有蟬燕之憂懼也王逸註楚辭九辨屈原憂愁覜視川水見石瀨淺淺疾流而下將有所至仰見飛龍翩翩而上將有所登自傷棄在山野終無所登至也王逸註楚辭九歌言已在於湖澤之中見三鳥飛從南來觀察其志欲北渡江縱恣自在自傷不得北歸曽不若飛鳥也王逸註楚辭九歎言水尚得順其經脉揚蕩其波使之迅疾自傷不得順其天性揚其志意常屈伏也王逸註楚辭九歎髙張生於絶絃以喻立節期於效命聲急由乎調起以喻辭切興於恨深李善註文選顔延年秋胡詩機詩曰我若西流水子為東峙岳李善註文選陸士龍答兄機詩安得同攜手契闊成騑服李善註文選陸士龍答兄機詩傷禽惡弦驚倦客惡離聲文選鮑昭東門行是以張髙弦悲聲激柱落清唱未和而桑濮代作補文選庾闕弔賈誼文願至崑崙之縣圃兮采鍾山之玉英擥瑶木之橝枝兮望閬風之板桐弱水汨其為難兮路中斷而不通執不能凌波以徑度兮又無羽翼而髙翔補文選莊忌哀時命雙鸞匿景曜戢翼太山崖抗首漱朝露晞陽振羽儀長鳴戲雲中時下息蘭池自謂絶塵埃終始永不虧何意世多艱虞人來我疑雲網塞四區髙羅正參差奮迅勢不便六翮無所施隱恣就長纓卒為時所羈廣文選嵇叔夜贈兄公穆入軍詩譬如卷施草心謝葉空存廣文選王僧孺贈顧倉曹詩騏驥馬不試婆娑槽櫪間壯士志未申坎坷多辛酸廣文選杜德魯贈母丘儉詩余既滋蘭之九畹兮又樹蕙之百畝畦蒥荑與揭車兮雜杜蘅與芳芷冀枝葉之峻茂兮願竢時乎吾將刈雖萎絶其亦何傷兮哀衆芳之蕪穢文選屈原離騷經華堂傾榱廣宅頺墉髙門降衡循庭樹蓬藝文類聚人部友悌詩樂鴛鴦之同池羨比翼之共林亮根異其何戚痛别幹之傷心藝文類聚人部友悌賦困吳坂之峻岨畏鹽車之嚴筴嗟遊處之弗遇奚鬱悒之難任背宇宙之寥廓羅網罟之重深常屛氣以歛迹焉遊豫以娛心藝文類聚人部言志賦秋木萋萋其葉萎黄有鳥處山集于苞桑養育毛羽形容生光既得升雲遊倚曲房離宫絶曠身體摧藏志念抑沈不得頡頏雖得餧食心有徊徨藝文類聚人部怨惟方今之疏絶若驚風之吹塵藝文類聚人部别下賦轉蓬離本根飄飄畏長風藝文類聚草部蓬百草應節生含氣有深淺秋蓬獨何辜飄颻隨風轉藝文類聚草部蓬猗蘭操者孔子所作也孔子聘諸侯莫能自任自衛反魯隱谷之中見香蘭獨茂喟然歎曰夫蘭當為王者香今乃獨茂與衆草為伍乃止車援琴鼓之事文類聚蘭花琴操雖復孤骸不返方為漠一作漢北之塵營魄知歸終結江南之草文苑英華徐陵贈荅上書夫迷山之客遲遥響於巖崖窮海之賔望孤烟於洲嶼文苑英華徐陵宗親上書輕鴻戲江潭孤鴈集洲沚邂逅兩相親同念共無已風雨好東西一隔頓千里追想棲宿時聲容滿心耳短翮不能翔徘徊烟露裏初學記人部離别鵠飛舉萬里一翀蜚昊蒼翔髙志難得離鴻失所望初學記人部離别黄鶴一逺别千里顧徘徊胡馬去其羣思心長依依初學記人部離别喻林卷十八
