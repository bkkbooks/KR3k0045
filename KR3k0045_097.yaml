body:
  text: 喻林卷九十七明徐元太撰政治門二法制若網在綱有條而不紊若農服田力穡乃亦有秋書盤庚上日月之行冬夏各有常度君臣政治小大各有常法孔氏傳書洪範火之燀也固定上為天下者用牧牧謂法也祝汲冡周書周解德法者御民之銜也吏者轡也刑者策也天子御者內史太史左右手也古者以法為銜勒以官為轡以刑為策以人為手故御天下數百年而不懈墮善御馬者正銜勒齊轡策均馬力和馬心故口無聲手不搖策不用而馬為行也善御民者正其德法飭其官而均民力和民心故聽言不出於口刑不用而民治大戴禮記盛德古之御政以治天下者冡宰之官以成道司徒之官以成德宗伯之官以成仁司馬之官以成聖司寇之官以成義司空之官以成禮故六官以為轡司㑹均入以為軜故御四馬執六轡御天地與人與事者亦有六政是故善御者正身同轡均馬力齊馬心惟其所引而之以取長道遠行可以之急疾可以御天地與人事此四者聖人之所乘也是故天子御者太史內史左右手也六官亦六轡也天子三公合以執六官均五政齊五法以御四者故亦惟其所引而之以之道則國治以之德則國安以之仁則國和以之聖則國平以之義則國成以之禮則國定此御政之體也大戴禮記盛德御者同是車馬或以取千里或數百里者所進退緩急異也治者同是法或以治或以亂者亦所進退緩急異也大戴禮記盛德巧匠輔繩而斫胡為其棄法也大戴禮記四代大哉子之教我制也政之豐也如木之成也大戴禮記少問凡賣儥者質劑焉大市以質小市以劑周禮地官質人離婁之明公輸子之巧不以規矩不能成方員師曠之聰不以六律不能正五音堯舜之道不以仁政不能平治天下孟子離婁上聖人既竭目力焉繼之以規矩凖繩以為方員平直不可勝用也既竭耳力焉繼之以六律正五音不可勝用也既竭心思焉繼之以不忍人之政而仁覆天下矣孟子離婁上夫德法者御民之具猶御馬之有銜勒也君者人也吏者轡也刑者䇿也夫人君之政執其轡䇿而已孔子家語執轡古者天子以內史為左右手以德法為銜勒以百官為轡以刑法為䇿以萬民為馬故御天下而不失善御馬者正銜勒齊轡䇿均馬力和馬心故口無聲而馬應轡䇿不舉而極千里善御民者一其德法正其百官以均齊民力和安民心故令不再而民順從刑不用是以天地德之而兆民懷之孔子家語執轡淳于髠曰大車不較不能載其常任琴瑟不較不能成其五音騶忌子曰謹受令請謹修法律而督姦吏史記田完世家百工為器物皆有尺寸斤兩皆使得宜史記張丞相列傳注度長短者不失毫釐量多少者不失圭撮權輕重者不失黍纍前漢書律厯志若夫經制不定是猶度江河亡維楫中流而遇風波船必覆矣前漢書賈誼傳法禁者俗之隄防刑罰者人之銜轡後漢書虞詡列傳王者之法譬猶江河當使易避而難犯也後漢書郎顗列傳君子用法制而至於化小人用法制而至於亂均是一法制也或以之化或以之亂行之不同也茍使豺狼牧羊豚盜跖主征稅國家昏亂吏人放肆則惡復論損益之間哉後漢書仲長統列傳繩墨棄而不用斧斤廢而不舉後漢書蔡茂傳置方員於規矩審輕重於衡石誠國家之典萬世之法也後漢書陳寵列傳夫人君之有政猶水之有隄防隄防完全雖遭雨水霖潦不能為變政教一立暫遭凶年不足為憂誠令隄防穿漏萬夫同力不能復救政教一壞賢智馳騖不能復還今隄防雖堅漸有孔穴後漢紀孝順若不從法是校方員棄規矩考輕重背權衡課長短廢尺寸論是非違分理晉書律厯志中夫奉聖典者若操刀執繩刀妄加則傷物繩妄彈則侵直晉書刑法馬能千里不免羈靽明畜生不可以人御也晉書慕容垂傳縣衡於上四海共禀其平法亂於朝民無所措手足宋書柳元景傳史臣匠萬物者以繩墨為正馭大國者以法理為本南齊書孔稚圭傳有法度之制者不可巧以詐僞有權衡之稱者不可欺以輕重有尋丈之數者不可差以長短管子明法夫矩不正不可以求方繩不信不可以求直法令者君臣之所共立也權勢者人主之所獨守也管子七臣七主夫繩扶掇以為直准壞險以為平鈞入枉而出直此言聖君賢相之制舉也管子宙合法者天下之儀也所以决疑而明是非也百姓所懸命也故明王慎之管子禁藏主上視法嚴於親戚吏之舉令敬於師長民之承教重於神寶管子禁藏夫為國之本得天之時而為經得人之心而為紀法令為維綱吏為網罟什伍以為行列賞誅為文武繕農具當器械耕農當攻戰推引銚耨以當劒㦸被簑以當鎧鑐菹笠以當盾櫓故耕器具則戰器備農事習則攻戰巧矣管子禁藏規矩者方圓之正也雖有巧目利手不如拙規矩之正方圓也故巧者能生規矩不能廢規矩而正方圓雖聖人能生法不能廢法而治國故雖有明智髙行倍法而治是廢規矩而正方圓也管子法法以規矩為方圓則成以尺寸量長短則得以法數治民則安管子形勢解權衡者所以起輕重之數也然而人不事者非心惡利也權不能為之多少其數而衡不能為之輕重其量也權衡平正而待物故姦詐之人不得行其私管子明法解人君者覆載萬民而兼有之燭臨萬族而事使之是故以天地日月四時為主為筫音質竹器所以量物以治天下管子版法解如四時之不貣如星辰之不變如宵如晝如陰如陽如日月之明曰法管子正彼立表而望者不惑按法而割者不疑固言有以希之也夫望而無表割而無法其惑之屬耶鶡冠子天權節璽相信如月應日鶡冠子天則一目之羅不可得雀籠中之鳥空窺不出鶡冠子世兵人以度審長短以量受少多以衡平輕重以律均清濁以名稽虛實以法定治亂尹文子大道上我愛白而憎黑韻商而舍徵好膻而惡焦嗜甘而逆苦白黑商徵膻焦甘苦彼之名也愛憎韻舍好惡嗜逆我之分也定此名分則萬事不亂也尹文子大道上將為胠篋探囊發匱之盜而為守備則必攝緘縢固扃鐍此世俗之所謂知也然而巨盜至則負匱揭篋擔囊而趨唯恐緘縢扃譎之不固也然則鄉之所謂知者不乃為大盜積者也所謂聖者有不為大盜守者乎故曰脣竭則齒寒魯酒薄而邯戰圍聖人生而大盜起掊擊聖人縱舍盜賊而天下始治矣夫川竭而谷虛丘夷而淵實聖人不死大盜不止雖重聖人而治天下則是重利盜跖也為之斗斛以量之則并與斗斛而竊之為之權衡以稱之則并與權衡而竊之為之符璽以信之則并與符璽而竊之為之仁義以矯之則并與仁義而竊之何以知其然邪彼竊鉤者誅竊國者為諸矦諸矦之門而仁義存焉則是非竊仁義聖知邪故曰魚不可脫於淵國之利器不可以示人彼聖人者天下之利器也莊子胠篋百工為方以矩為圜以規直以繩正以縣無巧工不巧工皆以此五者為法巧者能中之不巧者雖不能中放依以從事猶逾已故百工從事皆有法所度今大者治天下其次治大國而無法所度此不若百工辨也墨子法儀背法而治此任重道逺而無馬牛濟大川而無船楫也商子弱民夫離朱見秋毫百步之外而不能以明目易人烏獲舉千鈞之重而不能以多力易人夫聖人之存體性不可以易人然而功可得者法之謂也商子錯法先王懸權衡立尺寸而至今法之其分明也夫釋權衡而斷輕重廢尺寸而意長短雖察商賈不用為其不必也夫倍法度而任私議皆不類者也商子修權君舍法以心裁輕重則同功殊賞同罪殊罰矣怨之所由生也是以分馬之用䇿分田之用鈎非以䇿鈎為過於人智所以去私塞怨也慎子君人有法者以法行無法者以類舉以其本知其末以其左知其右凡百事異理而相守也荀子大略三尺之岸而虛車不能登也百仞之山任負車登焉何則陵遲故也數仞之牆而民不踰也百仞之山而豎子馮而游焉陵遲故也今夫世之陵遲亦久矣而能使民勿踰乎荀子宥坐繩直而枉木斫凖夷而髙科削權衡縣而重益輕斗石設而多益少故以法治國舉措而已矣韓非子有度法不阿貴繩不撓曲韓非子有度巧匠目意中繩然必先以規矩為度上智捷舉中事必以先王之法為比韓非子有度無捶䇿之威銜橛之備雖造父不能以服馬無規矩之法繩墨之端雖王爾不能以成方圓無威嚴之勢賞罰之法雖堯舜不能以為治韓非子和氏託於犀車良馬之上則可以陸犯阪阻之患乘舟之安持楫之利則可以永絶江河之難操法術之數行重罰嚴誅則可以致霸王之功治國之有法術賞罰猶若陸行之有犀車良馬也水行之有輕舟便楫也乘之者遂得其成韓非子和氏鏡執清而無事美惡從而比焉衡執正而無事輕重從而載焉夫搖鏡則不得為明搖衡則不得為正法之謂也故先王以道為常以法為本韓非子飾邪夫懸衡而知平設規而知圓萬全之道也明主使民飾於道之故故佚而有功釋規而任巧釋法而任智惑亂之道也亂主使民飾於智不知道之故故勞而無功韓非子飾邪家有常業雖饑不餓國有常法雖危不亡韓非子飾邪服虎而不以柙禁姦而不以法塞僞而不以符此賁育之所患堯舜之所難也故設柙非所以備鼠也所以使怯弱能服虎也立法非所以備曾史也所以使庸主能止盜跖也為符非所以豫尾生也所以使衆人不相謾也韓非子守道發矢中的賞罰當符故堯復生羿復立韓非子用人釋儀的而妄發雖中而不巧釋法制而妄怒雖殺戮而姦人不恐韓非子用人其心難知喜怒難中也故以表示目以鼓語耳以法教心韓非子用人釋法術而心治堯不能正一國去規矩而妄意度奚仲不能成一輪廢尺寸而差短長王爾不能半中使中主守法術拙匠守規矩尺寸則萬不失矣君人者能去賢巧之所不能守中拙之所萬不失則人力盡而功名立韓非子用人教歌者先揆以法疾呼中宫徐呼中徵疾不中宫徐不中徵不可為教韓非子外儲說左椎鍛者所以平不夷也榜檠者所以矯不直也聖人之為法也所以平不夷矯不直也韓非子外儲說右今廢勢背法而待堯舜堯舜至乃治是千世亂而一治也抱法處勢而待桀紂桀紂至乃亂是千世治而一亂也且夫治千而亂一與治一而亂千也是猶乘驥駬而分馳也相去亦逺矣韓非子難勢夫棄隱括之法去度量之數使奚仲為車不能成一輪無慶賞之勸刑罰之威釋勢委法堯舜戶說而人辨之不能治三家韓非子難勢夫良馬固車五十里而一置使中手御之追速致逺可以及也而千里可日致也何必待古之王良乎韓非子難勢今有人於此擅矯行則免國家利輕重則若衡石為方圓則若規矩此則工矣巧矣而不足法法也者衆之所同也吕氏春秋處方聖人防亂以經藝工正曲以凖繩陸子道基天地三月而為一時故祭祀三飯以為禮喪紀三踊以為節兵重三軍以為制淮南子天文訓法者天下之度量而人主之凖繩也懸法者法不法也設賞者賞當賞也法定之後中程者賞缺繩者誅淮南子主術訓法律度量者人主之所以執下釋之而不用是猶無轡銜而馳也羣臣百姓反弄其上是故有術則制人無術則制於人吞舟之魚蕩而失水則制於螻蟻離其居也猿貁失木而擒於狐貍非其處也淮南子主術訓良工漸乎矩鑿之中矩鑿之中固無物而不周聖王以治民造父以治馬醫駱以治病同材而各自取焉淮南子繆稱訓夫潔輕重不失錙兩聖人弗用而縣之乎銓衡視髙下不差尺寸明主弗任而求之乎浣凖何則人才不可專用而度量可世傳也故國治可與愚守也而軍制可與權用也淮南子齊俗訓耳不知清濁之分者不可令調音心不知治亂之源者不可令制法淮南子汜論訓夫神農伏羲不施賞罰而民不為非然而立政者不能廢法而治民舜執干戚而服有苗然而征伐者不能釋甲兵而制彊暴淮南子汜論訓非規矩不能定方圓非凖繩不能正曲直用規矩凖繩者亦有規矩凖繩焉淮南子說林訓循繩而斫則不過懸衡而量則不差植表而望則不惑淮南子說林訓夫無規矩雖奚仲不能以定方圓無凖繩雖魯般不能以定曲直淮南子修務訓雖有巧手弗修規矩不能正方圓雖有察耳不吹六律不能定五音雖有知心不覺先王不能平天下然則先王之遺道亦天下之規矩六律已春秋繁露楚莊王孔子云美哉顔無父之御也馬知後有輿而輕之知上有人而愛之馬親其正而愛其事如使馬能言彼將必曰樂哉今日之騶也至於顔淪少衰矣馬知後有輿而輕之知上有人而敬之馬親其正而敬其事如使馬能言彼將必曰騶來其人之使我也至於顔夷而衰矣馬知後有輿而重之知上有人而畏之馬親其正而畏其事如馬能言彼將必曰騶來騶來女不騶彼將殺女故御馬有法矣御民有道矣法得則馬和而歡道得則民安而集韓詩外傳王者之制法昭乎如日月故民不迷曠乎若大路故民不惑鹽鐵論刑德水者火之備法者止姦之禁也無法勢雖賢人不能以為治無甲兵雖孫吳不能以制敵鹽鐵論申論非患銚耨之不利患其舍草而去苗也非患無凖平患其舍枉而繩直也故親近為過不必誅是鉏不用也疏逺有功不必賞是苗不養也故世不患無法而患無必行之法也鹽鐵論申韓設明法陳嚴刑坊非矯邪若隱括輔檠之正孤刺也鹽鐵論申韓夫少目之網不可以得魚三章之法不可以為治故令不得不加法不得不多鹽鐵論詔聖田鼠野雉意尚欲去拘制籠檻不得搖動焦氏易林夬之謙大作綱小作紀如綱不綱紀不紀雖有羅網惡得一目而正諸揚子先知或曰因秦之法清而行之亦可以致平乎曰譬諸琴瑟鄭衛調俾䕫因之亦不可以致簫韶矣揚子寡見斷木為棊梡革為鞫亦皆有法焉不合乎先王之法者君子不法也揚子吾子次四畢格禽鳥之貞測曰畢格禽正法位也太𤣥經第二格上九井無幹水直衍匪溪匪谷終于愆測曰井無幹法妄恣也太𤣥經第三法民由水也濟大川者太上乘舟其次泅泅者勞而危乘舟者逸而安虛入水則必溺矣以知能治民者泅也以道德治民者舟也縱民之情謂之亂絶民之情謂之荒曰然則如之何曰為之限使勿越也為之地亦勿越故水可使不濫不可使無流善禁者先禁其身而後人不善禁者先禁人而後身善禁之至於不禁申鑒政體茍有土地百姓可富也茍有市列商賈可來也茍有士民國家可彊也茍有法令姦邪可禁也濳夫論勸將夫制法之意若為藩籬溝塹以有防矣擇禽獸之尤可數犯者而加深厚焉濳夫論斷訟夫法度明雖不聞姦姦無由生法度不明雖日求姦决其源鄣之以掌也御者無銜見馬且奔無以制也使王良持轡馬無欲奔之心御之有數也王充論衡非韓篇本者經常之法規矩之要圓鑿不可以方枘鉛刀不可以斫伐此非常用之事不能成其功非常用之器不可成其巧故天失其常則有逆氣地失其常則有枯敗人失其常則有患害武矦十六䇿治國亡國非無令也患於令煩而不行敗軍非無禁也患於禁設而不正抱朴子外篇用刑班倕不委規矩故方圓不戾於物明君不釋法度故機詐不肆其巧抱朴子外篇用刑仁者為政之脂粉刑者御世之轡䇿脂粉非體中之至急而轡䇿須臾不可無也抱朴子外篇用刑執轡者欲馬之遵軌也明法者欲人循治也轡不均齊馬失軌也法不適時人乖理也是以明主務循其法劉子法術立法者譬如善御察馬之力揣途之數齊其銜轡以從其勢故能登阪赴險無覆轍之敗乘危涉遠無越軌之患劉子法術夫法令者人君之銜轡箠䇿也而民者君之輿馬也若使人臣廢君法禁而施已政令則是奪君之轡䇿而已獨御之也濳夫論衰制今以心察錙銖之重則莫之能識懸之權衡則毫釐之重辨矣劉子正賞夫算者不運籌䇿不能定其數治國者不蹈法度不能致康哉揚子法言注先知篇航傾則人危法亂則國亡揚子法言注寡見篇乘騏驥而馳騁兮無轡銜而自載乘汜泛詂敷以下流兮無舟楫而自備背法度而心治兮辟與此其無異補文選屈原惜往日措鈞石使禹察之不能識也懸於權衡則釐髮識矣意林慎子漁人張網於淵以制吞舟之魚明主張法於天下以制强梁之人立法以隄民百姓不能干立防以隄水江河不能犯防而可犯則江河成災法而可干則百姓成害意林阮子有權衡者不可欺以輕重有尺寸者不可差以長短有法度者不可巧以詐僞意林慎子明鏡龜䇿也章程斛斗也銓衡丈尺也意林新論法者主之柄吏者民之命法欲簡而明吏欲公而平意林典論塞一蟻孔而河决息施一車轄而覆乘止立法令者亦宜舉要意林物理論君必有明法正義若懸權衡以稱輕重所以一羣臣也藝文類聚刑法部刑法匠萬物者以繩墨為政馭大國者以法理為本藝文類聚刑法部刑法表人猶水也法令為隄防不固必致奔突茍無决溢使君何患哉太平御覽職官部良令長下聖人之治也若平地焉聾盲跛蹇皆能復之法若邱陵也非有逸足不能超也大平御覽人事部叙聖牛馬之為人駕乘者非樂負千鈞之重行千里之險鞭䇿痛矣太平御覽獸部馬五匠人不能釋尺寸而意長短廢繩墨而起平木也工人不能置規而為圓去矩而為方黃帝素問靈樞經逆順肥瘦文武張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也禮記雜記下弓弩久張之則絶其力久弛之則失其體鄭氏注禮記雜記下工欲善其事必先利其器文德者帝王之利器威武者文德之輔助也前漢書刑法志文武遞用長久之道譬之天地昏明之迭晉書戴若思傳文有三侑武無一赦惠者多赦者也先易而後難久而不勝其禍法者先難而後易久而不勝其福故惠者民之仇讐也法者民之父母也管子法法獸厭走而有伏網罟一偃一側不然不得大文三曾而責義與德大武三曾而偃武與力管子勢文武之所由起也文者愛之徵也武者惡之表也愛惡循義文武有常聖人之元也譬之若寒暑之序時至而事生之聖人不能為時而能以事適時事適於時者其功大吕氏春秋召類文武之術左右為宜郤縠敦書故舉為元帥豈以好文而不練武哉孫武兵經辭如珠玉豈以習武而不曉文也文心雕龍程器五行殊性俱為人用文武異材竝為大益猶救火者或提盆榼或挈瓶瓶容一斗盂其器方圓形體雖返名質相乖至於盛水滅火功亦齊焉繳者身仰釣者身俯俯仰别狀取利同焉織者漸進耕者漸退進退異勢成務等焉墨子救宋重趼而行干木在魏身不下堂行止異跡存國一焉文以讚治武以凌敵移捨殊律為績平焉劉子文武四時之行有寒有暑聖人法之故有文有武天地之位有前有後有左有右聖人法之以建經紀春生於左秋殺於右夏長於前冬藏於後生長之事文也收藏之事武也是故文事在左武事在右藝文類聚刑法部刑法文武之道應物隨時譬彼蘧廬方茲芻狗執而不遣更增其弊道德經注疏卷六生為殺元殺為生首二者相形吉凶著矣故知生而不知殺者逆天之紀也知殺而不知生者反地之要也道德經指歸卷十二調長祥和天之喜風也折揚奮厲天之怒風也玉海天文天文書上寬嚴九三家人嗃嗃悔厲吉婦子嘻嘻終吝易家人凡物以猛為本者則患在寡恩以愛為本者則患在寡威王弼注易家人天地之間有滄熱善用道者終不竭汲冡周書周祝解天氣下降地氣上騰而有寒暑生焉刑新國用輕典刑亂國用重典輕重隨俗而有寬猛異焉天道有上下交接之義故寒暑易節政教有用俗改更之理故寬猛相濟尚書正義畢命子産猶衆人之母也能食之不能教也禮記仲尼燕居今父之親子也親賢而下無能母之親子也賢則親之無能則憐之母親而不尊父尊而不親水之於民也親而不尊火尊而不親土之於民也親而不尊天尊而不親命之於民也親而不尊鬼尊而不親禮記表記惟有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬難左傳昭公二十年夫刑罰威獄以類天之震耀殺戮也溫慈和惠以放天之生殖長育也是故春一草枯則為災秋一木華亦為異後漢書應奉列傳震雷電激不崇一朝大風衝發希有極日然猶繼以雲雨因以潤物是則天地之威不可經日浹辰帝王之怒不宜訖情盡意吳志諸葛恪傳寬猛兼設水火俱陳北齊書文苑李廣傳治大國若烹小鮮為寬裕者曰勿數撓為刻削者曰致其鹹酸而已矣淮南子齊俗訓宋人有御馬者不進拔劒剄而棄之於溝中又駕一馬馬又不進又剄而棄之於溝若是者三以此威馬至矣然非王良之法也王良登車馬無罷駑堯舜治世民無狂悖王良馴馬之心堯舜順民之意人同性馬殊類也王良能調殊類之馬太公不能率同性之士然則周公之所下白屋王良之馴馬也太公之誅二子宋人之剄馬也舉王良之法與宋人之操使韓子平之韓子必是王良而非宋人矣王良全馬宋人賊馬也馬之賊則不若其全然則民之死不若其生王充論衡非韓篇喻林卷九十七
