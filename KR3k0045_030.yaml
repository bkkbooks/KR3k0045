body:
  text: 喻林卷三十明徐元太撰人事門難必我所言國家之難備矣日日思念之乃以作室為喻若父作室營建基址既致法矣其子乃不肯為之堂況肯搆架成之乎又以治田為喻其父災耕其田殺其草已堪下種矣其子乃不肯布種況肯收穫乎其此作室治田之父乃是敬事之人見其子如此其肯言曰我有後不棄我基業乎尚書正義大誥雖有親父安知其不為虎雖有親兄安知其不為狼史記韓長孺傳種之為稼斂之為穡良農能善種之未必能斂穫之史記孔子世家注數之所隔雖近則難情之所符雖逺則易是以涉歎流霜時獲感天之誠泣血從刑而無悟主之智南齊書劉祥傳我猶箭耳隨人所射安能自裁周書文帝上紀伯夷叔齊能無盜而不能使人不意已鶡冠子備知牛缺者上地之大儒也下之邯鄲遇盜於耦沙之中盡取其衣裝車牛步而去視之歡然無憂吝之色盜追而問其故曰君子不以所養害其所養盜曰嘻賢矣夫既而相謂曰以彼之賢往見趙君使以我為必困我不如殺之乃相與追而殺之燕人聞之聚族相戒曰遇盜莫如上地之牛缺也皆受教俄而其弟適秦至關下果遇盜憶其兄之戒因與盜力爭既而不如又追而以卑辭請物盜怒曰吾活汝𢎞矣而追吾不已迹將著焉既為盜矣仁將焉在遂殺之又傍害其黨四五人焉劉子説符人主莫不欲其臣之忠而忠未必信故伍員流于江萇𢎞死于蜀藏其血三年而化為碧人親莫不欲其子之孝而孝未必愛故孝已憂而曽參悲莊子外物有鳥將來張羅而待之得鳥者羅之一目也今為一目之羅則無時得鳥矣今被甲者以備矢之至若使人必知所集則懸一札而已矣淮南子説山訓決指而身死或斷臂而顧活類不可必淮南子説山訓人有盜而富者富者未必盜有亷而貧者貧者未必亷淮南子説林訓望人者不至恃人者不久韓詩外傳對君之坐豈不安哉尚有差跌一食之上豈不美哉尚有哽噎今若泛所謂幸者也固未能自必説苑敬慎天以至明為不可蔽乎日何為而食地以至安為不可危乎地何為而動天地而尚有動蔽是故聖賢説於世而不得行其道説苑至公神蛇能斷而復屬不能使人弗斷聖賢能困而復通不能使人弗害王充論衡定賢篇夫天地之有湛也何以知不如人之有水病也其有旱也何以知不如人有疸疾也禱請求福終不能愈變操易行終不能救使醫食藥冀可得衰命盡期至醫藥無效王充論衡順鼓篇今夫陶冶者初埏埴作器必模範為形故作之也燃炭生火必調和爐竈故為之也及銅爍不能皆成器燔不能盡善不能故生也王充論衡物勢篇夫賢君能治當安之民不能化當亂之世良醫能行其針藥使方術驗者遇未死之人得未死之病也如命窮病困則雖扁鵲末如之何夫命窮病困之不可治猶困亂民之不可安也藥氣之愈病猶教導之安民也皆有命時不可令勉力也王充論衡治期篇耒耜耕耘因春播種者人為之也及榖入地日夜長大人不能為也或為之者敗之道也王充論衡自然篇牛缺以無吝招患燕人假有惜受禍安危之不可豫圖皆此類張湛注列子説符采采榮木于兹托根繁華朝起慨慕不存貞脆由人禍福無門陶靖節集詩四言墨者田鳩欲見秦惠王留三年而不得見客有言之於楚王乃往見楚王王悅之與將軍之節以如秦至而得見出而告人曰吾不識秦之道乃當由楚也物固有近之而逺逺之而近藝文類聚儀飾部節驚舟失柂於空壑山足無絆於澤中𢎞明集張融門論夫扁鵲之所以稱良醫者以其應疾投藥不失其宜耳不責其令有不死之民也𢎞明集正誣論寧可見犂牛不登宗廟之用而永棄於牢餼之具耶𢎞明集疑夷夏論咨難合火本乾燥澤本潤濕燥濕殊性不可共處若其共處必相侵尅既相侵尅其變乃生變生則本性改矣水熱而成湯火滅而氣冷是謂革也周易正義革大風有隧音遂有空大谷維此良人作為式穀維彼不順征以中垢詩大雅桑柔此乃以冠雙屨將絲綜麻方鑿圎枘其可入乎春秋正義序比於連雞藝不俱栖立可離也後漢書吕布傳􅕭涔不容尺鯉染之謂也晉書劉聰記吾所以説吾君者橫説之則以詩書禮樂從説之則以金板六韜奉事而大有功者不可為數而吾君未嘗啓齒莊子徐無鬼夫青不與白為青而白不與青為白故曰不相與公孫龍子通變論注雖有美行盛譽不可比目合翼相須也此乃氣不合音不調者也鬼谷子本經隂符商角不二合徵羽不相配能為四聲主者其唯宫乎鬼谷子本經隂符大夫種知所以強越而不知所以存身萇𢎞知周之所存而不知身所以亡知逺而不知近淮南子説山訓神蛇能斷而復續而不能使人勿斷也神龜能見夢元王而不能自出漁者之籠淮南子説山訓夫以人之所不能聽説人譬以大牢享野獸以九韶樂飛鳥也淮南子人間訓夫歌采菱發陽阿鄙人聽之不若此延路陽局非歌者拙也聽者異也故交畫不暢連環不解物之不通者聖人不爭也淮南子人間訓初一親非其膚其志齟齬測曰親非其膚中心間也太玄經第三親屈原言已執忠信之行以事於君其志不合猶入池涉水而求薜荔登山緣木而采芙蓉固不可得之也王逸注楚辭九歌言已性逹道德而君閉塞其志不合若竹柏之異心也王逸注楚辭七諫言君性所為不與已合若方與圜不可錯雜勢不相安也王逸注楚辭七諫言車敗馬奔鑣銜斷絶猶自馳騖至於暮夜乃舍無有制止之者以言人臣一去君亦不復得拘留也王逸注楚辭九歎言方與圜其性不同鉤曲繩直其態殊異而不可合以言忠佞異志猶鉤繩也王逸注楚辭九歎塠重一人之迹不能蹈也礚重一人之掌不能推也賢臣有徑強之優愚主有不堪之劣以此相求魚鳥相與逰也王充論衡效力篇尾大於身者不可掉臣賢於君者不可任故口不容而強吞之者必哽才非匹而委仗之者見輕抱朴子外篇任能譬猶禽魚之結侶冰炭之同器欲其久合安可得哉抱朴子外篇交際觀聼殊好愛憎難同飛鳥覩西施而驚逝魚鱉聞九韶而深沉故衮藻之粲煥不能悅裸鄉之目采菱之清音不能快楚𨽻之耳古公之仁不能喻欲地之狄端木之辨不能釋縶馬之庸抱朴子外篇廣譬滄海揚萬里之濤不能斂山峰之塵驚風摧千仭之木不能拔弱草之荄貙虎暴闞不能威蚊虻冠世之才不能合流俗抱朴子外篇廣譬震雷不能細其音以協金石之和日月不能私其耀以就曲照之惠大川不能促其涯以適速濟之情五嶽不能削其峻以赴陟者之欲故廣車不能脅其轍以茍通於狹路髙士不得撙其節以同塵於隘谷抱朴子外篇廣譬圭璋雖有特達之美而明月皆謂難暗投以喻仙者雖有超俗之譽非無捕影之譏李善注文選郭景純遊仙詩圜鑿而方枘兮吾固知其鉏鋙而難入文選宋玉九辨感鸞鷖之特栖兮悲淑人之希合彼無合其何傷兮患衆偽之冒真文選思玄賦君若清路塵妾若濁水泥浮沈各異勢會合何時諧文選曹植七哀詩夫至音不合衆聽故伯牙絶絃至寶不同衆好故卞和泣血補文選陳元立左傳疏孰知其不合兮若竹柏之異心廣文選東方曼倩七諫聫蕙芷以為佩兮過鮑肆而失香廣文選東方曼倩初放不量鑿而正枘兮固前修以菹醢楚辭離騷經理弱而媒拙兮恐導言之不固楚辭離騷經方圜殊而不合兮鉤繩用而異態楚辭劉向逺逝方鑿圎枘鉏鋙難從翔鳥遊魚蹉跎不狎是以賈生懷琬琰而挫翮馮子握璵璠而煆羽藝文類聚人部隱逸下書始知庸聽局方悟大音賒文苑英華沈約悲悼一詩使二女共室顔色相殊令蘇秦通言張儀結媒發辨利口奪舒美辭推心調諧成為夫妻弊髮腐齒終不相知參同契至味不合於衆口大音不比於衆耳作咸池設大章發簫韶詠九成莫之和也張鄭衛之絃歌時俗之音必不期而拊手也故宋玉云客歌於郢為下里之曲和者千人引商徵角衆莫之應此皆悅邪聲不曉於大度者也𢎞明集牟子理惑論杳兮如天淵兮如海不合窺牆之士數仭之夫固其宜也𢎞明集牟子理惑論猶方孔圎枘雖美於形而闕於事矣辨正論卷一難並騏驥不能與罷驢為駟而鳳凰不與燕雀為羣而賢者亦不與不肖者同列史記日者傳夫邪正之人不宜共國亦猶冰炭不可同器後漢書傅燮列傳邪正不並存譬若胡與秦胡秦有時合邪正各異津晉書樂下韶衛不並奏雅鄭不兼御晉書皇甫謐傳函矢殊用矛戈異適雙美之談豈能兩遂宋書顧覬之傳野與市爭民家與府爭貨金與粟爭貴鄉與朝爭治管子權修楚人有鬻楯與矛者譽之曰吾楯之堅莫能陷也又譽其矛曰吾矛之利於物無不陷也或曰以子之矛陷子之楯何如其人弗能應也夫不可陷之楯與無不陷之矛不可同世而立韓非子難一諺曰君子重襲小人無由入正人十倍邪辟無由來賈子容經人主貴正而尚忠忠正在上位執正營事則讒佞姦邪無由進矣譬猶方圓之不相蓋而曲直之不相入淮南子主術訓上衆曲不容直衆枉不容正故人衆則食狼狼衆則食人淮南子説山訓鮑魚不與蘭茝同笥而藏桀紂不與堯舜同時而治韓詩外傳巫祝不可與並祀諸生不可與逐語鹽鐵論論災冰炭不同器日月不並明鹽鐵論刺復冠履不同藏賢不肖不同位説苑談叢吾不覩參辰之相比也是以君子貴遷善揚子學行篇夫邪之與正猶水與火不同原不得並盛潛夫論慎微夫從事於王者內則姬焉外則士焉士必懼其讒姬必憎其狷由此觀之王之左右士與姬不能並也天祿閣外史愛憎言何所有方鑿受圎枘而能合者誰有異道而相安耶言忠佞不相為用也王逸注楚辭離騷經浮雲行則蔽月之光讒佞進則忠良壅也王逸注楚辭九辨言冰見炭則消炭得冰則滅以喻忠佞不可並處則相傷害王逸注楚辭七諫夫梧禽不與鴟梟同枝麟虞不與豺狼連羣清源不與濁潦混流仁明不與凶暗同處何者漸染積而移直道暴迫則生害也抱朴子外篇交際夫繩舒則木直正進則邪凋有虞舉則四凶戮宣尼任則少卯梟猶震雷駭則鼛鼓堙朝日出則螢燭幽也抱朴子外篇嘉遁義路閉則利門開利門開則義路閉李善注文選西征賦紫芝之不與茨棘俱植鸞鳳之不與梟同栖天理固然易在曉晤李善注文選劉孝標辨命論薰猶不同器梟鸞不接翼文選劉峻辨命論夫方圜之異形兮勢不可以相錯廣文選東方曼倩哀命規矩不相害殊性孰相安賢聖不為匹愚智不為羣道德經指歸卷七名利與身若炭與水形性相反勢不俱然道德經指歸卷八譬如良藥妙寶神珠毒不共居能銷衆毒波羅蜜多經卷五百七十二譬如水火之異亦如甘露毒藥大智度論卷十八譬如百種美食與毒同器則不可食大智度論卷六十三譬如一人行時不住住時不行以二法相違行住不得俱故佛性論卷三道與不道如金比草𢎞明集牟子理惑論難支三星之光曜在於魚罶之中其去斯須不可久也以喻周室之亡期將至欲望其存亦不可久也毛詩正義苕之牛雖瘠僨于豚上其畏不死左傳昭公十三年大木將顛非一繩所維後漢紀孝桓下斯乃大樹將顛蓋非一繩之罪也北史干栗磾傳論大之與小強之與弱也猶石之與卵虎之啖豚又何疑焉淮南子人間訓九層之臺一傾公輸子不能正本朝一邪伊望不能復鹽鐵論救匱狐刺之鑿雖公輸子不能善其枘畚土之基雖良匠不能成其髙譬若秋蓬被霜遭風則零落雖有十子産如之何故扁鵲不能肉白骨微箕不能存亡國也鹽鐵論非鞅天下聞之皆曰扁鵲能生死人鵲辭曰豫非能生死人也特使夫當生者活耳夫死者猶不可藥而生也悲夫亂君之治不可藥而息也詩云多將熇熇不可救藥甚之之辭也説苑辨物江南多蝮螫我手足寃繁詰屈痛徹心腹焦氏易林師之無妄虺蛇求聚難以居處毒螫痛甚瘡不可愈焦氏易林履之大壯夫磯將潰則不可與網罟之夫謀國將亡則不可與章句之徒議天祿閣外史去蜀必死之病俞附越人所無如何朽木鉛鋌班輸歐冶所不能匠也抱朴子外篇彈禰闢滔天之源激不測之流塞之以撮壤障之以指掌也抱朴子外篇詰鮑人之迷也其日固已久矣數世之壞非一人之所支也揚子法言注重黎篇大則有鯨有鯢小則為梟為獍負其牛羊之力凶其水草之性非玉燭之能調豈璿璣之可正廣文選庾子山哀江南賦乘漬水以膠船馭奔駒而朽索小人則將及水火君子則方成猿鶴弊箄不能救鹽池之鹹阿膠不能止黃河之濁廣文選庾子山哀江南賦運岱山而壓春卵引渤海而躍秋螢當不足等其銷滅譬其虀粉文苑英華盧思道􅊾一譬如師子博撮諸麋彼雖有母亦不能救本緣經持王子品譬若隨藍風一起時諸樹名大樹而不能自制所以者何其身不堪如來三昧經卷上猶如野象踏芭蕉林盡皆摧碎無明羅剎經其猶太陽之熯晨霜注洪流以滅爝火𢎞明集十四事起欲伐而不得生斧柯欲鳥而不得生網羅欲彼天下是生為汲冡周書周祝解西風謂之大風大風之行有所從而來必從大空谷之中鄭氏箋詩桑柔燔黍則大亨之濫觴土鼓乃雲門之拳石禮記正義序因龍出而紀官因鳳來而作樂三墳山墳源深而水流水流而魚生之情也根深而木長木長而實生之情也君子情同而親合親合而事生之情也太公六韜文師自知慧出使玉化為環玦者是政反為滑也鶡冠子天則夫力不足則偽知不足則欺財不足則盜莊子則陽非譽相紛怨德並行於是乃有曽參孝己之美而生盜跖莊蹻之邪淮南子齊俗訓民迫其難則求其便困其患則造其備淮南子泛論訓洪水滔天而有禹之績河水泛溢而有宣房之功商紂暴虐而有孟津之謀天下煩擾而有乘羡之富鹽鐵論力耕棘木為杼削木為柚杼柚既施民得以燠太玄經太玄棿以見鳥迹而知為書見蜚蓬而知為車天非以鳥迹命倉頡以蜚蓬使奚仲也奚仲感蜚蓬而倉頡起鳥迹也王充論衡感類篇關梁所以禁非而猾吏因之以為非焉衡量所以檢偽而邪人因之以為偽焉大臣所以扶危而姦人恐主之不危兵革所以靜難而冦者盜之以為難抱朴子外篇詰鮑學者非為幻怪也幻怪之生必由於學禮者非為華薄也而華薄之興必由於禮郭子注莊德充符亂心不由於醜而常在美色撓世不由於惡而常在仁義則仁義者撓天下之具也郭子注莊駢拇御其真知乘其自然則萬里之路可至而羣馬之性不失馬性不同而齊求其用故有力竭而態作者含哺鼓腹民之真能及至聖人屈折以禮樂懸跂以仁義而民始好知其過皆由乎迹之可尚也郭子注莊馬蹄魚失淵則為人禽利器明則為盜資郭子注莊胠篋夫脣竭非以寒齒而齒寒魯酒薄非以圍邯鄲而邯鄲圍聖人生非以起大盜而大盜起皆自然相生必至之勢也郭子注莊胠篋桁楊以椄槢為管桎梏以鑿枘為用聖知仁義者逺罪之迹迹逺罪則民思尚之尚之則矯詐生矯詐生而禦姦之器不具者未之有也故棄所尚則矯詐不作桁楊桎梏廢矣何鑿枘椄槢之為哉郭子注莊在宥嚆矢矢之猛者言曾史為桀跖之利用也郭子注莊在宥且天下皆患創亂故求虞氏之藥操藥修父其色燋然明治天下者非以為榮也郭子注莊天地琴瑟張而鄭衛作五色成而綺縠生意林士緯湯師蜘蛛而結網金天據九雁以正時唐堯見蓂莢而知月意林抱朴子夫創始者恆朴而飾終者必妍是故烹飪起於熱石玉輅基於推輪藝文類聚服飾部扇賦仲尼見滄海橫流故務為舟航太平御覽舟部航密儀之制杵臼萬民以濟及後人加功因延力借身重以踐碓而利十倍杵舂又復設機關用驢騾牛馬及役水而舂其力乃且百倍太平御覽資産部舂觀魚翼而創櫓視鴟尾而製柂埤雅品物門鳶舊云視鴟創柂觀鱟制帆埤雅品物門鱟説者又以謂放蜘蛛而結網法螺蚌而閉户埤雅品物門蜘蛛搏噬爪牙鋒距之先毒螫芒刺矛矢以存聖人垂象五兵已陳初學記居處部庫藏注忘戰者危極武者傷前聖制弓後世造弩玉海兵制弓矢譬如因的則有弓箭元陽妙經卷一譬如有的箭則著之菩薩善戒經卷一以有事故有所作以有足故有逰行以有身故有屈伸以有飢渴故有求飲食菩薩地持經卷三譬如大海初漸起時當知皆為有價無價摩尼寶珠作所住處此寶皆從大海生故華手經卷七夫轉蓬漂而車輪成窊木流而舟楫設蜘蛛布而罻羅陳鳥迹見而文字作故有法成易無法成難𢎞明集牟子理惑論分定世稱萬人逐兔一人獲之貪者悉止分定故也後漢書袁紹列傳雉兔在野衆人逐之分未定也雞豕滿市莫有志者分定故也尹文子大道上則若性命肌膚之不可易也荀子哀公今一兔走百人逐之非一兔足為百人分也由未定由未定堯且屈力而況衆人乎積兔滿市行者不顧非不欲兔也分已定矣分已定人雖鄙不爭故治天下及國在乎定分而已矣吕氏春秋慎勢賢不肖不可以不相分若命之不可易若美惡之不可移桀紂貴為天子富有天下能盡害天下之民而不能得賢名之關龍逢王子比干能以要領之死爭其上之過而不能與之賢名名固不可以相分必由其理吕氏春秋功名非工商不得食于利末非良農不得食於收穫非執政不得食于官爵鹽鐵論相刺求雞獲雉買鱉失魚出入均貨利得無餘焦氏易林復之咸人稟元氣於天各受夀夭之命以立長短之形猶陶者用土為簋亷冶者用銅為樣杅矣器形已成不可大小人體已定不可增減王充論衡無形篇物生也色青其熟也色黃人之少也髮黑其老也髮白黃為物熟驗白為人老效物黃人雖灌溉壅養終不能青髮白雖吞藥養性終不能黑黑青不可復還老衰安可復却黃之與白猶肉腥炙之燋魚鮮煮之熟也燋不可復令腥熟不可復令鮮鮮腥猶少壯燋熟猶衰老也王充論衡道虛篇志過其分上下相冒而莫為臣妾矣臣妾之才而不安臣妾之任則失矣故知君臣上下手足外內乃天理自然豈直人之所為哉郭子注莊齊物篇夫時之所賢者為君才不應世者為臣若天之自髙地之自卑首自在上足自居下豈有遞哉郭子注莊齊物論耳目不能以易任成功手足不能以代司致業故嬰兒之始生也不以目求乳不以耳向明不以足操物不以手求行郭子注莊德充符人之一體非有親也首自在上足自在下藏府居內皮毛處外內外上下尊卑貴賤於其體中各任其極而未有親愛於其間也然至仁足矣故五親六族賢愚逺近不失分於天下者理自然也郭子注莊天運日歸於西起明於東月歸於東起明於西李善注文選陸士衡演連珠皮朽者毛落川涸者魚逝春生者繁華秋榮者零悴自然之數豈有恨哉文選應璩與曹長思書短則不可緩之於寸隂長則不可急之於箭漏文選劉峻辨命論夫靡顔膩理哆噅顣頞形之異也朝秀晨終龜鵠千嵗年之殊也聞言如響智昏菽麥神之辨也同知三者定乎造化榮辱之境獨曰由人是知二五而未識於十文選劉峻辨命論宰衡之與皂𨽻容彭之與殤子猗䪺之與黔婁陽文之與敦洽咸得之於自然不假道於才智文選劉峻辨命論懸千金於市市人不敢取者分定也委一錢於路童兒爭之者分未定也意林物理論譬如寶珠若具莊飾不具莊飾其珠無異波羅蜜多經卷五百六十八雖洗垢求疵無損南威之麗捧心斆疾未變西施之妍辨正論卷六無損母之於女恩愛至矣穿耳附珠何傷於仁吳志諸葛恪傳注雖云割地譬猶囊貯中亦一家之有耳晉書段灼傳縱復令諸王後世子孫還自相并蓋亦楚人失繁弱於雲夢尚未為亡其弓也晉書段灼傳一葉從風無損鄧林之攢植雙鳧退飛不虧渤澥之遊泳隋書盧思道傳猿墮髙木不踒手足焦氏易林蒙之隨牧羊逢狼雖憂不傷焦氏易林大有之無妄載船逢火憂不為禍焦氏易林頥之旅老牛病馬去之何悔焦氏易林晉之需摧角不傷雖折復長焦氏易林晉之夬雖躓復起不毁牙齒焦氏易林蹇之遁失羊捕牛無損無憂焦氏易林小過之蹇且華霍之極大滄海之滉漾其髙不俟翔埃之來其深不抑行潦之注撮壤土不足以減其峻升勺出不足以削其廣一世不過有數仙人何能有損人物之鞅掌乎抱朴子內篇釋滯水由源注雖遇風日不能損也道成其性雖在於世不能移也莊子音義徐無鬼夫青蠅不能穢垂棘邪論不能惑孔墨文選王褒四子講德論君子守真仗信遭時不容雖有訕辱之恥幽垢之謗猶傷體毛耳意林唐子美寶為質雕磨益光不足以損何氏意林賞譽譬然一燈轉然百燈千燈萬燈巨億萬燈無量數燈普照虛空先所然一燈光明無損靈寶通微經如彼幻師捨幻價直雖似有損而實無損波羅蜜多經五百八十一如蜂採花不損其色大寶積經卷一百二十大海減去一溪水寧令減少不對曰減去百千億萬溪水尚不能減知少也減大海一恆水寧能令減知少不對曰減去百千億萬恆水不能令減知少也阿彌陀經卷上阿閦如來剎中地行足蹈其上即蹈適舉足便還復如故譬如綩筵枕頭枕其上即為陷適舉頭便還復如故佛國經卷上佛言夫人為道務博愛博哀覩人施道助之歡喜亦得福報質曰彼福不當減乎佛言猶若炬火數千百人各以炬來取其火去熟食除冥彼火如故福亦如之佛説四十二章經尺一若人藥和赤銅若不成金不失銅也思惟要略法猶如大海取其一滴減須彌山如芥子許損大地土如米許復損虛空如蚊許出曜經七口品譬如日出盲人不見便謂世間無有日月日有何咎又如雷電震地聾人不聞聲聲有何過大智度論卷八譬如白人雖鬢髮黶子黑不名黑人大智度論三十五如人夜失寶珠電光暫現即時還得大智度論卷八十五如人避熱故在泥中卧起還洗則如故大智度論卷九十七雖儒墨之競興九流之是非乃爝火之不息非日月之不暉𢎞明集十一析毫空樹無傷垂蔭之茂離材虛室無損輪奐之美𢎞明集宗答何書難白黑論喻林卷三十
